<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ray-marching Fire Effect</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .relative {
      position: relative;
    }

    .w-screen {
      width: 100vw;
    }

    .h-screen {
      height: 100vh;
    }

    .w-full {
      width: 100%;
    }

    .h-full {
      height: 100%;
    }

    .bg-black {
      background-color: #000;
    }
  </style>
</head>
<body>
  <div class="relative w-screen h-screen">
    <div class="ray-marching-fire w-full h-full bg-black"></div>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.124.0";
    import ky from "https://esm.sh/kyouka@1.2.5";
    import { OrbitControls } from "https://esm.sh/three@0.124.0/examples/jsm/controls/OrbitControls";
    import { GLTFLoader } from "https://esm.sh/three@0.124.0/examples/jsm/loaders/GLTFLoader";
    import { FBXLoader } from "https://esm.sh/three@0.124.0/examples/jsm/loaders/FBXLoader";
    import { EffectComposer } from "https://esm.sh/three@0.124.0/examples/jsm/postprocessing/EffectComposer";
    import Stats from "https://esm.sh/three@0.124.0/examples/jsm/libs/stats.module";
    import { GUI } from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

    const calcAspect = (el) => el.clientWidth / el.clientHeight;

    const getNormalizedMousePos = (e) => {
      return {
        x: (e.clientX / window.innerWidth) * 2 - 1,
        y: -(e.clientY / window.innerHeight) * 2 + 1
      };
    };

    const rayMarchingFireVertexShader = `
    varying vec2 vUv;
    varying vec3 vPosition;

    void main(){
        gl_Position = vec4(position, 1.0);
        vUv=uv;
        vPosition=position;
    }
    `;

    const rayMarchingFireFragmentShader = `
    #define GLSLIFY 1
    
    float sdSphere( vec3 p, float s )
    {
      return length( p ) - s;
    }

    float opU( float d1, float d2 )
    {
        return min(d1,d2);
    }

    vec2 opU( vec2 d1, vec2 d2 ){
        return ( d1.x < d2.x ) ? d1 : d2;
    }

    vec3 mod289(vec3 x)
    {
      return x - floor(x * (1.0 / 289.0)) * 289.0;
    }

    vec4 mod289(vec4 x)
    {
      return x - floor(x * (1.0 / 289.0)) * 289.0;
    }

    vec4 permute(vec4 x)
    {
      return mod289(((x*34.0)+1.0)*x);
    }

    vec4 taylorInvSqrt(vec4 r)
    {
      return 1.79284291400159 - 0.85373472095314 * r;
    }

    vec3 fade(vec3 t) {
      return t*t*t*(t*(t*6.0-15.0)+10.0);
    }

    // Classic Perlin noise
    float cnoise(vec3 P)
    {
      vec3 Pi0 = floor(P); // Integer part for indexing
      vec3 Pi1 = Pi0 + vec3(1.0); // Integer part + 1
      Pi0 = mod289(Pi0);
      Pi1 = mod289(Pi1);
      vec3 Pf0 = fract(P); // Fractional part for interpolation
      vec3 Pf1 = Pf0 - vec3(1.0); // Fractional part - 1.0
      vec4 ix = vec4(Pi0.x, Pi1.x, Pi0.x, Pi1.x);
      vec4 iy = vec4(Pi0.yy, Pi1.yy);
      vec4 iz0 = Pi0.zzzz;
      vec4 iz1 = Pi1.zzzz;

      vec4 ixy = permute(permute(ix) + iy);
      vec4 ixy0 = permute(ixy + iz0);
      vec4 ixy1 = permute(ixy + iz1);

      vec4 gx0 = ixy0 * (1.0 / 7.0);
      vec4 gy0 = fract(floor(gx0) * (1.0 / 7.0)) - 0.5;
      gx0 = fract(gx0);
      vec4 gz0 = vec4(0.5) - abs(gx0) - abs(gy0);
      vec4 sz0 = step(gz0, vec4(0.0));
      gx0 -= sz0 * (step(0.0, gx0) - 0.5);
      gy0 -= sz0 * (step(0.0, gy0) - 0.5);

      vec4 gx1 = ixy1 * (1.0 / 7.0);
      vec4 gy1 = fract(floor(gx1) * (1.0 / 7.0)) - 0.5;
      gx1 = fract(gx1);
      vec4 gz1 = vec4(0.5) - abs(gx1) - abs(gy1);
      vec4 sz1 = step(gz1, vec4(0.0));
      gx1 -= sz1 * (step(0.0, gx1) - 0.5);
      gy1 -= sz1 * (step(0.0, gy1) - 0.5);

      vec3 g000 = vec3(gx0.x,gy0.x,gz0.x);
      vec3 g100 = vec3(gx0.y,gy0.y,gz0.y);
      vec3 g010 = vec3(gx0.z,gy0.z,gz0.z);
      vec3 g110 = vec3(gx0.w,gy0.w,gz0.w);
      vec3 g001 = vec3(gx1.x,gy1.x,gz1.x);
      vec3 g101 = vec3(gx1.y,gy1.y,gz1.y);
      vec3 g011 = vec3(gx1.z,gy1.z,gz1.z);
      vec3 g111 = vec3(gx1.w,gy1.w,gz1.w);

      vec4 norm0 = taylorInvSqrt(vec4(dot(g000, g000), dot(g010, g010), dot(g100, g100), dot(g110, g110)));
      g000 *= norm0.x;
      g010 *= norm0.y;
      g100 *= norm0.z;
      g110 *= norm0.w;
      vec4 norm1 = taylorInvSqrt(vec4(dot(g001, g001), dot(g011, g011), dot(g101, g101), dot(g111, g111)));
      g001 *= norm1.x;
      g011 *= norm1.y;
      g101 *= norm1.z;
      g111 *= norm1.w;

      float n000 = dot(g000, Pf0);
      float n100 = dot(g100, vec3(Pf1.x, Pf0.yz));
      float n010 = dot(g010, vec3(Pf0.x, Pf1.y, Pf0.z));
      float n110 = dot(g110, vec3(Pf1.xy, Pf0.z));
      float n001 = dot(g001, vec3(Pf0.xy, Pf1.z));
      float n101 = dot(g101, vec3(Pf1.x, Pf0.y, Pf1.z));
      float n011 = dot(g011, vec3(Pf0.x, Pf1.yz));
      float n111 = dot(g111, Pf1);

      vec3 fade_xyz = fade(Pf0);
      vec4 n_z = mix(vec4(n000, n100, n010, n110), vec4(n001, n101, n011, n111), fade_xyz.z);
      vec2 n_yz = mix(n_z.xy, n_z.zw, fade_xyz.y);
      float n_xyz = mix(n_yz.x, n_yz.y, fade_xyz.x);
      return 2.2 * n_xyz;
    }

    uniform float uTime;
    uniform vec2 uMouse;
    uniform vec2 uResolution;
    uniform float uVelocity;
    uniform vec3 uColor1;
    uniform vec3 uColor2;

    uniform mat4 uCameraWorldMatrix;
    uniform mat4 uProjectionMatrixInverse;
    uniform float uGreenScreen;

    varying vec2 vUv;
    varying vec3 vPosition;

    float fire(vec3 p){
        vec3 p2=p*vec3(1.,.5,1.)+vec3(0.,1.,0.);
        float geo=sdSphere(p2,1.);
        float displacement=uTime*uVelocity;
        vec3 displacementY=vec3(.0,displacement,.0);
        float noise=(cnoise(p+displacementY))*p.y*.4;
        float result=geo+noise;
        return result;
    }

    vec2 sdf(vec3 p){
        float result=opU(abs(fire(p)),-(length(p)-100.));
        float objType=1.;
        return vec2(result,objType);
    }

    vec4 rayMarch(vec3 eye,vec3 ray){
        float depth=0.;
        float strength=0.;
        float eps=.02;
        vec3 pos=eye;
        for(int i=0;i<64;i++){
            pos+=depth*ray;
            float dist=sdf(pos).x;
            depth=dist+eps;
            if(dist>0.){
                strength=float(i)/64.;
            }
        }
        return vec4(pos,strength);
    }

    void main(){
        vec2 ndc = vUv * 2.0 - 1.0;
        
        vec4 cameraSpaceDir = uProjectionMatrixInverse * vec4(ndc, -1.0, 1.0);
        vec3 rdCamera = normalize(cameraSpaceDir.xyz / cameraSpaceDir.w);
        
        vec3 rd = (uCameraWorldMatrix * vec4(rdCamera, 0.0)).xyz;
        rd = normalize(rd);
        
        vec3 ro = cameraPosition;
        
        vec3 color = vec3(0.);
        vec4 result = rayMarch(ro, rd);
        
        float strength = pow(result.w * 2., 4.);
        vec3 ellipse = vec3(strength);
        color = ellipse;
        
        float fireBody = result.y / 64.;
        vec3 mixColor = mix(uColor1, uColor2, fireBody);
        color *= mixColor;
        
        vec3 finalColor = color;
        if (uGreenScreen > 0.5) {
            float alpha = clamp(strength * 10.0, 0.0, 1.0);
            finalColor = mix(vec3(0.0, 1.0, 0.0), color, alpha);
        }
        
        gl_FragColor = vec4(finalColor, 1.);
    }
    `;

    const colorPresets = {
      'Classic Fire': { color1: '#ff801a', color2: '#ff5718' },
      'Cosmic Plasma': { color1: '#9d4edd', color2: '#00f5d4' },
      'Acid Toxic': { color1: '#39ff14', color2: '#fee440' },
      'Solar Flare': { color1: '#ffb703', color2: '#d90429' },
      'Ghostly Ectoplasm': { color1: '#00b4d8', color2: '#90e0ef' }
    };

    class Base {
      constructor(sel, debug = false) {
        this.debug = debug;
        this.container = document.querySelector(sel);
        this.perspectiveCameraParams = {
          fov: 75,
          near: 0.1,
          far: 100
        };
        this.orthographicCameraParams = {
          zoom: 2,
          near: -100,
          far: 1000
        };
        this.cameraPosition = new THREE.Vector3(0, 3, 10);
        this.lookAtPosition = new THREE.Vector3(0, 0, 0);
        this.rendererParams = {
          outputEncoding: THREE.LinearEncoding,
          config: {
            alpha: true,
            antialias: true
          }
        };
        this.mousePos = new THREE.Vector2(0, 0);
        this.mouseSpeed = 0;
      }
      
      init() {
        this.createScene();
        this.createPerspectiveCamera();
        this.createRenderer();
        this.createMesh({});
        this.createLight();
        this.createOrbitControls();
        this.addListeners();
        this.setLoop();
      }
      
      createScene() {
        const scene = new THREE.Scene();
        if (this.debug) {
          scene.add(new THREE.AxesHelper());
          const stats = Stats();
          this.container.appendChild(stats.dom);
          this.stats = stats;
        }
        this.scene = scene;
      }
      
      createPerspectiveCamera() {
        const { perspectiveCameraParams, cameraPosition, lookAtPosition } = this;
        const { fov, near, far } = perspectiveCameraParams;
        const aspect = calcAspect(this.container);
        const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
        camera.position.copy(cameraPosition);
        camera.lookAt(lookAtPosition);
        this.camera = camera;
      }
      
      createOrthographicCamera() {
        const { orthographicCameraParams, cameraPosition, lookAtPosition } = this;
        const { left, right, top, bottom, near, far } = orthographicCameraParams;
        const camera = new THREE.OrthographicCamera(
          left,
          right,
          top,
          bottom,
          near,
          far
        );
        camera.position.copy(cameraPosition);
        camera.lookAt(lookAtPosition);
        this.camera = camera;
      }
      
      updateOrthographicCameraParams() {
        const { container } = this;
        const { zoom, near, far } = this.orthographicCameraParams;
        const aspect = calcAspect(container);
        this.orthographicCameraParams = {
          left: -zoom * aspect,
          right: zoom * aspect,
          top: zoom,
          bottom: -zoom,
          near,
          far,
          zoom
        };
      }
      
      createRenderer(useWebGL1 = false) {
        const { rendererParams } = this;
        const { outputEncoding, config } = rendererParams;
        const renderer = !useWebGL1
          ? new THREE.WebGLRenderer(config)
          : new THREE.WebGL1Renderer(config);
        renderer.setSize(this.container.clientWidth, this.container.clientHeight);
        renderer.outputEncoding = outputEncoding;
        this.resizeRendererToDisplaySize();
        this.container.appendChild(renderer.domElement);
        this.renderer = renderer;
        this.renderer.setClearColor(0x000000, 0);
      }
      
      enableShadow() {
        this.renderer.shadowMap.enabled = true;
      }
      
      resizeRendererToDisplaySize() {
        const { renderer } = this;
        if (!renderer) {
          return;
        }
        const canvas = renderer.domElement;
        const pixelRatio = (this.params && this.params.dpr) || window.devicePixelRatio;
        const { clientWidth, clientHeight } = canvas;
        const width = (clientWidth * pixelRatio) | 0;
        const height = (clientHeight * pixelRatio) | 0;
        const isResizeNeeded = canvas.width !== width || canvas.height !== height;
        if (isResizeNeeded) {
          renderer.setSize(width, height, false);
        }
        return isResizeNeeded;
      }
      
      createMesh(meshObject, container = this.scene) {
        const {
          geometry = new THREE.BoxGeometry(1, 1, 1),
          material = new THREE.MeshStandardMaterial({
            color: new THREE.Color("#d9dfc8")
          }),
          position = new THREE.Vector3(0, 0, 0)
        } = meshObject;
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(position);
        container.add(mesh);
        return mesh;
      }
      
      createLight() {
        const dirLight = new THREE.DirectionalLight(
          new THREE.Color("#ffffff"),
          0.5
        );
        dirLight.position.set(0, 50, 0);
        this.scene.add(dirLight);
        const ambiLight = new THREE.AmbientLight(new THREE.Color("#ffffff"), 0.4);
        this.scene.add(ambiLight);
      }
      
      createOrbitControls() {
        const controls = new OrbitControls(this.camera, this.renderer.domElement);
        const { lookAtPosition } = this;
        controls.target.copy(lookAtPosition);
        controls.update();
        this.controls = controls;
      }
      
      addListeners() {
        this.onResize();
      }
      
      onResize() {
        window.addEventListener("resize", () => {
          const width = this.container.clientWidth;
          const height = this.container.clientHeight;
          
          this.renderer.setSize(width, height, false);
          
          if (this.camera instanceof THREE.PerspectiveCamera) {
            this.camera.aspect = width / height;
            this.camera.updateProjectionMatrix();
          } else if (this.camera instanceof THREE.OrthographicCamera) {
            this.updateOrthographicCameraParams();
            const {
              left,
              right,
              top,
              bottom,
              near,
              far
            } = this.orthographicCameraParams;
            this.camera.left = left;
            this.camera.right = right;
            this.camera.top = top;
            this.camera.bottom = bottom;
            this.camera.near = near;
            this.camera.far = far;
            this.camera.updateProjectionMatrix();
          }
          
          if (this.rayMarchingFireMaterial) {
            this.rayMarchingFireMaterial.uniforms.uResolution.value.set(width, height);
          }
        });
      }
      
      update() {
        console.log("animation");
      }
      
      setLoop() {
        this.renderer.setAnimationLoop(() => {
          this.resizeRendererToDisplaySize();
          this.update();
          if (this.controls) {
            this.controls.update();
          }
          if (this.stats) {
            this.stats.update();
          }
          if (this.composer) {
            this.composer.render();
          } else {
            this.renderer.render(this.scene, this.camera);
          }
        });
      }
      
      createText(
        text = "",
        config,
        material = new THREE.MeshStandardMaterial({
          color: "#ffffff"
        })
      ) {
        const geo = new THREE.TextGeometry(text, config);
        const mesh = new THREE.Mesh(geo, material);
        return mesh;
      }
      
      createAudioSource() {
        const listener = new THREE.AudioListener();
        this.camera.add(listener);
        const sound = new THREE.Audio(listener);
        this.sound = sound;
      }
      
      loadAudio(url) {
        const loader = new THREE.AudioLoader();
        return new Promise((resolve) => {
          loader.load(url, (buffer) => {
            this.sound.setBuffer(buffer);
            resolve(buffer);
          });
        });
      }
      
      loadModel(url) {
        const loader = new GLTFLoader();
        return new Promise((resolve, reject) => {
          loader.load(
            url,
            (gltf) => {
              const model = gltf.scene;
              console.log(model);
              resolve(model);
            },
            undefined,
            (err) => {
              console.log(err);
              reject();
            }
          );
        });
      }
      
      loadFBXModel(url) {
        const loader = new FBXLoader();
        return new Promise((resolve, reject) => {
          loader.load(
            url,
            (obj) => {
              resolve(obj);
            },
            undefined,
            (err) => {
              console.log(err);
              reject();
            }
          );
        });
      }
      
      loadFont(url) {
        const loader = new THREE.FontLoader();
        return new Promise((resolve) => {
          loader.load(url, (font) => {
            resolve(font);
          });
        });
      }
      
      createRaycaster() {
        this.raycaster = new THREE.Raycaster();
        this.trackMousePos();
      }
      
      trackMousePos() {
        window.addEventListener("mousemove", (e) => {
          this.setMousePos(e);
        });
        window.addEventListener(
          "touchstart",
          (e) => {
            this.setMousePos(e.touches[0]);
          },
          { passive: false }
        );
        window.addEventListener("touchmove", (e) => {
          this.setMousePos(e.touches[0]);
        });
      }
      
      setMousePos(e) {
        const { x, y } = getNormalizedMousePos(e);
        this.mousePos.x = x;
        this.mousePos.y = y;
      }
      
      getInterSects(container = this.scene) {
        this.raycaster.setFromCamera(this.mousePos, this.camera);
        const intersects = this.raycaster.intersectObjects(
          container.children,
          true
        );
        return intersects;
      }
      
      onChooseIntersect(target, container = this.scene) {
        const intersects = this.getInterSects(container);
        const intersect = intersects[0];
        if (!intersect || !intersect.face) {
          return null;
        }
        const { object } = intersect;
        return target === object ? intersect : null;
      }
      
      getScreenFov() {
        return ky.rad2deg(
          2 * Math.atan(window.innerHeight / 2 / this.cameraPosition.z)
        );
      }
      
      getBaryCoord(bufferGeometry) {
        const length = bufferGeometry.attributes.position.array.length;
        const count = length / 3;
        const bary = [];
        for (let i = 0; i < count; i++) {
          bary.push(0, 0, 1, 0, 1, 0, 1, 0, 0);
        }
        const aCenter = new Float32Array(bary);
        bufferGeometry.setAttribute(
          "aCenter",
          new THREE.BufferAttribute(aCenter, 3)
        );
      }
      
      trackMouseSpeed() {
        let lastMouseX = -1;
        let lastMouseY = -1;
        let mouseSpeed = 0;
        window.addEventListener("mousemove", (e) => {
          const mousex = e.pageX;
          const mousey = e.pageY;
          if (lastMouseX > -1) {
            mouseSpeed = Math.max(
              Math.abs(mousex - lastMouseX),
              Math.abs(mousey - lastMouseY)
            );
            this.mouseSpeed = mouseSpeed / 100;
          }
          lastMouseX = mousex;
          lastMouseY = mousey;
        });
        document.addEventListener("mouseleave", () => {
          this.mouseSpeed = 0;
        });
      }
      
      usePCFSoftShadowMap() {
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      }
      
      useVSMShadowMap() {
        this.renderer.shadowMap.type = THREE.VSMShadowMap;
      }
      
      setCameraUpZ() {
        this.camera.up.set(0, 0, 1);
      }
    }

    class RayMarchingFire extends Base {
      constructor(sel, debug) {
        super(sel, debug);
        this.clock = new THREE.Clock();
        this.customTime = 0;
        this.cameraPosition = new THREE.Vector3(0, -2, 4);
        this.lookAtPosition = new THREE.Vector3(0, -2, 0);
        this.userRadius = 4.0;
        
        this.params = {
          velocity: 3,
          dpr: Math.min(window.devicePixelRatio, 2.0),
          animationSpeed: 1.0,
          animationPreset: 'Slow Orbit',
          greenscreen: false,
          colorPreset: 'Classic Fire'
        };
        
        this.colorParams = {
          color1: colorPresets['Classic Fire'].color1,
          color2: colorPresets['Classic Fire'].color2
        };
      }
      
      init() {
        this.createScene();
        this.createPerspectiveCamera();
        this.createRenderer();
        this.createRayMarchingFireMaterial();
        this.createPlane();
        this.createLight();
        this.createOrbitControls();
        
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.05;
        this.controls.screenSpacePanning = true;
        
        this.createDebugPanel();
        this.trackMousePos();
        this.addListeners();
        this.setupUIKeys();
        this.setLoop();
      }
      
      createRayMarchingFireMaterial() {
        const rayMarchingFireMaterial = new THREE.ShaderMaterial({
          vertexShader: rayMarchingFireVertexShader,
          fragmentShader: rayMarchingFireFragmentShader,
          side: THREE.DoubleSide,
          depthWrite: false,
          depthTest: false,
          uniforms: {
            uTime: { value: 0 },
            uMouse: { value: new THREE.Vector2(0, 0) },
            uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uVelocity: { value: this.params.velocity },
            uColor1: { value: new THREE.Color(this.colorParams.color1) },
            uColor2: { value: new THREE.Color(this.colorParams.color2) },
            uCameraWorldMatrix: { value: new THREE.Matrix4() },
            uProjectionMatrixInverse: { value: new THREE.Matrix4() },
            uGreenScreen: { value: 0.0 }
          }
        });
        this.rayMarchingFireMaterial = rayMarchingFireMaterial;
        this.shaderMaterial = rayMarchingFireMaterial;
      }
      
      createPlane() {
        const geometry = new THREE.PlaneGeometry(2, 2);
        const material = this.rayMarchingFireMaterial;
        this.createMesh({
          geometry,
          material
        });
      }
      
      update() {
        const delta = this.clock.getDelta();
        this.customTime += delta * this.params.animationSpeed;
        
        const mousePos = this.mousePos;
        const t = this.customTime;
        
        if (this.params.animationPreset === 'Slow Orbit') {
          const speed = 0.5;
          const angle = t * speed;
          this.camera.position.x = this.controls.target.x + Math.sin(angle) * this.userRadius;
          this.camera.position.z = this.controls.target.z + Math.cos(angle) * this.userRadius;
          this.camera.position.y = this.controls.target.y;
        } else if (this.params.animationPreset === 'Breathing Zoom') {
          const angle = t * 1.0;
          const radius = this.userRadius + Math.sin(angle) * 1.2;
          const dir = new THREE.Vector3().subVectors(this.camera.position, this.controls.target).normalize();
          this.camera.position.copy(this.controls.target).addScaledVector(dir, radius);
        } else if (this.params.animationPreset === 'Vertical Wave') {
          const angle = t * 1.0;
          const baseHeight = this.controls.target.y;
          this.camera.position.y = baseHeight + Math.sin(angle) * (this.userRadius * 0.3);
        } else if (this.params.animationPreset === 'Cinematic Spiral') {
          const angle = t * 0.6;
          const radius = this.userRadius + Math.sin(t * 0.4) * 1.0;
          this.camera.position.x = this.controls.target.x + Math.sin(angle) * radius;
          this.camera.position.z = this.controls.target.z + Math.cos(angle) * radius;
          this.camera.position.y = this.controls.target.y + Math.cos(t * 0.5) * 1.0;
        }
        
        if (this.rayMarchingFireMaterial) {
          this.rayMarchingFireMaterial.uniforms.uTime.value = this.customTime;
          this.rayMarchingFireMaterial.uniforms.uMouse.value = mousePos;
          this.rayMarchingFireMaterial.uniforms.uCameraWorldMatrix.value.copy(this.camera.matrixWorld);
          this.rayMarchingFireMaterial.uniforms.uProjectionMatrixInverse.value.copy(this.camera.projectionMatrixInverse);
        }
      }
      
      createDebugPanel() {
        const gui = new GUI({ title: 'Settings', width: 300 });
        this.gui = gui;
        
        gui.add(this.params, 'greenscreen').name('Green Screen').onChange((value) => {
          this.rayMarchingFireMaterial.uniforms.uGreenScreen.value = value ? 1.0 : 0.0;
        });
        
        gui.add(this.params, 'dpr', 0.5, 2.0, 0.1).name('Pixel Ratio').onChange((value) => {
          this.renderer.setPixelRatio(value);
          this.resizeRendererToDisplaySize();
        });
        
        gui.add(this.params, 'animationSpeed', 0.0, 3.0, 0.1).name('Anim Speed');
        
        const animations = ['Static', 'Slow Orbit', 'Breathing Zoom', 'Vertical Wave', 'Cinematic Spiral'];
        gui.add(this.params, 'animationPreset', animations).name('Camera Anim');
        
        const colorPresetNames = ['Classic Fire', 'Cosmic Plasma', 'Acid Toxic', 'Solar Flare', 'Ghostly Ectoplasm', 'Custom'];
        const colorPresetController = gui.add(this.params, 'colorPreset', colorPresetNames).name('Color Preset').onChange((presetName) => {
          if (presetName !== 'Custom') {
            const preset = colorPresets[presetName];
            this.colorParams.color1 = preset.color1;
            this.colorParams.color2 = preset.color2;
            this.rayMarchingFireMaterial.uniforms.uColor1.value.set(preset.color1);
            this.rayMarchingFireMaterial.uniforms.uColor2.value.set(preset.color2);
            color1Controller.updateDisplay();
            color2Controller.updateDisplay();
          }
        });
        
        const colorFolder = gui.addFolder('Custom Colors');
        const color1Controller = colorFolder.addColor(this.colorParams, 'color1').name('Inner Flame').onChange((value) => {
          this.rayMarchingFireMaterial.uniforms.uColor1.value.set(value);
          this.params.colorPreset = 'Custom';
          colorPresetController.setValue('Custom');
        });
        const color2Controller = colorFolder.addColor(this.colorParams, 'color2').name('Outer Flame').onChange((value) => {
          this.rayMarchingFireMaterial.uniforms.uColor2.value.set(value);
          this.params.colorPreset = 'Custom';
          colorPresetController.setValue('Custom');
        });
      }

      setupUIKeys() {
        window.addEventListener('keydown', (e) => {
          if (e.key === 'h' || e.key === 'H') {
            if (this.gui) {
              if (this.gui._hidden) {
                this.gui.show();
              } else {
                this.gui.hide();
              }
            }
          }
        });
        
        window.addEventListener('wheel', () => {
          setTimeout(() => {
            if (this.controls) {
              this.userRadius = this.camera.position.distanceTo(this.controls.target);
            }
          }, 50);
        });
      }
    }

    const start = () => {
      const rayMarchingFire = new RayMarchingFire(".ray-marching-fire", false);
      rayMarchingFire.init();
    };

    start();
  </script>
</body>
</html>
