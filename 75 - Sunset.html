<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>सूर्य GLSL Demo</title>
  <style>
    html,body { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
    #ui {
      position:fixed; top:10px; left:10px; z-index:20;
      background:rgba(0,0,0,0.5); padding:10px 14px; border-radius:8px;
      color:#eee; font-family:system-ui, sans-serif; font-size:14px;
    }
    label { display:block; margin:6px 0 2px; color:#ccc; }
    canvas { width:100vw; height:100vh; display:block; }
    #err { margin-top:8px; white-space:pre; color:#ffb; font-family:monospace; display:none;}
  </style>
</head>
<body>

<div id="ui">
  <strong>सूर्य GLSL Demo</strong><br>
  <label>Speed <input id="speed" type="range" min="0" max="4" step="0.01" value="1"></label>
  <div id="err"></div>
</div>
<canvas id="glcanvas"></canvas>

<script type="module">
  import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

  const canvas = document.getElementById("glcanvas");
  const gl = canvas.getContext("webgl");
  const errEl = document.getElementById("err");
  const speedEl = document.getElementById("speed");

  function resize() {
    const d = window.devicePixelRatio || 1;
    canvas.width = innerWidth * d;
    canvas.height = innerHeight * d;
    canvas.style.width = innerWidth+"px";
    canvas.style.height = innerHeight+"px";
    gl.viewport(0,0,canvas.width,canvas.height);
  }
  resize();
  addEventListener("resize", resize);

  const vert = `
    attribute vec2 pos;
    void main() {
      gl_Position = vec4(pos, 0.0, 1.0);
    }
  `;

  // Shader with support for Zoom, Offset, custom Sun Color, Greenscreen, and Background Color
  const frag = `
    precision highp float;

    uniform vec2 u_res;
    uniform float u_time;
    uniform float u_speed;
    uniform float u_zoom;
    uniform vec2 u_offset;
    uniform vec3 u_color;
    uniform bool u_greenscreen;
    uniform vec3 u_bgcolor;

    void main() {
      vec2 FC = gl_FragCoord.xy;
      float t = u_time * u_speed;
      vec2 r = u_res;
      vec2 p = (FC * 2.0 - r) / r.y;

      // Apply zoom and drag-pan offset
      p = p / u_zoom - u_offset;

      vec3 c = vec3(0.0);

      for (float i = 0.0; i < 42.0; i++) {
        float a = i / 1.5 + t * 0.5;

        vec2 q = p;
        q.x = q.x + sin(q.y * 19.0 + t * 2.0 + i) * 
              29.0 * smoothstep(0.0, -2.0, q.y);

        float d = length(q - vec2(cos(a), sin(a)) * 
                         (0.4 * smoothstep(0.0, 0.5, -q.y)));

        c = c + u_color * (0.015 / d);
      }

      vec3 col = c * c;
      if (u_greenscreen) {
        col = col + vec3(0.0, 1.0, 0.0);
      } else {
        col = col + u_bgcolor;
      }
      gl_FragColor = vec4(col, 1.0);
    }
  `;

  function compile(src, type) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      const msg = gl.getShaderInfoLog(s);
      throw new Error(msg);
    }
    return s;
  }

  function link(vs, fs) {
    const p = gl.createProgram();
    gl.attachShader(p, vs);
    gl.attachShader(p, fs);
    gl.bindAttribLocation(p, 0, "pos");
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(p));
    }
    return p;
  }

  let program;
  try {
    const vs = compile(vert, gl.VERTEX_SHADER);
    const fs = compile(frag, gl.FRAGMENT_SHADER);
    program = link(vs, fs);
  } catch (e) {
    errEl.style.display = "block";
    errEl.textContent = e.message;
    console.error(e);
  }

  if (program) {
    gl.useProgram(program);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
      -1,-1,   3,-1,   -1,3
    ]), gl.STATIC_DRAW);

    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

    const u_res         = gl.getUniformLocation(program, "u_res");
    const u_time        = gl.getUniformLocation(program, "u_time");
    const u_speed       = gl.getUniformLocation(program, "u_speed");
    const u_zoom        = gl.getUniformLocation(program, "u_zoom");
    const u_offset      = gl.getUniformLocation(program, "u_offset");
    const u_color       = gl.getUniformLocation(program, "u_color");
    const u_greenscreen = gl.getUniformLocation(program, "u_greenscreen");
    const u_bgcolor     = gl.getUniformLocation(program, "u_bgcolor");

    // Color presets configuration (5 tech & IT schemes + default)
    const PRESETS = {
      'Classic Solar': {
        colorSun: '#574c3d', // representing vec3(0.34, 0.30, 0.24)
        colorBg: '#0d0d0d'   // representing 0.05
      },
      'Cyberpunk Neon': {
        colorSun: '#ff007f',
        colorBg: '#050010'
      },
      'Matrix Terminal': {
        colorSun: '#00ff41',
        colorBg: '#000500'
      },
      'Quantum Ice': {
        colorSun: '#00f3ff',
        colorBg: '#020b14'
      },
      'Synthwave Sunrise': {
        colorSun: '#ff5e00',
        colorBg: '#0d001a'
      }
    };

    const params = {
      greenscreen: false,
      preset: 'Classic Solar',
      colorSun: PRESETS['Classic Solar'].colorSun,
      colorBg: PRESETS['Classic Solar'].colorBg,
      speed: 1.0,
      zoom: 1.0,
      offsetX: 0.0,
      offsetY: 0.0,
      autoAnimation: true,
      animationSpeed: 1.0,
      resetView: function() {
        manualZoom = 1.0;
        manualOffset.x = 0.0;
        manualOffset.y = 0.0;
        params.zoom = 1.0;
        params.offsetX = 0.0;
        params.offsetY = 0.0;
        updateGUI();
      }
    };

    let manualOffset = { x: 0.0, y: 0.0 };
    let manualZoom = 1.0;
    let isDragging = false;
    let prevPointer = { x: 0, y: 0 };

    const clamp = (val, min, max) => Math.min(Math.max(val, min), max);

    function hexToRgb(hex) {
      const bigint = parseInt(hex.slice(1), 16);
      const r = ((bigint >> 16) & 255) / 255;
      const g = ((bigint >> 8) & 255) / 255;
      const b = (bigint & 255) / 255;
      return [r, g, b];
    }

    // lil-gui setup
    const gui = new GUI({ title: 'सूर्य Controls' });

    gui.add(params, 'greenscreen').name('Green Screen');
    
    gui.add(params, 'preset', Object.keys(PRESETS)).name('Color Scheme').onChange((val) => {
      const scheme = PRESETS[val];
      if (scheme) {
        params.colorSun = scheme.colorSun;
        params.colorBg = scheme.colorBg;
        updateGUI();
      }
    });

    const colorsFolder = gui.addFolder('Custom Colors');
    colorsFolder.addColor(params, 'colorSun').name('Sun Color');
    colorsFolder.addColor(params, 'colorBg').name('Background Color');

    const transformFolder = gui.addFolder('Position & Zoom');
    transformFolder.add(params, 'zoom', 0.1, 10.0, 0.01).name('Zoom').onChange(v => {
      manualZoom = v;
    });
    transformFolder.add(params, 'offsetX', -5.0, 5.0, 0.01).name('Offset X').onChange(v => {
      manualOffset.x = v;
    });
    transformFolder.add(params, 'offsetY', -5.0, 5.0, 0.01).name('Offset Y').onChange(v => {
      manualOffset.y = v;
    });
    transformFolder.add(params, 'resetView').name('Reset View');

    const animFolder = gui.addFolder('Animation');
    animFolder.add(params, 'autoAnimation').name('Auto Drift');
    animFolder.add(params, 'animationSpeed', 0.1, 3.0, 0.1).name('Drift Speed');

    const speedCtrl = gui.add(params, 'speed', 0.0, 4.0, 0.01).name('Speed').onChange(v => {
      speedEl.value = v;
    });

    // Synchronize HTML range slider and GUI speed
    speedEl.addEventListener('input', (e) => {
      params.speed = parseFloat(e.target.value);
      speedCtrl.updateDisplay();
    });

    function updateGUI() {
      gui.controllers.forEach(c => c.updateDisplay());
      gui.folders.forEach(f => f.controllers.forEach(c => c.updateDisplay()));
    }

    // Drag-pan and Zoom handlers on canvas
    function onPointerDown(e) {
      if (e.target.closest('.lil-gui') || e.target.closest('#ui')) return;
      isDragging = true;
      prevPointer.x = e.clientX;
      prevPointer.y = e.clientY;
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      const dx = e.clientX - prevPointer.x;
      const dy = e.clientY - prevPointer.y;
      
      const scale = (2.0 / window.innerHeight) / manualZoom;
      manualOffset.x += dx * scale;
      manualOffset.y -= dy * scale; // invert Y since GLSL viewport starts at bottom
      
      params.offsetX = manualOffset.x;
      params.offsetY = manualOffset.y;
      updateGUI();
      
      prevPointer.x = e.clientX;
      prevPointer.y = e.clientY;
    }

    function onPointerUp() {
      isDragging = false;
    }

    function onWheel(e) {
      if (e.target.closest('.lil-gui') || e.target.closest('#ui')) return;
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.08 : 0.92;
      manualZoom = clamp(manualZoom * factor, 0.1, 10.0);
      params.zoom = manualZoom;
      updateGUI();
    }

    window.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('wheel', onWheel, { passive: false });

    // Hide/Show GUI with 'H' key
    let uiVisible = true;
    function toggleUI() {
      uiVisible = !uiVisible;
      const uiEl = document.getElementById("ui");
      if (uiEl) {
        uiEl.style.display = uiVisible ? "block" : "none";
      }
      if (uiVisible) {
        gui.show();
      } else {
        gui.hide();
      }
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'h' || e.key === 'H') {
        toggleUI();
      }
    });

    let start = performance.now();

    function draw() {
      const now = performance.now();
      const t = (now - start) * 0.001;

      gl.uniform2f(u_res, canvas.width, canvas.height);
      gl.uniform1f(u_time, t);
      gl.uniform1f(u_speed, params.speed);

      // Auto infinite drift animation if enabled
      let currentZoom = manualZoom;
      let currentOffsetX = manualOffset.x;
      let currentOffsetY = manualOffset.y;
      
      if (params.autoAnimation) {
        const driftSpeed = params.animationSpeed * 0.5;
        currentOffsetX = manualOffset.x + Math.sin(t * driftSpeed) * 0.3;
        currentOffsetY = manualOffset.y + Math.cos(t * driftSpeed * 0.8) * 0.2;
        currentZoom = manualZoom * (1.0 + Math.sin(t * driftSpeed * 0.6) * 0.12);
      }

      gl.uniform1f(u_zoom, currentZoom);
      gl.uniform2f(u_offset, currentOffsetX, currentOffsetY);

      const rgbColor = hexToRgb(params.colorSun);
      gl.uniform3f(u_color, rgbColor[0], rgbColor[1], rgbColor[2]);

      gl.uniform1i(u_greenscreen, params.greenscreen ? 1 : 0);

      const rgbBg = hexToRgb(params.colorBg);
      gl.uniform3f(u_bgcolor, rgbBg[0], rgbBg[1], rgbBg[2]);

      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(draw);
    }

    draw();
  }
</script>
</body>
</html>
