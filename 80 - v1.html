<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TACTICAL HOLOGRAPHIC COMMAND LAYER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --hud-color: #00f0ff;
      --hud-bg: rgba(0, 10, 20, 0.65);
      --hud-glow: rgba(0, 240, 255, 0.3);
    }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      font-family: 'Share Tech Mono', monospace;
      user-select: none;
    }
    #webgl {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
    }
    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.19, 1, 0.22, 1);
    }
    #ui-container.hidden {
      opacity: 0;
    }
    .hud-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: var(--hud-bg);
      border: 1px solid var(--hud-glow);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.1), inset 0 0 15px rgba(0, 240, 255, 0.05);
      border-radius: 4px;
      padding: 15px 20px;
      min-width: 260px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--hud-color);
      transition: border-color 0.3s ease, color 0.3s ease;
    }
    .hud-header {
      border-bottom: 1px solid var(--hud-glow);
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .hud-title {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 5px var(--hud-glow);
    }
    .hud-subtitle {
      font-size: 9px;
      opacity: 0.7;
      letter-spacing: 1px;
      margin-top: 2px;
    }
    .hud-data-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hud-item {
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.5px;
    }
    .hud-item .label {
      opacity: 0.6;
    }
    .hud-item .value {
      color: #ffffff;
      text-shadow: 0 0 5px var(--hud-color);
      font-weight: bold;
    }
    .hud-footer {
      border-top: 1px solid var(--hud-glow);
      padding-top: 8px;
      margin-top: 12px;
    }
    /* Let lil-gui have clickable pointer-events */
    .lil-gui {
      pointer-events: auto;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.148.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.148.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="ui-container">
    <div id="hud-overlay" class="hud-panel">
      <div class="hud-header">
        <div class="hud-title">TACTICAL COMMAND LAYER</div>
        <div class="hud-subtitle">RECONNAISSANCE UNIT ACTIVE</div>
      </div>
      <div class="hud-data-group">
        <div class="hud-item">
          <span class="label">DRONE ALTITUDE:</span>
          <span class="value" id="hud-drone-alt">0.00 M</span>
        </div>
        <div class="hud-item">
          <span class="label">COORDINATES:</span>
          <span class="value" id="hud-drone-coords">0.0000° N / 0.0000° E</span>
        </div>
        <div class="hud-item">
          <span class="label">SCANNING RANGE:</span>
          <span class="value" id="hud-scan-range">0.00 M</span>
        </div>
        <div class="hud-item">
          <span class="label">VECTOR STATUS:</span>
          <span class="value" id="hud-vector-status">NAVIGATING</span>
        </div>
        <div class="hud-item">
          <span class="label">ACTIVE THEME:</span>
          <span class="value" id="hud-theme-name">VECTOR CYAN</span>
        </div>
      </div>
      <div class="hud-footer">
        <div class="hud-item">
          <span class="label">SYSTEM RUNTIME:</span>
          <span class="value" id="hud-uptime">00:00:00</span>
        </div>
      </div>
    </div>
  </div>

  <canvas id="webgl"></canvas>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // --- Core Variables ---
    let scene, camera, renderer, composer, controls, gui;
    let terrainPoints, terrainMesh, gridHelper, drone, radarCone, dronePathLine;
    let clock = new THREE.Clock();

    // --- Color Schemes ---
    const colorSchemes = {
      'Vector Cyan': {
        name: 'Vector Cyan',
        primary: '#00f0ff',
        secondary: '#0055ff',
        drone: '#ffaa00',
        grid: '#001a26',
        fog: '#000511',
        bloomStrength: 0.8
      },
      'Matrix Core': {
        name: 'Matrix Core',
        primary: '#00ff66',
        secondary: '#004411',
        drone: '#ffdd00',
        grid: '#001105',
        fog: '#000802',
        bloomStrength: 0.7
      },
      'Quantum Amber': {
        name: 'Quantum Amber',
        primary: '#ff9900',
        secondary: '#883300',
        drone: '#00ccff',
        grid: '#1a0f00',
        fog: '#080400',
        bloomStrength: 0.75
      },
      'Crimson Protocol': {
        name: 'Crimson Protocol',
        primary: '#ff0055',
        secondary: '#550011',
        drone: '#00ffff',
        grid: '#1a0005',
        fog: '#0a0002',
        bloomStrength: 0.9
      },
      'Nebula Dusk': {
        name: 'Nebula Dusk',
        primary: '#d400ff',
        secondary: '#3a0066',
        drone: '#55ff00',
        grid: '#0b001a',
        fog: '#03000a',
        bloomStrength: 0.8
      }
    };

    let activeScheme = colorSchemes['Vector Cyan'];

    // --- GUI Config Parameters ---
    const params = {
      theme: 'Vector Cyan',
      greenScreen: false,
      autoRotate: true,
      autoRotateSpeed: 0.4,
      particleSize: 2.0,
      radarRadius: 24.0,
      radarSpeed: 1.5,
      scanRippleSpeed: 2.5,
      altitudeOffset: 20.0,
      // Post Processing Settings
      bloomStrength: 0.8,
      bloomThreshold: 0.35,
      bloomRadius: 0.65,
      exposure: 1.0,
      pointsOpacity: 0.45,
      meshOpacity: 0.22
    };

    // --- Shared Terrain Custom Shaders (GLSL Noise) ---
    const terrainVertexShader = `
      uniform float uTime;
      uniform float uRippleSpeed;
      varying float vElevation;
      varying vec3 vWorldPosition;
      varying vec2 vUv;

      // Hash function
      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
      }

      // 2D Value Noise
      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(hash(i + vec2(0.0, 0.0)), hash(i + vec2(1.0, 0.0)), u.x),
                   mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x), u.y);
      }

      // Fractal Brownian Motion (4 octaves)
      float fbm(vec2 p) {
        float v = 0.0;
        float a = 0.5;
        vec2 shift = vec2(100.0);
        mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
        for (int i = 0; i < 4; ++i) {
          v += a * noise(p);
          p = rot * p * 2.0 + shift;
          a *= 0.5;
        }
        return v;
      }

      void main() {
        vUv = uv;
        vec3 pos = position;

        // Radial mask to flatten grid boundaries
        float dist = length(pos.xy) / 80.0;
        float mask = smoothstep(1.0, 0.35, dist);

        // Generate mountainous landscape via fbm
        float elevation = fbm(pos.xy * 0.035) * 28.0 * mask;

        // Sonar scanning waves undulating from the center
        float pulse = sin(length(pos.xy) * 0.12 - uTime * uRippleSpeed) * 1.3 * mask;
        elevation += pulse;

        // Apply displaced height along local Z axis
        pos.z = elevation;

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_Position = projectionMatrix * mvPosition;

        vElevation = elevation;
        vWorldPosition = (modelMatrix * vec4(pos, 1.0)).xyz;
      }
    `;

    const terrainPointsVertexShader = `
      uniform float uTime;
      uniform float uRippleSpeed;
      uniform float uPointSize;
      varying float vElevation;
      varying vec3 vWorldPosition;
      varying vec2 vUv;

      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(hash(i + vec2(0.0, 0.0)), hash(i + vec2(1.0, 0.0)), u.x),
                   mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x), u.y);
      }

      float fbm(vec2 p) {
        float v = 0.0;
        float a = 0.5;
        vec2 shift = vec2(100.0);
        mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
        for (int i = 0; i < 4; ++i) {
          v += a * noise(p);
          p = rot * p * 2.0 + shift;
          a *= 0.5;
        }
        return v;
      }

      void main() {
        vUv = uv;
        vec3 pos = position;

        float dist = length(pos.xy) / 80.0;
        float mask = smoothstep(1.0, 0.35, dist);

        float elevation = fbm(pos.xy * 0.035) * 28.0 * mask;
        float pulse = sin(length(pos.xy) * 0.12 - uTime * uRippleSpeed) * 1.3 * mask;
        elevation += pulse;

        pos.z = elevation;

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_Position = projectionMatrix * mvPosition;

        vElevation = elevation;
        vWorldPosition = (modelMatrix * vec4(pos, 1.0)).xyz;

        // Attenuate point size by distance to camera and height displacement
        gl_PointSize = (uPointSize * (1.0 + elevation / 22.0)) * (300.0 / -mvPosition.z);
      }
    `;

    const pointsFragmentShader = `
      uniform vec3 uColor;
      uniform float uOpacity;
      uniform vec3 uDronePos;
      uniform float uRadarRadius;
      uniform vec3 uRadarColor;
      uniform float uTime;
      uniform float uRadarSpeed;

      varying float vElevation;
      varying vec3 vWorldPosition;

      void main() {
        // Draw circular dots instead of square points
        float r = length(gl_PointCoord - vec2(0.5));
        if (r > 0.5) discard;
        float alpha = smoothstep(0.5, 0.1, r);

        vec3 finalColor = uColor;
        
        // Dynamic color highlight for mountains peaks
        if (vElevation > 15.0) {
          finalColor = mix(uColor, vec3(1.0), (vElevation - 15.0) / 13.0);
        }

        // Radar sweep projection intersecting with points
        float distToDrone = distance(vWorldPosition.xz, uDronePos.xz);
        if (distToDrone < uRadarRadius) {
          float radarScan = fract(distToDrone * 0.08 - uTime * uRadarSpeed);
          float ring = smoothstep(0.92, 1.0, 1.0 - abs(radarScan - 0.9)) * 0.85;
          float mask = smoothstep(uRadarRadius, uRadarRadius * 0.5, distToDrone);
          finalColor = mix(finalColor, uRadarColor, ring * mask);
          alpha += ring * mask * 0.6;
        }

        gl_FragColor = vec4(finalColor, alpha * uOpacity);
      }
    `;

    const contourFragmentShader = `
      uniform vec3 uTerrainColorPrimary;
      uniform vec3 uTerrainColorSecondary;
      uniform float uOpacity;
      uniform vec3 uDronePos;
      uniform float uRadarRadius;
      uniform vec3 uRadarColor;
      uniform float uTime;
      uniform float uRadarSpeed;

      varying float vElevation;
      varying vec3 vWorldPosition;
      varying vec2 vUv;

      void main() {
        // Render terrain grid lines based on UV coordinate density
        float gridDensity = 40.0;
        float gridX = abs(fract(vUv.x * gridDensity - 0.5) - 0.5) / (gridDensity * 0.015);
        float gridY = abs(fract(vUv.y * gridDensity - 0.5) - 0.5) / (gridDensity * 0.015);
        float gridLine = 1.0 - smoothstep(0.0, 1.0, min(gridX, gridY));

        // Topographic contour lines computed dynamically based on elevation
        float contourLineVal = abs(fract(vElevation / 4.0 - 0.5) - 0.5) / 0.07;
        float contourLine = 1.0 - smoothstep(0.0, 1.0, contourLineVal);

        // Mix grids and contours
        vec3 color = uTerrainColorSecondary;
        float alpha = gridLine * 0.18;

        if (contourLine > 0.0) {
          color = mix(color, uTerrainColorPrimary, contourLine);
          alpha = max(alpha, contourLine * 0.75);
        }

        // Concentric radar sweep projection
        float distToDrone = distance(vWorldPosition.xz, uDronePos.xz);
        if (distToDrone < uRadarRadius) {
          float radarScan = fract(distToDrone * 0.08 - uTime * uRadarSpeed);
          float ring = smoothstep(0.92, 1.0, 1.0 - abs(radarScan - 0.9));
          float disk = 0.06 * (1.0 - distToDrone / uRadarRadius);
          float staticRings = step(0.96, fract(distToDrone * 0.18 - uTime * 0.5)) * 0.22;
          
          float mask = smoothstep(uRadarRadius, uRadarRadius * 0.5, distToDrone);
          float radarIntensity = max(max(ring, staticRings), disk) * mask;

          color = mix(color, uRadarColor, radarIntensity);
          alpha = max(alpha, radarIntensity * 0.85);
        }

        if (alpha < 0.05) discard;

        gl_FragColor = vec4(color, alpha * uOpacity);
      }
    `;

    // --- Math functions in JS for height calculations ---
    function hash2D(x, z) {
      let h = Math.sin(x * 12.9898 + z * 78.233) * 43758.5453123;
      return h - Math.floor(h);
    }

    function noise2D(x, z) {
      let ix = Math.floor(x);
      let iz = Math.floor(z);
      let fx = x - ix;
      let fz = z - iz;
      let ux = fx * fx * (3.0 - 2.0 * fx);
      let uz = fz * fz * (3.0 - 2.0 * fz);
      let a = hash2D(ix, iz);
      let b = hash2D(ix + 1, iz);
      let c = hash2D(ix, iz + 1);
      let d = hash2D(ix + 1, iz + 1);
      return (1.0 - ux) * (1.0 - uz) * a +
             ux * (1.0 - uz) * b +
             (1.0 - ux) * uz * c +
             ux * uz * d;
    }

    function fbmJS(x, z) {
      let v = 0.0;
      let a = 0.5;
      let tx = x;
      let tz = z;
      let c = Math.cos(0.5);
      let s = Math.sin(0.5);
      for (let i = 0; i < 4; i++) {
        v += a * noise2D(tx, tz);
        let nx = (c * tx + s * tz) * 2.0 + 100.0;
        let nz = (-s * tx + c * tz) * 2.0 + 100.0;
        tx = nx;
        tz = nz;
        a *= 0.5;
      }
      return v;
    }

    function getTerrainHeight(x, z) {
      let geomX = x;
      let geomY = -z;
      let dist = Math.sqrt(geomX * geomX + geomY * geomY) / 80.0;
      let mask = 1.0 - Math.min(Math.max((dist - 0.35) / 0.65, 0.0), 1.0);
      mask = mask * mask * (3.0 - 2.0 * mask);

      let elevation = fbmJS(geomX * 0.035, geomY * 0.035) * 28.0 * mask;
      return elevation;
    }

    // --- Init Scene ---
    function init() {
      // Renderer
      renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('webgl'),
        antialias: true,
        powerPreference: 'high-performance'
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(activeScheme.fog, 1);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = params.exposure;

      // Scene
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(activeScheme.fog, 0.007);

      // Camera
      camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(75, 55, 75);

      // Controls
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.03;
      controls.maxPolarAngle = Math.PI / 2 - 0.04;
      controls.minDistance = 25;
      controls.maxDistance = 220;
      controls.autoRotate = params.autoRotate;
      controls.autoRotateSpeed = params.autoRotateSpeed;

      // --- Post-Processing Bloom Pipeline ---
      const renderPass = new RenderPass(scene, camera);
      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        params.bloomStrength,
        params.bloomRadius,
        params.bloomThreshold
      );
      bloomPass.threshold = params.bloomThreshold;
      bloomPass.strength = activeScheme.bloomStrength;
      bloomPass.radius = params.bloomRadius;

      composer = new EffectComposer(renderer);
      composer.addPass(renderPass);
      composer.addPass(bloomPass);

      // --- Scene Objects ---

      // 1. Base Grid (Floor)
      gridHelper = new THREE.GridHelper(200, 32, activeScheme.secondary, activeScheme.grid);
      gridHelper.position.y = -6;
      scene.add(gridHelper);

      // 2. Holographic Terrain (Points and Mesh layers)
      const terrainGeo = new THREE.PlaneGeometry(160, 160, 240, 240);

      // Terrain Materials
      const pointsMat = new THREE.ShaderMaterial({
        vertexShader: terrainPointsVertexShader,
        fragmentShader: pointsFragmentShader,
        uniforms: {
          uTime: { value: 0 },
          uRippleSpeed: { value: params.scanRippleSpeed },
          uPointSize: { value: params.particleSize },
          uColor: { value: new THREE.Color(activeScheme.primary) },
          uOpacity: { value: params.pointsOpacity },
          uDronePos: { value: new THREE.Vector3() },
          uRadarRadius: { value: params.radarRadius },
          uRadarColor: { value: new THREE.Color(activeScheme.drone) },
          uRadarSpeed: { value: params.radarSpeed }
        },
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      const meshMat = new THREE.ShaderMaterial({
        vertexShader: terrainVertexShader,
        fragmentShader: contourFragmentShader,
        uniforms: {
          uTime: { value: 0 },
          uRippleSpeed: { value: params.scanRippleSpeed },
          uTerrainColorPrimary: { value: new THREE.Color(activeScheme.primary) },
          uTerrainColorSecondary: { value: new THREE.Color(activeScheme.secondary) },
          uOpacity: { value: params.meshOpacity },
          uDronePos: { value: new THREE.Vector3() },
          uRadarRadius: { value: params.radarRadius },
          uRadarColor: { value: new THREE.Color(activeScheme.drone) },
          uRadarSpeed: { value: params.radarSpeed }
        },
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide
      });

      terrainPoints = new THREE.Points(terrainGeo, pointsMat);
      terrainPoints.rotation.x = -Math.PI / 2;
      scene.add(terrainPoints);

      terrainMesh = new THREE.Mesh(terrainGeo, meshMat);
      terrainMesh.rotation.x = -Math.PI / 2;
      scene.add(terrainMesh);

      // 3. Drone Spline Path
      const pathPoints = [
        new THREE.Vector3(50, 15, 50),
        new THREE.Vector3(15, 22, 55),
        new THREE.Vector3(-40, 18, 40),
        new THREE.Vector3(-55, 20, -20),
        new THREE.Vector3(-15, 25, -50),
        new THREE.Vector3(45, 21, -40)
      ];
      const curve = new THREE.CatmullRomCurve3(pathPoints, true);
      
      const splinePoints = curve.getPoints(120);
      const splineGeo = new THREE.BufferGeometry().setFromPoints(splinePoints);
      const splineMat = new THREE.LineDashedMaterial({
        color: new THREE.Color(activeScheme.drone),
        dashSize: 3,
        gapSize: 2
      });
      dronePathLine = new THREE.Line(splineGeo, splineMat);
      dronePathLine.computeLineDistances();
      scene.add(dronePathLine);

      // 4. Stylized Tactical Drone (Fixed-Wing Predator/Reaper UAV style)
      drone = new THREE.Group();
      
      const bodyMat = new THREE.MeshBasicMaterial({ color: 0x0c0e14, transparent: true, opacity: 0.85 });
      const frameMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(activeScheme.drone), wireframe: true });
      const glowMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(activeScheme.drone) });

      // Nose (Front dome)
      const noseGeo = new THREE.SphereGeometry(0.35, 12, 12);
      noseGeo.scale(1, 1, 1.4); // Elongate along Z
      const nose = new THREE.Mesh(noseGeo, bodyMat);
      const noseWire = new THREE.Mesh(noseGeo, frameMat);
      nose.position.set(0, 0.05, 1.8);
      noseWire.position.set(0, 0.05, 1.8);
      drone.add(nose);
      drone.add(noseWire);

      // Main fuselage cylinder
      const fuselageGeo = new THREE.CylinderGeometry(0.35, 0.35, 1.5, 12);
      fuselageGeo.rotateX(Math.PI / 2);
      const fuselage = new THREE.Mesh(fuselageGeo, bodyMat);
      const fuselageWire = new THREE.Mesh(fuselageGeo, frameMat);
      fuselage.position.set(0, 0.05, 0.8);
      fuselageWire.position.set(0, 0.05, 0.8);
      drone.add(fuselage);
      drone.add(fuselageWire);

      // Tapered Tail boom
      const tailBoomGeo = new THREE.CylinderGeometry(0.35, 0.1, 2.8, 12);
      tailBoomGeo.rotateX(Math.PI / 2);
      const tailBoom = new THREE.Mesh(tailBoomGeo, bodyMat);
      const tailBoomWire = new THREE.Mesh(tailBoomGeo, frameMat);
      tailBoom.position.set(0, 0.05, -1.35);
      tailBoomWire.position.set(0, 0.05, -1.35);
      drone.add(tailBoom);
      drone.add(tailBoomWire);

      // Glider Wings (High Aspect Ratio)
      const wingsGeo = new THREE.BoxGeometry(14.0, 0.05, 0.65);
      const wings = new THREE.Mesh(wingsGeo, bodyMat);
      const wingsWire = new THREE.Mesh(wingsGeo, frameMat);
      wings.position.set(0, 0.1, 0.9);
      wingsWire.position.set(0, 0.1, 0.9);
      drone.add(wings);
      drone.add(wingsWire);

      // Tail fins (V-tail: Reaper style angled 40 degrees)
      const tailFinGeo = new THREE.BoxGeometry(0.04, 1.4, 0.4);
      
      const leftFin = new THREE.Mesh(tailFinGeo, bodyMat);
      const leftFinWire = new THREE.Mesh(tailFinGeo, frameMat);
      leftFin.position.set(0.4, 0.6, -2.5);
      leftFin.rotation.z = -Math.PI / 5;
      leftFin.rotation.y = -0.1;
      leftFinWire.position.copy(leftFin.position);
      leftFinWire.rotation.copy(leftFin.rotation);
      drone.add(leftFin);
      drone.add(leftFinWire);

      const rightFin = new THREE.Mesh(tailFinGeo, bodyMat);
      const rightFinWire = new THREE.Mesh(tailFinGeo, frameMat);
      rightFin.position.set(-0.4, 0.6, -2.5);
      rightFin.rotation.z = Math.PI / 5;
      rightFin.rotation.y = 0.1;
      rightFinWire.position.copy(rightFin.position);
      rightFinWire.rotation.copy(rightFin.rotation);
      drone.add(rightFin);
      drone.add(rightFinWire);

      // Ventral fin (underneath)
      const ventralFinGeo = new THREE.BoxGeometry(0.04, 0.5, 0.35);
      const ventralFin = new THREE.Mesh(ventralFinGeo, bodyMat);
      const ventralFinWire = new THREE.Mesh(ventralFinGeo, frameMat);
      ventralFin.position.set(0, -0.4, -2.6);
      ventralFinWire.position.copy(ventralFin.position);
      ventralFinWire.rotation.copy(ventralFin.rotation);
      drone.add(ventralFin);
      drone.add(ventralFinWire);

      // Pusher Propeller Group
      const propellerGroup = new THREE.Group();
      propellerGroup.position.set(0, 0.05, -2.75);

      const propHubGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.15, 8);
      propHubGeo.rotateX(Math.PI / 2);
      const propHub = new THREE.Mesh(propHubGeo, glowMat);
      propellerGroup.add(propHub);

      const propBladeGeo = new THREE.BoxGeometry(0.03, 1.4, 0.08);
      const propBlade = new THREE.Mesh(propBladeGeo, glowMat);
      propellerGroup.add(propBlade);

      drone.add(propellerGroup);
      drone.userData.propeller = propellerGroup;

      scene.add(drone);
      drone.userData.curve = curve;

      // 5. Radar Projection Cone
      const coneGeo = new THREE.CylinderGeometry(0.1, 15, 1, 32, 1, true);
      coneGeo.translate(0, -0.5, 0);
      
      const coneMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(activeScheme.drone),
        transparent: true,
        opacity: 0.16,
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      radarCone = new THREE.Mesh(coneGeo, coneMat);
      scene.add(radarCone);

      // Initialize GUI & Events
      setupGUI();
      window.addEventListener('resize', onWindowResize);
      window.addEventListener('keydown', onKeyDown);

      applyThemeStyles(activeScheme);
    }

    // --- Dynamic Theme Styles for HTML HUD ---
    function applyThemeStyles(scheme) {
      document.documentElement.style.setProperty('--hud-color', scheme.primary);
      document.documentElement.style.setProperty('--hud-glow', hexToRgbA(scheme.primary, 0.35));
      document.getElementById('hud-theme-name').innerText = scheme.name.toUpperCase();
    }

    function hexToRgbA(hex, alpha) {
      let c;
      if (/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)) {
        c = hex.substring(1).split('');
        if (c.length == 3) {
          c = [c[0], c[0], c[1], c[1], c[2], c[2]];
        }
        c = '0x' + c.join('');
        return 'rgba(' + [(c >> 16) & 255, (c >> 8) & 255, c & 255].join(',') + ',' + alpha + ')';
      }
      return 'rgba(0,240,255,' + alpha + ')';
    }

    // --- GUI Setup ---
    function setupGUI() {
      gui = new GUI({ title: 'CONTROL PANEL' });

      // Theme selector
      gui.add(params, 'theme', Object.keys(colorSchemes)).name('Color Scheme').onChange(value => {
        activeScheme = colorSchemes[value];
        params.bloomStrength = activeScheme.bloomStrength;
        
        // Update shaders colors
        terrainPoints.material.uniforms.uColor.value.set(activeScheme.primary);
        terrainPoints.material.uniforms.uRadarColor.value.set(activeScheme.drone);
        
        terrainMesh.material.uniforms.uTerrainColorPrimary.value.set(activeScheme.primary);
        terrainMesh.material.uniforms.uTerrainColorSecondary.value.set(activeScheme.secondary);
        terrainMesh.material.uniforms.uRadarColor.value.set(activeScheme.drone);

        // Update grid and lines colors
        scene.remove(gridHelper);
        gridHelper = new THREE.GridHelper(200, 32, activeScheme.secondary, activeScheme.grid);
        gridHelper.position.y = -6;
        scene.add(gridHelper);

        dronePathLine.material.color.set(activeScheme.drone);
        
        // Update drone mesh colors
        drone.traverse(child => {
          if (child instanceof THREE.Mesh) {
            if (child.material.wireframe) {
              child.material.color.set(activeScheme.drone);
            } else if (child.material.color.getHex() !== 0x0c0e14) {
              child.material.color.set(activeScheme.drone);
            }
          }
        });

        // Update radar cone
        radarCone.material.color.set(activeScheme.drone);

        // Update environments if not in greenscreen
        if (!params.greenScreen) {
          scene.fog.color.set(activeScheme.fog);
          renderer.setClearColor(activeScheme.fog, 1);
          composer.passes[1].strength = activeScheme.bloomStrength;
        }

        applyThemeStyles(activeScheme);
      });

      // Green screen Toggle
      gui.add(params, 'greenScreen').name('Green Screen (Chroma)').onChange(value => {
        const bloomPass = composer.passes[1];
        if (value) {
          renderer.setClearColor(0x00ff00, 1.0);
          scene.background = new THREE.Color(0x00ff00);
          scene.fog = null;
          bloomPass.strength = 0;
        } else {
          scene.background = null;
          renderer.setClearColor(activeScheme.fog, 1.0);
          scene.fog = new THREE.FogExp2(activeScheme.fog, 0.007);
          bloomPass.strength = params.bloomStrength;
        }
      });

      // Camera / Controls
      const cameraFolder = gui.addFolder('Camera Controls');
      cameraFolder.add(params, 'autoRotate').name('Auto-Orbit').onChange(val => {
        controls.autoRotate = val;
      });
      cameraFolder.add(params, 'autoRotateSpeed', -4.0, 4.0).name('Orbit Speed').onChange(val => {
        controls.autoRotateSpeed = val;
      });

      // Terrain parameters
      const terrainFolder = gui.addFolder('Terrain Details');
      terrainFolder.add(params, 'particleSize', 0.5, 6.0).step(0.1).name('Node Size').onChange(val => {
        terrainPoints.material.uniforms.uPointSize.value = val;
      });
      terrainFolder.add(params, 'scanRippleSpeed', 0.0, 5.0).name('Wave Speed').onChange(val => {
        terrainPoints.material.uniforms.uRippleSpeed.value = val;
        terrainMesh.material.uniforms.uRippleSpeed.value = val;
      });

      // Tactical Recon Params
      const reconFolder = gui.addFolder('Recon Radar');
      reconFolder.add(params, 'radarRadius', 5.0, 50.0).name('Scan Radius').onChange(val => {
        terrainPoints.material.uniforms.uRadarRadius.value = val;
        terrainMesh.material.uniforms.uRadarRadius.value = val;
      });
      reconFolder.add(params, 'radarSpeed', 0.1, 4.0).name('Sweep Speed').onChange(val => {
        terrainPoints.material.uniforms.uRadarSpeed.value = val;
        terrainMesh.material.uniforms.uRadarSpeed.value = val;
      });
      reconFolder.add(params, 'altitudeOffset', 5.0, 40.0).name('Flight Altitude');

      // Post-Processing Settings
      const postFolder = gui.addFolder('Post-Processing');
      postFolder.add(params, 'bloomStrength', 0.0, 3.0).name('Bloom Strength').listen().onChange(val => {
        if (!params.greenScreen) composer.passes[1].strength = val;
      });
      postFolder.add(params, 'bloomThreshold', 0.0, 1.0).name('Bloom Threshold').onChange(val => {
        composer.passes[1].threshold = val;
      });
      postFolder.add(params, 'bloomRadius', 0.0, 2.0).name('Bloom Radius').onChange(val => {
        composer.passes[1].radius = val;
      });
      postFolder.add(params, 'exposure', 0.1, 2.5).name('Exposure').onChange(val => {
        renderer.toneMappingExposure = val;
      });
      postFolder.add(params, 'pointsOpacity', 0.0, 1.0).name('Points Opacity').onChange(val => {
        terrainPoints.material.uniforms.uOpacity.value = val;
      });
      postFolder.add(params, 'meshOpacity', 0.0, 1.0).name('Mesh Opacity').onChange(val => {
        terrainMesh.material.uniforms.uOpacity.value = val;
      });

      gui.open();
    }

    // --- Key Events (Hide/Show UI) ---
    function onKeyDown(e) {
      if (e.key === 'h' || e.key === 'H') {
        const uiContainer = document.getElementById('ui-container');
        uiContainer.classList.toggle('hidden');
        if (gui._hidden) {
          gui.show();
        } else {
          gui.hide();
        }
      }
    }

    // --- Resize Event ---
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    }

    // --- Animation Loop ---
    function animate() {
      requestAnimationFrame(animate);

      const time = clock.getElapsedTime();

      // 1. Move Tactical Drone along Spline curve
      const pathProgress = (time * 0.02) % 1.0;
      const droneCurve = drone.userData.curve;
      const targetPos = droneCurve.getPointAt(pathProgress);

      const actualHeight = getTerrainHeight(targetPos.x, targetPos.z);
      targetPos.y = actualHeight + params.altitudeOffset;

      const tangent = droneCurve.getTangentAt(pathProgress).normalize();
      const lookTarget = targetPos.clone().add(tangent);

      drone.position.lerp(targetPos, 0.05);
      
      const angleRot = Math.sin(time * 1.5) * 0.08;
      drone.lookAt(lookTarget);
      drone.rotateZ(angleRot);

      // Spin the propeller
      if (drone.userData.propeller) {
        drone.userData.propeller.rotation.z += 0.6;
      }

      // 2. Project Radar Cone down to terrain
      const droneWorldPos = drone.position;
      const floorTerrainHeight = getTerrainHeight(droneWorldPos.x, droneWorldPos.z);
      const radarDepth = droneWorldPos.y - floorTerrainHeight;

      radarCone.position.copy(droneWorldPos);
      radarCone.scale.set(params.radarRadius / 15.0, radarDepth, params.radarRadius / 15.0);

      // Pass updated drone positions to terrain custom shaders
      terrainPoints.material.uniforms.uDronePos.value.copy(droneWorldPos);
      terrainMesh.material.uniforms.uDronePos.value.copy(droneWorldPos);

      // 3. Update Shaders Time Uniforms
      terrainPoints.material.uniforms.uTime.value = time;
      terrainMesh.material.uniforms.uTime.value = time;

      // 4. Update Orbit Controls
      controls.update();

      // 5. Render Scene
      composer.render();

      // 6. Update HUD telemetry
      updateHUD(time, droneWorldPos);
    }

    // --- HUD Telemetry Update helper ---
    let lastHudUpdate = 0;
    function updateHUD(time, dronePos) {
      if (time - lastHudUpdate < 0.15) return;
      lastHudUpdate = time;

      const altMeters = (dronePos.y * 3.28084).toFixed(1); 
      
      const lat = (35.1042 + dronePos.z * 0.00015).toFixed(5);
      const lon = (-116.4820 + dronePos.x * 0.00015).toFixed(5);
      
      const scanRadiusMeters = (params.radarRadius * 4.5).toFixed(0);
      
      const minutes = Math.floor(time / 60);
      const seconds = Math.floor(time % 60);
      const ms = Math.floor((time % 1) * 100);
      const timeStr = 
        (minutes < 10 ? '0' : '') + minutes + ':' +
        (seconds < 10 ? '0' : '') + seconds + ':' +
        (ms < 10 ? '0' : '') + ms;

      document.getElementById('hud-drone-alt').innerText = altMeters + ' M';
      document.getElementById('hud-drone-coords').innerText = lat + '° N / ' + lon + '° E';
      document.getElementById('hud-scan-range').innerText = scanRadiusMeters + ' M';
      document.getElementById('hud-uptime').innerText = timeStr;

      const phase = Math.floor(time * 0.5) % 4;
      const statusLabel = document.getElementById('hud-vector-status');
      if (phase === 0) {
        statusLabel.innerText = 'CALCULATING';
        statusLabel.style.color = '#ff9900';
      } else if (phase === 1) {
        statusLabel.innerText = 'LOCKED';
        statusLabel.style.color = '#00ff66';
      } else if (phase === 2) {
        statusLabel.innerText = 'NAVIGATING';
        statusLabel.style.color = activeScheme.primary;
      } else {
        statusLabel.innerText = 'SCANNING';
        statusLabel.style.color = activeScheme.primary;
      }
    }

    init();
    animate();
  </script>
</body>
