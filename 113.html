<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Fluid Shader Plane</title>
  <style>
    @import url('https://fonts.googleapis.com/css?family=Poppins:400,900');

    body {
      overflow: hidden;
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: "Poppins", sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .world {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #FF4066;
      transition: background 0.3s ease;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="world"></div>

  <script type="x-shader/x-fragment" id="fragmentShader">
    precision highp float;

    uniform float uTime;
    uniform vec2 uMousePosition;
    uniform float uHue;
    uniform float uHueVariation;
    uniform float uDensity;
    uniform float uDisplacement;
    uniform float uGradient;
    
    varying vec2 vUv;

    float mod289(float x){return x - floor(x * (1.0 / 289.0)) * 289.0;}
    vec4 mod289(vec4 x){return x - floor(x * (1.0 / 289.0)) * 289.0;}
    vec4 perm(vec4 x){return mod289(((x * 34.0) + 1.0) * x);}

    float rand(vec2 co){
      return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453);
    }

    float hue2rgb(float f1, float f2, float hue) {
        if (hue < 0.0)
            hue += 1.0;
        else if (hue > 1.0)
            hue -= 1.0;
        float res;
        if ((6.0 * hue) < 1.0)
            res = f1 + (f2 - f1) * 6.0 * hue;
        else if ((2.0 * hue) < 1.0)
            res = f2;
        else if ((3.0 * hue) < 2.0)
            res = f1 + (f2 - f1) * ((2.0 / 3.0) - hue) * 6.0;
        else
            res = f1;
        return res;
    }

    vec3 hsl2rgb(vec3 hsl) {
        vec3 rgb;

        if (hsl.y == 0.0) {
            rgb = vec3(hsl.z); // Luminance
        } else {
            float f2;

            if (hsl.z < 0.5)
                f2 = hsl.z * (1.0 + hsl.y);
            else
                f2 = hsl.z + hsl.y - hsl.y * hsl.z;

            float f1 = 2.0 * hsl.z - f2;

            rgb.r = hue2rgb(f1, f2, hsl.x + (1.0/3.0));
            rgb.g = hue2rgb(f1, f2, hsl.x);
            rgb.b = hue2rgb(f1, f2, hsl.x - (1.0/3.0));
        }
        return rgb;
    }

    vec3 hsl2rgb(float h, float s, float l) {
        return hsl2rgb(vec3(h, s, l));
    }

    float noise(vec3 p){
        vec3 a = floor(p);
        vec3 d = p - a;
        d = d * d * (3.0 - 2.0 * d);

        vec4 b = a.xxyy + vec4(0.0, 1.0, 0.0, 1.0);
        vec4 k1 = perm(b.xyxy);
        vec4 k2 = perm(k1.xyxy + b.zzww);

        vec4 c = k2 + a.zzzz;
        vec4 k3 = perm(c);
        vec4 k4 = perm(c + 1.0);

        vec4 o1 = fract(k3 * (1.0 / 41.0));
        vec4 o2 = fract(k4 * (1.0 / 41.0));

        vec4 o3 = o2 * d.z + o1 * (1.0 - d.z);
        vec2 o4 = o3.yw * d.x + o3.xz * (1.0 - d.x);

        return o4.y * d.y + o4.x * (1.0 - d.y);
    }

    vec2 fade(vec2 t) {return t*t*t*(t*(t*6.0-15.0)+10.0);}

    float cnoise(vec2 P){
        vec4 Pi = floor(P.xyxy) + vec4(0.0, 0.0, 1.0, 1.0);
        vec4 Pf = fract(P.xyxy) - vec4(0.0, 0.0, 1.0, 1.0);
        Pi = mod(Pi, 289.0); // To avoid truncation effects in permutation
        vec4 ix = Pi.xzxz;
        vec4 iy = Pi.yyww;
        vec4 fx = Pf.xzxz;
        vec4 fy = Pf.yyww;
        vec4 i = perm(perm(ix) + iy);
        vec4 gx = 2.0 * fract(i * 0.0243902439) - 1.0; // 1/41 = 0.024...
        vec4 gy = abs(gx) - 0.5;
        vec4 tx = floor(gx + 0.5);
        gx = gx - tx;
        vec2 g00 = vec2(gx.x,gy.x);
        vec2 g10 = vec2(gx.y,gy.y);
        vec2 g01 = vec2(gx.z,gy.z);
        vec2 g11 = vec2(gx.w,gy.w);
        vec4 norm = 1.79284291400159 - 0.85373472095314 *
        vec4(dot(g00, g00), dot(g01, g01), dot(g10, g10), dot(g11, g11));
        g00 *= norm.x;
        g01 *= norm.y;
        g10 *= norm.z;
        g11 *= norm.w;
        float n00 = dot(g00, vec2(fx.x, fy.x));
        float n10 = dot(g10, vec2(fx.y, fy.y));
        float n01 = dot(g01, vec2(fx.z, fy.z));
        float n11 = dot(g11, vec2(fx.w, fy.w));
        vec2 fade_xy = fade(Pf.xy);
        vec2 n_x = mix(vec2(n00, n01), vec2(n10, n11), fade_xy.x);
        float n_xy = mix(n_x.x, n_x.y, fade_xy.y);
        return 2.3 * n_xy;
    }

    void main () {
      float mouseDistance = length(vUv - uMousePosition);
      float t = uTime * .005;
      float elevation =  vUv.y * uDensity * 30.0;
      
      float shadow = smoothstep(0.0, .3 + sin(t * 5.0 * 3.14) * .1 , mouseDistance);
      elevation += shadow * 5.0;
      
      float displacement = cnoise( vec2( t + vUv.y * 2.0, t + vUv.x * 3.0 )) * uDisplacement * 3.0 ;

      elevation += displacement * 4.0;
      elevation *= 2.0 + cnoise( vec2( t + vUv.y * 1.0, t + .5)) * 2.0 ;
      
      float light = .9 + fract(elevation) ;
      light *= .9 + (1.0 - (displacement * displacement)) * .1;
      elevation = floor(elevation);
    
      float hue =  uHue + shadow * .1 + cnoise( vec2( elevation * .10, .1 + t)) * uHueVariation;
      float saturation = .6;
      float brightness =  - (1.0 - shadow) * .1 + .5  - smoothstep( 0.0, .9,  cnoise( vec2( elevation * .5, .4 + t * 5.0)) ) * .1;

      vec3 hslCol = vec3( hue, saturation, brightness);
      vec3 col = hsl2rgb(hslCol) * vec3(light, 1.0, 1.0);
      
      gl_FragColor = vec4(col, 1.);
    }
  </script>  

  <script type="x-shader/x-vertex" id="vertexShader">  
    attribute vec3 position;
    attribute vec2 uv;

    uniform mat4 projectionMatrix;
    uniform mat4 modelViewMatrix;
    uniform mat3 normalMatrix;

    uniform float uTime;
    uniform vec2 uMousePosition;

    varying vec2 vUv;

    void main() {
      vUv = uv;
      vec4 pos = vec4(position, 1.0);
      gl_Position = projectionMatrix * modelViewMatrix * pos;
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // Settings Parameters
    const parameters = {
      speed: 0.2,
      hue: 0.5,
      hueVariation: 1.0,
      density: 0.5,
      displacement: 0.66,
      bgColor: '#FF4066',
      greenScreen: false,
      dpr: Math.min(window.devicePixelRatio, 2.0),
      colorPreset: 'Sunset Velvet',
      animationPreset: 'Slow Orbit'
    };

    const colorPresets = {
      "Sunset Velvet": {
        hue: 0.95,
        hueVariation: 0.15,
        density: 0.5,
        displacement: 0.66,
        bgColor: '#FF4066'
      },
      "Deep Ocean": {
        hue: 0.55,
        hueVariation: 0.18,
        density: 0.6,
        displacement: 0.5,
        bgColor: '#021128'
      },
      "Acid Lime": {
        hue: 0.22,
        hueVariation: 0.15,
        density: 0.45,
        displacement: 0.7,
        bgColor: '#0a1d00'
      },
      "Cosmic Orchid": {
        hue: 0.82,
        hueVariation: 0.22,
        density: 0.55,
        displacement: 0.6,
        bgColor: '#16021f'
      },
      "Solar Flare": {
        hue: 0.06,
        hueVariation: 0.12,
        density: 0.5,
        displacement: 0.8,
        bgColor: '#2a0a00'
      }
    };

    class World {
      constructor(width, height) {
        this.renderer = new THREE.WebGLRenderer({
          alpha: true,
          antialias: true,
          powerPreference: "high-performance"
        });
        this.renderer.setPixelRatio(parameters.dpr);
        this.renderer.setSize(width, height);
        
        this.container = document.querySelector(".world");
        this.container.appendChild(this.renderer.domElement);
        
        this.scene = new THREE.Scene();
        this.width = width;
        this.height = height;
        this.aspectRatio = width / height;
        
        this.camera = new THREE.PerspectiveCamera(50, this.aspectRatio, 0.1, 20000);
        this.camera.position.z = 200;
        
        // OrbitControls Configured for Pan/Zoom on Flat Plane
        this.controls = new OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableRotate = false;
        this.controls.enableZoom = true;
        this.controls.enablePan = true;
        this.controls.mouseButtons = {
          LEFT: THREE.MOUSE.PAN,
          MIDDLE: THREE.MOUSE.DOLLY,
          RIGHT: THREE.MOUSE.ROTATE
        };
        this.controls.touches = {
          ONE: THREE.TOUCH.PAN,
          TWO: THREE.TOUCH.DOLLY_PAN
        };
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.05;
        this.controls.screenSpacePanning = true;

        this.timer = 0;
        this.animTime = 0;
        this.mousePos = new THREE.Vector2(0.5, 0.5);
        this.targetMousePos = new THREE.Vector2(0.5, 0.5);

        // Raycasting for Shader Interaction
        this.raycaster = new THREE.Raycaster();
        this.mouse2D = new THREE.Vector2();

        this.createPlane();
        this.updateBackground();
      }

      createPlane() {
        this.material = new THREE.RawShaderMaterial({
          vertexShader: document.getElementById('vertexShader').textContent,
          fragmentShader: document.getElementById('fragmentShader').textContent,
          uniforms: { 
            uTime: { type: 'f', value: 0 },
            uHue: { type: 'f', value: parameters.hue },
            uHueVariation: { type: 'f', value: parameters.hueVariation },
            uGradient: { type: 'f', value: 0.3 },
            uDensity: { type: 'f', value: parameters.density },
            uDisplacement: { type: 'f', value: parameters.displacement },        
            uMousePosition: { type: 'v2', value: new THREE.Vector2(0.5, 0.5) }
          }
        });
        
        // Floating object card representation
        this.planeGeometry = new THREE.PlaneGeometry(240, 240, 1, 1);
        this.plane = new THREE.Mesh(this.planeGeometry, this.material);
        this.scene.add(this.plane);
      }
      
      updateMouse(e) {
        this.mouse2D.x = (e.clientX / window.innerWidth) * 2 - 1;
        this.mouse2D.y = -(e.clientY / window.innerHeight) * 2 + 1;
      }

      updateBackground() {
        if (parameters.greenScreen) {
          this.container.style.background = '#00ff00';
        } else {
          this.container.style.background = parameters.bgColor;
        }
      }

      updateParameters() {
        if (this.plane) {
          this.plane.material.uniforms.uHue.value = parameters.hue;
          this.plane.material.uniforms.uHueVariation.value = parameters.hueVariation;
          this.plane.material.uniforms.uDensity.value = parameters.density;
          this.plane.material.uniforms.uDisplacement.value = parameters.displacement;
        }
        this.updateBackground();
      }

      render() {
        // Shader time progression
        this.timer += parameters.speed;
        if (this.plane) {
          this.plane.material.uniforms.uTime.value = this.timer;
        }
        
        // Raycast logic to find intersection on plane
        this.raycaster.setFromCamera(this.mouse2D, this.camera);
        const intersects = this.raycaster.intersectObject(this.plane);
        if (intersects.length > 0) {
          const uv = intersects[0].uv;
          this.targetMousePos.copy(uv);
        }
        
        this.mousePos.x += (this.targetMousePos.x - this.mousePos.x) * 0.1;
        this.mousePos.y += (this.targetMousePos.y - this.mousePos.y) * 0.1;
        
        if (this.plane) {
          this.plane.material.uniforms.uMousePosition.value.copy(this.mousePos);
        }

        // Camera animation updates
        this.animTime += parameters.speed * 0.05;
        
        if (parameters.animationPreset === 'Slow Orbit') {
          this.controls.autoRotate = true;
          this.controls.autoRotateSpeed = parameters.speed * 4.0;
        } else {
          this.controls.autoRotate = false;
        }

        if (parameters.animationPreset === 'Breathing Zoom') {
          const baseRadius = 220;
          const offset = Math.sin(this.animTime * 0.4) * 60;
          const targetLen = baseRadius + offset;
          const toCam = new THREE.Vector3().subVectors(this.camera.position, this.controls.target);
          const len = toCam.length();
          if (len > 0) {
            toCam.setLength(THREE.MathUtils.lerp(len, targetLen, 0.03));
            this.camera.position.copy(this.controls.target).add(toCam);
          }
        } else if (parameters.animationPreset === 'Cinematic Pan') {
          const targetX = Math.sin(this.animTime * 0.5) * 50;
          const targetY = Math.cos(this.animTime * 0.3) * 25;
          this.controls.target.x = THREE.MathUtils.lerp(this.controls.target.x, targetX, 0.03);
          this.controls.target.y = THREE.MathUtils.lerp(this.controls.target.y, targetY, 0.03);
        } else if (parameters.animationPreset === 'Floating Drift') {
          const targetX = Math.sin(this.animTime * 0.3) * 45;
          const targetY = Math.cos(this.animTime * 0.4) * 20;
          const camY = Math.sin(this.animTime * 0.2) * 25;
          this.controls.target.x = THREE.MathUtils.lerp(this.controls.target.x, targetX, 0.03);
          this.controls.target.y = THREE.MathUtils.lerp(this.controls.target.y, targetY, 0.03);
          this.camera.position.y = THREE.MathUtils.lerp(this.camera.position.y, camY, 0.03);
        }

        this.controls.update();
        this.renderer.render(this.scene, this.camera);
      }

      loop() {
        this.render();
        requestAnimationFrame(this.loop.bind(this));
      }

      updateSize(w, h) {
        this.renderer.setSize(w, h);
        this.camera.aspect = w / h;
        this.camera.updateProjectionMatrix();
      }
    }

    let world;

    function handleWindowResize() {
      if (world) {
        world.updateSize(window.innerWidth, window.innerHeight);
      }
    }

    function handleMouseMove(e) {
      if (world) {
        world.updateMouse(e);
      }
    }

    // Initialize Page
    document.addEventListener("DOMContentLoaded", () => {
      world = new World(window.innerWidth, window.innerHeight);
      window.addEventListener('resize', handleWindowResize, false);
      window.addEventListener("mousemove", handleMouseMove, false);
      
      initGui();
      world.loop();
    });

    // GUI Initialization
    function initGui() {
      const gui = new GUI({ title: 'Shader Controls' });
      const controllers = {};

      // Preset Change Functions
      function applyColorPreset(presetName) {
        const preset = colorPresets[presetName];
        if (preset) {
          parameters.hue = preset.hue;
          parameters.hueVariation = preset.hueVariation;
          parameters.density = preset.density;
          parameters.displacement = preset.displacement;
          parameters.bgColor = preset.bgColor;

          controllers.hue.setValue(preset.hue);
          controllers.hueVariation.setValue(preset.hueVariation);
          controllers.density.setValue(preset.density);
          controllers.displacement.setValue(preset.displacement);
          controllers.bgColor.setValue(preset.bgColor);

          world.updateParameters();
        }
      }

      // Presets Folder
      const presetsFolder = gui.addFolder('Presets & Background');
      presetsFolder.add(parameters, 'colorPreset', Object.keys(colorPresets))
        .name('Color Schemes')
        .onChange(applyColorPreset);

      presetsFolder.add(parameters, 'animationPreset', ['Static', 'Slow Orbit', 'Breathing Zoom', 'Cinematic Pan', 'Floating Drift'])
        .name('Camera Animation');

      presetsFolder.add(parameters, 'greenScreen')
        .name('Green Screen (#00ff00)')
        .onChange(() => world.updateBackground());

      controllers.bgColor = presetsFolder.addColor(parameters, 'bgColor')
        .name('BG Color')
        .onChange(() => world.updateBackground());

      // Shader Configuration Folder
      const configFolder = gui.addFolder('Shader Parameters');
      controllers.hue = configFolder.add(parameters, 'hue', 0.0, 1.0, 0.01)
        .name('Hue')
        .onChange(() => world.updateParameters());

      controllers.hueVariation = configFolder.add(parameters, 'hueVariation', 0.0, 2.0, 0.01)
        .name('Hue Variation')
        .onChange(() => world.updateParameters());

      controllers.density = configFolder.add(parameters, 'density', 0.0, 2.0, 0.01)
        .name('Density')
        .onChange(() => world.updateParameters());

      controllers.displacement = configFolder.add(parameters, 'displacement', 0.0, 2.0, 0.01)
        .name('Displacement')
        .onChange(() => world.updateParameters());

      // Animation & Resolution Folder
      const motionFolder = gui.addFolder('Performance & Speed');
      motionFolder.add(parameters, 'speed', 0.0, 2.0, 0.01)
        .name('Animation Speed');

      motionFolder.add(parameters, 'dpr', 0.5, 2.0, 0.1)
        .name('DPR (Pixel Ratio)')
        .onChange((value) => {
          if (world) {
            world.renderer.setPixelRatio(value);
          }
        });

      // Actions
      const actions = {
        resetCamera: () => {
          if (world) {
            world.controls.target.set(0, 0, 0);
            world.camera.position.set(0, 0, 200);
            world.controls.update();
          }
        }
      };
      gui.add(actions, 'resetCamera').name('Reset Camera Position');

      // Key "H" toggles Settings Visibility
      let guiVisible = true;
      window.addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') {
          guiVisible = !guiVisible;
          gui.show(guiVisible);
        }
      });

      // Apply initial color preset
      applyColorPreset(parameters.colorPreset);
    }
  </script>
</body>
</html>
