<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holographic Lava Flow Command Map</title>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
<script type="module">
    import { GUI } from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // --- SHADERS ---

    const vertexShader = `
        void main() {
            // Standard vertex shader for fullscreen quad
            gl_Position = vec4(position, 1.0);
        }
    `;

    const fragmentShader = `
        uniform float iTime;
        uniform vec2 iResolution;

        // GUI Parameters
        uniform float u_camSpeed;
        uniform float u_noiseIntensity;
        
        uniform float u_flowSpeed;
        uniform float u_distFreq;
        uniform float u_pulseSpeed;
        uniform float u_ampBase;

        uniform float u_octaves;
        uniform float u_fbmAmp;
        uniform float u_fbmFreqMult;
        uniform float u_fbmGain;
        uniform float u_groundHeight;

        uniform vec3 u_lavaColorBase;
        uniform float u_lavaBaseIntensity;
        uniform vec3 u_lavaColorCool;
        uniform float u_lavaCoolIntensity;

        uniform vec3 u_sparkColor;
        uniform float u_sparkIntensity;
        uniform float u_sparkCount;

        // User Controls & Effects
        uniform vec2 u_offset;
        uniform float u_zoom;
        uniform float u_greenscreen;
        uniform float u_scanLine;
        uniform float u_scanLineIntensity;
        uniform float u_scanMode;

        // Efficient 1D to 3D Hash function for sparks
        vec3 hash31(float p) {
           vec3 p3 = fract(vec3(p) * vec3(0.1031, 0.1030, 0.0973));
           p3 += dot(p3, p3.yzx + 33.33);
           return fract((p3.xxy + p3.yzz) * p3.zyx);
        }

        // 2D Hash function for terrain and film noise
        // This sine-less hash is safe for high-res/Retina screens
        float hash(vec2 p) {
            vec3 p3  = fract(vec3(p.xyx) * 0.1031);
            p3 += dot(p3, p3.yzx + 33.33);
            return fract((p3.x + p3.y) * p3.z);
        }

        // 2D Value Noise (for efficient terrain)
        float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            vec2 u = f * f * (3.0 - 2.0 * f);
            return mix(mix(hash(i + vec2(0.0, 0.0)), hash(i + vec2(1.0, 0.0)), u.x),
                       mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x), u.y);
        }

        // Signed Distance Field (SDF) mapping the scene
        float map(vec3 p) {
            vec2 q = p.xz;
            
            // Forward flow
            q.x += iTime * u_flowSpeed;
            q.y += iTime * u_flowSpeed * 1.5; 

            // Organic, shifting distortion
            vec2 distort = vec2(
                sin(q.y * u_distFreq + iTime * 0.4),
                cos(q.x * u_distFreq + iTime * 0.3)
            ) * 0.2;
            q += distort;

            // Slow Amplitude Modulation
            float ampMod = 0.1 * sin(iTime * u_pulseSpeed); 
            float activeAmp = u_ampBase + ampMod;

            // N-octave 2D fBm
            float h = 0.0;
            float amp = u_fbmAmp;
            mat2 m = mat2(0.8, -0.6, 0.6, 0.8);
            for(int i = 0; i < 10; i++) {
                if(float(i) >= u_octaves) break;
                h += amp * noise(q);
                q = m * q * u_fbmFreqMult; 
                amp *= u_fbmGain;
            }
            
            // Base floor
            float ground = p.y + u_groundHeight;
            
            // Apply final heightmap
            float d = ground - h * activeAmp;
            
            return d * 0.5; 
        }

        // Compute surface normals
        vec3 calcNormal(vec3 p) {
            vec2 e = vec2(0.01, 0.0);
            return normalize(vec3(
                map(p + e.xyy) - map(p - e.xyy),
                map(p + e.yxy) - map(p - e.yxy),
                map(p + e.yyx) - map(p - e.yyx)
            ));
        }

        void main() {
            vec2 fragCoord = gl_FragCoord.xy;
            vec2 uv = (fragCoord - 0.5 * iResolution.xy) / iResolution.y;

            // Camera setup with drag offset and scroll zoom
            vec3 ro = vec3(u_offset.x, 0.2 + u_offset.y, iTime * u_camSpeed); 
            vec3 rd = normalize(vec3(uv.x / u_zoom, (uv.y - 0.35) / u_zoom, 1.0)); 

            float t = 0.0;
            float maxD = 15.0; 
            vec3 p;
            float lavaGlow = 0.0;

            // Main Raymarching Loop
            for(int i = 0; i < 75; i++) {
                p = ro + rd * t;
                float d = map(p);
                
                if(d < 0.005 || t > maxD) break;
                t += d;

                // Volumetric Glow for lava stream
                float lavaFactor = smoothstep(-0.2, -0.9, p.y); 
                lavaGlow += exp(-d * 6.0) * lavaFactor * 0.05;
            }

            // Green screen mode replaces background with solid #00ff00 (0,1,0)
            vec3 bgCol = (u_greenscreen > 0.5) ? vec3(0.0, 1.0, 0.0) : vec3(0.005, 0.002, 0.01);
            vec3 col = bgCol; 

            // Environment hit
            if(t < maxD) {
                vec3 n = calcNormal(p);
                vec3 l = normalize(vec3(0.5, 1.0, -0.3));
                float diff = max(dot(n, l), 0.0);

                // Dark rock with specular highlight
                vec3 rockCol = vec3(0.04, 0.03, 0.03) * diff;
                rockCol += vec3(0.12, 0.1, 0.12) * pow(max(dot(reflect(-l, n), -rd), 0.0), 8.0);

                // Lava/Rock mix based on height
                float h = p.y;
                float isRock = smoothstep(-0.7, -0.3, h);

                // Vibrant Crimson Lava gradient
                vec3 lavaColBase = u_lavaColorBase * u_lavaBaseIntensity;
                vec3 lavaColCool = u_lavaColorCool * u_lavaCoolIntensity;   
                vec3 lavaCol = mix(lavaColBase, lavaColCool, smoothstep(-0.9, -0.6, h));

                col = mix(lavaCol, rockCol, isRock);

                // Holographic radar scanline / Sonar pulse sweep
                float scanFactor = 0.0;
                if (u_scanMode < 0.5) {
                    // Linear scanline
                    scanFactor = exp(-abs(p.z - (ro.z + u_scanLine)) * 12.0);
                } else {
                    // Sonar radial sweep
                    scanFactor = exp(-abs(length(p.xz - ro.xz) - u_scanLine) * 10.0);
                }
                col += vec3(0.0, 1.0, 0.8) * scanFactor * u_scanLineIntensity;
            }

            // Add main lava glow
            col += vec3(1.4, 0.1, 0.01) * lavaGlow;        
            
            // Explicit particle system for realistic sparks
            float sparkAccum = 0.0;
            
            // Loop up to max possible sparks, break if exceeded GUI limit
            for(float i = 0.0; i < 150.0; i++) {
                if(i >= u_sparkCount) break;
                
                // Get random properties for this spark
                vec3 h = hash31(i + 13.37);
                
                // Lifecycle 
                float speed = 0.08 + h.x * 0.12; 
                float life = fract(iTime * speed + h.y);
                
                // Starting position (anchored to camera movement in X and Z)
                vec3 sPos = vec3(0.0);
                sPos.x = ro.x + (h.x - 0.5) * 6.0;
                sPos.z = ro.z + (h.y - 0.5) * 5.0 + 3.0; 
                
                // Height animation (Non-linear to simulate heat acceleration)
                float startHeight = ro.y - 1.0 + (h.z * 0.3); 
                float endHeight = startHeight + 1.5 + (h.x * 1.0);
                sPos.y = mix(startHeight, endHeight, pow(life, 1.3)); 
                
                // Chaotic 3D drift (Simulating heat convection and turbulence)
                float tMod = iTime * (0.8 + h.x * 0.4);
                
                sPos.x += sin(tMod * 2.0 + h.z * 10.0) * 0.3 * life;
                sPos.x += cos(tMod * 4.5 + h.y * 5.0) * 0.1 * life;
                
                sPos.z += cos(tMod * 2.3 + h.x * 8.0) * 0.3 * life;
                sPos.z += sin(tMod * 5.1 + h.z * 6.0) * 0.1 * life;
                
                // Check intersection with view ray
                vec3 p2 = sPos - ro;
                float t_proj = dot(p2, rd);
                
                if(t_proj > 0.0 && t_proj < t) {
                    vec3 closestPoint = ro + rd * t_proj;
                    float dist = length(closestPoint - sPos);
                    
                    // Spark brightness profile
                    float glow = 0.000002 / (dist * dist + 0.000001); 
                    glow += smoothstep(0.0015, 0.0001, dist) * 1.2; 
                    
                    // Fade in/out
                    float fade = smoothstep(0.0, 0.1, life) * smoothstep(1.0, 0.7, life);
                    
                    sparkAccum += glow * fade * (0.5 + h.z * 0.5);
                }
            }
            
            // Add sparks to color 
            col += u_sparkColor * u_sparkIntensity * sparkAccum;

            // Distance fog
            float fog = 1.0 - exp(-0.04 * t * t);
            col = mix(col, bgCol, fog);

            // Clean background cutout if greenscreen is active and we hit nothing
            if (u_greenscreen > 0.5 && t >= maxD) {
                gl_FragColor = vec4(0.0, 1.0, 0.0, 1.0);
                return;
            }

            // Vignette and Gamma
            if (u_greenscreen < 0.5) {
                col *= 1.0 - 0.4 * length(uv);
            }
            col = pow(max(col, 0.0), vec3(0.4545));

            // Apply film noise (bypassed in greenscreen)
            if (u_greenscreen < 0.5) {
                vec2 noiseSeed = fragCoord + vec2(fract(iTime * 0.123), fract(iTime * 0.321)) * 1000.0;
                float n = hash(noiseSeed);
                col += (n - 0.5) * u_noiseIntensity;
            }

            gl_FragColor = vec4(col, 1.0);
        }
    `;

    // --- THREE.JS SETUP ---
    
    const scene = new THREE.Scene();
    
    // Flat orthographic camera for the fullscreen quad
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    document.body.appendChild(renderer.domElement);

    // Initial Parameters Data
    const params = {
        dpr: 0.8,
        camSpeed: 0.1,
        noiseIntensity: 0.015,
        
        flowSpeed: 0.1,
        distFreq: 0.0,
        pulseSpeed: 0.05,
        ampBase: 0.4,

        octaves: 7.0,
        fbmAmp: 0.8,
        fbmFreqMult: 2.1,
        fbmGain: 0.5,
        groundHeight: 0.9,
        
        lavaColorBase: '#ff1402', 
        lavaBaseIntensity: 1.7,
        lavaColorCool: '#b20000',
        lavaCoolIntensity: 1.0,
        
        sparkCount: 80,
        sparkColor: '#ff5511',
        sparkIntensity: 3.0,

        // User Controls & Presets
        zoom: 1.0,
        greenscreen: false,
        colorScheme: 'Crimson Volcano',

        // Animation mode dropdown (Pattern A)
        animationMode: 'Idle Map'
    };

    // Uniforms initialization
    const uniforms = {
        iTime: { value: 0 },
        iResolution: { value: new THREE.Vector2() },
        
        u_camSpeed: { value: params.camSpeed },
        u_noiseIntensity: { value: params.noiseIntensity },
        
        u_flowSpeed: { value: params.flowSpeed },
        u_distFreq: { value: params.distFreq },
        u_pulseSpeed: { value: params.pulseSpeed },
        u_ampBase: { value: params.ampBase },

        u_octaves: { value: params.octaves },
        u_fbmAmp: { value: params.fbmAmp },
        u_fbmFreqMult: { value: params.fbmFreqMult },
        u_fbmGain: { value: params.fbmGain },
        u_groundHeight: { value: params.groundHeight },

        u_lavaColorBase: { value: new THREE.Color(params.lavaColorBase) },
        u_lavaBaseIntensity: { value: params.lavaBaseIntensity },
        u_lavaColorCool: { value: new THREE.Color(params.lavaColorCool) },
        u_lavaCoolIntensity: { value: params.lavaCoolIntensity },

        u_sparkColor: { value: new THREE.Color(params.sparkColor) },
        u_sparkIntensity: { value: params.sparkIntensity },
        u_sparkCount: { value: params.sparkCount },

        // Interactive control uniforms
        u_offset: { value: new THREE.Vector2(0, 0) },
        u_zoom: { value: params.zoom },
        u_greenscreen: { value: 0.0 },
        u_scanLine: { value: 0.0 },
        u_scanLineIntensity: { value: 0.0 },
        u_scanMode: { value: 0.0 }
    };

    // Create fullscreen quad
    const geometry = new THREE.PlaneGeometry(2, 2);
    const material = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        uniforms: uniforms,
        depthWrite: false,
        depthTest: false
    });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // --- LIL-GUI SETUP ---
    const gui = new GUI({ title: 'Scene Settings' });
    
    const fGeneral = gui.addFolder('General Settings');
    fGeneral.add(params, 'dpr', 0.5, 2.0, 0.1).name('Device Pixel Ratio').onChange(v => {
        renderer.setPixelRatio(v);
        resize();
    });
    fGeneral.add(params, 'camSpeed', 0.0, 1.0, 0.01).name('Camera Speed').onChange(v => uniforms.u_camSpeed.value = v);
    fGeneral.add(params, 'noiseIntensity', 0.0, 0.1, 0.001).name('Film Noise').onChange(v => uniforms.u_noiseIntensity.value = v);
    fGeneral.add(params, 'greenscreen').name('Green Screen (#00ff00)').onChange(v => {
        uniforms.u_greenscreen.value = v ? 1.0 : 0.0;
    });

    // 5 Preset Color Schemes (Tech and IT theme)
    const presets = {
        'Crimson Volcano': {
            lavaColorBase: '#ff1402',
            lavaBaseIntensity: 1.7,
            lavaColorCool: '#b20000',
            lavaCoolIntensity: 1.0,
            sparkColor: '#ff5511',
            sparkIntensity: 3.0
        },
        'Matrix Green': {
            lavaColorBase: '#00ff33',
            lavaBaseIntensity: 2.0,
            lavaColorCool: '#003300',
            lavaCoolIntensity: 0.8,
            sparkColor: '#33ff66',
            sparkIntensity: 3.0
        },
        'Quantum Blue': {
            lavaColorBase: '#00d8ff',
            lavaBaseIntensity: 2.0,
            lavaColorCool: '#002244',
            lavaCoolIntensity: 1.0,
            sparkColor: '#88e5ff',
            sparkIntensity: 3.0
        },
        'Neon Purple': {
            lavaColorBase: '#bd00ff',
            lavaBaseIntensity: 2.0,
            lavaColorCool: '#330044',
            lavaCoolIntensity: 0.8,
            sparkColor: '#ff00aa',
            sparkIntensity: 3.0
        },
        'Amber Gold': {
            lavaColorBase: '#ffaa00',
            lavaBaseIntensity: 2.0,
            lavaColorCool: '#442200',
            lavaCoolIntensity: 0.8,
            sparkColor: '#ffdd55',
            sparkIntensity: 3.0
        }
    };

    fGeneral.add(params, 'colorScheme', Object.keys(presets)).name('Color Scheme Preset').onChange(applyPreset);

    // Exclusive Animation Mode Dropdown (with updated smooth aesthetic modes)
    fGeneral.add(params, 'animationMode', [
        'Idle Map', 
        'Cinematic Flyover', 
        'Tectonic Scan', 
        'Sonar Pulse Sweep',
        'Liquid Energy Flow',
        'Aurora Breathing',
        'Solar Storm Alert'
    ]).name('Animation Mode').onChange(() => {
        // Reset dynamic settings to baseline on mode change
        uniforms.u_noiseIntensity.value = params.noiseIntensity;
        uniforms.u_ampBase.value = params.ampBase;
        uniforms.u_distFreq.value = params.distFreq;
        uniforms.u_flowSpeed.value = params.flowSpeed;
        uniforms.u_lavaColorBase.value.set(params.lavaColorBase);
        uniforms.u_lavaColorCool.value.set(params.lavaColorCool);
        uniforms.u_sparkColor.value.set(params.sparkColor);
        uniforms.u_lavaBaseIntensity.value = params.lavaBaseIntensity;
        uniforms.u_sparkIntensity.value = params.sparkIntensity;
        uniforms.u_scanLineIntensity.value = 0.0;
        uniforms.u_scanMode.value = 0.0;
    });

    const fShape = gui.addFolder('Lava Deformation');
    fShape.add(params, 'flowSpeed', 0.0, 1.0, 0.01).name('Flow Speed').onChange(v => uniforms.u_flowSpeed.value = v);
    fShape.add(params, 'distFreq', 0.0, 2.0, 0.01).name('Distortion Freq').onChange(v => uniforms.u_distFreq.value = v);
    fShape.add(params, 'pulseSpeed', 0.0, 0.5, 0.01).name('Pulse Speed').onChange(v => uniforms.u_pulseSpeed.value = v);
    fShape.add(params, 'ampBase', 0.0, 1.0, 0.01).name('Base Amplitude').onChange(v => uniforms.u_ampBase.value = v);

    const fProc = gui.addFolder('Procedural Generation');
    fProc.add(params, 'octaves', 1, 10, 1).name('Octaves').onChange(v => uniforms.u_octaves.value = v);
    fProc.add(params, 'fbmAmp', 0.1, 2.0, 0.1).name('Noise Amplitude').onChange(v => uniforms.u_fbmAmp.value = v);
    fProc.add(params, 'fbmFreqMult', 1.0, 4.0, 0.1).name('Frequency Mult').onChange(v => uniforms.u_fbmFreqMult.value = v);
    fProc.add(params, 'fbmGain', 0.1, 1.0, 0.05).name('Amplitude Gain').onChange(v => uniforms.u_fbmGain.value = v);
    fProc.add(params, 'groundHeight', -1.0, 2.0, 0.1).name('Ground Level').onChange(v => uniforms.u_groundHeight.value = v);

    const fColors = gui.addFolder('Lava Colors');
    const cLavaBase = fColors.addColor(params, 'lavaColorBase').name('Base Color').onChange(v => uniforms.u_lavaColorBase.value.set(v));
    const cLavaBaseInt = fColors.add(params, 'lavaBaseIntensity', 0.0, 5.0, 0.1).name('Base Intensity').onChange(v => uniforms.u_lavaBaseIntensity.value = v);
    const cLavaCool = fColors.addColor(params, 'lavaColorCool').name('Cool Color').onChange(v => uniforms.u_lavaColorCool.value.set(v));
    const cLavaCoolInt = fColors.add(params, 'lavaCoolIntensity', 0.0, 5.0, 0.1).name('Cool Intensity').onChange(v => uniforms.u_lavaCoolIntensity.value = v);

    const fSparks = gui.addFolder('Sparks Settings');
    fSparks.add(params, 'sparkCount', 0, 150, 1).name('Particle Count').onChange(v => uniforms.u_sparkCount.value = v);
    const cSparkColor = fSparks.addColor(params, 'sparkColor').name('Spark Color').onChange(v => uniforms.u_sparkColor.value.set(v));
    const cSparkInt = fSparks.add(params, 'sparkIntensity', 0.0, 10.0, 0.1).name('Spark Intensity').onChange(v => uniforms.u_sparkIntensity.value = v);

    function applyPreset(name) {
        const preset = presets[name];
        if (!preset) return;
        
        params.lavaColorBase = preset.lavaColorBase;
        params.lavaBaseIntensity = preset.lavaBaseIntensity;
        params.lavaColorCool = preset.lavaColorCool;
        params.lavaCoolIntensity = preset.lavaCoolIntensity;
        params.sparkColor = preset.sparkColor;
        params.sparkIntensity = preset.sparkIntensity;
        
        // Update uniforms
        uniforms.u_lavaColorBase.value.set(params.lavaColorBase);
        uniforms.u_lavaBaseIntensity.value = params.lavaBaseIntensity;
        uniforms.u_lavaColorCool.value.set(params.lavaColorCool);
        uniforms.u_lavaCoolIntensity.value = params.lavaCoolIntensity;
        uniforms.u_sparkColor.value.set(params.sparkColor);
        uniforms.u_sparkIntensity.value = params.sparkIntensity;
        
        // Update GUI display
        cLavaBase.setValue(params.lavaColorBase);
        cLavaBaseInt.setValue(params.lavaBaseIntensity);
        cLavaCool.setValue(params.lavaColorCool);
        cLavaCoolInt.setValue(params.lavaCoolIntensity);
        cSparkColor.setValue(params.sparkColor);
        cSparkInt.setValue(params.sparkIntensity);
    }

    // Default state: closed
    gui.close();

    // --- INTERACTIVE CONTROLS ---
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    const offset = { x: 0, y: 0 };

    window.addEventListener('mousedown', (e) => {
        if (e.target.closest('.lil-gui')) return;
        isDragging = true;
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const deltaX = e.clientX - previousMousePosition.x;
        const deltaY = e.clientY - previousMousePosition.y;
        
        // Adjust drag speed based on current zoom level
        const dragSpeed = 0.003 / params.zoom;
        offset.x -= deltaX * dragSpeed;
        offset.y += deltaY * dragSpeed;
        
        previousMousePosition = { x: e.clientX, y: e.clientY };
        
        if (params.animationMode !== 'Cinematic Flyover') {
            uniforms.u_offset.value.set(offset.x, offset.y);
        }
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
    });

    window.addEventListener('wheel', (e) => {
        if (e.target.closest('.lil-gui')) return;
        
        const zoomSpeed = 1.1;
        if (e.deltaY < 0) {
            params.zoom *= zoomSpeed;
        } else {
            params.zoom /= zoomSpeed;
        }
        // Clamp zoom factor
        params.zoom = Math.max(0.1, Math.min(10.0, params.zoom));
        uniforms.u_zoom.value = params.zoom;
    }, { passive: true });

    // H key to hide/show UI
    window.addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') {
            if (gui.domElement.style.display === 'none') {
                gui.show();
            } else {
                gui.hide();
            }
        }
    });

    // --- RESIZE HANDLING ---
    function resize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        renderer.setSize(width, height);
        
        const dpr = renderer.getPixelRatio();
        uniforms.iResolution.value.set(width * dpr, height * dpr);
    }
    
    window.addEventListener('resize', resize);
    
    // Apply initial setup
    renderer.setPixelRatio(params.dpr);
    resize();

    // --- ANIMATION LOOP ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        
        const time = clock.getElapsedTime();
        uniforms.iTime.value = time;

        // 1. Calculate camera offset depending on animation mode
        let currentOffsetX = offset.x;
        let currentOffsetY = offset.y;

        if (params.animationMode === 'Cinematic Flyover') {
            const autoOffsetX = Math.sin(time * 0.5) * 1.5;
            const autoOffsetY = 0.2 + Math.cos(time * 0.3) * 0.3;
            currentOffsetX += autoOffsetX;
            currentOffsetY += autoOffsetY;
        }
        uniforms.u_offset.value.set(currentOffsetX, currentOffsetY);

        // 2. Tectonic linear scanline & wave morph mode
        if (params.animationMode === 'Tectonic Scan') {
            uniforms.u_ampBase.value = params.ampBase + 0.15 * Math.sin(time * 0.8);
            uniforms.u_distFreq.value = params.distFreq + 0.5 * (Math.sin(time * 0.4) + 1.0);
            uniforms.u_flowSpeed.value = params.flowSpeed * (1.2 + 0.8 * Math.cos(time * 0.6));
            
            // Sweep scanline from 0 to 8 units in front of camera
            uniforms.u_scanLine.value = (time * 2.0) % 8.0;
            uniforms.u_scanLineIntensity.value = 2.5;
            uniforms.u_scanMode.value = 0.0; // Linear mode
        }
        
        // 3. Sonar Pulse Sweep (New Mode): Radial expanding scanning circle from camera
        else if (params.animationMode === 'Sonar Pulse Sweep') {
            // Radial sonar sweeps from camera outward
            uniforms.u_scanLine.value = (time * 2.5) % 10.0;
            uniforms.u_scanLineIntensity.value = 3.0;
            uniforms.u_scanMode.value = 1.0; // Radial mode
            
            uniforms.u_ampBase.value = params.ampBase;
            uniforms.u_distFreq.value = params.distFreq;
            uniforms.u_flowSpeed.value = params.flowSpeed;
        } else {
            // Restore defaults for Scanlines
            if (params.animationMode !== 'Liquid Energy Flow' && params.animationMode !== 'Aurora Breathing') {
                uniforms.u_ampBase.value = params.ampBase;
                uniforms.u_distFreq.value = params.distFreq;
                uniforms.u_flowSpeed.value = params.flowSpeed;
            }
            uniforms.u_scanLineIntensity.value = 0.0;
            uniforms.u_scanMode.value = 0.0;
        }

        // 4. Liquid Energy Flow (New Mode): High velocity organic terrain flow
        if (params.animationMode === 'Liquid Energy Flow') {
            uniforms.u_flowSpeed.value = params.flowSpeed * 3.0;
            uniforms.u_distFreq.value = params.distFreq + 1.2;
            uniforms.u_ampBase.value = params.ampBase * 1.3;
            uniforms.u_sparkIntensity.value = params.sparkIntensity * 1.5;
        } else if (params.animationMode !== 'Solar Storm Alert') {
            uniforms.u_sparkIntensity.value = params.sparkIntensity;
        }

        // 5. Aurora Breathing (New Mode): Bioluminescent oceanic waves and slow motion
        if (params.animationMode === 'Aurora Breathing') {
            const greenCol = new THREE.Color('#00ffaa');
            const blueCol = new THREE.Color('#004488');
            const sparkCol = new THREE.Color('#55ffcc');
            
            const pulse = Math.sin(time * 0.5) * 0.5 + 0.5;
            uniforms.u_lavaColorBase.value.copy(blueCol).lerp(greenCol, pulse);
            uniforms.u_lavaColorCool.value.set(blueCol).multiplyScalar(0.5);
            uniforms.u_sparkColor.value.copy(sparkCol);

            uniforms.u_flowSpeed.value = params.flowSpeed * 0.3; // Very slow and calm
            uniforms.u_ampBase.value = params.ampBase * (0.8 + 0.4 * Math.sin(time * 0.4));
            uniforms.u_lavaBaseIntensity.value = params.lavaBaseIntensity * (0.6 + 0.4 * Math.sin(time * 0.5));
        }
        
        // 6. Solar Storm Alert: Beautiful color transitions
        else if (params.animationMode === 'Solar Storm Alert') {
            const cycleColorBase = new THREE.Color().setHSL((time * 0.05) % 1.0, 1.0, 0.5);
            const cycleColorCool = new THREE.Color().setHSL((time * 0.05 + 0.25) % 1.0, 1.0, 0.3);
            const cycleColorSpark = new THREE.Color().setHSL((time * 0.08) % 1.0, 1.0, 0.6);

            uniforms.u_lavaColorBase.value.copy(cycleColorBase);
            uniforms.u_lavaColorCool.value.copy(cycleColorCool);
            uniforms.u_sparkColor.value.copy(cycleColorSpark);

            uniforms.u_lavaBaseIntensity.value = params.lavaBaseIntensity * (1.0 + 0.4 * Math.sin(time * 1.2));
            uniforms.u_sparkIntensity.value = params.sparkIntensity * (1.0 + 0.5 * Math.cos(time * 1.5));
        } else if (params.animationMode !== 'Aurora Breathing') {
            uniforms.u_lavaColorBase.value.set(params.lavaColorBase);
            uniforms.u_lavaColorCool.value.set(params.lavaColorCool);
            uniforms.u_sparkColor.value.set(params.sparkColor);
            uniforms.u_lavaBaseIntensity.value = params.lavaBaseIntensity;
        }
        
        renderer.render(scene, camera);
    }
    
    animate();
</script>
</body>
</html>
