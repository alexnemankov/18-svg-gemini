<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Triangle Mesh</title>
    <style>
      @import url(https://fonts.googleapis.com/css?family=Open+Sans:800);

      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
        transition: background-color 0.3s ease;
        font-family: "Open Sans", sans-serif;
      }
      #myCanvas {
        position: absolute;
        margin: auto;
        width: 100%;
        height: 100%;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: #000;
        transition: background-color 0.3s ease;
        touch-action: none;
      }

      #credits {
        position: absolute;
        width: 100%;
        margin: auto;
        bottom: 0;
        margin-bottom: 20px;
        font-family: "Open Sans", sans-serif;
        color: #0561a6;
        font-size: 0.7em;
        text-transform: uppercase;
        text-align: center;
        pointer-events: none;
        user-select: none;
        letter-spacing: 2px;
      }
      #credits a {
        color: #0561a6;
        pointer-events: auto;
        text-decoration: none;
      }
      #credits a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <canvas id="myCanvas"></canvas>

    <!-- Include GSAP library -->
    <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>

    <script type="module">
      import GUI from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

      // Global variables
      var C, c, viewWidth, viewHeight, rectCanvas;
      var cols, rows, tris;
      var neighbours = ["side", "top", "bottom"];
      var speedTrailAppear = 0.1;
      var speedTrailDisappear = 0.1;
      var speedTriOpen = 1;
      var interval;

      // View / Camera states for Zoom and Drag
      var userScale = 1.0;
      var userOffsetX = 0.0;
      var userOffsetY = 0.0;

      var isDragging = false;
      var dragStartX = 0;
      var dragStartY = 0;

      // Auto animation variables
      var accumulatedTime = 0;
      var lastTime = Date.now();
      var autoOffsetX = 0;
      var autoOffsetY = 0;
      var autoScale = 1.0;
      var autoRotation = 0;

      var gui;
      var guiVisible = true;
      var controllers = {};

      var parameters = {
        // Mesh settings
        triW: 21,
        triH: 27,
        trailMaxLength: 18,
        trailIntervalCreation: 100,
        delayBeforeDisappear: 2,
        randomAlpha: true,

        // Customizations
        greenScreen: false,
        dpr: Math.min(window.devicePixelRatio, 2.0),
        animationSpeed: 1.0,
        colorScheme: "Neon Cyber",
        cameraAnimation: "Smooth Pan",

        // Color pickers (synced with preset)
        color1: "#ff007f",
        color2: "#00ffff",
        color3: "#bd00ff",
        color4: "#ffaa00",
        color5: "#ffffff",
      };

      var colorSchemes = {
        "Neon Cyber": ["#ff007f", "#00ffff", "#bd00ff", "#ffaa00", "#ffffff"],
        "Ocean Breeze": ["#007ecb", "#32b2fa", "#54cefc", "#91dffa", "#01235d"],
        "Sunset Glow": ["#eb9000", "#f6b400", "#8a0a08", "#e52822", "#feeb31"],
        "Forest Jade": ["#05391e", "#004b25", "#15ae44", "#78c340", "#ffd700"],
        "Monochrome Tech": [
          "#111111",
          "#555555",
          "#aaaaaa",
          "#dddddd",
          "#ffffff",
        ],
      };

      function getActiveColors() {
        return [
          parameters.color1,
          parameters.color2,
          parameters.color3,
          parameters.color4,
          parameters.color5,
        ];
      }

      function hexToRgb(hex) {
        var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result
          ? {
              r: parseInt(result[1], 16),
              g: parseInt(result[2], 16),
              b: parseInt(result[3], 16),
            }
          : { r: 0, g: 0, b: 0 };
      }

      function shuffleArray(o) {
        for (
          var j, x, i = o.length;
          i;
          j = Math.floor(Math.random() * i), x = o[--i], o[i] = o[j], o[j] = x
        );
        return o;
      }

      // Triangle Object
      var Triangle = function (pos, column, row) {
        var thisTri = this;
        this.selectedForTrail = false;
        this.pos = pos;
        this.col = column;
        this.row = row;
        this.alpha = 1;
        this.tAlpha = 1;

        var activeColors = getActiveColors();
        this.color =
          activeColors[Math.floor(Math.random() * activeColors.length)];
        this.rgb = hexToRgb(this.color);

        this.opened = false;
        this.opening = false;
        this.closing = false;
        this.isLeft = this.pos % 2;

        this.tX1 = this.isLeft
          ? (this.col + 1) * parameters.triW
          : this.col * parameters.triW;
        this.tX2 = this.isLeft
          ? this.col * parameters.triW
          : (this.col + 1) * parameters.triW;
        this.tX3 = this.isLeft
          ? (this.col + 1) * parameters.triW
          : this.col * parameters.triW;

        this.x1 = this.tX1;
        this.x2 = this.tX1;
        this.x3 = this.tX1;

        this.tY1 = 0.5 * this.row * parameters.triH;
        this.tY2 = 0.5 * (this.row + 1) * parameters.triH;
        this.tY3 = 0.5 * (this.row + 2) * parameters.triH;

        this.y1 = this.tY1;
        this.y2 = this.tY1;
        this.y3 = this.tY1;

        this.tweenClose = null;
        this.tweenOpen = null;

        this.draw = function () {
          c.fillStyle =
            "rgba(" +
            this.rgb.r +
            "," +
            this.rgb.g +
            "," +
            this.rgb.b +
            "," +
            this.alpha +
            ")";
          c.beginPath();
          c.moveTo(this.x1, this.y1);
          c.lineTo(this.x2, this.y2);
          c.lineTo(this.x3, this.y3);
          c.closePath();
          c.fill();
        };

        this.open = function (
          direction,
          targetSpeed,
          targetAlpha,
          targetDelay,
        ) {
          if (!this.opened || !this.opening) {
            if (this.tweenClose) this.tweenClose.kill();
            this.opening = true;
            this.direction = direction || "top";
            this.delay = targetDelay || 0;
            this.tAlpha = targetAlpha;
            this.tSpeed = targetSpeed || 1.5;
            if (this.direction == "side") {
              this.x1 = this.x2 = this.x3 = this.tX1;
              this.y1 = this.tY1;
              this.y2 = this.tY2;
              this.y3 = this.tY3;
            } else if (this.direction == "top") {
              this.x1 = (this.tX2 + this.tX3) / 2;
              this.x2 = this.tX2;
              this.x3 = this.tX3;
              this.y1 = (this.tY2 + this.tY3) / 2;
              this.y2 = this.tY2;
              this.y3 = this.tY3;
            } else if (this.direction == "bottom") {
              this.x1 = this.tX1;
              this.x2 = this.tX2;
              this.x3 = (this.tX1 + this.tX2) / 2;
              this.y1 = this.tY1;
              this.y2 = this.tY2;
              this.y3 = (this.tY1 + this.tY2) / 2;
            }
            this.tweenOpen = gsap.to(this, {
              duration: this.tSpeed,
              x1: this.tX1,
              x2: this.tX2,
              x3: this.tX3,
              y1: this.tY1,
              y2: this.tY2,
              y3: this.tY3,
              alpha: this.tAlpha,
              ease: "power4.inOut",
              delay: this.delay,
              onComplete: openComplete,
              onCompleteParams: [thisTri],
            });
          }
        };

        this.close = function (direction, targetSpeed, targetDelay) {
          this.direction = direction || "top";
          this.delay = targetDelay || 1;
          this.tSpeed = targetSpeed || 0.8;
          this.opened = false;
          this.closing = true;
          var closeX1, closeX2, closeX3, closeY1, closeY2, closeY3;

          if (this.direction == "side") {
            closeX1 = closeX2 = closeX3 = this.tX1;
            closeY1 = this.tY1;
            closeY2 = this.tY2;
            closeY3 = this.tY3;
          } else if (this.direction == "top") {
            closeX1 = (this.tX2 + this.tX3) / 2;
            closeX2 = this.tX2;
            closeX3 = this.tX3;
            closeY1 = (this.tY2 + this.tY3) / 2;
            closeY2 = this.tY2;
            closeY3 = this.tY3;
          } else if (this.direction == "bottom") {
            closeX1 = this.tX1;
            closeX2 = this.tX2;
            closeX3 = (this.tX1 + this.tX2) / 2;
            closeY1 = this.tY1;
            closeY2 = this.tY2;
            closeY3 = (this.tY1 + this.tY2) / 2;
          }
          if (this.tweenClose) this.tweenClose.kill();
          this.tweenClose = gsap.to(this, {
            duration: this.tSpeed,
            x1: closeX1,
            x2: closeX2,
            x3: closeX3,
            y1: closeY1,
            y2: closeY2,
            y3: closeY3,
            alpha: 0,
            ease: "power4.inOut",
            delay: this.delay,
            onComplete: closeComplete,
            onCompleteParams: [thisTri],
          });
        };
      };

      function openComplete(tri) {
        tri.opened = true;
        tri.opening = false;
        tri.closing = false;
      }

      function closeComplete(tri) {
        tri.opened = false;
        tri.opening = false;
        tri.closing = false;
      }

      function unselectTris() {
        for (var i = 0; i < tris.length; i++) {
          tris[i].selectedForTrail = false;
        }
      }

      function createTrail() {
        unselectTris();
        var currentTri;
        var trailLength =
          Math.floor(Math.random() * parameters.trailMaxLength - 2) + 2;
        if (tris.length === 0) return;
        var index = Math.round(Math.random() * (tris.length - 1));
        var startTri = tris[index];
        if (!startTri) return;
        startTri.selectedForTrail = true;
        currentTri = {
          tri: startTri,
          openDir: "side",
          closeDir: "side",
        };

        for (var i = 0; i < trailLength; i++) {
          var o = getNeighbour(currentTri.tri);
          if (o != null) {
            o.tri.selectedForTrail = true;
            var opacity;
            if (parameters.randomAlpha) {
              opacity = Math.random() < 0.8 ? Math.random() * 0.5 : 1;
            } else {
              opacity = 1;
            }
            currentTri.tri.closeDir = o.openDir;
            currentTri.tri.open(
              currentTri.openDir,
              speedTriOpen,
              opacity,
              i * speedTrailAppear,
            );
            currentTri.tri.close(
              currentTri.closeDir,
              1,
              parameters.delayBeforeDisappear + i * speedTrailDisappear,
            );
            currentTri = o;
          } else {
            var opacity = parameters.randomAlpha
              ? Math.random() < 0.8
                ? Math.random() * 0.5
                : 1
              : 1;
            currentTri.tri.open(
              currentTri.openDir,
              speedTriOpen,
              opacity,
              (i + 1) * speedTrailAppear,
            );
            currentTri.tri.close(
              currentTri.closeDir,
              1,
              parameters.delayBeforeDisappear + (i + 1) * speedTrailDisappear,
            );
            break;
          }
        }
      }

      function getNeighbour(t) {
        shuffleArray(neighbours);
        for (var i = 0; i < neighbours.length; i++) {
          if (neighbours[i] == "top") {
            if (
              t.row != 0 &&
              tris[t.pos - cols] &&
              !tris[t.pos - cols].selectedForTrail &&
              !tris[t.pos - cols].opened
            ) {
              return {
                tri: tris[t.pos - cols],
                openDir: "top",
                closeDir: "top",
              };
            }
          } else if (neighbours[i] == "bottom") {
            if (
              t.row != rows - 1 &&
              tris[t.pos + cols] &&
              !tris[t.pos + cols].selectedForTrail &&
              !tris[t.pos + cols].opened
            ) {
              return {
                tri: tris[t.pos + cols],
                openDir: "bottom",
                closeDir: "top",
              };
            }
          } else {
            if (
              t.isLeft &&
              t.col != cols - 1 &&
              tris[t.pos + 1] &&
              !tris[t.pos + 1].selectedForTrail &&
              !tris[t.pos + 1].opened
            ) {
              return {
                tri: tris[t.pos + 1],
                openDir: "side",
                closeDir: "top",
              };
            } else if (
              !t.isLeft &&
              t.col != 0 &&
              tris[t.pos - 1] &&
              !tris[t.pos - 1].selectedForTrail &&
              !tris[t.pos - 1].opened
            ) {
              return {
                tri: tris[t.pos - 1],
                openDir: "side",
                closeDir: "top",
              };
            }
          }
        }
        return null;
      }

      function draw() {
        var dpr = parameters.dpr || window.devicePixelRatio || 1;

        // Clear canvas with full identity transform
        c.setTransform(1, 0, 0, 1, 0, 0);
        c.clearRect(0, 0, C.width, C.height);

        // Reapply DPR scaling
        c.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Apply drag offset, rotation and zoom scale
        c.save();
        c.translate(
          viewWidth / 2 + userOffsetX + autoOffsetX,
          viewHeight / 2 + userOffsetY + autoOffsetY,
        );
        c.rotate(autoRotation);
        var finalScale = userScale * autoScale;
        c.scale(finalScale, finalScale);
        c.translate(-viewWidth / 2, -viewHeight / 2);

        for (var i = 0; i < tris.length; i++) {
          tris[i].draw();
        }
        c.restore();
      }

      function handleResize() {
        var dpr = parameters.dpr || window.devicePixelRatio || 1;
        viewWidth = C.scrollWidth;
        viewHeight = C.scrollHeight;
        C.width = viewWidth * dpr;
        C.height = viewHeight * dpr;
        rectCanvas = C.getBoundingClientRect();
        start();
      }

      function initCanvas(canvasId) {
        C = document.getElementById(canvasId);
        c = C.getContext("2d");

        initParams();
        window.addEventListener("resize", handleResize);

        // Tick handler via GSAP
        gsap.ticker.add(tick);

        setupInteractions();
        handleResize();
      }

      function initParams() {
        cols = Math.floor(viewWidth / parameters.triW);
        cols = cols % 2 ? cols : cols - 1; // => keep it odd
        rows = Math.floor(viewHeight / parameters.triH) * 2;
        tris = [];
      }

      function initGrid() {
        for (var j = 0; j < rows; j++) {
          for (var i = 0; i < cols; i++) {
            var pos = i + j * cols;
            var triangle = new Triangle(pos, i, j);
            tris.push(triangle);
            triangle.draw();
          }
        }
      }

      function start() {
        if (interval) clearInterval(interval);
        if (tris) {
          for (var i = 0; i < tris.length; i++) {
            gsap.killTweensOf(tris[i]);
          }
        }
        initParams();
        initGrid();
        updateAnimationSpeed();
        draw();
      }

      function pause() {
        if (interval) clearInterval(interval);
        for (var i = 0; i < tris.length; i++) {
          if (tris[i].tweenClose) tris[i].tweenClose.kill();
          if (tris[i].tweenOpen) tris[i].tweenOpen.kill();
        }
      }

      function closeAll() {
        var count = 0;
        if (interval) clearInterval(interval);
        for (var i = 0; i < tris.length; i++) {
          if (tris[i].tweenOpen) tris[i].tweenOpen.kill();
          if (tris[i].opened || tris[i].opening) {
            count++;
            tris[i].close("top", 0.8, 0.2 + 0.0015 * count);
          }
        }
      }

      function kill() {
        if (interval) clearInterval(interval);
        for (var i = 0; i < tris.length; i++) {
          gsap.killTweensOf(tris[i]);
          tris[i].alpha = 0;
        }
        draw();
      }

      function updateBackground() {
        var bg = parameters.greenScreen ? "#00ff00" : "#000000";
        document.body.style.backgroundColor = bg;
        C.style.backgroundColor = bg;
      }

      function updateTriangleColors() {
        var activeColors = getActiveColors();
        for (var i = 0; i < tris.length; i++) {
          tris[i].color =
            activeColors[Math.floor(Math.random() * activeColors.length)];
          tris[i].rgb = hexToRgb(tris[i].color);
        }
        draw();
      }

      function applyColorScheme(schemeName) {
        var selected = colorSchemes[schemeName];
        if (selected) {
          parameters.color1 = selected[0];
          parameters.color2 = selected[1];
          parameters.color3 = selected[2];
          parameters.color4 = selected[3];
          parameters.color5 = selected[4];

          if (controllers.color1)
            controllers.color1.setValue(parameters.color1);
          if (controllers.color2)
            controllers.color2.setValue(parameters.color2);
          if (controllers.color3)
            controllers.color3.setValue(parameters.color3);
          if (controllers.color4)
            controllers.color4.setValue(parameters.color4);
          if (controllers.color5)
            controllers.color5.setValue(parameters.color5);

          updateTriangleColors();
        }
      }

      function updateAnimationSpeed() {
        gsap.globalTimeline.timeScale(parameters.animationSpeed);
        if (interval) clearInterval(interval);
        if (parameters.animationSpeed > 0) {
          var activeInterval =
            parameters.trailIntervalCreation / parameters.animationSpeed;
          interval = setInterval(createTrail, activeInterval);
        }
      }

      function updateCamera(time) {
        if (parameters.cameraAnimation === "Static (No Movement)") {
          autoOffsetX = 0;
          autoOffsetY = 0;
          autoScale = 1.0;
          autoRotation = 0;
        } else if (parameters.cameraAnimation === "Smooth Pan") {
          autoOffsetX = Math.sin(time * 0.5) * 80;
          autoOffsetY = Math.cos(time * 0.3) * 40;
          autoScale = 1.0;
          autoRotation = 0;
        } else if (parameters.cameraAnimation === "Breathing Pulse") {
          autoOffsetX = Math.sin(time * 0.2) * 15;
          autoOffsetY = Math.cos(time * 0.2) * 15;
          autoScale = 1.0 + Math.sin(time * 0.4) * 0.15;
          autoRotation = Math.sin(time * 0.1) * 0.02;
        } else if (parameters.cameraAnimation === "Cinematic Drift") {
          autoOffsetX = Math.sin(time * 0.15) * 120;
          autoOffsetY = Math.cos(time * 0.1) * 60;
          autoScale = 0.95 + Math.sin(time * 0.2) * 0.1;
          autoRotation = Math.sin(time * 0.08) * 0.03;
        } else if (parameters.cameraAnimation === "Slow Orbit") {
          autoOffsetX = 0;
          autoOffsetY = 0;
          autoScale = 1.0 + Math.sin(time * 0.2) * 0.06;
          autoRotation = time * 0.02;
        }
      }

      function tick() {
        var now = Date.now();
        var delta = (now - lastTime) / 1000;
        lastTime = now;

        if (delta > 0.1) delta = 0.1;

        accumulatedTime += delta * parameters.animationSpeed;
        updateCamera(accumulatedTime);

        draw();
      }

      function setupInteractions() {
        // Zoom with wheel
        C.addEventListener(
          "wheel",
          function (e) {
            e.preventDefault();
            var zoomFactor = 1.08;
            if (e.deltaY > 0) {
              userScale /= zoomFactor;
            } else {
              userScale *= zoomFactor;
            }
            userScale = Math.max(0.1, Math.min(userScale, 15));
          },
          { passive: false },
        );

        // Drag controls
        C.addEventListener("mousedown", function (e) {
          isDragging = true;
          dragStartX = e.clientX - userOffsetX;
          dragStartY = e.clientY - userOffsetY;
        });

        window.addEventListener("mousemove", function (e) {
          if (isDragging) {
            userOffsetX = e.clientX - dragStartX;
            userOffsetY = e.clientY - dragStartY;
          }
        });

        window.addEventListener("mouseup", function () {
          isDragging = false;
        });

        // Mobile Touch Drag
        C.addEventListener(
          "touchstart",
          function (e) {
            if (e.touches.length === 1) {
              isDragging = true;
              dragStartX = e.touches[0].clientX - userOffsetX;
              dragStartY = e.touches[0].clientY - userOffsetY;
            }
          },
          { passive: true },
        );

        window.addEventListener(
          "touchmove",
          function (e) {
            if (isDragging && e.touches.length === 1) {
              userOffsetX = e.touches[0].clientX - dragStartX;
              userOffsetY = e.touches[0].clientY - dragStartY;
            }
          },
          { passive: true },
        );

        window.addEventListener("touchend", function () {
          isDragging = false;
        });
      }

      function initGUI() {
        gui = new GUI({ title: "Triangle Mesh Settings" });
        gui.width = 300;

        // Presets & Screen Mode Folder
        var presetFolder = gui.addFolder("Presets & Background");
        presetFolder
          .add(parameters, "greenScreen")
          .name("Green Screen (#00ff00)")
          .onChange(updateBackground);

        presetFolder
          .add(parameters, "colorScheme", Object.keys(colorSchemes))
          .name("Color Schemes")
          .onChange(applyColorScheme);

        presetFolder
          .add(parameters, "cameraAnimation", [
            "Static (No Movement)",
            "Smooth Pan",
            "Breathing Pulse",
            "Cinematic Drift",
            "Slow Orbit",
          ])
          .name("Camera Animation");

        // Custom Colors Folder
        var colorFolder = gui.addFolder("Custom Color Picker");
        controllers.color1 = colorFolder
          .addColor(parameters, "color1")
          .name("Color 1")
          .onChange(updateTriangleColors);
        controllers.color2 = colorFolder
          .addColor(parameters, "color2")
          .name("Color 2")
          .onChange(updateTriangleColors);
        controllers.color3 = colorFolder
          .addColor(parameters, "color3")
          .name("Color 3")
          .onChange(updateTriangleColors);
        controllers.color4 = colorFolder
          .addColor(parameters, "color4")
          .name("Color 4")
          .onChange(updateTriangleColors);
        controllers.color5 = colorFolder
          .addColor(parameters, "color5")
          .name("Color 5")
          .onChange(updateTriangleColors);

        // Mesh & Trails Geometry Folder
        var geomFolder = gui.addFolder("Mesh & Trails");
        geomFolder
          .add(parameters, "triW")
          .min(10)
          .max(50)
          .step(1)
          .name("Triangle Width")
          .onChange(start);
        geomFolder
          .add(parameters, "triH")
          .min(10)
          .max(50)
          .step(1)
          .name("Triangle Height")
          .onChange(start);
        geomFolder
          .add(parameters, "trailMaxLength")
          .min(2)
          .max(40)
          .step(1)
          .name("Trail Size")
          .onChange(start);
        geomFolder
          .add(parameters, "trailIntervalCreation")
          .min(50)
          .max(1000)
          .step(50)
          .name("Creation Delay")
          .onChange(start);
        geomFolder
          .add(parameters, "delayBeforeDisappear")
          .min(0.02)
          .max(4)
          .step(0.01)
          .name("Disappear Delay")
          .onChange(start);
        geomFolder
          .add(parameters, "randomAlpha")
          .name("Random Opacity")
          .onChange(start);

        // Speed & Performance Folder
        var perfFolder = gui.addFolder("Performance & Speed");
        perfFolder
          .add(parameters, "animationSpeed")
          .min(0.0)
          .max(3.0)
          .step(0.1)
          .name("Animation Speed")
          .onChange(updateAnimationSpeed);
        perfFolder
          .add(parameters, "dpr")
          .min(0.5)
          .max(3.0)
          .step(0.1)
          .name("DPR (Pixel Ratio)")
          .onChange(function () {
            handleResize();
          });

        // Actions Folder
        var actionsFolder = gui.addFolder("Actions");
        var actions = {
          restart: start,
          pause: pause,
          closeAll: closeAll,
          kill: kill,
          resetView: function () {
            userScale = 1.0;
            userOffsetX = 0.0;
            userOffsetY = 0.0;
            draw();
          },
        };
        actionsFolder.add(actions, "restart").name("Restart");
        actionsFolder.add(actions, "pause").name("Pause");
        actionsFolder.add(actions, "closeAll").name("Close All");
        actionsFolder.add(actions, "kill").name("Kill Grid");
        actionsFolder.add(actions, "resetView").name("Reset View");

        // Collapse some folders initially
        colorFolder.close();
        geomFolder.close();
        perfFolder.close();
        actionsFolder.close();
      }

      // Toggle GUI visibility with 'H' key
      window.addEventListener("keydown", function (e) {
        if (e.key === "h" || e.key === "H") {
          guiVisible = !guiVisible;
          if (guiVisible) {
            gui.show();
          } else {
            gui.hide();
          }
        }
      });

      // Run setup
      initGUI();
      initCanvas("myCanvas");
      start();
    </script>
  </body>
</html>
