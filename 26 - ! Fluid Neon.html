<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Flow Shader - Interactive</title>
    <!-- Google Fonts for premium aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Include Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Include lil-gui for the settings panel -->
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19"></script>

    <style>
        :root {
            --glow-color: #ff00aa;
            --accent-color: #0055ff;
            --bg-glass: rgba(10, 8, 16, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }

        /* HUD Styling */
        #custom-hud {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
            color: #f1f5f9;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            width: 280px;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: bottom left;
            border-left: 3px solid var(--glow-color);
        }

        #custom-hud.minimized {
            width: 180px;
            padding: 12px 16px;
            border-left-width: 3px;
        }

        #custom-hud.minimized .hud-body {
            display: none;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0;
            transition: margin 0.3s;
        }

        #custom-hud:not(.minimized) .hud-header {
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding-bottom: 8px;
        }

        .hud-header h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #fff 30%, rgba(255, 255, 255, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #hud-minimize-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #hud-minimize-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .hud-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.55);
            margin: 0 0 16px 0;
            line-height: 1.5;
            font-weight: 300;
        }

        .hud-stats {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            margin-bottom: 6px;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }

        .stat-value {
            font-family: monospace;
            color: #00ffcc;
            font-weight: 600;
        }

        .hud-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .hud-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #fff;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hud-btn svg {
            transition: transform 0.3s;
        }

        .hud-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .hud-btn:hover svg {
            transform: rotate(-45deg);
        }

        #hud-greenscreen-btn .indicator-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        #hud-greenscreen-btn.active {
            background: rgba(0, 255, 0, 0.15);
            border-color: rgba(0, 255, 0, 0.4);
            color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.15);
        }

        #hud-greenscreen-btn.active .indicator-dot {
            background: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }

        .hud-shortcuts {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 12px;
        }

        .shortcut-item {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .shortcut-item:last-child {
            margin-bottom: 0;
        }

        .key {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            padding: 1px 4px;
            color: #fff;
            font-weight: 500;
        }

        /* lil-gui custom themes */
        .lil-gui {
            --background-color: rgba(10, 8, 16, 0.75) !important;
            --text-color: #e2e8f0 !important;
            --title-background-color: rgba(20, 16, 32, 0.9) !important;
            --widget-color: rgba(30, 25, 50, 0.6) !important;
            --hover-color: var(--glow-color) !important;
            --focus-color: var(--accent-color) !important;
            --number-color: #00ffcc !important;
            --string-color: #ffaa00 !important;
            font-family: 'Outfit', sans-serif !important;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            z-index: 100 !important;
        }
        
        .lil-gui .title {
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <!-- HUD panel overlay -->
    <div id="custom-hud">
        <div class="hud-header">
            <h2>2D Harmonic Flow</h2>
            <button id="hud-minimize-btn" title="Minimize Controls">—</button>
        </div>
        
        <div class="hud-body">
            <p class="hud-desc">An interactive mathematical shader simulation folding space organically.</p>
            
            <div class="hud-stats">
                <div class="stat-row">
                    <span class="stat-label">Zoom Level</span>
                    <span class="stat-value" id="hud-zoom-val">1.00x</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Pan Offset</span>
                    <span class="stat-value" id="hud-offset-val">0.00, 0.00</span>
                </div>
            </div>
            
            <div class="hud-actions">
                <button id="hud-reset-btn" class="hud-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                    Reset View
                </button>
                <button id="hud-greenscreen-btn" class="hud-btn">
                    <span class="indicator-dot"></span>
                    Green Screen
                </button>
            </div>
            
            <div class="hud-shortcuts">
                <div class="shortcut-item">
                    <span class="key">Scroll</span> / <span class="key">Pinch</span> Zoom
                </div>
                <div class="shortcut-item">
                    <span class="key">Drag</span> Pan space
                </div>
                <div class="shortcut-item">
                    <span class="key">Double Click</span> Reset
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- SCENE SETUP ---
        const scene = new THREE.Scene();

        // Use an Orthographic camera for a 2D full-screen shader
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        
        const dpr = Math.min(window.devicePixelRatio, 2);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(dpr);
        document.body.appendChild(renderer.domElement);

        // --- SHADER MATERIAL ---
        
        // Vertex Shader: Simply passes the UV coordinates to the fragment shader
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        // Fragment Shader: Generates the glowing waves
        const fragmentShader = `
            uniform float uTime;
            uniform vec2 uResolution;
            uniform vec3 uColor1; // Primary color
            uniform vec3 uColor2; // Secondary color
            uniform vec3 uBgColor; // Background color
            uniform float uSpeed;
            uniform float uComplexity; // Drives the number of mathematical iterations
            uniform float uDensity;
            uniform float uIntensity;
            
            // Mouse interaction uniforms
            uniform vec2 uMouse;
            uniform float uHoverEffect;

            // Navigation uniforms
            uniform float uZoom;
            uniform vec2 uOffset;
            uniform float uGreenScreen;

            varying vec2 vUv;

            // 2D Rotation matrix
            mat2 rot(float a) {
                float s = sin(a), c = cos(a);
                return mat2(c, -s, s, c);
            }

            void main() {
                // Normalize pixel coordinates
                vec2 p = (gl_FragCoord.xy * 2.0 - uResolution.xy) / min(uResolution.x, uResolution.y);
                vec2 original_p = p; // Store original coordinates for the vignette
                
                // Apply zoom and offset navigation
                p = (p - uOffset) / uZoom;

                vec3 finalColor = vec3(0.0);
                float time = uTime * uSpeed * 0.5;
                
                // Add initial cinematic tilt
                p *= rot(0.2);
                
                // --- MOUSE HOVER EFFECT ---
                if (uHoverEffect > 0.0) {
                    // Normalize mouse coordinates to match the screen space
                    vec2 m = uMouse;
                    m.x *= uResolution.x / min(uResolution.x, uResolution.y);
                    m.y *= uResolution.y / min(uResolution.x, uResolution.y);
                    
                    // Apply zoom and offset to the mouse coordinates
                    m = (m - uOffset) / uZoom;
                    
                    // Apply the same tilt to the mouse coordinates
                    m *= rot(0.2);
                    
                    // Calculate distance between pixel and mouse
                    float mouseDist = length(p - m);
                    
                    // Use smoothstep for a very soft, bounded area of effect
                    float force = smoothstep(1.5, 0.0, mouseDist) * uHoverEffect;
                    
                    // Displacement and twist based on hover
                    p += (p - m) * force * 0.15;
                    p *= rot(force * 0.12);
                }
                
                // --- ITERATIVE FUNCTION SYSTEM (Complex Formula) ---
                float iterations = floor(uComplexity);
                
                for (float i = 1.0; i <= 20.0; i++) {
                    if (i > iterations) break; // Allow dynamic complexity via GUI
                    
                    // Scale and rotate space organically
                    p *= rot(sin(time * 0.05) * 0.1 + 0.08);
                    
                    // --- HARMONIC VORTEX FLUID ---
                    vec2 q = p;
                    
                    // 1. Smooth Vortex twist
                    float dist = length(p);
                    q *= rot(dist * uDensity * 0.25 - time * 0.3);
                    
                    // 2. Harmonic Folds
                    float freq = uDensity * 0.8;
                    
                    // Layer 1 folds
                    q.x += sin(q.y * freq + time * 0.5 + i * 0.15) * 0.5;
                    q.y += cos(q.x * freq - time * 0.5 - i * 0.15) * 0.5;
                    
                    vec2 r = q;
                    // Layer 2 ripples
                    r.x += sin(q.y * freq * 2.0 - time * 0.8) * 0.25;
                    r.y += cos(q.x * freq * 2.0 + time * 0.8) * 0.25;
                    
                    // Combine into a synchronized, rhythmic ribbon
                    float wave = sin(r.x * freq * 1.5 + time) * 0.6 
                               + cos(r.y * freq * 0.5 - time * 0.7) * 0.4;
                    
                    // Calculate distance to the warped geometric boundary
                    float d = abs(r.y - wave);
                    
                    // Complex rendering layer: Hard core + dual soft ambient glows
                    float core = 0.005 / max(d, 0.002);
                    float soft1 = exp(-d * 8.0) * 0.6; 
                    float soft2 = exp(-d * 2.0) * 0.2; 
                    
                    // Dynamic Chromatic Dispersion (Color mapping)
                    float mixFactor = sin(r.x * 3.0 + r.y * 2.0 + time + i * 1.6) * 0.5 + 0.5;
                    vec3 layerColor = mix(uColor1, uColor2, mixFactor);
                    
                    // Accumulate lighting using additive blending
                    float attenuation = 1.0 / (i * 0.6 + 1.0);
                    finalColor += layerColor * (core + soft1 + soft2) * uIntensity * attenuation * 30.0;
                    
                    // Fractal zoom for the next iteration
                    p = r * 1.05; 
                }
                
                // --- POST-PROCESSING & BLENDING ---
                
                if (uGreenScreen > 0.5) {
                    // Apply ACES Filmic HDR Tone Mapping to waves first so they look premium
                    vec3 waveColor = finalColor;
                    waveColor = waveColor * (2.51 * waveColor + 0.03) / (waveColor * (2.43 * waveColor + 0.59) + 0.14);
                    
                    // Blend over pure green background (#00ff00)
                    float alpha = clamp(max(waveColor.r, max(waveColor.g, waveColor.b)), 0.0, 1.0);
                    vec3 greenScreenColor = vec3(0.0, 1.0, 0.0);
                    vec3 blendedColor = mix(greenScreenColor, waveColor, alpha);
                    
                    gl_FragColor = vec4(blendedColor, 1.0);
                } else {
                    // 1. Blend with deep background 
                    finalColor += uBgColor * 0.5;
                    
                    // 2. Cinematic Vignette (darken edges)
                    float vignette = 1.0 - smoothstep(0.5, 2.5, length(original_p));
                    finalColor *= vignette;
                    
                    // 3. ACES Filmic HDR Tone Mapping
                    finalColor = finalColor * (2.51 * finalColor + 0.03) / (finalColor * (2.43 * finalColor + 0.59) + 0.14);

                    gl_FragColor = vec4(finalColor, 1.0);
                }
            }
        `;

        // Define the uniform variables passed to the shader
        const uniforms = {
            uTime: { value: 0.0 },
            uResolution: { value: new THREE.Vector2(window.innerWidth * dpr, window.innerHeight * dpr) },
            uColor1: { value: new THREE.Color('#0055ff') }, // Electric Blue
            uColor2: { value: new THREE.Color('#ff00aa') }, // Hot Pink
            uBgColor: { value: new THREE.Color('#05030a') }, // Very dark background
            uSpeed: { value: 0.3 },
            uComplexity: { value: 8.0 },
            uDensity: { value: 3.2535 },
            uIntensity: { value: 0.03758 },
            uMouse: { value: new THREE.Vector2(0, 0) },
            uHoverEffect: { value: 0.0 }, // Disabled by default
            uZoom: { value: 1.0 },
            uOffset: { value: new THREE.Vector2(0, 0) },
            uGreenScreen: { value: 0.0 }
        };

        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: uniforms,
            depthWrite: false,
            depthTest: false
        });

        // Create a full-screen plane to render the shader on
        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // --- MOUSE & DRAG LOGIC ---
        
        // Use a target vector to smoothly interpolate the actual mouse position
        const targetMouse = new THREE.Vector2(0, 0);

        function updateMousePosition(clientX, clientY) {
            targetMouse.x = (clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(clientY / window.innerHeight) * 2 + 1;
        }

        // Zoom & Drag State
        let targetZoom = 1.0;
        const targetOffset = new THREE.Vector2(0, 0);
        let isDragging = false;
        const prevMouse = new THREE.Vector2(0, 0);

        // Setup DOM event listeners
        const canvas = renderer.domElement;

        function onMouseDown(e) {
            if (e.target.closest('.lil-gui') || e.target.closest('#custom-hud')) return;
            isDragging = true;
            prevMouse.set(e.clientX, e.clientY);
        }

        function onMouseMove(e) {
            updateMousePosition(e.clientX, e.clientY);
            
            if (isDragging) {
                const dx = e.clientX - prevMouse.x;
                const dy = e.clientY - prevMouse.y;
                
                const minDim = Math.min(window.innerWidth, window.innerHeight);
                const factor = 2.0 / minDim;
                
                // Offset shifts with drag. Math guarantees that dragging keeps point pinned to cursor.
                targetOffset.x += dx * factor;
                targetOffset.y -= dy * factor; // WebGL Y is inverted
                
                prevMouse.set(e.clientX, e.clientY);
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);

        // Touch support for dragging and pinch zoom
        let initialTouchDist = 0;
        let initialTouchZoom = 1.0;

        window.addEventListener('touchstart', (e) => {
            if (e.target.closest('.lil-gui') || e.target.closest('#custom-hud')) return;
            
            if (e.touches.length === 1) {
                isDragging = true;
                prevMouse.set(e.touches[0].clientX, e.touches[0].clientY);
                updateMousePosition(e.touches[0].clientX, e.touches[0].clientY);
            } else if (e.touches.length === 2) {
                isDragging = false;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                initialTouchDist = Math.sqrt(dx * dx + dy * dy);
                initialTouchZoom = targetZoom;
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && isDragging) {
                const dx = e.touches[0].clientX - prevMouse.x;
                const dy = e.touches[0].clientY - prevMouse.y;
                
                const minDim = Math.min(window.innerWidth, window.innerHeight);
                const factor = 2.0 / minDim;
                
                targetOffset.x += dx * factor;
                targetOffset.y -= dy * factor;
                
                prevMouse.set(e.touches[0].clientX, e.touches[0].clientY);
                updateMousePosition(e.touches[0].clientX, e.touches[0].clientY);
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (initialTouchDist > 0) {
                    const factor = dist / initialTouchDist;
                    targetZoom = Math.max(0.1, Math.min(50.0, initialTouchZoom * factor));
                }
            }
        }, { passive: true });

        window.addEventListener('touchend', () => {
            isDragging = false;
            initialTouchDist = 0;
        });

        // Wheel zoom
        window.addEventListener('wheel', (e) => {
            if (e.target.closest('.lil-gui') || e.target.closest('#custom-hud')) return;
            
            const zoomFactor = 1.15;
            if (e.deltaY < 0) {
                targetZoom *= zoomFactor;
            } else {
                targetZoom /= zoomFactor;
            }
            
            // Clamp zoom
            targetZoom = Math.max(0.1, Math.min(50.0, targetZoom));
        }, { passive: true });

        // --- LIL-GUI SETTINGS PANEL ---
        
        // State object to hold our GUI values
        const settings = {
            speed: 0.3,
            complexity: 8,
            density: 3.2535,
            intensity: 0.03758,
            hoverEffect: false,
            color1: '#0055ff',
            color2: '#ff00aa',
            bgColor: '#05030a',
            greenScreen: false
        };

        const gui = new lil.GUI({ title: 'Shader Settings' });

        // Animation controls
        const animFolder = gui.addFolder('Complex Formula Settings');
        animFolder.add(settings, 'speed', 0.0, 3.0).name('Speed').onChange(v => uniforms.uSpeed.value = v);
        animFolder.add(settings, 'complexity', 1, 20, 1).name('Math Iterations').onChange(v => uniforms.uComplexity.value = v);
        animFolder.add(settings, 'density', 0.5, 5.0).name('Space Folding').onChange(v => uniforms.uDensity.value = v);
        animFolder.add(settings, 'intensity', 0.001, 0.05).name('Neon Exposure').onChange(v => uniforms.uIntensity.value = v);
        
        // Interactive controls
        const interactiveFolder = gui.addFolder('Interaction');
        interactiveFolder.add(settings, 'hoverEffect').name('Hover Push/Twist').onChange(v => {
            uniforms.uHoverEffect.value = v ? 1.0 : 0.0;
        });

        // Environment controls
        const envFolder = gui.addFolder('Environment');
        const greenscreenController = envFolder.add(settings, 'greenScreen').name('Green Screen Mode').onChange(v => {
            uniforms.uGreenScreen.value = v ? 1.0 : 0.0;
            
            // Sync HUD button state
            if (v) {
                hudGreenscreenBtn.classList.add('active');
            } else {
                hudGreenscreenBtn.classList.remove('active');
            }
        });

        // Color controls
        const colorFolder = gui.addFolder('Colors');
        colorFolder.addColor(settings, 'color1').name('Primary Color').onChange(v => {
            uniforms.uColor1.value.set(v);
            document.documentElement.style.setProperty('--accent-color', v);
        });
        colorFolder.addColor(settings, 'color2').name('Secondary Color').onChange(v => {
            uniforms.uColor2.value.set(v);
            document.documentElement.style.setProperty('--glow-color', v);
        });
        colorFolder.addColor(settings, 'bgColor').name('Background Color').onChange(v => uniforms.uBgColor.value.set(v));

        // Initialize custom css properties to color settings
        document.documentElement.style.setProperty('--accent-color', settings.color1);
        document.documentElement.style.setProperty('--glow-color', settings.color2);

        // Collapse the main GUI panel by default
        gui.close();

        // --- HUD UI WIRING ---
        const hudZoomVal = document.getElementById('hud-zoom-val');
        const hudOffsetVal = document.getElementById('hud-offset-val');
        const hudResetBtn = document.getElementById('hud-reset-btn');
        const hudGreenscreenBtn = document.getElementById('hud-greenscreen-btn');
        const hudMinimizeBtn = document.getElementById('hud-minimize-btn');
        const hud = document.getElementById('custom-hud');

        // Reset navigation
        function resetNavigation() {
            targetZoom = 1.0;
            targetOffset.set(0, 0);
        }

        hudResetBtn.addEventListener('click', resetNavigation);

        // Greenscreen Toggle
        function toggleGreenscreen() {
            settings.greenScreen = !settings.greenScreen;
            uniforms.uGreenScreen.value = settings.greenScreen ? 1.0 : 0.0;
            
            // Sync lil-gui controller
            greenscreenController.setValue(settings.greenScreen);
        }

        hudGreenscreenBtn.addEventListener('click', toggleGreenscreen);

        // Minimize HUD
        hudMinimizeBtn.addEventListener('click', () => {
            const isMin = hud.classList.toggle('minimized');
            hudMinimizeBtn.textContent = isMin ? '+' : '—';
            hudMinimizeBtn.title = isMin ? 'Expand Controls' : 'Minimize Controls';
        });

        // Double click to reset navigation
        window.addEventListener('dblclick', (e) => {
            if (e.target.closest('.lil-gui') || e.target.closest('#custom-hud')) return;
            resetNavigation();
        });

        // --- ANIMATION LOOP ---
        
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            // Smoothly interpolate the mouse position (Lerp) for a fluid, dragged effect
            uniforms.uMouse.value.x += (targetMouse.x - uniforms.uMouse.value.x) * 0.08;
            uniforms.uMouse.value.y += (targetMouse.y - uniforms.uMouse.value.y) * 0.08;

            // Smoothly interpolate zoom and offset (lerp) for premium physics feel
            uniforms.uZoom.value += (targetZoom - uniforms.uZoom.value) * 0.1;
            uniforms.uOffset.value.x += (targetOffset.x - uniforms.uOffset.value.x) * 0.1;
            uniforms.uOffset.value.y += (targetOffset.y - uniforms.uOffset.value.y) * 0.1;
            
            // Update HUD values in real time if not minimized
            if (!hud.classList.contains('minimized')) {
                hudZoomVal.textContent = uniforms.uZoom.value.toFixed(2) + 'x';
                hudOffsetVal.textContent = uniforms.uOffset.value.x.toFixed(2) + ', ' + uniforms.uOffset.value.y.toFixed(2);
            }
            
            // Update time uniform for fluid motion
            uniforms.uTime.value = clock.getElapsedTime();
            
            renderer.render(scene, camera);
        }
        
        // --- RESIZE HANDLER ---
        
        window.addEventListener('resize', () => {
            // Update renderer size
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // Update resolution uniform for the shader
            uniforms.uResolution.value.set(
                window.innerWidth * dpr,
                window.innerHeight * dpr
            );
        });

        // Start the animation loop
        animate();
    </script>
</body>
</html>
