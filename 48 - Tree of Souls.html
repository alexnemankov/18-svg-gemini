<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotus KIFS Raymarching</title>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- lil-gui Library -->
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.umd.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <script>
        // Setup Three.js Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
        camera.position.z = 1;

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Settings Object for lil-gui
        const params = {
            dpr: 0.7,
            camSpeed: 0.2,
            morphSpeed: 1.0,
            iterations: 16,
            rotX: 0.57,
            rotY: 2.31,
            rotZ: 0.47,
            kMult: 8.55,
            clampMin: -0.65,
            clampMax: 79.46,
            expandX: 0.23,
            expandY: 1.75,
            expandZ: 0.65,
            thickness: -2.06,
            bounds: 5.9,
            
            // Interaction & Background
            zoom: 1.0,
            offsetX: 0.0,
            offsetY: 0.0,
            greenscreen: false,
            
            // Colors
            colorScheme: 'Cosmic Hologram',
            baseColor: '#8c80a6',
            colorAmp: '#738066',
            coreColor: '#804000',
            particleColor: '#fffaf2',
            freqX: 1.0,
            freqY: 1.0,
            freqZ: 1.0,
            phaseX: 0.0,
            phaseY: 0.33,
            phaseZ: 0.67
        };

        // Initialize Pixel Ratio
        renderer.setPixelRatio(params.dpr);

        // Uniforms for the Shader
        const uniforms = {
            u_time: { value: 0.0 },
            u_resolution: { value: new THREE.Vector2(window.innerWidth * params.dpr, window.innerHeight * params.dpr) },
            u_camSpeed: { value: params.camSpeed },
            u_morphSpeed: { value: params.morphSpeed },
            u_iterations: { value: params.iterations },
            u_rot: { value: new THREE.Vector3(params.rotX, params.rotY, params.rotZ) },
            u_kMult: { value: params.kMult },
            u_clamp: { value: new THREE.Vector2(params.clampMin, params.clampMax) },
            u_expand: { value: new THREE.Vector3(params.expandX, params.expandY, params.expandZ) },
            u_thickness: { value: params.thickness },
            u_bounds: { value: params.bounds },
            
            // Interaction/Background/Color Uniforms
            u_zoom: { value: params.zoom },
            u_offset: { value: new THREE.Vector2(params.offsetX, params.offsetY) },
            u_bgColor: { value: new THREE.Color('#000000') },
            u_baseColor: { value: new THREE.Color(params.baseColor) },
            u_colorAmp: { value: new THREE.Color(params.colorAmp) },
            u_freq: { value: new THREE.Vector3(params.freqX, params.freqY, params.freqZ) },
            u_phase: { value: new THREE.Vector3(params.phaseX, params.phaseY, params.phaseZ) },
            u_coreColor: { value: new THREE.Color(params.coreColor) },
            u_particleColor: { value: new THREE.Color(params.particleColor) }
        };

        // Fullscreen Quad Geometry
        const geometry = new THREE.PlaneGeometry(2, 2);

        // Vertex Shader
        const vertexShader = `
            void main() {
                gl_Position = vec4(position, 1.0);
            }
        `;

        // Fragment Shader (Converted from Shadertoy GLSL)
        const fragmentShader = `
            precision highp float;

            uniform float u_time;
            uniform vec2 u_resolution;

            // GUI Parameters
            uniform float u_camSpeed;
            uniform float u_morphSpeed;
            uniform int u_iterations;
            uniform vec3 u_rot;
            uniform float u_kMult;
            uniform vec2 u_clamp;
            uniform vec3 u_expand;
            uniform float u_thickness;
            uniform float u_bounds;

            // Interaction/Background/Color Parameters
            uniform float u_zoom;
            uniform vec2 u_offset;
            uniform vec3 u_bgColor;
            uniform vec3 u_baseColor;
            uniform vec3 u_colorAmp;
            uniform vec3 u_freq;
            uniform vec3 u_phase;
            uniform vec3 u_coreColor;
            uniform vec3 u_particleColor;

            // 2D Rotation matrix
            mat2 rot(float a) {
                float s = sin(a), c = cos(a);
                return mat2(c, -s, s, c);
            }

            // Distance function: "Fractal Lotus" / Crystal KIFS
            vec2 map(vec3 p) {
                vec3 q = p;
                float scale = 2.3;
                
                // Smooth, organic morphing over time
                q += vec3(sin(u_time * 0.4 * u_morphSpeed) * 0.15, cos(u_time * 0.3 * u_morphSpeed) * 0.15, 0.0);
                
                // Kaleidoscopic Iterated Function System (KIFS)
                for(int i = 0; i < 20; i++) {
                    if (i >= u_iterations) break;

                    // Fold space to create complex symmetry
                    q = abs(q);
                    
                    // Rotation angles for crystalline web
                    q.xy *= rot(u_rot.x);
                    q.xz *= rot(u_rot.y);
                    q.yz *= rot(u_rot.z);
                    
                    // Spherical Inversion mapping
                    float r2 = dot(q, q);
                    
                    // Clamp boundaries for smooth geometry
                    float k = u_kMult / clamp(r2, u_clamp.x, u_clamp.y);
                    
                    // Scale and transform
                    q *= k;
                    scale *= k;
                    
                    // Expansion vector pushing space into lotus shape
                    q -= u_expand;
                }
                
                // Extract continuous smooth cylindrical rays
                float rays = (length(q.xy) - u_thickness) / scale;
                
                // Spherical bounding volume
                float bounds = length(p) - u_bounds;
                
                // Intersect rays with bounds
                float d = max(rays, bounds);
                
                return vec2(d, 0.0);
            }

            void main() {
                // Normalize pixel coordinates (-1 to 1) based on screen space
                vec2 uv_screen = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / u_resolution.y;
                
                // Apply Zoom & Drag
                vec2 uv = (uv_screen - u_offset) / u_zoom;
                
                // Cinematic camera with orbit
                vec3 ro = vec3(sin(u_time * u_camSpeed) * 3.2, 
                               sin(u_time * u_camSpeed * 0.75) * 1.0, 
                               cos(u_time * u_camSpeed) * 3.2);
                               
                // Camera targeting logic
                vec3 target = vec3(0.0);
                vec3 fwd = normalize(target - ro);
                vec3 right = normalize(cross(vec3(0.0, 1.0, 0.0), fwd));
                vec3 up = cross(fwd, right);
                
                // Subtle camera roll
                vec2 rolledUV = uv * rot(sin(u_time * 0.1) * 0.15);
                
                // Ray direction
                vec3 rd = normalize(fwd + right * rolledUV.x + up * rolledUV.y);
                
                // Raymarching initialization
                float t = 0.0;
                vec3 glow = vec3(0.0);
                
                // Raymarching loop
                for(int i = 0; i < 75; i++) {
                    vec3 p = ro + rd * t;
                    float d = map(p).x;
                    
                    // Holographic base color logic
                    float holoDriver = length(p) * 0.5 - dot(normalize(p), rd) * 0.6 + u_time * 0.2;
                    
                    vec3 baseColor = u_baseColor;
                    vec3 colorAmp  = u_colorAmp;
                    vec3 freq      = u_freq;
                    vec3 phase     = u_phase;
                    
                    vec3 currentCol = baseColor + colorAmp * cos(6.28318 * (freq * holoDriver + phase));
                    
                    // Warm Gold/Amber core glow
                    currentCol += u_coreColor * exp(-abs(length(p)) * 2.2);
                    
                    // White data pulses
                    float pulseWave = sin(p.x * 12.0 - u_time * 1.5) * sin(p.y * 10.0 + u_time * 2.0) * sin(length(p) * 12.0 - u_time * 0.5);
                    float sharpPulse = pow(max(0.6, pulseWave), 15.0);
                    
                    currentCol += vec3(3.5) * sharpPulse * exp(-abs(d) * 40.0);
                    
                    // Volumetric glow
                    float halo = 0.005 / (0.002 + abs(d));
                    float highlight = 0.001 / (0.0001 + d * d);
                    
                    glow += currentCol * (halo + highlight * 0.15);
                    
                    t += d * 0.6;
                    
                    if(t > 7.5) break;
                }
                
                // Global intensity
                vec3 color = glow * 0.056;
                
                // Deep vignette
                color *= 1.0 - 0.3 * length(uv_screen);
                
                // ACES Tonemapping
                color = (color * (2.51 * color + 0.03)) / (color * (2.43 * color + 0.59) + 0.14);
                
                // 3D Particles Layer
                vec3 particles = vec3(0.0);
                
                for(float i = 0.0; i < 100.0; i++) {
                    vec3 h = fract(sin(vec3(i, i * 13.3, i * 31.7)) * 43758.5453);
                    
                    vec3 dir = normalize(h * 2.0 - 1.0);
                    float radius = 1.3 + h.x * 1.8;
                    vec3 pos = dir * radius;
                    
                    pos.xy *= rot(u_time * 0.12 + h.y * 3.0);
                    pos.xz *= rot(u_time * 0.18 + h.z * 3.0);
                    
                    vec3 w = pos - ro;
                    float proj = dot(rd, w);
                    
                    if(proj > 0.0 && proj < t) {
                        float dRay = length(w - rd * proj);
                        float size = 0.0025 + h.z * 0.029;
                        
                        float core = smoothstep(size, size * 0.4, dRay);
                        float particleGlow = exp(-dRay * 180.0) * 0.4;
                        
                        particles += (core + particleGlow) * u_particleColor;
                    }
                }
                
                color += particles;
                
                // Gamma correction
                color = pow(color, vec3(1.0 / 2.2));
                
                // Composite over background color
                float alpha = clamp(max(color.r, max(color.g, color.b)), 0.0, 1.0);
                vec3 finalColor = mix(u_bgColor, color, alpha);
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // GUI Setup
        const gui = new lil.GUI({ title: 'Scene Settings' });
        
        gui.add(params, 'dpr', 0.1, 2.0, 0.1).name('Resolution (DPR)').onChange(v => {
            renderer.setPixelRatio(v);
            onWindowResize(); // Update resolution uniform
        });

        const camFolder = gui.addFolder('Camera & Animation');
        camFolder.add(params, 'camSpeed', 0.0, 1.0).name('Camera Speed').onChange(v => uniforms.u_camSpeed.value = v);
        camFolder.add(params, 'morphSpeed', 0.0, 3.0).name('Morph Speed').onChange(v => uniforms.u_morphSpeed.value = v);

        const mathFolder = gui.addFolder('Fractal Math (KIFS)');
        mathFolder.add(params, 'iterations', 1, 20, 1).name('Iterations').onChange(v => uniforms.u_iterations.value = v);
        mathFolder.add(params, 'rotX', 0.0, 6.28).name('Rotation X').onChange(v => uniforms.u_rot.value.x = v);
        mathFolder.add(params, 'rotY', 0.0, 6.28).name('Rotation Y').onChange(v => uniforms.u_rot.value.y = v);
        mathFolder.add(params, 'rotZ', 0.0, 6.28).name('Rotation Z').onChange(v => uniforms.u_rot.value.z = v);
        mathFolder.add(params, 'kMult', 1.0, 15.0).name('Multiplier').onChange(v => uniforms.u_kMult.value = v);
        mathFolder.add(params, 'clampMin', -2.0, 2.0).name('Clamp Min').onChange(v => uniforms.u_clamp.value.x = v);
        mathFolder.add(params, 'clampMax', 10.0, 100.0).name('Clamp Max').onChange(v => uniforms.u_clamp.value.y = v);

        const geoFolder = gui.addFolder('Fractal Geometry');
        geoFolder.add(params, 'expandX', 0.0, 3.0).name('Expand X').onChange(v => uniforms.u_expand.value.x = v);
        geoFolder.add(params, 'expandY', 0.0, 3.0).name('Expand Y').onChange(v => uniforms.u_expand.value.y = v);
        geoFolder.add(params, 'expandZ', 0.0, 3.0).name('Expand Z').onChange(v => uniforms.u_expand.value.z = v);
        geoFolder.add(params, 'thickness', -5.0, 1.0).name('Ray Thickness').onChange(v => uniforms.u_thickness.value = v);
        geoFolder.add(params, 'bounds', 1.0, 10.0).name('Bounding Sphere').onChange(v => uniforms.u_bounds.value = v);

        // Colors Folder
        const colorFolder = gui.addFolder('Colors');
        
        const presets = {
            'Cosmic Hologram': {
                baseColor: '#8c80a6',
                colorAmp: '#738066',
                coreColor: '#804000',
                particleColor: '#fffaf2',
                freq: [1.0, 1.0, 1.0],
                phase: [0.0, 0.33, 0.67]
            },
            'Solar Flare': {
                baseColor: '#993d00',
                colorAmp: '#665200',
                coreColor: '#ff2200',
                particleColor: '#ffe6b3',
                freq: [1.0, 1.0, 0.5],
                phase: [0.0, 0.15, 0.3]
            },
            'Neon Cyberpunk': {
                baseColor: '#800080',
                colorAmp: '#008080',
                coreColor: '#ff007f',
                particleColor: '#b3ffff',
                freq: [1.2, 0.8, 1.0],
                phase: [0.0, 0.5, 0.25]
            },
            'Deep Ocean': {
                baseColor: '#002666',
                colorAmp: '#006652',
                coreColor: '#00aaff',
                particleColor: '#d9f2ff',
                freq: [0.8, 1.0, 1.2],
                phase: [0.5, 0.25, 0.0]
            },
            'Emerald Forest': {
                baseColor: '#004d00',
                colorAmp: '#334d00',
                coreColor: '#66ff00',
                particleColor: '#e6ffb3',
                freq: [1.0, 1.5, 0.8],
                phase: [0.3, 0.0, 0.6]
            }
        };

        const schemeController = colorFolder.add(params, 'colorScheme', Object.keys(presets).concat('Custom')).name('Color Scheme');
        
        const baseColorController = colorFolder.addColor(params, 'baseColor').name('Base Color').onChange(() => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
        });
        const colorAmpController = colorFolder.addColor(params, 'colorAmp').name('Color Amp').onChange(() => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
        });
        const coreColorController = colorFolder.addColor(params, 'coreColor').name('Core Glow').onChange(() => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
        });
        const particleColorController = colorFolder.addColor(params, 'particleColor').name('Particles').onChange(() => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
        });

        const freqFolder = colorFolder.addFolder('Holographic Frequency');
        freqFolder.close();
        freqFolder.add(params, 'freqX', 0.1, 3.0, 0.1).name('Freq X').listen().onChange(() => { params.colorScheme = 'Custom'; schemeController.updateDisplay(); });
        freqFolder.add(params, 'freqY', 0.1, 3.0, 0.1).name('Freq Y').listen().onChange(() => { params.colorScheme = 'Custom'; schemeController.updateDisplay(); });
        freqFolder.add(params, 'freqZ', 0.1, 3.0, 0.1).name('Freq Z').listen().onChange(() => { params.colorScheme = 'Custom'; schemeController.updateDisplay(); });

        const phaseFolder = colorFolder.addFolder('Holographic Phase');
        phaseFolder.close();
        phaseFolder.add(params, 'phaseX', 0.0, 1.0, 0.01).name('Phase X').listen().onChange(() => { params.colorScheme = 'Custom'; schemeController.updateDisplay(); });
        phaseFolder.add(params, 'phaseY', 0.0, 1.0, 0.01).name('Phase Y').listen().onChange(() => { params.colorScheme = 'Custom'; schemeController.updateDisplay(); });
        phaseFolder.add(params, 'phaseZ', 0.0, 1.0, 0.01).name('Phase Z').listen().onChange(() => { params.colorScheme = 'Custom'; schemeController.updateDisplay(); });

        schemeController.onChange(value => {
            if (value !== 'Custom') {
                const preset = presets[value];
                params.baseColor = preset.baseColor;
                params.colorAmp = preset.colorAmp;
                params.coreColor = preset.coreColor;
                params.particleColor = preset.particleColor;
                params.freqX = preset.freq[0];
                params.freqY = preset.freq[1];
                params.freqZ = preset.freq[2];
                params.phaseX = preset.phase[0];
                params.phaseY = preset.phase[1];
                params.phaseZ = preset.phase[2];
                
                baseColorController.updateDisplay();
                colorAmpController.updateDisplay();
                coreColorController.updateDisplay();
                particleColorController.updateDisplay();
            }
        });

        // Background Folder
        const bgFolder = gui.addFolder('Background');
        bgFolder.add(params, 'greenscreen').name('Greenscreen').onChange(value => {
            document.body.style.backgroundColor = value ? '#00ff00' : '#000000';
        });

        // Interactive View Folder
        const controlsFolder = gui.addFolder('Interactive View');
        controlsFolder.add(params, 'zoom', 0.1, 10.0, 0.1).name('Zoom').listen();
        controlsFolder.add(params, 'offsetX', -5.0, 5.0, 0.01).name('Offset X').listen();
        controlsFolder.add(params, 'offsetY', -5.0, 5.0, 0.01).name('Offset Y').listen();

        // Collapse GUI by default
        gui.close();

        // Handle Window Resize
        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            const dpr = renderer.getPixelRatio();
            uniforms.u_resolution.value.set(window.innerWidth * dpr, window.innerHeight * dpr);
        }
        window.addEventListener('resize', onWindowResize);

        // Interaction: Zoom & Drag
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        // Prevent browser context menu on canvas to allow smooth dragging with any click
        window.addEventListener('contextmenu', (e) => {
            if (!gui.domElement.contains(e.target)) {
                e.preventDefault();
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (gui.domElement.contains(e.target)) return;
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            // Convert screen movement to offset changes
            const dragSensitivity = 0.003 / params.zoom;
            params.offsetX += deltaX * dragSensitivity;
            params.offsetY -= deltaY * dragSensitivity;

            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        window.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        // Touch Interaction Support for Mobile
        window.addEventListener('touchstart', (e) => {
            if (gui.domElement.contains(e.target)) return;
            if (e.touches.length === 1) {
                isDragging = true;
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            if (e.touches.length === 1) {
                const deltaX = e.touches[0].clientX - previousMousePosition.x;
                const deltaY = e.touches[0].clientY - previousMousePosition.y;

                const dragSensitivity = 0.003 / params.zoom;
                params.offsetX += deltaX * dragSensitivity;
                params.offsetY -= deltaY * dragSensitivity;

                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }, { passive: true });

        window.addEventListener('touchend', () => {
            isDragging = false;
        });

        window.addEventListener('wheel', (e) => {
            if (gui.domElement.contains(e.target)) return;
            e.preventDefault();
            const zoomFactor = 1.1;
            if (e.deltaY < 0) {
                params.zoom *= zoomFactor;
            } else {
                params.zoom /= zoomFactor;
            }
            params.zoom = Math.max(0.1, Math.min(params.zoom, 10.0));
        }, { passive: false });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            uniforms.u_time.value = clock.getElapsedTime();

            // Sync interaction uniforms
            uniforms.u_zoom.value = params.zoom;
            uniforms.u_offset.value.set(params.offsetX, params.offsetY);
            
            // Sync background uniform
            if (params.greenscreen) {
                uniforms.u_bgColor.value.setHex(0x00ff00);
            } else {
                uniforms.u_bgColor.value.setHex(0x000000);
            }
            
            // Sync color uniforms
            uniforms.u_baseColor.value.set(params.baseColor);
            uniforms.u_colorAmp.value.set(params.colorAmp);
            uniforms.u_freq.value.set(params.freqX, params.freqY, params.freqZ);
            uniforms.u_phase.value.set(params.phaseX, params.phaseY, params.phaseZ);
            uniforms.u_coreColor.value.set(params.coreColor);
            uniforms.u_particleColor.value.set(params.particleColor);

            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
