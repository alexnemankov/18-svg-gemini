      // https://gist.github.com/mattdesl/e399418558b2b52b58f5edeafea3c16c
      const length = bufferGeometry.attributes.position.array.length;
      const count = length / 3;
      const bary = [];
      for (let i = 0; i < count; i++) {
        bary.push(0, 0, 1, 0, 1, 0, 1, 0, 0);
      }
      const aCenter = new Float32Array(bary);
      bufferGeometry.setAttribute("aCenter", new THREE.BufferAttribute(aCenter, 3));
    };

    #define GLSLIFY 1
    //
    // GLSL textureless classic 3D noise "cnoise",
    // with an RSL-style periodic variant "pnoise".
    // Author:  Stefan Gustavson (stefan.gustavson@liu.se)
    // Version: 2011-10-11
    //
    // Many thanks to Ian McEwan of Ashima Arts for the
    // ideas for permutation and gradient selection.
    //
    // Copyright (c) 2011 Stefan Gustavson. All rights reserved.
    // Distributed under the MIT license. See LICENSE file.
    // https://github.com/ashima/webgl-noise
    //

    vec3 mod289(vec3 x)
    {
      return x - floor(x * (1.0 / 289.0)) * 289.0;
    }

    vec4 mod289(vec4 x)
    {
      return x - floor(x * (1.0 / 289.0)) * 289.0;
    }

    vec4 permute(vec4 x)
    {
      return mod289(((x*34.0)+1.0)*x);
    }

    vec4 taylorInvSqrt(vec4 r)
    {
      return 1.79284291400159 - 0.85373472095314 * r;
    }

    vec3 fade(vec3 t) {
      return t*t*t*(t*(t*6.0-15.0)+10.0);
    }

    // Classic Perlin noise
    float cnoise(vec3 P)
    {
      vec3 Pi0 = floor(P); // Integer part for indexing
      vec3 Pi1 = Pi0 + vec3(1.0); // Integer part + 1
      Pi0 = mod289(Pi0);
      Pi1 = mod289(Pi1);
      vec3 Pf0 = fract(P); // Fractional part for interpolation
      vec3 Pf1 = Pf0 - vec3(1.0); // Fractional part - 1.0
      vec4 ix = vec4(Pi0.x, Pi1.x, Pi0.x, Pi1.x);
      vec4 iy = vec4(Pi0.yy, Pi1.yy);
      vec4 iz0 = Pi0.zzzz;
      vec4 iz1 = Pi1.zzzz;

      vec4 ixy = permute(permute(ix) + iy);
      vec4 ixy0 = permute(ixy + iz0);
      vec4 ixy1 = permute(ixy + iz1);

      vec4 gx0 = ixy0 * (1.0 / 7.0);
      vec4 gy0 = fract(floor(gx0) * (1.0 / 7.0)) - 0.5;
      gx0 = fract(gx0);
      vec4 gz0 = vec4(0.5) - abs(gx0) - abs(gy0);
      vec4 sz0 = step(gz0, vec4(0.0));
      gx0 -= sz0 * (step(0.0, gx0) - 0.5);
      gy0 -= sz0 * (step(0.0, gy0) - 0.5);

      vec4 gx1 = ixy1 * (1.0 / 7.0);
      vec4 gy1 = fract(floor(gx1) * (1.0 / 7.0)) - 0.5;
      gx1 = fract(gx1);
      vec4 gz1 = vec4(0.5) - abs(gx1) - abs(gy1);
      vec4 sz1 = step(gz1, vec4(0.0));
      gx1 -= sz1 * (step(0.0, gx1) - 0.5);
      gy1 -= sz1 * (step(0.0, gy1) - 0.5);

      vec3 g000 = vec3(gx0.x,gy0.x,gz0.x);
      vec3 g100 = vec3(gx0.y,gy0.y,gz0.y);
      vec3 g010 = vec3(gx0.z,gy0.z,gz0.z);
      vec3 g110 = vec3(gx0.w,gy0.w,gz0.w);
      vec3 g001 = vec3(gx1.x,gy1.x,gz1.x);
      vec3 g101 = vec3(gx1.y,gy1.y,gz1.y);
      vec3 g011 = vec3(gx1.z,gy1.z,gz1.z);
      vec3 g111 = vec3(gx1.w,gy1.w,gz1.w);

      vec4 norm0 = taylorInvSqrt(vec4(dot(g000, g000), dot(g010, g010), dot(g100, g100), dot(g110, g110)));
      g000 *= norm0.x;
      g010 *= norm0.y;
      g100 *= norm0.z;
      g110 *= norm0.w;
      vec4 norm1 = taylorInvSqrt(vec4(dot(g001, g001), dot(g011, g011), dot(g101, g101), dot(g111, g111)));
      g001 *= norm1.x;
      g011 *= norm1.y;
      g101 *= norm1.z;
      g111 *= norm1.w;

      float n000 = dot(g000, Pf0);
      float n100 = dot(g100, vec3(Pf1.x, Pf0.yz));
      float n010 = dot(g010, vec3(Pf0.x, Pf1.y, Pf0.z));
      float n110 = dot(g110, vec3(Pf1.xy, Pf0.z));
      float n001 = dot(g001, vec3(Pf0.xy, Pf1.z));
      float n101 = dot(g101, vec3(Pf1.x, Pf0.y, Pf1.z));
      float n011 = dot(g011, vec3(Pf0.x, Pf1.yz));
      float n111 = dot(g111, Pf1);

      vec3 fade_xyz = fade(Pf0);
      vec4 n_z = mix(vec4(n000, n100, n010, n110), vec4(n001, n101, n011, n111), fade_xyz.z);
      vec2 n_yz = mix(n_z.xy, n_z.zw, fade_xyz.y);
      float n_xyz = mix(n_yz.x, n_yz.y, fade_xyz.x);
      return 2.2 * n_xyz;
    }

    // https://tympanus.net/codrops/2019/10/29/real-time-multiside-refraction-in-three-steps/
    vec4 getWorldPosition(mat4 modelMat,vec3 pos){
        vec4 worldPosition=modelMat*vec4(pos,1.);
        return worldPosition;
    }

    // https://tympanus.net/codrops/2019/10/29/real-time-multiside-refraction-in-three-steps/
    vec3 getEyeVector(mat4 modelMat,vec3 pos,vec3 camPos){
        vec4 worldPosition=getWorldPosition(modelMat,pos);
        vec3 eyeVector=normalize(worldPosition.xyz-camPos);
        return eyeVector;
    }

    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vEyeVector;

    uniform float uNoiseDensity;

    void main(){
        // 噪声扭曲顶点
        vec3 noise=pow(cnoise(normal),3.)*normal*uNoiseDensity;
        vec3 newPos=position+noise;
        
        vec4 modelPosition=modelMatrix*vec4(newPos,1.);
        vec4 viewPosition=viewMatrix*modelPosition;
        vec4 projectedPosition=projectionMatrix*viewPosition;
        gl_Position=projectedPosition;
        
        vUv=uv;
        
        // 获取N和I
        vNormal=normalize(normalMatrix*normal);
        vEyeVector=getEyeVector(modelMatrix,position,cameraPosition);
    }
    `;

    const gridIcosahedronShapeFragmentShader = `
    #define GLSLIFY 1
    // https://community.khronos.org/t/getting-the-normal-with-dfdx-and-dfdy/70177
    vec3 computeNormal(vec3 normal){
        vec3 X=dFdx(normal);
        vec3 Y=dFdy(normal);
        vec3 cNormal=normalize(cross(X,Y));
        return cNormal;
    }

    // http://glslsandbox.com/e#47182.0
    vec2 hash22(vec2 p){
        p=fract(p*vec2(5.3983,5.4427));
        p+=dot(p.yx,p.xy+vec2(21.5351,14.3137));
        return fract(vec2(p.x*p.y*95.4337,p.x*p.y*97.597));
    }

    // https://www.shadertoy.com/view/4scSW4
    float fresnel(float bias,float scale,float power,vec3 I,vec3 N)
    {
        return bias+scale*pow(1.+dot(I,N),power);
    }

    uniform float uTime;
    uniform vec2 uMouse;
    uniform vec2 uResolution;
    uniform sampler2D uTexture;
    uniform float uRefractionStrength;
    uniform vec3 uColor1; // Custom shape tint color

    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vEyeVector;

    void main(){
        vec2 newUv=vUv;
        
        // 平滑着色
        vec3 cNormal=computeNormal(vNormal);
        
        // 漫反射
        float diffuse=dot(cNormal,vec3(1.));
        
        // 折射随机度
        vec2 rand=hash22(vec2(floor(diffuse*10.)));
        vec2 strength=vec2(sign((rand.x-.5))+(rand.x-.5)*.6,sign((rand.y-.5))+(rand.y-.5)*.6);
        newUv=strength*gl_FragCoord.xy/vec2(1000.);
        
        // 折射
        vec3 refraction=.3*refract(vEyeVector,cNormal,1./3.);
        newUv+=refraction.xy;
        
        // 材质贴图
        vec4 texture=texture2D(uTexture,newUv);
        
        // Apply custom shape tint
        vec4 color=texture * vec4(uColor1, 1.0);
        
        // 菲涅尔反射
        float F=fresnel(0.,1.,2.,vEyeVector,cNormal);
        color.rgb*=(1.-F);
        
        gl_FragColor=color;
    }
    `;

    const gridIcosahedronEdgeFragmentShader = `
    uniform float uTime;
    uniform vec2 uMouse;
    uniform vec2 uResolution;
    uniform float uWidth;
    uniform vec3 uEdgeColor; // Custom edge color uniform

    varying vec2 vUv;
    varying vec3 vCenter;

    // https://threejs.org/examples/?q=wire#webgl_materials_wireframe
    float edgeFactorTri(){
        vec3 d=fwidth(vCenter);
        vec3 a3=smoothstep(d*(uWidth-.5),d*(uWidth+.5),vCenter);
        return min(min(a3.x,a3.y),a3.z);
    }

    float invert(float n){
        return 1.-n;
    }

    void main(){
        float line=invert(edgeFactorTri());
        if(line<.1){
            discard;
        }
        vec4 color=vec4(uEdgeColor * line, 1.);
        gl_FragColor=color;
    }
    `;

    const gridIcosahedronPostprocessingFragmentShader = `
    #define GLSLIFY 1
    // https://gist.github.com/patriciogonzalezvolatile/670c22f3966e662d2f83
    float hash(vec2 p){return fract(1e4*sin(17.*p.x+p.y*.1)*(.1+abs(sin(p.y*13.+p.x))));}

    vec3 blackAndWhite(vec3 color){
        return vec3((color.r+color.g+color.b)/5.);
    }

    vec4 RGBShift(sampler2D t,vec2 rUv,vec2 gUv,vec2 bUv,float isBlackWhite){
        vec4 color1=texture2D(t,rUv);
        vec4 color2=texture2D(t,gUv);
        vec4 color3=texture2D(t,bUv);
        if(isBlackWhite==1.){
            color1.rgb=blackAndWhite(color1.rgb);
            color2.rgb=blackAndWhite(color2.rgb);
            color3.rgb=blackAndWhite(color3.rgb);
        }
        vec4 color=vec4(color1.r,color2.g,color3.b,color2.a);
        return color;
    }

    uniform float uTime;
    uniform vec2 uMouse;
    uniform vec2 uResolution;
    uniform sampler2D tDiffuse;
    uniform float uRGBShift;
    uniform float uGreenScreen; // 1.0 = enable greenscreen background, 0.0 = normal

    varying vec2 vUv;

    void main(){
        vec2 newUv=vUv;
        
        // RGB扭曲
        vec2 rUv=vUv+vec2(.01)*uRGBShift;
        vec2 gUv=vUv+vec2(0.);
        vec2 bUv=vUv+vec2(.01)*uRGBShift*-1.;
        vec4 color=RGBShift(tDiffuse,rUv,gUv,bUv,1.);
        
        float mask = color.a;

        if (uGreenScreen == 1.0) {
            if (mask < 0.05) {
                // Perfect, solid keyable greenscreen background
                gl_FragColor = vec4(0.0, 1.0, 0.0, 1.0);
            } else {
                // Object with noise overlay
                float noise=hash(newUv+uTime)*.15;
                color.rgb+=vec3(noise);
                gl_FragColor = vec4(color.rgb, 1.0);
            }
        } else {
            // Normal mode: noise background
            float noise=hash(newUv+uTime)*.15;
            color.rgb+=vec3(noise);
            gl_FragColor=vec4(color.rgb, 1.0);
        }
    }
    `;

      createPerspectiveCamera() {
        const { perspectiveCameraParams, cameraPosition, lookAtPosition } = this;
        const { fov, near, far } = perspectiveCameraParams;
        const aspect = calcAspect(this.container);
        const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
        camera.position.copy(cameraPosition);
        camera.lookAt(lookAtPosition);
        this.camera = camera;
      }
      
      createOrthographicCamera() {
        const { orthographicCameraParams, cameraPosition, lookAtPosition } = this;
        const { left, right, top, bottom, near, far } = orthographicCameraParams;
        const camera = new THREE.OrthographicCamera(
          left,
          right,
          top,
          bottom,
          near,
          far
        );
        camera.position.copy(cameraPosition);
        camera.lookAt(lookAtPosition);
        this.camera = camera;
      }
      
      updateOrthographicCameraParams() {
        const { container } = this;
        const { zoom, near, far } = this.orthographicCameraParams;
        const aspect = calcAspect(container);
        this.orthographicCameraParams = {
          left: -zoom * aspect,
          right: zoom * aspect,
          top: zoom,
          bottom: -zoom,
          near,
          far,
          zoom
        };
      }
      
      createRenderer(useWebGL1 = false) {
        const { rendererParams } = this;
        const { outputEncoding, config } = rendererParams;
        const renderer = !useWebGL1
          ? new THREE.WebGLRenderer(config)
          : new THREE.WebGL1Renderer(config);
        renderer.setSize(this.container.clientWidth, this.container.clientHeight);
        renderer.outputEncoding = outputEncoding;
        this.resizeRendererToDisplaySize();
        this.container?.appendChild(renderer.domElement);
        this.renderer = renderer;
        this.renderer.setClearColor(0x000000, 0);
      }
      
      enableShadow() {
        this.renderer.shadowMap.enabled = true;
      }
      
      resizeRendererToDisplaySize() {
        const { renderer } = this;
        if (!renderer) {
          return;
        }
        const canvas = renderer.domElement;
        const pixelRatio = renderer.getPixelRatio();
        const { clientWidth, clientHeight } = canvas;
        const width = (clientWidth * pixelRatio) | 0;
        const height = (clientHeight * pixelRatio) | 0;
        const isResizeNeeded = canvas.width !== width || canvas.height !== height;
        if (isResizeNeeded) {
          renderer.setSize(clientWidth, clientHeight, false);
        }
        return isResizeNeeded;
      }
      
      createMesh(meshObject, container = this.scene) {
        const {
          geometry = new THREE.BoxGeometry(1, 1, 1),
          material = new THREE.MeshStandardMaterial({
            color: new THREE.Color("#d9dfc8")
          }),
          position = new THREE.Vector3(0, 0, 0)
        } = meshObject;
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(position);
        container.add(mesh);
        return mesh;
      }
      
      createLight() {
        const dirLight = new THREE.DirectionalLight(
          new THREE.Color("#ffffff"),
          0.5
        );
        dirLight.position.set(0, 50, 0);
        this.scene.add(dirLight);
        const ambiLight = new THREE.AmbientLight(new THREE.Color("#ffffff"), 0.4);
        this.scene.add(ambiLight);
      }
      
      createOrbitControls() {
        const controls = new OrbitControls(this.camera, this.renderer.domElement);
        const { lookAtPosition } = this;
        controls.target.copy(lookAtPosition);
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.screenSpacePanning = true;
        controls.update();
        this.controls = controls;
      }
      
      addListeners() {
        this.onResize();
      }
      
      onResize() {
        window.addEventListener("resize", (e) => {
          if (this.camera instanceof THREE.PerspectiveCamera) {
            const aspect = calcAspect(this.container);
            const camera = this.camera;
            camera.aspect = aspect;
            camera.updateProjectionMatrix();
          } else if (this.camera instanceof THREE.OrthographicCamera) {
            this.updateOrthographicCameraParams();
            const camera = this.camera;
            const {
              left,
              right,
              top,
              bottom,
              near,
              far
            } = this.orthographicCameraParams;
            camera.left = left;
            camera.right = right;
            camera.top = top;
            camera.bottom = bottom;
            camera.near = near;
            camera.far = far;
            camera.updateProjectionMatrix();
          }
          this.renderer.setSize(
            this.container.clientWidth,
            this.container.clientHeight
          );
          if (this.composer) {
            this.composer.setSize(
              this.container.clientWidth,
              this.container.clientHeight
            );
          }
        });
      }
      
      update() {
        console.log("animation");
      }
      
      setLoop() {
        this.renderer.setAnimationLoop(() => {
          this.resizeRendererToDisplaySize();
          this.update();
          if (this.controls) {
            this.controls.update();
          }
          if (this.stats) {
            this.stats.update();
          }
          if (this.composer) {
            this.composer.render();
          } else {
            this.renderer.render(this.scene, this.camera);
          }
        });
      }
      
      createText(
        text = "",
        config,
        material = new THREE.MeshStandardMaterial({
          color: "#ffffff"
        })
      ) {
        const geo = new THREE.TextGeometry(text, config);
        const mesh = new THREE.Mesh(geo, material);
        return mesh;
      }
      
      createAudioSource() {
        const listener = new THREE.AudioListener();
        this.camera.add(listener);
        const sound = new THREE.Audio(listener);
        this.sound = sound;
      }
      
      loadAudio(url) {
        const loader = new THREE.AudioLoader();
        return new Promise((resolve) => {
          loader.load(url, (buffer) => {
            this.sound.setBuffer(buffer);
            resolve(buffer);
          });
        });
      }
      
      loadModel(url) {
        const loader = new GLTFLoader();
        return new Promise((resolve, reject) => {
          loader.load(
            url,
            (gltf) => {
              const model = gltf.scene;
              resolve(model);
            },
            undefined,
            (err) => {
              console.log(err);
              reject();
            }
          );
        });
      }
      
      loadFBXModel(url) {
        const loader = new FBXLoader();
        return new Promise((resolve, reject) => {
          loader.load(
            url,
            (obj) => {
              resolve(obj);
            },
            undefined,
            (err) => {
              console.log(err);
              reject();
            }
          );
        });
      }
      
      loadFont(url) {
        const loader = new THREE.FontLoader();
        return new Promise((resolve) => {
          loader.load(url, (font) => {
            resolve(font);
          });
        });
      }
      
      createRaycaster() {
        this.raycaster = new THREE.Raycaster();
        this.trackMousePos();
      }
      
      trackMousePos() {
        window.addEventListener("mousemove", (e) => {
          this.setMousePos(e);
        });
        window.addEventListener("mouseout", () => {
          this.clearMousePos();
        });
        window.addEventListener("mouseleave", () => {
          this.clearMousePos();
        });
        window.addEventListener(
          "touchstart",
          (e) => {
            this.setMousePos(e.touches[0]);
          },
          { passive: false }
        );
        window.addEventListener("touchmove", (e) => {
          this.setMousePos(e.touches[0]);
        });
        window.addEventListener("touchend", () => {
          this.clearMousePos();
        });
      }
      
      setMousePos(e) {
        const { x, y } = getNormalizedMousePos(e);
        this.mousePos.x = x;
        this.mousePos.y = y;
      }
      
      clearMousePos() {
        this.mousePos.x = -100000;
        this.mousePos.y = -100000;
      }
      
      getInterSects() {
        this.raycaster.setFromCamera(this.mousePos, this.camera);
        const intersects = this.raycaster.intersectObjects(
          this.scene.children,
          true
        );
        return intersects;
      }
      
      onChooseIntersect(target) {
        const intersects = this.getInterSects();
        const intersect = intersects[0];
        if (!intersect || !intersect.face) {
          return null;
        }
        const { object } = intersect;
        return target === object ? intersect : null;
      }
    }

    class GridIcosahedron extends Base {
      clock;
      gridIcosahedronShapeMaterial;
      gridIcosahedronEdgeMaterial;
      customPass;
      params;
      mouseSpeed;
      customTime;
      cameraDistance;
      gui;
      animationPresetController;
      
      constructor(sel, debug = false) {
        super(sel, debug);
        this.clock = new THREE.Clock();
        this.customTime = 0;
        this.cameraDistance = 2.2;
        this.cameraPosition = new THREE.Vector3(0, 0, 2.2);
        
        // Settings parameters
        this.params = {
          greenscreen: false,
          colorPreset: "Cyber Synthwave",
          shapeColor: colorPresets["Cyber Synthwave"].shapeColor,
          edgeColor: colorPresets["Cyber Synthwave"].edgeColor,
          animationPreset: "Slow Orbit",
          animationSpeed: 1.0,
          dpr: Math.min(window.devicePixelRatio, 2.0),
          uNoiseDensity: 0
        };
        
        this.mouseSpeed = 0;
      }
      
      init() {
        this.createScene();
        this.createPerspectiveCamera();
        this.createRenderer();
        this.createGridIcosahedronShapeMaterial();
        this.createGridIcosahedronEdgeMaterial();
        this.createIcoShape();
        this.createIcoEdge();
        this.createPostprocessingEffect();
        this.createLight();
        this.trackMouseSpeed();
        this.createOrbitControls();
        this.createSettingsUI();
        this.addListeners();
        this.addKeyboardShortcut();
        this.updateColors();
        this.setLoop();
      }
      
      createGridIcosahedronShapeMaterial() {
        const loader = new THREE.TextureLoader();
        loader.setCrossOrigin("anonymous");
        
        const proceduralFallback = () => {
          console.warn("Using procedural fallback texture due to CORS/load error.");
          const canvas = document.createElement("canvas");
          canvas.width = 256;
          canvas.height = 256;
          const ctx = canvas.getContext("2d");
          const grad = ctx.createLinearGradient(0, 0, 256, 256);
          grad.addColorStop(0, "#ff007f");
          grad.addColorStop(0.5, "#7b00ff");
          grad.addColorStop(1, "#00f6ff");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, 256, 256);
          
          ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
          ctx.lineWidth = 4;
          for (let i = 0; i <= 256; i += 32) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, 256);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(256, i);
            ctx.stroke();
          }
          
          const fallbackTex = new THREE.CanvasTexture(canvas);
          fallbackTex.wrapS = fallbackTex.wrapT = THREE.MirroredRepeatWrapping;
          if (this.gridIcosahedronShapeMaterial) {
            this.gridIcosahedronShapeMaterial.uniforms.uTexture.value = fallbackTex;
            fallbackTex.needsUpdate = true;
          }
          return fallbackTex;
        };

        let texture;
        try {
          texture = loader.load(
            gridIcosahedronTextureUrl,
            (tex) => {
              tex.wrapS = tex.wrapT = THREE.MirroredRepeatWrapping;
            },
            undefined,
            (err) => {
              proceduralFallback();
            }
          );
          texture.wrapS = texture.wrapT = THREE.MirroredRepeatWrapping;
        } catch (e) {
          texture = proceduralFallback();
        }

        const gridIcosahedronShapeMaterial = new THREE.ShaderMaterial({
          vertexShader: gridIcosahedronShapeVertexShader,
          fragmentShader: gridIcosahedronShapeFragmentShader,
          side: THREE.DoubleSide,
          uniforms: {
            uTime: { value: 0 },
            uMouse: { value: new THREE.Vector2(0, 0) },
            uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uTexture: { value: texture },
            uRefractionStrength: { value: 0.2 },
            uNoiseDensity: { value: this.params.uNoiseDensity },
            uColor1: { value: new THREE.Color(this.params.shapeColor) }
          }
        });
        this.gridIcosahedronShapeMaterial = gridIcosahedronShapeMaterial;
      }
      
      createGridIcosahedronEdgeMaterial() {
        const gridIcosahedronEdgeMaterial = new THREE.ShaderMaterial({
          vertexShader: gridIcosahedronEdgeVertexShader,
          fragmentShader: gridIcosahedronEdgeFragmentShader,
          side: THREE.DoubleSide,
          uniforms: {
            uTime: { value: 0 },
            uMouse: { value: new THREE.Vector2(0, 0) },
            uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uWidth: { value: 2 },
            uNoiseDensity: { value: this.params.uNoiseDensity },
            uEdgeColor: { value: new THREE.Color(this.params.edgeColor) }
          }
        });
        this.gridIcosahedronEdgeMaterial = gridIcosahedronEdgeMaterial;
      }
      
      createIcoShape() {
        const geometry = new THREE.IcosahedronBufferGeometry(1, 1);
        const material = this.gridIcosahedronShapeMaterial;
        this.createMesh({
          geometry,
          material
        });
      }
      
      createIcoEdge() {
        const geometry = new THREE.IcosahedronBufferGeometry(1.001, 1);
        getBaryCoord(geometry);
        const material = this.gridIcosahedronEdgeMaterial;
        this.createMesh({
          geometry,
          material
        });
      }
      
      createPostprocessingEffect() {
        const composer = new EffectComposer(this.renderer);
        const renderPass = new RenderPass(this.scene, this.camera);
        composer.addPass(renderPass);
        
        const customPass = new ShaderPass({
          vertexShader: gridIcosahedronPostprocessingVertexShader,
          fragmentShader: gridIcosahedronPostprocessingFragmentShader,
          uniforms: {
            tDiffuse: { value: null },
            uTime: { value: 0 },
            uRGBShift: { value: 0.3 },
            uGreenScreen: { value: 0.0 }
          }
        });
        customPass.renderToScreen = true;
        composer.addPass(customPass);
        this.composer = composer;
        this.customPass = customPass;
      }
      
      createOrbitControls() {
        super.createOrbitControls();
        
        // Auto-pause active camera preset animation when the user manually drags or zooms
        this.controls.addEventListener("start", () => {
          if (this.params.animationPreset !== "Static") {
            if (this.animationPresetController) {
              this.animationPresetController.setValue("Static");
            }
          }
        });
      }
      
      update() {
        const delta = this.clock.getDelta();
        // Scale custom time by animation speed parameter
        this.customTime += delta * this.params.animationSpeed;
        const t = this.customTime;
        const mousePos = this.mousePos;
        const mouseSpeed = this.mouseSpeed * 5;
        
        if (this.gridIcosahedronShapeMaterial) {
          this.gridIcosahedronShapeMaterial.uniforms.uTime.value = t;
          this.gridIcosahedronShapeMaterial.uniforms.uMouse.value = mousePos;
          
          // Mesh rotation scaled by customTime (which respects speed)
          this.scene.rotation.x = t / 15;
          this.scene.rotation.y = t / 15;
          
          gsap.to(this.gridIcosahedronShapeMaterial.uniforms.uNoiseDensity, {
            value: mouseSpeed,
            duration: 2
          });
          gsap.to(this.gridIcosahedronEdgeMaterial.uniforms.uNoiseDensity, {
            value: mouseSpeed,
            duration: 2
          });
        }
        
        if (this.customPass) {
          this.customPass.uniforms.uTime.value = t;
          gsap.to(this.customPass.uniforms.uRGBShift, {
            value: mouseSpeed / 10,
            duration: 2
          });
        }

        // Camera smooth animations
        const preset = this.params.animationPreset;
        if (preset !== "Static") {
          const dist = this.cameraDistance;
          
          if (preset === "Slow Orbit") {
            const speed = 0.3;
            const angle = t * speed;
            this.camera.position.x = Math.sin(angle) * dist;
            this.camera.position.z = Math.cos(angle) * dist;
            this.camera.position.y = 0;
            this.camera.lookAt(0, 0, 0);
          } else if (preset === "Floating Wave") {
            const speed = 0.2;
            const angle = t * speed;
            this.camera.position.x = Math.sin(angle) * dist;
            this.camera.position.z = Math.cos(angle) * dist;
            this.camera.position.y = Math.sin(t * 0.4) * 0.5;
            this.camera.lookAt(0, 0, 0);
          } else if (preset === "Breathing Zoom") {
            // Get current camera direction relative to lookAt target
            const dir = new THREE.Vector3().subVectors(this.camera.position, this.controls.target).normalize();
            if (dir.lengthSq() === 0) dir.set(0, 0, 1);
            const dynamicDist = dist + Math.sin(t * 0.45) * 0.45;
            this.camera.position.copy(this.controls.target).addScaledVector(dir, dynamicDist);
            this.camera.lookAt(0, 0, 0);
          } else if (preset === "Cinematic Path") {
            const speed = 0.25;
            const angle = t * speed;
            this.camera.position.x = Math.sin(angle) * dist;
            this.camera.position.z = Math.cos(angle) * dist;
            this.camera.position.y = Math.sin(2 * angle) * 0.6;
            this.camera.lookAt(0, 0, 0);
          }
          
          if (this.controls) {
            this.controls.target.set(0, 0, 0);
          }
        } else {
          // If Static, keep the camera distance updated dynamically so zoom transitions smoothly
          if (this.controls) {
            this.cameraDistance = this.camera.position.distanceTo(this.controls.target);
          }
        }
      }
      
      trackMouseSpeed() {
        let lastMouseX = -1;
        let lastMouseY = -1;
        let mouseSpeed = 0;
        window.addEventListener("mousemove", (e) => {
          const mousex = e.pageX;
          const mousey = e.pageY;
          if (lastMouseX > -1) {
            mouseSpeed = Math.max(
              Math.abs(mousex - lastMouseX),
              Math.abs(mousey - lastMouseY)
            );
            this.mouseSpeed = mouseSpeed / 100;
          }
          lastMouseX = mousex;
          lastMouseY = mousey;
        });
        document.addEventListener("mouseleave", () => {
          this.mouseSpeed = 0;
        });
      }
      
      createSettingsUI() {
        const gui = new GUI({ title: "Grid Icosahedron Settings", width: 320 });
        this.gui = gui;
        
        gui.domElement.style.position = "absolute";
        gui.domElement.style.top = "10px";
        gui.domElement.style.right = "10px";
        
        // Greenscreen
        gui.add(this.params, "greenscreen")
          .name("Enable Greenscreen")
          .onChange((value) => {
            if (this.customPass) {
              this.customPass.uniforms.uGreenScreen.value = value ? 1.0 : 0.0;
            }
            this.updateColors();
          });
          
        // Presets Dropdown
        const colorPresetController = gui.add(this.params, "colorPreset", [...Object.keys(colorPresets), "Custom"])
          .name("Color Scheme")
          .onChange((val) => {
            if (val !== "Custom") {
              const preset = colorPresets[val];
              this.params.shapeColor = preset.shapeColor;
              this.params.edgeColor = preset.edgeColor;
              
              shapeColorController.setValue(preset.shapeColor);
              edgeColorController.setValue(preset.edgeColor);
            }
            this.updateColors();
          });
          
        // Custom color options
        const shapeColorController = gui.addColor(this.params, "shapeColor")
          .name("Shape Tint")
          .onChange((val) => {
            this.params.colorPreset = "Custom";
            colorPresetController.setValue("Custom");
            this.updateColors();
          });
          
        const edgeColorController = gui.addColor(this.params, "edgeColor")
          .name("Edge Color")
          .onChange((val) => {
            this.params.colorPreset = "Custom";
            colorPresetController.setValue("Custom");
            this.updateColors();
          });

        // Animation speed
        gui.add(this.params, "animationSpeed", 0.0, 3.0, 0.05)
          .name("Speed Multiplier");

        // Camera Animation Presets
        this.animationPresetController = gui.add(this.params, "animationPreset", [
          "Static",
          "Slow Orbit",
          "Floating Wave",
          "Breathing Zoom",
          "Cinematic Path"
        ]).name("Camera Motion");
        
        // DPR setting
        gui.add(this.params, "dpr", 0.5, 3.0, 0.1)
          .name("Pixel Ratio (DPR)")
          .onChange((val) => {
            this.renderer.setPixelRatio(val);
            if (this.composer) {
              this.composer.setSize(this.container.clientWidth, this.container.clientHeight);
            }
          });
      }
      
      updateColors() {
        const shapeColor = new THREE.Color(this.params.shapeColor);
        const edgeColor = new THREE.Color(this.params.edgeColor);
        
        if (this.gridIcosahedronShapeMaterial) {
          this.gridIcosahedronShapeMaterial.uniforms.uColor1.value.copy(shapeColor);
        }
        if (this.gridIcosahedronEdgeMaterial) {
          this.gridIcosahedronEdgeMaterial.uniforms.uEdgeColor.value.copy(edgeColor);
        }
        
        // Update container HTML backgrounds
        const container = this.container;
        if (container) {
          if (this.params.greenscreen) {
            container.style.background = "#00ff00";
            this.renderer.setClearColor(0x00ff00, 1.0);
          } else {
            const preset = colorPresets[this.params.colorPreset];
            if (preset) {
              container.style.background = preset.background;
            } else {
              container.style.background = "linear-gradient(135deg, #111115 0%, #050507 100%)";
            }
            this.renderer.setClearColor(0x000000, 0.0);
          }
        }
      }
      
      addKeyboardShortcut() {
        window.addEventListener("keydown", (e) => {
          if (e.key === "h" || e.key === "H") {
            if (this.gui) {
              if (this.gui._hidden) {
                this.gui.show();
              } else {
                this.gui.hide();
              }
            }
          }
        });
      }
    }

    const start = () => {
      const gridIcosahedron = new GridIcosahedron(".grid-icosahedron", false);
      gridIcosahedron.init();
    };

    start();
  </script>
