<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Saturn Scene</title>
    <!-- Import maps polyfill -->
    <script
      async
      src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"
    ></script>
    <!-- Define import maps for Three.js and lil-gui -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
          "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
        }
      }
    </script>
    <style>
      @import url(https://fonts.googleapis.com/css?family=Open+Sans:800);

      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #172533;
        font-family: "Open Sans", sans-serif;
      }

      #world {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(#2a3340, #172533);
        transition: background 0.3s ease;
      }

      #credits {
        position: absolute;
        width: 100%;
        margin: auto;
        bottom: 0;
        margin-bottom: 20px;
        font-family: "Open Sans", sans-serif;
        color: #f7e1be;
        font-size: 0.7em;
        text-transform: uppercase;
        text-align: center;
        line-height: 1.5;
        letter-spacing: 2px;
        pointer-events: none;
      }
      #credits a {
        color: #5fc4d0;
        pointer-events: auto;
        text-decoration: none;
      }
      #credits a:hover {
        color: #fb5d24;
      }
    </style>
  </head>
  <body>
    <div id="world"></div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import GUI from "lil-gui";

      // Global variables
      var scene, renderer, camera, saturn, light, ambientLight, container;
      var WIDTH = window.innerWidth;
      var HEIGHT = window.innerHeight;
      var controls;
      var gui;
      var guiVisible = true;

      // Parameters to customize the planet
      var parameters = {
        // Geometry params
        minRadius: 30,
        maxRadius: 50,
        minSpeed: 0.015,
        maxSpeed: 0.025,
        particles: 300,
        minSize: 0.1,
        maxSize: 2,

        // Custom adjustments
        greenScreen: false,
        dpr: Math.min(window.devicePixelRatio, 2.0),
        animationSpeed: 1.0,
        colorScheme: "Cosmic Original",
        cameraAnimation: "Slow Orbit",

        // Color pickers (synced with preset)
        planetColor: "#ee5624",
        particleColor1: "#8fc999",
        particleColor2: "#5fc4d0",
        particleColor3: "#ee5624",
        particleColor4: "#faff70",
      };

      var controllers = {};

      function getMat(color) {
        return new THREE.MeshStandardMaterial({
          color: color,
          roughness: 0.9,
          emissive: 0x270000,
          flatShading: true,
        });
      }

      function getRandomColor() {
        var choices = [
          parameters.particleColor1,
          parameters.particleColor2,
          parameters.particleColor3,
          parameters.particleColor4,
        ];
        var colVal = choices[Math.floor(Math.random() * choices.length)];
        return new THREE.Color(colVal);
      }

      // Initialise the world
      function initWorld() {
        // SCENE
        scene = new THREE.Scene();

        // CAMERA
        camera = new THREE.PerspectiveCamera(75, WIDTH / HEIGHT, 0.1, 2000);
        camera.position.z = 100;

        // RENDERER
        renderer = new THREE.WebGLRenderer({
          alpha: true,
          antialias: true,
        });
        renderer.setPixelRatio(parameters.dpr);
        renderer.setSize(WIDTH, HEIGHT);
        renderer.shadowMap.enabled = true;

        container = document.getElementById("world");
        container.appendChild(renderer.domElement);

        // LIGHT
        ambientLight = new THREE.AmbientLight(0x663344, 2);
        scene.add(ambientLight);

        light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(200, 100, 200);
        light.castShadow = true;
        light.shadow.camera.left = -400;
        light.shadow.camera.right = 400;
        light.shadow.camera.top = 400;
        light.shadow.camera.bottom = -400;
        light.shadow.camera.near = 1;
        light.shadow.camera.far = 1000;
        light.shadow.mapSize.width = 2048;
        light.shadow.mapSize.height = 2048;
        scene.add(light);

        // CONTROLS
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // CREATE THE OBJECT
        saturn = new Saturn();
        saturn.mesh.rotation.x = 0.2;
        saturn.mesh.rotation.z = 0.2;
        scene.add(saturn.mesh);

        // HANDLE SCREEN RESIZE
        window.addEventListener("resize", handleWindowResize, false);

        // KEYBOARD UI TOGGLE
        window.addEventListener("keydown", function (e) {
          if (e.key === "h" || e.key === "H") {
            guiVisible = !guiVisible;
            if (guiVisible) {
              gui.show();
            } else {
              gui.hide();
            }
          }
        });

        // START THE LOOP
        loop();
      }

      // Saturn Object
      var Saturn = function () {
        // Planet geometry (tetrahedron with vertex displacement)
        var geomPlanet = new THREE.TetrahedronGeometry(20, 2);
        var position = geomPlanet.attributes.position;
        var noise = 5;
        for (var i = 0; i < position.count; i++) {
          var x = position.getX(i);
          var y = position.getY(i);
          var z = position.getZ(i);
          position.setXYZ(
            i,
            x + -noise / 2 + Math.random() * noise,
            y + -noise / 2 + Math.random() * noise,
            z + -noise / 2 + Math.random() * noise,
          );
        }
        position.needsUpdate = true;
        geomPlanet.computeVertexNormals();

        // create a new material for the planet
        var matPlanet = getMat(new THREE.Color(parameters.planetColor));
        this.planet = new THREE.Mesh(geomPlanet, matPlanet);

        this.ring = new THREE.Mesh();
        this.nParticles = 0;

        // create the particles to populate the ring
        this.updateParticlesCount();

        // Create a global mesh to hold the planet and the ring
        this.mesh = new THREE.Object3D();
        this.mesh.add(this.planet);
        this.mesh.add(this.ring);

        this.planet.castShadow = true;
        this.planet.receiveShadow = true;

        // update the position of the particles
        this.updateParticlesRotation();
      };

      Saturn.prototype.updateParticlesCount = function () {
        if (this.nParticles < parameters.particles) {
          // Add particles
          for (var i = this.nParticles; i < parameters.particles; i++) {
            var p = new Particle();
            p.mesh.rotation.x = Math.random() * Math.PI;
            p.mesh.rotation.y = Math.random() * Math.PI;
            p.mesh.position.y = -2 + Math.random() * 4;
            this.ring.add(p.mesh);
          }
        } else {
          // Remove particles
          while (this.nParticles > parameters.particles) {
            var m = this.ring.children[this.nParticles - 1];
            this.ring.remove(m);
            m.userData.po = null;
            this.nParticles--;
          }
        }
        this.nParticles = parameters.particles;
        this.angleStep = (Math.PI * 2) / this.nParticles;
        this.updateParticlesDefiniton();
      };

      Saturn.prototype.updateParticlesDefiniton = function () {
        for (var i = 0; i < this.nParticles; i++) {
          var m = this.ring.children[i];
          var s =
            parameters.minSize +
            Math.random() * (parameters.maxSize - parameters.minSize);
          m.scale.set(s, s, s);

          // set a random distance
          m.userData.distance =
            parameters.minRadius +
            Math.random() * (parameters.maxRadius - parameters.minRadius);
          // give a unique angle to each particle
          m.userData.angle = this.angleStep * i;
          // set a speed proportionally to the distance
          m.userData.angularSpeed = rule3(
            m.userData.distance,
            parameters.minRadius,
            parameters.maxRadius,
            parameters.minSpeed,
            parameters.maxSpeed,
          );
        }
      };

      Saturn.prototype.updateParticlesColors = function () {
        var colors = [
          new THREE.Color(parameters.particleColor1),
          new THREE.Color(parameters.particleColor2),
          new THREE.Color(parameters.particleColor3),
          new THREE.Color(parameters.particleColor4),
        ];
        for (var i = 0; i < this.ring.children.length; i++) {
          var m = this.ring.children[i];
          if (m.material) {
            var randomColor = colors[Math.floor(Math.random() * colors.length)];
            m.material.color.copy(randomColor);
          }
        }
      };

      Saturn.prototype.updatePlanetColor = function () {
        if (this.planet && this.planet.material) {
          this.planet.material.color.set(parameters.planetColor);
        }
      };

      var Particle = function () {
        var s = 1;
        var geom,
          random = Math.random();

        if (random < 0.25) {
          geom = new THREE.BoxGeometry(s, s, s);
        } else if (random < 0.5) {
          geom = new THREE.CylinderGeometry(0, s, s * 2, 4, 1);
        } else if (random < 0.75) {
          geom = new THREE.TetrahedronGeometry(s, 2);
        } else {
          geom = new THREE.BoxGeometry(s / 6, s, s);
        }

        var color = getRandomColor();
        var mat = getMat(color);

        this.mesh = new THREE.Mesh(geom, mat);
        this.mesh.receiveShadow = true;
        this.mesh.castShadow = true;
        this.mesh.userData.po = this;
      };

      Saturn.prototype.updateParticlesRotation = function () {
        // increase the rotation of each particle and update its position
        for (var i = 0; i < this.nParticles; i++) {
          var m = this.ring.children[i];
          m.userData.angle +=
            m.userData.angularSpeed * parameters.animationSpeed;

          var posX = Math.cos(m.userData.angle) * m.userData.distance;
          var posZ = Math.sin(m.userData.angle) * m.userData.distance;
          m.position.x = posX;
          m.position.z = posZ;

          m.rotation.x += Math.random() * 0.05 * parameters.animationSpeed;
          m.rotation.y += Math.random() * 0.05 * parameters.animationSpeed;
          m.rotation.z += Math.random() * 0.05 * parameters.animationSpeed;
        }
      };

      function loop() {
        // Rotate planet
        saturn.planet.rotation.y -= 0.01 * parameters.animationSpeed;
        saturn.updateParticlesRotation();

        // Apply camera animations
        if (parameters.cameraAnimation === "Slow Orbit") {
          controls.autoRotate = true;
          controls.autoRotateSpeed = 0.5 * parameters.animationSpeed;
        } else if (parameters.cameraAnimation === "Floating Orbit") {
          controls.autoRotate = true;
          controls.autoRotateSpeed = 0.3 * parameters.animationSpeed;
          var time = Date.now() * 0.001 * parameters.animationSpeed;
          var targetY = Math.sin(time * 0.5) * 15;
          camera.position.y = THREE.MathUtils.lerp(
            camera.position.y,
            targetY,
            0.02 * parameters.animationSpeed,
          );
        } else {
          controls.autoRotate = false;
        }

        if (parameters.cameraAnimation === "Breathing Zoom") {
          var time = Date.now() * 0.001 * parameters.animationSpeed;
          var targetRadius = 100 + Math.sin(time * 0.5) * 35;
          var toCam = new THREE.Vector3().subVectors(
            camera.position,
            controls.target,
          );
          var len = toCam.length();
          if (len > 0) {
            toCam.setLength(
              THREE.MathUtils.lerp(
                len,
                targetRadius,
                0.02 * parameters.animationSpeed,
              ),
            );
            camera.position.copy(controls.target).add(toCam);
          }
        } else if (parameters.cameraAnimation === "Cinematic Pan") {
          var time = Date.now() * 0.001 * parameters.animationSpeed;
          var targetX = Math.sin(time * 0.4) * 20;
          var targetY = Math.cos(time * 0.2) * 10;
          controls.target.x = THREE.MathUtils.lerp(
            controls.target.x,
            targetX,
            0.02 * parameters.animationSpeed,
          );
          controls.target.y = THREE.MathUtils.lerp(
            controls.target.y,
            targetY,
            0.02 * parameters.animationSpeed,
          );
        }

        controls.update();
        renderer.render(scene, camera);

        requestAnimationFrame(loop);
      }

      function handleWindowResize() {
        HEIGHT = window.innerHeight;
        WIDTH = window.innerWidth;
        renderer.setSize(WIDTH, HEIGHT);
        camera.aspect = WIDTH / HEIGHT;
        camera.updateProjectionMatrix();
      }

      function rule3(v, vmin, vmax, tmin, tmax) {
        var nv = Math.max(Math.min(v, vmax), vmin);
        var dv = vmax - vmin;
        var pc = dv === 0 ? 0 : (nv - vmin) / dv;
        var dt = tmax - tmin;
        var tv = tmin + pc * dt;
        return tv;
      }

      function updateBackground() {
        var worldDiv = document.getElementById("world");
        if (parameters.greenScreen) {
          worldDiv.style.background = "#00ff00";
        } else {
          var color1, color2;
          switch (parameters.colorScheme) {
            case "Cosmic Original":
              color1 = "#2a3340";
              color2 = "#172533";
              break;
            case "Cyberpunk Neon":
              color1 = "#1b0c24";
              color2 = "#09030d";
              break;
            case "Solar Flare":
              color1 = "#200800";
              color2 = "#080200";
              break;
            case "Deep Ocean":
              color1 = "#05101a";
              color2 = "#010408";
              break;
            case "Forest Jade":
              color1 = "#0a1c0f";
              color2 = "#030704";
              break;
            default:
              color1 = "#2a3340";
              color2 = "#172533";
          }
          worldDiv.style.background =
            "linear-gradient(" + color1 + ", " + color2 + ")";
        }
      }

      function applyColorScheme(schemeName) {
        var schemes = {
          "Cosmic Original": {
            planetColor: "#ee5624",
            particleColor1: "#8fc999",
            particleColor2: "#5fc4d0",
            particleColor3: "#ee5624",
            particleColor4: "#faff70",
          },
          "Cyberpunk Neon": {
            planetColor: "#ff007f",
            particleColor1: "#00ffff",
            particleColor2: "#bd00ff",
            particleColor3: "#39ff14",
            particleColor4: "#ffaa00",
          },
          "Solar Flare": {
            planetColor: "#cc1100",
            particleColor1: "#ffcc00",
            particleColor2: "#ff6600",
            particleColor3: "#ff3300",
            particleColor4: "#331100",
          },
          "Deep Ocean": {
            planetColor: "#0d2b45",
            particleColor1: "#203c56",
            particleColor2: "#546a7b",
            particleColor3: "#00a8cc",
            particleColor4: "#00ffc4",
          },
          "Forest Jade": {
            planetColor: "#00471b",
            particleColor1: "#2e8b57",
            particleColor2: "#3cb371",
            particleColor3: "#ffd700",
            particleColor4: "#adff2f",
          },
        };

        var selected = schemes[schemeName];
        if (selected) {
          parameters.planetColor = selected.planetColor;
          parameters.particleColor1 = selected.particleColor1;
          parameters.particleColor2 = selected.particleColor2;
          parameters.particleColor3 = selected.particleColor3;
          parameters.particleColor4 = selected.particleColor4;

          if (controllers.planetColor)
            controllers.planetColor.setValue(selected.planetColor);
          if (controllers.particleColor1)
            controllers.particleColor1.setValue(selected.particleColor1);
          if (controllers.particleColor2)
            controllers.particleColor2.setValue(selected.particleColor2);
          if (controllers.particleColor3)
            controllers.particleColor3.setValue(selected.particleColor3);
          if (controllers.particleColor4)
            controllers.particleColor4.setValue(selected.particleColor4);

          saturn.updatePlanetColor();
          saturn.updateParticlesColors();
          updateBackground();
        }
      }

      function initGUI() {
        gui = new GUI({ title: "Saturn Settings" });
        gui.width = 300;

        // Presets & Screen Mode
        var presetFolder = gui.addFolder("Presets & Background");
        presetFolder
          .add(parameters, "greenScreen")
          .name("Green Screen (#00ff00)")
          .onChange(updateBackground);

        presetFolder
          .add(parameters, "colorScheme", [
            "Cosmic Original",
            "Cyberpunk Neon",
            "Solar Flare",
            "Deep Ocean",
            "Forest Jade",
          ])
          .name("Color Schemes")
          .onChange(applyColorScheme);

        presetFolder
          .add(parameters, "cameraAnimation", [
            "Static (No Movement)",
            "Slow Orbit",
            "Breathing Zoom",
            "Cinematic Pan",
            "Floating Orbit",
          ])
          .name("Camera Animation");

        // Custom Colors Folder
        var colorFolder = gui.addFolder("Custom Color Picker");
        controllers.planetColor = colorFolder
          .addColor(parameters, "planetColor")
          .name("Planet Color")
          .onChange(function () {
            saturn.updatePlanetColor();
          });

        controllers.particleColor1 = colorFolder
          .addColor(parameters, "particleColor1")
          .name("Particle 1")
          .onChange(function () {
            saturn.updateParticlesColors();
          });

        controllers.particleColor2 = colorFolder
          .addColor(parameters, "particleColor2")
          .name("Particle 2")
          .onChange(function () {
            saturn.updateParticlesColors();
          });

        controllers.particleColor3 = colorFolder
          .addColor(parameters, "particleColor3")
          .name("Particle 3")
          .onChange(function () {
            saturn.updateParticlesColors();
          });

        controllers.particleColor4 = colorFolder
          .addColor(parameters, "particleColor4")
          .name("Particle 4")
          .onChange(function () {
            saturn.updateParticlesColors();
          });

        // Geometry & Details Folder
        var geomFolder = gui.addFolder("Saturn Geometry");
        geomFolder
          .add(parameters, "minRadius")
          .min(20)
          .max(60)
          .step(1)
          .name("Inner Radius")
          .onChange(function () {
            saturn.updateParticlesDefiniton();
          });
        geomFolder
          .add(parameters, "maxRadius")
          .min(40)
          .max(100)
          .step(1)
          .name("Outer Radius")
          .onChange(function () {
            saturn.updateParticlesDefiniton();
          });
        geomFolder
          .add(parameters, "particles")
          .min(50)
          .max(800)
          .step(1)
          .name("Particles")
          .onChange(function () {
            saturn.updateParticlesCount();
          });
        geomFolder
          .add(parameters, "minSpeed")
          .min(0.005)
          .max(0.05)
          .step(0.001)
          .name("Min Speed")
          .onChange(function () {
            saturn.updateParticlesDefiniton();
          });
        geomFolder
          .add(parameters, "maxSpeed")
          .min(0.005)
          .max(0.05)
          .step(0.001)
          .name("Max Speed")
          .onChange(function () {
            saturn.updateParticlesDefiniton();
          });
        geomFolder
          .add(parameters, "minSize")
          .min(0.1)
          .max(5)
          .step(0.1)
          .name("Min Size")
          .onChange(function () {
            saturn.updateParticlesDefiniton();
          });
        geomFolder
          .add(parameters, "maxSize")
          .min(0.1)
          .max(5)
          .step(0.1)
          .name("Max Size")
          .onChange(function () {
            saturn.updateParticlesDefiniton();
          });

        // Speed & Performance Folder
        var speedFolder = gui.addFolder("Performance & Speed");
        speedFolder
          .add(parameters, "animationSpeed")
          .min(0.0)
          .max(3.0)
          .step(0.1)
          .name("Animation Speed");
        speedFolder
          .add(parameters, "dpr")
          .min(0.5)
          .max(3.0)
          .step(0.1)
          .name("DPR (Pixel Ratio)")
          .onChange(function (val) {
            renderer.setPixelRatio(val);
          });

        // Actions Folder
        var actions = {
          resetCamera: function () {
            controls.target.set(0, 0, 0);
            camera.position.set(0, 0, 100);
            controls.update();
          },
        };
        gui.add(actions, "resetCamera").name("Reset Camera Position");
      }

      // Initialize all components
      initGUI();
      initWorld();
    </script>
  </body>
</html>
