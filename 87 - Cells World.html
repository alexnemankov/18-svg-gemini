<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Voronoi Zoom</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }
    #container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/88/three.min.js"></script>
</head>
<body>

<div id="container"></div>

<script id="vertexShader" type="x-shader/x-vertex">
    void main() {
        gl_Position = vec4( position, 1.0 );
    }
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
    uniform vec2 u_resolution;
    uniform vec2 u_mouse;
    uniform float u_time;
    uniform vec3 u_colours[ 5 ];
    uniform float u_zoom;
    uniform vec2 u_offset;
    uniform float u_greenscreen;
    uniform float u_rotation;
  
    const float multiplier = .7;
    const float zoomSpeed = 8.;
    const int layers = 6;
  
    const float seed = 86135.7315468;
  
    float random2d(vec2 uv) {
      return fract(
                sin(
                  dot( uv.xy, vec2(12.9898, 78.233) )
                ) * seed);
    }
    mat2 rotate2d(float _angle){
        return mat2(cos(_angle),sin(_angle),
                    -sin(_angle),cos(_angle));
    }

  // Created by inigo quilez - iq/2013
  // License Creative Commons Attribution-NonCommercial-ShareAlike 3.0 Unported License.
  // http://www.iquilezles.org/www/articles/voronoilines/voronoilines.htm

  vec2 random2( vec2 p ) {
      return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453);
  }

  vec3 voronoi( in vec2 x, inout vec2 nearest_point, inout vec2 s_nearest_point, inout float s_nearest_distance, inout float nearest_distance, inout vec2 cell_id) {
      vec2 n = floor(x);
      vec2 f = fract(x);

      // first pass: regular voronoi
      vec2 mg, mr;
      float md = 8.0;
      float smd = 8.0;
      for (int j= -1; j <= 1; j++) {
          for (int i= -1; i <= 1; i++) {
              vec2 g = vec2(float(i),float(j));
              vec2 o = random2( n + g );

              vec2 r = g + o - f;
              float d = dot(r,r);

              if( d<md ) {
                  smd = md;
                  s_nearest_distance = md;
                  nearest_distance = d;
                  md = d;
                  mr = r;
                  mg = g;
                  nearest_point = r;
              } else if( smd > d ) {
                  s_nearest_distance = d;
                  nearest_distance = d;
                  smd = d;
                  s_nearest_point = r;
              }
          }
      }

      // second pass: distance to borders
      md = 8.0;
      for (int j= -2; j <= 2; j++) {
          for (int i= -2; i <= 2; i++) {
              vec2 g = mg + vec2(float(i),float(j));
              vec2 o = random2( n + g );

              vec2 r = g + o - f;

              if ( dot(mr-r,mr-r)>0.00001 ) {
                  md = min(md, dot( 0.5*(mr+r), normalize(r-mr) ));
              }
          }
      }
      cell_id = n + mg;
      return vec3(md, mr);
  }
  
  vec3 getColour(vec2 cell_id, vec2 nearest_point) {
    float h = random2d(cell_id);
    vec3 col = vec3(0.0);
    if (h < 0.2) col = u_colours[0];
    else if (h < 0.4) col = u_colours[1];
    else if (h < 0.6) col = u_colours[2];
    else if (h < 0.8) col = u_colours[3];
    else col = u_colours[4];
    
    float dist_factor = abs(1. - length(nearest_point));
    return col * dist_factor;
  }
  
  vec3 render(vec2 uv) {
    vec3 colour = vec3(0.5);
    // Voronoi
    vec2 nearest_point = vec2(0., 0.);
    vec2 s_nearest_point = vec2(0., 0.);
    float s_nearest_distance = 0.;
    float nearest_distance = 0.;
    vec2 cell_id = vec2(0., 0.);
    vec3 c = voronoi(uv, nearest_point, s_nearest_point, s_nearest_distance, nearest_distance, cell_id);

    // colour
    colour = getColour(cell_id, nearest_point);
    
    // borders
    vec3 border = (u_greenscreen > 0.5) ? vec3(0.0, 0.2, 0.0) : vec3(-4.);
    colour = mix( border, colour, smoothstep( -.1, 0.03, c.x ) );
    
    return colour;
  }
  
  vec3 renderLayer(int layer, int layers, vec2 uv, inout float opacity) {
    // Scale
    float scale = mod((u_time + zoomSpeed / float(layers) * float(layer)) / zoomSpeed, -1.);
    uv *= 15.; // The initial scale.
    uv *= scale; // then modifying the overall scale
    uv = rotate2d(u_rotation) * uv; // rotating

    // render
    vec3 pass = render(uv * multiplier); // render the pass
    
    opacity = 1. + scale;
    float _opacity = opacity;
    
    float endOpacity = smoothstep(0., 0.2, scale * -1.);
    opacity += endOpacity;
    
    return pass * _opacity * endOpacity;
  }

  void main() {
      vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy);
      
      if(u_resolution.y < u_resolution.x) {
        uv /= u_resolution.y;
      } else {
        uv /= u_resolution.x;
      }
    
      // Apply translation and zoom from camera coordinates
      uv = (uv - u_offset) / u_zoom;
    
      vec3 colour = vec3(0.);
        
      float opacity = 1.;
      float opacity_sum = 1.;
    
      for(int i = 1; i <= layers; i++) {
        colour += renderLayer(i, layers, uv, opacity);
        opacity_sum += opacity;
      }
    
      colour /= opacity_sum;
    
      gl_FragColor = vec4(colour * 5.,1.0);
  }
</script>

<script type="module">
  import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

  let container;
  let camera, scene, renderer;
  let uniforms;

  const colorSchemes = {
    "Neon Dreams": ["#00f0ff", "#ff007f", "#7000ff", "#0022ff", "#1a0033"],
    "Sunset Glow": ["#ff3366", "#ff6633", "#ffcc33", "#9900cc", "#ff0099"],
    "Deep Ocean": ["#003366", "#006699", "#0099b2", "#00ccff", "#99ffff"],
    "Forest Magic": ["#004d40", "#00c853", "#aeea00", "#ffd600", "#00bfa5"],
    "Monochrome Luxury": ["#111111", "#333333", "#777777", "#cccccc", "#ffffff"]
  };

  const params = {
    greenscreen: false,
    colorScheme: "Neon Dreams",
    color0: "#00f0ff",
    color1: "#ff007f",
    color2: "#7000ff",
    color3: "#0022ff",
    color4: "#1a0033",
    animation: "Infinite Vortex",
    speed: 1.0,
    zoom: 1.0,
    offsetX: 0.0,
    offsetY: 0.0,
    resetView: function() {
      manualZoom = 1.0;
      manualOffset.set(0, 0);
      params.zoom = 1.0;
      params.offsetX = 0.0;
      params.offsetY = 0.0;
    }
  };

  let manualZoom = 1.0;
  const manualOffset = new THREE.Vector2(0, 0);

  let zoomController, offsetXController, offsetYController;
  const colorControllers = [];

  function init() {
    container = document.getElementById( 'container' );

    camera = new THREE.Camera();
    camera.position.z = 1;

    scene = new THREE.Scene();

    var geometry = new THREE.PlaneBufferGeometry( 2, 2 );

    const colorsArray = [];
    const initialScheme = colorSchemes[params.colorScheme];
    for (let i = 0; i < 5; i++) {
      const col = new THREE.Color(initialScheme[i]);
      colorsArray.push(new THREE.Vector3(col.r, col.g, col.b));
    }

    uniforms = {
      u_time: { type: "f", value: 1.0 },
      u_resolution: { type: "v2", value: new THREE.Vector2() },
      u_mouse: { type: "v2", value: new THREE.Vector2() },
      u_zoom: { type: "f", value: 1.0 },
      u_offset: { type: "v2", value: new THREE.Vector2(0, 0) },
      u_greenscreen: { type: "f", value: 0.0 },
      u_rotation: { type: "f", value: 0.0 },
      u_colours: { type: "v3v", value: colorsArray }
    };

    var material = new THREE.ShaderMaterial( {
      uniforms: uniforms,
      vertexShader: document.getElementById( 'vertexShader' ).textContent,
      fragmentShader: document.getElementById( 'fragmentShader' ).textContent
    } );

    var mesh = new THREE.Mesh( geometry, material );
    scene.add( mesh );

    renderer = new THREE.WebGLRenderer();
    renderer.setPixelRatio( window.devicePixelRatio );

    container.appendChild( renderer.domElement );

    onWindowResize();
    window.addEventListener( 'resize', onWindowResize, false );

    document.onmousemove = function(e){
      uniforms.u_mouse.value.x = e.pageX;
      uniforms.u_mouse.value.y = e.pageY;
    };

    setupEvents();
    setupGUI();
  }

  function setupEvents() {
    // Zooming with wheel
    window.addEventListener('wheel', (e) => {
      if (e.target.closest('.lil-gui')) return;
      
      e.preventDefault();
      const zoomFactor = 1.15;
      if (e.deltaY < 0) {
        manualZoom *= zoomFactor;
      } else {
        manualZoom /= zoomFactor;
      }
      manualZoom = Math.max(0.01, Math.min(manualZoom, 100.0));
      params.zoom = manualZoom;
    }, { passive: false });

    // Panning with drag
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };

    window.addEventListener('mousedown', (e) => {
      if (e.target.closest('.lil-gui')) return;
      isDragging = true;
      previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const deltaX = e.clientX - previousMousePosition.x;
      const deltaY = e.clientY - previousMousePosition.y;
      
      const aspectScale = Math.min(window.innerWidth, window.innerHeight);
      
      const currentAutoZoom = uniforms.u_zoom.value / manualZoom;
      const totalZoom = manualZoom * currentAutoZoom;
      
      const dx = (deltaX / aspectScale) / totalZoom;
      const dy = (deltaY / aspectScale) / totalZoom;
      
      manualOffset.x += dx;
      manualOffset.y -= dy;
      
      previousMousePosition = { x: e.clientX, y: e.clientY };
      
      params.offsetX = manualOffset.x;
      params.offsetY = manualOffset.y;
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // Show/hide GUI on 'H' key
    window.addEventListener('keydown', (e) => {
      if (e.key === 'h' || e.key === 'H') {
        const guiDom = document.querySelector('.lil-gui');
        if (guiDom) {
          guiDom.style.display = guiDom.style.display === 'none' ? '' : 'none';
        }
      }
    });
  }

  function setupGUI() {
    const gui = new GUI({ title: "Shader Settings" });
    
    // Green Screen checkbox
    gui.add(params, 'greenscreen').name('Green Screen').onChange(value => {
      uniforms.u_greenscreen.value = value ? 1.0 : 0.0;
    });

    // Preset & Custom Colors Folder
    const colorsFolder = gui.addFolder('Color Settings');
    
    colorsFolder.add(params, 'colorScheme', Object.keys(colorSchemes)).name('Scheme Preset').onChange(value => {
      const scheme = colorSchemes[value];
      if (scheme) {
        params.color0 = scheme[0];
        params.color1 = scheme[1];
        params.color2 = scheme[2];
        params.color3 = scheme[3];
        params.color4 = scheme[4];
        
        colorControllers.forEach((ctrl, idx) => {
          ctrl.setValue(scheme[idx]);
        });
        
        updateColorsUniform();
      }
    });

    for (let i = 0; i < 5; i++) {
      const ctrl = colorsFolder.addColor(params, `color${i}`).name(`Color ${i + 1}`).onChange(() => {
        updateColorsUniform();
      });
      colorControllers.push(ctrl);
    }

    // Animation Folder
    const animFolder = gui.addFolder('Animation Settings');
    animFolder.add(params, 'animation', [
      'Infinite Vortex',
      'Deep Dive',
      'Wandering Mystic',
      'Pulse & Wave',
      'Cosmic Tempest'
    ]).name('Animation');
    
    animFolder.add(params, 'speed', 0.0, 3.0, 0.05).name('Anim Speed');

    // Camera Control Folder
    const camFolder = gui.addFolder('Camera & Coordinates');
    
    zoomController = camFolder.add(params, 'zoom').name('Zoom').listen().onChange(value => {
      manualZoom = value;
    });
    
    offsetXController = camFolder.add(params, 'offsetX').name('Offset X').listen().onChange(value => {
      manualOffset.x = value;
    });
    
    offsetYController = camFolder.add(params, 'offsetY').name('Offset Y').listen().onChange(value => {
      manualOffset.y = value;
    });
    
    camFolder.add(params, 'resetView').name('Reset View');

    colorsFolder.open();
    animFolder.open();
    camFolder.open();
  }

  function updateColorsUniform() {
    const hexes = [params.color0, params.color1, params.color2, params.color3, params.color4];
    for (let i = 0; i < 5; i++) {
      const col = new THREE.Color(hexes[i]);
      uniforms.u_colours.value[i].set(col.r, col.g, col.b);
    }
  }

  function onWindowResize( event ) {
    renderer.setSize( window.innerWidth, window.innerHeight );
    uniforms.u_resolution.value.x = renderer.domElement.width;
    uniforms.u_resolution.value.y = renderer.domElement.height;
  }

  function animate() {
    requestAnimationFrame( animate );
    render();
  }

  function render() {
    const dt = 0.05 * params.speed;
    uniforms.u_time.value += dt;
    
    const time = uniforms.u_time.value;
    
    let currentAutoZoom = 1.0;
    let currentAutoOffset = new THREE.Vector2(0, 0);
    let currentAutoRotation = time * 0.1; // default fallback
    
    switch(params.animation) {
      case "Infinite Vortex":
        currentAutoRotation = time * 0.1;
        currentAutoZoom = 1.0 + 0.1 * Math.sin(time * 0.5);
        break;
        
      case "Deep Dive":
        currentAutoZoom = Math.exp(Math.sin(time * 0.3) * 1.5);
        currentAutoRotation = time * 0.05;
        currentAutoOffset.x = Math.cos(time * 0.2) * 0.1;
        currentAutoOffset.y = Math.sin(time * 0.2) * 0.1;
        break;
        
      case "Wandering Mystic":
        currentAutoOffset.x = Math.sin(time * 0.3) * 0.8;
        currentAutoOffset.y = Math.cos(time * 0.15) * 0.8;
        currentAutoRotation = time * 0.08;
        currentAutoZoom = 1.2;
        break;
        
      case "Pulse & Wave":
        currentAutoZoom = 1.5 + 1.1 * Math.sin(time * 1.0);
        currentAutoRotation = Math.sin(time * 0.4) * 0.5;
        currentAutoOffset.x = Math.sin(time * 0.5) * 0.1;
        break;
        
      case "Cosmic Tempest":
        currentAutoRotation = time * 0.4;
        currentAutoOffset.x = Math.sin(time * 1.2) * 0.4;
        currentAutoOffset.y = Math.cos(time * 1.7) * 0.4;
        currentAutoZoom = 1.6 + 0.8 * Math.sin(time * 2.5);
        break;
    }
    
    uniforms.u_zoom.value = manualZoom * currentAutoZoom;
    uniforms.u_offset.value.copy(manualOffset).add(currentAutoOffset);
    uniforms.u_rotation.value = currentAutoRotation;
    
    renderer.render( scene, camera );
  }

  init();
  animate();
</script>

</body>
</html>
