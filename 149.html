<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive DNA Helix</title>
  <style>
    :root {
      --strands: 10;
      --animDuration: 6s;
      --strand_rotation: 0.1;
      --strand_height: 10svh;
      --strand_width: 40svh;
      --strand_padding: 0svh;
      --camPerspective: 1400px;
      
      /* DNA colors */
      --leftBallColor: #32D0D9;
      --leftBallGlow: #0000ff;
      --leftStemColor: #3197C6;
      --rightBallColor: #FF3E6C;
      --rightBallGlow: #ff0000;
      --rightStemColor: #CC744D;

      --strandStem_bgMain: linear-gradient(90deg, var(--leftBallGlow), var(--leftStemColor) 12.5%, white, var(--rightStemColor) 87.5%, var(--rightBallGlow));

      /* BG and filters */
      --bgColor: linear-gradient(-15deg, #600, #000, #003);
      
      /* Zoom/Drag/DPR */
      --zoom: 1;
      --drag-x: 0px;
      --drag-y: 0px;
      --dpr: 1;
      
      --delayFactor: -0.33s;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      width: 100%;
      background: #000; /* fallback */
    }

    body {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(var(--dpr));
      width: calc(100% / var(--dpr));
      height: calc(100% / var(--dpr));
      background: var(--bgColor);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: var(--camPerspective);
      transition: background 0.3s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .containerTilter {
      transform-style: preserve-3d;
      transform: rotateX(-8deg) translate(var(--drag-x), var(--drag-y)) scale(var(--zoom));
      filter: contrast(2.25);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: var(--strand_width);
    }

    .containerRotator {
      display: inline-block;
      height: 100%;
      width: var(--strand_width);
      margin: 0 auto;
      transform-style: preserve-3d;
    }

    .strand {
      height: var(--strand_height);
      width: var(--strand_width);
      display: flex;
      align-items: center;
      padding: var(--strand_padding);
      transform: rotateY(calc(1turn * var(--index)));
      transform-style: preserve-3d;
    }

    .strand__ball {
      flex: 0 0 auto;
      aspect-ratio: 1/1;
      height: 100%;
      border-radius: 100%;
      backface-visibility: hidden;
      
      background-color: var(--leftBallColor);
      background-image: radial-gradient(rgba(0,0,0,0), rgba(0,0,0,0) 50%, white);
      position: relative;
      filter: drop-shadow(0 0 1.5vh var(--leftBallGlow));
    }

    .strand__ball:before, .strand__ball:after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(#1AB9B6, #05589c 38%, #05589c 48%, rgba(5, 88, 156, 0) 78%, rgba(5, 88, 156, .75) 90%);
      top: -4%;
      left: -4%;
      border-radius: 100%;
    }

    .strand__ball:before {
      filter: blur(.25svh);
    }

    .strand__ball:after {
      width: 15%;
      height: 15%;
      background-image: radial-gradient(rgba(255,255,255,1), rgba(255,255,255,1) 15%, rgba(255,255,255,.35) 20%, rgba(255,255,255,.15) 45%, rgba(255,255,255,0) 75%);
      top: 22%;
      left: 22%;
    }

    .strand__ball--right {
      background-color: var(--rightBallColor);
      filter: drop-shadow(0 0 1.5vh var(--rightBallGlow));
    }

    .strand__ball--right:before {
      background-image: radial-gradient(var(--rightBallColor), var(--rightBallGlow) 38%, var(--rightBallGlow) 48%, rgba(5, 88, 156, 0) 78%, rgba(5, 88, 156, .75) 90%);
    }

    .strand__ball__inner {
      position: absolute;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
      animation: ball__inner var(--animDuration) linear infinite;
      animation-delay: calc(var(--index) * var(--delayFactor));
      border-radius: 100%;
    }

    .strand__ball--right .strand__ball__inner {
      animation-delay: calc(var(--index) * var(--delayFactor) + var(--animDuration) / 2);
    }

    .strand__stem {
      flex: 1;
      height: 10%;
      transform-style: preserve-3d;
      position: relative;
    }

    .strand__stem:before, .strand__stem:after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      aspect-ratio: 1/1;
      background: var(--leftBallGlow);
      transform: translateX(-50%) rotateY(90deg);
      border-radius: 100%;
      backface-visibility: hidden;
    }

    .strand__stem:after {
      left: unset;
      right: 0;
      transform: translateX(50%) rotateY(-90deg);
      background: var(--rightBallGlow);
    }

    .strand__stem__inner {
      background: var(--strandStem_bgMain);
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
    }

    .strand__stem__inner:before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--strandStem_bgMain);
      transform: rotateX(90deg);
    }

    @keyframes ball__inner {
      0% {
        opacity: 0;
      }
      50% {
        opacity: .4;
      }
      100% {
        opacity: 0;
      }
    }

    /* -----------------------------------------
       ANIMATION PRESETS
       ----------------------------------------- */

    /* 1. Scroll (Default DNA motion) */
    .anim-scroll .containerRotator {
      animation: containerScroll var(--animDuration) infinite linear;
    }
    .anim-scroll .strand__ball {
      animation: ballScroll var(--animDuration) infinite linear;
    }

    @keyframes containerScroll {
      from {
        transform: translateY(-10svh) rotateY(0turn);
      }
      to {
        transform: translateY(-40svh) rotateY(0.7turn);
      }
    }
    @keyframes ballScroll {
      from {
        transform: rotateY(calc(1turn - (1turn * var(--index))));
      }
      to {
        transform: rotateY(calc(0turn - (1turn * var(--index)) + 0.3turn));
      }
    }

    /* 2. Static */
    .anim-static .containerRotator {
      transform: translateY(-25svh) rotateY(0turn);
    }
    .anim-static .strand__ball {
      transform: rotateY(calc(0turn - (1turn * var(--index))));
    }

    /* 3. Spin */
    .anim-spin .containerRotator {
      animation: containerSpin var(--animDuration) infinite linear;
    }
    .anim-spin .strand__ball {
      animation: ballSpin var(--animDuration) infinite linear;
    }

    @keyframes containerSpin {
      from {
        transform: translateY(-25svh) rotateY(0turn);
      }
      to {
        transform: translateY(-25svh) rotateY(1turn);
      }
    }
    @keyframes ballSpin {
      from {
        transform: rotateY(calc(0turn - (1turn * var(--index))));
      }
      to {
        transform: rotateY(calc(-1turn - (1turn * var(--index))));
      }
    }

    /* 4. Swing */
    .anim-swing .containerRotator {
      animation: containerSwing var(--animDuration) infinite ease-in-out;
    }
    .anim-swing .strand__ball {
      animation: ballSwing var(--animDuration) infinite ease-in-out;
    }

    @keyframes containerSwing {
      0% {
        transform: translateY(-25svh) rotateY(0turn) rotateX(-5deg) rotateZ(-3deg);
      }
      50% {
        transform: translateY(-25svh) rotateY(0.5turn) rotateX(5deg) rotateZ(3deg);
      }
      100% {
        transform: translateY(-25svh) rotateY(1turn) rotateX(-5deg) rotateZ(-3deg);
      }
    }
    @keyframes ballSwing {
      0% {
        transform: rotateY(calc(0turn - (1turn * var(--index))));
      }
      50% {
        transform: rotateY(calc(-0.5turn - (1turn * var(--index))));
      }
      100% {
        transform: rotateY(calc(-1turn - (1turn * var(--index))));
      }
    }

    /* 5. Pulse */
    .anim-pulse .containerRotator {
      animation: containerPulse var(--animDuration) infinite ease-in-out;
    }
    .anim-pulse .strand__ball {
      animation: ballPulse var(--animDuration) infinite ease-in-out;
    }

    @keyframes containerPulse {
      0% {
        transform: translateY(-25svh) rotateY(0turn) scale3d(0.9, 0.9, 0.9);
      }
      50% {
        transform: translateY(-25svh) rotateY(0.5turn) scale3d(1.1, 1.1, 1.1);
      }
      100% {
        transform: translateY(-25svh) rotateY(1turn) scale3d(0.9, 0.9, 0.9);
      }
    }
    @keyframes ballPulse {
      0% {
        transform: rotateY(calc(0turn - (1turn * var(--index))));
      }
      50% {
        transform: rotateY(calc(-0.5turn - (1turn * var(--index))));
      }
      100% {
        transform: rotateY(calc(-1turn - (1turn * var(--index))));
      }
    }
  </style>
</head>
<body class="anim-scroll">
  <div class="containerTilter">
    <div class="containerRotator">
      <!-- 16 strands (strands=10 + loopExtras=6) -->
      <div class="strand" style="--index: 0.0;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>

      <div class="strand" style="--index: 0.1;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 0.2;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 0.3;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 0.4;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 0.5;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 0.6;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 0.7;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>

        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 0.9;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 1.0;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 1.1;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 1.2;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 1.3;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 1.4;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
      <div class="strand" style="--index: 1.5;">
        <div class="strand__ball"><div class="strand__ball__inner"></div></div>
        <div class="strand__stem"><div class="strand__stem__inner"></div></div>
        <div class="strand__ball strand__ball--right"><div class="strand__ball__inner"></div></div>
      </div>
    </div>
  </div>

  <script type="module">
    import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // State object
    const config = {
      greenscreen: false,
      colorScheme: 'Cyber Helix',
      
      // Custom colors
      leftBallColor: '#32D0D9',
      leftBallGlow: '#0000ff',
      leftStemColor: '#3197C6',
      rightBallColor: '#FF3E6C',
      rightBallGlow: '#ff0000',
      rightStemColor: '#CC744D',
      
      // Settings
      dpr: 1,
      animationSpeed: 1.0,
      animationType: 'Scroll'
    };

    // Preset color schemes
    const colorSchemes = {
      'Cyber Helix': {
        leftBallColor: '#32D0D9',
        leftBallGlow: '#0000ff',
        leftStemColor: '#3197C6',
        rightBallColor: '#FF3E6C',
        rightBallGlow: '#ff0000',
        rightStemColor: '#CC744D',
        bgColor: 'linear-gradient(-15deg, #600, #000, #003)'
      },
      'Neon Sunset': {
        leftBallColor: '#FF007F',
        leftBallGlow: '#8A2BE2',
        leftStemColor: '#9400D3',
        rightBallColor: '#FF8C00',
        rightBallGlow: '#FFD700',
        rightStemColor: '#FF4500',
        bgColor: 'linear-gradient(-15deg, #300030, #050015, #001a30)'
      },
      'Bio-Luminescence': {
        leftBallColor: '#00FFCC',
        leftBallGlow: '#008080',
        leftStemColor: '#004d4d',
        rightBallColor: '#7FFF00',
        rightBallGlow: '#00FF00',
        rightStemColor: '#556B2F',
        bgColor: 'linear-gradient(-15deg, #001122, #000511, #002211)'
      },
      'Cosmic Nebula': {
        leftBallColor: '#DA70D6',
        leftBallGlow: '#4B0082',
        leftStemColor: '#BA55D3',
        rightBallColor: '#00BFFF',
        rightBallGlow: '#4169E1',
        rightStemColor: '#1E90FF',
        bgColor: 'linear-gradient(-15deg, #20003b, #03000a, #001c3d)'
      },
      'Toxic Wasteland': {
        leftBallColor: '#ADFF2F',
        leftBallGlow: '#32CD32',
        leftStemColor: '#228B22',
        rightBallColor: '#FF00FF',
        rightBallGlow: '#8B008B',
        rightStemColor: '#4A004A',
        bgColor: 'linear-gradient(-15deg, #112200, #050a00, #220022)'
      }
    };

    function applyConfig() {
      const root = document.documentElement;
      
      // Set background
      if (config.greenscreen) {
        root.style.setProperty('--bgColor', '#00ff00');
      } else {
        const scheme = colorSchemes[config.colorScheme];
        root.style.setProperty('--bgColor', scheme ? scheme.bgColor : 'linear-gradient(-15deg, #600, #000, #003)');
      }
      
      // Set DNA colors
      root.style.setProperty('--leftBallColor', config.leftBallColor);
      root.style.setProperty('--leftBallGlow', config.leftBallGlow);
      root.style.setProperty('--leftStemColor', config.leftStemColor);
      root.style.setProperty('--rightBallColor', config.rightBallColor);
      root.style.setProperty('--rightBallGlow', config.rightBallGlow);
      root.style.setProperty('--rightStemColor', config.rightStemColor);
      
      // Set DPR (Pixel Ratio)
      root.style.setProperty('--dpr', config.dpr);
      
      // Set Animation Speed & delay factors
      const baseDuration = 6; // seconds
      const duration = config.animationSpeed > 0 ? (baseDuration / config.animationSpeed) : 999999;
      const delayFactor = config.animationSpeed > 0 ? (-0.33 / config.animationSpeed) : 0;
      
      root.style.setProperty('--animDuration', `${duration}s`);
      root.style.setProperty('--delayFactor', `${delayFactor}s`);
      
      // Update Animation Type class on body
      document.body.className = `anim-${config.animationType.toLowerCase()}`;
    }

    // Interactive Drag and Zoom
    let zoom = 1;
    let dragX = 0;
    let dragY = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    window.addEventListener('wheel', (e) => {
      // Zoom with wheel
      zoom += e.deltaY * -0.001;
      zoom = Math.min(Math.max(0.2, zoom), 5);
      document.documentElement.style.setProperty('--zoom', zoom);
    });

    window.addEventListener('mousedown', (e) => {
      if (e.target.closest('.lil-gui')) return;
      isDragging = true;
      startX = e.clientX - dragX;
      startY = e.clientY - dragY;
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      dragX = e.clientX - startX;
      dragY = e.clientY - startY;
      document.documentElement.style.setProperty('--drag-x', `${dragX}px`);
      document.documentElement.style.setProperty('--drag-y', `${dragY}px`);
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // Touch support
    window.addEventListener('touchstart', (e) => {
      if (e.target.closest('.lil-gui')) return;
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - dragX;
        startY = e.touches[0].clientY - dragY;
      }
    });

    window.addEventListener('touchmove', (e) => {
      if (!isDragging || e.touches.length !== 1) return;
      dragX = e.touches[0].clientX - startX;
      dragY = e.touches[0].clientY - startY;
      document.documentElement.style.setProperty('--drag-x', `${dragX}px`);
      document.documentElement.style.setProperty('--drag-y', `${dragY}px`);
    });

    window.addEventListener('touchend', () => {
      isDragging = false;
    });

    // Setup GUI
    const gui = new GUI({ title: 'DNA Settings' });

    gui.add(config, 'greenscreen').name('Green Screen').onChange(applyConfig);

    const colorFolder = gui.addFolder('Colors');
    colorFolder.add(config, 'colorScheme', Object.keys(colorSchemes)).name('Preset Scheme').onChange((val) => {
      const scheme = colorSchemes[val];
      if (scheme) {
        config.leftBallColor = scheme.leftBallColor;
        config.leftBallGlow = scheme.leftBallGlow;
        config.leftStemColor = scheme.leftStemColor;
        config.rightBallColor = scheme.rightBallColor;
        config.rightBallGlow = scheme.rightBallGlow;
        config.rightStemColor = scheme.rightStemColor;
        
        // Update controllers
        leftBallCtrl.setValue(config.leftBallColor);
        leftGlowCtrl.setValue(config.leftBallGlow);
        leftStemCtrl.setValue(config.leftStemColor);
        rightBallCtrl.setValue(config.rightBallColor);
        rightGlowCtrl.setValue(config.rightBallGlow);
        rightStemCtrl.setValue(config.rightStemColor);
      }
      applyConfig();
    });

    const leftBallCtrl = colorFolder.addColor(config, 'leftBallColor').name('Left Ball').onChange(applyConfig);
    const leftGlowCtrl = colorFolder.addColor(config, 'leftBallGlow').name('Left Glow').onChange(applyConfig);
    const leftStemCtrl = colorFolder.addColor(config, 'leftStemColor').name('Left Stem').onChange(applyConfig);
    const rightBallCtrl = colorFolder.addColor(config, 'rightBallColor').name('Right Ball').onChange(applyConfig);
    const rightGlowCtrl = colorFolder.addColor(config, 'rightBallGlow').name('Right Glow').onChange(applyConfig);
    const rightStemCtrl = colorFolder.addColor(config, 'rightStemColor').name('Right Stem').onChange(applyConfig);

    const displayFolder = gui.addFolder('Display');
    displayFolder.add(config, 'dpr', 0.25, 2.0, 0.05).name('Pixel Ratio (DPR)').onChange(applyConfig);

    const animFolder = gui.addFolder('Animation');
    animFolder.add(config, 'animationType', ['Scroll', 'Static', 'Spin', 'Swing', 'Pulse']).name('Pattern').onChange(applyConfig);
    animFolder.add(config, 'animationSpeed', 0, 3, 0.1).name('SpeedMultiplier').onChange(applyConfig);

    // Hide/Show GUI with 'H' key
    window.addEventListener('keydown', (e) => {
      if (e.key === 'h' || e.key === 'H') {
        if (gui.domElement.style.display === 'none') {
          gui.domElement.style.display = '';
        } else {
          gui.domElement.style.display = 'none';
        }
      }
    });

    // Initialize layout
    applyConfig();
  </script>
</body>
</html>
