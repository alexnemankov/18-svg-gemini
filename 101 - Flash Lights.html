<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>101 - Sigmoid Distortion Shader Customizer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
      user-select: none;
    }
    #container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="container" touch-action="none"></div>

  <!-- ThreeJS library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/88/three.min.js"></script>

  <!-- Vertex Shader -->
  <script id="vertexShader" type="x-shader/x-vertex">
    void main() {
        gl_Position = vec4( position, 1.0 );
    }
  </script>

  <!-- Fragment Shader -->
  <script id="fragmentShader" type="x-shader/x-fragment">
    uniform vec2 u_resolution;
    uniform vec2 u_mouse;
    uniform float u_time;
    uniform sampler2D u_noise;

    // Interactive Zoom and Drag
    uniform float u_zoom;
    uniform vec2 u_offset;

    // Colors
    uniform vec3 u_colorR;
    uniform vec3 u_colorG;
    uniform vec3 u_colorB;
    uniform vec3 u_colorBg;
    uniform vec3 u_colorGlow;
    uniform bool u_greenscreen;

    vec2 hash2(vec2 p)
    {
      vec2 o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).xy;
      return o;
    }
    
    float sigmoid(float x) {
      return x / ( -1. + abs(x) + sin(u_time * .1));
    }
    
    vec2 sigmoidDistort(in vec2 uv, inout vec2 polar, inout float distortion) {
      polar = vec2( atan(uv.y, uv.x), length(uv) );
      float a = sin(polar.y * .99);
      distortion = sigmoid(a * -.2);
      polar.y += sigmoid(a * -.5) * 3.;
      return vec2( cos(polar.x) * polar.y, sin(polar.x) * polar.y );
    }

    void main() {
      // Normalised coordinates
      vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);
      
      // Apply interactive zoom and drag
      uv = uv * u_zoom + u_offset;
      
      uv *= 2.;
      
      vec2 polar = vec2(0.);
      float distortion = 0.;
      uv = sigmoidDistort(uv, polar, distortion);
      distortion = clamp(distortion, -.1, .1);
      
      float t = u_time * .1;
      uv *= mat2(
        sin(t), -cos(t),
        cos(t), sin(t)         
      );
      uv.x += u_time;
      uv += .5;
      
      // First layer (originally R channel dot)
      vec2 grid = floor(uv);
      vec2 subgrid = fract(uv) - .5;
      vec2 rand = hash2(grid);
      float multiplier = smoothstep(0., 1., sin(rand.x * u_time * 5.) * rand.y);
      float dotR = smoothstep(.44, .4, length(subgrid)) * multiplier;
      
      // Second layer (originally G channel dot)
      uv += distortion * .3;
      grid = floor(uv);
      subgrid = fract(uv) - .5;
      float dotG = smoothstep(.44, .4, length(subgrid)) * multiplier;
      
      // Third layer (originally B channel dot)
      uv += distortion * .3;
      grid = floor(uv);
      subgrid = fract(uv) - .5;
      float dotB = smoothstep(.44, .4, length(subgrid)) * multiplier;
      
      // Greenscreen adjustments
      vec3 finalBg = u_greenscreen ? vec3(0.0, 1.0, 0.0) : u_colorBg;
      vec3 finalGlow = u_greenscreen ? vec3(0.0, 1.0, 0.0) : u_colorGlow;
      
      // Compose pattern and background
      float maxDot = max(dotR, max(dotG, dotB));
      vec3 colour = finalBg * (1.0 - maxDot) + dotR * u_colorR + dotG * u_colorG + dotB * u_colorB;
      
      // Apply edge glow
      float l = abs(length(polar.y)) / 20.;
      colour = mix(colour, finalGlow, l);

      gl_FragColor = vec4(colour, 1.0);
    }
  </script>

  <!-- Application logic using ES modules to import lil-gui -->
  <script type="module">
    import { GUI } from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // --- State and settings ---
    const params = {
      // Greenscreen
      greenscreen: false,
      
      // Interactive controls
      zoom: 1.0,
      offsetX: 0.0,
      offsetY: 0.0,
      
      // DPR
      dpr: window.devicePixelRatio || 1.0,
      
      // Colors
      colorScheme: 'Retro Neon',
      colorBg: '#0c061a',
      colorGlow: '#3c125c',
      colorR: '#ff007f',
      colorG: '#00f6ff',
      colorB: '#ffec00',
      
      // Animations
      animationMode: 'Hypnotic Spin'
    };

    // Color Scheme Presets
    const colorSchemes = {
      'Retro Neon': {
        colorBg: '#0c061a',
        colorGlow: '#3c125c',
        colorR: '#ff007f',
        colorG: '#00f6ff',
        colorB: '#ffec00'
      },
      'Toxic Hazard': {
        colorBg: '#050a02',
        colorGlow: '#1a3b08',
        colorR: '#39ff14',
        colorG: '#ccff00',
        colorB: '#00ffcc'
      },
      'Solar Flare': {
        colorBg: '#120200',
        colorGlow: '#400d00',
        colorR: '#ff3700',
        colorG: '#ff9d00',
        colorB: '#ffe100'
      },
      'Electric Ice': {
        colorBg: '#020b14',
        colorGlow: '#0c2340',
        colorR: '#00d0ff',
        colorG: '#7df9ff',
        colorB: '#ffffff'
      },
      'Monochrome Mist': {
        colorBg: '#101010',
        colorGlow: '#404040',
        colorR: '#ffffff',
        colorG: '#b0b0b0',
        colorB: '#606060'
      }
    };

    let container;
    let camera, scene, renderer;
    let uniforms;
    let texture;
    
    // Setup texture fallback if load fails
    function createFallbackTexture() {
      const size = 256;
      const data = new Uint8Array(size * size * 4);
      for (let i = 0; i < size * size * 4; i += 4) {
        const val = Math.floor(Math.random() * 255);
        data[i] = val;
        data[i + 1] = val;
        data[i + 2] = val;
        data[i + 3] = 255;
      }
      texture = new THREE.DataTexture(data, size, size, THREE.RGBAFormat);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.minFilter = THREE.LinearFilter;
      texture.needsUpdate = true;
    }

    // Load noise texture
    let loader = new THREE.TextureLoader();
    loader.setCrossOrigin("anonymous");
    loader.load(
      'https://s3-us-west-2.amazonaws.com/s.cdpn.io/982762/noise.png',
      function do_something_with_texture(tex) {
        texture = tex;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.minFilter = THREE.LinearFilter;
        init();
        animate();
      },
      undefined,
      function error() {
        console.warn("Failed to load noise texture from CDN, using fallback.");
        createFallbackTexture();
        init();
        animate();
      }
    );

    function init() {
      container = document.getElementById( 'container' );

      camera = new THREE.Camera();
      camera.position.z = 1;

      scene = new THREE.Scene();

      var geometry = new THREE.PlaneBufferGeometry( 2, 2 );

      uniforms = {
        u_time: { type: "f", value: 1.0 },
        u_resolution: { type: "v2", value: new THREE.Vector2() },
        u_noise: { type: "t", value: texture },
        u_mouse: { type: "v2", value: new THREE.Vector2() },
        u_zoom: { type: "f", value: params.zoom },
        u_offset: { type: "v2", value: new THREE.Vector2(params.offsetX, params.offsetY) },
        u_greenscreen: { type: "b", value: params.greenscreen },
        u_colorBg: { type: "c", value: new THREE.Color(params.colorBg) },
        u_colorGlow: { type: "c", value: new THREE.Color(params.colorGlow) },
        u_colorR: { type: "c", value: new THREE.Color(params.colorR) },
        u_colorG: { type: "c", value: new THREE.Color(params.colorG) },
        u_colorB: { type: "c", value: new THREE.Color(params.colorB) }
      };

      var material = new THREE.ShaderMaterial( {
        uniforms: uniforms,
        vertexShader: document.getElementById( 'vertexShader' ).textContent,
        fragmentShader: document.getElementById( 'fragmentShader' ).textContent
      } );
      material.extensions.derivatives = true;

      var mesh = new THREE.Mesh( geometry, material );
      scene.add( mesh );

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio( params.dpr );
      container.appendChild( renderer.domElement );

      onWindowResize();
      window.addEventListener( 'resize', onWindowResize, false );

      // Pointer events for dragging
      let isDragging = false;
      let previousMousePosition = { x: 0, y: 0 };

      window.addEventListener('pointerdown', (e) => {
        // Prevent drag triggers when clicking UI controls
        if (e.target.closest('.lil-gui')) return;
        isDragging = true;
        previousMousePosition = { x: e.clientX, y: e.clientY };
      });

      window.addEventListener('pointermove', (e) => {
        let ratio = window.innerHeight / window.innerWidth;
        uniforms.u_mouse.value.x = (e.pageX - window.innerWidth / 2) / window.innerWidth / ratio;
        uniforms.u_mouse.value.y = (e.pageY - window.innerHeight / 2) / window.innerHeight * -1;
        
        if (isDragging) {
          const deltaX = e.clientX - previousMousePosition.x;
          const deltaY = e.clientY - previousMousePosition.y;
          
          // Dragging sensitivity scaled by zoom level
          const dragSensitivity = 0.002 * params.zoom;
          params.offsetX -= deltaX * dragSensitivity;
          params.offsetY += deltaY * dragSensitivity;
          
          offsetXController.updateDisplay();
          offsetYController.updateDisplay();
          
          previousMousePosition = { x: e.clientX, y: e.clientY };
        }
        e.preventDefault();
      });

      window.addEventListener('pointerup', () => {
        isDragging = false;
      });

      // Wheel event for zoom
      window.addEventListener('wheel', (e) => {
        if (e.target.closest('.lil-gui')) return;
        
        const zoomFactor = 1.08;
        if (e.deltaY < 0) {
          params.zoom /= zoomFactor;
        } else {
          params.zoom *= zoomFactor;
        }
        
        // Clamp zoom values
        params.zoom = Math.max(0.1, Math.min(10.0, params.zoom));
        zoomController.updateDisplay();
      }, { passive: true });

      // Setup lil-gui settings
      const gui = new GUI({ title: 'Shader Customizer' });

      // Settings Folder
      const folderSettings = gui.addFolder('Settings');
      folderSettings.add(params, 'greenscreen').name('Greenscreen Background').onChange(v => {
        uniforms.u_greenscreen.value = v;
      });
      folderSettings.add(params, 'dpr', 0.5, 3.0, 0.1).name('Pixel Ratio (DPR)').onChange(v => {
        renderer.setPixelRatio(v);
        onWindowResize();
      });

      // Camera Folder
      const folderCamera = gui.addFolder('Camera Controls');
      const zoomController = folderCamera.add(params, 'zoom', 0.1, 10.0, 0.01).name('Zoom Factor');
      const offsetXController = folderCamera.add(params, 'offsetX', -5.0, 5.0, 0.01).name('Offset X');
      const offsetYController = folderCamera.add(params, 'offsetY', -5.0, 5.0, 0.01).name('Offset Y');

      // Colors Folder
      const folderColors = gui.addFolder('Colors');
      folderColors.add(params, 'colorScheme', Object.keys(colorSchemes)).name('Theme Preset').onChange(applyPresetScheme);
      
      const controllerBg = folderColors.addColor(params, 'colorBg').name('Background').onChange(v => {
        uniforms.u_colorBg.value.set(v);
      });
      const controllerGlow = folderColors.addColor(params, 'colorGlow').name('Edge Glow').onChange(v => {
        uniforms.u_colorGlow.value.set(v);
      });
      const controllerR = folderColors.addColor(params, 'colorR').name('R Layer Dot').onChange(v => {
        uniforms.u_colorR.value.set(v);
      });
      const controllerG = folderColors.addColor(params, 'colorG').name('G Layer Dot').onChange(v => {
        uniforms.u_colorG.value.set(v);
      });
      const controllerB = folderColors.addColor(params, 'colorB').name('B Layer Dot').onChange(v => {
        uniforms.u_colorB.value.set(v);
      });

      // Animations Folder
      const folderAnimations = gui.addFolder('Animations');
      folderAnimations.add(params, 'animationMode', [
        'Hypnotic Spin',
        'Vortex Pulse',
        'Chaotic Drift',
        'Color Shift',
        'Cosmic Storm'
      ]).name('Animation Preset');

      // Auto update color pickers when theme is changed
      function applyPresetScheme(schemeName) {
        const scheme = colorSchemes[schemeName];
        if (scheme) {
          params.colorBg = scheme.colorBg;
          params.colorGlow = scheme.colorGlow;
          params.colorR = scheme.colorR;
          params.colorG = scheme.colorG;
          params.colorB = scheme.colorB;

          uniforms.u_colorBg.value.set(params.colorBg);
          uniforms.u_colorGlow.value.set(params.colorGlow);
          uniforms.u_colorR.value.set(params.colorR);
          uniforms.u_colorG.value.set(params.colorG);
          uniforms.u_colorB.value.set(params.colorB);

          controllerBg.setValue(params.colorBg);
          controllerGlow.setValue(params.colorGlow);
          controllerR.setValue(params.colorR);
          controllerG.setValue(params.colorG);
          controllerB.setValue(params.colorB);
        }
      }

      // Hide / Show GUI with H key
      let guiVisible = true;
      window.addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') {
          guiVisible = !guiVisible;
          if (guiVisible) {
            gui.show();
          } else {
            gui.hide();
          }
        }
      });
    }

    function onWindowResize( event ) {
      renderer.setSize( window.innerWidth, window.innerHeight );
      uniforms.u_resolution.value.x = renderer.domElement.width;
      uniforms.u_resolution.value.y = renderer.domElement.height;
    }

    function animate(delta) {
      requestAnimationFrame( animate );
      render(delta);
    }

    // Video Capturing Configuration (Safe Fallback)
    let capturer = null;
    if (typeof CCapture !== 'undefined') {
      capturer = new CCapture({ 
        verbose: true, 
        framerate: 60,
        quality: 90,
        format: 'webm',
        workersPath: 'js/'
      });
    }
    let capturing = false;

    window.isCapturing = function(val) {
      if (typeof CCapture === 'undefined' || !capturer) return;
      if (val === false && capturing === true) {
        capturer.stop();
        capturer.save();
      } else if (val === true && capturing === false) {
        capturer.start();
      }
      capturing = val;
    }
    window.toggleCapture = function() {
      window.isCapturing(!capturing);
    }

    window.addEventListener('keyup', function(e) { if(e.keyCode == 68) window.toggleCapture(); });

    function render(delta) {
      const time = delta || 0;
      uniforms.u_time.value = time * 0.001 - 3;
      
      // Calculate animated camera / parameter values based on selected preset
      let activeZoom = params.zoom;
      let activeOffsetX = params.offsetX;
      let activeOffsetY = params.offsetY;

      const t = time * 0.001;

      if (params.animationMode === 'Hypnotic Spin') {
        // Slow circular movement of offsets + mild zooming pulse
        activeOffsetX = params.offsetX + 0.3 * Math.sin(t * 0.6);
        activeOffsetY = params.offsetY + 0.3 * Math.cos(t * 0.6);
        activeZoom = params.zoom * (1.0 + 0.2 * Math.sin(t * 0.8));
      } else if (params.animationMode === 'Vortex Pulse') {
        // Zoom pulses in and out deeply
        activeZoom = params.zoom * Math.exp(0.4 * Math.sin(t * 1.1));
      } else if (params.animationMode === 'Chaotic Drift') {
        // Panning coordinates drift like a floating particle
        activeOffsetX = params.offsetX + 0.5 * Math.sin(t * 0.8) * Math.cos(t * 0.4);
        activeOffsetY = params.offsetY + 0.5 * Math.sin(t * 0.5) * Math.sin(t * 1.2);
      } else if (params.animationMode === 'Color Shift') {
        // Setting shift animation: shifts the hue of the dots over time
        const shiftColor = (baseHex, phase) => {
          const c = new THREE.Color(baseHex);
          const hsl = {};
          c.getHSL(hsl);
          hsl.h = (hsl.h + t * 0.08 + phase) % 1.0;
          c.setHSL(hsl.h, hsl.s, hsl.l);
          return c;
        };
        
        uniforms.u_colorR.value.copy(shiftColor(params.colorR, 0.0));
        uniforms.u_colorG.value.copy(shiftColor(params.colorG, 0.33));
        uniforms.u_colorB.value.copy(shiftColor(params.colorB, 0.66));
      } else if (params.animationMode === 'Cosmic Storm') {
        // High frequency zoom oscillations and jittery camera offset panning
        activeZoom = params.zoom * (1.0 + 0.12 * Math.sin(t * 3.5));
        activeOffsetX = params.offsetX + 0.08 * Math.sin(t * 2.8);
        activeOffsetY = params.offsetY + 0.08 * Math.cos(t * 2.2);
      }

      // If NOT in Color Shift mode, reset uniform colors to match GUI params
      if (params.animationMode !== 'Color Shift') {
        uniforms.u_colorR.value.set(params.colorR);
        uniforms.u_colorG.value.set(params.colorG);
        uniforms.u_colorB.value.set(params.colorB);
      }

      uniforms.u_zoom.value = activeZoom;
      uniforms.u_offset.value.set(activeOffsetX, activeOffsetY);

      renderer.render( scene, camera );
      
      if (capturing && capturer) {
        capturer.capture( renderer.domElement );
      }
    }
  </script>
</body>
</html>
