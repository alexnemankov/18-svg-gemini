<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Terrain</title>
  <style>
    body {
      overflow: hidden;
      margin: 0;
      background-color: #ffffff;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/",
        "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from "three";
    import {
      OrbitControls
    } from "three/addons/controls/OrbitControls.js";
    import * as TWEEN from "three/addons/libs/tween.module.js";
    import {
      SimplexNoise
    } from "three/addons/math/SimplexNoise.js";
    import GUI from "lil-gui";

    const settings = {
      greenScreen: false,
      textColor: "#111111",
      bgColor: "#ffffff",
      colorPreset: "Minimalist Light",
      dpr: Math.min(window.devicePixelRatio, 2),
      animationSpeed: 1.0,
      currentAnimation: "Orbit"
    };

    let clock = new THREE.Clock();
    let customTime = performance.now();
    let simplex = new SimplexNoise();

    class TextTerrain extends THREE.Object3D {
      constructor(anisotropy) {
        super();
        // atlas
        let alphabet = [..."ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"];
        let textTexture = (() => {
          let c = document.createElement("canvas");
          let ctx = c.getContext("2d");
          let texSize = 2048;
          c.width = texSize;
          c.height = texSize;
          ctx.clearRect(0, 0, texSize, texSize);
          let dim = 8;
          let dimStep = texSize / dim;
          for (let i = 0; i < alphabet.length; i++) {
            let tileX = i % 8;
            let tileY = Math.floor(i / 8);
            let x = (tileX + 0.5) * dimStep;
            let y = texSize - (tileY + 0.5) * dimStep;
            // Draw letters in white to allow dynamic coloring in shader via material color multiplier
            ctx.fillStyle = `rgba(255, 255, 255, 1)`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = `bold ${dimStep * 0.9}px Arial`;
            ctx.fillText(alphabet[i], x, y);
          }
          let tex = new THREE.CanvasTexture(c);
          tex.colorSpace = "srgb";
          tex.anisotropy = anisotropy;
          return tex;
        })(); // atlas

        let tileDim = 200;

        let g = new THREE.PlaneGeometry();
        g.setAttribute("letterIdx", new THREE.InstancedBufferAttribute(new Float32Array(Array.from({
          length: tileDim * tileDim
        }, () => {
          return THREE.MathUtils.randInt(0, alphabet.length - 1)
        })), 1));
        
        let m = new THREE.MeshBasicMaterial({
          color: new THREE.Color(settings.textColor),
          map: textTexture,
          transparent: true,
          alphaTest: 0.01,
          side: THREE.DoubleSide,
          onBeforeCompile: shader => {
            shader.vertexShader = `
              attribute float letterIdx;
              varying float vLetterIdx;
              ${shader.vertexShader}
            `.replace(
              `#include <uv_vertex>`,
              `#include <uv_vertex>
              vLetterIdx = letterIdx;
              `
            );

            shader.fragmentShader = `
              varying float vLetterIdx;
              ${shader.fragmentShader}
            `.replace(
              `#include <map_fragment>`,
              `
              float letterIdx = floor(vLetterIdx + 0.1);
              float tileStep = 1. / 8.;
              float u = mod(letterIdx, 8.);
              float v = floor(letterIdx / 8.);
              vec2 iUv = (vec2(u, v) + vMapUv) * tileStep;
              vec4 sampledDiffuseColor = texture2D( map, iUv );
              diffuseColor *= sampledDiffuseColor;
              `
            );
          }
        });
        let io = new THREE.InstancedMesh(g, m, tileDim * tileDim);
        this.instancedMesh = io;

        this.dummy = new THREE.Object3D();

        this.finals = [];

        let tri = new THREE.Triangle();
        let n = new THREE.Vector3();
        let la = new THREE.Vector3();

        function getY(x, z) {
          return simplex.noise(x * 0.01, z * 0.01) * 7.5;
        }

        let setFinals = () => {
          let y0 = getY(this.dummy.position.x, this.dummy.position.z);
          let y1 = getY(this.dummy.position.x, this.dummy.position.z - 1);
          let y2 = getY(this.dummy.position.x + 1, this.dummy.position.z);
          this.dummy.position.y = y0;

          tri.a.set(this.dummy.position.x, y1, this.dummy.position.z - 1);
          tri.b.set(this.dummy.position.x, y0, this.dummy.position.z);
          tri.c.set(this.dummy.position.x + 1, y2, this.dummy.position.z);
          tri.getNormal(n);

          la.copy(this.dummy.position).add(n);
          this.dummy.lookAt(la);
          this.dummy.rotation.z = 0; // align along Z-axis of the terrain
          this.dummy.updateMatrix();

          this.finals.push({
            y: y0,
            pos: this.dummy.position.clone(),
            rot: this.dummy.rotation.clone(),
            dummy: new THREE.Object3D(),
            inAction: false,
            mediators: {
              v: new THREE.Vector3(),
              v2: new THREE.Vector3()
            }
          })
        }
        
        // make it grid
        for (let z = 0; z < tileDim; z++) {
          for (let x = 0; x < tileDim; x++) {
            this.dummy.position.x = -(tileDim - 1) * 0.5 + x;
            this.dummy.position.z = -(tileDim - 1) * 0.5 + z;
            setFinals(this.dummy.position);
            this.instancedMesh.setMatrixAt(z * tileDim + x, this.dummy.matrix);
          }
        } // make it grid

        this.add(io);
        
        // actions section
        this.actions = Array.from({
          length: 5000
        }, () => {
          let action = (delay) => {
            let getFreeLetterIndex = () => {
              let letterIndex = Math.floor(Math.random() * this.finals.length);;
              if (!this.finals[letterIndex].inAction) {
                return letterIndex;
              } else {
                return getFreeLetterIndex();
              }
            }

            let freeLetterIndex = getFreeLetterIndex();
            let freeLetter = this.finals[freeLetterIndex];
            let height = 30;
            let m = freeLetter.mediators;
            let v = m.v;
            let v2 = m.v2;

            v2.random().multiplyScalar(0.5).addScalar(0.5).multiplyScalar(Math.PI * 3 * Math.sign(Math.random() - 0.5));

            let tween = new TWEEN.Tween({
                val: 0
              }).to({
                val: 1
              }, 10000)
              .delay(delay)
              .onStart(() => {freeLetter.inAction = true;})
              .onUpdate(val => {
                v.lerpVectors(v2, freeLetter.rot, val.val);
                freeLetter.dummy.rotation.set(v.x, v.y, v.z);
                freeLetter.dummy.position.copy(freeLetter.pos);
                freeLetter.dummy.position.y = THREE.MathUtils.lerp(height, freeLetter.y, val.val);
                freeLetter.dummy.updateMatrix();
                io.setMatrixAt(freeLetterIndex, freeLetter.dummy.matrix);
              })
              .onComplete(() => {
                freeLetter.inAction = false;
                action(Math.random() * 10000);
              });
              tween.start(customTime);
          }
          return action;
        }) // actions section
      }
    }

    let scene = new THREE.Scene();
    scene.fog = new THREE.Fog("#fff", 100, 150);
    scene.background = new THREE.Color("#fff");
    let camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 1, 500);
    camera.position.set(0, 3, 8).setLength(50);
    let renderer = new THREE.WebGLRenderer({
      antialias: true
    });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(settings.dpr);
    document.body.appendChild(renderer.domElement);

    window.addEventListener("resize", event => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    })

    let controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enableZoom = true;
    controls.enablePan = true;
    controls.screenSpacePanning = true;

    let textTerrain = new TextTerrain(renderer.capabilities.getMaxAnisotropy());
    scene.add(textTerrain);
    textTerrain.actions.forEach(action => {
      action((Math.random() * 0.9 + 0.1) * 10000);
    }); // start the actions

    // Setup GUI
    const gui = new GUI({ title: "Controls" });
    
    // Green Screen
    gui.add(settings, "greenScreen").name("Green Screen").onChange(updateColors);

    // Color Preset
    let presetCtrl = gui.add(settings, "colorPreset", [
      "Minimalist Light",
      "Cyber Matrix",
      "Neon Sunset",
      "Deep Space",
      "Volcanic Gold",
      "Custom"
    ]).name("Color Preset").onChange(applyColorPreset);

    // Color Pickers
    let textColorCtrl = gui.addColor(settings, "textColor").name("Text Color").onChange(() => {
      settings.colorPreset = "Custom";
      presetCtrl.updateDisplay();
      updateColors();
    });

    let bgColorCtrl = gui.addColor(settings, "bgColor").name("Background Color").onChange(() => {
      settings.colorPreset = "Custom";
      presetCtrl.updateDisplay();
      updateColors();
    });

    // Camera Animations
    gui.add(settings, "currentAnimation", [
      "Orbit",
      "Wave Fly",
      "Zoom Pulse",
      "Figure 8",
      "Static"
    ]).name("Camera Animation").onChange(() => {
      phase = 0;
    });

    // Speed Scale
    gui.add(settings, "animationSpeed", 0.0, 3.0, 0.1).name("Speed Scale");

    // DPR
    gui.add(settings, "dpr", 0.5, 3.0, 0.1).name("DPR (Pixel Ratio)").onChange(val => {
      renderer.setPixelRatio(val);
    });

    function applyColorPreset(name) {
      if (name === "Custom") return;
      if (name === "Minimalist Light") {
        settings.textColor = "#111111";
        settings.bgColor = "#ffffff";
      } else if (name === "Cyber Matrix") {
        settings.textColor = "#00ff66";
        settings.bgColor = "#050e05";
      } else if (name === "Neon Sunset") {
        settings.textColor = "#ff5e62";
        settings.bgColor = "#1e0b1e";
      } else if (name === "Deep Space") {
        settings.textColor = "#00f0ff";
        settings.bgColor = "#0d0d1a";
      } else if (name === "Volcanic Gold") {
        settings.textColor = "#ffaa00";
        settings.bgColor = "#111111";
      }

      updateColors();
      textColorCtrl.updateDisplay();
      bgColorCtrl.updateDisplay();
    }

    function updateColors() {
      if (textTerrain && textTerrain.instancedMesh) {
        textTerrain.instancedMesh.material.color.set(settings.textColor);
      }
      if (settings.greenScreen) {
        scene.background.set("#00ff00");
        if (scene.fog) scene.fog.color.set("#00ff00");
      } else {
        scene.background.set(settings.bgColor);
        if (scene.fog) scene.fog.color.set(settings.bgColor);
      }
    }

    // Set initial preset
    applyColorPreset("Minimalist Light");

    // Hotkey 'H' to toggle GUI
    let guiVisible = true;
    window.addEventListener("keydown", event => {
      if (event.key === "h" || event.key === "H") {
        guiVisible = !guiVisible;
        if (guiVisible) {
          gui.show();
        } else {
          gui.hide();
        }
      }
    });

    // Animation state variables
    let isInteracting = false;
    let baseRadius = camera.position.distanceTo(controls.target);
    let initSpherical = new THREE.Spherical();
    initSpherical.setFromVector3(camera.position.clone().sub(controls.target));
    let basePhi = initSpherical.phi;
    let baseTheta = initSpherical.theta;
    let phase = 0;
    let wheelTimeout;

    renderer.domElement.addEventListener('pointerdown', () => { isInteracting = true; });
    window.addEventListener('pointerup', () => { isInteracting = false; });
    renderer.domElement.addEventListener('wheel', () => {
      isInteracting = true;
      clearTimeout(wheelTimeout);
      wheelTimeout = setTimeout(() => { isInteracting = false; }, 1000);
    });

    renderer.setAnimationLoop(() => {
      let dt = clock.getDelta();
      
      customTime += dt * 1000 * settings.animationSpeed;
      TWEEN.update(customTime);

      if (settings.currentAnimation !== "Static") {
        let currentSpherical = new THREE.Spherical();
        currentSpherical.setFromVector3(camera.position.clone().sub(controls.target));

        if (isInteracting) {
          baseRadius = currentSpherical.radius;
          basePhi = currentSpherical.phi;
          baseTheta = currentSpherical.theta;
        } else {
          phase += dt * settings.animationSpeed;

          if (settings.currentAnimation === "Orbit") {
            baseTheta += dt * 0.1 * settings.animationSpeed;
            currentSpherical.theta = baseTheta;
          } else if (settings.currentAnimation === "Wave Fly") {
            baseTheta += dt * 0.08 * settings.animationSpeed;
            currentSpherical.theta = baseTheta;
            currentSpherical.phi = basePhi + Math.sin(phase * 0.5) * 0.15;
          } else if (settings.currentAnimation === "Zoom Pulse") {
            currentSpherical.radius = baseRadius * (1.0 + Math.sin(phase * 0.5) * 0.15);
          } else if (settings.currentAnimation === "Figure 8") {
            baseTheta += dt * 0.06 * settings.animationSpeed;
            currentSpherical.theta = baseTheta;
            currentSpherical.phi = basePhi + Math.sin(phase * 1.2) * 0.15;
            currentSpherical.radius = baseRadius * (1.0 + Math.cos(phase * 0.6) * 0.08);
          }

          currentSpherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, currentSpherical.phi));
          currentSpherical.makeSafe();

          camera.position.setFromSpherical(currentSpherical).add(controls.target);
        }
      } else {
        let currentSpherical = new THREE.Spherical();
        currentSpherical.setFromVector3(camera.position.clone().sub(controls.target));
        baseRadius = currentSpherical.radius;
        basePhi = currentSpherical.phi;
        baseTheta = currentSpherical.theta;
      }

      controls.update();
      textTerrain.instancedMesh.instanceMatrix.needsUpdate = true;
      renderer.render(scene, camera);
    });

  </script>
</body>
</html>
