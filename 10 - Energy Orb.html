<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volumetric Fractal Shader 10</title>

    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Import lil-gui -->
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
        }

        body.dragging {
            cursor: grabbing;
        }

        body.greenscreen {
            background-color: #00ff00;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <script>
        // Configuration object for lil-gui
        const settings = {
            dpr: 1.0,
            zoom: 1.0,
            panX: 0.0,
            panY: 0.0,
            greenScreen: false,
            backgroundColor: '#000000',
            backgroundCutoff: 0.08,
            flightSpeed: 0.2,
            animSpeed: -1.5,
            lightIntensity: 25000.0,
            colorR: 4.2,
            colorG: -1.6,
            colorB: 5.4,
            grainAmount: 0.0
        };

        // Initialize WebGL Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(settings.dpr);
        renderer.setClearColor(settings.backgroundColor, 1);
        document.body.appendChild(renderer.domElement);

        // Initialize Scene and Orthographic Camera (ideal for full-screen shaders)
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const hexToVector3 = (hex) => {
            const color = new THREE.Color(hex);
            return new THREE.Vector3(color.r, color.g, color.b);
        };

        // Define Uniforms to pass data from JS to GLSL
        const uniforms = {
            iTime: { value: 0.0 },
            iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uZoom: { value: settings.zoom },
            uPan: { value: new THREE.Vector2(settings.panX, settings.panY) },
            uBackgroundColor: { value: hexToVector3(settings.backgroundColor) },
            uBackgroundCutoff: { value: settings.backgroundCutoff },
            uFlightSpeed: { value: settings.flightSpeed },
            uAnimSpeed: { value: settings.animSpeed },
            uLightIntensity: { value: settings.lightIntensity },
            uColorOffset: { value: new THREE.Vector3(settings.colorR, settings.colorG, settings.colorB) },
            uGrainAmount: { value: settings.grainAmount }
        };

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            uniform float iTime;
            uniform vec2 iResolution;

            // GUI Uniforms
            uniform float uZoom;
            uniform vec2 uPan;
            uniform vec3 uBackgroundColor;
            uniform float uBackgroundCutoff;
            uniform float uFlightSpeed;
            uniform float uAnimSpeed;
            uniform float uLightIntensity;
            uniform vec3 uColorOffset;
            uniform float uGrainAmount;

            float hash(vec3 p) {
                p = fract(p * 0.9631);
                p += dot(p, p.yzx + 33.33);
                return fract((p.x + p.y) * p.z);
            }

            // Safe fallback for tanh (not natively supported in all WebGL1 environments)
            vec4 customTanh(vec4 x) {
                vec4 exp2x = exp(clamp(2.0 * x, -80.0, 80.0));
                return (exp2x - 1.0) / (exp2x + 1.0);
            }

            void main() {
                vec2 uv = (2.0 * vUv - 1.0) * vec2(iResolution.x / iResolution.y, 1.0);
                uv = (uv - uPan) / max(uZoom, 0.05);

                float time = iTime;
                float tFlight = time * uFlightSpeed;
                float tAnim = time * uAnimSpeed;

                // Setup ray direction
                vec3 rayDir = normalize(vec3(uv, -1.7));

                vec4 accumulatedLight = vec4(0.0);

                // Generate cinematic noise grain based on absolute pixel coordinates
                vec2 fragCoord = vUv * iResolution;
                float grain = hash(vec3(fragCoord, time * 5.0));

                float totalDist = 1.2 + grain * 0.15;

                float stepDist = 0.1;
                float structuralVal = 0.1;

                for (int i = 0; i < 99; i++) {
                    vec3 pos = totalDist * rayDir;

                    // Apply pre-calculated flight speed
                    pos.z -= tFlight;
                    pos.z = mod(pos.z + 2.1, 3.5) - 2.1;

                    vec3 rotAxis = normalize(cos(vec3(0.6, 1.3, 0.2) - totalDist * 1.8));
                    vec3 twistedSpace = rotAxis * dot(rotAxis, pos) - cross(rotAxis, pos);

                    // Fractal loop
                    float scale = 8.3;
                    for (int j = 2; j < 8; j++) {
                        scale += 13.3;
                        // Apply pre-calculated animation time
                        twistedSpace += sin(twistedSpace * scale + tAnim).yzx / scale;
                    }

                    structuralVal = twistedSpace.y;

                    // Standard, fast 100% step (no multipliers)
                    stepDist = 0.3 * abs(length(pos) - 0.7) + 0.03 * abs(structuralVal);
                    totalDist += stepDist;

                    // Compute dynamic color palette driven by GUI uniforms
                    vec4 palette = cos(structuralVal + vec4(uColorOffset, 0.0)) + 1.2;

                    // Accumulate light safely without zero-division artifacts
                    accumulatedLight += (palette / max(stepDist, 0.01)) * totalDist;

                    // Early Exit (Saves huge performance in bright areas)
                    if (accumulatedLight.x > 90000.0) break;

                    // Far Clipping Plane
                    if (totalDist > 25.0) break;
                }

                // Final color compilation
                vec4 shaderColor = customTanh(accumulatedLight / uLightIntensity);
                shaderColor.rgb += (grain - 1.1) * uGrainAmount;

                float brightness = max(max(shaderColor.r, shaderColor.g), shaderColor.b);
                float objectMask = smoothstep(uBackgroundCutoff, uBackgroundCutoff + 0.12, brightness);
                gl_FragColor = vec4(mix(uBackgroundColor, shaderColor.rgb, objectMask), 1.0);
            }
        `;

        // Create full-screen plane with custom shader
        const geometry = new THREE.PlaneGeometry(2, 2);
        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: uniforms
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const updateResolution = () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
        };

        const updateView = () => {
            uniforms.uZoom.value = settings.zoom;
            uniforms.uPan.value.set(settings.panX, settings.panY);
        };

        const applyBackground = () => {
            const color = settings.greenScreen ? '#00ff00' : settings.backgroundColor;
            document.body.classList.toggle('greenscreen', settings.greenScreen);
            renderer.setClearColor(color, 1);
            uniforms.uBackgroundColor.value.copy(hexToVector3(color));
        };

        // Setup lil-gui Interface
        const gui = new lil.GUI({ title: 'Shader Settings' });
        gui.close(); // Collapse the panel by default

        const renderFolder = gui.addFolder('Render & View');
        renderFolder.add(settings, 'dpr', 0.1, 4.0, 0.1)
           .name('Device Pixel Ratio')
           .onChange(value => {
               renderer.setPixelRatio(value);
               updateResolution();
           });
        renderFolder.add(settings, 'zoom', 0.2, 8.0, 0.01).name('Zoom').onChange(updateView);
        renderFolder.add(settings, 'panX', -4.0, 4.0, 0.01).name('Pan X').onChange(updateView);
        renderFolder.add(settings, 'panY', -4.0, 4.0, 0.01).name('Pan Y').onChange(updateView);

        const backgroundFolder = gui.addFolder('Background');
        backgroundFolder.add(settings, 'greenScreen').name('Green Screen #00ff00').onChange(applyBackground);
        backgroundFolder.addColor(settings, 'backgroundColor').name('Background Color').onChange(applyBackground);
        backgroundFolder.add(settings, 'backgroundCutoff', 0.0, 0.4, 0.01).name('Background Cutoff').onChange(value => {
            uniforms.uBackgroundCutoff.value = value;
        });

        const motionFolder = gui.addFolder('Motion Parameters');
        motionFolder.add(settings, 'flightSpeed', -1.0, 1.0).name('Flight Speed');
        motionFolder.add(settings, 'animSpeed', -5.0, 5.0).name('Animation Speed');

        const visualFolder = gui.addFolder('Visual & Lighting');
        visualFolder.add(settings, 'lightIntensity', 1000.0, 100000.0).name('Light Intensity');
        visualFolder.add(settings, 'grainAmount', 0.0, 0.5).name('Noise Grain Amount');

        const colorsFolder = gui.addFolder('Color Palette Offsets');
        colorsFolder.add(settings, 'colorR', -10.0, 10.0).name('Red Offset');
        colorsFolder.add(settings, 'colorG', -10.0, 10.0).name('Green Offset');
        colorsFolder.add(settings, 'colorB', -10.0, 10.0).name('Blue Offset');

        // Drag across the screen to pan the shader object.
        let isDragging = false;
        let previousPointer = { x: 0, y: 0 };

        window.addEventListener('pointerdown', (event) => {
            if (event.target.closest('.lil-gui')) return;

            isDragging = true;
            previousPointer = { x: event.clientX, y: event.clientY };
            document.body.classList.add('dragging');
            renderer.domElement.setPointerCapture?.(event.pointerId);
        });

        window.addEventListener('pointermove', (event) => {
            if (!isDragging) return;

            const deltaX = event.clientX - previousPointer.x;
            const deltaY = event.clientY - previousPointer.y;
            const panScale = 2 / window.innerHeight;

            settings.panX += deltaX * panScale / settings.zoom;
            settings.panY -= deltaY * panScale / settings.zoom;
            updateView();

            previousPointer = { x: event.clientX, y: event.clientY };
        });

        const stopDragging = (event) => {
            isDragging = false;
            document.body.classList.remove('dragging');
            if (event?.pointerId !== undefined) {
                renderer.domElement.releasePointerCapture?.(event.pointerId);
            }
        };

        window.addEventListener('pointerup', stopDragging);
        window.addEventListener('pointercancel', stopDragging);

        // Mouse wheel zooms toward the pointer position.
        window.addEventListener('wheel', (event) => {
            if (event.target.closest('.lil-gui')) return;

            event.preventDefault();
            const previousZoom = settings.zoom;
            const zoomFactor = Math.exp(-event.deltaY * 0.001);
            settings.zoom = THREE.MathUtils.clamp(settings.zoom * zoomFactor, 0.2, 8.0);

            const rect = renderer.domElement.getBoundingClientRect();
            const x = (event.clientX - rect.left) / rect.width;
            const y = 1.0 - (event.clientY - rect.top) / rect.height;
            const aspect = window.innerWidth / window.innerHeight;
            const pointerUv = new THREE.Vector2(
                (2.0 * x - 1.0) * aspect,
                2.0 * y - 1.0
            );
            const zoomRatio = previousZoom / settings.zoom;

            settings.panX = pointerUv.x - (pointerUv.x - settings.panX) * zoomRatio;
            settings.panY = pointerUv.y - (pointerUv.y - settings.panY) * zoomRatio;
            updateView();
        }, { passive: false });

        // Handle Window Resizing
        window.addEventListener('resize', updateResolution);

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            // Update uniforms based on GUI settings and elapsed time
            uniforms.iTime.value = clock.getElapsedTime();
            uniforms.uFlightSpeed.value = settings.flightSpeed;
            uniforms.uAnimSpeed.value = settings.animSpeed;
            uniforms.uLightIntensity.value = settings.lightIntensity;
            uniforms.uColorOffset.value.set(settings.colorR, settings.colorG, settings.colorB);
            uniforms.uGrainAmount.value = settings.grainAmount;

            renderer.render(scene, camera);
        }

        applyBackground();
        updateResolution();
        updateView();

        // Start animation
        animate();
    </script>
</body>
</html>
