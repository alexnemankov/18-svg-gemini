<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morphing Shapes - Interactive Demo</title>
  <style>
    @property --state-top-corners {
      syntax: '<percentage>';
      inherits: true;
      initial-value: 0%;
    }

    @property --state-top-center {
      syntax: '<percentage>';
      inherits: true;
      initial-value: 0%;
    }

    @property --state-bottom-corners {
      syntax: '<percentage>';
      inherits: true;
      initial-value: 0%;
    }

    @property --state-bottom-center {
      syntax: '<percentage>';
      inherits: true;
      initial-value: 0%;
    }

    :root {
      /* Base Colors for the selected theme (Default Cyberpunk) */
      --base-c1: #0d0e15;
      --base-c2: #ff007f;
      --base-c3: #00f0ff;
      --base-c4: #7b2cbf;
      --base-c5: #9d4edd;
      --base-c6: #3a0ca3;
      --base-c7: #4361ee;
      --base-c8: #f72585;
      --bg-color: #05060b;
      --speed: 7s;
      --delay-ms: 80ms;
    }

    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #stage {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      background-color: var(--bg-color);
      transition: background-color 0.3s ease;
    }

    #stage:active {
      cursor: grabbing;
    }

    #morph-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: center center;
      transform: translate(0px, 0px) scale(1);
      will-change: transform;
    }

    span {
      --delay: calc(var(--sibling-index) * var(--delay-ms));
      
      position: fixed;
      inset: 0;
      
      clip-path: polygon(
        0% var(--state-top-corners, 0%),
        50% var(--state-top-center, 0%),
        100% var(--state-top-corners, 0%),
        100% var(--state-bottom-corners, 0%),
        50% var(--state-bottom-center, 0%),
        0% var(--state-bottom-corners, 0%)
      );
      clip-path: shape(
        from 0% var(--state-top-corners, 0%),
        line to 50% var(--state-top-center, 0%),
        line to 100% var(--state-top-corners, 0%),
        line to 100% var(--state-bottom-corners, 0%),
        line to 50% var(--state-bottom-center, 0%),
        line to 0% var(--state-bottom-corners, 0%),
        close
      );

      animation:
        move var(--speed, 10s) var(--delay, 0s) ease-in-out infinite,
        colors var(--speed, 10s) var(--delay, 0s) ease-in-out infinite;
    }

    /* Set up explicit child variables for index fallback */
    span:nth-of-type(1) { --sibling-index: 1; background: var(--c1); }
    span:nth-of-type(2) { --sibling-index: 2; background: var(--c2); }
    span:nth-of-type(3) { --sibling-index: 3; background: var(--c3); }
    span:nth-of-type(4) { --sibling-index: 4; background: var(--c4); }
    span:nth-of-type(5) { --sibling-index: 5; background: var(--c5); }
    span:nth-of-type(6) { --sibling-index: 6; background: var(--c6); }
    span:nth-of-type(7) { --sibling-index: 7; background: var(--c7); }
    span:nth-of-type(8) { --sibling-index: 8; background: var(--c8); }

    @keyframes move {
      12% {
        --state-top-corners: 0%;
        --state-top-center: 0%;
        --state-bottom-corners: 0%;
        --state-bottom-center: 0%;
      }
      24%, 28% {
        --state-top-corners: 0%;
        --state-top-center: 0%;
        --state-bottom-corners: 0%;
        --state-bottom-center: 100%;
      }
      40%,
      60% {
        --state-top-corners: 0%;
        --state-top-center: 0%;
        --state-bottom-corners: 100%;
        --state-bottom-center: 100%;
      }
      72%, 76% {
        --state-top-corners: 0%;
        --state-top-center: 100%;
        --state-bottom-corners: 100%;
        --state-bottom-center: 100%;
      }
      88% {
        --state-top-corners: 100%;
        --state-top-center: 100%;
        --state-bottom-corners: 100%;
        --state-bottom-center: 100%;
      }
    }

    @keyframes colors {
      0%, 50% {
        z-index: var(--sibling-index);
        
        --c1: var(--base-c1);
        --c2: var(--base-c2);
        --c3: var(--base-c3);
        --c4: var(--base-c4);
        --c5: var(--base-c5);
        --c6: var(--base-c6);
        --c7: var(--base-c7);
        --c8: var(--base-c8);
      }
      51%, 100% {
        z-index: calc(9 - var(--sibling-index));
        
        --c8: var(--base-c1);
        --c7: var(--base-c2);
        --c6: var(--base-c3);
        --c5: var(--base-c4);
        --c4: var(--base-c5);
        --c3: var(--base-c6);
        --c2: var(--base-c7);
        --c1: var(--base-c8);
      }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="morph-container">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <script type="module">
    import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // 5 IT/tech-themed presets
    const presets = {
      'Cyberpunk': {
        bg: '#05060b',
        colors: ['#0d0e15', '#ff007f', '#00f0ff', '#7b2cbf', '#9d4edd', '#3a0ca3', '#4361ee', '#f72585']
      },
      'Synthwave': {
        bg: '#0b0514',
        colors: ['#1a0b2e', '#ff7b00', '#ff0055', '#d90429', '#8338ec', '#3a86c8', '#ff007f', '#05050a']
      },
      'Matrix Terminal': {
        bg: '#010502',
        colors: ['#000a02', '#00ff41', '#003b00', '#008f11', '#0d5c14', '#1f8b2c', '#3df253', '#021a04']
      },
      'Clean Tech': {
        bg: '#f4f6fa',
        colors: ['#f4f6fa', '#1e3a8a', '#3b82f6', '#60a5fa', '#93c5fd', '#0891b2', '#0ea5e9', '#0f172a']
      },
      'Deep Space': {
        bg: '#010915',
        colors: ['#0b0f19', '#ff9f1c', '#ffbf69', '#ffffff', '#2ec4b6', '#cbf3f0', '#0f2b46', '#011627']
      },
      'Custom': {
        bg: '#05060b',
        colors: ['#0d0e15', '#ff007f', '#00f0ff', '#7b2cbf', '#9d4edd', '#3a0ca3', '#4361ee', '#f72585']
      }
    };

    // State initialization
    let scale = 1.0;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let greenscreen = false;

    let currentPresetName = 'Cyberpunk';
    let customColors = [...presets[currentPresetName].colors];
    let customBg = presets[currentPresetName].bg;

    const morphContainer = document.getElementById('morph-container');
    const stage = document.getElementById('stage');

    function applyTheme() {
      const root = document.documentElement;
      root.style.setProperty('--bg-color', greenscreen ? '#00ff00' : customBg);
      for (let i = 0; i < 8; i++) {
        root.style.setProperty(`--base-c${i + 1}`, customColors[i]);
      }
    }

    function updateTransform() {
      morphContainer.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    // Zoom on wheel (towards mouse cursor)
    stage.addEventListener('wheel', (e) => {
      e.preventDefault();
      const zoomFactor = 1.1;
      const oldScale = scale;

      if (e.deltaY < 0) {
        scale *= zoomFactor;
      } else {
        scale /= zoomFactor;
      }

      scale = Math.max(0.1, Math.min(20, scale));

      const rect = stage.getBoundingClientRect();
      const mouseX = e.clientX - rect.left - rect.width / 2;
      const mouseY = e.clientY - rect.top - rect.height / 2;

      translateX = mouseX - (mouseX - translateX) * (scale / oldScale);
      translateY = mouseY - (mouseY - translateY) * (scale / oldScale);

      updateTransform();
    }, { passive: false });

    // Drag / Pan across screen
    stage.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return; // Only left click
      isDragging = true;
      startX = e.clientX - translateX;
      startY = e.clientY - translateY;
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      translateX = e.clientX - startX;
      translateY = e.clientY - startY;
      updateTransform();
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // GUI Setup
    const state = {
      preset: 'Cyberpunk',
      greenscreen: false,
      bgColor: presets['Cyberpunk'].bg,
      c1: presets['Cyberpunk'].colors[0],
      c2: presets['Cyberpunk'].colors[1],
      c3: presets['Cyberpunk'].colors[2],
      c4: presets['Cyberpunk'].colors[3],
      c5: presets['Cyberpunk'].colors[4],
      c6: presets['Cyberpunk'].colors[5],
      c7: presets['Cyberpunk'].colors[6],
      c8: presets['Cyberpunk'].colors[7],
      speed: 7,
      delay: 80,
      resetView: () => {
        scale = 1.0;
        translateX = 0;
        translateY = 0;
        updateTransform();
      }
    };

    const gui = new GUI({ title: 'Morph Controls' });
    let isUpdatingPreset = false;

    const presetController = gui.add(state, 'preset', ['Cyberpunk', 'Synthwave', 'Matrix Terminal', 'Clean Tech', 'Deep Space', 'Custom']).name('Theme Preset');
    
    presetController.onChange((val) => {
      if (isUpdatingPreset) return;
      if (val === 'Custom') return;

      const p = presets[val];
      state.bgColor = p.bg;
      customBg = p.bg;
      for (let i = 0; i < 8; i++) {
        state[`c${i + 1}`] = p.colors[i];
        customColors[i] = p.colors[i];
      }

      // Sync GUI
      bgController.updateDisplay();
      c1Controller.updateDisplay();
      c2Controller.updateDisplay();
      c3Controller.updateDisplay();
      c4Controller.updateDisplay();
      c5Controller.updateDisplay();
      c6Controller.updateDisplay();
      c7Controller.updateDisplay();
      c8Controller.updateDisplay();

      applyTheme();
    });

    gui.add(state, 'greenscreen').name('Green Screen').onChange((val) => {
      greenscreen = val;
      applyTheme();
    });

    const folderColors = gui.addFolder('Colors');

    function markAsCustom() {
      isUpdatingPreset = true;
      state.preset = 'Custom';
      presetController.updateDisplay();
      isUpdatingPreset = false;
    }

    const bgController = folderColors.addColor(state, 'bgColor').name('Background').onChange((val) => {
      customBg = val;
      markAsCustom();
      applyTheme();
    });

    const c1Controller = folderColors.addColor(state, 'c1').name('Color 1').onChange((val) => {
      customColors[0] = val;
      markAsCustom();
      applyTheme();
    });
    const c2Controller = folderColors.addColor(state, 'c2').name('Color 2').onChange((val) => {
      customColors[1] = val;
      markAsCustom();
      applyTheme();
    });
    const c3Controller = folderColors.addColor(state, 'c3').name('Color 3').onChange((val) => {
      customColors[2] = val;
      markAsCustom();
      applyTheme();
    });
    const c4Controller = folderColors.addColor(state, 'c4').name('Color 4').onChange((val) => {
      customColors[3] = val;
      markAsCustom();
      applyTheme();
    });
    const c5Controller = folderColors.addColor(state, 'c5').name('Color 5').onChange((val) => {
      customColors[4] = val;
      markAsCustom();
      applyTheme();
    });
    const c6Controller = folderColors.addColor(state, 'c6').name('Color 6').onChange((val) => {
      customColors[5] = val;
      markAsCustom();
      applyTheme();
    });
    const c7Controller = folderColors.addColor(state, 'c7').name('Color 7').onChange((val) => {
      customColors[6] = val;
      markAsCustom();
      applyTheme();
    });
    const c8Controller = folderColors.addColor(state, 'c8').name('Color 8').onChange((val) => {
      customColors[7] = val;
      markAsCustom();
      applyTheme();
    });

    const folderAnim = gui.addFolder('Animation');
    folderAnim.add(state, 'speed', 1, 30, 0.5).name('Speed (s)').onChange((val) => {
      document.documentElement.style.setProperty('--speed', `${val}s`);
    });
    folderAnim.add(state, 'delay', 0, 500, 10).name('Delay (ms)').onChange((val) => {
      document.documentElement.style.setProperty('--delay-ms', `${val}ms`);
    });

    gui.add(state, 'resetView').name('Reset View');

    // Initial draw
    applyTheme();
  </script>
</body>
</html>
