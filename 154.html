<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Shape-Outside Text Flow</title>
  <style>
    :root {
      --bg-color-1: purple;
      --bg-color-2: red;
      --text-color-1: #F0FFF3;
      --text-color-2: #ffffff;
      --main-filter: saturate(200%) sepia(50%) hue-rotate(-26deg);
      --dpr: 1;
    }

    html, body, main { 
      height: 100%; 
      margin: 0; 
      overflow: hidden;
      user-select: none;
      background: #000;
    }

    main { 
      width: 100%;
      height: 100%;
      display: flex; 
      align-items: center; 
      justify-content: center;  
      background: linear-gradient(135deg, var(--bg-color-1), var(--bg-color-2));
      filter: var(--main-filter);
      transition: background 0.3s ease;
    }

    main.greenscreen {
      background: #00ff00 !important;
      filter: none !important;
    }

    container {
      width: calc(900px * var(--dpr)); 
      height: calc(600px * var(--dpr));
      overflow: hidden;
      display: block;
      position: relative;
      transform-origin: center center;
    }

    p {
      margin: 0;
      word-break: break-all;
      text-align: right;
      line-height: 1.1;
      font-size: calc(10px * var(--dpr));
      color: var(--text-color-1);
      --offset: 50;
      mask: linear-gradient(to left, #fff, transparent calc(var(--offset) * 1%));
      -webkit-mask: linear-gradient(to left, #fff, transparent calc(var(--offset) * 1%));
    }

    span {
      text-shadow:
        calc(10px * var(--dpr)) 0 calc(10px * var(--dpr)) currentColor,
        calc(-10px * var(--dpr)) 0 calc(10px * var(--dpr)) currentColor;
    }

    .shape {
      width: calc(400px * var(--dpr)); 
      height: calc(600px * var(--dpr));
      float: right;
      shape-outside: polygon(
        0.25% 2px, 99.94% 0.27%, 99.75% 100%, 19.87% 100.03%, 0 100%, 30.61% 100.07%, 
        37.38% 99.82%, 44.21% 99.38%, 50.92% 99.34%, 71.39% 98.43%, 76.61% 98.79%, 
        82.65% 97.6%, 85.9% 95.73%, 90.12% 93.85%, 88.45% 89.91%, 87.41% 87.1%, 
        85.48% 85.09%, 84.96% 82.33%, 88.66% 81.41%, 90.55% 79.29%, 91.75% 77.23%, 
        91.23% 75.11%, 88.48% 73.75%, 90.93% 72.26%, 92.34% 70.16%, 91.59% 67.66%, 
        89.87% 64.91%, 87.01% 63.42%, 89.87% 62.01%, 93.04% 60.71%, 96.53% 58.57%, 
        97.8% 55.26%, 95.36% 53.2%, 91.46% 51.56%, 86.6% 49.21%, 83.43% 47%, 
        79.27% 44.12%, 77.05% 40.66%, 75.51% 37.07%, 75.49% 33.04%, 76.3% 28.93%, 
        75.99% 25.46%, 74.57% 22.25%, 72.88% 18.96%, 69.97% 15.51%, 66.59% 12.23%, 
        62.29% 9.2%, 57.33% 7.06%, 52.77% 5.2%, 46.55% 3.55%, 38.59% 1.5%, 27.73% 0.92%
      );
      transition: outline 0.2s, background-color 0.2s;
    }

    .shape.helper-visible {
      outline: 2px dashed rgba(255, 255, 255, 0.4);
      background-color: rgba(255, 255, 255, 0.1);
    }

    /* Style override for the UI */
    .lil-gui {
      --background-color: rgba(20, 20, 25, 0.9);
      --text-color: #e0e0e0;
      --title-background-color: #2c2c35;
      --widget-color: #3c3c45;
      --hover-color: #5c5c65;
      --focus-color: #007acc;
      --number-color: #00ffcc;
      --string-color: #ff9900;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .lil-gui.hidden-gui {
      display: none !important;
    }
  </style>
</head>
<body>

<main>
  <container>
    <div class="shape"></div>
    <div class="chars"></div>
  </container>
</main>

<script type="module">
  import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

  const container = document.querySelector('container');
  const chars = container.querySelector('.chars');
  const mainEl = document.querySelector('main');
  const shapeEl = document.querySelector('.shape');

  // Set up settings and presets
  const schemes = {
    'Original Retro': {
      bgColor1: '#800080',
      bgColor2: '#ff0000',
      textColor1: '#F0FFF3',
      textColor2: '#ffffff',
      filter: 'saturate(200%) sepia(50%) hue-rotate(-26deg)'
    },
    'Cyber Neon': {
      bgColor1: '#0d0221',
      bgColor2: '#26043d',
      textColor1: '#00f0ff',
      textColor2: '#ff007f',
      filter: 'none'
    },
    'Acid Matrix': {
      bgColor1: '#051405',
      bgColor2: '#000000',
      textColor1: '#39ff14',
      textColor2: '#a3ff00',
      filter: 'none'
    },
    'Sunset Flame': {
      bgColor1: '#1c0700',
      bgColor2: '#3d0c00',
      textColor1: '#ffbf00',
      textColor2: '#ff3c00',
      filter: 'none'
    },
    'Glacial Aurora': {
      bgColor1: '#011627',
      bgColor2: '#0f3057',
      textColor1: '#00ffcc',
      textColor2: '#9b5de5',
      filter: 'none'
    }
  };

  const settings = {
    greenscreen: false,
    scheme: 'Original Retro',
    bgColor1: schemes['Original Retro'].bgColor1,
    bgColor2: schemes['Original Retro'].bgColor2,
    textColor1: schemes['Original Retro'].textColor1,
    textColor2: schemes['Original Retro'].textColor2,
    dpr: 1.0,
    speed: 1.0,
    animation: 'Gentle Float',
    showHelper: false
  };

  // Setup state for zoom & drag
  let scale = 0.8;
  let translateX = 0;
  let translateY = 0;
  let isDragging = false;
  let dragStartX = 0;
  let dragStartY = 0;
  let startX = 0;
  let startY = 0;
  let dragDistance = 0;

  // File Upload Handling
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = '.svg';
  fileInput.style.display = 'none';
  document.body.appendChild(fileInput);

  let currentBlobUrl = null;

  function applySVGShape(url) {
    if (currentBlobUrl) {
      URL.revokeObjectURL(currentBlobUrl);
    }
    currentBlobUrl = url;
    
    shapeEl.style.shapeOutside = `url(${url})`;
    shapeEl.style.backgroundImage = `url(${url})`;
    shapeEl.style.backgroundSize = 'contain';
    shapeEl.style.backgroundRepeat = 'no-repeat';
    shapeEl.style.backgroundPosition = 'right center';
    shapeEl.style.shapeImageThreshold = '0.1';
  }

  function resetShape() {
    if (currentBlobUrl) {
      URL.revokeObjectURL(currentBlobUrl);
      currentBlobUrl = null;
    }
    shapeEl.style.shapeOutside = '';
    shapeEl.style.backgroundImage = '';
    shapeEl.style.shapeImageThreshold = '';
  }

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const url = URL.createObjectURL(file);
      applySVGShape(url);
    }
  });

  // Init GUI
  const gui = new GUI({ title: 'Controls' });

  // General Settings Folder
  const generalFolder = gui.addFolder('General');
  
  generalFolder.add(settings, 'greenscreen').name('Green Screen').onChange((val) => {
    if (val) {
      mainEl.classList.add('greenscreen');
    } else {
      mainEl.classList.remove('greenscreen');
    }
  });

  generalFolder.add(settings, 'dpr', 0.5, 3.0, 0.1).name('Pixel Ratio (DPR)').onChange((val) => {
    document.documentElement.style.setProperty('--dpr', val);
    updateTransform();
  });

  generalFolder.add(settings, 'speed', 0.0, 3.0, 0.1).name('Speed Factor');

  // Animation Folder
  const animFolder = gui.addFolder('Animation');
  animFolder.add(settings, 'animation', [
    'Static',
    'Gentle Float',
    'Orbit Tilt',
    'Breathing Pulse',
    'Cinematic Drift'
  ]).name('Camera Path');

  // Color Customization Folder
  const colorFolder = gui.addFolder('Colors');

  const schemeNames = [...Object.keys(schemes), 'Custom'];
  const schemeController = colorFolder.add(settings, 'scheme', schemeNames).name('Preset').onChange((val) => {
    if (val !== 'Custom') {
      applyScheme(val);
    }
  });

  const bgColor1Controller = colorFolder.addColor(settings, 'bgColor1').name('BG Color 1').onChange(onColorChange);
  const bgColor2Controller = colorFolder.addColor(settings, 'bgColor2').name('BG Color 2').onChange(onColorChange);
  const textColor1Controller = colorFolder.addColor(settings, 'textColor1').name('Text Color 1').onChange(onColorChange);
  const textColor2Controller = colorFolder.addColor(settings, 'textColor2').name('Text Color 2').onChange(onColorChange);

  function applyScheme(schemeName) {
    const scheme = schemes[schemeName];
    if (scheme) {
      settings.bgColor1 = scheme.bgColor1;
      settings.bgColor2 = scheme.bgColor2;
      settings.textColor1 = scheme.textColor1;
      settings.textColor2 = scheme.textColor2;

      document.documentElement.style.setProperty('--bg-color-1', scheme.bgColor1);
      document.documentElement.style.setProperty('--bg-color-2', scheme.bgColor2);
      document.documentElement.style.setProperty('--text-color-1', scheme.textColor1);
      document.documentElement.style.setProperty('--text-color-2', scheme.textColor2);
      document.documentElement.style.setProperty('--main-filter', scheme.filter);

      bgColor1Controller.updateDisplay();
      bgColor2Controller.updateDisplay();
      textColor1Controller.updateDisplay();
      textColor2Controller.updateDisplay();
    }
  }

  function onColorChange() {
    settings.scheme = 'Custom';
    schemeController.updateDisplay();

    document.documentElement.style.setProperty('--bg-color-1', settings.bgColor1);
    document.documentElement.style.setProperty('--bg-color-2', settings.bgColor2);
    document.documentElement.style.setProperty('--text-color-1', settings.textColor1);
    document.documentElement.style.setProperty('--text-color-2', settings.textColor2);
    document.documentElement.style.setProperty('--main-filter', 'none');
  }

  // Custom Shape Folder
  const shapeFolder = gui.addFolder('Custom Shape');
  shapeFolder.add({ upload: () => fileInput.click() }, 'upload').name('Upload SVG Form');
  shapeFolder.add({ reset: () => resetShape() }, 'reset').name('Reset to Polygon');
  shapeFolder.add(settings, 'showHelper').name('Show Boundaries').onChange((val) => {
    if (val) {
      shapeEl.classList.add('helper-visible');
    } else {
      shapeEl.classList.remove('helper-visible');
    }
  });

  // Base functions for random text content
  function r(from, to) {
    return Math.random() * (to - from + 1) + from;
  }

  function ri(from, to) {
    return ~~r(from, to);
  }

  function pick() {
    return arguments[ri(0, arguments.length - 1)];
  }

  function generateText(times = 100) {
    return sequence(times, () => `
      <span>${ String.fromCharCode(ri(0x25a0, 0x25FC)) }</span>
    `);
  }

  function build() {
    chars.innerHTML = sequence(50, () => `
      <p style="--offset: ${ r(50, 100) }; color: ${ pick('var(--text-color-1)', 'var(--text-color-2)') }">
        ${ generateText(ri(20, 100)) }
      </p>
    `);
  }

  function sequence(count, fn) {
    let ret = [];
    for (let i = 0; i < count; ++i) {
      ret.push(fn(i));
    }
    return ret.join('');
  }

  // Camera Transformation Update
  function updateTransform() {
    // Basic scale/translation is applied through requestAnimationFrame with animation paths
  }

  // Mouse wheel zoom
  mainEl.addEventListener('wheel', (e) => {
    e.preventDefault();
    const zoomSpeed = 0.001;
    scale += e.deltaY * -zoomSpeed;
    scale = Math.max(0.1, Math.min(10.0, scale));
  }, { passive: false });

  // Panning/Dragging
  mainEl.addEventListener('mousedown', (e) => {
    if (e.target.closest('.lil-gui') || e.target.closest('input')) return;
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    startX = e.clientX - translateX;
    startY = e.clientY - translateY;
    mainEl.style.cursor = 'grabbing';
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    translateX = e.clientX - startX;
    translateY = e.clientY - startY;
  });

  window.addEventListener('mouseup', (e) => {
    if (isDragging) {
      isDragging = false;
      mainEl.style.cursor = 'default';
      dragDistance = Math.hypot(e.clientX - dragStartX, e.clientY - dragStartY);
    }
  });

  // Re-generate shapes on click, but only if they didn't drag
  document.body.addEventListener('click', (e) => {
    if (e.target.closest('.lil-gui') || e.target.closest('input')) return;
    if (dragDistance > 5) {
      dragDistance = 0;
      return;
    }
    build();
  });

  // Toggle UI visibility with "H" key
  window.addEventListener('keydown', (e) => {
    if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) {
      return;
    }
    if (e.key === 'h' || e.key === 'H') {
      const guiEl = document.querySelector('.lil-gui');
      if (guiEl) {
        guiEl.classList.toggle('hidden-gui');
      }
    }
  });

  // Animation ticks and loop
  let lastTime = 0;
  let accumulatedTime = 0;
  let animTime = 0;

  function animate(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const delta = timestamp - lastTime;
    lastTime = timestamp;

    // Camera paths
    if (settings.animation !== 'Static') {
      animTime += delta * 0.001 * settings.speed;
    }

    let animTranslateX = 0;
    let animTranslateY = 0;
    let animRotate = 0;
    let animScale = 1.0;

    switch (settings.animation) {
      case 'Gentle Float':
        animTranslateX = Math.sin(animTime * 1.2) * 25;
        animTranslateY = Math.cos(animTime * 0.8) * 15;
        break;
      case 'Orbit Tilt':
        animRotate = Math.sin(animTime * 0.6) * 3;
        animTranslateX = Math.cos(animTime * 0.5) * 15;
        animTranslateY = Math.sin(animTime * 0.5) * 15;
        animScale = 1.0 + Math.sin(animTime * 0.4) * 0.03;
        break;
      case 'Breathing Pulse':
        animScale = 1.0 + Math.sin(animTime * 0.8) * 0.08;
        animTranslateY = Math.cos(animTime * 0.8) * 8;
        break;
      case 'Cinematic Drift':
        animTranslateX = Math.sin(animTime * 0.4) * 50;
        animTranslateY = Math.cos(animTime * 0.6) * 20;
        animRotate = Math.sin(animTime * 0.3) * 1.5;
        break;
      case 'Static':
      default:
        break;
    }

    // Apply scaling combined with user zoom and DPR scaling
    const finalScale = (scale * animScale) / settings.dpr;
    const finalX = translateX + animTranslateX;
    const finalY = translateY + animTranslateY;

    container.style.transform = `translate(${finalX}px, ${finalY}px) scale(${finalScale}) rotate(${animRotate}deg)`;

    // Text scroll logic
    if (settings.speed > 0) {
      accumulatedTime += delta * settings.speed;
      const interval = 60; // original speed base (ms)
      while (accumulatedTime >= interval) {
        if (chars.lastElementChild) {
          chars.prepend(chars.lastElementChild);
        }
        accumulatedTime -= interval;
      }
    }

    requestAnimationFrame(animate);
  }

  // Initialize and run
  applyScheme('Original Retro');
  build();
  requestAnimationFrame(animate);
</script>
</body>
</html>
