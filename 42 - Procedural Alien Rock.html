<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Rock Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #f5f5f5; font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        canvas { display: block; }
        .lil-gui.root {
            position: absolute;
            bottom: 20px;
            right: 20px;
            top: auto !important;
        }
        /* Instructions Overlay */
        #instructions {
            position: absolute;
            top: 15px;
            left: 15px;
            color: rgba(0, 0, 0, 0.7);
            font-size: 13px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
            z-index: 100;
            transition: color 0.3s, background-color 0.3s, border-color 0.3s;
        }
        /* Style adjustments based on background mode */
        body.dark-mode #instructions {
            color: rgba(255, 255, 255, 0.85);
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body.greenscreen-active #instructions {
            color: rgba(0, 0, 0, 0.85);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 255, 0, 0.3);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "simplex-noise": "https://unpkg.com/simplex-noise@4.0.1/dist/esm/simplex-noise.js"
            }
        }
    </script>
</head>
<body>
    <div id="instructions">
        Left Click + Drag: <strong>Rotate</strong> | Right Click + Drag: Pan (Drag Object) | Scroll Wheel: Zoom
    </div>

    <!-- Input for loading rock texture -->
    <input type="file" id="textureInput" accept="image/*" style="display: none;">

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
        import { createNoise3D } from 'simplex-noise';

        let scene, camera, renderer, controls;
        let rockMesh, shadowPlane;
        let noise3D;
        let defaultTexture, currentTexture;
        let clock = new THREE.Clock();

        // 5 Pre-setup color schemes
        const colorSchemes = {
            'Default Sand': {
                backgroundColor: '#f5f5f5',
                rockColor: '#a3a3a3',
                shadowColor: '#000000'
            },
            'Volcanic Obsidian': {
                backgroundColor: '#151518',
                rockColor: '#303035',
                shadowColor: '#000000'
            },
            'Acid Jade': {
                backgroundColor: '#0d1f11',
                rockColor: '#39ff14',
                shadowColor: '#000000'
            },
            'Cherry Blossom': {
                backgroundColor: '#fff0f5',
                rockColor: '#ffb7c5',
                shadowColor: '#442228'
            },
            'Abyssal Trench': {
                backgroundColor: '#080e18',
                rockColor: '#00aaff',
                shadowColor: '#000000'
            }
        };

        const params = {
            // --- Scene Colors ---
            backgroundColor: '#f5f5f5',
            shadowColor: '#000000',

            // --- Dimensions ---
            scaleWidth: 2.2,
            scaleLength: 1.383,
            scaleHeight: 0.5,
            
            // --- Shadow & Light ---
            shadowOpacity: 0.103,

            // --- Deformation Settings ---
            baseSize: 2.0,
            
            layerFrequency: 3.5,
            distortion: 1.434,
            layerStrength: 1.159,
            
            detailStrength: 0.07,
            detailScale: 11.214,
            sharpness: 1.508,
            
            // --- Texture & Material ---
            rockColor: '#a3a3a3',
            rockRoughness: 0.496,
            rockBumpScale: 0.0648,
            
            texRepeatX: 1.0,
            texRepeatY: 1.0,
            texRotation: 0,
            
            // --- Physics/Anim ---
            tiltZ: 15,
            floatSpeed: 0.8,
            floatHeight: 0.15,
            rotateSpeed: 0.1,

            // --- Interactions & Greenscreen ---
            greenscreen: false,
            colorScheme: 'Default Sand',
            controlMode: 'Rotate',

            // Actions
            loadTexture: () => document.getElementById('textureInput').click()
        };

        init();
        animate();

        function init() {
            // 1. Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(params.backgroundColor);
            // Fog matches background
            scene.fog = new THREE.Fog(params.backgroundColor, 12, 40);

            // 2. Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 4, 14);

            // 3. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            document.body.appendChild(renderer.domElement);

            // 4. Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            // Main Sun Light
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
            dirLight.position.set(5, 12, 5);
            dirLight.castShadow = true;
            
            dirLight.shadow.mapSize.set(2048, 2048);
            dirLight.shadow.bias = -0.0001;
            dirLight.shadow.radius = 4; 
            
            const d = 10;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0xddeeff, 0.4);
            fillLight.position.set(-5, 0, -5);
            scene.add(fillLight);

            // 5. Floor (Shadow Catcher)
            const planeGeo = new THREE.PlaneGeometry(100, 100);
            const planeMat = new THREE.ShadowMaterial({ 
                opacity: params.shadowOpacity, 
                color: new THREE.Color(params.shadowColor) 
            });
            shadowPlane = new THREE.Mesh(planeGeo, planeMat);
            shadowPlane.rotation.x = -Math.PI / 2;
            shadowPlane.position.y = -3.5;
            shadowPlane.receiveShadow = true;
            scene.add(shadowPlane);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.enablePan = true;

            noise3D = createNoise3D();

            generateDefaultTexture(); 
            createRock();
            setupGUI();
            updateBackground();

            document.getElementById('textureInput').addEventListener('change', handleTextureUpload);
            window.addEventListener('resize', onWindowResize);
        }

        function generateDefaultTexture() {
            const size = 1024;
            const data = new Uint8Array(4 * size * size);
            for (let i = 0; i < size * size; i++) {
                const stride = i * 4;
                const v = 50 + Math.random() * 50; 
                data[stride] = v;
                data[stride+1] = v;
                data[stride+2] = v;
                data[stride+3] = 255;
            }
            const tex = new THREE.DataTexture(data, size, size);
            
            tex.wrapS = THREE.MirroredRepeatWrapping;
            tex.wrapT = THREE.MirroredRepeatWrapping;
            
            tex.needsUpdate = true;
            defaultTexture = tex;
            currentTexture = tex;
        }

        function createRock() {
            if (rockMesh) {
                scene.remove(rockMesh);
                rockMesh.geometry.dispose();
                rockMesh.material.dispose();
            }

            const geometry = new THREE.IcosahedronGeometry(params.baseSize, 200);
            const posAttribute = geometry.getAttribute('position');
            const vertex = new THREE.Vector3();

            const tiltRad = THREE.MathUtils.degToRad(params.tiltZ);
            const cosT = Math.cos(tiltRad);
            const sinT = Math.sin(tiltRad);

            // 1. Deformation Loop
            for (let i = 0; i < posAttribute.count; i++) {
                vertex.fromBufferAttribute(posAttribute, i);

                // Scale
                vertex.x *= params.scaleWidth;
                vertex.z *= params.scaleLength; 
                vertex.y *= params.scaleHeight;

                // Noise logic
                const rotX = vertex.x * cosT - vertex.y * sinT;
                const rotY = vertex.x * sinT + vertex.y * cosT;
                const rotZ = vertex.z;

                const warp = noise3D(rotX*0.5, rotY*0.5, rotZ*0.5) * params.distortion;
                const layerPos = (rotY * params.layerFrequency) + warp;
                let layerNoise = noise3D(rotX*0.2, layerPos, rotZ*0.2);
                
                const ds = params.detailScale;
                const rawDetail = noise3D(vertex.x * ds, vertex.y * ds, vertex.z * ds);
                let sharpDetail = 1.0 - Math.abs(rawDetail);
                sharpDetail = Math.pow(sharpDetail, params.sharpness); 
                
                let totalDisp = 1 + (layerNoise * params.layerStrength * 0.3);
                totalDisp += (sharpDetail * params.detailStrength);

                vertex.multiplyScalar(totalDisp);
                posAttribute.setXYZ(i, vertex.x, vertex.y, vertex.z);
            }

            // 2. Normals & UV Re-projection
            geometry.computeVertexNormals();

            // PLANAR PROJECTION
            const uvAttribute = geometry.attributes.uv;
            for (let i = 0; i < posAttribute.count; i++) {
                const x = posAttribute.getX(i);
                const z = posAttribute.getZ(i);
                
                uvAttribute.setXY(i, (x / params.scaleWidth) * 0.5 + 0.5, (z / params.scaleLength) * 0.5 + 0.5);
            }
            uvAttribute.needsUpdate = true;

            // 3. Material Setup
            currentTexture.wrapS = THREE.MirroredRepeatWrapping;
            currentTexture.wrapT = THREE.MirroredRepeatWrapping;
            currentTexture.repeat.set(params.texRepeatX, params.texRepeatY);
            currentTexture.rotation = params.texRotation;

            const material = new THREE.MeshStandardMaterial({
                color: new THREE.Color(params.rockColor),
                map: currentTexture,
                bumpMap: currentTexture, 
                bumpScale: params.rockBumpScale,
                roughness: params.rockRoughness,
                metalness: 0.1,
            });

            rockMesh = new THREE.Mesh(geometry, material);
            rockMesh.castShadow = true;
            rockMesh.receiveShadow = true;
            
            rockMesh.rotation.z = tiltRad;

            scene.add(rockMesh);
        }

        function handleTextureUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                const loader = new THREE.TextureLoader();
                loader.load(ev.target.result, (tex) => {
                    tex.colorSpace = THREE.SRGBColorSpace;
                    tex.wrapS = THREE.MirroredRepeatWrapping;
                    tex.wrapT = THREE.MirroredRepeatWrapping;
                    currentTexture = tex;
                    createRock();
                });
            };
            reader.readAsDataURL(file);
        }

        function isDarkColor(hex) {
            const color = new THREE.Color(hex);
            const luma = 0.299 * color.r + 0.587 * color.g + 0.114 * color.b;
            return luma < 0.5;
        }

        function updateBackground() {
            if (params.greenscreen) {
                const green = new THREE.Color('#00ff00');
                scene.background = green;
                if (scene.fog) scene.fog.color = green;
                renderer.setClearColor(green);
                document.body.classList.remove('dark-mode');
                document.body.classList.add('greenscreen-active');
            } else {
                const c = new THREE.Color(params.backgroundColor);
                scene.background = c;
                if (scene.fog) scene.fog.color = c;
                renderer.setClearColor(c);
                document.body.classList.remove('greenscreen-active');
                if (isDarkColor(params.backgroundColor)) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }
        }

        let greenscreenController, bgController, shadowColorController, rockColorController, schemeController;

        function applyColorScheme(schemeName) {
            const scheme = colorSchemes[schemeName];
            if (scheme) {
                params.greenscreen = false;
                if (greenscreenController) greenscreenController.updateDisplay();

                if (bgController) bgController.setValue(scheme.backgroundColor);
                if (rockColorController) rockColorController.setValue(scheme.rockColor);
                if (shadowColorController) shadowColorController.setValue(scheme.shadowColor);
                
                updateBackground();
                if (shadowPlane) shadowPlane.material.color.set(scheme.shadowColor);
                if (rockMesh && rockMesh.material) rockMesh.material.color.set(scheme.rockColor);
            }
        }

        function setupGUI() {
            const gui = new GUI({ title: 'Settings' });

            // --- Scene Background ---
            const fBg = gui.addFolder('Scene Background & Interaction');
            greenscreenController = fBg.add(params, 'greenscreen').name('Green Screen (#00ff00)').onChange(updateBackground);
            schemeController = fBg.add(params, 'colorScheme', Object.keys(colorSchemes)).name('Preset Scheme').onChange(applyColorScheme);
            bgController = fBg.addColor(params, 'backgroundColor').name('Bg Color').onChange(c => {
                params.greenscreen = false;
                greenscreenController.updateDisplay();
                updateBackground();
            });
            fBg.add(params, 'controlMode', ['Rotate', 'Pan']).name('Left Click Drag').onChange(v => {
                if (v === 'Pan') {
                    controls.mouseButtons.LEFT = THREE.MOUSE.PAN;
                    controls.mouseButtons.RIGHT = THREE.MOUSE.ROTATE;
                    document.getElementById('instructions').innerHTML = 'Left Click + Drag: <strong>Pan (Drag Object)</strong> | Right Click + Drag: Rotate | Scroll Wheel: Zoom';
                } else {
                    controls.mouseButtons.LEFT = THREE.MOUSE.ROTATE;
                    controls.mouseButtons.RIGHT = THREE.MOUSE.PAN;
                    document.getElementById('instructions').innerHTML = 'Left Click + Drag: <strong>Rotate</strong> | Right Click + Drag: Pan (Drag Object) | Scroll Wheel: Zoom';
                }
            });
            fBg.open();

            const fDims = gui.addFolder('Dimensions & Shadow');
            fDims.add(params, 'scaleWidth', 1.0, 4.0).name('Width (X)').onChange(createRock);
            fDims.add(params, 'scaleLength', 1.0, 4.0).name('Length (Z)').onChange(createRock);
            fDims.add(params, 'shadowOpacity', 0.0, 1.0).name('Shadow Opacity').onChange(v => {
                if(shadowPlane) shadowPlane.material.opacity = v;
            });
            shadowColorController = fDims.addColor(params, 'shadowColor').name('Shadow Color').onChange(c => {
                if(shadowPlane) shadowPlane.material.color.set(c);
            });
            fDims.open();

            const fTex = gui.addFolder('Texture & Material');
            rockColorController = fTex.addColor(params, 'rockColor').name('Tint Color').onChange(c => {
                if (rockMesh && rockMesh.material) rockMesh.material.color.set(c);
            });
            fTex.add(params, 'rockRoughness', 0.0, 1.0).name('Roughness').onChange(v => {
                if (rockMesh && rockMesh.material) rockMesh.material.roughness = v;
            });
            fTex.add(params, 'rockBumpScale', -0.2, 0.2).name('Bump Scale').onChange(v => {
                if (rockMesh && rockMesh.material) rockMesh.material.bumpScale = v;
            });
            
            fTex.add(params, 'texRepeatX', 0.1, 5.0).name('Repeat X').onChange(createRock);
            fTex.add(params, 'texRepeatY', 0.1, 5.0).name('Repeat Y').onChange(createRock);
            fTex.add(params, 'texRotation', 0.0, 6.28).name('Rotation').onChange(createRock);
            fTex.add(params, 'loadTexture').name('📷 Upload Texture');
            fTex.open();

            const fDef = gui.addFolder('Deformation Settings');
            fDef.add(params, 'layerFrequency', 1.0, 6.0).onChange(createRock);
            fDef.add(params, 'distortion', 0.0, 2.0).onChange(createRock);
            fDef.add(params, 'layerStrength', 0.1, 2.0).onChange(createRock);
            fDef.add(params, 'detailStrength', 0.0, 0.5).onChange(createRock);
            fDef.add(params, 'detailScale', 1.0, 15.0).onChange(createRock);
            fDef.add(params, 'sharpness', 1.0, 5.0).onChange(createRock);
            fDef.open();
            
            const fAnim = gui.addFolder('Animation');
            fAnim.add(params, 'floatSpeed', 0.0, 2.0);
            fAnim.add(params, 'rotateSpeed', 0.0, 0.5);
            fAnim.open();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (rockMesh) {
                rockMesh.position.y = Math.sin(time * params.floatSpeed) * params.floatHeight;
                rockMesh.rotation.y = time * params.rotateSpeed;
            }

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
