<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonious Bio-Surface Engine</title>
    
    <!-- Import Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Import lil-gui -->
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19"></script>

    <style>
        :root {
            --bg-glass: rgba(10, 12, 15, 0.72);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-color: #00ff88;
            --text-primary: #ffffff;
            --text-secondary: #a0aab0;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: grab;
        }

        body:active {
            cursor: grabbing;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* Glassmorphism HUD Panel */
        .glass-panel {
            position: absolute;
            top: 24px;
            left: 24px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
            color: var(--text-primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            width: 280px;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: top left;
        }

        .glass-panel.minimized {
            width: 180px;
            padding: 12px 16px;
        }

        .glass-panel.minimized .hud-content {
            display: none;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hud-header h3 {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #fff 30%, rgba(255, 255, 255, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .hud-desc {
            font-size: 11px;
            color: var(--text-secondary);
            margin: 10px 0 16px 0;
            line-height: 1.5;
            font-weight: 300;
        }

        .hud-stats {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            margin-bottom: 6px;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.4);
        }

        .stat-value {
            font-family: monospace;
            color: var(--accent-color);
            font-weight: 600;
        }

        .hud-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .hud-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #fff;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hud-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .toggle-btn .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: rgba(0, 255, 0, 0.15);
            border-color: rgba(0, 255, 0, 0.4);
            color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.15);
        }

        .toggle-btn.active .dot {
            background: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }

        #instructions-overlay {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            background: var(--bg-glass);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 12px;
            pointer-events: none;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 50;
        }

        /* lil-gui custom styling */
        .lil-gui.root {
            position: absolute !important;
            top: 24px !important;
            right: 24px !important;
        }

        .lil-gui {
            --background-color: rgba(10, 12, 15, 0.85) !important;
            --text-color: #f1f5f9 !important;
            --title-background-color: rgba(18, 20, 25, 0.95) !important;
            --widget-color: rgba(30, 35, 41, 0.5) !important;
            --hover-color: var(--accent-color) !important;
            --focus-color: var(--accent-color) !important;
            font-family: 'Outfit', sans-serif !important;
            border-radius: 12px !important;
            overflow: hidden !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6) !important;
            border: 1px solid var(--border-glass) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
        }
    </style>
</head>
<body>

    <!-- HUD panel overlay -->
    <div id="hud-panel" class="glass-panel">
        <div class="hud-header">
            <h3>Bio-Organic Surface HUD</h3>
            <button id="hud-toggle-btn" class="icon-btn">—</button>
        </div>
        <div class="hud-content">
            <p class="hud-desc">An interactive, procedurally animated organic fluid simulation. Drag the fluid canvas to pan, use the scroll wheel to zoom.</p>
            
            <div class="hud-stats">
                <div class="stat-row">
                    <span class="stat-label">Zoom Level</span>
                    <span class="stat-value" id="stat-zoom">1.00x</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Offset</span>
                    <span class="stat-value" id="stat-offset">0.00, 0.00</span>
                </div>
            </div>

            <div class="hud-actions">
                <button id="btn-reset" class="hud-btn">Reset View</button>
                <button id="btn-greenscreen" class="hud-btn toggle-btn">
                    <span class="dot"></span>
                    Green Screen
                </button>
            </div>
        </div>
    </div>

    <!-- Instruction overlay -->
    <div id="instructions-overlay">
        Left-click & Drag surface to move | Scroll to zoom | Double-click to reset view
    </div>

    <script>
        // --------------------------------------------------------
        // SCENE SETUP
        // --------------------------------------------------------
        const scene = new THREE.Scene();
        
        // Orthographic camera for a 2D full-screen shader
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
        camera.position.z = 1;

        // Use alpha: true to support background color updates through DOM
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0); // Transparent canvas background
        document.body.appendChild(renderer.domElement);

        // --------------------------------------------------------
        // SHADERS
        // --------------------------------------------------------
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            uniform float uTime;
            uniform vec2 uResolution;

            uniform vec3 uColor1; // Deepest Valley (Shadow)
            uniform vec3 uColor2; // Slope Dark
            uniform vec3 uColor3; // Slope Light
            uniform vec3 uColor4; // Peak (Highlight)

            uniform vec3 uLightPos;
            uniform float uDepth;

            uniform float uSpeed;
            uniform float uNoiseScale;
            uniform float uWarpAmount;
            uniform float uFoldFrequency;
            uniform float uAngle;
            uniform float uConnections; // Parameter for organic bridges
            uniform float uShadowWidth; // Control shadow thinness

            // Ashima's 3D Simplex Noise
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

            float snoise(vec3 v) {
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy; 
                vec3 x3 = x0 - D.yyy;      
                i = mod289(i);
                vec4 p = permute( permute( permute(
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                        + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z); 
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );    
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;
                vec4 m = max(0.5 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 105.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            // Harmonious, ultra-soft biological surface algorithm
            float getSurface(vec2 p) {
                float c = cos(uAngle), s = sin(uAngle);
                mat2 rot = mat2(c, -s, s, c);
                vec2 rp = rot * p;

                // 1. Macroscopic, buttery-smooth noise
                float n1 = snoise(vec3(rp * uNoiseScale * 0.25, uTime * uSpeed * 0.7));
                float n2 = snoise(vec3(rp * uNoiseScale * 0.25 + vec2(21.4, 15.2), uTime * uSpeed * 0.9));

                // Injecting sine waves directly into the noise vectors forces the distortion to be perfectly round
                float trig1 = sin(rp.x * uNoiseScale * 0.5 + uTime * uSpeed) * 0.3;
                float trig2 = cos(rp.y * uNoiseScale * 0.5 - uTime * uSpeed) * 0.3;

                // Soft, rounded flow vectors
                vec2 flow = vec2(n1 + trig1, n2 + trig2);

                // 2. Smooth Domain Warping
                vec2 wp = rp + flow * (uWarpAmount * 0.12);

                // 3. Fluid Mechanics (Harmonious Waves)
                float freq = uFoldFrequency * 0.5;
                
                // Phase modulation (bending the waves instead of intersecting them)
                float phase = sin(wp.y * freq + flow.y * 2.0) * uConnections;
                
                float mainWave = sin(wp.x * freq + phase * uWarpAmount * 0.3);

                // 4. Subtle depth variation to prevent flatness without breaking smoothness
                float n3 = snoise(vec3(wp * 0.5, uTime * uSpeed * 0.5));

                return (mainWave * 0.85 + n3 * 0.15) * 0.5;
            }

            void main() {
                // Using vUv instead of gl_FragCoord to enable scaling/dragging/zooming
                vec2 uv = vUv;
                vec2 p = uv * 2.0 - 1.0;
                p.x *= uResolution.x / uResolution.y;

                // Calculate Normals (Smooth derivatives)
                vec2 e = vec2(0.09, 0.0);
                float dx = (getSurface(p + e.xy) - getSurface(p - e.xy)) / (2.0 * e.x);
                float dy = (getSurface(p + e.yx) - getSurface(p - e.yx)) / (2.0 * e.x);
                
                // Prevent mathematical singularity when uDepth is 0.
                float safeDepth = max(uDepth, 0.02);
                vec3 normal = normalize(vec3(-dx, -dy, safeDepth));

                // Soft Gradient Lighting
                vec3 lightDir = normalize(uLightPos);
                float diffuse = dot(normal, lightDir) * 0.5 + 0.5;
                
                float t = diffuse;
                // Add slight depth
                t += getSurface(p) * 0.04; 
                t = clamp(t, 0.0, 1.0);

                // Extra volumetric smoothing curve
                t = t * t * (3.0 - 2.0 * t);

                // Smooth color mapping to prevent harsh highlights
                vec3 color = mix(uColor1, uColor2, smoothstep(0.0, uShadowWidth + 0.15, t));
                color = mix(color, uColor3, smoothstep(uShadowWidth + 0.05, 0.65, t));
                color = mix(color, uColor4, smoothstep(0.55, 1.05, t));

                // High-quality Dithering to eliminate banding
                float grain = fract(sin(dot(uv.xy, vec2(12.9898,78.233))) * 43758.5453);
                color += (grain - 0.5) * 0.03;

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        // --------------------------------------------------------
        // PRESETS & SETTINGS
        // --------------------------------------------------------
        const sharedParams = {
            depth: 0.04,
            lightX: 0.968,
            lightY: -0.36,
            speed: 0.1148,
            angle: 1.08699,
            foldFrequency: 1.865,
            warpAmount: 4.0,
            noiseScale: 0.714,
            connections: 0.8715,
            shadowWidth: 0.01
        };

        // Exactly 5 premium presets as requested
        const presets = {
            'Blue/Cyan': {
                color1: '#000000',
                color2: '#0048ff',
                color3: '#0088ff',
                color4: '#ffffff',
                ...sharedParams
            },
            'Purple Flow': {
                color1: '#0f002b',
                color2: '#4a00e0',
                color3: '#d9005a',
                color4: '#ff80bf',
                ...sharedParams
            },
            'Sunset Glow': {
                color1: '#26001b',
                color2: '#bd0034',
                color3: '#ff5e00',
                color4: '#ffcc00',
                ...sharedParams
            },
            'Toxic Mint': {
                color1: '#001a09',
                color2: '#006633',
                color3: '#00cc66',
                color4: '#ccffdd',
                ...sharedParams
            },
            'Cyberpunk': {
                color1: '#12003b',
                color2: '#b100e8',
                color3: '#ff007c',
                color4: '#00ffff',
                ...sharedParams
            }
        };

        // Load default preset state
        const settings = {
            preset: 'Blue/Cyan',
            ...presets['Blue/Cyan'],
            greenScreen: false,
            bgColor: '#000000'
        };

        // --------------------------------------------------------
        // MATERIAL & MESH
        // --------------------------------------------------------
        const geometry = new THREE.PlaneGeometry(2, 2);
        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTime: { value: 0 },
                uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                
                uColor1: { value: new THREE.Color(settings.color1) },
                uColor2: { value: new THREE.Color(settings.color2) },
                uColor3: { value: new THREE.Color(settings.color3) },
                uColor4: { value: new THREE.Color(settings.color4) },
                
                uDepth: { value: settings.depth },
                uLightPos: { value: new THREE.Vector3(settings.lightX, settings.lightY, 1.0) },

                uSpeed: { value: settings.speed },
                uNoiseScale: { value: settings.noiseScale },
                uWarpAmount: { value: settings.warpAmount },
                uFoldFrequency: { value: settings.foldFrequency },
                uAngle: { value: settings.angle },
                uConnections: { value: settings.connections },
                uShadowWidth: { value: settings.shadowWidth }
            }
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // --------------------------------------------------------
        // INTERACTIVE STATE (ZOOM & DRAG)
        // --------------------------------------------------------
        let targetScale = 1.0;
        let targetPosition = new THREE.Vector2(0, 0);

        let currentScale = 1.0;
        let currentPosition = new THREE.Vector2(0, 0);

        let isDragging = false;
        let previousPointerPosition = { x: 0, y: 0 };

        // Pointer / Drag Events
        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.lil-gui') || e.target.closest('#hud-panel')) return;
            
            isDragging = true;
            previousPointerPosition = { x: e.clientX, y: e.clientY };
            
            document.body.releasePointerCapture(e.pointerId);
            document.body.setPointerCapture(e.pointerId);
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.clientX - previousPointerPosition.x;
            const deltaY = e.clientY - previousPointerPosition.y;

            // Speed factor adjusted for current zoom
            const dragSpeed = 2.0 / camera.zoom;
            
            targetPosition.x += (deltaX / window.innerWidth) * dragSpeed;
            targetPosition.y -= (deltaY / window.innerHeight) * dragSpeed;

            previousPointerPosition = { x: e.clientX, y: e.clientY };
        });

        const stopDragging = () => {
            isDragging = false;
        };

        window.addEventListener('pointerup', stopDragging);
        window.addEventListener('pointercancel', stopDragging);

        // Wheel Zoom
        window.addEventListener('wheel', (e) => {
            if (e.target.closest('.lil-gui') || e.target.closest('#hud-panel')) return;
            
            const zoomSpeed = 0.15;
            const factor = e.deltaY < 0 ? (1 + zoomSpeed) : (1 - zoomSpeed);
            targetScale *= factor;
            
            // Limit scale zoom values to reasonable boundaries
            targetScale = Math.max(0.1, Math.min(targetScale, 10.0));
        }, { passive: true });

        // Double Click to Reset View
        window.addEventListener('dblclick', (e) => {
            if (e.target.closest('.lil-gui') || e.target.closest('#hud-panel')) return;
            targetScale = 1.0;
            targetPosition.set(0, 0);
        });

        // --------------------------------------------------------
        // GUI SETUP
        // --------------------------------------------------------
        const gui = new lil.GUI({ title: 'Organic Settings' });
        
        // Hide (collapse) the GUI panel by default as in the original design
        gui.close(); 
        
        // 1. Preset Selector
        gui.add(settings, 'preset', Object.keys(presets)).name('Theme Preset').onChange(applyPreset);

        // 2. Background Settings (includes Green Screen mode)
        const bgFolder = gui.addFolder('Background Configuration');
        const greenScreenCtrl = bgFolder.add(settings, 'greenScreen').name('Green Screen Mode').onChange(updateBackground);
        const bgColorCtrl = bgFolder.addColor(settings, 'bgColor').name('Background Color').onChange(updateBackground);
        bgFolder.open();

        // 3. Color Customization (Opportunity to change colors)
        const colorsFolder = gui.addFolder('Gradient Palette');
        const c1Ctrl = colorsFolder.addColor(settings, 'color1').name('Shadow (Valley)').onChange(updateColors);
        const c2Ctrl = colorsFolder.addColor(settings, 'color2').name('Mid Dark').onChange(updateColors);
        const c3Ctrl = colorsFolder.addColor(settings, 'color3').name('Mid Light').onChange(updateColors);
        const c4Ctrl = colorsFolder.addColor(settings, 'color4').name('Highlight (Peak)').onChange(updateColors);

        // 4. Wave Parameters
        const fluidFolder = gui.addFolder('Fluid & Waves');
        fluidFolder.add(settings, 'speed', 0, 0.4).name('Flow Speed').onChange(updateUniforms);
        fluidFolder.add(settings, 'angle', -Math.PI, Math.PI).name('Flow Angle').onChange(updateUniforms);
        fluidFolder.add(settings, 'foldFrequency', 0.0, 5.0).name('Wave Scale').onChange(updateUniforms); 
        fluidFolder.add(settings, 'warpAmount', 0.0, 4.0).name('Liquid Warp').onChange(updateUniforms);
        fluidFolder.add(settings, 'noiseScale', 0.0, 3.0).name('Noise Detail').onChange(updateUniforms);
        fluidFolder.add(settings, 'connections', 0.0, 1.5).name('Organic Connections').onChange(updateUniforms);
        
        // 5. Lighting Parameters
        const lightingFolder = gui.addFolder('Softness & Lighting');
        lightingFolder.add(settings, 'depth', 0.0, 2.5).name('Surface Softness').onChange(updateUniforms);
        lightingFolder.add(settings, 'shadowWidth', 0.01, 0.4).name('Shadow Width').onChange(updateUniforms);
        lightingFolder.add(settings, 'lightX', -2.0, 2.0).name('Light X').onChange(updateUniforms);
        lightingFolder.add(settings, 'lightY', -2.0, 2.0).name('Light Y').onChange(updateUniforms);

        function updateColors() {
            material.uniforms.uColor1.value.set(settings.color1);
            material.uniforms.uColor2.value.set(settings.color2);
            material.uniforms.uColor3.value.set(settings.color3);
            material.uniforms.uColor4.value.set(settings.color4);
        }

        function updateUniforms() {
            material.uniforms.uSpeed.value = settings.speed;
            material.uniforms.uNoiseScale.value = settings.noiseScale;
            material.uniforms.uWarpAmount.value = settings.warpAmount;
            material.uniforms.uAngle.value = settings.angle;
            material.uniforms.uFoldFrequency.value = settings.foldFrequency;
            material.uniforms.uDepth.value = settings.depth;
            material.uniforms.uConnections.value = settings.connections;
            material.uniforms.uShadowWidth.value = settings.shadowWidth;
            material.uniforms.uLightPos.value.set(settings.lightX, settings.lightY, 1.0);
        }

        function applyPreset(presetName) {
            const p = presets[presetName];
            Object.assign(settings, p);

            // Synchronize lil-gui controllers display
            gui.controllersRecursive().forEach(controller => controller.updateDisplay());
            updateColors();
            updateUniforms();
        }

        // --------------------------------------------------------
        // HUD INTERACTION
        // --------------------------------------------------------
        const hudPanel = document.getElementById('hud-panel');
        const hudToggleBtn = document.getElementById('hud-toggle-btn');
        if (hudToggleBtn && hudPanel) {
            hudToggleBtn.addEventListener('click', () => {
                hudPanel.classList.toggle('minimized');
                hudToggleBtn.textContent = hudPanel.classList.contains('minimized') ? '+' : '—';
            });
        }

        const btnReset = document.getElementById('btn-reset');
        if (btnReset) {
            btnReset.addEventListener('click', () => {
                targetScale = 1.0;
                targetPosition.set(0, 0);
            });
        }

        const btnGreenscreen = document.getElementById('btn-greenscreen');
        if (btnGreenscreen) {
            btnGreenscreen.addEventListener('click', () => {
                settings.greenScreen = !settings.greenScreen;
                greenScreenCtrl.setValue(settings.greenScreen);
            });
        }

        function updateBackground() {
            const activeColor = settings.greenScreen ? '#00ff00' : settings.bgColor;
            document.body.style.backgroundColor = activeColor;
            
            if (btnGreenscreen) {
                if (settings.greenScreen) {
                    btnGreenscreen.classList.add('active');
                } else {
                    btnGreenscreen.classList.remove('active');
                }
            }
        }

        // Initialize background
        updateBackground();

        // --------------------------------------------------------
        // RESIZE & ANIMATION LOOP
        // --------------------------------------------------------
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        const statZoom = document.getElementById('stat-zoom');
        const statOffset = document.getElementById('stat-offset');

        function animate() {
            requestAnimationFrame(animate);
            
            // Interpolation for smooth zoom and panning transitions
            currentScale += (targetScale - currentScale) * 0.12;
            currentPosition.x += (targetPosition.x - currentPosition.x) * 0.12;
            currentPosition.y += (targetPosition.y - currentPosition.y) * 0.12;

            // Zoom Orthographic Camera
            camera.zoom = currentScale;
            camera.updateProjectionMatrix();

            // Pan Shader Mesh
            mesh.position.x = currentPosition.x;
            mesh.position.y = currentPosition.y;

            // Sync HUD Stats text
            if (statZoom) statZoom.textContent = currentScale.toFixed(2) + 'x';
            if (statOffset) statOffset.textContent = `${currentPosition.x.toFixed(2)}, ${currentPosition.y.toFixed(2)}`;

            // Keep simulation clock ticking
            material.uniforms.uTime.value = clock.getElapsedTime();

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
