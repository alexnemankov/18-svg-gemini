<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tsParticles Noise Flow Field Customizer</title>
  <style>
    /* ---- reset ---- */
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
      transition: background-color 0.3s ease;
    }
    canvas {
      display: block;
      vertical-align: bottom;
    }
    
    /* ---- viewport container for zoom & pan ---- */
    #viewport {
      position: fixed;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      transform-origin: center center;
      will-change: transform;
    }

    /* ---- tsparticles container ---- */
    #tsparticles {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      z-index: 1;
    }

    #field {
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      z-index: 0;
    }

    .github {
      bottom: 10px;
      right: 10px;
      position: fixed;
      border-radius: 10px;
      background: #fff;
      padding: 0 12px 6px 12px;
      border: 1px solid #000;
      z-index: 1000;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .github a:hover,
    .github a:link,
    .github a:visited,
    .github a:active {
      color: #000;
      text-decoration: none;
    }

    .github img {
      height: 30px;
    }

    .github #gh-project {
      font-size: 20px;
      padding-left: 5px;
      font-weight: bold;
      vertical-align: bottom;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/gh/josephg/noisejs/perlin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@1.18.11/dist/tsparticles.min.js"></script>
  <script async="" defer="" src="https://buttons.github.io/buttons.js"></script>
</head>
<body>

  <!-- Viewport wrapper for zooming and dragging -->
  <div id="viewport">
    <!-- tsParticles container -->
    <div id="tsparticles"></div>
    <canvas id="field"></canvas>
  </div>

  <!-- https://github.com/matteobruni/tsparticles -->
  <div class="github">
    <a class="btn btn-link" href="https://github.com/matteobruni/tsparticles" title="Find more info on GitHub" style="display: flex; align-items: center; text-decoration: none;">
      <svg height="30" viewBox="0 0 16 16" version="1.1" width="30" aria-hidden="true" style="vertical-align: middle; fill: #000; margin-right: 5px;">
        <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
      </svg>
      <span id="gh-project">tsParticles</span>
    </a>
    <div>
      <a class="github-button" href="https://github.com/matteobruni/tsparticles" data-icon="octicon-star" aria-label="Star matteobruni/tsparticles on GitHub">Star</a>
      <a class="github-button" href="https://github.com/matteobruni/tsparticles/fork" data-icon="octicon-repo-forked" aria-label="Fork matteobruni/tsparticles on GitHub">Fork</a>
      <a class="github-button" href="https://github.com/matteobruni/tsparticles/releases/tag/v1.15.1" data-icon="octicon-download" aria-label="Download matteobruni/tsparticles on GitHub">Download</a>
    </div>
  </div>

  <script type="module">
    import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // Preset color schemes
    const PRESET_SCHEMES = {
      'Cyberpunk Neon': ['#ff0055', '#00ffcc', '#9900ff', '#ffcc00', '#ff00ff'],
      'Ocean Breeze': ['#005f73', '#0a9396', '#94d2bd', '#e9d8a6', '#ee9b00'],
      'Sunset Glow': ['#e76f51', '#f4a261', '#e9c46a', '#2a9d8f', '#264653'],
      'Forest Magic': ['#132a13', '#31572c', '#4f772d', '#90a955', '#ecf39e'],
      'Cosmic Dust': ['#3a0ca3', '#7209b7', '#f72585', '#4cc9f0', '#4361ee']
    };

    // GUI settings state object
    const settings = {
      greenScreen: false,
      showParticles: true,
      showField: true,
      colorScheme: 'Cyberpunk Neon',
      color1: PRESET_SCHEMES['Cyberpunk Neon'][0],
      color2: PRESET_SCHEMES['Cyberpunk Neon'][1],
      color3: PRESET_SCHEMES['Cyberpunk Neon'][2],
      color4: PRESET_SCHEMES['Cyberpunk Neon'][3],
      color5: PRESET_SCHEMES['Cyberpunk Neon'][4],
      animationPreset: 'Static',
      animationSpeed: 1.0,
      dpr: 1.0
    };

    // Flow field state
    let noiseZ;
    let size;
    let columns;
    let rows;
    let w;
    let h;
    let field;
    let canvasField = document.getElementById("field");
    let ctxField = canvasField.getContext("2d");
    let particlesContainer = null;

    // Viewport zoom & pan state
    let scale = 1.0;
    let panX = 0;
    let panY = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    // Time keeping for camera animation presets
    let lastTime = performance.now();
    let animTime = 0;

    function setup(container) {
      size = 20;
      noiseZ = 0;
      reset(container);
      window.addEventListener("resize", () => reset(particlesContainer));
    }

    function initField() {
      field = new Array(columns);
      for (let x = 0; x < columns; x++) {
        field[x] = new Array(columns);
        for (let y = 0; y < rows; y++) {
          field[x][y] = [0, 0];
        }
      }
    }

    function calculateField() {
      for (let x = 0; x < columns; x++) {
        for (let y = 0; y < rows; y++) {
          let angle = noise.simplex3(x / 50, y / 50, noiseZ) * Math.PI * 2;
          let length = noise.simplex3(x / 100 + 40000, y / 100 + 40000, noiseZ);
          field[x][y][0] = angle;
          field[x][y][1] = length;
        }
      }
    }

    function reset(container) {
      const pxRatio = settings.dpr;
      w = canvasField.offsetWidth * pxRatio;
      h = canvasField.offsetHeight * pxRatio;
      canvasField.width = w;
      canvasField.height = h;
      noise.seed(Math.random());
      columns = Math.floor(w / size) + 1;
      rows = Math.floor(h / size) + 1;
      initField();
    }

    function drawField(ctx) {
      ctx.clearRect(0, 0, canvasField.width, canvasField.height);
      if (!settings.showField) return;
      const palette = [settings.color1, settings.color2, settings.color3, settings.color4, settings.color5];
      for (let x = 0; x < columns; x++) {
        for (let y = 0; y < rows; y++) {
          let angle = field[x][y][0];
          let length = field[x][y][1];
          ctx.save();
          ctx.translate(x * size, y * size);
          ctx.rotate(angle);
          
          // Map angle to color scheme index for beautiful color coordination
          let normalized = (angle + Math.PI) / (Math.PI * 2);
          let colorIdx = Math.floor(normalized * palette.length);
          colorIdx = Math.max(0, Math.min(palette.length - 1, colorIdx));

          ctx.strokeStyle = palette[colorIdx];
          ctx.globalAlpha = 0.4;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(0, size * length);
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    // Initialize tsParticles flow field
    tsParticles
      .load("tsparticles", {
        fpsLimit: 120,
        particles: {
          number: {
            value: 200,
            density: {
              enable: true,
              value_area: 800
            }
          },
          color: {
            value: PRESET_SCHEMES[settings.colorScheme]
          },
          shape: {
            type: "circle"
          },
          opacity: {
            value: 0.7,
            random: {
              enable: true,
              minimumValue: 0.2
            },
            animation: {
              enable: true,
              speed: 1,
              minimumValue: 0.2
            }
          },
          size: {
            value: 7,
            random: {
              enable: true,
              minimumValue: 3
            },
            animation: {
              enable: true,
              speed: 5,
              minimumValue: 3
            }
          },
          line_linked: {
            enable: false,
            distance: 150,
            color: "#ffffff",
            opacity: 0.4,
            width: 1
          },
          move: {
            enable: true,
            speed: 5,
            direction: "none",
            random: false,
            straight: false,
            outMode: "out",
            bounce: false,
            warp: true,
            noise: {
              enable: true,
              delay: {
                value: 0.01
              }
            },
            trail: {
              enable: false,
              color: {
                value: "#000"
              },
              length: 30
            }
          }
        },
        interactivity: {
          detect_on: "canvas",
          events: {
            resize: true
          }
        },
        detectRetina: false, // Turned off to let custom settings.dpr handle it explicitly
        pauseOnBlur: true
      })
      .then((container) => {
        particlesContainer = container;

        container.setNoise({
          init: function () {
            setup(container);
          },
          update: function () {
            calculateField();
            noiseZ += 0.005 * settings.animationSpeed;
            drawField(ctxField);
            updateViewportTransform();
          },
          generate: function (p) {
            const pos = p.getPosition();

            const px = Math.max(Math.floor(pos.x / size), 0);
            const py = Math.max(Math.floor(pos.y / size), 0);

            if (!field || !field[px] || !field[px][py]) {
              return { angle: 0, length: 0 };
            }

            return {
              angle: field[px][py][0],
              length: field[px][py][1]
            };
          }
        });

        // Set initial custom DPR and refresh particles
        container.retina.pixelRatio = settings.dpr;
        container.refresh();
      });

    // Viewport transform updates combining manual zoom/pan and auto-animation
    function updateViewportTransform() {
      const now = performance.now();
      const deltaTime = (now - lastTime) / 1000;
      lastTime = now;

      // Accumulate time for automatic smooth animations
      animTime += deltaTime * settings.animationSpeed;

      let autoPanX = 0;
      let autoPanY = 0;
      let autoScale = 1.0;
      let autoRot = 0;

      switch (settings.animationPreset) {
        case 'Slow Drift':
          autoPanX = Math.sin(animTime * 0.5) * 80;
          autoPanY = Math.cos(animTime * 0.3) * 60;
          break;
        case 'Cosmic Breathe':
          autoScale = 1.0 + Math.sin(animTime * 0.4) * 0.2;
          break;
        case 'Spiral Orbit':
          autoPanX = Math.sin(animTime * 0.3) * 40;
          autoPanY = Math.cos(animTime * 0.3) * 40;
          autoRot = animTime * 0.05;
          break;
        case 'Nebula Wave':
          autoPanX = Math.sin(animTime * 0.4) * 60;
          autoPanY = Math.cos(animTime * 0.5) * 60;
          autoScale = 1.0 + Math.sin(animTime * 0.3) * 0.15;
          autoRot = Math.sin(animTime * 0.1) * 0.05;
          break;
        case 'Vortex Spin':
          autoScale = 1.1 + Math.sin(animTime * 0.25) * 0.1;
          autoRot = -animTime * 0.08;
          break;
        case 'Static':
        default:
          autoPanX = 0;
          autoPanY = 0;
          autoScale = 1.0;
          autoRot = 0;
          break;
      }

      const finalPanX = panX + autoPanX;
      const finalPanY = panY + autoPanY;
      const finalScale = scale * autoScale;
      const finalRot = autoRot;

      const viewport = document.getElementById('viewport');
      if (viewport) {
        viewport.style.transform = `translate(${finalPanX}px, ${finalPanY}px) scale(${finalScale}) rotate(${finalRot}rad)`;
      }
    }

    // Zoom and pan event listeners
    window.addEventListener('mousedown', (e) => {
      if (e.target.closest('.lil-gui') || e.target.closest('.github')) return;
      isDragging = true;
      startX = e.clientX - panX;
      startY = e.clientY - panY;
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      panX = e.clientX - startX;
      panY = e.clientY - startY;
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    window.addEventListener('mouseleave', () => {
      isDragging = false;
    });

    window.addEventListener('wheel', (e) => {
      if (e.target.closest('.lil-gui') || e.target.closest('.github')) return;
      const zoomFactor = 1.08;
      if (e.deltaY < 0) {
        scale = Math.min(scale * zoomFactor, 5.0);
      } else {
        scale = Math.max(scale / zoomFactor, 0.2);
      }
    }, { passive: true });

    // Keyboard shortcut to toggle UI (H key)
    let uiVisible = true;
    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'h') {
        uiVisible = !uiVisible;
        const guiEl = document.querySelector('.lil-gui');
        const ghEl = document.querySelector('.github');
        if (guiEl) guiEl.style.display = uiVisible ? 'block' : 'none';
        if (ghEl) {
          ghEl.style.opacity = uiVisible ? '1' : '0';
          ghEl.style.visibility = uiVisible ? 'visible' : 'hidden';
        }
      }
    });

    // Helper to apply current colors to tsParticles
    function applyColors() {
      const palette = [settings.color1, settings.color2, settings.color3, settings.color4, settings.color5];
      if (particlesContainer) {
        particlesContainer.options.particles.color.value = [...palette];
        particlesContainer.refresh();
      }
    }

    // Setup GUI using lil-gui
    const gui = new GUI({ title: 'Flow Field Settings' });

    // Background greenscreen option
    gui.add(settings, 'greenScreen')
      .name('Green Screen')
      .onChange((val) => {
        document.body.style.backgroundColor = val ? '#00ff00' : '#000000';
      });

    // Particle circles visibility toggle
    gui.add(settings, 'showParticles')
      .name('Show Circles')
      .onChange((val) => {
        const el = document.getElementById('tsparticles');
        if (el) el.style.display = val ? 'block' : 'none';
      });

    // Field lines visibility toggle
    gui.add(settings, 'showField')
      .name('Show Field Lines');

    // Color preset dropdown
    const colorSchemeController = gui.add(settings, 'colorScheme', Object.keys(PRESET_SCHEMES).concat('Custom'))
      .name('Color Scheme')
      .onChange((val) => {
        if (val !== 'Custom') {
          const scheme = PRESET_SCHEMES[val];
          settings.color1 = scheme[0];
          settings.color2 = scheme[1];
          settings.color3 = scheme[2];
          settings.color4 = scheme[3];
          settings.color5 = scheme[4];
          
          // Update display of color pickers
          color1Controller.updateDisplay();
          color2Controller.updateDisplay();
          color3Controller.updateDisplay();
          color4Controller.updateDisplay();
          color5Controller.updateDisplay();
          applyColors();
        }
      });

    // Preset animations dropdown
    gui.add(settings, 'animationPreset', ['Slow Drift', 'Cosmic Breathe', 'Spiral Orbit', 'Nebula Wave', 'Vortex Spin', 'Static'])
      .name('Camera Animation');

    // Animation speed multiplier
    gui.add(settings, 'animationSpeed', 0.1, 3.0, 0.1)
      .name('Speed')
      .onChange((val) => {
        if (particlesContainer) {
          particlesContainer.options.particles.move.speed = 5 * val;
          particlesContainer.options.particles.opacity.animation.speed = 1 * val;
          particlesContainer.options.particles.size.animation.speed = 5 * val;
          particlesContainer.refresh();
        }
      });

    // Custom DPR resolution ratio
    gui.add(settings, 'dpr', 0.5, 2.0, 0.1)
      .name('DPR')
      .onChange((val) => {
        reset(particlesContainer);
        if (particlesContainer) {
          particlesContainer.retina.pixelRatio = val;
          particlesContainer.refresh();
        }
      });

    // Custom Colors Folder
    const customColorsFolder = gui.addFolder('Custom Colors');
    customColorsFolder.close();

    const onCustomColorChange = () => {
      settings.colorScheme = 'Custom';
      colorSchemeController.updateDisplay();
      applyColors();
    };

    const color1Controller = customColorsFolder.addColor(settings, 'color1').name('Color 1').onChange(onCustomColorChange);
    const color2Controller = customColorsFolder.addColor(settings, 'color2').name('Color 2').onChange(onCustomColorChange);
    const color3Controller = customColorsFolder.addColor(settings, 'color3').name('Color 3').onChange(onCustomColorChange);
    const color4Controller = customColorsFolder.addColor(settings, 'color4').name('Color 4').onChange(onCustomColorChange);
    const color5Controller = customColorsFolder.addColor(settings, 'color5').name('Color 5').onChange(onCustomColorChange);
  </script>
</body>
</html>
