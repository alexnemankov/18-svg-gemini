<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tubes Cursor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body,
      html,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        touch-action: none;
        background-color: #0a0a0c;
        overflow: hidden;
        transition: background-color 0.3s ease;
      }

      #app {
        height: 100%;
        font-family: "Montserrat", serif;
      }

      #app a {
        text-decoration: none;
        color: #fff;
      }

      .hero {
        position: relative;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        pointer-events: none; /* Let pointer events pass through to canvas */
      }

      .hero a {
        pointer-events: auto; /* Make the Framer Component link clickable */
      }

      h1,
      h2,
      p {
        margin: 0;
        padding: 0;
        color: white;
        text-shadow: 0 0 20px rgba(0, 0, 0, 1);
        line-height: 100%;
        user-select: none;
      }

      h1 {
        font-size: 80px;
        font-weight: 700;
        text-transform: uppercase;
      }

      h2 {
        font-size: 60px;
        font-weight: 500;
        text-transform: uppercase;
      }

      #canvas {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>
    </div>

    <script type="module">
      import TubesCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js";
      import GUI from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

      // Initial settings & parameters
      const settings = {
        greenScreen: false,
        colorScheme: "Neon Cyberpunk",

        // Tube colors
        tubeColor1: "#f967fb",
        tubeColor2: "#53bc28",
        tubeColor3: "#6958d5",

        // Light colors
        lightColor1: "#83f36e",
        lightColor2: "#fe8a2e",
        lightColor3: "#ff008a",
        lightColor4: "#60aed5",
        lightIntensity: 200,

        // Animation settings
        animationPreset: "Gentle Drift",
        animationSpeed: 1.0,

        // Render settings
        dpr: 2.0,
      };

      // 5 Popular and original preset color schemes that fit the scene beautifully
      const PRESET_SCHEMES = {
        "Neon Cyberpunk": {
          tubes: ["#f967fb", "#53bc28", "#6958d5"],
          lights: ["#83f36e", "#fe8a2e", "#ff008a", "#60aed5"],
        },
        "Acid Vaporwave": {
          tubes: ["#ff71ce", "#01cdfe", "#05ffa1"],
          lights: ["#ff71ce", "#b967ff", "#01cdfe", "#05ffa1"],
        },
        "Volcanic Fire": {
          tubes: ["#ff3f00", "#ffaa00", "#111111"],
          lights: ["#ff1a00", "#ffaa00", "#330500", "#ffdd00"],
        },
        "Frozen Aurora": {
          tubes: ["#00ffff", "#0088ff", "#7b00ff"],
          lights: ["#00ffd5", "#0033aa", "#7b00ff", "#00ff66"],
        },
        "Golden Obsidian": {
          tubes: ["#ffd700", "#daa520", "#1a1a1a"],
          lights: ["#ffd700", "#ff8c00", "#000000", "#ffe4b5"],
        },
      };

      // Initialize TubesCursor with our first preset
      const app = TubesCursor(document.getElementById("canvas"), {
        tubes: {
          colors: PRESET_SCHEMES["Neon Cyberpunk"].tubes,
          lights: {
            intensity: settings.lightIntensity,
            colors: PRESET_SCHEMES["Neon Cyberpunk"].lights,
          },
        },
      });

      // Tracking variables for Camera position & panning
      let baseCameraX = 0;
      let baseCameraY = 0;
      let baseCameraZ = 5; // Default distance is 5

      // Set initial camera configuration
      app.three.camera.position.set(baseCameraX, baseCameraY, baseCameraZ);

      // Track user drag state
      let isDragging = false;
      let previousPointerPosition = { x: 0, y: 0 };
      let dragStart = { x: 0, y: 0 };
      let isDragActive = false;

      // Pointer event listeners for camera dragging
      window.addEventListener("pointerdown", (e) => {
        if (e.target.closest(".lil-gui") || e.target.closest("a")) return;
        isDragging = true;
        previousPointerPosition.x = e.clientX;
        previousPointerPosition.y = e.clientY;
        dragStart.x = e.clientX;
        dragStart.y = e.clientY;
        isDragActive = false;
      });

      window.addEventListener("pointermove", (e) => {
        // Determine if it is a drag vs simple click
        if (dragStart.x !== 0 || dragStart.y !== 0) {
          const dist = Math.hypot(
            e.clientX - dragStart.x,
            e.clientY - dragStart.y,
          );
          if (dist > 5) {
            isDragActive = true;
          }
        }

        if (!isDragging) return;

        const dx = e.clientX - previousPointerPosition.x;
        const dy = e.clientY - previousPointerPosition.y;

        previousPointerPosition.x = e.clientX;
        previousPointerPosition.y = e.clientY;

        // Project pixel delta to world space coordinates based on camera fov and distance
        const fov = app.three.camera.fov || 50;
        const distance = baseCameraZ;
        const factor =
          (2 * distance * Math.tan((fov * Math.PI) / 360)) / window.innerHeight;

        baseCameraX -= dx * factor;
        baseCameraY += dy * factor;
      });

      const endDrag = () => {
        isDragging = false;
        dragStart.x = 0;
        dragStart.y = 0;
      };
      window.addEventListener("pointerup", endDrag);
      window.addEventListener("pointercancel", endDrag);

      // Zooming with the mouse wheel
      window.addEventListener(
        "wheel",
        (e) => {
          if (e.target.closest(".lil-gui")) return;

          const zoomSpeed = 0.002;
          baseCameraZ += e.deltaY * zoomSpeed * baseCameraZ;
          // Clamp zoom distance so we don't go behind or too far from the cursor plane
          baseCameraZ = Math.max(1.0, Math.min(baseCameraZ, 25.0));
        },
        { passive: true },
      );

      // Handle clicks on canvas to randomize colors (matches original behavior but syncs with UI)
      document.body.addEventListener("click", (e) => {
        if (e.target.closest(".lil-gui") || e.target.closest("a")) return;
        if (isDragActive) return;

        const colors = randomColors(3);
        const lightsColors = randomColors(4);

        // Sync settings and UI
        settings.colorScheme = "Custom";
        schemeCtrl.updateDisplay();

        settings.tubeColor1 = colors[0];
        settings.tubeColor2 = colors[1];
        settings.tubeColor3 = colors[2];
        settings.lightColor1 = lightsColors[0];
        settings.lightColor2 = lightsColors[1];
        settings.lightColor3 = lightsColors[2];
        settings.lightColor4 = lightsColors[3];

        tubeColor1Ctrl.updateDisplay();
        tubeColor2Ctrl.updateDisplay();
        tubeColor3Ctrl.updateDisplay();
        lightColor1Ctrl.updateDisplay();
        lightColor2Ctrl.updateDisplay();
        lightColor3Ctrl.updateDisplay();
        lightColor4Ctrl.updateDisplay();

        app.tubes.setColors(colors);
        app.tubes.setLightsColors(lightsColors);
      });

      function randomColors(count) {
        return new Array(count).fill(0).map(
          () =>
            "#" +
            Math.floor(Math.random() * 16777215)
              .toString(16)
              .padStart(6, "0"),
        );
      }

      // Initialize lil-gui UI settings panel
      const gui = new GUI({ title: "Tubes Cursor Settings" });

      // Stop propagation to prevent 3D interaction triggers
      gui.domElement.addEventListener("click", (e) => e.stopPropagation());
      gui.domElement.addEventListener("pointerdown", (e) =>
        e.stopPropagation(),
      );

      // Green Screen Control
      const heroDiv = document.querySelector(".hero");
      gui
        .add(settings, "greenScreen")
        .name("Green Screen")
        .onChange((v) => {
          document.body.style.backgroundColor = v ? "#00ff00" : "#0a0a0c";
          if (heroDiv) {
            heroDiv.style.display = v ? "none" : "flex";
          }
        });

      // Colors Folder
      const fColors = gui.addFolder("Colors");
      const schemeCtrl = fColors
        .add(settings, "colorScheme", [
          ...Object.keys(PRESET_SCHEMES),
          "Custom",
        ])
        .name("Preset Scheme");

      const fTubeColors = fColors.addFolder("Tube Colors");
      const updateCustomColors = () => {
        settings.colorScheme = "Custom";
        schemeCtrl.updateDisplay();
        app.tubes.setColors([
          settings.tubeColor1,
          settings.tubeColor2,
          settings.tubeColor3,
        ]);
      };
      const tubeColor1Ctrl = fTubeColors
        .addColor(settings, "tubeColor1")
        .name("Color 1")
        .onChange(updateCustomColors);
      const tubeColor2Ctrl = fTubeColors
        .addColor(settings, "tubeColor2")
        .name("Color 2")
        .onChange(updateCustomColors);
      const tubeColor3Ctrl = fTubeColors
        .addColor(settings, "tubeColor3")
        .name("Color 3")
        .onChange(updateCustomColors);

      const fLightColors = fColors.addFolder("Light Colors");
      const updateCustomLights = () => {
        settings.colorScheme = "Custom";
        schemeCtrl.updateDisplay();
        app.tubes.setLightsColors([
          settings.lightColor1,
          settings.lightColor2,
          settings.lightColor3,
          settings.lightColor4,
        ]);
      };
      const lightColor1Ctrl = fLightColors
        .addColor(settings, "lightColor1")
        .name("Light 1")
        .onChange(updateCustomLights);
      const lightColor2Ctrl = fLightColors
        .addColor(settings, "lightColor2")
        .name("Light 2")
        .onChange(updateCustomLights);
      const lightColor3Ctrl = fLightColors
        .addColor(settings, "lightColor3")
        .name("Light 3")
        .onChange(updateCustomLights);
      const lightColor4Ctrl = fLightColors
        .addColor(settings, "lightColor4")
        .name("Light 4")
        .onChange(updateCustomLights);

      fColors
        .add(settings, "lightIntensity", 0, 1000, 10)
        .name("Light Intensity")
        .onChange((v) => {
          app.tubes.setLightsIntensity(v);
        });

      schemeCtrl.onChange((v) => {
        if (v !== "Custom") {
          const scheme = PRESET_SCHEMES[v];
          settings.tubeColor1 = scheme.tubes[0];
          settings.tubeColor2 = scheme.tubes[1];
          settings.tubeColor3 = scheme.tubes[2];
          settings.lightColor1 = scheme.lights[0];
          settings.lightColor2 = scheme.lights[1];
          settings.lightColor3 = scheme.lights[2];
          settings.lightColor4 = scheme.lights[3];

          tubeColor1Ctrl.updateDisplay();
          tubeColor2Ctrl.updateDisplay();
          tubeColor3Ctrl.updateDisplay();
          lightColor1Ctrl.updateDisplay();
          lightColor2Ctrl.updateDisplay();
          lightColor3Ctrl.updateDisplay();
          lightColor4Ctrl.updateDisplay();

          app.tubes.setColors(scheme.tubes);
          app.tubes.setLightsColors(scheme.lights);
        }
      });

      // Camera & Animation Folder
      const fAnim = gui.addFolder("Camera & Animation");
      fAnim
        .add(settings, "animationPreset", [
          "Static",
          "Gentle Drift",
          "Orbit Circle",
          "Breathing Zoom",
          "Cosmic Sway",
        ])
        .name("Preset");
      fAnim.add(settings, "animationSpeed", 0.0, 5.0, 0.1).name("Speed");

      // Settings Folder (DPR)
      const fSettings = gui.addFolder("Render Settings");
      fSettings
        .add(settings, "dpr", 0.5, 3.0, 0.1)
        .name("DPR (Pixel Ratio)")
        .onChange((v) => {
          app.three.minPixelRatio = v;
          app.three.maxPixelRatio = v;
          app.three.resize();
        });

      // Intercept render loop to update animation speed and apply custom camera animation pathing
      let customElapsed = 0;
      const originalOnBeforeRender = app.three.onBeforeRender;

      app.three.onBeforeRender = function (timeInfo) {
        // Accumulate custom time based on speed
        customElapsed += timeInfo.delta * settings.animationSpeed;

        // Update camera animation offsets based on selected preset (smooth slow movements)
        const time = customElapsed * 0.5;
        let offsetX = 0;
        let offsetY = 0;
        let offsetZ = 0;

        if (settings.animationPreset === "Gentle Drift") {
          offsetX = Math.sin(time * 0.5) * 0.6;
          offsetY = Math.cos(time * 0.7) * 0.4;
        } else if (settings.animationPreset === "Orbit Circle") {
          offsetX = Math.cos(time * 0.4) * 1.0;
          offsetY = Math.sin(time * 0.4) * 1.0;
        } else if (settings.animationPreset === "Breathing Zoom") {
          offsetZ = Math.sin(time * 0.6) * 1.5;
        } else if (settings.animationPreset === "Cosmic Sway") {
          offsetX = Math.sin(time * 0.4) * 0.8;
          offsetY = Math.cos(time * 0.5) * 0.6;
          offsetZ = Math.sin(time * 0.3) * 1.0;
        }

        // Apply the computed position offsets to camera
        app.three.camera.position.x = baseCameraX + offsetX;
        app.three.camera.position.y = baseCameraY + offsetY;
        app.three.camera.position.z = baseCameraZ + offsetZ;

        // Call the original onBeforeRender with our accumulated customElapsed time
        // so the idle animations and tubes speed up/slow down accordingly
        originalOnBeforeRender({
          delta: timeInfo.delta,
          elapsed: customElapsed,
        });
      };

      // Keyboard shortcut to toggle UI visibility with "H" key
      let uiVisible = true;
      window.addEventListener("keydown", (e) => {
        if (e.key.toLowerCase() === "h") {
          uiVisible = !uiVisible;
          if (uiVisible) {
            gui.show();
          } else {
            gui.hide();
          }
        }
      });
    </script>
  </body>
</html>
