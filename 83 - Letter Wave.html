<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Typographic Letterfield</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #060608;
      color: #fff;
      user-select: none;
      font-family: 'Inter', sans-serif;
      transition: background-color 0.3s ease;
      width: 100vw;
      height: 100vh;
    }

    /* Green screen mode overrides background and removes text shadows for clean chroma keying */
    body.greenscreen {
      background-color: #00ff00 !important;
    }

    #letterfield {
      display: flex;
      flex-wrap: wrap;
      line-height: 1;
      font-family: 'Inter', sans-serif;
      position: fixed;
      left: 50vw;
      top: 50vh;
      transform: translate(-50%, -50%);
      transform-origin: center center;
      pointer-events: none; /* so mouse movements go through the letterfield to the window listener */
      will-change: transform;
    }

    #letterfield div {
      width: var(--w-width);
      height: var(--w-width);
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: 0px 4px 20px rgba(0, 0, 0, 0.15);
      transform-origin: center center;
      box-sizing: border-box;
    }

    body.greenscreen #letterfield div {
      text-shadow: none !important;
    }

    #letterfield div::selection {
      background-color: currentColor; 
    }

    /* lil-gui custom styling to look tech-themed and premium */
    .lil-gui {
      --background-color: rgba(20, 20, 25, 0.9);
      --text-color: #e0e0e5;
      --title-background-color: rgba(10, 10, 12, 0.95);
      --widget-color: rgba(40, 40, 50, 0.7);
      --hover-color: rgba(60, 60, 75, 0.9);
      --focus-color: rgba(90, 90, 110, 1);
      font-family: 'Inter', sans-serif;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>
  <div id="letterfield"></div>

  <script type="module">
    import { Vec2 } from "https://esm.sh/wtc-math";
    import { GUI } from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

    console.clear();

    const SETTINGS = {
      fontSize: 150,
      char: 'a',
      pattern: 'Cycle',
      paletteScale: 0.5,
      paletteOffset: 1.2,
      timeScale: 1,
      zoom: 1.0,
      dragX: 0,
      dragY: 0,
      greenscreen: false,
      colorPreset: 'Neon Cyber',
      animationPreset: 'None',
      palette: {
        a: { r: 0.5, g: 0.5, b: 0.5 },
        b: { r: 0.5, g: 0.5, b: 0.5 },
        c: { r: 1.0, g: 1.0, b: 1.0 },
        d: { r: 0.3, g: 0.1, b: 0.67 }
      },
      LUT_STEPS: 64
    };

    const PALETTE_PRESETS = {
      "Neon Cyber": {
        scale: 0.5,
        offset: 1.2,
        a: { r: 0.5, g: 0.5, b: 0.5 },
        b: { r: 0.5, g: 0.5, b: 0.5 },
        c: { r: 1.0, g: 1.0, b: 1.0 },
        d: { r: 0.3, g: 0.1, b: 0.67 }
      },
      "Acid Matrix": {
        scale: 0.8,
        offset: 0.5,
        a: { r: 0.5, g: 0.5, b: 0.5 },
        b: { r: 0.5, g: 0.5, b: 0.5 },
        c: { r: 1.0, g: 1.0, b: 0.5 },
        d: { r: 0.8, g: 0.9, b: 0.3 }
      },
      "Solar Flare": {
        scale: 0.6,
        offset: 1.0,
        a: { r: 0.5, g: 0.5, b: 0.5 },
        b: { r: 0.5, g: 0.5, b: 0.5 },
        c: { r: 2.0, g: 1.0, b: 0.0 },
        d: { r: 0.5, g: 0.2, b: 0.25 }
      },
      "Deep Ocean": {
        scale: 0.7,
        offset: 1.5,
        a: { r: 0.5, g: 0.5, b: 0.5 },
        b: { r: 0.5, g: 0.5, b: 0.5 },
        c: { r: 1.0, g: 1.0, b: 1.0 },
        d: { r: 0.0, g: 0.1, b: 0.2 }
      },
      "Toxic Vapor": {
        scale: 0.6,
        offset: 0.9,
        a: { r: 0.5, g: 0.5, b: 0.5 },
        b: { r: 0.5, g: 0.5, b: 0.5 },
        c: { r: 1.0, g: 0.7, b: 0.4 },
        d: { r: 0.0, g: 0.15, b: 0.2 }
      }
    };

    // State
    let gridItems = [];
    let mouse = new Vec2(window.innerWidth / 2, window.innerHeight / 2);
    let WWidth = 0;
    let dims = new Vec2(0);
    let hdims = new Vec2(0);
    let gridDim = new Vec2(0);
    // Lookup tables
    let colorLUT = [];
    let weightLUT = [];
    let oobColor, oobWeight;
    // Transition state
    const ts = {
      currentState: 0,
      previousState: -1,
      transitionProgress: 1,
      TRANSITION_DURATION: 1500,
      transitionStartTime: 0,
    };

    let lastLutScale = null;
    let lastLutOffset = null;
    let paletteChangedFlag = false;

    // Utilities
    function buildLUTs() {
      buildLUTsWithParams(SETTINGS.paletteScale, SETTINGS.paletteOffset);
    }

    function buildLUTsWithParams(scale, offset) {
      colorLUT = new Array(SETTINGS.LUT_STEPS);
      weightLUT = new Array(SETTINGS.LUT_STEPS);
      oobColor = paletteWithParams(-0.2, SETTINGS.palette, scale, offset);
      oobWeight = 100;
      for (let i = 0; i < SETTINGS.LUT_STEPS; i++) {
        const t = i / (SETTINGS.LUT_STEPS - 1);
        colorLUT[i] = paletteWithParams(t, SETTINGS.palette, scale, offset);
        weightLUT[i] = Math.round(100 + t * 800);
      }
    }

    function getTextWidth(text, font) {
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");
      context.font = font;
      const metrics = context.measureText(text);
      const width = metrics.width;
      const height = metrics.actualBoundingBoxAscent + metrics.actualBoundingBoxDescent;
      return Math.max(width, height);
    }

    function htmlToElement(html) {
      const template = document.createElement('template');
      template.innerHTML = html.trim();
      return template.content.firstChild;
    }

    function paletteWithParams(t, p, scale, offset) {
      t = t * scale + offset;
      const r = (p.a.r + p.b.r * Math.cos(6.28318 * (p.c.r * t + p.d.r))) * 255;
      const g = (p.a.g + p.b.g * Math.cos(6.28318 * (p.c.g * t + p.d.g))) * 255;
      const b = (p.a.b + p.b.b * Math.cos(6.28318 * (p.c.b * t + p.d.b))) * 255;
      return `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`;
    }

    // Ripple character transition, when changing characters
    let transitionTimers = [];
    function updateCharacter(newChar) {
      const totalDuration = 600; // ms for the full ripple to propagate
      const flipDuration = 150;  // ms for each cell's shrink-grow
      
      for (const id of transitionTimers) clearTimeout(id);
      transitionTimers = [];
      
      const width = WWidth * gridDim.x;
      const height = WWidth * gridDim.y;
      const origin = { x: width * 0.95, y: height * 0.5 };

      // Compute distances
      const distances = [];
      let maxDist = 0;
      for (let i = 0; i < gridItems.length; i++) {
        const item = gridItems[i];
        const d = { x: item.x - origin.x, y: item.y - origin.y };
        const dist = Math.hypot(d.x, d.y);
        distances.push(dist);
        if (dist > maxDist) maxDist = dist;
      }

      for (let i = 0; i < gridItems.length; i++) {
        const item = gridItems[i];
        const delay = (distances[i] / maxDist) * totalDuration;
        item.el.style.transition = `transform ${flipDuration}ms ease-in`;
        item.el.style.transformOrigin = 'center center';
        // Schedule shrink
        const t1 = setTimeout(() => {
          item.el.style.transform = 'scale(0)';
        }, delay);
        // Schedule char swap + grow
        const t2 = setTimeout(() => {
          item.el.textContent = newChar;
          item.el.style.transition = `transform ${flipDuration}ms ease-out`;
          item.el.style.transform = 'scale(1)';
        }, delay + flipDuration);
        // Clean up inline transition
        const t3 = setTimeout(() => {
          item.el.style.transition = '';
          item.el.style.transform = '';
        }, delay + flipDuration * 2 + 50);
        transitionTimers.push(t1, t2, t3);
      }
    }

    function init() {
      dims.reset(window.innerWidth, window.innerHeight);
      hdims.reset(window.innerWidth / 2, window.innerHeight / 2);

      WWidth = getTextWidth(SETTINGS.char, `900 ${SETTINGS.fontSize}px Inter`);
      // We initialize a grid that is 2x larger than the viewport so panning/dragging doesn't clip immediately
      gridDim.resetToVector(dims.scaleNew(2.0 / WWidth)).ceil();

      letterfield.innerHTML = '';
      letterfield.style.setProperty('--w-width', `${WWidth}px`);
      letterfield.style.setProperty('font-size', `${SETTINGS.fontSize}px`);
      letterfield.style.setProperty('width', `${WWidth * gridDim.x}px`);
      letterfield.style.setProperty('height', `${WWidth * gridDim.y}px`);

      gridItems = [];
      for (let i = 0; i < gridDim.x * gridDim.y; i++) {
        const el = htmlToElement(`<div>${SETTINGS.char}</div>`);
        letterfield.appendChild(el);
        gridItems.push({
          el,
          pos: new Vec2(
            (i % gridDim.x) * WWidth + WWidth / 2, 
            Math.floor(i / gridDim.x) * WWidth + WWidth / 2
          ),
          x: (i % gridDim.x) * WWidth + WWidth / 2,
          y: Math.floor(i / gridDim.x) * WWidth + WWidth / 2,
          bucket: -1
        });
      }

      buildLUTs();
      updateTransform();
    }

    function getStateVal(state, item, time, cosA, sinA, currentZoom, currentDragX, currentDragY, width, height) {
      const localX = item.x - width / 2;
      const localY = item.y - height / 2;
      const localDist = Math.sqrt(localX * localX + localY * localY);

      if (state === 3) {
        // Wave
        return (localY + Math.cos(localX * 0.002 + time * 0.003) * 150) * 0.004 - 0.5;
      } else if (state === 0) {
        // Ripple
        return Math.sin(localDist * 0.01 - time * 0.005) * 0.5 + 0.5;
      } else if (state === 1) {
        // Gradient
        const v = (cosA * localX + sinA * localY) * 0.002;
        return Math.cos(v * 2) * 0.5 + 0.5;
      } else {
        // Mouse / Interactive
        const cx = window.innerWidth / 2 + currentDragX;
        const cy = window.innerHeight / 2 + currentDragY;
        const screenX = cx + localX * currentZoom;
        const screenY = cy + localY * currentZoom;
        const dx = screenX - mouse.x;
        const dy = screenY - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        return Math.max(0, 1 - dist / (500 * currentZoom));
      }
    }

    function animate(time) {
      const originalTime = time;
      let activeTime = time * SETTINGS.timeScale;

      // Local animatable states
      let currentPaletteScale = SETTINGS.paletteScale;
      let currentPaletteOffset = SETTINGS.paletteOffset;
      let currentZoom = SETTINGS.zoom;
      let currentDragX = SETTINGS.dragX;
      let currentDragY = SETTINGS.dragY;

      const tSec = originalTime * 0.001;

      // Apply Animations Presets
      if (SETTINGS.animationPreset === 'Pulse Breathe') {
        currentZoom = SETTINGS.zoom * (1.0 + Math.sin(tSec * 1.5) * 0.25);
        currentPaletteOffset = SETTINGS.paletteOffset + Math.cos(tSec * 0.8) * 0.4;
      } else if (SETTINGS.animationPreset === 'Cosmic Cycle') {
        currentPaletteOffset = SETTINGS.paletteOffset + tSec * 1.5;
        currentDragX = SETTINGS.dragX + Math.cos(tSec * 0.8) * 120;
        currentDragY = SETTINGS.dragY + Math.sin(tSec * 0.8) * 120;
      } else if (SETTINGS.animationPreset === 'Seismic Wave') {
        activeTime = activeTime + Math.sin(tSec * 3.0) * 800;
        currentPaletteScale = SETTINGS.paletteScale + Math.sin(tSec * 0.6) * 0.25;
      } else if (SETTINGS.animationPreset === 'Vortex Spin') {
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        mouse.x = centerX + Math.sin(tSec * 1.5) * (window.innerWidth * 0.35);
        mouse.y = centerY + Math.sin(tSec * 3.0) * (window.innerHeight * 0.25);
        currentZoom = SETTINGS.zoom * (1.0 + Math.sin(tSec * 1.0) * 0.2);
      } else if (SETTINGS.animationPreset === 'Slow Glide') {
        currentDragX = SETTINGS.dragX + Math.sin(tSec * 0.3) * 80;
        currentDragY = SETTINGS.dragY + Math.cos(tSec * 0.3) * 80;
        currentZoom = SETTINGS.zoom * (1.0 + Math.sin(tSec * 0.15) * 0.15);
      }

      // Rebuild LUTs dynamically if color parameters have changed
      let lutNeedsRebuild = false;
      if (currentPaletteScale !== lastLutScale || currentPaletteOffset !== lastLutOffset || paletteChangedFlag) {
        lutNeedsRebuild = true;
        lastLutScale = currentPaletteScale;
        lastLutOffset = currentPaletteOffset;
        paletteChangedFlag = false;
      }
      if (lutNeedsRebuild) {
        buildLUTsWithParams(currentPaletteScale, currentPaletteOffset);
      }

      // Apply styling transform
      letterfield.style.transform = `translate(-50%, -50%) translate(${currentDragX}px, ${currentDragY}px) scale(${currentZoom})`;

      const cycleDuration = 20000;
      const progress = (activeTime % cycleDuration) / (cycleDuration / 4);

      let activeState;
      if (SETTINGS.pattern === 'Cycle') {
        activeState = Math.floor(progress);
      } else {
        activeState = ['Ripple', 'Gradient', 'Mouse', "Wave"].indexOf(SETTINGS.pattern);
      }

      const maxBucket = SETTINGS.LUT_STEPS - 1;

      const angle = activeTime * 0.001;
      const cosA = Math.cos(angle) * 2;
      const sinA = Math.sin(angle) * 2;
      
      // Detect state change
      if (activeState !== ts.currentState) {
        ts.previousState = ts.currentState;
        ts.currentState = activeState;
        ts.transitionStartTime = originalTime;
        ts.transitionProgress = 0;
      }

      // Update transition progress with easing
      if (ts.transitionProgress < 1) {
        ts.transitionProgress = Math.min(1, (originalTime - ts.transitionStartTime) / ts.TRANSITION_DURATION);
      }
      const t = ts.transitionProgress * ts.transitionProgress * (3 - 2 * ts.transitionProgress); // smoothstep

      const width = WWidth * gridDim.x;
      const height = WWidth * gridDim.y;

      for (let i = 0, len = gridItems.length; i < len; i++) {
        const item = gridItems[i];
        
        const newVal = getStateVal(ts.currentState, item, activeTime, cosA, sinA, currentZoom, currentDragX, currentDragY, width, height);
        let val;
        if (t < 1 && ts.previousState >= 0) {
          const oldVal = getStateVal(ts.previousState, item, activeTime, cosA, sinA, currentZoom, currentDragX, currentDragY, width, height);
          val = oldVal + (newVal - oldVal) * t;
        } else {
          val = newVal;
        }

        const bucket = Math.min(Math.round(val * maxBucket), maxBucket) | 0;

        if (bucket === item.bucket) continue;
        item.bucket = bucket;

        item.el.style.fontWeight = weightLUT[bucket] || oobWeight;
        item.el.style.color = colorLUT[bucket] || oobColor;
      }

      requestAnimationFrame(animate);
    }

    // Zoom and Drag state variables
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    function updateTransform() {
      letterfield.style.transform = `translate(-50%, -50%) translate(${SETTINGS.dragX}px, ${SETTINGS.dragY}px) scale(${SETTINGS.zoom})`;
    }

    window.addEventListener('mousedown', (e) => {
      // Don't drag if clicking lil-gui panel
      if (e.target.closest('.lil-gui')) return;
      isDragging = true;
      startX = e.clientX - SETTINGS.dragX;
      startY = e.clientY - SETTINGS.dragY;
    });

    window.addEventListener('mousemove', (e) => {
      if (isDragging) {
        SETTINGS.dragX = e.clientX - startX;
        SETTINGS.dragY = e.clientY - startY;
        updateTransform();
      }
      
      // Update mouse position for interactive pattern (Mouse state)
      // Only track client mouse when no Vortex Spin is playing (which overrides mouse position)
      if (SETTINGS.animationPreset !== 'Vortex Spin') {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      }
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    window.addEventListener('wheel', (e) => {
      if (e.target.closest('.lil-gui')) return;
      e.preventDefault();
      
      const zoomSpeed = 0.05;
      if (e.deltaY < 0) {
        SETTINGS.zoom = Math.min(5.0, SETTINGS.zoom + zoomSpeed);
      } else {
        SETTINGS.zoom = Math.max(0.2, SETTINGS.zoom - zoomSpeed);
      }
      updateTransform();
    }, { passive: false });

    // Touch support for mobile dragging/zooming
    let touchStartDist = 0;
    let touchStartZoom = 1.0;

    window.addEventListener('touchstart', (e) => {
      if (e.target.closest('.lil-gui')) return;
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - SETTINGS.dragX;
        startY = e.touches[0].clientY - SETTINGS.dragY;
      } else if (e.touches.length === 2) {
        isDragging = false;
        touchStartDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        touchStartZoom = SETTINGS.zoom;
      }
    });

    window.addEventListener('touchmove', (e) => {
      if (e.target.closest('.lil-gui')) return;
      if (isDragging && e.touches.length === 1) {
        SETTINGS.dragX = e.touches[0].clientX - startX;
        SETTINGS.dragY = e.touches[0].clientY - startY;
        updateTransform();
        if (SETTINGS.animationPreset !== 'Vortex Spin') {
          mouse.x = e.touches[0].clientX;
          mouse.y = e.touches[0].clientY;
        }
      } else if (e.touches.length === 2) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        SETTINGS.zoom = Math.max(0.2, Math.min(5.0, touchStartZoom * (dist / touchStartDist)));
        updateTransform();
      }
    });

    window.addEventListener('touchend', () => {
      isDragging = false;
    });

    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(init, 100);
    });

    window.addEventListener('load', () => {
      document.fonts.ready.then(() => {
        init();
        requestAnimationFrame(animate);
      });
    });

    // GUI Initialization
    const gui = new GUI({ title: "Letterfield Control" });
    let guiVisible = true;

    // View Folder
    const viewFolder = gui.addFolder('View Control');
    viewFolder.add(SETTINGS, 'zoom', 0.2, 5.0, 0.05).name('Zoom Scale').listen().onChange(updateTransform);
    viewFolder.add(SETTINGS, 'dragX').name('Offset X').listen().onChange(updateTransform);
    viewFolder.add(SETTINGS, 'dragY').name('Offset Y').listen().onChange(updateTransform);
    viewFolder.add({ reset: () => {
      SETTINGS.zoom = 1.0;
      SETTINGS.dragX = 0;
      SETTINGS.dragY = 0;
      updateTransform();
    }}, 'reset').name('Reset Zoom/Drag');

    // Settings Folder
    const settingsFolder = gui.addFolder('Main Settings');
    settingsFolder.add(SETTINGS, 'fontSize', 50, 300, 1).name('Font Size').onChange(() => init());

    // Character controller
    const charController = settingsFolder.add(SETTINGS, 'char').name('Character');
    const inputEl = charController.domElement.querySelector('input');
    if (inputEl) {
      inputEl.addEventListener('input', (event) => {
        const val = event.target.value;
        if (val.length > 0) {
          const lastChar = val.slice(-1);
          SETTINGS.char = lastChar;
          inputEl.value = lastChar;
          updateCharacter(lastChar);
        }
      });
    }

    settingsFolder.add(SETTINGS, 'pattern', ['Cycle', 'Ripple', 'Gradient', 'Mouse', 'Wave']).name('Pattern');
    settingsFolder.add(SETTINGS, 'timeScale', 0, 2, 0.05).name('Time Speed');

    // Greenscreen
    settingsFolder.add(SETTINGS, 'greenscreen').name('Greenscreen').onChange((val) => {
      if (val) {
        document.body.classList.add('greenscreen');
      } else {
        document.body.classList.remove('greenscreen');
      }
    });

    // Color Preset & Animation Dropdowns
    const presetFolder = gui.addFolder('Presets & Motion');
    let controllersToUpdate = [];

    presetFolder.add(SETTINGS, 'colorPreset', Object.keys(PALETTE_PRESETS)).name('Color Preset').onChange((val) => {
      const p = PALETTE_PRESETS[val];
      if (p) {
        SETTINGS.paletteScale = p.scale;
        SETTINGS.paletteOffset = p.offset;
        SETTINGS.palette.a = { ...p.a };
        SETTINGS.palette.b = { ...p.b };
        SETTINGS.palette.c = { ...p.c };
        SETTINGS.palette.d = { ...p.d };
        
        paletteChangedFlag = true;
        buildLUTs();

        // Update controllers display
        controllersToUpdate.forEach(c => c.updateDisplay());
      }
    });

    presetFolder.add(SETTINGS, 'animationPreset', ['None', 'Pulse Breathe', 'Cosmic Cycle', 'Seismic Wave', 'Vortex Spin', 'Slow Glide']).name('Animation');

    // Re-initialize
    settingsFolder.add({ reinit: () => init() }, 'reinit').name('Force Grid Re-init');

    // Palette (IQ) Folder
    const paletteFolder = gui.addFolder('Palette (IQ)');
    paletteFolder.close();

    const scaleController = paletteFolder.add(SETTINGS, 'paletteScale', 0, 2, 0.01).name('Color Scale').onChange(() => buildLUTs());
    const offsetController = paletteFolder.add(SETTINGS, 'paletteOffset', 0, 2, 0.01).name('Color Offset').onChange(() => buildLUTs());
    const prController = paletteFolder.add(SETTINGS.palette.d, 'r', 0, 1, 0.01).name('Phase Red').onChange(() => { paletteChangedFlag = true; buildLUTs(); });
    const pgController = paletteFolder.add(SETTINGS.palette.d, 'g', 0, 1, 0.01).name('Phase Green').onChange(() => { paletteChangedFlag = true; buildLUTs(); });
    const pbController = paletteFolder.add(SETTINGS.palette.d, 'b', 0, 1, 0.01).name('Phase Blue').onChange(() => { paletteChangedFlag = true; buildLUTs(); });

    controllersToUpdate.push(scaleController, offsetController, prController, pgController, pbController);

    // Keyboard controls for hiding UI
    window.addEventListener('keydown', (e) => {
      // Ignore if user is writing in any input field
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
        return;
      }
      if (e.key.toLowerCase() === 'h') {
        guiVisible = !guiVisible;
        if (guiVisible) {
          gui.show();
        } else {
          gui.hide();
        }
      }
    });
  </script>
</body>
</html>
