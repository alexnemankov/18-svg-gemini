<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palms from the warlock's cave</title>
    <style>
      @import url("https://fonts.googleapis.com/css?family=Pacifico&display=swap");
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #ffaa44;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      img {
        opacity: 0.5;
      }

      #circle {
        position: absolute;
        text-align: center;
        width: 60px;
        height: 60px;
        -webkit-border-radius: 30px;
        -moz-border-radius: 30px;
        border-radius: 30px;
        border: 1px solid darkorange;
        background: rgba(255, 165, 0, 0.5);
        font-size: 50px;
        font-family: Times New Roman;
        color: rgba(255, 165, 0, 1);
        cursor: pointer;
      }

      .noselect {
        -webkit-touch-callout: none;
        /* iOS Safari */
        -webkit-user-select: none;
        /* Safari */
        -khtml-user-select: none;
        /* Konqueror HTML */
        -moz-user-select: none;
        /* Firefox */
        -ms-user-select: none;
        /* Internet Explorer/Edge */
        user-select: none;
        /* Non-prefixed version, currently
      supported by Chrome and Opera */
      }

      a:link {
        color: darkorange;
      }
      a:visited {
        color: darkorange;
      }
      a:hover {
        color: darkorange;
      }
      a:active {
        color: darkorange;
      }

      .text {
        position: absolute;
        bottom: 4vh;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
        user-select: none;
        z-index: 5;
      }
      .retro {
        font-family: "Pacifico", cursive;
        font-size: 13vh;
        display: block;
        transform: rotate(-20deg) skew(-25deg);
        color: magenta;
        text-shadow:
          -0.5vh 0 rgb(64, 255, 128),
          0 0.5vh rgb(64, 255, 128),
          0.5vh 0 rgb(64, 255, 128),
          0 -0.5vh rgb(64, 255, 128);
      }
    </style>
  </head>
  <body>
    <div
      id="info"
      style="
        position: absolute;
        width: 62px;
        height: 62px;
        top: 5px;
        left: 5px;
        overflow: hidden;
        margin: 0;
        padding: 0;
        z-index: 10;
      "
    >
      <div id="circle" class="noselect"></div>
      <div
        id="title"
        style="
          position: absolute;
          left: 64px;
          font-family: Arial;
          font-size: 52px;
          font-weight: bold;
          font-style: italic;
          color: darkorange;
          white-space: nowrap;
        "
      >
        Palms
        <a style="font-size: 10px" href="http://west77.ru" target="blank"
          >from the warlock's cave</a
        >
      </div>
      <iframe
        width="100%"
        height="150"
        scrolling="no"
        frameborder="no"
        src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/296520859&amp;color=%23FFA500&amp;auto_play=false&amp;hide_related=true&amp;show_comments=false&amp;show_user=true&amp;show_reposts=false&amp;show_teaser=false&amp;visual=true"
        style="position: absolute; top: 64px"
      ></iframe>
    </div>

    <script src="https://unpkg.com/three@0.115.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.115.0/examples/js/utils/BufferGeometryUtils.js"></script>
    <script src="https://unpkg.com/three@0.115.0/examples/js/controls/OrbitControls.js"></script>
    <script>
      var noise = `
  //
// Description : Array and textureless GLSL 2D/3D/4D simplex 
//               noise functions.
//      Author : Ian McEwan, Ashima Arts.
//  Maintainer : stegu
//     Lastmod : 20110822 (ijm)
//     License : Copyright (C) 2011 Ashima Arts. All rights reserved.
//               Distributed under the MIT License. See LICENSE file.
//               https://github.com/ashima/webgl-noise
//               https://github.com/stegu/webgl-noise
// 

vec3 mod289(vec3 x) {
  return x - floor(x * (1.0 / 289.0)) * 289.0;
}

vec4 mod289(vec4 x) {
  return x - floor(x * (1.0 / 289.0)) * 289.0;
}

vec4 permute(vec4 x) {
     return mod289(((x*34.0)+1.0)*x);
}

vec4 taylorInvSqrt(vec4 r)
{
  return 1.79284291400159 - 0.85373472095314 * r;
}

float snoise(vec3 v)
  { 
  const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
  const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);

// First corner
  vec3 i  = floor(v + dot(v, C.yyy) );
  vec3 x0 =   v - i + dot(i, C.xxx) ;

// Other corners
  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min( g.xyz, l.zxy );
  vec3 i2 = max( g.xyz, l.zxy );

  //   x0 = x0 - 0.0 + 0.0 * C.xxx;
  //   x1 = x0 - i1  + 1.0 * C.xxx;
  //   x2 = x0 - i2  + 2.0 * C.xxx;
  //   x3 = x0 - 1.0 + 3.0 * C.xxx;
  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyy; // 2.0*C.x = 1/3 = C.y
  vec3 x3 = x0 - D.yyy;      // -1.0+3.0*C.x = -0.5 = -D.y

// Permutations
  i = mod289(i); 
  vec4 p = permute( permute( permute( 
             i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
           + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
           + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));

// Gradients: 7x7 points over a square, mapped onto an octahedron.
// The ring size 17*17 = 289 is close to a multiple of 49 (49*6 = 294)
  float n_ = 0.142857142857; // 1.0/7.0
  vec3  ns = n_ * D.wyz - D.xzx;

  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);  //  mod(p,7*7)

  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_ );    // mod(j,N)

  vec4 x = x_ *ns.x + ns.yyyy;
  vec4 y = y_ *ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);

  vec4 b0 = vec4( x.xy, y.xy );
  vec4 b1 = vec4( x.zw, y.zw );

  //vec4 s0 = vec4(lessThan(b0,0.0))*2.0 - 1.0;
  //vec4 s1 = vec4(lessThan(b1,0.0))*2.0 - 1.0;
  vec4 s0 = floor(b0)*2.0 + 1.0;
  vec4 s1 = floor(b1)*2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));

  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;

  vec3 p0 = vec3(a0.xy,h.x);
  vec3 p1 = vec3(a0.zw,h.y);
  vec3 p2 = vec3(a1.xy,h.z);
  vec3 p3 = vec3(a1.zw,h.w);

//Normalise gradients
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
  p0 *= norm.x;
  p1 *= norm.y;
  p2 *= norm.z;
  p3 *= norm.w;

// Mix final noise value
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), 
                                dot(p2,x2), dot(p3,x3) ) );
}
`;
    </script>

    <script type="module">
      import GUI from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

      // Toggle Soundcloud info box
      var hideInfo = true;
      const circle = document.getElementById("circle");
      const info = document.getElementById("info");
      circle.addEventListener(
        "click",
        function () {
          if (hideInfo) {
            circle.style.background = "darkorange";
            circle.style.color = "orange";
            info.style.width = "640px";
            info.style.height = "214px";
          } else {
            circle.style.background = "rgba(255, 165, 0, .5)";
            circle.style.color = "rgba(255, 165, 0, 1)";
            info.style.width = "62px";
            info.style.height = "62px";
          }
          hideInfo = !hideInfo;
        },
        false,
      );

      // Helper custom lerp function
      function lerp(start, end, amt) {
        return (1 - amt) * start + amt * end;
      }

      // Pre-setup Color Schemes
      const colorSchemes = {
        "Sunset Synthwave": {
          bgColor: "#ffaa44",
          sunColor: "#ff8800",
          terrainColor: "#ff00ee",
          palmsColor: "#00ff88",
          roadStripeColor: "#00c8ff",
        },
        "Neon Cyberpunk": {
          bgColor: "#0a0015",
          sunColor: "#00ffff",
          terrainColor: "#ff0055",
          palmsColor: "#7a00ff",
          roadStripeColor: "#00ff66",
        },
        "Acid Matrix": {
          bgColor: "#001100",
          sunColor: "#00ff33",
          terrainColor: "#003300",
          palmsColor: "#00ffaa",
          roadStripeColor: "#00ff44",
        },
        "Vaporwave Dream": {
          bgColor: "#ffb7e2",
          sunColor: "#86e3ce",
          terrainColor: "#d0bdf4",
          palmsColor: "#ff7e67",
          roadStripeColor: "#4f9da6",
        },
        "Frozen Aurora": {
          bgColor: "#05101a",
          sunColor: "#00e5ff",
          terrainColor: "#1a2639",
          palmsColor: "#3bf7a7",
          roadStripeColor: "#e2f3f5",
        },
      };

      const params = {
        greenscreen: false,
        colorScheme: "Sunset Synthwave",
        bgColor: "#ffaa44",
        sunColor: "#ff8800",
        terrainColor: "#ff00ee",
        palmsColor: "#00ff88",
        roadStripeColor: "#00c8ff",
        animationSpeed: 1.0,
        dpr: window.devicePixelRatio || 1.0,
        animationPreset: "Synthwave Cruise",
      };

      const globalUniforms = {
        time: { value: 0 },
        speed: { value: 10 },
        roadStripeColor: { value: new THREE.Color(params.roadStripeColor) },
      };

      var materialShaders = [];
      var scene = new THREE.Scene();
      var camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(0, 1.3, 7);
      camera.lookAt(scene.position);

      var renderer = new THREE.WebGLRenderer({
        antialias: true,
      });
      renderer.setPixelRatio(params.dpr);
      var canvas = renderer.domElement;
      document.body.appendChild(canvas);

      scene.background = new THREE.Color(params.bgColor);
      scene.fog = new THREE.Fog(scene.background, 42.5, 50);

      // OrbitControls setup
      var controls = new THREE.OrbitControls(camera, canvas);
      controls.enablePan = true; // Drag object enabled
      controls.minDistance = 2.0;
      controls.maxDistance = 30.0;
      controls.maxPolarAngle = Math.PI * 0.52; // Keep camera mostly above the ground plane
      controls.minPolarAngle = Math.PI * 0.05;
      controls.target.set(0, 1.8, 0);
      controls.update();

      // Track OrbitControls interaction
      let isInteracting = false;
      controls.addEventListener("start", () => {
        isInteracting = true;
      });
      controls.addEventListener("end", () => {
        isInteracting = false;
      });

      // GROUND AND ROAD
      var planeGeom = new THREE.PlaneBufferGeometry(100, 100, 200, 200);
      planeGeom.rotateX(-Math.PI * 0.5);
      var planeMat = new THREE.MeshBasicMaterial({
        color: params.terrainColor,
      });
      planeMat.onBeforeCompile = (shader) => {
        shader.uniforms.time = globalUniforms.time;
        shader.uniforms.speed = globalUniforms.speed;
        shader.uniforms.roadStripeColor = globalUniforms.roadStripeColor;
        shader.vertexShader =
          `
      uniform float time;
      uniform float speed;
      varying vec3 vPos;
    ` +
          noise +
          shader.vertexShader;
        shader.vertexShader = shader.vertexShader.replace(
          `#include <begin_vertex>`,
          `#include <begin_vertex>
        vec2 tuv = uv;
        float t = time * 0.01 * speed; 
        tuv.y += t;
        transformed.y = snoise(vec3(tuv * 5., 0.)) * 5.;
        transformed.y *= smoothstep(5., 15., abs(transformed.x)); // road stripe
        vPos = transformed;
      `,
        );
        shader.fragmentShader =
          `
      #extension GL_OES_standard_derivatives : enable

      uniform float time;
      uniform float speed;
      uniform vec3 roadStripeColor;
      varying vec3 vPos;

      float line(vec3 position, float width, vec3 step){
        vec3 tempCoord = position / step;
        
        vec2 coord = tempCoord.xz;
        coord.y -= time * speed / 2.;

        vec2 grid = abs(fract(coord - 0.5) - 0.5) / fwidth(coord * width);
        float line = min(grid.x, grid.y);
        
        return min(line, 1.0);
      }
    ` + shader.fragmentShader;
        shader.fragmentShader = shader.fragmentShader.replace(
          `gl_FragColor = vec4( outgoingLight, diffuseColor.a );`,
          `
      float l = line(vPos, 2.0, vec3(2.0));
      vec3 base = mix(roadStripeColor, vec3(0), smoothstep(5., 7.5, abs(vPos.x)));
      vec3 c = mix(outgoingLight, base, l);
      gl_FragColor = vec4(c, diffuseColor.a);
      `,
        );
        materialShaders.push(shader);
      };
      var plane = new THREE.Mesh(planeGeom, planeMat);
      scene.add(plane);

      // PALMS
      var palmGeoms = [];
      var logGeom = new THREE.CylinderBufferGeometry(
        0.25,
        0.125,
        10,
        5,
        4,
        true,
      );
      logGeom.translate(0, 5, 0);
      palmGeoms.push(logGeom);
      for (let i = 0; i < 20; i++) {
        let leafGeom = new THREE.CircleBufferGeometry(1.25, 4);
        leafGeom.translate(0, 1.25, 0);
        leafGeom.rotateX(-Math.PI * 0.5);
        leafGeom.scale(0.25, 1, THREE.Math.randFloat(1, 1.5));
        leafGeom.attributes.position.setY(0, 0.25);
        leafGeom.rotateX(THREE.Math.randFloatSpread(Math.PI * 0.5));
        leafGeom.rotateY(THREE.Math.randFloat(0, Math.PI * 2));
        leafGeom.translate(0, 10, 0);
        palmGeoms.push(leafGeom);
      }
      var palmGeom = THREE.BufferGeometryUtils.mergeBufferGeometries(
        palmGeoms,
        false,
      );
      palmGeom.rotateZ(THREE.Math.degToRad(-1.5));
      var instPalm = new THREE.InstancedBufferGeometry();
      instPalm.attributes.position = palmGeom.attributes.position;
      instPalm.attributes.uv = palmGeom.attributes.uv;
      instPalm.index = palmGeom.index;
      var palmPos = [];
      for (let i = 0; i < 5; i++) {
        palmPos.push(-5, 0, i * 20 - 10 - 50);
        palmPos.push(5, 0, i * 20 - 50);
      }
      instPalm.addAttribute(
        "instPosition",
        new THREE.InstancedBufferAttribute(new Float32Array(palmPos), 3),
      );

      var palmMat = new THREE.MeshBasicMaterial({
        color: params.palmsColor,
        side: THREE.DoubleSide,
      });
      palmMat.onBeforeCompile = (shader) => {
        shader.uniforms.time = globalUniforms.time;
        shader.uniforms.speed = globalUniforms.speed;
        shader.vertexShader =
          `
      uniform float time;
      uniform float speed;
      attribute vec3 instPosition;
    ` + shader.vertexShader;
        shader.vertexShader = shader.vertexShader.replace(
          `#include <begin_vertex>`,
          `#include <begin_vertex>
        
        transformed.x *= sign(instPosition.x); // flip
        vec3 ip = instPosition;
        ip.z = mod(50. + ip.z + time * speed, 100.) - 50.;
        transformed *= 0.4 + smoothstep(50., 45., abs(ip.z)) * 0.6;
        transformed += ip;
      `,
        );
        materialShaders.push(shader);
      };
      var palms = new THREE.Mesh(instPalm, palmMat);
      scene.add(palms);

      // SUN
      var sunGeom = new THREE.CircleBufferGeometry(200, 64);
      var sunMat = new THREE.MeshBasicMaterial({
        color: params.sunColor,
        fog: false,
        transparent: true,
      });
      sunMat.onBeforeCompile = (shader) => {
        shader.uniforms.time = globalUniforms.time;
        shader.vertexShader =
          `
      varying vec2 vUv;
    ` + shader.vertexShader;
        shader.vertexShader = shader.vertexShader.replace(
          `#include <begin_vertex>`,
          `#include <begin_vertex>
        vUv = uv;
      `,
        );
        shader.fragmentShader =
          `
      varying vec2 vUv;
    ` + shader.fragmentShader;
        shader.fragmentShader = shader.fragmentShader.replace(
          `gl_FragColor = vec4( outgoingLight, diffuseColor.a );`,
          `gl_FragColor = vec4( outgoingLight, diffuseColor.a * smoothstep(0.5, 0.7, vUv.y));`,
        );

        materialShaders.push(shader);
      };
      var sun = new THREE.Mesh(sunGeom, sunMat);
      sun.position.set(0, 0, -500);
      scene.add(sun);

      // Color updating logic
      function updateColors() {
        if (params.greenscreen) {
          scene.background.set(0x00ff00);
          scene.fog.color.set(0x00ff00);
        } else {
          scene.background.set(params.bgColor);
          scene.fog.color.set(params.bgColor);
        }
        planeMat.color.set(params.terrainColor);
        palmMat.color.set(params.palmsColor);
        sunMat.color.set(params.sunColor);
        globalUniforms.roadStripeColor.value.set(params.roadStripeColor);
      }

      // Apply preset color scheme
      function applyColorScheme(name) {
        const scheme = colorSchemes[name];
        if (!scheme) return;
        params.bgColor = scheme.bgColor;
        params.sunColor = scheme.sunColor;
        params.terrainColor = scheme.terrainColor;
        params.palmsColor = scheme.palmsColor;
        params.roadStripeColor = scheme.roadStripeColor;

        for (let key in colorControllers) {
          if (colorControllers[key]) {
            colorControllers[key].setValue(params[key]);
          }
        }
        updateColors();
      }

      // Settings GUI using lil-gui
      const gui = new GUI({ title: "Retrowave Settings" });
      const colorControllers = {};

      const presetFolder = gui.addFolder("Presets");
      presetFolder
        .add(params, "colorScheme", Object.keys(colorSchemes))
        .name("Color Preset")
        .onChange(applyColorScheme);
      presetFolder
        .add(params, "animationPreset", [
          "Synthwave Cruise",
          "Orbiting Sunset",
          "Looming Drone",
          "Side Sweep",
          "Static",
        ])
        .name("Camera Animation");

      const colorFolder = gui.addFolder("Custom Colors");
      colorFolder
        .add(params, "greenscreen")
        .name("Enable Greenscreen")
        .onChange(updateColors);
      colorControllers.bgColor = colorFolder
        .addColor(params, "bgColor")
        .name("Background/Fog")
        .onChange(updateColors);
      colorControllers.terrainColor = colorFolder
        .addColor(params, "terrainColor")
        .name("Terrain")
        .onChange(updateColors);
      colorControllers.roadStripeColor = colorFolder
        .addColor(params, "roadStripeColor")
        .name("Road Stripe")
        .onChange(updateColors);
      colorControllers.palmsColor = colorFolder
        .addColor(params, "palmsColor")
        .name("Palms")
        .onChange(updateColors);
      colorControllers.sunColor = colorFolder
        .addColor(params, "sunColor")
        .name("Sun")
        .onChange(updateColors);

      const systemFolder = gui.addFolder("System Settings");
      systemFolder
        .add(params, "animationSpeed", 0.0, 3.0, 0.1)
        .name("Animation Speed");
      systemFolder
        .add(params, "dpr", 0.5, 2.5, 0.1)
        .name("Pixel Ratio (DPR)")
        .onChange((value) => {
          renderer.setPixelRatio(value);
        });

      // Toggle all UI using "H" key
      let guiVisible = true;
      window.addEventListener("keydown", (e) => {
        if (e.key === "h" || e.key === "H") {
          guiVisible = !guiVisible;
          if (guiVisible) {
            gui.show();
            info.style.display = "block";
            const txt = document.querySelector(".text");
            if (txt) txt.style.display = "block";
          } else {
            gui.hide();
            info.style.display = "none";
            const txt = document.querySelector(".text");
            if (txt) txt.style.display = "none";
          }
        }
      });

      var clock = new THREE.Clock();
      var timeAccumulated = 0;

      // Start Render Loop
      updateColors();
      render();

      function render() {
        if (resize(renderer)) {
          camera.aspect = canvas.clientWidth / canvas.clientHeight;
          camera.updateProjectionMatrix();
        }

        let delta = clock.getDelta();
        if (delta > 0.1) delta = 0.1;
        timeAccumulated += delta * params.animationSpeed;
        let t = timeAccumulated;

        if (!isInteracting) {
          if (params.animationPreset === "Synthwave Cruise") {
            let targetCamX = Math.sin(t * 0.5) * 1.2;
            let targetCamY = 1.3 + Math.sin(t * 1.0) * 0.15;
            let targetCamZ = 7.0 + Math.cos(t * 0.3) * 0.8;
            camera.position.x = lerp(camera.position.x, targetCamX, 0.05);
            camera.position.y = lerp(camera.position.y, targetCamY, 0.05);
            camera.position.z = lerp(camera.position.z, targetCamZ, 0.05);
            controls.target.x = lerp(controls.target.x, 0, 0.05);
            controls.target.y = lerp(controls.target.y, 1.8, 0.05);
            controls.target.z = lerp(controls.target.z, 0, 0.05);
          } else if (params.animationPreset === "Orbiting Sunset") {
            let radius = 8.0;
            let angle = t * 0.15;
            let targetCamX = Math.sin(angle) * radius;
            let targetCamY = 2.0 + Math.sin(t * 0.4) * 0.6;
            let targetCamZ = Math.cos(angle) * radius;
            camera.position.x = lerp(camera.position.x, targetCamX, 0.05);
            camera.position.y = lerp(camera.position.y, targetCamY, 0.05);
            camera.position.z = lerp(camera.position.z, targetCamZ, 0.05);
            controls.target.x = lerp(controls.target.x, 0, 0.05);
            controls.target.y = lerp(controls.target.y, 1.8, 0.05);
            controls.target.z = lerp(controls.target.z, 0, 0.05);
          } else if (params.animationPreset === "Looming Drone") {
            let targetCamX = Math.cos(t * 0.2) * 2.5;
            let targetCamY = 4.5 + Math.sin(t * 0.1) * 0.5;
            let targetCamZ = 6.0 + Math.sin(t * 0.2) * 1.0;
            camera.position.x = lerp(camera.position.x, targetCamX, 0.05);
            camera.position.y = lerp(camera.position.y, targetCamY, 0.05);
            camera.position.z = lerp(camera.position.z, targetCamZ, 0.05);
            controls.target.x = lerp(controls.target.x, 0, 0.05);
            controls.target.y = lerp(controls.target.y, 1.0, 0.05);
            controls.target.z = lerp(controls.target.z, -2.0, 0.05);
          } else if (params.animationPreset === "Side Sweep") {
            let targetCamX = -4.0 + Math.sin(t * 0.2) * 2.0;
            let targetCamY = 1.6 + Math.cos(t * 0.4) * 0.3;
            let targetCamZ = 5.0 + Math.cos(t * 0.2) * 1.0;
            camera.position.x = lerp(camera.position.x, targetCamX, 0.05);
            camera.position.y = lerp(camera.position.y, targetCamY, 0.05);
            camera.position.z = lerp(camera.position.z, targetCamZ, 0.05);
            controls.target.x = lerp(controls.target.x, 0, 0.05);
            controls.target.y = lerp(controls.target.y, 1.8, 0.05);
            controls.target.z = lerp(controls.target.z, -1.0, 0.05);
          }
        }

        controls.update();

        globalUniforms.time.value = t;

        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }

      function resize(renderer) {
        const canvas = renderer.domElement;
        const dpr = renderer.getPixelRatio();
        const width = Math.floor(canvas.clientWidth * dpr);
        const height = Math.floor(canvas.clientHeight * dpr);
        const needResize = canvas.width !== width || canvas.height !== height;
        if (needResize) {
          renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
        }
        return needResize;
      }
    </script>
  </body>
