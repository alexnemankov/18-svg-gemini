<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Infinite Procedural Terrain Tunnel Simulator</title>
    <meta name="description" content="An interactive 3D infinite procedural terrain tunnel runner with advanced controls, dynamic lighting, customizable color schemes, and green screen support.">
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "simplex-noise": "https://unpkg.com/simplex-noise@4.0.1/dist/esm/simplex-noise.js",
          "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
        }
      }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #gui-container { position: absolute; bottom: 20px; right: 20px; z-index: 1000; }
    </style>
</head>
<body>
    <h1 style="display: none;" id="page-title">3D Infinite Procedural Terrain Tunnel Simulator</h1>
    <div id="gui-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { createNoise2D } from 'simplex-noise';
        import GUI from 'lil-gui';

        // === CONFIGURATION ===
        const params = {
            speed: 6.0,
            showCeiling: true, 
            
            // Terrain settings
            scale: 30.0,           
            heightMultiplier: 3.6, 
            detailStrength: 0.27,   
            valleyWidth: 25.0,     
            
            // Visuals
            flatShading: false,
            wireframe: false,
            
            // Colors
            bgColor: '#b6c2cc',
            fogDensity: 0.0104,
            groundColor: '#1a1a1a',
            ceilingColor: '#5e6a75',
            
            // Lighting
            ambientInt: 0.6,
            camLightInt: 1.5,

            // Interactive controls
            zoom: 1.0,
            offsetX: 0.0,
            offsetY: 0.0,
            greenscreen: false,
            colorScheme: 'Default'
        };

        // === SCENE INIT ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(params.bgColor);
        scene.fog = new THREE.FogExp2(params.bgColor, params.fogDensity);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 300);
        camera.position.set(0, 0, 40);

        // Renderer setup with high precision and dithering support to fix banding
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true,
            powerPreference: "high-performance",
            precision: "highp" 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // === LIGHTING ===
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, params.ambientInt);
        scene.add(hemiLight);

        const camLight = new THREE.PointLight(0xffaa00, params.camLightInt, 120, 1.5);
        scene.add(camLight);

        // === NOISE & GEOMETRY ===
        const noise2D = createNoise2D();

        const CHUNK_WIDTH = 250; 
        const CHUNK_LENGTH = 60; 
        const SEGMENTS_W = 100; 
        const SEGMENTS_L = 30; 
        const CHUNK_COUNT = 6; 

        const chunks = [];

        /**
         * Calculates precise height for any coordinate.
         */
        function getElevation(x, z, isTop) {
            // Offset for top to ensure unique look
            const offset = isTop ? 9999 : 0; 
            
            // 1. Main Mountains
            let y = noise2D((x + offset) / params.scale, (z + offset) / params.scale) * params.heightMultiplier;
            
            // 2. Fine Detail
            const detailScale = params.scale * 0.4;
            y += noise2D((x + offset) / detailScale, (z + offset) / detailScale) * (params.heightMultiplier * params.detailStrength);

            // 3. Valley Curve (Clear center)
            const dist = Math.abs(x);
            const valley = Math.pow(dist / params.valleyWidth, 2.5);
            y += valley;

            return y;
        }

        /**
         * Creates the mesh group.
         */
        function createChunk(index) {
            const geometry = new THREE.PlaneGeometry(CHUNK_WIDTH, CHUNK_LENGTH, SEGMENTS_W, SEGMENTS_L);
            geometry.rotateX(-Math.PI / 2); // Lay flat

            // Material with Dithering enabled to prevent color banding
            const matGround = new THREE.MeshStandardMaterial({
                color: params.groundColor,
                roughness: 0.9,
                flatShading: params.flatShading,
                wireframe: params.wireframe,
                side: THREE.DoubleSide,
                dithering: true // Fixes gradient banding
            });

            const matCeil = new THREE.MeshStandardMaterial({
                color: params.ceilingColor,
                roughness: 0.9,
                flatShading: params.flatShading,
                wireframe: params.wireframe,
                side: THREE.DoubleSide,
                dithering: true // Fixes gradient banding
            });

            const meshGround = new THREE.Mesh(geometry.clone(), matGround);
            const meshCeil = new THREE.Mesh(geometry.clone(), matCeil);
            
            meshCeil.visible = params.showCeiling;

            const group = new THREE.Group();
            group.add(meshGround);
            group.add(meshCeil);

            // Store index to calculate exact position later
            group.userData = { 
                meshGround, 
                meshCeil,
                index: index 
            };

            return group;
        }

        /**
         * Updates geometry based on strict world coordinates.
         */
        function updateChunk(chunk) {
            // Calculate Z based on index to ensure perfect seam
            const zPosition = chunk.userData.index * -CHUNK_LENGTH;
            chunk.position.z = zPosition;

            const geoG = chunk.userData.meshGround.geometry;
            const posG = geoG.attributes.position;
            
            const geoC = chunk.userData.meshCeil.geometry;
            const posC = geoC.attributes.position;

            for (let i = 0; i < posG.count; i++) {
                const x = posG.getX(i);
                
                // Get local Z (depth relative to chunk center)
                const localZ = posG.getZ(i);
                // Calculate exact World Z
                const worldZ = zPosition + localZ;

                // --- GROUND ---
                const hGround = getElevation(x, worldZ, false);
                posG.setY(i, -5 + hGround);

                // --- CEILING ---
                const hCeil = getElevation(x, worldZ, true);
                posC.setY(i, 5 - hCeil);
            }

            posG.needsUpdate = true;
            geoG.computeVertexNormals();

            posC.needsUpdate = true;
            geoC.computeVertexNormals();
        }

        // === INITIALIZATION ===
        for(let i = 0; i < CHUNK_COUNT; i++) {
            const chunk = createChunk(i);
            updateChunk(chunk);
            chunks.push(chunk);
            scene.add(chunk);
        }

        // === ANIMATION LOOP ===
        const clock = new THREE.Clock();
        let cameraBaseZ = 40;

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            
            // Move camera forward
            cameraBaseZ -= params.speed * dt;
            
            // Apply offsets
            camera.position.x = params.offsetX;
            camera.position.y = params.offsetY;
            camera.position.z = cameraBaseZ;

            camLight.position.copy(camera.position);

            // Logic to recycle chunks
            // We move in -Z. Chunks with higher index (more negative Z) are in front.
            // We look for the chunk furthest behind the camera.
            
            // Find current max index to know where to place recycled chunk
            let maxIndex = 0;
            chunks.forEach(c => { if (c.userData.index > maxIndex) maxIndex = c.userData.index; });

            chunks.forEach(chunk => {
                 // If chunk is fully behind camera
                 if (chunk.position.z > camera.position.z + CHUNK_LENGTH) {
                     // Move to the front by assigning next index
                     chunk.userData.index = maxIndex + 1;
                     maxIndex++; 
                     updateChunk(chunk);
                 }
            });

            renderer.render(scene, camera);
        }

        animate();

        // === GUI ===
        const gui = new GUI({ container: document.getElementById('gui-container'), width: 320 });
        gui.title("Tunnel Controls");

        const f1 = gui.addFolder('Flight');
        f1.add(params, 'speed', 0, 50).name('Speed');

        const f2 = gui.addFolder('Visuals');
        f2.add(params, 'showCeiling').name('Show Ceiling').onChange(v => {
            chunks.forEach(c => c.userData.meshCeil.visible = v);
        });
        f2.add(params, 'flatShading').name('Flat Shading').onChange(v => {
            chunks.forEach(c => {
                c.userData.meshGround.material.flatShading = v;
                c.userData.meshGround.material.needsUpdate = true;
                c.userData.meshCeil.material.flatShading = v;
                c.userData.meshCeil.material.needsUpdate = true;
            });
            chunks.forEach(c => updateChunk(c));
        });
        f2.add(params, 'wireframe').name('Wireframe').onChange(v => {
            chunks.forEach(c => {
                c.userData.meshGround.material.wireframe = v;
                c.userData.meshCeil.material.wireframe = v;
            });
        });

        const f3 = gui.addFolder('Terrain Generator');
        const refresh = () => chunks.forEach(c => updateChunk(c));
        f3.add(params, 'scale', 10, 150).name('Noise Scale').onChange(refresh);
        f3.add(params, 'heightMultiplier', 1, 20).name('Height').onChange(refresh);
        f3.add(params, 'detailStrength', 0, 1).name('Detail').onChange(refresh);
        f3.add(params, 'valleyWidth', 5, 50).name('Valley Width').onChange(refresh);

        const f4 = gui.addFolder('Colors & Atmosphere');
        const updateColors = () => {
            const effectiveBg = params.greenscreen ? '#00ff00' : params.bgColor;
            scene.background.set(new THREE.Color(effectiveBg));
            scene.fog.color.set(new THREE.Color(effectiveBg));
            scene.fog.density = params.greenscreen ? 0.0 : params.fogDensity;
            
            hemiLight.intensity = params.ambientInt;
            camLight.intensity = params.camLightInt;
            chunks.forEach(c => {
                c.userData.meshGround.material.color.set(params.groundColor);
                c.userData.meshCeil.material.color.set(params.ceilingColor);
            });
        };

        const presets = {
            'Default': {
                bgColor: '#b6c2cc',
                groundColor: '#1a1a1a',
                ceilingColor: '#5e6a75',
                fogDensity: 0.0104,
                ambientInt: 0.6,
                camLightInt: 1.5
            },
            'Neon Terminal': {
                bgColor: '#0f051d',
                groundColor: '#120e2e',
                ceilingColor: '#00f0ff',
                fogDensity: 0.0150,
                ambientInt: 0.4,
                camLightInt: 2.0
            },
            'Matrix Code': {
                bgColor: '#000500',
                groundColor: '#001100',
                ceilingColor: '#00ff41',
                fogDensity: 0.0200,
                ambientInt: 0.3,
                camLightInt: 1.5
            },
            'Sleek Enterprise': {
                bgColor: '#e2e8f0',
                groundColor: '#1e293b',
                ceilingColor: '#3b82f6',
                fogDensity: 0.0100,
                ambientInt: 0.8,
                camLightInt: 1.2
            },
            'Dracula Dark': {
                bgColor: '#1e1f29',
                groundColor: '#282a36',
                ceilingColor: '#ff79c6',
                fogDensity: 0.0120,
                ambientInt: 0.5,
                camLightInt: 1.8
            },
            'Orange Amber': {
                bgColor: '#110b06',
                groundColor: '#241408',
                ceilingColor: '#f97316',
                fogDensity: 0.0150,
                ambientInt: 0.4,
                camLightInt: 2.2
            }
        };

        const schemeController = f4.add(params, 'colorScheme', Object.keys(presets).concat('Custom')).name('Preset Scheme');

        const bgColCtrl = f4.addColor(params, 'bgColor').name('Background').onChange(v => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
            updateColors();
        });
        const groundColCtrl = f4.addColor(params, 'groundColor').name('Ground Color').onChange(v => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
            updateColors();
        });
        const ceilColCtrl = f4.addColor(params, 'ceilingColor').name('Ceiling Color').onChange(v => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
            updateColors();
        });
        const fogDensCtrl = f4.add(params, 'fogDensity', 0, 0.1).name('Fog Density').onChange(v => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
            updateColors();
        });
        const ambIntCtrl = f4.add(params, 'ambientInt', 0, 2).name('Ambient Light').onChange(v => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
            updateColors();
        });
        const camLightIntCtrl = f4.add(params, 'camLightInt', 0, 3).name('Light Intensity').onChange(v => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
            updateColors();
        });

        schemeController.onChange(value => {
            if (value !== 'Custom') {
                const preset = presets[value];
                params.bgColor = preset.bgColor;
                params.groundColor = preset.groundColor;
                params.ceilingColor = preset.ceilingColor;
                params.fogDensity = preset.fogDensity;
                params.ambientInt = preset.ambientInt;
                params.camLightInt = preset.camLightInt;

                bgColCtrl.updateDisplay();
                groundColCtrl.updateDisplay();
                ceilColCtrl.updateDisplay();
                fogDensCtrl.updateDisplay();
                ambIntCtrl.updateDisplay();
                camLightIntCtrl.updateDisplay();

                updateColors();
            }
        });

        // Add Greenscreen Control
        const f5 = gui.addFolder('Background Settings');
        f5.add(params, 'greenscreen').name('Enable Greenscreen').onChange(value => {
            updateColors();
        });

        // Add Interactive View Control
        const f6 = gui.addFolder('Interactive View');
        f6.add(params, 'zoom', 0.1, 10.0, 0.1).name('Zoom').listen().onChange(v => {
            camera.fov = 60 / v;
            camera.updateProjectionMatrix();
        });
        f6.add(params, 'offsetX', -100.0, 100.0, 0.1).name('Offset X').listen();
        f6.add(params, 'offsetY', -50.0, 50.0, 0.1).name('Offset Y').listen();

        // Initialize colors
        updateColors();

        // === WINDOW RESIZE ===
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // === DRAG & ZOOM MOUSE/TOUCH EVENT LISTENERS ===
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        window.addEventListener('mousedown', (e) => {
            if (gui.domElement.contains(e.target)) return;
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            // Adjust sensitivity based on zoom level for finer control
            const dragSensitivity = 0.05 / params.zoom;
            params.offsetX -= deltaX * dragSensitivity;
            params.offsetY += deltaY * dragSensitivity;

            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        window.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        // Touch support for mobile devices
        window.addEventListener('touchstart', (e) => {
            if (gui.domElement.contains(e.target)) return;
            if (e.touches.length === 1) {
                isDragging = true;
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            if (e.touches.length === 1) {
                const deltaX = e.touches[0].clientX - previousMousePosition.x;
                const deltaY = e.touches[0].clientY - previousMousePosition.y;

                const dragSensitivity = 0.05 / params.zoom;
                params.offsetX -= deltaX * dragSensitivity;
                params.offsetY += deltaY * dragSensitivity;

                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }, { passive: true });

        window.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Wheel Zoom Support
        window.addEventListener('wheel', (e) => {
            if (gui.domElement.contains(e.target)) return;
            e.preventDefault();
            const zoomFactor = 1.1;
            if (e.deltaY < 0) {
                params.zoom *= zoomFactor;
            } else {
                params.zoom /= zoomFactor;
            }
            params.zoom = Math.max(0.1, Math.min(params.zoom, 10.0));
            
            camera.fov = 60 / params.zoom;
            camera.updateProjectionMatrix();
        }, { passive: false });

    </script>
</body>
</html>
