<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volumetric Fractal Shader 9</title>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
        }

        body.dragging {
            cursor: grabbing;
        }

        body.greenscreen {
            background-color: #00ff00;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <script type="module">
        // Support me by PayPal: https://paypal.com/paypalme/sabosugi
        import * as THREE from 'three';
        import GUI from 'lil-gui';

        // --- Setup Scene, Camera, Renderer ---
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
        document.body.appendChild(renderer.domElement);

        // --- GUI Parameters ---
        const params = {
            dpr: 1.0,
            zoom: 1.0,
            panX: 0.0,
            panY: 0.0,
            greenScreen: false,
            backgroundColor: '#000000',
            backgroundCutoff: 0.08,
            animSpeed: -0.6,
            flightPos: 2.6,
            colorR: 0.1,
            colorG: 0.6,
            colorB: 1.2,
            lightIntensity: 30000.0,
            grainIntensity: 0.02
        };

        renderer.setPixelRatio(params.dpr);

        const hexToVector3 = (hex) => {
            const color = new THREE.Color(hex);
            return new THREE.Vector3(color.r, color.g, color.b);
        };

        // --- Shader Material ---
        const uniforms = {
            iTime: { value: 0.0 },
            iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uZoom: { value: params.zoom },
            uPan: { value: new THREE.Vector2(params.panX, params.panY) },
            uBackgroundColor: { value: hexToVector3(params.backgroundColor) },
            uBackgroundCutoff: { value: params.backgroundCutoff },
            uAnimSpeed: { value: params.animSpeed },
            uFlightPos: { value: params.flightPos },
            uColor: { value: new THREE.Vector3(params.colorR, params.colorG, params.colorB) },
            uLightIntensity: { value: params.lightIntensity },
            uGrainIntensity: { value: params.grainIntensity }
        };

        const vertexShader = `
            void main() {
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float iTime;
            uniform vec2 iResolution;
            uniform float uZoom;
            uniform vec2 uPan;
            uniform vec3 uBackgroundColor;
            uniform float uBackgroundCutoff;

            uniform float uAnimSpeed;
            uniform float uFlightPos;
            uniform vec3 uColor;
            uniform float uLightIntensity;
            uniform float uGrainIntensity;

            vec4 tanh_custom(vec4 x) {
                vec4 e = exp(2.0 * clamp(x, -20.0, 20.0));
                return (e - 1.0) / (e + 1.0);
            }

            float hash(vec3 p) {
                p = fract(p * 0.9631);
                p += dot(p, p.yzx + 33.33);
                return fract((p.x + p.y) * p.z);
            }

            void mainImage(out vec4 fragColor, in vec2 fragCoord) {
                float tFlight = uFlightPos;
                float tAnim = iTime * uAnimSpeed;

                vec2 uv = (2.1 * fragCoord - iResolution.xy) / iResolution.y;
                uv = (uv - uPan) / max(uZoom, 0.05);
                vec3 rayDir = normalize(vec3(uv, -1.6));

                vec4 accumulatedLight = vec4(0.4);
                float grain = hash(vec3(fragCoord, iTime * 5.0));
                float totalDist = 1.2 + grain * 0.13;

                float stepDist = 1.1;
                float structuralVal = 4.2;

                for (int i = 0; i < 120; i++) {
                    vec3 pos = totalDist * rayDir;

                    pos.z -= tFlight;
                    pos.z = mod(pos.z + 2.2, 4.0) - 2.4;

                    vec3 rotAxis = normalize(cos(vec3(2.8, 2.0, -0.3) - totalDist * 1.7));
                    vec3 twistedSpace = rotAxis * dot(rotAxis, pos) - cross(rotAxis, pos);

                    float scale = 7.4;
                    for (int j = -2; j < 2; j++) {
                        scale += 7.5;
                        twistedSpace += sin(twistedSpace * scale + tAnim).yzx / scale;
                    }

                    structuralVal = twistedSpace.y;
                    stepDist = 0.57 * abs(length(pos) - 1.2) + -0.07 * abs(structuralVal);
                    totalDist += stepDist;

                    vec4 baseColor = vec4(uColor, 1.1);
                    vec4 palette = baseColor * (cos(structuralVal + vec4(3.4, -1.6, 5.3, -1.0)) * 0.8 + 1.0);

                    accumulatedLight += (palette / max(stepDist, 0.01)) * totalDist;

                    if (accumulatedLight.x > 90000.0) break;
                    if (totalDist > 25.1) break;
                }

                vec4 shaderColor = tanh_custom(accumulatedLight / uLightIntensity);
                shaderColor.rgb += (grain - 0.5) * uGrainIntensity;

                float brightness = max(max(shaderColor.r, shaderColor.g), shaderColor.b);
                float objectMask = smoothstep(uBackgroundCutoff, uBackgroundCutoff + 0.12, brightness);
                vec3 finalColor = mix(uBackgroundColor, shaderColor.rgb, objectMask);

                fragColor = vec4(finalColor, 1.0);
            }

            void main() {
                mainImage(gl_FragColor, gl_FragCoord.xy);
            }
        `;

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const applyBackground = () => {
            const color = params.greenScreen ? '#00ff00' : params.backgroundColor;
            document.body.classList.toggle('greenscreen', params.greenScreen);
            renderer.setClearColor(color, 1);
            uniforms.uBackgroundColor.value.copy(hexToVector3(color));
        };

        const updateResolution = () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.iResolution.value.set(
                window.innerWidth * renderer.getPixelRatio(),
                window.innerHeight * renderer.getPixelRatio()
            );
        };

        const updateViewUniforms = () => {
            uniforms.uZoom.value = params.zoom;
            uniforms.uPan.value.set(params.panX, params.panY);
        };

        // --- GUI Setup ---
        const gui = new GUI({ title: 'Shader Settings' });

        const renderFolder = gui.addFolder('Render');
        renderFolder.add(params, 'dpr', 0.1, 4.0, 0.1).name('Resolution (DPR)').onChange(v => {
            renderer.setPixelRatio(v);
            updateResolution();
        });
        renderFolder.add(params, 'zoom', 0.2, 8.0, 0.01).name('Zoom').onChange(updateViewUniforms);
        renderFolder.add(params, 'panX', -4.0, 4.0, 0.01).name('Pan X').onChange(updateViewUniforms);
        renderFolder.add(params, 'panY', -4.0, 4.0, 0.01).name('Pan Y').onChange(updateViewUniforms);

        const backgroundFolder = gui.addFolder('Background');
        backgroundFolder.add(params, 'greenScreen').name('Green Screen #00ff00').onChange(applyBackground);
        backgroundFolder.addColor(params, 'backgroundColor').name('Background Color').onChange(applyBackground);
        backgroundFolder.add(params, 'backgroundCutoff', 0.0, 0.4, 0.01).name('Background Cutoff').onChange(v => {
            uniforms.uBackgroundCutoff.value = v;
        });

        const animFolder = gui.addFolder('Animation');
        animFolder.add(params, 'animSpeed', -5.0, 5.0, 0.1).name('Morph Speed').onChange(v => uniforms.uAnimSpeed.value = v);
        animFolder.add(params, 'flightPos', -10.0, 10.0, 0.01).name('Flight Offset').onChange(v => uniforms.uFlightPos.value = v);

        const colorFolder = gui.addFolder('Color & Light');
        colorFolder.add(params, 'colorR', 0.0, 3.0, 0.01).name('Red Channel').onChange(v => uniforms.uColor.value.x = v);
        colorFolder.add(params, 'colorG', 0.0, 3.0, 0.01).name('Green Channel').onChange(v => uniforms.uColor.value.y = v);
        colorFolder.add(params, 'colorB', 0.0, 3.0, 0.01).name('Blue Channel').onChange(v => uniforms.uColor.value.z = v);
        colorFolder.add(params, 'lightIntensity', 5000, 100000, 100).name('Light Accumulation').onChange(v => uniforms.uLightIntensity.value = v);

        const postFolder = gui.addFolder('Post Processing');
        postFolder.add(params, 'grainIntensity', 0.0, 0.5, 0.01).name('Grain Intensity').onChange(v => uniforms.uGrainIntensity.value = v);

        gui.close();

        // --- Input: drag to pan, mouse wheel to zoom ---
        let isDragging = false;
        let previousPointer = { x: 0, y: 0 };

        window.addEventListener('pointerdown', (event) => {
            if (event.target.closest('.lil-gui')) return;

            isDragging = true;
            previousPointer = { x: event.clientX, y: event.clientY };
            document.body.classList.add('dragging');
            renderer.domElement.setPointerCapture?.(event.pointerId);
        });

        window.addEventListener('pointermove', (event) => {
            if (!isDragging) return;

            const deltaX = event.clientX - previousPointer.x;
            const deltaY = event.clientY - previousPointer.y;
            const panScale = 2 / window.innerHeight;

            params.panX += deltaX * panScale / params.zoom;
            params.panY -= deltaY * panScale / params.zoom;
            updateViewUniforms();

            previousPointer = { x: event.clientX, y: event.clientY };
        });

        const stopDragging = (event) => {
            isDragging = false;
            document.body.classList.remove('dragging');
            if (event?.pointerId !== undefined) {
                renderer.domElement.releasePointerCapture?.(event.pointerId);
            }
        };

        window.addEventListener('pointerup', stopDragging);
        window.addEventListener('pointercancel', stopDragging);

        window.addEventListener('wheel', (event) => {
            if (event.target.closest('.lil-gui')) return;

            event.preventDefault();
            const previousZoom = params.zoom;
            const zoomFactor = Math.exp(-event.deltaY * 0.001);
            params.zoom = THREE.MathUtils.clamp(params.zoom * zoomFactor, 0.2, 8.0);

            const rect = renderer.domElement.getBoundingClientRect();
            const pointerUv = new THREE.Vector2(
                (2.1 * (event.clientX - rect.left) * renderer.getPixelRatio() - uniforms.iResolution.value.x) / uniforms.iResolution.value.y,
                (2.1 * (rect.height - (event.clientY - rect.top)) * renderer.getPixelRatio() - uniforms.iResolution.value.y) / uniforms.iResolution.value.y
            );

            const zoomRatio = previousZoom / params.zoom;
            params.panX = pointerUv.x - (pointerUv.x - params.panX) * zoomRatio;
            params.panY = pointerUv.y - (pointerUv.y - params.panY) * zoomRatio;
            updateViewUniforms();
        }, { passive: false });

        // --- Resize Handler ---
        window.addEventListener('resize', updateResolution);
        applyBackground();
        updateResolution();

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            uniforms.iTime.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
