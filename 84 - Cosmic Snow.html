<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Particle Zoom Visualizer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000000;
    }
    #container {
      position: fixed;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="container" touch-action="none"></div>

  <!-- Three.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/88/three.min.js"></script>

  <!-- Vertex Shader -->
  <script id="vertexShader" type="x-shader/x-vertex">
    void main() {
        gl_Position = vec4( position, 1.0 );
    }
  </script>

  <!-- Fragment Shader -->
  <script id="fragmentShader" type="x-shader/x-fragment">
    uniform vec2 u_resolution;
    uniform vec2 u_mouse;
    uniform float u_time;
    uniform sampler2D u_noise;
    
    // Zoom and Offset Uniforms
    uniform float u_zoom;
    uniform vec2 u_offset;
    uniform float u_greenscreen;
    uniform vec3 u_colorA;
    uniform vec3 u_colorB;
    uniform float u_intensity;

    #define PI 3.141592653589793
    #define TAU 6.
    
    const float multiplier = 25.5;
    const float zoomSpeed = 10.;
    const int layers = 10;
    const int octaves = 5;

    vec2 hash2(vec2 p) {
      vec2 o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).xy;
      return o;
    }
    
    mat2 rotate2d(float _angle){
        return mat2(cos(_angle),sin(_angle),
                    -sin(_angle),cos(_angle));
    }
    
    vec3 hsb2rgb( in vec3 c ){
      vec3 rgb = clamp(abs(mod(c.x*6.0+vec3(0.0,4.0,2.0),
                               6.0)-3.0)-1.0,
                       0.0,
                       1.0 );
      rgb = rgb*rgb*(3.0-2.0*rgb);
      return c.z * mix( vec3(1.0), rgb, c.y);
    }
    
    float hash(vec2 p) {
      float o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).x;
      return o;
    }

    float noise(vec2 uv) {
      vec2 id = floor(uv);
      vec2 subuv = fract(uv);
      vec2 u = subuv * subuv * (3. - 2. * subuv);
      float a = hash(id);
      float b = hash(id + vec2(1., 0.));
      float c = hash(id + vec2(0., 1.));
      float d = hash(id + vec2(1., 1.));
      return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
    }

    float fbm(in vec2 uv) {
      float s = .0;
      float m = .0;
      float a = .5;
      for(int i = 0; i < octaves; i++) {
        s += a * noise(uv);
        m += a;
        a *= .5;
        uv *= 2.;
      }
      return s / m;
    }
    
    vec3 domain(vec2 z){
      return vec3(hsb2rgb(vec3(atan(z.y,z.x)/TAU,1.,1.)));
    }

    vec3 colour(vec2 z) {
        return domain(z);
    }
    
    // The render function renders the pattern added to each layer
    vec3 render(vec2 uv, float scale, vec3 colour) {
      vec2 id = floor(uv);
      vec2 subuv = fract(uv);
      vec2 rand = hash2(id);
      float bokeh = abs(scale) * 1.;
      
      float particle = 0.;
      
      if(length(rand) > 1.3) {
        vec2 pos = subuv-.5;
        float field = length(pos);
        particle = smoothstep(.3, 0., field);
        particle += smoothstep(.4, 0.34 * bokeh, field);
      }
      return vec3(particle*2.);
    }
    
    vec3 renderLayer(int layer, int layers, vec2 uv, inout float opacity, vec3 colour, float n) {
      vec2 _uv = uv;
      // Generating a scale value between zero and 1 based on a mod of u_time
      float scale = mod((u_time + zoomSpeed / float(layers) * float(layer)) / zoomSpeed, -1.);
      uv *= 20.; // The initial scale
      uv *= scale*scale; // Modify overall scale by generated amount
      uv = rotate2d(u_time / 10.) * uv; // Rotate
      uv += vec2(25. + sin(u_time*.1)) * float(layer); // Offset layer to vary look

      // Render the pass
      vec3 pass = render(uv * multiplier, scale, colour) * .2;

      // Opacity of the layer fading in from the bottom
      opacity = 1. + scale;
      float _opacity = opacity;
      
      // Opacity of the layer fading out at the top
      float endOpacity = smoothstep(0., 0.4, scale * -1.);
      opacity += endOpacity;

      return pass * _opacity * endOpacity;
    }

    void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy);

        if(u_resolution.y < u_resolution.x) {
          uv /= u_resolution.y;
        } else {
          uv /= u_resolution.x;
        }

        // Apply interactive camera drag and scroll wheel zoom
        uv = (uv - u_offset) / u_zoom;
      
        float n = fbm((uv + vec2(sin(u_time*.1), u_time*.1)) * 2. - 2.);

        vec3 colour = vec3(0.);
        colour = n * mix(u_colorA, u_colorB, n) * u_intensity;

        float opacity = 1.;
        float opacity_sum = 1.;
        float particleSum = 0.0;

        for(int i = 1; i <= layers; i++) {
          vec3 layerVal = renderLayer(i, layers, uv, opacity, colour, n);
          colour += layerVal;
          particleSum += layerVal.x;
          opacity_sum += opacity;
        }

        if (u_greenscreen > 0.5) {
          // Chroma key background replacement (#00ff00)
          float pIntensity = clamp(particleSum * 20.0, 0.0, 1.0);
          gl_FragColor = vec4(mix(vec3(0.0, 1.0, 0.0), vec3(1.0), pIntensity), 1.0);
        } else {
          colour /= opacity_sum;
          gl_FragColor = vec4(clamp(colour * 20., 0., 1.), 1.0);
        }
    }
  </script>

  <!-- Control & Scene Script Module -->
  <script type="module">
    import { GUI } from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    let container;
    let camera, scene, renderer;
    let uniforms;
    let loader = new THREE.TextureLoader();
    let texture;

    // Configurable state parameters
    const params = {
      zoom: 1.0,
      offsetX: 0.0,
      offsetY: 0.0,
      greenscreen: false,
      colorScheme: 'Deep Cosmos',
      animationMode: 'Cosmic Drift',
      intensity: 1.0,
      colorA: '#0080ff',
      colorB: '#ff8040'
    };

    // 5 curated popular color schemes
    const colorSchemes = {
      'Deep Cosmos': { colorA: '#0080ff', colorB: '#ff8040' },
      'Neon Aurora': { colorA: '#00ff88', colorB: '#0044ff' },
      'Solar Flare': { colorA: '#ff3300', colorB: '#ffcc00' },
      'Cyberpunk Magenta': { colorA: '#ff00aa', colorB: '#330099' },
      'Toxic Wasteland': { colorA: '#99ff00', colorB: '#003300' }
    };

    let colorAController, colorBController;
    let zoomController, offsetXController, offsetYController;
    let gui;

    loader.setCrossOrigin("anonymous");
    loader.load(
      'https://s3-us-west-2.amazonaws.com/s.cdpn.io/982762/noise.png',
      function do_something_with_texture(tex) {
        texture = tex;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.minFilter = THREE.LinearFilter;
        init();
        animate();
      }
    );

    function init() {
      container = document.getElementById( 'container' );

      camera = new THREE.Camera();
      camera.position.z = 1;

      scene = new THREE.Scene();

      var geometry = new THREE.PlaneBufferGeometry( 2, 2 );

      uniforms = {
        u_time: { type: "f", value: 1.0 },
        u_resolution: { type: "v2", value: new THREE.Vector2() },
        u_noise: { type: "t", value: texture },
        u_mouse: { type: "v2", value: new THREE.Vector2() },
        u_zoom: { type: "f", value: params.zoom },
        u_offset: { type: "v2", value: new THREE.Vector2(params.offsetX, params.offsetY) },
        u_greenscreen: { type: "f", value: params.greenscreen ? 1.0 : 0.0 },
        u_colorA: { type: "c", value: new THREE.Color(params.colorA) },
        u_colorB: { type: "c", value: new THREE.Color(params.colorB) },
        u_intensity: { type: "f", value: params.intensity }
      };

      var material = new THREE.ShaderMaterial( {
        uniforms: uniforms,
        vertexShader: document.getElementById( 'vertexShader' ).textContent,
        fragmentShader: document.getElementById( 'fragmentShader' ).textContent
      } );
      material.extensions.derivatives = true;

      var mesh = new THREE.Mesh( geometry, material );
      scene.add( mesh );

      renderer = new THREE.WebGLRenderer();
      renderer.setPixelRatio( window.devicePixelRatio || 1 );

      container.appendChild( renderer.domElement );

      onWindowResize();
      window.addEventListener( 'resize', onWindowResize, false );

      // --- GUI Construction (lil-gui) ---
      gui = new GUI({ title: 'Visualizer Controls' });

      const fDisplay = gui.addFolder('Display Settings');
      fDisplay.add(params, 'greenscreen').name('Green Screen BG').onChange(v => {
        uniforms.u_greenscreen.value = v ? 1.0 : 0.0;
      });
      fDisplay.add(params, 'intensity', 0.5, 3.0, 0.1).name('Brightness').onChange(v => {
        uniforms.u_intensity.value = v;
      });

      const fControls = gui.addFolder('Camera & Offset');
      zoomController = fControls.add(params, 'zoom', 0.1, 10.0, 0.1).name('Zoom').onChange(v => {
        uniforms.u_zoom.value = v;
      });
      offsetXController = fControls.add(params, 'offsetX', -5.0, 5.0, 0.01).name('Offset X').onChange(v => {
        uniforms.u_offset.value.x = v;
      });
      offsetYController = fControls.add(params, 'offsetY', -5.0, 5.0, 0.01).name('Offset Y').onChange(v => {
        uniforms.u_offset.value.y = v;
      });

      const fColors = gui.addFolder('Color Customization');
      fColors.add(params, 'colorScheme', Object.keys(colorSchemes)).name('Color Scheme').onChange(applyColorScheme);
      colorAController = fColors.addColor(params, 'colorA').name('Nebula Color').onChange(v => {
        uniforms.u_colorA.value.set(v);
      });
      colorBController = fColors.addColor(params, 'colorB').name('Particle Color').onChange(v => {
        uniforms.u_colorB.value.set(v);
      });

      const fAnim = gui.addFolder('Animations');
      fAnim.add(params, 'animationMode', [
        'Cosmic Drift',
        'Hyperdrive Warp',
        'Quantum Turbulence',
        'Black Hole Orbit',
        'Supernova Pulse'
      ]).name('Preset Animation').onChange(v => {
        uniforms.u_intensity.value = params.intensity;
      });

      gui.close();

      // --- Interaction event handlers (Drag and Zoom) ---
      let isDragging = false;
      let previousMousePosition = { x: 0, y: 0 };

      window.addEventListener('pointerdown', (e) => {
        if (e.target.closest('.lil-gui')) return;
        isDragging = true;
        previousMousePosition = { x: e.clientX, y: e.clientY };
      });

      window.addEventListener('pointermove', (e) => {
        let ratio = window.innerHeight / window.innerWidth;
        uniforms.u_mouse.value.x = (e.pageX - window.innerWidth / 2) / window.innerWidth / ratio;
        uniforms.u_mouse.value.y = (e.pageY - window.innerHeight / 2) / window.innerHeight * -1;

        if (isDragging) {
          const deltaX = e.clientX - previousMousePosition.x;
          const deltaY = e.clientY - previousMousePosition.y;
          
          const dragSpeed = 0.003 / params.zoom;
          params.offsetX -= deltaX * dragSpeed;
          params.offsetY += deltaY * dragSpeed;
          
          uniforms.u_offset.value.set(params.offsetX, params.offsetY);
          
          offsetXController.updateDisplay();
          offsetYController.updateDisplay();
          
          previousMousePosition = { x: e.clientX, y: e.clientY };
        }
      });

      window.addEventListener('pointerup', () => { isDragging = false; });
      window.addEventListener('pointercancel', () => { isDragging = false; });

      window.addEventListener('wheel', (e) => {
        if (e.target.closest('.lil-gui')) return;
        
        const zoomFactor = 1.1;
        if (e.deltaY < 0) {
          params.zoom *= zoomFactor;
        } else {
          params.zoom /= zoomFactor;
        }
        
        params.zoom = Math.max(0.1, Math.min(10.0, params.zoom));
        uniforms.u_zoom.value = params.zoom;
        zoomController.updateDisplay();
      }, { passive: true });

      // Keyboard handler: Toggle UI visibility with the "H" key
      window.addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') {
          if (gui.domElement.style.display === 'none') {
            gui.show();
          } else {
            gui.hide();
          }
        }
      });
    }

    function applyColorScheme(schemeName) {
      const scheme = colorSchemes[schemeName];
      if (scheme) {
        params.colorA = scheme.colorA;
        params.colorB = scheme.colorB;
        uniforms.u_colorA.value.set(scheme.colorA);
        uniforms.u_colorB.value.set(scheme.colorB);
        colorAController.setValue(scheme.colorA);
        colorBController.setValue(scheme.colorB);
      }
    }

    function onWindowResize( event ) {
      renderer.setSize( window.innerWidth, window.innerHeight );
      uniforms.u_resolution.value.x = renderer.domElement.width;
      uniforms.u_resolution.value.y = renderer.domElement.height;
    }

    // --- CCapture hook (if loaded in environment) ---
    let capturer = null;
    let capturing = false;

    if (typeof CCapture !== 'undefined') {
      capturer = new CCapture( { 
        verbose: true, 
        framerate: 60,
        quality: 90,
        format: 'webm',
        workersPath: 'js/'
      } );
    }

    window.toggleCapture = function() {
      if (!capturer) return;
      if (capturing) {
        capturer.stop();
        capturer.save();
      } else {
        capturer.start();
      }
      capturing = !capturing;
    };

    window.addEventListener('keyup', function(e) { 
      if (e.keyCode == 68) window.toggleCapture(); 
    });

    // --- Animation loop ---
    let startTime = null;

    function animate(timestamp) {
      requestAnimationFrame( animate );
      
      if (!timestamp) timestamp = performance.now();
      if (!startTime) startTime = timestamp;
      let elapsed = (timestamp - startTime) * 0.001; // elapsed time in seconds

      renderScene(timestamp, elapsed);
    }

    function renderScene(timestamp, elapsed) {
      uniforms.u_time.value = -10000 + timestamp * 0.0005;

      let currentZoom = params.zoom;
      let currentOffsetX = params.offsetX;
      let currentOffsetY = params.offsetY;
      let currentIntensity = params.intensity;

      // Automatic infinite animations mapping
      if (params.animationMode === 'Cosmic Drift') {
        currentZoom = params.zoom * (1.0 + 0.15 * Math.sin(elapsed * 0.5));
        currentOffsetX = params.offsetX + 0.15 * Math.sin(elapsed * 0.3);
        currentOffsetY = params.offsetY + 0.15 * Math.cos(elapsed * 0.2);
      } 
      else if (params.animationMode === 'Hyperdrive Warp') {
        currentZoom = params.zoom * (1.5 + Math.sin(elapsed * 1.5) * 0.8);
        currentOffsetX = params.offsetX + 0.3 * Math.cos(elapsed * 1.0);
        currentOffsetY = params.offsetY + 0.3 * Math.sin(elapsed * 1.0);
      }
      else if (params.animationMode === 'Quantum Turbulence') {
        currentZoom = params.zoom * (1.0 + 0.05 * Math.sin(elapsed * 4.0) * Math.cos(elapsed * 1.5));
        currentOffsetX = params.offsetX + 0.08 * Math.sin(elapsed * 3.0);
        currentOffsetY = params.offsetY + 0.08 * Math.cos(elapsed * 2.5);
        currentIntensity = params.intensity * (1.0 + 0.15 * Math.sin(elapsed * 5.0));
      }
      else if (params.animationMode === 'Black Hole Orbit') {
        let radius = 0.4 * (1.0 + 0.2 * Math.sin(elapsed * 0.2));
        currentOffsetX = params.offsetX + radius * Math.cos(elapsed * 0.8);
        currentOffsetY = params.offsetY + radius * Math.sin(elapsed * 0.8);
        currentZoom = params.zoom * (1.0 + 0.1 * Math.sin(elapsed * 0.4));
      }
      else if (params.animationMode === 'Supernova Pulse') {
        let pulse = Math.pow(Math.sin(elapsed * 2.0) * 0.5 + 0.5, 3.0);
        currentZoom = params.zoom * (0.8 + 0.6 * pulse);
        currentIntensity = params.intensity * (0.8 + 0.8 * pulse);
      }

      uniforms.u_zoom.value = currentZoom;
      uniforms.u_offset.value.x = currentOffsetX;
      uniforms.u_offset.value.y = currentOffsetY;
      uniforms.u_intensity.value = currentIntensity;

      renderer.render( scene, camera );
      
      if (capturing && capturer) {
        capturer.capture( renderer.domElement );
      }
    }
  </script>
</body>
</html>
