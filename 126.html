<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TroisJS Starfield Customizer</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
    /* Custom premium styling for lil-gui */
    .lil-gui {
      --background-color: rgba(14, 5, 24, 0.88);
      --text-color: #f3ecf9;
      --title-background-color: rgba(36, 12, 60, 0.95);
      --widget-color: rgba(62, 22, 98, 0.6);
      --hover-color: rgba(110, 42, 172, 0.8);
      --focus-color: #dd4aff;
      --number-color: #64dcff;
      --string-color: #ebd758;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(221, 74, 255, 0.25);
      backdrop-filter: blur(16px);
      padding: 8px;
    }
    .lil-gui .title {
      font-weight: bold;
      font-size: 16px;
      letter-spacing: 1px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { createApp } from 'https://unpkg.com/vue@3.0.11/dist/vue.esm-browser.prod.js'
    import { lerp, BufferGeometry, Camera, EffectComposer, Points, Renderer, RenderPass, Scene, ShaderMaterial, Texture, UnrealBloomPass, ZoomBlurPass } from 'https://unpkg.com/troisjs@0.3.0-beta.4/build/trois.module.cdn.min.js'
    import { Clock, Color, MathUtils, Vector3 } from 'https://unpkg.com/three@0.127.0/build/three.module.js'
    import { OrbitControls } from 'https://unpkg.com/three@0.127.0/examples/jsm/controls/OrbitControls.js'
    import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js'

    const { randFloat: rnd, randInt, randFloatSpread: rndFS } = MathUtils

    const PRESET_SCHEMES = {
      'Cosmic Aurora': ['#ff007f', '#00f5ff', '#7b2cbf', '#00ff7f', '#9d00ff'],
      'Supernova Blast': ['#ff4500', '#ff8c00', '#ffd700', '#ff1493', '#4b0082'],
      'Deep Nebula': ['#000814', '#003566', '#0077b6', '#9b5de5', '#f15bb5'],
      'Stellar Dust': ['#ffb5a7', '#fcd5ce', '#f8ad9d', '#f4978e', '#47126b'],
      'Hyperdrive': ['#ffffff', '#a0c4ff', '#9bf6ff', '#4ea8de', '#5390d9']
    }

    const vertexShader = `
      uniform float uTime;
      attribute vec3 color;
      attribute float size;
      attribute float velocity;
      varying vec4 vColor;
      void main(){
        vColor = vec4(color, 1.0);
        vec3 p = vec3(position);
        p.z = -150. + mod(position.z + uTime, 300.);
        vec4 mvPosition = modelViewMatrix * vec4( p, 1.0 );
        gl_PointSize = size * (-50.0 / mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `

    const fragmentShader = `
      uniform sampler2D uTexture;
      varying vec4 vColor;
      void main() {
        gl_FragColor = vColor * texture2D(uTexture, gl_PointCoord);
      }
    `

    createApp({
      template: `
        <Renderer ref="renderer" pointer resize="window">
          <Camera :position="{ z: 0 }" :fov="50" />
          <Scene>
            <Points ref="points" :position="{ z: -150 }">
              <BufferGeometry :attributes="attributes" />
              <ShaderMaterial :blending="2" :depth-test="false" :uniforms="uniforms" :vertex-shader="vertexShader" :fragment-shader="fragmentShader">
                <Texture src="https://assets.codepen.io/33787/sprite.png" uniform="uTexture" />
              </ShaderMaterial>
            </Points>
          </Scene>
          <EffectComposer>
            <RenderPass />
            <UnrealBloomPass :strength="settings.greenScreen ? 0 : 2" :radius="0" :threshold="0" />
            <ZoomBlurPass :strength="zoomStrength" />
          </EffectComposer>
        </Renderer>
      `,
      components: { BufferGeometry, Camera, EffectComposer, Points, Renderer, RenderPass, Scene, ShaderMaterial, Texture, UnrealBloomPass, ZoomBlurPass },
      setup() {
        const POINTS_COUNT = 50000

        const palette = PRESET_SCHEMES['Cosmic Aurora']

        const positions = new Float32Array(POINTS_COUNT * 3)
        const colors = new Float32Array(POINTS_COUNT * 3)
        const sizes = new Float32Array(POINTS_COUNT)
        const v3 = new Vector3(), color = new Color()
        for (let i = 0; i < POINTS_COUNT; i++) {
          v3.set(rndFS(200), rndFS(200), rndFS(300))
          v3.toArray(positions, i * 3)
          color.set(palette[Math.floor(rnd(0, palette.length))])
          color.toArray(colors, i * 3)
          sizes[i] = rnd(5, 20)
        }

        const attributes = [
          { name: 'position', array: positions, itemSize: 3 },
          { name: 'color', array: colors, itemSize: 3 },
          { name: 'size', array: sizes, itemSize: 1 },
        ]

        const uniforms = { uTime: { value: 0 } }

        const clock = new Clock()

        return {
          POINTS_COUNT,
          attributes, uniforms, vertexShader, fragmentShader,
          clock,
        }
      },
      data() {
        return {
          zoomStrength: 0,
          timeCoef: 1.0,
          targetTimeCoef: 1.0,
          settings: {
            greenScreen: false,
            colorScheme: 'Cosmic Aurora',
            animationPreset: 'Galaxy Spin',
            animationSpeed: 1.0,
            dpr: 1.0
          },
          customColors: {
            color1: '#ff007f',
            color2: '#00f5ff',
            color3: '#7b2cbf',
            color4: '#00ff7f',
            color5: '#9d00ff'
          }
        }
      },
      mounted() {
        const renderer = this.$refs.renderer
        const camera = renderer.three.camera
        const threeRenderer = renderer.three.renderer
        const scene = renderer.three.scene
        const points = this.$refs.points.points

        // Initialize Three.js renderer settings
        threeRenderer.setPixelRatio(this.settings.dpr)

        // Create OrbitControls
        const controls = new OrbitControls(camera, threeRenderer.domElement)
        controls.enableDamping = true
        controls.dampingFactor = 0.05
        controls.minDistance = 10
        controls.maxDistance = 500
        controls.target.set(0, 0, -150)
        controls.update()
        this.controls = controls

        // Track OrbitControls interaction status
        this.isUserInteracting = false
        controls.addEventListener('start', () => {
          this.isUserInteracting = true
        })
        controls.addEventListener('end', () => {
          this.isUserInteracting = false
        })

        // Hover effect for screen speed-up
        const canvas = threeRenderer.domElement
        canvas.addEventListener('pointerenter', () => {
          this.targetTimeCoef = 100.0
        })
        canvas.addEventListener('pointerleave', () => {
          this.targetTimeCoef = 1.0
        })

        // Background handling
        const updateBackground = () => {
          if (this.settings.greenScreen) {
            threeRenderer.setClearColor(0x00ff00, 1)
            scene.background = new Color('#00ff00')
          } else {
            threeRenderer.setClearColor(0x000000, 1)
            scene.background = new Color('#000000')
          }
        }
        updateBackground()

        // Create GUI
        const gui = new GUI({ title: 'Starfield Settings' })

        gui.add(this.settings, 'greenScreen')
          .name('Green Screen')
          .onChange(updateBackground)

        const colorPresetController = gui.add(this.settings, 'colorScheme', Object.keys(PRESET_SCHEMES).concat('Custom'))
          .name('Color Preset')
          .onChange((val) => {
            if (val !== 'Custom') {
              const scheme = PRESET_SCHEMES[val]
              this.customColors.color1 = scheme[0]
              this.customColors.color2 = scheme[1]
              this.customColors.color3 = scheme[2]
              this.customColors.color4 = scheme[3]
              this.customColors.color5 = scheme[4]
              // Update custom color picker display
              color1Controller.updateDisplay()
              color2Controller.updateDisplay()
              color3Controller.updateDisplay()
              color4Controller.updateDisplay()
              color5Controller.updateDisplay()
              this.applyColors()
            }
          })

        gui.add(this.settings, 'animationPreset', ['Galaxy Spin', 'Cosmic Drift', 'Hyper Zoom', 'Warp Waves', 'Static'])
          .name('Animation Preset')

        gui.add(this.settings, 'animationSpeed', 0.1, 5.0, 0.1)
          .name('Anim Speed')

        gui.add(this.settings, 'dpr', 0.5, 2.0, 0.1)
          .name('DPR (Resolution)')
          .onChange((val) => {
            threeRenderer.setPixelRatio(val)
            const composer = renderer.three.composer
            if (composer) {
              composer.setPixelRatio(val)
            }
            renderer.onResize()
          })

        // Custom Colors folder
        const colorsFolder = gui.addFolder('Custom Colors')
        colorsFolder.close()

        const onCustomColorChange = () => {
          this.settings.colorScheme = 'Custom'
          colorPresetController.updateDisplay()
          this.applyColors()
        }

        const color1Controller = colorsFolder.addColor(this.customColors, 'color1').name('Color 1').onChange(onCustomColorChange)
        const color2Controller = colorsFolder.addColor(this.customColors, 'color2').name('Color 2').onChange(onCustomColorChange)
        const color3Controller = colorsFolder.addColor(this.customColors, 'color3').name('Color 3').onChange(onCustomColorChange)
        const color4Controller = colorsFolder.addColor(this.customColors, 'color4').name('Color 4').onChange(onCustomColorChange)
        const color5Controller = colorsFolder.addColor(this.customColors, 'color5').name('Color 5').onChange(onCustomColorChange)

        // Keyboard hide/show shortcut
        let uiVisible = true
        window.addEventListener('keydown', (e) => {
          if (e.key.toLowerCase() === 'h') {
            uiVisible = !uiVisible
            gui.domElement.style.display = uiVisible ? 'block' : 'none'
          }
        })

        // Animation rendering
        renderer.onBeforeRender(() => {
          this.timeCoef = lerp(this.timeCoef, this.targetTimeCoef, 0.02)
          this.uniforms.uTime.value += this.clock.getDelta() * this.timeCoef * 4 * this.settings.animationSpeed
          this.zoomStrength = this.settings.greenScreen ? 0 : this.timeCoef * 0.004

          // Update OrbitControls
          controls.update()

          // Automatically animate points relative to space based on selection
          if (!this.isUserInteracting) {
            const time = this.clock.getElapsedTime() * this.settings.animationSpeed
            if (this.settings.animationPreset === 'Galaxy Spin') {
              points.rotation.y = time * 0.1
              points.rotation.x = 0
              points.rotation.z = 0
              points.position.set(0, 0, -150)
            } else if (this.settings.animationPreset === 'Cosmic Drift') {
              points.position.x = Math.sin(time * 0.2) * 30
              points.position.y = Math.cos(time * 0.25) * 20
              points.position.z = -150
              points.rotation.set(0, 0, 0)
            } else if (this.settings.animationPreset === 'Hyper Zoom') {
              points.position.z = -150 + Math.sin(time * 0.3) * 60
              points.position.x = 0
              points.position.y = 0
              points.rotation.set(0, 0, 0)
            } else if (this.settings.animationPreset === 'Warp Waves') {
              points.position.x = Math.sin(time * 0.15) * 20
              points.position.y = Math.cos(time * 0.2) * 15
              points.position.z = -150
              points.rotation.y = time * 0.05
              points.rotation.x = Math.sin(time * 0.1) * 0.05
              points.rotation.z = 0
            } else if (this.settings.animationPreset === 'Static') {
              points.position.set(0, 0, -150)
              points.rotation.set(0, 0, 0)
            }
          }
        })
      },
      methods: {
        applyColors() {
          const colorAttribute = this.$refs.points.geometry.attributes.color
          const palette = [
            this.customColors.color1,
            this.customColors.color2,
            this.customColors.color3,
            this.customColors.color4,
            this.customColors.color5
          ]
          const color = new Color()
          for (let i = 0; i < this.POINTS_COUNT; i++) {
            color.set(palette[Math.floor(rnd(0, palette.length))])
            color.toArray(colorAttribute.array, i * 3)
          }
          colorAttribute.needsUpdate = true
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
