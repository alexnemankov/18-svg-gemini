<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Portal Scene</title>
  <style>
    :root {
      --background-color: black;
      --drop-color: white;
      --wave-color: white;
      --shadow-color: black;
      --anim-duration: 6s;
      --anim-delay-step: 0.3s;
    }
    @property --w {
        syntax: "<length>";
        inherits: false;
        initial-value: 0px;
    }
    @property --drop {
        syntax: "<length>";
        inherits: false;
        initial-value: 660px;
    }
    @property --o {
        syntax: "<number>";
        inherits: false;
        initial-value: 0;
    }
    body, html {
        padding: 0;
        margin: 0;
        min-height: 100vh;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        overflow: hidden;
        background: var(--background-color);
        font-family: sans-serif;
    }
    .viewport {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        cursor: grab;
        user-select: none;
        touch-action: none;
    }
    .viewport:active {
        cursor: grabbing;
    }
    .scene-transform {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        transform-origin: center center;
        transform-style: preserve-3d;
        will-change: transform;
    }
    .scene,
    .scene-wave {
        position: relative;
        max-width: 40rem;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 100rem;
        perspective-origin: 50% 100%;
    }
    .scene .scene-wave {
        transform-style: preserve-3d;
        perspective: 70rem;
        perspective-origin: 50% 100%;
        perspective: 100rem;
    }
    .scene .drop {
        position: absolute;
        top: 0;
        bottom: 0;
        width: .5rem;
        height: .5rem;
        background: var(--drop-color);
        border-radius: 0 5rem 5rem;
        transform: rotate(45deg) translateZ(var(--drop));
        margin: auto;
        z-index: 9;
        animation: drop var(--anim-duration, 6s) ease-in-out infinite;
    }
    .scene i {
        position: absolute;
        width: calc(((var(--i) - 1) * 2rem) * 2.23606797749979); /* sqrt(5) approx 2.236 */
        aspect-ratio: 1;
        border: .35rem dotted var(--wave-color);
        border-radius: 50%;
        display: block;
        opacity: calc(1 - (var(--i) / 30));
        transform: rotateX(40deg) translateZ(var(--w)) translateY(-20%);
        animation: wave var(--anim-duration, 6s) ease-in-out infinite;
        animation-delay: calc(0.3420201433256687 * var(--i) * var(--anim-delay-step, .3s)); /* sin(20deg) approx 0.342 */
        box-shadow: 0px 0px 30px 5px var(--shadow-color),
        0px 0px 30px -5px var(--shadow-color);
    }
    .scene i:nth-of-type(1) {
        opacity: var(--o) !important;
        animation: wave var(--anim-duration, 6s) ease-in-out infinite, opacityF var(--anim-duration, 6s) ease-in-out infinite;
    }

    @keyframes wave {
        10% {
            --w: 0px;
        }
        20% {
            --w: -60px;
        }
        35% {
            --w: 60px;
        }
        45%, 100% {
            --w: 0px;
        }
    }

    @keyframes drop {
        0% {
            --drop: 860px;
            opacity: 1;
        }
        15% {
            --drop: -70px;
            opacity: 1;
        }
        20%, 100% {
            --drop: 0;
            opacity: 0;
        }
    }

    @keyframes opacityF {
        0%, 10% {
            --o: 0;
        }
        15%, 40% {
            --o: 1;
        }
        50% {
            --o: 0;
        }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="scene-transform">
      <div class="scene">
        <div class="drop"></div>
        <div class="scene-wave">
          <i style="--i: 1;"></i>
          <i style="--i: 2;"></i>
          <i style="--i: 3;"></i>
          <i style="--i: 4;"></i>
          <i style="--i: 5;"></i>
          <i style="--i: 6;"></i>
          <i style="--i: 7;"></i>
          <i style="--i: 8;"></i>
          <i style="--i: 9;"></i>
          <i style="--i: 10;"></i>
          <i style="--i: 11;"></i>
          <i style="--i: 12;"></i>
          <i style="--i: 13;"></i>
          <i style="--i: 14;"></i>
          <i style="--i: 15;"></i>
          <i style="--i: 16;"></i>
          <i style="--i: 17;"></i>
          <i style="--i: 18;"></i>
          <i style="--i: 19;"></i>
          <i style="--i: 20;"></i>
          <i style="--i: 21;"></i>
          <i style="--i: 22;"></i>
          <i style="--i: 23;"></i>
          <i style="--i: 24;"></i>
          <i style="--i: 25;"></i>
          <i style="--i: 26;"></i>
          <i style="--i: 27;"></i>
          <i style="--i: 28;"></i>
          <i style="--i: 29;"></i>
          <i style="--i: 30;"></i>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { GUI } from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // 5 original, popular preset color schemes
    const COLOR_SCHEMES = {
      'Midnight Neon': {
        background: '#090514',
        drop: '#ff007f',
        wave: '#00f5ff',
        shadow: '#05020a'
      },
      'Deep Cosmos': {
        background: '#0b091a',
        drop: '#a0e6ff',
        wave: '#7b2cb1',
        shadow: '#030008'
      },
      'Sunset Ripple': {
        background: '#1e081c',
        drop: '#ff9e00',
        wave: '#ff0055',
        shadow: '#0d000c'
      },
      'Emerald Abyss': {
        background: '#051915',
        drop: '#52b788',
        wave: '#00f5d4',
        shadow: '#010a08'
      },
      'Golden Hour': {
        background: '#141005',
        drop: '#ffe5ec',
        wave: '#ffb703',
        shadow: '#0a0802'
      },
      'Custom': {
        background: '#090514',
        drop: '#ff007f',
        wave: '#00f5ff',
        shadow: '#05020a'
      }
    };

    const settings = {
      greenScreen: false,
      colorScheme: 'Midnight Neon',
      dpr: 1.0,
      animation: 'Slow Orbit',
      animationSpeed: 1.0
    };

    const colors = { ...COLOR_SCHEMES['Midnight Neon'] };

    const root = document.documentElement;
    const sceneTransform = document.querySelector('.scene-transform');

    // Camera state for Zoom and Drag (panning)
    const camera = {
      zoom: 1.0,
      targetZoom: 1.0,
      panX: 0,
      targetPanX: 0,
      panY: 0,
      targetPanY: 0
    };

    // Update root color variables
    function updateColors() {
      if (settings.greenScreen) {
        root.style.setProperty('--background-color', '#00ff00');
      } else {
        root.style.setProperty('--background-color', colors.background);
      }
      root.style.setProperty('--drop-color', colors.drop);
      root.style.setProperty('--wave-color', colors.wave);
      root.style.setProperty('--shadow-color', colors.shadow);
    }

    // Update animation speed variables
    function updateSpeed() {
      const speed = settings.animationSpeed;
      // We scale duration and delay step by speed factor
      root.style.setProperty('--anim-duration', `${6 / speed}s`);
      root.style.setProperty('--anim-delay-step', `${0.3 / speed}s`);
    }

    // Apply colors preset
    function applyPreset(value) {
      const scheme = COLOR_SCHEMES[value];
      if (scheme) {
        Object.assign(colors, scheme);
        backgroundController.updateDisplay();
        dropController.updateDisplay();
        waveController.updateDisplay();
        shadowController.updateDisplay();
        updateColors();
      }
    }

    function onIndividualColorChange() {
      settings.colorScheme = 'Custom';
      colorSchemeController.updateDisplay();
      updateColors();
    }

    // Setup GUI
    const gui = new GUI({ title: 'Scene Customize' });

    gui.add(settings, 'greenScreen')
      .name('Green Screen')
      .onChange(updateColors);

    const colorSchemeController = gui.add(settings, 'colorScheme', Object.keys(COLOR_SCHEMES))
      .name('Color Preset')
      .onChange(applyPreset);

    gui.add(settings, 'dpr', 0.5, 2.0, 0.1)
      .name('DPR (Pixel Ratio)');

    gui.add(settings, 'animation', ['Static', 'Slow Orbit', 'Breathing Zoom', 'Infinity Drift', 'Gentle Sway'])
      .name('Animation Preset');

    gui.add(settings, 'animationSpeed', 0.1, 5.0, 0.1)
      .name('Anim Speed')
      .onChange(updateSpeed);

    // Custom colors sub-folder
    const colorsFolder = gui.addFolder('Custom Colors');
    colorsFolder.close();

    const backgroundController = colorsFolder.addColor(colors, 'background').name('Background').onChange(onIndividualColorChange);
    const dropController = colorsFolder.addColor(colors, 'drop').name('Drop Color').onChange(onIndividualColorChange);
    const waveController = colorsFolder.addColor(colors, 'wave').name('Wave Color').onChange(onIndividualColorChange);
    const shadowController = colorsFolder.addColor(colors, 'shadow').name('Shadow Color').onChange(onIndividualColorChange);

    // Initialize
    updateColors();
    updateSpeed();

    // Mouse & Touch Interaction
    let isDragging = false;
    let startPointerX = 0;
    let startPointerY = 0;
    let startPanX = 0;
    let startPanY = 0;

    const viewport = document.querySelector('.viewport');

    viewport.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.lil-gui')) return;
      isDragging = true;
      startPointerX = e.clientX;
      startPointerY = e.clientY;
      startPanX = camera.targetPanX;
      startPanY = camera.targetPanY;
      viewport.releasePointerCapture(e.pointerId);
    });

    window.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - startPointerX;
      const dy = e.clientY - startPointerY;
      camera.targetPanX = startPanX + dx;
      camera.targetPanY = startPanY + dy;
    });

    window.addEventListener('pointerup', () => {
      isDragging = false;
    });
    window.addEventListener('pointercancel', () => {
      isDragging = false;
    });

    window.addEventListener('wheel', (e) => {
      if (e.target.closest('.lil-gui')) return;
      const zoomFactor = 0.08;
      if (e.deltaY < 0) {
        camera.targetZoom *= (1 + zoomFactor);
      } else {
        camera.targetZoom /= (1 + zoomFactor);
      }
      camera.targetZoom = Math.max(0.1, Math.min(8.0, camera.targetZoom));
    }, { passive: true });

    // Toggle GUI visibility with "H" key
    let uiVisible = true;
    window.addEventListener('keydown', (e) => {
      if (e.key === 'h' || e.key === 'H') {
        uiVisible = !uiVisible;
        gui.domElement.style.display = uiVisible ? 'block' : 'none';
      }
    });

    // Render & Camera Animation Loop
    let time = 0;
    let lastTime = performance.now();

    function animate(currentTime) {
      const delta = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      // Advance animation time based on speed
      time += delta * settings.animationSpeed;

      // Smoothly interpolate panning and zoom
      camera.zoom += (camera.targetZoom - camera.zoom) * 0.1;
      camera.panX += (camera.targetPanX - camera.panX) * 0.1;
      camera.panY += (camera.targetPanY - camera.panY) * 0.1;

      // Calculate camera animation offsets based on preset
      let animPanX = 0;
      let animPanY = 0;
      let animZoom = 1.0;
      let animRotX = 0;
      let animRotY = 0;
      let animRotZ = 0;

      switch (settings.animation) {
        case 'Slow Orbit':
          animRotX = Math.sin(time * 0.4) * 12;
          animRotY = Math.cos(time * 0.3) * 20;
          animRotZ = Math.sin(time * 0.2) * 5;
          break;
        case 'Breathing Zoom':
          animZoom = 1.0 + Math.sin(time * 0.5) * 0.15;
          animRotX = Math.sin(time * 0.2) * 4;
          break;
        case 'Infinity Drift':
          animPanX = Math.sin(time * 0.6) * 60;
          animPanY = Math.sin(time * 1.2) * 25;
          animRotZ = Math.cos(time * 0.6) * 4;
          break;
        case 'Gentle Sway':
          animPanX = Math.sin(time * 0.3) * 40;
          animPanY = Math.cos(time * 0.4) * 40;
          animZoom = 1.0 + Math.cos(time * 0.3) * 0.06;
          break;
        case 'Static':
        default:
          // No camera movement
          break;
      }

      const finalZoom = camera.zoom * settings.dpr * animZoom;
      const finalPanX = camera.panX + animPanX;
      const finalPanY = camera.panY + animPanY;
      
      // Apply transform to the container
      sceneTransform.style.transform = `translate3d(${finalPanX}px, ${finalPanY}px, 0px) scale(${finalZoom}) rotateX(${animRotX}deg) rotateY(${animRotY}deg) rotateZ(${animRotZ}deg)`;

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
