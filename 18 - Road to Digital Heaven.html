<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperspace Tunnel</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
            touch-action: none;
        }

        canvas.dragging {
            cursor: grabbing;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: monospace;
            font-size: 14px;
            pointer-events: none;
        }

        .lil-gui.root {
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading">Initializing Hyperspace...</div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

        // --- Core Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.002);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

        const TUNNEL_LENGTH = 800.0;
        const CAMERA_Z = (TUNNEL_LENGTH / 2.0) - 10.0;
        const GREEN_SCREEN_COLOR = '#00ff00';

        const SETTINGS = {
            speed: 8.0,
            bloomStrength: 1.46,
            bloomRadius: 0.092,
            chromaticAberration: 0.0306,
            cameraY: -4.194,
            cameraSpinSpeed: 0,
            edgeBlurStrength: 0.0115,
            zoom: 1.0,
            dragX: 0.0,
            dragY: 0.0,
            greenScreen: false,
            color1: '#0099ff',
            color2: '#44607e',
            color3: '#00e62e',
            color4: '#00e1ff',
            bgColor: '#000000'
        };

        const sceneGroup = new THREE.Group();
        scene.add(sceneGroup);

        const applySceneTransform = () => {
            sceneGroup.position.set(SETTINGS.dragX, SETTINGS.dragY, 0);
            sceneGroup.scale.setScalar(SETTINGS.zoom);
        };

        const activeBgColor = () => SETTINGS.greenScreen ? GREEN_SCREEN_COLOR : SETTINGS.bgColor;

        scene.fog.color.set(activeBgColor());
        scene.background = new THREE.Color(activeBgColor());

        camera.position.set(0, SETTINGS.cameraY, CAMERA_Z);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        document.getElementById('loading').style.display = 'none';

        // --- Custom Shader Material for the Tunnel ---
        const tunnelVertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;

            void main() {
                vUv = uv;
                vPosition = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const tunnelFragmentShader = `
            varying vec2 vUv;
            varying vec3 vPosition;

            uniform float uTime;
            uniform float uSpeed;
            uniform float uTunnelLength;
            uniform float uCameraZ;
            uniform sampler2D uDataTexture;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            uniform vec3 uColor4;
            uniform vec3 uBgColor;

            float random(vec2 st) {
                return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
            }

            float noise(vec2 st) {
                vec2 i = floor(st);
                vec2 f = fract(st);
                float a = random(i);
                float b = random(i + vec2(1.0, 0.0));
                float c = random(i + vec2(0.0, 1.0));
                float d = random(i + vec2(1.0, 1.0));
                vec2 u = f * f * (3.0 - 2.0 * f);
                return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
            }

            vec3 getLines(float crossAxis, float zPos, float time, float speed) {
                float row = floor(crossAxis * 6.0);
                float rowRandom = random(vec2(row, 0.0));

                float rowSpeedMultiplier = 0.5 + rowRandom * 2.5;
                float dynamicZ = zPos - (time * speed * rowSpeedMultiplier);

                float streakNoise = noise(vec2(dynamicZ * 0.02, crossAxis * 12.0));
                float dashNoise = noise(vec2(dynamicZ * 0.4 + rowRandom * 100.0, row));
                float streak = smoothstep(0.6, 1.0, streakNoise) * smoothstep(0.3, 0.8, dashNoise);

                vec3 streakColor;
                if (rowRandom < 0.2) streakColor = uColor1;
                else if (rowRandom < 0.5) streakColor = uColor2;
                else if (rowRandom < 0.7) streakColor = uColor3;
                else streakColor = uColor4;

                vec2 textUv = vec2(dynamicZ * 0.08, crossAxis * 0.8);
                float textMask = texture2D(uDataTexture, textUv).r;

                float finalIntensity = streak * mix(0.4, 1.4, textMask) * 1.7;
                return streakColor * finalIntensity;
            }

            void main() {
                vec3 color = uBgColor;

                if (abs(vPosition.y) > 4.9) {
                    color += getLines(vPosition.x, vPosition.z, uTime, uSpeed);
                } else {
                    color += getLines(vPosition.y, vPosition.z, uTime, uSpeed);
                }

                float distFromCamera = uCameraZ - vPosition.z;
                float endGlow = smoothstep(uTunnelLength * 0.4, uTunnelLength * 0.95, distFromCamera);

                vec3 glowColor = vec3(1.2, 1.5, 2.0);
                color = mix(color, glowColor, endGlow);

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        // --- Generate Data Texture ---
        const canvasTexture = document.createElement('canvas');
        canvasTexture.width = 1024;
        canvasTexture.height = 1024;
        const ctx = canvasTexture.getContext('2d');

        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 1024, 1024);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 36px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const gridSize = 36;
        for (let x = 0; x < 1024; x += gridSize) {
            for (let y = 0; y < 1024; y += gridSize) {
                if (Math.random() > 0.4) {
                    const digit = Math.floor(Math.random() * 10);
                    ctx.fillText(digit, x + gridSize / 2, y + gridSize / 2);
                }
            }
        }

        const dataTexture = new THREE.CanvasTexture(canvasTexture);
        dataTexture.wrapS = THREE.RepeatWrapping;
        dataTexture.wrapT = THREE.RepeatWrapping;
        dataTexture.minFilter = THREE.LinearMipmapLinearFilter;
        dataTexture.magFilter = THREE.LinearFilter;

        const uniforms = {
            uTime: { value: 0.0 },
            uSpeed: { value: SETTINGS.speed },
            uTunnelLength: { value: TUNNEL_LENGTH },
            uCameraZ: { value: CAMERA_Z },
            uDataTexture: { value: dataTexture },
            uColor1: { value: new THREE.Color(SETTINGS.color1) },
            uColor2: { value: new THREE.Color(SETTINGS.color2) },
            uColor3: { value: new THREE.Color(SETTINGS.color3) },
            uColor4: { value: new THREE.Color(SETTINGS.color4) },
            uBgColor: { value: new THREE.Color(activeBgColor()) }
        };

        const material = new THREE.ShaderMaterial({
            vertexShader: tunnelVertexShader,
            fragmentShader: tunnelFragmentShader,
            uniforms: uniforms,
            side: THREE.BackSide
        });

        const geometry = new THREE.BoxGeometry(20, 10, TUNNEL_LENGTH, 1, 1, 1);
        const tunnel = new THREE.Mesh(geometry, material);
        sceneGroup.add(tunnel);

        // --- Floating Particles ---
        const particleCount = 1500;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleSpeeds = new Float32Array(particleCount);

        for (let i = 0; i < particleCount; i++) {
            particlePositions[i * 3] = (Math.random() - 0.5) * 18;
            particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 8;
            particlePositions[i * 3 + 2] = (Math.random() * TUNNEL_LENGTH) - (TUNNEL_LENGTH / 2.0);
            particleSpeeds[i] = Math.random() * 2.5 + 0.5;
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particleGeometry.setAttribute('aSpeed', new THREE.BufferAttribute(particleSpeeds, 1));

        const particleMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uSpeed: { value: SETTINGS.speed },
                uTunnelLength: { value: TUNNEL_LENGTH },
                uCameraZ: { value: CAMERA_Z }
            },
            vertexShader: `
                uniform float uTime;
                uniform float uSpeed;
                uniform float uTunnelLength;
                uniform float uCameraZ;
                attribute float aSpeed;
                varying float vAlpha;

                void main() {
                    vec3 pos = position;
                    float zOffset = uTime * uSpeed * aSpeed;
                    float shiftedZ = pos.z + zOffset;

                    float halfLen = uTunnelLength / 2.0;
                    pos.z = mod(shiftedZ + halfLen, uTunnelLength) - halfLen;

                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_PointSize = (25.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;

                    vAlpha = smoothstep(uCameraZ, uCameraZ - 50.0, pos.z);
                }
            `,
            fragmentShader: `
                varying float vAlpha;

                void main() {
                    vec2 xy = gl_PointCoord.xy - vec2(0.5);
                    float ll = length(xy);
                    if (ll > 0.5) discard;

                    float glow = 1.0 - (ll * 2.0);
                    vec3 color = vec3(0.4, 0.8, 1.0);
                    gl_FragColor = vec4(color * glow, vAlpha * glow);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(particleGeometry, particleMaterial);
        sceneGroup.add(particles);

        // --- Post-Processing ---
        const composer = new EffectComposer(renderer);

        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const PeripheralBlurShader = {
            uniforms: {
                tDiffuse: { value: null },
                uStrength: { value: SETTINGS.edgeBlurStrength },
                uAspect: { value: window.innerWidth / window.innerHeight }
            },
            vertexShader: `
                varying vec2 vUv;

                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float uStrength;
                uniform float uAspect;
                varying vec2 vUv;

                void main() {
                    vec2 center = vec2(0.5, 0.5);
                    vec2 uvCorrection = vec2(uAspect, 1.0);
                    float dist = length((vUv - center) * uvCorrection);
                    float blurMask = smoothstep(0.15, 0.7, dist);

                    if (blurMask <= 0.0) {
                        gl_FragColor = texture2D(tDiffuse, vUv);
                        return;
                    }

                    const int SAMPLES = 32;
                    const float GOLDEN_ANGLE = 2.39996323;
                    vec4 color = vec4(0.0);
                    float radius = uStrength * blurMask;

                    for (int i = 0; i < SAMPLES; i++) {
                        float r = sqrt(float(i) + 0.5) / sqrt(float(SAMPLES));
                        float theta = float(i) * GOLDEN_ANGLE;
                        vec2 offset = vec2(cos(theta), sin(theta)) * r * radius;
                        offset.x /= uAspect;
                        color += texture2D(tDiffuse, vUv + offset);
                    }

                    gl_FragColor = color / float(SAMPLES);
                }
            `
        };
        const peripheralBlurPass = new ShaderPass(PeripheralBlurShader);
        composer.addPass(peripheralBlurPass);

        const ChromaticAberrationShader = {
            uniforms: {
                tDiffuse: { value: null },
                uAmount: { value: SETTINGS.chromaticAberration }
            },
            vertexShader: `
                varying vec2 vUv;

                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float uAmount;
                varying vec2 vUv;

                void main() {
                    vec2 offset = uAmount * (vec2(0.5) - vUv);
                    vec4 cr = texture2D(tDiffuse, vUv + offset);
                    vec4 cga = texture2D(tDiffuse, vUv);
                    vec4 cb = texture2D(tDiffuse, vUv - offset);
                    gl_FragColor = vec4(cr.r, cga.g, cb.b, cga.a);
                }
            `
        };
        const caPass = new ShaderPass(ChromaticAberrationShader);
        composer.addPass(caPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            SETTINGS.bloomStrength,
            SETTINGS.bloomRadius,
            0.1
        );
        composer.addPass(bloomPass);

        // --- Drag and Wheel Controls ---
        const dragState = {
            active: false,
            pointerId: null,
            x: 0,
            y: 0
        };

        const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

        renderer.domElement.addEventListener('wheel', (event) => {
            event.preventDefault();
            const zoomDelta = Math.exp(-event.deltaY * 0.001);
            SETTINGS.zoom = clamp(SETTINGS.zoom * zoomDelta, 0.25, 4.0);
            applySceneTransform();
            zoomController.updateDisplay();
        }, { passive: false });

        renderer.domElement.addEventListener('pointerdown', (event) => {
            dragState.active = true;
            dragState.pointerId = event.pointerId;
            dragState.x = event.clientX;
            dragState.y = event.clientY;
            renderer.domElement.classList.add('dragging');
            renderer.domElement.setPointerCapture(event.pointerId);
        });

        renderer.domElement.addEventListener('pointermove', (event) => {
            if (!dragState.active || event.pointerId !== dragState.pointerId) return;

            const dx = event.clientX - dragState.x;
            const dy = event.clientY - dragState.y;
            dragState.x = event.clientX;
            dragState.y = event.clientY;

            const dragScale = 18 / SETTINGS.zoom;
            SETTINGS.dragX += (dx / window.innerWidth) * dragScale;
            SETTINGS.dragY -= (dy / window.innerHeight) * dragScale;
            applySceneTransform();
            dragXController.updateDisplay();
            dragYController.updateDisplay();
        });

        const endDrag = (event) => {
            if (!dragState.active || event.pointerId !== dragState.pointerId) return;

            dragState.active = false;
            dragState.pointerId = null;
            renderer.domElement.classList.remove('dragging');
            renderer.domElement.releasePointerCapture(event.pointerId);
        };

        renderer.domElement.addEventListener('pointerup', endDrag);
        renderer.domElement.addEventListener('pointercancel', endDrag);

        // --- GUI Settings ---
        const gui = new GUI({ title: 'Scene Settings' });

        const fMotion = gui.addFolder('Motion');
        fMotion.add(SETTINGS, 'speed', 0, 150).name('Tunnel Speed').onChange(v => {
            uniforms.uSpeed.value = v;
            particleMaterial.uniforms.uSpeed.value = v;
        });

        const fEffects = gui.addFolder('Post-Processing');
        fEffects.add(SETTINGS, 'bloomStrength', 0, 5).name('Bloom Strength').onChange(v => bloomPass.strength = v);
        fEffects.add(SETTINGS, 'bloomRadius', 0, 2).name('Bloom Radius').onChange(v => bloomPass.radius = v);
        fEffects.add(SETTINGS, 'chromaticAberration', 0, 0.05).name('RGB Shift').onChange(v => caPass.uniforms.uAmount.value = v);

        const fBlur = gui.addFolder('Screen Edge Blur');
        fBlur.add(SETTINGS, 'edgeBlurStrength', 0.0, 0.05).name('Blur Strength').onChange(v => peripheralBlurPass.uniforms.uStrength.value = v);

        const fCamera = gui.addFolder('Camera');
        fCamera.add(SETTINGS, 'cameraY', -4.5, 4.5).name('Vertical Pos');
        fCamera.add(SETTINGS, 'cameraSpinSpeed', -2.0, 2.0).name('Spin Speed');

        const fTransform = gui.addFolder('Transform');
        const zoomController = fTransform.add(SETTINGS, 'zoom', 0.25, 4.0).name('Zoom').onChange(applySceneTransform);
        const dragXController = fTransform.add(SETTINGS, 'dragX', -20, 20).name('Drag X').onChange(applySceneTransform);
        const dragYController = fTransform.add(SETTINGS, 'dragY', -12, 12).name('Drag Y').onChange(applySceneTransform);
        fTransform.add({
            reset: () => {
                SETTINGS.zoom = 1.0;
                SETTINGS.dragX = 0.0;
                SETTINGS.dragY = 0.0;
                applySceneTransform();
                zoomController.updateDisplay();
                dragXController.updateDisplay();
                dragYController.updateDisplay();
            }
        }, 'reset').name('Reset Transform');

        const fColors = gui.addFolder('Colors');

        const updateColors = () => {
            const bgColor = activeBgColor();
            uniforms.uColor1.value.set(SETTINGS.color1);
            uniforms.uColor2.value.set(SETTINGS.color2);
            uniforms.uColor3.value.set(SETTINGS.color3);
            uniforms.uColor4.value.set(SETTINGS.color4);
            uniforms.uBgColor.value.set(bgColor);
            scene.fog.color.set(bgColor);
            scene.background.set(bgColor);
            document.body.style.backgroundColor = bgColor;
        };

        fColors.add(SETTINGS, 'greenScreen').name('Green Screen #00ff00').onChange(updateColors);
        fColors.addColor(SETTINGS, 'color1').name('Line Color 1').onChange(updateColors);
        fColors.addColor(SETTINGS, 'color2').name('Line Color 2').onChange(updateColors);
        fColors.addColor(SETTINGS, 'color3').name('Line Color 3').onChange(updateColors);
        fColors.addColor(SETTINGS, 'color4').name('Line Color 4').onChange(updateColors);
        fColors.addColor(SETTINGS, 'bgColor').name('Background Color').onChange(updateColors);

        gui.close();
        applySceneTransform();
        updateColors();

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const t = clock.getElapsedTime();

            uniforms.uTime.value = t;
            particleMaterial.uniforms.uTime.value = t;

            camera.position.x = 0.0;
            camera.position.y = SETTINGS.cameraY;
            camera.rotation.z = t * SETTINGS.cameraSpinSpeed;

            composer.render();
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            peripheralBlurPass.uniforms.uAspect.value = window.innerWidth / window.innerHeight;
        });
    </script>
</body>
</html>
