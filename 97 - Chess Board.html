<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>97 - Sigmoid Distort Shader</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0c051a;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }
    /* Style customizations for lil-gui to look modern and premium */
    .lil-gui {
      --background-color: rgba(20, 20, 25, 0.9);
      --text-color: #e0e0e0;
      --title-background-color: #2c2c35;
      --widget-color: #3c3c45;
      --hover-color: #5c5c65;
      --focus-color: #ff007f;
      --number-color: #00ffd0;
      --string-color: #ffaa00;
      font-family: inherit;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>

  <div id="container" touch-action="none"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/88/three.min.js"></script>

  <!-- Vertex Shader -->
  <script id="vertexShader" type="x-shader/x-vertex">
    void main() {
        gl_Position = vec4( position, 1.0 );
    }
  </script>

  <!-- Fragment Shader -->
  <script id="fragmentShader" type="x-shader/x-fragment">
    uniform vec2 u_resolution;
    uniform vec2 u_mouse;
    uniform float u_time;
    uniform sampler2D u_noise;

    // Custom Uniforms for interactive controls and color customization
    uniform float u_zoom;
    uniform vec2 u_offset;
    uniform float u_greenscreen;
    
    uniform vec3 u_colorR;
    uniform vec3 u_colorG;
    uniform vec3 u_colorB;
    uniform vec3 u_colorBg;

    vec2 hash2(vec2 p)
    {
      vec2 o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).xy;
      return o;
    }
    
    float sigmoid(float x) {
      return x / ( 1. + abs(x));
    }
    
    vec2 sigmoidDistort(in vec2 uv, inout vec2 polar, inout float distortion) {
      polar = vec2( atan(uv.y, uv.x), length(uv) );
      float a = sin(polar.y * .8);
      distortion = sigmoid(a * -.2);
      polar.x += sigmoid(a * .2) * 1.;
      polar.y += sigmoid(a * -.5) * 3.;
      return vec2( cos(polar.x) * polar.y, sin(polar.x) * polar.y );
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);
      
      // Apply zoom and dragging offset
      uv = (uv - u_offset) / u_zoom;
      
      vec2 subuv;
      
      uv *= 10.;
      
      vec2 polar = vec2(0.);
      float distortion = 0.;
      uv = sigmoidDistort(uv, polar, distortion);
      
      float t = u_time * .1;
      uv *= mat2(
        sin(t), -cos(t),
        cos(t), sin(t)         
      );
      uv.x += u_time;
      uv += .5;
      
      vec2 grid = floor(uv);
      vec2 subgrid = fract(uv) - .5;
      
      float r_val = mod(grid.x + grid.y, 2.);
      
      uv += distortion * .3;
      grid = floor(uv);
      subgrid = fract(uv) - .5;
      float g_val = mod(grid.x + grid.y, 2.);
      
      uv += distortion * .3;
      grid = floor(uv);
      subgrid = fract(uv) - .5;
      float b_val = mod(grid.x + grid.y, 2.);

      // Determine final background (enable greenscreen if requested)
      vec3 bg = u_greenscreen > 0.5 ? vec3(0.0, 1.0, 0.0) : u_colorBg;
      
      // Custom color blending
      vec3 patternColor = r_val * u_colorR + g_val * u_colorG + b_val * u_colorB;
      float patternMask = clamp(r_val + g_val + b_val, 0.0, 1.0);
      vec3 colour = mix(bg, patternColor, patternMask);

      gl_FragColor = vec4(colour, 1.0);
    }
  </script>

  <!-- Main Application Script -->
  <script type="module">
    import { GUI } from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // --- State & Preset Configurations ---
    const params = {
      greenscreen: false,
      zoom: 1.0,
      offsetX: 0.0,
      offsetY: 0.0,
      dpr: window.devicePixelRatio || 1.0,
      colorScheme: 'Cosmic Neon',
      colorR: '#ff007f',
      colorG: '#00f3ff',
      colorB: '#a020f0',
      colorBg: '#0c051a',
      animationMode: 'Cosmic Drift'
    };

    const colorSchemes = {
      'Cosmic Neon': { colorR: '#ff007f', colorG: '#00f3ff', colorB: '#a020f0', colorBg: '#0c051a' },
      'Solar Flare': { colorR: '#ff3300', colorG: '#ffaa00', colorB: '#ffff00', colorBg: '#1a0500' },
      'Cyber Matrix': { colorR: '#00ff66', colorG: '#00ffcc', colorB: '#0099ff', colorBg: '#000a02' },
      'Frozen Abyss': { colorR: '#00ddff', colorG: '#77aaff', colorB: '#ffffff', colorBg: '#000d1a' },
      'Vintage Gold': { colorR: '#d5b075', colorG: '#e5ba73', colorB: '#c58940', colorBg: '#1a120b' }
    };

    let container;
    let camera, scene, renderer;
    let uniforms;
    let clock = new THREE.Clock();

    let loader = new THREE.TextureLoader();
    let texture;
    loader.setCrossOrigin("anonymous");

    function buildFallbackTexture() {
      const size = 256;
      const data = new Uint8Array(size * size * 4);
      for (let i = 0; i < size * size * 4; i += 4) {
        const val = Math.floor(Math.random() * 255);
        data[i] = val;
        data[i + 1] = val;
        data[i + 2] = val;
        data[i + 3] = 255;
      }
      texture = new THREE.DataTexture(data, size, size, THREE.RGBAFormat);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.minFilter = THREE.LinearFilter;
      texture.needsUpdate = true;
    }

    loader.load(
      'https://s3-us-west-2.amazonaws.com/s.cdpn.io/982762/noise.png',
      function do_something_with_texture(tex) {
        texture = tex;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.minFilter = THREE.LinearFilter;
        init();
        animate();
      },
      undefined,
      function error(err) {
        console.warn("Could not load noise texture from CDN. Using procedural fallback.");
        buildFallbackTexture();
        init();
        animate();
      }
    );

    function init() {
      container = document.getElementById( 'container' );

      camera = new THREE.Camera();
      camera.position.z = 1;

      scene = new THREE.Scene();

      var geometry = new THREE.PlaneBufferGeometry( 2, 2 );

      uniforms = {
        u_time: { type: "f", value: 1.0 },
        u_resolution: { type: "v2", value: new THREE.Vector2() },
        u_noise: { type: "t", value: texture },
        u_mouse: { type: "v2", value: new THREE.Vector2() },
        u_zoom: { type: "f", value: params.zoom },
        u_offset: { type: "v2", value: new THREE.Vector2(params.offsetX, params.offsetY) },
        u_greenscreen: { type: "f", value: params.greenscreen ? 1.0 : 0.0 },
        u_colorR: { type: "c", value: new THREE.Color(params.colorR) },
        u_colorG: { type: "c", value: new THREE.Color(params.colorG) },
        u_colorB: { type: "c", value: new THREE.Color(params.colorB) },
        u_colorBg: { type: "c", value: new THREE.Color(params.colorBg) }
      };

      var material = new THREE.ShaderMaterial( {
        uniforms: uniforms,
        vertexShader: document.getElementById( 'vertexShader' ).textContent,
        fragmentShader: document.getElementById( 'fragmentShader' ).textContent
      } );
      material.extensions.derivatives = true;

      var mesh = new THREE.Mesh( geometry, material );
      scene.add( mesh );

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio( params.dpr );

      container.appendChild( renderer.domElement );

      onWindowResize();
      window.addEventListener( 'resize', onWindowResize, false );

      // Pointermove for updating relative mouse coordinates in shader
      document.addEventListener('pointermove', (e) => {
        if (e.target.closest('.lil-gui')) return;
        let ratio = window.innerHeight / window.innerWidth;
        uniforms.u_mouse.value.x = (e.pageX - window.innerWidth / 2) / window.innerWidth / ratio;
        uniforms.u_mouse.value.y = (e.pageY - window.innerHeight / 2) / window.innerHeight * -1;
      });

      // --- Setup GUI ---
      const gui = new GUI({ title: 'Shader Configuration' });

      // Display settings folder
      const fDisplay = gui.addFolder('Display Settings');
      fDisplay.add(params, 'greenscreen').name('Green Screen BG').onChange(v => {
        uniforms.u_greenscreen.value = v ? 1.0 : 0.0;
      });
      fDisplay.add(params, 'dpr', 0.5, 3.0, 0.1).name('Pixel Ratio (DPR)').onChange(v => {
        renderer.setPixelRatio(v);
        onWindowResize();
      });

      // Camera folder
      const fCamera = gui.addFolder('Camera Controls');
      const zoomController = fCamera.add(params, 'zoom', 0.1, 10.0, 0.05).name('Zoom');
      const offsetXController = fCamera.add(params, 'offsetX', -5.0, 5.0, 0.01).name('Offset X');
      const offsetYController = fCamera.add(params, 'offsetY', -5.0, 5.0, 0.01).name('Offset Y');

      // Color customization folder
      const fColors = gui.addFolder('Colors & Themes');
      fColors.add(params, 'colorScheme', Object.keys(colorSchemes)).name('Theme Presets').onChange(applyColorScheme);
      const colorRController = fColors.addColor(params, 'colorR').name('R Grid Color').onChange(v => {
        uniforms.u_colorR.value.set(v);
      });
      const colorGController = fColors.addColor(params, 'colorG').name('G Grid Color').onChange(v => {
        uniforms.u_colorG.value.set(v);
      });
      const colorBController = fColors.addColor(params, 'colorB').name('B Grid Color').onChange(v => {
        uniforms.u_colorB.value.set(v);
      });
      const colorBgController = fColors.addColor(params, 'colorBg').name('Background Color').onChange(v => {
        uniforms.u_colorBg.value.set(v);
      });

      // Animations folder
      const fAnimations = gui.addFolder('Animations');
      fAnimations.add(params, 'animationMode', [
        'None',
        'Cosmic Drift',
        'Pulse Wave',
        'Vortex Spin',
        'Hyperspace Warp',
        'Chaotic Wobble'
      ]).name('Preset Animation');

      gui.close();

      function applyColorScheme(schemeName) {
        const scheme = colorSchemes[schemeName];
        if (scheme) {
          params.colorR = scheme.colorR;
          params.colorG = scheme.colorG;
          params.colorB = scheme.colorB;
          params.colorBg = scheme.colorBg;
          
          uniforms.u_colorR.value.set(params.colorR);
          uniforms.u_colorG.value.set(params.colorG);
          uniforms.u_colorB.value.set(params.colorB);
          uniforms.u_colorBg.value.set(params.colorBg);
          
          colorRController.setValue(params.colorR);
          colorGController.setValue(params.colorG);
          colorBController.setValue(params.colorB);
          colorBgController.setValue(params.colorBg);
        }
      }

      // --- Drag and Scroll Zoom Events ---
      let isDragging = false;
      let previousMousePosition = { x: 0, y: 0 };

      window.addEventListener('pointerdown', (e) => {
        if (e.target.closest('.lil-gui')) return;
        isDragging = true;
        previousMousePosition = { x: e.clientX, y: e.clientY };
      });

      window.addEventListener('pointermove', (e) => {
        if (isDragging) {
          const deltaX = e.clientX - previousMousePosition.x;
          const deltaY = e.clientY - previousMousePosition.y;
          
          const dragSpeed = 0.005 / params.zoom;
          params.offsetX -= deltaX * dragSpeed;
          params.offsetY += deltaY * dragSpeed;
          
          // Constrain ranges in GUI display
          params.offsetX = Math.max(-5.0, Math.min(5.0, params.offsetX));
          params.offsetY = Math.max(-5.0, Math.min(5.0, params.offsetY));
          
          offsetXController.updateDisplay();
          offsetYController.updateDisplay();
          
          previousMousePosition = { x: e.clientX, y: e.clientY };
        }
      });

      window.addEventListener('pointerup', () => { isDragging = false; });
      window.addEventListener('pointercancel', () => { isDragging = false; });

      window.addEventListener('wheel', (e) => {
        if (e.target.closest('.lil-gui')) return;
        
        const zoomFactor = 1.1;
        if (e.deltaY < 0) {
          params.zoom *= zoomFactor;
        } else {
          params.zoom /= zoomFactor;
        }
        
        params.zoom = Math.max(0.1, Math.min(10.0, params.zoom));
        zoomController.updateDisplay();
      }, { passive: true });

      // --- Hide/Show GUI on 'H' key ---
      let guiVisible = true;
      window.addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') {
          guiVisible = !guiVisible;
          if (guiVisible) {
            gui.show();
          } else {
            gui.hide();
          }
        }
      });
    }

    function onWindowResize( event ) {
      renderer.setSize( window.innerWidth, window.innerHeight );
      uniforms.u_resolution.value.x = renderer.domElement.width;
      uniforms.u_resolution.value.y = renderer.domElement.height;
    }

    function animate() {
      requestAnimationFrame( animate );
      render();
    }

    function render() {
      const time = clock.getElapsedTime();
      uniforms.u_time.value = time;
      
      let currentZoom = params.zoom;
      let currentOffsetX = params.offsetX;
      let currentOffsetY = params.offsetY;
      
      if (params.animationMode === 'Cosmic Drift') {
        currentOffsetX += Math.sin(time * 0.5) * 0.4;
        currentOffsetY += Math.cos(time * 0.3) * 0.4;
        currentZoom *= (1.0 + Math.sin(time * 0.2) * 0.15);
      } else if (params.animationMode === 'Pulse Wave') {
        currentZoom *= (1.0 + Math.sin(time * 1.5) * 0.35);
      } else if (params.animationMode === 'Vortex Spin') {
        currentOffsetX += Math.cos(time * 0.8) * 0.6;
        currentOffsetY += Math.sin(time * 0.8) * 0.6;
      } else if (params.animationMode === 'Hyperspace Warp') {
        currentZoom *= (1.5 + Math.sin(time * 2.5) * 0.6);
        currentOffsetX += Math.cos(time * 1.5) * 0.25;
        currentOffsetY += Math.sin(time * 1.5) * 0.25;
      } else if (params.animationMode === 'Chaotic Wobble') {
        currentOffsetX += Math.sin(time * 2.0) * 0.15 + Math.cos(time * 0.5) * 0.1;
        currentOffsetY += Math.cos(time * 1.7) * 0.15 + Math.sin(time * 0.4) * 0.1;
        currentZoom *= (1.0 + Math.sin(time * 1.1) * 0.12);
      }
      
      uniforms.u_zoom.value = currentZoom;
      uniforms.u_offset.value.set(currentOffsetX, currentOffsetY);
      
      renderer.render( scene, camera );
    }
  </script>
</body>
</html>
