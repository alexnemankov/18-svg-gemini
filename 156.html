<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal Tree Generator</title>
  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0c2415;
      margin: 0;
      overflow: hidden;
    }

    canvas {
      vertical-align: middle;
      display: block;
      touch-action: none;
    }
  </style>
  <!-- Load GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
  <canvas id="c"></canvas>

  <script type="module">
    import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // 5 Gorgeous Presetted Color Schemes
    const colorSchemes = {
      'Classic Emerald': {
        background: '#0c2415',
        root: '#4a2c11',
        branch: '#00ff00'
      },
      'Autumn Forest': {
        background: '#2b1810',
        root: '#5c2a18',
        branch: '#e65014'
      },
      'Neon Jungle': {
        background: '#08091a',
        root: '#1e0b36',
        branch: '#00ffc8'
      },
      'Frosty Tundra': {
        background: '#0b1d28',
        root: '#1c2a38',
        branch: '#b4f0ff'
      },
      'Golden Sakura': {
        background: '#1c151a',
        root: '#2d1f27',
        branch: '#ff96b4'
      }
    };

    const settings = {
      greenscreen: false,
      colorScheme: 'Classic Emerald',
      rootColor: '#4a2c11',
      branchColor: '#00ff00',
      bgColor: '#0c2415',
      
      // GSAP & Animation Settings
      animation: 'Gentle Breeze',
      animationSpeed: 1.0,
      growthDuration: 3.0,
      growthEase: 'power2.out',
      growth: 1.0,        // animated via GSAP
      treeOpacity: 1.0,   // animated via GSAP
      
      dpr: Math.min(window.devicePixelRatio || 1, 2.0),
      seed: 42,
      regrow: () => regrowTree(),
      resetView: () => {
        dragX = 0;
        dragY = 0;
        scale = 1.0;
      }
    };

    const state = {
      time: 0,
      lastTime: 0,
      lastCycle: -1,
      treeSeed: settings.seed
    };

    // Zoom and drag state
    let scale = 1.0;
    let dragX = 0;
    let dragY = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    // Linear Congruential Generator (LCG) for deterministic pseudo-random numbers
    function createPRNG(seed) {
      let s = seed;
      return function() {
        s = (s * 9301 + 49297) % 233280;
        return s / 233280;
      };
    }

    function getRandom(arr, prng) {
      const rand = prng ? prng() : Math.random();
      return arr[Math.floor(rand * arr.length)];
    }

    // Color conversion & generation helpers
    function hexToHsl(hex) {
      let c = hex.substring(1);
      if (c.length === 3) {
        c = c[0] + c[0] + c[1] + c[1] + c[2] + c[2];
      }
      const num = parseInt(c, 16);
      let r = (num >> 16) & 255;
      let g = (num >> 8) & 255;
      let b = num & 255;
      
      r /= 255;
      g /= 255;
      b /= 255;
      
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      
      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      
      return {
        h: Math.round(h * 360),
        s: Math.round(s * 100),
        l: Math.round(l * 100)
      };
    }

    function hexToRgba(hex, alpha) {
      let c = hex.substring(1);
      if (c.length === 3) {
        c = c[0] + c[0] + c[1] + c[1] + c[2] + c[2];
      }
      const num = parseInt(c, 16);
      const r = (num >> 16) & 255;
      const g = (num >> 8) & 255;
      const b = num & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function getBranchColors(baseHex) {
      const hsl = hexToHsl(baseHex);
      const colors = [];
      for (let i = 0; i < 10; i++) {
        const h = (hsl.h + (i - 5) * 3 + 360) % 360;
        const l = Math.max(10, Math.min(90, hsl.l + (i - 5) * 2));
        const alpha = 0.5 + (i / 9) * 0.45;
        colors.push(`hsla(${h}, ${hsl.s}%, ${l}%, ${alpha})`);
      }
      return colors;
    }

    // Build hierarchical tree structure deterministically
    function buildTree({ branchingLimit, branchCount = 1, prng }) {
      if (branchingLimit > 0) {
        const branches = [];
        for (let i = 0; i < branchCount; i++) {
          const nextCount = 1 + Math.ceil(prng() * 2);
          branches.push(buildTree({
            branchingLimit: branchingLimit - 1,
            branchCount: nextCount,
            prng
          }));
        }
        return branches;
      }
      return [];
    }

    let currentTree = null;
    let cachedTreeSeed = null;

    function rebuildTree() {
      const prng = createPRNG(settings.seed);
      currentTree = buildTree({
        branchingLimit: 9,
        branchCount: 1,
        prng
      });
    }

    function getTreeForRender(isInfiniteGrowth) {
      const seed = isInfiniteGrowth ? state.treeSeed : settings.seed;
      if (seed !== cachedTreeSeed || !currentTree) {
        cachedTreeSeed = seed;
        const prng = createPRNG(seed);
        currentTree = buildTree({
          branchingLimit: 9,
          branchCount: 1,
          prng
        });
      }
      return currentTree;
    }

    // Draw the background lines with custom color overlay and optional wind ripple
    function drawBackground(context, width, height, colors, prng, time) {
      const lineLength = width / 30 + prng() * width / 5;
      const lineWidth = 3;
      const variance = 2 + prng() * 50;
      let x = -lineLength;
      let y = lineWidth;
      
      const speed = settings.animationSpeed;
      const backgroundAnim = settings.animation !== 'Static' && speed > 0;
      
      while (y < height) {
        const stepY = height / 100 + prng() * height / 30;
        while (x < width) {
          const stepX = 10 + prng() * width / 20;
          const directionY = prng() > .5 ? -1 : 1;
          context.strokeStyle = getRandom(colors, prng);
          context.lineCap = 'round';
          context.lineWidth = lineWidth;
          context.beginPath();
          
          const yOffset = backgroundAnim ? Math.sin(time * 0.0005 * speed + x * 0.005 + y * 0.01) * 10 : 0;
          
          context.moveTo(x, y + directionY * stepY + yOffset);
          context.lineTo(x + lineLength, y + directionY * variance + yOffset);
          context.stroke();
          x += stepX;
        }
        x = -lineLength;
        y += stepY;
      }
    }

    // Draw recursive tree with fraction-based smooth growth
    function drawTree({
      context,
      width,
      height,
      tree,
      x,
      y,
      colors,
      depth = 0,
      branchLength = Math.min(width, height) / 4,
      currentLimit,
      prng
    }) {
      if (!tree || depth > currentLimit) {
        return;
      }
      
      const minDimension = Math.min(width, height);
      const fraction = Math.min(1, currentLimit - depth);
      if (fraction <= 0) return;
      
      tree.forEach(branch => {
        const rawRatio = 1 + prng() / 1.4;
        const nextBaseLength = branchLength / rawRatio;
        const newBranchLength = nextBaseLength * fraction;
        const variance = minDimension / 45 + prng() * minDimension / 20;
        const directionX = prng() > .5 ? -1 : 1;
        
        let sway = 0;
        if (settings.animationSpeed > 0) {
          if (settings.animation === 'Gentle Breeze') {
            sway = Math.sin(state.time * 0.001 + depth * 0.5) * (1.5 + depth * 0.5);
          } else if (settings.animation === 'Zen Breathing') {
            sway = Math.sin(state.time * 0.0005 + depth * 0.3) * (0.8 + depth * 0.3) * 0.5;
          } else if (settings.animation === 'Stormy Night') {
            sway = Math.sin(state.time * 0.0025 + depth * 0.6) * (3.0 + depth * 1.0);
          } else if (settings.animation === 'Infinite Growth') {
            sway = Math.sin(state.time * 0.001 + depth * 0.4) * (1.2 + depth * 0.4);
          }
        }
        
        const newX = x + directionX * (depth ? variance : 1) + sway;
        const directionY = depth > 3
          ? prng() > .8
            ? 1
            : -1
          : -1;
        const newY = y + directionY * newBranchLength;
        
        const color = depth < 1
          ? colors.root
          : depth < 2
            ? getRandom([
                getRandom(colors.branches, prng),
                colors.root
              ], prng)
            : getRandom(colors.branches, prng);
            
        context.strokeStyle = color;
        context.lineCap = 'round';
        context.lineWidth = Math.max(1.5, 6 * Math.pow(0.75, depth));
        context.beginPath();
        context.moveTo(x, y);
        context.lineTo(newX, newY);
        context.stroke();
        
        drawTree({
          context,
          width,
          height,
          tree: branch,
          x: newX,
          y: newY,
          colors,
          depth: depth + 1,
          branchLength: nextBaseLength,
          currentLimit,
          prng
        });
      });
    }

    function render() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      
      ctx.resetTransform();
      ctx.scale(settings.dpr, settings.dpr);
      
      if (settings.greenscreen) {
        document.body.style.background = '#00ff00';
        canvas.style.background = '#00ff00';
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(0, 0, width, height);
      } else {
        document.body.style.background = settings.bgColor;
        canvas.style.background = settings.bgColor;
        ctx.fillStyle = settings.bgColor;
        ctx.fillRect(0, 0, width, height);
        
        const bgPrng = createPRNG(settings.seed + 999);
        const bgColors = [
          hexToRgba(settings.branchColor, 0.08),
          hexToRgba(settings.rootColor, 0.12)
        ];
        drawBackground(ctx, width, height, bgColors, bgPrng, state.time);
      }
      
      const isInfiniteGrowth = settings.animation === 'Infinite Growth';
      const tree = getTreeForRender(isInfiniteGrowth);
      
      const currentLimit = settings.growth * 9;
      ctx.globalAlpha = settings.treeOpacity;
      
      let autoCamX = 0;
      let autoCamY = 0;
      let autoScale = 1.0;
      
      if (settings.animationSpeed > 0) {
        if (settings.animation === 'Gentle Breeze') {
          autoCamX = Math.sin(state.time * 0.0006) * 25;
          autoCamY = Math.cos(state.time * 0.0008) * 12;
          autoScale = 1.0 + Math.sin(state.time * 0.0004) * 0.04;
        } else if (settings.animation === 'Stormy Night') {
          autoCamX = Math.sin(state.time * 0.003) * 15 + Math.cos(state.time * 0.007) * 5;
          autoCamY = Math.cos(state.time * 0.004) * 8 + Math.sin(state.time * 0.009) * 3;
        }
      }
      
      ctx.save();
      ctx.translate(width / 2 + dragX + autoCamX, height + dragY + autoCamY);
      ctx.scale(scale * autoScale, scale * autoScale);
      
      const treePrng = createPRNG(isInfiniteGrowth ? state.treeSeed : settings.seed);
      const treeColors = {
        root: settings.rootColor,
        branches: getBranchColors(settings.branchColor)
      };
      
      let lengthMultiplier = 1.0;
      if (settings.animation === 'Zen Breathing' && settings.animationSpeed > 0) {
        lengthMultiplier = 1.0 + Math.sin(state.time * 0.001) * 0.08;
      }
      
      drawTree({
        context: ctx,
        width,
        height,
        tree,
        x: 0,
        y: 0,
        colors: treeColors,
        depth: 0,
        branchLength: (Math.min(width, height) / 4) * lengthMultiplier,
        currentLimit,
        prng: treePrng
      });
      
      ctx.restore();
      ctx.globalAlpha = 1.0;
    }

    function tick(timestamp) {
      if (!state.lastTime) state.lastTime = timestamp;
      const dt = timestamp - state.lastTime;
      state.lastTime = timestamp;
      
      state.time += dt * settings.animationSpeed;
      
      render();
      requestAnimationFrame(tick);
    }

    function resize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      canvas.width = width * settings.dpr;
      canvas.height = height * settings.dpr;
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
    }

    // GSAP Animation Timelines & Functions
    let infiniteTimeline = null;

    function startInfiniteGrowth() {
      if (infiniteTimeline) {
        infiniteTimeline.kill();
      }
      gsap.killTweensOf(settings);
      
      infiniteTimeline = gsap.timeline({
        repeat: -1,
        onRepeat: () => {
          state.treeSeed = Math.floor(Math.random() * 100000);
        }
      });
      
      settings.growth = 0.0;
      settings.treeOpacity = 1.0;
      
      const speed = Math.max(0.1, settings.animationSpeed);
      
      infiniteTimeline.to(settings, {
        growth: 1.0,
        duration: settings.growthDuration / speed,
        ease: settings.growthEase
      });
      
      infiniteTimeline.to({}, {
        duration: 1.5 / speed
      });
      
      infiniteTimeline.to(settings, {
        treeOpacity: 0.0,
        duration: 1.0 / speed,
        ease: 'power1.inOut'
      });
      
      infiniteTimeline.set(settings, {
        treeOpacity: 1.0
      });
    }

    function regrowTree() {
      if (infiniteTimeline) {
        infiniteTimeline.kill();
        infiniteTimeline = null;
      }
      gsap.killTweensOf(settings);
      
      if (settings.animation === 'Infinite Growth') {
        settings.seed = Math.floor(Math.random() * 100000);
        state.treeSeed = settings.seed;
        rebuildTree();
        startInfiniteGrowth();
      } else {
        settings.seed = Math.floor(Math.random() * 100000);
        rebuildTree();
        
        settings.growth = 0.0;
        settings.treeOpacity = 1.0;
        
        const speed = Math.max(0.1, settings.animationSpeed);
        
        gsap.to(settings, {
          growth: 1.0,
          duration: settings.growthDuration / speed,
          ease: settings.growthEase
        });
      }
    }

    function onAnimationPresetChange(newVal) {
      if (infiniteTimeline) {
        infiniteTimeline.kill();
        infiniteTimeline = null;
      }
      gsap.killTweensOf(settings);
      
      settings.growth = 1.0;
      settings.treeOpacity = 1.0;
      
      if (newVal === 'Infinite Growth') {
        startInfiniteGrowth();
      }
    }

    function updateAnimationSpeed() {
      if (settings.animation === 'Infinite Growth') {
        startInfiniteGrowth();
      }
    }

    // Drag & Zoom Event Handlers
    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      startX = e.clientX - dragX;
      startY = e.clientY - dragY;
    });

    window.addEventListener('mousemove', (e) => {
      if (isDragging) {
        dragX = e.clientX - startX;
        dragY = e.clientY - startY;
      }
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - dragX;
        startY = e.touches[0].clientY - dragY;
      }
    });

    window.addEventListener('touchmove', (e) => {
      if (isDragging && e.touches.length === 1) {
        dragX = e.touches[0].clientX - startX;
        dragY = e.touches[0].clientY - startY;
      }
    });

    window.addEventListener('touchend', () => {
      isDragging = false;
    });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      
      const width = window.innerWidth;
      const height = window.innerHeight;
      
      const cx = (mx - width / 2 - dragX) / scale;
      const cy = (my - height - dragY) / scale;
      
      const zoomFactor = 1.1;
      if (e.deltaY < 0) {
        scale *= zoomFactor;
      } else {
        scale /= zoomFactor;
      }
      scale = Math.max(0.1, Math.min(10, scale));
      
      dragX = mx - width / 2 - cx * scale;
      dragY = my - height - cy * scale;
    }, { passive: false });

    window.addEventListener('resize', resize);

    // Initial setup
    resize();
    rebuildTree();
    requestAnimationFrame(tick);

    // GUI creation
    const gui = new GUI({ title: 'Tree Settings' });

    gui.add(settings, 'greenscreen').name('Green Screen (#00ff00)');
    
    const schemeCtrl = gui.add(settings, 'colorScheme', Object.keys(colorSchemes).concat(['Custom'])).name('Color Preset').onChange(applyPreset);

    const colorsFolder = gui.addFolder('Custom Colors');
    const rootCtrl = colorsFolder.addColor(settings, 'rootColor').name('Root').onChange(updateColors);
    const branchCtrl = colorsFolder.addColor(settings, 'branchColor').name('Branches').onChange(updateColors);
    const bgCtrl = colorsFolder.addColor(settings, 'bgColor').name('Background').onChange(updateColors);
    colorsFolder.close();

    const animFolder = gui.addFolder('Animation Settings');
    const animPresetCtrl = animFolder.add(settings, 'animation', ['Gentle Breeze', 'Zen Breathing', 'Stormy Night', 'Infinite Growth', 'Static']).name('Preset').onChange(onAnimationPresetChange);
    animFolder.add(settings, 'animationSpeed', 0.1, 3.0, 0.1).name('Speed').onChange(updateAnimationSpeed);
    animFolder.add(settings, 'growthDuration', 0.5, 10.0, 0.5).name('Growth Time').onChange(updateAnimationSpeed);
    animFolder.add(settings, 'growthEase', ['power1.out', 'power2.out', 'power3.out', 'power4.out', 'back.out', 'none']).name('Growth Ease').onChange(updateAnimationSpeed);
    animFolder.open();

    gui.add(settings, 'dpr', 0.5, 3.0, 0.1).name('Pixel Ratio (DPR)').onChange(resize);
    gui.add(settings, 'seed', 0, 100000, 1).name('Seed').listen().onChange(rebuildTree);
    gui.add(settings, 'regrow').name('Regrow (GSAP)');
    gui.add(settings, 'resetView').name('Reset View');

    let isApplyingPreset = false;

    function applyPreset(presetName) {
      if (presetName === 'Custom') return;
      const preset = colorSchemes[presetName];
      if (preset) {
        isApplyingPreset = true;
        settings.rootColor = preset.root;
        settings.branchColor = preset.branch;
        settings.bgColor = preset.background;
        
        rootCtrl.setValue(preset.root);
        branchCtrl.setValue(preset.branch);
        bgCtrl.setValue(preset.background);
        isApplyingPreset = false;
      }
    }

    function updateColors() {
      if (!isApplyingPreset) {
        settings.colorScheme = 'Custom';
        schemeCtrl.setValue('Custom');
      }
    }

    // Initialize with Classic Emerald colors
    schemeCtrl.setValue('Classic Emerald');

    // H key to hide/show UI
    window.addEventListener('keydown', (e) => {
      if (e.key === 'h' || e.key === 'H') {
        gui._hidden ? gui.show() : gui.hide();
      }
    });
  </script>
</body>
</html>
