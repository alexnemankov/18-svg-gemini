<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Sine Wave Raymarcher - Interactive</title>
    
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

    <!-- Import Maps for Three.js and lil-gui -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
        }
    }
    </script>

    <style>
        :root {
            --glow-color: #00f0ff;
            --accent-color: #ff007f;
            --bg-glass: rgba(10, 10, 10, 0.7);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #c0c0c0;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        /* Modern HUD Info Overlay */
        .hud-panel {
            position: absolute;
            top: 24px;
            left: 24px;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            padding: 20px 24px;
            border-radius: 16px;
            color: var(--text-primary);
            pointer-events: none;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            max-width: 320px;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .hud-panel h1 {
            margin: 0 0 6px 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--glow-color), #2e89ff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hud-panel p {
            margin: 0 0 16px 0;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            font-weight: 300;
        }

        .controls-info {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 14px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .control-row:last-child {
            margin-bottom: 0;
        }

        .control-label {
            color: #808080;
            font-weight: 400;
        }

        .control-value {
            color: var(--glow-color);
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            background: rgba(0, 240, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        /* Custom lil-gui overrides for matching premium design system */
        .lil-gui {
            --background-color: rgba(12, 12, 12, 0.8) !important;
            --text-color: #e2e8f0 !important;
            --title-background-color: rgba(20, 20, 20, 0.9) !important;
            --widget-color: rgba(30, 41, 59, 0.5) !important;
            --hover-color: var(--glow-color) !important;
            --focus-color: var(--accent-color) !important;
            font-family: 'Outfit', sans-serif !important;
            border-radius: 16px !important;
            overflow: hidden !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6) !important;
            border: 1px solid var(--border-glass) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            padding: 4px !important;
        }

        .lil-gui .title {
            font-family: 'Space Grotesk', sans-serif !important;
            font-weight: 600 !important;
            font-size: 13px !important;
            letter-spacing: 0.5px !important;
            padding: 8px 12px !important;
            text-transform: uppercase !important;
        }

        .lil-gui .controller {
            margin: 4px 0 !important;
        }

        /* Tooltip or feedback overlay when dragging/zooming */
        .interactive-indicator {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            letter-spacing: 0.5px;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.7;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <!-- HUD Overlay for user details -->
    <div class="hud-panel">
        <h1>Neon Waves</h1>
        <p>A glowing, volumetric raymarching sine field with corner-rounding parameters and dynamic color synthesis.</p>
        <div class="controls-info">
            <div class="control-row">
                <span class="control-label">Zoom View</span>
                <span class="control-value">Scroll Wheel</span>
            </div>
            <div class="control-row">
                <span class="control-label">Drag View</span>
                <span class="control-value">Left Click + Drag</span>
            </div>
        </div>
    </div>

    <!-- Micro-instruction at the bottom -->
    <div class="interactive-indicator">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--glow-color)"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
        <span>Drag to pan. Scroll to zoom. Double-click to reset.</span>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import GUI from 'lil-gui';

        // --------------------------------------------------------
        // 1. Scene Setup
        // --------------------------------------------------------
        const scene = new THREE.Scene();
        
        // Orthographic camera is perfect for 2D screen-space shaders
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
        camera.position.z = 1;

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        let pixelRatio = Math.min(window.devicePixelRatio, 2);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(pixelRatio); // Limit pixel ratio for performance
        document.body.appendChild(renderer.domElement);

        // --------------------------------------------------------
        // 2. Shader Material & Geometry
        // --------------------------------------------------------
        
        // Setup uniforms including resolution, time, and custom GUI parameters
        const uniforms = {
            iTime: { value: 0.0 },
            iResolution: { value: new THREE.Vector3(window.innerWidth * pixelRatio, window.innerHeight * pixelRatio, 1.0) },
            uSpeed: { value: 0.6 },
            uScaleX: { value: 2.0 },
            uScaleY: { value: 2.0 },
            uColorOffset: { value: 3.0 },
            uIterLimit: { value: 10.0 },
            uRoundness: { value: 1.0 }, // New parameter for corner rounding
            uColor1: { value: new THREE.Color('#004cff') },
            uColor2: { value: new THREE.Color('#03123f') },
            uColor3: { value: new THREE.Color('#2e89ff') },
            
            // Zoom & Drag pan interactive offsets
            uZoom: { value: 1.0 },
            uOffset: { value: new THREE.Vector2(0, 0) },

            // Greenscreen background settings
            uGreenscreenEnabled: { value: 0.0 },
            uGreenscreenColor: { value: new THREE.Color('#00ff00') },
            uGreenscreenSensitivity: { value: 2.0 }
        };

        const vertexShader = `
            void main() {
                // Render a full screen quad
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform vec3 iResolution;
            uniform float iTime;
            
            uniform float uSpeed;
            uniform float uScaleX;
            uniform float uScaleY;
            uniform float uColorOffset;
            uniform float uIterLimit;
            uniform float uRoundness;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;

            // Zoom & Drag offsets
            uniform float uZoom;
            uniform vec2 uOffset;

            // Greenscreen options
            uniform float uGreenscreenEnabled;
            uniform vec3 uGreenscreenColor;
            uniform float uGreenscreenSensitivity;

            // Using GLSL 3.0 out color
            out vec4 fragColor;

            // Random function for dithering
            float random(vec2 st) {
                return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
            }

            void mainImage(out vec4 O, vec2 I) {
                // Initialize variables safely for GLSL
                float i = 0.0, z = 0.0, d = 0.0;
                O = vec4(0.0); 
                
                // Adjust screen coordinates based on interactive zoom and offset translation
                vec2 coord = (I - iResolution.xy * 0.5) / uZoom - uOffset;
                
                // Raymarch steps based on GUI limit
                for(O *= i; i++ < uIterLimit;) {
                    // Compute raymarch point from raymarch distance and ray direction
                    vec3 p = z * normalize(vec3(coord * 2.0, -iResolution.y));
                    vec3 v;
                    
                    // --- REVERTED TO THE GOOD WAVE MATH ---
                    // This brings back the clear, glowing neon lines!
                    p.x += sin(p.x + iTime * uSpeed * 0.5) + cos(p.y + iTime * uSpeed * 0.3);
                    p.y += cos(p.x - iTime * uSpeed * 0.4) + sin(p.y + iTime * uSpeed * 0.6);
                    p.z += sin(iTime * uSpeed * 0.2) * 1.5;
                    
                    // Modifying space scale
                    p.x *= uScaleX;
                    p.y *= uScaleY;
                    
                    // Compute distance for sine pattern. 
                    v = cos(p) - sin(p).yzx;
                    
                    // --- NEW WAY TO ROUND CORNERS ---
                    // The sharp cuts come from max(). Instead of complex smooth-max math,
                    // we simply fade out the sharp 'max()' cut into the pure, naturally smooth 
                    // trigonometric field 'v'.
                    vec3 shape = mix(max(v, v.yzx * 0.2), v, uRoundness);
                    
                    z += d = 1e-4 + 0.5 * length(shape);
                    
                    // --- CUSTOM COLORS BLENDING ---
                    // Calculate weights based on spatial coordinates
                    vec3 weights = abs(cos(p));
                    weights /= dot(weights, vec3(1.0)); // Normalize weights
                    
                    // Mix the three selected colors
                    vec3 customColor = uColor1 * weights.x + uColor2 * weights.y + uColor3 * weights.z;
                    
                    // Use mixed color and uColorOffset as intensity multiplier
                    O.rgb += (customColor * uColorOffset) / d;
                }
                
                // --- BRIGHTNESS ---
                // Tonemapping divisor reduced (was 1e3 / 1000) to make the image much brighter
                O /= O + 300.0;
                
                // --- SATURATION ---
                float luminance = dot(O.rgb, vec3(0.299, 0.587, 0.114));
                O.rgb = mix(vec3(luminance), O.rgb, 1.6); // 1.6x saturation boost
                
                // --- DITHERING ---
                // Add a tiny amount of static noise to eliminate color banding (лесенки)
                O.rgb += (random(I) - 0.5) / 128.0;
                
                // --- GREENSCREEN KEYER ---
                if (uGreenscreenEnabled > 0.5) {
                    float brightness = max(O.r, max(O.g, O.b));
                    float opacity = clamp(brightness * uGreenscreenSensitivity, 0.0, 1.0);
                    O.rgb = mix(uGreenscreenColor, O.rgb, opacity);
                }
                
                O.a = 1.0;
            }

            void main() {
                // Pass fragColor and coordinates to the Shadertoy-like mainImage
                mainImage(fragColor, gl_FragCoord.xy);
            }
        `;

        // Create a plane geometry that covers the entire screen
        const geometry = new THREE.PlaneGeometry(2, 2);
        
        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: uniforms,
            glslVersion: THREE.GLSL3 // Necessary for features like tanh()
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // --------------------------------------------------------
        // 3. lil-gui Setup (Settings Panel)
        // --------------------------------------------------------
        const gui = new GUI({ title: 'Shader Settings' });
        
        const params = {
            speed: uniforms.uSpeed.value,
            scaleX: uniforms.uScaleX.value,
            scaleY: uniforms.uScaleY.value,
            colorOffset: uniforms.uColorOffset.value,
            iterations: uniforms.uIterLimit.value,
            roundness: uniforms.uRoundness.value,
            color1: '#004cff',
            color2: '#03123f',
            color3: '#2e89ff',
            
            // Interaction
            zoom: 1.0,
            
            // Greenscreen options
            greenscreenEnabled: false,
            greenscreenColor: '#00ff00',
            greenscreenSensitivity: 2.0
        };

        // Link GUI updates to Shader Uniforms
        const simFolder = gui.addFolder('Simulation Params');
        simFolder.add(params, 'speed', 0.0, 2.0).name('Animation Speed').onChange(v => uniforms.uSpeed.value = v);
        simFolder.add(params, 'scaleX', 0.1, 5.0).name('Space Scale X').onChange(v => uniforms.uScaleX.value = v);
        simFolder.add(params, 'scaleY', 0.1, 5.0).name('Space Scale Y').onChange(v => uniforms.uScaleY.value = v);
        simFolder.add(params, 'colorOffset', 0.0, 10.0).name('Color Intensity').onChange(v => uniforms.uColorOffset.value = v);
        simFolder.add(params, 'iterations', 1, 20).step(1).name('Ray Steps (Iter)').onChange(v => uniforms.uIterLimit.value = v);
        simFolder.add(params, 'roundness', 0.0, 1.0).name('Corner Roundness').onChange(v => uniforms.uRoundness.value = v);

        const colorsFolder = gui.addFolder('Custom Colors');
        colorsFolder.addColor(params, 'color1').name('Color 1 (Left)').onChange(v => uniforms.uColor1.value.set(v));
        colorsFolder.addColor(params, 'color2').name('Color 2 (Mid)').onChange(v => uniforms.uColor2.value.set(v));
        colorsFolder.addColor(params, 'color3').name('Color 3 (Right)').onChange(v => uniforms.uColor3.value.set(v));

        const interactionFolder = gui.addFolder('Camera & Viewport');
        const guiZoomController = interactionFolder.add(params, 'zoom', 0.1, 20.0, 0.1).name('Zoom Factor').listen().onChange(v => {
            zoom = v;
            uniforms.uZoom.value = zoom;
        });
        interactionFolder.add({ reset: () => {
            resetView();
        }}, 'reset').name('Reset View');

        const greenscreenFolder = gui.addFolder('Greenscreen Layer');
        greenscreenFolder.add(params, 'greenscreenEnabled').name('Enable Greenscreen').onChange(v => {
            uniforms.uGreenscreenEnabled.value = v ? 1.0 : 0.0;
        });
        greenscreenFolder.addColor(params, 'greenscreenColor').name('Background Color').onChange(v => {
            uniforms.uGreenscreenColor.value.set(v);
        });
        greenscreenFolder.add(params, 'greenscreenSensitivity', 0.1, 10.0, 0.1).name('Key Sensitivity').onChange(v => {
            uniforms.uGreenscreenSensitivity.value = v;
        });

        // Close by default to keep screen clear
        gui.close();

        // --------------------------------------------------------
        // 4. Interaction Events (Mouse/Touch Dragging and Zooming)
        // --------------------------------------------------------
        let isDragging = false;
        const previousMouse = new THREE.Vector2();
        const offset = new THREE.Vector2(0, 0);
        let zoom = 1.0;

        const canvas = renderer.domElement;

        // Reset functionality
        function resetView() {
            zoom = 1.0;
            offset.set(0, 0);
            uniforms.uZoom.value = 1.0;
            uniforms.uOffset.value.set(0, 0);
            guiZoomController.setValue(1.0);
        }

        // Mouse Drag / Pointer Handlers
        canvas.addEventListener('pointerdown', (e) => {
            // Only drag with left click or touch
            if (e.button !== 0 && e.pointerType === 'mouse') return;
            isDragging = true;
            previousMouse.set(e.clientX, e.clientY);
            canvas.setPointerCapture(e.pointerId);
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.clientX - previousMouse.x;
            const deltaY = e.clientY - previousMouse.y;
            previousMouse.set(e.clientX, e.clientY);
            
            // Adjust translation based on current zoom scale and device pixel ratio
            offset.x += (deltaX * pixelRatio) / zoom;
            offset.y -= (deltaY * pixelRatio) / zoom; // Invert WebGL y coordinate
            
            uniforms.uOffset.value.copy(offset);
        });

        window.addEventListener('pointerup', (e) => {
            if (isDragging) {
                isDragging = false;
                canvas.releasePointerCapture(e.pointerId);
            }
        });

        window.addEventListener('pointercancel', (e) => {
            if (isDragging) {
                isDragging = false;
                canvas.releasePointerCapture(e.pointerId);
            }
        });

        // Wheel Zoom Handler
        window.addEventListener('wheel', (e) => {
            // Determine mouse position in centered pixel space (scaled by pixelRatio)
            const mx = (e.clientX - window.innerWidth * 0.5) * pixelRatio;
            const my = -(e.clientY - window.innerHeight * 0.5) * pixelRatio;
            
            // Calculate zoom adjustment
            const zoomFactor = e.deltaY < 0 ? 1.15 : 0.85;
            const newZoom = Math.max(0.1, Math.min(zoom * zoomFactor, 20.0));
            
            // Shift offset to zoom relative to mouse coordinates
            offset.x = offset.x + mx * (1.0 / newZoom - 1.0 / zoom);
            offset.y = offset.y + my * (1.0 / newZoom - 1.0 / zoom);
            zoom = newZoom;
            
            uniforms.uZoom.value = zoom;
            uniforms.uOffset.value.copy(offset);
            
            // Sync with GUI control if available
            guiZoomController.setValue(zoom);
        }, { passive: true });

        // Double-click to reset view easily
        window.addEventListener('dblclick', () => {
            resetView();
        });

        // --------------------------------------------------------
        // 5. Resize Handling
        // --------------------------------------------------------
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            pixelRatio = Math.min(window.devicePixelRatio, 2);
            
            renderer.setSize(width, height);
            renderer.setPixelRatio(pixelRatio);
            uniforms.iResolution.value.set(width * pixelRatio, height * pixelRatio, 1.0);
        });

        // --------------------------------------------------------
        // 6. Animation Loop
        // --------------------------------------------------------
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            // Update time uniform for the shader
            uniforms.iTime.value = clock.getElapsedTime();
            
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
