<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Binary Animation</title>
  <style>
    :root {
      --bg-color: #000000;
      --text-color: #b4d455;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      overflow: hidden;
      font-family: monospace;
      width: 100vw;
      height: 100vh;
      user-select: none;
      touch-action: none;
      transition: background-color 0.3s ease;
    }

    #stage {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      overflow: hidden;
      background-color: var(--bg-color);
      cursor: grab;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.3s ease;
    }

    #stage:active {
      cursor: grabbing;
    }

    #transform-wrapper {
      width: 100vw;
      height: 100vh;
      transform-origin: center center;
      transform: translate(0px, 0px) scale(1);
      will-change: transform;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    binary-animation {
      width: 100%;
      height: 100%;
      display: block;
      color: var(--text-color);
    }
  </style>
</head>
<body>

  <div id="stage">
    <div id="transform-wrapper">
      <binary-animation id="binary-element" columns="50" interval="100"></binary-animation>
    </div>
  </div>

  <script type="module">
    import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // Define the custom element BinaryAnimation
    class BinaryAnimation extends HTMLElement {
      constructor() {
        super();
      }
      
      static register(tag = 'binary-animation') {
        if ('customElements' in window) {
          customElements.define(tag, this);
        }
      }
      
      static get observedAttributes() {
        return ['columns', 'interval'];
      }
      
      connectedCallback() {
        this.shadow = this.attachShadow({ mode: 'open' });
        
        const styleElement = document.createElement('style');
        styleElement.textContent = `
          :host {
            --items: 50;
            display: block;
            width: 100%;
            height: 100%;
          }
          
          div {
            display: grid;
            grid-template-columns: repeat(var(--items, 50), 1fr);
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: monospace;
            font-size: calc(100vw / var(--items, 50));
            text-align: center;
            line-height: calc(100vw / var(--items, 50));
          }
          
          span {
            transition: opacity 0.1s ease;
          }
        `;
        this.shadow.appendChild(styleElement);
        
        this.wrapper = document.createElement('div');
        this.shadow.appendChild(this.wrapper);
        
        this.generate();
        
        this._resizeHandler = () => this.generate();
        window.addEventListener('resize', this._resizeHandler);
      }
      
      disconnectedCallback() {
        window.removeEventListener('resize', this._resizeHandler);
        clearTimeout(this.to);
      }
      
      attributeChangedCallback(name, oldValue, newValue) {
        if (oldValue === newValue) return;
        if (name === 'columns' && this.wrapper) {
          this.generate();
        }
      }
      
      generate() {
        clearTimeout(this.to || 1);
        
        const cols = parseInt(this.getAttribute('columns') || '50', 10);
        this.style.setProperty('--items', cols);
        
        // Use window measurements directly so CSS transforms do not affect columns/rows calculations
        const width = window.innerWidth;
        const height = window.innerHeight;
        const one = Math.floor(width / cols);
        const rows = Math.max(1, Math.floor(height / one));
        
        let spans = Array.from({ length: cols * rows }, () => {
          return `<span>${Math.round(Math.random())}</span>`;
        });
        
        this.wrapper.innerHTML = spans.join('');
        this.numbers = [...this.wrapper.querySelectorAll('span')];
        this.animate();
      }
      
      animate() {
        if (!this.numbers) {
          return;
        }
        
        this.numbers.forEach(num => {
          if (Math.random() > .5) {
            num.innerText = Math.round(Math.random());
            num.style.opacity = 1 - (Math.random() * .8);
          }
        });
        
        const interval = parseFloat(this.getAttribute('interval') || '100');
        clearTimeout(this.to);
        this.to = setTimeout(() => this.animate(), interval);
      }
    }

    BinaryAnimation.register();

    // 5 IT/tech-themed presets + Original + Custom
    const presets = {
      'Original': {
        bgColor: '#000000',
        textColor: '#b4d455'
      },
      'Matrix Terminal': {
        bgColor: '#040a05',
        textColor: '#00ff41'
      },
      'Cyberpunk City': {
        bgColor: '#080810',
        textColor: '#00f0ff'
      },
      'Nordic Frost': {
        bgColor: '#2e3440',
        textColor: '#88c0d0'
      },
      'Dracula Dark': {
        bgColor: '#282a36',
        textColor: '#ff79c6'
      },
      'Amber Console': {
        bgColor: '#0c0702',
        textColor: '#ffb000'
      },
      'Custom': {
        bgColor: '#000000',
        textColor: '#b4d455'
      }
    };

    // Interaction State
    let scale = 1.0;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let prevDiff = -1;

    const transformWrapper = document.getElementById('transform-wrapper');
    const stage = document.getElementById('stage');
    const binaryElement = document.getElementById('binary-element');

    const state = {
      theme: 'Original',
      greenscreen: false,
      bgColor: presets['Original'].bgColor,
      textColor: presets['Original'].textColor,
      interval: 100,
      columns: 50,
      resetView: () => {
        scale = 1.0;
        translateX = 0;
        translateY = 0;
        updateTransform();
      }
    };

    function updateColors() {
      const root = document.documentElement;
      if (state.greenscreen) {
        root.style.setProperty('--bg-color', '#00ff00');
      } else {
        root.style.setProperty('--bg-color', state.bgColor);
      }
      root.style.setProperty('--text-color', state.textColor);
    }

    function updateTransform() {
      transformWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    // Zoom on wheel (centered towards mouse cursor position)
    stage.addEventListener('wheel', (e) => {
      if (e.target.closest('.lil-gui')) return;
      e.preventDefault();
      const zoomFactor = 1.1;
      const oldScale = scale;

      if (e.deltaY < 0) {
        scale *= zoomFactor;
      } else {
        scale /= zoomFactor;
      }

      scale = Math.max(0.1, Math.min(20, scale));

      const rect = stage.getBoundingClientRect();
      const mouseX = e.clientX - rect.left - rect.width / 2;
      const mouseY = e.clientY - rect.top - rect.height / 2;

      translateX = mouseX - (mouseX - translateX) * (scale / oldScale);
      translateY = mouseY - (mouseY - translateY) * (scale / oldScale);

      updateTransform();
    }, { passive: false });

    // Drag / Pan mechanics
    stage.addEventListener('mousedown', (e) => {
      if (e.target.closest('.lil-gui')) return;
      if (e.button !== 0) return; // Left click only
      isDragging = true;
      startX = e.clientX - translateX;
      startY = e.clientY - translateY;
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      translateX = e.clientX - startX;
      translateY = e.clientY - startY;
      updateTransform();
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // Touch Support (for drag and pinch-to-zoom gestures)
    stage.addEventListener('touchstart', (e) => {
      if (e.target.closest('.lil-gui')) return;
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - translateX;
        startY = e.touches[0].clientY - translateY;
      } else if (e.touches.length === 2) {
        isDragging = false;
        prevDiff = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      }
    });

    window.addEventListener('touchmove', (e) => {
      if (e.target.closest('.lil-gui')) return;
      if (isDragging && e.touches.length === 1) {
        translateX = e.touches[0].clientX - startX;
        translateY = e.touches[0].clientY - startY;
        updateTransform();
      } else if (e.touches.length === 2) {
        const curDiff = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        if (prevDiff > 0) {
          const ratio = curDiff / prevDiff;
          const oldScale = scale;
          scale = Math.max(0.1, Math.min(20, scale * ratio));
          
          const rect = stage.getBoundingClientRect();
          const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left - rect.width / 2;
          const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top - rect.height / 2;
          
          translateX = midX - (midX - translateX) * (scale / oldScale);
          translateY = midY - (midY - translateY) * (scale / oldScale);
          updateTransform();
        }
        prevDiff = curDiff;
      }
    });

    window.addEventListener('touchend', () => {
      isDragging = false;
      prevDiff = -1;
    });

    // lil-gui setup
    const gui = new GUI({ title: 'Settings' });
    let isUpdatingPreset = false;

    const presetController = gui.add(state, 'theme', Object.keys(presets)).name('Theme Preset');
    
    presetController.onChange((val) => {
      if (isUpdatingPreset || val === 'Custom') return;

      const p = presets[val];
      state.bgColor = p.bgColor;
      state.textColor = p.textColor;

      // Sync custom color control values
      bgColorController.updateDisplay();
      textColorController.updateDisplay();

      updateColors();
    });

    // Green Screen Switch
    gui.add(state, 'greenscreen').name('Green Screen').onChange(() => {
      updateColors();
    });

    // Columns count controller
    gui.add(state, 'columns', 10, 150, 1).name('Columns').onChange((val) => {
      binaryElement.setAttribute('columns', val);
    });

    // Animation speed/interval controller
    gui.add(state, 'interval', 20, 1000, 10).name('Interval (ms)').onChange((val) => {
      binaryElement.setAttribute('interval', val);
    });

    // Custom colors configuration folder
    const folderColors = gui.addFolder('Custom Colors');
    
    function markAsCustom() {
      if (isUpdatingPreset) return;
      isUpdatingPreset = true;
      state.theme = 'Custom';
      presetController.updateDisplay();
      isUpdatingPreset = false;
    }

    const bgColorController = folderColors.addColor(state, 'bgColor').name('Background').onChange(() => {
      markAsCustom();
      updateColors();
    });

    const textColorController = folderColors.addColor(state, 'textColor').name('Binary Color').onChange(() => {
      markAsCustom();
      updateColors();
    });

    // Reset view option
    gui.add(state, 'resetView').name('Reset View');

    // Run Initial Settings
    updateColors();
  </script>
</body>
</html>
