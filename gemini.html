<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Neon Gems Playable Ad</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #0d0d14;
        overflow: hidden;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas {
        display: block;
      }
    </style>
    <!-- Standard Ad Network CDNs for Engine/Tweening -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/PixiPlugin.min.js"></script>
  </head>
  <body>
    <script>
      /**
       * PLAYABLE AD STUDIO - NEON GEM POP
       * Architecture: Pixi.js + GSAP
       * 100% Self-Contained Assets (Programmatic & Base64)
       */

      // --- 1. SETUP & ARCHITECTURE ---
      gsap.registerPlugin(PixiPlugin);
      PixiPlugin.registerPIXI(PIXI);

      const app = new PIXI.Application({
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: 0x0d0d14,
        antialias: true,
        resolution: Math.min(window.devicePixelRatio, 2),
        autoDensity: true,
        powerPreference: "high-performance",
      });
      document.body.appendChild(app.view);

      // Layers for depth management
      const layers = {
        bg: new PIXI.Container(),
        grid: new PIXI.Container(),
        mid: new PIXI.Container(), // Gems
        fx: new PIXI.ParticleContainer(300, {
          position: true,
          rotation: true,
          scale: true,
          alpha: true,
          tint: true,
        }),
        ui: new PIXI.Container(),
        tutorial: new PIXI.Container(),
        endcard: new PIXI.Container(),
      };
      Object.values(layers).forEach((l) => app.stage.addChild(l));
      layers.endcard.visible = false;

      // Global screen scaling based on portrait iPhone grid
      const DW = 390,
        DH = 844;
      let scale, ox, oy;
      const W = () => app.screen.width;
      const H = () => app.screen.height;

      // Game State
      let phase = "hook"; // hook -> play -> endcard
      let elapsed = 0;
      let inputLocked = true;
      let matchesMade = 0;
      const ROWS = 6;
      const COLS = 5;
      const CELL_SIZE = 68;
      let board = [];
      let gems = [];

      // Shake mechanics
      let shakeX = 0,
        shakeY = 0;
      const stagePivot = new PIXI.Point(0, 0);

      // --- 2. ASSET GENERATION (Zero External Requests) ---
      const colors = [0xff0055, 0x00f0ff, 0xffea00, 0xb800ff]; // Magenta, Cyan, Yellow, Purple
      const gemTextures = [];

      function generateAssets() {
        // 1. Generate Gem Textures Programmatically
        const gfx = new PIXI.Graphics();

        // Draw 4 distinct shapes
        const shapes = [
          (g) => g.drawRect(-20, -20, 40, 40), // Square
          (g) => {
            g.moveTo(0, -24);
            g.lineTo(24, 0);
            g.lineTo(0, 24);
            g.lineTo(-24, 0);
            g.closePath();
          }, // Diamond
          (g) => g.drawCircle(0, 0, 22), // Circle
          (g) => {
            // Hexagon
            for (let i = 0; i < 6; i++) {
              let angle = (i * Math.PI) / 3;
              let x = 24 * Math.cos(angle),
                y = 24 * Math.sin(angle);
              if (i === 0) g.moveTo(x, y);
              else g.lineTo(x, y);
            }
            g.closePath();
          },
        ];

        colors.forEach((color, i) => {
          gfx.clear();
          // Outer glow
          gfx.lineStyle(6, color, 0.4);
          shapes[i](gfx);
          // Main body
          gfx.lineStyle(4, color, 1);
          gfx.beginFill(color, 0.15);
          shapes[i](gfx);
          gfx.endFill();
          // Inner bright core
          gfx.lineStyle(0);
          gfx.beginFill(0xffffff, 0.8);
          gfx.drawCircle(0, 0, 6);
          gfx.endFill();

          gemTextures.push(app.renderer.generateTexture(gfx));
        });

        // 2. Base64 Noise Grain Overlay (Material Surprise)
        const grainB64 =
          "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAQAAAAAYLlVAAAAPklEQVR42u3OMQEAAAwCoPk3t4v7Aww0gQQIIAACCiCgAAIKIKAAAgogoAACCiCgAAIKIKAAAgogoAACCiAgl5x9w2w0X6QAAAABJRU5ErkJggg==";
        PIXI.Assets.load(grainB64).then((tex) => {
          const grain = new PIXI.TilingSprite(tex, 2000, 2000);
          grain.alpha = 0.05;
          grain.blendMode = PIXI.BLEND_MODES.OVERLAY;
          layers.ui.addChild(grain);
          app.ticker.add(() => {
            grain.tilePosition.x = Math.random() * 200;
          });
        });
      }

      // --- 3. PARTICLE ENGINE (Juice) ---
      class Particle {
        constructor() {
          this.sprite = new PIXI.Sprite(PIXI.Texture.WHITE); // Base white square
          this.sprite.anchor.set(0.5);
          this.sprite.blendMode = PIXI.BLEND_MODES.ADD; // Neon energy
          this.reset();
        }
        reset(x = 0, y = 0, color = 0xffffff, power = 1) {
          this.x = x;
          this.y = y;
          const angle = Math.random() * Math.PI * 2;
          const speed = (Math.random() * 8 + 4) * power;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed;
          this.life = 1.0;
          this.decay = 0.02 + Math.random() * 0.03;
          this.sprite.tint = color;
          this.sprite.width = this.sprite.height = Math.random() * 8 + 4;
          this.sprite.rotation = Math.random();
          this.sprite.visible = true;
          this.vRot = (Math.random() - 0.5) * 0.4;
        }
        update(delta) {
          if (!this.sprite.visible) return;
          this.x += this.vx * delta;
          this.y += this.vy * delta;
          this.vy += 0.2 * delta; // slight gravity
          this.life -= this.decay * delta;
          this.sprite.x = this.x;
          this.sprite.y = this.y;
          this.sprite.alpha = Math.max(0, this.life);
          this.sprite.rotation += this.vRot * delta;
          this.sprite.scale.set(this.life);
          if (this.life <= 0) this.sprite.visible = false;
        }
      }

      const pPool = Array.from({ length: 150 }, () => new Particle());
      pPool.forEach((p) => layers.fx.addChild(p.sprite));

      function burst(x, y, color, power = 1, count = 20) {
        let spawned = 0;
        for (const p of pPool) {
          if (!p.sprite.visible) {
            p.reset(x, y, color, power);
            if (++spawned >= count) break;
          }
        }
      }

      function triggerShake(intensity) {
        gsap.killTweensOf(stagePivot);
        stagePivot.set(0, 0);
        const duration = intensity * 0.4;
        gsap.to(stagePivot, {
          x: intensity * 8 * (Math.random() > 0.5 ? 1 : -1),
          y: intensity * 8 * (Math.random() > 0.5 ? 1 : -1),
          duration: 0.05,
          yoyo: true,
          repeat: Math.floor(duration / 0.05),
          ease: "rough({strength: 2, points: 20, template: sine.inOut})",
          onComplete: () => stagePivot.set(0, 0),
        });
      }

      // --- 4. BOARD & GAME LOGIC ---
      function getPos(r, c) {
        return {
          x: (c - (COLS - 1) / 2) * CELL_SIZE,
          y: (r - (ROWS - 1) / 2) * CELL_SIZE,
        };
      }

      class Gem {
        constructor(r, c, type) {
          this.r = r;
          this.c = c;
          this.type = type;
          this.sprite = new PIXI.Sprite(gemTextures[type]);
          this.sprite.anchor.set(0.5);
          this.sprite.blendMode = PIXI.BLEND_MODES.ADD;

          const pos = getPos(r, c);
          this.sprite.x = pos.x;
          this.sprite.y = pos.y - 800; // start high for hook drop

          // Imperfect ambient pulse (polyrhythm)
          this.breatheTween = gsap.to(this.sprite.scale, {
            x: 1.05,
            y: 1.05,
            duration: 1.2 + Math.random() * 0.5,
            yoyo: true,
            repeat: -1,
            ease: "sine.inOut",
            delay: Math.random(),
          });

          layers.mid.addChild(this.sprite);
          this.makeInteractive();
        }

        makeInteractive() {
          this.sprite.interactive = true;
          this.sprite.cursor = "pointer";
          let startX, startY;

          this.sprite.on("pointerdown", (e) => {
            if (inputLocked) return;
            startX = e.data.global.x;
            startY = e.data.global.y;
            gsap.to(this.sprite.scale, {
              x: 0.85,
              y: 0.85,
              duration: 0.1,
              overwrite: "auto",
            });
          });

          this.sprite.on("pointerup", (e) =>
            this.handleDrag(e, startX, startY),
          );
          this.sprite.on("pointerupoutside", (e) =>
            this.handleDrag(e, startX, startY),
          );
        }

        handleDrag(e, startX, startY) {
          if (inputLocked || startX === undefined) return;
          let dx = e.data.global.x - startX;
          let dy = e.data.global.y - startY;

          this.breatheTween.restart(); // restore scale

          if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
            let tr = this.r,
              tc = this.c;
            if (Math.abs(dx) > Math.abs(dy)) tc += dx > 0 ? 1 : -1;
            else tr += dy > 0 ? 1 : -1;

            if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
              attemptSwap(this, board[tr][tc]);
            }
          }
        }

        destroyGem() {
          this.sprite.interactive = false;
          this.breatheTween.kill();

          // Anticipation squeeze then pop
          gsap.to(this.sprite.scale, {
            x: 0.7,
            y: 0.7,
            duration: 0.08,
            ease: "back.in(2)",
            onComplete: () => {
              burst(
                this.sprite.parent.x + this.sprite.x,
                this.sprite.parent.y + this.sprite.y,
                colors[this.type],
                1 + matchesMade * 0.5,
                15,
              );
              this.sprite.destroy();
            },
          });
        }
      }

      function initBoard() {
        // Draw grid background
        const bg = new PIXI.Graphics();
        bg.beginFill(0x1a1a2e, 0.4);
        bg.drawRoundedRect(
          (-CELL_SIZE * COLS) / 2 - 10,
          (-CELL_SIZE * ROWS) / 2 - 10,
          CELL_SIZE * COLS + 20,
          CELL_SIZE * ROWS + 20,
          16,
        );
        bg.endFill();
        layers.grid.addChild(bg);

        for (let r = 0; r < ROWS; r++) {
          board[r] = [];
          for (let c = 0; c < COLS; c++) {
            // Prevent initial matches
            let type;
            do {
              type = Math.floor(Math.random() * 4);
            } while (
              (r >= 2 &&
                board[r - 1][c].type === type &&
                board[r - 2][c].type === type) ||
              (c >= 2 &&
                board[r][c - 1].type === type &&
                board[r][c - 2].type === type)
            );

            let gem = new Gem(r, c, type);
            board[r][c] = gem;
            gems.push(gem);
          }
        }
      }

      // --- 5. LOGIC FLOW ---
      function attemptSwap(g1, g2) {
        inputLocked = true;
        hideTutorial();

        // Swap data
        board[g1.r][g1.c] = g2;
        board[g2.r][g2.c] = g1;
        let tempR = g1.r,
          tempC = g1.c;
        g1.r = g2.r;
        g1.c = g2.c;
        g2.r = tempR;
        g2.c = tempC;

        // Animate
        let p1 = getPos(g1.r, g1.c);
        let p2 = getPos(g2.r, g2.c);

        gsap.to(g1.sprite, {
          x: p1.x,
          y: p1.y,
          duration: 0.25,
          ease: "back.out(1.5)",
        });
        gsap.to(g2.sprite, {
          x: p2.x,
          y: p2.y,
          duration: 0.25,
          ease: "back.out(1.5)",
          onComplete: () => {
            let matches = findMatches();
            if (matches.length > 0) {
              matchesMade++;
              processMatches(matches);
            } else {
              // Swap back
              board[g1.r][g1.c] = g2;
              board[g2.r][g2.c] = g1;
              let tempR = g1.r,
                tempC = g1.c;
              g1.r = g2.r;
              g1.c = g2.c;
              g2.r = tempR;
              g2.c = tempC;

              p1 = getPos(g1.r, g1.c);
              p2 = getPos(g2.r, g2.c);
              gsap.to(g1.sprite, {
                x: p1.x,
                y: p1.y,
                duration: 0.2,
                ease: "power2.out",
              });
              gsap.to(g2.sprite, {
                x: p2.x,
                y: p2.y,
                duration: 0.2,
                ease: "power2.out",
                onComplete: () => {
                  inputLocked = false;
                  showTutorial();
                },
              });
            }
          },
        });
      }

      function findMatches() {
        let matched = new Set();
        // Horiz
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS - 2; c++) {
            if (!board[r][c]) continue;
            let type = board[r][c].type;
            if (
              board[r][c + 1] &&
              board[r][c + 1].type === type &&
              board[r][c + 2] &&
              board[r][c + 2].type === type
            ) {
              matched.add(board[r][c]);
              matched.add(board[r][c + 1]);
              matched.add(board[r][c + 2]);
            }
          }
        }
        // Vert
        for (let c = 0; c < COLS; c++) {
          for (let r = 0; r < ROWS - 2; r++) {
            if (!board[r][c]) continue;
            let type = board[r][c].type;
            if (
              board[r + 1][c] &&
              board[r + 1][c].type === type &&
              board[r + 2][c] &&
              board[r + 2][c].type === type
            ) {
              matched.add(board[r][c]);
              matched.add(board[r + 1][c]);
              matched.add(board[r + 2][c]);
            }
          }
        }
        return Array.from(matched);
      }

      function processMatches(matches) {
        if (matches.length === 0) {
          inputLocked = false;
          showTutorial();
          return;
        }

        // Escalate juice based on matchesMade
        triggerShake(matchesMade);

        if (matchesMade >= 3) {
          // The Climax - slowmo
          gsap.to(app.ticker, { speed: 0.1, duration: 0.1 }); // faux slowmo
          gsap.delayedCall(0.5, () => {
            app.ticker.speed = 1; // snap back
            triggerShake(4);
          });
        }

        matches.forEach((gem) => {
          board[gem.r][gem.c] = null;
          gems = gems.filter((g) => g !== gem);
          gem.destroyGem();
        });

        gsap.delayedCall(0.3, applyGravity);
      }

      function applyGravity() {
        let drops = 0;
        for (let c = 0; c < COLS; c++) {
          let emptySpots = 0;
          for (let r = ROWS - 1; r >= 0; r--) {
            if (board[r][c] === null) {
              emptySpots++;
            } else if (emptySpots > 0) {
              let gem = board[r][c];
              board[r][c] = null;
              gem.r += emptySpots;
              board[gem.r][c] = gem;
              let pos = getPos(gem.r, gem.c);
              gsap.to(gem.sprite, {
                x: pos.x,
                y: pos.y,
                duration: 0.4,
                ease: "bounce.out",
              });
              drops++;
            }
          }

          // Spawn new
          for (let i = 0; i < emptySpots; i++) {
            let gem = new Gem(i, c, Math.floor(Math.random() * 4));
            board[i][c] = gem;
            gems.push(gem);
            let pos = getPos(i, c);
            gem.sprite.y = pos.y - 400; // drop from top
            gsap.to(gem.sprite, {
              y: pos.y,
              duration: 0.4 + i * 0.1,
              ease: "bounce.out",
              delay: 0.1,
            });
            drops++;
          }
        }

        gsap.delayedCall(0.6, () => {
          let newMatches = findMatches();
          if (newMatches.length > 0) {
            processMatches(newMatches);
          } else {
            if (matchesMade >= 3) {
              setPhase("endcard");
            } else {
              inputLocked = false;
              showTutorial();
            }
          }
        });
      }

      // --- 6. TUTORIAL SYSTEM ---
      const cursor = new PIXI.Graphics();
      function buildTutorial() {
        // Material surprise: precise, editorial cursor instead of cartoony hand
        cursor.beginFill(0xffffff);
        cursor.lineStyle(2, 0x000000, 0.5);
        cursor.moveTo(0, 0);
        cursor.lineTo(20, 15);
        cursor.lineTo(10, 18);
        cursor.lineTo(15, 30);
        cursor.lineTo(7, 33);
        cursor.lineTo(2, 20);
        cursor.lineTo(-5, 25);
        cursor.closePath();
        cursor.endFill();

        // Soft shadow
        cursor.filters = [
          new PIXI.DropShadowFilter({ distance: 4, blur: 4, alpha: 0.4 }),
        ];
        cursor.alpha = 0;
        layers.tutorial.addChild(cursor);
      }

      let hintTween;
      function showTutorial() {
        if (phase !== "play" || matchesMade >= 3) return;

        // Find a valid move to hint
        let hintMove = null;
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS - 1; c++) {
            // test horiz
            swapData(r, c, r, c + 1);
            if (findMatches().length > 0)
              hintMove = { r1: r, c1: c, r2: r, c2: c + 1 };
            swapData(r, c, r, c + 1); // undo
            if (hintMove) break;
          }
          if (hintMove) break;
        }

        if (!hintMove) {
          // If board is strictly locked (rare but possible), shuffle visually
          inputLocked = true;
          gems.forEach((g) =>
            gsap.to(g.sprite.scale, {
              x: 0,
              y: 0,
              duration: 0.2,
              yoyo: true,
              repeat: 1,
            }),
          );
          gsap.delayedCall(0.4, () => {
            initBoard();
            inputLocked = false;
            showTutorial();
          });
          return;
        }

        let p1 = getPos(hintMove.r1, hintMove.c1);
        let p2 = getPos(hintMove.r2, hintMove.c2);

        cursor.x = layers.mid.x + p1.x;
        cursor.y = layers.mid.y + p1.y + 20;

        if (hintTween) hintTween.kill();
        hintTween = gsap
          .timeline({ repeat: -1, delay: 1.5 }) // Wait 1.5s idle before showing
          .to(cursor, { alpha: 1, duration: 0.3 })
          .to(cursor, {
            x: layers.mid.x + p2.x,
            y: layers.mid.y + p2.y + 20,
            duration: 0.8,
            ease: "power2.inOut",
          })
          .to(cursor, { alpha: 0, duration: 0.3 })
          .to({}, { duration: 1 }); // wait
      }

      function hideTutorial() {
        if (hintTween) hintTween.pause();
        gsap.to(cursor, { alpha: 0, duration: 0.2 });
      }

      function swapData(r1, c1, r2, c2) {
        let t = board[r1][c1];
        board[r1][c1] = board[r2][c2];
        board[r2][c2] = t;
      }

      // --- 7. END CARD ---
      function buildEndcard() {
        const ec = layers.endcard;

        // Dim overlay
        const overlay = new PIXI.Graphics();
        overlay.beginFill(0x000000, 0.75);
        overlay.drawRect(-1000, -1000, 2000, 2000);
        overlay.endFill();
        ec.addChild(overlay);

        // App Icon (Programmatic)
        const iconBase = new PIXI.Graphics();
        iconBase.beginFill(0x221144);
        iconBase.lineStyle(4, 0x00f0ff);
        iconBase.drawRoundedRect(-48, -48, 96, 96, 24);
        iconBase.endFill();

        const iconGem = new PIXI.Sprite(gemTextures[0]);
        iconGem.anchor.set(0.5);
        iconGem.scale.set(1.5);
        iconBase.addChild(iconGem);

        iconBase.y = -100;
        ec.addChild(iconBase);

        // Headline
        const text = new PIXI.Text("NEON CRUSH", {
          fontFamily: "Impact, Arial Black, sans-serif",
          fontSize: 36,
          fill: 0xffffff,
          letterSpacing: 4,
          dropShadow: true,
          dropShadowColor: 0x00f0ff,
          dropShadowDistance: 0,
          dropShadowBlur: 10,
        });
        text.anchor.set(0.5);
        text.y = 20;
        ec.addChild(text);

        // CTA Button
        const cta = new PIXI.Container();
        const ctaBg = new PIXI.Graphics();
        ctaBg
          .beginFill(0x00f0ff)
          .drawRoundedRect(-120, -32, 240, 64, 32)
          .endFill();
        cta.addChild(ctaBg);

        const ctaText = new PIXI.Text("PLAY NOW", {
          fontFamily: "Arial Black, sans-serif",
          fontSize: 24,
          fill: 0x0d0d14,
          fontWeight: "900",
        });
        ctaText.anchor.set(0.5);
        cta.addChild(ctaText);

        cta.y = 120;
        cta.interactive = true;
        cta.cursor = "pointer";

        // Breathing CTA
        gsap.to(cta.scale, {
          x: 1.05,
          y: 1.05,
          duration: 0.8,
          yoyo: true,
          repeat: -1,
          ease: "sine.inOut",
        });

        cta.on("pointerdown", () => {
          gsap.to(cta.scale, {
            x: 0.9,
            y: 0.9,
            duration: 0.1,
            yoyo: true,
            repeat: 1,
          });
          openStore();
        });
        ec.addChild(cta);
      }

      function openStore() {
        const url = "https://example.com/store";
        try {
          if (typeof mraid !== "undefined") mraid.open(url);
          else window.open(url, "_blank");
        } catch (e) {
          window.open(url, "_blank");
        }
      }

      // --- 8. LIFECYCLE & RESIZE ---
      function resize() {
        const sw = window.innerWidth,
          sh = window.innerHeight;
        app.renderer.resize(sw, sh);

        // Calculate fit-to-screen scale
        scale = Math.min(sw / DW, sh / DH);
        ox = sw / 2;
        oy = sh / 2;

        [layers.grid, layers.mid, layers.endcard, layers.fx].forEach((l) => {
          l.x = ox;
          l.y = oy;
          l.scale.set(scale);
        });
        layers.tutorial.scale.set(scale);
      }
      window.addEventListener("resize", resize);

      function setPhase(next) {
        phase = next;
        if (phase === "play") {
          inputLocked = false;
          showTutorial();
        }
        if (phase === "endcard") {
          inputLocked = true;
          hideTutorial();
          layers.endcard.visible = true;
          layers.endcard.alpha = 0;

          // Blur background objects conceptually
          gsap.to(layers.mid, { alpha: 0.2, duration: 0.8 });
          gsap.to(layers.grid, { alpha: 0.2, duration: 0.8 });

          // Stagger entrance
          const [icon, text, cta] = layers.endcard.children.slice(1); // skip overlay
          icon.y += 50;
          text.y += 50;
          cta.y += 50;

          gsap.to(layers.endcard, { alpha: 1, duration: 0.5 });
          gsap.to(icon, {
            y: "-=50",
            duration: 0.6,
            ease: "back.out(1.5)",
            delay: 0.2,
          });
          gsap.to(text, {
            y: "-=50",
            duration: 0.6,
            ease: "back.out(1.5)",
            delay: 0.3,
          });
          gsap.to(cta, {
            y: "-=50",
            duration: 0.6,
            ease: "back.out(1.5)",
            delay: 0.4,
          });
        }
      }

      // The Hook Phase (0 - 1.5s)
      function playHook() {
        // Non-uniform stagger drop-in of the board
        gems.forEach((gem, i) => {
          let pos = getPos(gem.r, gem.c);
          gsap.to(gem.sprite, {
            y: pos.y,
            duration: 0.8 + Math.random() * 0.4,
            ease: "bounce.out",
            delay: gem.r * 0.08 + Math.random() * 0.05,
          });
        });

        // After drop finishes, unlock play
        gsap.delayedCall(1.5, () => setPhase("play"));
      }

      // Ticker (Render Loop)
      app.ticker.add((delta) => {
        elapsed += delta;
        app.stage.position.x = stagePivot.x;
        app.stage.position.y = stagePivot.y;

        // Update particles
        pPool.forEach((p) => p.update(delta));
      });

      // Boot
      generateAssets();
      initBoard();
      buildTutorial();
      buildEndcard();
      resize();
      playHook();
    </script>
  </body>
</html>
