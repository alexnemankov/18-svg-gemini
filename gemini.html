<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Playable Ad - Kinetic Reversal</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #0d0d14;
        overflow: hidden;
        touch-action: none;
        font-family: "Arial Black", Arial, sans-serif;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
    <!-- Core PixiJS & GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/PixiPlugin.min.js"></script>
  </head>
  <body>
    <script>
      // ---------------------------------------------------------
      // 1. ARCHITECTURE & SETUP
      // ---------------------------------------------------------
      gsap.registerPlugin(PixiPlugin);
      PixiPlugin.registerPIXI(PIXI);

      const app = new PIXI.Application({
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: 0x0b0f19,
        antialias: true,
        resolution: Math.min(window.devicePixelRatio || 1, 2),
        autoDensity: true,
        powerPreference: "high-performance",
      });
      document.body.appendChild(app.view);

      // Design coordinates (Portrait-first safe zone)
      const DW = 390,
        DH = 844;
      let W = app.screen.width;
      let H = app.screen.height;
      let scale = Math.min(W / DW, H / DH);
      let ox = (W - DW * scale) / 2;
      let oy = (H - DH * scale) / 2;

      // Layer System
      const layers = {
        bg: new PIXI.Container(),
        mid: new PIXI.Container(),
        fx: new PIXI.Container(),
        ui: new PIXI.Container(),
        tutorial: new PIXI.Container(),
        endcard: new PIXI.Container(),
        fg: new PIXI.Container(), // Grain overlay
      };
      Object.values(layers).forEach((l) => app.stage.addChild(l));
      layers.endcard.visible = false;

      // Colors
      const C_STONE = 0x475569;
      const C_STONE_DARK = 0x334155;
      const C_RED = 0xdc2626;
      const C_AMBER = 0xfcd34d;
      const C_TRACK = 0x1e293b;

      // Game State
      let phase = "hook"; // hook, charging, launched, endcard
      let elapsed = 0;
      let chargeAmount = 0;
      let trackSpeed = 0;
      let isMuted = false;

      // ---------------------------------------------------------
      // 2. ASSETS & GRAPHICS GENERATION
      // ---------------------------------------------------------

      // Texture generator for subtle noise grain (Base64)
      const GRAIN_B64 =
        "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyBAMAAADsEZWCAAAAGFBMVEUAAACAgIDAwMDf39/v7+/z8/P5+fn///+Qf++aAAAARElEQVQ4y2NgQAX8DIxoQgxlYGQgCjG4MDCCCRxZOBiB5O88BiaQvAMDAwOQeL8TiPq/EYg4wMCgBBOnTDB12BTB1AEAOtkv/xN2H/EAAAAASUVORK5CYII=";

      function ds(x, y) {
        return { x: ox + x * scale, y: oy + y * scale };
      }

      // Glow helper (Material Surprise technique - ADD blend)
      function createGlow(color, radius, alpha = 0.5) {
        const g = new PIXI.Graphics();
        g.beginFill(color, alpha);
        g.drawCircle(0, 0, radius);
        g.endFill();
        g.blendMode = PIXI.BLEND_MODES.ADD;
        return g;
      }

      // ---------------------------------------------------------
      // 3. SCENE CONSTRUCTION
      // ---------------------------------------------------------

      // A. Background: Low-poly halfpipe simulation
      const trackGrid = new PIXI.Container();
      layers.bg.addChild(trackGrid);
      const horizonY = 0.35;
      const lines = [];
      const numLines = 12;

      // Vertical perspective lines
      const gVert = new PIXI.Graphics();
      trackGrid.addChild(gVert);

      // Horizontal moving lines
      for (let i = 0; i < numLines; i++) {
        const line = new PIXI.Graphics();
        line.yPos = i / numLines; // 0 to 1
        trackGrid.addChild(line);
        lines.push(line);
      }

      // B. Midground: The Trap & Sphere
      const trapContainer = new PIXI.Container();
      layers.mid.addChild(trapContainer);

      const blocks = [];
      const blockSize = 44;
      const gridSpacing = 48;

      // 3x3 Stone Grid
      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 3; col++) {
          if (row === 1 && col === 1) continue; // center hole
          const block = new PIXI.Graphics();
          block.beginFill(C_STONE_DARK);
          block.drawRect(
            -blockSize / 2,
            -blockSize / 2 + 6,
            blockSize,
            blockSize,
          );
          block.beginFill(C_STONE);
          block.drawRect(-blockSize / 2, -blockSize / 2, blockSize, blockSize);
          block.endFill();
          block.x = (col - 1) * gridSpacing;
          block.y = (row - 1) * gridSpacing;
          block.origX = block.x;
          block.origY = block.y;
          trapContainer.addChild(block);
          blocks.push({ sprite: block, vx: 0, vy: 0, rot: 0 });
        }
      }

      // The Sphere
      const sphere = new PIXI.Container();
      trapContainer.addChild(sphere);

      const sGlow = createGlow(C_RED, 36, 0.3);
      sphere.addChild(sGlow);

      const sBody = new PIXI.Graphics();
      sBody.beginFill(C_RED).drawCircle(0, 0, 22).endFill();
      sBody.beginFill(0xffffff, 0.2).drawEllipse(-6, -8, 8, 4).endFill(); // Highlight
      sphere.addChild(sBody);

      const chargeAura = createGlow(C_AMBER, 50, 0.0);
      sphere.addChild(chargeAura);

      // C. Foreground: Grain Overlay
      let grainSprite;
      PIXI.Assets.load(GRAIN_B64).then((tex) => {
        grainSprite = new PIXI.TilingSprite(tex, W, H);
        grainSprite.alpha = 0.05;
        grainSprite.blendMode = PIXI.BLEND_MODES.OVERLAY;
        layers.fg.addChild(grainSprite);
      });

      // D. Tutorial Hand
      const hand = new PIXI.Container();
      const hGfx = new PIXI.Graphics();
      hGfx
        .beginFill(0xffffff)
        .drawCircle(0, 0, 16)
        .beginFill(0xcccccc)
        .drawCircle(0, 0, 12)
        .endFill();
      hand.addChild(hGfx);
      const handGlow = createGlow(0xffffff, 24, 0.4);
      hand.addChild(handGlow);
      layers.tutorial.addChild(hand);
      hand.alpha = 0;

      // ---------------------------------------------------------
      // 4. PARTICLES & JUICE (Object Pool)
      // ---------------------------------------------------------
      class Particle {
        constructor() {
          this.gfx = new PIXI.Graphics();
          this.gfx
            .beginFill(0xffffff)
            .drawPolygon([-4, -4, 4, -2, 2, 4, -2, 2])
            .endFill();
          this.gfx.blendMode = PIXI.BLEND_MODES.ADD;
          this.reset();
          layers.fx.addChild(this.gfx);
        }
        reset(x = 0, y = 0, isStone = false) {
          this.x = x;
          this.y = y;
          this.vx = (Math.random() - 0.5) * 18;
          this.vy = (Math.random() - 0.5) * 18 - 4;
          this.life = 1.0;
          this.decay = 0.015 + Math.random() * 0.02;
          this.gfx.scale.set(Math.random() * 0.8 + 0.4);

          if (isStone) {
            this.gfx.tint = C_STONE;
            this.gfx.blendMode = PIXI.BLEND_MODES.NORMAL;
          } else {
            this.gfx.tint = Math.random() > 0.5 ? C_AMBER : C_RED;
            this.gfx.blendMode = PIXI.BLEND_MODES.ADD;
          }
          this.gfx.rotation = Math.random() * Math.PI;
          this.vr = (Math.random() - 0.5) * 0.2;
          this.gfx.visible = true;
        }
        update(delta) {
          if (!this.gfx.visible) return;
          this.x += this.vx * delta;
          this.y += this.vy * delta;
          this.vy += 0.5 * delta; // Gravity
          this.gfx.rotation += this.vr * delta;
          this.life -= this.decay * delta;
          this.gfx.position.set(this.x, this.y);
          this.gfx.alpha = Math.max(0, this.life);
          if (this.life <= 0) this.gfx.visible = false;
        }
      }
      const pool = Array.from({ length: 80 }, () => new Particle());
      function burst(x, y, count = 20, isStone = false) {
        let n = 0;
        for (const p of pool) {
          if (!p.gfx.visible) {
            p.reset(x, y, isStone);
            if (++n >= count) break;
          }
        }
      }

      // ---------------------------------------------------------
      // 5. INTERACTION & LOGIC
      // ---------------------------------------------------------
      const hitZone = new PIXI.Graphics();
      hitZone
        .beginFill(0x000000, 0.001)
        .drawRect(-150, -150, 300, 300)
        .endFill();
      hitZone.interactive = true;
      hitZone.cursor = "pointer";
      trapContainer.addChild(hitZone);

      hitZone.on("pointerdown", () => {
        if (phase !== "hook" && phase !== "charging") return;
        phase = "charging";

        // Hide tutorial
        gsap.to(hand, { alpha: 0, duration: 0.2 });

        // Anticipation squeeze
        gsap.to(sphere.scale, {
          x: 0.85,
          y: 0.85,
          duration: 0.15,
          ease: "back.out(2)",
        });
      });

      const onRelease = () => {
        if (phase !== "charging") return;

        if (chargeAmount > 0.4) {
          triggerLaunch();
        } else {
          // Failed charge, reset
          phase = "hook";
          chargeAmount = 0;
          gsap.to(sphere.scale, {
            x: 1,
            y: 1,
            duration: 0.4,
            ease: "elastic.out(1, 0.5)",
          });
          blocks.forEach((b) => {
            gsap.to(b.sprite, {
              x: b.origX,
              y: b.origY,
              rotation: 0,
              duration: 0.3,
            });
          });
          gsap.to(chargeAura, { alpha: 0, duration: 0.3 });
        }
      };

      hitZone.on("pointerup", onRelease);
      hitZone.on("pointerupoutside", onRelease);

      function triggerLaunch() {
        phase = "launched";

        // Screen shake
        let shake = { val: 15 };
        gsap.to(shake, {
          val: 0,
          duration: 0.4,
          onUpdate: () => {
            app.stage.pivot.set(
              (Math.random() - 0.5) * shake.val,
              (Math.random() - 0.5) * shake.val,
            );
          },
        });

        // Explode Trap
        hitZone.interactive = false;
        blocks.forEach((b) => {
          const angle = Math.atan2(b.origY, b.origX);
          b.vx = Math.cos(angle) * (15 + Math.random() * 10);
          b.vy = Math.sin(angle) * (15 + Math.random() * 10) - 10;
          b.rot = (Math.random() - 0.5) * 0.4;
        });
        burst(trapContainer.x, trapContainer.y, 30, true); // Stone particles
        burst(trapContainer.x, trapContainer.y, 15, false); // Energy particles

        // Kinetic Sphere Launch (The Loop)
        gsap.to(chargeAura, { alpha: 0, duration: 0.1 });

        const startY = trapContainer.y;
        const startX = trapContainer.x;

        // Phase 1: Down the pipe
        gsap.to(sphere.scale, {
          x: 0.4,
          y: 0.4,
          duration: 0.5,
          ease: "power2.in",
        });
        gsap.to(trapContainer, {
          y: startY + H * 0.2,
          duration: 0.5,
          ease: "power2.in",
          onComplete: () => {
            // Phase 2: Up the loop
            gsap.to(trapContainer, {
              y: H * 0.2,
              x: startX + W * 0.2, // curve right
              duration: 0.6,
              ease: "power2.out",
              onComplete: winStateResolve,
            });
            gsap.to(sphere.scale, {
              x: 0.15,
              y: 0.15,
              duration: 0.6,
              ease: "power2.out",
            });
            gsap.to(trackGrid, { alpha: 0, duration: 0.4, delay: 0.2 }); // Fade track as we launch out
          },
        });

        // Accelerate track speed
        gsap.to(window, { trackSpeed: 4.0, duration: 0.4, ease: "power1.in" });
      }

      function winStateResolve() {
        // Massive burst at peak
        burst(trapContainer.x, trapContainer.y, 50, false);
        sphere.visible = false;

        // Flash screen
        const flash = new PIXI.Graphics();
        flash.beginFill(0xffffff).drawRect(0, 0, W, H).endFill();
        flash.blendMode = PIXI.BLEND_MODES.ADD;
        layers.fx.addChild(flash);
        gsap.to(flash, {
          alpha: 0,
          duration: 0.5,
          onComplete: () => flash.destroy(),
        });

        // Hold for 800ms then show endcard
        gsap.delayedCall(0.8, showEndcard);
      }

      // ---------------------------------------------------------
      // 6. END CARD
      // ---------------------------------------------------------
      function buildEndcard() {
        const ec = layers.endcard;

        // Vignette
        const vig = new PIXI.Graphics();
        vig
          .beginFill(0x000000, 0.7)
          .drawRect(0, 0, W * 2, H * 2)
          .endFill();
        vig.x = -W / 2;
        vig.y = -H / 2;
        ec.addChild(vig);

        // App Icon (Programmatic)
        const icon = new PIXI.Container();
        const iBg = new PIXI.Graphics();
        iBg
          .beginFill(C_STONE_DARK)
          .drawRoundedRect(-40, -40, 80, 80, 16)
          .endFill();
        icon.addChild(iBg);
        const iSphere = new PIXI.Graphics();
        iSphere.beginFill(C_RED).drawCircle(0, 0, 20).endFill();
        icon.addChild(iSphere);
        const iGlow = createGlow(C_AMBER, 30, 0.5);
        icon.addChild(iGlow);
        icon.y = -120;
        ec.addChild(icon);

        // Headline
        const title = new PIXI.Text("FEEL THE SPEED", {
          fontFamily: "Arial Black, Arial",
          fontSize: 28,
          fontWeight: "900",
          fill: 0xffffff,
          letterSpacing: 2,
        });
        title.anchor.set(0.5);
        title.y = -20;
        ec.addChild(title);

        // CTA Button
        const cta = new PIXI.Container();
        const ctaBg = new PIXI.Graphics();
        ctaBg
          .beginFill(C_RED)
          .drawRoundedRect(-110, -28, 220, 56, 28)
          .endFill();
        cta.addChild(ctaBg);

        const ctaText = new PIXI.Text("PLAY NOW", {
          fontFamily: "Arial Black, Arial",
          fontSize: 20,
          fontWeight: "900",
          fill: 0xffffff,
        });
        ctaText.anchor.set(0.5);
        cta.addChild(ctaText);
        cta.y = 60;
        ec.addChild(cta);

        // CTA Pulse
        gsap.to(cta.scale, {
          x: 1.05,
          y: 1.05,
          duration: 0.8,
          yoyo: true,
          repeat: -1,
          ease: "sine.inOut",
        });

        // Interaction
        cta.interactive = true;
        cta.cursor = "pointer";
        cta.on("pointerdown", () => {
          gsap.to(cta.scale, {
            x: 0.9,
            y: 0.9,
            duration: 0.1,
            yoyo: true,
            repeat: 1,
          });
          openStore();
        });
      }

      function showEndcard() {
        phase = "endcard";
        layers.endcard.visible = true;
        layers.endcard.alpha = 0;

        // Staggered entrance
        gsap.to(layers.endcard, { alpha: 1, duration: 0.5 });
        const children = layers.endcard.children.slice(1); // skip vignette
        children.forEach((c, i) => {
          gsap.from(c, {
            y: c.y + 40,
            alpha: 0,
            duration: 0.6,
            delay: 0.2 + i * 0.1,
            ease: "back.out(1.5)",
          });
        });
      }

      function openStore() {
        const url = "https://example.com/game";
        try {
          if (typeof mraid !== "undefined") mraid.open(url);
          else window.open(url, "_blank");
        } catch (e) {
          window.open(url, "_blank");
        }
      }

      // ---------------------------------------------------------
      // 7. LAYOUT & RESIZE
      // ---------------------------------------------------------
      function resize() {
        W = app.screen.width;
        H = app.screen.height;
        scale = Math.min(W / DW, H / DH);
        ox = (W - DW * scale) / 2;
        oy = (H - DH * scale) / 2;

        const center = ds(195, 563); // Lower-third interaction zone
        trapContainer.x = center.x;
        trapContainer.y = center.y;

        layers.endcard.x = W / 2;
        layers.endcard.y = H / 2;

        if (grainSprite) {
          grainSprite.width = W;
          grainSprite.height = H;
        }

        drawTrack();
      }

      function drawTrack() {
        gVert.clear();
        gVert.lineStyle(2, C_TRACK, 0.4);
        const vpX = W / 2;
        const vpY = H * horizonY;

        // Radiating lines
        for (let i = -4; i <= 4; i++) {
          gVert.moveTo(vpX, vpY);
          gVert.lineTo(vpX + i * W * 0.3, H);
        }
      }

      window.addEventListener("resize", () => {
        app.renderer.resize(window.innerWidth, window.innerHeight);
        resize();
      });

      // ---------------------------------------------------------
      // 8. GAME LOOP
      // ---------------------------------------------------------
      buildEndcard();
      resize();

      // Tutorial timing
      gsap.to(hand, {
        alpha: 1,
        duration: 0.4,
        delay: 1.2,
        onStart: () => {
          const pos = ds(195, 563);
          hand.position.set(pos.x + 30, pos.y + 30);
          // Hint animation
          gsap.to(hand, {
            x: pos.x,
            y: pos.y,
            duration: 0.5,
            ease: "power2.out",
            onComplete: () => {
              gsap.to(hand.scale, {
                x: 0.9,
                y: 0.9,
                duration: 0.3,
                yoyo: true,
                repeat: -1,
              });
            },
          });
        },
      });

      app.ticker.add((delta) => {
        elapsed += delta;

        // Animate background track
        if (phase !== "endcard") {
          const vpY = H * horizonY;
          const baseSpeed = phase === "launched" ? trackSpeed : 0.05;

          lines.forEach((line) => {
            line.yPos += baseSpeed * line.yPos * 0.02 * delta; // Accelerates as it gets closer
            if (line.yPos > 1) line.yPos = 0.01;

            const yDraw = vpY + (H - vpY) * line.yPos;
            const alpha = Math.min(1, line.yPos * 2);

            line.clear();
            line.lineStyle(
              2,
              phase === "launched" ? C_AMBER : C_TRACK,
              alpha * (phase === "launched" ? 0.8 : 0.4),
            );
            line.moveTo(0, yDraw);
            line.lineTo(W, yDraw);
          });
        }

        // Phase specific logic
        if (phase === "charging") {
          chargeAmount += delta * 0.016;

          // Jitter the trap
          const intensity = Math.min(chargeAmount * 5, 3);
          trapContainer.x =
            trapContainer.origX ||
            ds(195, 563).x + (Math.random() - 0.5) * intensity;
          trapContainer.y =
            trapContainer.origY ||
            ds(195, 563).y + (Math.random() - 0.5) * intensity;

          // Pulse blocks outward slightly
          blocks.forEach((b) => {
            const angle = Math.atan2(b.origY, b.origX);
            const push = Math.min(chargeAmount * 10, 8);
            b.sprite.x = b.origX + Math.cos(angle) * push;
            b.sprite.y = b.origY + Math.sin(angle) * push;
          });

          // Expand aura
          chargeAura.alpha = Math.min(chargeAmount * 1.5, 0.8);
          chargeAura.scale.set(
            1 + chargeAmount * 0.5 + Math.sin(elapsed * 0.5) * 0.05,
          ); // organic wobble
        }

        if (phase === "launched") {
          // Apply physics to broken blocks
          blocks.forEach((b) => {
            b.sprite.x += b.vx * delta;
            b.sprite.y += b.vy * delta;
            b.vy += 0.6 * delta; // gravity
            b.sprite.rotation += b.rot * delta;
          });
        }

        // Update Particles
        pool.forEach((p) => p.update(delta));

        // Living Grain
        if (grainSprite) grainSprite.tilePosition.x = Math.random() * 512;

        // Ambient sphere breathing in hook
        if (phase === "hook") {
          sphere.scale.set(1 + Math.sin(elapsed * 0.05) * 0.02);
          sGlow.alpha = 0.3 + Math.sin(elapsed * 0.08) * 0.1;
        }
      });
    </script>
  </body>
</html>
