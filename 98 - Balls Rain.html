<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGL Interactive Physics Simulation</title>
  <style>
    body {
      background: linear-gradient(#001122, #001122, #334455);
      margin: 0;
      overflow: hidden;
      user-select: none;
    }
    canvas {
      max-width: 100vw;
      display: block;
    }
  </style>
</head>
<body>

<script type="x-shader/vertex" id="vert">#version 300 es
  in vec3 position;
  in vec3 normal;
  in vec2 uv;
  in float index;

  in vec2 offset;
  in vec2 scale;
  in float type;
  
  out vec2 vUv;
  out float vType;
  
  uniform vec2 u_resolution;
  uniform float u_zoom;
  
  vec2 getScreenSpace(vec2 p) {
    vec2 uv = (p - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);
    return uv;
  }
  
  void main() {
    vec2 vuv = getScreenSpace(position.xy);
    float a = scale.y;
    float s = sin(a);
    float c = cos(a);
    vUv = uv;
    vType = mod(type, 3.);
    vec2 pos = position.xy * mat2(c,-s,s,c);
    gl_Position = vec4((pos * scale.x + offset) * u_zoom / u_resolution, .5, 1);
  }
</script>

<script type="x-shader/fragment" id="frag">#version 300 es
  precision highp float;
  
  in vec2 vUv;
  in float vType;
  
  uniform sampler2D s_ball1;
  uniform sampler2D s_ball2;
  uniform sampler2D s_ball3;
  
  uniform vec3 u_tint1;
  uniform vec3 u_tint2;
  uniform vec3 u_tint3;
  
  out vec4 col;
  
  void main() {
    col = vec4(smoothstep(0.01, 0., length(vUv-.5) - .495));
    
    vec4 texCol = vec4(1.0);
    if(vType == 0.) texCol = texture(s_ball1, vUv) * vec4(u_tint1, 1.0);
    else if(vType == 1.) texCol = texture(s_ball2, vUv) * vec4(u_tint2, 1.0);
    else if(vType == 2.) texCol = texture(s_ball3, vUv) * vec4(u_tint3, 1.0);
    
    col *= texCol;
    col *= col.a;
  }
</script>

<script type="module">
  import { Renderer, Drawable, Texture, Program, Plane, Geometry, GeometryAttribute, Mesh, Uniform } from "https://esm.sh/wtc-gl@1.0.0-beta.49";
  import { Vec2 } from "https://esm.sh/wtc-math@1.0.17";
  import { GUI } from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

  console.clear();

  // Initialize global settings
  const settings = {
    greenScreen: false,
    zoom: 1.0,
    dpr: 2.0,
    animation: 'Cosmic Vortex',
    barrierScale: 5.0,
    gravityX: 0.0,
    gravityY: -1.0,
    colorScheme: 'Monochromatic Dark',
    ball1Tint: '#ffffff',
    ball2Tint: '#ffffff',
    ball3Tint: '#ffffff',
    bgColor1: '#001122',
    bgColor2: '#334455'
  };

  const schemes = {
    'Monochromatic Dark': {
      ball1: '#ffffff',
      ball2: '#e0e0e0',
      ball3: '#a0a0a0',
      bg1: '#001122',
      bg2: '#334455'
    },
    'Neon Cyberpunk': {
      ball1: '#ff007f', // Hot Pink
      ball2: '#00f6ff', // Neon Cyan
      ball3: '#bd00ff', // Purple
      bg1: '#03001e',
      bg2: '#7303c0'
    },
    'Sunset Glow': {
      ball1: '#ff4e50', // Coral Red
      ball2: '#f9d423', // Sunset Yellow
      ball3: '#fc913a', // Orange
      bg1: '#1f1c2c',
      bg2: '#928dab'
    },
    'Emerald Forest': {
      ball1: '#00ff87', // Mint Green
      ball2: '#60efff', // Ice Blue
      ball3: '#00a86b', // Jade
      bg1: '#0f2027',
      bg2: '#2c5364'
    },
    'Cosmic Lavender': {
      ball1: '#e2b4bd', // Pale Pink
      ball2: '#9b5de5', // Lavender
      ball3: '#f15bb5', // Magenta
      bg1: '#1a0f2e',
      bg2: '#0d081b'
    }
  };

  const hexToRgb = (hex) => {
    const r = parseInt(hex.slice(1, 3), 16) / 255;
    const g = parseInt(hex.slice(3, 5), 16) / 255;
    const b = parseInt(hex.slice(5, 7), 16) / 255;
    return [r, g, b];
  };

  // Initialize global properties
  const p = new Vec2(); // window size
  const g = new Vec2(0, -1); // gravity
  const num = 1000; // The number of instances

  // Create the renderer and add it to the document
  const r = new Renderer({dpr: settings.dpr, premultipliedAlpha: true, alpha: true});
  const gl = r.gl;
  document.body.appendChild(gl.canvas);

  // Create the uniforms array
  const uniforms = {
    'u_resolution': new Uniform({name: 'resolution', value: r.dimensions.array}),
    'u_zoom': new Uniform({name: 'zoom', value: settings.zoom}),
    'u_tint1': new Uniform({name: 'tint1', value: hexToRgb(settings.ball1Tint)}),
    'u_tint2': new Uniform({name: 'tint2', value: hexToRgb(settings.ball2Tint)}),
    'u_tint3': new Uniform({name: 'tint3', value: hexToRgb(settings.ball3Tint)})
  };

  // Handle window resize
  const resize = (e)=>{
    p.reset(window.innerWidth, window.innerHeight);
    r.dimensions = new Vec2(window.innerWidth, window.innerHeight);
    uniforms.u_resolution.value = p.array;
  }
  window.addEventListener('resize', resize);
  resize();

  // Create the scene, this is the thing that we render
  const scene = new Drawable(gl);

  // Initialize the program (the shaders are in the HTML view)
  const vertex = window.vert.innerText;
  const fragment = window.frag.innerText;
  const program = new Program(gl, {
    vertex, fragment, uniforms, transparent:true, depthTest: false
  });

  // Initialize the various object properties
  const offset = new Float32Array(num*2); // The offset on screen, basically the position
  const sr = new Float32Array(num*2); // Scale and rotation vec2
  const type = new Float32Array(num); // The object type - gets coerced in the fragment shader
  const vels = []; // Velocity tracking - updated in the runloop
  const spin = []; // spin tracking - updated in the runloop
  const b = new Vec2(0,0); // The position of the main barrier
  offset.set( b.array, 0 );
  sr.set( [ settings.barrierScale, 1 ], 0 );
  type.set([0], 0);

  // Loop through everything and update the properties
  for(let i=1;i<num;i++) {
    const os =                                       // Offset
          new Vec2(Math.random(),Math.random())      // Random vector
            .multiply(p.scaleNew(2).addScalar(100))  // Multiply by the window size
            .subtract(p.subtractScalarNew(100));     // center
    offset.set( os.array, i * 2 );                   // Set the offset property
    const s = .2 + Math.random();                    // Random scale
    sr.set( [ s, 0 ], i * 2 );                       // Set the scale and rotation
    vels[i] = new Vec2(0,0);                         // Set the initial velocity to zero
    spin[i] = 0;                                     // Set the initial spin to zero
    type.set([i], i)                                 // Type is just instance index
  }

  // Set up the geometry attributes. Note the instanced property
  const attributes = {
    offset : new GeometryAttribute({ instanced: 1, size: 2, data: offset }),
    scale : new GeometryAttribute({ instanced: 1, size: 2, data: sr }),
    type : new GeometryAttribute({ instanced: 1, size: 1, data: type })
  };
  const geometry = new Plane(gl, { width: 100, height: 100, attributes });

  // Create the mesh from the geo and the program
  const mesh = new Mesh(gl, { geometry, program });

  // Setup Interaction
  let isDragging = false;

  const onDown = (e) => {
    const rect = gl.canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const cx = (clientX - rect.left) - rect.width / 2;
    const cy = rect.height / 2 - (clientY - rect.top);
    
    const zoom = settings.zoom;
    const dx = cx - b.x * zoom;
    const dy = cy - b.y * zoom;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    const hitRadius = Math.max(50, settings.barrierScale * 50 * zoom);
    if (dist < hitRadius) {
      isDragging = true;
      if (settings.animation !== 'None') {
        settings.animation = 'None';
        controllers.animation.updateDisplay();
      }
      if (e.cancelable) e.preventDefault();
    }
  };

  const onMove = (e) => {
    if (!isDragging) return;
    
    const rect = gl.canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const cx = (clientX - rect.left) - rect.width / 2;
    const cy = rect.height / 2 - (clientY - rect.top);
    
    const zoom = settings.zoom;
    b.x = cx / zoom;
    b.y = cy / zoom;
    
    const margin = 100;
    b.x = Math.max(-p.x - margin, Math.min(p.x + margin, b.x));
    b.y = Math.max(-p.y - margin, Math.min(p.y + margin, b.y));
    
    offset[0] = b.x;
    offset[1] = b.y;
  };

  const onUp = () => {
    isDragging = false;
  };

  gl.canvas.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);

  gl.canvas.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp);

  // Zoom on wheel
  window.addEventListener('wheel', (e) => {
    e.preventDefault();
    const zoomFactor = 1.1;
    if (e.deltaY < 0) {
      settings.zoom *= zoomFactor;
    } else {
      settings.zoom /= zoomFactor;
    }
    settings.zoom = Math.max(0.1, Math.min(10.0, settings.zoom));
    controllers.zoom.setValue(settings.zoom);
    uniforms.u_zoom.value = settings.zoom;
  }, { passive: false });

  // Set up the run loop
  let running = true;
  let startTime = null;

  const run = (timestamp) => {
    running && requestAnimationFrame(run);
    
    if (!startTime) startTime = timestamp;
    const timeSeconds = (timestamp - startTime) * 0.001;

    // Reset settings values or update according to animation
    let barrierScale = settings.barrierScale;
    let zoom = settings.zoom;

    if (settings.animation === 'Gravity Storm') {
      g.x = Math.sin(timeSeconds * 1.5) * 1.5;
      g.y = Math.cos(timeSeconds * 1.5) * 1.5;
    } else if (settings.animation === 'Barrier Wave') {
      b.x = Math.sin(timeSeconds * 2.0) * (p.x * 0.5);
      b.y = Math.cos(timeSeconds * 1.2) * (p.y * 0.4);
      g.x = 0.0;
      g.y = -1.0;
    } else if (settings.animation === 'Cosmic Vortex') {
      b.x = Math.sin(timeSeconds * 1.2) * (p.x * 0.4);
      b.y = Math.cos(timeSeconds * 0.8) * (p.y * 0.3);
      g.x = Math.cos(timeSeconds * 1.0) * 1.2;
      g.y = Math.sin(timeSeconds * 1.0) * 1.2;
      zoom = settings.zoom * (1.0 + Math.sin(timeSeconds * 0.6) * 0.35);
    } else if (settings.animation === 'Breathing Scale') {
      barrierScale = settings.barrierScale * (1.0 + Math.sin(timeSeconds * 2.5) * 0.5);
      zoom = settings.zoom * (1.0 + Math.sin(timeSeconds * 1.2) * 0.4);
      g.x = 0.0;
      g.y = -1.0;
    } else {
      g.x = settings.gravityX;
      g.y = settings.gravityY;
    }

    uniforms.u_zoom.value = zoom;

    // Write barrier position and scale to instance arrays
    offset[0] = b.x;
    offset[1] = b.y;
    sr[0] = barrierScale;

    // Loop through our instances and update based on "physics"
    for(let i=1;i<num;i++) {
      const v = vels[i].add(g.scaleNew(sr[i*2])).scale(.95);    // Velocity is the object velocity, plus the gravity, multiplied by some frictional constant
      const os = new Vec2(offset[i*2], offset[i*2+1] ).add(v);  // Add the velocity to the offset
      const h = os.subtractNew(b);                              // Find the relational position between the falling object and the static one
      const d = sr[i*2]*50+sr[0]*50-10;                         // Find the minimum distance that can exist between the objects (fudgy, because exact distances look odd)
      if(h.lengthSquared < d*d) {                               // If the length is below the threshold, do stuff
        const ha = h.angle;                                     // Find the angle of the collision
        const hp = new Vec2(Math.cos(ha) * d, Math.sin(ha) * d);// Get the positional correction, based on this angle and the minimum length between objects
        os.resetToVector(b.addNew(hp));                         // Move the offset to the correction plus the position of the ball
        const vn = v.normaliseNew();                            // Get the velocity normal
        const ref = h.normaliseNew();                           // Get the reflection normal (the arrow pointing out of the static ball)
        const r = vn.subtractNew(ref.scale(2*vn.dot(ref)));     // Get the reflection vector of both normals
        spin[i] = Math.max(-1, Math.min(1, spin[i] + (h.angle-Math.PI*.5)*.2));// Update the spin based on the collision angle (very fudgy)
        vels[i].resetToVector(r.scale(v.length))                // Reset the velocity to the bounce velocity
      }
      sr[i*2+1] += spin[i]*.1;                                  // Set the spin
      
      // If the object is below the threshold, move it to the top
      if(os.y < -p.y-100) {
        os.x = -p.x + Math.random()*p.x*2
        os.y = p.y+100;
      }
      // Update the offset property
      offset.set( os.array, i * 2 );
    }
    // Update the attributes in place
    attributes.offset.updateAttribute(gl);
    attributes.scale.updateAttribute(gl);
    
    // Render
    r.render({ scene: mesh });
  }

  // Load all our textures. We only initiate the instance once all images are loaded.
  const textures = [
    {
      name: 'ball1',
      url: 'https://assets.codepen.io/982762/Basketball-PNG-HD.png',
      img: null
    },
    {
      name: 'ball2',
      url: 'https://assets.codepen.io/982762/tennis+1.png',
      img: null
    },
    {
      name: 'ball3',
      url: 'https://assets.codepen.io/982762/golf.png',
      img: null
    }
  ];
  const loadImage = function (imageObject) {
    let img = document.createElement('img');
    img.crossOrigin="anonymous";
    
    return new Promise((resolve, reject) => {
      img.addEventListener('load', (e) => {
        imageObject.img = img;
        resolve(imageObject);
      });
      img.addEventListener('error', (e) => {
        reject(e);
      });
      img.src = imageObject.url
    });
  }
  const loadTextures = function(textures) {
    return new Promise((resolve, reject) => {
      const loadTexture = (pointer) => {
        if(pointer >= textures.length || pointer > 10) {
          resolve(textures);
          return;
        };
        const imageObject = textures[pointer];

        const p = loadImage(imageObject);
        p.then(
          (result) => {
            
  const texture = new Texture(gl, {image:result.img});
  uniforms[`s_${result.name}`] = new Uniform({
    name: result.name,
    value: texture,
    kind: "texture"
  });
          },
          (error) => {
            console.log('error', error)
          }).finally((e) => {
            loadTexture(pointer+1);
        });
      }
      loadTexture(0);
    });
    
  }

  loadTextures(textures).then(
    (result) => {
      requestAnimationFrame(run);
    },
    (error) => {
      console.log('error');
    }
  );

  // Setup GUI UI
  const gui = new GUI({ title: 'Simulation Settings' });
  const controllers = {};

  const updateColors = () => {
    if (settings.greenScreen) {
      document.body.style.background = '#00ff00';
    } else {
      document.body.style.background = `linear-gradient(${settings.bgColor1}, ${settings.bgColor1}, ${settings.bgColor2})`;
    }
    
    uniforms.u_tint1.value = hexToRgb(settings.ball1Tint);
    uniforms.u_tint2.value = hexToRgb(settings.ball2Tint);
    uniforms.u_tint3.value = hexToRgb(settings.ball3Tint);
  };

  const applyColorScheme = () => {
    if (settings.colorScheme === 'Custom') return;
    
    const scheme = schemes[settings.colorScheme];
    if (scheme) {
      settings.ball1Tint = scheme.ball1;
      settings.ball2Tint = scheme.ball2;
      settings.ball3Tint = scheme.ball3;
      settings.bgColor1 = scheme.bg1;
      settings.bgColor2 = scheme.bg2;
      
      controllers.ball1Tint.updateDisplay();
      controllers.ball2Tint.updateDisplay();
      controllers.ball3Tint.updateDisplay();
      controllers.bgColor1.updateDisplay();
      controllers.bgColor2.updateDisplay();
    }
    updateColors();
  };

  const onCustomColorChange = () => {
    settings.colorScheme = 'Custom';
    controllers.colorScheme.updateDisplay();
    updateColors();
  };

  controllers.greenScreen = gui.add(settings, 'greenScreen').name('Green Screen').onChange(updateColors);
  controllers.zoom = gui.add(settings, 'zoom', 0.1, 5.0, 0.05).name('Zoom').onChange((v) => {
    uniforms.u_zoom.value = v;
  });
  controllers.dpr = gui.add(settings, 'dpr', 0.5, 3.0, 0.1).name('Pixel Ratio (DPR)').onChange((v) => {
    r.dpr = v;
    resize();
  });
  controllers.animation = gui.add(settings, 'animation', ['None', 'Gravity Storm', 'Barrier Wave', 'Cosmic Vortex', 'Breathing Scale']).name('Animation');
  controllers.barrierScale = gui.add(settings, 'barrierScale', 1.0, 15.0, 0.1).name('Barrier Scale');

  const fGravity = gui.addFolder('Gravity Settings');
  controllers.gravityX = fGravity.add(settings, 'gravityX', -5.0, 5.0, 0.1).name('Gravity X');
  controllers.gravityY = fGravity.add(settings, 'gravityY', -5.0, 5.0, 0.1).name('Gravity Y');
  fGravity.close();

  const fColors = gui.addFolder('Colors & Themes');
  controllers.colorScheme = fColors.add(settings, 'colorScheme', ['Monochromatic Dark', 'Neon Cyberpunk', 'Sunset Glow', 'Emerald Forest', 'Cosmic Lavender', 'Custom']).name('Theme').onChange(applyColorScheme);
  controllers.ball1Tint = fColors.addColor(settings, 'ball1Tint').name('Ball 1 Tint').onChange(onCustomColorChange);
  controllers.ball2Tint = fColors.addColor(settings, 'ball2Tint').name('Ball 2 Tint').onChange(onCustomColorChange);
  controllers.ball3Tint = fColors.addColor(settings, 'ball3Tint').name('Ball 3 Tint').onChange(onCustomColorChange);
  controllers.bgColor1 = fColors.addColor(settings, 'bgColor1').name('BG Color 1').onChange(onCustomColorChange);
  controllers.bgColor2 = fColors.addColor(settings, 'bgColor2').name('BG Color 2').onChange(onCustomColorChange);
  fColors.close();

  // Run initial color updates
  applyColorScheme();

  // Toggle UI visibility with 'H' key
  let isGuiVisible = true;
  window.addEventListener('keydown', (e) => {
    if (e.key === 'h' || e.key === 'H') {
      isGuiVisible = !isGuiVisible;
      if (isGuiVisible) {
        gui.show();
      } else {
        gui.hide();
      }
    }
  });
</script>

</body>
</html>
