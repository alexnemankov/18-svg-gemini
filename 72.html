<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Synapse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            background: #00000a;
            font-family: 'Share Tech Mono', monospace;
            user-select: none;
            cursor: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        #cursor::before, #cursor::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid rgba(0, 220, 255, 0.7);
            border-radius: 50%;
            animation: cursorPulse 2s ease-in-out infinite;
        }
        #cursor::after {
            width: 4px;
            height: 4px;
            background: rgba(0, 220, 255, 0.9);
            border: none;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            inset: auto;
        }
        @keyframes cursorPulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.5); opacity: 0.3; }
        }
        body.active #cursor::before {
            border-color: rgba(255, 80, 0, 0.9);
            animation: cursorBurst 0.3s ease-out forwards;
        }
        @keyframes cursorBurst {
            to { transform: scale(3); opacity: 0; }
        }

        #vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,8,0.85) 100%);
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.5s ease;
        }

        #scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 6;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.07) 3px,
                rgba(0, 0, 0, 0.07) 4px
            );
            opacity: 0.35;
            transition: opacity 0.5s ease;
        }

        #ui-panel {
            position: fixed;
            top: 28px;
            left: 28px;
            width: 240px;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        .border-wrap {
            position: relative;
            padding: 1px;
            border-radius: 4px;
            overflow: hidden;
            background: transparent;
        }
        .border-wrap::before {
            content: '';
            position: absolute;
            top: -100%; left: -100%;
            width: 300%; height: 300%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                transparent 70%,
                rgba(0, 200, 255, 0.6) 80%,
                rgba(120, 0, 255, 0.6) 90%,
                transparent 100%
            );
            animation: spinBorder 4s linear infinite;
            z-index: 0;
        }
        @keyframes spinBorder {
            to { transform: rotate(360deg); }
        }
        .glass-inner {
            position: relative;
            z-index: 1;
            background: rgba(2, 5, 18, 0.75);
            backdrop-filter: blur(16px) saturate(160%);
            -webkit-backdrop-filter: blur(16px) saturate(160%);
            border-radius: 3px;
            padding: 14px 16px;
            border: 1px solid rgba(0, 180, 255, 0.08);
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 160, 255, 0.15);
        }
        .status-dot {
            width: 6px; height: 6px;
            background: #00ffc8;
            border-radius: 50%;
            flex-shrink: 0;
            animation: blink 1.4s ease-in-out infinite;
            box-shadow: 0 0 6px #00ffc8;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        .panel-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: rgba(200, 230, 255, 0.9);
            text-transform: uppercase;
            flex: 1;
        }
        .panel-id {
            font-size: 0.5rem;
            color: rgba(0, 180, 255, 0.4);
            letter-spacing: 0.05em;
        }

        .telemetry { display: flex; flex-direction: column; gap: 5px; }
        .tele-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.52rem;
            letter-spacing: 0.06em;
        }
        .tele-label { color: rgba(120, 160, 200, 0.6); text-transform: uppercase; }
        .tele-val {
            color: rgba(0, 210, 255, 0.85);
            font-variant-numeric: tabular-nums;
            min-width: 72px;
            text-align: right;
        }
        .tele-val.alert { color: rgba(255, 120, 0, 0.9); }
        .tele-val.active { color: rgba(0, 255, 140, 0.9); }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }
        .bar-label { font-size: 0.5rem; color: rgba(120, 160, 200, 0.5); text-transform: uppercase; flex-shrink: 0; width: 38px; }
        .bar-track {
            flex: 1;
            height: 3px;
            background: rgba(0, 100, 160, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, rgba(0,180,255,0.6), rgba(0,255,200,0.9));
            transition: width 0.5s ease;
        }

        .divider {
            height: 1px;
            background: rgba(0, 140, 200, 0.1);
            margin: 8px 0;
        }

        .status-line {
            font-size: 0.5rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .status-line.idle { color: rgba(0, 200, 255, 0.4); animation: pulseText 2.5s ease-in-out infinite; }
        .status-line.firing { color: rgba(255, 100, 0, 0.8); animation: pulseText 0.4s ease-in-out infinite; }
        .status-line.ready { color: rgba(0, 255, 140, 0.7); animation: pulseText 2s ease-in-out infinite; }
        @keyframes pulseText {
            0%,100%{opacity:1} 50%{opacity:0.3}
        }

        #coords {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.48rem;
            letter-spacing: 0.08em;
            color: rgba(0, 160, 200, 0.3);
            line-height: 1.6;
        }
        #coords span { display: block; }

        .corner {
            position: fixed;
            width: 18px; height: 18px;
            z-index: 10;
            pointer-events: none;
            opacity: 0.25;
        }
        .corner::before, .corner::after {
            content: '';
            position: absolute;
            background: rgba(0, 180, 255, 0.7);
        }
        .corner::before { width: 100%; height: 1.5px; top: 0; left: 0; }
        .corner::after  { width: 1.5px; height: 100%; top: 0; left: 0; }
        .c-tl { top: 12px; left: 12px; }
        .c-tr { top: 12px; right: 12px; transform: scaleX(-1); }
        .c-bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
        .c-br { bottom: 12px; right: 12px; transform: scale(-1,-1); }

        @media (max-width: 600px) {
            #ui-panel { width: 190px; top: 16px; left: 16px; }
            #coords { display: none; }
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
            "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
        }
    }
    </script>
</head>
<body>

<div id="cursor"></div>

<div id="vignette"></div>
<div id="scanlines"></div>

<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<div id="ui-panel">
    <div class="border-wrap">
        <div class="glass-inner">
            <div class="panel-header">
                <div class="status-dot" id="status-dot"></div>
                <span class="panel-title">Neural Synapse</span>
                <span class="panel-id">NS-7A</span>
            </div>

            <div class="telemetry">
                <div class="tele-row">
                    <span class="tele-label">Membrane V</span>
                    <span class="tele-val" id="tele-mv">−70.0 mV</span>
                </div>
                <div class="tele-row">
                    <span class="tele-label">Dendrites</span>
                    <span class="tele-val active" id="tele-dend">247</span>
                </div>
                <div class="tele-row">
                    <span class="tele-label">Propagation</span>
                    <span class="tele-val" id="tele-prop">STANDBY</span>
                </div>
            </div>

            <div class="divider"></div>

            <div class="bar-row">
                <span class="bar-label">Signal</span>
                <div class="bar-track"><div class="bar-fill" id="bar-signal" style="width:8%"></div></div>
            </div>
            <div class="bar-row" style="margin-top:4px">
                <span class="bar-label">Axon</span>
                <div class="bar-track"><div class="bar-fill" id="bar-axon" style="width:100%; background: linear-gradient(90deg, rgba(255,80,0,0.5), rgba(255,160,0,0.8))"></div></div>
            </div>

            <div class="divider"></div>

            <div class="status-line idle" id="status-msg">▸ AWAITING STIMULUS</div>
        </div>
    </div>
</div>

<div id="coords">
    <span id="coord-x">X: 0.000</span>
    <span id="coord-y">Y: 8.000</span>
    <span id="coord-z">Z: 45.000</span>
    <span style="margin-top:4px; opacity:0.6">CAM · ORBIT MODE</span>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { GUI } from 'lil-gui';

    const cursorEl = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
        cursorEl.style.left = e.clientX + 'px';
        cursorEl.style.top  = e.clientY + 'px';
    });

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x00000a);
    scene.fog = new THREE.FogExp2(0x00000f, 0.022);

    const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 45);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping  = true;
    controls.dampingFactor  = 0.04;
    controls.autoRotate     = true;
    controls.autoRotateSpeed = 0.7;
    controls.enablePan      = true; // Drag object across screen enabled
    controls.screenSpacePanning = true;
    controls.maxDistance    = 80;
    controls.minDistance    = 5;

    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 1.0;
    bloomPass.strength  = 1.5;
    bloomPass.radius    = 0.8;

    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    const vertexShader = `
        attribute float aIsInput;
        varying vec2 vUv;
        varying vec3 vWorldPos;
        varying vec3 vNormal;
        varying float vIsInput;
        varying float vDist;

        void main() {
            vUv = uv;
            vIsInput = aIsInput;
            vec4 worldPos = modelMatrix * vec4(position, 1.0);
            vWorldPos = worldPos.xyz;
            vDist = length(worldPos.xyz);
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * viewMatrix * worldPos;
        }
    `;

    const fragmentShader = `
        uniform float uTime;
        uniform float uPulseProgress;
        uniform float uActivation;
        uniform vec3 uCameraPos;

        // Custom color uniforms
        uniform vec3 uBaseInnerColor;
        uniform vec3 uBaseOuterColor;
        uniform vec3 uPulseColor;
        uniform vec3 uActWaveColor;
        uniform vec3 uSomaFlashColor;

        varying vec2 vUv;
        varying vec3 vWorldPos;
        varying vec3 vNormal;
        varying float vIsInput;
        varying float vDist;

        float hash(vec3 p) {
            p = fract(p * 0.3183099 + .1);
            p *= 17.0;
            return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
        }
        float noise(vec3 x) {
            vec3 i = floor(x);
            vec3 f = fract(x);
            f = f*f*(3.0-2.0*f);
            return mix(
                mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                    mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                    mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
        }
        vec3 palette(float t, vec3 a, vec3 b, vec3 c, vec3 d) {
            return a + b * cos(6.28318*(c*t+d));
        }

        void main() {
            vec3 viewDir = normalize(uCameraPos - vWorldPos);
            float fresnel = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 3.0);
            float n1 = noise(vWorldPos * 0.5 + uTime * 0.2);
            float n2 = noise(vWorldPos * 2.0 - uTime * 0.5);

            vec3 baseColor = uBaseInnerColor + (uBaseOuterColor * fresnel * n1);
            baseColor *= (0.5 + 0.5 * n2);

            vec3 pulseColor = vec3(0.0);
            if (vIsInput > 0.5 && uPulseProgress > -5.0) {
                float pDist  = abs(vDist - uPulseProgress);
                float core   = exp(-pDist * pDist * 3.0);
                float trail  = smoothstep(6.0, 0.0, vDist - uPulseProgress) * smoothstep(-2.0, 0.0, uPulseProgress - vDist);
                float pi     = max(core * 3.0, trail * 1.5);
                pulseColor   = uPulseColor * pi * (0.8 + 0.2*n2);
            }

            vec3 actColor = vec3(0.0);
            if (uActivation > 0.0) {
                float distFromWave = vDist - uActivation;
                float waveFront    = exp(-pow(distFromWave, 2.0) * 0.2) * step(0.0, -distFromWave);
                float residual     = smoothstep(uActivation, uActivation - 25.0, vDist);
                float actIntensity = waveFront * 4.0 + residual * 1.5;
                actIntensity      *= (0.6 + 0.4 * noise(vWorldPos * 1.5 - uTime * 2.0));

                vec3 dir    = normalize(vWorldPos);
                float angle = atan(dir.z, dir.x);
                vec3 rainbow = palette(
                    angle * 0.15 + vDist * 0.05 - uTime * 0.5,
                    vec3(0.5,0.5,0.5), vec3(0.5,0.5,0.5),
                    vec3(1.0,1.0,1.0), vec3(0.00,0.33,0.67)
                );
                actColor = rainbow * uActWaveColor * actIntensity * 1.5;
                if (vDist < 4.0) {
                    float somaFlash = exp(-pow(uActivation * 0.2, 2.0)) * 2.5;
                    actColor += uSomaFlashColor * somaFlash;
                }
            }

            gl_FragColor = vec4(baseColor + pulseColor + actColor, 1.0);
        }
    `;

    const material = new THREE.ShaderMaterial({
        vertexShader, fragmentShader,
        uniforms: {
            uTime:          { value: 0 },
            uPulseProgress: { value: -10.0 },
            uActivation:    { value: 0 },
            uCameraPos:     { value: new THREE.Vector3() },
            uBaseInnerColor: { value: new THREE.Color() },
            uBaseOuterColor: { value: new THREE.Color() },
            uPulseColor:     { value: new THREE.Color() },
            uActWaveColor:   { value: new THREE.Color() },
            uSomaFlashColor: { value: new THREE.Color() }
        },
        transparent: false,
        depthWrite:  true,
        side: THREE.FrontSide
    });

    const structureGroup = new THREE.Group();
    scene.add(structureGroup);

    function createWanderingPath(start, dir, length, segments, jitterScale, endPoint) {
        let pts = [start.clone()];
        let curr = start.clone();
        let cDir = dir.clone().normalize();
        for (let i = 0; i < segments; i++) {
            cDir.x += (Math.random() - 0.5) * jitterScale;
            cDir.y += (Math.random() - 0.5) * jitterScale;
            cDir.z += (Math.random() - 0.5) * jitterScale;
            cDir.normalize();
            curr = curr.clone().add(cDir.clone().multiplyScalar(length / segments));
            pts.push(curr);
        }
        if (endPoint) {
            const approach = endPoint.clone().add(new THREE.Vector3(-1.5, 0, 0));
            pts[pts.length - 1] = approach;
            pts.push(endPoint.clone());
        }
        return new THREE.CatmullRomCurve3(pts);
    }

    function taperGeometry(geo, baseRadius, isInput) {
        const pos  = geo.attributes.position;
        const norm = geo.attributes.normal;
        const uv   = geo.attributes.uv;
        for (let i = 0; i < pos.count; i++) {
            const u = uv.getX(i);
            let t   = isInput ? 1.0 : (1.0 - u);
            const taper = Math.pow(t, 0.6);
            const shrink = baseRadius * (1.0 - taper);
            pos.setXYZ(i,
                pos.getX(i) - norm.getX(i) * shrink,
                pos.getY(i) - norm.getY(i) * shrink,
                pos.getZ(i) - norm.getZ(i) * shrink
            );
        }
        geo.computeVertexNormals();
    }

    function addBranch(curve, radius, isInput) {
        const geo = new THREE.TubeGeometry(curve, Math.floor(curve.getLength() * 3), radius, 12, false);
        taperGeometry(geo, radius, isInput);
        const arr = new Float32Array(geo.attributes.position.count).fill(isInput ? 1.0 : 0.0);
        geo.setAttribute('aIsInput', new THREE.BufferAttribute(arr, 1));
        structureGroup.add(new THREE.Mesh(geo, material));
        return { curve };
    }

    const somaRadius = 3.3;
    const somaGeo = new THREE.IcosahedronGeometry(somaRadius, 16);
    const pos = somaGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        let v = new THREE.Vector3().fromBufferAttribute(pos, i);
        let n = Math.sin(v.x*2)*Math.cos(v.y*2)*Math.sin(v.z*2)*0.5 + Math.sin(v.x*5+v.y*3)*0.2;
        v.add(v.clone().normalize().multiplyScalar(n));
        pos.setXYZ(i, v.x, v.y, v.z);
    }
    somaGeo.computeVertexNormals();
    const somaIsInput = new Float32Array(pos.count).fill(0.0);
    somaGeo.setAttribute('aIsInput', new THREE.BufferAttribute(somaIsInput, 1));
    structureGroup.add(new THREE.Mesh(somaGeo, material));

    const inputCurve = createWanderingPath(
        new THREE.Vector3(-45, 0, 0), new THREE.Vector3(1, 0, 0), 46, 30, 0.05,
        new THREE.Vector3(-somaRadius * 0.1, 0, 0)
    );
    addBranch(inputCurve, 0.6, true);

    for (let i = 0; i < 18; i++) {
        let phi   = Math.random() * Math.PI * 2;
        let theta = Math.acos(Math.random() * 2 - 1);
        if (Math.cos(phi) * Math.sin(theta) < -0.3)
            phi = phi > Math.PI ? phi - Math.PI : phi + Math.PI;

        let startDir = new THREE.Vector3(
            Math.cos(phi)*Math.sin(theta),
            Math.sin(phi)*Math.sin(theta),
            Math.cos(theta)
        );
        let start = startDir.clone().multiplyScalar(somaRadius * 0.8);
        let length  = 20 + Math.random() * 30;
        let mainRadius = 0.4 + Math.random() * 0.3;
        let { curve: mainCurve } = addBranch(
            createWanderingPath(start, startDir, length, 25, 0.4),
            mainRadius, false
        );

        let numSec = Math.floor(Math.random() * 4) + 2;
        for (let j = 0; j < numSec; j++) {
            let t = 0.2 + Math.random() * 0.6;
            let bStart = mainCurve.getPoint(t);
            let tangent = mainCurve.getTangent(t);
            let rv = new THREE.Vector3(Math.random()-.5, Math.random()-.5, Math.random()-.5).normalize();
            let bDir = tangent.clone().cross(rv).normalize().add(tangent.multiplyScalar(0.5)).normalize();
            addBranch(
                createWanderingPath(bStart, bDir, (1-t)*length*(0.4+Math.random()*0.4), 15, 0.6),
                mainRadius*(1-t)*0.8, false
            );
        }
    }

    function makeParticles(count, spread, colorHex, size, opacity) {
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * spread;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({
            color: colorHex,
            size,
            transparent: true,
            opacity,
            blending:   THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true
        });
        return new THREE.Points(geo, mat);
    }

    const dustA = makeParticles(1200, 120, 0x224466, 0.08, 0.25);
    const dustB = makeParticles(400,  90, 0x003355, 0.16, 0.18);
    const dustC = makeParticles(120,  60, 0x00aacc, 0.30, 0.12);
    scene.add(dustA, dustB, dustC);

    const elMv     = document.getElementById('tele-mv');
    const elProp   = document.getElementById('tele-prop');
    const elSignal = document.getElementById('bar-signal');
    const elAxon   = document.getElementById('bar-axon');
    const elStatus = document.getElementById('status-msg');
    const elDot    = document.getElementById('status-dot');
    const elPanel  = document.getElementById('ui-panel');
    const elCoordX = document.getElementById('coord-x');
    const elCoordY = document.getElementById('coord-y');
    const elCoordZ = document.getElementById('coord-z');

    let state = 0;
    let pulseProg = -10.0;
    let actProg   = 0.0;
    const INPUT_LENGTH = 45.0;

    let mvBase = -70.0;
    let mvTarget = -70.0;

    // 5 Pre-configured IT/Tech themed presets
    const presets = {
        'Quantum AI (Default)': {
            baseInnerColor: '#010308',
            baseOuterColor: '#143847',
            pulseColor: '#ff4800',
            pulseIntensity: 3.5,
            actWaveColor: '#ffffff',
            actWaveIntensity: 1.0,
            somaFlashColor: '#ffeedd',
            somaFlashIntensity: 2.5,
            bgColor: '#00000a',
            fogDensity: 0.022,
            bloomStrength: 1.5,
            bloomRadius: 0.8,
            bloomThreshold: 1.0
        },
        'Cyberpunk Grid': {
            baseInnerColor: '#0c001a',
            baseOuterColor: '#00ffea',
            pulseColor: '#ff00a0',
            pulseIntensity: 4.0,
            actWaveColor: '#00ff55',
            actWaveIntensity: 1.2,
            somaFlashColor: '#ffffff',
            somaFlashIntensity: 3.0,
            bgColor: '#06000d',
            fogDensity: 0.02,
            bloomStrength: 1.8,
            bloomRadius: 0.9,
            bloomThreshold: 1.0
        },
        'Matrix Terminal': {
            baseInnerColor: '#000b00',
            baseOuterColor: '#003b00',
            pulseColor: '#00ff00',
            pulseIntensity: 3.0,
            actWaveColor: '#88ff88',
            actWaveIntensity: 1.0,
            somaFlashColor: '#ffffff',
            somaFlashIntensity: 2.0,
            bgColor: '#000500',
            fogDensity: 0.025,
            bloomStrength: 1.4,
            bloomRadius: 0.7,
            bloomThreshold: 1.0
        },
        'Carbon Core': {
            baseInnerColor: '#0f0101',
            baseOuterColor: '#660000',
            pulseColor: '#ff3300',
            pulseIntensity: 4.5,
            actWaveColor: '#ff9900',
            actWaveIntensity: 1.5,
            somaFlashColor: '#fff0e0',
            somaFlashIntensity: 3.5,
            bgColor: '#0a0000',
            fogDensity: 0.02,
            bloomStrength: 2.0,
            bloomRadius: 0.8,
            bloomThreshold: 1.0
        },
        'Biosynthetic Synth': {
            baseInnerColor: '#050505',
            baseOuterColor: '#7700ff',
            pulseColor: '#00ffd5',
            pulseIntensity: 3.8,
            actWaveColor: '#ff00ee',
            actWaveIntensity: 1.3,
            somaFlashColor: '#ffffff',
            somaFlashIntensity: 2.8,
            bgColor: '#050505',
            fogDensity: 0.018,
            bloomStrength: 1.6,
            bloomRadius: 0.85,
            bloomThreshold: 1.0
        }
    };

    const params = {
        preset: 'Quantum AI (Default)',
        greenscreen: false,
        autoAnimate: true,
        autoAnimateDelay: 1.5,
        
        // Colors
        baseInnerColor: '#010308',
        baseOuterColor: '#143847',
        pulseColor: '#ff4800',
        pulseIntensity: 3.5,
        actWaveColor: '#ffffff',
        actWaveIntensity: 1.0,
        somaFlashColor: '#ffeedd',
        somaFlashIntensity: 2.5,
        
        // Background / Fog
        bgColor: '#00000a',
        fogDensity: 0.022,
        
        // Postprocessing
        bloomStrength: 1.5,
        bloomRadius: 0.8,
        bloomThreshold: 1.0
    };

    // Color instances to avoid allocations
    const innerColorTmp = new THREE.Color();
    const outerColorTmp = new THREE.Color();
    const pulseColorTmp = new THREE.Color();
    const actColorTmp = new THREE.Color();
    const flashColorTmp = new THREE.Color();

    function updateColors() {
        innerColorTmp.set(params.baseInnerColor);
        outerColorTmp.set(params.baseOuterColor);
        pulseColorTmp.set(params.pulseColor).multiplyScalar(params.pulseIntensity);
        actColorTmp.set(params.actWaveColor).multiplyScalar(params.actWaveIntensity);
        flashColorTmp.set(params.somaFlashColor).multiplyScalar(params.somaFlashIntensity);
        
        material.uniforms.uBaseInnerColor.value.copy(innerColorTmp);
        material.uniforms.uBaseOuterColor.value.copy(outerColorTmp);
        material.uniforms.uPulseColor.value.copy(pulseColorTmp);
        material.uniforms.uActWaveColor.value.copy(actColorTmp);
        material.uniforms.uSomaFlashColor.value.copy(flashColorTmp);
    }

    let uiVisible = true;

    function updateCursorVisibility() {
        if (!uiVisible) {
            cursorEl.style.display = 'none';
            document.body.style.cursor = 'none';
        } else if (params.greenscreen) {
            cursorEl.style.display = 'none';
            document.body.style.cursor = 'default';
        } else {
            cursorEl.style.display = '';
            document.body.style.cursor = 'none';
        }
    }

    function updateBackground() {
        if (params.greenscreen) {
            scene.background.set(0x00ff00);
            scene.fog.color.set(0x00ff00);
            scene.fog.density = 0;
            
            document.getElementById('vignette').style.opacity = '0';
            document.getElementById('scanlines').style.opacity = '0';
            
            dustA.visible = false;
            dustB.visible = false;
            dustC.visible = false;
        } else {
            scene.background.set(params.bgColor);
            scene.fog.color.set(params.bgColor);
            scene.fog.density = params.fogDensity;
            
            document.getElementById('vignette').style.opacity = '1';
            document.getElementById('scanlines').style.opacity = '0.35';
            
            dustA.visible = true;
            dustB.visible = true;
            dustC.visible = true;
        }
        updateCursorVisibility();
    }

    function updatePostprocessing() {
        bloomPass.strength = params.bloomStrength;
        bloomPass.radius = params.bloomRadius;
        bloomPass.threshold = params.bloomThreshold;
    }

    // Recursively updates the GUI display values
    function updateGuiDisplay() {
        const updateFolder = (g) => {
            g.controllers.forEach(c => c.updateDisplay());
            g.folders.forEach(f => updateFolder(f));
        };
        updateFolder(gui);
    }

    function applyPreset(name) {
        const preset = presets[name];
        if (!preset) return;
        
        Object.keys(preset).forEach(key => {
            params[key] = preset[key];
        });
        
        updateGuiDisplay();
        updateColors();
        updateBackground();
        updatePostprocessing();
    }

    // Trigger Action Potential Propagation
    function triggerPulse() {
        if (state !== 0) return;
        state = 1;
        pulseProg = INPUT_LENGTH;
        actProg   = 0.0;
        material.uniforms.uActivation.value = 0.0;
        elPanel.style.opacity = '0';
        document.body.classList.add('active');
        setTimeout(() => document.body.classList.remove('active'), 300);
        mvTarget = 40.0;
    }

    window.addEventListener('click', e => {
        // Prevent trigger if clicking on GUI or UI panel
        if (e.target.closest('.lil-gui') || e.target.closest('#ui-panel')) return;
        triggerPulse();
    });

    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        composer.setSize(innerWidth, innerHeight);
    });

    // Setup GUI
    const gui = new GUI({ title: 'NS-7A Controls' });
    gui.add(params, 'preset', Object.keys(presets)).name('Preset Theme').onChange(applyPreset);

    const genFolder = gui.addFolder('General');
    genFolder.add(params, 'greenscreen').name('Greenscreen').onChange(updateBackground);
    genFolder.add(params, 'autoAnimate').name('Auto Animate');
    genFolder.add(params, 'autoAnimateDelay', 0.5, 5.0, 0.1).name('Delay (s)');

    const colorFolder = gui.addFolder('Custom Colors');
    colorFolder.addColor(params, 'baseInnerColor').name('Base Inner').onChange(updateColors);
    colorFolder.addColor(params, 'baseOuterColor').name('Base Outer').onChange(updateColors);
    colorFolder.addColor(params, 'pulseColor').name('Pulse Color').onChange(updateColors);
    colorFolder.add(params, 'pulseIntensity', 0.1, 10.0, 0.1).name('Pulse Power').onChange(updateColors);
    colorFolder.addColor(params, 'actWaveColor').name('Act Wave').onChange(updateColors);
    colorFolder.add(params, 'actWaveIntensity', 0.1, 5.0, 0.1).name('Wave Power').onChange(updateColors);
    colorFolder.addColor(params, 'somaFlashColor').name('Soma Flash').onChange(updateColors);
    colorFolder.add(params, 'somaFlashIntensity', 0.1, 10.0, 0.1).name('Flash Power').onChange(updateColors);
    colorFolder.close();

    const envFolder = gui.addFolder('Environment');
    envFolder.addColor(params, 'bgColor').name('Background').onChange(updateBackground);
    envFolder.add(params, 'fogDensity', 0.0, 0.1, 0.001).name('Fog Density').onChange(updateBackground);
    envFolder.close();

    const bloomFolder = gui.addFolder('Bloom');
    bloomFolder.add(params, 'bloomStrength', 0.0, 5.0, 0.1).name('Strength').onChange(updatePostprocessing);
    bloomFolder.add(params, 'bloomRadius', 0.0, 2.0, 0.05).name('Radius').onChange(updatePostprocessing);
    bloomFolder.add(params, 'bloomThreshold', 0.0, 1.0, 0.05).name('Threshold').onChange(updatePostprocessing);
    bloomFolder.close();

    // Toggle UI Visibility with 'H' Key
    function toggleUI() {
        uiVisible = !uiVisible;
        const displayVal = uiVisible ? '' : 'none';
        
        elPanel.style.display = displayVal;
        document.getElementById('coords').style.display = displayVal;
        document.querySelectorAll('.corner').forEach(el => {
            el.style.display = displayVal;
        });

        updateCursorVisibility();
        
        if (uiVisible) {
            gui.show();
        } else {
            gui.hide();
        }
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'h' || e.key === 'H') {
            toggleUI();
        }
    });

    // Initialize state
    applyPreset('Quantum AI (Default)');

    const clock = new THREE.Clock();
    let frameCount = 0;
    let autoAnimateTimer = 0;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        frameCount++;

        controls.update();

        if (dustA.visible) {
            dustA.rotation.y += delta * 0.008;
            dustA.rotation.x += delta * 0.003;
            dustB.rotation.y -= delta * 0.005;
            dustB.rotation.z += delta * 0.002;
            dustC.rotation.y += delta * 0.015;
        }

        material.uniforms.uTime.value += delta;
        material.uniforms.uCameraPos.value.copy(camera.position);

        mvBase += (Math.random() - 0.5) * 0.4;
        mvBase = Math.max(-80, Math.min(-55, mvBase));
        mvTarget += (mvBase - mvTarget) * 0.05;

        // Auto Infinite Animation Cycle
        if (state === 0) {
            if (params.autoAnimate) {
                autoAnimateTimer += delta;
                if (autoAnimateTimer > params.autoAnimateDelay) {
                    triggerPulse();
                    autoAnimateTimer = 0;
                }
            }
        } else {
            autoAnimateTimer = 0;
        }

        if (state === 1) {
            pulseProg -= delta * 35.0;
            material.uniforms.uPulseProgress.value = pulseProg;
            mvTarget = 40.0 * (1.0 - pulseProg / INPUT_LENGTH);

            if (pulseProg <= 2.0) {
                state = 2;
                pulseProg = -10.0;
                material.uniforms.uPulseProgress.value = -10.0;
                actProg = 0.0;
                camera.position.y += 0.5;
            }
        } else if (state === 2) {
            actProg += delta * 20.0;
            material.uniforms.uActivation.value = actProg;

            if (actProg > 75.0) {
                state = 0;
                material.uniforms.uActivation.value = 0.0;
                mvTarget = -70.0;
                elStatus.textContent = '▸ RETRIGGER AVAILABLE';
                elStatus.className   = 'status-line ready';
                elDot.style.background = '#00ffc8';
                elDot.style.boxShadow  = '0 0 6px #00ffc8';
                elPanel.style.opacity  = '1';
            }
        }

        if (frameCount % 6 === 0) {
            const mv = state === 0 ? mvBase : mvTarget;
            elMv.textContent = (mv >= 0 ? '+' : '') + mv.toFixed(1) + ' mV';
            elMv.className   = 'tele-val' + (mv > 0 ? ' alert' : '');

            if (state === 0) {
                elProp.textContent   = 'STANDBY';
                elProp.className     = 'tele-val';
                elStatus.textContent = '▸ AWAITING STIMULUS';
                elStatus.className   = 'status-line idle';
                elSignal.style.width = (6 + Math.random() * 4) + '%';
                elDot.style.background  = '#00ffc8';
                elDot.style.boxShadow   = '0 0 6px #00ffc8';
            } else if (state === 1) {
                const pct = Math.max(0, Math.min(100, (1 - pulseProg / INPUT_LENGTH) * 100));
                elProp.textContent = 'PROPAGATING';
                elProp.className   = 'tele-val alert';
                elStatus.textContent = '▸ SIGNAL INCOMING';
                elStatus.className   = 'status-line firing';
                elSignal.style.width = pct + '%';
                elSignal.style.background = 'linear-gradient(90deg, rgba(255,80,0,0.6), rgba(255,200,0,0.9))';
                elDot.style.background  = '#ff6000';
                elDot.style.boxShadow   = '0 0 8px #ff4000';
            } else if (state === 2) {
                const pct = Math.min(100, actProg / 75 * 100);
                elProp.textContent = 'FIRING';
                elProp.className   = 'tele-val active';
                elStatus.textContent = '▸ ACTION POTENTIAL';
                elStatus.className   = 'status-line firing';
                elSignal.style.width = (100 - pct * 0.7) + '%';
                elSignal.style.background = 'linear-gradient(90deg, rgba(0,255,120,0.6), rgba(0,200,255,0.9))';
                elAxon.style.width = Math.max(0, 100 - pct) + '%';
                elDot.style.background  = '#ff00aa';
                elDot.style.boxShadow   = '0 0 10px #ff00aa';
            }
        }

        if (frameCount % 10 === 0) {
            elCoordX.textContent = 'X: ' + camera.position.x.toFixed(3);
            elCoordY.textContent = 'Y: ' + camera.position.y.toFixed(3);
            elCoordZ.textContent = 'Z: ' + camera.position.z.toFixed(3);
        }

        composer.render();
    }

    animate();
</script>
</body>
</html>
