<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎢</title>
  <style>
    ::-webkit-scrollbar {
      width: 0.625rem;
      height: 0.625rem;
    }
    ::-webkit-scrollbar-thumb {
      background: #111;
      border-radius: 0.3125rem;
      box-shadow: inset 0.125rem 0.125rem 0.125rem rgba(255, 255, 255, 0.25),
        inset -0.125rem -0.125rem 0.125rem rgba(0, 0, 0, 0.25);
      cursor: default;
    }
    ::-webkit-scrollbar-track {
      background: #333;
    }
    ::selection {
      background: #fff;
      color: #333;
    }
    html,
    body {
      height: 100vh;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
    }
    body {
      display: grid;
      grid-template-rows: calc(100dvh - 4rem) 4rem;
      font-family: system-ui, sans-serif;
      background: black;
    }
    canvas,
    .editor,
    #controls {
      grid-row: 1;
      grid-column: 1;
    }
    canvas {
      width: 100%;
      height: auto;
      object-fit: contain;
      background: black;
      touch-action: none;
    }
    .editor,
    .overlay,
    #error {
      background: repeating-linear-gradient(0deg, #000a, #1119, #000a .25rem);
      padding: 1em;
    }
    .editor {
      color: #fefefe;
      tab-size: 2;
      border: none;
      resize: none;
    }
    .editor:focus {
      outline: none;
    }
    #error {
      grid-row: 2;
      grid-column: 1;
      margin: 0;
      padding-block: 0;
      padding-top: .5em;
      color: firebrick;
      overflow: auto;
      text-wrap: pretty;
    }
    #indicator {
      visibility: hidden;
      position: absolute;
      top: calc(var(--top, 0px) - var(--scroll-top, 0px));
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 10px solid firebrick;
      transform: translateY(-25%);
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      margin: 0;
    }
    .editor,
    .overlay {
      font-size: 1rem;
      line-height: 1.2;
      white-space: pre;
    }
    #controls {
      position: fixed;
      top: 1em;
      right: 2em;
    }
    .controls {
      position: relative;
      display: flex;
      gap: 1.5em;
      padding: .5em 1.25em;
      background: #1111;
      border-radius: 4px;
    }
    .controls::before,
    .controls::after {
      content: '';
      position: absolute;
      z-index: -1;
      inset: 0;
      transform: scale(.95);
      border-radius: inherit;
      opacity: 0;
    }
    .controls::before {
      background: #aef;
      animation: pulse 2s infinite;
    }
    .controls::after {
      background: #fefefe66;
      transition: transform 200ms ease-in-out;
    }
    .controls:hover::before,
    .controls:hover::after {
      opacity: 1;
    }
    .controls:hover::before {
      transform: scale(.98);
      filter: blur(2px);
    }
    .controls:hover::after {
      transform: scale(1.025, 1.1);
    }
    .controls:hover {
      background: #111f;
    }
    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.0125);
      }
      100% {
        transform: scale(1);
      }
    }
    .hidden {
      display: none !important;
    }
    .opaque {
      opacity: 1 !important;
      background: #111 !important;
    }
    input {
      all: unset;
      opacity: .2;
      filter: saturate(0) invert(1);
      cursor: pointer;
      transition: opacity 200ms ease-in-out;
      padding: .25em .5em;
    }
    input:hover {
      opacity: 1;
    }
    .icon {
      text-align: center;
      line-height: 1;
    }
    #btnToggleView {
      width: 1.25em;
    }
    #btnToggleView::after {
      content: '👁';
    }
    #btnToggleView:checked::after {
      content: '✏️';
    }
    #btnToggleResolution::after {
      content: '1️⃣';
    }
    #btnToggleResolution:checked::after {
      content: '2️⃣';
    }
    #btnReset::after {
      content: '⏮️';
    }

    /* Custom style overrides for lil-gui to make it look premium and dark */
    .lil-gui {
      --background-color: rgba(20, 20, 20, 0.85) !important;
      --text-color: #f3f3f3 !important;
      --title-background-color: rgba(10, 10, 10, 0.9) !important;
      --widget-color: rgba(35, 35, 35, 0.9) !important;
      --hover-color: rgba(50, 50, 50, 0.9) !important;
      --focus-color: rgba(75, 75, 75, 0.9) !important;
      --number-color: #00ffcc !important;
      --string-color: #ff00ff !important;
      font-family: system-ui, sans-serif !important;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Global UI Toggle Visibility Styles */
    body.hidden-ui #controls,
    body.hidden-ui .lil-gui,
    body.hidden-ui #codeEditor,
    body.hidden-ui #error,
    body.hidden-ui #indicator {
      display: none !important;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <textarea id="codeEditor" class="editor" spellcheck="false" autocorrect="off" autocapitalize="off" translate="no" oninput="render()"></textarea>
  <pre id="error"></pre>
  <div id="indicator"></div>
  <div id="controls">
    <div class="controls">
      <input id="btnToggleView" class="icon" type="checkbox" name="toggleView" onclick="toggleView()">
      <input id="btnToggleResolution" class="icon" type="checkbox" name="toggleResolution" onchange="toggleResolution()">
      <input id="btnReset" class="icon" type="checkbox" name="reset" onclick="reset()">
    </div>
  </div>

  <script type="x-shader/x-fragment">#version 300 es
precision highp float;
out vec4 O;
uniform vec2 resolution;
uniform float time;
uniform sampler2D pebbles;

// New uniforms for interactive settings
uniform vec2 u_offset;
uniform float u_zoom;
uniform vec3 u_nebulaColor;
uniform vec3 u_bgColor;
uniform vec3 u_colorScale;
uniform bool u_greenscreen;
uniform int u_animPreset;

#define FC gl_FragCoord.xy
#define T time
#define R resolution
#define MN min(R.x,R.y)

// Returns a pseudo random number for a given point (white noise)
float rnd(vec2 p) {
  p=fract(p*vec2(12.9898,78.233));
  p+=dot(p,p+34.56);
  return fract(p.x*p.y);
}
// Returns a pseudo random number for a given point (value noise)
float noise(in vec2 p) {
  vec2 i=floor(p), f=fract(p), u=f*f*(3.-2.*f);
  float
  a=rnd(i),
  b=rnd(i+vec2(1,0)),
  c=rnd(i+vec2(0,1)),
  d=rnd(i+1.);
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
}
// Returns a pseudo random number for a given point (fractal noise)
float fbm(vec2 p) {
  float t=.0, a=1.; mat2 m=mat2(1.,-.5,.2,1.2);
  for (int i=0; i<5; i++) {
    t+=a*noise(p);
    p*=2.*m;
    a*=.5;
  }
  return t;
}
float clouds(vec2 p) {
	float d=1., t=.0;
	for (float i=.0; i<3.; i++) {
		float a=d*fbm(i*10.+p.x*.2+.2*(1.+i)*p.y+d+i*i+p);
		t=mix(t,d,a);
		d=a;
		p*=2./(i+1.);
	}
	return t;
}
void main(void) {
	vec2 uv=(FC-.5*R)/MN;
	
	// Apply zoom and offset from PointerHandler
	uv = uv * u_zoom + u_offset;
	
	vec2 st=uv*vec2(2,1);
	vec3 col=vec3(0);
	
	// 1. Background clouds drift based on u_animPreset
	float bg;
	if (u_animPreset == 5) { // Static
		bg = clouds(vec2(st.x, -st.y));
	} else if (u_animPreset == 1) { // Nebula Waltz
		bg = clouds(vec2(st.x + T * 0.2, -st.y - T * 0.1));
	} else if (u_animPreset == 2) { // Deep Breath
		bg = clouds(vec2(st.x + T * 0.3, -st.y + T * 0.1));
	} else if (u_animPreset == 3) { // Hyper-Space Glide
		bg = clouds(vec2(st.x + T * 0.4, -st.y));
	} else if (u_animPreset == 4) { // Spiral Warp
		bg = clouds(vec2(st.x + T * 0.2, -st.y + T * 0.2));
	} else { // Default Cosmic Drift (Preset 0)
		bg = clouds(vec2(st.x + T * .5, -st.y));
	}
	
	// 2. Camera movements based on u_animPreset
	if (u_animPreset == 0) { // Cosmic Drift (original pulsation)
		uv *= 1. - .3 * (sin(T * .2) * .5 + .5);
	} else if (u_animPreset == 1) { // Nebula Waltz (slow rotation)
		float theta = T * 0.08;
		mat2 rot = mat2(cos(theta), -sin(theta), sin(theta), cos(theta));
		uv = rot * uv;
	} else if (u_animPreset == 2) { // Deep Breath (strong slow pulsation)
		uv *= 1. - .5 * (sin(T * 0.1) * 0.5 + 0.5);
	} else if (u_animPreset == 3) { // Hyper-Space Glide (panning)
		uv += vec2(sin(T * 0.15) * 0.3, cos(T * 0.1) * 0.15);
	} else if (u_animPreset == 4) { // Spiral Warp (spiral twist)
		float r = length(uv);
		float theta = T * 0.05 + 1.2 * r;
		uv = vec2(cos(theta)*uv.x - sin(theta)*uv.y, sin(theta)*uv.x + cos(theta)*uv.y);
	}
	
	for (float i=1.; i<12.; i++) {
		if (u_animPreset == 5) { // Static
			uv += .1 * cos(i * vec2(.1 + .01 * i, .8) + i * i + 0.1 * uv.x);
		} else if (u_animPreset == 1) { // Waltz
			uv += .1 * cos(i * vec2(.1 + .01 * i, .8) + i * i + T * 0.3 + 0.1 * uv.x);
		} else if (u_animPreset == 2) { // Breath
			uv += .1 * cos(i * vec2(.1 + .01 * i, .8) + i * i + T * 0.2 + 0.1 * uv.x);
		} else if (u_animPreset == 3) { // Glide
			uv += .1 * cos(i * vec2(.1 + .01 * i, .8) + i * i + T * 0.4 + 0.1 * uv.x);
		} else if (u_animPreset == 4) { // Warp
			uv += .1 * cos(i * vec2(.1 + .01 * i, .8) + i * i + T * 0.25 + 0.1 * uv.x);
		} else { // Cosmic Drift (default)
			uv += .1 * cos(i * vec2(.1 + .01 * i, .8) + i * i + T * .5 + .1 * uv.x);
		}
		
		vec2 p=uv;
		float d=length(p);
		
		// Apply u_nebulaColor tint and u_colorScale phase
		col += .00125 / d * (cos(sin(i) * u_colorScale) + 1.) * u_nebulaColor;
		
		float b=noise(i+p+bg*1.731);
		col+=.002*b/length(max(p,vec2(b*p.x*.02,p.y)));
		
		// If u_greenscreen is enabled, blend to pure green #00ff00, else use u_bgColor tint
		vec3 targetBg = u_greenscreen ? vec3(0.0, 1.0, 0.0) : bg * u_bgColor;
		col = mix(col, targetBg, d);
	}
	O=vec4(col,1);
}</script>

  <script>
    /*********
     * made by Matthias Hurrle (@atzedent)
     */
    let editMode = false // set to false to hide the code editor on load
    let resolution = .5 // set 1 for full resolution or to .5 to start with half resolution on load
    let renderDelay = 1000 // delay in ms before rendering the shader after a change
    
    let customTime = 0
    let lastTime = 0
    let dpr = Math.max(1, resolution * window.devicePixelRatio)
    let frm, source, editor, store, renderer, pointers
    const shaderId = 'Star Treck'

    // Color Preset Schemes
    const colorPresets = {
      'Default Star Trek': { nebulaColor: '#ffffff', bgColor: '#40230d', colorScale: [1.0, 2.0, 3.0] },
      'Neon Cyberpunk':    { nebulaColor: '#ff00cc', bgColor: '#0c021f', colorScale: [3.0, 1.0, 4.0] },
      'Solar Flare':      { nebulaColor: '#ff5500', bgColor: '#260800', colorScale: [1.5, 0.7, 0.1] },
      'Deep Ocean':       { nebulaColor: '#00ffcc', bgColor: '#000d1a', colorScale: [0.5, 1.8, 3.5] },
      'Emerald Aurora':   { nebulaColor: '#33ff33', bgColor: '#001a08', colorScale: [0.3, 3.0, 1.2] }
    };

    // Animation Presets
    const animPresets = {
      'Cosmic Drift':     0,
      'Nebula Waltz':     1,
      'Deep Breath':      2,
      'Hyper-Space Glide': 3,
      'Spiral Warp':      4,
      'Static':           5
    };

    // Initial settings for GUI controls
    const settings = {
      greenscreen: false,
      dpr: Math.max(0.25, resolution * window.devicePixelRatio),
      animationSpeed: 1.0,
      colorScheme: 'Default Star Trek',
      nebulaColor: '#ffffff',
      bgColor: '#40230d',
      colorScale: [1.0, 2.0, 3.0],
      animationPreset: 'Cosmic Drift',
      zoom: 1.0,
      offsetX: 0.0,
      offsetY: 0.0,
      resetView: () => {
        settings.zoom = 1.0;
        settings.offsetX = 0.0;
        settings.offsetY = 0.0;
        if (pointers) {
          pointers.offset = [0, 0];
        }
        if (zoomController) zoomController.setValue(settings.zoom);
      }
    };

    let GUI;
    let gui, zoomController, dprController, schemeController, nebulaColorController, bgColorController;

    function initGUI() {
      if (!GUI) return;
      gui = new GUI({ title: 'Settings' });

      // Positioning for lil-gui panel to avoid conflicts with existing UI controls
      gui.domElement.style.position = 'fixed';
      gui.domElement.style.top = '10px';
      gui.domElement.style.left = '10px';
      gui.domElement.style.zIndex = '9999';

      gui.add(settings, 'greenscreen').name('Green Screen');

      dprController = gui.add(settings, 'dpr', 0.25, 2.0, 0.05).name('Pixel Ratio (DPR)').onChange(value => {
        dpr = value;
        pointers.updateScale(dpr);
        resize();
      });

      gui.add(settings, 'animationSpeed', 0.0, 3.0, 0.1).name('Anim Speed');

      gui.add(settings, 'animationPreset', Object.keys(animPresets)).name('Animation');

      const colorFolder = gui.addFolder('Color Customization');

      schemeController = colorFolder.add(settings, 'colorScheme', [...Object.keys(colorPresets), 'Custom']).name('Scheme').onChange(value => {
        const preset = colorPresets[value];
        if (preset) {
          settings.nebulaColor = preset.nebulaColor;
          settings.bgColor = preset.bgColor;
          settings.colorScale = preset.colorScale;
          nebulaColorController.updateDisplay();
          bgColorController.updateDisplay();
        }
      });

      nebulaColorController = colorFolder.addColor(settings, 'nebulaColor').name('Nebula Tint').onChange(() => {
        settings.colorScheme = 'Custom';
        schemeController.updateDisplay();
      });

      bgColorController = colorFolder.addColor(settings, 'bgColor').name('Background').onChange(() => {
        settings.colorScheme = 'Custom';
        schemeController.updateDisplay();
      });

      const transformFolder = gui.addFolder('Camera / View');
      zoomController = transformFolder.add(settings, 'zoom', 0.1, 10.0, 0.05).name('Zoom').listen();
      
      transformFolder.add(settings, 'offsetX', -5.0, 5.0, 0.01).name('Offset X').listen().onChange(val => {
        if (pointers) pointers.offset[0] = val;
      });
      transformFolder.add(settings, 'offsetY', -5.0, 5.0, 0.01).name('Offset Y').listen().onChange(val => {
        if (pointers) pointers.offset[1] = val;
      });
      
      transformFolder.add(settings, 'resetView').name('Reset View');
    }

    function resize() {
      const { innerWidth: width, innerHeight: height } = window

      canvas.width = width * dpr
      canvas.height = height * dpr

      if (renderer) {
        renderer.updateScale(dpr)
      }
    }
    function toggleView() {
      editor.hidden = btnToggleView.checked
    }
    function reset() {
      let shader = source
      editor.text = shader ? shader.textContent : renderer.defaultSource
      store.putShaderSource(shaderId, editor.text)
      customTime = 0
      renderThis()
    }
    function toggleResolution() {
      resolution = btnToggleResolution.checked ? .5 : 1
      dpr = Math.max(1, resolution * window.devicePixelRatio)
      settings.dpr = dpr
      if (dprController) dprController.setValue(dpr)
      pointers.updateScale(dpr)
      resize()
    }
    function loop(now) {
      if (now === 0) {
        lastTime = 0;
      } else {
        if (lastTime === 0) {
          lastTime = now;
        }
        let dt = (now - lastTime) * 1e-3;
        lastTime = now;
        
        // Clamp step to avoid huge jumps on tab restore
        if (dt < 0 || dt > 0.1) dt = 0.016;

        customTime += dt * settings.animationSpeed;
      }

      renderer.updateMouse(pointers.first)
      renderer.updatePointerCount(pointers.count)
      renderer.updatePointerCoords(pointers.coords)
      renderer.updateMove(pointers.move)
      renderer.render(customTime)
      frm = requestAnimationFrame(loop)
    }
    function renderThis() {
      editor.clearError()
      store.putShaderSource(shaderId, editor.text)

      const result = renderer.test(editor.text)

      if (result) {
        editor.setError(result)
      } else {
        renderer.updateShader(editor.text)
      }
      cancelAnimationFrame(frm) // Always cancel the previous frame!
      loop(0)
    }
    const debounce = (fn, delay) => {
      let timerId
      return (...args) => {
        clearTimeout(timerId)
        timerId = setTimeout(() => fn.apply(this, args), delay)
      }
    }
    const render = debounce(renderThis, renderDelay)
    function init() {
      source = document.querySelector("script[type='x-shader/x-fragment']")

      document.title = "🎢"

      renderer = new Renderer(canvas, dpr)
      pointers = new PointerHandler(canvas, dpr)
      store    = new Store(window.location)
      editor   = new Editor(codeEditor, error, indicator)
      editor.text = source.textContent
      renderer.setup()
      renderer.init()

      // Dynamically load the requested lil-gui module
      import("https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js").then((module) => {
        GUI = module.GUI;
        initGUI();
      });

      if (!editMode) {
        btnToggleView.checked = true
        toggleView()
      }
      if (resolution === .5) {
        btnToggleResolution.checked = true
        toggleResolution()
      }
      canvas.addEventListener('shader-error', e => editor.setError(e.detail))

      resize()

      if (renderer.test(source.textContent) === null) {
        renderer.updateShader(source.textContent)
      }
      loop(0)
      window.onresize = resize

      canvas.addEventListener('contextmenu', e => e.preventDefault());

      window.addEventListener("keydown", e => {
        if (e.key === "L" && e.ctrlKey) {
          e.preventDefault()
          btnToggleView.checked = !btnToggleView.checked
          toggleView()
        } else if (e.key.toLowerCase() === "h") {
          // Toggle UI visibility only if not currently typing in inputs/textareas
          if (document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') {
            document.body.classList.toggle("hidden-ui")
          }
        }
      })
    }
    class Renderer {
      #vertexSrc = "#version 300 es\nprecision highp float;\nin vec4 position;\nvoid main(){gl_Position=position;}"
      #fragmtSrc = "#version 300 es\nprecision highp float;\nout vec4 O;\nuniform float time;\nuniform vec2 resolution;\nvoid main() {\n\tvec2 uv=gl_FragCoord.xy/resolution;\n\tO=vec4(uv,sin(time)*.5+.5,1);\n}"
      #vertices = [-1, 1, -1, -1, 1, 1, 1, -1]
      constructor(canvas, scale) {
        this.canvas = canvas
        this.scale = scale
        this.gl = canvas.getContext("webgl2")
        this.gl.viewport(0, 0, canvas.width * scale, canvas.height * scale)
        this.shaderSource = this.#fragmtSrc
        this.mouseMove = [0, 0]
        this.mouseCoords = [0, 0]
        this.pointerCoords = [0, 0]
        this.nbrOfPointers = 0
      }
      get defaultSource() { return this.#fragmtSrc }
      updateShader(source) {
        this.reset()
        this.shaderSource = source
        this.setup()
        this.init()
      }
      updateMove(deltas) {
        this.mouseMove = deltas
      }
      updateMouse(coords) {
        this.mouseCoords = coords
      }
      updatePointerCoords(coords) {
        this.pointerCoords = coords
      }
      updatePointerCount(nbr) {
        this.nbrOfPointers = nbr
      }
      updateScale(scale) {
        this.scale = scale
        this.gl.viewport(0, 0, this.canvas.width * scale, this.canvas.height * scale)
      }
      compile(shader, source) {
        const gl = this.gl
        gl.shaderSource(shader, source)
        gl.compileShader(shader)

        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          console.error(gl.getShaderInfoLog(shader))
          this.canvas.dispatchEvent(new CustomEvent('shader-error', { detail: gl.getShaderInfoLog(shader) }))
        }
      }
      test(source) {
        let result = null
        const gl = this.gl
        const shader = gl.createShader(gl.FRAGMENT_SHADER)
        gl.shaderSource(shader, source)
        gl.compileShader(shader)

        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          result = gl.getShaderInfoLog(shader)
        }
        if (gl.getShaderParameter(shader, gl.DELETE_STATUS)) {
          gl.deleteShader(shader)
        }
        return result
      }
      reset() {
        const { gl, program, vs, fs } = this
        if (!program || gl.getProgramParameter(program, gl.DELETE_STATUS)) return
        if (gl.getShaderParameter(vs, gl.DELETE_STATUS)) {
          gl.detachShader(program, vs)
          gl.deleteShader(vs)
        }
        if (gl.getShaderParameter(fs, gl.DELETE_STATUS)) {
          gl.detachShader(program, fs)
          gl.deleteShader(fs)
        }
        gl.deleteProgram(program)
      }
      setup() {
        const gl = this.gl
        this.vs = gl.createShader(gl.VERTEX_SHADER)
        this.fs = gl.createShader(gl.FRAGMENT_SHADER)
        this.compile(this.vs, this.#vertexSrc)
        this.compile(this.fs, this.shaderSource)
        this.program = gl.createProgram()
        gl.attachShader(this.program, this.vs)
        gl.attachShader(this.program, this.fs)
        gl.linkProgram(this.program)

        if (!gl.getProgramParameter(this.program, gl.LINK_STATUS)) {
          console.error(gl.getProgramInfoLog(this.program))
        }
      }
      init() {
        const { gl, program } = this
        this.buffer = gl.createBuffer()
        gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer)
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(this.#vertices), gl.STATIC_DRAW)

        const position = gl.getAttribLocation(program, "position")

        gl.enableVertexAttribArray(position)
        gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0)

        program.resolution = gl.getUniformLocation(program, "resolution")
        program.time = gl.getUniformLocation(program, "time")
        program.move = gl.getUniformLocation(program, "move")
        program.touch = gl.getUniformLocation(program, "touch")
        program.pointerCount = gl.getUniformLocation(program, "pointerCount")
        program.pointers = gl.getUniformLocation(program, "pointers")

        // Custom uniform locations
        program.u_offset = gl.getUniformLocation(program, "u_offset")
        program.u_zoom = gl.getUniformLocation(program, "u_zoom")
        program.u_nebulaColor = gl.getUniformLocation(program, "u_nebulaColor")
        program.u_bgColor = gl.getUniformLocation(program, "u_bgColor")
        program.u_colorScale = gl.getUniformLocation(program, "u_colorScale")
        program.u_greenscreen = gl.getUniformLocation(program, "u_greenscreen")
        program.u_animPreset = gl.getUniformLocation(program, "u_animPreset")
      }
      render(now = 0) {
        const { gl, program, buffer, canvas, mouseMove, mouseCoords, pointerCoords, nbrOfPointers } = this
        
        if (!program || gl.getProgramParameter(program, gl.DELETE_STATUS)) return

        gl.clearColor(0, 0, 0, 1)
        gl.clear(gl.COLOR_BUFFER_BIT)
        gl.useProgram(program)
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer)
        gl.uniform2f(program.resolution, canvas.width, canvas.height)
        gl.uniform1f(program.time, now)
        gl.uniform2f(program.move, ...mouseMove)
        gl.uniform2f(program.touch, ...mouseCoords)
        gl.uniform1i(program.pointerCount, nbrOfPointers)
        gl.uniform2fv(program.pointers, pointerCoords)

        // Bind custom settings to uniforms
        if (program.u_offset) gl.uniform2f(program.u_offset, settings.offsetX, settings.offsetY)
        if (program.u_zoom) gl.uniform1f(program.u_zoom, settings.zoom)
        if (program.u_nebulaColor) gl.uniform3fv(program.u_nebulaColor, hexToRgb(settings.nebulaColor))
        if (program.u_bgColor) gl.uniform3fv(program.u_bgColor, hexToRgb(settings.bgColor))
        if (program.u_colorScale) gl.uniform3fv(program.u_colorScale, settings.colorScale)
        if (program.u_greenscreen) gl.uniform1i(program.u_greenscreen, settings.greenscreen ? 1 : 0)
        if (program.u_animPreset) gl.uniform1i(program.u_animPreset, animPresets[settings.animationPreset])

        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4)
      }
    }
    class Store {
      constructor(key) {
        this.key = key
        this.store = window.localStorage
      }
      #ownShadersKey = 'ownShaders'
      #StorageType = Object.freeze({
        shader: 'fragmentSource',
        config: 'config'
      })
      #getKeyPrefix(type) {
        return `${type}${btoa(this.key)}`
      }
      #getKey(type, name) {
        return `${this.#getKeyPrefix(type)}${btoa(name)}`
      }
      putShaderSource(name, source) {
        const storageType = this.#StorageType.shader
        this.store.setItem(this.#getKey(storageType, name), source)
      }
      getShaderSource(name) {
        const storageType = this.#StorageType.shader
        return this.store.getItem(this.#getKey(storageType, name))
      }
      deleteShaderSource(name) {
        const storageType = this.#StorageType.shader
        this.store.removeItem(this.#getKey(storageType, name))
      }
      /** @returns {{title:string, uuid:string}[]} */
      getOwnShaders() {
        const storageType = this.#StorageType.config
        const result = this.store.getItem(this.#getKey(storageType, this.#ownShadersKey))
        
        return result ? JSON.parse(result) : []
      }
      /** @param {{title:string, uuid:string}[]} shader */
      putOwnShader(shader) {
        const ownShaders = this.getOwnShaders()
        const storageType = this.#StorageType.config
        const index = ownShaders.findIndex((s) => s.uuid === shader.uuid)
        if (index === -1) {
          ownShaders.push(shader)
        } else {
          ownShaders[index] = shader
        }
        this.store.setItem(this.#getKey(storageType, this.#ownShadersKey), JSON.stringify(ownShaders))
      }
      deleteOwnShader(uuid) {
        const ownShaders = this.getOwnShaders()
        const storageType = this.#StorageType.config
        this.store.setItem(this.#getKey(storageType, this.#ownShadersKey), JSON.stringify(ownShaders.filter((s) => s.uuid !== uuid) ))
        this.deleteShaderSource(uuid)
      }
      /** @param {string[]} keep The names of the shaders to keep*/
      cleanup(keep=[]) {
        const storageType = this.#StorageType.shader
        const ownShaders = this.getOwnShaders().map((s) => this.#getKey(storageType, s.uuid))
        const premadeShaders = keep.map((name) => this.#getKey(storageType, name))
        const keysToKeep = [...ownShaders, ...premadeShaders]
        const result = []

        for (let i = 0; i < this.store.length; i++) {
          const key = this.store.key(i)

          if (key.startsWith(this.#getKeyPrefix(this.#StorageType.shader)) && !keysToKeep.includes(key)) {
            result.push(key)
          }
        }

        result.forEach((key) => this.store.removeItem(key))
      }
    }
    class PointerHandler {
      constructor(element, scale) {
        this.scale = scale
        this.active = false
        this.pointers = new Map()
        this.lastCoords = [0,0]
        this.moves = [0,0]
        this.offset = [0,0]
        this.ex = 0
        this.ey = 0
        
        const map = (element, scale, x, y) => [x * scale, element.height - y * scale]
        
        element.addEventListener("pointerdown", (e) => {
          this.active = true
          this.pointers.set(e.pointerId, map(element, this.getScale(), e.clientX, e.clientY))
          this.ex = e.clientX
          this.ey = e.clientY
        })
        
        element.addEventListener("pointerup", (e) => {
          if (this.count === 1) {
            this.lastCoords = this.first
          }
          this.pointers.delete(e.pointerId)
          this.active = this.pointers.size > 0
        })
        
        element.addEventListener("pointerleave", (e) => {
          if (this.count === 1) {
            this.lastCoords = this.first
          }
          this.pointers.delete(e.pointerId)
          this.active = this.pointers.size > 0
        })
        
        element.addEventListener("pointermove", (e) => {
          if (!this.active) return
          const mapped = map(element, this.getScale(), e.clientX, e.clientY)
          this.lastCoords = mapped
          this.pointers.set(e.pointerId, mapped)

          const dx = e.clientX - this.ex
          const dy = e.clientY - this.ey

          // Translate view offset directly when dragging with standard mouse pointer
          const mn = Math.min(element.width, element.height);
          this.offset[0] -= (dx * this.scale / mn) * settings.zoom;
          this.offset[1] += (dy * this.scale / mn) * settings.zoom;

          settings.offsetX = this.offset[0];
          settings.offsetY = this.offset[1];

          this.ex = e.clientX
          this.ey = e.clientY
        })

        element.addEventListener("wheel", (e) => {
          e.preventDefault();
          const zoomFactor = e.deltaY < 0 ? 0.9 : 1.1;
          settings.zoom = Math.max(0.1, Math.min(10.0, settings.zoom * zoomFactor));
        }, { passive: false })
      }
      getScale() {
        return this.scale
      }
      updateScale(scale) { this.scale = scale }
      reset() {
        this.pointers.clear()
        this.active = false
        this.moves = [0,0]
        this.offset = [0,0]
      }
      get count() {
        return this.pointers.size
      }
      get move() {
        return this.moves
      }
      get coords() {
        return this.pointers.size > 0 ? Array.from(this.pointers.values()).map((p) => [...p]).flat() : [0, 0]
      }
      get first() {
        return this.pointers.values().next().value || this.lastCoords
      }
    }
    class Editor {
      constructor(textarea, errorfield, errorindicator) {
        this.textarea = textarea
        this.errorfield = errorfield
        this.errorindicator = errorindicator
        textarea.addEventListener('keydown', this.handleKeydown.bind(this))
        textarea.addEventListener('scroll', this.handleScroll.bind(this))
      }
      get hidden() { return this.textarea.classList.contains('hidden') }
      set hidden(value) { value ? this.#hide() : this.#show() }
      get text() { return this.textarea.value }
      set text(value) { this.textarea.value = value }
      get scrollTop() { return this.textarea.scrollTop }
      set scrollTop(value) { this.textarea.scrollTop = value }
      setError(message) {
        this.errorfield.innerHTML = message
        this.errorfield.classList.add('opaque')
        const match = message.match(/ERROR: \d+:(\d+):/)
        const lineNumber = match ? parseInt(match[1]) : 0
        const overlay = document.createElement('pre')

        overlay.classList.add('overlay')
        overlay.textContent = '\n'.repeat(lineNumber)

        document.body.appendChild(overlay)

        const offsetTop = parseInt(getComputedStyle(overlay).height)

        this.errorindicator.style.setProperty('--top', offsetTop + 'px')
        this.errorindicator.style.visibility = 'visible'

        document.body.removeChild(overlay)
      }
      clearError() {
        this.errorfield.textContent = ''
        this.errorfield.classList.remove('opaque')
        this.errorfield.blur()
        this.errorindicator.style.visibility = 'hidden'
      }
      focus() {
        this.textarea.focus()
      }
      #hide() {
        for (const el of [this.errorindicator, this.errorfield, this.textarea]) {
          el.classList.add('hidden')
        }
      }
      #show() {
        for (const el of [this.errorindicator, this.errorfield, this.textarea]) {
          el.classList.remove('hidden')
        }
        this.focus()
      }
      handleScroll() {
        this.errorindicator.style.setProperty('--scroll-top', `${this.textarea.scrollTop}px`)
      }
      handleKeydown(event) {
        if (event.key === "Tab") {
          event.preventDefault()
          this.handleTabKey(event.shiftKey)
        } else if (event.key === "Enter") {
          event.preventDefault()
          this.handleEnterKey()
        }
      }
      handleTabKey(shiftPressed) {
        if (this.#getSelectedText() !== "") {
          if (shiftPressed) {
            this.#unindentSelectedText()
            return
          }
          this.#indentSelectedText()
        } else {
          this.#indentAtCursor()
        }
      }
      #getSelectedText() {
        const editor = this.textarea
        const start = editor.selectionStart
        const end = editor.selectionEnd
        return editor.value.substring(start, end)
      }
      #indentAtCursor() {
        const editor = this.textarea
        const cursorPos = editor.selectionStart

        document.execCommand('insertText', false, '\t')
        editor.selectionStart = editor.selectionEnd = cursorPos + 1
      }
      #indentSelectedText() {
        const editor = this.textarea
        const cursorPos = editor.selectionStart
        const selectedText = this.#getSelectedText()
        const lines = selectedText.split('\n')
        const indentedText = lines.map(line => '\t' + line).join('\n')

        document.execCommand('insertText', false, indentedText)
        editor.selectionStart = cursorPos
      }
      #unindentSelectedText() {
        const editor = this.textarea
        const cursorPos = editor.selectionStart
        const selectedText = this.#getSelectedText()
        const lines = selectedText.split('\n')
        const indentedText = lines.map(line => line.replace(/^\t/, '').replace(/^ /, '')).join('\n')

        document.execCommand('insertText', false, indentedText)
        editor.selectionStart = cursorPos
      }
      handleEnterKey() {
        const editor = this.textarea
        const visibleTop = editor.scrollTop
        const cursorPosition = editor.selectionStart

        let start = cursorPosition - 1
        while (start >= 0 && editor.value[start] !== '\n') {
          start--
        }

        let newLine = ''
        while (start < cursorPosition - 1 && (editor.value[start + 1] === ' ' || editor.value[start + 1] === '\t')) {
          newLine += editor.value[start + 1]
          start++
        }

        document.execCommand('insertText', false, '\n' + newLine)
        editor.selectionStart = editor.selectionEnd = cursorPosition + 1 + newLine.length
        editor.scrollTop = visibleTop // Prevent the editor from scrolling
        const lineHeight = editor.scrollHeight / editor.value.split('\n').length
        const line = editor.value.substring(0, cursorPosition).split('\n').length

        // Do the actual layout calculation in order to get the correct scroll position
        const visibleBottom = editor.scrollTop + editor.clientHeight
        const lineTop = lineHeight * (line - 1)
        const lineBottom = lineHeight * (line + 2)

        // If the cursor is outside the visible range, scroll the editor
        if (lineTop < visibleTop) editor.scrollTop = lineTop
        if (lineBottom > visibleBottom) editor.scrollTop = lineBottom - editor.clientHeight
      }
    }

    // Hex to RGB parser helper
    function hexToRgb(hex) {
      hex = hex.replace(/^#/, '');
      if (hex.length === 3) {
        hex = hex.split('').map(c => c + c).join('');
      }
      const num = parseInt(hex, 16);
      return [
        ((num >> 16) & 255) / 255,
        ((num >> 8) & 255) / 255,
        (num & 255) / 255
      ];
    }

    // Expose control functions globally
    window.toggleView = toggleView;
    window.reset = reset;
    window.toggleResolution = toggleResolution;
    window.render = render;
    window.onload = init;
  </script>
