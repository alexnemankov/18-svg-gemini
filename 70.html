<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Digital Flow System</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GUI } from 'lil-gui';

        let scene, camera, renderer, material, clock;
        let mouse = new THREE.Vector2(0.5, 0.5);
        let targetMouse = new THREE.Vector2(0.5, 0.5);
        
        let manualOffset = new THREE.Vector2(0.0, 0.0);
        let manualZoom = 1.0;
        let isDragging = false;
        let prevPointer = { x: 0, y: 0 };
        let uiVisible = true;
        let gui;
        let controllers = [];
        
        const PRESETS = {
            'Cyberpunk': {
                color1: '#ff007f',
                color2: '#00f6ff',
                color3: '#9b5de5',
                colorMouse: '#ffffff',
                colorCircle: '#ff007f',
                colorCenter: '#00f6ff'
            },
            'Matrix': {
                color1: '#00ff41',
                color2: '#003b00',
                color3: '#00ff88',
                colorMouse: '#d2ffd2',
                colorCircle: '#00ff41',
                colorCenter: '#005500'
            },
            'Hologram': {
                color1: '#00d2ff',
                color2: '#3a7bd5',
                color3: '#ae00ff',
                colorMouse: '#ffffff',
                colorCircle: '#00d2ff',
                colorCenter: '#3a7bd5'
            },
            'Quantum': {
                color1: '#ff9f00',
                color2: '#ff4500',
                color3: '#ffd700',
                colorMouse: '#ffeedd',
                colorCircle: '#ff9f00',
                colorCenter: '#ff4500'
            },
            'Deep Space': {
                color1: '#4a90e2',
                color2: '#50e3c2',
                color3: '#111e38',
                colorMouse: '#ffffff',
                colorCircle: '#4a90e2',
                colorCenter: '#50e3c2'
            }
        };

        const params = {
            greenscreen: false,
            zoom: 1.0,
            offsetX: 0.0,
            offsetY: 0.0,
            colorScheme: 'Cyberpunk',
            color1: PRESETS['Cyberpunk'].color1,
            color2: PRESETS['Cyberpunk'].color2,
            color3: PRESETS['Cyberpunk'].color3,
            colorMouse: PRESETS['Cyberpunk'].colorMouse,
            colorCircle: PRESETS['Cyberpunk'].colorCircle,
            colorCenter: PRESETS['Cyberpunk'].colorCenter,
            autoAnimation: true,
            animationSpeed: 1.0,
            waveThickness: 0.03,
            waveIntensity: 0.8,
            starDensity: 1.0,
            resetView: function() {
                manualOffset.set(0, 0);
                manualZoom = 1.0;
                params.zoom = 1.0;
                params.offsetX = 0.0;
                params.offsetY = 0.0;
                updateGUI();
            }
        };

        const uniforms = {
            t: { value: 0.0 },
            r: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            mouse: { value: new THREE.Vector2(0.5, 0.5) },
            zoom: { value: 1.0 },
            offset: { value: new THREE.Vector2(0.0, 0.0) },
            u_greenscreen: { value: false },
            u_color1: { value: new THREE.Color() },
            u_color2: { value: new THREE.Color() },
            u_color3: { value: new THREE.Color() },
            u_colorMouse: { value: new THREE.Color() },
            u_colorCircle: { value: new THREE.Color() },
            u_colorCenter: { value: new THREE.Color() },
            u_waveThickness: { value: 0.03 },
            u_waveIntensity: { value: 0.8 },
            u_starDensity: { value: 1.0 }
        };

        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
            camera.position.z = 1;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            const geometry = new THREE.PlaneGeometry(2, 2);
            material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec2 r;
                    uniform float t;
                    uniform vec2 mouse;
                    uniform float zoom;
                    uniform vec2 offset;
                    uniform bool u_greenscreen;
                    uniform vec3 u_color1;
                    uniform vec3 u_color2;
                    uniform vec3 u_color3;
                    uniform vec3 u_colorMouse;
                    uniform vec3 u_colorCircle;
                    uniform vec3 u_colorCenter;
                    uniform float u_waveThickness;
                    uniform float u_waveIntensity;
                    uniform float u_starDensity;
                    varying vec2 vUv;

                    #define PI 3.14159265359

                    mat2 rot(float a) {
                        float s = sin(a);
                        float c = cos(a);
                        return mat2(c, -s, s, c);
                    }

                    float wave(vec2 p, float phase, float freq) {
                        return sin(p.x * freq + phase) * 0.3 * sin(p.y * freq * 0.5 + phase * 0.7);
                    }

                    float glowLine(float dist, float thickness, float intensity) {
                        return intensity * thickness / (abs(dist) + thickness * 0.5);
                    }

                    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                    vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
                    vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
                    
                    float snoise(vec2 v) {
                        const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
                        vec2 i = floor(v + dot(v, C.yy));
                        vec2 x0 = v - i + dot(i, C.xx);
                        vec2 i1;
                        i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                        vec4 x12 = x0.xyxy + C.xxzz;
                        x12.xy -= i1;
                        i = mod289(i);
                        vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
                        vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                        m = m*m;
                        m = m*m;
                        vec3 x = 2.0 * fract(p * C.www) - 1.0;
                        vec3 h = abs(x) - 0.5;
                        vec3 ox = floor(x + 0.5);
                        vec3 a0 = x - ox;
                        m *= (1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h));
                        vec3 g;
                        g.x = a0.x * x0.x + h.x * x0.y;
                        g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                        return 130.0 * dot(m, g);
                    }

                    float hash(vec2 p) {
                        return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                    }

                    float starfield(vec2 uv, float time) {
                        vec2 grid = floor(uv * 150.0);
                        vec2 frac = fract(uv * 150.0) - 0.5;
                        float star = hash(grid);
                        if (star < 0.985) return 0.0;
                        float twinkle = sin(time * 2.0 + grid.x + grid.y) * 0.5 + 0.5;
                        float dist = length(frac);
                        float sparkle = smoothstep(0.08, 0.0, dist) * twinkle;
                        return sparkle * (star - 0.985) * 100.0;
                    }

                    void main() {
                        // Base screen coordinates (centered, aspect corrected)
                        vec2 uv = (vUv - 0.5) * 2.0;
                        uv.x *= r.x / r.y;
                        vec2 uv0 = uv;
                        
                        // Apply zoom and offset transformation
                        vec2 uv_transformed = uv / zoom - offset;
                        
                        vec3 col = vec3(0.0);
                        float time = t * 0.4;
                        
                        // Compute background
                        vec3 bgCol = vec3(0.0);
                        if (u_greenscreen) {
                            bgCol = vec3(0.0, 1.0, 0.0);
                        } else {
                            float noise = (snoise(uv_transformed * 0.5 + time * 0.02) + 1.0) * 0.5;
                            bgCol += noise * u_colorCenter * 0.08;
                            bgCol += starfield(uv_transformed * 2.0 + time * 0.01, t) * vec3(1.0, 0.9, 0.8) * 0.7 * u_starDensity;
                        }
                        
                        // Mouse interaction in transformed space
                        vec2 mouse_uv = (mouse - 0.5) * 2.0;
                        mouse_uv.x *= r.x / r.y;
                        vec2 mouse_uv_transformed = mouse_uv / zoom - offset;
                        
                        float mouseDist = length(uv_transformed - mouse_uv_transformed);
                        
                        // Mouse interaction glow
                        float mouseGlow = 0.1 / (mouseDist + 0.1);
                        mouseGlow *= (sin(t * 1.5) * 0.5 + 0.5) * 0.7 + 0.3;
                        vec3 mouseGlowColor = mouseGlow * u_colorMouse * 0.15;
                        
                        // Distort UV coordinates based on mouse distance
                        vec2 waveUv = uv_transformed;
                        waveUv += (mouse_uv_transformed - waveUv) * (0.3 / (mouseDist + 0.5));
                        waveUv *= rot(time * 0.05);
                        
                        float waveNoise = snoise(waveUv * 2.0 + time * 0.2) * 0.1;
                        
                        // Render Waves
                        // Wave 1
                        float y1 = waveUv.y - wave(waveUv, time * 1.5, 2.0) + waveNoise;
                        float line1 = glowLine(y1, u_waveThickness, u_waveIntensity);
                        
                        // Wave 2
                        float y2 = waveUv.y + 0.4 - wave(waveUv + vec2(1.0, 0.5), time * 1.2, 2.5) + waveNoise * 0.8;
                        float line2 = glowLine(y2, u_waveThickness, u_waveIntensity);
                        
                        // Wave 3
                        float y3 = waveUv.y - 0.4 - wave(waveUv + vec2(-0.5, 1.0), time * 1.8, 1.8) + waveNoise * 1.2;
                        float line3 = glowLine(y3, u_waveThickness, u_waveIntensity);
                        
                        // Central Circle Pulse
                        float dist = length(uv_transformed);
                        float circle = abs(sin(dist * 4.0 - time * 2.0)) * exp(-dist * 0.5);
                        vec3 circleColor = u_colorCircle * circle * 0.3;
                        
                        // Central Glow
                        float centerGlowVal = exp(-dist * 1.0) * 0.3;
                        vec3 centerColor = centerGlowVal * u_colorCenter;
                        
                        // Combine components
                        vec3 foreground = mouseGlowColor + line1 * u_color1 + line2 * u_color2 + line3 * u_color3 + circleColor + centerColor;
                        
                        if (u_greenscreen) {
                            // On green screen, render solid background plus additive glows
                            col = bgCol + foreground;
                        } else {
                            col = bgCol + foreground;
                            
                            // Vignette (only for normal dark mode)
                            float vignette = 1.0 - dist * 0.5;
                            vignette = smoothstep(0.0, 1.0, vignette);
                            col *= vignette;
                        }
                        
                        col = pow(col, vec3(0.95));
                        gl_FragColor = vec4(col, 1.0);
                    }
                `
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            
            setupGUI();
            applyScheme(params.colorScheme);
            
            // Events
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('touchmove', onTouchMove, { passive: true });
            window.addEventListener('resize', onWindowResize);
            
            // Drag and Zoom handlers
            window.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('pointermove', onPointerMove);
            window.addEventListener('pointerup', onPointerUp);
            window.addEventListener('wheel', onWheel, { passive: false });
            
            // Hide / Show GUI with H key
            window.addEventListener('keydown', onKeyDown);
        }

        function setupGUI() {
            gui = new GUI({ title: 'Controls (Press H to hide)' });
            
            // Greenscreen folder
            const viewFolder = gui.addFolder('View Settings');
            
            viewFolder.add(params, 'greenscreen')
                .name('Green Screen')
                .onChange(v => {
                    uniforms.u_greenscreen.value = v;
                    if (v) {
                        renderer.setClearColor(0x00ff00, 1.0);
                    } else {
                        renderer.setClearColor(0x000000, 1.0);
                    }
                });
                
            controllers.push(viewFolder.add(params, 'zoom', 0.1, 10.0, 0.01).name('Zoom').onChange(v => {
                manualZoom = v;
            }));
            controllers.push(viewFolder.add(params, 'offsetX', -5.0, 5.0, 0.01).name('Offset X').onChange(v => {
                manualOffset.x = v;
            }));
            controllers.push(viewFolder.add(params, 'offsetY', -5.0, 5.0, 0.01).name('Offset Y').onChange(v => {
                manualOffset.y = v;
            }));
            viewFolder.add(params, 'resetView').name('Reset View');
            
            // Color Presets and Colors folder
            const colorFolder = gui.addFolder('Color Settings');
            colorFolder.add(params, 'colorScheme', Object.keys(PRESETS))
                .name('Preset Scheme')
                .onChange(applyScheme);
                
            controllers.push(colorFolder.addColor(params, 'color1').name('Wave 1').onChange(v => {
                uniforms.u_color1.value.set(v);
            }));
            controllers.push(colorFolder.addColor(params, 'color2').name('Wave 2').onChange(v => {
                uniforms.u_color2.value.set(v);
            }));
            controllers.push(colorFolder.addColor(params, 'color3').name('Wave 3').onChange(v => {
                uniforms.u_color3.value.set(v);
            }));
            controllers.push(colorFolder.addColor(params, 'colorMouse').name('Mouse Glow').onChange(v => {
                uniforms.u_colorMouse.value.set(v);
            }));
            controllers.push(colorFolder.addColor(params, 'colorCircle').name('Pulse Circle').onChange(v => {
                uniforms.u_colorCircle.value.set(v);
            }));
            controllers.push(colorFolder.addColor(params, 'colorCenter').name('Center Glow').onChange(v => {
                uniforms.u_colorCenter.value.set(v);
            }));

            // Animation folder
            const animFolder = gui.addFolder('Animation');
            animFolder.add(params, 'autoAnimation').name('Auto Drift');
            animFolder.add(params, 'animationSpeed', 0.1, 3.0, 0.1).name('Drift Speed');
            
            // Advanced folder
            const advFolder = gui.addFolder('Shader Details');
            advFolder.add(params, 'waveThickness', 0.005, 0.1, 0.001).name('Thickness').onChange(v => {
                uniforms.u_waveThickness.value = v;
            });
            advFolder.add(params, 'waveIntensity', 0.1, 3.0, 0.1).name('Intensity').onChange(v => {
                uniforms.u_waveIntensity.value = v;
            });
            advFolder.add(params, 'starDensity', 0.0, 3.0, 0.1).name('Star Density').onChange(v => {
                uniforms.u_starDensity.value = v;
            });
            
            gui.open();
        }

        function applyScheme(schemeName) {
            const scheme = PRESETS[schemeName];
            if (scheme) {
                params.color1 = scheme.color1;
                params.color2 = scheme.color2;
                params.color3 = scheme.color3;
                params.colorMouse = scheme.colorMouse;
                params.colorCircle = scheme.colorCircle;
                params.colorCenter = scheme.colorCenter;
                
                uniforms.u_color1.value.set(scheme.color1);
                uniforms.u_color2.value.set(scheme.color2);
                uniforms.u_color3.value.set(scheme.color3);
                uniforms.u_colorMouse.value.set(scheme.colorMouse);
                uniforms.u_colorCircle.value.set(scheme.colorCircle);
                uniforms.u_colorCenter.value.set(scheme.colorCenter);
                
                updateGUI();
            }
        }

        function updateGUI() {
            controllers.forEach(c => c.updateDisplay());
        }

        function onMouseMove(event) {
            targetMouse.x = event.clientX / window.innerWidth;
            targetMouse.y = 1.0 - (event.clientY / window.innerHeight);
        }

        function onTouchMove(event) {
            if (event.touches.length > 0) {
                targetMouse.x = event.touches[0].clientX / window.innerWidth;
                targetMouse.y = 1.0 - (event.touches[0].clientY / window.innerHeight);
            }
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.r.value.set(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        }

        // Drag handlers
        function onPointerDown(e) {
            if (e.target.closest('.lil-gui')) return;
            isDragging = true;
            prevPointer.x = e.clientX;
            prevPointer.y = e.clientY;
        }

        function onPointerMove(e) {
            if (!isDragging) return;
            const dx = e.clientX - prevPointer.x;
            const dy = e.clientY - prevPointer.y;
            
            // Adjust dragging sensitivity based on zoom level
            const scale = (2.0 / window.innerHeight) / manualZoom;
            manualOffset.x += dx * scale;
            manualOffset.y -= dy * scale;
            
            params.offsetX = manualOffset.x;
            params.offsetY = manualOffset.y;
            updateGUI();
            
            prevPointer.x = e.clientX;
            prevPointer.y = e.clientY;
        }

        function onPointerUp() {
            isDragging = false;
        }

        function onWheel(e) {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.08 : 0.92;
            manualZoom = THREE.MathUtils.clamp(manualZoom * factor, 0.1, 10.0);
            params.zoom = manualZoom;
            updateGUI();
        }

        function onKeyDown(e) {
            if (e.key.toLowerCase() === 'h') {
                uiVisible = !uiVisible;
                if (uiVisible) {
                    gui.show();
                } else {
                    gui.hide();
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            uniforms.t.value = time;
            
            // Auto drift animation if enabled
            if (params.autoAnimation) {
                const speed = params.animationSpeed * 0.5;
                // Object floats around
                uniforms.offset.value.x = manualOffset.x + Math.sin(time * speed) * 0.3;
                uniforms.offset.value.y = manualOffset.y + Math.cos(time * speed * 0.8) * 0.2;
                uniforms.zoom.value = manualZoom * (1.0 + Math.sin(time * speed * 0.6) * 0.12);
            } else {
                uniforms.offset.value.x = manualOffset.x;
                uniforms.offset.value.y = manualOffset.y;
                uniforms.zoom.value = manualZoom;
            }
            
            mouse.lerp(targetMouse, 0.05);
            uniforms.mouse.value.copy(mouse);
            
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
