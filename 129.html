<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Vortex</title>
		<style>
			body {
				margin: 0;
				overflow: hidden;
			}
		</style>
		<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js",
					"jsm/": "https://cdn.jsdelivr.net/npm/three@0.161/examples/jsm/",
					"lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
				}
			}
		</script>
	</head>
	<body>
		<script type="module">
			import * as THREE from "three";
			import { OrbitControls } from "jsm/controls/OrbitControls.js";
			import GUI from "lil-gui";

			const colorSchemes = {
				"Cyberpunk Neon": {
					textBgColor: "#0d001a",
					textFgColor: "#ff007f",
					torusColor: "#ffffff",
					lightColor: "#00f0ff",
					sceneBg: "#05000a"
				},
				"Magma Flow": {
					textBgColor: "#1a0500",
					textFgColor: "#ff3c00",
					torusColor: "#ffd000",
					lightColor: "#ff5500",
					sceneBg: "#080100"
				},
				"Deep Ocean": {
					textBgColor: "#001122",
					textFgColor: "#00ffcc",
					torusColor: "#0088ff",
					lightColor: "#a8ffeb",
					sceneBg: "#000510"
				},
				"Acid Grid": {
					textBgColor: "#001204",
					textFgColor: "#39ff14",
					torusColor: "#a3ff00",
					lightColor: "#ffffff",
					sceneBg: "#000501"
				},
				"Monochrome": {
					textBgColor: "#111111",
					textFgColor: "#ffffff",
					torusColor: "#888888",
					lightColor: "#ffffff",
					sceneBg: "#000000"
				}
			};

			const settings = {
				colorScheme: "Cyberpunk Neon",
				textBgColor: colorSchemes["Cyberpunk Neon"].textBgColor,
				textFgColor: colorSchemes["Cyberpunk Neon"].textFgColor,
				torusColor: colorSchemes["Cyberpunk Neon"].torusColor,
				lightColor: colorSchemes["Cyberpunk Neon"].lightColor,
				sceneBg: colorSchemes["Cyberpunk Neon"].sceneBg,
				greenscreen: false,
				dpr: window.devicePixelRatio || 1.0,
				animationSpeed: 1.0,
				animation: "Static"
			};

			const w = window.innerWidth;
			const h = window.innerHeight;
			const scene = new THREE.Scene();
			const camera = new THREE.PerspectiveCamera(75, w / h, 1, 100);
			camera.position.z = 5;
			camera.position.y = -4;
			
			const renderer = new THREE.WebGLRenderer({ antialias: true });
			renderer.setSize(w, h);
			renderer.setPixelRatio(settings.dpr);
			document.body.appendChild(renderer.domElement);

			const ctrls = new OrbitControls(camera, renderer.domElement);
			ctrls.enableDamping = true;
			ctrls.dampingFactor = 0.05;
			ctrls.enableZoom = true; 
			ctrls.enablePan = true;
			ctrls.enableRotate = true;

			const canvas = document.createElement('canvas');
			canvas.width = 1024;
			canvas.height = 1024;

			function drawTextCanvas(canvas, bgColor, fgColor) {
				const context = canvas.getContext('2d');
				context.imageSmoothingEnabled = true;
				context.textRenderingOptimization = 'optimizeQuality';

				context.fillStyle = bgColor;
				context.fillRect(0, 0, canvas.width, canvas.height);
				context.fillStyle = fgColor;
				context.font = 'bold 45px Arial, sans-serif';
				context.textAlign = 'center';
				context.textBaseline = 'middle';

				const text = 'VORTEX';
				const textMetrics = context.measureText(text);
				const textWidth = textMetrics.width;
				const textHeight = 89;

				const horizontalSpacing = textWidth * .4;
				const verticalSpacing = textHeight * 2.3;

				for (let x = horizontalSpacing / 2; x < canvas.width; x += horizontalSpacing) {
					for (let y = verticalSpacing / 2; y < canvas.height; y += verticalSpacing) {
						context.save();
						context.translate(x, y);
						context.rotate(Math.PI / 2);
						context.fillText(text, 0, 0);
						context.restore();
					}
				}
			}

			// Initial draw
			drawTextCanvas(canvas, settings.textBgColor, settings.textFgColor);

			const textTexture = new THREE.CanvasTexture(canvas);
			textTexture.wrapS = THREE.RepeatWrapping;
			textTexture.wrapT = THREE.RepeatWrapping;
			textTexture.repeat.set(3, 3);
			textTexture.minFilter = THREE.LinearFilter;
			textTexture.magFilter = THREE.LinearFilter;
			textTexture.generateMipmaps = true;

			const torusKnotGeo = new THREE.TorusGeometry(5, 3.8, 60, 100);
			const torusKnotMat = new THREE.MeshStandardMaterial({
				map: textTexture,
				color: new THREE.Color(settings.torusColor)
			});
			const torusKnot = new THREE.Mesh(torusKnotGeo, torusKnotMat);
			torusKnot.rotation.x = Math.PI * 0.01;
			torusKnot.position.set(0, 0, 0);
			scene.add(torusKnot);

			const spotLight = new THREE.SpotLight(settings.lightColor, 100);
			spotLight.angle = Math.PI / 4.3;
			spotLight.penumbra = .25;
			spotLight.position.set(0, -0.2, 9);
			scene.add(spotLight);

			function updateTextTexture() {
				drawTextCanvas(canvas, settings.textBgColor, settings.textFgColor);
				textTexture.needsUpdate = true;
			}

			function updateMaterial() {
				torusKnotMat.color.set(settings.torusColor);
			}

			const ambientLight = new THREE.AmbientLight('#ffffff', 0.2);
			scene.add(ambientLight);

			function updateLights() {
				spotLight.color.set(settings.lightColor);
			}

			function updateBackground() {
				if (settings.greenscreen) {
					scene.background = new THREE.Color('#00ff00');
				} else {
					scene.background = new THREE.Color(settings.sceneBg);
				}
			}
			updateBackground();

			// GUI Setup
			const gui = new GUI({ title: 'Vortex Controls' });

			let textBgCtrl, textFgCtrl, torusColorCtrl, lightColorCtrl, sceneBgCtrl;

			function applyColorScheme(schemeName) {
				const scheme = colorSchemes[schemeName];
				if (scheme) {
					settings.textBgColor = scheme.textBgColor;
					settings.textFgColor = scheme.textFgColor;
					settings.torusColor = scheme.torusColor;
					settings.lightColor = scheme.lightColor;
					settings.sceneBg = scheme.sceneBg;

					if (textBgCtrl) textBgCtrl.updateDisplay();
					if (textFgCtrl) textFgCtrl.updateDisplay();
					if (torusColorCtrl) torusColorCtrl.updateDisplay();
					if (lightColorCtrl) lightColorCtrl.updateDisplay();
					if (sceneBgCtrl) sceneBgCtrl.updateDisplay();

					updateTextTexture();
					updateMaterial();
					updateLights();
					updateBackground();
				}
			}

			gui.add(settings, 'colorScheme', Object.keys(colorSchemes)).name('Color Scheme').onChange(applyColorScheme);

			const colorsFolder = gui.addFolder('Custom Colors');
			textBgCtrl = colorsFolder.addColor(settings, 'textBgColor').name('Text BG').onChange(updateTextTexture);
			textFgCtrl = colorsFolder.addColor(settings, 'textFgColor').name('Text Color').onChange(updateTextTexture);
			torusColorCtrl = colorsFolder.addColor(settings, 'torusColor').name('Torus Color').onChange(updateMaterial);
			lightColorCtrl = colorsFolder.addColor(settings, 'lightColor').name('Light Color').onChange(updateLights);
			sceneBgCtrl = colorsFolder.addColor(settings, 'sceneBg').name('Scene BG').onChange(updateBackground);

			gui.add(settings, 'greenscreen').name('Green Screen').onChange(updateBackground);
			
			const animations = ['Static', 'Slow Orbit', 'Subtle Sway', 'Zoom Pulse', 'Figure 8'];
			gui.add(settings, 'animation', animations).name('Camera Animation');

			gui.add(settings, 'animationSpeed', 0.0, 5.0, 0.1).name('Animation Speed');

			gui.add(settings, 'dpr', 0.5, 3.0, 0.1).name('DPR (Pixel Ratio)').onChange(value => {
				renderer.setPixelRatio(value);
			});

			// Hide/show GUI with 'H' key
			let guiVisible = true;
			window.addEventListener('keydown', (e) => {
				if (e.key === 'h' || e.key === 'H') {
					guiVisible = !guiVisible;
					if (guiVisible) {
						gui.show();
					} else {
						gui.hide();
					}
				}
			});

			// Animation Logic
			let lastTime = 0;
			let rotationZ = 0;
			let textureOffsetY = 0;
			let animationTime = 0;

			function applyCameraAnimation(time) {
				const target = ctrls.target;
				const relPos = camera.position.clone().sub(target);
				const dist = relPos.length();

				if (settings.animation === 'Slow Orbit') {
					const angle = time * 0.15;
					relPos.applyAxisAngle(new THREE.Vector3(0, 1, 0), angle);
					camera.position.copy(target).add(relPos);
					camera.lookAt(target);
				} else if (settings.animation === 'Subtle Sway') {
					const right = new THREE.Vector3();
					const up = new THREE.Vector3();
					camera.matrix.extractBasis(right, up, new THREE.Vector3());
					right.normalize();
					up.normalize();

					const swayX = Math.sin(time * 0.6) * 0.5;
					const swayY = Math.cos(time * 0.4) * 0.3;
					const swayZ = Math.sin(time * 0.3) * 0.2;

					camera.position.addScaledVector(right, swayX);
					camera.position.addScaledVector(up, swayY);
					
					const dir = relPos.clone().normalize();
					camera.position.addScaledVector(dir, swayZ);
					camera.lookAt(target);
				} else if (settings.animation === 'Zoom Pulse') {
					const dir = relPos.clone().normalize();
					const zoomOffset = Math.sin(time * 0.4) * Math.min(1.2, dist * 0.3);
					camera.position.addScaledVector(dir, zoomOffset);
					camera.lookAt(target);
				} else if (settings.animation === 'Figure 8') {
					const right = new THREE.Vector3();
					const up = new THREE.Vector3();
					camera.matrix.extractBasis(right, up, new THREE.Vector3());
					right.normalize();
					up.normalize();

					const xOffset = Math.sin(time * 0.4) * 0.8;
					const yOffset = Math.sin(time * 0.8) * 0.4;

					camera.position.addScaledVector(right, xOffset);
					camera.position.addScaledVector(up, yOffset);
					camera.lookAt(target);
				}
			}

			function animate(t = 0) {
				requestAnimationFrame(animate);

				// Update OrbitControls first
				ctrls.update();

				const dt = t - lastTime;
				lastTime = t;

				const speedMultiplier = settings.animationSpeed;
				rotationZ += dt * 0.0002 * speedMultiplier;
				textureOffsetY = (textureOffsetY - dt * 0.00004 * speedMultiplier) % 1;
				animationTime += dt * 0.001 * speedMultiplier;

				torusKnot.rotation.z = rotationZ;
				textTexture.offset.y = textureOffsetY;

				// Save state
				const savedPos = camera.position.clone();
				const savedQuat = camera.quaternion.clone();

				if (settings.animation !== 'Static') {
					applyCameraAnimation(animationTime);
				}

				renderer.render(scene, camera);

				// Restore state
				camera.position.copy(savedPos);
				camera.quaternion.copy(savedQuat);
			}

			animate();

			window.addEventListener('resize', () => {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize(window.innerWidth, window.innerHeight);
			});
		</script>
	</body>
</html>
