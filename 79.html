<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aesthetic Orthographic Globe Visualizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="An interactive, animated 3D globe with city connections and premium tech themes.">
  
  <!-- amCharts 5 CDN Libraries -->
  <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
  <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>

  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #e8e6e0;
      transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
    }

    #vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.12) 100%);
      z-index: 1;
      transition: opacity 0.5s ease;
    }

    body.greenscreen-active #vignette {
      opacity: 0;
    }

    #chartdiv {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div id="vignette"></div>
  <div id="chartdiv"></div>

  <script type="module">
    import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // Theme Config definitions (IT & Tech themes)
    const presets = {
      "Classic Parchment": {
        background: "#e8e6e0",
        ocean: "#2a2520",
        land: "#c8a96e",
        accent: "#c8a96e"
      },
      "Midnight Terminal": {
        background: "#0c0d0e",
        ocean: "#141618",
        land: "#3df21b",
        accent: "#3df21b"
      },
      "Deep Space Cyberpunk": {
        background: "#07060f",
        ocean: "#100e23",
        land: "#00f0ff",
        accent: "#ff007f"
      },
      "Holo Grid": {
        background: "#0a0c10",
        ocean: "#131722",
        land: "#3b82f6",
        accent: "#60a5fa"
      },
      "Solarized Dark": {
        background: "#002b36",
        ocean: "#073642",
        land: "#2aa198",
        accent: "#cb4b16"
      }
    };

    const config = {
      theme: "Classic Parchment",
      background: "#e8e6e0",
      ocean: "#2a2520",
      land: "#c8a96e",
      accent: "#c8a96e",
      greenscreen: false,
      rotationSpeed: 0.3,
      autoRotate: true,
      connectorSpeed: 2.0,
      particleSize: 4.0,
      strokeWidth: 1.8,
      dragMode: "Rotate"
    };

    // Hardcoded array of major world cities
    const cities = [
      { name: "Tokyo", longitude: 139.6917, latitude: 35.6895 },
      { name: "London", longitude: -0.1278, latitude: 51.5074 },
      { name: "New York", longitude: -74.0060, latitude: 40.7128 },
      { name: "Dubai", longitude: 55.2708, latitude: 25.2048 },
      { name: "Sydney", longitude: 151.2093, latitude: -33.8688 },
      { name: "São Paulo", longitude: -46.6333, latitude: -23.5505 },
      { name: "Mumbai", longitude: 72.8777, latitude: 19.0760 },
      { name: "Beijing", longitude: 116.4074, latitude: 39.9042 },
      { name: "Lagos", longitude: 3.3792, latitude: 6.5244 },
      { name: "Moscow", longitude: 37.6173, latitude: 55.7558 },
      { name: "Paris", longitude: 2.3522, latitude: 48.8566 },
      { name: "Singapore", longitude: 103.8198, latitude: 1.3521 },
      { name: "Cairo", longitude: 31.2357, latitude: 30.0444 },
      { name: "Mexico City", longitude: -99.1332, latitude: 19.4326 },
      { name: "Toronto", longitude: -79.3832, latitude: 43.6532 },
      { name: "Nairobi", longitude: 36.8219, latitude: -1.2921 },
      { name: "Los Angeles", longitude: -118.2437, latitude: 34.0522 },
      { name: "Rio de Janeiro", longitude: -43.1729, latitude: -22.9068 },
      { name: "Seoul", longitude: 126.9780, latitude: 37.5665 }
    ];

    let root, chart, backgroundSeries, polygonSeries, graticuleSeries;
    let cityPointsSeries, activePointsSeries, lineSeries, flyingPointsSeries;
    let cityDotTemplate, activeDotTemplate, flyingDotTemplate;
    let isDragging = false;
    let activeArcs = [];
    let gui, themeController, bgController, oceanController, landController, accentController;
    let lastTime;

    am5.ready(function() {
      // 1. Create root element
      root = am5.Root.new("chartdiv");

      // 2. Set animated themes
      root.setThemes([
        am5themes_Animated.new(root)
      ]);

      // 3. Create the MapChart with orthographic projection
      chart = root.container.children.push(am5map.MapChart.new(root, {
        panX: "rotateX",
        panY: "rotateY",
        projection: am5map.geoOrthographic(),
        wheelY: "zoom",
        wheelX: "none",
        pinchZoom: true,
        rotationY: -15, // Slightly tilted view for axial dimension
        minZoomLevel: 0.15,
        maxZoomLevel: 30.0
      }));

      // 4. Create background polygon series (ocean / globe background disk)
      backgroundSeries = chart.series.push(am5map.MapPolygonSeries.new(root, {}));
      backgroundSeries.mapPolygons.template.setAll({
        fill: am5.color(config.ocean),
        stroke: am5.color(config.accent),
        strokeWidth: 1.5,
        strokeOpacity: 0.35
      });
      // Add background rectangle geometry
      backgroundSeries.data.push({
        geometry: am5map.getGeoRectangle(90, 180, -90, -180)
      });

      // 5. Create land polygon series
      polygonSeries = chart.series.push(am5map.MapPolygonSeries.new(root, {
        geoJSON: am5geodata_worldLow
      }));
      polygonSeries.mapPolygons.template.setAll({
        fill: am5.color(config.land),
        stroke: am5.color(config.ocean),
        strokeWidth: 0.35,
        strokeOpacity: 0.4
      });

      // 6. Create graticule (lat/long gridlines)
      graticuleSeries = chart.series.push(am5map.GraticuleSeries.new(root, {}));
      graticuleSeries.mapLines.template.setAll({
        stroke: am5.color(config.land),
        strokeOpacity: 0.08,
        strokeWidth: 1
      });

      // 7. Base point series for capital markers (static dots)
      cityPointsSeries = chart.series.push(am5map.MapPointSeries.new(root, {}));
      cityDotTemplate = am5.Template.new(root, {
        fill: am5.color(config.accent),
        strokeOpacity: 0
      });
      cityPointsSeries.bullets.push(function(root, series, dataItem) {
        let circle = am5.Circle.new(root, {
          radius: 3.0,
          opacity: 0.45
        }, cityDotTemplate);
        return am5.Bullet.new(root, {
          sprite: circle
        });
      });
      cityPointsSeries.data.setAll(cities);

      // 8. Active point series for pulsing endpoint indicators
      activePointsSeries = chart.series.push(am5map.MapPointSeries.new(root, {}));
      activeDotTemplate = am5.Template.new(root, {
        fill: am5.color(config.accent)
      });
      activePointsSeries.bullets.push(function(root, series, dataItem) {
        let container = am5.Container.new(root, {});
        
        let pulseCircle = container.children.push(am5.Circle.new(root, {
          radius: 4.0,
          strokeOpacity: 0,
          opacity: 0.8
        }, activeDotTemplate));
        
        let circle = container.children.push(am5.Circle.new(root, {
          radius: 4.0,
          strokeOpacity: 0
        }, activeDotTemplate));

        pulseCircle.animate({
          key: "radius",
          to: 11,
          duration: 1800,
          loops: Infinity,
          easing: am5.ease.out(am5.ease.cubic)
        });

        pulseCircle.animate({
          key: "opacity",
          to: 0,
          duration: 1800,
          loops: Infinity,
          easing: am5.ease.out(am5.ease.cubic)
        });

        if (dataItem.dataContext) {
          dataItem.dataContext.sprite = container;
        }

        return am5.Bullet.new(root, {
          sprite: container
        });
      });

      // 9. Line series for active connection arcs
      lineSeries = chart.series.push(am5map.MapLineSeries.new(root, {}));
      lineSeries.mapLines.template.setAll({
        stroke: am5.color(config.accent),
        strokeWidth: config.strokeWidth,
        strokeOpacity: 0.7
      });
      // Hook template setup to animate lines drawing in
      lineSeries.mapLines.template.setup = function(mapLine) {
        mapLine.setAll({
          strokeDasharray: [1000, 1000],
          strokeDashoffset: 1000,
          strokeOpacity: 0
        });
        
        mapLine.animate({
          key: "strokeDashoffset",
          to: 0,
          duration: 1600,
          easing: am5.ease.out(am5.ease.quad)
        });
        
        mapLine.animate({
          key: "strokeOpacity",
          to: 0.7,
          duration: 600,
          easing: am5.ease.out(am5.ease.quad)
        });
        
        if (mapLine.dataItem && mapLine.dataItem.dataContext) {
          mapLine.dataItem.dataContext.mapLineSprite = mapLine;
        }
      };

      // 9.5. Flying points series for the animated "flies" traveling along lines
      flyingPointsSeries = chart.series.push(am5map.MapPointSeries.new(root, {}));
      
      flyingDotTemplate = am5.Template.new(root, {
        fill: am5.color(config.accent),
        radius: config.particleSize,
        strokeOpacity: 0
      });

      flyingPointsSeries.bullets.push(function(root, series, dataItem) {
        let circle = am5.Circle.new(root, {
          shadowColor: am5.color(config.accent),
          shadowBlur: 6
        }, flyingDotTemplate);

        return am5.Bullet.new(root, {
          sprite: circle
        });
      });

      // 10. Drag detection to pause/resume auto-rotation
      chart.events.on("pointerdown", () => { isDragging = true; });
      chart.events.on("pointerup", () => { isDragging = false; lastTime = Date.now(); });
      window.addEventListener("pointerup", () => { isDragging = false; });

      // 11. Initial coloring & setup GUI
      updateColors();
      setupGUI();

      // 12. Start tick loop for rotation
      lastTime = Date.now();
      requestAnimationFrame(tick);

      // 13. Start arc generator
      setTimeout(spawnArc, 1500);
    });

    // Ticker for rotation
    function tick() {
      if (chart && config.autoRotate && !isDragging) {
        let rotation = chart.get("rotationX", 0);
        let now = Date.now();
        let delta = (now - lastTime) / 16.67; // Normalize to ~60fps
        lastTime = now;
        
        let newRotation = rotation + config.rotationSpeed * delta;
        if (newRotation > 360) newRotation -= 360;
        if (newRotation < -360) newRotation += 360;
        
        chart.set("rotationX", newRotation);
      } else {
        lastTime = Date.now();
      }
      requestAnimationFrame(tick);
    }

    // Connection arc spawner
    function spawnArc() {
      if (!lineSeries || !activePointsSeries || cities.length < 2) return;

      // 1. Pick two random distinct cities
      let idxA = Math.floor(Math.random() * cities.length);
      let idxB = Math.floor(Math.random() * cities.length);
      while (idxB === idxA) {
        idxB = Math.floor(Math.random() * cities.length);
      }

      let cityA = cities[idxA];
      let cityB = cities[idxB];

      // 2. Setup endpoints and push to activePointsSeries
      let activePointA = { longitude: cityA.longitude, latitude: cityA.latitude, id: cityA.name + "_" + Date.now() + "_A" };
      let activePointB = { longitude: cityB.longitude, latitude: cityB.latitude, id: cityB.name + "_" + Date.now() + "_B" };

      activePointsSeries.data.push(activePointA);
      activePointsSeries.data.push(activePointB);

      // 3. Create arc line data context
      let rawDataItem = {
        geometry: {
          type: "LineString",
          coordinates: [
            [cityA.longitude, cityA.latitude],
            [cityB.longitude, cityB.latitude]
          ]
        },
        activePoints: [activePointA, activePointB]
      };

      lineSeries.data.push(rawDataItem);
      activeArcs.push(rawDataItem);

      // Find the created line's data item
      let lineDataItem = lineSeries.dataItems.find(di => di.dataContext === rawDataItem);
      
      if (lineDataItem) {
        // Create the flying particle
        let rawFly = {
          lineDataItem: lineDataItem,
          positionOnLine: 0
        };
        flyingPointsSeries.data.push(rawFly);
        
        let flyDataItem = flyingPointsSeries.dataItems.find(di => di.dataContext === rawFly);
        if (flyDataItem) {
          let flyAnimation = flyDataItem.animate({
            key: "positionOnLine",
            to: 1,
            duration: config.connectorSpeed * 1000,
            easing: am5.ease.inOut(am5.ease.quad)
          });
          
          flyAnimation.waitForStop().then(() => {
            flyingPointsSeries.data.removeValue(rawFly);
          });
        }
      }

      // 4. Set a random lifetime for this arc (random disconnect between 3 to 8 seconds)
      let lifetime = 3000 + Math.random() * 5000;
      let disconnectTimeout = setTimeout(() => {
        disconnectArc(rawDataItem);
      }, lifetime);

      rawDataItem.disconnectTimeout = disconnectTimeout;

      // 5. Safeguard: if active arcs exceed cap (e.g. 6), force-disconnect the oldest immediately
      if (activeArcs.length > 6) {
        let oldestRaw = activeArcs[0];
        disconnectArc(oldestRaw);
      }

      // Schedule next arc spawner (random delay 1.5 to 3.0 seconds)
      let nextDelay = 1500 + Math.random() * 1500;
      setTimeout(spawnArc, nextDelay);
    }

    function disconnectArc(rawDataItem) {
      let idx = activeArcs.indexOf(rawDataItem);
      if (idx === -1) return; // Already disconnected!
      activeArcs.splice(idx, 1);

      if (rawDataItem.disconnectTimeout) {
        clearTimeout(rawDataItem.disconnectTimeout);
      }

      let sprite = rawDataItem.mapLineSprite;
      if (sprite) {
        sprite.animate({
          key: "strokeOpacity",
          to: 0,
          duration: 1000,
          easing: am5.ease.out(am5.ease.quad)
        });
      }

      rawDataItem.activePoints.forEach(p => {
        if (p.sprite) {
          p.sprite.animate({
            key: "opacity",
            to: 0,
            duration: 1000,
            easing: am5.ease.out(am5.ease.quad)
          });
        }
      });

      setTimeout(() => {
        lineSeries.data.removeValue(rawDataItem);
        rawDataItem.activePoints.forEach(p => {
          activePointsSeries.data.removeValue(p);
        });
      }, 1000);
    }

    // Update visual elements
    function updateColors() {
      // Greenscreen handling
      if (config.greenscreen) {
        document.body.classList.add("greenscreen-active");
        document.body.style.backgroundColor = "#00ff00";
      } else {
        document.body.classList.remove("greenscreen-active");
        document.body.style.backgroundColor = config.background;
      }

      if (backgroundSeries) {
        backgroundSeries.mapPolygons.template.set("fill", am5.color(config.ocean));
        backgroundSeries.mapPolygons.template.set("stroke", am5.color(config.accent));
      }

      if (polygonSeries) {
        polygonSeries.mapPolygons.template.set("fill", am5.color(config.land));
        polygonSeries.mapPolygons.template.set("stroke", am5.color(config.ocean));
      }

      if (graticuleSeries) {
        graticuleSeries.mapLines.template.set("stroke", am5.color(config.land));
      }

      if (lineSeries) {
        lineSeries.mapLines.template.set("stroke", am5.color(config.accent));
        lineSeries.mapLines.template.set("strokeWidth", config.strokeWidth);
      }

      if (cityDotTemplate) {
        cityDotTemplate.set("fill", am5.color(config.accent));
      }

      if (activeDotTemplate) {
        activeDotTemplate.set("fill", am5.color(config.accent));
      }

      if (flyingDotTemplate) {
        flyingDotTemplate.set("fill", am5.color(config.accent));
        flyingDotTemplate.set("radius", config.particleSize);
      }
    }

    // GUI controller setup

    function setupGUI() {
      gui = new GUI({ title: "Globe Configurations" });

      themeController = gui.add(config, "theme", ["Classic Parchment", "Midnight Terminal", "Deep Space Cyberpunk", "Holo Grid", "Solarized Dark", "Custom"])
        .name("Theme Preset")
        .onChange(value => {
          if (value !== "Custom" && presets[value]) {
            let p = presets[value];
            config.background = p.background;
            config.ocean = p.ocean;
            config.land = p.land;
            config.accent = p.accent;

            bgController.setValue(config.background);
            oceanController.setValue(config.ocean);
            landController.setValue(config.land);
            accentController.setValue(config.accent);

            updateColors();
          }
        });

      let folderColors = gui.addFolder("Custom Colors");
      
      bgController = folderColors.addColor(config, "background")
        .name("Screen Background")
        .onChange(() => {
          config.theme = "Custom";
          themeController.setValue("Custom");
          updateColors();
        });

      oceanController = folderColors.addColor(config, "ocean")
        .name("Globe Ocean")
        .onChange(() => {
          config.theme = "Custom";
          themeController.setValue("Custom");
          updateColors();
        });

      landController = folderColors.addColor(config, "land")
        .name("Globe Landmass")
        .onChange(() => {
          config.theme = "Custom";
          themeController.setValue("Custom");
          updateColors();
        });

      accentController = folderColors.addColor(config, "accent")
        .name("Arcs & Markers")
        .onChange(() => {
          config.theme = "Custom";
          themeController.setValue("Custom");
          updateColors();
        });

      let folderGlobe = gui.addFolder("Globe Control");
      
      folderGlobe.add(config, "autoRotate")
        .name("Auto Rotation");

      folderGlobe.add(config, "rotationSpeed", -2.0, 2.0, 0.05)
        .name("Speed Multiplier");

      folderGlobe.add(config, "greenscreen")
        .name("Green Screen")
        .onChange(() => {
          updateColors();
        });

      folderGlobe.add(config, "dragMode", ["Rotate", "Translate"])
        .name("Drag Interaction")
        .onChange(value => {
          if (value === "Rotate") {
            chart.set("panX", "rotateX");
            chart.set("panY", "rotateY");
          } else {
            chart.set("panX", "translateX");
            chart.set("panY", "translateY");
          }
        });

      let folderConnectors = gui.addFolder("Connectors Settings");
      
      folderConnectors.add(config, "connectorSpeed", 0.5, 5.0, 0.1)
        .name("Travel Time (s)");

      folderConnectors.add(config, "strokeWidth", 0.5, 5.0, 0.1)
        .name("Line Thickness")
        .onChange(() => {
          updateColors();
        });

      folderConnectors.add(config, "particleSize", 2.0, 8.0, 0.5)
        .name("Fly Size (px)")
        .onChange(() => {
          updateColors();
        });

      folderColors.close();
      folderGlobe.open();
      folderConnectors.open();
    }

    // Keyboard 'H' key toggle visibility of lil-gui
    let guiVisible = true;
    window.addEventListener("keydown", (e) => {
      if (e.key.toLowerCase() === "h") {
        guiVisible = !guiVisible;
        if (guiVisible) {
          gui.show();
        } else {
          gui.hide();
        }
      }
    });

    // Dispose root on unload
    window.addEventListener("beforeunload", () => {
      if (root) {
        root.dispose();
      }
    });
  </script>
</body>
</html>
