<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js ASCII Tornado</title>
    <!-- Import Kode Mono Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@700&display=swap" rel="stylesheet">
    
    <!-- Import Three.js, Lil-GUI and Post-Processing modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #ffffff;
            transition: background-color 0.3s;
        }
        canvas {
            display: block;
        }
        .lil-gui.root {
            position: absolute;
            top: auto;
            bottom: 10px;
            right: 10px;
        }
        /* Instructions Overlay */
        #instructions {
            position: absolute;
            top: 15px;
            left: 15px;
            color: rgba(0, 0, 0, 0.7);
            font-size: 13px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
            z-index: 100;
            transition: color 0.3s, background-color 0.3s, border-color 0.3s;
        }
        body.dark-mode #instructions {
            color: rgba(255, 255, 255, 0.85);
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body.greenscreen-active #instructions {
            color: rgba(0, 0, 0, 0.85);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 255, 0, 0.3);
        }
    </style>
</head>
<body>
    <div id="instructions">
        Left Click + Drag: <strong>Rotate</strong> | Right Click + Drag: Pan (Drag Object) | Scroll Wheel: Zoom
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import GUI from 'lil-gui';

        // --- Color Presets ---
        const colorSchemes = {
            'Default White': {
                colorTop: '#121afd',
                colorBottom: '#121afd',
                backgroundColor: '#ffffff'
            },
            'Cyberpunk Neon': {
                colorTop: '#ff0055',
                colorBottom: '#00ffcc',
                backgroundColor: '#0a0a0f'
            },
            'Midnight Matrix': {
                colorTop: '#00ff66',
                colorBottom: '#003311',
                backgroundColor: '#020202'
            },
            'Solar Flare': {
                colorTop: '#ffa100',
                colorBottom: '#ff3300',
                backgroundColor: '#0c0502'
            },
            'Deep Iceberg': {
                colorTop: '#00e5ff',
                colorBottom: '#121afd',
                backgroundColor: '#030510'
            },
            'Amber CRT': {
                colorTop: '#ffb000',
                colorBottom: '#332200',
                backgroundColor: '#050400'
            }
        };

        // --- Configuration ---
        const params = {
            // Movement
            verticalSpeed: 1.4,
            rotationSpeed: -0.53,
            twist: -2.6,
            
            // Vortex Streams
            streamCount: 3,
            streamWidth: 0.762,
            randomness: 3.73,

            // Colors & Gradient
            colorTop: '#121afd',
            colorBottom: '#121afd',
            backgroundColor: '#ffffff',
            
            // Glow (Bloom)
            enableBloom: false,
            bloomStrength: 1.5,
            bloomRadius: 0.5,
            bloomThreshold: 0,

            // Shape
            count: 15000,
            baseSize: 7.7,
            radiusTop: 9.0,
            radiusBottom: 3.0,
            height: 45,

            // ASCII Mode
            useAscii: true,

            // Interactions & Greenscreen
            greenscreen: false,
            colorScheme: 'Default White',
            controlMode: 'Rotate'
        };

        // --- Setup Scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(params.backgroundColor);
        scene.fog = new THREE.FogExp2(params.backgroundColor, 0.02);

        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.01, 200);
        camera.position.set(0, 0, 35);

        const renderer = new THREE.WebGLRenderer({ antialias: true }); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = true;

        // --- ASCII Texture Generation ---
        // Generates a sprite sheet with 0-9 and A-Z
        const createFontTexture = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const size = 512; // Texture size
            canvas.width = size;
            canvas.height = size;
            
            // Grid settings: 6x6 = 36 cells.
            // We have 10 digits + 26 letters = 36 characters exactly.
            const cols = 6;
            const rows = 6;
            const charSize = size / cols;

            const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

            ctx.fillStyle = 'rgba(0,0,0,0)'; // Transparent background
            ctx.fillRect(0, 0, size, size);

            ctx.font = `bold ${charSize * 0.8}px "Kode Mono", monospace`;
            ctx.fillStyle = 'white'; // Draw white text, we color it in shader
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for (let i = 0; i < chars.length; i++) {
                const char = chars[i];
                const col = i % cols;
                const row = Math.floor(i / cols);
                
                const x = col * charSize + charSize / 2;
                const y = row * charSize + charSize / 2; // + offset for baseline

                ctx.fillText(char, x, y + (charSize * 0.05));
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            // Needed to ensure sprite mapping works intuitively
            texture.flipY = false; 
            return texture;
        };

        // Wait for font to load before creating texture (optional but recommended)
        // If font isn't ready, it might draw fallback font first.
        let fontTexture = createFontTexture();
        document.fonts.ready.then(() => {
            fontTexture = createFontTexture(); // Re-generate once font is loaded
            if(material) material.uniforms.uFontTexture.value = fontTexture;
        });

        // --- Post Processing Setup ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            params.bloomStrength,
            params.bloomRadius,
            params.bloomThreshold
        );

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- Particle System ---
        let points = null;
        let geometry = null;
        let material = null;

        const generateParticles = () => {
            if (points) {
                geometry.dispose();
                material.dispose();
                scene.remove(points);
            }

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(params.count * 3);
            const offsets = new Float32Array(params.count * 3);
            const scales = new Float32Array(params.count);
            const phases = new Float32Array(params.count);
            const charIndices = new Float32Array(params.count); // For ASCII

            for (let i = 0; i < params.count; i++) {
                const armIndex = i % params.streamCount; 
                const armAngle = (armIndex / params.streamCount) * Math.PI * 2;
                const randomSpread = (Math.random() - 0.5) * params.streamWidth;
                const finalAngle = armAngle + randomSpread;

                positions[i * 3] = finalAngle;
                positions[i * 3 + 1] = 0; 
                positions[i * 3 + 2] = 0;

                phases[i] = Math.random();

                offsets[i * 3] = (Math.random() - 0.5) * params.randomness;
                offsets[i * 3 + 1] = (Math.random() - 0.5) * params.randomness;
                offsets[i * 3 + 2] = (Math.random() - 0.5) * params.randomness;

                scales[i] = Math.random();
                
                // Random char index from 0 to 35
                charIndices[i] = Math.floor(Math.random() * 36);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('aOffset', new THREE.BufferAttribute(offsets, 3));
            geometry.setAttribute('aScale', new THREE.BufferAttribute(scales, 1));
            geometry.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
            geometry.setAttribute('aCharIndex', new THREE.BufferAttribute(charIndices, 1));

            material = new THREE.ShaderMaterial({
                transparent: true,
                depthWrite: false,
                blending: THREE.NormalBlending,
                vertexColors: false,
                uniforms: {
                    uTime: { value: 0 },
                    uColorBottom: { value: new THREE.Color(params.colorBottom) },
                    uColorTop: { value: new THREE.Color(params.colorTop) },
                    uSize: { value: params.baseSize * renderer.getPixelRatio() },
                    uHeight: { value: params.height },
                    uRadiusTop: { value: params.radiusTop },
                    uRadiusBottom: { value: params.radiusBottom },
                    uTwist: { value: params.twist },
                    uRotationSpeed: { value: params.rotationSpeed },
                    uVerticalSpeed: { value: params.verticalSpeed },
                    // ASCII Uniforms
                    uFontTexture: { value: fontTexture },
                    uUseAscii: { value: params.useAscii ? 1.0 : 0.0 }
                },
                vertexShader: `
                    uniform float uTime;
                    uniform float uSize;
                    uniform float uHeight;
                    uniform float uRadiusTop;
                    uniform float uRadiusBottom;
                    uniform float uTwist;
                    uniform float uRotationSpeed;
                    uniform float uVerticalSpeed;

                    attribute vec3 aOffset;
                    attribute float aScale;
                    attribute float aPhase;
                    attribute float aCharIndex;

                    varying float vHeightRatio;
                    varying float vCharIndex;

                    void main() {
                        // Pass char index to frag
                        vCharIndex = aCharIndex;

                        float y = mod((aPhase * uHeight) + (uTime * uVerticalSpeed), uHeight);
                        vHeightRatio = y / uHeight; 

                        float currentRadius = mix(uRadiusBottom, uRadiusTop, vHeightRatio);

                        float baseAngle = position.x;
                        float angle = baseAngle + (uTime * uRotationSpeed) + (y * 0.1 * uTwist);

                        vec3 newPos = vec3(0.0);
                        newPos.x = cos(angle) * currentRadius;
                        newPos.z = sin(angle) * currentRadius;
                        newPos.y = y - (uHeight / 2.0);

                        newPos += aOffset;

                        vec4 mvPosition = modelViewMatrix * vec4(newPos, 1.0);
                        gl_Position = projectionMatrix * mvPosition;

                        gl_PointSize = uSize * aScale * (50.0 / -mvPosition.z);
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColorBottom;
                    uniform vec3 uColorTop;
                    uniform sampler2D uFontTexture;
                    uniform float uUseAscii;

                    varying float vHeightRatio;
                    varying float vCharIndex;

                    void main() {
                        float alpha = 0.0;
                        
                        if (uUseAscii > 0.5) {
                            // --- ASCII Logic ---
                            // Grid is 6x6
                            float cols = 6.0;
                            float rows = 6.0;
                            
                            // Calculate column and row for this character
                            float colIndex = mod(vCharIndex, cols);
                            float rowIndex = floor(vCharIndex / cols);
                            
                            // Map gl_PointCoord (0..1) to sub-grid UV
                            vec2 uv = gl_PointCoord / cols;
                            uv.x += colIndex / cols;
                            uv.y += rowIndex / rows;
                            
                            vec4 texColor = texture2D(uFontTexture, uv);
                            alpha = texColor.a; // Use texture alpha (text shape)
                        } else {
                            // --- Circle Logic ---
                            float dist = distance(gl_PointCoord, vec2(0.5));
                            if(dist > 0.5) discard;
                            alpha = 1.0 - smoothstep(0.4, 0.5, dist);
                        }

                        // --- Vertical Fade Logic ---
                        float fadeIn = smoothstep(0.0, 0.1, vHeightRatio);
                        float fadeOut = 1.0 - smoothstep(0.9, 1.0, vHeightRatio);
                        float finalAlpha = alpha * fadeIn * fadeOut;

                        if (finalAlpha < 0.01) discard;

                        vec3 finalColor = mix(uColorBottom, uColorTop, vHeightRatio);
                        gl_FragColor = vec4(finalColor, finalAlpha);
                    }
                `
            });

            points = new THREE.Points(geometry, material);
            points.frustumCulled = false;
            scene.add(points);
        };

        generateParticles();

        // --- Background & Interaction Logic ---
        function isDarkColor(hex) {
            const color = new THREE.Color(hex);
            const luma = 0.299 * color.r + 0.587 * color.g + 0.114 * color.b;
            return luma < 0.5;
        }

        function updateBackground() {
            if (params.greenscreen) {
                const green = new THREE.Color('#00ff00');
                scene.background = green;
                if (scene.fog) scene.fog.color = green;
                renderer.setClearColor(green);
                document.body.classList.remove('dark-mode');
                document.body.classList.add('greenscreen-active');
            } else {
                const c = new THREE.Color(params.backgroundColor);
                scene.background = c;
                if (scene.fog) scene.fog.color = c;
                renderer.setClearColor(c);
                document.body.classList.remove('greenscreen-active');
                if (isDarkColor(params.backgroundColor)) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }
        }

        let greenscreenController, schemeController, colorTopController, colorBottomController, backgroundColorController;

        function applyColorScheme(schemeName) {
            const scheme = colorSchemes[schemeName];
            if (scheme) {
                params.greenscreen = false;
                if (greenscreenController) greenscreenController.updateDisplay();

                params.colorTop = scheme.colorTop;
                params.colorBottom = scheme.colorBottom;
                params.backgroundColor = scheme.backgroundColor;

                if (colorTopController) colorTopController.updateDisplay();
                if (colorBottomController) colorBottomController.updateDisplay();
                if (backgroundColorController) backgroundColorController.updateDisplay();

                if (material) {
                    material.uniforms.uColorTop.value.set(params.colorTop);
                    material.uniforms.uColorBottom.value.set(params.colorBottom);
                }
                updateBackground();
            }
        }

        updateBackground();

        // --- GUI Panel ---
        const gui = new GUI({ title: 'Tornado Settings' });

        const fBg = gui.addFolder('Background & Interaction');
        greenscreenController = fBg.add(params, 'greenscreen').name('Green Screen (#00ff00)').onChange(updateBackground);
        schemeController = fBg.add(params, 'colorScheme', Object.keys(colorSchemes)).name('Preset Scheme').onChange(applyColorScheme);
        fBg.add(params, 'controlMode', ['Rotate', 'Pan']).name('Left Click Drag').onChange(v => {
            if (v === 'Pan') {
                controls.mouseButtons.LEFT = THREE.MOUSE.PAN;
                controls.mouseButtons.RIGHT = THREE.MOUSE.ROTATE;
                document.getElementById('instructions').innerHTML = 'Left Click + Drag: <strong>Pan (Drag Object)</strong> | Right Click + Drag: Rotate | Scroll Wheel: Zoom';
            } else {
                controls.mouseButtons.LEFT = THREE.MOUSE.ROTATE;
                controls.mouseButtons.RIGHT = THREE.MOUSE.PAN;
                document.getElementById('instructions').innerHTML = 'Left Click + Drag: <strong>Rotate</strong> | Right Click + Drag: Pan (Drag Object) | Scroll Wheel: Zoom';
            }
        });
        fBg.open();

        const fAnim = gui.addFolder('Movement');
        fAnim.add(params, 'verticalSpeed', 0.0, 10.0).name('Up Speed').onChange(v => {
            if (material) material.uniforms.uVerticalSpeed.value = v;
        });
        fAnim.add(params, 'rotationSpeed', -5.0, 5.0).name('Spin Speed').onChange(v => {
            if (material) material.uniforms.uRotationSpeed.value = v;
        });
        fAnim.add(params, 'twist', -10.0, 10.0).name('Twist Factor').onChange(v => {
            if (material) material.uniforms.uTwist.value = v;
        });

        const fStreams = gui.addFolder('Vortex Streams');
        fStreams.add(params, 'streamCount', 1, 10, 1).name('Num Streams').onFinishChange(generateParticles);
        fStreams.add(params, 'streamWidth', 0.0, 6.0).name('Stream Spread').onFinishChange(generateParticles);
        fStreams.add(params, 'randomness', 0.0, 10.0).name('Chaos').onFinishChange(generateParticles);

        const fColors = gui.addFolder('Colors & Gradient');
        colorTopController = fColors.addColor(params, 'colorTop').name('Top Color').onChange(v => {
            if (material) material.uniforms.uColorTop.value.set(v);
        });
        colorBottomController = fColors.addColor(params, 'colorBottom').name('Bottom Color').onChange(v => {
            if (material) material.uniforms.uColorBottom.value.set(v);
        });
        backgroundColorController = fColors.addColor(params, 'backgroundColor').name('Background').onChange(v => {
            params.greenscreen = false;
            if (greenscreenController) greenscreenController.updateDisplay();
            updateBackground();
        });

        const fBloom = gui.addFolder('Glow (Bloom)');
        fBloom.add(params, 'enableBloom').name('Enable Bloom'); 
        fBloom.add(params, 'bloomStrength', 0.0, 3.0).name('Strength').onChange(v => bloomPass.strength = v);
        fBloom.add(params, 'bloomRadius', 0.0, 1.0).name('Radius').onChange(v => bloomPass.radius = v);

        const fShape = gui.addFolder('Shape');
        fShape.add(params, 'count', 1000, 50000, 1000).name('Particle Count').onFinishChange(generateParticles);
        fShape.add(params, 'baseSize', 0.1, 10).name('Size').onChange(v => {
            if (material) material.uniforms.uSize.value = v * renderer.getPixelRatio();
        });
        fShape.add(params, 'radiusTop', 1, 30).name('Top Width').onChange(v => {
            if (material) material.uniforms.uRadiusTop.value = v;
        });
        fShape.add(params, 'radiusBottom', 0.1, 10).name('Bottom Width').onChange(v => {
            if (material) material.uniforms.uRadiusBottom.value = v;
        });

        // --- NEW: ASCII Toggle ---
        gui.add(params, 'useAscii').name('Enable ASCII Mode').onChange(v => {
            if (material) material.uniforms.uUseAscii.value = v ? 1.0 : 0.0;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            if (material) material.uniforms.uSize.value = params.baseSize * renderer.getPixelRatio();
        });

        const clock = new THREE.Clock();
        const animate = () => {
            const time = clock.getElapsedTime();
            if (material) material.uniforms.uTime.value = time;

            controls.update();

            if (params.enableBloom) {
                composer.render();
            } else {
                renderer.render(scene, camera);
            }
            
            requestAnimationFrame(animate);
        };

        animate();
    </script>
</body>
</html>
