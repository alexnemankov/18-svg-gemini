<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>mediterranean drift V3</title>
	<style>
		@import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap");

		@layer reset, base, layout, ui;

		@layer reset {
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
		}

		@layer base {
			:root {
				--bg: #0d141a;
				--paper: #f0ece3;
				--muted: #a3b0b8;
				--low: #e0896a;
				--high: #6a9fe0;
				--font-mono: "DM Mono", ui-monospace, monospace;
				--font-display: "Bebas Neue", system-ui, sans-serif;
			}

			html,
			body {
				block-size: 100%;
			}

			body {
				background: var(--bg);
				color: var(--paper);
				font-family: var(--font-mono);
				overflow: hidden;
			}
		}

		@layer layout {
			.map {
				position: fixed;
				inset: 0;
				background: var(--bg);
				isolation: isolate;
			}

			/* Zoom and drag container to scale canvas and markers together */
			.zoom-container {
				position: absolute;
				inset: 0;
				transform-origin: 0 0;
				will-change: transform;
			}

			.zoom-container::after {
				content: "";
				position: absolute;
				inset: 0;
				z-index: 1;
				pointer-events: none;
				background-image: repeating-linear-gradient(
						to right,
						color-mix(in oklab, var(--paper) 18%, transparent) 0 1px,
						transparent 1px 84px
					),
					repeating-linear-gradient(
						to bottom,
						color-mix(in oklab, var(--paper) 18%, transparent) 0 1px,
						transparent 1px 84px
					);
				opacity: 0.5;
			}

			#wind_canvas {
				position: absolute;
				inset: 0;
				z-index: 0;
				inline-size: 100%;
				block-size: 100%;
			}

			.markers {
				position: absolute;
				inset: 0;
				z-index: 2;
				pointer-events: none;
			}
		}

		@layer ui {
			.pressure-system {
				position: absolute;
				inset-block-start: 0;
				inset-inline-start: 0;
				inline-size: var(--pressure-size, 7rem);
				block-size: var(--pressure-size, 7rem);
				pointer-events: none;
				will-change: transform;
			}

			.pressure-ring,
			.pressure-marker {
				position: absolute;
				inset: 50% auto auto 50%;
				border-radius: 50%;
				transform: translate(-50%, -50%);
			}

			.pressure-ring {
				background: transparent;
				box-shadow: none;
				inline-size: calc(var(--pressure-size, 7rem) * var(--ring-scale, 1));
				block-size: calc(var(--pressure-size, 7rem) * var(--ring-scale, 1));
				border: 1px solid color-mix(in oklab, var(--paper) 46%, transparent);
				opacity: calc(var(--pressure-opacity, 0.42) * var(--ring-opacity, 1));
			}

			.pressure-ring[data-ring="1"] {
				--ring-scale: 0.72;
				--ring-opacity: 0.24;
			}

			.pressure-ring[data-ring="2"] {
				--ring-scale: 1.18;
				--ring-opacity: 0.16;
			}

			.pressure-ring[data-ring="3"] {
				--ring-scale: 1.72;
				--ring-opacity: 0.09;
			}

			.pressure-marker {
				display: grid;
				place-items: center;
				inline-size: 1.8rem;
				block-size: 1.8rem;
				border: 1px solid color-mix(in oklab, var(--paper) 42%, transparent);
				font-family: var(--font-display);
				font-size: 1.05rem;
				line-height: 1;
				color: color-mix(in oklab, var(--paper) 88%, transparent);
				background: color-mix(in oklab, var(--bg) 76%, transparent);
				box-shadow: 0 0 0 1px color-mix(in oklab, var(--bg) 60%, transparent);
			}

			.caption {
				position: fixed;
				z-index: 3;
				inset-block-start: clamp(1rem, 3vmin, 2rem);
				inset-inline-start: clamp(1rem, 3vmin, 2rem);
				pointer-events: none;
			}

			.caption-title {
				font-family: var(--font-display);
				font-size: clamp(1.9rem, 5vmin, 3.2rem);
				line-height: 0.9;
				letter-spacing: 0.03em;
			}

			.caption-hint {
				margin-block-start: 0.4rem;
				font-size: 0.6rem;
				letter-spacing: 0.24em;
				text-transform: uppercase;
				color: var(--muted);
			}

			.mode-panel {
				position: fixed;
				z-index: 3;
				inset-block-end: clamp(1rem, 3vmin, 2rem);
				inset-inline-end: clamp(1rem, 3vmin, 2rem);
				display: flex;
				flex-wrap: wrap;
				justify-content: flex-end;
				gap: 0.35rem;
				max-inline-size: min(34rem, calc(100vw - 2rem));
			}

			.mode-panel button {
				appearance: none;
				border: 1px solid color-mix(in oklab, var(--paper) 18%, transparent);
				padding: 0.42rem 0.58rem;
				font: inherit;
				font-size: 0.55rem;
				letter-spacing: 0.16em;
				text-transform: uppercase;
				color: color-mix(in oklab, var(--paper) 68%, transparent);
				background: color-mix(in oklab, var(--bg) 72%, transparent);
				cursor: pointer;
			}

			.mode-panel button:hover,
			.mode-panel button:focus-visible {
				color: var(--paper);
				border-color: color-mix(in oklab, var(--paper) 38%, transparent);
			}

			.mode-panel button.is-active {
				color: var(--paper);
				border-color: color-mix(in oklab, var(--paper) 58%, transparent);
				background: color-mix(in oklab, var(--paper) 12%, var(--bg));
			}

			.legend {
				position: fixed;
				z-index: 3;
				inset-block-end: clamp(1rem, 3vmin, 2rem);
				inset-inline-start: clamp(1rem, 3vmin, 2rem);
				display: flex;
				flex-direction: column;
				gap: 0.4rem;
				pointer-events: none;
			}

			.legend-scale {
				display: flex;
				justify-content: space-between;
				font-size: 0.55rem;
				letter-spacing: 0.2em;
				text-transform: uppercase;
				color: var(--muted);
			}

			#legend_bar {
				inline-size: clamp(9rem, 22vw, 14rem);
				block-size: 0.45rem;
				border: 1px solid color-mix(in oklab, var(--paper) 16%, transparent);
			}
		}

		@media (max-width: 46rem) {
			@layer ui {
				.mode-panel {
					inset-block-end: clamp(4.2rem, 10vmin, 5.2rem);
					inset-inline-start: clamp(1rem, 3vmin, 2rem);
					inset-inline-end: auto;
					justify-content: flex-start;
				}

				.mode-panel button {
					font-size: 0.5rem;
					padding: 0.36rem 0.48rem;
				}
			}
		}

		/* Greenscreen active overrides */
		body.greenscreen-active {
			background: #00ff00 !important;
		}
		body.greenscreen-active .map {
			background: #00ff00 !important;
		}
		body.greenscreen-active .zoom-container::after {
			display: none !important;
		}
		body.greenscreen-active .caption,
		body.greenscreen-active .legend,
		body.greenscreen-active .mode-panel,
		body.greenscreen-active .markers {
			display: none !important;
		}

		/* Keyboard hidden UI overrides */
		body.ui-hidden .caption,
		body.ui-hidden .legend,
		body.ui-hidden .mode-panel,
		body.ui-hidden .markers,
		body.ui-hidden .lil-gui {
			display: none !important;
		}
	</style>
</head>

				displayY: s.y,
				phaseX: rand(0, Math.PI * 2),
				phaseY: rand(0, Math.PI * 2),
				phaseStrength: rand(0, Math.PI * 2),
				phaseRadius: rand(0, Math.PI * 2)
			}))
		};

		function rand(min, max) {
			return min + Math.random() * (max - min);
		}

		function clamp(v, min, max) {
			return v < min ? min : v > max ? max : v;
		}

		// Hex to RGB parser helper
		function hexToRgb(hex) {
			hex = hex.replace(/^#/, "");
			if (hex.length === 3) {
				hex = hex.split("").map(c => c + c).join("");
			}
			const bigint = parseInt(hex, 16);
			return [
				((bigint >> 16) & 255) / 255,
				((bigint >> 8) & 255) / 255,
				(bigint & 255) / 255
			];
		}

		function compileShader(type, source) {
			const shader = gl.createShader(type);
			gl.shaderSource(shader, source);
			gl.compileShader(shader);

			if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
				throw new Error(gl.getShaderInfoLog(shader) || "Shader compile failed.");
			}

			return shader;
		}

		function createProgram(vertexSource, fragmentSource) {
			const program = gl.createProgram();
			gl.attachShader(program, compileShader(gl.VERTEX_SHADER, vertexSource));
			gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, fragmentSource));
			gl.linkProgram(program);

			if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
				throw new Error(gl.getProgramInfoLog(program) || "Program link failed.");
			}

			return program;
		}

		const quadProgram = createProgram(
			`
			attribute vec2 a_pos;
			varying vec2 v_uv;
			void main() {
				v_uv = a_pos * 0.5 + 0.5;
				gl_Position = vec4(a_pos, 0.0, 1.0);
			}
			`,
			`
			precision mediump float;
			uniform sampler2D u_tex;
			uniform vec3 u_bg;
			uniform float u_keep;
			uniform float u_mode;
			varying vec2 v_uv;
			void main() {
				vec3 c = texture2D(u_tex, v_uv).rgb;
				vec3 faded = mix(u_bg, c, u_keep);
				vec3 outColor = mix(c, faded, u_mode);
				gl_FragColor = vec4(outColor, 1.0);
			}
			`
		);

		const lineProgram = createProgram(
			`
			attribute vec2 a_pos;
			attribute vec4 a_color;
			uniform float u_aspect;
			varying vec4 v_color;
			void main() {
				float x = (a_pos.x / u_aspect) * 2.0 - 1.0;
				float y = 1.0 - a_pos.y * 2.0;
				gl_Position = vec4(x, y, 0.0, 1.0);
				v_color = a_color;
			}
			`,
			`
			precision mediump float;
			varying vec4 v_color;
			void main() {
				gl_FragColor = v_color;
			}
			`
		);

		const pressureProgram = createProgram(
			`
			attribute vec2 a_pos;
			attribute vec4 a_color;
			attribute float a_size;
			uniform float u_aspect;
			varying vec4 v_color;
			void main() {
				float x = (a_pos.x / u_aspect) * 2.0 - 1.0;
				float y = 1.0 - a_pos.y * 2.0;
				gl_Position = vec4(x, y, 0.0, 1.0);
				gl_PointSize = a_size;
				v_color = a_color;
			}
			`,
			`
			precision mediump float;
			varying vec4 v_color;
			void main() {
				vec2 p = gl_PointCoord - 0.5;
				float d = length(p) * 2.0;
				float outer = smoothstep(1.0, 0.94, d) * smoothstep(0.88, 0.94, d);
				float mid = smoothstep(0.74, 0.69, d) * smoothstep(0.63, 0.69, d);
				float inner = smoothstep(0.48, 0.43, d) * smoothstep(0.36, 0.43, d);
				float alpha = max(max(outer, mid * 0.72), inner * 0.58);
				gl_FragColor = vec4(v_color.rgb, alpha * v_color.a);
			}
			`
		);

		const quad = {
			program: quadProgram,
			buffer: gl.createBuffer(),
			aPos: gl.getAttribLocation(quadProgram, "a_pos"),
			uTex: gl.getUniformLocation(quadProgram, "u_tex"),
			uBg: gl.getUniformLocation(quadProgram, "u_bg"),
			uKeep: gl.getUniformLocation(quadProgram, "u_keep"),
			uMode: gl.getUniformLocation(quadProgram, "u_mode")
		};

		gl.bindBuffer(gl.ARRAY_BUFFER, quad.buffer);
		gl.bufferData(
			gl.ARRAY_BUFFER,
			new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]),
			gl.STATIC_DRAW
		);

		const lines = {
			program: lineProgram,
			positionBuffer: gl.createBuffer(),
			colorBuffer: gl.createBuffer(),
			aPos: gl.getAttribLocation(lineProgram, "a_pos"),
			aColor: gl.getAttribLocation(lineProgram, "a_color"),
			uAspect: gl.getUniformLocation(lineProgram, "u_aspect")
		};

		gl.bindBuffer(gl.ARRAY_BUFFER, lines.positionBuffer);
		gl.bufferData(gl.ARRAY_BUFFER, linePositions.byteLength, gl.DYNAMIC_DRAW);

		gl.bindBuffer(gl.ARRAY_BUFFER, lines.colorBuffer);
		gl.bufferData(gl.ARRAY_BUFFER, lineColors.byteLength, gl.DYNAMIC_DRAW);

		const pressurePositions = new Float32Array(SYSTEMS.length * 2);
		const pressureColors = new Float32Array(SYSTEMS.length * 4);
		const pressureSizes = new Float32Array(SYSTEMS.length);

		const pressure = {
			program: pressureProgram,
			positionBuffer: gl.createBuffer(),
			colorBuffer: gl.createBuffer(),
			sizeBuffer: gl.createBuffer(),
			aPos: gl.getAttribLocation(pressureProgram, "a_pos"),
			aColor: gl.getAttribLocation(pressureProgram, "a_color"),
			aSize: gl.getAttribLocation(pressureProgram, "a_size"),
			uAspect: gl.getUniformLocation(pressureProgram, "u_aspect")
		};

		gl.bindBuffer(gl.ARRAY_BUFFER, pressure.positionBuffer);
		gl.bufferData(gl.ARRAY_BUFFER, pressurePositions.byteLength, gl.DYNAMIC_DRAW);
		gl.bindBuffer(gl.ARRAY_BUFFER, pressure.colorBuffer);
		gl.bufferData(gl.ARRAY_BUFFER, pressureColors.byteLength, gl.DYNAMIC_DRAW);
		gl.bindBuffer(gl.ARRAY_BUFFER, pressure.sizeBuffer);
		gl.bufferData(gl.ARRAY_BUFFER, pressureSizes.byteLength, gl.DYNAMIC_DRAW);

		function createTexture(w, h) {
			const tex = gl.createTexture();
			gl.bindTexture(gl.TEXTURE_2D, tex);
			gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
			gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
			gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
			gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
			gl.texImage2D(
				gl.TEXTURE_2D,
				0,
				gl.RGBA,
				w,
				h,
				0,
				gl.RGBA,
				gl.UNSIGNED_BYTE,
				null
			);
			return tex;
		}

		function createFramebuffer(tex) {
			const fbo = gl.createFramebuffer();
			gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
			gl.framebufferTexture2D(
				gl.FRAMEBUFFER,
				gl.COLOR_ATTACHMENT0,
				gl.TEXTURE_2D,
				tex,
				0
			);
			return fbo;
		}

		function clearFramebuffer(fbo) {
			gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
			gl.viewport(0, 0, state.pw, state.ph);
			gl.disable(gl.BLEND);
			gl.clearColor(BG_RGB[0], BG_RGB[1], BG_RGB[2], 1);
			gl.clear(gl.COLOR_BUFFER_BIT);
		}

		function rebuildRenderTargets() {
			if (state.texA) gl.deleteTexture(state.texA);
			if (state.texB) gl.deleteTexture(state.texB);
			if (state.fboA) gl.deleteFramebuffer(state.fboA);
			if (state.fboB) gl.deleteFramebuffer(state.fboB);

			state.texA = createTexture(state.pw, state.ph);
			state.texB = createTexture(state.pw, state.ph);
			state.fboA = createFramebuffer(state.texA);
			state.fboB = createFramebuffer(state.texB);

			state.read = { tex: state.texA, fbo: state.fboA };
			state.write = { tex: state.texB, fbo: state.fboB };

			clearFramebuffer(state.fboA);
			clearFramebuffer(state.fboB);
			gl.bindFramebuffer(gl.FRAMEBUFFER, null);
		}

		function speedBinSq(sp2) {
			if (sp2 < 0.0016) return 0;
			if (sp2 < 0.0036) return 1;
			if (sp2 < 0.0064) return 2;
			if (sp2 < 0.01) return 3;
			if (sp2 < 0.0144) return 4;
			if (sp2 < 0.0196) return 5;
			if (sp2 < 0.0256) return 6;
			return 7;
		}

		function writeLineColor(offset, sp2) {
			const scaled = clamp(sp2 * SPEED_COLOR_GAIN, 0, 1) * (NBINS - 1);
			const idx = scaled | 0;
			const next = idx < NBINS - 1 ? idx + 1 : idx;
			const mix = scaled - idx;
			const c0 = COLORS[idx];
			const c1 = COLORS[next];

			const r = c0[0] + (c1[0] - c0[0]) * mix;
			const g = c0[1] + (c1[1] - c0[1]) * mix;
			const b = c0[2] + (c1[2] - c0[2]) * mix;

			lineColors[offset++] = r;
			lineColors[offset++] = g;
			lineColors[offset++] = b;
			lineColors[offset++] = LINE_ALPHA;
			lineColors[offset++] = r;
			lineColors[offset++] = g;
			lineColors[offset++] = b;
			lineColors[offset++] = LINE_ALPHA;

			return offset;
		}

		function spawn(i) {
			const x = rand(0, state.aspect);
			const y = rand(0, 1);

			xs[i] = x;
			ys[i] = y;
			pxs[i] = x;
			pys[i] = y;
			ages[i] = rand(0, LIFE_MAX);
			lifes[i] = rand(LIFE_MIN, LIFE_MAX);
			bins[i] = 0;
		}

		function initParticles() {
			for (let i = 0; i < COUNT; i++) spawn(i);
		}

		function buildLegend() {
			legendBar.style.background = `linear-gradient(90deg, ${COLORS.map(
				(c) =>
					`rgb(${Math.round(c[0] * 255)}, ${Math.round(c[1] * 255)}, ${Math.round(
						c[2] * 255
					)})`
			).join(", ")})`;
		}

		function buildMarkers() {
			markers.textContent = "";
			markerEls.length = 0;
			pressureGroups.length = 0;

			for (let i = 0; i < state.systems.length; i++) {
				const group = document.createElement("div");
				const label = document.createElement("div");
				const kind = state.systems[i].spin > 0 ? "L" : "H";

				group.className = "pressure-system";
				group.dataset.kind = kind;

				for (let r = 0; r < 3; r++) {
					const ring = document.createElement("div");
					ring.className = "pressure-ring";
					ring.dataset.ring = String(r + 1);
					group.appendChild(ring);
				}

				label.className = "pressure-marker";
				label.dataset.kind = kind;
				label.textContent = kind;

				group.appendChild(label);
				markers.appendChild(group);

				markerEls.push(group);
				pressureGroups.push(group);
			}
		}

		function stepSystems(dt) {
			const systems = state.systems;
			const t = performance.now() * 0.001;
			const driftEase = Math.min(1, dt * 0.32);

			for (let i = 0; i < systems.length; i++) {
				const s = systems[i];
				const wobbleX = Math.sin(t * 0.071 + s.phaseX) * state.wander;
				const wobbleY = Math.cos(t * 0.064 + s.phaseY) * state.wander;
				const tx = clamp(s.targetX + wobbleX, 0.1, 0.9);
				const ty = clamp(s.targetY + wobbleY, 0.14, 0.86);

				s.x += (tx - s.x) * driftEase;
				s.y += (ty - s.y) * driftEase;
				s.spin = s.targetSpin;

				const strengthWave = Math.sin(t * 0.045 + s.phaseStrength);
				const radiusWave = Math.cos(t * 0.038 + s.phaseRadius);

				s.baseStrength += (s.targetStrength - s.baseStrength) * driftEase;
				s.baseR += (s.targetR - s.baseR) * driftEase;
				s.strength = s.baseStrength * (1 + strengthWave * SYSTEM_EVOLUTION);
				s.r = s.baseR * (1 + radiusWave * SYSTEM_EVOLUTION * 0.7);

				s.displayX += (s.x - s.displayX) * MARKER_SMOOTHING;
				s.displayY += (s.y - s.displayY) * MARKER_SMOOTHING;
			}
		}

		function rebuildField() {
			state.gridW = Math.max(2, Math.ceil(state.w / GRID_STEP));
			state.gridH = Math.max(2, Math.ceil(state.h / GRID_STEP));
			state.fieldRow = 0;

			const total = state.gridW * state.gridH;

			fieldU = new Float32Array(total);
			fieldV = new Float32Array(total);
			fieldB = new Uint8Array(total);
		}

		function computeCell(fx, fy, p) {
			let u = state.bgU;
			let v = state.bgV;

			const aspect = state.aspect;
			const systems = state.systems;

			for (let k = 0; k < systems.length; k++) {
				const s = systems[k];
				const cx = s.x * aspect;
				const rx = fx - cx;
				const ry = fy - s.y;
				const d2 = rx * rx + ry * ry + 0.0001;
				const d = Math.sqrt(d2);
				const invD = 1 / d;
				const r = s.r;
				const mag =
					s.strength * (d / r) * Math.exp(-d2 / (2 * r * r)) * state.fieldGain;
				const tx = -ry * invD;
				const ty = rx * invD;

				u += s.spin * mag * tx;
				v += s.spin * mag * ty;

				const radial = -s.spin * INFLOW * mag;
				u += rx * invD * radial;
				v += ry * invD * radial;
			}

			fieldU[p] = u;
			fieldV[p] = v;
			fieldB[p] = speedBinSq(u * u + v * v);
		}

		function updateFieldRows(rows) {
			const gw = state.gridW;
			const gh = state.gridH;
			const aspect = state.aspect;

			for (let r = 0; r < rows; r++) {
				const y = state.fieldRow;
				const fy = y / (gh - 1);
				let p = y * gw;

				for (let x = 0; x < gw; x++) {
					computeCell((x / (gw - 1)) * aspect, fy, p);
					p++;
				}

				state.fieldRow++;
				if (state.fieldRow >= gh) state.fieldRow = 0;
			}
		}

		function updateFullField() {
			for (let y = 0; y < state.gridH; y++) updateFieldRows(1);
		}

		function sampleField(fx, fy) {
			const gw = state.gridW;
			const gh = state.gridH;
			const gx = clamp((fx / state.aspect) * (gw - 1), 0, gw - 1);
			const gy = clamp(fy * (gh - 1), 0, gh - 1);
			const x0 = gx | 0;
			const y0 = gy | 0;
			const x1 = x0 < gw - 1 ? x0 + 1 : x0;
			const y1 = y0 < gh - 1 ? y0 + 1 : y0;
			const tx = gx - x0;
			const ty = gy - y0;
			const i00 = y0 * gw + x0;
			const i10 = y0 * gw + x1;
			const i01 = y1 * gw + x0;
			const i11 = y1 * gw + x1;

			const u0 = fieldU[i00] + (fieldU[i10] - fieldU[i00]) * tx;
			const u1 = fieldU[i01] + (fieldU[i11] - fieldU[i01]) * tx;
			const v0 = fieldV[i00] + (fieldV[i10] - fieldV[i00]) * tx;
			const v1 = fieldV[i01] + (fieldV[i11] - fieldV[i01]) * tx;

			state.sampleU = u0 + (u1 - u0) * ty;
			state.sampleV = v0 + (v1 - v0) * ty;

			const sp2 = state.sampleU * state.sampleU + state.sampleV * state.sampleV;
			state.sampleSpeedSq = sp2;
			state.sampleB = speedBinSq(sp2);
		}

		function simulate(dt) {
			const aspect = state.aspect;
			let vp = 0;
			let cp = 0;

			for (let i = 0; i < COUNT; i++) {
				const x = xs[i];
				const y = ys[i];
				sampleField(x, y);
				const nx = x + state.sampleU * dt * state.flowSpeed;
				const ny = y + state.sampleV * dt * state.flowSpeed;

				ages[i] += dt;

				if (ages[i] > lifes[i] || nx < 0 || nx > aspect || ny < 0 || ny > 1) {
					spawn(i);
					linePositions[vp++] = xs[i];
					linePositions[vp++] = ys[i];
					linePositions[vp++] = xs[i];
					linePositions[vp++] = ys[i];
					cp = writeLineColor(cp, 0);
					continue;
				}

				pxs[i] = x;
				pys[i] = y;
				xs[i] = nx;
				ys[i] = ny;
				bins[i] = state.sampleB;

				linePositions[vp++] = x;
				linePositions[vp++] = y;
				linePositions[vp++] = nx;
				linePositions[vp++] = ny;

				cp = writeLineColor(cp, state.sampleSpeedSq);
			}
		}

		function drawQuad(texture, mode) {
			gl.useProgram(quad.program);
			gl.bindBuffer(gl.ARRAY_BUFFER, quad.buffer);
			gl.enableVertexAttribArray(quad.aPos);
			gl.vertexAttribPointer(quad.aPos, 2, gl.FLOAT, false, 0, 0);
			gl.activeTexture(gl.TEXTURE0);
			gl.bindTexture(gl.TEXTURE_2D, texture);
			gl.uniform1i(quad.uTex, 0);
			gl.uniform3f(quad.uBg, BG_RGB[0], BG_RGB[1], BG_RGB[2]);
			gl.uniform1f(quad.uKeep, 1 - ERASE);
			gl.uniform1f(quad.uMode, mode);
			gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
		}

		function uploadLines() {
			gl.bindBuffer(gl.ARRAY_BUFFER, lines.positionBuffer);
			gl.bufferSubData(gl.ARRAY_BUFFER, 0, linePositions);
			gl.bindBuffer(gl.ARRAY_BUFFER, lines.colorBuffer);
			gl.bufferSubData(gl.ARRAY_BUFFER, 0, lineColors);
		}

		function drawLines() {
			gl.useProgram(lines.program);
			gl.uniform1f(lines.uAspect, state.aspect);

			gl.bindBuffer(gl.ARRAY_BUFFER, lines.positionBuffer);
			gl.enableVertexAttribArray(lines.aPos);
			gl.vertexAttribPointer(lines.aPos, 2, gl.FLOAT, false, 0, 0);

			gl.bindBuffer(gl.ARRAY_BUFFER, lines.colorBuffer);
			gl.enableVertexAttribArray(lines.aColor);
			gl.vertexAttribPointer(lines.aColor, 4, gl.FLOAT, false, 0, 0);

			gl.enable(gl.BLEND);
			gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
			gl.drawArrays(gl.LINES, 0, COUNT * 2);
			gl.disable(gl.BLEND);
		}

		function uploadPressure() {
			const systems = state.systems;
			let pp = 0;
			let cp = 0;

			for (let i = 0; i < systems.length; i++) {
				const s = systems[i];
				pressurePositions[pp++] = s.displayX * state.aspect;
				pressurePositions[pp++] = s.displayY;

				pressureColors[cp++] = 0.94;
				pressureColors[cp++] = 0.92;
				pressureColors[cp++] = 0.84;
				pressureColors[cp++] = 0.34;

				pressureSizes[i] = Math.max(72, Math.min(state.w, state.h) * s.r * 1.15);
			}

			gl.bindBuffer(gl.ARRAY_BUFFER, pressure.positionBuffer);
			gl.bufferSubData(gl.ARRAY_BUFFER, 0, pressurePositions);
			gl.bindBuffer(gl.ARRAY_BUFFER, pressure.colorBuffer);
			gl.bufferSubData(gl.ARRAY_BUFFER, 0, pressureColors);
			gl.bindBuffer(gl.ARRAY_BUFFER, pressure.sizeBuffer);
			gl.bufferSubData(gl.ARRAY_BUFFER, 0, pressureSizes);
		}

		function drawPressure() {
			uploadPressure();
			gl.useProgram(pressure.program);
			gl.uniform1f(pressure.uAspect, state.aspect);

			gl.bindBuffer(gl.ARRAY_BUFFER, pressure.positionBuffer);
			gl.enableVertexAttribArray(pressure.aPos);
			gl.vertexAttribPointer(pressure.aPos, 2, gl.FLOAT, false, 0, 0);

			gl.bindBuffer(gl.ARRAY_BUFFER, pressure.colorBuffer);
			gl.enableVertexAttribArray(pressure.aColor);
			gl.vertexAttribPointer(pressure.aColor, 4, gl.FLOAT, false, 0, 0);

			gl.bindBuffer(gl.ARRAY_BUFFER, pressure.sizeBuffer);
			gl.enableVertexAttribArray(pressure.aSize);
			gl.vertexAttribPointer(pressure.aSize, 1, gl.FLOAT, false, 0, 0);

			gl.enable(gl.BLEND);
			gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
			gl.drawArrays(gl.POINTS, 0, state.systems.length);
			gl.disable(gl.BLEND);
		}

		function render() {
			uploadLines();

			gl.bindFramebuffer(gl.FRAMEBUFFER, state.write.fbo);
			gl.viewport(0, 0, state.pw, state.ph);
			gl.disable(gl.BLEND);
			drawQuad(state.read.tex, 1);
			drawLines();

			gl.bindFramebuffer(gl.FRAMEBUFFER, null);
			gl.viewport(0, 0, state.pw, state.ph);
			drawQuad(state.write.tex, 0);

			const tmp = state.read;
			state.read = state.write;
			state.write = tmp;
		}

		function updateMarkers() {
			const w = state.w;
			const h = state.h;
			const base = Math.min(w, h);

			for (let i = 0; i < state.systems.length; i++) {
				const s = state.systems[i];
				const size = Math.max(86, base * s.r * 1.55);
				const opacity = clamp(0.34 + s.strength * 0.24, 0.42, 0.64);

				const kind = s.spin > 0 ? "L" : "H";
				const label = markerEls[i].querySelector(".pressure-marker");
				markerEls[i].dataset.kind = kind;
				if (label && label.textContent !== kind) {
					label.textContent = kind;
					label.dataset.kind = kind;
				}

				markerEls[i].style.transform = `translate3d(${s.displayX * w}px, ${
					s.displayY * h
				}px, 0) translate(-50%, -50%)`;
				markerEls[i].style.setProperty("--pressure-size", `${size}px`);
				markerEls[i].style.setProperty("--pressure-opacity", opacity.toFixed(3));
			}
		}

		function resize() {
			const dpr = settings.dpr;
			const w = Math.max(1, canvas.clientWidth | 0);
			const h = Math.max(1, canvas.clientHeight | 0);
			const pw = Math.max(1, Math.floor(w * dpr));
			const ph = Math.max(1, Math.floor(h * dpr));

			if (w === state.w && h === state.h && dpr === state.dpr) return;

			state.w = w;
			state.h = h;
			state.dpr = dpr;
			state.pw = pw;
			state.ph = ph;
			state.aspect = w / h;

			canvas.width = pw;
			canvas.height = ph;

			rebuildRenderTargets();
			rebuildField();
			updateFullField();

			for (let i = 0; i < COUNT; i++) {
				if (xs[i] > state.aspect) spawn(i);
			}

			updateMarkers();
		}

		function initResizeObserver() {
			let pending = false;
			const ro = new ResizeObserver(() => {
				if (pending) return;
				pending = true;
				requestAnimationFrame(() => {
					pending = false;
					resize();
				});
			});
			ro.observe(canvas);
		}

		function frame(now) {
			state.rafId = 0;

			if (!state.running || state.contextLost || document.hidden) return;

			state.rafId = requestAnimationFrame(frame);

			const since = now - state.lastStep;
			if (since < FRAME_MS) return;
			state.lastStep = now - (since % FRAME_MS);

			let dt = (now - state.lastT) * 0.001;
			state.lastT = now;

			if (!Number.isFinite(dt) || dt < 0 || dt > 0.05) {
				dt = 1 / TARGET_FPS;
			}

			state.frame++;

			const adjustedDt = dt * settings.animationSpeed;
			stepSystems(adjustedDt);
			updateFieldRows(FIELD_ROWS_PER_FRAME);
			simulate(adjustedDt);

			// Camera animation calculations
			state.animTime += adjustedDt;
			const time = state.animTime;
			let animZoomOffset = 1.0;
			let animPanXOffset = 0.0;
			let animPanYOffset = 0.0;

			if (settings.animationPreset === "Gentle Drift") {
				animPanXOffset = Math.sin(time * 0.3) * (state.w * 0.04);
				animPanYOffset = Math.cos(time * 0.25) * (state.h * 0.04);
			} else if (settings.animationPreset === "Orbit Sweep") {
				animPanXOffset = Math.cos(time * 0.2) * (state.w * 0.06);
				animPanYOffset = Math.sin(time * 0.2) * (state.h * 0.06);
			} else if (settings.animationPreset === "Pulse Zoom") {
				animZoomOffset = 1.0 + Math.sin(time * 0.4) * 0.12;
			} else if (settings.animationPreset === "Cosmic Sway") {
				animPanXOffset = Math.sin(time * 0.2) * (state.w * 0.05);
				animPanYOffset = Math.cos(time * 0.25) * (state.h * 0.035);
				animZoomOffset = 1.0 + Math.sin(time * 0.15) * 0.1;
			}

			state.animZoomOffset = animZoomOffset;
			state.animPanXOffset = animPanXOffset;
			state.animPanYOffset = animPanYOffset;

			render();
			updateMarkers();

			// Update zoom container CSS transform
			const currentZoom = state.zoom * state.animZoomOffset;
			const currentPanX = state.panX + state.animPanXOffset;
			const currentPanY = state.panY + state.animPanYOffset;
			zoomContainer.style.transform = `translate(${currentPanX}px, ${currentPanY}px) scale(${currentZoom})`;
		}

		function startAnimation() {
			if (state.rafId || state.contextLost) return;
			state.running = true;
			state.lastT = performance.now();
			state.lastStep = 0;
			state.rafId = requestAnimationFrame(frame);
		}

		function stopAnimation() {
			state.running = false;
			if (state.rafId) {
				cancelAnimationFrame(state.rafId);
				state.rafId = 0;
			}
		}

		function resetAfterPause() {
			state.lastT = performance.now();
			state.fieldRow = 0;

			if (state.fboA && state.fboB && !state.contextLost) {
				clearFramebuffer(state.fboA);
				clearFramebuffer(state.fboB);
			}
		}

		// Color schemes application
		let colorSchemeController;
		let customColor1Ctrl, customColor2Ctrl, customColor3Ctrl, customColor4Ctrl;

		function applyScheme(name) {
			if (name === "Custom") {
				updateColorsFromCustom();
				return;
			}
			const hexArray = SCHEMES[name];
			if (hexArray) {
				for (let i = 0; i < 8; i++) {
					COLORS[i] = hexToRgb(hexArray[i]);
				}
				buildLegend();

				// Update settings to reflect selection
				settings.customColor1 = hexArray[0];
				settings.customColor2 = hexArray[3];
				settings.customColor3 = hexArray[5];
				settings.customColor4 = hexArray[7];
				if (customColor1Ctrl) customColor1Ctrl.updateDisplay();
				if (customColor2Ctrl) customColor2Ctrl.updateDisplay();
				if (customColor3Ctrl) customColor3Ctrl.updateDisplay();
				if (customColor4Ctrl) customColor4Ctrl.updateDisplay();
			}
		}

		function updateColorsFromCustom() {
			const c1 = hexToRgb(settings.customColor1);
			const c2 = hexToRgb(settings.customColor2);
			const c3 = hexToRgb(settings.customColor3);
			const c4 = hexToRgb(settings.customColor4);

			const mix = (a, b, t) => [
				a[0] + (b[0] - a[0]) * t,
				a[1] + (b[1] - a[1]) * t,
				a[2] + (b[2] - a[2]) * t
			];

			COLORS[0] = c1;
			COLORS[1] = mix(c1, c2, 1/3);
			COLORS[2] = mix(c1, c2, 2/3);
			COLORS[3] = c2;
			COLORS[4] = c3;
			COLORS[5] = mix(c3, c4, 1/3);
			COLORS[6] = mix(c3, c4, 2/3);
			COLORS[7] = c4;

			buildLegend();
		}

		function updateGreenScreen(enabled) {
			if (enabled) {
				document.body.classList.add("greenscreen-active");
				BG_RGB = [0.0, 1.0, 0.0];
			} else {
				document.body.classList.remove("greenscreen-active");
				const mode = MODES[state.mode] || MODES.mistral;
				BG_RGB = mode.bg.slice();
			}
			if (state.fboA && state.fboB && !state.contextLost) {
				clearFramebuffer(state.fboA);
				clearFramebuffer(state.fboB);
			}
		}

		function setMode(name, immediate = false) {
			if (!immediate && name === state.mode) return;

			const mode = MODES[name] || MODES.mistral;
			state.mode = name;
			state.modeTarget = mode;

			// Sync wind modes to corresponding color scheme presets
			let targetScheme = "Mediterranean Drift";
			if (mode.palette === "mistral") {
				targetScheme = "Frozen Tundra";
			} else if (mode.palette === "sirocco") {
				targetScheme = "Volcanic Ash";
			}

			settings.colorScheme = targetScheme;
			if (colorSchemeController) {
				colorSchemeController.updateDisplay();
			}
			applyScheme(targetScheme);

			if (settings.greenScreen) {
				BG_RGB = [0.0, 1.0, 0.0];
			} else {
				BG_RGB = mode.bg.slice();
			}

			state.flowSpeed = mode.flowSpeed;
			state.fieldGain = mode.fieldGain;
			state.bgU = mode.bgU;
			state.bgV = mode.bgV;
			state.wander = mode.wander;

			for (let i = 0; i < state.systems.length; i++) {
				const src = mode.systems[i % mode.systems.length];
				const s = state.systems[i];
				s.targetX = src.x;
				s.targetY = src.y;
				s.targetSpin = src.spin;
				s.targetR = src.r;
				s.targetStrength = src.strength;

				if (immediate) {
					s.x = src.x;
					s.y = src.y;
					s.displayX = src.x;
					s.displayY = src.y;
					s.spin = src.spin;
					s.baseR = src.r;
					s.baseStrength = src.strength;
					s.r = src.r;
					s.strength = src.strength;
				}
			}

			for (const button of modeButtons) {
				button.classList.toggle("is-active", button.dataset.mode === name);
			}

			if (modeLabel) modeLabel.textContent = mode.label;

			buildLegend();

			state.fieldRow = 0;
			updateFieldRows(Math.min(state.gridH, 6));

			clearFramebuffer(state.fboA);
			clearFramebuffer(state.fboB);
		}

		function initModes() {
			for (const button of modeButtons) {
				button.addEventListener("click", () => setMode(button.dataset.mode));
			}

			setMode(state.mode, true);
		}

		function initVisibility() {
			document.addEventListener("visibilitychange", () => {
				if (document.hidden) {
					stopAnimation();
					return;
				}

				resetAfterPause();
				startAnimation();
			});

			window.addEventListener("pageshow", () => {
				resetAfterPause();
				startAnimation();
			});

			window.addEventListener("pagehide", stopAnimation);

			window.addEventListener("focus", () => {
				if (document.hidden) return;
				resetAfterPause();
				startAnimation();
			});
		}

		function initWebGLContextHandling() {
			canvas.addEventListener("webglcontextlost", (event) => {
				event.preventDefault();
				state.contextLost = true;
				stopAnimation();
			});

			canvas.addEventListener("webglcontextrestored", () => {
				window.location.reload();
			});
		}

		// Drag and zoom interaction listeners
		function initInteractions() {
			let isDragging = false;
			let startPointer = { x: 0, y: 0 };
			let startPan = { x: 0, y: 0 };

			window.addEventListener("pointerdown", (e) => {
				if (
					e.target.closest(".lil-gui") ||
					e.target.closest("button") ||
					e.target.closest(".mode-panel")
				) {
					return;
				}
				isDragging = true;
				startPointer.x = e.clientX;
				startPointer.y = e.clientY;
				startPan.x = state.panX;
				startPan.y = state.panY;
			});

			window.addEventListener("pointermove", (e) => {
				if (!isDragging) return;
				const dx = e.clientX - startPointer.x;
				const dy = e.clientY - startPointer.y;
				state.panX = startPan.x + dx;
				state.panY = startPan.y + dy;
			});

			const endDrag = () => {
				isDragging = false;
			};
			window.addEventListener("pointerup", endDrag);
			window.addEventListener("pointercancel", endDrag);

			window.addEventListener("wheel", (e) => {
				if (
					e.target.closest(".lil-gui") ||
					e.target.closest("button") ||
					e.target.closest(".mode-panel")
				) {
					return;
				}

				const mx = e.clientX;
				const my = e.clientY;

				const zoomFactor = e.deltaY < 0 ? 1.08 : 1 / 1.08;
				const nextZoom = clamp(state.zoom * zoomFactor, 0.2, 10.0);

				// Zoom around cursor position
				const wx = (mx - state.panX) / state.zoom;
				const wy = (my - state.panY) / state.zoom;

				state.zoom = nextZoom;
				state.panX = mx - wx * nextZoom;
				state.panY = my - wy * nextZoom;
			}, { passive: true });

			// Double-click to reset view zoom and translation
			window.addEventListener("dblclick", (e) => {
				if (
					e.target.closest(".lil-gui") ||
					e.target.closest("button") ||
					e.target.closest(".mode-panel")
				) {
					return;
				}
				state.zoom = 1.0;
				state.panX = 0.0;
				state.panY = 0.0;
			});
		}

		// GUI setup
		const gui = new GUI({ title: "Mediterranean Settings" });
		gui.domElement.addEventListener("pointerdown", (e) => e.stopPropagation());

		gui.add(settings, "greenScreen")
			.name("Green Screen")
			.onChange((v) => {
				updateGreenScreen(v);
			});

		const fColors = gui.addFolder("Colors");
		colorSchemeController = fColors.add(settings, "colorScheme", [
			"Mediterranean Drift",
			"Neon Aurora",
			"Volcanic Ash",
			"Frozen Tundra",
			"Solar Flare",
			"Custom"
		]).name("Preset Scheme").onChange((v) => {
			applyScheme(v);
		});

		customColor1Ctrl = fColors.addColor(settings, "customColor1").name("Color 1").onChange(() => {
			settings.colorScheme = "Custom";
			colorSchemeController.updateDisplay();
			updateColorsFromCustom();
		});

		customColor2Ctrl = fColors.addColor(settings, "customColor2").name("Color 2").onChange(() => {
			settings.colorScheme = "Custom";
			colorSchemeController.updateDisplay();
			updateColorsFromCustom();
		});

		customColor3Ctrl = fColors.addColor(settings, "customColor3").name("Color 3").onChange(() => {
			settings.colorScheme = "Custom";
			colorSchemeController.updateDisplay();
			updateColorsFromCustom();
		});

		customColor4Ctrl = fColors.addColor(settings, "customColor4").name("Color 4").onChange(() => {
			settings.colorScheme = "Custom";
			colorSchemeController.updateDisplay();
			updateColorsFromCustom();
		});

		const fAnim = gui.addFolder("Camera Animation");
		fAnim.add(settings, "animationPreset", [
			"Static",
			"Gentle Drift",
			"Orbit Sweep",
			"Pulse Zoom",
			"Cosmic Sway"
		]).name("Camera Motion");
		fAnim.add(settings, "animationSpeed", 0.0, 3.0, 0.1).name("Speed");

		const fQuality = gui.addFolder("Render Settings");
		fQuality.add(settings, "dpr", 0.5, 3.0, 0.1).name("DPR (Pixel Ratio)").onChange(() => {
			resize();
		});

		// Keyboard shortcut H to toggle UI
		let uiVisible = true;
		window.addEventListener("keydown", (e) => {
			if (e.key.toLowerCase() === "h") {
				uiVisible = !uiVisible;
				document.body.classList.toggle("ui-hidden", !uiVisible);
				if (uiVisible) {
					gui.show();
				} else {
					gui.hide();
				}
			}
		});

		function init() {
			buildLegend();
			buildMarkers();
			resize();
			initParticles();
			initModes();
			initInteractions();
			updateFullField();
			simulate(0.016);
			render();
			initResizeObserver();
			initVisibility();
			initWebGLContextHandling();
			startAnimation();
		}

		init();
	</script>
</body>
</html>
