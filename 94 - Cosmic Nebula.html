<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGL GPGPU Flow Particle Simulation</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000000;
    }
    #container {
      position: fixed;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
      }
    }
  </script>
</head>
<body>

<div id="container" touch-action="none"></div>

<script id="vertexShaderParticle" type="x-shader/x-vertex">
    uniform vec2 u_resolution;
    uniform vec2 u_mouse;
    uniform float u_time;
    uniform sampler2D u_noise;
    attribute vec2 reference;
    uniform sampler2D texturePosition;
    uniform bool u_clicked;
    varying float v_op;
  
    void main() {
      vec3 position = texture2D(texturePosition, reference).xyz;
      position *= 3.;

      vec3 transformed = vec3( position );
      
      vec4 mvpos = modelViewMatrix * vec4( transformed, 1.0 );

      gl_PointSize = clamp(3. - length(position) * .01, 0., 4.);
      v_op = 1. / length(position) * 8.;
      gl_Position = projectionMatrix * mvpos;
    }
</script>

<script id="fragmentShaderParticle" type="x-shader/x-fragment">
  uniform vec2 u_resolution;
  uniform vec2 u_mouse;
  uniform float u_time;
  uniform sampler2D u_noise;
  uniform bool u_clicked;
  uniform vec3 u_colorCore;
  uniform vec3 u_colorParticle;
  uniform vec3 u_colorOuter;
  varying float v_op;

  vec2 hash2(vec2 p)
  {
    vec2 o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).xy;
    return o;
  }

  void main() {
    vec2 uv = gl_PointCoord.xy - .5;
    
    vec3 particlecolour = u_colorParticle;
    vec3 outercolour = u_colorOuter;
    
    float l = length(uv);
    vec3 colour = mix(outercolour, particlecolour, smoothstep(.9, -.1, l));
    // Multiply core color by 2.0 to preserve the high-intensity glow from the original vec3(2., 0.5, 0.)
    colour = mix(mix(outercolour, u_colorCore * 2.0, smoothstep(.9, -.1, l)), colour, smoothstep(3., 0.15, v_op));

    gl_FragColor = vec4(colour, clamp(v_op*2., 0., 1.));
  }
</script>

<script id="fragmentShaderVelocity" type="x-shader/x-fragment">
  uniform vec2 u_resolution;
  uniform vec2 u_mouse;
  uniform float u_time;
  uniform float u_mousex;
  varying float v_op;
  
  // otaviogood's noise from https://www.shadertoy.com/view/ld2SzK
  const float nudge = 0.739513;	// size of perpendicular vector
  float normalizer = 1.0 / sqrt(1.0 + nudge*nudge);	// pythagorean theorem on that perpendicular to maintain scale
  float SpiralNoiseC(vec3 p)
  {
      float n = 0.0;	// noise amount
      float iter = 1.0;
      for (int i = 0; i < 8; i++)
      {
          // add sin and cos scaled inverse with the frequency
          n += -abs(sin(p.y*iter) + cos(p.x*iter)) / iter;	// abs for a ridged look
          // rotate by adding perpendicular and scaling down
          p.xy += vec2(p.y, -p.x) * nudge;
          p.xy *= normalizer;
          // rotate on other axis
          p.xz += vec2(p.z, -p.x) * nudge;
          p.xz *= normalizer;
          // increase the frequency
          iter *= 1.733733;
      }
      return n;
  }

  void main() {
    vec2 uv = gl_FragCoord.xy / resolution.xy;
    vec3 position = texture2D(v_samplerPosition, uv).xyz;
    vec3 velocity = texture2D(v_samplerVelocity, uv).xyz;
    vec3 acceleration = vec3(0.);
    
    float l = clamp(length(position), 1., 100.);
    vec3 spherical = vec3(1./l * l, atan(position.y, position.x), acos(position.z / l));
    float n = SpiralNoiseC(vec3(l, sin(spherical.yz * 3. + u_time * 15.)));
    spherical.xy += n*.5;
    spherical.x += 1. / length(position) * .5;
    spherical.x += smoothstep(5., 20., length(position));
    
    acceleration.x = spherical.x * sin(spherical.z) * cos(spherical.y);
    acceleration.y = spherical.x * sin(spherical.z) * sin(spherical.y);
    acceleration.z = spherical.x * cos(spherical.z);
    
    gl_FragColor = vec4(velocity * .95 + acceleration * .2, 1.0);
  }
</script>

<script id="fragmentShaderPosition" type="x-shader/x-fragment">
  uniform float delta;
  uniform float u_time;
  uniform sampler2D v_samplerPosition_orig;
  uniform sampler2D u_noise;

  vec3 hash3(vec2 p)
  {
    vec3 o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).xyz;
    return o;
  }

  void main() {
    vec2 uv = gl_FragCoord.xy / resolution.xy;
    vec3 position_original = texture2D(v_samplerPosition_orig, uv).xyz;
    vec3 position = texture2D(v_samplerPosition, uv).xyz;
    vec3 velocity = texture2D(v_samplerVelocity, uv).xyz;
    
    vec3 pos = position + velocity * delta;
    
    vec3 hash = hash3(position_original.xy * position_original.zx * 20.);
    
    if(length(pos) > 20.) {
      pos = position_original;
    }

    gl_FragColor = vec4(pos, 1.0);
  }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';
import GUI from 'lil-gui';

// Make THREE, OrbitControls, and GPUComputationRenderer globally available for legacy compatibility
window.THREE = THREE;
window.OrbitControls = OrbitControls;
window.GPUComputationRenderer = GPUComputationRenderer;

const texturesize = 2048;
const particles = texturesize * texturesize;

let container;
let camera, scene, renderer, controls;
let cloud_obj;
let uniforms;
let gpuComputationRenderer, dataPos, dataVel, dataPos_orig, textureArraySize = texturesize*texturesize*4.;

let textureVelocity, texturePosition;

const particleVert = document.getElementById( 'vertexShaderParticle' ).textContent;
const particleFrag = document.getElementById( 'fragmentShaderParticle' ).textContent;
const velocityFrag = document.getElementById( 'fragmentShaderVelocity' ).textContent;
const positionFrag = document.getElementById( 'fragmentShaderPosition' ).textContent;

let loader = new THREE.TextureLoader();
let texture;

// Color schemes
const colorSchemes = {
  "Nebula Glow": { core: "#ff4500", particle: "#00aaff", outer: "#000000" },
  "Cosmic Fire": { core: "#ffe600", particle: "#ff0055", outer: "#110022" },
  "Toxic Storm": { core: "#39ff14", particle: "#00ffaa", outer: "#001a11" },
  "Frozen Abyss": { core: "#ffffff", particle: "#00d2ff", outer: "#000a22" },
  "Solar Eclipse": { core: "#ffaa00", particle: "#550000", outer: "#100500" }
};

// UI settings object
const params = {
  greenscreen: false,
  scheme: "Nebula Glow",
  colorCore: colorSchemes["Nebula Glow"].core,
  colorParticle: colorSchemes["Nebula Glow"].particle,
  colorOuter: colorSchemes["Nebula Glow"].outer,
  animation: "Cosmic Orbit",
  animSpeed: 1.0,
  blending: "Additive",
  resetView: function() {
    controls.reset();
    cloud_obj.position.set(0, 0, 0);
    cloud_obj.rotation.set(0, 0, 0);
    cloud_obj.scale.set(1, 1, 1);
  }
};

let gui;
let guiVisible = true;
let coreController, particleColorController, outerColorController;

// Procedural texture fallback in case URL fails to load
function createFallbackNoiseTexture() {
  const size = 256;
  const data = new Uint8Array(size * size * 4);
  for (let i = 0; i < data.length; i += 4) {
    data[i] = Math.floor(Math.random() * 255);
    data[i + 1] = Math.floor(Math.random() * 255);
    data[i + 2] = Math.floor(Math.random() * 255);
    data[i + 3] = 255;
  }
  const tex = new THREE.DataTexture(data, size, size, THREE.RGBAFormat);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.minFilter = THREE.LinearFilter;
  tex.needsUpdate = true;
  return tex;
}

loader.setCrossOrigin("anonymous");
loader.load(
  'https://s3-us-west-2.amazonaws.com/s.cdpn.io/982762/noise.png',
  function do_something_with_texture(tex) {
    texture = tex;
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    texture.minFilter = THREE.LinearFilter;
    init();
    animate();
  },
  undefined,
  function onError(err) {
    console.warn("Could not load noise texture from remote server, generating local procedural noise fallback.");
    texture = createFallbackNoiseTexture();
    init();
    animate();
  }
);

function init() {
  container = document.getElementById( 'container' );

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.001, Math.pow(2, 16));
  camera.position.x = -10;
  camera.position.y = -10;
  camera.position.z = -30.;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(params.colorOuter);

  // create out particles
  // ----------------------------
  let vertices = new Float32Array(particles * 3).fill(0);
  let references = new Float32Array(particles * 2);
  
  for (let i = 0; i < references.length; i += 2) {
    let index = i / 2;
    
    references[i] = (index % texturesize) / texturesize;
    references[i + 1] = Math.floor(index / texturesize) / texturesize;
  }
  
  let geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
  geometry.setAttribute('reference', new THREE.BufferAttribute(references, 2));
  
  // Create our particle material
  // ----------------------------
  uniforms = {
    u_time: { type: "f", value: 1.0 },
    u_resolution: { type: "v2", value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    u_noise: { type: "t", value: texture },
    u_mouse: { type: "v2", value: new THREE.Vector2() },
    texturePosition: { value: null },
    u_texturePosition: { value: null },
    u_clicked: { type: 'b', value: true },
    u_colorCore: { value: new THREE.Color(params.colorCore) },
    u_colorParticle: { value: new THREE.Color(params.colorParticle) },
    u_colorOuter: { value: new THREE.Color(params.colorOuter) }
  };

  let particleMaterial = new THREE.ShaderMaterial( {
    uniforms: uniforms,
    vertexShader: particleVert,
    fragmentShader: particleFrag,
    side: THREE.DoubleSide,
    transparent: true,
    depthTest: false
  } );
  
  // Create the particle cloud object
  // ----------------------------
  cloud_obj = new THREE.Points(geometry, particleMaterial);
  cloud_obj.material.blending = THREE.AdditiveBlending;

  // Create the renderer and controls and add them to the scene
  // ----------------------------
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.screenSpacePanning = true;
  window.controls = controls;

  container.appendChild( renderer.domElement );
  
  // Finally, add everything to stage
  // ----------------------------
  scene.add( cloud_obj );
  
  // Add the computational renderer and populate it with data
  // ----------------------------
  gpuComputationRenderer = new GPUComputationRenderer(texturesize, texturesize, renderer);
  dataPos_orig = gpuComputationRenderer.createTexture();
  dataPos = gpuComputationRenderer.createTexture();
  dataVel = gpuComputationRenderer.createTexture();

  for (let i = 0; i < textureArraySize; i += 4) {
    let radius = 1;
    let phi = Math.random() * Math.PI * 2.;
    let costheta = Math.random() * 2. - 1.;
    let u = Math.random();

    let theta = Math.acos( costheta );
    let r = radius * Math.cbrt( u );
    
    let x = r * Math.sin( theta) * Math.cos( phi );
    let y = r * Math.sin( theta) * Math.sin( phi );
    let z = r * Math.cos( theta );

    dataPos.image.data[i] = x;
    dataPos.image.data[i + 1] = y;
    dataPos.image.data[i + 2] = z;
    dataPos.image.data[i + 3] = 1;
    
    dataPos_orig.image.data[i] = x;
    dataPos_orig.image.data[i + 1] = y;
    dataPos_orig.image.data[i + 2] = z;
    dataPos_orig.image.data[i + 3] = 1;

    dataVel.image.data[i] = x * 3.;
    dataVel.image.data[i + 1] = y * 3.;
    dataVel.image.data[i + 2] = z * 3.;
    dataVel.image.data[i + 3] = 1;
  }
  
  textureVelocity = gpuComputationRenderer.addVariable('v_samplerVelocity', velocityFrag, dataVel);
  texturePosition = gpuComputationRenderer.addVariable('v_samplerPosition', positionFrag, dataPos);

  texturePosition.material.uniforms.delta = { value: 0 };
  texturePosition.material.uniforms.v_samplerPosition_orig = { type: "t", value: dataPos_orig };
  textureVelocity.material.uniforms.u_time = { value: -1000 };
  textureVelocity.material.uniforms.u_mousex = { value: 0 };
  texturePosition.material.uniforms.u_time = { value: 0 };

  gpuComputationRenderer
    .setVariableDependencies(textureVelocity, [ textureVelocity, texturePosition ]);
  gpuComputationRenderer
    .setVariableDependencies(texturePosition, [ textureVelocity, texturePosition ]);

  texturePosition.wrapS = THREE.RepeatWrapping;
  texturePosition.wrapT = THREE.RepeatWrapping;
  textureVelocity.wrapS = THREE.RepeatWrapping;
  textureVelocity.wrapT = THREE.RepeatWrapping;

  const gpuComputationRendererError = gpuComputationRenderer.init();
  if (gpuComputationRendererError) {
    console.error('ERROR', gpuComputationRendererError);
  }

  // Add event listeners for resize and mouse move
  // ----------------------------
  onWindowResize();
  window.addEventListener( 'resize', onWindowResize, false );
  document.addEventListener('pointermove', pointerMove);

  setupGUI();
  setupKeyboard();
  updateColors();
}

function onWindowResize( event ) {
  let w = window.innerWidth;
  let h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize( w, h );
  uniforms.u_resolution.value.x = w;
  uniforms.u_resolution.value.y = h;
}

function pointerMove( event ) {
  let ratio = window.innerHeight / window.innerWidth;
  textureVelocity.material.uniforms.u_mousex.value = event.pageX;
  uniforms.u_mouse.value.x = (event.pageX - window.innerWidth / 2) / window.innerWidth / ratio;
  uniforms.u_mouse.value.y = (event.pageY - window.innerHeight / 2) / window.innerHeight * -1;
}

function updateColors() {
  if (params.greenscreen) {
    scene.background = new THREE.Color(0x00ff00);
    renderer.setClearColor(0x00ff00, 1.0);
    document.body.style.backgroundColor = '#00ff00';
  } else {
    scene.background = new THREE.Color(params.colorOuter);
    renderer.setClearColor(params.colorOuter, 1.0);
    document.body.style.backgroundColor = params.colorOuter;
  }
  uniforms.u_colorCore.value.set(params.colorCore);
  uniforms.u_colorParticle.value.set(params.colorParticle);
  uniforms.u_colorOuter.value.set(params.colorOuter);
}

function setupGUI() {
  gui = new GUI({ title: "Settings" });

  // Greenscreen toggle
  gui.add(params, 'greenscreen').name('Greenscreen BG').onChange(updateColors);

  // Color schemes
  const colorFolder = gui.addFolder('Colors');
  colorFolder.add(params, 'scheme', Object.keys(colorSchemes)).name('Color Scheme').onChange(val => {
    const selected = colorSchemes[val];
    params.colorCore = selected.core;
    params.colorParticle = selected.particle;
    params.colorOuter = selected.outer;

    coreController.setValue(selected.core);
    particleColorController.setValue(selected.particle);
    outerColorController.setValue(selected.outer);

    updateColors();
  });

  coreController = colorFolder.addColor(params, 'colorCore').name('Core Color').onChange(updateColors);
  particleColorController = colorFolder.addColor(params, 'colorParticle').name('Particle Color').onChange(updateColors);
  outerColorController = colorFolder.addColor(params, 'colorOuter').name('Outer Color').onChange(updateColors);
  colorFolder.open();

  // Rendering parameters
  const renderFolder = gui.addFolder('Rendering');
  renderFolder.add(params, 'blending', ['Additive', 'Normal', 'Multiply', 'Subtractive']).name('Blending').onChange(val => {
    if (val === 'Additive') {
      cloud_obj.material.blending = THREE.AdditiveBlending;
    } else if (val === 'Normal') {
      cloud_obj.material.blending = THREE.NormalBlending;
    } else if (val === 'Multiply') {
      cloud_obj.material.blending = THREE.MultiplyBlending;
    } else if (val === 'Subtractive') {
      cloud_obj.material.blending = THREE.SubtractiveBlending;
    }
    cloud_obj.material.needsUpdate = true;
  });
  renderFolder.open();

  // Animation dropdown
  const animFolder = gui.addFolder('Animation');
  animFolder.add(params, 'animation', [
    'Cosmic Orbit',
    'Breathing Pulse',
    'Chaotic Vortex',
    'Dimension Warp',
    'Double Helix Spin'
  ]).name('Preset Mode');
  animFolder.add(params, 'animSpeed', 0.0, 3.0, 0.1).name('Animation Speed');
  animFolder.open();

  // Reset controls
  gui.add(params, 'resetView').name('Reset Camera');
}

function setupKeyboard() {
  window.addEventListener('keydown', (e) => {
    if (e.key === 'h' || e.key === 'H') {
      guiVisible = !guiVisible;
      gui.show(guiVisible);
    }
  });
}

let then = 0;
let animationTime = 0;

function animate() {
  requestAnimationFrame( animate );
  
  let now = Date.now() / 1000;
  let _delta = now - then;
  if (then === 0) _delta = 0;
  then = now;
  
  animationTime += _delta * params.animSpeed;
  render(_delta);
}

function render(delta) {
  let stepSpeed = delta * params.animSpeed;
  
  gpuComputationRenderer.compute();
  
  texturePosition.material.uniforms.delta.value = Math.min(delta, 0.5);
  textureVelocity.material.uniforms.u_time.value += .0005 * params.animSpeed;
  texturePosition.material.uniforms.u_time.value += stepSpeed;
  
  uniforms.u_time.value += stepSpeed;
  
  const currentPosTexture = gpuComputationRenderer.getCurrentRenderTarget(texturePosition).texture;
  uniforms.texturePosition.value = currentPosTexture;
  uniforms.u_texturePosition.value = currentPosTexture;
  
  window.pos = gpuComputationRenderer.getCurrentRenderTarget(texturePosition);

  // Apply automatic infinite animations by modifying the cloud object transforms
  cloud_obj.position.set(0, 0, 0);
  cloud_obj.rotation.set(0, 0, 0);
  cloud_obj.scale.set(1, 1, 1);

  const time = animationTime;

  switch (params.animation) {
    case "Cosmic Orbit":
      cloud_obj.rotation.y = time * 0.3;
      cloud_obj.rotation.x = Math.sin(time * 0.15) * 0.2;
      break;
      
    case "Breathing Pulse":
      let s = 1.0 + Math.sin(time * 1.5) * 0.25;
      cloud_obj.scale.set(s, s, s);
      cloud_obj.rotation.y = time * 0.1;
      break;
      
    case "Chaotic Vortex":
      cloud_obj.rotation.y = time * 1.2;
      cloud_obj.rotation.x = time * 0.4;
      cloud_obj.rotation.z = time * 0.2;
      let scaleVal = 0.85 + Math.sin(time * 2.5) * 0.15;
      cloud_obj.scale.set(scaleVal, scaleVal, scaleVal);
      break;
      
    case "Dimension Warp":
      cloud_obj.position.z = Math.sin(time * 0.8) * 10.0;
      cloud_obj.rotation.y = time * 0.5;
      break;
      
    case "Double Helix Spin":
      cloud_obj.position.x = Math.sin(time * 1.2) * 5.0;
      cloud_obj.position.y = Math.cos(time * 1.2) * 5.0;
      cloud_obj.rotation.y = time * 0.6;
      cloud_obj.rotation.z = time * 0.3;
      break;
  }
  
  controls.update();
  renderer.render( scene, camera );
}
</script>

</body>
</html>
