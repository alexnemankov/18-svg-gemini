<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Shape Grid Animation</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas></canvas>

  <script type="module">
    import { GUI } from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // 5 Tech & IT Preset Color Schemes
    var presets = {
      'Cyberpunk': [
        { type: 'solid', value: '#ff007f' },
        { type: 'solid', value: '#00f0ff' },
        { type: 'solid', value: '#9d00ff' },
        { type: 'solid', value: '#ff5e00' },
        { type: 'gradient', stops: ['#ff007f', '#00f0ff'] },
        { type: 'gradient', stops: ['#9d00ff', '#ff007f'] }
      ],
      'Matrix Code': [
        { type: 'solid', value: '#00ff41' },
        { type: 'solid', value: '#00ff00' },
        { type: 'solid', value: '#008f11' },
        { type: 'solid', value: '#003b00' },
        { type: 'gradient', stops: ['#00ff41', '#003b00'] },
        { type: 'gradient', stops: ['#008f11', '#00ff00'] }
      ],
      'Quantum Plasma': [
        { type: 'solid', value: '#3b82f6' },
        { type: 'solid', value: '#8b5cf6' },
        { type: 'solid', value: '#ec4899' },
        { type: 'solid', value: '#06b6d4' },
        { type: 'gradient', stops: ['#3b82f6', '#8b5cf6'] },
        { type: 'gradient', stops: ['#8b5cf6', '#ec4899'] }
      ],
      'Amber Terminal': [
        { type: 'solid', value: '#ffb000' },
        { type: 'solid', value: '#ff7b00' },
        { type: 'solid', value: '#ffcc00' },
        { type: 'solid', value: '#995c00' },
        { type: 'gradient', stops: ['#ffb000', '#995c00'] },
        { type: 'gradient', stops: ['#ffcc00', '#ff7b00'] }
      ],
      'Steel Tech': [
        { type: 'solid', value: '#e2e8f0' },
        { type: 'solid', value: '#94a3b8' },
        { type: 'solid', value: '#475569' },
        { type: 'solid', value: '#64748b' },
        { type: 'gradient', stops: ['#94a3b8', '#475569'] },
        { type: 'gradient', stops: ['#e2e8f0', '#64748b'] }
      ]
    };

    var settings = {
      greenscreen: false,
      bgColor: '#080808',
      colorScheme: 'Cyberpunk',

      // Custom color palette parameters
      color1: '#ff007f',
      color2: '#00f0ff',
      color3: '#9d00ff',
      color4: '#ff5e00',
      colorGrad1Start: '#ff007f',
      colorGrad1End: '#00f0ff',
      colorGrad2Start: '#00f0ff',
      colorGrad2End: '#9d00ff',

      // View properties (zoom and pan)
      zoom: 1.0,
      panX: 0,
      panY: 0,

      // Grid physics
      gap: 40,
      radiusVmin: 30,
      speedIn: 0.5,
      speedOut: 0.6,
      restScale: 0.09,
      minHoverScale: 1.0,
      maxHoverScale: 3.0,
      waveSpeed: 1200,
      waveWidth: 180,

      // Auto Animation Settings
      autoPointer: true,
      autoPointerSpeed: 1.0,
      autoWave: true,
      autoWaveInterval: 3.0,

      resetView: function() {
        zoom = 1.0;
        panX = 0;
        panY = 0;
        settings.zoom = 1.0;
        settings.panX = 0;
        settings.panY = 0;
        zoomCtrl.updateDisplay();
        panXCtrl.updateDisplay();
        panYCtrl.updateDisplay();
      }
    };

    var SHAPE_TYPES = ['circle', 'pill', 'star', 'star'];

    var canvas = document.querySelector('canvas');
    var ctx = canvas.getContext('2d');

    var grid = null;
    var rafId = null;
    var pointer = null;
    var activity = 0;
    var waves = [];
    var maskRects = [];
    var frameCount = 0;
    var maskOverride = false;

    // Zoom/Pan state
    var zoom = 1.0;
    var panX = 0;
    var panY = 0;
    var isDragging = false;
    var dragStartX = 0;
    var dragStartY = 0;
    var dragStartMouseX = 0;
    var dragStartMouseY = 0;
    var totalDragDist = 0;

    // Auto-animation state
    var autoPointerX = 0;
    var autoPointerY = 0;
    var lastAutoWaveTime = 0;
    var currentPalette = [];

    function rnd(min, max) { return Math.random() * (max - min) + min; }
    function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function smoothstep(t) {
      var c = Math.max(0, Math.min(1, t));
      return c * c * (3 - 2 * c);
    }

    function durationToFactor(seconds) {
      if (seconds <= 0) return 1;
      return 1 - Math.pow(0.05, 1 / (60 * seconds));
    }

    function drawCircle(ctx, size) {
      ctx.beginPath();
      ctx.arc(0, 0, size, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPill(ctx, size) {
      var w = size * 0.48;
      var h = size;
      ctx.beginPath();
      ctx.roundRect(-w, -h, w * 2, h * 2, w);
      ctx.fill();
    }

    function drawStar(ctx, size, points, innerRatio) {
      ctx.beginPath();
      for (var i = 0; i < points * 2; i++) {
        var angle = (i * Math.PI) / points - Math.PI / 2;
        var r = i % 2 === 0 ? size : size * innerRatio;
        var x = Math.cos(angle) * r;
        var y = Math.sin(angle) * r;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
    }

    function drawShape(ctx, shape) {
      switch (shape.type) {
        case 'circle': return drawCircle(ctx, shape.size / 1.5);
        case 'pill':   return drawPill(ctx, shape.size / 1.4);
        case 'star':   return drawStar(ctx, shape.size, shape.points, shape.innerRatio);
      }
    }

    function resolveFill(ctx, colorDef, size) {
      if (!colorDef) return '#ffffff';
      if (colorDef.type === 'solid') return colorDef.value;
      var grad = ctx.createRadialGradient(0, -size * 0.3, 0, 0, size * 0.3, size * 1.5);
      grad.addColorStop(0, colorDef.stops[0]);
      grad.addColorStop(1, colorDef.stops[1]);
      return grad;
    }

    function randomStarProps() {
      return {
        points: rndInt(4, 10),
        innerRatio: rnd(0.1, 0.5),
      };
    }

    function updatePalette() {
      if (settings.colorScheme === 'Custom') {
        currentPalette = [
          { type: 'solid', value: settings.color1 },
          { type: 'solid', value: settings.color2 },
          { type: 'solid', value: settings.color3 },
          { type: 'solid', value: settings.color4 },
          { type: 'gradient', stops: [settings.colorGrad1Start, settings.colorGrad1End] },
          { type: 'gradient', stops: [settings.colorGrad2Start, settings.colorGrad2End] }
        ];
      } else {
        currentPalette = presets[settings.colorScheme];
      }
    }

    function onPresetChange() {
      if (settings.colorScheme !== 'Custom') {
        var p = presets[settings.colorScheme];
        if (p[0]) settings.color1 = p[0].value || p[0].stops[0];
        if (p[1]) settings.color2 = p[1].value || p[1].stops[0];
        if (p[2]) settings.color3 = p[2].value || p[2].stops[0];
        if (p[3]) settings.color4 = p[3].value || p[3].stops[0];

        var grads = p.filter(c => c.type === 'gradient');
        if (grads[0]) {
          settings.colorGrad1Start = grads[0].stops[0];
          settings.colorGrad1End = grads[0].stops[1];
        }
        if (grads[1]) {
          settings.colorGrad2Start = grads[1].stops[0];
          settings.colorGrad2End = grads[1].stops[1];
        }

        color1Ctrl.updateDisplay();
        color2Ctrl.updateDisplay();
        color3Ctrl.updateDisplay();
        color4Ctrl.updateDisplay();
        grad1StartCtrl.updateDisplay();
        grad1EndCtrl.updateDisplay();
        grad2StartCtrl.updateDisplay();
        grad2EndCtrl.updateDisplay();
      }
      updatePalette();
    }

    function buildGrid() {
      var W = window.innerWidth;
      var H = window.innerHeight;

      // Expand the grid area 4x to allow extensive dragging/panning
      var gridW = W * 4;
      var gridH = H * 4;

      var cols = Math.floor(gridW / settings.gap);
      var rows = Math.floor(gridH / settings.gap);
      
      // Center the larger grid on the screen
      var offsetX = (W - (cols - 1) * settings.gap) / 2 - W * 1.5;
      var offsetY = (H - (rows - 1) * settings.gap) / 2 - H * 1.5;
      
      var shapes = [];

      for (var row = 0; row < rows; row++) {
        for (var col = 0; col < cols; col++) {
          var type = pick(SHAPE_TYPES);
          var shape = {
            x: offsetX + col * settings.gap,
            y: offsetY + row * settings.gap,
            type: type,
            colorIndex: rndInt(0, 100),
            angle: rnd(0, Math.PI * 2),
            size: settings.gap * 0.38,
            scale: settings.restScale,
            maxScale: rnd(settings.minHoverScale, settings.maxHoverScale),
            hovered: false,
          };
          if (type === 'star') Object.assign(shape, randomStarProps());
          shapes.push(shape);
        }
      }

      return { shapes: shapes, width: W, height: H };
    }

    function init() {
      var W = window.innerWidth;
      var H = window.innerHeight;
      var dpr = window.devicePixelRatio || 1;

      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';

      grid = buildGrid();
    }

    function tick() {
      if (!grid) { rafId = requestAnimationFrame(tick); return; }

      var shapes = grid.shapes;
      var width = window.innerWidth;
      var height = window.innerHeight;
      var dpr = window.devicePixelRatio || 1;
      var radius = Math.min(width, height) * (settings.radiusVmin / 100);
      var now = performance.now();

      // Reset transform and clear
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Background selection
      if (settings.greenscreen) {
        ctx.fillStyle = '#00ff00';
      } else {
        ctx.fillStyle = settings.bgColor;
      }
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Apply device pixel ratio and zoom/pan camera transformations
      ctx.scale(dpr, dpr);
      
      ctx.save();
      ctx.translate(panX, panY);
      ctx.scale(zoom, zoom);

      activity *= 0.93;

      frameCount++;
      if (frameCount % 10 === 0) {
        maskRects = Array.from(document.querySelectorAll('[data-shape-mask]'))
          .map(function(el) { return el.getBoundingClientRect(); });
      }

      var maxDist = Math.sqrt(width * width + height * height) / zoom;
      waves = waves.filter(function(w) {
        return (now - w.startTime) / 1000 * settings.waveSpeed < maxDist + settings.waveWidth;
      });

      // Update auto animation pointer position
      if (settings.autoPointer) {
        var t = now * 0.0006 * settings.autoPointerSpeed;
        autoPointerX = width / 2 + Math.sin(t) * (width * 0.35);
        autoPointerY = height / 2 + Math.sin(t * 2) * (height * 0.25);
      }

      for (var i = 0; i < shapes.length; i++) {
        var shape = shapes[i];
        var pad = settings.gap / 2;
        shape.size = settings.gap * 0.38;

        // Screen-space masking checks
        var screenShapeX = shape.x * zoom + panX;
        var screenShapeY = shape.y * zoom + panY;
        var masked = !maskOverride && maskRects.some(function(r) {
          return screenShapeX >= r.left - pad && screenShapeX <= r.right  + pad &&
                 screenShapeY >= r.top  - pad && screenShapeY <= r.bottom + pad;
        });

        if (masked) {
          shape.scale += (0 - shape.scale) * durationToFactor(settings.speedOut);
          if (shape.scale < 0.005) shape.scale = 0;
          continue;
        }

        var pointerInfluence = 0;

        // Compute physical pointer influence
        var infReal = 0;
        if (pointer && activity > 0.001) {
          var gridPx = (pointer.x - panX) / zoom;
          var gridPy = (pointer.y - panY) / zoom;
          var dx = shape.x - gridPx;
          var dy = shape.y - gridPy;
          var dist = Math.sqrt(dx * dx + dy * dy) * zoom;
          infReal = smoothstep(1 - dist / radius) * activity;
        }

        // Compute automatic virtual pointer influence
        var infAuto = 0;
        if (settings.autoPointer) {
          var gridAx = (autoPointerX - panX) / zoom;
          var gridAy = (autoPointerY - panY) / zoom;
          var adx = shape.x - gridAx;
          var ady = shape.y - gridAy;
          var adist = Math.sqrt(adx * adx + ady * ady) * zoom;
          infAuto = smoothstep(1 - adist / radius) * 1.0;
        }

        pointerInfluence = Math.max(infReal, infAuto);

        if (pointerInfluence > 0.05 && !shape.hovered) {
          shape.hovered = true;
          shape.maxScale = rnd(settings.minHoverScale, settings.maxHoverScale);
          shape.angle = rnd(0, Math.PI * 2);
          if (shape.type === 'star') Object.assign(shape, randomStarProps());
        } else if (pointerInfluence <= 0.05) {
          shape.hovered = false;
        }

        var waveInfluence = 0;
        for (var j = 0; j < waves.length; j++) {
          var wave = waves[j];
          var waveRadius = (now - wave.startTime) / 1000 * settings.waveSpeed;
          var wdx = shape.x - wave.x;
          var wdy = shape.y - wave.y;
          var wdist = Math.sqrt(wdx * wdx + wdy * wdy);
          var t = 1 - Math.abs(wdist - waveRadius) / settings.waveWidth;
          if (t > 0) waveInfluence = Math.max(waveInfluence, Math.sin(Math.PI * t));
        }

        var pointerTarget = settings.restScale + pointerInfluence * (shape.maxScale - settings.restScale);
        var waveTarget = settings.restScale + waveInfluence * (shape.maxScale - settings.restScale);
        var target = Math.max(pointerTarget, waveTarget);

        var factor = target > shape.scale ? durationToFactor(settings.speedIn) : durationToFactor(settings.speedOut);
        shape.scale += (target - shape.scale) * factor;

        if (shape.scale < settings.restScale * 0.15) continue;

        ctx.save();
        ctx.translate(shape.x, shape.y);
        ctx.rotate(shape.angle);
        ctx.scale(shape.scale, shape.scale);
        
        var colorDef = currentPalette[shape.colorIndex % currentPalette.length];
        ctx.fillStyle = resolveFill(ctx, colorDef, shape.size);
        
        drawShape(ctx, shape);
        ctx.restore();
      }

      // Handle auto-waves
      if (settings.autoWave) {
        var intervalMs = settings.autoWaveInterval * 1000;
        if (now - lastAutoWaveTime > intervalMs) {
          lastAutoWaveTime = now;
          var rx = rnd(width * 0.1, width * 0.9);
          var ry = rnd(height * 0.1, height * 0.9);
          var gridRx = (rx - panX) / zoom;
          var gridRy = (ry - panY) / zoom;
          triggerWave(gridRx, gridRy);
        }
      }

      // Sync settings values with manual inputs
      settings.zoom = zoom;
      settings.panX = panX;
      settings.panY = panY;
      zoomCtrl.updateDisplay();
      panXCtrl.updateDisplay();
      panYCtrl.updateDisplay();

      ctx.restore();

      rafId = requestAnimationFrame(tick);
    }

    function triggerWave(x, y) {
      x = x !== undefined ? x : window.innerWidth / 2;
      y = y !== undefined ? y : window.innerHeight / 2;
      waves.push({ x: x, y: y, startTime: performance.now() });
      maskOverride = true;
      var maxDim = Math.max(window.innerWidth, window.innerHeight) / zoom;
      var delay = maxDim / settings.waveSpeed;
      setTimeout(function() { maskOverride = false; }, delay * 1000);
    }

    // Set up GUI Controls
    var gui = new GUI({ title: 'Scene Controls' });

    var folderEnv = gui.addFolder('Environment & Theme');
    folderEnv.add(settings, 'greenscreen').name('Greenscreen (#00ff00)');
    folderEnv.addColor(settings, 'bgColor').name('Background Color');
    var schemeCtrl = folderEnv.add(settings, 'colorScheme', Object.keys(presets).concat('Custom')).name('Color Scheme').onChange(onPresetChange);

    var folderCustomColors = gui.addFolder('Custom Color Palette');
    var color1Ctrl = folderCustomColors.addColor(settings, 'color1').name('Color 1').onChange(function() { settings.colorScheme = 'Custom'; schemeCtrl.updateDisplay(); updatePalette(); });
    var color2Ctrl = folderCustomColors.addColor(settings, 'color2').name('Color 2').onChange(function() { settings.colorScheme = 'Custom'; schemeCtrl.updateDisplay(); updatePalette(); });
    var color3Ctrl = folderCustomColors.addColor(settings, 'color3').name('Color 3').onChange(function() { settings.colorScheme = 'Custom'; schemeCtrl.updateDisplay(); updatePalette(); });
    var color4Ctrl = folderCustomColors.addColor(settings, 'color4').name('Color 4').onChange(function() { settings.colorScheme = 'Custom'; schemeCtrl.updateDisplay(); updatePalette(); });
    var grad1StartCtrl = folderCustomColors.addColor(settings, 'colorGrad1Start').name('Grad 1 Start').onChange(function() { settings.colorScheme = 'Custom'; schemeCtrl.updateDisplay(); updatePalette(); });
    var grad1EndCtrl = folderCustomColors.addColor(settings, 'colorGrad1End').name('Grad 1 End').onChange(function() { settings.colorScheme = 'Custom'; schemeCtrl.updateDisplay(); updatePalette(); });
    var grad2StartCtrl = folderCustomColors.addColor(settings, 'colorGrad2Start').name('Grad 2 Start').onChange(function() { settings.colorScheme = 'Custom'; schemeCtrl.updateDisplay(); updatePalette(); });
    var grad2EndCtrl = folderCustomColors.addColor(settings, 'colorGrad2End').name('Grad 2 End').onChange(function() { settings.colorScheme = 'Custom'; schemeCtrl.updateDisplay(); updatePalette(); });
    folderCustomColors.close();

    var folderView = gui.addFolder('Navigation (Pan & Zoom)');
    var zoomCtrl = folderView.add(settings, 'zoom', 0.1, 10.0, 0.05).name('Zoom').onChange(function(v) { zoom = v; });
    var panXCtrl = folderView.add(settings, 'panX', -2000, 2000, 1).name('Pan X').onChange(function(v) { panX = v; });
    var panYCtrl = folderView.add(settings, 'panY', -2000, 2000, 1).name('Pan Y').onChange(function(v) { panY = v; });
    folderView.add(settings, 'resetView').name('Reset View');

    var folderGrid = gui.addFolder('Grid Settings');
    folderGrid.add(settings, 'gap', 10, 100, 1).name('Spacing (Gap)').onChange(init);
    folderGrid.add(settings, 'radiusVmin', 5, 80, 1).name('Pointer Radius');
    folderGrid.add(settings, 'speedIn', 0.05, 2.0, 0.05).name('Scale Up Speed');
    folderGrid.add(settings, 'speedOut', 0.05, 2.0, 0.05).name('Scale Down Speed');
    folderGrid.add(settings, 'restScale', 0.01, 0.5, 0.01).name('Rest Scale');
    folderGrid.add(settings, 'minHoverScale', 0.5, 3.0, 0.1).name('Min Hover Scale');
    folderGrid.add(settings, 'maxHoverScale', 1.0, 6.0, 0.1).name('Max Hover Scale');
    folderGrid.add(settings, 'waveSpeed', 100, 3000, 50).name('Wave Speed');
    folderGrid.add(settings, 'waveWidth', 50, 500, 10).name('Wave Width');

    var folderAnim = gui.addFolder('Auto Animation');
    folderAnim.add(settings, 'autoPointer').name('Enable Auto Pointer');
    folderAnim.add(settings, 'autoPointerSpeed', 0.1, 5.0, 0.1).name('Pointer Speed');
    folderAnim.add(settings, 'autoWave').name('Enable Auto Waves');
    folderAnim.add(settings, 'autoWaveInterval', 1.0, 10.0, 0.5).name('Wave Interval (s)');

    // Set up interactive event listeners
    window.addEventListener('wheel', function(e) {
      if (e.target.closest('.lil-gui')) return;
      e.preventDefault();

      var mx = e.clientX;
      var my = e.clientY;

      var cx = (mx - panX) / zoom;
      var cy = (my - panY) / zoom;

      var zoomFactor = 1.05;
      if (e.deltaY < 0) {
        zoom *= zoomFactor;
      } else {
        zoom /= zoomFactor;
      }
      zoom = Math.max(0.1, Math.min(zoom, 10.0));

      panX = mx - cx * zoom;
      panY = my - cy * zoom;
    }, { passive: false });

    window.addEventListener('pointerdown', function(e) {
      if (e.target.closest('.lil-gui')) return;
      isDragging = true;
      dragStartX = e.clientX - panX;
      dragStartY = e.clientY - panY;
      dragStartMouseX = e.clientX;
      dragStartMouseY = e.clientY;
      totalDragDist = 0;
    });

    window.addEventListener('pointermove', function(e) {
      if (isDragging) {
        panX = e.clientX - dragStartX;
        panY = e.clientY - dragStartY;

        var dx = e.clientX - dragStartMouseX;
        var dy = e.clientY - dragStartMouseY;
        totalDragDist = Math.sqrt(dx * dx + dy * dy);
      }
      pointer = { x: e.clientX, y: e.clientY };
      activity = 1;
    });

    window.addEventListener('pointerup', function(e) {
      if (isDragging) {
        isDragging = false;
        // Trigger click-wave only on click without significant drag
        if (totalDragDist < 5) {
          var gridX = (e.clientX - panX) / zoom;
          var gridY = (e.clientY - panY) / zoom;
          triggerWave(gridX, gridY);
        }
      }
    });

    window.addEventListener('pointerleave', function() {
      pointer = null;
      activity = 0;
    });

    window.addEventListener('resize', init);

    // Initial setups
    updatePalette();
    init();
    
    // Trigger initial center wave
    triggerWave();

    // Start animation loop
    rafId = requestAnimationFrame(tick);
  </script>
</body>
</html>
