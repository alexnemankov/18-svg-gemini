<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holographic City Surveillance Map</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: #0b0e14;
        font-family: monospace;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #hud-container {
        position: fixed;
        bottom: 20px;
        left: 20px;
        color: #f09a37;
        opacity: 0.7;
        font-size: 10px;
        pointer-events: none;
        z-index: 10;
        line-height: 1.4;
        transition: opacity 0.3s ease;
        text-shadow: 0 0 4px rgba(240, 154, 55, 0.4);
      }
      .hud-line {
        margin: 2px 0;
      }
      /* Hide gui container when toggled */
      #gui-container {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 20;
        transition: opacity 0.3s ease;
      }
      #hud-bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100vw;
        height: 24px;
        border-top: 1px solid rgba(240, 154, 55, 0.4);
        background: rgba(11, 14, 20, 0.8);
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
        box-sizing: border-box;
        font-size: 10px;
        color: #f09a37;
        text-shadow: 0 0 4px rgba(240, 154, 55, 0.4);
        transition: opacity 0.3s ease;
      }
    </style>
    <!-- Import Maps -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/",
          "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/+esm"
        }
      }
    </script>
  </head>
  <body>
    <div id="hud-container">
      <div id="hud-time" class="hud-line">SYS_TIME: --</div>
      <div id="hud-cam" class="hud-line">CAM_POS: --</div>
      <div id="hud-drone" class="hud-line">DRONE_VEC: --</div>
      <div id="hud-sector" class="hud-line">SECTOR: GRID_7x7 | ACTIVE</div>
    </div>

    <div id="gui-container"></div>

    <div id="hud-bottom-bar">
      <span>SYS.CHECK: INIT // DRONE_LINK: STABLE</span>
      <span style="letter-spacing: 2px">OBJ.DETECT: BUILDINGS // 85M</span>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
      import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";
      import GUI from "lil-gui";

      // --- CORE SETUP ---
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b0e14);
      scene.fog = new THREE.FogExp2(0x0b0e14, 0.012);

      const camera = new THREE.PerspectiveCamera(
        30,
        window.innerWidth / window.innerHeight,
        0.1,
        500,
      );
      camera.position.set(40, 20, 35);

      const renderer = new THREE.WebGLRenderer({
        antialias: false,
        powerPreference: "high-performance",
      });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.physicallyCorrectLights = true; // Essential for correct MeshPhysicalMaterial behavior
      document.body.appendChild(renderer.domElement);

      // Environment for Glass Transmission
      const pmremGenerator = new THREE.PMREMGenerator(renderer);
      scene.environment = pmremGenerator.fromScene(
        new RoomEnvironment(),
        0.04,
      ).texture;

      // Controls
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(5, 2, 0);
      controls.minDistance = 25;
      controls.maxDistance = 70;
      controls.minPolarAngle = Math.PI / 4;
      controls.maxPolarAngle = Math.PI / 3;
      controls.minAzimuthAngle = -Math.PI / 6;
      controls.maxAzimuthAngle = Math.PI / 6;
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      // Lights
      const dirLight = new THREE.DirectionalLight(0x8da2de, 1.5);
      dirLight.position.set(10, 30, 15);
      scene.add(dirLight);

      const hemiLight = new THREE.HemisphereLight(0x161c28, 0x0b0e14, 0.6);
      scene.add(hemiLight);

      // --- POST-PROCESSING ---
      const composer = new EffectComposer(renderer);
      const renderPass = new RenderPass(scene, camera);
      composer.addPass(renderPass);

      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.4, // strength
        0.65, // radius
        0.2, // threshold
      );
      composer.addPass(bloomPass);

      // --- SHARED DATA ---
      const buildingMaterials = [];
      const buildingRoofs = [];
      const radarRings = [];
      const pathMaterials = [];
      let scanVelocityGlobal = 1.5;

      // --- PROCEDURAL GROUND GRID ---
      const gridGeo = new THREE.PlaneGeometry(200, 200, 200, 200);
      gridGeo.rotateX(-Math.PI / 2);

      const gridShader = {
        uniforms: {
          uTime: { value: 0 },
          color: { value: new THREE.Color(0x8da2de) },
        },
        vertexShader: `
                varying vec2 vUv;
                varying vec3 vWorldPos;
                uniform float uTime;
                void main() {
                    vUv = uv;
                    // Scroll Z (mapped to V coordinate because plane is rotated)
                    vUv.y += uTime * 0.04; 
                    vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                    vWorldPos = worldPosition.xyz;
                    gl_Position = projectionMatrix * viewMatrix * worldPosition;
                }
            `,
        fragmentShader: `
                uniform vec3 color;
                varying vec2 vUv;
                varying vec3 vWorldPos;
                void main() {
                    // Create grid lines
                    vec2 grid = abs(fract(vUv * 100.0 - 0.5) - 0.5) / fwidth(vUv * 100.0);
                    float line = min(grid.x, grid.y);
                    float alpha = 1.0 - min(line, 1.0);
                    
                    // Radial fade from target center (5, 0, 0)
                    float dist = length(vWorldPos.xz - vec2(5.0, 0.0));
                    float fogFactor = smoothstep(60.0, 15.0, dist);
                    
                    gl_FragColor = vec4(color, alpha * 0.3 * fogFactor);
                    #include <tonemapping_fragment>
                    #include <colorspace_fragment>
                }
            `,
        transparent: true,
        depthWrite: false,
        side: THREE.DoubleSide,
      };
      const gridMat = new THREE.ShaderMaterial(gridShader);
      const gridMesh = new THREE.Mesh(gridGeo, gridMat);
      scene.add(gridMesh);

      // --- PROCEDURAL CITY GENERATION ---
      const basePlaneGeo = new THREE.PlaneGeometry(60, 60);
      basePlaneGeo.rotateX(-Math.PI / 2);
      const basePlaneMat = new THREE.MeshBasicMaterial({
        color: 0x223366,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide,
      });
      const basePlane = new THREE.Mesh(basePlaneGeo, basePlaneMat);
      basePlane.position.y = 0.01;
      scene.add(basePlane);

      const wireframeMat = new THREE.LineBasicMaterial({
        color: 0xdee7fb,
        opacity: 0.8,
        transparent: true,
      });

      const cityGroup = new THREE.Group();
      scene.add(cityGroup);

      for (let x = -4; x <= 4; x++) {
        for (let z = -4; z <= 4; z++) {
          if (Math.abs(x) <= 1 && Math.abs(z) <= 1) continue; // Skip larger center for radar
          if (Math.random() < 0.25) continue; // 25% gap chance

          const width = 1.5 + Math.random() * 3.5;
          const depth = 1.5 + Math.random() * 3.5;
          const height = 1.5 + Math.random() * 6.5;
          const px = x * 5;
          const pz = z * 5;

          const bldgGeo = new THREE.BoxGeometry(width, height, depth);
          bldgGeo.translate(0, height / 2, 0); // Origin at bottom

          // Solid Glass Material
          const bldgMat = new THREE.MeshPhysicalMaterial({
            color: 0x8da2de,
            transmission: 0.9,
            opacity: 0.8,
            transparent: true,
            roughness: 0.1,
            metalness: 0.2,
            ior: 1.5,
            side: THREE.DoubleSide,
          });
          buildingMaterials.push(bldgMat);

          const bldg = new THREE.Mesh(bldgGeo, bldgMat);
          bldg.position.set(px, 0, pz);

          // Add Red Server Lights inside
          if (Math.random() > 0.5) {
            const lightGroup = new THREE.Group();
            for (let l = 0; l < 3; l++) {
              const slMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
              const slGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
              const slMesh = new THREE.Mesh(slGeo, slMat);
              // Random position near the outer walls
              slMesh.position.set(
                (Math.random() - 0.5) * width * 0.8,
                0.5 + Math.random() * (height - 1),
                depth / 2 + 0.05,
              );
              lightGroup.add(slMesh);
            }
            bldg.add(lightGroup);
          }

          cityGroup.add(bldg);

          // Wireframe Shell
          const wireGeo = new THREE.BoxGeometry(
            width + 0.02,
            height + 0.02,
            depth + 0.02,
          );
          wireGeo.translate(0, (height + 0.02) / 2, 0);
          const wireframeEdges = new THREE.EdgesGeometry(wireGeo);
          const shell = new THREE.LineSegments(wireframeEdges, wireframeMat);
          shell.position.set(px, 0, pz);
          cityGroup.add(shell);

          // Store roof positions for drone telemetry targeting
          buildingRoofs.push(new THREE.Vector3(px, height, pz));
        }
      }

      // --- CENTRAL RADAR SYSTEM ---
      const radarGroup = new THREE.Group();
      radarGroup.position.set(0, 0.1, 0);
      scene.add(radarGroup);

      const emissiveRadarMat = new THREE.MeshStandardMaterial({
        color: 0x000000,
        emissive: 0xf09a37,
        emissiveIntensity: 3.0,
      });

      const radii = [3.5, 6.0, 8.5];
      radii.forEach((r) => {
        const rGeo = new THREE.TorusGeometry(r, 0.04, 8, 64);
        rGeo.rotateX(Math.PI / 2);
        const rMesh = new THREE.Mesh(rGeo, emissiveRadarMat);
        radarGroup.add(rMesh);
        radarRings.push(rMesh);
      });

      // Radar Sweep Line
      const sweepGeo = new THREE.PlaneGeometry(8, 0.05);
      sweepGeo.translate(4, 0, 0); // Pivot from center
      sweepGeo.rotateX(-Math.PI / 2);
      const sweepMat = new THREE.MeshBasicMaterial({
        color: 0xf09a37,
        opacity: 0.7,
        transparent: true,
        side: THREE.DoubleSide,
      });
      const sweepMesh = new THREE.Mesh(sweepGeo, sweepMat);
      radarGroup.add(sweepMesh);

      // --- FLOOR DATA PATHS ---
      for (let i = 0; i < 8; i++) {
        const startX = (Math.floor(Math.random() * 12) - 6) * 4;
        const startZ = (Math.floor(Math.random() * 12) - 6) * 4;
        const points = [new THREE.Vector3(startX, 0.05, startZ)];
        let currX = startX;
        let currZ = startZ;

        // Generate orthogonal circuit segments
        for (let j = 0; j < 4; j++) {
          if (j % 2 === 0) {
            currX += (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 12);
          } else {
            currZ += (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 12);
          }
          points.push(new THREE.Vector3(currX, 0.05, currZ));
        }

        const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
        const lineMat = new THREE.LineDashedMaterial({
          color: 0xf09a37,
          dashSize: 1.5,
          gapSize: 3,
          linewidth: 2,
          transparent: true,
          opacity: 0.9,
        });
        const line = new THREE.Line(lineGeo, lineMat);
        line.computeLineDistances(); // Essential for dashed materials
        pathMaterials.push(lineMat);
        scene.add(line);
      }

      // --- TRACKING DRONE ---
      const droneGroup = new THREE.Group();
      droneGroup.position.set(-8, 3.5, 8);
      scene.add(droneGroup);

      const droneBodyMat = new THREE.MeshPhysicalMaterial({
        color: 0x000000,
        emissive: 0xf09a37,
        emissiveIntensity: 4.0,
        metalness: 0.8,
        roughness: 0.1,
      });

      // UAV Fuselage
      const fuseGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.8, 8);
      fuseGeo.rotateX(Math.PI / 2);
      const fuse = new THREE.Mesh(fuseGeo, droneBodyMat);
      droneGroup.add(fuse);

      // UAV Swept Wings
      const wingGeo = new THREE.BoxGeometry(1.8, 0.04, 0.3);
      const wingR = new THREE.Mesh(wingGeo, droneBodyMat);
      wingR.position.set(0.8, 0, -0.2);
      wingR.rotation.y = -Math.PI / 8; // Sweep back
      droneGroup.add(wingR);

      const wingL = new THREE.Mesh(wingGeo, droneBodyMat);
      wingL.position.set(-0.8, 0, -0.2);
      wingL.rotation.y = Math.PI / 8; // Sweep back
      droneGroup.add(wingL);

      // UAV Tail (V-tail)
      const tailGeo = new THREE.BoxGeometry(0.8, 0.04, 0.2);
      const tail1 = new THREE.Mesh(tailGeo, droneBodyMat);
      tail1.position.set(0.3, 0.1, 0.8);
      tail1.rotation.z = Math.PI / 6;
      tail1.rotation.y = -Math.PI / 8; // Sweep back
      droneGroup.add(tail1);

      const tail2 = new THREE.Mesh(tailGeo, droneBodyMat);
      tail2.position.set(-0.3, 0.1, 0.8);
      tail2.rotation.z = -Math.PI / 6;
      tail2.rotation.y = Math.PI / 8; // Sweep back
      droneGroup.add(tail2);

      // Drone Flight Path (High altitude orbit over buildings)
      const droneCurve = new THREE.CatmullRomCurve3(
        [
          new THREE.Vector3(-18, 12.0, -18),
          new THREE.Vector3(18, 14.5, -10),
          new THREE.Vector3(12, 11.0, 18),
          new THREE.Vector3(-10, 13.5, 12),
        ],
        true,
      ); // true = closed loop

      let droneT = 0;

      // Telemetry Lines (Dynamic BufferGeometry)
      const teleGeo = new THREE.BufferGeometry();
      const telePositions = new Float32Array(12); // 2 lines * 2 points * 3 components
      teleGeo.setAttribute(
        "position",
        new THREE.BufferAttribute(telePositions, 3),
      );
      const teleMat = new THREE.LineBasicMaterial({
        color: 0xf09a37,
        opacity: 0.4,
        transparent: true,
      });
      const telemetryLines = new THREE.LineSegments(teleGeo, teleMat);
      scene.add(telemetryLines);

      let targetBldg1 = buildingRoofs[0] || new THREE.Vector3();
      let targetBldg2 = buildingRoofs[1] || new THREE.Vector3();

      // --- GUI SETUP ---
      const guiContainer = document.getElementById("gui-container");
      const gui = new GUI({ container: guiContainer });

      const sysFolder = gui.addFolder("System Lighting");
      sysFolder.add(dirLight, "intensity", 0, 4, 0.05).name("Key Intensity");
      sysFolder
        .addColor({ color: "#8da2de" }, "color")
        .name("Key Color")
        .onChange((v) => dirLight.color.set(v));
      sysFolder
        .add({ glow: 4.0 }, "glow", 0, 8, 0.1)
        .name("Emissive Glow")
        .onChange((v) => {
          emissiveRadarMat.emissiveIntensity = v;
          droneBodyMat.emissiveIntensity = v;
        });

      const holoFolder = gui.addFolder("Hologram Materials");
      holoFolder
        .add({ transmission: 0.85 }, "transmission", 0.5, 1.0)
        .onChange((v) => {
          buildingMaterials.forEach((m) => (m.transmission = v));
        });
      holoFolder
        .add({ roughness: 0.12 }, "roughness", 0.0, 0.5)
        .onChange((v) => {
          buildingMaterials.forEach((m) => (m.roughness = v));
        });

      const envFolder = gui.addFolder("Environment");
      envFolder.add({ fog: 0.012 }, "fog", 0.0, 0.05).onChange((v) => {
        if (scene.fog) scene.fog.density = v;
      });
      envFolder.add(bloomPass, "strength", 0.0, 3.0).name("Bloom Strength");
      envFolder
        .add({ scan: 1.5 }, "scan", 0.0, 5.0)
        .name("Scan Velocity")
        .onChange((v) => {
          scanVelocityGlobal = v;
          pathMaterials.forEach((m) => (m.uniforms.scanVelocity.value = v));
        });

      // --- STATE & INTERACTIVITY ---
      let greenScreenMode = false;
      let isUIVisible = true;
      let isInteracting = false;
      let interactTimeout = null;

      let autoOrbitAngle = Math.atan2(
        camera.position.z - controls.target.z,
        camera.position.x - controls.target.x,
      );
      let orbitRadius = Math.hypot(
        camera.position.x - controls.target.x,
        camera.position.z - controls.target.z,
      );

      const resetInteraction = () => {
        isInteracting = true;
        if (interactTimeout) clearTimeout(interactTimeout);

        // Re-calibrate radius and angle from current manual position
        orbitRadius = Math.hypot(
          camera.position.x - controls.target.x,
          camera.position.z - controls.target.z,
        );
        autoOrbitAngle = Math.atan2(
          camera.position.z - controls.target.z,
          camera.position.x - controls.target.x,
        );

        interactTimeout = setTimeout(() => {
          isInteracting = false;
          // recalibrate one last time before resuming
          orbitRadius = Math.hypot(
            camera.position.x - controls.target.x,
            camera.position.z - controls.target.z,
          );
          autoOrbitAngle = Math.atan2(
            camera.position.z - controls.target.z,
            camera.position.x - controls.target.x,
          );
        }, 2000);
      };

      window.addEventListener("mousedown", resetInteraction);
      window.addEventListener("touchstart", resetInteraction, {
        passive: true,
      });
      window.addEventListener("wheel", resetInteraction, { passive: true });

      // Camera Lerp State
      let isResettingCamera = false;
      let resetProgress = 0;
      const startCamPos = new THREE.Vector3();
      const startTargetPos = new THREE.Vector3();
      const defaultCamPos = new THREE.Vector3(40, 20, 35);
      const defaultTargetPos = new THREE.Vector3(5, 2, 0);

      window.addEventListener("keydown", (e) => {
        if (e.key.toLowerCase() === "g") {
          greenScreenMode = !greenScreenMode;
          if (greenScreenMode) {
            scene.background = new THREE.Color(0x00ff00);
            scene.fog = null;
          } else {
            scene.background = new THREE.Color(0x0b0e14);
            scene.fog = new THREE.FogExp2(
              0x0b0e14,
              envFolder.controllers[0].getValue(),
            );
          }
        }
        if (e.key.toLowerCase() === "h") {
          isUIVisible = !isUIVisible;
          const op = isUIVisible ? "1" : "0";
          guiContainer.style.opacity = op;
          guiContainer.style.pointerEvents = isUIVisible ? "auto" : "none";
          document.getElementById("hud-container").style.opacity = op;
          document.getElementById("hud-bottom-bar").style.opacity = op;
        }
        if (e.key.toLowerCase() === "r") {
          isResettingCamera = true;
          resetProgress = 0;
          startCamPos.copy(camera.position);
          startTargetPos.copy(controls.target);
          resetInteraction(); // Prevent auto-orbit fighting the reset
        }
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });

      // --- ANIMATION LOOP ---
      const clock = new THREE.Clock();
      let frameCounter = 0;

      const hudTime = document.getElementById("hud-time");
      const hudCam = document.getElementById("hud-cam");
      const hudDrone = document.getElementById("hud-drone");

      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const time = clock.getElapsedTime();
        frameCounter++;

        // Update Shaders
        gridMat.uniforms.uTime.value = time;
        pathMaterials.forEach((m) => {
          if (m.uniforms && m.uniforms.uTime) m.uniforms.uTime.value = time;
          if (m.isLineDashedMaterial)
            m.dashOffset -= delta * scanVelocityGlobal * 2.5;
        });

        // Animate Radar
        if (radarRings.length === 3) {
          radarRings[0].rotation.y += 0.003;
          radarRings[1].rotation.y -= 0.002;
          radarRings[2].rotation.y += 0.001;
        }
        sweepMesh.rotation.y -= 0.008;

        // Animate Drone Path & Bob
        droneT += 0.0006;
        const dronePos = droneCurve.getPoint(droneT % 1);
        const nextPos = droneCurve.getPoint((droneT + 0.01) % 1);

        const bob = Math.sin(time * 2.0) * 0.15;
        droneGroup.position.copy(dronePos);
        droneGroup.position.y += bob; // Hover bob

        nextPos.y += bob; // Apply same bob to target to prevent steep pitching
        droneGroup.lookAt(nextPos);

        // Update Telemetry Targeting
        if (frameCounter % 120 === 0 && buildingRoofs.length > 1) {
          const i1 = Math.floor(Math.random() * buildingRoofs.length);
          let i2 = Math.floor(Math.random() * buildingRoofs.length);
          while (i1 === i2)
            i2 = Math.floor(Math.random() * buildingRoofs.length);
          targetBldg1 = buildingRoofs[i1];
          targetBldg2 = buildingRoofs[i2];
        }

        // Update Telemetry Lines Buffer
        const positions = teleGeo.attributes.position.array;

        // Line 1: Drone to Target 1
        positions[0] = droneGroup.position.x;
        positions[1] = droneGroup.position.y;
        positions[2] = droneGroup.position.z;
        positions[3] = targetBldg1.x;
        positions[4] = targetBldg1.y;
        positions[5] = targetBldg1.z;

        // Line 2: Drone to Target 2
        positions[6] = droneGroup.position.x;
        positions[7] = droneGroup.position.y;
        positions[8] = droneGroup.position.z;
        positions[9] = targetBldg2.x;
        positions[10] = targetBldg2.y;
        positions[11] = targetBldg2.z;

        teleGeo.attributes.position.needsUpdate = true;

        // Camera Reset Lerp
        if (isResettingCamera) {
          resetProgress += delta / 1.2; // 1.2s duration
          if (resetProgress >= 1.0) {
            resetProgress = 1.0;
            isResettingCamera = false;
          }
          // Smoothstep easing
          const ease =
            resetProgress < 0.5
              ? 2 * resetProgress * resetProgress
              : -1 + (4 - 2 * resetProgress) * resetProgress;

          camera.position.lerpVectors(startCamPos, defaultCamPos, ease);
          controls.target.lerpVectors(startTargetPos, defaultTargetPos, ease);
        }
        // Cinematic Auto-orbit
        else if (!isInteracting) {
          autoOrbitAngle += 0.0003;
          const targetCamX =
            controls.target.x + Math.cos(autoOrbitAngle) * orbitRadius;
          const targetCamZ =
            controls.target.z + Math.sin(autoOrbitAngle) * orbitRadius;

          // Heavy inertia lerp
          camera.position.x += (targetCamX - camera.position.x) * 0.02;
          camera.position.z += (targetCamZ - camera.position.z) * 0.02;
        }

        controls.update();

        // Update HUD Overlay
        if (isUIVisible && frameCounter % 3 === 0) {
          hudTime.innerText = `SYS_TIME: [${new Date().toISOString()}]`;
          hudCam.innerText = `CAM_POS: X:${camera.position.x.toFixed(1)} Y:${camera.position.y.toFixed(1)} Z:${camera.position.z.toFixed(1)}`;
          hudDrone.innerText = `DRONE_VEC: [${droneGroup.position.x.toFixed(1)}, ${droneGroup.position.y.toFixed(1)}, ${droneGroup.position.z.toFixed(1)}]`;
        }

        // Render via Composer
        composer.render();
      }

      animate();
    </script>
  </body>
</html>
