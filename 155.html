<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fractal Plants Generator</title>
	<style>
		body {
			cursor: pointer;
			margin: 0;
			overflow: hidden;
			background: #f4f4f4;
		}

		canvas {
			background: #f4f4f4;
			height: 100vh;
			left: 0;
			position: absolute;
			top: 0;
			width: 100vw;
		}

		/* Styling to match default simple clean style */
		.lil-gui {
			--background-color: rgba(20, 20, 20, 0.85);
			--text-color: #e0e0e0;
			--title-background-color: #2c2c2c;
			--widget-color: #3c3c3c;
			--hover-color: #505050;
			--focus-color: #666;
			--number-color: #2fa1d6;
			--string-color: #8dc149;
			font-family: Inter, system-ui, -apple-system, sans-serif;
			border-radius: 8px;
			overflow: hidden;
			box-shadow: 0 10px 30px rgba(0,0,0,0.3);
		}
	</style>
	<!-- Load GSAP -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
	<canvas class="tree"></canvas>

	<script type="module">
		import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

		const canvas = document.querySelector(".tree");

		const colorSchemes = {
			'Mystic Forest': {
				start: { h: 140, s: 45, l: 35 },
				delta: { h: 12, s: -2, l: 4 }
			},
			'Sakura Blossom': {
				start: { h: 345, s: 65, l: 55 },
				delta: { h: -6, s: -5, l: 3 }
			},
			'Midnight Neon': {
				start: { h: 270, s: 80, l: 45 },
				delta: { h: 15, s: -3, l: 5 }
			},
			'Autumn Gold': {
				start: { h: 25, s: 60, l: 40 },
				delta: { h: 8, s: 2, l: 3 }
			},
			'Frosty Pine': {
				start: { h: 190, s: 50, l: 45 },
				delta: { h: 6, s: -4, l: 2 }
			}
		};

		const settings = {
			levels: 4,
			leaves: {
				count: 4,
				range: 60,
				widthRatio: 0.25,
				heightRatio: 1
			},
			height: {
				start: window.innerHeight / 4.0,
				multiplier: 0.95
			},
			lineWidth: {
				start: 12,
				multiplier: 0.85
			},
			angle: {
				start: 0,
				delta: 18
			},
			color: {
				start: { h: 140, s: 45, l: 35 },
				delta: { h: 12, s: -2, l: 4 }
			},
			// Enhanced Custom Controls
			greenscreen: false,
			colorScheme: 'Mystic Forest',
			cameraAnimation: 'Gentle Sway',
			animationSpeed: 1.0,
			dpr: window.devicePixelRatio || 1,
			autoGrowth: true,
			growth: 0.0,
			opacity: 1.0,

			// GSAP Easing settings
			growthEase: 'power2.out',
			growthDuration: 3.5,
			stayDuration: 4.0,
			fadeDuration: 1.5
		};

		// Zoom and drag variables (in screen units, scaled internally)
		let scale = 1.0;
		let translateX = 0;
		let translateY = 0;
		let isDragging = false;
		let startX = 0;
		let startY = 0;
		let dragDistance = 0;

		let lastTime = 0;
		let time = 0;
		let growthTimeline = null;

		function random(min, max) {
			return Math.random() * (max - min) + min;
		}

		function randomInt(min, max) {
			return Math.floor(Math.random() * (max - min + 1)) + min;
		}

		function applyColorScheme() {
			const scheme = colorSchemes[settings.colorScheme];
			if (scheme) {
				settings.color.start.h = scheme.start.h;
				settings.color.start.s = scheme.start.s;
				settings.color.start.l = scheme.start.l;
				settings.color.delta.h = scheme.delta.h;
				settings.color.delta.s = scheme.delta.s;
				settings.color.delta.l = scheme.delta.l;
			}
		}

		function randomizeTreeSettings() {
			settings.levels = randomInt(3, 5);
			settings.leaves.count = randomInt(3, 6);
			settings.leaves.range = randomInt(45, 75);
			settings.leaves.widthRatio = random(0.15, 0.3);
			
			const dpr = settings.dpr;
			settings.height.start = (window.innerHeight * dpr) / random(3.5, 4.5);
			settings.height.multiplier = random(0.9, 0.98);
			settings.lineWidth.start = randomInt(10, 15) * dpr;
			settings.angle.delta = randomInt(15, 25);
			
			applyColorScheme();
			const scheme = colorSchemes[settings.colorScheme];
			if (scheme) {
				settings.color.start.h = (scheme.start.h + randomInt(-12, 12) + 360) % 360;
				settings.color.start.s = Math.max(10, Math.min(100, scheme.start.s + randomInt(-6, 6)));
				settings.color.start.l = Math.max(10, Math.min(100, scheme.start.l + randomInt(-6, 6)));
			}
		}

		function startGrowthAnimation() {
			if (growthTimeline) {
				growthTimeline.kill();
			}

			settings.growth = 0.0;
			settings.opacity = 1.0;
			updateGuiDisplay();

			const speed = Math.max(0.01, settings.animationSpeed);

			growthTimeline = gsap.timeline({
				onComplete: () => {
					if (settings.autoGrowth) {
						randomizeTreeSettings();
						updateGuiDisplay();
						startGrowthAnimation();
					}
				}
			});

			// 1. Growing Phase with GSAP ease
			growthTimeline.to(settings, {
				growth: 1.0,
				duration: settings.growthDuration / speed,
				ease: settings.growthEase,
				onUpdate: () => {
					// optional: can update manual display occasionally, but handled by .listen()
				}
			});

			// 2. Blooming/Swaying Standing Phase
			growthTimeline.to({}, {
				duration: settings.stayDuration / speed
			});

			// 3. Smooth Fade Out Phase
			growthTimeline.to(settings, {
				opacity: 0.0,
				duration: settings.fadeDuration / speed,
				ease: 'power1.inOut'
			});
		}

		function getLevelGrowthFactor(i, growth, levels) {
			const totalLevels = levels + 1;
			const segmentDuration = 1 / totalLevels;
			
			const start = i * segmentDuration;
			const end = (i + 1) * segmentDuration;
			
			if (growth <= start) return 0;
			if (growth >= end) return 1;
			
			return (growth - start) / segmentDuration;
		}

		class TreeRenderer {
			constructor(canvas, settings) {
				this.canvas = canvas;
				this.ctx = canvas.getContext("2d");
				this.settings = settings;
			}

			updateSize() {
				const dpr = this.settings.dpr;
				this.canvas.width = window.innerWidth * dpr;
				this.canvas.height = window.innerHeight * dpr;
				this.canvas.style.width = '100vw';
				this.canvas.style.height = '100vh';
			}

			render(baseTranslateX, baseTranslateY, baseScale, baseAngle, opacity) {
				const ctx = this.ctx;
				const width = this.canvas.width;
				const height = this.canvas.height;

				// Clear canvas
				ctx.clearRect(0, 0, width, height);

				// Draw background
				if (this.settings.greenscreen) {
					ctx.fillStyle = "#00ff00";
				} else {
					ctx.fillStyle = `hsl(${this.settings.color.start.h - this.settings.color.delta.h}, 
						${this.settings.color.start.s - 3 * this.settings.color.delta.s}%, 
						${this.settings.color.start.l - 3 * this.settings.color.delta.l}%)`;
				}
				ctx.fillRect(0, 0, width, height);

				// Draw tree with transforms
				ctx.save();
				ctx.globalAlpha = opacity;

				// Tree base coordinates anchor
				const cx = width / 2;
				const cy = height;

				// Translate to tree anchor base
				ctx.translate(cx + translateX, cy + translateY);

				// Apply camera animations
				ctx.translate(baseTranslateX, baseTranslateY);
				ctx.rotate(baseAngle);
				
				const currentScale = scale * baseScale;
				ctx.scale(currentScale, currentScale);

				this.draw(
					0, 
					0, 
					0, 
					this.settings.height.start,
					this.settings.angle.start,
					this.settings.lineWidth.start,
					{ ...this.settings.color.start }
				);

				ctx.restore();
			}

			draw(i, x, y, height, angle, lineWidth, color) {
				const growthFactor = getLevelGrowthFactor(i, this.settings.growth, this.settings.levels);
				if (growthFactor <= 0) {
					return;
				}

				const currentHeight = height * growthFactor;
				const currentLineWidth = lineWidth * (0.3 + 0.7 * growthFactor);

				this.ctx.lineWidth = currentLineWidth;

				this.ctx.beginPath();
				this.ctx.save();

				this.ctx.strokeStyle = `hsl(${color.h}, ${color.s}%, ${color.l}%)`;
				this.ctx.fillStyle = `hsl(${color.h}, ${color.s}%, ${color.l}%)`;

				this.ctx.translate(x, y);
				this.ctx.rotate((angle * Math.PI) / 180);
				this.ctx.moveTo(0, 0);
				this.ctx.lineTo(0, -currentHeight);
				this.ctx.stroke();

				// Calculating leaves variables
				let angleStep = (2 * this.settings.leaves.range) / (this.settings.leaves.count - 1);
				const leafScale = Math.pow(growthFactor, 1.5);
				const leafHeight = height * this.settings.leaves.heightRatio * leafScale;
				const leafWidth = height * this.settings.leaves.widthRatio * leafScale;

				for (let j = 0; j < this.settings.leaves.count; j++) {
					const rotation = -this.settings.leaves.range + j * angleStep;

					this.ctx.save();
					this.ctx.translate(0, -currentHeight);
					this.ctx.rotate((rotation * Math.PI) / 180);

					this.ctx.beginPath();
					this.ctx.bezierCurveTo(0, 0, leafWidth, -leafHeight / 2, 0, -leafHeight);
					this.ctx.bezierCurveTo(
						0,
						-leafHeight,
						-leafWidth,
						-leafHeight / 2,
						0,
						0
					);
					this.ctx.fill();
					this.ctx.closePath();
					this.ctx.restore();
				}

				if (i >= this.settings.levels) {
					this.ctx.restore();
					return;
				}

				const newColor = {
					h: (color.h + this.settings.color.delta.h) % 360,
					s: Math.max(0, Math.min(100, color.s + this.settings.color.delta.s)),
					l: Math.max(0, Math.min(100, color.l + this.settings.color.delta.l))
				};

				this.draw(
					i + 1,
					0,
					-currentHeight,
					height * this.settings.height.multiplier,
					angle + this.settings.angle.delta,
					lineWidth * this.settings.lineWidth.multiplier,
					newColor
				);
				this.draw(
					i + 1,
					0,
					-currentHeight,
					height * this.settings.height.multiplier,
					angle - this.settings.angle.delta,
					lineWidth * this.settings.lineWidth.multiplier,
					newColor
				);

				this.ctx.restore();
			}
		}

		// Initialize Renderer
		const renderer = new TreeRenderer(canvas, settings);
		renderer.updateSize();

		// Set initial dimensions based on default DPR
		settings.height.start = (window.innerHeight * settings.dpr) / 4.0;
		settings.lineWidth.start = 12 * settings.dpr;

		// Input events: Zoom & Drag
		canvas.addEventListener('pointerdown', (e) => {
			if (e.button !== 0) return;
			isDragging = true;
			startX = e.clientX * settings.dpr - translateX;
			startY = e.clientY * settings.dpr - translateY;
			dragDistance = 0;
			canvas.setPointerCapture(e.pointerId);
		});

		canvas.addEventListener('pointermove', (e) => {
			if (!isDragging) return;
			const newTx = e.clientX * settings.dpr - startX;
			const newTy = e.clientY * settings.dpr - startY;
			dragDistance += Math.hypot(newTx - translateX, newTy - translateY);
			translateX = newTx;
			translateY = newTy;
		});

		canvas.addEventListener('pointerup', (e) => {
			if (isDragging) {
				canvas.releasePointerCapture(e.pointerId);
				isDragging = false;
				if (dragDistance < 5) {
					// Treat as a quick tap to force grow a new plant
					randomizeTreeSettings();
					updateGuiDisplay();
					startGrowthAnimation();
				}
			}
		});

		canvas.addEventListener('pointercancel', (e) => {
			if (isDragging) {
				canvas.releasePointerCapture(e.pointerId);
				isDragging = false;
			}
		});

		canvas.addEventListener('wheel', (e) => {
			e.preventDefault();
			const zoomFactor = 1.1;
			const mouseX = e.clientX * settings.dpr;
			const mouseY = e.clientY * settings.dpr;

			const prevScale = scale;
			if (e.deltaY < 0) {
				scale *= zoomFactor;
			} else {
				scale /= zoomFactor;
			}
			scale = Math.min(Math.max(scale, 0.1), 20);

			// Zoom relative to cursor point
			const cx = canvas.width / 2;
			const cy = canvas.height;
			const ratio = scale / prevScale;
			translateX = mouseX + (translateX + cx - mouseX) * ratio - cx;
			translateY = mouseY + (translateY + cy - mouseY) * ratio - cy;
		}, { passive: false });

		// GUI Initialization
		const gui = new GUI({ title: 'Nature Canvas Settings' });

		const generalFolder = gui.addFolder('General');
		generalFolder.add(settings, 'greenscreen').name('Green Screen');
		const dprCtrl = generalFolder.add(settings, 'dpr', 0.5, 3, 0.1).name('Pixel Ratio (DPR)').onChange(v => {
			renderer.updateSize();
			settings.height.start = (window.innerHeight * v) / 4.0;
			settings.lineWidth.start = 12 * v;
			updateGuiDisplay();
		});

		const colorFolder = gui.addFolder('Colors');
		const schemeController = colorFolder.add(settings, 'colorScheme', Object.keys(colorSchemes)).name('Preset Scheme').onChange(v => {
			applyColorScheme();
			updateGuiDisplay();
		});

		const hueStartCtrl = colorFolder.add(settings.color.start, 'h', 0, 360, 1).name('Start Hue').listen();
		const satStartCtrl = colorFolder.add(settings.color.start, 's', 0, 100, 1).name('Start Sat %').listen();
		const lightStartCtrl = colorFolder.add(settings.color.start, 'l', 0, 100, 1).name('Start Light %').listen();

		const hueDeltaCtrl = colorFolder.add(settings.color.delta, 'h', -20, 20, 1).name('Delta Hue').listen();
		const satDeltaCtrl = colorFolder.add(settings.color.delta, 's', -10, 10, 0.1).name('Delta Sat %').listen();
		const lightDeltaCtrl = colorFolder.add(settings.color.delta, 'l', -10, 10, 0.1).name('Delta Light %').listen();

		const markCustomColor = () => {
			settings.colorScheme = 'Custom';
			schemeController.updateDisplay();
		};
		hueStartCtrl.onChange(markCustomColor);
		satStartCtrl.onChange(markCustomColor);
		lightStartCtrl.onChange(markCustomColor);
		hueDeltaCtrl.onChange(markCustomColor);
		satDeltaCtrl.onChange(markCustomColor);
		lightDeltaCtrl.onChange(markCustomColor);

		const structureFolder = gui.addFolder('Structure');
		const levelsCtrl = structureFolder.add(settings, 'levels', 1, 7, 1).name('Branch Levels');
		const heightStartCtrl = structureFolder.add(settings.height, 'start', 50, 600, 1).name('Trunk Height');
		const heightMultCtrl = structureFolder.add(settings.height, 'multiplier', 0.5, 1.2, 0.01).name('Height Mult');
		const widthStartCtrl = structureFolder.add(settings.lineWidth, 'start', 1, 40, 0.5).name('Trunk Width');
		const widthMultCtrl = structureFolder.add(settings.lineWidth, 'multiplier', 0.5, 1.0, 0.01).name('Width Mult');
		const angleDeltaCtrl = structureFolder.add(settings.angle, 'delta', 0, 45, 0.5).name('Branch Angle');

		const leavesFolder = gui.addFolder('Leaves');
		const leavesCountCtrl = leavesFolder.add(settings.leaves, 'count', 1, 10, 1).name('Count');
		const leavesRangeCtrl = leavesFolder.add(settings.leaves, 'range', 10, 120, 1).name('Range (Angle)');
		const leavesWidthCtrl = leavesFolder.add(settings.leaves, 'widthRatio', 0.05, 0.6, 0.01).name('Width Ratio');

		const animFolder = gui.addFolder('Animation');
		const autoGrowthCtrl = animFolder.add(settings, 'autoGrowth').name('Auto Growth').onChange(v => {
			if (v) {
				startGrowthAnimation();
			} else {
				if (growthTimeline) growthTimeline.kill();
				settings.growth = 1.0;
				settings.opacity = 1.0;
				updateGuiDisplay();
			}
		});

		const growthCtrl = animFolder.add(settings, 'growth', 0, 1, 0.01).name('Manual Growth').listen().onChange(v => {
			if (settings.autoGrowth) {
				settings.autoGrowth = false;
				autoGrowthCtrl.updateDisplay();
				if (growthTimeline) growthTimeline.kill();
			}
		});

		const speedCtrl = animFolder.add(settings, 'animationSpeed', 0.1, 3, 0.1).name('Speed').onChange(() => {
			if (settings.autoGrowth) {
				// restart animation with new speed
				startGrowthAnimation();
			}
		});

		animFolder.add(settings, 'cameraAnimation', ['Gentle Sway', 'Slow Orbit', 'Breathe', 'Cinematic Pan', 'Static']).name('Camera Move');

		// Exposing GSAP Easing Settings
		const eases = [
			'power2.out',
			'power4.out',
			'back.out(1.5)',
			'elastic.out(1, 0.75)',
			'bounce.out',
			'none'
		];
		animFolder.add(settings, 'growthEase', eases).name('Ease Function').onChange(() => {
			if (settings.autoGrowth) startGrowthAnimation();
		});
		animFolder.add(settings, 'growthDuration', 0.5, 10, 0.1).name('Grow Duration (s)').onChange(() => {
			if (settings.autoGrowth) startGrowthAnimation();
		});
		animFolder.add(settings, 'stayDuration', 0, 10, 0.1).name('Stay Duration (s)').onChange(() => {
			if (settings.autoGrowth) startGrowthAnimation();
		});
		animFolder.add(settings, 'fadeDuration', 0.1, 5, 0.1).name('Fade Duration (s)').onChange(() => {
			if (settings.autoGrowth) startGrowthAnimation();
		});

		const actionsFolder = gui.addFolder('Actions');
		actionsFolder.add({
			resetView: () => {
				scale = 1.0;
				translateX = 0;
				translateY = 0;
			}
		}, 'resetView').name('Reset View');

		actionsFolder.add({
			regenerate: () => {
				randomizeTreeSettings();
				updateGuiDisplay();
				startGrowthAnimation();
			}
		}, 'regenerate').name('Grow New Tree');

		function updateGuiDisplay() {
			levelsCtrl.updateDisplay();
			heightStartCtrl.updateDisplay();
			heightMultCtrl.updateDisplay();
			widthStartCtrl.updateDisplay();
			widthMultCtrl.updateDisplay();
			angleDeltaCtrl.updateDisplay();
			leavesCountCtrl.updateDisplay();
			leavesRangeCtrl.updateDisplay();
			leavesWidthCtrl.updateDisplay();
			schemeController.updateDisplay();
			hueStartCtrl.updateDisplay();
			satStartCtrl.updateDisplay();
			lightStartCtrl.updateDisplay();
			hueDeltaCtrl.updateDisplay();
			satDeltaCtrl.updateDisplay();
			lightDeltaCtrl.updateDisplay();
			growthCtrl.updateDisplay();
			dprCtrl.updateDisplay();
		}

		// Keyboard event for hiding GUI
		let guiVisible = true;
		window.addEventListener('keydown', (e) => {
			if (e.key === 'h' || e.key === 'H') {
				guiVisible = !guiVisible;
				if (guiVisible) {
					gui.show();
				} else {
					gui.hide();
				}
			}
		});

		window.addEventListener('resize', () => {
			renderer.updateSize();
			settings.height.start = (window.innerHeight * settings.dpr) / 4.0;
			settings.lineWidth.start = 12 * settings.dpr;
			updateGuiDisplay();
		});

		// Trigger initial animation loop
		startGrowthAnimation();

		// Start rendering loop
		function animate(now) {
			requestAnimationFrame(animate);

			if (!lastTime) lastTime = now;
			const delta = (now - lastTime) / 1000;
			lastTime = now;

			const speed = settings.animationSpeed;
			time += delta * speed;

			// Camera animations offsets
			let baseTranslateX = 0;
			let baseTranslateY = 0;
			let baseScale = 1.0;
			let baseAngle = 0;

			switch (settings.cameraAnimation) {
				case 'Gentle Sway':
					baseTranslateX = Math.sin(time * 0.8) * 30 * settings.dpr;
					baseTranslateY = Math.cos(time * 0.5) * 15 * settings.dpr;
					baseAngle = Math.sin(time * 0.3) * 0.02; 
					break;
				case 'Slow Orbit':
					baseAngle = time * 0.05; 
					break;
				case 'Breathe':
					baseScale = 1.0 + Math.sin(time * 0.6) * 0.1;
					break;
				case 'Cinematic Pan':
					baseTranslateX = Math.sin(time * 0.4) * 60 * settings.dpr;
					baseTranslateY = (Math.sin(time * 0.2) * 40 - 20) * settings.dpr;
					break;
				case 'Static':
				default:
					break;
			}

			renderer.render(baseTranslateX, baseTranslateY, baseScale, baseAngle, settings.opacity);
		}

		requestAnimationFrame(animate);
	</script>
</body>
</html>
