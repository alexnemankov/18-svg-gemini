<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Grid</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #080710;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <canvas id="kineticCanvas"></canvas>

    <script type="module">
        import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

        const canvas = document.getElementById('kineticCanvas');
        const ctx = canvas.getContext('2d');

        // Presets configuration
        const presets = {
            "Classic Indigo": {
                background: "#080710",
                dotColor: "#ffffff",
                lineColor: "#2563eb",
                trailColor: "#60a5fa",
                spacing: 35,
                radius: 350,
                strength: 5,
                trail: true
            },
            "Cyberpunk Glow": {
                background: "#0d021a",
                dotColor: "#00ffff",
                lineColor: "#ff007f",
                trailColor: "#00ff88",
                spacing: 30,
                radius: 400,
                strength: 6,
                trail: true
            },
            "Emerald Forest": {
                background: "#03140a",
                dotColor: "#e6fcf5",
                lineColor: "#0ca678",
                trailColor: "#20c997",
                spacing: 40,
                radius: 300,
                strength: 4,
                trail: true
            },
            "Solar Flare": {
                background: "#140505",
                dotColor: "#ffec99",
                lineColor: "#f76707",
                trailColor: "#ff922b",
                spacing: 35,
                radius: 380,
                strength: 5,
                trail: true
            },
            "Obsidian Minimal": {
                background: "#121212",
                dotColor: "#ffffff",
                lineColor: "#424242",
                trailColor: "#e0e0e0",
                spacing: 45,
                radius: 250,
                strength: 4,
                trail: true
            }
        };

        // Settings object
        const settings = {
            preset: "Classic Indigo",
            background: "#080710",
            dotColor: "#ffffff",
            lineColor: "#2563eb",
            trailColor: "#60a5fa",
            greenscreen: false,
            
            spacing: 35,
            radius: 350,
            strength: 5,
            trail: true,
            
            animationSpeed: 1.0,
            animationType: "Kinetic Vortex",
            
            dpr: window.devicePixelRatio || 1,
            
            // View space settings
            offsetX: 0,
            offsetY: 0,
            scale: 1.0,
            
            resetView: () => {
                settings.offsetX = 0;
                settings.offsetY = 0;
                settings.scale = 1.0;
            }
        };

        // Physics variables
        let W = window.innerWidth;
        let H = window.innerHeight;
        let cols = [];
        let dots = [];

        // Mouse tracking
        const mouseRef = { x: -9999, y: -9999, active: false };
        const trailRef = [];
        let currentClientX = -9999;
        let currentClientY = -9999;

        // View coordinate helpers
        const getGridCoords = (clientX, clientY) => {
            const rect = canvas.getBoundingClientRect();
            const screenX = clientX - rect.left;
            const screenY = clientY - rect.top;
            const worldX = (screenX - settings.offsetX) / settings.scale;
            const worldY = (screenY - settings.offsetY) / settings.scale;
            return { x: worldX, y: worldY };
        };

        const setMouse = (clientX, clientY) => {
            currentClientX = clientX;
            currentClientY = clientY;
            const coords = getGridCoords(clientX, clientY);
            mouseRef.x = coords.x;
            mouseRef.y = coords.y;
            mouseRef.active = true;

            const now = performance.now();
            if (trailRef.length === 0 || Math.hypot(coords.x - trailRef[trailRef.length - 1].x, coords.y - trailRef[trailRef.length - 1].y) > 2) {
                trailRef.push({ x: coords.x, y: coords.y, t: now });
                if (trailRef.length > 80) trailRef.shift();
            }
        };

        // Grid build function
        const build = () => {
            W = window.innerWidth;
            H = window.innerHeight;
            
            const dpr = settings.dpr;
            canvas.width = Math.floor(W * dpr);
            canvas.height = Math.floor(H * dpr);
            canvas.style.width = W + "px";
            canvas.style.height = H + "px";
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            const GAP = Math.max(8, settings.spacing);
            
            // Generate a larger grid centered around the screen center to allow panning/zooming without edges
            const gridWidth = 4000;
            const gridHeight = 4000;
            const startX = W / 2 - gridWidth / 2;
            const startY = H / 2 - gridHeight / 2;

            cols = [];
            dots = [];
            const nCols = Math.floor(gridWidth / GAP) + 1;
            const nRows = Math.floor(gridHeight / GAP) + 1;

            for (let c = 0; c < nCols; c++) {
                const col = [];
                for (let rIdx = 0; rIdx < nRows; rIdx++) {
                    const hx = startX + c * GAP;
                    const hy = startY + rIdx * GAP;
                    const d = { hx, hy, x: hx, y: hy, vx: 0, vy: 0 };
                    col.push(d);
                    dots.push(d);
                }
                cols.push(col);
            }
        };

        // Interactive mouse & touch event listeners
        const onMove = (e) => {
            setMouse(e.clientX, e.clientY);
        };

        const onLeave = () => {
            mouseRef.active = false;
            mouseRef.x = -9999;
            mouseRef.y = -9999;
        };

        const onTouchMove = (e) => {
            const t = e.touches[0];
            if (t) setMouse(t.clientX, t.clientY);
        };

        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('mouseleave', onLeave);
        canvas.addEventListener('touchmove', onTouchMove, { passive: true });
        canvas.addEventListener('touchend', onLeave);

        // Zoom with wheel
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = 1.08;
            const direction = e.deltaY < 0 ? 1 : -1;
            const factor = direction > 0 ? zoomFactor : 1 / zoomFactor;

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const nextScale = Math.min(Math.max(settings.scale * factor, 0.15), 8.0);
            const actualFactor = nextScale / settings.scale;

            settings.offsetX = mouseX - (mouseX - settings.offsetX) * actualFactor;
            settings.offsetY = mouseY - (mouseY - settings.offsetY) * actualFactor;
            settings.scale = nextScale;
        }, { passive: false });

        // Drag grid across screen
        let isDragging = false;
        let startX = 0;
        let startY = 0;

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - settings.offsetX;
            startY = e.clientY - settings.offsetY;
            canvas.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                settings.offsetX = e.clientX - startX;
                settings.offsetY = e.clientY - startY;
                // update mouse coords relative to panned screen coordinates
                if (mouseRef.active) {
                    setMouse(e.clientX, e.clientY);
                }
            }
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                canvas.style.cursor = 'crosshair';
            }
        });

        // Touch support for dragging
        let lastTouchX = 0;
        let lastTouchY = 0;
        canvas.addEventListener('touchstart', (e) => {
            const t = e.touches[0];
            if (t && e.touches.length === 1) {
                isDragging = true;
                lastTouchX = t.clientX;
                lastTouchY = t.clientY;
            }
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            const t = e.touches[0];
            if (isDragging && t && e.touches.length === 1) {
                const dx = t.clientX - lastTouchX;
                const dy = t.clientY - lastTouchY;
                settings.offsetX += dx;
                settings.offsetY += dy;
                lastTouchX = t.clientX;
                lastTouchY = t.clientY;
            }
        }, { passive: true });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        // ResizeObserver
        const ro = new ResizeObserver(() => {
            build();
        });
        ro.observe(document.body);

        // GUI creation
        const gui = new GUI({ title: 'Grid Settings' });
        const controllers = {};

        // Helper to update colors & parameters from preset
        const applyPreset = (presetName) => {
            const pr = presets[presetName];
            if (!pr) return;
            for (const key in pr) {
                if (controllers[key]) {
                    controllers[key].setValue(pr[key]);
                } else {
                    settings[key] = pr[key];
                }
            }
            build();
        };

        controllers.preset = gui.add(settings, 'preset', Object.keys(presets)).name('Color Scheme').onChange(applyPreset);
        
        const colorsFolder = gui.addFolder('Colors');
        controllers.background = colorsFolder.addColor(settings, 'background').name('Background').onChange(() => {
            if (!settings.greenscreen) {
                document.body.style.backgroundColor = settings.background;
            }
        });
        controllers.dotColor = colorsFolder.addColor(settings, 'dotColor').name('Dots');
        controllers.lineColor = colorsFolder.addColor(settings, 'lineColor').name('Lines');
        controllers.trailColor = colorsFolder.addColor(settings, 'trailColor').name('Trail Color');
        
        controllers.greenscreen = gui.add(settings, 'greenscreen').name('Greenscreen (#00ff00)').onChange((val) => {
            document.body.style.backgroundColor = val ? "#00ff00" : settings.background;
        });

        const gridFolder = gui.addFolder('Grid Physics');
        controllers.spacing = gridFolder.add(settings, 'spacing', 15, 100, 1).name('Spacing').onChange(build);
        controllers.radius = gridFolder.add(settings, 'radius', 100, 1000, 10).name('Attract Radius');
        controllers.strength = gridFolder.add(settings, 'strength', 1, 10, 0.5).name('Strength');
        controllers.trail = gridFolder.add(settings, 'trail').name('Cursor Trail');

        const animFolder = gui.addFolder('Animation');
        controllers.animationSpeed = animFolder.add(settings, 'animationSpeed', 0, 3, 0.1).name('Speed');
        controllers.animationType = animFolder.add(settings, 'animationType', [
            'Static',
            'Gentle Drift',
            'Kinetic Vortex',
            'Cosmic Wave',
            'Grid Pulse'
        ]).name('Pattern');

        const viewFolder = gui.addFolder('DPR & Camera');
        controllers.dpr = viewFolder.add(settings, 'dpr', 0.5, 3.0, 0.1).name('Pixel Ratio').onChange(build);
        viewFolder.add(settings, 'resetView').name('Reset Camera');

        // Close folders by default to keep clean layout
        colorsFolder.close();
        gridFolder.close();
        animFolder.close();
        viewFolder.close();

        // Keyboard Shortcut to toggle GUI
        window.addEventListener('keydown', (e) => {
            if (e.key === 'h' || e.key === 'H') {
                if (gui._hidden) {
                    gui.show();
                } else {
                    gui.hide();
                }
            }
        });

        // Initialize grid
        build();

        // Physics & Animation loop
        let time = 0;
        let lastTime = performance.now();

        const frame = () => {
            requestAnimationFrame(frame);

            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            const stepSpeed = settings.animationSpeed;
            time += dt * stepSpeed;

            // Clear screen
            ctx.fillStyle = settings.greenscreen ? "#00ff00" : settings.background;
            ctx.fillRect(0, 0, W, H);

            // Attractor physics variables
            const centerX = W / 2;
            const centerY = H / 2;
            let autoAttractorX = -9999;
            let autoAttractorY = -9999;
            let autoAttractorActive = false;

            // Apply selected animation pattern and camera modifiers
            let animOffsetX = 0;
            let animOffsetY = 0;
            let animScale = 1.0;

            switch (settings.animationType) {
                case 'Gentle Drift':
                    animOffsetX = Math.sin(time * 0.5) * 60;
                    animOffsetY = Math.cos(time * 0.4) * 60;
                    break;
                case 'Kinetic Vortex':
                    autoAttractorActive = true;
                    // Orbit in a figure-8
                    autoAttractorX = centerX + Math.sin(time * 0.6) * (W * 0.35);
                    autoAttractorY = centerY + Math.sin(time * 1.2) * (H * 0.2);
                    break;
                case 'Cosmic Wave':
                    animOffsetX = Math.sin(time * 0.4) * 40;
                    animOffsetY = Math.cos(time * 0.3) * 40;
                    animScale = 1.0 + Math.sin(time * 0.2) * 0.15;
                    autoAttractorActive = true;
                    autoAttractorX = centerX + Math.sin(time * 0.5) * (W * 0.25);
                    autoAttractorY = centerY + Math.cos(time * 0.7) * (H * 0.15);
                    break;
                case 'Grid Pulse':
                    animScale = 1.0 + Math.sin(time * 0.35) * 0.12;
                    autoAttractorActive = true;
                    autoAttractorX = centerX + Math.cos(time * 0.4) * (W * 0.3);
                    autoAttractorY = centerY + Math.sin(time * 0.4) * (H * 0.3);
                    break;
                case 'Static':
                default:
                    // No automatic movement
                    break;
            }

            // Calculate final composite camera transform, centering scale at (W/2, H/2)
            const currentScale = settings.scale * animScale;
            const currentOffsetX = settings.offsetX * animScale + (W / 2) * (1 - animScale) + animOffsetX;
            const currentOffsetY = settings.offsetY * animScale + (H / 2) * (1 - animScale) + animOffsetY;

            // Update mouse tracking positions dynamically if viewport offsets shift
            if (mouseRef.active) {
                const coords = getGridCoords(currentClientX, currentClientY);
                mouseRef.x = coords.x;
                mouseRef.y = coords.y;
            }

            // List of active attractors
            const attractors = [];
            if (mouseRef.active) {
                attractors.push({ x: mouseRef.x, y: mouseRef.y });
            }
            if (autoAttractorActive) {
                attractors.push({ x: autoAttractorX, y: autoAttractorY });
            }

            // Physics update
            const R = Math.max(1, settings.radius);
            const PULL = (Math.max(1, Math.min(10, settings.strength)) / 10) * 4;

            for (const d of dots) {
                let ax = (d.hx - d.x) * 0.08;
                let ay = (d.hy - d.y) * 0.08;

                for (const attr of attractors) {
                    const dx = attr.x - d.x;
                    const dy = attr.y - d.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < R && dist > 0.001) {
                        const f = (1 - dist / R) * PULL;
                        ax += (dx / dist) * f;
                        ay += (dy / dist) * f;
                    }
                }

                d.vx = (d.vx + ax * stepSpeed) * Math.pow(0.82, stepSpeed);
                d.vy = (d.vy + ay * stepSpeed) * Math.pow(0.82, stepSpeed);
                d.x += d.vx * stepSpeed;
                d.y += d.vy * stepSpeed;
            }

            // Apply camera transform to canvas context
            ctx.save();
            ctx.translate(currentOffsetX, currentOffsetY);
            ctx.scale(currentScale, currentScale);

            // Compute visibility bounds in world space
            const left = -currentOffsetX / currentScale;
            const top = -currentOffsetY / currentScale;
            const right = (W - currentOffsetX) / currentScale;
            const bottom = (H - currentOffsetY) / currentScale;
            const margin = settings.spacing * 2.0;

            const isVisible = (x, y) => {
                return x >= left - margin && x <= right + margin && y >= top - margin && y <= bottom + margin;
            };

            // Draw grid mesh lines
            ctx.strokeStyle = settings.lineColor;
            for (let c = 0; c < cols.length; c++) {
                for (let rIdx = 0; rIdx < cols[c].length; rIdx++) {
                    const d = cols[c][rIdx];
                    const rightNeighbor = cols[c + 1]?.[rIdx];
                    const downNeighbor = cols[c]?.[rIdx + 1];

                    // Draw line only if it is visible
                    const dVisible = isVisible(d.x, d.y);
                    
                    if (rightNeighbor && (dVisible || isVisible(rightNeighbor.x, rightNeighbor.y))) {
                        let maxProx = 0;
                        for (const attr of attractors) {
                            const dist = Math.sqrt((attr.x - d.x) ** 2 + (attr.y - d.y) ** 2);
                            const p = Math.max(0, 1 - dist / R);
                            if (p > maxProx) maxProx = p;
                        }
                        ctx.globalAlpha = 0.06 + maxProx * 0.7;
                        ctx.lineWidth = 0.5 + maxProx * 1.5;
                        ctx.beginPath();
                        ctx.moveTo(d.x, d.y);
                        ctx.lineTo(rightNeighbor.x, rightNeighbor.y);
                        ctx.stroke();
                    }

                    if (downNeighbor && (dVisible || isVisible(downNeighbor.x, downNeighbor.y))) {
                        let maxProx = 0;
                        for (const attr of attractors) {
                            const dist = Math.sqrt((attr.x - d.x) ** 2 + (attr.y - d.y) ** 2);
                            const p = Math.max(0, 1 - dist / R);
                            if (p > maxProx) maxProx = p;
                        }
                        ctx.globalAlpha = 0.06 + maxProx * 0.7;
                        ctx.lineWidth = 0.5 + maxProx * 1.5;
                        ctx.beginPath();
                        ctx.moveTo(d.x, d.y);
                        ctx.lineTo(downNeighbor.x, downNeighbor.y);
                        ctx.stroke();
                    }
                }
            }

            // Draw dots
            ctx.fillStyle = settings.dotColor;
            for (const d of dots) {
                if (isVisible(d.x, d.y)) {
                    let maxProx = 0;
                    for (const attr of attractors) {
                        const dist = Math.sqrt((attr.x - d.x) ** 2 + (attr.y - d.y) ** 2);
                        const p = Math.max(0, 1 - dist / R);
                        if (p > maxProx) maxProx = p;
                    }
                    ctx.globalAlpha = 0.22 + maxProx * 0.78;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, 0.8 + maxProx * 2.2, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }

            // Draw cursor trail line (in world coordinates)
            if (settings.trail) {
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.strokeStyle = settings.trailColor;
                ctx.lineWidth = 2.0;
                for (let i = 1; i < trailRef.length; i++) {
                    const a = trailRef[i - 1];
                    const b = trailRef[i];
                    const age = (now - b.t) * (1 / Math.max(0.001, stepSpeed));
                    if (age > 260) continue;
                    ctx.globalAlpha = Math.max(0, 1 - age / 260) * 0.85;
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }

            ctx.restore();
        };

        requestAnimationFrame(frame);
    </script>
</body>
</html>
