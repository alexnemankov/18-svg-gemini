<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Volumetric Fractal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
    <!-- Import maps for Three.js and lil-gui -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        //Support me by PayPal: https://paypal.com/paypalme/sabosugi
        import * as THREE from 'three';
        import GUI from 'lil-gui';

        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
        // We do not apply outputColorSpace conversions since the shader handles its own ACES filmic grading
        renderer.setPixelRatio(0.7); 

        const scene = new THREE.Scene();
        // A simple orthographic camera to render the fullscreen quad
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const geometry = new THREE.PlaneGeometry(2, 2);

        const vertexShader = `
            in vec3 position;
            void main() {
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            precision highp float;
            
            // System uniforms
            uniform vec3 iResolution;
            uniform float iTime;
            
            // Dynamic GUI settings
            uniform int u_renderPasses;
            uniform float u_sceneTimeScale;
            uniform float u_grainIntensity;
            uniform float u_globalLuminance;
            uniform float u_stepPrecision;
            uniform float u_rayIterations;
            uniform float u_surfaceSolidity;
            
            // Camera uniforms
            uniform float u_camPosX;
            uniform float u_camPosY;
            uniform float u_camPitch;
            uniform float u_camFov;
            uniform float u_camShiftX;
            uniform float u_camShiftY;

            // Custom settings
            uniform float u_greenScreen;
            uniform vec3 u_color1;
            uniform vec3 u_color2;

            out vec4 outColor;

            // 2D Rotation matrix generator
            mat2 calcRotation(float theta) {
                float sine = sin(theta);
                float cosine = cos(theta);
                return mat2(cosine, -sine, sine, cosine);
            }

            // Custom filmic tone mapping curve (ACES variant)
            vec3 applyCinematicGrade(vec3 rawColor) {
                mat3 colorSpaceA = mat3(
                    0.59719, 0.07600, 0.02840, 
                    0.35458, 0.90834, 0.13383, 
                    0.04823, 0.01566, 0.83777
                );
                mat3 colorSpaceB = mat3(
                    1.60475, -0.10208, -0.00327, 
                    -0.53108, 1.10813, -0.07276, 
                    -0.07367, -0.00605, 1.07602
                );
                
                vec3 graded = colorSpaceA * rawColor;
                vec3 numerator = graded * (graded + 0.0945786) - 0.000090537;
                vec3 denominator = graded * (0.783729 * graded + 0.4329510) + 0.238081;
                
                return colorSpaceB * (numerator / denominator);
            }

            // Generates the primary volume density
            float computeStructuralDensity(vec3 pos) {
                const float phaseShift = 0.228033988;
                const mat3 structuralBasis = mat3(
                    0.388535087,  0.054921382, -0.743402928,
                    0.441955127,  4.336973341,  0.258518454,
                    0.272087367,  0.174042493, -0.021246185
                );
                return dot(cos(structuralBasis * pos), sin(phaseShift * pos * structuralBasis));
            }

            // Precision-safe noise function for Retina displays
            float getFilmGrain(vec3 seed3D) {
                seed3D = fract(seed3D * 0.1031);
                seed3D += dot(seed3D, seed3D.zyx + 31.32);
                return fract((seed3D.x + seed3D.y) * seed3D.z);
            }

            void mainImage(out vec4 fragColor, in vec2 fragCoord) {
                vec3 finalImage = vec3(0.0);
                float accumulatedAlpha = 0.0;
                float globalTime = iTime * u_sceneTimeScale;
                
                // Max limits hardcoded for WebGL compatibility, loops broken early dynamically
                for(int passX = 0; passX < 4; passX++) {
                    if (passX >= u_renderPasses) break;
                    
                    for(int passY = 0; passY < 4; passY++) {
                        if (passY >= u_renderPasses) break;
                        
                        vec2 pixelOffset = (vec2(float(passX), float(passY)) + 0.5) / float(u_renderPasses) - 0.5;
                        vec2 uv = fragCoord + pixelOffset; 
                        
                        vec3 rayOrigin = vec3(u_camPosX, u_camPosY, globalTime); 
                        vec3 lightAccumulator = vec3(0.0);
                        float totalDensity = 0.0;
                        
                        vec3 viewDir = normalize(vec3(u_camFov * uv - iResolution.xy * vec2(u_camShiftX, u_camShiftY), iResolution.y));
                        viewDir.yz = calcRotation(u_camPitch) * viewDir.yz; 
                        
                        float stepDistance;
                        
                        for(float iter = 0.0; iter < 100.0; iter += 1.0) {
                            if (iter >= u_rayIterations) break;

                            vec3 samplePos = rayOrigin;
                            
                            float detailNoise = computeStructuralDensity(samplePos * 20.0) / 20.0;
                            float baseNoise = computeStructuralDensity(samplePos);
                            
                            stepDistance = 0.005 + abs(detailNoise - baseNoise) * 0.7;
                            
                            float heightMod = sin(samplePos.z * 2.0 + abs(samplePos.x) * 0.5) * 0.5;
                            stepDistance += abs(rayOrigin.y + heightMod) * 0.4;
                            
                            float safeStep = stepDistance * u_stepPrecision;
                            rayOrigin += viewDir * safeStep;
                            
                            float colorPhase = (iter * u_stepPrecision) - 0.4;
                            float wavePhase = colorPhase + length(rayOrigin.xz * 0.1) + 2.0;
                            
                            float blend = 0.5 + 0.5 * sin(wavePhase);
                            vec3 spectralGlow = mix(u_color1, u_color2, blend) * 2.5;
                            
                            float rawDensity = 1.0 / stepDistance;
                            float sharpDensity = pow(rawDensity, u_surfaceSolidity) * 0.15; 
                            
                            lightAccumulator += (spectralGlow * sharpDensity) * u_stepPrecision;
                            totalDensity += sharpDensity * u_stepPrecision;
                        }
                        
                        lightAccumulator *= u_globalLuminance;
                        finalImage += applyCinematicGrade(lightAccumulator * lightAccumulator / 1000.0);
                        
                        float passAlpha = 1.0 - exp(-totalDensity * 0.05);
                        accumulatedAlpha += passAlpha;
                    }
                }
                
                // Normalizing brightness and alpha based on the number of anti-aliasing passes
                finalImage *= (4.0 / float(u_renderPasses * u_renderPasses));
                accumulatedAlpha /= float(u_renderPasses * u_renderPasses);

                finalImage = (finalImage - 0.5) * 0.5 + 0.5;
                finalImage *= 0.3;
                
                float grainValue = getFilmGrain(vec3(fragCoord, iTime));
                finalImage += (grainValue - 0.5) * u_grainIntensity;
                
                // Greenscreen compositing: if enabled, blend with pure #00ff00 green
                if (u_greenScreen > 0.5) {
                    float alpha = clamp(accumulatedAlpha, 0.0, 1.0);
                    finalImage = mix(vec3(0.0, 1.0, 0.0), finalImage, alpha);
                }
                
                fragColor = vec4(finalImage, 1.0);
            }

            void main() {
                mainImage(outColor, gl_FragCoord.xy);
            }
        `;

        // Default parameters mirroring your provided code
        const params = {
            dpr: 0.7,
            passes: 2,
            speed: 1.0,
            grain: 0.04,
            luminance: 5.1,
            precision: 0.5,
            iterations: 28.6,
            solidity: 1.1,
            camX: 2.8,
            camY: -1.0,
            camPitch: -0.38,
            camFov: 2.5,
            camShiftX: 1.0,
            camShiftY: 1.0,
            
            // Custom additions
            greenScreen: false,
            color1: '#ff007f',
            color2: '#00f0ff',
            colorPreset: 'Cosmic Neon',
            animationType: 'Nebula Drift'
        };

        const material = new THREE.RawShaderMaterial({
            glslVersion: THREE.GLSL3,
            vertexShader,
            fragmentShader,
            uniforms: {
                iResolution: { value: new THREE.Vector3() },
                iTime: { value: 0.0 },
                u_renderPasses: { value: params.passes },
                u_sceneTimeScale: { value: params.speed },
                u_grainIntensity: { value: params.grain },
                u_globalLuminance: { value: params.luminance },
                u_stepPrecision: { value: params.precision },
                u_rayIterations: { value: params.iterations },
                u_surfaceSolidity: { value: params.solidity },
                u_camPosX: { value: params.camX },
                u_camPosY: { value: params.camY },
                u_camPitch: { value: params.camPitch },
                u_camFov: { value: params.camFov },
                u_camShiftX: { value: params.camShiftX },
                u_camShiftY: { value: params.camShiftY },
                u_greenScreen: { value: params.greenScreen ? 1.0 : 0.0 },
                u_color1: { value: new THREE.Color(params.color1) },
                u_color2: { value: new THREE.Color(params.color2) }
            }
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const gui = new GUI({ title: 'Scene Settings' });

        const updateDPR = () => {
            renderer.setPixelRatio(params.dpr);
            resize(); // Force resolution uniform update
        };

        // System Settings
        gui.add(params, 'greenScreen').name('Green Screen (#00ff00)').onChange(v => {
            material.uniforms.u_greenScreen.value = v ? 1.0 : 0.0;
        });
        gui.add(params, 'dpr', [0.5, 0.7, 1, 2]).name('DPR (Pixel Ratio)').onChange(updateDPR);
        
        // Preset Color Schemes
        const colorPresets = {
            'Cosmic Neon': { c1: '#ff007f', c2: '#00f0ff' },
            'Solar Flare': { c1: '#ff4500', c2: '#ffd700' },
            'Aurora Borealis': { c1: '#00ff88', c2: '#7b1fa2' },
            'Deep Ocean': { c1: '#0d47a1', c2: '#00e5ff' },
            'Cyberpunk': { c1: '#8a2be2', c2: '#ff8c00' }
        };

        const folderColors = gui.addFolder('Colors');
        folderColors.addColor(params, 'color1').name('Color 1').onChange(v => material.uniforms.u_color1.value.set(v));
        folderColors.addColor(params, 'color2').name('Color 2').onChange(v => material.uniforms.u_color2.value.set(v));
        folderColors.add(params, 'colorPreset', Object.keys(colorPresets)).name('Preset Scheme').onChange(v => {
            const preset = colorPresets[v];
            params.color1 = preset.c1;
            params.color2 = preset.c2;
            material.uniforms.u_color1.value.set(preset.c1);
            material.uniforms.u_color2.value.set(preset.c2);
            updateGUIDisplay();
        });

        const folderVisuals = gui.addFolder('Light & Visuals');
        folderVisuals.add(params, 'luminance', 0.1, 15.0).name('Global Luminance').onChange(v => material.uniforms.u_globalLuminance.value = v);
        folderVisuals.add(params, 'grain', 0.0, 0.2).name('Cinematic Grain').onChange(v => material.uniforms.u_grainIntensity.value = v);
        
        const folderFractal = gui.addFolder('Fractal Engine');
        folderFractal.add(params, 'solidity', 0.5, 3.0).name('Surface Solidity').onChange(v => {
            params.solidity = v;
            material.uniforms.u_surfaceSolidity.value = v;
        });
        folderFractal.add(params, 'precision', 0.1, 1.0).name('Step Precision').onChange(v => material.uniforms.u_stepPrecision.value = v);
        folderFractal.add(params, 'iterations', 10, 80).name('Ray Iterations').onChange(v => material.uniforms.u_rayIterations.value = v);
        
        const folderRender = gui.addFolder('Performance & Time');
        folderRender.add(params, 'passes', 1, 4, 1).name('AA Render Passes').onChange(v => material.uniforms.u_renderPasses.value = v);
        folderRender.add(params, 'speed', 0.0, 5.0).name('Time Scale').onChange(v => material.uniforms.u_sceneTimeScale.value = v);
        
        // 5 Preset animations
        const animationPresets = [
            'Nebula Drift',
            'Cosmic Carousel',
            'Deep Breath',
            'Cinematic Pan',
            'Ethereal Waves'
        ];
        folderRender.add(params, 'animationType', animationPresets).name('Animation Preset');
        
        const folderCamera = gui.addFolder('Camera Controls');
        folderCamera.add(params, 'camX', -5.0, 10.0).name('Position X').onChange(v => {
            params.camX = v;
            material.uniforms.u_camPosX.value = v;
        });
        folderCamera.add(params, 'camY', -5.0, 5.0).name('Position Y').onChange(v => {
            params.camY = v;
            material.uniforms.u_camPosY.value = v;
        });
        folderCamera.add(params, 'camPitch', -1.5, 1.5).name('Pitch (Tilt)').onChange(v => {
            params.camPitch = v;
            material.uniforms.u_camPitch.value = v;
        });
        folderCamera.add(params, 'camFov', 0.5, 5.0).name('FOV Factor').onChange(v => {
            params.camFov = v;
            material.uniforms.u_camFov.value = v;
        });
        folderCamera.add(params, 'camShiftX', -2.0, 5.0).name('Pan X (Center)').onChange(v => {
            params.camShiftX = v;
            material.uniforms.u_camShiftX.value = v;
        });
        folderCamera.add(params, 'camShiftY', -2.0, 5.0).name('Pan Y (Center)').onChange(v => {
            params.camShiftY = v;
            material.uniforms.u_camShiftY.value = v;
        });

        // Close GUI by default as requested
        gui.close();

        // Recursively updates the display value of all controllers in the GUI
        function updateGUIDisplay() {
            const updateFolder = (f) => {
                f.controllers.forEach(c => c.updateDisplay());
                f.folders.forEach(updateFolder);
            };
            gui.controllers.forEach(c => c.updateDisplay());
            gui.folders.forEach(updateFolder);
        }

        function resize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            
            // Calculate actual physical pixels using DPR
            const dpr = renderer.getPixelRatio();
            material.uniforms.iResolution.value.set(width * dpr, height * dpr, 1.0);
        }

        window.addEventListener('resize', resize);
        resize();

        // Drag interaction to pan camera
        let isDragging = false;
        let previousMouse = { x: 0, y: 0 };

        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('.lil-gui')) return;
            isDragging = true;
            previousMouse.x = e.clientX;
            previousMouse.y = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - previousMouse.x;
            const deltaY = e.clientY - previousMouse.y;

            // Pan velocity relative to camera zoom FOV
            const sens = 0.005 * params.camFov;
            params.camX -= deltaX * sens;
            params.camY += deltaY * sens;

            // Constrain camera position values
            params.camX = Math.max(-10.0, Math.min(15.0, params.camX));
            params.camY = Math.max(-10.0, Math.min(10.0, params.camY));

            material.uniforms.u_camPosX.value = params.camX;
            material.uniforms.u_camPosY.value = params.camY;

            previousMouse.x = e.clientX;
            previousMouse.y = e.clientY;

            updateGUIDisplay();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Wheel interaction to zoom
        window.addEventListener('wheel', (e) => {
            if (e.target.closest('.lil-gui')) return;
            e.preventDefault();

            const zoomSpeed = 0.001;
            params.camFov += e.deltaY * zoomSpeed;
            params.camFov = Math.max(0.2, Math.min(6.0, params.camFov));

            material.uniforms.u_camFov.value = params.camFov;

            updateGUIDisplay();
        }, { passive: false });

        // Show/Hide GUI with key 'H'
        window.addEventListener('keydown', (e) => {
            if (e.key === 'h' || e.key === 'H') {
                if (gui._hidden) {
                    gui.show();
                } else {
                    gui.hide();
                }
            }
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();
            const globalTime = elapsedTime * params.speed;
            
            material.uniforms.iTime.value = elapsedTime;
            material.uniforms.u_sceneTimeScale.value = params.speed;

            // Apply selected camera preset animations
            let activeCamX = params.camX;
            let activeCamY = params.camY;
            let activeCamPitch = params.camPitch;
            let activeCamFov = params.camFov;
            let activeCamShiftX = params.camShiftX;
            let activeCamShiftY = params.camShiftY;
            let activeSolidity = params.solidity;

            if (params.animationType === 'Nebula Drift') {
                activeCamX += Math.sin(globalTime * 0.25) * 0.8;
                activeCamY += Math.cos(globalTime * 0.2) * 0.5;
            } else if (params.animationType === 'Cosmic Carousel') {
                activeCamX += Math.cos(globalTime * 0.3) * 1.8;
                activeCamY += Math.sin(globalTime * 0.3) * 1.8;
            } else if (params.animationType === 'Deep Breath') {
                activeCamFov += Math.sin(globalTime * 0.3) * 0.8;
                activeCamPitch += Math.cos(globalTime * 0.2) * 0.15;
            } else if (params.animationType === 'Cinematic Pan') {
                activeCamShiftX += Math.sin(globalTime * 0.25) * 0.6;
                activeCamShiftY += Math.cos(globalTime * 0.2) * 0.4;
            } else if (params.animationType === 'Ethereal Waves') {
                activeSolidity += Math.sin(globalTime * 0.2) * 0.35;
                activeCamPitch += Math.sin(globalTime * 0.15) * 0.2;
            }

            material.uniforms.u_camPosX.value = activeCamX;
            material.uniforms.u_camPosY.value = activeCamY;
            material.uniforms.u_camPitch.value = activeCamPitch;
            material.uniforms.u_camFov.value = activeCamFov;
            material.uniforms.u_camShiftX.value = activeCamShiftX;
            material.uniforms.u_camShiftY.value = activeCamShiftY;
            material.uniforms.u_surfaceSolidity.value = activeSolidity;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
