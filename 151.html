<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Possibilities and Realms</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #000;
      transition: background-color 0.3s ease;
    }

    #viewport {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform-origin: center center;
      will-change: transform;
    }

    canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 100vw;
      max-height: 100vh;
      cursor: pointer;
    }

    #realm-bg {
      filter: blur(1.5em);
    }

    #possibilities {
      opacity: 0.9;
      mix-blend-mode: difference;
    }

    .with-displacement #possibilities {
      filter: url(#f);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/gh/josephg/noisejs/perlin.js"></script>
</head>
<body>
  <div id="viewport">
    <canvas id="realm-bg"></canvas>
    <canvas id="possibilities"></canvas>
  </div>

  <svg style="position: absolute; width: 0; height: 0; pointer-events: none;">
    <filter id="f" primitiveUnits="objectBoundingBox">
     <feImage result="pict2" xlink:href=""></feImage> 
     <feDisplacementMap scale=".01" xChannelSelector="R" yChannelSelector="R" in2="pict2" in="SourceGraphic"></feDisplacementMap>
    </filter> 
  </svg>

  <script type="module">
    import Color from "https://colorjs.io/dist/color.js";
    import { GUI } from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

    const { random, min, max, cos, PI: π } = Math;
    const query = document.querySelector.bind(document);

    const ColorSchemes = {
      'Nebula Dream': { color1: '#4b0082', color2: '#da70d6' },
      'Solar Flare': { color1: '#ff2e93', color2: '#ffab00' },
      'Emerald Aurora': { color1: '#004e92', color2: '#00f2fe' },
      'Cyberpunk Grid': { color1: '#ff007f', color2: '#00f0ff' },
      'Royal Amethyst': { color1: '#120136', color2: '#9b5de5' }
    };

    const Settings = {
      width: 1200,
      height: 800,
      fps: 240,
      dpr: window.devicePixelRatio || 1,
      speed: 1,
      greenscreen: false,
      blendMode: 'difference',
      colorScheme: 'Nebula Dream',
      color1: '#4b0082',
      color2: '#da70d6',
      animationPreset: 'Floating Drift',
      realm: {
        resolution: 20,
        scale: 10,
        startingHue: 260,
        hueRange: 60
      },
      possibilities: {
        amount: 5,
        delayBetween: 1000,
        gradient: [
          new Color('#4b0082'),
          new Color('#da70d6'),
        ],
        surfaceStyle(color) {
          return color.mix('#fff1', .5)
        },
        horizontalDrift: 3,
        scale: 250,
        shape: 1, // see Shapes below
        baseThickness: 1/600 // relative to width
      },
      displacementEffect: true
    };

    const Shapes = {
      0: 'circle',
      1: 'sun'
    };

    const circle = (ctx, { x, y, width }) => {
      ctx.beginPath();
      ctx.arc(x, y, width / 2, 0, 2 * π);
      return {
        fill(style) {
          ctx.fillStyle = style;
          ctx.fill();
        },
        stroke(style) {
          ctx.strokeStyle = style;
          ctx.stroke();
        }
      }
    };

    const square = (ctx, { x, y, width, height }) => {
      ctx.beginPath();
      ctx.rect(x, y, width, height || width);
      return {
        fill(style) {
          ctx.fillStyle = style;
          ctx.fill();
        },
        stroke(style) {
          ctx.strokeStyle = style;
          ctx.stroke();
        }
      }
    };

    const rotate = (ctx, { origin, angle }) => {
      ctx.translate(origin.x, origin.y);
      ctx.rotate(angle * π / 180);
      ctx.translate(-origin.x, -origin.y);
    };

    const drawSun = (ctx, {
      x: _x,
      y: _y,
      width,
      style,
      strokeStyle,
      angle
    }) => {
      const origin = { x: _x, y: _y };
      const x = _x - width / 2;
      const y = _y - width / 2;
      ctx.lineWidth = 1;
      ctx.save();
      for (let i = 0; i < 3; i++) {
        const initialAngle = i === 0 ? angle : 0;
        rotate(ctx, { angle: initialAngle + 30, origin });
        square(ctx, { x, y, width }).stroke(strokeStyle(style));
        square(ctx, { x, y, width }).fill(style);
      }
      ctx.restore();
    };

    const drawCircle = (ctx, { x, y, width, style, strokeStyle }) => {
      circle(ctx, { x, y, width }).fill(style);
      circle(ctx, { x, y, width }).stroke(strokeStyle(style));
    };

    const interpolateCircular = ({ input, output }) => {
      return output * cos((input) * π - π/2);
    };

    const grid = (resY, resX) => {
      return Array(resY).fill(Array(resX || resY).fill(true));
    };

    const setupCanvas = ({ selector, width, height }) => {
      const canvas = query(selector);
      const dpr = Settings.dpr || window.devicePixelRatio || 1;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return {
        canvas,
        ctx
      }
    };

    const createRealm = (ctx, {
      width,
      height,
      fps,
      resolution,
      scale,
      startingHue,
      hueRange
    }) => {
      const cells = grid(resolution);
      const noiseCoords = { x: 0, y: 0 };
      const frameCountForMaxHueChange = 2000;
      const state = {
        hue: startingHue,
        frame: 0
      };
      let loopInterval;

      const loop = () => {
        ctx.clearRect(0, 0, width, height);
        cells.forEach((row, y) => {
          row.forEach((cell, x) => {
            const depth = noise.simplex2(
              x / scale + noiseCoords.x,
              y / scale + noiseCoords.y
            );
            const hue = state.hue + 100 * depth;
            const alpha = 0.6 + depth;
            const color = `hsla(${hue}, 50%, 50%, ${alpha})`;
            square(ctx, {
              x: width / resolution * x,
              y: height / resolution * y,
              width: width / resolution,
              height: height / resolution,
            }).fill(color);
            noiseCoords.x -= (1/900000) * Settings.speed;
            noiseCoords.y -= (1/300000) * Settings.speed;
          });
        });
        state.frame += Settings.speed;
        state.hue = startingHue + interpolateCircular({
          input: state.frame / frameCountForMaxHueChange / 2,
          output: hueRange,
        });
      };

      return {
        be() {
          loopInterval = setInterval(loop, 1000/fps);
          return this;
        },
        stop() {
          clearInterval(loopInterval);
          return this;
        }
      }
    };

    const createPossibility = (ctx, {
      width,
      height,
      fps,
      gradient: _gradient,
      surfaceStyle,
      horizontalDrift,
      scale,
      shape,
      baseThickness,
      delay
    }) => {
      const [ startColor, endColor ] = _gradient;
      let gradient = startColor.range(endColor, {
        space: "lch",
        outputSpace: "srgb"
      });

      const top = 0;
      const bottom = height;
      const center = width / 2;
      const distance = bottom - top;
      const padding = width / 10;
      const lineWidth = max(1, width * baseThickness);

      let state = {
        shape
      };
      let loopInterval = null;
      let delayTimeout = null;

      const loop = () => {
        const progress = state.y / distance;
        switch (Shapes[state.shape]) {
          case 'sun':
            drawSun(ctx, {
              x: state.x,
              y: state.y,
              width: lineWidth * (progress * (350 * progress/3)) + 1,
              style: gradient(progress),
              strokeStyle: surfaceStyle,
              angle: state.frame / 2
            });
            break;
          case 'circle':
            drawCircle(ctx, {
              x: state.x,
              y: state.y,
              width: lineWidth * (progress * (350 * progress/3)) + 1,
              strokeStyle: surfaceStyle,
              style: gradient(progress)
            });
            break;
        }
        if (state.y < height * 1.33) {
          state.x += noise.simplex2(
            state.x / scale,
            state.y / scale
          ) * horizontalDrift * Settings.speed;
          state.y += (lineWidth / 2) * Settings.speed;
          state.frame += Settings.speed;
        } else {
          state.frame = 0;
          state.y = top + random() * (height / 40);
          state.x = padding + random() * (width - padding * 2);
        }
      };

      const reset = () => {
        noise.seed(random());
        state = {
          x: padding + random() * (width - padding * 2),
          y: top,
          frame: 0,
          shape: state.shape
        };
        ctx.clearRect(0, 0, width, height);
      };

      return {
        emerge() {
          reset();
          delayTimeout = setTimeout(() => {
            loopInterval = setInterval(loop, 1000/fps);
          }, delay);
          return this;
        },
        nextShape() {
          const nextShape = state.shape + 1;
          state.shape = Shapes[nextShape] ? nextShape : 0;
          return this;
        },
        stop() {
          clearInterval(loopInterval);
          clearTimeout(delayTimeout);
          return this;
        },
        updateColors() {
          const [ startColor, endColor ] = Settings.possibilities.gradient;
          gradient = startColor.range(endColor, {
            space: "lch",
            outputSpace: "srgb"
          });
          return this;
        }
      }
    };

    const initRealm = (settings) => {
      const { canvas, ctx } = setupCanvas({
        selector: '#realm-bg',
        width: settings.width,
        height: settings.height,
      });

      const realm = createRealm(ctx, {
        width: settings.width,
        height: settings.height,
        fps: settings.fps,
        ...settings.realm
      });

      return realm.be();
    };

    const initPossibilities = (settings) => {
      const { canvas, ctx } = setupCanvas({
        selector: '#possibilities',
        width: settings.width,
        height: settings.height,
      });

      const possibilities = [];
      for (let i = 0; i < settings.possibilities.amount; i++) {
        const possibility = createPossibility(ctx, {
          width: settings.width,
          height: settings.height,
          fps: settings.fps,
          delay: i * settings.possibilities.delayBetween,
          ...settings.possibilities,
        });
        possibilities.push(possibility);
        possibility.emerge();
      }

      return possibilities;
    };

    const initDisplacementMap = ({ width, height }) => {
      const filterFeImage = query("#f feImage");
      const xlink = "http://www.w3.org/1999/xlink";
      let displacement = 0;
      let speed = 0.1;

      function getXlinkHref() {
        const xmlns = "http://www.w3.org/2000/svg";
        let xlinkHref =
            `data:image/svg+xml;utf8,%3Csvg version='1.1' xmlns='${xmlns}' xmlns:xlink='${xlink}' width='${width}' height='${height}'><defs%3E%3CradialGradient id='rg' r='1' y="0">`;
        for (var i = 0; i < 11; i++) {
          xlinkHref += `%3Cstop 
                    offset='${(i - 2) * 10 + displacement}%25' 
                    stop%2Dcolor='%23${i % 2 == 0 ? "f00" : "000"}'%3E%3C/stop%3E`;
        }

        xlinkHref +=
          `%3C/radialGradient%3E%3C/defs%3E%3Crect width='${width}' height='${height}' fill='url(%23rg)'%3E%3C/rect%3E%3C/svg%3E`;

        return xlinkHref;
      }

      function animateOffset() {
        let xlinkHref = getXlinkHref();
        filterFeImage.setAttributeNS(xlink, "href", xlinkHref);

        if (displacement <= 20) {
          displacement += speed * Settings.speed;
        } else {
          displacement = 0;
        }

        window.requestAnimationFrame(animateOffset);
      }

      window.requestAnimationFrame(animateOffset);
      document.body.classList.add('with-displacement');
      return filterFeImage;
    };

    let scene = null;

    const initScene = () => {
      noise.seed(random());

      if (Settings.displacementEffect) {
        initDisplacementMap(Settings);
      }

      return {
        realm: initRealm(Settings),
        possibilities: initPossibilities(Settings)
      };
    };

    // Zoom and Drag state
    let scale = 1;
    let panX = 0;
    let panY = 0;
    let isDragging = false;
    let dragMoved = false;
    let mouseDownTime = 0;
    let startX = 0;
    let startY = 0;

    // Viewport transform updater
    let animTime = 0;
    function animateViewport() {
      animTime += 0.016 * Settings.speed;
      
      let currentScale = scale;
      let currentPanX = panX;
      let currentPanY = panY;
      let currentRotation = 0;

      if (Settings.animationPreset === 'Floating Drift') {
        currentPanX += Math.sin(animTime * 0.5) * 40;
        currentPanY += Math.cos(animTime * 0.4) * 30;
      } else if (Settings.animationPreset === 'Pulsing Breath') {
        currentScale *= (1 + Math.sin(animTime * 0.3) * 0.08);
        currentPanX += Math.cos(animTime * 0.2) * 15;
      } else if (Settings.animationPreset === 'Infinite Spiral') {
        currentRotation = animTime * 1.5;
        currentPanX += Math.sin(animTime * 0.3) * 10;
        currentPanY += Math.cos(animTime * 0.3) * 10;
      } else if (Settings.animationPreset === 'Cosmic Wave') {
        currentPanX += Math.sin(animTime * 0.6) * 60;
        currentScale *= (1 + Math.cos(animTime * 0.4) * 0.05);
      } else if (Settings.animationPreset === 'Static') {
        // static
      }

      const viewport = query('#viewport');
      viewport.style.transform = `translate(${currentPanX}px, ${currentPanY}px) scale(${currentScale}) rotate(${currentRotation}deg)`;
      
      requestAnimationFrame(animateViewport);
    }

    // Zoom event
    window.addEventListener('wheel', (e) => {
      // Don't zoom if cursor is hovering over UI
      if (e.target.closest('.lil-gui')) return;
      e.preventDefault();
      const zoomFactor = 1.1;
      if (e.deltaY < 0) {
        scale *= zoomFactor;
      } else {
        scale /= zoomFactor;
      }
      scale = Math.min(Math.max(0.1, scale), 10);
    }, { passive: false });

    // Drag events
    window.addEventListener('mousedown', (e) => {
      if (e.target.closest('.lil-gui')) return;
      isDragging = true;
      dragMoved = false;
      mouseDownTime = Date.now();
      startX = e.clientX - panX;
      startY = e.clientY - panY;
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = (e.clientX - startX) - panX;
      const dy = (e.clientY - startY) - panY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
        dragMoved = true;
      }
      panX = e.clientX - startX;
      panY = e.clientY - startY;
    });

    window.addEventListener('mouseup', (e) => {
      isDragging = false;
      if (e.target.closest('.lil-gui')) return;
      // Cycle shape on clean click
      if (!dragMoved && (Date.now() - mouseDownTime < 250)) {
        scene.possibilities.forEach(p => {
          p.stop().nextShape().emerge();
        });
      }
    });

    window.addEventListener('mouseleave', () => {
      isDragging = false;
    });

    // Rebuild scene helper
    function rebuildScene() {
      if (scene) {
        if (scene.realm) scene.realm.stop();
        if (scene.possibilities) scene.possibilities.forEach(p => p.stop());
      }
      scene.realm = initRealm(Settings);
      scene.possibilities = initPossibilities(Settings);
    }

    // Color updater helper
    function updateColors() {
      Settings.possibilities.gradient = [
        new Color(Settings.color1),
        new Color(Settings.color2)
      ];
      if (scene && scene.possibilities) {
        scene.possibilities.forEach(p => p.updateColors());
      }
    }

    // Color scheme applicator
    function applyColorScheme(schemeName) {
      const scheme = ColorSchemes[schemeName];
      if (scheme) {
        Settings.color1 = scheme.color1;
        Settings.color2 = scheme.color2;
        controllers.color1.setValue(scheme.color1);
        controllers.color2.setValue(scheme.color2);
        updateColors();
      }
    }

    // Greenscreen toggler
    function updateGreenscreen() {
      const realmBg = query('#realm-bg');
      if (Settings.greenscreen) {
        document.body.style.backgroundColor = '#00ff00';
        document.body.style.backgroundImage = 'none';
        realmBg.style.display = 'none';
      } else {
        document.body.style.backgroundColor = '#000';
        realmBg.style.display = '';
      }
    }

    // Blend mode toggler
    function updateBlendMode() {
      const possibilitiesCanvas = query('#possibilities');
      possibilitiesCanvas.style.mixBlendMode = Settings.blendMode;
    }

    // Initialize GUI
    const gui = new GUI({ title: 'Realm & Possibilities' });
    const controllers = {};

    controllers.colorScheme = gui.add(Settings, 'colorScheme', Object.keys(ColorSchemes))
      .name('Color Scheme')
      .onChange(applyColorScheme);

    const folderColors = gui.addFolder('Custom Colors');
    controllers.color1 = folderColors.addColor(Settings, 'color1')
      .name('Start Color')
      .onChange(updateColors);
    controllers.color2 = folderColors.addColor(Settings, 'color2')
      .name('End Color')
      .onChange(updateColors);
    folderColors.close();

    const folderScene = gui.addFolder('Scene Controls');
    folderScene.add(Settings, 'greenscreen')
      .name('Green Screen')
      .onChange(updateGreenscreen);
    folderScene.add(Settings, 'blendMode', ['difference', 'normal', 'screen', 'multiply'])
      .name('Blend Mode')
      .onChange(updateBlendMode);
    folderScene.add(Settings, 'dpr', 0.5, 3.0, 0.1)
      .name('Pixel Ratio (DPR)')
      .onChange(rebuildScene);
    folderScene.add(Settings, 'speed', 0.0, 3.0, 0.1)
      .name('Speed');
    folderScene.add(Settings, 'animationPreset', [
      'Floating Drift',
      'Pulsing Breath',
      'Infinite Spiral',
      'Cosmic Wave',
      'Static'
    ]).name('Camera Animation');
    folderScene.open();

    const folderPossibilities = gui.addFolder('Flow Parameters');
    folderPossibilities.add(Settings.possibilities, 'amount', 1, 15, 1)
      .name('Particles Count')
      .onChange(rebuildScene);
    folderPossibilities.add(Settings.possibilities, 'delayBetween', 200, 3000, 100)
      .name('Delay (ms)')
      .onChange(rebuildScene);
    folderPossibilities.add(Settings.possibilities, 'horizontalDrift', 0, 10, 0.5)
      .name('Horizontal Drift')
      .onChange(rebuildScene);
    folderPossibilities.add(Settings.possibilities, 'scale', 50, 500, 10)
      .name('Noise Scale')
      .onChange(rebuildScene);
    folderPossibilities.close();

    // Toggle GUI visibility with 'H' key
    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'h') {
        const guiEl = document.querySelector('.lil-gui');
        if (guiEl) {
          if (guiEl.style.display === 'none') {
            guiEl.style.display = '';
          } else {
            guiEl.style.display = 'none';
          }
        }
      }
    });

    // Start everything
    scene = initScene();
    animateViewport();
  </script>
</body>
</html>
