<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Globe</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d021a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        #globeContainer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #ffffff;
            opacity: 0.8;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="loading">LOADING EARTH DATA...</div>
    <div id="globeContainer"></div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

        // Pre-setup 5 popular and original color schemes
        const presets = {
            "Neon Synthwave": {
                background: "#0d021a",
                oceanColor: "#1a052e",
                outlineColor: "#f43f5e",
                dotColor: "#ff007f",
                graticuleColor: "#3b0764",
                fillColor: "#00ffff",
                markerColor: "#00ff88"
            },
            "Minimalist Obsidian": {
                background: "#09090b",
                oceanColor: "#18181b",
                outlineColor: "#71717a",
                dotColor: "#f4f4f5",
                graticuleColor: "#27272a",
                fillColor: "#3f3f46",
                markerColor: "#ef4444"
            },
            "Deep Emerald": {
                background: "#022c22",
                oceanColor: "#064e3b",
                outlineColor: "#10b981",
                dotColor: "#34d399",
                graticuleColor: "#065f46",
                fillColor: "#047857",
                markerColor: "#fbbf24"
            },
            "Solar Flare": {
                background: "#1c0a00",
                oceanColor: "#2d1500",
                outlineColor: "#f97316",
                dotColor: "#fb923c",
                graticuleColor: "#431407",
                fillColor: "#ea580c",
                markerColor: "#facc15"
            },
            "Arctic Frost": {
                background: "#0b1329",
                oceanColor: "#1c2541",
                outlineColor: "#00b4d8",
                dotColor: "#edf2f4",
                graticuleColor: "#3a506b",
                fillColor: "#90e0ef",
                markerColor: "#ff007f"
            }
        };

        const defaultMarkers = [
            { lat: 51.5074, lng: -0.1278 },   // London
            { lat: 40.7128, lng: -74.0060 },   // New York
            { lat: 35.6762, lng: 139.6503 },   // Tokyo
            { lat: -33.8688, lng: 151.2093 },  // Sydney
            { lat: -23.5505, lng: -46.6333 },  // São Paulo
            { lat: 30.0444, lng: 31.2357 },    // Cairo
            { lat: 1.3521, lng: 103.8198 }     // Singapore
        ];

        // Controls / Settings object
        const settings = {
            preset: "Neon Synthwave",
            
            // Colors
            background: "#0d021a",
            oceanColor: "#1a052e",
            outlineColor: "#f43f5e",
            dotColor: "#ff007f",
            graticuleColor: "#3b0764",
            fillColor: "#00ffff",
            markerColor: "#00ff88",
            greenscreen: false,

            // Globe Settings
            fill: "dots",
            density: 8,
            dotSize: 5,
            allDots: false,
            showOutline: true,
            showGrid: true,
            scale: 8,
            detail: 5,
            dragSpeed: 5,
            smoothing: 8,
            markerSize: 40,

            // Interaction Settings
            dragMode: "Rotate",
            zoom: 1.0,

            // Animation Settings
            speed: 2,
            animationPreset: "Gentle Rotation",
            animationSpeed: 1.0,
            stopOnHover: true,

            // Renderer Settings
            dpr: Math.min(window.devicePixelRatio, 2),

            resetView: () => {
                cameraTarget.set(0, 0, 0);
                settings.zoom = 1.0;
                targetRotation.x = initialLongitudeRad;
                targetRotation.y = initialLatitudeRad;
                rotation.x = initialLongitudeRad;
                rotation.y = initialLatitudeRad;
                velocity.x = 0;
                velocity.y = 0;
                
                const scaleMultiplier = mapScaleUiToMultiplier(settings.scale);
                const baseDistance = (2.5 / scaleMultiplier);
                camera.position.set(0, 0, baseDistance);
                camera.lookAt(cameraTarget);
            }
        };

        // Utility Mapping Functions
        function parseColorToRgba(input) {
            if (!input || input.trim() === "") return { r: 0, g: 0, b: 0, a: 0 };
            const str = input.trim();
            const rgbaMatch = str.match(
                /rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*(?:,\s*([\d.]+)\s*)?\)/i
            );
            if (rgbaMatch) {
                const r = Math.max(0, Math.min(255, parseFloat(rgbaMatch[1]))) / 255;
                const g = Math.max(0, Math.min(255, parseFloat(rgbaMatch[2]))) / 255;
                const b = Math.max(0, Math.min(255, parseFloat(rgbaMatch[3]))) / 255;
                const a = rgbaMatch[4] !== undefined
                    ? Math.max(0, Math.min(1, parseFloat(rgbaMatch[4])))
                    : 1;
                return { r, g, b, a };
            }
            const hex = str.replace(/^#/, "");
            if (hex.length === 8) {
                return {
                    r: parseInt(hex.slice(0, 2), 16) / 255,
                    g: parseInt(hex.slice(2, 4), 16) / 255,
                    b: parseInt(hex.slice(4, 6), 16) / 255,
                    a: parseInt(hex.slice(6, 8), 16) / 255,
                };
            }
            if (hex.length === 6) {
                return {
                    r: parseInt(hex.slice(0, 2), 16) / 255,
                    g: parseInt(hex.slice(2, 4), 16) / 255,
                    b: parseInt(hex.slice(4, 6), 16) / 255,
                    a: 1,
                };
            }
            if (hex.length === 4) {
                return {
                    r: parseInt(hex[0] + hex[0], 16) / 255,
                    g: parseInt(hex[1] + hex[1], 16) / 255,
                    b: parseInt(hex[2] + hex[2], 16) / 255,
                    a: parseInt(hex[3] + hex[3], 16) / 255,
                };
            }
            if (hex.length === 3) {
                return {
                    r: parseInt(hex[0] + hex[0], 16) / 255,
                    g: parseInt(hex[1] + hex[1], 16) / 255,
                    b: parseInt(hex[2] + hex[2], 16) / 255,
                    a: 1,
                };
            }
            return { r: 0, g: 0, b: 0, a: 1 };
        }

        function mapLinear(value, inMin, inMax, outMin, outMax) {
            if (inMax === inMin) return outMin;
            const t = (value - inMin) / (inMax - inMin);
            return outMin + t * (outMax - outMin);
        }

        function mapSpeedUiToInternal(ui) {
            if (ui === 0) return 0;
            const clamped = Math.max(0, Math.min(10, ui));
            return mapLinear(clamped, 0, 10, 0, 0.9);
        }

        function mapDensityUiToSpacing(ui) {
            const clamped = Math.max(1, Math.min(10, ui));
            return mapLinear(clamped, 1, 10, 24, 8);
        }

        function mapScaleUiToMultiplier(ui) {
            const clamped = Math.max(1, Math.min(20, ui));
            return mapLinear(clamped, 1, 20, 0.2, 2);
        }

        function mapDotSizeUiToMultiplier(ui) {
            const clamped = Math.max(1, Math.min(10, ui));
            return mapLinear(clamped, 1, 10, 0.1, 0.5);
        }

        function mapMarkerDotSizeUiToMultiplier(ui) {
            const clamped = Math.max(0, Math.min(100, ui));
            return mapLinear(clamped, 0, 100, 0.1, 2.5);
        }

        function normalizeSmoothing(ui) {
            return Math.max(0, Math.min(1, ui / 10));
        }

        function mapDragSpeedUiToSensitivity(ui) {
            return mapLinear(Math.max(0, Math.min(10, ui)), 0, 10, 0.001, 0.02);
        }

        function mapDetailToStepSize(ui) {
            const clamped = Math.max(1, Math.min(10, ui));
            return mapLinear(clamped, 1, 10, 10, 1);
        }

        function simplifyRing(ring, detail) {
            if (ring.length < 2) return ring;
            if (detail >= 10) return ring;
            const stepSize = Math.max(1, Math.floor(mapDetailToStepSize(detail)));
            const simplified = [];
            simplified.push(ring[0]);
            for (let i = stepSize; i < ring.length - 1; i += stepSize) {
                const idx = Math.min(i, ring.length - 1);
                simplified.push(ring[idx]);
            }
            const lastPoint = ring[ring.length - 1];
            const firstPoint = ring[0];
            const isClosed =
                Math.abs(lastPoint[0] - firstPoint[0]) < 1e-4 &&
                Math.abs(lastPoint[1] - firstPoint[1]) < 1e-4;
            if (!isClosed) {
                simplified.push(lastPoint);
            }
            return simplified.length >= 2 ? simplified : ring;
        }

        function latLngToPosition(lat, lng) {
            const latRad = lat * (Math.PI / 180);
            const lngRad = lng * (Math.PI / 180);
            const x = Math.cos(latRad) * Math.sin(lngRad);
            const y = Math.sin(latRad);
            const z = Math.cos(latRad) * Math.cos(lngRad);
            return { x, y, z };
        }

        // Initialize Global Core Variables
        const container = document.getElementById("globeContainer");
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const cameraTarget = new THREE.Vector3(0, 0, 0);

        const baseRadius = 1;
        const initialLatitude = 23;
        const initialLongitude = -23;
        const initialLongitudeRad = (initialLongitude * Math.PI) / 180;
        const initialLatitudeRad = (initialLatitude * Math.PI) / 180;
        
        const rotation = { x: initialLongitudeRad, y: initialLatitudeRad };
        const targetRotation = { x: initialLongitudeRad, y: initialLatitudeRad };
        const velocity = { x: 0, y: 0 };
        
        const globeGroup = new THREE.Group();
        globeGroup.rotation.y = initialLongitudeRad;
        globeGroup.rotation.x = initialLatitudeRad;
        scene.add(globeGroup);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(settings.dpr);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        const canvas = renderer.domElement;
        container.appendChild(canvas);

        // Materials cache
        let oceanMaterial = null;
        let outlineMaterial = null;
        let dotMaterial = null;
        let graticuleMaterial = null;
        let markerMaterial = null;
        
        let fillMesh = null;
        let markerMeshes = [];

        // Gegeojson Caches
        let cachedLandData = null;
        let landPixels = null;
        const bitmapWidth = 2048;
        const bitmapHeight = 1024;

        // Custom camera controls & dragging states
        let isDragging = false;
        let isPanning = false;
        let isHovering = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let touchStartDist = 0;

        // Init 2D land pixel cache for quick hit-testing
        const initLandPixels = () => {
            if (!cachedLandData) return;
            const offscreenCanvas = document.createElement("canvas");
            offscreenCanvas.width = bitmapWidth;
            offscreenCanvas.height = bitmapHeight;
            const ctx = offscreenCanvas.getContext("2d", { willReadFrequently: true });
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, bitmapWidth, bitmapHeight);
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            
            cachedLandData.features.forEach((feature) => {
                const geometry = feature.geometry;
                if (!geometry) return;
                
                const drawPolygon = (ring) => {
                    if (ring.length < 2) return;
                    const first = ring[0];
                    const fx = ((first[0] + 180) / 360) * bitmapWidth;
                    const fy = ((90 - first[1]) / 180) * bitmapHeight;
                    ctx.moveTo(fx, fy);
                    for (let i = 1; i < ring.length; i++) {
                        const p = ring[i];
                        const px = ((p[0] + 180) / 360) * bitmapWidth;
                        const py = ((90 - p[1]) / 180) * bitmapHeight;
                        ctx.lineTo(px, py);
                    }
                };
                
                if (geometry.type === 'Polygon') {
                    geometry.coordinates.forEach(ring => drawPolygon(ring));
                } else if (geometry.type === 'MultiPolygon') {
                    geometry.coordinates.forEach(poly => {
                        poly.forEach(ring => drawPolygon(ring));
                    });
                }
            });
            ctx.fill();
            const imageData = ctx.getImageData(0, 0, bitmapWidth, bitmapHeight);
            landPixels = imageData.data;
        };

        const isOnLand = (lng, lat) => {
            if (!landPixels) return false;
            const x = Math.round(((lng + 180) / 360) * bitmapWidth) % bitmapWidth;
            const y = Math.round(((90 - lat) / 180) * bitmapHeight);
            const clampedY = Math.max(0, Math.min(bitmapHeight - 1, y));
            const idx = (clampedY * bitmapWidth + x) * 4;
            return landPixels[idx] > 128;
        };

        const regenerateSolidTexture = () => {
            if (!fillMesh || !landPixels) return;

            const texW = 1024;
            const texH = 512;
            const fillCanvas = document.createElement("canvas");
            fillCanvas.width = texW;
            fillCanvas.height = texH;
            const fctx = fillCanvas.getContext("2d");
            const img = fctx.createImageData(texW, texH);
            const data = img.data;
            
            const fillRgba = parseColorToRgba(settings.fillColor);
            const fr = Math.round(fillRgba.r * 255);
            const fg = Math.round(fillRgba.g * 255);
            const fb = Math.round(fillRgba.b * 255);
            const fa = Math.round((fillRgba.a || 1) * 255);
            
            for (let ty = 0; ty < texH; ty++) {
                for (let tx = 0; tx < texW; tx++) {
                    const u = tx / texW;
                    const v = ty / texH;
                    let lng = (u - 0.25) * 360;
                    lng = ((((lng + 180) % 360) + 360) % 360) - 180;
                    const lat = (v - 0.5) * 180;
                    const onLand = settings.allDots || isOnLand(lng, lat);
                    const idx = (ty * texW + tx) * 4;
                    if (onLand) {
                        data[idx] = fr;
                        data[idx + 1] = fg;
                        data[idx + 2] = fb;
                        data[idx + 3] = fa;
                    } else {
                        data[idx + 3] = 0;
                    }
                }
            }
            fctx.putImageData(img, 0, 0);
            
            if (fillMesh.material.map) {
                fillMesh.material.map.dispose();
            }
            const fillTexture = new THREE.CanvasTexture(fillCanvas);
            fillTexture.flipY = false;
            fillTexture.needsUpdate = true;
            fillMesh.material.map = fillTexture;
            fillMesh.material.needsUpdate = true;
        };

        const updateMarkers = (globeRadius) => {
            markerMeshes.forEach(mesh => globeGroup.remove(mesh));
            markerMeshes = [];

            if (defaultMarkers && defaultMarkers.length > 0) {
                const markerRadiusMultiplier = mapMarkerDotSizeUiToMultiplier(settings.markerSize);
                const markerSize = 0.01 * markerRadiusMultiplier;
                const markerGeometry = new THREE.SphereGeometry(markerSize, 16, 16);
                
                markerMaterial = new THREE.MeshBasicMaterial({
                    color: new THREE.Color(settings.markerColor),
                });

                defaultMarkers.forEach((marker) => {
                    if (!marker || typeof marker.lat !== "number" || typeof marker.lng !== "number") return;
                    const pos = latLngToPosition(marker.lat, marker.lng);
                    const markerMesh = new THREE.Mesh(markerGeometry, markerMaterial);
                    markerMesh.position.set(
                        pos.x * globeRadius * 1.01,
                        pos.y * globeRadius * 1.01,
                        pos.z * globeRadius * 1.01
                    );
                    globeGroup.add(markerMesh);
                    markerMeshes.push(markerMesh);
                });
            }
        };

        // Core Rebuild function for geometries and mesh groups
        const rebuildGlobe = () => {
            if (!cachedLandData) return;

            // Clear old children of globeGroup
            while (globeGroup.children.length > 0) {
                const child = globeGroup.children[0];
                globeGroup.remove(child);
                if (child.geometry) child.geometry.dispose();
                if (child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => m.dispose());
                    } else {
                        child.material.dispose();
                    }
                }
            }

            const scaleMultiplier = mapScaleUiToMultiplier(settings.scale);
            const globeRadius = baseRadius * scaleMultiplier;

            // Update camera distance based on scale & zoom
            const baseDistance = (2.5 / scaleMultiplier) / settings.zoom;
            if (settings.animationPreset === 'Static' || settings.animationPreset === 'Gentle Rotation') {
                const currentDist = camera.position.distanceTo(cameraTarget) || baseDistance;
                const dir = new THREE.Vector3().subVectors(camera.position, cameraTarget).normalize();
                if (dir.lengthSq() < 0.001) dir.set(0, 0, 1);
                camera.position.copy(cameraTarget).add(dir.multiplyScalar(currentDist));
            }

            // Ocean setup
            const oceanRgba = parseColorToRgba(settings.oceanColor);
            oceanMaterial = new THREE.MeshBasicMaterial({
                color: new THREE.Color(settings.oceanColor),
                transparent: oceanRgba.a < 1 || oceanRgba.a === 0,
                opacity: oceanRgba.a,
            });
            const oceanGeometry = new THREE.SphereGeometry(globeRadius, 64, 64);
            const oceanMesh = new THREE.Mesh(oceanGeometry, oceanMaterial);
            globeGroup.add(oceanMesh);

            // Continent Outlines setup
            if (settings.showOutline && settings.outlineColor) {
                const outlineRgba = parseColorToRgba(settings.outlineColor);
                outlineMaterial = new THREE.MeshBasicMaterial({
                    color: new THREE.Color(settings.outlineColor),
                    transparent: outlineRgba.a < 1,
                    opacity: outlineRgba.a,
                    depthTest: true,
                    depthWrite: true,
                });

                cachedLandData.features.forEach((feature) => {
                    const featureType = feature.properties?.featurecla || feature.properties?.type || "";
                    const featureName = feature.properties?.name || "";
                    if (
                        featureType.toLowerCase().includes("graticule") ||
                        featureType.toLowerCase().includes("grid") ||
                        featureType.toLowerCase().includes("line") ||
                        featureName.toLowerCase().includes("graticule") ||
                        featureName.toLowerCase().includes("grid") ||
                        featureName.toLowerCase().includes("line")
                    ) {
                        return;
                    }

                    const geometry = feature.geometry;
                    if (!geometry || !geometry.coordinates) return;

                    const processRing = (ring) => {
                        if (ring.length < 2) return;
                        const simplifiedRing = simplifyRing(ring, settings.detail);
                        const positions = [];
                        simplifiedRing.forEach((coord) => {
                            const [lng, lat] = coord;
                            const pos = latLngToPosition(lat, lng);
                            positions.push(
                                pos.x * globeRadius,
                                pos.y * globeRadius,
                                pos.z * globeRadius
                            );
                        });
                        
                        if (positions.length >= 6) {
                            const points = [];
                            for (let i = 0; i < positions.length; i += 3) {
                                points.push(new THREE.Vector3(positions[i], positions[i+1], positions[i+2]));
                            }
                            if (points.length > 0 && points[0].distanceTo(points[points.length - 1]) > 0.001) {
                                points.push(points[0].clone());
                            }
                            if (points.length >= 2) {
                                const curve = new THREE.CatmullRomCurve3(points);
                                const radius = (settings.outlineWidth || 1) * 0.001;
                                const tubeGeometry = new THREE.TubeGeometry(
                                    curve,
                                    points.length * 2,
                                    radius,
                                    8,
                                    false
                                );
                                const tubeMesh = new THREE.Mesh(tubeGeometry, outlineMaterial);
                                tubeMesh.renderOrder = 0;
                                globeGroup.add(tubeMesh);
                            }
                        }
                    };

                    if (geometry.type === "Polygon" && geometry.coordinates.length > 0) {
                        processRing(geometry.coordinates[0]);
                    } else if (geometry.type === "MultiPolygon") {
                        geometry.coordinates.forEach((polygon) => {
                            if (polygon.length > 0) {
                                processRing(polygon[0]);
                            }
                        });
                    }
                });
            }

            // Graticules Grid setup
            if (settings.showGrid && settings.graticuleColor) {
                const graticuleRgba = parseColorToRgba(settings.graticuleColor);
                graticuleMaterial = new THREE.MeshBasicMaterial({
                    color: new THREE.Color(settings.graticuleColor),
                    transparent: graticuleRgba.a < 1,
                    opacity: graticuleRgba.a,
                });

                const gridSpacing = 15;
                const gridWidth = 1;
                // Latitude lines
                for (let lat = -90; lat <= 90; lat += gridSpacing) {
                    const points = [];
                    const segments = 64;
                    for (let i = 0; i <= segments; i++) {
                        const lng = (i / segments) * 360 - 180;
                        const pos = latLngToPosition(lat, lng);
                        points.push(new THREE.Vector3(pos.x * globeRadius, pos.y * globeRadius, pos.z * globeRadius));
                    }
                    const curve = new THREE.CatmullRomCurve3(points);
                    const radius = (gridWidth / 10) * 0.01;
                    const tubeGeometry = new THREE.TubeGeometry(curve, points.length * 2, radius, 8, false);
                    const tubeMesh = new THREE.Mesh(tubeGeometry, graticuleMaterial);
                    tubeMesh.renderOrder = 0;
                    globeGroup.add(tubeMesh);
                }
                // Longitude lines
                for (let lng = -180; lng < 180; lng += gridSpacing) {
                    const points = [];
                    const segments = 64;
                    for (let i = 0; i <= segments; i++) {
                        const lat = (i / segments) * 180 - 90;
                        const pos = latLngToPosition(lat, lng);
                        points.push(new THREE.Vector3(pos.x * globeRadius, pos.y * globeRadius, pos.z * globeRadius));
                    }
                    const curve = new THREE.CatmullRomCurve3(points);
                    const radius = (gridWidth / 10) * 0.01;
                    const tubeGeometry = new THREE.TubeGeometry(curve, points.length * 2, radius, 8, false);
                    const tubeMesh = new THREE.Mesh(tubeGeometry, graticuleMaterial);
                    tubeMesh.renderOrder = 0;
                    globeGroup.add(tubeMesh);
                }
            }

            // Solid / Dots fill setup
            if (settings.fill === "solid") {
                const fillRgba = parseColorToRgba(settings.fillColor);
                const fillMaterial = new THREE.MeshBasicMaterial({
                    transparent: true,
                    opacity: fillRgba.a
                });
                const fillGeometry = new THREE.SphereGeometry(globeRadius * 1.002, 64, 64);
                fillMesh = new THREE.Mesh(fillGeometry, fillMaterial);
                globeGroup.add(fillMesh);
                regenerateSolidTexture();
            } else {
                const dotCoordinates = [];
                const dotSpacing = mapDensityUiToSpacing(settings.density);
                const baseStep = dotSpacing * 0.08;
                
                for (let lat = -90; lat <= 90; lat += baseStep) {
                    const latRad = (Math.abs(lat) * Math.PI) / 180;
                    const cosLat = Math.cos(latRad);
                    const lngStep = cosLat > 0.01 ? baseStep / Math.max(0.3, cosLat) : 360;
                    for (let lng = -180; lng < 180; lng += lngStep) {
                        if (settings.allDots || isOnLand(lng, lat)) {
                            dotCoordinates.push([lng, lat]);
                        }
                    }
                }

                if (dotCoordinates.length > 0) {
                    const dotSizeMultiplier = mapDotSizeUiToMultiplier(settings.dotSize);
                    const dotGeometry = new THREE.SphereGeometry(0.01 * dotSizeMultiplier, 4, 4);
                    const dotRgba = parseColorToRgba(settings.dotColor);
                    dotMaterial = new THREE.MeshBasicMaterial({
                        color: new THREE.Color(settings.dotColor),
                        transparent: dotRgba.a < 1,
                        opacity: dotRgba.a,
                    });
                    
                    const instanced = new THREE.InstancedMesh(
                        dotGeometry,
                        dotMaterial,
                        dotCoordinates.length
                    );
                    const matrix = new THREE.Matrix4();
                    for (let i = 0; i < dotCoordinates.length; i++) {
                        const [lng, lat] = dotCoordinates[i];
                        const pos = latLngToPosition(lat, lng);
                        matrix.makeScale(1, 1, 1);
                        matrix.setPosition(
                            pos.x * globeRadius,
                            pos.y * globeRadius,
                            pos.z * globeRadius
                        );
                        instanced.setMatrixAt(i, matrix);
                    }
                    instanced.instanceMatrix.needsUpdate = true;
                    globeGroup.add(instanced);
                }
            }

            updateMarkers(globeRadius);
        };

        const updateColors = () => {
            if (!cachedLandData) return;
            
            const oceanRgba = parseColorToRgba(settings.oceanColor);
            const outlineRgba = parseColorToRgba(settings.outlineColor);
            const dotRgba = parseColorToRgba(settings.dotColor);
            const graticuleRgba = parseColorToRgba(settings.graticuleColor);
            
            if (oceanMaterial) {
                oceanMaterial.color.set(settings.oceanColor);
                oceanMaterial.opacity = oceanRgba.a;
                oceanMaterial.transparent = oceanRgba.a < 1;
            }
            if (outlineMaterial) {
                outlineMaterial.color.set(settings.outlineColor);
                outlineMaterial.opacity = outlineRgba.a;
                outlineMaterial.transparent = outlineRgba.a < 1;
            }
            if (dotMaterial) {
                dotMaterial.color.set(settings.dotColor);
                dotMaterial.opacity = dotRgba.a;
                dotMaterial.transparent = dotRgba.a < 1;
            }
            if (graticuleMaterial) {
                graticuleMaterial.color.set(settings.graticuleColor);
                graticuleMaterial.opacity = graticuleRgba.a;
                graticuleMaterial.transparent = graticuleRgba.a < 1;
            }
            if (markerMaterial) {
                markerMaterial.color.set(settings.markerColor);
            }
            
            if (settings.fill === 'solid' && fillMesh) {
                regenerateSolidTexture();
            }
        };

        // Load Earth Geometry Data
        const loadWorldData = async () => {
            try {
                const response = await fetch(
                    "https://raw.githubusercontent.com/martynafford/natural-earth-geojson/refs/heads/master/50m/physical/ne_50m_land.json"
                );
                if (!response.ok) throw new Error("Failed to load land data");
                cachedLandData = await response.json();
                
                initLandPixels();
                rebuildGlobe();
                
                const loader = document.getElementById('loading');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            } catch (err) {
                console.error(err);
                const loader = document.getElementById('loading');
                if (loader) loader.textContent = "Failed to load Earth database.";
            }
        };

        // Zoom Camera Function
        function zoomCamera(delta) {
            const minDistance = 0.5;
            const maxDistance = 25.0;
            
            const dir = new THREE.Vector3().subVectors(camera.position, cameraTarget);
            let distance = dir.length();
            
            distance *= delta;
            distance = Math.min(Math.max(distance, minDistance), maxDistance);
            
            dir.normalize().multiplyScalar(distance);
            camera.position.copy(cameraTarget).add(dir);
        }

        // Screen-Space Pan Camera Function
        function panCamera(deltaX, deltaY) {
            const localRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            const localUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);

            const distance = camera.position.distanceTo(cameraTarget);
            const factor = (distance * Math.tan((camera.fov * Math.PI) / 360)) / (window.innerHeight * 0.5);

            localRight.multiplyScalar(-deltaX * factor);
            localUp.multiplyScalar(deltaY * factor);

            camera.position.add(localRight).add(localUp);
            cameraTarget.add(localRight).add(localUp);
        }

        // Setup Event Listeners for Interaction (Panning/Dragging/Zooming)
        canvas.addEventListener('mousedown', (event) => {
            if (event.button === 2) {
                event.preventDefault();
                isPanning = true;
            } else {
                if (settings.dragMode === 'Translate') {
                    isPanning = true;
                } else {
                    isDragging = true;
                }
            }
            lastMouseX = event.clientX;
            lastMouseY = event.clientY;
        });

        window.addEventListener('mousemove', (event) => {
            if (isPanning) {
                const dx = event.clientX - lastMouseX;
                const dy = event.clientY - lastMouseY;
                panCamera(dx, dy);
                lastMouseX = event.clientX;
                lastMouseY = event.clientY;
            } else if (isDragging) {
                const sensitivity = mapDragSpeedUiToSensitivity(settings.dragSpeed);
                const dx = event.clientX - lastMouseX;
                const dy = event.clientY - lastMouseY;
                targetRotation.x += dx * sensitivity;
                targetRotation.y += dy * sensitivity;
                targetRotation.y = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotation.y));
                
                velocity.x = dx * sensitivity * 0.3;
                velocity.y = dy * sensitivity * 0.3;
                
                lastMouseX = event.clientX;
                lastMouseY = event.clientY;
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            isPanning = false;
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 0.9 : 1.1;
            zoomCamera(factor);
        }, { passive: false });

        // Touch Interaction Support
        canvas.addEventListener('touchstart', (event) => {
            if (event.touches.length === 1) {
                const touch = event.touches[0];
                if (settings.dragMode === 'Translate') {
                    isPanning = true;
                } else {
                    isDragging = true;
                }
                lastMouseX = touch.clientX;
                lastMouseY = touch.clientY;
            } else if (event.touches.length === 2) {
                isDragging = false;
                isPanning = false;
                const dx = event.touches[0].clientX - event.touches[1].clientX;
                const dy = event.touches[0].clientY - event.touches[1].clientY;
                touchStartDist = Math.sqrt(dx * dx + dy * dy);
            }
        }, { passive: true });

        canvas.addEventListener('touchmove', (event) => {
            if (event.touches.length === 1) {
                const touch = event.touches[0];
                if (isPanning) {
                    const dx = touch.clientX - lastMouseX;
                    const dy = touch.clientY - lastMouseY;
                    panCamera(dx, dy);
                    lastMouseX = touch.clientX;
                    lastMouseY = touch.clientY;
                } else if (isDragging) {
                    const sensitivity = mapDragSpeedUiToSensitivity(settings.dragSpeed);
                    const dx = touch.clientX - lastMouseX;
                    const dy = touch.clientY - lastMouseY;
                    targetRotation.x += dx * sensitivity;
                    targetRotation.y += dy * sensitivity;
                    targetRotation.y = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotation.y));
                    lastMouseX = touch.clientX;
                    lastMouseY = touch.clientY;
                }
            } else if (event.touches.length === 2) {
                const dx = event.touches[0].clientX - event.touches[1].clientX;
                const dy = event.touches[0].clientY - event.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (touchStartDist > 0) {
                    const factor = touchStartDist / dist;
                    zoomCamera(factor);
                    touchStartDist = dist;
                }
            }
        }, { passive: true });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
            isPanning = false;
            touchStartDist = 0;
        });

        // Hover tracking for "stop on hover" setting
        const raycaster = new THREE.Raycaster();
        const mouse2D = new THREE.Vector2();
        let oceanMeshCached = null;

        canvas.addEventListener('mousemove', (event) => {
            if (!settings.stopOnHover) {
                isHovering = false;
                return;
            }
            const rect = canvas.getBoundingClientRect();
            mouse2D.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse2D.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse2D, camera);
            
            if (!oceanMeshCached && globeGroup.children.length > 0) {
                oceanMeshCached = globeGroup.children.find(c => c.geometry instanceof THREE.SphereGeometry);
            }
            if (oceanMeshCached) {
                const intersects = raycaster.intersectObject(oceanMeshCached);
                isHovering = intersects.length > 0;
            } else {
                isHovering = false;
            }
        });

        canvas.addEventListener('mouseleave', () => {
            isHovering = false;
        });

        // Keyboard Shortcut to toggle GUI
        const gui = new GUI({ title: 'Globe Settings' });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'h' || e.key === 'H') {
                if (gui._hidden) {
                    gui.show();
                } else {
                    gui.hide();
                }
            }
        });

        // GUI Setup
        const controllers = {};

        const applyPreset = (presetName) => {
            const pr = presets[presetName];
            if (!pr) return;
            for (const key in pr) {
                settings[key] = pr[key];
                if (controllers[key]) {
                    controllers[key].setValue(pr[key]);
                }
            }
            if (!settings.greenscreen) {
                document.body.style.backgroundColor = settings.background;
            }
            updateColors();
        };

        controllers.preset = gui.add(settings, 'preset', Object.keys(presets)).name('Color Scheme').onChange(applyPreset);

        const colorsFolder = gui.addFolder('Colors');
        controllers.background = colorsFolder.addColor(settings, 'background').name('Background').onChange(() => {
            if (!settings.greenscreen) {
                document.body.style.backgroundColor = settings.background;
            }
        });
        controllers.oceanColor = colorsFolder.addColor(settings, 'oceanColor').name('Ocean').onChange(updateColors);
        controllers.outlineColor = colorsFolder.addColor(settings, 'outlineColor').name('Outline').onChange(updateColors);
        controllers.dotColor = colorsFolder.addColor(settings, 'dotColor').name('Dots').onChange(updateColors);
        controllers.graticuleColor = colorsFolder.addColor(settings, 'graticuleColor').name('Grid').onChange(updateColors);
        controllers.fillColor = colorsFolder.addColor(settings, 'fillColor').name('Solid Fill').onChange(updateColors);
        controllers.markerColor = colorsFolder.addColor(settings, 'markerColor').name('Marker Color').onChange(updateColors);
        
        controllers.greenscreen = gui.add(settings, 'greenscreen').name('Greenscreen (#00ff00)').onChange((val) => {
            document.body.style.backgroundColor = val ? "#00ff00" : settings.background;
        });

        const globeFolder = gui.addFolder('Globe Parameters');
        controllers.fill = globeFolder.add(settings, 'fill', ['dots', 'solid']).name('Fill Mode').onChange(rebuildGlobe);
        controllers.density = globeFolder.add(settings, 'density', 1, 10, 1).name('Dot Density').onChange(rebuildGlobe);
        controllers.dotSize = globeFolder.add(settings, 'dotSize', 1, 10, 0.5).name('Dot Size').onChange(rebuildGlobe);
        controllers.allDots = globeFolder.add(settings, 'allDots').name('Draw All Dots').onChange(rebuildGlobe);
        controllers.showOutline = globeFolder.add(settings, 'showOutline').name('Land Outline').onChange(rebuildGlobe);
        controllers.showGrid = globeFolder.add(settings, 'showGrid').name('Grid Overlay').onChange(rebuildGlobe);
        controllers.scale = globeFolder.add(settings, 'scale', 1, 20, 1).name('Globe Scale').onChange(rebuildGlobe);
        controllers.detail = globeFolder.add(settings, 'detail', 1, 10, 1).name('Outline Detail').onChange(rebuildGlobe);
        controllers.markerSize = globeFolder.add(settings, 'markerSize', 0, 100, 1).name('Marker Size').onChange(() => {
            const scaleMultiplier = mapScaleUiToMultiplier(settings.scale);
            updateMarkers(baseRadius * scaleMultiplier);
        });
        controllers.smoothing = globeFolder.add(settings, 'smoothing', 0, 10, 0.5).name('Smooth Drag');
        controllers.dragSpeed = globeFolder.add(settings, 'dragSpeed', 0, 10, 0.5).name('Drag Speed');

        const interactionFolder = gui.addFolder('Interaction');
        controllers.dragMode = interactionFolder.add(settings, 'dragMode', ['Rotate', 'Translate']).name('Drag Action');

        const animFolder = gui.addFolder('Animation');
        controllers.animationPreset = animFolder.add(settings, 'animationPreset', [
            'Gentle Rotation',
            'Orbiting Camera',
            'Polar Drift',
            'Wandering Beacon',
            'Static'
        ]).name('Pattern');
        controllers.animationSpeed = animFolder.add(settings, 'animationSpeed', 0, 3, 0.1).name('Speed');
        controllers.speed = animFolder.add(settings, 'speed', 0, 10, 0.5).name('Rotation Rate');
        controllers.stopOnHover = animFolder.add(settings, 'stopOnHover').name('Stop on Hover');

        const viewFolder = gui.addFolder('DPR & Camera');
        controllers.dpr = viewFolder.add(settings, 'dpr', 0.5, 3.0, 0.1).name('Pixel Ratio').onChange((val) => {
            renderer.setPixelRatio(val);
        });
        viewFolder.add(settings, 'resetView').name('Reset Camera');

        colorsFolder.close();
        globeFolder.close();
        interactionFolder.close();
        animFolder.close();
        viewFolder.close();

        // Initial background styling
        document.body.style.backgroundColor = settings.background;

        // Render & Physics Loop variables
        let lastTime = performance.now();
        let time = 0;

        const animate = () => {
            requestAnimationFrame(animate);

            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            // Step dynamic time by speed factor
            time += dt * settings.animationSpeed;

            // Handle rotation calculations
            const baseRotationSpeed = mapSpeedUiToInternal(settings.speed);
            const actualRotationSpeed = baseRotationSpeed;
            const smoothingN = normalizeSmoothing(settings.smoothing);
            const lerpFactor = smoothingN === 0 ? 1 : mapLinear(smoothingN, 0, 1, 0.4, 0.03);
            const velocityDecay = mapLinear(smoothingN, 0, 1, 0.7, 0.96);

            // Auto-rotate globe if not dragging and not hover-paused
            const shouldAutoRotate = !isDragging && actualRotationSpeed !== 0 && (!settings.stopOnHover || !isHovering);
            if (shouldAutoRotate) {
                targetRotation.x -= actualRotationSpeed * dt * 0.3; // Default rotation direction
            }

            // Apply inertia / physics velocity
            if (!isDragging && smoothingN > 0) {
                if (Math.abs(velocity.x) > 0.0001 || Math.abs(velocity.y) > 0.0001) {
                    targetRotation.x += velocity.x;
                    targetRotation.y += velocity.y;
                    targetRotation.y = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotation.y));
                    velocity.x *= velocityDecay;
                    velocity.y *= velocityDecay;
                } else {
                    velocity.x = 0;
                    velocity.y = 0;
                }
            }

            // Interpolate towards target rotation
            const dx = targetRotation.x - rotation.x;
            const dy = targetRotation.y - rotation.y;
            rotation.x += dx * lerpFactor;
            rotation.y += dy * lerpFactor;
            rotation.y = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotation.y));

            globeGroup.rotation.y = rotation.x;
            globeGroup.rotation.x = rotation.y;

            // Camera calculations based on active animation preset
            const scaleMultiplier = mapScaleUiToMultiplier(settings.scale);
            const baseDistance = (2.5 / scaleMultiplier) / settings.zoom;

            switch (settings.animationPreset) {
                case 'Orbiting Camera': {
                    const currentDist = camera.position.distanceTo(cameraTarget) || baseDistance;
                    const x = Math.sin(time * 0.1) * currentDist;
                    const z = Math.cos(time * 0.1) * currentDist;
                    const y = Math.sin(time * 0.05) * currentDist * 0.2;
                    camera.position.set(x, y, z).add(cameraTarget);
                    camera.lookAt(cameraTarget);
                    break;
                }
                case 'Polar Drift': {
                    const currentDist = camera.position.distanceTo(cameraTarget) || baseDistance;
                    const angle = Math.sin(time * 0.08) * (Math.PI / 3.5);
                    const x = 0;
                    const y = Math.sin(angle) * currentDist;
                    const z = Math.cos(angle) * currentDist;
                    camera.position.set(x, y, z).add(cameraTarget);
                    camera.lookAt(cameraTarget);
                    break;
                }
                case 'Wandering Beacon': {
                    const currentDist = camera.position.distanceTo(cameraTarget) || baseDistance;
                    const distMod = currentDist * (1.0 + Math.sin(time * 0.25) * 0.08);
                    const x = Math.sin(time * 0.15) * distMod * 0.3;
                    const y = Math.cos(time * 0.2) * distMod * 0.2;
                    const z = Math.sqrt(Math.max(0.1, distMod * distMod - x * x - y * y));
                    camera.position.set(x, y, z).add(cameraTarget);
                    camera.lookAt(cameraTarget);
                    break;
                }
                case 'Static':
                case 'Gentle Rotation':
                default: {
                    // Camera remains locked on target coordinate with custom zoom
                    const dir = new THREE.Vector3().subVectors(camera.position, cameraTarget).normalize();
                    if (dir.lengthSq() < 0.001) dir.set(0, 0, 1);
                    const currentDist = camera.position.distanceTo(cameraTarget);
                    camera.position.copy(cameraTarget).add(dir.multiplyScalar(currentDist));
                    camera.lookAt(cameraTarget);
                    break;
                }
            }

            renderer.render(scene, camera);
        };

        // Resize Listener
        const handleResize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
        window.addEventListener('resize', handleResize);

        // Bootstrap the application
        camera.position.set(0, 0, 2.5 / mapScaleUiToMultiplier(settings.scale));
        camera.lookAt(cameraTarget);
        
        loadWorldData();
        animate();
    </script>
</body>
</html>
