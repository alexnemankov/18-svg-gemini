<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Sphere Simulation</title>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <!-- Define import maps for Three.js, postprocessing, and lil-gui -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <script type="module">
        // Support me by PayPal: https://paypal.com/paypalme/sabosugi
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import GUI from 'lil-gui';

        // --- Configuration ---
        const PARTICLE_COUNT = 30000;
        const SPHERE_RADIUS = 10;

        // --- Color Presets ---
        const themes = {
            'Aqua Nebula': { particleColor: '#3dd8ff', glowColor: '#061c2d' },
            'Volcanic Fire': { particleColor: '#ff3d00', glowColor: '#2a0800' },
            'Emerald Forest': { particleColor: '#00ff88', glowColor: '#002510' },
            'Cosmic Orchid': { particleColor: '#d83dff', glowColor: '#1a0530' },
            'Solar Gold': { particleColor: '#ffd200', glowColor: '#301b00' }
        };

        // --- Animation Presets ---
        const animationPresets = {
            'Liquid Slosh': {
                gravity: 0.00425,
                turbulence: 0.0301,
                sloshForce: 0.0393,
                pressure: 0.01767,
                targetDensity: 27,
                viscosity: 0.886,
                sphereRotationSpeed: 0.01728,
                timeScale: 0.6
            },
            'Zero-G Orbit': {
                gravity: 0.0,
                turbulence: 0.015,
                sloshForce: 0.0,
                pressure: 0.008,
                targetDensity: 12,
                viscosity: 0.95,
                sphereRotationSpeed: 0.025,
                timeScale: 0.4
            },
            'Calm Breathing': {
                gravity: 0.001,
                turbulence: 0.005,
                sloshForce: 0.0,
                pressure: 0.012,
                targetDensity: 20,
                viscosity: 0.9,
                sphereRotationSpeed: 0.005,
                timeScale: 0.8
            },
            'Double Vortex': {
                gravity: 0.0005,
                turbulence: 0.015,
                sloshForce: 0.01,
                pressure: 0.015,
                targetDensity: 25,
                viscosity: 0.92,
                sphereRotationSpeed: 0.01,
                timeScale: 0.6
            },
            'Cosmic Dust': {
                gravity: 0.0,
                turbulence: 0.005,
                sloshForce: 0.0,
                pressure: 0.002,
                targetDensity: 5,
                viscosity: 0.98,
                sphereRotationSpeed: 0.002,
                timeScale: 0.2
            }
        };

        // --- Physics & GUI Parameters ---
        const params = {
            // Visuals
            particleColor: themes['Aqua Nebula'].particleColor,
            particleSize: 1.1221,
            glowColor: themes['Aqua Nebula'].glowColor,
            glowStrength: 0.8,
            // Bloom
            bloomStrength: 1.14,
            bloomRadius: 0.393,
            bloomThreshold: 0.1,
            // Forces
            particleSpeed: 0.3,  // Multiplier for all forces
            gravity: animationPresets['Liquid Slosh'].gravity,
            turbulence: animationPresets['Liquid Slosh'].turbulence,
            sloshForce: animationPresets['Liquid Slosh'].sloshForce, 
            pressure: animationPresets['Liquid Slosh'].pressure,    
            targetDensity: animationPresets['Liquid Slosh'].targetDensity,  
            viscosity: animationPresets['Liquid Slosh'].viscosity, 
            timeScale: animationPresets['Liquid Slosh'].timeScale,     
            sphereRotationSpeed: animationPresets['Liquid Slosh'].sphereRotationSpeed,
            
            // New settings
            greenscreen: false,
            dpr: Math.min(window.devicePixelRatio, 2),
            theme: 'Aqua Nebula',
            animationMode: 'Liquid Slosh',

            shake: () => {
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    velocities[i * 3] += (Math.random() - 0.5) * 3.0;
                    velocities[i * 3 + 1] += Math.random() * 3.0; 
                    velocities[i * 3 + 2] += (Math.random() - 0.5) * 3.0;
                }
            }
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(params.dpr);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.screenSpacePanning = true;

        // --- Post-Processing (Bloom) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight), 
            params.bloomStrength, 
            params.bloomRadius, 
            params.bloomThreshold
        );

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- Boundary Sphere (Inner Glow Fresnel Shader) ---
        const sphereGeometry = new THREE.SphereGeometry(SPHERE_RADIUS, 64, 64);
        const sphereMaterial = new THREE.ShaderMaterial({
            uniforms: {
                glowColor: { value: new THREE.Color(params.glowColor) },
                glowStrength: { value: params.glowStrength }
            },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vViewPosition;
                void main() {
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    vNormal = normalize(normalMatrix * normal);
                    vViewPosition = -mvPosition.xyz;
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform vec3 glowColor;
                uniform float glowStrength;
                varying vec3 vNormal;
                varying vec3 vViewPosition;
                void main() {
                    vec3 normal = normalize(vNormal);
                    vec3 viewDir = normalize(vViewPosition);
                    
                    // Fresnel calculation for inner glow effect
                    float fresnel = 1.0 - max(dot(viewDir, normal), 0.0);
                    fresnel = pow(fresnel, 2.5); // Controls the falloff sharpness
                    
                    gl_FragColor = vec4(glowColor, fresnel * glowStrength);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.FrontSide
        });
        const boundarySphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        scene.add(boundarySphere);

        // --- Particles Setup ---
        const particlesGeometry = new THREE.BufferGeometry();
        
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3);
        const sizes = new Float32Array(PARTICLE_COUNT);

        let count = 0;
        while (count < PARTICLE_COUNT) {
            const x = (Math.random() - 0.5) * 2 * (SPHERE_RADIUS - 0.5);
            const y = (Math.random() - 0.5) * 2 * (SPHERE_RADIUS - 0.5);
            const z = (Math.random() - 0.5) * 2 * (SPHERE_RADIUS - 0.5);
            
            if (x*x + y*y + z*z < (SPHERE_RADIUS - 0.5)**2 && y < 1.0) {
                positions[count * 3] = x;
                positions[count * 3 + 1] = y;
                positions[count * 3 + 2] = z;

                velocities[count * 3] = 0;
                velocities[count * 3 + 1] = 0;
                velocities[count * 3 + 2] = 0;

                sizes[count] = Math.random() * 0.8 + 0.3;
                count++;
            }
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particlesGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const particlesMaterial = new THREE.ShaderMaterial({
            uniforms: {
                color: { value: new THREE.Color(params.particleColor) },
                sizeMultiplier: { value: params.particleSize }
            },
            vertexShader: `
                uniform float sizeMultiplier;
                attribute float size;
                void main() {
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * sizeMultiplier * (150.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform vec3 color;
                void main() {
                    float d = distance(gl_PointCoord, vec2(0.5));
                    if (d > 0.5) discard;
                    float alpha = smoothstep(0.5, 0.1, d);
                    gl_FragColor = vec4(color, alpha * 0.6);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particleSystem);

        // --- Grid for Fake Pressure ---
        const GRID_SIZE = 1.0;
        const GRID_DIM = Math.ceil((SPHERE_RADIUS * 2) / GRID_SIZE);
        const GRID_DIM2 = GRID_DIM * GRID_DIM;
        const cellDensity = new Int32Array(GRID_DIM * GRID_DIM * GRID_DIM);

        // --- GUI Setup (lil-gui) ---
        const gui = new GUI({ title: 'Settings' });
        gui.close(); // Collapse the GUI panel by default

        // Setup drop downs and helper functions
        const updateThemeColors = (val) => {
            const t = themes[val];
            if (t) {
                params.particleColor = t.particleColor;
                params.glowColor = t.glowColor;
                particlesMaterial.uniforms.color.value.set(t.particleColor);
                sphereMaterial.uniforms.glowColor.value.set(t.glowColor);
            }
        };

        const updateAnimationPreset = (val) => {
            const p = animationPresets[val];
            if (p) {
                for (const key in p) {
                    params[key] = p[key];
                }
            }
        };
        
        const folderPresets = gui.addFolder('Presets');
        folderPresets.add(params, 'theme', Object.keys(themes)).name('Color Scheme').onChange(updateThemeColors).listen();
        folderPresets.add(params, 'animationMode', Object.keys(animationPresets)).name('Animation Mode').onChange(updateAnimationPreset).listen();

        const folderVisuals = gui.addFolder('Visuals & Colors');
        folderVisuals.addColor(params, 'particleColor').name('Particle Color').onChange(v => particlesMaterial.uniforms.color.value.set(v)).listen();
        folderVisuals.add(params, 'particleSize', 0.1, 5.0).name('Particle Size').onChange(v => particlesMaterial.uniforms.sizeMultiplier.value = v);
        folderVisuals.addColor(params, 'glowColor').name('Sphere Glow Color').onChange(v => sphereMaterial.uniforms.glowColor.value.set(v)).listen();
        folderVisuals.add(params, 'glowStrength', 0.0, 3.0).name('Glow Strength').onChange(v => sphereMaterial.uniforms.glowStrength.value = v);
        
        const folderBloom = gui.addFolder('Bloom Effect');
        folderBloom.add(params, 'bloomStrength', 0.0, 3.0).name('Strength').onChange(v => bloomPass.strength = v);
        folderBloom.add(params, 'bloomRadius', 0.0, 1.0).name('Radius').onChange(v => bloomPass.radius = v);
        const bloomThresholdController = folderBloom.add(params, 'bloomThreshold', 0.0, 1.0).name('Threshold').onChange(v => {
            if (params.greenscreen) {
                params._prevBloomThreshold = v;
            } else {
                bloomPass.threshold = v;
            }
        }).listen();
        
        const folderForces = gui.addFolder('Forces & Motion');
        folderForces.add(params, 'particleSpeed', 0.0, 1.0).name('Movement Speed').listen();
        folderForces.add(params, 'gravity', 0, 0.05).name('Gravity').listen();
        folderForces.add(params, 'turbulence', 0, 0.05).name('Turbulence').listen();
        folderForces.add(params, 'sloshForce', 0, 0.1).name('Slosh Force').listen();
        
        const folderLiquid = gui.addFolder('Liquid Volume');
        folderLiquid.add(params, 'pressure', 0, 0.03).name('Repulsion Pressure').listen();
        folderLiquid.add(params, 'targetDensity', 1, 40, 1).name('Target Density').listen();
        folderLiquid.add(params, 'viscosity', 0.80, 1.0).name('Viscosity').listen();
        
        const folderSystem = gui.addFolder('System Settings');
        folderSystem.add(params, 'dpr', 0.5, 3.0, 0.1).name('Pixel Ratio (DPR)').onChange(v => renderer.setPixelRatio(v));
        
        folderSystem.add(params, 'greenscreen').name('Green Screen').onChange(v => {
            if (v) {
                scene.background = new THREE.Color(0x00ff00);
                renderer.setClearColor(0x00ff00, 1);
                // Save original bloom threshold and set active to 1.0 to prevent greenscreen glow
                params._prevBloomThreshold = params.bloomThreshold;
                bloomPass.threshold = 1.0;
                params.bloomThreshold = 1.0;
            } else {
                scene.background = new THREE.Color(0x000000);
                renderer.setClearColor(0x000000, 1);
                if (params._prevBloomThreshold !== undefined) {
                    bloomPass.threshold = params._prevBloomThreshold;
                    params.bloomThreshold = params._prevBloomThreshold;
                }
            }
        });

        gui.add(params, 'sphereRotationSpeed', -0.01, 0.05).name('Rotation Speed').listen();
        gui.add(params, 'timeScale', 0.0, 3.0).name('Animation Speed').listen();
        gui.add(params, 'shake').name('Shake Liquid!');

        // Keyboard Toggle (H Key)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'h' || e.key === 'H') {
                if (gui._hidden) {
                    gui.show();
                } else {
                    gui.hide();
                }
            }
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime() * params.timeScale;

            const posAttr = particlesGeometry.attributes.position;
            const posArray = posAttr.array;

            cellDensity.fill(0);

            // Pass 1: Compute Density
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                let cx = Math.floor((posArray[i3] + SPHERE_RADIUS) / GRID_SIZE);
                let cy = Math.floor((posArray[i3 + 1] + SPHERE_RADIUS) / GRID_SIZE);
                let cz = Math.floor((posArray[i3 + 2] + SPHERE_RADIUS) / GRID_SIZE);
                
                cx = Math.max(0, Math.min(GRID_DIM - 1, cx));
                cy = Math.max(0, Math.min(GRID_DIM - 1, cy));
                cz = Math.max(0, Math.min(GRID_DIM - 1, cz));
                
                cellDensity[cx + cy * GRID_DIM + cz * GRID_DIM2]++;
            }

            particleSystem.rotation.y += params.sphereRotationSpeed;
            boundarySphere.rotation.y += params.sphereRotationSpeed;

            const globalSloshX = Math.sin(time * 2.1) * params.sloshForce;
            const globalSloshY = Math.cos(time * 1.5) * (params.sloshForce * 0.3);
            const globalSloshZ = Math.sin(time * 1.8) * params.sloshForce;

            // Apply dynamic adjustments for Calm Breathing mode
            let currentPressure = params.pressure;
            let currentTargetDensity = params.targetDensity;
            if (params.animationMode === 'Calm Breathing') {
                currentPressure = params.pressure * (1.0 + 0.6 * Math.sin(time * 2.5));
                currentTargetDensity = params.targetDensity + 6.0 * Math.sin(time * 1.5);
            }

            // Pass 2: Physics simulation loop
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                
                let x = posArray[i3];
                let y = posArray[i3 + 1];
                let z = posArray[i3 + 2];

                let vx = velocities[i3];
                let vy = velocities[i3 + 1];
                let vz = velocities[i3 + 2];

                // Accumulate all forces for this particle
                let fx = 0, fy = 0, fz = 0;

                fy -= params.gravity;
                fx += globalSloshX;
                fy += globalSloshY;
                fz += globalSloshZ;
                fx += Math.sin(y * 0.5 + time) * params.turbulence;
                fy += Math.cos(z * 0.5 + time) * params.turbulence;
                fz += Math.sin(x * 0.5 + time) * params.turbulence;

                // Mode-specific force additions
                if (params.animationMode === 'Double Vortex') {
                    // Counter-rotating swirl forces depending on Y hemisphere
                    const swirl = y > 0 ? 0.012 : -0.012;
                    fx += -z * swirl - x * 0.001;
                    fz += x * swirl - z * 0.001;
                } else if (params.animationMode === 'Zero-G Orbit') {
                    // Gentle uniform rotation around Y axis
                    const swirl = 0.006;
                    fx += -z * swirl - x * 0.0005;
                    fz += x * swirl - z * 0.0005;
                }

                let cx = Math.floor((x + SPHERE_RADIUS) / GRID_SIZE);
                let cy = Math.floor((y + SPHERE_RADIUS) / GRID_SIZE);
                let cz = Math.floor((z + SPHERE_RADIUS) / GRID_SIZE);
                
                cx = Math.max(0, Math.min(GRID_DIM - 1, cx));
                cy = Math.max(0, Math.min(GRID_DIM - 1, cy));
                cz = Math.max(0, Math.min(GRID_DIM - 1, cz));
                
                const density = cellDensity[cx + cy * GRID_DIM + cz * GRID_DIM2];
                
                if (density > currentTargetDensity) {
                    // Increased jitter significantly to hide grid artifacts completely
                    const jitter = GRID_SIZE * 6.0; 
                    const cellX = cx * GRID_SIZE - SPHERE_RADIUS + GRID_SIZE * 0.5 + (Math.random() - 0.5) * jitter;
                    const cellY = cy * GRID_SIZE - SPHERE_RADIUS + GRID_SIZE * 0.5 + (Math.random() - 0.5) * jitter;
                    const cellZ = cz * GRID_SIZE - SPHERE_RADIUS + GRID_SIZE * 0.5 + (Math.random() - 0.5) * jitter;
                    
                    let dx = x - cellX;
                    let dy = y - cellY;
                    let dz = z - cellZ;
                    
                    if (dx === 0 && dy === 0 && dz === 0) {
                        dx = (Math.random() - 0.5) * 0.01;
                        dy = (Math.random() - 0.5) * 0.01;
                        dz = (Math.random() - 0.5) * 0.01;
                    }
                    
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.01;
                    const force = (density - currentTargetDensity) * currentPressure / dist;
                    
                    fx += dx * force;
                    fy += dy * force;
                    fz += dz * force;
                }

                // Apply movement speed multiplier to the accumulated forces
                vx += fx * params.particleSpeed;
                vy += fy * params.particleSpeed;
                vz += fz * params.particleSpeed;

                // Apply Viscosity (Drag)
                vx *= params.viscosity;
                vy *= params.viscosity;
                vz *= params.viscosity;

                // Update Position
                x += vx;
                y += vy;
                z += vz;

                // Boundary Collision (Spherical container)
                const distFromCenter = Math.sqrt(x * x + y * y + z * z);
                
                if (distFromCenter > SPHERE_RADIUS) {
                    const nx = x / distFromCenter;
                    const ny = y / distFromCenter;
                    const nz = z / distFromCenter;

                    const dot = vx * nx + vy * ny + vz * nz;

                    vx = (vx - 1.5 * dot * nx);
                    vy = (vy - 1.5 * dot * ny);
                    vz = (vz - 1.5 * dot * nz);

                    const clampRadius = SPHERE_RADIUS - 0.01;
                    x = nx * clampRadius;
                    y = ny * clampRadius;
                    z = nz * clampRadius;
                }

                // Write back updated values
                posArray[i3] = x;
                posArray[i3 + 1] = y;
                posArray[i3 + 2] = z;

                velocities[i3] = vx;
                velocities[i3 + 1] = vy;
                velocities[i3 + 2] = vz;
            }

            posAttr.needsUpdate = true;
            controls.update();
            
            // Render using composer for bloom effect
            composer.render();
        }

        // --- Window Resize Handling ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start animation
        animate();
    </script>
</body>
</html>
