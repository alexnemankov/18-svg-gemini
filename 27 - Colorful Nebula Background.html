<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raymarched Nebula - Interactive Shader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        
        /* Premium Info Overlay */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 24px;
            border-radius: 12px;
            color: #fff;
            pointer-events: none;
            transition: opacity 0.5s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            max-width: 280px;
            z-index: 10;
        }
        .info-panel h1 {
            margin: 0 0 8px 0;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #00f0ff, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .info-panel p {
            margin: 4px 0;
            font-size: 13px;
            color: #ccc;
            line-height: 1.4;
        }
        .info-panel .controls-list {
            margin-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 12px;
        }
        .info-panel .control-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .info-panel .control-label {
            color: #888;
        }
        .info-panel .control-key {
            color: #00f0ff;
            font-weight: 600;
        }

        /* Custom lil-gui styling to match modern aesthetic */
        .lil-gui {
            --background-color: rgba(15, 15, 15, 0.85) !important;
            --text-color: #e0e0e0 !important;
            --title-background-color: rgba(30, 30, 30, 0.9) !important;
            --widget-color: rgba(45, 45, 45, 0.8) !important;
            --hover-color: #00f0ff !important;
            --focus-color: #ff007f !important;
            font-family: 'Outfit', sans-serif !important;
            border-radius: 12px !important;
            overflow: hidden !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
        }
        .lil-gui .title {
            font-weight: 600 !important;
            letter-spacing: 0.5px !important;
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>Raymarched Nebula</h1>
        <p>Interactive volumetric fractal shader using webgl raymarching.</p>
        <div class="controls-list">
            <div class="control-item">
                <span class="control-label">Drag Mouse</span>
                <span class="control-key">Pan Space</span>
            </div>
            <div class="control-item">
                <span class="control-label">Scroll Wheel</span>
                <span class="control-key">Zoom In/Out</span>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import GUI from 'lil-gui';

        // --- Global Context ---
        const ctx = {
            cam: null,
            scene_graph: null,
            engine: null,
            shader_props: null,
            perf_clock: new THREE.Clock(),
            pixel_scale: Math.min(window.devicePixelRatio || 1, 0.8),
            zoom: 1.0,
            offset: new THREE.Vector2(0, 0),
            zoomController: null
        };

        // --- GLSL Core ---
        const glsl_fragment = `
            uniform vec3 u_screen;
            uniform float u_ticks;
            
            // Exposed GUI parameters
            uniform float u_time_mul;
            uniform float u_light_fade;
            uniform float u_loop_limit;
            uniform vec4 u_chroma_shift;
            uniform float u_core_radius;
            uniform float u_advance_base;
            uniform float u_noise_freq;
            uniform float u_scatter;

            // Pan and Zoom
            uniform vec2 u_offset;
            uniform float u_zoom;

            // Color customizations
            uniform vec3 u_color_tint;

            // Greenscreen
            uniform float u_greenscreen;
            uniform vec3 u_greenscreen_color;
            uniform float u_gs_sensitivity;

            void main() {
                vec2 fc = gl_FragCoord.xy;
                vec4 acc = vec4(0.0);
                
                float depth = 0.0;
                float step_val = 0.0;
                float t_scaled = u_ticks * u_time_mul;

                // Adjust ray direction using offset and zoom
                vec2 uv = (fc * 2.0 - u_screen.xy) / u_screen.y;
                uv = (uv - u_offset) / u_zoom;
                vec3 ray_dir = normalize(vec3(uv, -1.0));

                for (float k = 0.0; k < 250.0; k++) {
                    // Dynamic break condition
                    if (k >= u_loop_limit) break;

                    vec3 pos = depth * ray_dir;
                    step_val = 1.0;

                    // Space folding and noise generation
                    for (int m = 0; m < 6; m++) {
                        
                        if (step_val > 8.9) break; 
                        
                        vec3 shift = pos.yzx * step_val * u_noise_freq;
                        shift += depth * 0.2;
                        shift += t_scaled;
                        
                        pos += cos(shift) / step_val;
                        
                        step_val *= 1.4285714; 
                    }

                    // Distance field calculation
                    float len_xy = length(pos.xy);
                    float core_diff = abs(u_core_radius - len_xy);
                    
                    // Distributed multiplication
                    step_val = u_advance_base + (core_diff * 0.1);
                    depth += step_val;

                    // Volumetric integration
                    float scatter_factor = u_scatter / step_val;
                    vec4 tint = cos(depth + u_chroma_shift) + 1.0;
                    
                    // Apply custom master color tint
                    tint.rgb *= u_color_tint;
                    
                    acc += (tint * scatter_factor) / u_light_fade;
                }

                // Apply greenscreen background blending if active
                vec3 final_color = acc.rgb;
                if (u_greenscreen > 0.5) {
                    float max_val = max(acc.r, max(acc.g, acc.b));
                    float volume_opacity = clamp(max_val * u_gs_sensitivity, 0.0, 1.0);
                    final_color = mix(u_greenscreen_color, acc.rgb, volume_opacity);
                }

                gl_FragColor = vec4(final_color, 1.0);
            }
        `;

        const glsl_vertex = `
            void main() {
                gl_Position = vec4(position, 1.0);
            }
        `;

        // --- Bootstrapping ---
        function initialize_engine() {
            // Scene architecture
            ctx.scene_graph = new THREE.Scene();
            ctx.cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            // Renderer configuration
            ctx.engine = new THREE.WebGLRenderer({ antialias: false });
            ctx.engine.setSize(window.innerWidth, window.innerHeight);
            ctx.engine.setPixelRatio(ctx.pixel_scale);
            document.body.appendChild(ctx.engine.domElement);

            // Initial state mapping
            ctx.shader_props = {
                u_ticks: { value: 0 },
                u_screen: { value: new THREE.Vector3(window.innerWidth * ctx.pixel_scale, window.innerHeight * ctx.pixel_scale, 0.8) },
                
                u_time_mul: { value: 0.3 },
                u_light_fade: { value: 2600.0 },
                u_loop_limit: { value: 53.0 },
                u_chroma_shift: { value: new THREE.Vector4(6.3, 7.0, 3.6, 3.0) },
                u_core_radius: { value: 2.1 },
                u_advance_base: { value: 0.045 },
                u_noise_freq: { value: 0.7 },
                u_scatter: { value: 2.0 },

                // Interactive zoom and offset
                u_zoom: { value: 1.0 },
                u_offset: { value: new THREE.Vector2(0, 0) },

                // Color tinting
                u_color_tint: { value: new THREE.Color(1.0, 1.0, 1.0) },

                // Green screen controls
                u_greenscreen: { value: 0.0 },
                u_greenscreen_color: { value: new THREE.Color('#00ff00') },
                u_gs_sensitivity: { value: 3.0 }
            };

            // Construct quad
            const mat = new THREE.ShaderMaterial({
                fragmentShader: glsl_fragment,
                vertexShader: glsl_vertex,
                uniforms: ctx.shader_props,
                depthWrite: false,
                depthTest: false
            });

            const geo = new THREE.PlaneGeometry(2, 2);
            const quad = new THREE.Mesh(geo, mat);
            ctx.scene_graph.add(quad);

            build_interface();

            // Set up interaction events
            setup_interactions();

            window.addEventListener('resize', handle_resize, false);
        }

        // --- Interaction Handlers ---
        function setup_interactions() {
            let isDragging = false;
            const previousMouse = new THREE.Vector2();

            const canvas = ctx.engine.domElement;

            canvas.addEventListener('pointerdown', (e) => {
                isDragging = true;
                previousMouse.set(e.clientX, e.clientY);
            });

            window.addEventListener('pointermove', (e) => {
                if (!isDragging) return;

                const deltaX = e.clientX - previousMouse.x;
                const deltaY = e.clientY - previousMouse.y;
                previousMouse.set(e.clientX, e.clientY);

                // Convert screen delta to UV delta
                const dx = (deltaX * 2.0) / window.innerHeight;
                const dy = -(deltaY * 2.0) / window.innerHeight;

                // Adjust offset
                ctx.offset.x += dx;
                ctx.offset.y += dy;

                ctx.shader_props.u_offset.value.copy(ctx.offset);
            });

            window.addEventListener('pointerup', () => { isDragging = false; });
            window.addEventListener('pointercancel', () => { isDragging = false; });

            window.addEventListener('wheel', (e) => {
                // Determine mouse position in UV space
                const mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                const mouseY = -(e.clientY / window.innerHeight) * 2 + 1;

                const aspect = window.innerWidth / window.innerHeight;
                const uvX = mouseX * aspect;
                const uvY = mouseY;

                // Calculate zoom adjustment
                const zoomFactor = e.deltaY < 0 ? 1.15 : 0.85;
                const newZoom = Math.max(0.05, Math.min(ctx.zoom * zoomFactor, 100.0));

                // Shift offset to zoom relative to mouse coordinates
                ctx.offset.x = uvX - (uvX - ctx.offset.x) * (newZoom / ctx.zoom);
                ctx.offset.y = uvY - (uvY - ctx.offset.y) * (newZoom / ctx.zoom);
                ctx.zoom = newZoom;

                ctx.shader_props.u_zoom.value = ctx.zoom;
                ctx.shader_props.u_offset.value.copy(ctx.offset);

                // Sync GUI zoom slider if present
                if (ctx.zoomController) {
                    ctx.zoomController.setValue(ctx.zoom);
                }
            }, { passive: true });
        }

        // --- Interface Builder ---
        function build_interface() {
            const panel = new GUI({ title: 'Shader Configuration' });
            panel.close(); 

            const bindings = {
                res_scale: ctx.pixel_scale,
                t_multiplier: ctx.shader_props.u_time_mul.value,
                ray_limit: ctx.shader_props.u_loop_limit.value,
                ray_stride: ctx.shader_props.u_advance_base.value,
                attenuation: ctx.shader_props.u_light_fade.value,
                void_radius: ctx.shader_props.u_core_radius.value,
                scattering: ctx.shader_props.u_scatter.value,
                turbulence: ctx.shader_props.u_noise_freq.value,
                ch_red: ctx.shader_props.u_chroma_shift.value.x,
                ch_green: ctx.shader_props.u_chroma_shift.value.y,
                ch_blue: ctx.shader_props.u_chroma_shift.value.z,

                // Custom options bindings
                zoom: ctx.zoom,
                reset_view: () => {
                    ctx.zoom = 1.0;
                    ctx.offset.set(0, 0);
                    ctx.shader_props.u_zoom.value = 1.0;
                    ctx.shader_props.u_offset.value.set(0, 0);
                    if (ctx.zoomController) ctx.zoomController.setValue(1.0);
                },

                // Colors
                master_tint: '#ffffff',

                // Green screen
                gs_enable: false,
                gs_color: '#00ff00',
                gs_sensitivity: ctx.shader_props.u_gs_sensitivity.value
            };

            const opt_group = panel.addFolder('Render Pipeline');
            opt_group.add(bindings, 'res_scale', 0.1, 2.0, 0.1).name('Internal Resolution').onChange(val => {
                ctx.pixel_scale = val;
                ctx.engine.setPixelRatio(val);
                ctx.shader_props.u_screen.value.set(window.innerWidth * val, window.innerHeight * val, 1);
            });
            opt_group.add(bindings, 'ray_limit', 10, 150, 1).name('Ray Limit').onChange(val => ctx.shader_props.u_loop_limit.value = val);
            opt_group.add(bindings, 'ray_stride', 0.01, 0.1, 0.005).name('Ray Stride').onChange(val => ctx.shader_props.u_advance_base.value = val);

            const cam_group = panel.addFolder('Camera & Space');
            ctx.zoomController = cam_group.add(bindings, 'zoom').min(0.05).max(100.0).step(0.01).name('Zoom Factor').listen().onChange(val => {
                ctx.zoom = val;
                ctx.shader_props.u_zoom.value = val;
            });
            cam_group.add(bindings, 'reset_view').name('Reset Viewport');

            const vol_group = panel.addFolder('Volume Properties');
            vol_group.add(bindings, 't_multiplier', 0.0, 3.0, 0.1).name('Time Multiplier').onChange(val => ctx.shader_props.u_time_mul.value = val);
            vol_group.add(bindings, 'scattering', 0.1, 5.0, 0.1).name('Scattering Amount').onChange(val => ctx.shader_props.u_scatter.value = val);
            vol_group.add(bindings, 'turbulence', 0.5, 3.0, 0.1).name('Turbulence Freq').onChange(val => ctx.shader_props.u_noise_freq.value = val);
            vol_group.add(bindings, 'void_radius', 0.5, 10.0, 0.1).name('Void Radius').onChange(val => ctx.shader_props.u_core_radius.value = val);
            vol_group.add(bindings, 'attenuation', 500, 10000, 100).name('Light Attenuation').onChange(val => ctx.shader_props.u_light_fade.value = val);

            const hue_group = panel.addFolder('Palette Config');
            hue_group.addColor(bindings, 'master_tint').name('Master Color Tint').onChange(val => {
                ctx.shader_props.u_color_tint.value.set(val);
            });
            hue_group.add(bindings, 'ch_red', 0, 10, 0.1).name('Channel R Shift').onChange(val => ctx.shader_props.u_chroma_shift.value.x = val);
            hue_group.add(bindings, 'ch_green', 0, 10, 0.1).name('Channel G Shift').onChange(val => ctx.shader_props.u_chroma_shift.value.y = val);
            hue_group.add(bindings, 'ch_blue', 0, 10, 0.1).name('Channel B Shift').onChange(val => ctx.shader_props.u_chroma_shift.value.z = val);

            const gs_group = panel.addFolder('Green Screen');
            gs_group.add(bindings, 'gs_enable').name('Enable Greenscreen').onChange(val => {
                ctx.shader_props.u_greenscreen.value = val ? 1.0 : 0.0;
            });
            gs_group.addColor(bindings, 'gs_color').name('Greenscreen Color').onChange(val => {
                ctx.shader_props.u_greenscreen_color.value.set(val);
            });
            gs_group.add(bindings, 'gs_sensitivity', 0.5, 10.0, 0.1).name('Key Sensitivity').onChange(val => {
                ctx.shader_props.u_gs_sensitivity.value = val;
            });
        }

        // --- Window Events ---
        function handle_resize() {
            ctx.engine.setSize(window.innerWidth, window.innerHeight);
            ctx.shader_props.u_screen.value.set(
                window.innerWidth * ctx.pixel_scale, 
                window.innerHeight * ctx.pixel_scale, 
                1
            );
        }

        // --- Main Loop ---
        function trigger_render() {
            requestAnimationFrame(trigger_render);
            
            ctx.shader_props.u_ticks.value = ctx.perf_clock.getElapsedTime();
            ctx.engine.render(ctx.scene_graph, ctx.cam);
        }

        // Let's go
        initialize_engine();
        trigger_render();
    </script>
</body>
</html>
