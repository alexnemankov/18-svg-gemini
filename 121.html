  <script type="module">
    import * as THREE from "https://esm.sh/three@0.124.0";
    import ky from "https://esm.sh/kyouka@1.2.5";
    import { OrbitControls } from "https://esm.sh/three@0.124.0/examples/jsm/controls/OrbitControls";

    const calcAspect = (el) => el.clientWidth / el.clientHeight;

    const getNormalizedMousePos = (e) => {
      return {
        x: (e.clientX / window.innerWidth) * 2 - 1,
        y: -(e.clientY / window.innerHeight) * 2 + 1
      };
    };

    const spikyBlobVertexShader = `
#define GLSLIFY 1
//
// Description : Array and textureless GLSL 2D/3D/4D simplex
//               noise functions.
//      Author : Ian McEwan, Ashima Arts.
//  Maintainer : ijm
//     Lastmod : 20110822 (ijm)
//     License : Copyright (C) 2011 Ashima Arts. All rights reserved.
//               Distributed under the MIT License. See LICENSE file.
//               https://github.com/ashima/webgl-noise
//

vec4 mod289(vec4 x) {
  return x - floor(x * (1.0 / 289.0)) * 289.0; }

float mod289(float x) {
  return x - floor(x * (1.0 / 289.0)) * 289.0; }

vec4 permute(vec4 x) {
     return mod289(((x*34.0)+1.0)*x);
}

float permute(float x) {
     return mod289(((x*34.0)+1.0)*x);
}

vec4 taylorInvSqrt(vec4 r)
{
  return 1.79284291400159 - 0.85373472095314 * r;
}

float taylorInvSqrt(float r)
{
  return 1.79284291400159 - 0.85373472095314 * r;
}

vec4 grad4(float j, vec4 ip)
  {
  const vec4 ones = vec4(1.0, 1.0, 1.0, -1.0);
  vec4 p,s;

  p.xyz = floor( fract (vec3(j) * ip.xyz) * 7.0) * ip.z - 1.0;
  p.w = 1.5 - dot(abs(p.xyz), ones.xyz);
  s = vec4(lessThan(p, vec4(0.0)));
  p.xyz = p.xyz + (s.xyz*2.0 - 1.0) * s.www;

  return p;
  }

// (sqrt(5) - 1)/4 = F4, used once below
#define F4 0.309016994374947451

float snoise(vec4 v)
  {
  const vec4  C = vec4( 0.138196601125011,  // (5 - sqrt(5))/20  G4
                        0.276393202250021,  // 2 * G4
                        0.414589803375032,  // 3 * G4
                       -0.447213595499958); // -1 + 4 * G4

// First corner
  vec4 i  = floor(v + dot(v, vec4(F4)) );
  vec4 x0 = v -   i + dot(i, C.xxxx);

// Other corners

// Rank sorting originally contributed by Bill Licea-Kane, AMD (formerly ATI)
  vec4 i0;
  vec3 isX = step( x0.yzw, x0.xxx );
  vec3 isYZ = step( x0.zww, x0.yyz );
//  i0.x = dot( isX, vec3( 1.0 ) );
  i0.x = isX.x + isX.y + isX.z;
  i0.yzw = 1.0 - isX;
//  i0.y += dot( isYZ.xy, vec2( 1.0 ) );
  i0.y += isYZ.x + isYZ.y;
  i0.zw += 1.0 - isYZ.xy;
  i0.z += isYZ.z;
  i0.w += 1.0 - isYZ.z;

  // i0 now contains the unique values 0,1,2,3 in each channel
  vec4 i3 = clamp( i0, 0.0, 1.0 );
  vec4 i2 = clamp( i0-1.0, 0.0, 1.0 );
  vec4 i1 = clamp( i0-2.0, 0.0, 1.0 );

  //  x0 = x0 - 0.0 + 0.0 * C.xxxx
  //  x1 = x0 - i1  + 1.0 * C.xxxx
  //  x2 = x0 - i2  + 2.0 * C.xxxx
  //  x3 = x0 - i3  + 3.0 * C.xxxx
  //  x4 = x0 - 1.0 + 4.0 * C.xxxx
  vec4 x1 = x0 - i1 + C.xxxx;
  vec4 x2 = x0 - i2 + C.yyyy;
  vec4 x3 = x0 - i3 + C.zzzz;
  vec4 x4 = x0 + C.wwww;

// Permutations
  i = mod289(i);
  float j0 = permute( permute( permute( permute(i.w) + i.z) + i.y) + i.x);
  vec4 j1 = permute( permute( permute( permute (
             i.w + vec4(i1.w, i2.w, i3.w, 1.0 ))
           + i.z + vec4(i1.z, i2.z, i3.z, 1.0 ))
           + i.y + vec4(i1.y, i2.y, i3.y, 1.0 ))
           + i.x + vec4(i1.x, i2.x, i3.x, 1.0 ));

// Gradients: 7x7x6 points over a cube, mapped onto a 4-cross polytope
// 7*7*6 = 294, which is close to the ring size 17*17 = 289.
  vec4 ip = vec4(1.0/294.0, 1.0/49.0, 1.0/7.0, 0.0) ;

  vec4 p0 = grad4(j0,   ip);
  vec4 p1 = grad4(j1.x, ip);
  vec4 p2 = grad4(j1.y, ip);
  vec4 p3 = grad4(j1.z, ip);
  vec4 p4 = grad4(j1.w, ip);

// Normalise gradients
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
  p0 *= norm.x;
  p1 *= norm.y;
  p2 *= norm.z;
  p3 *= norm.w;
  p4 *= taylorInvSqrt(dot(p4,p4));

// Mix contributions from the five corners
  vec3 m0 = max(0.6 - vec3(dot(x0,x0), dot(x1,x1), dot(x2,x2)), 0.0);
  vec2 m1 = max(0.6 - vec2(dot(x3,x3), dot(x4,x4)            ), 0.0);
  m0 = m0 * m0;
  m1 = m1 * m1;
  return 49.0 * ( dot(m0*m0, vec3( dot( p0, x0 ), dot( p1, x1 ), dot( p2, x2 )))
               + dot(m1*m1, vec2( dot( p3, x3 ), dot( p4, x4 ) ) ) ) ;

  }

uniform float uSpikeCount;
uniform float uSpikeLength;
uniform vec2 uImpulse;
uniform float uSceneRotationY;

varying vec2 vUv;
varying vec3 vPosition;
varying float vNoise;

vec3 impulsePos(vec3 pos,vec2 impulse,float intensity){
    // hor x,z
    float angleH=atan(pos.z,pos.x);
    float hLength=length(vec2(pos.z,pos.x));
    float xStrength=intensity*impulse.x;
    float xPos=hLength*cos(angleH+xStrength);
    float zPos=hLength*sin(angleH+xStrength);
    // ver y
    float zPos2=hLength*sin(angleH+xStrength-uSceneRotationY);
    float yStrength=intensity*impulse.y;
    float angleV=atan(zPos2,pos.y)-yStrength;
    float vLength=length(vec2(zPos2,pos.y));
    float yPos=vLength*cos(angleV);
    pos=vec3(xPos,yPos,zPos);
    return pos;
}

void main(){
    float noise=snoise(vec4(position*uSpikeCount,10.)*uSpikeLength)*.5;
    vec3 newPos=position+noise*normal;
    float intensity=noise*5.;
    newPos=impulsePos(newPos,uImpulse,intensity);
    vec4 modelPosition=modelMatrix*vec4(newPos,1.);
    vec4 viewPosition=viewMatrix*modelPosition;
    vec4 projectedPosition=projectionMatrix*viewPosition;
    gl_Position=projectedPosition;
    
    vUv=uv;
    vPosition=position;
    vNoise=noise;
}
`;

    const spikyBlobFragmentShader = `
#define GLSLIFY 1
//
// Description : Array and textureless GLSL 2D/3D/4D simplex
//               noise functions.
//      Author : Ian McEwan, Ashima Arts.
//  Maintainer : ijm
//     Lastmod : 20110822 (ijm)
//     License : Copyright (C) 2011 Ashima Arts. All rights reserved.
//               Distributed under the MIT License. See LICENSE file.
//               https://github.com/ashima/webgl-noise
//

vec3 mod289(vec3 x) {
  return x - floor(x * (1.0 / 289.0)) * 289.0;
}

vec4 mod289(vec4 x) {
  return x - floor(x * (1.0 / 289.0)) * 289.0;
}

vec4 permute(vec4 x) {
     return mod289(((x*34.0)+1.0)*x);
}

vec4 taylorInvSqrt(vec4 r)
{
  return 1.79284291400159 - 0.85373472095314 * r;
}

float snoise(vec3 v)
  {
  const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
  const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);

// First corner
  vec3 i  = floor(v + dot(v, C.yyy) );
  vec3 x0 =   v - i + dot(i, C.xxx) ;

// Other corners
  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min( g.xyz, l.zxy );
  vec3 i2 = max( g.xyz, l.zxy );

  //   x0 = x0 - 0.0 + 0.0 * C.xxx;
  //   x1 = x0 - i1  + 1.0 * C.xxx;
  //   x2 = x0 - i2  + 2.0 * C.xxx;
  //   x3 = x0 - 1.0 + 3.0 * C.xxx;
  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyyy; // 2.0*C.x = 1/3 = C.y
  vec3 x3 = x0 - D.yyy;      // -1.0+3.0*C.x = -0.5 = -D.y

// Permutations
  i = mod289(i);
  vec4 p = permute( permute( permute(
             i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
           + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
           + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));

// Gradients: 7x7 points over a square, mapped onto an octahedron.
// The ring size 17*17 = 289 is close to a multiple of 49 (49*6 = 294)
  float n_ = 0.142857142857; // 1.0/7.0
  vec3  ns = n_ * D.wyz - D.xzx;

  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);  //  mod(p,7*7)

  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_ );    // mod(j,N)

  vec4 x = x_ *ns.x + ns.yyyy;
  vec4 y = y_ *ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);

  vec4 b0 = vec4( x.xy, y.xy );
  vec4 b1 = vec4( x.zw, y.zw );

  //vec4 s0 = vec4(lessThan(b0,0.0))*2.0 - 1.0;
  //vec4 s1 = vec4(lessThan(b1,0.0))*2.0 - 1.0;
  vec4 s0 = floor(b0)*2.0 + 1.0;
  vec4 s1 = floor(b1)*2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));

  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;

  vec3 p0 = vec3(a0.xy,h.x);
  vec3 p1 = vec3(a0.zw,h.y);
  vec3 p2 = vec3(a1.xy,h.z);
  vec3 p3 = vec3(a1.zw,h.w);

//Normalise gradients
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
  p0 *= norm.x;
  p1 *= norm.y;
  p2 *= norm.z;
  p3 *= norm.w;

// Mix final noise value
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1),
                                dot(p2,x2), dot(p3,x3) ) );
  }

const float PI = 3.14159265359;

uniform float uTime;
uniform vec2 uMouse;
uniform vec2 uResolution;
uniform vec3 uColor1;
uniform vec3 uColor2;
uniform float uSpikeLength;

varying vec2 vUv;
varying vec3 vPosition;
varying float vNoise;

void main(){
    float strength=snoise(vec3(vUv*8.,uTime*.02))*.5+.5;
    vec3 color=mix(uColor1,uColor2,strength);
    float sine=sin(vUv.x*PI);
    float darkness=vNoise/uSpikeLength+1.;
    color*=(sine*.6+.4)*darkness;
    gl_FragColor=vec4(color,1.);
}
`;

    const colorPresets = {
      'Sunset Glow': { c1: '#f04155', c2: '#fff7bd' },
      'Cosmic Nebula': { c1: '#8a2be2', c2: '#ff007f' },
      'Deep Ocean': { c1: '#0055ff', c2: '#00ffaa' },
      'Cyberpunk Grid': { c1: '#ff0055', c2: '#00f2fe' },
      'Forest Mystique': { c1: '#11998e', c2: '#38ef7d' }
    };

    class Base {
      constructor(sel, debug = false) {
        this.debug = debug;
        this.container = document.querySelector(sel);
        this.perspectiveCameraParams = {
          fov: 75,
          near: 0.1,
          far: 100
        };
        this.orthographicCameraParams = {
          zoom: 2,
          near: -100,
          far: 1000
        };
        this.cameraPosition = new THREE.Vector3(0, 3, 10);
        this.lookAtPosition = new THREE.Vector3(0, 0, 0);
        this.rendererParams = {
          outputEncoding: THREE.LinearEncoding,
          config: {
            alpha: true,
            antialias: true
          }
        };
        this.mousePos = new THREE.Vector2(0, 0);
        this.mouseSpeed = 0;
      }
      // 初始化
      init() {
        this.createScene();
        this.createPerspectiveCamera();
        this.createRenderer();
        this.createMesh({});
        this.createLight();
        this.createOrbitControls();
        this.addListeners();
        this.setLoop();
      }
      // 创建场景
      createScene() {
        const scene = new THREE.Scene();
        if (this.debug) {
          scene.add(new THREE.AxesHelper());
          const stats = Stats();
          this.container.appendChild(stats.dom);
          this.stats = stats;
        }
        this.scene = scene;
      }
      // 创建透视相机
      createPerspectiveCamera() {
        const { perspectiveCameraParams, cameraPosition, lookAtPosition } = this;
        const { fov, near, far } = perspectiveCameraParams;
        const aspect = calcAspect(this.container);
        const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
        camera.position.copy(cameraPosition);
        camera.lookAt(lookAtPosition);
        this.camera = camera;
      }
      // 创建正交相机
      createOrthographicCamera() {
        const { orthographicCameraParams, cameraPosition, lookAtPosition } = this;
        const { left, right, top, bottom, near, far } = orthographicCameraParams;
        const camera = new THREE.OrthographicCamera(
          left,
          right,
          top,
          bottom,
          near,
          far
        );
        camera.position.copy(cameraPosition);
        camera.lookAt(lookAtPosition);
        this.camera = camera;
      }
      // 更新正交相机参数
      updateOrthographicCameraParams() {
        const { container } = this;
        const { zoom, near, far } = this.orthographicCameraParams;
        const aspect = calcAspect(container);
        this.orthographicCameraParams = {
          left: -zoom * aspect,
          right: zoom * aspect,
          top: zoom,
          bottom: -zoom,
          near,
          far,
          zoom
        };
      }
      // 创建渲染
      createRenderer(useWebGL1 = false) {
        const { rendererParams } = this;
        const { outputEncoding, config } = rendererParams;
        const renderer = !useWebGL1
          ? new THREE.WebGLRenderer(config)
          : new THREE.WebGL1Renderer(config);
        renderer.setSize(this.container.clientWidth, this.container.clientHeight);
        renderer.outputEncoding = outputEncoding;
        this.resizeRendererToDisplaySize();
        this.container.appendChild(renderer.domElement);
        this.renderer = renderer;
        this.renderer.setClearColor(0x000000, 0);
      }
      // 允许投影
      enableShadow() {
        this.renderer.shadowMap.enabled = true;
      }
      // 调整渲染器尺寸
      resizeRendererToDisplaySize() {
        const { renderer } = this;
        if (!renderer) {
          return;
        }
        const canvas = renderer.domElement;
        const pixelRatio = this.params?.dpr || window.devicePixelRatio;
        const { clientWidth, clientHeight } = canvas;
        const width = (clientWidth * pixelRatio) | 0;
        const height = (clientHeight * pixelRatio) | 0;
        const isResizeNeeded = canvas.width !== width || canvas.height !== height;
        if (isResizeNeeded) {
          renderer.setSize(width, height, false);
        }
        return isResizeNeeded;
      }
      // 创建网格
      createMesh(
        meshObject,
        container = this.scene
      ) {
        const {
          geometry = new THREE.BoxGeometry(1, 1, 1),
          material = new THREE.MeshStandardMaterial({
            color: new THREE.Color("#d9dfc8")
          }),
          position = new THREE.Vector3(0, 0, 0)
        } = meshObject || {};
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(position);
        container.add(mesh);
        return mesh;
      }
      // 创建光源
      createLight() {
        const dirLight = new THREE.DirectionalLight(
          new THREE.Color("#ffffff"),
          0.5
        );
        dirLight.position.set(0, 50, 0);
        this.scene.add(dirLight);
        const ambiLight = new THREE.AmbientLight(new THREE.Color("#ffffff"), 0.4);
        this.scene.add(ambiLight);
      }
      // 创建轨道控制
      createOrbitControls() {
        const controls = new OrbitControls(this.camera, this.renderer.domElement);
        const { lookAtPosition } = this;
        controls.target.copy(lookAtPosition);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = true;
        controls.update();
        this.controls = controls;
      }
      // 监听事件
      addListeners() {
        this.onResize();
      }
      // 监听画面缩放
      onResize() {
        window.addEventListener("resize", (e) => {
          if (this.shaderMaterial) {
            this.shaderMaterial.uniforms.uResolution.value.x = window.innerWidth;
            this.shaderMaterial.uniforms.uResolution.value.y = window.innerHeight;
            this.renderer.setSize(window.innerWidth, window.innerHeight);
          } else {
            if (this.camera instanceof THREE.PerspectiveCamera) {
              const aspect = calcAspect(this.container);
              const camera = this.camera;
              camera.aspect = aspect;
              camera.updateProjectionMatrix();
            } else if (this.camera instanceof THREE.OrthographicCamera) {
              this.updateOrthographicCameraParams();
              const camera = this.camera;
              const {
                left,
                right,
                top,
                bottom,
                near,
                far
              } = this.orthographicCameraParams;
              camera.left = left;
              camera.right = right;
              camera.top = top;
              camera.bottom = bottom;
              camera.near = near;
              camera.far = far;
              camera.updateProjectionMatrix();
            }
            this.renderer.setSize(
              this.container.clientWidth,
              this.container.clientHeight
            );
          }
        });
      }
      // 动画
      update() {
        console.log("animation");
      }
      // 渲染
      setLoop() {
        this.renderer.setAnimationLoop(() => {
          this.resizeRendererToDisplaySize();
          this.update();
          if (this.controls) {
            this.controls.update();
          }
          if (this.stats) {
            this.stats.update();
          }
          if (this.composer) {
            this.composer.render();
          } else {
            this.renderer.render(this.scene, this.camera);
          }
        });
      }
      // 创建文本
      createText(
        text = "",
        config,
        material = new THREE.MeshStandardMaterial({
          color: "#ffffff"
        })
      ) {
        const geo = new THREE.TextGeometry(text, config);
        const mesh = new THREE.Mesh(geo, material);
        return mesh;
      }
      // 创建音效源
      createAudioSource() {
        const listener = new THREE.AudioListener();
        this.camera.add(listener);
        const sound = new THREE.Audio(listener);
        this.sound = sound;
      }
      // 加载音效
      loadAudio(url) {
        const loader = new THREE.AudioLoader();
        return new Promise((resolve) => {
          loader.load(url, (buffer) => {
            this.sound.setBuffer(buffer);
            resolve(buffer);
          });
        });
      }
      // 加载模型
      loadModel(url) {
        const loader = new GLTFLoader();
        return new Promise((resolve, reject) => {
          loader.load(
            url,
            (gltf) => {
              const model = gltf.scene;
              console.log(model);
              resolve(model);
            },
            undefined,
            (err) => {
              console.log(err);
              reject();
            }
          );
        });
      }
      // 加载FBX模型
      loadFBXModel(url) {
        const loader = new FBXLoader();
        return new Promise((resolve, reject) => {
          loader.load(
            url,
            (obj) => {
              resolve(obj);
            },
            undefined,
            (err) => {
              console.log(err);
              reject();
            }
          );
        });
      }
      // 加载字体
      loadFont(url) {
        const loader = new THREE.FontLoader();
        return new Promise((resolve) => {
          loader.load(url, (font) => {
            resolve(font);
          });
        });
      }
      // 创建点选模型
      createRaycaster() {
        this.raycaster = new THREE.Raycaster();
        this.trackMousePos();
      }
      // 追踪鼠标位置
      trackMousePos() {
        window.addEventListener("mousemove", (e) => {
          this.setMousePos(e);
        });
        window.addEventListener(
          "touchstart",
          (e) => {
            this.setMousePos(e.touches[0]);
          },
          { passive: false }
        );
        window.addEventListener("touchmove", (e) => {
          this.setMousePos(e.touches[0]);
        });
      }
      // 设置鼠标位置
      setMousePos(e) {
        const { x, y } = getNormalizedMousePos(e);
        this.mousePos.x = x;
        this.mousePos.y = y;
      }
      // 获取点击物
      getInterSects() {
        this.raycaster.setFromCamera(this.mousePos, this.camera);
        const intersects = this.raycaster.intersectObjects(
          this.scene.children,
          true
        );
        return intersects;
      }
      // 选中点击物时
      onChooseIntersect(target) {
        const intersects = this.getInterSects();
        const intersect = intersects[0];
        if (!intersect || !intersect.face) {
          return null;
        }
        const { object } = intersect;
        return target === object ? intersect : null;
      }
      // 获取跟屏幕同像素的fov角度
      getScreenFov() {
        return ky.rad2deg(
          2 * Math.atan(window.innerHeight / 2 / this.cameraPosition.z)
        );
      }
      // 获取重心坐标系
      getBaryCoord(bufferGeometry) {
        // https://gist.github.com/mattdesl/e399418558b2b52b58f5edeafea3c16c
        const length = bufferGeometry.attributes.position.array.length;
        const count = length / 3;
        const bary = [];
        for (let i = 0; i < count; i++) {
          bary.push(0, 0, 1, 0, 1, 0, 1, 0, 0);
        }
        const aCenter = new Float32Array(bary);
        bufferGeometry.setAttribute(
          "aCenter",
          new THREE.BufferAttribute(aCenter, 3)
        );
      }
      // 追踪鼠标速度
      trackMouseSpeed() {
        // https://stackoverflow.com/questions/6417036/track-mouse-speed-with-js
        let lastMouseX = -1;
        let lastMouseY = -1;
        let mouseSpeed = 0;
        window.addEventListener("mousemove", (e) => {
          const mousex = e.pageX;
          const mousey = e.pageY;
          if (lastMouseX > -1) {
            mouseSpeed = Math.max(
              Math.abs(mousex - lastMouseX),
              Math.abs(mousey - lastMouseY)
            );
            this.mouseSpeed = mouseSpeed / 100;
          }
          lastMouseX = mousex;
          lastMouseY = mousey;
        });
        document.addEventListener("mouseleave", () => {
          this.mouseSpeed = 0;
        });
      }
      // 使用PCFSoft阴影
      usePCFSoftShadowMap() {
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      }
      // 使用VSM阴影
      useVSMShadowMap() {
        this.renderer.shadowMap.type = THREE.VSMShadowMap;
      }
      // 将相机的方向设为z轴
      setCameraUpZ() {
        this.camera.up.set(0, 0, 1);
      }
    }

    class SpikyBlob extends Base {
      constructor(sel, debug) {
        super(sel, debug);
        this.clock = new THREE.Clock();
        this.customTime = 0;
        this.userRadius = 3.0;
        this.cameraPosition = new THREE.Vector3(0, 0, 3);
        const color = ["#f04155", "#ff823a", "#f2f26f", "#fff7bd", "#95cfb7"];
        this.currentColor = color;
        this.params = {
          spikeCount: 18,
          spikeLength: 2,
          impulseIntensity: {
            x: 1.6,
            y: 0.4
          },
          rotationAcceleration: 0.24,
          impulseDecay: {
            x: 0.9,
            y: 0.9
          },
          rotationYSpeed: 0.001,
          greenscreen: false,
          colorPreset: 'Sunset Glow',
          color1: color[0],
          color2: color[3],
          dpr: Math.min(window.devicePixelRatio, 2.0),
          animationSpeed: 1.0,
          animationPreset: 'Static'
        };
        this.impulse = {
          x: 0,
          y: 0
        };
        this.lastMousePos = {
          x: 0,
          y: 0
        };
      }
      // 初始化
      init() {
        this.createScene();
        this.createPerspectiveCamera();
        this.createRenderer();
        this.createSpikyBlobMaterial();
        this.createSphere();
        this.createLight();
        this.trackMousePos();
        this.createOrbitControls();
        this.createDebugPanel();
        this.setupUIKeys();
        this.addListeners();
        this.updateBackground();
        this.setLoop();
      }
      // 创建材质
      createSpikyBlobMaterial() {
        const spikyBlobMaterial = new THREE.ShaderMaterial({
          vertexShader: spikyBlobVertexShader,
          fragmentShader: spikyBlobFragmentShader,
          side: THREE.DoubleSide,
          uniforms: {
            uTime: {
              value: 0
            },
            uMouse: {
              value: new THREE.Vector2(0, 0)
            },
            uResolution: {
              value: new THREE.Vector2(window.innerWidth, window.innerHeight)
            },
            uSpikeCount: {
              value: this.params.spikeCount
            },
            uSpikeLength: {
              value: this.params.spikeLength
            },
            uColor1: {
              value: new THREE.Color(this.params.color1)
            },
            uColor2: {
              value: new THREE.Color(this.params.color2)
            },
            uImpulse: {
              value: new THREE.Vector2(this.impulse.x, this.impulse.y)
            },
            uSceneRotationY: {
              value: 0
            }
          }
        });
        this.spikyBlobMaterial = spikyBlobMaterial;
      }
      // 创建球体
      createSphere() {
        const geometry = new THREE.SphereGeometry(1, 256, 256);
        const material = this.spikyBlobMaterial;
        const mesh = this.createMesh({
          geometry,
          material
        });
        this.spikyBlob = mesh;
      }
      // 根据鼠标移动计算力的大小
      calcImpulse() {
        const mousePos = this.mousePos;
        const deltaX = mousePos.x - this.lastMousePos.x;
        const deltaY = mousePos.y - this.lastMousePos.y;
        const direction =
          ((this.spikyBlob.rotation.x + Math.PI / 2) / Math.PI) % 2 > 1 ? -1 : 1;
        this.impulse.x += deltaX * this.params.impulseIntensity.x * direction;
        this.impulse.y -= deltaY * this.params.impulseIntensity.y;
        this.impulse.x *= this.params.impulseDecay.x;
        this.impulse.y *= this.params.impulseDecay.y;
        this.lastMousePos = { ...mousePos };
      }
      // 动画
      update() {
        const delta = this.clock.getDelta();
        const speed = this.params.animationSpeed;
        this.customTime += delta * speed;
        
        const mousePos = this.mousePos;
        const t = this.customTime;

        if (this.spikyBlobMaterial) {
          this.spikyBlobMaterial.uniforms.uTime.value = t;
          this.spikyBlobMaterial.uniforms.uMouse.value = mousePos;
          this.calcImpulse();
          this.spikyBlob.rotation.y +=
            (this.impulse.x * this.params.rotationAcceleration +
            this.params.rotationYSpeed) * speed;
          this.spikyBlob.rotation.x +=
            this.impulse.y * this.params.rotationAcceleration * speed;
          this.spikyBlobMaterial.uniforms.uSceneRotationY.value = this.spikyBlob.rotation.y;
          this.spikyBlobMaterial.uniforms.uImpulse.value.set(
            this.impulse.x,
            this.impulse.y
          );
        }

        // Camera Animation
        if (this.controls) {
          if (this.params.animationPreset === 'Slow Orbit') {
            const angle = t * 0.15;
            this.camera.position.x = this.controls.target.x + Math.sin(angle) * this.userRadius;
            this.camera.position.z = this.controls.target.z + Math.cos(angle) * this.userRadius;
            this.camera.position.y = this.controls.target.y;
          } else if (this.params.animationPreset === 'Vertical Wave') {
            const angle = t * 0.3;
            this.camera.position.y = this.controls.target.y + Math.sin(angle) * (this.userRadius * 0.4);
          } else if (this.params.animationPreset === 'Deep Pulse') {
            const angle = t * 0.25;
            const currentRadius = this.userRadius + Math.sin(angle) * (this.userRadius * 0.3);
            const dir = new THREE.Vector3().subVectors(this.camera.position, this.controls.target).normalize();
            this.camera.position.copy(this.controls.target).addScaledVector(dir, currentRadius);
          } else if (this.params.animationPreset === 'Infinity Loop') {
            const angle = t * 0.2;
            const radiusX = this.userRadius;
            const radiusZ = this.userRadius * 0.6;
            this.camera.position.x = this.controls.target.x + Math.sin(angle) * radiusX;
            this.camera.position.z = this.controls.target.z + Math.sin(angle * 2) * radiusZ;
            this.camera.position.y = this.controls.target.y + Math.cos(angle) * (this.userRadius * 0.3);
          }
        }
      }
      // 创建调试面板
      createDebugPanel() {
        const gui = new GUI({ title: 'Settings', width: 300 });
        this.gui = gui;
        this.guiVisible = true;

        // Greenscreen
        gui.add(this.params, 'greenscreen').name('Green Screen').onChange(() => {
          this.updateBackground();
        });

        // Color Presets
        const colorPresetNames = Object.keys(colorPresets).concat(['Custom']);
        const presetController = gui.add(this.params, 'colorPreset', colorPresetNames).name('Color Preset').onChange((value) => {
          this.applyColorPreset(value);
        });

        // Custom Colors
        const colorsFolder = gui.addFolder('Custom Colors');
        this.color1Controller = colorsFolder.addColor(this.params, 'color1').name('Color 1').onChange((value) => {
          this.spikyBlobMaterial.uniforms.uColor1.value.set(value);
          this.params.colorPreset = 'Custom';
          presetController.updateDisplay();
        });
        this.color2Controller = colorsFolder.addColor(this.params, 'color2').name('Color 2').onChange((value) => {
          this.spikyBlobMaterial.uniforms.uColor2.value.set(value);
          this.params.colorPreset = 'Custom';
          presetController.updateDisplay();
        });
        colorsFolder.close();

        // Pixel Ratio (DPR)
        gui.add(this.params, 'dpr', 0.5, 2.5, 0.1).name('Pixel Ratio').onChange((value) => {
          this.renderer.setPixelRatio(value);
          this.resizeRendererToDisplaySize();
        });

        // Animation Speed
        gui.add(this.params, 'animationSpeed', 0.0, 3.0, 0.1).name('Anim Speed');

        // Camera Animations Preset
        const animations = ['Static', 'Slow Orbit', 'Vertical Wave', 'Deep Pulse', 'Infinity Loop'];
        gui.add(this.params, 'animationPreset', animations).name('Camera Anim');
      }
      applyColorPreset(name) {
        const preset = colorPresets[name];
        if (preset) {
          this.params.color1 = preset.c1;
          this.params.color2 = preset.c2;
          this.spikyBlobMaterial.uniforms.uColor1.value.set(preset.c1);
          this.spikyBlobMaterial.uniforms.uColor2.value.set(preset.c2);
          if (this.color1Controller) this.color1Controller.updateDisplay();
          if (this.color2Controller) this.color2Controller.updateDisplay();
        }
      }
      updateBackground() {
        if (this.params.greenscreen) {
          this.renderer.setClearColor(0x00ff00, 1.0);
          if (this.container) {
            this.container.style.backgroundColor = '#00ff00';
          }
        } else {
          this.renderer.setClearColor(0x000000, 0.0);
          if (this.container) {
            this.container.style.backgroundColor = '';
          }
        }
      }
      setupUIKeys() {
        this.isInteracting = false;

        // Toggle UI
        window.addEventListener('keydown', (e) => {
          if (e.key === 'h' || e.key === 'H') {
            if (this.gui) {
              if (this.guiVisible) {
                this.gui.hide();
                this.guiVisible = false;
              } else {
                this.gui.show();
                this.guiVisible = true;
              }
            }
          }
        });

        // Track OrbitControls interaction start/end
        this.controls.addEventListener('start', () => {
          this.isInteracting = true;
        });

        this.controls.addEventListener('end', () => {
          this.isInteracting = false;
          if (this.camera && this.controls) {
            this.userRadius = this.camera.position.distanceTo(this.controls.target);
          }
        });

        // Track Zooming
        window.addEventListener('wheel', () => {
          this.isInteracting = true;
          clearTimeout(this.wheelTimeout);
          this.wheelTimeout = setTimeout(() => {
            this.isInteracting = false;
            if (this.camera && this.controls) {
              this.userRadius = this.camera.position.distanceTo(this.controls.target);
            }
          }, 250);
        });

        // Update zoom radius if changed
        this.controls.addEventListener('change', () => {
          if (this.camera && this.controls) {
            if (this.isInteracting || this.params.animationPreset === 'Static') {
              this.userRadius = this.camera.position.distanceTo(this.controls.target);
            }
          }
        });
      }
    }

    const start = () => {
      const spikyBlob = new SpikyBlob(".spiky-blob", false);
      spikyBlob.init();
    };

    start();
  </script>
</body>
