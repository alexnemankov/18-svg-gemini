<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Particle Nebula</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Megrim&display=swap");

      body {
        overflow: hidden;
        margin: 0;
        background: #000;
        user-select: none;
      }

      #word {
        font-family: Megrim, cursive;
        font-size: 20vh;
        position: absolute;
        margin: 10px;
        color: #fc0;
        -webkit-text-stroke: 0.15vh #c0f;
        pointer-events: none;
        z-index: 10;
        transition: opacity 0.5s ease;
      }

      /* Ensure the lil-gui is on top and has standard styling */
      .lil-gui {
        z-index: 100;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="word">NEBULA</div>

    <script type="module">
      import * as THREE from "https://esm.sh/three@0.136.0";
      import { OrbitControls } from "https://esm.sh/three@0.136.0/examples/jsm/controls/OrbitControls";
      import GUI from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

      console.clear();

      // --- Color Presets ---
      const schemes = {
        "Cosmic Violet (Default)": {
          centerColor: "#e39b00",
          edgeColor: "#6432ff",
          backgroundColor: "#160016",
          wordColor: "#ffcc00",
          wordStrokeColor: "#cc00ff",
        },
        "Supernova Fire": {
          centerColor: "#ff3c00",
          edgeColor: "#ffbb00",
          backgroundColor: "#100300",
          wordColor: "#ff5500",
          wordStrokeColor: "#ffa500",
        },
        "Cyberpunk Neon": {
          centerColor: "#ff007f",
          edgeColor: "#00f0ff",
          backgroundColor: "#05000a",
          wordColor: "#ff007f",
          wordStrokeColor: "#00f0ff",
        },
        "Deep Ocean": {
          centerColor: "#00ffd5",
          edgeColor: "#003bff",
          backgroundColor: "#000511",
          wordColor: "#00ffd5",
          wordStrokeColor: "#003bff",
        },
        "Emerald Matrix": {
          centerColor: "#39ff14",
          edgeColor: "#005500",
          backgroundColor: "#020802",
          wordColor: "#39ff14",
          wordStrokeColor: "#002200",
        },
      };

      // --- Scene Settings ---
      const settings = {
        greenscreen: false,
        colorScheme: "Cosmic Violet (Default)",
        centerColor: "#e39b00",
        edgeColor: "#6432ff",
        backgroundColor: "#160016",
        wordText: "NEBULA",
        wordColor: "#ffcc00",
        wordStrokeColor: "#cc00ff",
        dpr: window.devicePixelRatio || 1,
        speed: 1.0,
        animation: "Orbiting Nebula",
      };

      // --- Initialize Three.js ---
      let scene = new THREE.Scene();
      scene.background = new THREE.Color(settings.backgroundColor);

      let camera = new THREE.PerspectiveCamera(
        60,
        innerWidth / innerHeight,
        1,
        1000,
      );
      camera.position.set(0, 4, 21);

      let renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(settings.dpr);
      document.body.appendChild(renderer.domElement);

      // --- Orbit Controls ---
      let controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.enableZoom = true;
      controls.enablePan = true; // Drag object/camera across the screen

      // --- Shader Uniforms & Materials ---
      let gu = {
        time: { value: 0 },
      };

      let uniforms = {
        uColor1: { value: new THREE.Color(settings.centerColor) },
        uColor2: { value: new THREE.Color(settings.edgeColor) },
      };

      // --- Particle Generation ---
      let sizes = [];
      let shift = [];
      let pushShift = () => {
        shift.push(
          Math.random() * Math.PI,
          Math.random() * Math.PI * 2,
          (Math.random() * 0.9 + 0.1) * Math.PI * 0.1,
          Math.random() * 0.9 + 0.1,
        );
      };
      let pts = new Array(50000).fill().map((p) => {
        sizes.push(Math.random() * 1.5 + 0.5);
        pushShift();
        return new THREE.Vector3()
          .randomDirection()
          .multiplyScalar(Math.random() * 0.5 + 9.5);
      });
      for (let i = 0; i < 100000; i++) {
        let r = 10,
          R = 40;
        let rand = Math.pow(Math.random(), 1.5);
        let radius = Math.sqrt(R * R * rand + (1 - rand) * r * r);
        pts.push(
          new THREE.Vector3().setFromCylindricalCoords(
            radius,
            Math.random() * 2 * Math.PI,
            (Math.random() - 0.5) * 2,
          ),
        );
        sizes.push(Math.random() * 1.5 + 0.5);
        pushShift();
      }

      let g = new THREE.BufferGeometry().setFromPoints(pts);
      g.setAttribute("sizes", new THREE.Float32BufferAttribute(sizes, 1));
      g.setAttribute("shift", new THREE.Float32BufferAttribute(shift, 4));

      let m = new THREE.PointsMaterial({
        size: 0.125,
        transparent: true,
        depthTest: false,
        blending: THREE.AdditiveBlending,
        onBeforeCompile: (shader) => {
          shader.uniforms.time = gu.time;
          shader.uniforms.uColor1 = uniforms.uColor1;
          shader.uniforms.uColor2 = uniforms.uColor2;
          shader.vertexShader = `
          uniform float time;
          uniform vec3 uColor1;
          uniform vec3 uColor2;
          attribute float sizes;
          attribute vec4 shift;
          varying vec3 vColor;
          ${shader.vertexShader}
        `
            .replace(`gl_PointSize = size;`, `gl_PointSize = size * sizes;`)
            .replace(
              `#include <color_vertex>`,
              `#include <color_vertex>
            float d = length(abs(position) / vec3(40., 10., 40));
            d = clamp(d, 0., 1.);
            vColor = mix(uColor1, uColor2, d);
          `,
            )
            .replace(
              `#include <begin_vertex>`,
              `#include <begin_vertex>
            float t = time;
            float moveT = mod(shift.x + shift.z * t, PI2);
            float moveS = mod(shift.y + shift.z * t, PI2);
            transformed += vec3(cos(moveS) * sin(moveT), cos(moveT), sin(moveS) * sin(moveT)) * shift.w;
          `,
            );

          shader.fragmentShader = `
          varying vec3 vColor;
          ${shader.fragmentShader}
        `
            .replace(
              `#include <clipping_planes_fragment>`,
              `#include <clipping_planes_fragment>
            float d = length(gl_PointCoord.xy - 0.5);
          `,
            )
            .replace(
              `vec4 diffuseColor = vec4( diffuse, opacity );`,
              `vec4 diffuseColor = vec4( vColor, smoothstep(0.5, 0.1, d) );`,
            );
        },
      });

      let p = new THREE.Points(g, m);
      p.rotation.order = "ZYX";
      p.rotation.z = 0.2;
      scene.add(p);

      // --- Window Resizing ---
      window.addEventListener("resize", (event) => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

      // --- GUI and Interactions ---
      const gui = new GUI({ title: "Nebula Control" });

      // Track state for auto-animation vs user controls
      let isInteracting = false;
      let interactionTimeout = null;
      let baseTarget = new THREE.Vector3(0, 0, 0);
      let baseDistance = camera.position.distanceTo(baseTarget);
      let speedTime = 0;
      let prevAnimation = settings.animation;

      const stopInteractionDelay = 1000; // ms to wait before resuming animation

      function startUserInteraction() {
        isInteracting = true;
        if (interactionTimeout) clearTimeout(interactionTimeout);
      }

      function endUserInteraction() {
        if (interactionTimeout) clearTimeout(interactionTimeout);
        interactionTimeout = setTimeout(() => {
          isInteracting = false;
          baseTarget.copy(controls.target);
          baseDistance = camera.position.distanceTo(controls.target);
        }, stopInteractionDelay);
      }

      controls.addEventListener("start", startUserInteraction);
      controls.addEventListener("end", endUserInteraction);

      window.addEventListener(
        "wheel",
        () => {
          startUserInteraction();
          endUserInteraction();
        },
        { passive: true },
      );

      // Toggle entire UI (gui + word text)
      let uiVisible = true;
      function updateUIElements() {
        const word = document.getElementById("word");
        if (word) {
          if (!uiVisible || settings.greenscreen) {
            word.style.opacity = "0";
          } else {
            word.style.opacity = "1";
          }
        }
      }

      window.addEventListener("keydown", (event) => {
        if (event.key.toLowerCase() === "h") {
          uiVisible = !uiVisible;
          if (uiVisible) {
            gui.show();
          } else {
            gui.hide();
          }
          updateUIElements();
        }
      });

      // Apply schemes
      function applyScheme(name) {
        const s = schemes[name];
        if (!s) return;

        settings.centerColor = s.centerColor;
        settings.edgeColor = s.edgeColor;
        settings.backgroundColor = s.backgroundColor;
        settings.wordColor = s.wordColor;
        settings.wordStrokeColor = s.wordStrokeColor;

        centerColorCtrl.setValue(settings.centerColor);
        edgeColorCtrl.setValue(settings.edgeColor);
        bgColorCtrl.setValue(settings.backgroundColor);
        wordColorCtrl.setValue(settings.wordColor);
        wordStrokeColorCtrl.setValue(settings.wordStrokeColor);

        uniforms.uColor1.value.set(settings.centerColor);
        uniforms.uColor2.value.set(settings.edgeColor);

        if (!settings.greenscreen) {
          scene.background.set(settings.backgroundColor);
        }

        const word = document.getElementById("word");
        if (word) {
          word.style.color = settings.wordColor;
          word.style.webkitTextStroke = `0.15vh ${settings.wordStrokeColor}`;
        }
      }

      // --- Add GUI Controls ---
      const displayFolder = gui.addFolder("Display");
      displayFolder
        .add(settings, "greenscreen")
        .name("Green Screen")
        .onChange((value) => {
          if (value) {
            scene.background.set("#00ff00");
          } else {
            scene.background.set(settings.backgroundColor);
          }
          updateUIElements();
        });

      const bgColorCtrl = displayFolder
        .addColor(settings, "backgroundColor")
        .name("Background Color")
        .onChange((value) => {
          if (!settings.greenscreen) {
            scene.background.set(value);
          }
        });

      displayFolder
        .add(settings, "dpr", 0.5, 3.0, 0.1)
        .name("Pixel Ratio (DPR)")
        .onChange((value) => {
          renderer.setPixelRatio(value);
        });

      const colorsFolder = gui.addFolder("Color customization");
      colorsFolder
        .add(settings, "colorScheme", Object.keys(schemes))
        .name("Preset Scheme")
        .onChange(applyScheme);

      const centerColorCtrl = colorsFolder
        .addColor(settings, "centerColor")
        .name("Center Color")
        .onChange((value) => {
          uniforms.uColor1.value.set(value);
        });

      const edgeColorCtrl = colorsFolder
        .addColor(settings, "edgeColor")
        .name("Edge Color")
        .onChange((value) => {
          uniforms.uColor2.value.set(value);
        });

      const textFolder = gui.addFolder("Text customization");
      textFolder
        .add(settings, "wordText")
        .name("Text")
        .onChange((value) => {
          const word = document.getElementById("word");
          if (word) word.textContent = value;
        });

      const wordColorCtrl = textFolder
        .addColor(settings, "wordColor")
        .name("Text Color")
        .onChange((value) => {
          const word = document.getElementById("word");
          if (word) word.style.color = value;
        });

      const wordStrokeColorCtrl = textFolder
        .addColor(settings, "wordStrokeColor")
        .name("Text Stroke")
        .onChange((value) => {
          const word = document.getElementById("word");
          if (word) word.style.webkitTextStroke = `0.15vh ${value}`;
        });

      const motionFolder = gui.addFolder("Motion");
      motionFolder
        .add(settings, "speed", 0.0, 3.0, 0.1)
        .name("Animation Speed");
      motionFolder
        .add(settings, "animation", [
          "Orbiting Nebula",
          "Voyage Zoom",
          "Vertical Wave",
          "Cosmic Drift",
          "Static View",
        ])
        .name("Camera Motion");

      // Initialize display values
      applyScheme("Cosmic Violet (Default)");

      // --- Animation Loop ---
      let clock = new THREE.Clock();

      renderer.setAnimationLoop(() => {
        const delta = clock.getDelta();
        speedTime += delta * settings.speed;

        // Handle time uniform update
        let t = speedTime * 0.5;
        gu.time.value = t * Math.PI;

        // Spin particles
        p.rotation.y = t * 0.05;

        // Reset base position on animation switch
        if (settings.animation !== prevAnimation) {
          controls.target.copy(baseTarget);
          controls.autoRotate = false;
          prevAnimation = settings.animation;
        }

        // Camera Movements
        if (!isInteracting) {
          if (settings.animation === "Orbiting Nebula") {
            controls.autoRotate = true;
            controls.autoRotateSpeed = settings.speed * 2.0;
          } else if (settings.animation === "Voyage Zoom") {
            controls.autoRotate = false;
            let dir = new THREE.Vector3()
              .subVectors(camera.position, controls.target)
              .normalize();
            let targetDistance = baseDistance + Math.sin(speedTime * 0.4) * 5;
            camera.position
              .copy(controls.target)
              .addScaledVector(dir, targetDistance);
          } else if (settings.animation === "Vertical Wave") {
            controls.autoRotate = false;
            controls.target.y = baseTarget.y + Math.sin(speedTime * 0.4) * 2;
            camera.position.y =
              baseTarget.y + 4 + Math.sin(speedTime * 0.4) * 3;
          } else if (settings.animation === "Cosmic Drift") {
            controls.autoRotate = false;
            controls.target.x = baseTarget.x + Math.sin(speedTime * 0.3) * 3;
            controls.target.z = baseTarget.z + Math.cos(speedTime * 0.3) * 3;
            camera.position.x = baseTarget.x + Math.sin(speedTime * 0.15) * 5;
          } else {
            controls.autoRotate = false;
          }
        } else {
          controls.autoRotate = false;
        }

        controls.update();
        renderer.render(scene, camera);
      });
    </script>
  </body>
</html>
