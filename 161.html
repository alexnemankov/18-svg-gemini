<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sketchy, But Keeps Spinning</title>
  <style>
    /* --- LIL-GUI DEFAULT STYLES (EMBEDDED LOCALLY TO PREVENT CDN/CORS/CACHE ISSUES) --- */
    .lil-gui {
      font-family: var(--font-family);
      font-size: var(--font-size);
      line-height: 1;
      font-weight: normal;
      font-style: normal;
      text-align: left;
      color: var(--text-color);
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      --background-color: #1f1f1f;
      --text-color: #ebebeb;
      --title-background-color: #111111;
      --title-text-color: #ebebeb;
      --widget-color: #424242;
      --hover-color: #4f4f4f;
      --focus-color: #595959;
      --number-color: #2cc9ff;
      --string-color: #a2db3c;
      --font-size: 11px;
      --input-font-size: 11px;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      --font-family-mono: Menlo, Monaco, Consolas, "Droid Sans Mono", monospace;
      --padding: 4px;
      --spacing: 4px;
      --widget-height: 20px;
      --title-height: calc(var(--widget-height) + var(--spacing) * 1.25);
      --name-width: 45%;
      --slider-knob-width: 2px;
      --slider-input-width: 27%;
      --color-input-width: 27%;
      --slider-input-min-width: 45px;
      --color-input-min-width: 45px;
      --folder-indent: 7px;
      --widget-padding: 0 0 0 3px;
      --widget-border-radius: 2px;
      --checkbox-size: calc(0.75 * var(--widget-height));
      --scrollbar-width: 5px;
    }
    .lil-gui, .lil-gui * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    .lil-gui.root {
      width: var(--width, 245px);
      display: flex;
      flex-direction: column;
      background: var(--background-color);
    }
    .lil-gui.root > .title {
      background: var(--title-background-color);
      color: var(--title-text-color);
    }
    .lil-gui.root > .children {
      overflow-x: hidden;
      overflow-y: auto;
    }
    .lil-gui.root > .children::-webkit-scrollbar {
      width: var(--scrollbar-width);
      height: var(--scrollbar-width);
      background: var(--background-color);
    }
    .lil-gui.root > .children::-webkit-scrollbar-thumb {
      border-radius: var(--scrollbar-width);
      background: var(--focus-color);
    }
    @media (pointer: coarse) {
      .lil-gui.allow-touch-styles, .lil-gui.allow-touch-styles .lil-gui {
        --widget-height: 28px;
        --padding: 6px;
        --spacing: 6px;
        --font-size: 13px;
        --input-font-size: 16px;
        --folder-indent: 10px;
        --scrollbar-width: 7px;
        --slider-input-min-width: 50px;
        --color-input-min-width: 65px;
      }
    }
    .lil-gui.force-touch-styles, .lil-gui.force-touch-styles .lil-gui {
      --widget-height: 28px;
      --padding: 6px;
      --spacing: 6px;
      --font-size: 13px;
      --input-font-size: 16px;
      --folder-indent: 10px;
      --scrollbar-width: 7px;
      --slider-input-min-width: 50px;
      --color-input-min-width: 65px;
    }
    .lil-gui.autoPlace {
      max-height: 100%;
      position: fixed;
      top: 0;
      right: 15px;
      z-index: 1001;
    }
    .lil-gui .controller {
      display: flex;
      align-items: center;
      padding: 0 var(--padding);
      margin: var(--spacing) 0;
    }
    .lil-gui .controller.disabled {
      opacity: 0.5;
    }
    .lil-gui .controller.disabled, .lil-gui .controller.disabled * {
      pointer-events: none !important;
    }
    .lil-gui .controller > .name {
      min-width: var(--name-width);
      flex-shrink: 0;
      white-space: pre;
      padding-right: var(--spacing);
      line-height: var(--widget-height);
    }
    .lil-gui .controller .widget {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      min-height: var(--widget-height);
    }
    .lil-gui .controller.string input {
      color: var(--string-color);
    }
    .lil-gui .controller.boolean {
      cursor: pointer;
    }
    .lil-gui .controller.color .display {
      width: 100%;
      height: var(--widget-height);
      border-radius: var(--widget-border-radius);
      position: relative;
    }
    @media (hover: hover) {
      .lil-gui .controller.color .display:hover:before {
        content: " ";
        display: block;
        position: absolute;
        border-radius: var(--widget-border-radius);
        border: 1px solid #fff9;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
      }
    }
    .lil-gui .controller.color input[type=color] {
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    .lil-gui .controller.color input[type=text] {
      margin-left: var(--spacing);
      font-family: var(--font-family-mono);
      min-width: var(--color-input-min-width);
      width: var(--color-input-width);
      flex-shrink: 0;
    }
    .lil-gui .controller.option select {
      opacity: 0;
      position: absolute;
      width: 100%;
      max-width: 100%;
    }
    .lil-gui .controller.option .display {
      position: relative;
      pointer-events: none;
      border-radius: var(--widget-border-radius);
      height: var(--widget-height);
      line-height: var(--widget-height);
      max-width: 100%;
      overflow: hidden;
      word-break: break-all;
      padding-left: 0.55em;
      padding-right: 1.75em;
      background: var(--widget-color);
    }
    @media (hover: hover) {
      .lil-gui .controller.option .display.focus {
        background: var(--focus-color);
      }
    }
    .lil-gui .controller.option .display.active {
      background: var(--focus-color);
    }
    .lil-gui .controller.option .display:after {
      font-family: "lil-gui";
      content: "↕";
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      padding-right: 0.375em;
    }
    .lil-gui .controller.option .widget,
    .lil-gui .controller.option select {
      cursor: pointer;
    }
    @media (hover: hover) {
      .lil-gui .controller.option .widget:hover .display {
        background: var(--hover-color);
      }
    }
    .lil-gui .controller.number input {
      color: var(--number-color);
    }
    .lil-gui .controller.number.hasSlider input {
      margin-left: var(--spacing);
      width: var(--slider-input-width);
      min-width: var(--slider-input-min-width);
      flex-shrink: 0;
    }
    .lil-gui .controller.number .slider {
      width: 100%;
      height: var(--widget-height);
      background: var(--widget-color);
      border-radius: var(--widget-border-radius);
      padding-right: var(--slider-knob-width);
      overflow: hidden;
      cursor: ew-resize;
      touch-action: pan-y;
    }
    @media (hover: hover) {
      .lil-gui .controller.number .slider:hover {
        background: var(--hover-color);
      }
    }
    .lil-gui .controller.number .slider.active {
      background: var(--focus-color);
    }
    .lil-gui .controller.number .slider.active .fill {
      opacity: 0.95;
    }
    .lil-gui .controller.number .fill {
      height: 100%;
      border-right: var(--slider-knob-width) solid var(--number-color);
      box-sizing: content-box;
    }
    .lil-gui-dragging .lil-gui {
      --hover-color: var(--widget-color);
    }
    .lil-gui-dragging * {
      cursor: ew-resize !important;
    }
    .lil-gui-dragging.lil-gui-vertical * {
      cursor: ns-resize !important;
    }
    .lil-gui .title {
      height: var(--title-height);
      line-height: calc(var(--title-height) - 4px);
      font-weight: 600;
      padding: 0 var(--padding);
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      outline: none;
      text-decoration-skip: objects;
    }
    .lil-gui .title:before {
      font-family: "lil-gui";
      content: "▾";
      padding-right: 2px;
      display: inline-block;
    }
    .lil-gui .title:active {
      background: var(--title-background-color);
      opacity: 0.75;
    }
    @media (hover: hover) {
      body:not(.lil-gui-dragging) .lil-gui .title:hover {
        background: var(--title-background-color);
        opacity: 0.85;
      }
      .lil-gui .title:focus {
        text-decoration: underline var(--focus-color);
      }
    }
    .lil-gui.root > .title:focus {
      text-decoration: none !important;
    }
    .lil-gui.closed > .title:before {
      content: "▸";
    }
    .lil-gui.closed > .children {
      transform: translateY(-7px);
      opacity: 0;
    }
    .lil-gui.closed:not(.transition) > .children {
      display: none;
    }
    .lil-gui.transition > .children {
      transition-duration: 300ms;
      transition-property: height, opacity, transform;
      transition-timing-function: cubic-bezier(0.2, 0.6, 0.35, 1);
      overflow: hidden;
      pointer-events: none;
    }
    .lil-gui .children:empty:before {
      content: "Empty";
      padding: 0 var(--padding);
      margin: var(--spacing) 0;
      display: block;
      height: var(--widget-height);
      font-style: italic;
      line-height: var(--widget-height);
      opacity: 0.5;
    }
    .lil-gui.root > .children > .lil-gui > .title {
      border: 0 solid var(--widget-color);
      border-width: 1px 0;
      transition: border-color 300ms;
    }
    .lil-gui.root > .children > .lil-gui.closed > .title {
      border-bottom-color: transparent;
    }
    .lil-gui + .controller {
      border-top: 1px solid var(--widget-color);
      margin-top: 0;
      padding-top: var(--spacing);
    }
    .lil-gui .lil-gui .lil-gui > .title {
      border: none;
    }
    .lil-gui .lil-gui .lil-gui > .children {
      border: none;
      margin-left: var(--folder-indent);
      border-left: 2px solid var(--widget-color);
    }
    .lil-gui .lil-gui .controller {
      border: none;
    }
    .lil-gui label, .lil-gui input, .lil-gui button {
      -webkit-tap-highlight-color: transparent;
    }
    .lil-gui input {
      border: 0;
      outline: none;
      font-family: var(--font-family);
      font-size: var(--input-font-size);
      border-radius: var(--widget-border-radius);
      height: var(--widget-height);
      background: var(--widget-color);
      color: var(--text-color);
      width: 100%;
    }
    @media (hover: hover) {
      .lil-gui input:hover {
        background: var(--hover-color);
      }
      .lil-gui input:active {
        background: var(--focus-color);
      }
    }
    .lil-gui input:disabled {
      opacity: 1;
    }
    .lil-gui input[type=text],
    .lil-gui input[type=number] {
      padding: var(--widget-padding);
      -moz-appearance: textfield;
    }
    .lil-gui input[type=text]:focus,
    .lil-gui input[type=number]:focus {
      background: var(--focus-color);
    }
    .lil-gui input[type=checkbox] {
      appearance: none;
      width: var(--checkbox-size);
      height: var(--checkbox-size);
      border-radius: var(--widget-border-radius);
      text-align: center;
      cursor: pointer;
    }
    .lil-gui input[type=checkbox]:checked:before {
      font-family: "lil-gui";
      content: "✓";
      font-size: var(--checkbox-size);
      line-height: var(--checkbox-size);
    }
    @media (hover: hover) {
      .lil-gui input[type=checkbox]:focus {
        box-shadow: inset 0 0 0 1px var(--focus-color);
      }
    }
    .lil-gui button {
      outline: none;
      cursor: pointer;
      font-family: var(--font-family);
      font-size: var(--font-size);
      color: var(--text-color);
      width: 100%;
      height: var(--widget-height);
      text-transform: none;
      background: var(--widget-color);
      border-radius: var(--widget-border-radius);
      border: none;
    }
    @media (hover: hover) {
      .lil-gui button:hover {
        background: var(--hover-color);
      }
      .lil-gui button:focus {
        box-shadow: inset 0 0 0 1px var(--focus-color);
      }
    }
    .lil-gui button:active {
      background: var(--focus-color);
    }

    /* --- CUSTOM PREMIUM OVERRIDES FOR LIL-GUI --- */
    .lil-gui {
      position: fixed;
      top: 1em;
      left: 1em;
      right: auto;
      --background-color: rgba(14, 5, 24, 0.88);
      --text-color: #f3ecf9;
      --title-background-color: rgba(36, 12, 60, 0.95);
      --widget-color: rgba(62, 22, 98, 0.6);
      --hover-color: rgba(110, 42, 172, 0.8);
      --focus-color: #dd4aff;
      --number-color: #64dcff;
      --string-color: #ebd758;
      --font-family: system-ui, sans-serif !important;
      --font-size: 13px;
      --widget-height: 24px;
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(221, 74, 255, 0.25);
      backdrop-filter: blur(16px);
      padding: 8px;
      box-sizing: border-box;
      z-index: 1000;
    }

    .lil-gui * {
      box-sizing: border-box;
    }

    /* --- PAGE SCROLLBARS & GENERAL --- */
    ::-webkit-scrollbar {
      width: 0.625rem;
      height: 0.625rem;
    }

    ::-webkit-scrollbar-thumb {
      background: #111;
      border-radius: 0.3125rem;
      box-shadow: inset 0.125rem 0.125rem 0.125rem rgba(255, 255, 255, 0.25),
        inset -0.125rem -0.125rem 0.125rem rgba(0, 0, 0, 0.25);
      cursor: default;
    }

    ::-webkit-scrollbar-track {
      background: #333;
    }

    ::selection {
      background: #fff;
      color: #333;
    }

    html,
    body {
      height: 100vh;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
      background: black;
    }

    body.greenscreen-active {
      background: #00ff00 !important;
    }

    /* Grid layout shifted to wrapper div to isolate lil-gui from grid item behavior */
    .app-layout {
      display: grid;
      grid-template-rows: calc(100dvh - 4rem) 4rem;
      width: 100%;
      height: 100%;
      font-family: system-ui, sans-serif;
    }

    canvas,
    .editor,
    #controls {
      grid-row: 1;
      grid-column: 1;
    }

    canvas {
      --canvas-z-index: -1;
      width: 100%;
      height: auto;
      object-fit: contain;
      background: black;
      touch-action: none;
      z-index: var(--canvas-z-index);
    }

    .editor,
    .overlay,
    #error {
      font-family: 'Courier New', Courier, monospace;
      background: repeating-linear-gradient(0deg, #000a, #1119, #000a .25rem);
      padding: 1em;
    }

    .editor {
      color: #fefefe;
      tab-size: 2;
      border: none;
      resize: none;
    }

    .editor:focus {
      outline: none;
    }

    #error {
      grid-row: 2;
      grid-column: 1;
      margin: 0;
      padding-block: 0;
      padding-top: .5em;
      color: firebrick;
      overflow: auto;
      text-wrap: pretty;
    }

    #indicator {
      visibility: hidden;
      position: absolute;
      top: calc(var(--top, 0px) - var(--scroll-top, 0px));
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 10px solid firebrick;
      transform: translateY(-25%);
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      margin: 0;
    }

    .editor,
    .overlay {
      font-size: 1rem;
      line-height: 1.2;
      white-space: pre;
    }

    #controls {
      position: fixed;
      top: 1em;
      right: 2em;
    }

    .controls {
      position: relative;
      display: flex;
      gap: 1.5em;
      padding: .5em 1.25em;
      background: #1111;
      border-radius: 4px;
    }

    .controls::before,
    .controls::after {
      content: '';
      position: absolute;
      z-index: -1;
      inset: 0;
      transform: scale(.95);
      border-radius: inherit;
      opacity: 0;
    }

    .controls::before {
      background: #aef;
      animation: pulse 2s infinite;
    }

    .controls::after {
      background: #fefefe66;
      transition: transform 200ms ease-in-out;
    }

    .controls:hover::before,
    .controls:hover::after {
      opacity: 1;
    }

    .controls:hover::before {
      transform: scale(.98);
      filter: blur(2px);
    }

    .controls:hover::after {
      transform: scale(1.025, 1.1);
    }

    .controls:hover {
      background: #111f;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.0125);
      }

      100% {
        transform: scale(1);
      }
    }

    .hidden {
      display: none !important;
    }

    .opaque {
      opacity: 1 !important;
      background: #111 !important;
    }

    .controls input {
      all: unset;
      opacity: .2;
      filter: saturate(0) invert(1);
      cursor: pointer;
      transition: opacity 200ms ease-in-out;
      padding: .25em .5em;
    }

    .controls input:hover {
      opacity: 1;
    }

    .icon {
      text-align: center;
      line-height: 1;
    }

    #btnToggleView {
      width: 1.25em;
    }

    #btnToggleView::after {
      content: '👁';
    }

    #btnToggleView:checked::after {
      content: '✏️';
    }

    #btnToggleResolution::after {
      content: '1️⃣';
    }

    #btnToggleResolution:checked::after {
      content: '2️⃣';
    }

    #btnReset::after {
      content: '⏮️';
    }

    /* Global UI Toggle Visibility Styles via H key */
    body.hidden-ui #controls,
    body.hidden-ui .lil-gui {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <canvas id="canvas"></canvas>
    <textarea id="codeEditor" class="editor" spellcheck="false" autocorrect="off" autocapitalize="off" translate="no" oninput="render()"></textarea>
    <pre id="error"></pre>
    <div id="indicator"></div>
    <div id="controls">
      <div class="controls">
        <input id="btnToggleView" class="icon" type="checkbox" name="toggleView" onclick="toggleView()">
        <input id="btnToggleResolution" class="icon" type="checkbox" name="toggleResolution" onchange="toggleResolution()">
        <input id="btnReset" class="icon" type="checkbox" name="reset" onclick="reset()">
      </div>

        element.addEventListener("wheel", (e) => {
          const zoomFactor = e.deltaY < 0 ? 1.05 : 0.95
          settings.zoom = Math.max(0.1, Math.min(10.0, settings.zoom * zoomFactor))
          
          if (typeof zoomController !== 'undefined' && zoomController) {
            zoomController.setValue(settings.zoom)
          } else {
            emit()
          }
        }, { passive: true })
      }
      getScale() {
        return this.scale
      }
      updateScale(scale) { this.scale = scale }
      reset() {
        this.pointers.clear()
        this.active = false
        this.lastCoords = [0,0]
        this.moves = [0,0]
        this.offset = [0,0]
      }
      get count() {
        return this.pointers.size
      }
      get move() {
        return this.moves
      }
      get coords() {
        return this.pointers.size > 0 ? Array.from(this.pointers.values()).map((p) => [...p]).flat() : [0, 0]
      }
      get first() {
        return this.pointers.values().next().value || this.lastCoords
      }
    }
    class Editor {
      constructor(textarea, errorfield, errorindicator) {
        this.textarea = textarea
        this.errorfield = errorfield
        this.errorindicator = errorindicator
        textarea.addEventListener('keydown', this.handleKeydown.bind(this))
        textarea.addEventListener('scroll', this.handleScroll.bind(this))
      }
      get hidden() { return this.textarea.classList.contains('hidden') }
      set hidden(value) { value ? this.#hide() : this.#show() }
      get text() { return this.textarea.value }
      set text(value) { this.textarea.value = value }
      get scrollTop() { return this.textarea.scrollTop }
      set scrollTop(value) { this.textarea.scrollTop = value }
      setError(message) {
        this.errorfield.innerHTML = message
        this.errorfield.classList.add('opaque')
        const match = message.match(/ERROR: \d+:(\d+):/)
        const lineNumber = match ? parseInt(match[1]) : 0
        const overlay = document.createElement('pre')

        overlay.classList.add('overlay')
        overlay.textContent = '\n'.repeat(lineNumber)

        document.body.appendChild(overlay)

        const offsetTop = parseInt(getComputedStyle(overlay).height)

        this.errorindicator.style.setProperty('--top', offsetTop + 'px')
        this.errorindicator.style.visibility = 'visible'

        document.body.removeChild(overlay)
      }
      clearError() {
        this.errorfield.textContent = ''
        this.errorfield.classList.remove('opaque')
        this.errorfield.blur()
        this.errorindicator.style.visibility = 'hidden'
      }
      focus() {
        this.textarea.focus()
      }
      #hide() {
        for (const el of [this.errorindicator, this.errorfield, this.textarea]) {
          el.classList.add('hidden')
        }
      }
      #show() {
        for (const el of [this.errorindicator, this.errorfield, this.textarea]) {
          el.classList.remove('hidden')
        }
        this.focus()
      }
      handleScroll() {
        this.errorindicator.style.setProperty('--scroll-top', `${this.textarea.scrollTop}px`)
      }
      handleKeydown(event) {
        if (event.key === "Tab") {
          event.preventDefault()
          this.handleTabKey(event.shiftKey)
        } else if (event.key === "Enter") {
          event.preventDefault()
          this.handleEnterKey()
        }
      }
      handleTabKey(shiftPressed) {
        if (this.#getSelectedText() !== "") {
          if (shiftPressed) {
            this.#unindentSelectedText()
            return
          }
          this.#indentSelectedText()
        } else {
          this.#indentAtCursor()
        }
      }
      #getSelectedText() {
        const editor = this.textarea
        const start = editor.selectionStart
        const end = editor.selectionEnd
        return editor.value.substring(start, end)
      }
      #indentAtCursor() {
        const editor = this.textarea
        const cursorPos = editor.selectionStart

        document.execCommand('insertText', false, '\t')
        editor.selectionStart = editor.selectionEnd = cursorPos + 1
      }
      #indentSelectedText() {
        const editor = this.textarea
        const cursorPos = editor.selectionStart
        const selectedText = this.#getSelectedText()
        const lines = selectedText.split('\n')
        const indentedText = lines.map(line => '\t' + line).join('\n')

        document.execCommand('insertText', false, indentedText)
        editor.selectionStart = cursorPos
      }
      #unindentSelectedText() {
        const editor = this.textarea
        const cursorPos = editor.selectionStart
        const selectedText = this.#getSelectedText()
        const lines = selectedText.split('\n')
        const indentedText = lines.map(line => line.replace(/^\t/, '').replace(/^ /, '')).join('\n')

        document.execCommand('insertText', false, indentedText)
        editor.selectionStart = cursorPos
      }
      handleEnterKey() {
        const editor = this.textarea
        const visibleTop = editor.scrollTop
        const cursorPosition = editor.selectionStart

        let start = cursorPosition - 1
        while (start >= 0 && editor.value[start] !== '\n') {
          start--
        }

        let newLine = ''
        while (start < cursorPosition - 1 && (editor.value[start + 1] === ' ' || editor.value[start + 1] === '\t')) {
          newLine += editor.value[start + 1]
          start++
        }

        document.execCommand('insertText', false, '\n' + newLine)
        editor.selectionStart = editor.selectionEnd = cursorPosition + 1 + newLine.length
        editor.scrollTop = visibleTop // Prevent the editor from scrolling
        const lineHeight = editor.scrollHeight / editor.value.split('\n').length
        const line = editor.value.substring(0, cursorPosition).split('\n').length

        // Do the actual layout calculation in order to get the correct scroll position
        const visibleBottom = editor.scrollTop + editor.clientHeight
        const lineTop = lineHeight * (line - 1)
        const lineBottom = lineHeight * (line + 2)

        // If the cursor is outside the visible range, scroll the editor
        if (lineTop < visibleTop) editor.scrollTop = lineTop
        if (lineBottom > visibleBottom) editor.scrollTop = lineBottom - editor.clientHeight
      }
    }

    // Hex to RGB parser helper
    function hexToRgb(hex) {
      hex = hex.replace(/^#/, '');
      if (hex.length === 3) {
        hex = hex.split('').map(c => c + c).join('');
      }
      const num = parseInt(hex, 16);
      return [
        ((num >> 16) & 255) / 255,
        ((num >> 8) & 255) / 255,
        (num & 255) / 255
      ];
    }

    // Expose control functions to window scope for inline HTML element events
    window.toggleView = toggleView;
    window.reset = reset;
    window.toggleResolution = toggleResolution;
    window.render = render;

    // Run initialization
    init();
  </script>
