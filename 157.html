<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verlet ASCII Curtain</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap");
    body {
      background: #EEE;
      margin: 0;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.2s ease;
    }
    canvas {
      max-height: 100vh;
      max-width: 100vw;
      height: auto;
      width: auto;
    }
    #container {
      box-shadow: 0 0 20px rgba(0,0,0,.05);
      border: 1px solid rgba(0,0,0,.1);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    h1 {
      font-family: Rubik;
      font-size: 100px;
      font-weight: 800;
      line-height: 1em;
      position: absolute;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <script type="module">
    import {
      lerp,
      getPointsForGridId,
      getEdgeIdsForGridId,
      getPointID,
      hash,
      smoothstep
    } from "https://codepen.io/shubniggurath/pen/OPyPdmm.js";
    import GUI from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

    console.clear();

    let fullCode = '';

    const w = Math.min(400, window.innerWidth - 100);
    const h = Math.min(400, window.innerHeight - 100);

    // Global Camera States (Zoom and Pan)
    const camera = {
      x: 0,
      y: 0,
      zoom: 1.0,
      animX: 0,
      animY: 0,
      animZoom: 1.0
    };

    const CONFIG = {
      awidth: w,
      aheight: h,
      gridW: Math.min(50, Math.floor(w/10)),
      gridH: Math.min(50, Math.floor(w/5)),
      gravity: .2,
      damping: .99,
      iterationsPerFrame: 5,
      compressFactor: .02,
      stretchFactor: 1.1,
      mouseSize: 5000,
      mouseStrength: 4,
      contain: false,
      randomSolve: false,
      
      // Settings variables
      greenscreen: false,
      colorScheme: 'Classic Light',
      backgroundColor: '#EEEEEE',
      curtainColor: '#333333',
      dpr: Math.min(window.devicePixelRatio || 1, 2.0),
      animation: 'Static',
      animationSpeed: 0.0,
      
      resetView: () => {
        camera.x = 0;
        camera.y = 0;
        camera.zoom = 1.0;
      },
      resetPhysics: () => {
        main();
      }
    };
    CONFIG.cellWidth = CONFIG.awidth / (CONFIG.gridW - 1);
    CONFIG.cellHeight = CONFIG.aheight / (CONFIG.gridH - 1);

    const COLOR_SCHEMES = {
      "Classic Light": { bg: "#eeeeee", curtain: "#333333" },
      "Matrix Digital": { bg: "#050805", curtain: "#32cd32" },
      "Cyber Sunset": { bg: "#1a0f2e", curtain: "#ff007f" },
      "Vintage Terminal": { bg: "#1e1e1e", curtain: "#ffb000" },
      "Ocean Breeze": { bg: "#0a192f", curtain: "#00f0ff" }
    };

    function updateBackground() {
      if (CONFIG.greenscreen) {
        document.body.style.background = '#00ff00';
      } else {
        document.body.style.background = CONFIG.backgroundColor;
      }
    }

    function sizeCanvas() {
      if (!c) return;
      c.style.width  = window.innerWidth + 'px';
      c.style.height = window.innerHeight + 'px';
      c.width  = Math.round(window.innerWidth  * CONFIG.dpr);
      c.height = Math.round(window.innerHeight * CONFIG.dpr);
    }

    window.addEventListener('resize', () => {
      if (c && c.width) {
        sizeCanvas();
        CONFIG.awidth  = Math.min(400, window.innerWidth  - 100);
        CONFIG.aheight = Math.min(400, window.innerHeight - 100);
        CONFIG.cellWidth  = CONFIG.awidth  / (CONFIG.gridW - 1);
        CONFIG.cellHeight = CONFIG.aheight / (CONFIG.gridH - 1);
        rebuildCharCanvases();
      }
    });

    let rafID, input, c, particles = [];
    const charCanvases = {};

    function rebuildCharCanvases() {
      // Clear old references
      for (const key in charCanvases) {
        delete charCanvases[key];
      }

      const fontSize = Math.max(12, CONFIG.cellHeight * 1.2); // logical px
      const box = Math.ceil(fontSize * 1.4);                 // logical px
      for (const ch of new Set(fullCode)) {
        if (ch === ' ') continue;
        const off = document.createElement('canvas');
        off.width = off.height = box * CONFIG.dpr;            // device-res backing store
        const octx = off.getContext('2d');
        octx.scale(CONFIG.dpr, CONFIG.dpr);                  // scale context to draw in logical px
        octx.font = `bold ${fontSize}px monospace`;
        octx.textAlign = 'center';
        octx.textBaseline = 'middle';
        octx.fillStyle = CONFIG.curtainColor;
        octx.fillText(ch, box / 2, box / 2);
        off.logicalSize = box;
        charCanvases[ch] = off;
      }
    }

    function main() {
      // Tear down any prior run
      if (rafID) cancelAnimationFrame(rafID);
      if (input) input.unbind();

      fullCode = main.toString();
      
      const { awidth: width, aheight: height, gridW, gridH, compressFactor, stretchFactor, cellWidth, cellHeight } = CONFIG;

      rebuildCharCanvases();

      c = document.createElement('canvas');
      container.innerHTML = '';
      container.appendChild(c);
      sizeCanvas();
      const ctx = c.getContext('2d');

      particles = [];
      const constraints = [], horizontalConstraints = [];
      const pinnedParticles = [];

      input = new Input({ c, particles });

      for(let i=0;i<gridW;i++) {
        for(let j=0;j<gridH;j++) {
          let x = i*cellWidth;   // logical px
          let y = j*cellHeight;  // logical px

          const id = getPointID(j, i, gridH);
          const pinned = j === 0;

          const charIndex = (i + j * gridW) % fullCode.length;
          const char = fullCode[charIndex] || ' ';

          const particle = new Particle({ x, y, pinned, id, char })
          particles.push(particle);
          if(pinned) pinnedParticles.push(particle);
        }
      }

      for(let i=0;i<gridW;i++) {
        for(let j=0;j<gridH;j++) {
          const id = getPointID(j, i, gridH);
          const p = particles[id];

          if(j<gridH-1) {
            const bottomP = particles[getPointID(j+1, i, gridH)];
            const c = new Constraint({p1: p, p2: bottomP, length: cellHeight, id: id+gridW*gridH, compressFactor, stretchFactor});
            constraints.push(c);
            p.downConstraint = c; 
          }
          // Horizontal constraints
          if(i<gridW-1) {
            const rightP = particles[getPointID(j, i+1, gridH)];

            const hc = new Constraint({
              p1: p,
              p2: rightP,
              length: cellWidth,
              id: id+gridW*gridH*2,
              compressFactor: 0.6,
              stretchFactor: 4,
              isSpacer: true
            });

            constraints.push(hc);
            horizontalConstraints.push(hc);
          }
        }
      }

      function drawCode() {
        const offsetX = (c.width  / CONFIG.dpr - width)  / 2;      // logical px
        const offsetY = (c.height / CONFIG.dpr - height) / 2 - 30; // logical px

        const cx = c.width / CONFIG.dpr / 2;
        const cy = c.height / CONFIG.dpr / 2;

        const finalZoom = camera.zoom * camera.animZoom;
        const finalCamX = camera.x + camera.animX;
        const finalCamY = camera.y + camera.animY;

        particles.forEach(p => {
          if (!p.char || p.char === ' ') return;
          const img = charCanvases[p.char];
          if (!img) return;

          let cos = 1, sin = 0;
          const constraint = p.downConstraint;
          if (constraint) {
            const dx = constraint.p2.pos.x - constraint.p1.pos.x;
            const dy = constraint.p2.pos.y - constraint.p1.pos.y;
            const angle = Math.atan2(dy, dx) - Math.PI / 2;
            cos = Math.cos(angle);
            sin = Math.sin(angle);
          }

          const curtainX = p.pos.x + offsetX;
          const curtainY = p.pos.y + offsetY;

          // Camera zoom + pan around screen center
          const viewX = (curtainX - cx) * finalZoom + cx + finalCamX;
          const viewY = (curtainY - cy) * finalZoom + cy + finalCamY;

          const scaleFactor = CONFIG.dpr * finalZoom;
          const cosVal = cos * scaleFactor;
          const sinVal = sin * scaleFactor;

          ctx.setTransform(cosVal, sinVal, -sinVal, cosVal, CONFIG.dpr * viewX, CONFIG.dpr * viewY);

          const half = img.logicalSize / 2;
          ctx.drawImage(img, -half, -half, img.logicalSize, img.logicalSize);
        });

        ctx.setTransform(1, 0, 0, 1, 0, 0);
      }

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      }

      let lastDelta = 0;
      let accumulator = 0;
      let animTime = 0;

      function runloop(delta) {
        rafID = requestAnimationFrame(runloop);

        let dt = delta - lastDelta;
        lastDelta = delta;

        if (dt > 100) dt = 16; // Capped to avoid extreme jumps

        // Physics accumulator runs at normal speed (1.0) so drag/gravity settles
        accumulator += dt;

        const physicsStep = 16;
        let steps = 0;

        while (accumulator >= physicsStep && steps < 8) {
          // Soft winding wave infinite animation (scaled by animationSpeed)
          const windTime = (animTime + steps * physicsStep) * 0.001;
          particles.forEach(p => {
            if (!p.pinned) {
              const windX = Math.sin(windTime + p.pos.y * 0.015) * 0.15 * CONFIG.animationSpeed;
              const windY = Math.cos(windTime * 0.5 + p.pos.x * 0.01) * 0.04 * CONFIG.animationSpeed;
              p.applyForce(new Vec2(windX, windY));
            }
          });

          // Update physics
          particles.forEach(p => p.update(physicsStep));

          // Solve constraints
          if (CONFIG.randomSolve) shuffleArray(constraints);
          for (let i = 0; i < CONFIG.iterationsPerFrame; i++) {
            for (let j = 0; j < constraints.length; j++) {
              constraints[j].solve();
            }
          }

          if (CONFIG.contain) particles.forEach(p => p.contain());

          accumulator -= physicsStep;
          steps++;
        }

        if (accumulator > 100) accumulator = 0;

        animTime += dt;

        // Camera movements
        const t = animTime * 0.001 * CONFIG.animationSpeed;
        if (CONFIG.animation === 'Orbit') {
          camera.animX = Math.cos(t) * 80;
          camera.animY = Math.sin(t) * 40;
          camera.animZoom = 1.0;
        } else if (CONFIG.animation === 'Swaying Breeze') {
          camera.animX = Math.sin(t) * 100;
          camera.animY = 0;
          camera.animZoom = 1.0;
        } else if (CONFIG.animation === 'Pulsing Zoom') {
          camera.animX = 0;
          camera.animY = 0;
          camera.animZoom = 1.0 + Math.sin(t) * 0.15;
        } else if (CONFIG.animation === 'Infinity Loop') {
          camera.animX = Math.sin(t) * 80;
          camera.animY = Math.sin(2 * t) * 40;
          camera.animZoom = 1.0;
        } else { // Static
          camera.animX = 0;
          camera.animY = 0;
          camera.animZoom = 1.0;
        }

        ctx.save();
        ctx.clearRect(0, 0, c.width, c.height);

        drawCode();

        ctx.restore();
      }
      
      // Dispatch initial config settings to Constraint listeners
      updateConstraints();
      
      rafID = requestAnimationFrame(runloop);
    }

    function updateConstraints() {
      if (c) {
        c.dispatchEvent(new CustomEvent("update", {
          detail: {
            compressFactor: CONFIG.compressFactor,
            stretchFactor: CONFIG.stretchFactor
          }
        }));
      }
    }

    class Input {
      constructor({ c, particles }) {
        this.c = c;
        this.particles = particles;
        this.mousePos = new Vec2();
        this.grabRadius = 20; // logical px
        this.grabbedParticle = null;
        this.pointerIsDown = false;
        
        // Panning state
        this.dragStartMouseX = 0;
        this.dragStartMouseY = 0;
        this.dragStartCamX = 0;
        this.dragStartCamY = 0;

        this.bind();
      }

      setMouse(e) {
        const rect = this.c.getBoundingClientRect();
        const cssX = e.clientX - rect.left;
        const cssY = e.clientY - rect.top;
        
        const cx = this.c.width / CONFIG.dpr / 2;
        const cy = this.c.height / CONFIG.dpr / 2;
        const offsetX = (this.c.width  / CONFIG.dpr - CONFIG.awidth)  / 2;
        const offsetY = (this.c.height / CONFIG.dpr - CONFIG.aheight) / 2 - 30;

        const finalZoom = camera.zoom * camera.animZoom;
        const finalCamX = camera.x + camera.animX;
        const finalCamY = camera.y + camera.animY;

        this.mousePos.x = (cssX - cx - finalCamX) / finalZoom + cx - offsetX;
        this.mousePos.y = (cssY - cy - finalCamY) / finalZoom + cy - offsetY;
      }

      pointerdown(e) {
        this.setMouse(e);

        for (const p of this.particles) {
          if (this.mousePos.subtractNew(p.pos).length < this.grabRadius) {
            this.grabbedParticle = p;
            this.grabbedParticle.originalPinnedState = this.grabbedParticle.pinned;
            this.grabbedParticle.pinned = true;
            break;
          }
        }
        
        if (!this.grabbedParticle) {
          this.pointerIsDown = true;
          this.dragStartMouseX = e.clientX;
          this.dragStartMouseY = e.clientY;
          this.dragStartCamX = camera.x;
          this.dragStartCamY = camera.y;
        }
      }

      pointerup(e) {
        if (this.grabbedParticle) {
          this.grabbedParticle.pinned = this.grabbedParticle.originalPinnedState;
          this.grabbedParticle = null;
        }
        this.pointerIsDown = false;
      }

      pointermove(e) {
        if (this.grabbedParticle) {
          this.setMouse(e);
          this.grabbedParticle.pos.reset(this.mousePos.x, this.mousePos.y);
          this.grabbedParticle.oldPos.reset(this.mousePos.x, this.mousePos.y);
        } else if (this.pointerIsDown) {
          const dx = e.clientX - this.dragStartMouseX;
          const dy = e.clientY - this.dragStartMouseY;
          camera.x = this.dragStartCamX + dx;
          camera.y = this.dragStartCamY + dy;
        } else {
          this.setMouse(e);
          for (const p of this.particles) {
            const diff = this.mousePos.subtractNew(p.pos);
            const ls = diff.lengthSquared;
            if(ls < CONFIG.mouseSize) {
              const a = diff.angle-Math.PI;
              const strength = smoothstep(CONFIG.mouseSize, -2000, ls)*CONFIG.mouseStrength/300;

              const force = new Vec2(Math.cos(a)*strength, Math.sin(a)*strength);
              p.applyForce(force);
            }
          }
        }
      }

      wheel(e) {
        e.preventDefault();
        const rect = this.c.getBoundingClientRect();
        const mX = e.clientX - rect.left;
        const mY = e.clientY - rect.top;
        
        const zoomFactor = e.deltaY < 0 ? 1.15 : 0.85;
        const cx = this.c.width / CONFIG.dpr / 2;
        const cy = this.c.height / CONFIG.dpr / 2;
        
        const newZoom = Math.max(0.1, Math.min(10, camera.zoom * zoomFactor));
        
        camera.x = mX - cx - (mX - cx - camera.x) * newZoom / camera.zoom;
        camera.y = mY - cy - (mY - cy - camera.y) * newZoom / camera.zoom;
        camera.zoom = newZoom;
      }

      contextmenu(e) {
        e.preventDefault();
      }

      get rect() {
        const rect = this.c.getBoundingClientRect();
        rect.scale = rect.width/this.c.width;
        return rect;
      }

      bind() {
        this.pointerdown=this.pointerdown.bind(this)
        this.pointerup=this.pointerup.bind(this)
        this.pointermove=this.pointermove.bind(this)
        this.contextmenu=this.contextmenu.bind(this)
        this.wheel=this.wheel.bind(this)

        document.addEventListener('pointerdown', this.pointerdown)
        document.addEventListener('pointerup', this.pointerup)
        document.addEventListener('pointermove', this.pointermove)
        document.addEventListener('contextmenu', this.contextmenu)
        this.c.addEventListener('wheel', this.wheel, { passive: false })
      }

      unbind() {
        document.removeEventListener('pointerdown', this.pointerdown)
        document.removeEventListener('pointerup', this.pointerup)
        document.removeEventListener('pointermove', this.pointermove)
        document.removeEventListener('contextmenu', this.contextmenu)
        this.c.removeEventListener('wheel', this.wheel)
      }
    }

    class Vec2 {
      constructor(x=0, y=0) {
        this.reset(x,y)
      }
      zero() {
        this.reset(0,0)
      }
      reset(x=0, y=0) {
        this.x = x;
        this.y = y;
      }
      clone() {
        return new Vec2(this.x, this.y);
      }
      add(v) {
        this.x += v.x;
        this.y += v.y;
        return this;
      }
      addNew(v) {
        return this.clone().add(v);
      }
      subtract(v) {
        this.x -= v.x;
        this.y -= v.y;
        return this;
      }
      subtractNew(v) {
        return this.clone().subtract(v);
      }
      multiply(v) {
        this.x *= v.x;
        this.y *= v.y;
        return this;
      }
      multiplyNew(v) {
        return this.clone().multiply(v);
      }
      scale(scalar) {
        this.x *= scalar;
        this.y *= scalar;
        return this;
      }
      scaleNew(scalar) {
        return this.clone().scale(scalar);
      }

      get array() {
        return [this.x, this.y];
      }
      get lengthSquared() {
        return this.x**2 + this.y**2;
      }
      get length() {
        return Math.hypot(this.x, this.y);
      }
      get angle() {
        return Math.atan2(this.y, this.x);
      }

      [Symbol.iterator]() {
        let values = this.array;
        let i = 0;
        return {
          next() {
            if(i < values.length) {
              let value = values[i];
              i++;
              return { value, done: false }
            } else return { done: true }
          }
        }
      }
    }

    class Particle {
      constructor({x, y, pinned, id, char}={}) {
        this.pos = new Vec2(x, y);
        this.oldPos = new Vec2(x, y);
        this.velocity = new Vec2()
        this.acceleration = new Vec2();
        this.pinned = pinned;
        this.id = id;
        this.char = char;
        this.gravityVec = new Vec2();
      }
      contain() {
        if(this.pinned) return;
        const radius = 5;

        if (this.pos.x < radius) {
          this.pos.x = radius;
          this.oldPos.x = this.pos.x + Math.abs(this.oldPos.x - this.pos.x) * 0.8;
        } else if (this.pos.x > CONFIG.awidth - radius) {
          this.pos.x = CONFIG.awidth - radius;
          this.oldPos.x = this.pos.x - Math.abs(this.oldPos.x - this.pos.x) * 0.8;
        }
        if (this.pos.y < radius) {
            this.pos.y = radius;
            this.oldPos.y = this.pos.y + Math.abs(this.oldPos.y - this.pos.y) * 0.8;
        } else if (this.pos.y > CONFIG.aheight - radius) {
            this.pos.y = CONFIG.aheight - radius;
            this.oldPos.y = this.pos.y - Math.abs(this.oldPos.y - this.pos.y) * 0.8;
        }
      }
      update(delta) {
        if(this.pinned) {
          this.acceleration.zero();
          return;
        }

        this.velocity.reset(
          (this.pos.x - this.oldPos.x) * CONFIG.damping,
          (this.pos.y - this.oldPos.y) * CONFIG.damping
        );

        this.oldPos.reset(...this.pos);

        const dd = delta**2;
        this.gravityVec.reset(0,CONFIG.gravity/dd)

        this.applyForce(this.gravityVec)

        this.pos.x += this.velocity.x + this.acceleration.x * dd;
        this.pos.y += this.velocity.y + this.acceleration.y * dd;

        this.acceleration.reset();
      }
      applyForce(v) {
        this.acceleration.add(v);
      }
    }

    class Constraint {
      constructor({p1, p2, length, id, compressFactor, stretchFactor, isSpacer}) {
        this.p1 = p1;
        this.p2 = p2;
        this.length = length;
        this.id=id;
        this.isSpacer = isSpacer;
        this.minLength = length * compressFactor;
        this.maxLength = length * stretchFactor;

        c.addEventListener("update", (e) => {
          this.minLength = this.length * (this.isSpacer ? compressFactor : e.detail.compressFactor);
          this.maxLength = this.length * (this.isSpacer ? stretchFactor : e.detail.stretchFactor);
        })
      }
      solve() {
        const dx = this.p2.pos.x - this.p1.pos.x;
        const dy = this.p2.pos.y - this.p1.pos.y;
        const distance = Math.hypot(dx, dy);

        if (distance == 0) return;

        let targetLength = this.length;
        if (distance < this.minLength) targetLength = this.minLength;
        else if (distance > this.maxLength) targetLength = this.maxLength;
        else return;

        const difference = targetLength - distance;
        const percent = difference / distance / 2;

        const offsetX = dx * percent;
        const offsetY = dy * percent;

        if (!this.p1.pinned) {
          this.p1.pos.x -= offsetX;
          this.p1.pos.y -= offsetY;
        }
        if (!this.p2.pinned) {
          this.p2.pos.x += offsetX;
          this.p2.pos.y += offsetY;
        }
      }
    }

    // Initialize GUI Settings panel
    let gui;
    function initGUI() {
      if (gui) gui.destroy();
      gui = new GUI({ title: 'Curtain Settings' });

      const folderTheme = gui.addFolder('Theme & Colors');
      const schemeController = folderTheme.add(CONFIG, 'colorScheme', [
        'Classic Light',
        'Matrix Digital',
        'Cyber Sunset',
        'Vintage Terminal',
        'Ocean Breeze',
        'Custom'
      ]).name('Color Preset');

      const bgController = folderTheme.addColor(CONFIG, 'backgroundColor').name('Background Color').onChange(() => {
        CONFIG.colorScheme = 'Custom';
        schemeController.setValue('Custom');
        updateBackground();
      });

      const curtainController = folderTheme.addColor(CONFIG, 'curtainColor').name('Curtain Color').onChange(() => {
        CONFIG.colorScheme = 'Custom';
        schemeController.setValue('Custom');
        rebuildCharCanvases();
      });

      schemeController.onChange((val) => {
        if (val !== 'Custom') {
          const scheme = COLOR_SCHEMES[val];
          if (scheme) {
            CONFIG.backgroundColor = scheme.bg;
            CONFIG.curtainColor = scheme.curtain;
            bgController.setValue(scheme.bg);
            curtainController.setValue(scheme.curtain);
            updateBackground();
            rebuildCharCanvases();
          }
        }
      });

      folderTheme.add(CONFIG, 'greenscreen').name('Green Screen (#00ff00)').onChange(updateBackground);

      folderTheme.add(CONFIG, 'dpr', 0.5, 3.0, 0.1).name('Pixel Ratio (DPR)').onChange(() => {
        sizeCanvas();
        rebuildCharCanvases();
      });

      const folderAnim = gui.addFolder('Animation');
      folderAnim.add(CONFIG, 'animation', [
        'Static',
        'Orbit',
        'Swaying Breeze',
        'Pulsing Zoom',
        'Infinity Loop'
      ]).name('Camera Motion');

      folderAnim.add(CONFIG, 'animationSpeed', 0.0, 3.0, 0.1).name('Speed Modifier');

      const folderPhysics = gui.addFolder('Physics');
      folderPhysics.add(CONFIG, 'gravity', 0.0, 1.0, 0.05).name('Gravity').onChange(() => {
        // Apply changes directly to particles
        particles.forEach(p => {
          p.gravityVec.reset(0, CONFIG.gravity / 256);
        });
      });
      folderPhysics.add(CONFIG, 'damping', 0.9, 1.0, 0.005).name('Damping');
      folderPhysics.add(CONFIG, 'iterationsPerFrame', 1, 15, 1).name('Iterations');
      folderPhysics.add(CONFIG, 'compressFactor', 0.0, 0.5, 0.01).name('Compress Limit').onChange(updateConstraints);
      folderPhysics.add(CONFIG, 'stretchFactor', 1.0, 3.0, 0.05).name('Stretch Limit').onChange(updateConstraints);

      const folderInteract = gui.addFolder('Interaction');
      folderInteract.add(CONFIG, 'mouseSize', 1000, 15000, 500).name('Hover Size');
      folderInteract.add(CONFIG, 'mouseStrength', 0.5, 10.0, 0.5).name('Hover Push');

      gui.add(CONFIG, 'resetView').name('Reset Camera');
      gui.add(CONFIG, 'resetPhysics').name('Reset Curtain');

      // Initialize default color scheme setting
      const initial = COLOR_SCHEMES[CONFIG.colorScheme];
      if (initial) {
        CONFIG.backgroundColor = initial.bg;
        CONFIG.curtainColor = initial.curtain;
        bgController.setValue(initial.bg);
        curtainController.setValue(initial.curtain);
        updateBackground();
      }
    }

    // Window global keydown to toggle GUI visibility on 'H' key
    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'h') {
        const active = document.activeElement;
        if (active && (active.tagName === 'INPUT' || active.tagName === 'SELECT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) {
          return;
        }
        if (gui) {
          const dom = gui.domElement;
          dom.style.display = dom.style.display === 'none' ? '' : 'none';
        }
      }
    });

    setTimeout(() => {
      main();
      initGUI();
    }, 500);
  </script>
</body>
</html>
