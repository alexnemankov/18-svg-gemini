<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noisy Lines Scene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    body, html, #app {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    #app {
      overflow: hidden;
      touch-action: pan-up;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
      text-align: center;
      text-shadow: 0 0 5px #ffffff, 0 0 20px #000, 0 0 30px #000;
      position: relative;
      background: transparent; /* Keep container background transparent */
    }

    #app h1 {
      --fontSize: 60px;
      --lineHeight: 80px;
      width: auto;
      height: calc(2 * var(--lineHeight));
      line-height: var(--lineHeight);
      margin: calc(50vh - var(--lineHeight)) auto 0;
      font-size: var(--fontSize);
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
    }

    #app a {
      margin-top: 10px;
      display: inline-block;
      text-decoration: none;
      color: #fff;
    }

    #app canvas {
      display: block;
      position: fixed;
      z-index: -1;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* lil-gui custom premium styling */
    .lil-gui {
      --background-color: rgba(15, 15, 20, 0.85);
      --text-color: #e2e2e9;
      --title-background-color: #24242e;
      --widget-color: #333340;
      --hover-color: #4f4f60;
      --focus-color: #ff007f;
      --number-color: #00f6ff;
      --string-color: #a3ff00;
      font-family: 'Montserrat', -apple-system, sans-serif;
      border-radius: 12px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      padding: 6px;
    }
  </style>

  <!-- Native importmap to prevent dual Three.js library loading issues -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <h1>Noisy Lines</h1>
    <a href="https://github.com/klevron/threejs-toys" target="_blank">threejs-toys</a>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/examples/jsm/controls/OrbitControls";
    import GUI from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

    // 5 Popular and original preset color schemes
    const colorPresets = {
      "Cyber Synthwave": {
        colors: ["#ff007f", "#9d00ff", "#00f6ff"],
        background: "linear-gradient(135deg, #0f051d 0%, #030107 100%)"
      },
      "Sunset Gold": {
        colors: ["#ff4500", "#ff7f50", "#ffd700"],
        background: "linear-gradient(135deg, #1f0c05 0%, #070200 100%)"
      },
      "Nordic Aurora": {
        colors: ["#00ff87", "#60efff", "#0061ff"],
        background: "linear-gradient(135deg, #05141c 0%, #010407 100%)"
      },
      "Cosmic Nebula": {
        colors: ["#4facfe", "#00f2fe", "#f355da"],
        background: "linear-gradient(135deg, #0a0518 0%, #010103 100%)"
      },
      "Obsidian Gold": {
        colors: ["#111111", "#d4af37", "#f3e5ab"],
        background: "linear-gradient(135deg, #0f0c06 0%, #020202 100%)"
      }
    };

    // Vanilla JS Color interpolation helper (no Three.js class dependency)
    function hexToRgb(hex) {
      const c = hex.replace("#", "");
      const r = parseInt(c.substring(0, 2), 16);
      const g = parseInt(c.substring(2, 4), 16);
      const b = parseInt(c.substring(4, 6), 16);
      return { r, g, b };
    }

    function rgbToHex(r, g, b) {
      const toHex = (val) => {
        const s = Math.min(255, Math.max(0, Math.round(val))).toString(16);
        return s.length === 1 ? "0" + s : s;
      };
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    class ColorInterpolator {
      constructor(colors) {
        this.rgbs = colors.map(c => hexToRgb(c));
      }
      getColorAt(t) {
        const d = Math.max(0, Math.min(1, t)) * (this.rgbs.length - 1);
        const n = Math.floor(d);
        const c = this.rgbs[n];
        if (n === this.rgbs.length - 1) return rgbToHex(c.r, c.g, c.b);
        const p = d - n;
        const u = this.rgbs[n + 1];
        
        const r = c.r + p * (u.r - c.r);
        const g = c.g + p * (u.g - c.g);
        const b = c.b + p * (u.b - c.b);
        return rgbToHex(r, g, b);
      }
    }

    // App state/parameters
    const params = {
      greenscreen: false,
      colorPreset: "Cyber Synthwave",
      color1: colorPresets["Cyber Synthwave"].colors[0],
      color2: colorPresets["Cyber Synthwave"].colors[1],
      color3: colorPresets["Cyber Synthwave"].colors[2],
      minStroke: 0.5,
      maxStroke: 2.0,
      animationSpeed: 1.0,
      animationPreset: "Slow Orbit",
      cameraDistance: 30.0,
      dpr: Math.min(window.devicePixelRatio, 2.0),
      coordScale: 2.0,
      displacementScale: 0.02
    };

    // Setup Texture Canvas (256 width prevents aliasing/rounding pixel transparency)
    const canvasTextureElement = document.createElement("canvas");
    canvasTextureElement.width = 256;
    canvasTextureElement.height = 4096;
    const texture = new THREE.CanvasTexture(canvasTextureElement);
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    texture.minFilter = THREE.NearestFilter;
    texture.magFilter = THREE.NearestFilter;

    // Redraw the 1D canvas lines
    function regenerateTexture() {
      const ctx = canvasTextureElement.getContext("2d");
      const { width, height } = canvasTextureElement;
      ctx.clearRect(0, 0, width, height);
      
      const colors = [params.color1, params.color2, params.color3];
      const interpolator = new ColorInterpolator(colors);
      
      let y = 0;
      ctx.lineWidth = 0;
      while (y < height) {
        const stroke = params.minStroke + Math.random() * (params.maxStroke - params.minStroke);
        const hexColor = interpolator.getColorAt(Math.random());
        ctx.fillStyle = hexColor;
        ctx.beginPath();
        ctx.rect(0, y - 1, width, stroke + 1);
        ctx.fill();
        ctx.closePath();
        y += stroke;
      }
      texture.needsUpdate = true;
    }

    // Initialize texture
    regenerateTexture();

    // Scene setup
    const container = document.getElementById("app");
    const scene = new THREE.Scene();
    
    // Perspective Camera
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, params.cameraDistance);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setPixelRatio(params.dpr);
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // OrbitControls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enableZoom = true;
    controls.enablePan = true;
    controls.screenSpacePanning = true;

    // Shaders for the plane mesh
    const vertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      uniform sampler2D uMap;
      uniform float uTime;
      uniform float uCoordScale;
      uniform float uDisplacementScale;
      uniform vec2 uMouse;
      varying vec2 vUv;

      // 2D classic simplex noise with derivative (psrdnoise)
      // Cleaned of all GLSL ES 1.00 implicit vector-scalar operators to ensure 100% device compatibility.
      float psrdnoise(vec2 x, float alpha, out vec2 gradient) {
        vec2 uv = vec2(x.x + x.y * 0.5, x.y);
        vec2 i0 = floor(uv);
        vec2 f0 = fract(uv);
        float cmp = step(f0.y, f0.x);
        vec2 o1 = vec2(cmp, 1.0 - cmp);
        vec2 i1 = i0 + o1;
        vec2 i2 = i0 + vec2(1.0, 1.0);
        vec2 v0 = vec2(i0.x - i0.y * 0.5, i0.y);
        vec2 v1 = vec2(v0.x + o1.x - o1.y * 0.5, v0.y + o1.y);
        vec2 v2 = vec2(v0.x + 0.5, v0.y + 1.0);
        vec2 x0 = x - v0;
        vec2 x1 = x - v1;
        vec2 x2 = x - v2;
        
        vec3 iu = vec3(i0.x, i1.x, i2.x);
        vec3 iv = vec3(i0.y, i1.y, i2.y);
        
        vec3 hash = mod(iu, 289.0);
        hash = mod((hash * 51.0 + vec3(2.0)) * hash + iv, 289.0);
        hash = mod((hash * 34.0 + vec3(10.0)) * hash, 289.0);
        vec3 psi = hash * 0.07482 + vec3(alpha);
        vec3 gx = cos(psi);
        vec3 gy = sin(psi);
        vec2 g0 = vec2(gx.x, gy.x);
        vec2 g1 = vec2(gx.y, gy.y);
        vec2 g2 = vec2(gx.z, gy.z);
        vec3 w = vec3(0.8) - vec3(dot(x0, x0), dot(x1, x1), dot(x2, x2));
        w = max(w, vec3(0.0));
        vec3 w2 = w * w;
        vec3 w4 = w2 * w2;
        vec3 gdotx = vec3(dot(g0, x0), dot(g1, x1), dot(g2, x2));
        float n = dot(w4, gdotx);
        vec3 w3 = w2 * w;
        vec3 dw = -8.0 * w3 * gdotx;
        vec2 dn0 = w4.x * g0 + dw.x * x0;
        vec2 dn1 = w4.y * g1 + dw.y * x1;
        vec2 dn2 = w4.z * g2 + dw.z * x2;
        gradient = 10.9 * (dn0 + dn1 + dn2);
        return 10.9 * n;
      }

      void main() {
        vec2 grad;
        float n = psrdnoise(vUv * uCoordScale + uMouse, uTime, grad);
        vec2 uv = vUv + uDisplacementScale * grad;
        gl_FragColor = texture2D(uMap, uv.yx);
      }
    `;

    // Uniforms
    const uniforms = {
      uMap: { value: texture },
      uTime: { value: 0 },
      uCoordScale: { value: params.coordScale },
      uDisplacementScale: { value: params.displacementScale },
      uMouse: { value: new THREE.Vector2(0, 0) }
    };

    // Material & Double-sided Plane Mesh
    const material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms,
      side: THREE.DoubleSide
    });

    const geometry = new THREE.PlaneGeometry(1, 1);
    const planeMesh = new THREE.Mesh(geometry, material);
    scene.add(planeMesh);

    // Initial scale calculation to fit the plane to screen at start
    function fitPlaneToScreen() {
      const dist = 30; // camera default Z
      const height = 2 * Math.tan((camera.fov * Math.PI) / 360) * dist;
      const width = height * camera.aspect;
      planeMesh.scale.set(width, height, 1);
    }
    fitPlaneToScreen();

    // Background update helper (styles body background to let transparent WebGL canvas display over it)
    function updateBackground() {
      if (params.greenscreen) {
        document.body.style.background = "#00ff00";
        renderer.setClearColor(0x00ff00, 1.0);
      } else {
        const preset = colorPresets[params.colorPreset];
        if (preset) {
          document.body.style.background = preset.background;
        } else {
          document.body.style.background = "linear-gradient(135deg, #111115 0%, #050507 100%)";
        }
        renderer.setClearColor(0x000000, 0.0);
      }
    }
    updateBackground();

    // Window Resize Handler
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      fitPlaneToScreen();
    });

    // Interactive mouse displacement target
    const targetMouse = new THREE.Vector2(0, 0);
    const mouseScale = 0.25;

    window.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth) * 2 - 1;
      const y = -(e.clientY / window.innerHeight) * 2 + 1;
      targetMouse.set(-x, y).multiplyScalar(mouseScale);
    });

    window.addEventListener("mouseleave", () => {
      targetMouse.set(0, 0);
    });

    window.addEventListener("touchmove", (e) => {
      if (e.touches.length > 0) {
        const x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
        const y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
        targetMouse.set(-x, y).multiplyScalar(mouseScale);
      }
    }, { passive: true });

    window.addEventListener("touchend", () => {
      targetMouse.set(0, 0);
    });

    // GUI Initialization
    const gui = new GUI({ title: "Noisy Lines Settings", width: 320 });
    gui.domElement.style.position = "absolute";
    gui.domElement.style.top = "10px";
    gui.domElement.style.right = "10px";

    // Greenscreen toggle
    gui.add(params, "greenscreen")
      .name("Enable Greenscreen")
      .onChange(() => {
        updateBackground();
      });

    // Presets Dropdown
    const colorPresetController = gui.add(params, "colorPreset", [...Object.keys(colorPresets), "Custom"])
      .name("Color Scheme")
      .onChange((val) => {
        if (val !== "Custom") {
          const p = colorPresets[val];
          params.color1 = p.colors[0];
          params.color2 = p.colors[1];
          params.color3 = p.colors[2];
          
          color1Controller.setValue(p.colors[0]);
          color2Controller.setValue(p.colors[1]);
          color3Controller.setValue(p.colors[2]);
        }
        updateBackground();
        regenerateTexture();
      });

    // Custom color options
    const color1Controller = gui.addColor(params, "color1")
      .name("Color 1")
      .onChange(() => {
        params.colorPreset = "Custom";
        colorPresetController.setValue("Custom");
        regenerateTexture();
      });

    const color2Controller = gui.addColor(params, "color2")
      .name("Color 2")
      .onChange(() => {
        params.colorPreset = "Custom";
        colorPresetController.setValue("Custom");
        regenerateTexture();
      });

    const color3Controller = gui.addColor(params, "color3")
      .name("Color 3")
      .onChange(() => {
        params.colorPreset = "Custom";
        colorPresetController.setValue("Custom");
        regenerateTexture();
      });

    // Wave customizer controls
    gui.add(params, "coordScale", 0.5, 10.0, 0.1)
      .name("Wave Frequency")
      .onChange((val) => {
        uniforms.uCoordScale.value = val;
      });

    gui.add(params, "displacementScale", 0.001, 0.1, 0.001)
      .name("Wave Amplitude")
      .onChange((val) => {
        uniforms.uDisplacementScale.value = val;
      });

    gui.add(params, "minStroke", 0.1, 10.0, 0.1)
      .name("Min Line Width")
      .onChange(() => {
        regenerateTexture();
      });

    gui.add(params, "maxStroke", 0.1, 20.0, 0.1)
      .name("Max Line Width")
      .onChange(() => {
        regenerateTexture();
      });

    // Animation settings
    gui.add(params, "animationSpeed", 0.0, 3.0, 0.05)
      .name("Speed Multiplier");

    const animationPresetController = gui.add(params, "animationPreset", [
      "Static",
      "Slow Orbit",
      "Floating Wave",
      "Breathing Zoom",
      "Cinematic Path"
    ]).name("Camera Motion");

    // Pixel Ratio (DPR) settings
    gui.add(params, "dpr", 0.5, 3.0, 0.1)
      .name("Pixel Ratio (DPR)")
      .onChange((val) => {
        renderer.setPixelRatio(val);
      });

    // Auto-pause active camera preset animation when the user manually drags or zooms
    controls.addEventListener("start", () => {
      if (params.animationPreset !== "Static") {
        animationPresetController.setValue("Static");
      }
    });

    // Keyboard shortcut to hide/show UI with "H"
    window.addEventListener("keydown", (e) => {
      if (e.key === "h" || e.key === "H") {
        if (gui._hidden) {
          gui.show();
        } else {
          gui.hide();
        }
      }
    });

    // Clock and Custom Time for auto infinite animation
    let customTime = 0;
    const clock = new THREE.Clock();

    // Render loop
    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      // Auto infinite animation of shader displaced lines
      // We scale delta by animationSpeed
      customTime += delta * params.animationSpeed;
      
      // Update shader uniforms
      uniforms.uTime.value = customTime * 0.0005;
      uniforms.uMouse.value.lerp(targetMouse, 0.05);

      // Camera animations
      const preset = params.animationPreset;
      if (preset !== "Static") {
        const dist = params.cameraDistance;
        const t = customTime * 0.5; // slow down camera speed slightly for elegance

        if (preset === "Slow Orbit") {
          const speed = 0.2;
          const angle = t * speed;
          camera.position.x = Math.sin(angle) * dist;
          camera.position.z = Math.cos(angle) * dist;
          camera.position.y = 0;
          camera.lookAt(0, 0, 0);
        } else if (preset === "Floating Wave") {
          const speed = 0.15;
          const angle = t * speed;
          camera.position.x = Math.sin(angle) * dist;
          camera.position.z = Math.cos(angle) * dist;
          camera.position.y = Math.sin(t * 0.3) * (dist * 0.25);
          camera.lookAt(0, 0, 0);
        } else if (preset === "Breathing Zoom") {
          const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
          if (dir.lengthSq() === 0) dir.set(0, 0, 1);
          const dynamicDist = dist * (1.0 + Math.sin(t * 0.35) * 0.2);
          camera.position.copy(controls.target).addScaledVector(dir, dynamicDist);
          camera.lookAt(0, 0, 0);
        } else if (preset === "Cinematic Path") {
          const speed = 0.15;
          const angle = t * speed;
          camera.position.x = Math.sin(angle) * dist;
          camera.position.z = Math.cos(angle) * dist;
          camera.position.y = Math.sin(2 * angle) * (dist * 0.25);
          camera.lookAt(0, 0, 0);
        }

        controls.target.set(0, 0, 0);
      } else {
        // In Static mode, keep the camera distance updated dynamically so manual zooms transition smoothly
        params.cameraDistance = camera.position.distanceTo(controls.target);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
