<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Liquid - Screen-space fluid simulation</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
	<script type="importmap">
		{
			"imports": {
				"three": "https://unpkg.com/three@0.181.0/build/three.module.js",
				"lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
			}
		}
	</script>
	<style>
	*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

	:root {
		--cream:  #eaf6ff;
		--ink:    #07090d;
		--redhot: #ff3a16;
		--cyan:   #2ee6ff;
	}

	html, body {
		height: 100%;
		background: #05070a;
		overflow: hidden;
		font-family: "Space Grotesk", system-ui, sans-serif;
	}

	.webgl { display: block; }

	.ui {
		position: fixed;
		inset: 0;
		z-index: 5;
		padding: clamp(22px, 3.4vw, 44px);
		display: flex;
		flex-direction: column;
		justify-content: space-between;
		pointer-events: none;
		color: #fff;
		mix-blend-mode: difference;
	}
	.ui-row { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; }
	.lockup { display: flex; flex-direction: column; gap: 14px; }

	.mark {
		font-family: "Space Grotesk", sans-serif;
		font-weight: 600;
		font-size: clamp(15px, 1.5vw, 19px);
		letter-spacing: -0.01em;
		line-height: 1;
		display: flex;
		align-items: baseline;
		gap: 7px;
	}
	.mark .idx {
		font-family: "Space Mono", monospace;
		font-size: 11px;
		font-weight: 400;
		letter-spacing: 0.05em;
		opacity: 0.7;
	}

	.meta {
		font-family: "Space Mono", monospace;
		font-size: 11px;
		line-height: 1.7;
		letter-spacing: 0.04em;
		text-transform: uppercase;
		opacity: 0.85;
	}
	.meta span { display: block; }

	.desc {
		font-family: "Space Grotesk", sans-serif;
		font-size: clamp(12px, 1.15vw, 14px);
		font-weight: 400;
		line-height: 1.45;
		max-width: 30ch;
		letter-spacing: 0.005em;
	}
	.desc::before {
		content: "";
		display: block;
		width: 26px;
		height: 1px;
		background: currentColor;
		margin-bottom: 12px;
		opacity: 0.6;
	}

	.credit {
		font-family: "Space Mono", monospace;
		font-size: 11px;
		letter-spacing: 0.04em;
		text-transform: uppercase;
		text-align: right;
		white-space: nowrap;
		opacity: 0.85;
	}

	#panel {
		position: fixed;
		top: clamp(22px, 3.4vw, 44px);
		right: clamp(22px, 3.4vw, 44px);
		z-index: 10;
		width: 218px;
		padding: 16px 16px 14px;
		background: rgba(8, 11, 16, 0.5);
		border: 1px solid rgba(255, 255, 255, 0.14);
		border-radius: 3px;
		color: rgba(255, 255, 255, 0.88);
		font-family: "Space Mono", monospace;
		font-size: 11px;
		letter-spacing: 0.02em;
		user-select: none;
		backdrop-filter: blur(12px);
		-webkit-backdrop-filter: blur(12px);
		max-height: calc(100vh - 90px);
		overflow-y: auto;
	}
	#panel h3 {
		margin: 18px 0 9px;
		font-weight: 700;
		font-size: 10px;
		letter-spacing: 0.16em;
		text-transform: uppercase;
		color: rgba(255, 255, 255, 0.5);
		display: flex;
		align-items: center;
		gap: 9px;
	}
	#panel h3::after {
		content: "";
		flex: 1;
		height: 1px;
		background: rgba(255, 255, 255, 0.13);
	}
	#panel h3:first-child { margin-top: 0; }
	#panel label {
		display: block;
		margin: 11px 0 4px;
		font-size: 10px;
		letter-spacing: 0.03em;
		text-transform: uppercase;
		color: rgba(255, 255, 255, 0.55);
	}
	#panel input[type=range] { width: 100%; accent-color: #fff; }
	#panel .val { float: right; color: rgba(255, 255, 255, 0.95); }
	#panel button {
		margin-top: 18px;
		width: 100%;
		padding: 9px 0;
		background: transparent;
		border: 1px solid rgba(255, 255, 255, 0.3);
		color: #fff;
		border-radius: 3px;
		font-family: "Space Mono", monospace;
		font-weight: 700;
		font-size: 10px;
		cursor: pointer;
		letter-spacing: 0.14em;
		text-transform: uppercase;
		transition: background 0.15s, border-color 0.15s;
	}
	#panel button:hover {
		background: rgba(255, 255, 255, 0.1);
		border-color: rgba(255, 255, 255, 0.55);
	}
	#panel button:active { background: rgba(255, 255, 255, 0.18); }

	/* Custom Hide UI class */
	body.hide-ui .ui,
	body.hide-ui #panel,
	body.hide-ui .lil-gui {
		display: none !important;
	}

	/* Style lil-gui to align with theme and position on top left */
	.lil-gui {
		--background-color: rgba(8, 11, 16, 0.65) !important;
		--text-color: rgba(255, 255, 255, 0.9) !important;
		--title-background-color: rgba(255, 255, 255, 0.08) !important;
		--widget-color: rgba(255, 255, 255, 0.1) !important;
		--hover-color: rgba(255, 255, 255, 0.2) !important;
		--focus-color: rgba(255, 255, 255, 0.25) !important;
		font-family: "Space Mono", monospace !important;
		font-size: 11px !important;
		border: 1px solid rgba(255, 255, 255, 0.14) !important;
		border-radius: 3px !important;
		backdrop-filter: blur(12px) !important;
		-webkit-backdrop-filter: blur(12px) !important;
		position: fixed !important;
		top: clamp(22px, 3.4vw, 44px) !important;
		left: clamp(22px, 3.4vw, 44px) !important;
		right: auto !important;
		z-index: 100 !important;
		width: 230px !important;
	}
	</style>
</head>
<body>
	<canvas class="webgl"></canvas>

	<div class="ui">
		<div class="lockup">
			<span class="mark">Liquid<span class="idx">/ R.09</span></span>
			<div class="meta">
				<span>Real-time WebGL · GLSL</span>
				<span>Screen-space fluid</span>
			</div>
		</div>

		<div class="ui-row bottom">
			<p class="desc">
				Tipografía tridimensional derritiéndose sobre un campo de fluido
				simulado cuadro a cuadro.
			</p>
			<span class="credit">Est. 2026 — 01 / 01</span>
		</div>
	</div>

	<div id="panel">
		<h3>Texto 3D</h3>
		<label>Tamaño <span class="val" id="vSize"></span></label>
		<input type="range" id="size" min="100" max="280" step="2" value="228" />
		<label>Disolver en el líquido <span class="val" id="vDissolve"></span></label>
		<input type="range" id="dissolve" min="0" max="1" step="0.01" value="0.23" />

		<h3>Rotación 3D / profundidad</h3>
		<label>Inclinar atrás (X) <span class="val" id="vRotX"></span></label>
		<input type="range" id="rotX" min="-1.5" max="0.6" step="0.01" value="-1.29" />
		<label>Girar (Y) <span class="val" id="vRotY"></span></label>
		<input type="range" id="rotY" min="-1.2" max="1.2" step="0.01" value="0.04" />
		<label>Diagonal (Z) <span class="val" id="vRotZ"></span></label>
		<input type="range" id="rotZ" min="-1.2" max="1.2" step="0.01" value="0.92" />
		<label>Profundidad (lente) <span class="val" id="vFov"></span></label>
		<input type="range" id="fov" min="22" max="80" step="1" value="50" />

		<button id="reset">reiniciar goteo</button>
	</div>

	<script type="module">
	import * as THREE from "three";
	import GUI from "lil-gui";

	THREE.ColorManagement.enabled = false;

	let SIM_W, SIM_H;
	const LAYERS = 28;

	const INTRO_DUR = 2.6;
	let introT0 = null;
	const easeOutCubic = x => 1 - Math.pow(1 - x, 3);

	// Config and Rig
	const cfg = {
		size: 228,
		depth: 0.0,
		dissolve: 0.23,
		text: "LIQUID",
		greenScreen: false,
		scheme: "Original",
		colBg: "#050607",
		col0: "#051a73",
		col1: "#33f2ff",
		col2: "#ebffff",
		col3: "#f22e0d",
		col4: "#6b1311",
		col5: "#ff571a",
		frontCol: "#4d0d0b",
		backCol: "#190303",
		dpr: Math.min(window.devicePixelRatio, 2),
		animSpeed: 1.0,
		animation: "Floating Dream"
	};

	const rig = { rotX: -1.29, rotY: 0.04, rotZ: 0.92, fov: 50 };

	// 5 Preset color schemes
	const schemes = {
		"Original": {
			bg: "#050607",
			col0: "#051a73",
			col1: "#33f2ff",
			col2: "#ebffff",
			col3: "#f22e0d",
			col4: "#6b1311",
			col5: "#ff571a",
			front: "#4d0d0b",
			back: "#190303"
		},
		"Cyber Acid": {
			bg: "#0c0214",
			col0: "#3a0066",
			col1: "#e000ff",
			col2: "#ffffff",
			col3: "#00ff66",
			col4: "#ff007c",
			col5: "#9eff00",
			front: "#8800ff",
			back: "#220044"
		},
		"Solar Flare": {
			bg: "#0c0200",
			col0: "#3d0800",
			col1: "#ff3c00",
			col2: "#ffe1b3",
			col3: "#ffb300",
			col4: "#240500",
			col5: "#ffffff",
			front: "#ff5500",
			back: "#440000"
		},
		"Deep Abyss": {
			bg: "#000508",
			col0: "#001326",
			col1: "#00557a",
			col2: "#00ffff",
			col3: "#00ffaa",
			col4: "#002233",
			col5: "#a6ffea",
			front: "#0088cc",
			back: "#001122"
		},
		"Sakura Mist": {
			bg: "#0f0914",
			col0: "#2d123d",
			col1: "#b57aff",
			col2: "#ffc4e1",
			col3: "#ffeab3",
			col4: "#4a1835",
			col5: "#ffffff",
			front: "#b57aff",
			back: "#2d123d"
		}
	};

	// Instantiated active colors
	const colBg = new THREE.Color(cfg.colBg);
	const col0 = new THREE.Color(cfg.col0);
	const col1 = new THREE.Color(cfg.col1);
	const col2 = new THREE.Color(cfg.col2);
	const col3 = new THREE.Color(cfg.col3);
	const col4 = new THREE.Color(cfg.col4);
	const col5 = new THREE.Color(cfg.col5);
	const frontCol = new THREE.Color(cfg.frontCol);
	const backCol = new THREE.Color(cfg.backCol);

	const TEX_W = 1024, TEX_H = 512;
	function makeGlyphTexture() {
		const c = document.createElement("canvas");
		c.width = TEX_W; c.height = TEX_H;
		const ctx = c.getContext("2d");
		ctx.clearRect(0, 0, TEX_W, TEX_H);
		ctx.fillStyle = "#fff";
		ctx.textAlign = "center";
		ctx.textBaseline = "middle";
		ctx.font = `900 ${cfg.size}px "Arial Black", Impact, sans-serif`;
		ctx.fillText(cfg.text, TEX_W / 2, TEX_H / 2);
		const tex = new THREE.CanvasTexture(c);
		tex.minFilter = THREE.LinearFilter;
		tex.magFilter = THREE.LinearFilter;
		return tex;
	}

	const renderer = new THREE.WebGLRenderer({
		canvas: document.querySelector(".webgl"),
		antialias: true,
	});
	renderer.setPixelRatio(cfg.dpr);
	renderer.setSize(window.innerWidth, window.innerHeight);

	const textScene = new THREE.Scene();
	const camera = new THREE.PerspectiveCamera(
		rig.fov,
		window.innerWidth / window.innerHeight,
		0.1,
		100,
	);
	camera.position.set(0, 0, 7.5);
	camera.lookAt(0, 0, 0);

	let glyphTex = makeGlyphTexture();
	const textGroup = new THREE.Group();
	textScene.add(textGroup);

	function buildTextStack() {
		while (textGroup.children.length) {
			const m = textGroup.children.pop();
			m.geometry.dispose();
			m.material.dispose();
		}
		const W = 7.6, H = W * (TEX_H / TEX_W);
		const n = cfg.depth <= 0.001 ? 1 : LAYERS;
		for (let i = 0; i < n; i++) {
			const t = n === 1 ? 0 : i / (n - 1);
			const mat = new THREE.MeshBasicMaterial({
				map: glyphTex,
				transparent: true,
				alphaTest: 0.5,
				color: frontCol.clone().lerp(backCol, t),
				side: THREE.DoubleSide,
			});
			const mesh = new THREE.Mesh(new THREE.PlaneGeometry(W, H), mat);
			mesh.position.z = -t * cfg.depth;
			textGroup.add(mesh);
		}
	}
	buildTextStack();

	const rtTextOpts = {
		minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
		format: THREE.RGBAFormat, depthBuffer: true, stencilBuffer: false,
	};
	const rtSimOpts = {
		minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
		format: THREE.RGBAFormat, type: THREE.HalfFloatType, depthBuffer: false, stencilBuffer: false,
	};

	let rtText, rtA, rtB;
	function makeTargets() {
		SIM_H = 768;
		SIM_W = Math.max(256, Math.round(SIM_H * window.innerWidth / window.innerHeight));
		const dpr = cfg.dpr;
		const TXT_W = Math.floor(window.innerWidth * dpr);
		const TXT_H = Math.floor(window.innerHeight * dpr);
		if (rtText) { rtText.dispose(); rtA.dispose(); rtB.dispose(); }
		rtText = new THREE.WebGLRenderTarget(TXT_W, TXT_H, rtTextOpts);
		rtA = new THREE.WebGLRenderTarget(SIM_W, SIM_H, rtSimOpts);
		rtB = new THREE.WebGLRenderTarget(SIM_W, SIM_H, rtSimOpts);
		if (simMat) simMat.uniforms.uTexel.value.set(1 / SIM_W, 1 / SIM_H);
		if (typeof compMat !== "undefined") {
			compMat.uniforms.uTexelC.value.set(1 / TXT_W, 1 / TXT_H);
			compMat.uniforms.uTexelS.value.set(1 / SIM_W, 1 / SIM_H);
		}
	}

	const simScene = new THREE.Scene();
	const simCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

	const simMat = new THREE.ShaderMaterial({
		uniforms: {
			uPrev: { value: null },
			uSrc: { value: null },
			uTexel: { value: new THREE.Vector2(1, 1) },
			uTime: { value: 0 },
			uFrame: { value: 0 },
		},
		vertexShader: `
		varying vec2 vUv;
		void main(){ vUv = uv; gl_Position = vec4(position.xy, 0., 1.); }
	  `,
		fragmentShader: `
		precision highp float;
		varying vec2 vUv;
		uniform sampler2D uPrev, uSrc;
		uniform vec2 uTexel;
		uniform float uTime, uFrame;

		const float NECK_FADE  = 0.030;
		const float NECK_KEEP  = 0.035;
		const float DROP_REACH = 5.2;
		const float TENSION    = 0.16;

		float hash(vec2 p){
		  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
		}
		float noise(float x){
		  float i = floor(x), f = fract(x);
		  float a = hash(vec2(i, 0.)), b = hash(vec2(i + 1., 0.));
		  return mix(a, b, f * f * (3. - 2. * f));
		}

		void main(){
		  float a0 = texture2D(uSrc, vUv).a;
		  float a1 = texture2D(uSrc, vUv + vec2(uTexel.x * 2.5, 0.)).a;
		  float a2 = texture2D(uSrc, vUv - vec2(uTexel.x * 2.5, 0.)).a;
		  float a3 = texture2D(uSrc, vUv + vec2(0., uTexel.y * 2.5)).a;
		  float a4 = texture2D(uSrc, vUv - vec2(0., uTexel.y * 2.5)).a;
		  float srcA = max(max(a0, a1), max(max(a2, a3), a4));
		  float src  = smoothstep(0.03, 0.16, srcA) * 0.95;
		  float prev = texture2D(uPrev, vUv).r;

		  float col  = vUv.x * 1024.0;

		  float visc = noise(col * 0.035) * 0.5
					 + noise(col * 0.13 + 7.0) * 0.25
					 + noise(col * 0.06 + uTime * 0.07) * 0.25;

		  float wob = ((noise(col * 0.08 + uTime * 0.15) - 0.5)
					+  (noise(vUv.y * 38.0 + col * 0.013 + uTime * 0.45) - 0.5) * 0.7)
					* uTexel.x * 2.2;
		  float grav = 1.0 + (1.0 - vUv.y) * 1.5;
		  float up1 = texture2D(uPrev, vUv + vec2(wob,        uTexel.y * grav        )).r;
		  float up2 = texture2D(uPrev, vUv + vec2(wob * 1.6,  uTexel.y * 2.0 * grav  )).r;
		  float up3 = texture2D(uPrev, vUv + vec2(wob * 2.3,  uTexel.y * 3.2 * grav  )).r;
		  float speedN = noise(col * 0.045 + uTime * 0.12);
		  float pull = mix(up1, up2, smoothstep(0.45, 0.80, speedN));
		  pull = mix(pull, max(pull, up3), smoothstep(0.70, 0.97, speedN));

		  float wayAbove = texture2D(uPrev, vUv + vec2(0., uTexel.y * 10.0 * grav)).r;
		  float detached = (1.0 - smoothstep(0.04, 0.22, wayAbove))
						 * smoothstep(0.06, 0.30, pull)
						 * (1.0 - src);
		  float upFar = texture2D(uPrev, vUv + vec2(wob * 2.0, uTexel.y * DROP_REACH * grav)).r;
		  pull = max(pull, upFar * detached);

		  float lf = texture2D(uPrev, vUv + vec2(-uTexel.x, uTexel.y * 0.4)).r;
		  float rt = texture2D(uPrev, vUv + vec2( uTexel.x, uTexel.y * 0.4)).r;
		  float side = max(lf, rt) * (0.944 + visc * 0.035);

		  float screenAbove = texture2D(uPrev, vUv + vec2(0.,  uTexel.y)).r;
		  float screenBelow = texture2D(uPrev, vUv + vec2(0., -uTexel.y)).r;
		  float blur = (lf + rt + screenAbove + screenBelow) * 0.25;

		  float lf2 = texture2D(uPrev, vUv + vec2(-uTexel.x * 2.5, 0.)).r;
		  float rt2 = texture2D(uPrev, vUv + vec2( uTexel.x * 2.5, 0.)).r;
		  float thin    = 1.0 - smoothstep(0.05, 0.35, max(lf2, rt2));
		  float hanging = smoothstep(0.15, 0.50, screenAbove)
						* smoothstep(0.15, 0.50, screenBelow);
		  float neck   = thin * hanging * (1.0 - src);
		  float breakN = smoothstep(0.45, 0.85, noise(col * 0.05 + uTime * 0.55));
		  float pinch  = neck * breakN;

		  float keep = 0.980 + visc * 0.019 - pinch * NECK_KEEP;
		  float fall = pull * keep;

		  float head = pull * (1.0 - smoothstep(0.02, 0.30, screenBelow));
		  fall = max(fall, head);

		  float flow = 0.36 + visc * 0.44 + 0.18 * noise(col * 0.02 + uTime * 0.30);
		  flow = min(1.0, flow + detached * 0.30);

		  float target = max(fall, side);
		  float v = mix(prev, target, flow);
		  v = mix(v, blur, TENSION);
		  v = max(v, prev * (0.9965 - pinch * NECK_FADE));
		  v = min(v, 1.0);
		  v = max(v, src);

		  gl_FragColor = vec4(v, 0., 0., 1.);
		}
	  `,
	});
	simScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), simMat));

	const compScene = new THREE.Scene();
	const compMat = new THREE.ShaderMaterial({
		uniforms: {
			uSim: { value: null },
			uText: { value: null },
			uTime: { value: 0 },
			uDissolve: { value: cfg.dissolve },
			uTexelC: { value: new THREE.Vector2(1, 1) },
			uTexelS: { value: new THREE.Vector2(1, 1) },
			uGreenScreen: { value: 0.0 },
			uColBg: { value: colBg },
			uCol0: { value: col0 },
			uCol1: { value: col1 },
			uCol2: { value: col2 },
			uCol3: { value: col3 },
			uCol4: { value: col4 },
			uCol5: { value: col5 },
		},
		vertexShader: `
		varying vec2 vUv;
		void main(){ vUv = uv; gl_Position = vec4(position.xy, 0., 1.); }
	  `,
		fragmentShader: `
		precision highp float;
		varying vec2 vUv;
		uniform sampler2D uSim, uText;
		uniform float uTime, uDissolve;
		uniform vec2 uTexelC, uTexelS;
		uniform float uGreenScreen;

		uniform vec3 uColBg;
		uniform vec3 uCol0;
		uniform vec3 uCol1;
		uniform vec3 uCol2;
		uniform vec3 uCol3;
		uniform vec3 uCol4;
		uniform vec3 uCol5;

		const float FAT_R   = 2.5;
		const float FAT_CAP = 0.42;

		float hash(vec2 p){
		  return fract(sin(dot(p, vec2(269.5, 183.3)) + uTime) * 43758.5453);
		}
		float hash2(vec2 p){
		  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
		}
		float noise2(vec2 p){
		  vec2 i = floor(p), f = fract(p);
		  f = f * f * (3. - 2. * f);
		  float a = hash2(i), b = hash2(i + vec2(1,0));
		  float c = hash2(i + vec2(0,1)), d = hash2(i + vec2(1,1));
		  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
		}

		void main(){
		  float v = texture2D(uSim, vUv).r;
		  vec4 tc = texture2D(uText, vUv);

		  vec2 fo = uTexelS * FAT_R;
		  float vb = v * 0.28
			+ (texture2D(uSim, vUv + vec2(fo.x, 0.)).r
			+  texture2D(uSim, vUv - vec2(fo.x, 0.)).r
			+  texture2D(uSim, vUv + vec2(0., fo.y)).r
			+  texture2D(uSim, vUv - vec2(0., fo.y)).r) * 0.13
			+ (texture2D(uSim, vUv + fo * 0.707).r
			+  texture2D(uSim, vUv - fo * 0.707).r
			+  texture2D(uSim, vUv + vec2(fo.x, -fo.y) * 0.707).r
			+  texture2D(uSim, vUv + vec2(-fo.x, fo.y) * 0.707).r) * 0.05;
		  float fat = smoothstep(0.12, 0.44, vb) * FAT_CAP;
		  float hiBand = smoothstep(0.72, 0.86, v);
		  v = max(v, fat * (1.0 - hiBand));

		  float inText = smoothstep(0.25, 0.75, tc.a);
		  float dripMask = 1.0 - smoothstep(0.89, 0.925, v) * (1.0 - uDissolve * inText);
		  float fall1 = noise2(vec2(vUv.x * 70.0, vUv.y * 7.0 + uTime * 1.6));
		  float fall2 = noise2(vec2(vUv.x * 28.0, vUv.y * 3.5 + uTime * 0.8));
		  float stream = fall1 * 0.55 + fall2 * 0.45;

		  vec3 deepBlue = uCol0;
		  vec3 cyan     = uCol1;
		  vec3 white    = uCol2;
		  vec3 hotRed   = uCol3;

		  vec3 fluid = vec3(0.);
		  fluid = mix(fluid, deepBlue, smoothstep(0.03, 0.18, v));
		  fluid = mix(fluid, cyan,     smoothstep(0.18, 0.50, v));
		  fluid = mix(fluid, white,    smoothstep(0.50, 0.66, v));
		  fluid = mix(fluid, hotRed,   smoothstep(0.68, 0.78, v));
		  vec3 textRed = uCol4;
		  fluid = mix(fluid, textRed,  smoothstep(0.80, 0.88, v));
		  fluid = mix(fluid, uCol5,    smoothstep(0.905, 0.928, v));

		  float glow = smoothstep(0.12, 0.5, v) * (1. - smoothstep(0.55, 0.85, v));
		  fluid += cyan * glow * 0.35;

		  fluid *= mix(1.0, 0.78 + 0.34 * stream, dripMask);

		  vec3 col = (uGreenScreen > 0.5) ? vec3(0.0, 1.0, 0.0) : uColBg;
		  float fluidA = smoothstep(0.03, 0.10, v);
		  fluidA *= smoothstep(0.0, 0.12, vUv.y);
		  col = mix(col, fluid, fluidA);

		  vec3 tcol = tc.rgb / max(tc.a, 0.001);
		  float ta = smoothstep(0.25, 0.75, tc.a);
		  col = mix(col, tcol, ta * (1.0 - uDissolve));

		  float grainMask = max(fluidA, ta);
		  col += (hash(gl_FragCoord.xy * 0.7) - 0.5) * 0.10 * grainMask;

		  gl_FragColor = vec4(col, 1.0);
		}
	  `,
	});
	compScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), compMat));

	makeTargets();

	function clearSim() {
		renderer.setRenderTarget(rtA); renderer.setClearColor(0x000000, 0); renderer.clear();
		renderer.setRenderTarget(rtB); renderer.clear();
		renderer.setRenderTarget(null);
		frame = 0;
		introT0 = null;
	}

	function rebuildText() {
		const old = glyphTex;
		glyphTex = makeGlyphTexture();
		old.dispose();
		buildTextStack();
		clearSim();
	}

	const _W = 7.6, _H = _W * (TEX_H / TEX_W);
	const _corners = [
		new THREE.Vector3(-_W / 2, -_H / 2, 0), new THREE.Vector3(_W / 2, -_H / 2, 0),
		new THREE.Vector3(_W / 2, _H / 2, 0), new THREE.Vector3(-_W / 2, _H / 2, 0),
	];
	const _v = new THREE.Vector3();

	function recenterTextX() {
		textGroup.position.x = 0;
		textGroup.updateMatrixWorld(true);
		const a = _v.set(0, 0, 0).project(camera).x;
		const b = _v.set(1, 0, 0).project(camera).x;
		const ndcPerWorld = b - a;
		for (let it = 0; it < 4; it++) {
			let min = Infinity, max = -Infinity;
			for (const c of _corners) {
				_v.copy(c).applyEuler(textGroup.rotation);
				_v.x += textGroup.position.x;
				_v.project(camera);
				if (_v.x < min) min = _v.x;
				if (_v.x > max) max = _v.x;
			}
			const centerNdc = (min + max) * 0.5;
			if (Math.abs(centerNdc) < 0.0005) break;
			textGroup.position.x -= centerNdc / ndcPerWorld;
		}
	}

	// View Zoom and Drag variables
	let isDragging = false;
	const prevPointerPos = { x: 0, y: 0 };
	const dragOffset = new THREE.Vector3(0, 0, 0);
	let simTime = 0;

	function applyRig() {
		let rx = rig.rotX;
		let ry = rig.rotY;
		let rz = rig.rotZ;
		let f = rig.fov;

		// Apply preset animations as offsets
		if (cfg.animation === "Floating Dream") {
			rx += Math.sin(simTime * 0.4) * 0.15;
			ry += Math.cos(simTime * 0.3) * 0.15;
		} else if (cfg.animation === "Slow Spin") {
			ry += simTime * 0.15;
			rx += Math.sin(simTime * 0.2) * 0.05;
		} else if (cfg.animation === "Tidal Wave") {
			ry += Math.sin(simTime * 0.3) * 0.25;
			rz += Math.cos(simTime * 0.2) * 0.1;
		} else if (cfg.animation === "Infinite Loop") {
			rx += Math.sin(simTime * 0.3) * 0.12;
			ry += Math.sin(simTime * 0.6) * 0.15;
		}
		// "Static" has no camera offset

		textGroup.rotation.set(rx, ry, rz);
		camera.fov = f;
		camera.updateProjectionMatrix();

		recenterTextX();

		// Add custom drag offset
		textGroup.position.x += dragOffset.x;
		textGroup.position.y += dragOffset.y;
	}

	function bindSlider(id, obj, key, labelId, fmt, onChange) {
		const el = document.getElementById(id);
		const lab = document.getElementById(labelId);
		const update = () => {
			obj[key] = parseFloat(el.value);
			lab.textContent = fmt(obj[key]);
			onChange();
		};
		el.addEventListener("input", update);
		lab.textContent = fmt(obj[key]);
	}

	bindSlider("size", cfg, "size", "vSize", v => v + "px", rebuildText);
	bindSlider("dissolve", cfg, "dissolve", "vDissolve", v => Math.round(v * 100) + "%",
						 () => { compMat.uniforms.uDissolve.value = cfg.dissolve; });
	bindSlider("rotX", rig, "rotX", "vRotX", v => v.toFixed(2) + " rad", applyRig);
	bindSlider("rotY", rig, "rotY", "vRotY", v => v.toFixed(2) + " rad", applyRig);
	bindSlider("rotZ", rig, "rotZ", "vRotZ", v => v.toFixed(2) + " rad", applyRig);
	bindSlider("fov", rig, "fov", "vFov", v => v + "°", applyRig);
	document.getElementById("reset").addEventListener("click", clearSim);

	// Zoom with wheel
	window.addEventListener("wheel", (e) => {
		if (e.target.closest('#panel') || e.target.closest('.lil-gui')) {
			return;
		}
		e.preventDefault();
		let z = camera.position.z + e.deltaY * 0.005;
		z = Math.max(2.0, Math.min(25.0, z));
		camera.position.z = z;
		applyRig();
	}, { passive: false });

	// Drag object across screen
	window.addEventListener("pointerdown", (e) => {
		if (e.target.closest('#panel') || e.target.closest('.lil-gui') || e.target.closest('.ui-row') || e.target.closest('.lockup')) {
			return;
		}
		isDragging = true;
		prevPointerPos.x = e.clientX;
		prevPointerPos.y = e.clientY;
		try {
			document.querySelector(".webgl").setPointerCapture(e.pointerId);
		} catch (err) {}
	});

	window.addEventListener("pointermove", (e) => {
		if (!isDragging) return;
		const dx = e.clientX - prevPointerPos.x;
		const dy = e.clientY - prevPointerPos.y;
		prevPointerPos.x = e.clientX;
		prevPointerPos.y = e.clientY;

		// Convert screen delta to 3D world units at depth of camera position
		const fovRad = (camera.fov * Math.PI) / 180;
		const worldHeight = 2 * camera.position.z * Math.tan(fovRad / 2);
		const worldWidth = worldHeight * camera.aspect;

		const worldDx = (dx / window.innerWidth) * worldWidth;
		const worldDy = -(dy / window.innerHeight) * worldHeight;

		dragOffset.x += worldDx;
		dragOffset.y += worldDy;

		applyRig();
	});

	window.addEventListener("pointerup", (e) => {
		isDragging = false;
		try {
			document.querySelector(".webgl").releasePointerCapture(e.pointerId);
		} catch (err) {}
	});

	window.addEventListener("pointercancel", (e) => {
		isDragging = false;
		try {
			document.querySelector(".webgl").releasePointerCapture(e.pointerId);
		} catch (err) {}
	});

	// Toggle all UI elements on "H" keypress
	window.addEventListener("keydown", (e) => {
		if (e.key.toLowerCase() === "h") {
			if (document.activeElement && (
				document.activeElement.tagName === "INPUT" || 
				document.activeElement.tagName === "TEXTAREA" ||
				document.activeElement.isContentEditable
			)) {
				return;
			}
			document.body.classList.toggle("hide-ui");
		}
	});

	// Helper to update colors in text meshes and shader uniforms
	function updateColors() {
		const n = textGroup.children.length;
		for (let i = 0; i < n; i++) {
			const mesh = textGroup.children[i];
			const t = n === 1 ? 0 : i / (n - 1);
			mesh.material.color.copy(frontCol).lerp(backCol, t);
		}
		compMat.uniforms.uColBg.value.copy(colBg);
		compMat.uniforms.uCol0.value.copy(col0);
		compMat.uniforms.uCol1.value.copy(col1);
		compMat.uniforms.uCol2.value.copy(col2);
		compMat.uniforms.uCol3.value.copy(col3);
		compMat.uniforms.uCol4.value.copy(col4);
		compMat.uniforms.uCol5.value.copy(col5);
	}

	// Update GUI when color variables are modified manually
	function onColorChange() {
		if (isUpdatingFromScheme) return;
		schemeController.setValue("Custom");

		colBg.set(cfg.colBg);
		col0.set(cfg.col0);
		col1.set(cfg.col1);
		col2.set(cfg.col2);
		col3.set(cfg.col3);
		col4.set(cfg.col4);
		col5.set(cfg.col5);
		frontCol.set(cfg.frontCol);
		backCol.set(cfg.backCol);

		updateColors();

		if (cfg.greenScreen) {
			document.body.style.background = "#00ff00";
		} else {
			document.body.style.background = cfg.colBg;
		}
	}

	let isUpdatingFromScheme = false;
	function applyScheme(schemeName) {
		if (schemeName === "Custom") return;
		const s = schemes[schemeName];
		cfg.colBg = s.bg;
		cfg.col0 = s.col0;
		cfg.col1 = s.col1;
		cfg.col2 = s.col2;
		cfg.col3 = s.col3;
		cfg.col4 = s.col4;
		cfg.col5 = s.col5;
		cfg.frontCol = s.front;
		cfg.backCol = s.back;

		colBg.set(cfg.colBg);
		col0.set(cfg.col0);
		col1.set(cfg.col1);
		col2.set(cfg.col2);
		col3.set(cfg.col3);
		col4.set(cfg.col4);
		col5.set(cfg.col5);
		frontCol.set(cfg.frontCol);
		backCol.set(cfg.backCol);

		isUpdatingFromScheme = true;
		bgController.setValue(cfg.colBg);
		col0Controller.setValue(cfg.col0);
		col1Controller.setValue(cfg.col1);
		col2Controller.setValue(cfg.col2);
		col3Controller.setValue(cfg.col3);
		col4Controller.setValue(cfg.col4);
		col5Controller.setValue(cfg.col5);
		frontController.setValue(cfg.frontCol);
		backController.setValue(cfg.backCol);
		isUpdatingFromScheme = false;

		updateColors();

		if (cfg.greenScreen) {
			document.body.style.background = "#00ff00";
		} else {
			document.body.style.background = cfg.colBg;
		}
	}

	// Build GUI settings panel
	const gui = new GUI({ title: "WebGL Settings" });

	gui.add(cfg, "text").name("Texto").onChange(rebuildText);
	gui.add(cfg, "greenScreen").name("Pantalla Verde").onChange(v => {
		compMat.uniforms.uGreenScreen.value = v ? 1.0 : 0.0;
		if (v) {
			document.body.style.background = "#00ff00";
		} else {
			document.body.style.background = cfg.scheme === "Custom" ? cfg.colBg : schemes[cfg.scheme].bg;
		}
	});

	let schemeController;
	schemeController = gui.add(cfg, "scheme", Object.keys(schemes).concat("Custom")).name("Esquema Color").onChange(applyScheme);

	// Custom Colors folder
	const colorsFolder = gui.addFolder("Colores Personalizados").close();
	let bgController = colorsFolder.addColor(cfg, "colBg").name("Fondo").onChange(onColorChange);
	let col0Controller = colorsFolder.addColor(cfg, "col0").name("Líquido Profundo").onChange(onColorChange);
	let col1Controller = colorsFolder.addColor(cfg, "col1").name("Líquido Brillo").onChange(onColorChange);
	let col2Controller = colorsFolder.addColor(cfg, "col2").name("Líquido Blanco").onChange(onColorChange);
	let col3Controller = colorsFolder.addColor(cfg, "col3").name("Líquido Caliente").onChange(onColorChange);
	let col4Controller = colorsFolder.addColor(cfg, "col4").name("Texto Fusión").onChange(onColorChange);
	let col5Controller = colorsFolder.addColor(cfg, "col5").name("Derrame").onChange(onColorChange);
	let frontController = colorsFolder.addColor(cfg, "frontCol").name("Frente Texto 3D").onChange(onColorChange);
	let backController = colorsFolder.addColor(cfg, "backCol").name("Fondo Texto 3D").onChange(onColorChange);

	gui.add(cfg, "dpr", 0.5, 3.0, 0.1).name("Resolución (DPR)").onChange(v => {
		renderer.setPixelRatio(v);
		makeTargets();
		clearSim();
	});

	gui.add(cfg, "animation", ["Static", "Floating Dream", "Slow Spin", "Tidal Wave", "Infinite Loop"]).name("Animación");
	gui.add(cfg, "animSpeed", 0.0, 3.0, 0.1).name("Velocidad Anim");

	// Reset View Action
	function resetView() {
		dragOffset.set(0, 0, 0);
		camera.position.set(0, 0, 7.5);
		applyRig();
	}
	gui.add({ resetView }, "resetView").name("Restablecer Vista");

	// Initial State Setup
	applyScheme("Original");
	applyRig();

	let frame = 0;
	let running = true;
	let startMs = performance.now();
	let lastFrameTime = performance.now();
	clearSim();

	document.addEventListener("visibilitychange", () => {
		if (document.hidden) {
			running = false;
			pausedMs = performance.now();
		} else if (!running) {
			startMs += performance.now() - pausedMs;
			lastFrameTime = performance.now();
			running = true;
			animate();
		}
	});
	let pausedMs = 0;

	function animate() {
		if (!running) return;
		requestAnimationFrame(animate);

		const now = performance.now();
		const dt = (now - lastFrameTime) / 1000;
		lastFrameTime = now;

		// Accumulate time based on speed setting
		simTime += dt * cfg.animSpeed;

		if (introT0 === null) introT0 = simTime;
		const ip = Math.min((simTime - introT0) / INTRO_DUR, 1);
		if (ip < 1) {
			const e = easeOutCubic(ip);
			compMat.uniforms.uDissolve.value = 1.0 + (cfg.dissolve - 1.0) * e;
			textGroup.scale.setScalar(1.0 + (1.0 - e) * 0.07);
		} else {
			compMat.uniforms.uDissolve.value = cfg.dissolve;
			textGroup.scale.setScalar(1.0);
		}

		// Apply animations/rig update every frame
		applyRig();

		renderer.setRenderTarget(rtText);
		renderer.setClearColor(0x000000, 0);
		renderer.clear();
		renderer.render(textScene, camera);

		for (let i = 0; i < 4; i++) {
			simMat.uniforms.uPrev.value = rtA.texture;
			simMat.uniforms.uSrc.value = rtText.texture;
			simMat.uniforms.uTime.value = simTime;
			simMat.uniforms.uFrame.value = frame++;
			renderer.setRenderTarget(rtB);
			renderer.render(simScene, simCam);
			[rtA, rtB] = [rtB, rtA];
		}

		renderer.setRenderTarget(null);
		compMat.uniforms.uSim.value = rtA.texture;
		compMat.uniforms.uText.value = rtText.texture;
		compMat.uniforms.uTime.value = simTime;
		renderer.render(compScene, simCam);
	}
	animate();

	let resizeTimer;
	window.addEventListener("resize", () => {
		clearTimeout(resizeTimer);
		resizeTimer = setTimeout(() => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
			makeTargets();
			applyRig();
			clearSim();
		}, 150);
	});
	</script>
</body>
</html>
