<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strait of Hormuz — Oil Export Flows</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: #0a0e12;
            transition: background-color 0.3s ease;
        }

        #chartdiv {
            max-width: 100%;
            height: 100vh;
            background-color: #0a0e12;
            transition: background-color 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="chartdiv"></div>

    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Dark.js"></script>

    <script type="module">
        import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

        const am5 = window.am5;
        const am5map = window.am5map;
        const am5themes_Animated = window.am5themes_Animated;
        const am5geodata_worldLow = window.am5geodata_worldLow;

        // Theme presets: 1 default + 5 tech/IT themes
        const themes = {
            'Crude & Tar (Default)': {
                deepCrude: '#141a1a',
                slick: '#1e2824',
                pipeline: '#3a5040',
                amber: '#c8890a',
                sulfur: '#a89050',
                flare: '#f5d090',
                producer: '#6b5a10',
                importer: '#2a4030'
            },
            'Cyberpunk Neon': {
                deepCrude: '#0f1016',
                slick: '#1a1c29',
                pipeline: '#9b5de5',
                amber: '#ff007f',
                sulfur: '#ffea00',
                flare: '#00f5ff',
                producer: '#00ff66',
                importer: '#ff00ff'
            },
            'Matrix Terminal': {
                deepCrude: '#080808',
                slick: '#1b1b1b',
                pipeline: '#005511',
                amber: '#00ff33',
                sulfur: '#adff2f',
                flare: '#00aa22',
                producer: '#00ff66',
                importer: '#00aa22'
            },
            'Quantum Ice': {
                deepCrude: '#0b132b',
                slick: '#1c2541',
                pipeline: '#90e0ef',
                amber: '#0077b6',
                sulfur: '#caf0f8',
                flare: '#00b4d8',
                producer: '#48cae4',
                importer: '#b388ff'
            },
            'Synthwave Retro': {
                deepCrude: '#1a0933',
                slick: '#240d47',
                pipeline: '#3a1c6a',
                amber: '#ff7e5f',
                sulfur: '#feb47b',
                flare: '#ff007f',
                producer: '#ff007f',
                importer: '#00ffff'
            },
            'Amber Console': {
                deepCrude: '#110b00',
                slick: '#221800',
                pipeline: '#885f00',
                amber: '#ffb000',
                sulfur: '#ffd000',
                flare: '#d39400',
                producer: '#ffaa00',
                importer: '#e59f00'
            }
        };

        const params = {
            theme: 'Crude & Tar (Default)',
            greenscreen: false,
            autoRotate: true,
            rotationSpeed: 1.0,
            zoomLevel: 1.6,
            deepCrude: '#141a1a',
            slickColor: '#1e2824',
            pipelineColor: '#3a5040',
            amberColor: '#c8890a',
            sulfurColor: '#a89050',
            flareColor: '#f5d090',
            producerColor: '#6b5a10',
            importerColor: '#2a4030'
        };

        // Create root element
        var root = am5.Root.new("chartdiv");

        // Define base theme rule
        var oilTheme = am5.Theme.new(root);
        oilTheme.rule("InterfaceColors").setAll({
            primaryButton: am5.color(0x1e2824),
            primaryButtonHover: am5.color(0x3a5040),
            primaryButtonDown: am5.color(0x0a0e12),
            primaryButtonActive: am5.color(0xc8890a),
            primaryButtonText: am5.color(0xf5d090),
            secondaryButton: am5.color(0x1e2824),
            secondaryButtonHover: am5.color(0x3a5040),
            secondaryButtonDown: am5.color(0x141a1a),
            secondaryButtonText: am5.color(0xf5d090),
            background: am5.color(0x0a0e12),
            text: am5.color(0xf5d090)
        });
        root.setThemes([am5themes_Animated.new(root), oilTheme]);

        // Root container background
        root.container.set("background", am5.Rectangle.new(root, {
            fill: am5.color(params.deepCrude),
            fillOpacity: 1
        }));

        // ---- Chart ----
        var chart = root.container.children.push(am5map.MapChart.new(root, {
            panX: "rotateX",
            panY: "rotateY",
            projection: am5map.geoOrthographic(),
            homeGeoPoint: { longitude: 0, latitude: 0 },
            homeRotationX: 0,
            homeRotationY: 0,
            homeZoomLevel: 1,
            minZoomLevel: 0.8,
            zoomLevel: 1,
            wheelY: "zoom" // Enable scroll-wheel zoom
        }));

        // ---- Ocean background ----
        var bgSeries = chart.series.push(am5map.MapPolygonSeries.new(root, {}));
        bgSeries.mapPolygons.template.setAll({
            fill: am5.color(params.deepCrude),
            fillOpacity: 1,
            strokeOpacity: 0
        });
        bgSeries.data.push({ geometry: am5map.getGeoRectangle(90, 180, -90, -180) });

        // ---- Graticule ----
        var graticuleSeries = chart.series.push(am5map.GraticuleSeries.new(root, {}));
        graticuleSeries.mapLines.template.setAll({
            stroke: am5.color(params.pipelineColor),
            strokeOpacity: 0.25,
            strokeWidth: 0.5
        });

        // ---- Countries ----
        var polygonSeries = chart.series.push(am5map.MapPolygonSeries.new(root, {
            geoJSON: am5geodata_worldLow
        }));
        polygonSeries.mapPolygons.template.setAll({
            fill: am5.color(params.slickColor),
            stroke: am5.color(params.pipelineColor),
            strokeWidth: 0.5,
            strokeOpacity: 0.6
        });

        // Highlight producer & importer countries
        var producerIds = ["SA", "IQ", "AE", "KW", "IR", "QA"];
        var importerIds = ["CN", "JP", "KR", "IN", "SG", "IT", "GR", "NL"];

        polygonSeries.events.on("datavalidated", function() {
            applyCurrentColors();
        });

        // ---- MapSankeySeries — Oil flows through Hormuz ----
        var sankeySeries = chart.series.push(am5map.MapSankeySeries.new(root, {
            polygonSeries: polygonSeries,
            maxWidth: 0.8,
            controlPointDistance: 0.4,
            resolution: 60,
            nodePadding: 0.1
        }));

        sankeySeries.mapPolygons.template.setAll({
            fill: am5.color(params.amberColor),
            fillOpacity: 0.4,
            strokeOpacity: 0,
            tooltipText: "{source} > {target}\n{value}k bbl/day"
        });

        sankeySeries.nodes.mapPolygons.template.setAll({
            fill: am5.color(params.amberColor),
            stroke: am5.color(params.flareColor),
            strokeWidth: 1.5,
            fillOpacity: 0.95,
            strokeOpacity: 1,
            tooltipText: "{name}"
        });

        // ---- Animated oil drop bullets ----
        sankeySeries.bullets.push(function() {
            return am5.Bullet.new(root, {
                locationX: 0,
                autoRotate: true,
                autoRotateAngle: -90,
                sprite: am5.Graphics.new(root, {
                    // Oil drop shape
                    svgPath: "M0,-7 C2,-4 5,0 5,3 C5,6 3,8 0,8 C-3,8 -5,6 -5,3 C-5,0 -2,-4 0,-7 Z",
                    fill: am5.color(params.amberColor),
                    stroke: am5.color(params.pipelineColor),
                    strokeWidth: 0.5,
                    centerX: am5.p50,
                    centerY: am5.p50,
                    scale: 0.45,
                    visible: false
                })
            });
        });

        sankeySeries.events.on("datavalidated", function() {
            // Find the longest path to scale durations proportionally
            var maxLength = 0;
            am5.array.each(sankeySeries.dataItems, function(dataItem) {
                var len = sankeySeries.getPathLength(dataItem);
                if (len > maxLength) maxLength = len;
            });

            var baseDuration = 8000; // longest path duration
            var minDuration = 2000;

            am5.array.each(sankeySeries.dataItems, function(dataItem) {
                var pathLength = sankeySeries.getPathLength(dataItem) || maxLength;
                var dur = maxLength > 0 ? Math.max(minDuration, (pathLength / maxLength) * baseDuration) : baseDuration;

                var bullets = dataItem.bullets;
                if (bullets) {
                    am5.array.each(bullets, function(bullet) {
                        var randomDur = dur * (0.8 + Math.random() * 0.4);
                        var delay = Math.random() * randomDur;
                        setTimeout(function() {
                            var sprite = bullet.get("sprite");
                            if (sprite) {
                                sprite.set("visible", true);
                                sprite.setAll({
                                    fill: am5.color(params.amberColor),
                                    stroke: am5.color(params.pipelineColor)
                                });
                            }
                            bullet.animate({
                                key: "locationX",
                                from: 0,
                                to: 1,
                                duration: randomDur,
                                easing: am5.ease.linear,
                                loops: Infinity
                            });
                        }, delay);
                    });
                }
            });

            applyCurrentColors();
        });

        // ---- Oil Export Data — through Strait of Hormuz ----
        var rasTanura   = { lon: 50.17, lat: 26.64 };
        var basra       = { lon: 48.80, lat: 29.69 };
        var fujairah    = { lon: 56.33, lat: 25.12 };
        var minaAhmadi  = { lon: 48.17, lat: 29.08 };
        var khargIsland = { lon: 50.32, lat: 29.23 };
        var rasLaffan   = { lon: 51.56, lat: 25.93 };

        var ningbo      = { lon: 121.97, lat: 29.87 };
        var qingdao     = { lon: 120.38, lat: 36.07 };
        var yokohama    = { lon: 139.64, lat: 35.44 };
        var chiba       = { lon: 140.10, lat: 35.60 };
        var ulsan       = { lon: 129.38, lat: 35.50 };
        var jamnagar    = { lon: 69.66, lat: 22.42 };
        var mumbai      = { lon: 72.88, lat: 19.08 };
        var singapore   = { lon: 103.84, lat: 1.26 };

        var trieste     = { lon: 13.78, lat: 45.65 };
        var piraeus     = { lon: 23.63, lat: 37.94 };
        var rotterdam   = { lon: 4.12, lat: 51.95 };

        function flow(src, srcName, tgt, tgtName, value, wp) {
            var result = {
                sourceLongitude: src.lon, sourceLatitude: src.lat,
                targetLongitude: tgt.lon, targetLatitude: tgt.lat,
                source: srcName, target: tgtName, value: value
            };
            if (wp) result.waypoints = wp;
            return result;
        }

        var wpHormuz     = { longitude: 58,  latitude: 24 };
        var wpArabianSea = { longitude: 64,  latitude: 18 };
        var wpSouthIndia = { longitude: 78,  latitude: 6 };
        var wpMalacca    = { longitude: 101, latitude: 3 };
        var wpAden       = { longitude: 47,  latitude: 12 };
        var wpSuez       = { longitude: 34,  latitude: 29 };

        var viaJapan     = [{ longitude: 58, latitude: 26 }, { longitude: 80, latitude: 9 },  { longitude: 104, latitude: 7 }];
        var viaKorea     = [{ longitude: 58, latitude: 24 }, { longitude: 78, latitude: 6 },  { longitude: 101, latitude: 3 }];
        var viaChina     = [{ longitude: 58, latitude: 22 }, { longitude: 76, latitude: 3 },  { longitude: 99, latitude: 1 }];
        var viaChinaNorth = [{ longitude: 58, latitude: 22 }, { longitude: 76, latitude: 3 },  { longitude: 99, latitude: 1 }, { longitude: 124, latitude: 32 }];
        var viaIndiaNear = [wpHormuz];
        var viaIndiaFar  = [wpHormuz, wpArabianSea];
        var viaSingapore = [wpHormuz, wpSouthIndia];
        var viaSuez      = [wpHormuz, wpAden, wpSuez];
        var wpSouthGreece = { longitude: 22, latitude: 35 };
        var wpOtranto     = { longitude: 18.5, latitude: 40 };
        var viaSuezItaly = [wpHormuz, wpAden, wpSuez, wpSouthGreece, wpOtranto];
        var wpSicily     = { longitude: 13, latitude: 37 };
        var wpPortugal   = { longitude: -10, latitude: 39 };
        var viaAtlantic  = [wpHormuz, wpAden, wpSuez, wpSicily, wpPortugal];

        sankeySeries.data.setAll([
            flow(rasTanura, "Ras Tanura", ningbo,    "Ningbo",    1100, viaChina),
            flow(rasTanura, "Ras Tanura", qingdao,   "Qingdao",    600, viaChinaNorth),
            flow(rasTanura, "Ras Tanura", yokohama,  "Yokohama",   700, viaJapan),
            flow(rasTanura, "Ras Tanura", chiba,      "Chiba",      300, viaJapan),
            flow(rasTanura, "Ras Tanura", ulsan,     "Ulsan",      800, viaKorea),
            flow(rasTanura, "Ras Tanura", jamnagar,  "Jamnagar",   500, viaIndiaNear),
            flow(rasTanura, "Ras Tanura", mumbai,    "Mumbai",     300, viaIndiaFar),
            flow(rasTanura, "Ras Tanura", rotterdam, "Rotterdam",  350, viaAtlantic),

            flow(basra, "Basra", ningbo,   "Ningbo",    700, viaChina),
            flow(basra, "Basra", qingdao,  "Qingdao",   400, viaChinaNorth),
            flow(basra, "Basra", jamnagar, "Jamnagar",  600, viaIndiaNear),
            flow(basra, "Basra", mumbai,   "Mumbai",    400, viaIndiaFar),
            flow(basra, "Basra", ulsan,    "Ulsan",     400, viaKorea),
            flow(basra, "Basra", trieste,  "Trieste",   350, viaSuezItaly),
            flow(basra, "Basra", piraeus,  "Piraeus",   250, viaSuez),

            flow(fujairah, "Fujairah", yokohama,  "Yokohama",   400, viaJapan.slice(1)),
            flow(fujairah, "Fujairah", chiba,     "Chiba",      200, viaJapan.slice(1)),
            flow(fujairah, "Fujairah", jamnagar,  "Jamnagar",   300),
            flow(fujairah, "Fujairah", mumbai,    "Mumbai",     200, [wpArabianSea]),
            flow(fujairah, "Fujairah", ningbo,    "Ningbo",     250, viaChina.slice(1)),
            flow(fujairah, "Fujairah", ulsan,     "Ulsan",      350, viaKorea.slice(1)),
            flow(fujairah, "Fujairah", singapore, "Singapore",  250, [wpSouthIndia]),

            flow(minaAhmadi, "Mina Al Ahmadi", ulsan,    "Ulsan",    400, viaKorea),
            flow(minaAhmadi, "Mina Al Ahmadi", yokohama, "Yokohama", 300, viaJapan),
            flow(minaAhmadi, "Mina Al Ahmadi", ningbo,   "Ningbo",   300, viaChina),
            flow(minaAhmadi, "Mina Al Ahmadi", jamnagar, "Jamnagar", 200, viaIndiaNear),

            flow(khargIsland, "Kharg Island", ningbo,   "Ningbo",   400, viaChina),
            flow(khargIsland, "Kharg Island", qingdao,  "Qingdao",  200, viaChinaNorth),
            flow(khargIsland, "Kharg Island", jamnagar, "Jamnagar", 200, viaIndiaNear),
            flow(khargIsland, "Kharg Island", piraeus,  "Piraeus",  100, viaSuez),

            flow(rasLaffan, "Ras Laffan", yokohama, "Yokohama",  300, viaJapan),
            flow(rasLaffan, "Ras Laffan", ulsan,    "Ulsan",     200, viaKorea),
            flow(rasLaffan, "Ras Laffan", jamnagar, "Jamnagar",  150, viaIndiaNear),
            flow(rasLaffan, "Ras Laffan", singapore,"Singapore",  120, viaSingapore)
        ]);

        // ---- Title + Subtitle ----
        var titleCont = chart.children.push(am5.Container.new(root, {
            layout: root.verticalLayout,
            x: am5.p50,
            centerX: am5.p50,
            y: 0,
            position: "absolute",
            paddingTop: 16
        }));

        var titleLabel = titleCont.children.push(am5.Label.new(root, {
            text: "Strait of Hormuz — Oil Export Flows",
            fontSize: 18,
            fontWeight: "600",
            fill: am5.color(params.amberColor),
            x: am5.p50,
            centerX: am5.p50
        }));

        var subtitleLabel = titleCont.children.push(am5.Label.new(root, {
            text: "Gulf Producers > Major Importers  (thousands of barrels/day)",
            fontSize: 11,
            fill: am5.color(params.sulfurColor),
            x: am5.p50,
            centerX: am5.p50
        }));

        // ---- Globe / Map switch ----
        var switchCont = chart.children.push(am5.Container.new(root, {
            layout: root.horizontalLayout,
            x: 20,
            y: 40
        }));

        var switchLabel1 = switchCont.children.push(am5.Label.new(root, {
            centerY: am5.p50,
            text: "Globe",
            fill: am5.color(params.flareColor),
            fontSize: 13
        }));

        var switchButton = switchCont.children.push(am5.Button.new(root, {
            themeTags: ["switch"],
            centerY: am5.p50,
            icon: am5.Circle.new(root, {
                themeTags: ["icon"]
            })
        }));

        var easing = am5.ease.inOut(am5.ease.cubic);
        var duration = 1500;
        var fadeDuration = 300;

        function zoomToGlobe() {
            chart.set("projection", am5map.geoOrthographic());
            chart.set("panX", "rotateX");
            chart.set("panY", "rotateY");
            chart.animate({ key: "rotationX", to: -74, duration, easing });
            chart.animate({ key: "rotationY", to: -30, duration, easing });
            chart.animate({ key: "zoomLevel", to: 1.6, duration, easing });
            bgSeries.mapPolygons.template.set("fillOpacity", 1);
            
            setTimeout(function() {
                startRotation();
            }, duration);
        }

        function zoomToMap() {
            chart.set("projection", am5map.geoMercator());
            chart.set("panX", "translateX");
            chart.set("panY", "translateY");
            chart.animate({ key: "rotationY", to: 0, duration, easing });
            setTimeout(function() {
                chart.zoomToGeoPoint({ longitude: 67, latitude: 32 }, 3.5, true, duration);
            }, 100);
            bgSeries.mapPolygons.template.set("fillOpacity", 0);
            
            if (rotationAnimation) {
                rotationAnimation.stop();
                rotationAnimation = null;
            }
        }

        switchButton.on("active", function() {
            chart.goHome(duration);
            // Fade out before projection switch
            setTimeout(function() {
                chart.seriesContainer.animate({ key: "opacity", to: 0, duration: fadeDuration });
            }, duration - fadeDuration);
            setTimeout(function() {
                if (switchButton.get("active")) {
                    zoomToMap();
                } else {
                    zoomToGlobe();
                }
                // Fade in after projection switch
                chart.seriesContainer.animate({ key: "opacity", to: 1, duration: fadeDuration });
            }, duration);
        });

        var switchLabel2 = switchCont.children.push(am5.Label.new(root, {
            centerY: am5.p50,
            text: "Map",
            fill: am5.color(params.flareColor),
            fontSize: 13
        }));

        // ---- Zoom controls with home button ----
        var zoomControl = chart.set("zoomControl", am5map.ZoomControl.new(root, {}));
        zoomControl.homeButton.set("visible", true);

        // ---- Rotation Animation ----
        var rotationAnimation;

        function startRotation() {
            if (rotationAnimation) {
                rotationAnimation.stop();
                rotationAnimation = null;
            }

            if (!params.autoRotate || switchButton.get("active")) {
                return;
            }

            var currentX = chart.get("rotationX", -74);
            var targetX = currentX + 360;
            var rotateDuration = 120000 / params.rotationSpeed;

            rotationAnimation = chart.animate({
                key: "rotationX",
                from: currentX,
                to: targetX,
                duration: rotateDuration,
                loops: Infinity,
                easing: am5.ease.linear
            });
        }

        // Pause rotation on drag
        chart.chartContainer.events.on("pointerdown", function () {
            if (rotationAnimation) {
                rotationAnimation.stop();
                rotationAnimation = null;
            }
        });

        // Resume rotation after drag finishes
        var resumeTimeout;
        window.addEventListener("pointerup", function() {
            if (resumeTimeout) clearTimeout(resumeTimeout);
            resumeTimeout = setTimeout(function() {
                startRotation();
            }, 2000);
        });

        // Styling and Color schemes application
        function applyCurrentColors() {
            var activeBg = params.greenscreen ? '#00ff00' : params.deepCrude;
            document.body.style.backgroundColor = activeBg;
            var chartdiv = document.getElementById('chartdiv');
            if (chartdiv) {
                chartdiv.style.backgroundColor = activeBg;
            }
            
            var bgRect = root.container.get("background");
            if (bgRect) {
                bgRect.set("fill", am5.color(activeBg));
            }

            bgSeries.mapPolygons.template.set("fill", am5.color(params.deepCrude));
            bgSeries.mapPolygons.each(function(polygon) {
                polygon.set("fill", am5.color(params.deepCrude));
            });

            graticuleSeries.mapLines.template.set("stroke", am5.color(params.pipelineColor));
            graticuleSeries.mapLines.each(function(line) {
                line.set("stroke", am5.color(params.pipelineColor));
            });

            polygonSeries.mapPolygons.template.setAll({
                fill: am5.color(params.slickColor),
                stroke: am5.color(params.pipelineColor)
            });

            am5.array.each(polygonSeries.dataItems, function (di) {
                var id = di.get("id");
                var polygon = di.get("mapPolygon");
                if (polygon) {
                    if (id && producerIds.includes(id)) {
                        polygon.setAll({
                            fill: am5.color(params.producerColor),
                            stroke: am5.color(params.pipelineColor)
                        });
                    } else if (id && importerIds.includes(id)) {
                        polygon.setAll({
                            fill: am5.color(params.importerColor),
                            stroke: am5.color(params.pipelineColor)
                        });
                    } else {
                        polygon.setAll({
                            fill: am5.color(params.slickColor),
                            stroke: am5.color(params.pipelineColor)
                        });
                    }
                }
            });

            sankeySeries.mapPolygons.template.set("fill", am5.color(params.amberColor));
            sankeySeries.mapPolygons.each(function(polygon) {
                polygon.set("fill", am5.color(params.amberColor));
            });

            sankeySeries.nodes.mapPolygons.template.setAll({
                fill: am5.color(params.amberColor),
                stroke: am5.color(params.flareColor)
            });
            sankeySeries.nodes.mapPolygons.each(function(polygon) {
                polygon.setAll({
                    fill: am5.color(params.amberColor),
                    stroke: am5.color(params.flareColor)
                });
            });

            am5.array.each(sankeySeries.dataItems, function (dataItem) {
                var bullets = dataItem.bullets;
                if (bullets) {
                    am5.array.each(bullets, function (bullet) {
                        var sprite = bullet.get("sprite");
                        if (sprite) {
                            sprite.setAll({
                                fill: am5.color(params.amberColor),
                                stroke: am5.color(params.pipelineColor)
                            });
                        }
                    });
                }
            });

            if (typeof titleLabel !== 'undefined' && titleLabel) titleLabel.set("fill", am5.color(params.amberColor));
            if (typeof subtitleLabel !== 'undefined' && subtitleLabel) subtitleLabel.set("fill", am5.color(params.sulfurColor));
            if (typeof switchLabel1 !== 'undefined' && switchLabel1) switchLabel1.set("fill", am5.color(params.flareColor));
            if (typeof switchLabel2 !== 'undefined' && switchLabel2) switchLabel2.set("fill", am5.color(params.flareColor));

            styleUIButtons();
        }

        function styleUIButtons() {
            var buttonBgColor = am5.color(params.slickColor);
            var buttonStrokeColor = am5.color(params.pipelineColor);
            var buttonTextColor = am5.color(params.flareColor);
            var buttonHoverColor = am5.color(params.pipelineColor);
            
            const styleButton = (btn) => {
                if (!btn) return;
                var bg = btn.get("background");
                if (bg) {
                    bg.setAll({
                        fill: buttonBgColor,
                        stroke: buttonStrokeColor,
                        strokeWidth: 1
                    });
                    bg.states.create("hover", {
                        fill: buttonHoverColor
                    });
                    bg.states.create("down", {
                        fill: buttonTextColor
                    });
                }
                var label = btn.get("label");
                if (label) {
                    label.set("fill", buttonTextColor);
                }
                var icon = btn.get("icon");
                if (icon) {
                    icon.set("stroke", buttonTextColor);
                    icon.set("fill", buttonTextColor);
                }
            };
            
            if (typeof zoomControl !== 'undefined' && zoomControl) {
                styleButton(zoomControl.plusButton);
                styleButton(zoomControl.minusButton);
                styleButton(zoomControl.homeButton);
            }
            
            if (typeof switchButton !== 'undefined' && switchButton) {
                var sbg = switchButton.get("background");
                if (sbg) {
                    sbg.setAll({
                        fill: buttonBgColor,
                        stroke: buttonStrokeColor,
                        strokeWidth: 1
                    });
                }
                var sicon = switchButton.get("icon");
                if (sicon) {
                    sicon.setAll({
                        fill: buttonTextColor,
                        stroke: buttonTextColor
                    });
                }
            }
        }

        // GUI configuration
        const gui = new GUI({ title: 'Oil Export Flows' });

        gui.add(params, 'theme', Object.keys(themes)).name('Color Scheme').onChange(function(themeName) {
            const themeObj = themes[themeName];
            if (themeObj) {
                params.deepCrude = themeObj.deepCrude;
                params.slickColor = themeObj.slick;
                params.pipelineColor = themeObj.pipeline;
                params.amberColor = themeObj.amber;
                params.sulfurColor = themeObj.sulfur;
                params.flareColor = themeObj.flare;
                params.producerColor = themeObj.producer;
                params.importerColor = themeObj.importer;
                
                updateGuiDisplay();
                applyCurrentColors();
            }
        });

        gui.add(params, 'greenscreen').name('Greenscreen').onChange(applyCurrentColors);

        gui.add(params, 'autoRotate').name('Auto Rotate').onChange(function() {
            startRotation();
        });

        gui.add(params, 'rotationSpeed', 0.1, 5.0, 0.1).name('Rotate Speed').onChange(function() {
            startRotation();
        });

        var isUpdatingZoom = false;
        var zoomController = gui.add(params, 'zoomLevel', 0.5, 15.0, 0.1).name('Zoom Level').onChange(function(val) {
            isUpdatingZoom = true;
            chart.set("zoomLevel", val);
            isUpdatingZoom = false;
        });

        chart.on("zoomLevel", function(zoomLevel) {
            if (!isUpdatingZoom) {
                params.zoomLevel = zoomLevel;
                zoomController.updateDisplay();
            }
        });

        const colorsFolder = gui.addFolder('Custom Colors');
        colorsFolder.addColor(params, 'deepCrude').name('Ocean / Bg').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'slickColor').name('Land (Default)').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'pipelineColor').name('Borders / Graticule').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'amberColor').name('Sankey Flows').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'sulfurColor').name('Secondary').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'flareColor').name('Highlights / Text').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'producerColor').name('Producer Land').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'importerColor').name('Importer Land').onChange(applyCurrentColors);
        colorsFolder.close();

        function updateGuiDisplay() {
            gui.controllers.forEach(c => c.updateDisplay());
            gui.folders.forEach(f => {
                f.controllers.forEach(c => c.updateDisplay());
            });
        }

        // Keyboard show/hide toggle
        var uiVisible = true;
        function toggleUI() {
            uiVisible = !uiVisible;
            if (uiVisible) {
                gui.show();
                zoomControl.set("visible", true);
                switchCont.set("visible", true);
                titleCont.set("visible", true);
            } else {
                gui.hide();
                zoomControl.set("visible", false);
                switchCont.set("visible", false);
                titleCont.set("visible", false);
            }
        }

        window.addEventListener('keydown', function(e) {
            if (e.key === 'h' || e.key === 'H') {
                toggleUI();
            }
        });

        // Run initial animation: rotate to globe position, then zoom in
        chart.appear(1000, 100);
        setTimeout(function() {
            zoomToGlobe();
        }, 1000);

    </script>
</body>
</html>
