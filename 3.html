<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signal Curve Lines</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #080808;
      }

      canvas {
        display: block;
      }

      .lil-gui.autoPlace {
        position: absolute;
        top: auto;
        bottom: 10px;
        right: 10px;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import * as THREE from 'three';
      import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
      import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
      import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
      import GUI from 'lil-gui';

      const params = {
        colorBg: '#080808',
        colorLine: '#373f48',
        colorSignal: '#8fc9ff',
        useColor2: false,
        colorSignal2: '#ff0055',
        useColor3: false,
        colorSignal3: '#ffcc00',
        lineCount: 80,
        globalRotation: 0,
        positionX: 0,
        positionY: 0,
        spreadHeight: 30.33,
        spreadDepth: 0,
        curveLength: 50,
        straightLength: 100,
        curvePower: 0.8265,
        waveSpeed: 2.48,
        waveHeight: 0.145,
        lineOpacity: 0.557,
        signalCount: 94,
        speedGlobal: 0.345,
        trailLength: 3,
        bloomStrength: 3.0,
        bloomRadius: 0.5
      };

      params.positionX = (params.curveLength - params.straightLength) / 2;

      const CONSTANTS = {
        segmentCount: 150
      };

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(params.colorBg);
      scene.fog = new THREE.FogExp2(params.colorBg, 0.002);

      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
      camera.position.set(0, 0, 90);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const contentGroup = new THREE.Group();
      contentGroup.position.set(params.positionX, params.positionY, 0);
      scene.add(contentGroup);

      const renderScene = new RenderPass(scene, camera);
      const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
      bloomPass.threshold = 0;
      bloomPass.strength = params.bloomStrength;
      bloomPass.radius = params.bloomRadius;

      const composer = new EffectComposer(renderer);
      composer.addPass(renderScene);
      composer.addPass(bloomPass);

      function getPathPoint(t, lineIndex, time) {
        const totalLen = params.curveLength + params.straightLength;
        const currentX = -params.curveLength + t * totalLen;
        let y = 0;
        let z = 0;
        const spreadFactor = (lineIndex / params.lineCount - 0.5) * 2;

        if (currentX < 0) {
          const ratio = (currentX + params.curveLength) / params.curveLength;
          let shapeFactor = (Math.cos(ratio * Math.PI) + 1) / 2;
          shapeFactor = Math.pow(shapeFactor, params.curvePower);

          y = spreadFactor * params.spreadHeight * shapeFactor;
          z = spreadFactor * params.spreadDepth * shapeFactor;

          const waveFactor = shapeFactor;
          const wave = Math.sin(time * params.waveSpeed + currentX * 0.1 + lineIndex) * params.waveHeight * waveFactor;
          y += wave;
        }

        return new THREE.Vector3(currentX, y, z);
      }

      let backgroundLines = [];
      let signals = [];
      const bgMaterial = new THREE.LineBasicMaterial({
        color: params.colorLine,
        transparent: true,
        opacity: params.lineOpacity,
        depthWrite: false
      });

      const signalMaterial = new THREE.LineBasicMaterial({
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        depthTest: false,
        transparent: true
      });
      const signalColorObj1 = new THREE.Color(params.colorSignal);
      const signalColorObj2 = new THREE.Color(params.colorSignal2);
      const signalColorObj3 = new THREE.Color(params.colorSignal3);

      function pickSignalColor() {
        const choices = [signalColorObj1];
        if (params.useColor2) choices.push(signalColorObj2);
        if (params.useColor3) choices.push(signalColorObj3);
        return choices[Math.floor(Math.random() * choices.length)];
      }

      function rebuildLines() {
        backgroundLines.forEach((line) => {
          contentGroup.remove(line);
          line.geometry.dispose();
        });
        backgroundLines = [];

        for (let i = 0; i < params.lineCount; i++) {
          const geometry = new THREE.BufferGeometry();
          const positions = new Float32Array(CONSTANTS.segmentCount * 3);
          geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

          const line = new THREE.Line(geometry, bgMaterial);
          line.userData = { id: i };
          line.renderOrder = 0;
          contentGroup.add(line);
          backgroundLines.push(line);
        }
        rebuildSignals();
      }

      function rebuildSignals() {
        signals.forEach((signal) => {
          contentGroup.remove(signal.mesh);
          signal.mesh.geometry.dispose();
        });
        signals = [];
        for (let i = 0; i < params.signalCount; i++) {
          createSignal();
        }
      }

      function createSignal() {
        const maxTrail = 150;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(maxTrail * 3);
        const colors = new Float32Array(maxTrail * 3);

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const mesh = new THREE.Line(geometry, signalMaterial);
        mesh.frustumCulled = false;
        mesh.renderOrder = 1;
        contentGroup.add(mesh);

        signals.push({
          mesh,
          laneIndex: Math.floor(Math.random() * params.lineCount),
          speed: 0.2 + Math.random() * 0.5,
          progress: Math.random(),
          history: [],
          assignedColor: pickSignalColor()
        });
      }

      rebuildLines();

      const gui = new GUI({ title: 'Settings' });

      const folderColors = gui.addFolder('Colors');
      folderColors.addColor(params, 'colorBg').name('Background').onChange((value) => {
        scene.background.set(value);
        scene.fog.color.set(value);
      });
      folderColors.addColor(params, 'colorLine').name('Lines').onChange((value) => {
        bgMaterial.color.set(value);
      });

      const folderSignalColors = gui.addFolder('Signal Colors');
      folderSignalColors.addColor(params, 'colorSignal').name('Main Color').onChange((value) => signalColorObj1.set(value));
      folderSignalColors.add(params, 'useColor2').name('Use Extra Color 1');
      folderSignalColors.addColor(params, 'colorSignal2').name('Extra Color 1').onChange((value) => signalColorObj2.set(value));
      folderSignalColors.add(params, 'useColor3').name('Use Extra Color 2');
      folderSignalColors.addColor(params, 'colorSignal3').name('Extra Color 2').onChange((value) => signalColorObj3.set(value));

      const folderGeneral = gui.addFolder('General');
      folderGeneral.add(params, 'globalRotation', -180, 180).name('Rotation (Deg)').onChange((value) => {
        contentGroup.rotation.z = THREE.MathUtils.degToRad(value);
      });
      folderGeneral.add(params, 'positionX', -200, 200).name('Position X').onChange((value) => {
        contentGroup.position.x = value;
      });
      folderGeneral.add(params, 'positionY', -100, 100).name('Position Y').onChange((value) => {
        contentGroup.position.y = value;
      });
      folderGeneral.add(params, 'lineCount', 10, 300, 1).name('Line Count').onFinishChange(rebuildLines);

      const folderGeo = gui.addFolder('Geometry');
      folderGeo.add(params, 'spreadHeight', 10, 100);
      folderGeo.add(params, 'spreadDepth', 0, 50);
      folderGeo.add(params, 'curveLength', 20, 150);
      folderGeo.add(params, 'straightLength', 20, 200);
      folderGeo.add(params, 'curvePower', 0.1, 3.0);

      const folderAnim = gui.addFolder('Lines');
      folderAnim.add(params, 'waveSpeed', 0, 5);
      folderAnim.add(params, 'waveHeight', 0, 5);
      folderAnim.add(params, 'lineOpacity', 0, 1).onChange((value) => {
        bgMaterial.opacity = value;
      });

      const folderSignals = gui.addFolder('Signals');
      folderSignals.add(params, 'signalCount', 0, 200, 1).name('Count').onFinishChange(rebuildSignals);
      folderSignals.add(params, 'speedGlobal', 0, 3).name('Speed');
      folderSignals.add(params, 'trailLength', 0, 100, 1).name('Trail Length');

      const folderBloom = gui.addFolder('Bloom');
      folderBloom.add(params, 'bloomStrength', 0, 5).onChange((value) => {
        bloomPass.strength = value;
      });
      folderBloom.add(params, 'bloomRadius', 0, 1).onChange((value) => {
        bloomPass.radius = value;
      });

      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);

        const time = clock.getElapsedTime();

        backgroundLines.forEach((line) => {
          const positions = line.geometry.attributes.position.array;
          const lineId = line.userData.id;
          for (let j = 0; j < CONSTANTS.segmentCount; j++) {
            const t = j / (CONSTANTS.segmentCount - 1);
            const vec = getPathPoint(t, lineId, time);
            positions[j * 3] = vec.x;
            positions[j * 3 + 1] = vec.y;
            positions[j * 3 + 2] = vec.z;
          }
          line.geometry.attributes.position.needsUpdate = true;
        });

        signals.forEach((signal) => {
          signal.progress += signal.speed * 0.005 * params.speedGlobal;

          if (signal.progress > 1.0) {
            signal.progress = 0;
            signal.laneIndex = Math.floor(Math.random() * params.lineCount);
            signal.history = [];
            signal.assignedColor = pickSignalColor();
          }

          const pos = getPathPoint(signal.progress, signal.laneIndex, time);
          signal.history.push(pos);

          if (signal.history.length > params.trailLength + 1) {
            signal.history.shift();
          }

          const positions = signal.mesh.geometry.attributes.position.array;
          const colors = signal.mesh.geometry.attributes.color.array;
          const drawCount = Math.max(1, params.trailLength);
          const currentLen = signal.history.length;

          for (let i = 0; i < drawCount; i++) {
            let index = currentLen - 1 - i;
            if (index < 0) index = 0;

            const point = signal.history[index] || new THREE.Vector3();

            positions[i * 3] = point.x;
            positions[i * 3 + 1] = point.y;
            positions[i * 3 + 2] = point.z;

            let alpha = 1;
            if (params.trailLength > 0) {
              alpha = Math.max(0, 1 - i / params.trailLength);
            }

            colors[i * 3] = signal.assignedColor.r * alpha;
            colors[i * 3 + 1] = signal.assignedColor.g * alpha;
            colors[i * 3 + 2] = signal.assignedColor.b * alpha;
          }

          signal.mesh.geometry.setDrawRange(0, drawCount);
          signal.mesh.geometry.attributes.position.needsUpdate = true;
          signal.mesh.geometry.attributes.color.needsUpdate = true;
        });

        composer.render();
      }

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
    </script>
  </body>
</html>
