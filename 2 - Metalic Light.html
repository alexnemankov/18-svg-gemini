<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volumetric Wave Shader</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- Include Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Include lil-gui -->
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19"></script>

    <script>
      // --- Configuration and Settings ---
      const settings = {
        dpr: 1.0,
        greenScreen: false,
        timeScale: 0.5,
        waveSpeed: 1.0,
        waveHeight: 1.0,

        // Detailed Wave Settings
        wave1Freq: 4.8,
        wave1Amp: 0.038,
        wave2Freq: 0.3,
        wave2Amp: -0.09,
        wave3FreqX: -0.6,
        wave3FreqZ: -0.7,
        wave3Amp: 0.12,

        noiseAmount: 0.004,
        foldingOffset: 9.291,
        stepBase: 0.146,
        glowIntensity: 0.0085,
        glowSpread: 5.1,
      };

      // --- Three.js Setup ---
      const scene = new THREE.Scene();

      // We use an Orthographic camera for full-screen shader rendering
      const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

      const renderer = new THREE.WebGLRenderer({ antialias: false });
      renderer.setPixelRatio(settings.dpr);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // --- Shader Material ---
      const uniforms = {
        iTime: { value: 0.0 },
        iResolution: { value: new THREE.Vector3() },
        uBackgroundColor: { value: new THREE.Color(0x000000) },
        uGreenScreen: { value: 0.0 },

        // GUI Uniforms
        uTimeScale: { value: settings.timeScale },
        uWaveSpeed: { value: settings.waveSpeed },
        uWaveHeight: { value: settings.waveHeight },

        uWave1Freq: { value: settings.wave1Freq },
        uWave1Amp: { value: settings.wave1Amp },
        uWave2Freq: { value: settings.wave2Freq },
        uWave2Amp: { value: settings.wave2Amp },
        uWave3FreqX: { value: settings.wave3FreqX },
        uWave3FreqZ: { value: settings.wave3FreqZ },
        uWave3Amp: { value: settings.wave3Amp },

        uNoiseAmount: { value: settings.noiseAmount },
        uFoldingOffset: { value: settings.foldingOffset },
        uStepBase: { value: settings.stepBase },
        uGlowIntensity: { value: settings.glowIntensity },
        uGlowSpread: { value: settings.glowSpread },
      };

      // Simple vertex shader for full-screen quad
      const vertexShader = `
            void main() {
                gl_Position = vec4(position, 1.0);
            }
        `;

      // Ported fragment shader (shadertoy -> three.js)
      const fragmentShader = `
            uniform vec3 iResolution;
            uniform float iTime;
            uniform vec3 uBackgroundColor;
            uniform float uGreenScreen;

            uniform float uTimeScale;
            uniform float uWaveSpeed;
            uniform float uWaveHeight;

            uniform float uWave1Freq;
            uniform float uWave1Amp;
            uniform float uWave2Freq;
            uniform float uWave2Amp;
            uniform float uWave3FreqX;
            uniform float uWave3FreqZ;
            uniform float uWave3Amp;

            uniform float uNoiseAmount;
            uniform float uFoldingOffset;
            uniform float uStepBase;
            uniform float uGlowIntensity;
            uniform float uGlowSpread;

            // --- High-Quality Procedural White Noise ---
            float generateFineNoise(vec2 p) {
                vec3 p3 = fract(vec3(p.xyx) * 8.6231);
                p3 += dot(p3, p3.yzx + 67.92);
                return fract((p3.x + p3.y) * p3.z);
            }

            void main() {
                // Normalize pixel coordinates (from -1 to 1, accounting for aspect ratio)
                vec2 fragCoord = gl_FragCoord.xy;
                vec2 uv = (2.0 * fragCoord - iResolution.xy) / iResolution.y;

                // Set up camera ray direction
                vec3 rayDir = normalize(vec3(uv, 1.0));

                // Initialize variables for raymarching
                vec4 finalColor = vec4(0.0);
                float totalDistance = 0.0;
                float timeElapsed = iTime * uTimeScale;

                // Specific noise multiplier from uniforms
                float pixelNoise = generateFineNoise(fragCoord) * uNoiseAmount;

                // Main raymarching and accumulation loop
                for (int i = 0; i < 38; i++) {
                    // Calculate current position along the ray
                    vec3 currentPos = rayDir * totalDistance;

                    // Move camera back to view the scene properly
                    currentPos.z -= 2.0;

                    // --- MORE DIVERSE HORIZONTAL WAVE ---
                    float wTime = timeElapsed * uWaveSpeed;
                    float waveHeight = (sin(currentPos.x * uWave1Freq + wTime) * uWave1Amp +
                                       sin(currentPos.z * uWave2Freq - wTime * 0.6) * uWave2Amp +
                                       sin((currentPos.x * uWave3FreqX) - (currentPos.z * uWave3FreqZ) + (wTime * 1.6)) * uWave3Amp) * uWaveHeight;

                    // Distance to the wave surface
                    float distToWave = abs(currentPos.y - waveHeight);

                    // Apply spatial scaling (fractal effect) at each step
                    currentPos /= uFoldingOffset;

                    // Calculate distance step
                    float stepSize = min(distToWave - 0.080, pixelNoise) + uStepBase;
                    totalDistance += stepSize;

                    // --- Volumetric accumulation and shading ---

                    // 1. Generate complex trigonometric interference patterns
                    float patternX = sin(currentPos.x + cos(currentPos.y) * cos(currentPos.z));
                    float patternY = sin(currentPos.z + sin(currentPos.y) * cos(currentPos.x + timeElapsed));
                    float basePattern = smoothstep(0.5, 0.7, patternX * patternY);

                    // 2. Mix pattern based on the inverse square distance to the wave
                    float blendFactor = 0.15 / (distToWave * distToWave + 0.01);
                    float mixedPattern = mix(basePattern, 1.0, blendFactor);

                    // 3. Calculate glow intensity
                    float glowIntensity = uGlowIntensity / (uGlowSpread + stepSize);

                    // 4. Fade out objects based on total ray distance to create depth fog
                    float distanceFade = smoothstep(36.5, 7.3, totalDistance);

                    // 5. Generate procedural color palette based on total distance traveled
                    vec3 paletteColor = 1.0 + cos(totalDistance * 3.0 + vec3(0.0, 1.0, 2.0));

                    // Accumulate final results into the output color
                    finalColor.rgb += glowIntensity * mixedPattern * distanceFade * paletteColor;
                }

                float sceneIntensity = max(finalColor.r, max(finalColor.g, finalColor.b));

                // --- DITHERING (Anti-banding) ---
                if (uGreenScreen < 0.5 || sceneIntensity > 0.002) {
                    float dither = (generateFineNoise(fragCoord + vec2(12.34, 56.78)) - 0.5) / 128.0;
                    finalColor.rgb += vec3(dither);
                }

                // Output final color over the selected background
                if (uGreenScreen > 0.5 && sceneIntensity <= 0.002) {
                    gl_FragColor = vec4(uBackgroundColor, 1.0);
                } else {
                    gl_FragColor = vec4(uBackgroundColor + finalColor.rgb, 1.0);
                }
            }
        `;

      const material = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        uniforms: uniforms,
      });

      // Full screen plane
      const geometry = new THREE.PlaneGeometry(2, 2);
      const mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

      function setGreenScreen(enabled) {
        const color = enabled ? "#00ff00" : "#000000";
        document.body.style.backgroundColor = color;
        renderer.setClearColor(color, 1);
        uniforms.uBackgroundColor.value.set(color);
        uniforms.uGreenScreen.value = enabled ? 1.0 : 0.0;
      }

      setGreenScreen(settings.greenScreen);

      // --- Resize Handler ---
      function updateResolution() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        renderer.setSize(width, height);

        // Update iResolution to match canvas physical pixels
        const pixelRatio = renderer.getPixelRatio();
        uniforms.iResolution.value.set(
          width * pixelRatio,
          height * pixelRatio,
          1,
        );
      }

      window.addEventListener("resize", updateResolution);
      updateResolution();

      // --- GUI Setup (lil-gui) ---
      const gui = new lil.GUI({ title: "Scene Settings" });

      const fRender = gui.addFolder("Rendering");
      fRender
        .add(settings, "dpr", 0.5, 2.0, 0.1)
        .name("Device Pixel Ratio")
        .onChange((val) => {
          renderer.setPixelRatio(val);
          updateResolution();
        });
      fRender
        .add(settings, "greenScreen")
        .name("Green Screen")
        .onChange(setGreenScreen);

      const fAnim = gui.addFolder("Animation");
      fAnim
        .add(settings, "timeScale", 0.0, 3.0, 0.1)
        .name("Time Scale")
        .onChange((v) => (uniforms.uTimeScale.value = v));
      fAnim
        .add(settings, "waveSpeed", 0.0, 3.0, 0.1)
        .name("Wave Speed")
        .onChange((v) => (uniforms.uWaveSpeed.value = v));

      const fWave = gui.addFolder("Wave Form");
      fWave
        .add(settings, "waveHeight", 0.0, 3.0, 0.01)
        .name("Global Height Multiplier")
        .onChange((v) => (uniforms.uWaveHeight.value = v));

      const fWave1 = fWave.addFolder("Wave 1 (X-Axis)");
      fWave1
        .add(settings, "wave1Freq", 0.0, 10.0, 0.1)
        .name("Frequency")
        .onChange((v) => (uniforms.uWave1Freq.value = v));
      fWave1
        .add(settings, "wave1Amp", -0.5, 0.5, 0.001)
        .name("Amplitude")
        .onChange((v) => (uniforms.uWave1Amp.value = v));

      const fWave2 = fWave.addFolder("Wave 2 (Z-Axis)");
      fWave2
        .add(settings, "wave2Freq", 0.0, 5.0, 0.01)
        .name("Frequency")
        .onChange((v) => (uniforms.uWave2Freq.value = v));
      fWave2
        .add(settings, "wave2Amp", -0.5, 0.5, 0.001)
        .name("Amplitude")
        .onChange((v) => (uniforms.uWave2Amp.value = v));

      const fWave3 = fWave.addFolder("Wave 3 (Diagonal)");
      fWave3
        .add(settings, "wave3FreqX", -5.0, 5.0, 0.1)
        .name("Frequency X")
        .onChange((v) => (uniforms.uWave3FreqX.value = v));
      fWave3
        .add(settings, "wave3FreqZ", -5.0, 5.0, 0.1)
        .name("Frequency Z")
        .onChange((v) => (uniforms.uWave3FreqZ.value = v));
      fWave3
        .add(settings, "wave3Amp", -0.5, 0.5, 0.001)
        .name("Amplitude")
        .onChange((v) => (uniforms.uWave3Amp.value = v));

      const fLight = gui.addFolder("Fractal & Light");
      fLight
        .add(settings, "noiseAmount", 0.0, 0.02, 0.001)
        .name("Noise Amount")
        .onChange((v) => (uniforms.uNoiseAmount.value = v));
      fLight
        .add(settings, "stepBase", 0.01, 0.5, 0.001)
        .name("Step Base Size")
        .onChange((v) => (uniforms.uStepBase.value = v));
      fLight
        .add(settings, "glowIntensity", 0.001, 0.05, 0.0001)
        .name("Glow Intensity")
        .onChange((v) => (uniforms.uGlowIntensity.value = v));
      fLight
        .add(settings, "glowSpread", 0.1, 10.0, 0.1)
        .name("Glow Spread")
        .onChange((v) => (uniforms.uGlowSpread.value = v));

      // Close the GUI by default as requested
      gui.close();

      // --- Main Animation Loop ---
      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);

        // Update elapsed time
        uniforms.iTime.value = clock.getElapsedTime();

        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
