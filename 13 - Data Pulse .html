<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Pathways</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #02050A;
            font-family: monospace;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 12px;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .controls {
            position: fixed;
            left: 14px;
            bottom: 14px;
            z-index: 10;
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 8px;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            backdrop-filter: blur(8px);
        }

        .controls button {
            height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font: 12px/1 monospace;
            padding: 0 12px;
            cursor: pointer;
        }

        .controls button[aria-pressed="true"] {
            background: #00ff00;
            color: #001800;
            border-color: #00ff00;
        }
    </style>

    <!-- Import Maps for Three.js and Addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.js"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Initializing Neural Pathways...</div>
    <div class="controls">
        <button id="greenScreenToggle" type="button" aria-pressed="false">Green screen</button>
        <button id="resetView" type="button">Reset view</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import GUI from 'lil-gui';

        const params = {
            cameraSpeed: 0.1,
            flowSpeed: 85.0,
            maxFibers: 150,
            pointsPerFiber: 450,

            nodeDistance: 511.0,
            pinchSharpness: 3.6,
            maxSpread: 100.0,
            minSpread: 0.0,
            structuralNoise: 2.5,

            particleSpeed: 0.25,
            particleSpawnRate: 1,

            bloomStrength: 1.0,
            bloomRadius: 0.22,
            bloomThreshold: 0.1,
            lineColor: '#36547d',
            lineOpacity: 0.4,

            backgroundColor: '#000000',
            greenScreen: false,
            particleColor: '#8fb4ff',
            cameraDistance: 140
        };

        const DEFAULT_BACKGROUND = '#000000';
        const GREEN_SCREEN_COLOR = '#00ff00';

        const sharedUniforms = {
            uTime: { value: 0 },
            uCameraX: { value: 0 }
        };

        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(params.backgroundColor, 1);

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(params.backgroundColor, 0.004);

        const worldGroup = new THREE.Group();
        scene.add(worldGroup);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(-60, 0, params.cameraDistance);
        camera.lookAt(40, 0, 0);

        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            params.bloomStrength,
            params.bloomRadius,
            params.bloomThreshold
        );
        composer.addPass(bloomPass);

        const fadeVaryingChunk = 'varying float vRelativeX;';
        const fadeVertexChunk = 'vRelativeX = position.x - uCameraX;';
        const fadeFragmentChunk = `
            float fade = smoothstep(-30.0, 50.0, vRelativeX) * smoothstep(350.0, 150.0, vRelativeX);
            gl_FragColor.a *= fade;
        `;

        const lineMaterial = new THREE.LineBasicMaterial({
            color: new THREE.Color(params.lineColor),
            transparent: true,
            opacity: params.lineOpacity,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        lineMaterial.onBeforeCompile = (shader) => {
            shader.uniforms.uCameraX = sharedUniforms.uCameraX;
            shader.vertexShader = `
                uniform float uCameraX;
                ${fadeVaryingChunk}
                ${shader.vertexShader}
            `.replace(
                '#include <begin_vertex>',
                `
                #include <begin_vertex>
                ${fadeVertexChunk}
                `
            );
            shader.fragmentShader = `
                ${fadeVaryingChunk}
                ${shader.fragmentShader}
            `.replace(
                '#include <dithering_fragment>',
                `
                #include <dithering_fragment>
                ${fadeFragmentChunk}
                `
            );
        };

        class Fiber {
            constructor() {
                this.maxPoints = params.pointsPerFiber;
                this.positions = new Float32Array(this.maxPoints * 3);

                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random();

                this.baseY = Math.sin(angle) * radius;
                this.baseZ = Math.cos(angle) * radius;
                this.noiseSeed = Math.random() * 100.0;

                this.geometry = new THREE.BufferGeometry();
                this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
                this.geometry.attributes.position.setUsage(THREE.DynamicDrawUsage);

                this.line = new THREE.Line(this.geometry, lineMaterial);
                this.line.frustumCulled = false;
                worldGroup.add(this.line);
            }

            update(time, cameraX) {
                const length = 1500.0;
                const startX = cameraX - 100.0 - worldGroup.position.x;
                const step = length / (this.maxPoints - 1);

                for (let i = 0; i < this.maxPoints; i++) {
                    const x = startX + i * step;

                    let phase = (x - time * params.flowSpeed) / params.nodeDistance;
                    phase = phase - Math.floor(phase);

                    const smoothWave = Math.cos(phase * Math.PI * 2) * 0.5 + 0.5;
                    const pinchFactor = Math.pow(smoothWave, params.pinchSharpness);
                    const currentSpread = params.minSpread + (params.maxSpread - params.minSpread) * pinchFactor;

                    const noiseY = Math.sin(x * 0.015 + this.noiseSeed + time * 1.2) * params.structuralNoise * pinchFactor;
                    const noiseZ = Math.cos(x * 0.018 - this.noiseSeed + time * 1.0) * params.structuralNoise * pinchFactor;

                    this.positions[i * 3] = x;
                    this.positions[i * 3 + 1] = this.baseY * currentSpread + noiseY;
                    this.positions[i * 3 + 2] = this.baseZ * currentSpread + noiseZ;
                }

                this.geometry.attributes.position.needsUpdate = true;
                this.geometry.setDrawRange(0, this.maxPoints);
            }
        }

        class ParticleSystem {
            constructor(maxParticles = 5000) {
                this.maxParticles = maxParticles;
                this.particles = [];

                this.geometry = new THREE.BufferGeometry();
                this.positions = new Float32Array(this.maxParticles * 3);
                this.alphas = new Float32Array(this.maxParticles);

                this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
                this.geometry.setAttribute('alpha', new THREE.BufferAttribute(this.alphas, 1));

                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        uCameraX: sharedUniforms.uCameraX,
                        uParticleColor: { value: new THREE.Color(params.particleColor) }
                    },
                    vertexShader: `
                        uniform float uCameraX;
                        attribute float alpha;
                        varying float vAlpha;
                        varying float vRelativeX;

                        void main() {
                            vAlpha = alpha;
                            vRelativeX = position.x - uCameraX;
                            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                            gl_PointSize = 2.0;
                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        uniform vec3 uParticleColor;
                        varying float vAlpha;
                        varying float vRelativeX;

                        void main() {
                            if (vAlpha < 0.5) discard;
                            float fade = smoothstep(-30.0, 50.0, vRelativeX) * smoothstep(350.0, 150.0, vRelativeX);
                            gl_FragColor = vec4(uParticleColor, fade);
                        }
                    `,
                    transparent: true,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending
                });

                this.material = material;
                this.pointsMesh = new THREE.Points(this.geometry, material);
                this.pointsMesh.frustumCulled = false;
                worldGroup.add(this.pointsMesh);

                for (let i = 0; i < this.maxParticles; i++) {
                    this.particles.push({
                        id: i,
                        active: false,
                        fiber: null,
                        progress: 0,
                        speed: 0
                    });
                }
            }

            spawn(initialProgress = 0) {
                if (fibers.length === 0) return;

                const p = this.particles.find((particle) => !particle.active);
                if (!p) return;

                const fiber = fibers[Math.floor(Math.random() * fibers.length)];

                p.active = true;
                p.fiber = fiber;
                p.progress = initialProgress;
                p.speed = params.particleSpeed * (Math.random() * 0.4 + 0.8);
            }

            killParticle(p) {
                p.active = false;
                p.fiber = null;
                this.alphas[p.id] = 0.0;
            }

            update() {
                let attributesUpdated = false;

                for (let i = 0; i < this.maxParticles; i++) {
                    const p = this.particles[i];

                    if (!p.active) {
                        this.alphas[i] = 0.0;
                        continue;
                    }

                    p.progress += p.speed;

                    const fiber = p.fiber;
                    if (p.progress >= fiber.maxPoints - 1) {
                        this.killParticle(p);
                        attributesUpdated = true;
                        continue;
                    }

                    const i0 = Math.floor(p.progress);
                    const i1 = i0 + 1;
                    const t = p.progress - i0;

                    const x0 = fiber.positions[i0 * 3];
                    const y0 = fiber.positions[i0 * 3 + 1];
                    const z0 = fiber.positions[i0 * 3 + 2];

                    const x1 = fiber.positions[i1 * 3];
                    const y1 = fiber.positions[i1 * 3 + 1];
                    const z1 = fiber.positions[i1 * 3 + 2];

                    this.positions[i * 3] = x0 + (x1 - x0) * t;
                    this.positions[i * 3 + 1] = y0 + (y1 - y0) * t;
                    this.positions[i * 3 + 2] = z0 + (z1 - z0) * t;

                    this.alphas[i] = 1.0;
                    attributesUpdated = true;
                }

                if (attributesUpdated) {
                    this.geometry.attributes.position.needsUpdate = true;
                    this.geometry.attributes.alpha.needsUpdate = true;
                }
            }
        }

        let fibers = [];
        let particleSystem;
        let gui;
        let backgroundController;
        let greenScreenController;

        const dragState = {
            active: false,
            pointerId: null
        };

        const greenScreenToggle = document.getElementById('greenScreenToggle');
        const resetViewButton = document.getElementById('resetView');

        function applyBackgroundColor() {
            const color = params.greenScreen ? GREEN_SCREEN_COLOR : params.backgroundColor;
            renderer.setClearColor(color, 1);
            scene.fog.color.set(color);
            greenScreenToggle.setAttribute('aria-pressed', String(params.greenScreen));
        }

        function setGreenScreen(enabled) {
            params.greenScreen = enabled;
            applyBackgroundColor();
            if (greenScreenController) greenScreenController.updateDisplay();
        }

        function resetView() {
            params.cameraDistance = 140;
            worldGroup.position.set(0, 0, 0);
        }

        function isGuiTarget(target) {
            return Boolean(target.closest && target.closest('.lil-gui, .controls'));
        }

        function onWheel(event) {
            event.preventDefault();
            const zoomFactor = Math.exp(event.deltaY * 0.0015);
            params.cameraDistance = THREE.MathUtils.clamp(params.cameraDistance * zoomFactor, 35, 520);
        }

        function onPointerDown(event) {
            if (isGuiTarget(event.target)) return;
            dragState.active = true;
            dragState.pointerId = event.pointerId;
            canvas.setPointerCapture(event.pointerId);
        }

        function onPointerMove(event) {
            if (!dragState.active || event.pointerId !== dragState.pointerId) return;

            const visibleHeight = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) * 0.5) * params.cameraDistance;
            const worldPerPixel = visibleHeight / window.innerHeight;

            const right = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 0);
            const up = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 1);
            right.x = 0;
            right.normalize();

            worldGroup.position.addScaledVector(right, event.movementX * worldPerPixel);
            worldGroup.position.addScaledVector(up, -event.movementY * worldPerPixel);
        }

        function onPointerUp(event) {
            if (event.pointerId !== dragState.pointerId) return;
            dragState.active = false;
            dragState.pointerId = null;
            if (canvas.hasPointerCapture(event.pointerId)) {
                canvas.releasePointerCapture(event.pointerId);
            }
        }

        function init() {
            document.getElementById('loading').style.opacity = 0;

            for (let i = 0; i < params.maxFibers; i++) {
                fibers.push(new Fiber());
            }

            fibers.forEach((fiber) => fiber.update(0, camera.position.x));

            particleSystem = new ParticleSystem(5000);

            const initialParticleCount = 1500;
            for (let i = 0; i < initialParticleCount; i++) {
                const randomProgress = Math.random() * (params.pointsPerFiber - 1);
                particleSystem.spawn(randomProgress);
            }

            particleSystem.update();

            gui = new GUI({ title: 'Settings' });
            gui.close();

            const folderColors = gui.addFolder('Colors');
            greenScreenController = folderColors.add(params, 'greenScreen').name('Green Screen #00ff00').onChange(setGreenScreen);
            backgroundController = folderColors.addColor(params, 'backgroundColor').name('Background').onChange(() => {
                if (!params.greenScreen) applyBackgroundColor();
            });
            folderColors.addColor(params, 'lineColor').name('Lines').onChange((color) => {
                lineMaterial.color.set(color);
            });
            folderColors.addColor(params, 'particleColor').name('Particles').onChange((color) => {
                particleSystem.material.uniforms.uParticleColor.value.set(color);
            });

            const folderStruct = gui.addFolder('Network Architecture');
            folderStruct.add(params, 'nodeDistance', 100, 800, 1).name('Node Distance');
            folderStruct.add(params, 'pinchSharpness', 1.0, 8.0, 0.1).name('Pinch Sharpness');
            folderStruct.add(params, 'maxSpread', 10.0, 150.0, 1.0).name('Bundle Spread');
            folderStruct.add(params, 'minSpread', 0.0, 10.0, 0.1).name('Pinch Width');
            folderStruct.add(params, 'structuralNoise', 0.0, 10.0, 0.1).name('Organic Noise');

            const folderSim = gui.addFolder('Simulation Dynamics');
            folderSim.add(params, 'cameraSpeed', 0.0, 5.0, 0.01).name('Camera Panning');
            folderSim.add(params, 'flowSpeed', -200.0, 300.0, 1.0).name('Structural Flow Right');
            folderSim.add(params, 'particleSpeed', 0.0, 3.0, 0.01).name('Data Flow Speed');
            folderSim.add(params, 'particleSpawnRate', 0, 20, 1).name('Spawn Density');

            const folderView = gui.addFolder('View');
            folderView.add(params, 'cameraDistance', 35, 520, 1).name('Zoom Distance');
            folderView.add({ reset: resetView }, 'reset').name('Reset View');

            const folderRender = gui.addFolder('Post-Processing');
            folderRender.add(bloomPass, 'strength', 0.0, 3.0, 0.1).name('Bloom Strength');
            folderRender.add(bloomPass, 'radius', 0.0, 1.0, 0.01).name('Bloom Radius');

            greenScreenToggle.addEventListener('click', () => setGreenScreen(!params.greenScreen));
            resetViewButton.addEventListener('click', resetView);
            window.addEventListener('keydown', (event) => {
                if (event.key.toLowerCase() === 'g') setGreenScreen(!params.greenScreen);
            });

            window.addEventListener('resize', onWindowResize);
            canvas.addEventListener('wheel', onWheel, { passive: false });
            canvas.addEventListener('pointerdown', onPointerDown);
            canvas.addEventListener('pointermove', onPointerMove);
            canvas.addEventListener('pointerup', onPointerUp);
            canvas.addEventListener('pointercancel', onPointerUp);

            applyBackgroundColor();
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            sharedUniforms.uTime.value = time;

            camera.position.x += params.cameraSpeed;
            sharedUniforms.uCameraX.value = camera.position.x - worldGroup.position.x;

            camera.position.y = Math.sin(time * 0.2) * 8;
            camera.position.z = params.cameraDistance + Math.cos(time * 0.15) * 10;
            camera.lookAt(camera.position.x + 100, 0, 0);

            fibers.forEach((fiber) => fiber.update(time, camera.position.x));

            for (let i = 0; i < params.particleSpawnRate; i++) {
                particleSystem.spawn(0);
            }
            particleSystem.update();

            if (backgroundController) backgroundController.updateDisplay();
            composer.render();
        }

        window.onload = init;
    </script>
</body>
</html>
