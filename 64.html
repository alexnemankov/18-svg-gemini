<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Universe Simulation</title>
    <link rel="stylesheet" href="https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            transition: background-color 0.3s ease;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            letter-spacing: 2px;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.174.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.174.0/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>

    <div id="loading">GENERATING UNIVERSE...</div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import GUI from 'lil-gui';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const universe = new THREE.Group();
        scene.add(universe);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const clock = new THREE.Clock();

        const bgVertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const bgFragmentShader = `
            uniform float uTime;
            uniform vec3 uBaseSpace;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uStarBand;
            varying vec2 vUv;

            float hash(vec2 p) { 
                return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); 
            }
            
            float noise(vec2 p) {
                vec2 i = floor(p); 
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
                           mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x), f.y);
            }
            
            float fbm(vec2 p) {
                float v = 0.0; 
                float a = 0.5;
                for (int i = 0; i < 5; i++) {
                    v += a * noise(p); 
                    p *= 2.0; 
                    a *= 0.5;
                }
                return v;
            }

            void main() {
                vec2 uv = vUv * 2.0;
                float t = uTime * 0.02;

                float equator = smoothstep(0.4, 0.0, abs(vUv.y - 0.5));

                float n1 = fbm(uv * 3.0 + vec2(t, t));
                float n2 = fbm(uv * 5.0 - vec2(t * 1.2, t * 0.8) + n1);

                vec3 finalColor = uBaseSpace;
                
                finalColor += uColor1 * n1 * (0.4 + 0.6 * equator);
                finalColor += uColor2 * n2 * (0.4 + 0.4 * equator);
                finalColor += uStarBand * equator * (n1 * n2) * 2.0;

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const bgGeometry = new THREE.SphereGeometry(1000, 32, 32);
        const bgMaterial = new THREE.ShaderMaterial({
            vertexShader: bgVertexShader,
            fragmentShader: bgFragmentShader,
            uniforms: {
                uTime: { value: 0 },
                uBaseSpace: { value: new THREE.Color('#010003') },
                uColor1: { value: new THREE.Color('#2b003a') },
                uColor2: { value: new THREE.Color('#00123a') },
                uStarBand: { value: new THREE.Color('#2b1d00') }
            },
            side: THREE.BackSide,
            depthWrite: false
        });
        const nebulaMesh = new THREE.Mesh(bgGeometry, bgMaterial);
        universe.add(nebulaMesh);

        const particleCount = 65000;
        const starGeometry = new THREE.BufferGeometry();
        
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        const phases = new Float32Array(particleCount);
        const twinkleSpeeds = new Float32Array(particleCount);

        const radius = 800;
        
        for (let i = 0; i < particleCount; i++) {
            const r = radius * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            
            positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = r * Math.cos(phi);

            sizes[i] = Math.pow(Math.random(), 7.0) * 20.0 + 1.0; 
            
            phases[i] = Math.random() * Math.PI * 2;
            twinkleSpeeds[i] = Math.random() * 4.0 + 0.5;
        }

        starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        starGeometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
        starGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        starGeometry.setAttribute('phase', new THREE.BufferAttribute(phases, 1));
        starGeometry.setAttribute('twinkleSpeed', new THREE.BufferAttribute(twinkleSpeeds, 1));

        const starVertexShader = `
            uniform float uTime;
            uniform float uPixelRatio;

            attribute float size;
            attribute float phase;
            attribute float twinkleSpeed;
            attribute vec3 customColor;

            varying vec3 vColor;
            varying float vTwinkle;

            void main() {
                vColor = customColor;

                float t = uTime * twinkleSpeed + phase;
                float wave = sin(t) * 0.5 + 0.5;
                
                float flash = pow(wave, 10.0) * 2.5; 
                float basePulse = 0.15 + wave * 0.3;
                
                vTwinkle = basePulse + flash;

                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_Position = projectionMatrix * mvPosition;

                float dist = length(mvPosition.xyz);
                gl_PointSize = size * uPixelRatio * (600.0 / dist) * vTwinkle;
            }
        `;

        const starFragmentShader = `
            varying vec3 vColor;
            varying float vTwinkle;

            void main() {
                vec2 uv = gl_PointCoord.xy * 2.0 - 1.0;
                float d = length(uv);

                float rayX = exp(-abs(uv.x) * 30.0) * exp(-abs(uv.y) * 1.0);
                float rayY = exp(-abs(uv.y) * 30.0) * exp(-abs(uv.x) * 1.0);

                float core = exp(-d * 15.0);
                float halo = exp(-d * 4.0) * 0.5;

                float alpha = (rayX + rayY) * 0.8 + core + halo;

                alpha *= smoothstep(1.0, 0.1, d);

                if (alpha < 0.02) discard;

                vec3 finalColor = mix(vColor, vec3(1.0), core * 0.9);

                gl_FragColor = vec4(finalColor, alpha * min(vTwinkle, 2.5));
            }
        `;

        const starMaterial = new THREE.ShaderMaterial({
            vertexShader: starVertexShader,
            fragmentShader: starFragmentShader,
            uniforms: {
                uTime: { value: 0.0 },
                uPixelRatio: { value: renderer.getPixelRatio() }
            },
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const starMesh = new THREE.Points(starGeometry, starMaterial);
        universe.add(starMesh);

        // Tech and IT presets
        const presets = {
            'Cyberpunk Neon': {
                stars: ['#ff1e4a', '#a01eff', '#00ffea', '#ffffff'],
                bgBaseSpace: '#010003',
                bgColor1: '#2b003a',
                bgColor2: '#00123a',
                bgStarBand: '#2b1d00'
            },
            'Matrix Hacker': {
                stars: ['#00ff44', '#006611', '#00ffff', '#00cc66'],
                bgBaseSpace: '#000300',
                bgColor1: '#002a05',
                bgColor2: '#001a15',
                bgStarBand: '#0a3a00'
            },
            'Deep Space Tech': {
                stars: ['#0044ff', '#00bfff', '#00ffff', '#ffffff'],
                bgBaseSpace: '#000105',
                bgColor1: '#00113a',
                bgColor2: '#002b3a',
                bgStarBand: '#003a35'
            },
            'Quantum Gold': {
                stars: ['#ffd700', '#ff8800', '#ff5500', '#ffffe0'],
                bgBaseSpace: '#030100',
                bgColor1: '#301000',
                bgColor2: '#200a00',
                bgStarBand: '#302000'
            },
            'Mono Tech': {
                stars: ['#f0f8ff', '#c0c0c0', '#e6e6fa', '#778899'],
                bgBaseSpace: '#020202',
                bgColor1: '#15151b',
                bgColor2: '#0a0a0f',
                bgStarBand: '#1f1f2a'
            }
        };

        const guiParams = {
            preset: 'Cyberpunk Neon',
            greenscreen: false,
            star1: '#ff1e4a',
            star2: '#a01eff',
            star3: '#00ffea',
            star4: '#ffffff',
            bgBaseSpace: '#010003',
            bgColor1: '#2b003a',
            bgColor2: '#00123a',
            bgStarBand: '#2b1d00'
        };

        const colorTmp = new THREE.Color();

        function applyColors() {
            bgMaterial.uniforms.uBaseSpace.value.set(guiParams.bgBaseSpace);
            bgMaterial.uniforms.uColor1.value.set(guiParams.bgColor1);
            bgMaterial.uniforms.uColor2.value.set(guiParams.bgColor2);
            bgMaterial.uniforms.uStarBand.value.set(guiParams.bgStarBand);

            const currentPalette = [
                new THREE.Color(guiParams.star1),
                new THREE.Color(guiParams.star2),
                new THREE.Color(guiParams.star3),
                new THREE.Color(guiParams.star4)
            ];

            const colorsAttr = starGeometry.attributes.customColor;
            const array = colorsAttr.array;
            
            for (let i = 0; i < particleCount; i++) {
                const paletteIndex = i % currentPalette.length;
                const baseColor = currentPalette[paletteIndex];
                
                const rFactor = (Math.sin(i * 12.9898) * 43758.5453) % 1;
                const lerpFactor = Math.abs(rFactor) * 0.2;
                
                colorTmp.copy(baseColor).lerp(new THREE.Color(0xffffff), lerpFactor);
                
                array[i * 3] = colorTmp.r;
                array[i * 3 + 1] = colorTmp.g;
                array[i * 3 + 2] = colorTmp.b;
            }
            colorsAttr.needsUpdate = true;
        }

        const gui = new GUI({ title: 'Universe Controls' });
        const controllers = {};

        controllers.preset = gui.add(guiParams, 'preset', ['Cyberpunk Neon', 'Matrix Hacker', 'Deep Space Tech', 'Quantum Gold', 'Mono Tech', 'Custom'])
            .name('Color Scheme')
            .onChange(value => {
                if (value !== 'Custom') {
                    const p = presets[value];
                    guiParams.star1 = p.stars[0];
                    guiParams.star2 = p.stars[1];
                    guiParams.star3 = p.stars[2];
                    guiParams.star4 = p.stars[3];
                    guiParams.bgBaseSpace = p.bgBaseSpace;
                    guiParams.bgColor1 = p.bgColor1;
                    guiParams.bgColor2 = p.bgColor2;
                    guiParams.bgStarBand = p.bgStarBand;

                    controllers.star1.updateDisplay();
                    controllers.star2.updateDisplay();
                    controllers.star3.updateDisplay();
                    controllers.star4.updateDisplay();
                    controllers.bgBaseSpace.updateDisplay();
                    controllers.bgColor1.updateDisplay();
                    controllers.bgColor2.updateDisplay();
                    controllers.bgStarBand.updateDisplay();

                    applyColors();
                }
            });

        controllers.greenscreen = gui.add(guiParams, 'greenscreen')
            .name('Greenscreen (#00ff00)')
            .onChange(value => {
                if (value) {
                    scene.background = new THREE.Color('#00ff00');
                    document.body.style.backgroundColor = '#00ff00';
                    nebulaMesh.visible = false;
                } else {
                    scene.background = null;
                    document.body.style.backgroundColor = '#000000';
                    nebulaMesh.visible = true;
                }
            });

        function onCustomColorChange() {
            guiParams.preset = 'Custom';
            controllers.preset.updateDisplay();
            applyColors();
        }

        const starFolder = gui.addFolder('Star Colors');
        controllers.star1 = starFolder.addColor(guiParams, 'star1').name('Star Color 1').onChange(onCustomColorChange);
        controllers.star2 = starFolder.addColor(guiParams, 'star2').name('Star Color 2').onChange(onCustomColorChange);
        controllers.star3 = starFolder.addColor(guiParams, 'star3').name('Star Color 3').onChange(onCustomColorChange);
        controllers.star4 = starFolder.addColor(guiParams, 'star4').name('Star Color 4').onChange(onCustomColorChange);

        const bgFolder = gui.addFolder('Nebula Colors');
        controllers.bgBaseSpace = bgFolder.addColor(guiParams, 'bgBaseSpace').name('Space Void').onChange(onCustomColorChange);
        controllers.bgColor1 = bgFolder.addColor(guiParams, 'bgColor1').name('Cloud Layer 1').onChange(onCustomColorChange);
        controllers.bgColor2 = bgFolder.addColor(guiParams, 'bgColor2').name('Cloud Layer 2').onChange(onCustomColorChange);
        controllers.bgStarBand = bgFolder.addColor(guiParams, 'bgStarBand').name('Equator Band').onChange(onCustomColorChange);

        applyColors();

        document.getElementById('loading').style.opacity = '0';

        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = true;
        controls.enableZoom = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.4;

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            starMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
        }

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            starMaterial.uniforms.uTime.value = elapsedTime;
            bgMaterial.uniforms.uTime.value = elapsedTime;

            universe.rotation.x += (mouseY * 0.08 - universe.rotation.x) * 0.05;
            universe.rotation.y += (mouseX * 0.08 - universe.rotation.y) * 0.05;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
