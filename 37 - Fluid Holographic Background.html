<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheric Warp Fluid Simulator</title>
    
    <!-- Import Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Import lil-gui -->
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19"></script>

    <style>
        :root {
            --bg-glass: rgba(10, 15, 12, 0.72);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-color: #00ff88;
            --text-primary: #ffffff;
            --text-secondary: #a0aab0;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: grab;
        }

        body:active {
            cursor: grabbing;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* Glassmorphism HUD Panel */
        .glass-panel {
            position: absolute;
            top: 24px;
            left: 24px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
            color: var(--text-primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            width: 280px;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: top left;
        }

        .glass-panel.minimized {
            width: 180px;
            padding: 12px 16px;
        }

        .glass-panel.minimized .hud-content {
            display: none;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hud-header h3 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #fff 30%, rgba(255, 255, 255, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .hud-desc {
            font-size: 11px;
            color: var(--text-secondary);
            margin: 10px 0 16px 0;
            line-height: 1.5;
            font-weight: 300;
        }

        .hud-stats {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            margin-bottom: 6px;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.4);
        }

        .stat-value {
            font-family: monospace;
            color: var(--accent-color);
            font-weight: 600;
        }

        .hud-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .hud-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #fff;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hud-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .toggle-btn .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: rgba(0, 255, 0, 0.15);
            border-color: rgba(0, 255, 0, 0.4);
            color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.15);
        }

        .toggle-btn.active .dot {
            background: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }

        #instructions-overlay {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            background: var(--bg-glass);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 12px;
            pointer-events: none;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 50;
        }

        /* Customize lil-gui styling & location */
        .lil-gui.root {
            position: absolute !important;
            top: 24px !important;
            right: 24px !important;
        }

        .lil-gui {
            --background-color: rgba(10, 15, 12, 0.85) !important;
            --text-color: #f1f5f9 !important;
            --title-background-color: rgba(18, 25, 20, 0.95) !important;
            --widget-color: rgba(30, 41, 35, 0.5) !important;
            --hover-color: var(--accent-color) !important;
            --focus-color: var(--accent-color) !important;
            font-family: 'Outfit', sans-serif !important;
            border-radius: 12px !important;
            overflow: hidden !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6) !important;
            border: 1px solid var(--border-glass) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
        }
    </style>
</head>
<body>

    <!-- HUD panel overlay -->
    <div id="hud-panel" class="glass-panel">
        <div class="hud-header">
            <h3>Aetheric Fluid HUD</h3>
            <button id="hud-toggle-btn" class="icon-btn">—</button>
        </div>
        <div class="hud-content">
            <p class="hud-desc">An interactive, procedurally animated fluid simulation. Drag the fluid canvas to pan, use the scroll wheel to zoom.</p>
            
            <div class="hud-stats">
                <div class="stat-row">
                    <span class="stat-label">Zoom Level</span>
                    <span class="stat-value" id="stat-zoom">1.00x</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Offset</span>
                    <span class="stat-value" id="stat-offset">0.00, 0.00</span>
                </div>
            </div>

            <div class="hud-actions">
                <button id="btn-reset" class="hud-btn">Reset View</button>
                <button id="btn-greenscreen" class="hud-btn toggle-btn">
                    <span class="dot"></span>
                    Green Screen
                </button>
            </div>
        </div>
    </div>

    <!-- Instruction overlay -->
    <div id="instructions-overlay">
        Left-click & Drag fluid to move | Scroll to zoom | Double-click to reset view
    </div>

    <script>
        // --- Setup Scene, Camera, and Renderer ---
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
        camera.position.z = 1;

        // Set alpha to true so that the CSS body background (e.g. greenscreen) shows through
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0); // Transparent canvas background
        document.body.appendChild(renderer.domElement);

        // --- Shader Parameters ---
        const config = {
            timeScale: 0.6,
            viewScale: 0.9193,
            detail: 0.7007,
            shiftRate: 0.834,
            shiftAmp: 0.7005,
            palette: 'Neon Fluid',
            greenScreen: false,
            bgColor: '#000000',
            tintColor: '#ffffff',
            tintAngle: 0.0,
            colorSat: 1.0,
            lumFactor: 1.0
        };

        // --- Color Palettes ---
        const palettes = {
            'Neon Fluid': { angle: 0.0, sat: 1.0, lum: 1.0, weights: [1.0, 1.0, 1.0] },
            'Monochrome': { angle: 0.0, sat: 0.0, lum: 1.0, weights: [1.0, 1.0, 1.0] },
            'Ocean Depth': { angle: 1.5, sat: 1.2, lum: 0.9, weights: [0.2, 0.5, 1.0] },
            'Volcanic Lava': { angle: 5.5, sat: 1.5, lum: 1.1, weights: [1.0, 0.3, 0.1] },
            'Forest Emerald': { angle: 3.2, sat: 1.1, lum: 1.0, weights: [0.1, 1.0, 0.4] },
            'Cosmic Nebula': { angle: 4.8, sat: 1.4, lum: 1.05, weights: [0.8, 0.2, 0.9] }
        };

        // =====================================================================
        // CORE SHADER IMPLEMENTATION
        // =====================================================================
        // Using varying vUv mapped aspect ratio so the pattern is anchored to the mesh geometry.
        // This makes zooming the camera and panning the mesh translate directly into zooming and panning the fluid pattern!
        const fragmentShader = `
            uniform vec3 uResolution;
            uniform float uTime;
            uniform vec4 u_pointer; 
            varying vec2 vUv;

            uniform float u_time_scale;
            uniform float u_view_scale;
            uniform float u_detail;
            uniform float u_shift_rate;
            uniform float u_shift_amp;
            
            // Color Uniforms
            uniform float u_tint_angle;
            uniform float u_color_sat;
            uniform float u_lum_factor;
            uniform vec3 u_rgb_weights;

            void computeSurface(out vec4 fragColor, vec2 uvCoord) {
                vec2 resolution = uResolution.xy;
                float minRes = min(resolution.x, resolution.y);
                // Map vUv (0 to 1) to screen aspect ratio space matching original layout
                vec2 normCoord = (uvCoord * 2.0 - 1.0) * (resolution / minRes);
                
                // Scale viewport
                normCoord *= u_view_scale;

                // Time evolution variables
                float t = uTime * u_time_scale * 0.3;
                float shiftT = uTime * u_shift_rate * 0.5;

                // Phase accumulators
                vec2 phase = vec2(-t * 0.5, 0.0);
                vec2 pos = normCoord;
                
                // Warping loop
                for (float j = 0.0; j < 8.0; j += 1.0) {
                    vec2 offset = vec2(sin(shiftT + j * 1.3), cos(shiftT - j * 1.1)) * u_shift_amp;
                    vec2 p = pos + offset;
                    
                    phase.y += cos(j - phase.x - p.x * u_detail);
                    phase.x += sin(p.y * u_detail + phase.y);
                }
                phase.x += t * 0.5;
                
                // Base color generation
                vec3 color = vec3(
                    cos(normCoord.x * phase.x + normCoord.y * phase.y) * 0.6 + 0.4, 
                    cos(phase.y + phase.x) * 0.5 + 0.5,
                    cos(normCoord.x * phase.y) * 0.0 
                );
                
                // Channel scrambling
                color.b = cos(phase.y + phase.x) * 0.5 + 0.5; 
                color = cos(color * cos(vec3(phase.x, phase.y, 2.5)) * 0.5 + 0.5);
                
                // Apply theme scaling
                color *= u_rgb_weights;
                
                // Rec. 709 luminance
                float luma = dot(color, vec3(0.2126, 0.7152, 0.0722));
                color = mix(vec3(luma), color, u_color_sat);
                
                // Quaternion-based hue rotation
                vec3 k = vec3(0.577350269);
                float cA = cos(u_tint_angle);
                color = color * cA + cross(k, color) * sin(u_tint_angle) + k * dot(k, color) * (1.0 - cA);
                
                // Final exposure/lightness
                color *= u_lum_factor;
                
                fragColor = vec4(color, 1.0);
            }

            void main() {
                computeSurface(gl_FragColor, vUv);
            }
        `;
        // =====================================================================

        // --- GLSL Shaders ---
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        // --- Material & Mesh ---
        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uResolution: { value: new THREE.Vector3(window.innerWidth, window.innerHeight, 1.0) },
                uTime: { value: 0.0 },
                u_pointer: { value: new THREE.Vector4() },
                u_time_scale: { value: config.timeScale },
                u_view_scale: { value: config.viewScale },
                u_detail: { value: config.detail },
                u_shift_rate: { value: config.shiftRate },
                u_shift_amp: { value: config.shiftAmp },
                u_tint_angle: { value: palettes[config.palette].angle },
                u_color_sat: { value: palettes[config.palette].sat },
                u_lum_factor: { value: palettes[config.palette].lum },
                u_rgb_weights: { value: new THREE.Vector3(...palettes[config.palette].weights) }
            }
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // --- Interactive State & Zoom/Drag Interpolation ---
        let targetScale = 1.0;
        let targetPosition = new THREE.Vector2(0, 0);

        let currentScale = 1.0;
        let currentPosition = new THREE.Vector2(0, 0);

        let isDragging = false;
        let previousPointerPosition = { x: 0, y: 0 };

        // Pointer / Touch Events
        window.addEventListener('pointerdown', (e) => {
            // Ignore if pointer is over UI elements
            if (e.target.closest('.lil-gui') || e.target.closest('#hud-panel')) return;
            
            isDragging = true;
            previousPointerPosition = { x: e.clientX, y: e.clientY };
            
            // Set pointer capturing to ensure dragging remains active outside the viewport
            document.body.releasePointerCapture(e.pointerId);
            document.body.setPointerCapture(e.pointerId);

            // Pass pointer coordinates to the shader
            material.uniforms.u_pointer.value.z = e.clientX;
            material.uniforms.u_pointer.value.w = window.innerHeight - e.clientY;
        });

        window.addEventListener('pointermove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - previousPointerPosition.x;
                const deltaY = e.clientY - previousPointerPosition.y;

                // Speed factor adjusted for current zoom
                const dragSpeed = 2.0 / camera.zoom;
                
                targetPosition.x += (deltaX / window.innerWidth) * dragSpeed;
                targetPosition.y -= (deltaY / window.innerHeight) * dragSpeed;

                previousPointerPosition = { x: e.clientX, y: e.clientY };
            }

            material.uniforms.u_pointer.value.x = e.clientX;
            material.uniforms.u_pointer.value.y = window.innerHeight - e.clientY;
        });

        const stopDragging = () => {
            isDragging = false;
        };

        window.addEventListener('pointerup', stopDragging);
        window.addEventListener('pointercancel', stopDragging);

        // Scroll Wheel Zoom
        window.addEventListener('wheel', (e) => {
            if (e.target.closest('.lil-gui') || e.target.closest('#hud-panel')) return;
            
            const zoomSpeed = 0.15;
            const factor = e.deltaY < 0 ? (1 + zoomSpeed) : (1 - zoomSpeed);
            targetScale *= factor;
            
            // Limit scale zoom values to reasonable boundaries
            targetScale = Math.max(0.1, Math.min(targetScale, 10.0));
        }, { passive: true });

        // Double Click to Reset View
        window.addEventListener('dblclick', (e) => {
            if (e.target.closest('.lil-gui') || e.target.closest('#hud-panel')) return;
            targetScale = 1.0;
            targetPosition.set(0, 0);
        });

        // --- GUI Setup (lil-gui) ---
        let greenscreenCtrl, bgColorCtrl;
        let tintColorCtrl, tintAngleCtrl, satCtrl, lumCtrl;

        window.onload = () => {
            const gui = new lil.GUI({ title: 'Environment Settings' });
            
            // 1. Background Config Folder
            const bgFolder = gui.addFolder('Background Configuration');
            greenscreenCtrl = bgFolder.add(config, 'greenScreen').name('Green Screen Mode').onChange(updateBackground);
            bgColorCtrl = bgFolder.addColor(config, 'bgColor').name('Background Color').onChange(updateBackground);
            bgFolder.open();

            // 2. Motion folder
            const motionFolder = gui.addFolder('Motion Dynamics');
            motionFolder.add(config, 'timeScale', 0.0, 3.0).name('Time Scale').onChange(v => material.uniforms.u_time_scale.value = v);
            motionFolder.add(config, 'viewScale', 0.1, 3.0).name('View Scale').onChange(v => material.uniforms.u_view_scale.value = v);
            
            // 3. Fractal geometry details folder
            const fractalFolder = gui.addFolder('Fractal Properties');
            fractalFolder.add(config, 'detail', 0.1, 5.0).name('Detail Level').onChange(v => material.uniforms.u_detail.value = v);
            fractalFolder.add(config, 'shiftRate', 0.0, 2.0).name('Shift Rate').onChange(v => material.uniforms.u_shift_rate.value = v);
            fractalFolder.add(config, 'shiftAmp', 0.0, 1.5).name('Shift Amplitude').onChange(v => material.uniforms.u_shift_amp.value = v);
            
            // 4. Color controls folder
            const colorFolder = gui.addFolder('Color Customization');
            
            tintColorCtrl = colorFolder.addColor(config, 'tintColor').name('Base Tint').onChange(hex => {
                const color = new THREE.Color(hex);
                material.uniforms.u_rgb_weights.value.set(color.r, color.g, color.b);
            });

            tintAngleCtrl = colorFolder.add(config, 'tintAngle', 0.0, Math.PI * 2).name('Hue Rotation').onChange(v => {
                material.uniforms.u_tint_angle.value = v;
            });

            satCtrl = colorFolder.add(config, 'colorSat', 0.0, 2.0).name('Saturation').onChange(v => {
                material.uniforms.u_color_sat.value = v;
            });

            lumCtrl = colorFolder.add(config, 'lumFactor', 0.0, 3.0).name('Brightness').onChange(v => {
                material.uniforms.u_lum_factor.value = v;
            });

            colorFolder.add(config, 'palette', Object.keys(palettes)).name('Active Palette').onChange(paletteName => {
                const p = palettes[paletteName];
                
                // Triggers onChange automatically to update uniforms
                tintColorCtrl.setValue('#' + new THREE.Color(...p.weights).getHexString());
                tintAngleCtrl.setValue(p.angle);
                satCtrl.setValue(p.sat);
                lumCtrl.setValue(p.lum);
            });
            colorFolder.open();

            // Set background color to reflect initial setting
            updateBackground();
            
            animate();
        };

        // --- HUD Overlay Interactions ---
        const hudPanel = document.getElementById('hud-panel');
        const hudToggleBtn = document.getElementById('hud-toggle-btn');
        if (hudToggleBtn && hudPanel) {
            hudToggleBtn.addEventListener('click', () => {
                hudPanel.classList.toggle('minimized');
                hudToggleBtn.textContent = hudPanel.classList.contains('minimized') ? '+' : '—';
            });
        }

        const btnReset = document.getElementById('btn-reset');
        if (btnReset) {
            btnReset.addEventListener('click', () => {
                targetScale = 1.0;
                targetPosition.set(0, 0);
            });
        }

        const btnGreenscreen = document.getElementById('btn-greenscreen');
        if (btnGreenscreen) {
            btnGreenscreen.addEventListener('click', () => {
                config.greenScreen = !config.greenScreen;
                if (greenscreenCtrl) greenscreenCtrl.setValue(config.greenScreen);
                updateBackground();
            });
        }

        // --- Background Renderer Sync ---
        function updateBackground() {
            const activeColor = config.greenScreen ? '#00ff00' : config.bgColor;
            document.body.style.backgroundColor = activeColor;
            
            if (btnGreenscreen) {
                if (config.greenScreen) {
                    btnGreenscreen.classList.add('active');
                } else {
                    btnGreenscreen.classList.remove('active');
                }
            }
        }

        // --- Animation & Render Loop ---
        const clock = new THREE.Clock();
        const statZoom = document.getElementById('stat-zoom');
        const statOffset = document.getElementById('stat-offset');

        function animate() {
            requestAnimationFrame(animate);
            
            // Dampened interpolation for smooth zoom and drag
            currentScale += (targetScale - currentScale) * 0.12;
            currentPosition.x += (targetPosition.x - currentPosition.x) * 0.12;
            currentPosition.y += (targetPosition.y - currentPosition.y) * 0.12;

            // Apply zoom to Orthographic Camera
            camera.zoom = currentScale;
            camera.updateProjectionMatrix();

            // Translate mesh position (dragging object across screen)
            mesh.position.x = currentPosition.x;
            mesh.position.y = currentPosition.y;

            // Update real-time HUD stats
            if (statZoom) statZoom.textContent = currentScale.toFixed(2) + 'x';
            if (statOffset) statOffset.textContent = `${currentPosition.x.toFixed(2)}, ${currentPosition.y.toFixed(2)}`;

            material.uniforms.uTime.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }

        // --- Window Resize Handling ---
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight, 1.0);
        });
    </script>
</body>
</html>
