<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Lightning Storm</title>
  <style>
    body {
      overflow: hidden;
      margin: 0;
      height: 100vh;
    }

    canvas {
      width: 100%;
      height: 100%;
      cursor: none;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/gh/josephg/noisejs/perlin.js"></script>
</head>
<body>
  <canvas></canvas>

  <script type="module">
    import { GUI } from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

    const schemes = {
      'Cosmic Tempest': {
        bgHue: 240, bgSat: 60, bgLight: 15,
        nodeHueBase: 200, nodeHueRange: 220, nodeSat: 90, nodeLight: 50,
        partHueBase: 280, partHueRange: 140, partSat: 100, partLight: 40,
        strike1HueBase: 20, strike1HueRange: -180, strike1LightBase: 50, strike1LightRange: 40,
        strike2HueBase: 420, strike2HueRange: -40, strike2LightBase: 80, strike2LightRange: 40,
        strikeSat: 100
      },
      'Solar Flare': {
        bgHue: 10, bgSat: 80, bgLight: 8,
        nodeHueBase: 15, nodeHueRange: 45, nodeSat: 95, nodeLight: 45,
        partHueBase: 35, partHueRange: 25, partSat: 100, partLight: 45,
        strike1HueBase: 0, strike1HueRange: 50, strike1LightBase: 55, strike1LightRange: 35,
        strike2HueBase: 50, strike2HueRange: 20, strike2LightBase: 85, strike2LightRange: 15,
        strikeSat: 100
      },
      'Toxic Aurora': {
        bgHue: 160, bgSat: 70, bgLight: 8,
        nodeHueBase: 110, nodeHueRange: 90, nodeSat: 85, nodeLight: 45,
        partHueBase: 90, partHueRange: 40, partSat: 90, partLight: 40,
        strike1HueBase: 95, strike1HueRange: 70, strike1LightBase: 50, strike1LightRange: 40,
        strike2HueBase: 135, strike2HueRange: 25, strike2LightBase: 80, strike2LightRange: 20,
        strikeSat: 100
      },
      'Frozen Abyss': {
        bgHue: 215, bgSat: 75, bgLight: 6,
        nodeHueBase: 195, nodeHueRange: 45, nodeSat: 90, nodeLight: 40,
        partHueBase: 185, partHueRange: 35, partSat: 90, partLight: 40,
        strike1HueBase: 180, strike1HueRange: 50, strike1LightBase: 50, strike1LightRange: 45,
        strike2HueBase: 200, strike2HueRange: 15, strike2LightBase: 85, strike2LightRange: 15,
        strikeSat: 95
      },
      'Cyberpunk Void': {
        bgHue: 285, bgSat: 60, bgLight: 7,
        nodeHueBase: 300, nodeHueRange: 65, nodeSat: 95, nodeLight: 45,
        partHueBase: 275, partHueRange: 55, partSat: 95, partLight: 40,
        strike1HueBase: 320, strike1HueRange: -100, strike1LightBase: 50, strike1LightRange: 40,
        strike2HueBase: 185, strike2HueRange: 20, strike2LightBase: 80, strike2LightRange: 20,
        strikeSat: 100
      }
    };

    const settings = {
      interval: 3000,
      autoStrike: true,
      nodeMap: true,
      nodeStyle: 'rect',
      stepSpeed: 0.15,
      speed: 1.0,
      dpr: window.devicePixelRatio || 1.0,
      greenscreen: false,
      animationPreset: 'Floating Drift',
      colorScheme: 'Cosmic Tempest',

      // Default color parameters (Cosmic Tempest)
      bgHue: 240, bgSat: 60, bgLight: 15,
      nodeHueBase: 200, nodeHueRange: 220, nodeSat: 90, nodeLight: 50,
      partHueBase: 280, partHueRange: 140, partSat: 100, partLight: 40,
      strike1HueBase: 20, strike1HueRange: -180, strike1LightBase: 50, strike1LightRange: 40,
      strike2HueBase: 420, strike2HueRange: -40, strike2LightBase: 80, strike2LightRange: 40,
      strikeSat: 100,

      get glowStyle() {
        return {
          flashMultiplier: this.nodeSize * 20,
          flashUntil: 0.05,
          flashEase: 1/3,
          finalEase: 1/20
        }
      },

      get stormStyle() {
        return {
          minWindAngle: 50,
          maxWindAngle: 70,
          windVariation: 15,
          windSpeedFactor: 1/50,
          windGlowSpeedFactor: 1/max(1, (glowState*3)),
          minParticles: 300,
          maxParticles: 500,
          minParticleLength: G.height/25,
          maxParticleLength: G.height/7,
          maxParticleWidth: G.width/500,
          particleColor: {
            h: this.partHueBase + (this.partHueRange * glowState),
            s: this.partSat,
            l: this.partLight
          }
        }
      },

      get strokeStyle() {
        return {
          width: this.nodeSize * 4,
          cap: 'round'
        }
      },

      get limits() {
        return {
          strikeSetLimit: 35,
          firstSetMaxStrikes: 2,
          otherSetMaxStrikes: 2,
          dieOff: .9,
          winChance: .15,
          minWinners: ceil(random() * 4),
          stopY: G.height - G.height/100
        }
      },

      get nodeSize() {
        return max(3, G.width / 1000)
      },
      
      get nodeGapConstant() {
        return 8
      },

      get nodeGap() {
        return this.nodeSize * this.nodeGapConstant
      },

      get nodeCount() {
        return floor(
          (G.width * G.height) /
          (this.nodeSize * this.nodeGap) /
          this.nodeGapConstant
        )
      },

      get sizeMultipliers() {
        return {
          y: G.width/25,
          source: G.width/25,
          noise: G.width/70
        }
      },

      get source() {
        return {
          pos: G.pointer,
          treshold: this.nodeSize * 35,
          exponent: 1
        }
      }
    };

    const G = {
      get frame() {
        return this._frame || 0
      },

      set frame(newFrame) {
        this._frame = newFrame
      },

      get width() {
        return window.innerWidth
      },

      get height() {
        return window.innerHeight
      },

      set pointer(pos) {
        this._pointer = { x: pos.x, y: pos.y }
      },

      get pointer() {
        if (this._pointer) return this._pointer;
        // Idle drift in local space
        const t = animTime * 0.005;
        return {
          x: this.width * 0.5 + Math.sin(t) * (this.width * 0.25),
          y: this.height * 0.2 + Math.cos(t * 0.7) * (this.height * 0.1),
        }
      },

      set click(pos) {
        this._click = { x: pos.x, y: pos.y }
      },

      get click() {
        if (!this._click) {
          this._click = {
            x: this.width / 5 + random() * (this.width * 3/5),
            y: random() * this.height / 3
          }
        }
        return this._click
      }
    };

    const {
      min, max, abs, sqrt, pow,
      random, round, ceil, floor,
      sin, cos, PI: π
    } = Math;
    const rad = (deg) => deg * π/180;
    const query = document.querySelector.bind(document);
    const clamp = (minV, maxV, value) => min(maxV, max(minV, value));
    const calcProgress = (ratio) => clamp(0, 1, ratio);
    const calcDistance = (a, b) => sqrt(
      pow(abs(a.x - b.x), 2) +
      pow(abs(a.y - b.y), 2)
    );

    const fullSize = (el) => {
      const dpr = settings.dpr || window.devicePixelRatio || 1;
      el.width = window.innerWidth * dpr;
      el.height = window.innerHeight * dpr;
      el.style.width = `${window.innerWidth}px`;
      el.style.height = `${window.innerHeight}px`;
    };

    const makeLoop = (fn) => {
      return requestAnimationFrame(() => {
        fn()
        makeLoop(fn)
      })
    };

    const makeArray = (length) => {
      return [
        ...Array(length).keys()
      ].map((_, i) => i)
    };

    function luckySelect(array, chance, minItems) {
      if (minItems >= array.length) {
        return [...array]
      }
      
      const weighted = array.map(item => ({
        item,
        luck: random(),
        passed: random() < chance
      }))

      const passedItems = weighted
        .filter(w => w.passed)
        .map(w => w.item)

      if (passedItems.length >= minItems) {
        return passedItems
      }

      const failedItems = weighted
        .filter(w => !w.passed)
        .sort((a, b) => a.luck - b.luck)
        .map(w => w.item)

      const needed = minItems - passedItems.length
      return [...passedItems, ...failedItems.slice(0, needed)]
    }

    const calcNodePos = (nodeIndex) => {
      const size = settings.nodeSize
      const gap = settings.nodeGap
      const x = nodeIndex * (size + gap) % G.width
      const y = floor((nodeIndex * (size + gap)) / G.width) * gap
      return {
        x: x,
        y: y
      }
    };

    const computeNode = (sourceNode) => (node) => {
      const { nodeSize, sizeMultipliers, source } = settings
      const pos = node.pos || calcNodePos(node)
      const yProgress = node.yProgress || calcProgress(pos.y/G.height)
      const sourceDistance = calcDistance(sourceNode, pos)
      const sourceProgress = calcProgress(source.treshold/sourceDistance)
      const sizeFactorY = sizeMultipliers.y * yProgress
      const sizeFactorSource = pow(sourceProgress, source.exponent) * sizeMultipliers.source
      const sizeFactorNoise = noise.simplex2(pos.x, pos.y) * sizeMultipliers.noise
      return {
        index: node.index || node,
        targeted: node.targeted || false,
        x: pos.x,
        y: pos.y,
        size: sourceProgress * (nodeSize + sizeFactorY + sizeFactorSource + sizeFactorNoise),
        sourceProgress,
        yProgress
      }
    };

    const computeStrikeState = (rawNodes, computedNodes) => {
      const {
        strikeSetLimit,
        firstSetMaxStrikes,
        otherSetMaxStrikes,
        dieOff,
        stopY
      } = settings.limits
      
      const result = []

      const firstSet =  [...computedNodes]
        .sort((a, b) => b.size - a.size)
        .slice(0, ceil(random() * firstSetMaxStrikes))
        .map(target => ({
          progress: 0,
          from: settings.source.pos,
          to: target
        }))

      firstSet.forEach(strike => {
        computedNodes[strike.to.index].targeted = true
      })

      result.push(firstSet)

      let limit = strikeSetLimit
      while (limit-- > 0) {
        const newSet = []
        const lastSet = result[result.length - 1]
        const sources = lastSet.map(s => s.to)
        if (sources.some(s => s.y >= stopY)) {
          break
        }
        sources.forEach(source => {
          const strikes = rawNodes
            .map((node, i) => {
              return {
                ...computeNode(source)(node),
                targeted: computedNodes[i].targeted
              }
            })
            .filter(node => !node.targeted)
            .filter(node => node.size > source.size * dieOff)
            .sort((a, b) => b.size - a.size)
            .slice(0, ceil(random() * otherSetMaxStrikes))
            .map(newTarget => ({
              progress: 0,
              from: source,
              to: newTarget
            }))
          strikes.forEach(strike => {
            computedNodes[strike.to.index].targeted = true
          })
          newSet.push(...strikes)
        })
        result.push(newSet)
      }

      return result
    };

    const makeStormParticles = (amount) => {
      const {
        minParticleLength,
        maxParticleLength,
        windSpeedFactor
        } = settings.stormStyle
      return makeArray(round(random() * amount)).map(i => {
        const length = max(minParticleLength, random() * maxParticleLength)
        return {
          x: random() * G.width,
          y: random() * G.height,
          length,
          speed: length * windSpeedFactor
        }
      })
    };

    const prepareEndStates = () => {
      const {
        flashUntil,
        flashEase,
        finalEase
      } = settings.glowStyle
      strikeState = winnerSets
      if (glowState >= flashUntil) {
        glowState = max(0, glowState - (glowState * flashEase) * settings.speed)
      } else {
        glowState = max(0, glowState - (glowState * finalEase) * settings.speed)
      }
      endState = min(1, endState + ((1-endState)/200) * settings.speed)
    };

    const prepareWinnerSets = (endSet) => {
      const {
        winChance,
        minWinners,
        stopY,
        strikeSetLimit
      } = settings.limits

      const result = []

      const finishedStrikes = endSet.filter(strike => strike.to.y >= stopY)
      const luckyStrikes = luckySelect(finishedStrikes, winChance, minWinners)
      result.push(luckyStrikes)

      let limit = strikeSetLimit
      while (limit-- > 0) {
        const strikeSet = strikeState.slice(0, -1)[limit]
        if (!strikeSet) continue
        let winningStrikes = []
        for (let i = 0; i < strikeSet.length; i++) {
          const candidateStrike = strikeSet[i]
          for (let j = 0; j < result[0].length; j++) {
            const alreadyWonStrike = result[0][j]
            if (candidateStrike.to.index === alreadyWonStrike.from.index) {
              winningStrikes.push(candidateStrike)
            }
          }
        }
        result.unshift(winningStrikes)
      }

      return result
    };

    const drawBackground = () => {
      if (settings.greenscreen) {
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(0, 0, G.width, G.height);
        return;
      }
      const bgGlowFactor = endState > 0 ? max(1, glowState * 4) : 1
      const h = settings.bgHue;
      const s = settings.bgSat;
      const l = clamp(0, 100, settings.bgLight * bgGlowFactor);
      ctx.fillStyle = `hsl(${h}, ${s}%, ${l}%)`;
      ctx.fillRect(0, 0, G.width, G.height);
    };

    const drawNodeMap = (nodes) => {
      nodes.forEach(node => {
        const { sourceProgress } = node
        const hue = settings.nodeHueBase + settings.nodeHueRange * sourceProgress - drawingState * (Math.floor(animTime) % 30)
        const saturation = settings.nodeSat + drawingState * 10
        const lightness = settings.nodeLight + 25 * sourceProgress - drawingState * 2.5
        ctx.fillStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`
        const visualWidth = node.size + drawingState * node.size/8
        const visualHeight = node.size * 4 + drawingState * node.size/2
        if (settings.nodeStyle === 'arc') {
          ctx.beginPath()
          ctx.arc(
            node.x - visualWidth/2 + (drawingState * (Math.floor(animTime) % 12))/3,
            node.y - visualHeight/2 + (drawingState * (Math.floor(animTime) % 24))/3,
            max(0, visualWidth / 2),
            0,
            2 * π
          )
          ctx.fill()
        } else {
          ctx.fillRect(
            node.x - visualWidth/2 + (drawingState * (Math.floor(animTime) % 12))/3,
            node.y - visualHeight/2 + (drawingState * (Math.floor(animTime) % 24))/3,
            visualWidth,
            visualHeight
          )
        }
      })
    };

    const drawStormParticles = (particles) => {
      const {
        windVariation,
        windGlowSpeedFactor,
        maxParticleWidth,
        particleColor
      } = settings.stormStyle
      particles.forEach(({ x, y, length, speed }, i) => {
        const angle = rad(stormAngle + (x/G.width * windVariation) - (y/G.height * windVariation*2))
        const dirX = sin(angle)
        const dirY = cos(angle)
        ctx.lineCap = 'butt'
        ctx.lineWidth = min(maxParticleWidth, random() * G.width)
        const hue = particleColor.h
        const saturation = particleColor.s
        const lightness = particleColor.l
        ctx.strokeStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`
        ctx.beginPath()
        ctx.moveTo(x, y)
        ctx.lineTo(x + length * dirX, y + length * dirY)
        ctx.stroke()
        particles[i].x += (length * dirX) * speed * windGlowSpeedFactor * settings.speed
        particles[i].y += (length * dirY) * speed * windGlowSpeedFactor * settings.speed
        if (particles[i].x >= G.width) {
          particles[i].x = -length
          particles[i].y = G.height/-2 + random() * G.height * 2
        }
        if (particles[i].y >= G.height) {
          particles[i].y = random() * -G.height
        }
      })
    };

    const drawStrikes = () => {
      ctx.strokeStyle = settings.strokeStyle.color
      ctx.lineCap = settings.strokeStyle.cap

      const endGlow = endState > 0 ? (glowState * settings.glowStyle.flashMultiplier) : 1
      const endDisplacement = endState * 25

      strikeState.forEach((strikeSet, i) => {
        const hue = settings.strike1HueBase + settings.strike1HueRange * (i/15);
        const saturation = settings.strikeSat;
        const lightness = settings.strike1LightBase + settings.strike1LightRange * (i/30);
        ctx.strokeStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`
        const lineWidth = endGlow * (0.5 + settings.strokeStyle.width * ((i+1)/10))
        ctx.lineWidth = lineWidth
        strikeSet.forEach(strike => {
          if (strike.progress < 1) return
          ctx.beginPath()
          ctx.moveTo(strike.from.x-lineWidth, strike.from.y+endDisplacement)
          ctx.lineTo(strike.to.x-lineWidth, strike.to.y+endDisplacement)
          ctx.stroke()
        })
        const hue2 = settings.strike2HueBase + settings.strike2HueRange * (i/30);
        const saturation2 = settings.strikeSat;
        const lightness2 = settings.strike2LightBase + settings.strike2LightRange * (i/30);
        ctx.strokeStyle = `hsl(${hue2}, ${saturation2}%, ${lightness2}%)`
        ctx.lineWidth = endGlow * (1 + settings.strokeStyle.width * ((i+1)/12))
        strikeSet.forEach(strike => {
          if (strike.progress < 1) return
          ctx.beginPath()
          ctx.moveTo(strike.from.x, strike.from.y+endDisplacement)
          ctx.lineTo(strike.to.x, strike.to.y+endDisplacement)
          ctx.stroke()
        })
      })
    };

    const drawActiveStrikes = (activeStrikes) => {
      activeStrikes.forEach(strike => {
        const diffX = strike.to.x - strike.from.x
        const diffY = strike.to.y - strike.from.y
        const x = diffX * strike.progress
        const y = diffY * strike.progress
        ctx.beginPath()
        ctx.moveTo(strike.from.x, strike.from.y)
        ctx.lineTo(
          strike.from.x + x,
          strike.from.y + y
        )
        ctx.stroke()
        strike.progress += settings.stepSpeed * settings.speed
      })
    };

    const draw = () => {
      G.frame++
      animTime += settings.speed;

      const rawNodes = makeArray(settings.nodeCount)
      const computedNodes = rawNodes.map(computeNode(settings.source.pos))

      if (!stormParticles.length) {
        const { minParticles, maxParticles } = settings.stormStyle
        stormParticles = makeStormParticles(
          minParticles + ceil(random() * (maxParticles - minParticles))
        )
      }

      if (!strikeState.length) {
        strikeState = computeStrikeState(rawNodes, computedNodes)
      }

      const activeStrikes = strikeState.find(strikeSet => {
        return strikeSet.some(strike => strike.progress < 1)
      })

      const endSet = strikeState.find(strikeSet => {
        return strikeSet.some(strike => {
          return strike.to.y >= settings.limits.stopY
        })
      })

      if (!activeStrikes && endSet) {
        prepareEndStates()
      }

      if (endSet && !winnerSets.length) {
        winnerSets = prepareWinnerSets(endSet)
      }

      const dpr = settings.dpr || window.devicePixelRatio || 1;

      // 1. Draw background in screen size (no zoom/pan offset)
      ctx.save();
      ctx.scale(dpr, dpr);
      drawBackground();
      ctx.restore();

      // Update camera preset coordinates
      if (settings.animationPreset !== 'Static (No Movement)') {
        const t = animTime * 0.002;
        if (settings.animationPreset === 'Floating Drift') {
          currentZoom = baseZoom * (1.0 + Math.sin(t) * 0.15);
          currentOffsetX = basePanX + Math.cos(t * 0.7) * 100;
          currentOffsetY = basePanY + Math.sin(t * 0.5) * 80;
        } else if (settings.animationPreset === 'Cinematic Breath') {
          currentZoom = baseZoom * (1.1 + Math.cos(t * 0.75) * 0.2);
          currentOffsetX = basePanX + Math.sin(t * 0.3) * 60;
          currentOffsetY = basePanY + Math.cos(t * 0.4) * 40;
        } else if (settings.animationPreset === 'Storm Vortex') {
          currentZoom = baseZoom * (0.95 + Math.sin(t * 0.8) * 0.1);
          currentOffsetX = basePanX + Math.cos(t) * 150;
          currentOffsetY = basePanY + Math.sin(t) * 100;
        } else if (settings.animationPreset === 'Side-to-Side Sweep') {
          currentZoom = baseZoom * 1.05;
          currentOffsetX = basePanX + Math.sin(t * 1.2) * 200;
          currentOffsetY = basePanY + Math.cos(t * 0.2) * 30;
        }
      } else {
        currentZoom = baseZoom;
        currentOffsetX = basePanX;
        currentOffsetY = basePanY;
      }

      // 2. Draw scene items with camera transform
      ctx.save();
      ctx.scale(dpr, dpr);
      ctx.translate(currentOffsetX, currentOffsetY);
      ctx.scale(currentZoom, currentZoom);

      if (settings.nodeMap) {
        drawNodeMap(computedNodes)
      }

      drawStrikes()

      if (activeStrikes) {
        drawingState = min(1, drawingState + max(0.01, drawingState/5) * settings.speed)
        drawActiveStrikes(activeStrikes)
      } else {
        drawingState = max(0, drawingState - (drawingState/10) * settings.speed)
      }

      const { minWindAngle, maxWindAngle } = settings.stormStyle
      stormAngle += noise.simplex2(animTime / 300, 0)
      stormAngle = clamp(minWindAngle, maxWindAngle, stormAngle)
      drawStormParticles(stormParticles)

      ctx.restore();
    };

    const onResize = () => {
      fullSize(canvas)
    };

    // Zoom & Pan Variables
    let basePanX = 0;
    let basePanY = 0;
    let baseZoom = 1.0;
    let currentOffsetX = 0;
    let currentOffsetY = 0;
    let currentZoom = 1.0;
    let animTime = 0;

    const toLocalX = (screenX) => (screenX - currentOffsetX) / currentZoom;
    const toLocalY = (screenY) => (screenY - currentOffsetY) / currentZoom;

    // Viewport drag/zoom event handlers
    let isDragging = false;
    let hasMoved = false;
    let startX = 0, startY = 0;
    let startPanX = 0, startPanY = 0;

    window.addEventListener('pointerdown', (e) => {
      if (e.target.closest && e.target.closest('.lil-gui')) return;
      isDragging = true;
      hasMoved = false;
      startX = e.clientX;
      startY = e.clientY;
      startPanX = basePanX;
      startPanY = basePanY;
    });

    window.addEventListener('pointermove', (e) => {
      if (isDragging) {
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        basePanX = startPanX + dx;
        basePanY = startPanY + dy;
        if (Math.hypot(dx, dy) > 5) {
          hasMoved = true;
        }
      }
      
      if (!e.target.closest || !e.target.closest('.lil-gui')) {
        const localX = toLocalX(e.clientX);
        const localY = toLocalY(e.clientY);
        G.pointer = {
          x: localX,
          y: localY - localY / 3
        };
      }
    });

    window.addEventListener('pointerup', (e) => {
      if (isDragging) {
        isDragging = false;
        if (!hasMoved && (!e.target.closest || !e.target.closest('.lil-gui'))) {
          onClick(e);
        }
      }
    });

    window.addEventListener('wheel', (e) => {
      if (e.target.closest && e.target.closest('.lil-gui')) return;
      e.preventDefault();
      const mouseX = e.clientX;
      const mouseY = e.clientY;
      const zoomFactor = 1.1;
      const direction = e.deltaY < 0 ? 1 : -1;
      const zoom = direction > 0 ? zoomFactor : 1 / zoomFactor;
      const newZoom = clamp(0.1, 10, baseZoom * zoom);
      
      basePanX = mouseX - (mouseX - basePanX) * (newZoom / baseZoom);
      basePanY = mouseY - (mouseY - basePanY) * (newZoom / baseZoom);
      baseZoom = newZoom;
    }, { passive: false });

    const onClick = (event) => {
      if (event && event.target && event.target.closest && event.target.closest('.lil-gui')) return;

      const isProgrammatic = !event || (event.clientX === undefined && event.x === undefined);

      let localX, localY;
      if (isProgrammatic) {
        localX = toLocalX(window.innerWidth / 5 + random() * (window.innerWidth * 3/5));
        localY = toLocalY(random() * window.innerHeight / 3);
      } else {
        const clientX = event.clientX !== undefined ? event.clientX : event.x;
        const clientY = event.clientY !== undefined ? event.clientY : event.y;
        localX = toLocalX(clientX);
        localY = toLocalY(clientY);
      }

      G.click = {
        x: localX,
        y: localY
      };

      strikeState = []
      winnerSets = []
      glowState = 1
      endState = 0
      drawingState = 0

      resetInterval();
    };

    const resetInterval = () => {
      if (strikeInterval) clearInterval(strikeInterval);
      if (settings.autoStrike && settings.interval) {
        strikeInterval = setInterval(() => {
          onClick();
        }, settings.interval);
      }
    };

    window.addEventListener('resize', onResize);

    const canvas = query('canvas')
    const ctx = canvas.getContext('2d')
    
    // Seed noise
    noise.seed(random());

    fullSize(canvas)
    makeLoop(draw)
    let strikeState = []
    let winnerSets = []
    let glowState = 1
    let endState = 0
    let drawingState = 0
    let stormParticles = []
    let stormAngle = settings.stormStyle.minWindAngle
    let strikeInterval

    resetInterval();

    // UI hide/show toggle
    let guiHidden = false;
    window.addEventListener('keydown', (e) => {
      if (e.key === 'h' || e.key === 'H') {
        guiHidden = !guiHidden;
        if (gui.domElement) {
          gui.domElement.style.display = guiHidden ? 'none' : 'block';
        }
      }
    });

    // GUI Initialization
    const gui = new GUI({ title: 'Storm Settings' });

    const fGeneral = gui.addFolder('General');
    fGeneral.add(settings, 'greenscreen').name('Green Screen');
    fGeneral.add(settings, 'dpr', 0.5, 3.0, 0.1).name('Pixel Ratio (DPR)').onChange(onResize);
    fGeneral.add(settings, 'speed', 0.0, 3.0, 0.05).name('Animation Speed');
    fGeneral.add(settings, 'autoStrike').name('Auto Strike').onChange(resetInterval);
    fGeneral.add(settings, 'interval', 500, 10000, 250).name('Strike Interval (ms)').onChange(resetInterval);

    const fCamera = gui.addFolder('Camera & Animation');
    fCamera.add(settings, 'animationPreset', [
      'Floating Drift',
      'Cinematic Breath',
      'Storm Vortex',
      'Side-to-Side Sweep',
      'Static (No Movement)'
    ]).name('Camera Motion');
    fCamera.add({ resetCamera: () => {
      basePanX = 0;
      basePanY = 0;
      baseZoom = 1.0;
    } }, 'resetCamera').name('Reset Zoom/Drag');

    const applyScheme = (name) => {
      const scheme = schemes[name];
      if (scheme) {
        Object.assign(settings, scheme);
      }
    };

    const fColors = gui.addFolder('Color Schemes');
    fColors.add(settings, 'colorScheme', [
      'Cosmic Tempest',
      'Solar Flare',
      'Toxic Aurora',
      'Frozen Abyss',
      'Cyberpunk Void',
      'Custom'
    ]).name('Scheme').onChange(val => {
      if (val !== 'Custom') {
        applyScheme(val);
      }
    }).listen();

    const fCustomColors = fColors.addFolder('Custom HSL Parameters');
    fCustomColors.close();

    const onColorChange = () => {
      settings.colorScheme = 'Custom';
    };

    fCustomColors.add(settings, 'bgHue', 0, 360, 1).name('BG Hue').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'bgSat', 0, 100, 1).name('BG Saturation').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'bgLight', 0, 100, 1).name('BG Lightness').listen().onChange(onColorChange);

    fCustomColors.add(settings, 'nodeHueBase', 0, 360, 1).name('Node Hue Base').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'nodeHueRange', -360, 360, 1).name('Node Hue Range').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'nodeSat', 0, 100, 1).name('Node Saturation').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'nodeLight', 0, 100, 1).name('Node Lightness').listen().onChange(onColorChange);

    fCustomColors.add(settings, 'partHueBase', 0, 360, 1).name('Particle Hue Base').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'partHueRange', -360, 360, 1).name('Particle Hue Range').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'partSat', 0, 100, 1).name('Particle Saturation').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'partLight', 0, 100, 1).name('Particle Lightness').listen().onChange(onColorChange);

    fCustomColors.add(settings, 'strikeSat', 0, 100, 1).name('Strike Saturation').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'strike1HueBase', 0, 360, 1).name('Strike1 Hue Base').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'strike1HueRange', -360, 360, 1).name('Strike1 Hue Range').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'strike1LightBase', 0, 100, 1).name('Strike1 Light Base').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'strike1LightRange', -100, 100, 1).name('Strike1 Light Range').listen().onChange(onColorChange);

    fCustomColors.add(settings, 'strike2HueBase', 0, 360, 1).name('Strike2 Hue Base').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'strike2HueRange', -360, 360, 1).name('Strike2 Hue Range').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'strike2LightBase', 0, 100, 1).name('Strike2 Light Base').listen().onChange(onColorChange);
    fCustomColors.add(settings, 'strike2LightRange', -100, 100, 1).name('Strike2 Light Range').listen().onChange(onColorChange);

  </script>
</body>
</html>
