<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<title>Black Hole</title>
	<style>
		:root{
			--ink:#e8e4da;
			--dim:#8a8578;
			--line:rgba(232,228,218,.14);
			--amber:#ffb45e;
		}
		*{margin:0;padding:0;box-sizing:border-box}
		html,body{height:100%;overflow:hidden;background:#000}
		body{font-family:"Courier New",ui-monospace,monospace;color:var(--ink)}
		canvas{display:block;width:100vw;height:100vh;touch-action:none;cursor:grab}
		canvas:active{cursor:grabbing}

		#titulo{
			position:fixed;top:22px;left:26px;pointer-events:none;
			letter-spacing:.42em;font-size:13px;color:var(--ink);
			text-transform:uppercase;opacity:.9;z-index:5;
		}
		#titulo small{
			display:block;margin-top:6px;letter-spacing:.18em;
			font-size:9px;color:var(--dim);
		}

		#datos{
			position:fixed;right:26px;top:22px;text-align:right;
			font-size:9px;letter-spacing:.14em;color:var(--dim);
			text-transform:uppercase;line-height:1.9;pointer-events:none;z-index:5;
		}
		#datos b{color:var(--amber);font-weight:normal}

		#panel{
			position:fixed;left:26px;bottom:24px;width:238px;
			background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
			border:1px solid var(--line);padding:14px 16px 12px;
			font-size:10px;letter-spacing:.08em;z-index:5;
		}
		#panel .fila{margin-bottom:10px}
		input[type=text]{
			width:100%;background:rgba(0,0,0,.4);border:1px solid var(--line);
			color:var(--amber);font-family:inherit;font-size:11px;
			letter-spacing:.3em;text-transform:uppercase;padding:6px 8px;outline:none;
		}
		input[type=text]:focus{border-color:var(--amber)}
		input[type=text]::placeholder{color:var(--dim);letter-spacing:.2em}
		#panel label{
			display:flex;justify-content:space-between;
			color:var(--dim);text-transform:uppercase;margin-bottom:4px;
		}
		#panel label b{color:var(--ink);font-weight:normal}
		input[type=range]{
			-webkit-appearance:none;appearance:none;width:100%;height:2px;
			background:var(--line);outline:none;
		}
		input[type=range]::-webkit-slider-thumb{
			-webkit-appearance:none;appearance:none;width:10px;height:10px;
			background:var(--amber);border-radius:50%;cursor:pointer;
		}
		input[type=range]::-moz-range-thumb{
			width:10px;height:10px;background:var(--amber);
			border:none;border-radius:50%;cursor:pointer;
		}
		#panel .toggles{display:flex;gap:6px;margin-top:2px}
		#panel button{
			flex:1;background:none;border:1px solid var(--line);color:var(--dim);
			font-family:inherit;font-size:9px;letter-spacing:.1em;padding:5px 0;
			cursor:pointer;text-transform:uppercase;transition:all .2s;
		}
		#panel button.on{color:var(--amber);border-color:var(--amber)}
		#panel button:focus-visible{outline:1px solid var(--ink);outline-offset:2px}
		#panel .etiqueta{
			color:var(--dim);text-transform:uppercase;font-size:9px;
			letter-spacing:.14em;margin:8px 0 4px;
		}

		#ayuda{
			position:fixed;right:26px;bottom:24px;text-align:right;
			font-size:9px;letter-spacing:.14em;color:var(--dim);
			text-transform:uppercase;line-height:1.9;pointer-events:none;z-index:5;
		}

		#error{
			display:none;position:fixed;inset:0;z-index:20;
			background:rgba(0,0,0,.92);padding:40px 30px;
			font-size:11px;line-height:1.8;color:#ff9d7a;
			white-space:pre-wrap;overflow:auto;
		}
		#error h2{
			font-size:12px;letter-spacing:.3em;text-transform:uppercase;
			color:var(--ink);margin-bottom:16px;font-weight:normal;
		}

		@media (max-width:640px){
			#panel{width:calc(100vw - 52px)}
			#ayuda,#datos{display:none}
		}

		/* Global UI Toggle Visibility Styles */
		body.ui-hidden #panel,
		body.ui-hidden #titulo,
		body.ui-hidden #datos,
		body.ui-hidden #ayuda,
		body.ui-hidden .lil-gui {
			display: none !important;
		}
	</style>
</head>
<body>

<div id="titulo">Black hole<small>lente gravitacional · disco volumétrico · bloom HDR</small></div> 

<div id="datos">
	radio de Schwarzschild <b>r&#8347; = 1.0</b><br>
	esfera de fotones <b>r = 1.5 r&#8347;</b><br>
	borde interno del disco <b>r &#8776; 3 r&#8347;</b>
</div>

<div id="panel">
	<div class="fila">
		<label>Texto en el espacio</label>
		<input id="iTexto" type="text" value="BLACK HOLE" maxlength="26"
					 autocomplete="off" spellcheck="false" placeholder="vacío = sin texto">
	</div>
	<div class="fila">
		<label>Exposición <b id="vBrillo">1.0</b></label>
		<input id="sBrillo" type="range" min="0.2" max="2.5" step="0.05" value="1">
	</div>
	<div class="fila">
		<label>Resplandor <b id="vBloom">0.9</b></label>
		<input id="sBloom" type="range" min="0" max="2" step="0.05" value="0.9">
	</div>
	<div class="fila">
		<label>Velocidad orbital <b id="vVel">1.0</b></label>
		<input id="sVel" type="range" min="0" max="3" step="0.05" value="1">
	</div>
	<div class="fila">
		<label>Temperatura <b id="vTemp">0.45</b></label>
		<input id="sTemp" type="range" min="0" max="1" step="0.01" value="0.45">
	</div>
	<div class="fila toggles">
		<button id="bDoppler" class="on">Doppler</button>
		<button id="bFondo" class="on">Nebulosa</button>
		<button id="bAuto" class="on">Órbita</button>
	</div>
	<div class="etiqueta">Calidad</div>
	<div class="fila toggles">
		<button id="qBaja">Baja</button>
		<button id="qMedia" class="on">Media</button>
		<button id="qAlta">Alta</button>
	</div>
</div>

<div id="ayuda">
	arrastra · orbitar<br>
	rueda / pellizco · acercar<br>
	doble clic · reiniciar
</div>

<div id="error"><h2>Diagnóstico</h2><div id="errorTexto"></div></div>

<script>
	function mostrarError(msg){
		var caja = document.getElementById('error');
		var txt  = document.getElementById('errorTexto');
		caja.style.display = 'block';
		txt.textContent += msg + '\n\n';
	}
	window.onerror = function(msg, src, linea){
		mostrarError('Error JS: ' + msg + ' (línea ' + linea + ')');
	};
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
				onerror="mostrarError('No se pudo cargar Three.js desde el CDN. Revisa tu conexión o si algo bloquea cdnjs.cloudflare.com.')"></script>

<script>
(function(){
	'use strict';

	if(typeof THREE === 'undefined'){ mostrarError('Three.js no está disponible (el CDN no cargó).'); return; }

	var prueba = document.createElement('canvas');
	if(!(prueba.getContext('webgl') || prueba.getContext('experimental-webgl'))){
		mostrarError('Tu navegador o dispositivo no soporta WebGL.'); return;
	}

	/*
	   Renderizador y pipeline de post-procesado
	   1) simulación (geodésicas + disco volumétrico)  -> RT escena
	   2) brightpass (extrae lo que brilla)            -> RT bloom A
	   3) blur gaussiano H y V, dos iteraciones        -> RT bloom A/B
	   4) composición: escena + bloom, ACES, viñeta,
	   aberración cromática, grano                  -> pantalla
	   El HDR se codifica como e = c/(1+c) para viajar en texturas de
	   8 bits y se decodifica en cada pase: c = e/(1-e).
	*/
	var renderer;
	try{
		renderer = new THREE.WebGLRenderer({antialias:false, powerPreference:'high-performance'});
	}catch(e){ mostrarError('No se pudo crear el renderizador WebGL: ' + e.message); return; }
	document.body.appendChild(renderer.domElement);

	var baseDPR = Math.min(window.devicePixelRatio || 1, 2);

	var calidades = {
		baja:  {dpr: 0.55, pasos: 150, iterBloom: 1},
		media: {dpr: 0.80, pasos: 230, iterBloom: 2},
		alta:  {dpr: 1.00, pasos: 320, iterBloom: 2}
	};
	var calidadActual = (window.innerWidth < 700) ? 'baja' : 'alta';

	var escena = new THREE.Scene();
	var camara = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
	var malla  = new THREE.Mesh(new THREE.PlaneBufferGeometry(2, 2));
	malla.frustumCulled = false;
	escena.add(malla);

	var VERT = 'void main(){ gl_Position = vec4(position, 1.0); }';

	/* utilidades GLSL compartidas */
	var GLSL_COMUN = `
  vec3 decodificar(vec3 e){
    e = min(e, vec3(0.996));
    return e / (1.0 - e);
  }
  vec3 codificar(vec3 c){
    return c / (1.0 + c);
  }
`;

	/* PASE 1 — simulación del agujero negro */
	var uSim = {
		uTime:    {value: 0},
		uRes:     {value: new THREE.Vector2(1, 1)},
		uCamDist: {value: 27.0},
		uYaw:     {value: 0.0},
		uPitch:   {value: 0.12},
		uVel:     {value: 1.45},
		uTemp:    {value: 0.76},
		uDoppler: {value: 1.0},
		uFondo:   {value: 1.0},
		uPasos:   {value: 230.0},
		tTexto:   {value: null},
		uTextoOn: {value: 1.0},
		uGreenscreen: {value: 0.0},
		uColorCore:   {value: new THREE.Color('#ccf0ff')},
		uColorMid:    {value: new THREE.Color('#ff9c33')},
		uColorEdge:   {value: new THREE.Color('#802408')},
		uPan:         {value: new THREE.Vector2(0, 0)}
	};

	var FRAG_SIM = GLSL_COMUN + `
uniform float uTime, uCamDist, uYaw, uPitch;
uniform float uVel, uTemp, uDoppler, uFondo, uPasos;
uniform float uTextoOn;
uniform sampler2D tTexto;
uniform vec2  uRes;
uniform float uGreenscreen;
uniform vec3  uColorCore, uColorMid, uColorEdge;
uniform vec2  uPan;

float hash21(vec2 p){
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
float hash31(vec3 p){
  p = fract(p * 0.1031);
  p += dot(p, p.zyx + 31.32);
  return fract((p.x + p.y) * p.z);
}
float noise2(vec2 p){
  vec2 i = floor(p); vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash21(i);
  float b = hash21(i + vec2(1.0, 0.0));
  float c = hash21(i + vec2(0.0, 1.0));
  float d = hash21(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}
float fbm(vec2 p){
  float v = 0.0; float a = 0.55;
  for(int i = 0; i < 4; i++){
    v += a * noise2(p);
    p = p * 2.13 + vec2(13.7, 7.1);
    a *= 0.5;
  }
  return v;
}

/* cielo: estrellas + nebulosa, todo lenteado por la gravedad */
vec3 cielo(vec3 rd){
  vec3 col = vec3(0.0);

  /* estrellas en cuatro capas, densas y brillantes: trazadoras del lente */
  for(int capa = 0; capa < 4; capa++){
    float fc = float(capa);
    float esc = 140.0 + fc * 200.0;
    vec3 q = rd * esc;
    vec3 id = floor(q);
    float h = hash31(id);
    if(h > 0.990 - fc * 0.0025){
      vec3 c = fract(q) - 0.5;
      float d = length(c);
      float b = 1.0 - smoothstep(0.0, 0.5, d);
      b = pow(b, 12.0) * (0.5 + 1.6 * fract(h * 91.7));
      vec3 tinte = mix(vec3(0.65, 0.78, 1.0), vec3(1.0, 0.83, 0.62), fract(h * 53.1));
      /* gigantes ocasionales mucho más brillantes: anclas visuales del lente */
      if(fract(h * 17.3) > 0.90) b *= 6.0;
      col += b * tinte * 2.0;
    }
  }

  /* nebulosa: dos masas de gas frío y polvo cálido */
  float n1 = fbm(rd.xy * 2.0 + rd.z * 1.3);
  float n2 = fbm(rd.zy * 3.1 - rd.x * 1.7 + 5.0);
  vec3 gas = vec3(0.020, 0.045, 0.110) * pow(n1, 2.6) * 0.50
           + vec3(0.090, 0.040, 0.022) * pow(n2, 3.2) * 0.40;

  /* banda galáctica densa */
  float banda = exp(-pow((rd.y + 0.16) * 2.6, 2.0));
  float polvo = fbm(rd.xz * 5.0 + 2.3) * 0.7 + fbm(rd.xz * 11.0) * 0.5;
  gas += (vec3(0.05, 0.06, 0.10) + vec3(0.06, 0.04, 0.02) * polvo) * banda * polvo * 0.30;

  /* huecos de polvo oscuro que recortan la banda */
  float oscuro = smoothstep(0.45, 0.75, fbm(rd.xz * 7.0 + 9.1));
  gas *= mix(1.0, 0.25, oscuro * banda);

  col += gas * uFondo;
  return col;
}

/* color térmico del gas según radio */
vec3 colorGas(float r, float rIn, float rOut){
  float t = clamp((r - rIn) / (rOut - rIn), 0.0, 1.0);
  vec3 nucleo = mix(vec3(1.00, 0.98, 0.94), uColorCore, uTemp);
  vec3 medio  = uColorMid;
  vec3 borde  = uColorEdge;
  vec3 c = mix(nucleo, medio, smoothstep(0.0, 0.40, t));
  return mix(c, borde, smoothstep(0.40, 1.0, t));
}

/*
   disco de acreción volumétrico
   devuelve: rgb = emisión, a = densidad (para absorción)
*/
vec4 disco(vec3 p, vec3 rd, float rIn, float rOut){
  float r = length(p.xz);
  if(r < rIn - 0.4 || r > rOut) return vec4(0.0);

  /* grosor del disco: lámina fina, apenas inflada hacia afuera */
  float H = 0.085 + 0.34 * pow(clamp((r - 2.0) / 11.0, 0.0, 1.0), 1.7);
  float y = p.y / H;
  if(abs(y) > 3.5) return vec4(0.0);
  /* núcleo denso + bruma de polvo difusa alrededor de la lámina */
  float vertical = exp(-y * y * 2.1);
  float bruma = exp(-y * y * 0.45) * 0.16;

  /* rotación kepleriana diferencial: las capas internas adelantan */
  float ang = atan(p.z, p.x);
  float omega = uVel * 0.9 / pow(r, 1.5);
  float a1 = ang + uTime * omega * 9.0;

  /* turbulencia filamentosa con mezcla suave: polvo, no vidrio */
  float brazos = fbm(vec2(r * 2.2, a1 * 2.4));
  float hebras = fbm(vec2(r * 14.0 - uTime * 0.05, a1 * 1.3) + 7.3);
  float hilos  = noise2(vec2(r * 46.0, a1 * 4.0));
  /*
     espirales arrastradas y grumos brillantes que orbitan: hacen visible
     la rotación (los anillos puros girando parecen quietos)
  */
  float espiral = fbm(vec2(r * 5.0, a1 * 3.5 + r * 2.2));
  float grumos  = pow(noise2(vec2(r * 3.5, a1 * 6.0)), 3.0);
  float dens = brazos * 0.42 + hebras * 0.38 + hilos * 0.14
             + espiral * 0.30 + grumos * 0.55;
  dens = smoothstep(0.12, 1.05, dens);
  dens = dens * dens * (1.2 + 0.5 * hebras);
  dens = dens * vertical + bruma * (0.4 + 0.6 * brazos);
  dens *= smoothstep(rIn - 0.4, rIn + 0.45, r);
  dens *= 1.0 - smoothstep(rOut - 2.6, rOut, r);

  if(dens < 0.003) return vec4(0.0);

  /* emisión: muy caliente cerca del borde interno */
  float perfil = pow(3.0 / r, 1.9);

  /* Doppler relativista */
  float beta = clamp(sqrt(0.5 / max(r - 1.0, 0.4)), 0.0, 0.85) * min(uVel, 1.6);
  vec3 velDir = normalize(vec3(-p.z, 0.0, p.x));
  float coseno = dot(rd, velDir);
  float dop = 1.0 / max(1.0 - beta * coseno, 0.15);
  float beaming = mix(1.0, pow(dop, 3.0), uDoppler);
  float shift = uDoppler * clamp(beta * coseno, -1.0, 1.0);

  /* corrimiento al rojo gravitacional */
  float zGrav = sqrt(max(1.0 - 1.0 / r, 0.05));
  beaming *= mix(1.0, zGrav * zGrav, uDoppler * 0.7);

  vec3 col = colorGas(r, rIn, rOut);
  /* núcleo al blanco: el interior satura a luz casi pura, como en la película */
  col = mix(col, vec3(1.0, 0.99, 0.95), clamp(perfil * 0.45, 0.0, 0.9));
  col = mix(col, vec3(0.72, 0.84, 1.00), max(shift, 0.0) * 0.55);
  col = mix(col, vec3(0.85, 0.25, 0.07), max(-shift, 0.0) * 0.6);

  return vec4(col * perfil * beaming * dens, dens);
}

void main(){
  vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / uRes.y;

  /* cámara orbital */
  float cy = cos(uYaw); float sy = sin(uYaw);
  float cp = cos(uPitch); float sp = sin(uPitch);
  vec3 ro = uCamDist * vec3(cy * cp, sp, sy * cp);
  vec3 fw = normalize(-ro);
  vec3 rt = normalize(cross(fw, vec3(0.0, 1.0, 0.0)));
  vec3 up = cross(rt, fw);
  vec3 rd = normalize(fw * 1.5 + uv.x * rt + uv.y * up);

  /* geodésica nula: a = -1.5 h² p / r⁵ */
  vec3 target = rt * uPan.x + up * uPan.y;
  vec3 p = ro - target;
  vec3 v = rd;
  vec3 hVec = cross(p, v);
  float h2 = dot(hVec, hVec);

  float rIn = 3.0; float rOut = 13.0;

  vec3 col = vec3(0.0);
  float transmit = 1.0;
  float capturado = 0.0;
  float minR = 100000.0;

  /*
     el cartel queda siempre detrás del agujero y el texto desfila en
     marquesina continua: cruza la lente, sale y vuelve a entrar en bucle
  */
  vec3 aDir = vec3(cy, 0.0, sy);
  vec3 tDir = vec3(-sy, 0.0, cy);
  float sPrev = dot(p, aDir) + 20.0;

  for(int i = 0; i < 480; i++){
    if(float(i) >= uPasos) break;

    float r2 = dot(p, p);
    float r  = sqrt(r2);
    minR = min(minR, r);

    /* paso adaptativo: fino cerca del horizonte y dentro del disco */
    float dt = clamp(r * 0.065, 0.018, 0.42);
    float grosor = 0.085 + 0.34 * pow(clamp((r - 2.0) / 11.0, 0.0, 1.0), 1.7);
    if(abs(p.y) < grosor * 3.5 && r > rIn - 1.0 && r < rOut + 0.5) dt *= 0.45;

    vec3 a = -1.5 * h2 * p / (r2 * r2 * r);
    v += a * dt;
    p += v * dt;

    if(dot(p, p) < 1.0){ capturado = 1.0; break; }

    /* integración volumétrica del disco */
    if(transmit > 0.012){
      vec4 d = disco(p, normalize(v), rIn, rOut);
      if(d.a > 0.0){
        col += d.rgb * transmit * dt * 4.6;
        transmit *= exp(-d.a * dt * 2.8);
      }
    }

    /* cartel de texto: siempre detrás del agujero, curvado por la lente */
    if(uTextoOn > 0.5 && transmit > 0.012){
      float sNow = dot(p, aDir) + 20.0;
      if(sPrev * sNow < 0.0){
        float f = sPrev / (sPrev - sNow);
        vec3 q = mix(p - v * dt, p, f);
        vec2 uvT = vec2(fract(0.5 - dot(q, tDir) / 38.0 - uTime * 0.045),
                        0.5 + q.y / 19.0);
        if(uvT.y > 0.001 && uvT.y < 0.999){
          vec4 tx = texture2D(tTexto, uvT);
          col += tx.rgb * tx.a * transmit * 1.7;
          transmit *= (1.0 - tx.a * 0.92);
        }
      }
      sPrev = sNow;
    }

    if(dot(p, p) > 1400.0) break;
  }

  /* cielo de fondo, ya curvado por la trayectoria final del rayo */
  if(capturado < 0.5 && transmit > 0.012){
    if (uGreenscreen > 0.5) {
      // Do not add background sky in simulation when greenscreen is active
    } else {
      col += cielo(normalize(v)) * transmit;
    }
  }

  /* anillo de fotones: resplandor donde la luz orbitó en r = 1.5 */
  float halo = exp(-abs(minR - 1.5) * 3.0);
  col += vec3(1.0, 0.80, 0.52) * halo * 0.45 * mix(1.0, 0.35, capturado);

  /* bruma térmica general muy sutil */
  col += vec3(1.0, 0.62, 0.32) * exp(-minR * 0.34) * 0.10;

  float skyMask = (capturado > 0.5) ? 0.0 : transmit;
  gl_FragColor = vec4(codificar(col), skyMask);
}
`;

	/* PASE 2 — brightpass */
	var uBright = {
		tSrc:   {value: null},
		uUmbral:{value: 0.85}
	};
	var FRAG_BRIGHT = GLSL_COMUN + `
uniform sampler2D tSrc;
uniform float uUmbral;
varying vec2 vUv;
void main(){
  vec3 c = decodificar(texture2D(tSrc, vUv).rgb);
  c = max(c - uUmbral, vec3(0.0));
  gl_FragColor = vec4(codificar(c), 1.0);
}
`;

	/* PASE 3 — blur gaussiano separable (9 taps) */
	var uBlur = {
		tSrc: {value: null},
		uDir: {value: new THREE.Vector2(1, 0)},
		uRes: {value: new THREE.Vector2(1, 1)}
	};
	var FRAG_BLUR = GLSL_COMUN + `
uniform sampler2D tSrc;
uniform vec2 uDir, uRes;
varying vec2 vUv;
void main(){
  vec2 px = uDir / uRes;
  vec3 suma = decodificar(texture2D(tSrc, vUv).rgb) * 0.227;
  float pesos[4];
  pesos[0] = 0.194; pesos[1] = 0.121; pesos[2] = 0.054; pesos[3] = 0.016;
  for(int i = 1; i <= 4; i++){
    float o = float(i) * 1.6;
    suma += decodificar(texture2D(tSrc, vUv + px * o).rgb) * pesos[i-1];
    suma += decodificar(texture2D(tSrc, vUv - px * o).rgb) * pesos[i-1];
  }
  gl_FragColor = vec4(codificar(suma), 1.0);
}
`;

	/* PASE 4 — composición final: bloom + ACES + lente */
	var uComp = {
		tEscena: {value: null},
		tBloom:  {value: null},
		uFuerza: {value: 0.75},
		uExpo:   {value: 0.95},
		uTime:   {value: 0},
		uAspecto:{value: 1.0},
		uGreenscreen: {value: 0.0}
	};
	var FRAG_COMP = GLSL_COMUN + `
uniform sampler2D tEscena, tBloom;
uniform float uFuerza, uExpo, uTime, uAspecto;
uniform float uGreenscreen;
varying vec2 vUv;

float hash(vec2 p){
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
vec3 aces(vec3 x){
  return clamp((x * (2.51 * x + 0.03)) / (x * (2.43 * x + 0.59) + 0.14), 0.0, 1.0);
}
void main(){
  vec2 centro = vUv - 0.5;
  centro.x *= uAspecto;
  float radial = length(centro);

  /* aberración cromática sutil hacia los bordes */
  vec2 dir = (vUv - 0.5) * radial * 0.012;
  
  vec4 escenaTex = texture2D(tEscena, vUv);
  float mask = escenaTex.a;

  float r = decodificar(texture2D(tEscena, vUv + dir).rgb).r;
  float g = decodificar(escenaTex.rgb).g;
  float b = decodificar(texture2D(tEscena, vUv - dir).rgb).b;
  vec3 col = vec3(r, g, b);

  col += decodificar(texture2D(tBloom, vUv).rgb) * uFuerza;

  /* fantasma de lente: eco azulado e invertido de las luces fuertes */
  col += decodificar(texture2D(tBloom, vec2(1.0) - vUv).rgb)
         * vec3(0.55, 0.70, 1.00) * 0.06;

  col *= uExpo;

  /* gradación cálida tipo película fotoquímica */
  col *= vec3(1.06, 0.99, 0.88);
  float lum = dot(col, vec3(0.299, 0.587, 0.114));
  col = mix(vec3(lum), col, 0.92);

  col = aces(col);
  col = pow(col, vec3(1.0 / 1.10));  /* leve realce de medios */

  /* viñeta de lente */
  col *= 1.0 - smoothstep(0.45, 1.05, radial) * 0.55;

  /* grano de película */
  col += (hash(gl_FragCoord.xy + fract(uTime) * 100.0) - 0.5) * 0.022;

  // Greenscreen background replacement bypassing post-processing
  if (uGreenscreen > 0.5) {
    col = mix(col, vec3(0.0, 1.0, 0.0), mask);
  }

  gl_FragColor = vec4(col, 1.0);
}
`;

	var VERT_UV = `
varying vec2 vUv;
void main(){
  vUv = uv;
  gl_Position = vec4(position, 1.0);
}
`;

	var matSim    = new THREE.ShaderMaterial({uniforms: uSim,    vertexShader: VERT,    fragmentShader: FRAG_SIM});
	var matBright = new THREE.ShaderMaterial({uniforms: uBright, vertexShader: VERT_UV, fragmentShader: FRAG_BRIGHT});
	var matBlur   = new THREE.ShaderMaterial({uniforms: uBlur,   vertexShader: VERT_UV, fragmentShader: FRAG_BLUR});
	var matComp   = new THREE.ShaderMaterial({uniforms: uComp,   vertexShader: VERT_UV, fragmentShader: FRAG_COMP});

	/*
	   Textura de texto: tipografía dibujada en un canvas 2D y colgada
	   como cartel en el espacio, donde la gravedad la deforma.
	*/
	var lienzoTexto = document.createElement('canvas');
	lienzoTexto.width = 2048; lienzoTexto.height = 1024;
	var ctxT = lienzoTexto.getContext('2d');
	var texturaTexto = new THREE.CanvasTexture(lienzoTexto);
	texturaTexto.minFilter = THREE.LinearFilter;
	texturaTexto.magFilter = THREE.LinearFilter;
	texturaTexto.generateMipmaps = false;
	texturaTexto.wrapS = THREE.ClampToEdgeWrapping;
	texturaTexto.wrapT = THREE.ClampToEdgeWrapping;
	uSim.tTexto.value = texturaTexto;

	function dibujarTexto(str){
		var W = lienzoTexto.width, H = lienzoTexto.height;
		ctxT.clearRect(0, 0, W, H);
		str = (str || '').trim().toUpperCase();
		uSim.uTextoOn.value = str ? 1 : 0;
		if(!str){ texturaTexto.needsUpdate = true; return; }

		/* título de cine: condensada, pesada, con tracking enorme */
		var tracking = 0.42;  /* em entre letras */
		var tam = 250;
		var fuente = function(t){ return '700 ' + t + 'px "Arial Narrow", "Helvetica Neue", Arial, sans-serif'; };
		ctxT.font = fuente(tam);

		function anchoTotal(s){
			var w = 0;
			for(var i = 0; i < s.length; i++){
				w += ctxT.measureText(s[i]).width;
				if(i < s.length - 1) w += tracking * tam;
			}
			return w;
		}

		/* autoajuste para que siempre quepa */
		var margen = 130;
		var w = anchoTotal(str);
		if(w > W - margen * 2){
			tam = Math.max(64, tam * (W - margen * 2) / w);
			ctxT.font = fuente(tam);
			w = anchoTotal(str);
		}

		var x = (W - w) / 2;
		var y = H * 0.50;
		ctxT.textBaseline = 'middle';

		/* halo cálido: alimenta el bloom al pasar por el pipeline HDR */
		ctxT.shadowColor = 'rgba(255,180,94,0.85)';
		ctxT.shadowBlur = 48;
		ctxT.fillStyle = '#fff3df';
		for(var i = 0; i < str.length; i++){
			ctxT.fillText(str[i], x, y);
			x += ctxT.measureText(str[i]).width + tracking * tam;
		}
		ctxT.shadowBlur = 0;

		/* filetes editoriales arriba y abajo del título */
		var lw = Math.min(w * 1.04, W - margen * 2);
		var lx = (W - lw) / 2;
		ctxT.fillStyle = 'rgba(255,243,223,0.7)';
		ctxT.fillRect(lx, y - tam * 0.74, lw, 4);
		ctxT.fillRect(lx, y + tam * 0.66, lw, 4);

		/* leyenda inferior en la voz del HUD */
		ctxT.font = '400 42px "Courier New", monospace';
		var sub = 'C U R V A T U R A   D E L   E S P A C I O - T I E M P O';
		var sw = ctxT.measureText(sub).width;
		if(sw < lw){
			ctxT.fillStyle = 'rgba(255,200,140,0.9)';
			ctxT.fillText(sub, (W - sw) / 2, y + tam * 0.66 + 66);
		}

		/* rombo separador: marca la costura del bucle infinito */
		ctxT.save();
		ctxT.translate(48, H * 0.50);
		ctxT.rotate(Math.PI / 4);
		ctxT.shadowColor = 'rgba(255,180,94,0.8)';
		ctxT.shadowBlur = 28;
		ctxT.fillStyle = 'rgba(255,200,140,0.95)';
		ctxT.fillRect(-15, -15, 30, 30);
		ctxT.restore();

		texturaTexto.needsUpdate = true;
	}
	dibujarTexto('BLACK HOLE');

	/* render targets */
	var rtEscena = null, rtA = null, rtB = null;
	function crearRT(w, h){
		return new THREE.WebGLRenderTarget(Math.max(2, w|0), Math.max(2, h|0), {
			minFilter: THREE.LinearFilter,
			magFilter: THREE.LinearFilter,
			format: THREE.RGBAFormat,
			depthBuffer: false,
			stencilBuffer: false
		});
	}
	function reconstruirRTs(){
		if(rtEscena){ rtEscena.dispose(); rtA.dispose(); rtB.dispose(); }
		var pr = renderer.getPixelRatio();
		var W = window.innerWidth * pr, H = window.innerHeight * pr;
		rtEscena = crearRT(W, H);
		rtA = crearRT(W * 0.5, H * 0.5);
		rtB = crearRT(W * 0.5, H * 0.5);
	}

	function aplicarCalidad(nombre){
		calidadActual = nombre;
		var q = calidades[nombre];
		renderer.setPixelRatio(baseDPR * q.dpr);
		renderer.setSize(window.innerWidth, window.innerHeight);
		uSim.uPasos.value = q.pasos;
		uSim.uRes.value.set(window.innerWidth * renderer.getPixelRatio(),
												window.innerHeight * renderer.getPixelRatio());
		uComp.uAspecto.value = window.innerWidth / window.innerHeight;
		reconstruirRTs();
		['qBaja','qMedia','qAlta'].forEach(function(id){
			document.getElementById(id).classList.toggle('on',
																									 id.toLowerCase() === 'q' + nombre);
		});
		if (window.updateGUIdpr) {
			window.updateGUIdpr(baseDPR * q.dpr);
		}
	}
	aplicarCalidad(calidadActual);

	/* compilar y reportar errores de shader de inmediato */
	try{
		malla.material = matSim; renderer.compile(escena, camara);
		malla.material = matComp; renderer.compile(escena, camara);
		var progs = renderer.info.programs;
		for(var i = 0; i < progs.length; i++){
			if(progs[i].diagnostics && !progs[i].diagnostics.runnable){
				var d = progs[i].diagnostics;
				mostrarError('El shader no compiló en tu GPU.\n\nFragment: ' +
										 (d.fragmentShader ? d.fragmentShader.log : '-'));
			}
		}
	}catch(e){ mostrarError('Fallo al compilar shaders: ' + e.message); }

	/* Interacción */
	var yaw = 0, pitch = 0.12, dist = 27;
	var baseDist = 27;
	var autoOrbita = true;
	var arrastrando = false, px = 0, py = 0, pinchD = 0;
	var panOffset = new THREE.Vector2(0, 0);
	var lienzo = renderer.domElement;

	lienzo.addEventListener('contextmenu', function(e){ e.preventDefault(); });

	lienzo.addEventListener('pointerdown', function(e){
		arrastrando = true; px = e.clientX; py = e.clientY;
		try{ lienzo.setPointerCapture(e.pointerId); }catch(_){}
	});
	lienzo.addEventListener('pointermove', function(e){
		if(!arrastrando) return;
		var isPanning = (e.buttons === 2 || e.buttons === 4 || (e.buttons === 1 && e.shiftKey));
		if (isPanning) {
			var factor = 0.0015 * dist;
			panOffset.x += (e.clientX - px) * factor;
			panOffset.y -= (e.clientY - py) * factor;
		} else {
			yaw   += (e.clientX - px) * 0.005;
			pitch += (e.clientY - py) * 0.004;
			pitch = Math.max(-1.35, Math.min(1.35, pitch));
		}
		px = e.clientX; py = e.clientY;
	});
	lienzo.addEventListener('pointerup',     function(){ arrastrando = false; });
	lienzo.addEventListener('pointercancel', function(){ arrastrando = false; });

	lienzo.addEventListener('wheel', function(e){
		e.preventDefault();
		dist *= 1 + Math.sign(e.deltaY) * 0.08;
		dist = Math.max(6.0, Math.min(34, dist));
		baseDist = dist;
	}, {passive:false});

	lienzo.addEventListener('touchstart', function(e){
		if(e.touches.length === 2){
			var dx = e.touches[0].clientX - e.touches[1].clientX;
			var dy = e.touches[0].clientY - e.touches[1].clientY;
			pinchD = Math.sqrt(dx*dx + dy*dy);
		}
	}, {passive:true});
	lienzo.addEventListener('touchmove', function(e){
		if(e.touches.length === 2 && pinchD > 0){
			var dx = e.touches[0].clientX - e.touches[1].clientX;
			var dy = e.touches[0].clientY - e.touches[1].clientY;
			var d = Math.sqrt(dx*dx + dy*dy);
			dist *= pinchD / d;
			dist = Math.max(6.0, Math.min(34, dist));
			baseDist = dist;
			pinchD = d;
			arrastrando = false;
		}
	}, {passive:true});

	lienzo.addEventListener('dblclick', function(){ 
		yaw = 0; 
		pitch = 0.12; 
		dist = 27; 
		baseDist = 27;
		panOffset.set(0, 0); 
	});

	/* Panel */
	function liga(idSlider, idValor, obj, clave){
		var s = document.getElementById(idSlider);
		var v = document.getElementById(idValor);
		s.addEventListener('input', function(){
			obj[clave].value = parseFloat(s.value);
			v.textContent = parseFloat(s.value).toFixed(2);
		});
	}
	liga('sBrillo', 'vBrillo', uComp, 'uExpo');
	liga('sBloom',  'vBloom',  uComp, 'uFuerza');
	liga('sVel',    'vVel',    uSim,  'uVel');
	liga('sTemp',   'vTemp',   uSim,  'uTemp');

	var campoTexto = document.getElementById('iTexto');
	campoTexto.addEventListener('input', function(){ dibujarTexto(campoTexto.value); });

	function togglear(idBoton, obj, clave, alCambiar){
		var b = document.getElementById(idBoton);
		b.addEventListener('click', function(){
			var on = !b.classList.contains('on');
			b.classList.toggle('on', on);
			if(obj) obj[clave].value = on ? 1 : 0;
			if(alCambiar) alCambiar(on);
		});
	}
	togglear('bDoppler', uSim, 'uDoppler');
	togglear('bFondo',   uSim, 'uFondo');
	togglear('bAuto', null, null, function(on){ autoOrbita = on; });

	document.getElementById('qBaja').addEventListener('click',  function(){ aplicarCalidad('baja');  });
	document.getElementById('qMedia').addEventListener('click', function(){ aplicarCalidad('media'); });
	document.getElementById('qAlta').addEventListener('click',  function(){ aplicarCalidad('alta');  });

	if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches){
		autoOrbita = false;
		document.getElementById('bAuto').classList.remove('on');
	}

	window.addEventListener('resize', function(){ aplicarCalidad(calidadActual); });

	/* H Key Toggle All UI */
	window.addEventListener('keydown', function(e) {
		if (e.key === 'h' || e.key === 'H') {
			if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
			document.body.classList.toggle('ui-hidden');
		}
	});

	/* Advanced settings & lil-gui configuration */
	var speed = 1.0;
	var activeAnimation = 'Orbit';
	var timeAccum = 0;

	var settings = {
		greenscreen: false,
		colorScheme: 'Gargantua',
		colorCore: '#ccf0ff',
		colorMid: '#ff9c33',
		colorEdge: '#802408',
		dpr: renderer.getPixelRatio(),
		animSpeed: 1.0,
		animation: 'Orbit'
	};

	import('https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js').then(function(module) {
		var gui = new module.GUI({ title: 'Configuración' });
		
		gui.domElement.style.position = 'fixed';
		gui.domElement.style.top = '120px';
		gui.domElement.style.right = '26px';
		gui.domElement.style.zIndex = '10';

		gui.add(settings, 'greenscreen').name('Chroma Green').onChange(function(val){
			uSim.uGreenscreen.value = val ? 1.0 : 0.0;
			uComp.uGreenscreen.value = val ? 1.0 : 0.0;
		});

		var folderColors = gui.addFolder('Colores');
		var schemesList = ['Gargantua', 'Supernova', 'Singularity', 'Quasar', 'Dark Matter'];
		var schemeCtrl = folderColors.add(settings, 'colorScheme', schemesList).name('Paleta');

		var coreCtrl = folderColors.addColor(settings, 'colorCore').name('Núcleo').onChange(function(val){
			uSim.uColorCore.value.set(val);
		});
		var midCtrl = folderColors.addColor(settings, 'colorMid').name('Disco').onChange(function(val){
			uSim.uColorMid.value.set(val);
		});
		var edgeCtrl = folderColors.addColor(settings, 'colorEdge').name('Borde').onChange(function(val){
			uSim.uColorEdge.value.set(val);
		});

		var schemes = {
			'Gargantua': { core: '#ccf0ff', mid: '#ff9c33', edge: '#802408' },
			'Supernova': { core: '#ffffff', mid: '#ff007f', edge: '#4b0082' },
			'Singularity': { core: '#e0ffff', mid: '#00f5ff', edge: '#004040' },
			'Quasar': { core: '#ffffe0', mid: '#ffd700', edge: '#ff4500' },
			'Dark Matter': { core: '#f0fff0', mid: '#00ff7f', edge: '#053305' }
		};

		schemeCtrl.onChange(function(val){
			var s = schemes[val];
			settings.colorCore = s.core;
			settings.colorMid = s.mid;
			settings.colorEdge = s.edge;
			coreCtrl.updateDisplay();
			midCtrl.updateDisplay();
			edgeCtrl.updateDisplay();
			uSim.uColorCore.value.set(s.core);
			uSim.uColorMid.value.set(s.mid);
			uSim.uColorEdge.value.set(s.edge);
		});

		var folderAnim = gui.addFolder('Animación');
		folderAnim.add(settings, 'animSpeed', 0.0, 3.0, 0.05).name('Velocidad').onChange(function(val){
			speed = val;
		});

		var animsList = ['Orbit', 'Slow Flyby', 'Polar Transit', 'Deep Orbit', 'Static'];
		folderAnim.add(settings, 'animation', animsList).name('Modo').onChange(function(val){
			activeAnimation = val;
		});

		gui.add(settings, 'dpr', 0.2, 2.0, 0.05).name('Pixel Ratio (DPR)').onChange(function(val){
			renderer.setPixelRatio(val);
			renderer.setSize(window.innerWidth, window.innerHeight);
			uSim.uRes.value.set(window.innerWidth * renderer.getPixelRatio(),
								window.innerHeight * renderer.getPixelRatio());
			uComp.uAspecto.value = window.innerWidth / window.innerHeight;
			reconstruirRTs();
		});

		window.updateGUIdpr = function(val){
			settings.dpr = val;
			gui.controllers.forEach(function(c){
				if (c.property === 'dpr') c.updateDisplay();
			});
		};
	});

	/* degradación automática si no alcanza ~28 fps */
	var muestrasFPS = 0, acumFPS = 0, degradado = false;

	/* Bucle de render: 6 pases por cuadro */
	var tPrev = performance.now();
	function animar(t){
		requestAnimationFrame(animar);
		var dt = Math.min((t - tPrev) / 1000, 0.05);
		tPrev = t;

		timeAccum += dt * speed;

		if (!arrastrando) {
			if (activeAnimation === 'Orbit') {
				yaw += dt * 0.04 * speed;
				pitch = 0.12 + Math.sin(timeAccum * 0.1) * 0.05;
			} else if (activeAnimation === 'Slow Flyby') {
				yaw += dt * 0.02 * speed;
				dist = Math.max(6.0, Math.min(34.0, baseDist + Math.sin(timeAccum * 0.2) * 7.5));
			} else if (activeAnimation === 'Polar Transit') {
				yaw += dt * 0.03 * speed;
				pitch = Math.sin(timeAccum * 0.15) * 1.1;
			} else if (activeAnimation === 'Deep Orbit') {
				yaw += dt * 0.05 * speed;
				dist = Math.max(6.0, Math.min(34.0, 12.0 + Math.sin(timeAccum * 0.1) * 1.5));
				pitch = 0.3 + Math.sin(timeAccum * 0.08) * 0.2;
			} else if (activeAnimation === 'Static') {
				// Static camera
			}
		}

		if(!degradado && muestrasFPS < 90){
			muestrasFPS++; acumFPS += dt;
			if(muestrasFPS === 90 && acumFPS / 90 > 1/28){
				degradado = true;
				if(calidadActual === 'alta') aplicarCalidad('media');
				else if(calidadActual === 'media') aplicarCalidad('baja');
			}
		}

		uSim.uTime.value    = timeAccum;
		uSim.uYaw.value     = yaw;
		uSim.uPitch.value   = pitch;
		uSim.uCamDist.value = dist;
		uSim.uPan.value     = panOffset;
		uComp.uTime.value   = timeAccum;

		/* 1) simulación */
		malla.material = matSim;
		renderer.setRenderTarget(rtEscena);
		renderer.render(escena, camara);

		/* 2) brightpass a media resolución */
		malla.material = matBright;
		uBright.tSrc.value = rtEscena.texture;
		renderer.setRenderTarget(rtA);
		renderer.render(escena, camara);

		/* 3) blur en ping-pong (la 2ª iteración ensancha el halo) */
		var iter = calidades[calidadActual].iterBloom;
		malla.material = matBlur;
		for(var k = 0; k < iter; k++){
			uBlur.uRes.value.set(rtA.width, rtA.height);
			uBlur.uDir.value.set(1 + k, 0);
			uBlur.tSrc.value = rtA.texture;
			renderer.setRenderTarget(rtB);
			renderer.render(escena, camara);

			uBlur.uDir.value.set(0, 1 + k);
			uBlur.tSrc.value = rtB.texture;
			renderer.setRenderTarget(rtA);
			renderer.render(escena, camara);
		}

		/* 4) composición a pantalla */
		malla.material = matComp;
		uComp.tEscena.value = rtEscena.texture;
		uComp.tBloom.value  = rtA.texture;
		renderer.setRenderTarget(null);
		renderer.render(escena, camara);
	}
	requestAnimationFrame(animar);

})();
</script>
</body>
</html>
