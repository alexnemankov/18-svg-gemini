<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Interactive 3D Scene - Antigravity</title>
	<script type="importmap">
		{
			"imports": {
				"three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
				"jsm/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
			}
		}
	</script>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		body {
			overflow: hidden;
			background-color: #000;
			transition: background-color 0.3s ease;
		}
	</style>
</head>
<body>

	<script type="module">
		import * as THREE from "three";
		import { OrbitControls } from "jsm/controls/OrbitControls.js";
		import { OBJLoader } from "jsm/loaders/OBJLoader.js";
		import GUI from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

		// Configuration and Presets
		const colorSchemes = {
			"Midnight Neon": {
				objectColor: "#ff007f",
				floorLineColor: "#00f0ff",
				floorBgColor: "#120024",
				bgColor: "#080010",
				textColor: "#ffffff"
			},
			"Golden Hour": {
				objectColor: "#ff9900",
				floorLineColor: "#ff3300",
				floorBgColor: "#260f00",
				bgColor: "#1a0a00",
				textColor: "#ffeedd"
			},
			"Emerald Forest": {
				objectColor: "#00ffaa",
				floorLineColor: "#004d26",
				floorBgColor: "#05140b",
				bgColor: "#030d07",
				textColor: "#d0ffd0"
			},
			"Ocean Breeze": {
				objectColor: "#ffffff",
				floorLineColor: "#0088ff",
				floorBgColor: "#001122",
				bgColor: "#000a14",
				textColor: "#e0f0ff"
			},
			"Classic Retro": {
				objectColor: "#ffcc00",
				floorLineColor: "#000000",
				floorBgColor: "#ffffff",
				bgColor: "#ffffff",
				textColor: "#000000"
			}
		};

		const settings = {
			greenscreen: false,
			dpr: Math.min(window.devicePixelRatio, 2),
			colorScheme: "Midnight Neon",
			
			// Custom Colors (will be updated by color scheme or picker)
			objectColor: "#ff007f",
			floorLineColor: "#00f0ff",
			floorBgColor: "#120024",
			bgColor: "#080010",

			// Animation properties
			animationPreset: "Orbital Pan",
			animationSpeed: 1.0,

			// Floor shader properties
			circleSpacing: 0.06,
			lineWidth: 0.02,
			waveSpeed: 0.01,
			fadeEdge: 0.2
		};

		// Initialize Three.js scene
		const w = window.innerWidth;
		const h = window.innerHeight;
		const scene = new THREE.Scene();
		
		const camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
		camera.position.z = 11;
		camera.position.y = 5;
		camera.position.x = -7;
		camera.lookAt(0, 0, 0);

		const renderer = new THREE.WebGLRenderer({ antialias: true });
		renderer.setPixelRatio(settings.dpr);
		renderer.setSize(w, h);
		renderer.shadowMap.enabled = true;
		renderer.shadowMap.type = THREE.PCFSoftShadowMap;
		document.body.appendChild(renderer.domElement);
		renderer.setClearColor(settings.bgColor, 1);

		// OrbitControls with Zoom and Pan enabled
		const controls = new OrbitControls(camera, renderer.domElement);
		controls.enableDamping = true;
		controls.enableZoom = true;
		controls.enablePan = true;
		controls.minPolarAngle = Math.PI / 3;
		controls.maxPolarAngle = Math.PI / 2.2;
		controls.minDistance = 2;
		controls.maxDistance = 40;

		// Shader Code with Customizable Floor Colors
		const vertexShader = `
			varying vec2 vUv;
			varying vec3 vNormal;
			varying vec3 vPosition;
			void main() {
				vUv = uv;
				vNormal = normalize(normalMatrix * normal);
				vPosition = position;
				gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
			}
		`;

		const fragmentShader = `
			uniform float uTime;
			uniform float uCircleSpacing;
			uniform float uLineWidth;
			uniform float uSpeed;
			uniform float uFadeEdge;
			uniform vec3 uCameraPosition;
			uniform vec3 uLineColor;
			uniform vec3 uBgColor;
			varying vec2 vUv;
			varying vec3 vNormal;
			varying vec3 vPosition;

			void main() {
				vec2 center = vec2(0.5, 0.5);
				vec2 uv = vUv;
				float dist = distance(uv, center);

				float animatedDist = dist - uTime * uSpeed;

				float circle = mod(animatedDist, uCircleSpacing);

				float distFromEdge = min(circle, uCircleSpacing - circle);

				float aaWidth = length(vec2(dFdx(animatedDist), dFdy(animatedDist))) * 2.0;
				float lineAlpha = 1.0 - smoothstep(uLineWidth - aaWidth, uLineWidth + aaWidth, distFromEdge);

				vec3 baseColor = mix(uBgColor, uLineColor, lineAlpha);

				vec3 normal = normalize(vNormal);
				vec3 viewDir = normalize(uCameraPosition - vPosition);

				vec3 lightDir = normalize(vec3(5.0, 10.0, 5.0));
				float NdotL = max(dot(normal, lightDir), 0.0);

				vec3 diffuse = baseColor * (0.5 + 0.5 * NdotL);

				vec3 reflectDir = reflect(-lightDir, normal);
				float spec = pow(max(dot(viewDir, reflectDir), 0.0), 64.0);
				vec3 specular = vec3(1.0) * spec * 0.8;

				float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 2.0);
				vec3 fresnelColor = vec3(1.0) * fresnel * 0.3;

				vec3 finalColor = diffuse + specular + fresnelColor;

				float edgeFade = smoothstep(0.5 - uFadeEdge, 0.5, dist);
				float alpha = 1.0 - edgeFade;

				gl_FragColor = vec4(finalColor, alpha);
			}
		`;

		const floorGeometry = new THREE.CircleGeometry(20, 200);
		const floorMaterial = new THREE.ShaderMaterial({
			vertexShader: vertexShader,
			fragmentShader: fragmentShader,
			uniforms: {
				uTime: { value: 0.0 },
				uCircleSpacing: { value: settings.circleSpacing },
				uLineWidth: { value: settings.lineWidth },
				uSpeed: { value: settings.waveSpeed },
				uFadeEdge: { value: settings.fadeEdge },
				uCameraPosition: { value: new THREE.Vector3() },
				uLineColor: { value: new THREE.Color(settings.floorLineColor) },
				uBgColor: { value: new THREE.Color(settings.floorBgColor) }
			},
			side: THREE.DoubleSide,
			transparent: true,
		});
		const floor = new THREE.Mesh(floorGeometry, floorMaterial);
		floor.rotation.x = -Math.PI / 2;
		floor.position.y = -1;
		floor.receiveShadow = true;
		scene.add(floor);

		const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
		scene.add(ambientLight);

		const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
		directionalLight.position.set(5, 10, 5);
		directionalLight.castShadow = true;
		directionalLight.shadow.camera.left = -10;
		directionalLight.shadow.camera.right = 10;
		directionalLight.shadow.camera.top = 10;
		directionalLight.shadow.camera.bottom = -10;
		directionalLight.shadow.mapSize.width = 2048;
		directionalLight.shadow.mapSize.height = 2048;
		scene.add(directionalLight);

		// OBJ Loading and setup
		let loadedModel = null;
		const loader = new OBJLoader();
		loader.load(
			"https://cdn.jsdelivr.net/gh/danielyl123/person/person.obj",
			function (object) {
				loadedModel = object;
				object.traverse(function (child) {
					if (child.isMesh) {
						child.material = new THREE.MeshStandardMaterial({
							color: new THREE.Color(settings.objectColor),
							roughness: 0.7,
							metalness: 0.3,
						});
						child.castShadow = true;
						child.receiveShadow = true;
					}
				});

				const box = new THREE.Box3().setFromObject(object);
				const center = new THREE.Vector3();
				box.getCenter(center);
				const size = new THREE.Vector3();
				box.getSize(size);

				object.traverse(function (child) {
					if (child.isMesh && child.geometry) {
						child.geometry.translate(-center.x, -center.y, -center.z);
					}
				});

				const maxDim = Math.max(size.x, size.y, size.z);
				const scale = 4 / maxDim;
				object.scale.set(scale, scale, scale);

				object.position.set(0, 0, 0);
				object.position.y = 1;
				object.rotation.y = Math.PI / 3;
				object.updateMatrixWorld(true);

				scene.add(object);

				controls.target.set(0, 0, 0);
				controls.update();

				// Capture baseline camera position relative to target
				captureBaseSpherical();

				// Force refresh color scheme to correctly style the newly loaded model
				applyColorScheme(settings.colorScheme);

				console.log("Model loaded successfully");
			},
			function (xhr) {
				console.log((xhr.loaded / xhr.total) * 100 + "% loaded");
			},
			function (error) {
				console.error("Error loading model:", error);
			}
		);

		// Dynamic Helper Functions
		function updateBgColor() {
			if (settings.greenscreen) {
				renderer.setClearColor(0x00ff00, 1.0);
				document.body.style.backgroundColor = "#00ff00";
			} else {
				renderer.setClearColor(settings.bgColor, 1.0);
				document.body.style.backgroundColor = settings.bgColor;
			}
		}

		// GUI Elements Configuration
		const gui = new GUI({ title: "Settings" });

		// 1. Greenscreen Toggle
		gui.add(settings, "greenscreen")
			.name("Greenscreen")
			.onChange(() => {
				updateBgColor();
			});

		// 2. DPR Settings
		gui.add(settings, "dpr", 0.5, 3.0, 0.1)
			.name("Pixel Ratio (DPR)")
			.onChange((val) => {
				renderer.setPixelRatio(val);
			});

		// 3. Preset Scheme Dropdown
		gui.add(settings, "colorScheme", Object.keys(colorSchemes))
			.name("Color Scheme Preset")
			.onChange((val) => {
				applyColorScheme(val);
			});

		// 4. Custom Colors Folder
		const colorFolder = gui.addFolder("Custom Colors");
		
		const objectColorController = colorFolder.addColor(settings, "objectColor")
			.name("Object")
			.onChange((val) => {
				if (loadedModel) {
					loadedModel.traverse(child => {
						if (child.isMesh && child.material) {
							child.material.color.set(val);
						}
					});
				}
			});

		const floorLineColorController = colorFolder.addColor(settings, "floorLineColor")
			.name("Grid Lines")
			.onChange((val) => {
				floorMaterial.uniforms.uLineColor.value.set(val);
			});

		const floorBgColorController = colorFolder.addColor(settings, "floorBgColor")
			.name("Grid Floor")
			.onChange((val) => {
				floorMaterial.uniforms.uBgColor.value.set(val);
			});

		const bgColorController = colorFolder.addColor(settings, "bgColor")
			.name("Background")
			.onChange((val) => {
				updateBgColor();
			});

		colorFolder.close();

		// Apply scheme colors to local settings & render
		function applyColorScheme(schemeName) {
			const scheme = colorSchemes[schemeName];
			if (scheme) {
				settings.objectColor = scheme.objectColor;
				settings.floorLineColor = scheme.floorLineColor;
				settings.floorBgColor = scheme.floorBgColor;
				settings.bgColor = scheme.bgColor;

				// Refresh GUI controller inputs
				objectColorController.updateDisplay();
				floorLineColorController.updateDisplay();
				floorBgColorController.updateDisplay();
				bgColorController.updateDisplay();

				// Update WebGL material parameters
				if (loadedModel) {
					loadedModel.traverse(child => {
						if (child.isMesh && child.material) {
							child.material.color.set(settings.objectColor);
						}
					});
				}
				floorMaterial.uniforms.uLineColor.value.set(settings.floorLineColor);
				floorMaterial.uniforms.uBgColor.value.set(settings.floorBgColor);

				updateBgColor();
			}
		}

		// 5. Animations Folder
		const animFolder = gui.addFolder("Animations");
		
		animFolder.add(settings, "animationPreset", [
			"Orbital Pan",
			"Breathing Float",
			"Cinematic Zoom",
			"Figure-Eight",
			"Static"
		]).name("Camera Preset").onChange(() => {
			captureBaseSpherical();
		});

		animFolder.add(settings, "animationSpeed", 0.0, 3.0, 0.1)
			.name("Speed Multiplier");

		animFolder.open();

		// 6. Shader Parameters
		const shaderFolder = gui.addFolder("Grid Params");
		
		shaderFolder.add(settings, "circleSpacing", 0.01, 0.2, 0.01)
			.name("Line Spacing")
			.onChange((val) => {
				floorMaterial.uniforms.uCircleSpacing.value = val;
			});

		shaderFolder.add(settings, "lineWidth", 0.005, 0.05, 0.001)
			.name("Line Width")
			.onChange((val) => {
				floorMaterial.uniforms.uLineWidth.value = val;
			});

		shaderFolder.add(settings, "waveSpeed", 0.001, 0.05, 0.001)
			.name("Wave Speed")
			.onChange((val) => {
				floorMaterial.uniforms.uSpeed.value = val;
			});

		shaderFolder.add(settings, "fadeEdge", 0.05, 0.4, 0.01)
			.name("Fade Edge")
			.onChange((val) => {
				floorMaterial.uniforms.uFadeEdge.value = val;
			});

		shaderFolder.close();

		// User Interaction Logic
		let userInteracting = false;
		let wheelTimeout = null;

		renderer.domElement.addEventListener('pointerdown', () => {
			userInteracting = true;
		});

		window.addEventListener('pointerup', () => {
			userInteracting = false;
			captureBaseSpherical();
		});

		window.addEventListener('wheel', () => {
			userInteracting = true;
			clearTimeout(wheelTimeout);
			wheelTimeout = setTimeout(() => {
				userInteracting = false;
				captureBaseSpherical();
			}, 500);
		});

		// Baseline camera spherical coordinates relative to the target
		const baseSpherical = new THREE.Spherical();
		
		function captureBaseSpherical() {
			const offset = new THREE.Vector3().copy(camera.position).sub(controls.target);
			baseSpherical.setFromVector3(offset);
		}

		// Initial setups
		applyColorScheme(settings.colorScheme);
		captureBaseSpherical();

		// H Key listener: Toggle GUI
		let uiVisible = true;
		
		window.addEventListener("keydown", (e) => {
			if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
			if (e.key === "h" || e.key === "H") {
				uiVisible = !uiVisible;
				if (uiVisible) {
					gui.show();
				} else {
					gui.hide();
				}
			}
		});

		// Main render loops
		let time = 0;
		function animate() {
			requestAnimationFrame(animate);

			time += 0.016 * settings.animationSpeed;
			floorMaterial.uniforms.uTime.value = time;

			const cameraWorldPos = new THREE.Vector3();
			camera.getWorldPosition(cameraWorldPos);
			floorMaterial.uniforms.uCameraPosition.value.copy(cameraWorldPos);

			// Camera animation controller
			if (!userInteracting) {
				const spherical = new THREE.Spherical();
				
				if (settings.animationPreset === "Orbital Pan") {
					baseSpherical.theta += 0.005 * settings.animationSpeed;
					spherical.copy(baseSpherical);
				} else if (settings.animationPreset === "Breathing Float") {
					spherical.copy(baseSpherical);
					spherical.phi += Math.sin(time * 1.5) * 0.05 * settings.animationSpeed;
					spherical.radius += Math.cos(time * 1.2) * 1.2 * settings.animationSpeed;
				} else if (settings.animationPreset === "Cinematic Zoom") {
					spherical.copy(baseSpherical);
					spherical.radius += Math.sin(time * 1.0) * 3.0 * settings.animationSpeed;
				} else if (settings.animationPreset === "Figure-Eight") {
					baseSpherical.theta += 0.003 * settings.animationSpeed;
					spherical.copy(baseSpherical);
					spherical.phi += Math.sin(time * 2.0) * 0.06 * settings.animationSpeed;
					spherical.radius += Math.cos(time * 0.8) * 0.8 * settings.animationSpeed;
				} else { // "Static"
					spherical.copy(baseSpherical);
				}

				// Clamp and correct spherical angles to match OrbitControls boundaries
				spherical.phi = Math.max(controls.minPolarAngle, Math.min(controls.maxPolarAngle, spherical.phi));
				spherical.makeSafe();

				camera.position.setFromSpherical(spherical).add(controls.target);
			} else {
				// Ensure base spherical coordinate matches camera position while user moves
				captureBaseSpherical();
			}

			controls.update();
			renderer.render(scene, camera);
		}

		animate();

		window.addEventListener("resize", () => {
			renderer.setSize(window.innerWidth, window.innerHeight);
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
		});
	</script>
</body>
</html>
