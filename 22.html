<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Grid Background</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19"></script>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: Inter, Arial, sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
            touch-action: none;
        }

        canvas:active {
            cursor: grabbing;
        }

        .lil-gui.root {
            --width: 320px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <script>
        (() => {
            'use strict';

            const scene = new THREE.Scene();
            const normalFog = new THREE.FogExp2(0x050505, 0.015);
            scene.fog = normalFog;

            const camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 100);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x050505, 1);
            document.body.appendChild(renderer.domElement);

            const stage = new THREE.Group();
            scene.add(stage);

            const params = {
                shapeType: 'Hexagon',
                gridSize: 40,
                radius: 1.5,
                gap: 0.138,
                offsetRows: true,
                objectX: 0,
                objectY: 0,
                cameraZ: 100,
                cameraFov: 25,
                greenScreen: false,
                backgroundColor: '#050505',
                greenScreenColor: '#00ff00',
                lightIntensity: 8.0,
                floorGlow: 0.5,
                baseColor: '#2a2a2a',
                neonColor: '#00ffff',
                secondaryColor: '#ff00ff',
                influenceRadius: 10,
                maxExtrusion: 6,
                waveIntensity: 0.3,
                springStrength: 0.05,
                lightFlightRadius: 18,
                lightSpeed: 0.85,
                autoColor: false,
                roughness: 0.15,
                metalness: 0.8,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1
            };

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            const floorGeometry = new THREE.PlaneGeometry(500, 500);
            const floorMaterial = new THREE.MeshStandardMaterial({
                color: params.neonColor,
                emissive: params.neonColor,
                emissiveIntensity: params.floorGlow,
                roughness: 0.8
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.position.z = -2;
            stage.add(floor);

            const neonLight = new THREE.PointLight(params.neonColor, params.lightIntensity, 55);
            neonLight.position.z = -1;
            scene.add(neonLight);

            const neonLight2 = new THREE.PointLight(params.secondaryColor, params.lightIntensity * 0.75, 50);
            neonLight2.position.z = -1;
            scene.add(neonLight2);

            const hexMaterial = new THREE.MeshPhysicalMaterial({
                color: params.baseColor,
                roughness: params.roughness,
                metalness: params.metalness,
                clearcoat: params.clearcoat,
                clearcoatRoughness: params.clearcoatRoughness,
                flatShading: true
            });

            let hexagons = [];
            let hexGeometry;

            function setBackground(color) {
                renderer.setClearColor(color, 1);
                scene.background = new THREE.Color(color);
                document.body.style.backgroundColor = color;
            }

            function applyStagePosition() {
                stage.position.x = params.objectX;
                stage.position.y = params.objectY;
            }

            function applyCameraZ(value) {
                params.cameraZ = THREE.MathUtils.clamp(value, 10, 300);
                camera.position.z = params.cameraZ;
                camera.updateProjectionMatrix();
            }

            function applyGreenScreenMode() {
                if (params.greenScreen) {
                    scene.fog = null;
                    setBackground(params.greenScreenColor);
                    floorMaterial.color.set(params.greenScreenColor);
                    floorMaterial.emissive.set(params.greenScreenColor);
                    floorMaterial.emissiveIntensity = 0;
                    return;
                }

                scene.fog = normalFog;
                setBackground(params.backgroundColor);
                floorMaterial.emissiveIntensity = params.floorGlow;
                if (!params.autoColor) {
                    floorMaterial.color.set(params.neonColor);
                    floorMaterial.emissive.set(params.neonColor);
                }
            }

            function buildGrid() {
                hexagons.forEach((mesh) => {
                    stage.remove(mesh);
                });

                if (hexGeometry) {
                    hexGeometry.dispose();
                }

                hexagons = [];

                let stepX;
                let stepY;

                if (params.shapeType === 'Hexagon') {
                    const geomRadius = params.radius * 1.02;
                    hexGeometry = new THREE.CylinderGeometry(geomRadius, geomRadius, 0.5, 6);
                    hexGeometry.rotateX(Math.PI / 2);
                    stepX = Math.sqrt(3) * params.radius + params.gap;
                    stepY = 1.5 * params.radius + (params.gap * Math.sqrt(3) / 2);
                } else {
                    const size = params.radius * 1.8;
                    hexGeometry = new THREE.BoxGeometry(size * 1.02, size * 1.02, 0.5);
                    stepX = size + params.gap;
                    stepY = size + params.gap;
                }

                const totalWidth = (params.gridSize - 1) * stepX;
                const totalHeight = (params.gridSize - 1) * stepY;
                const startX = -totalWidth / 2;
                const startY = -totalHeight / 2;

                for (let i = 0; i < params.gridSize; i++) {
                    for (let j = 0; j < params.gridSize; j++) {
                        const mesh = new THREE.Mesh(hexGeometry, hexMaterial);
                        let x = startX + i * stepX;
                        const y = startY + j * stepY;

                        if (params.offsetRows && j % 2 !== 0) {
                            x += stepX / 2;
                        }

                        mesh.position.set(x, y, 0);
                        mesh.userData = {
                            originalZ: 0,
                            targetZ: 0,
                            velocityZ: 0
                        };

                        stage.add(mesh);
                        hexagons.push(mesh);
                    }
                }
            }

            buildGrid();

            const gui = new lil.GUI({ title: 'Background Settings' });

            const gridFolder = gui.addFolder('Grid');
            gridFolder.add(params, 'shapeType', ['Hexagon', 'Square']).name('Shape Type').onChange(buildGrid);
            gridFolder.add(params, 'gridSize', 10, 80, 1).name('Grid Size').onChange(buildGrid);
            gridFolder.add(params, 'radius', 0.5, 3).name('Shape Size').onChange(buildGrid);
            gridFolder.add(params, 'gap', 0, 2).name('Gap Size').onChange(buildGrid);
            gridFolder.add(params, 'offsetRows').name('Offset Rows').onChange(buildGrid);

            const sceneFolder = gui.addFolder('Scene & Interaction');
            sceneFolder.add(params, 'objectX', -80, 80, 0.1).name('Object X').listen().onChange(applyStagePosition);
            sceneFolder.add(params, 'objectY', -80, 80, 0.1).name('Object Y').listen().onChange(applyStagePosition);
            sceneFolder.add(params, 'cameraZ', 10, 300, 0.1).name('Zoom / Camera Z').listen().onChange(applyCameraZ);
            sceneFolder.add(params, 'cameraFov', 5, 100).name('Camera FOV').onChange((fov) => {
                camera.fov = fov;
                camera.updateProjectionMatrix();
            });
            sceneFolder.add(params, 'influenceRadius', 1, 30).name('Light Radius');
            sceneFolder.add(params, 'maxExtrusion', 0, 15).name('Extrusion Height');
            sceneFolder.add(params, 'lightFlightRadius', 1, 50).name('Flight Radius');
            sceneFolder.add(params, 'lightSpeed', 0.05, 3).name('Flight Speed');
            sceneFolder.add(params, 'lightIntensity', 0, 20).name('Light Intensity').onChange((value) => {
                neonLight.intensity = value;
                neonLight2.intensity = value * 0.75;
            });
            sceneFolder.add(params, 'floorGlow', 0, 3).name('Floor Glow').onChange((value) => {
                if (!params.greenScreen) {
                    floorMaterial.emissiveIntensity = value;
                }
            });
            sceneFolder.add(params, 'waveIntensity', 0, 2).name('Wave Intensity');
            sceneFolder.add(params, 'springStrength', 0.01, 0.2).name('Spring Speed');

            const colorFolder = gui.addFolder('Colors');
            colorFolder.add(params, 'greenScreen').name('Green Screen').onChange(applyGreenScreenMode);
            colorFolder.addColor(params, 'greenScreenColor').name('Green Color').onChange(() => {
                if (params.greenScreen) {
                    applyGreenScreenMode();
                }
            });
            colorFolder.addColor(params, 'backgroundColor').name('Background').onChange(() => {
                if (!params.greenScreen) {
                    applyGreenScreenMode();
                }
            });
            colorFolder.addColor(params, 'baseColor').name('Base Color').onChange((color) => {
                hexMaterial.color.set(color);
            });
            colorFolder.addColor(params, 'neonColor').name('Neon Color').onChange((color) => {
                if (!params.autoColor) {
                    neonLight.color.set(color);
                    if (!params.greenScreen) {
                        floorMaterial.color.set(color);
                        floorMaterial.emissive.set(color);
                    }
                }
            });
            colorFolder.addColor(params, 'secondaryColor').name('Secondary Color').onChange((color) => {
                if (!params.autoColor) {
                    neonLight2.color.set(color);
                }
            });
            colorFolder.add(params, 'autoColor').name('Auto-Rainbow');

            const matFolder = gui.addFolder('Material & Reflections');
            matFolder.add(params, 'roughness', 0, 1).name('Roughness').onChange((value) => {
                hexMaterial.roughness = value;
            });
            matFolder.add(params, 'metalness', 0, 1).name('Metalness').onChange((value) => {
                hexMaterial.metalness = value;
            });
            matFolder.add(params, 'clearcoat', 0, 1).name('Clearcoat').onChange((value) => {
                hexMaterial.clearcoat = value;
            });
            matFolder.add(params, 'clearcoatRoughness', 0, 1).name('Coat Roughness').onChange((value) => {
                hexMaterial.clearcoatRoughness = value;
            });

            gui.close();
            applyGreenScreenMode();
            applyStagePosition();

            const dragState = {
                active: false,
                pointerId: null,
                lastX: 0,
                lastY: 0
            };

            function getWorldUnitsPerPixel() {
                const visibleHeight = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2) * camera.position.z;
                return visibleHeight / window.innerHeight;
            }

            renderer.domElement.addEventListener('pointerdown', (event) => {
                dragState.active = true;
                dragState.pointerId = event.pointerId;
                dragState.lastX = event.clientX;
                dragState.lastY = event.clientY;
                renderer.domElement.setPointerCapture(event.pointerId);
            });

            renderer.domElement.addEventListener('pointermove', (event) => {
                if (!dragState.active || event.pointerId !== dragState.pointerId) {
                    return;
                }

                const unitsPerPixel = getWorldUnitsPerPixel();
                const dx = event.clientX - dragState.lastX;
                const dy = event.clientY - dragState.lastY;

                params.objectX += dx * unitsPerPixel;
                params.objectY -= dy * unitsPerPixel;
                applyStagePosition();

                dragState.lastX = event.clientX;
                dragState.lastY = event.clientY;
            });

            function stopDrag(event) {
                if (!dragState.active || event.pointerId !== dragState.pointerId) {
                    return;
                }

                dragState.active = false;
                renderer.domElement.releasePointerCapture(event.pointerId);
                dragState.pointerId = null;
            }

            renderer.domElement.addEventListener('pointerup', stopDrag);
            renderer.domElement.addEventListener('pointercancel', stopDrag);

            renderer.domElement.addEventListener('wheel', (event) => {
                event.preventDefault();
                const zoomFactor = event.deltaY > 0 ? 1.08 : 0.92;
                applyCameraZ(params.cameraZ * zoomFactor);
            }, { passive: false });

            const clock = new THREE.Clock();
            const autoTarget = new THREE.Vector3();
            const smoothLight = new THREE.Vector3(0, 0, -1);

            function updateFlyingLights(time) {
                const speed = params.lightSpeed;
                const radius = params.lightFlightRadius;

                autoTarget.set(
                    Math.sin(time * speed * 0.9) * radius + Math.sin(time * speed * 0.31) * radius * 0.45,
                    Math.cos(time * speed * 0.72) * radius * 0.8 + Math.sin(time * speed * 0.47) * radius * 0.35,
                    -1
                );

                smoothLight.lerp(autoTarget, 0.035);

                neonLight.position.set(
                    stage.position.x + smoothLight.x,
                    stage.position.y + smoothLight.y,
                    -1
                );

                neonLight2.position.set(
                    stage.position.x + smoothLight.x + Math.sin(time * speed * 1.8) * radius * 0.28,
                    stage.position.y + smoothLight.y + Math.cos(time * speed * 1.6) * radius * 0.28,
                    -1
                );
            }

            function updateColors(time) {
                if (params.autoColor) {
                    const hue = (time * 0.05) % 1;
                    neonLight.color.setHSL(hue, 1, 0.5);
                    neonLight2.color.setHSL((hue + 0.5) % 1, 1, 0.5);

                    if (!params.greenScreen) {
                        floorMaterial.color.setHSL(hue, 1, 0.5);
                        floorMaterial.emissive.setHSL(hue, 1, 0.5);
                    }
                    return;
                }

                neonLight.color.set(params.neonColor);
                neonLight2.color.set(params.secondaryColor);

                if (!params.greenScreen) {
                    floorMaterial.color.set(params.neonColor);
                    floorMaterial.emissive.set(params.neonColor);
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                const time = clock.getElapsedTime();

                updateFlyingLights(time);

                for (let i = 0; i < hexagons.length; i++) {
                    const tile = hexagons[i];
                    const dx = tile.position.x - smoothLight.x;
                    const dy = tile.position.y - smoothLight.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < params.influenceRadius) {
                        const normalizedDist = distance / params.influenceRadius;
                        const bumpFactor = Math.max(0, 1 - Math.pow(normalizedDist, 1.5));
                        tile.userData.targetZ = bumpFactor * params.maxExtrusion;
                    } else {
                        tile.userData.targetZ = tile.userData.originalZ;
                    }

                    const wave = Math.sin(tile.position.x * 0.2 + time) *
                        Math.cos(tile.position.y * 0.2 + time) *
                        params.waveIntensity;
                    const targetWithWave = tile.userData.targetZ + wave;
                    const diff = targetWithWave - tile.position.z;

                    tile.userData.velocityZ += diff * params.springStrength;
                    tile.userData.velocityZ *= 0.8;
                    tile.position.z += tile.userData.velocityZ;

                    const heightDelta = tile.position.z - tile.userData.originalZ;
                    const centerDampening = Math.min(distance / (params.radius * 1.5), 1.0);

                    if (distance > 0.01) {
                        const dirX = dx / distance;
                        const dirY = dy / distance;
                        tile.rotation.x = -dirY * heightDelta * 0.08 * centerDampening;
                        tile.rotation.y = dirX * heightDelta * 0.08 * centerDampening;
                    } else {
                        tile.rotation.x = 0;
                        tile.rotation.y = 0;
                    }
                }

                updateColors(time);
                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            window.addEventListener('load', animate);
        })();
    </script>
</body>
</html>
