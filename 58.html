<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Numbers - 27, 28, 29</title>
  <style>
    @property --scale {
      syntax: '<number>';
      inherits: true;
      initial-value: .8;
    }

    :root {
      --char-size: 20vmin;
      --speed: 10s;
      
      /* Theme Background Colors */
      --bg-top: #EA394B;
      --bg-bottom: #1C2379;
      
      /* 10 Spans Color Palette */
      --color-1: #F1FE67;
      --color-2: #6B1D18;
      --color-3: #C3291C;
      --color-4: #AC89F7;
      --color-5: #374FF5;
      --color-6: #EB4F27;
      --color-7: #BCE949;
      --color-8: #5A0DE0;
      --color-9: #91FBDC;
      --color-10: #1E4B3F;
      --color-first: #ffffff;
    }

    body {
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background: var(--bg-bottom);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background 0.3s ease;
    }

    #stage {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      overflow: hidden;
      cursor: grab;
      user-select: none;
      background-color: var(--bg-bottom);
      transition: background-color 0.3s ease;
      touch-action: none;
    }

    #stage:active {
      cursor: grabbing;
    }

    #transform-wrapper {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: center center;
      transform: translate(0px, 0px) scale(1);
      will-change: transform;
    }

    .logo {
      --r: calc(var(--char-size) / 3);
      --gap: calc(var(--char-size) / 15);
      
      display: grid;
      grid-template-rows: repeat(2, 1fr);
      gap: var(--gap);
      height: 100%;
      width: 100%;
    }

    .num {
      display: grid;
      justify-content: center;
    }

    .num-two {
      align-content: end;
      background: var(--bg-top);
      transition: background 0.3s ease;
    }

    .num-two span { 
      transform-origin: 50% 100%;
    }

    .num-seven, .num-eight, .num-nine {
      align-content: start;
      z-index: -1;
    }

    .num-seven span, .num-eight span, .num-nine span {
      transform-origin: 50% calc(var(--sibling-index, sibling-index()) * .01%);
    }

    .num span {
      grid-row: 1;
      grid-column: 1;
      
      position: relative;
      
      display: block;
      width: calc(var(--r) * 4);
      height: calc(var(--r) * 3);
      
      container-type: size;
      z-index: calc(var(--sibling-count, sibling-count()) - var(--sibling-index, sibling-index()));
    }

    .num span:not(:first-child) {
      scale: calc((var(--sibling-index, sibling-index()) - 1) * var(--scale));
      animation: scaleIt var(--speed, 0s) calc(var(--sibling-index, sibling-index()) * -100ms) ease-in-out infinite;
    }

    .num span:nth-child(10n + 1) { color: var(--color-1); }
    .num span:nth-child(10n + 2) { color: var(--color-2); }
    .num span:nth-child(10n + 3) { color: var(--color-3); }
    .num span:nth-child(10n + 4) { color: var(--color-4); }
    .num span:nth-child(10n + 5) { color: var(--color-5); }
    .num span:nth-child(10n + 6) { color: var(--color-6); }
    .num span:nth-child(10n + 7) { color: var(--color-7); }
    .num span:nth-child(10n + 8) { color: var(--color-8); }
    .num span:nth-child(10n + 9) { color: var(--color-9); }
    .num span:nth-child(10n + 10) { color: var(--color-10); }
    .num span:nth-child(1) { color: var(--color-first); }

    .num span:before {
      content: '';
      position: absolute;
      inset: 0;
      background: currentcolor;
    }

    .num-two span:before {
      clip-path: shape(
        from 0 var(--r),
        arc to var(--r) 0 of var(--r) var(--r) cw,
        line to calc(var(--r) * 3) 0,
        arc to calc(var(--r) * 3) calc(var(--r) * 2) of var(--r) var(--r) cw,
        line to calc(var(--r) * 4) calc(var(--r) * 2),
        line to calc(var(--r) * 4) calc(var(--r) * 3),
        line to 0 calc(var(--r) * 3),
        line to 0 calc(var(--r) * 2),
        arc to var(--r) var(--r) of var(--r) var(--r) cw,
        close
      );
    }

    .num-seven span:before {
      clip-path: shape(
        from 0 var(--r),
        arc to var(--r) 0 of var(--r) var(--r) cw,
        line to calc(var(--r) * 3) 0,
        arc to calc(var(--r) * 4) var(--r) of var(--r) var(--r) cw,
        line to calc(var(--r) * 2) calc(var(--r) * 3),
        line to calc(var(--r) * 1) calc(var(--r) * 3),
        line to calc(var(--r) * 3) var(--r),
        line to 0 var(--r),
        close
      );
    }

    .num-eight span:before {
      clip-path: shape(
        from 0 var(--r),
        arc to var(--r) 0 of var(--r) var(--r) cw,
        line to calc(var(--r) * 3) 0,
        arc to calc(var(--r) * 4) var(--r) of var(--r) var(--r) cw,
        line to calc(var(--r) * 3.2) calc(var(--r) * 1.5),
        line to calc(var(--r) * 4) calc(var(--r) * 2),
        arc to calc(var(--r) * 3) calc(var(--r) * 3) of var(--r) var(--r) cw,
        line to var(--r) calc(var(--r) * 3),
        arc to 0 calc(var(--r) * 2) of var(--r) var(--r) cw,
        line to calc(var(--r) * 0.8) calc(var(--r) * 1.5),
        close
      );
    }

    .num-nine span:before {
      clip-path: shape(
        from calc(var(--r) * 4) calc(var(--r) * 2),
        arc to calc(var(--r) * 3) calc(var(--r) * 3) of var(--r) var(--r) cw,
        line to var(--r) calc(var(--r) * 3),
        arc to 0 calc(var(--r) * 2) of var(--r) var(--r) cw,
        line to var(--r) calc(var(--r) * 2),
        arc to var(--r) 0 of var(--r) var(--r) cw,
        line to calc(var(--r) * 3) 0,
        arc to calc(var(--r) * 4) var(--r) of var(--r) var(--r) cw,
        close
      );
    }

    @keyframes scaleIt {
      20% { --scale: 2; }
      40% { --scale: .6; }
      70% { --scale: 1.4; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="transform-wrapper">
      <div class="logo"></div>
    </div>
  </div>

  <script type="module">
    import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // 5 IT/tech-themed presets
    const presets = {
      'Original Brand': {
        bgTop: '#EA394B',
        bgBottom: '#1C2379',
        colors: ['#F1FE67', '#6B1D18', '#C3291C', '#AC89F7', '#374FF5', '#EB4F27', '#BCE949', '#5A0DE0', '#91FBDC', '#1E4B3F']
      },
      'Cyberpunk City': {
        bgTop: '#ff0055',
        bgBottom: '#0d0e15',
        colors: ['#00f0ff', '#ffe600', '#9d4edd', '#3a0ca3', '#f72585', '#4cc9f0', '#7209b7', '#3f37c9', '#1a1b2f', '#ff0055']
      },
      'Matrix Green': {
        bgTop: '#0a2f1d',
        bgBottom: '#020703',
        colors: ['#00ff41', '#008f11', '#003b00', '#0d5c14', '#1f8b2c', '#3df253', '#00ff66', '#052e08', '#20ea50', '#091c0e']
      },
      'Synthwave Sunset': {
        bgTop: '#f72585',
        bgBottom: '#12061c',
        colors: ['#ff7b00', '#ff0055', '#ffbe0b', '#fb5607', '#ff006e', '#8338ec', '#3a86c8', '#8338ec', '#3a86c8', '#ff7b00']
      },
      'Clean Tech': {
        bgTop: '#1e293b',
        bgBottom: '#0f172a',
        colors: ['#38bdf8', '#0ea5e9', '#2563eb', '#1d4ed8', '#1e40af', '#0891b2', '#06b6d4', '#67e8f9', '#e2e8f0', '#38bdf8']
      },
      'Custom': {
        bgTop: '#EA394B',
        bgBottom: '#1C2379',
        colors: ['#F1FE67', '#6B1D18', '#C3291C', '#AC89F7', '#374FF5', '#EB4F27', '#BCE949', '#5A0DE0', '#91FBDC', '#1E4B3F']
      }
    };

    // State Variables
    let scale = 1.0;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    // Touch support variables
    let prevDiff = -1;

    const transformWrapper = document.getElementById('transform-wrapper');
    const stage = document.getElementById('stage');

    // GUI Config Object
    const state = {
      number: '27',
      theme: 'Original Brand',
      greenscreen: false,
      bgTop: presets['Original Brand'].bgTop,
      bgBottom: presets['Original Brand'].bgBottom,
      speed: 10,
      c1: presets['Original Brand'].colors[0],
      c2: presets['Original Brand'].colors[1],
      c3: presets['Original Brand'].colors[2],
      c4: presets['Original Brand'].colors[3],
      c5: presets['Original Brand'].colors[4],
      c6: presets['Original Brand'].colors[5],
      c7: presets['Original Brand'].colors[6],
      c8: presets['Original Brand'].colors[7],
      c9: presets['Original Brand'].colors[8],
      c10: presets['Original Brand'].colors[9],
      resetView: () => {
        scale = 1.0;
        translateX = 0;
        translateY = 0;
        updateTransform();
      }
    };

    // Generate Spans Dynamically based on current number selection
    function updateNumber(num) {
      const logo = document.querySelector('.logo');
      logo.innerHTML = '';

      // Digit '2' (Top half)
      const numTwo = document.createElement('div');
      numTwo.className = 'num num-two';
      const countTwo = 21;
      for (let i = 1; i <= countTwo; i++) {
        const span = document.createElement('span');
        span.style.setProperty('--sibling-index', i);
        span.style.setProperty('--sibling-count', countTwo);
        numTwo.appendChild(span);
      }
      logo.appendChild(numTwo);

      // Second Digit (Bottom half: 7, 8, or 9)
      const numSecond = document.createElement('div');
      let secondDigitClass = '';
      let countSecond = 27;

      if (num === '27') {
        secondDigitClass = 'num-seven';
        countSecond = 27;
      } else if (num === '28') {
        secondDigitClass = 'num-eight';
        countSecond = 28;
      } else if (num === '29') {
        secondDigitClass = 'num-nine';
        countSecond = 29;
      }

      numSecond.className = `num ${secondDigitClass}`;
      for (let i = 1; i <= countSecond; i++) {
        const span = document.createElement('span');
        span.style.setProperty('--sibling-index', i);
        span.style.setProperty('--sibling-count', countSecond);
        numSecond.appendChild(span);
      }
      logo.appendChild(numSecond);
    }

    // Apply colors and layout theme to page
    function applyTheme() {
      const root = document.documentElement;

      if (state.greenscreen) {
        root.style.setProperty('--bg-top', '#00ff00');
        root.style.setProperty('--bg-bottom', '#00ff00');
      } else {
        root.style.setProperty('--bg-top', state.bgTop);
        root.style.setProperty('--bg-bottom', state.bgBottom);
      }

      for (let i = 1; i <= 10; i++) {
        root.style.setProperty(`--color-${i}`, state[`c${i}`]);
      }
      root.style.setProperty('--speed', `${state.speed}s`);
    }

    function updateTransform() {
      transformWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    // Interactive Drag and Zoom
    stage.addEventListener('wheel', (e) => {
      e.preventDefault();
      const zoomFactor = 1.1;
      const oldScale = scale;

      if (e.deltaY < 0) {
        scale *= zoomFactor;
      } else {
        scale /= zoomFactor;
      }

      scale = Math.max(0.1, Math.min(20, scale));

      const rect = stage.getBoundingClientRect();
      const mouseX = e.clientX - rect.left - rect.width / 2;
      const mouseY = e.clientY - rect.top - rect.height / 2;

      translateX = mouseX - (mouseX - translateX) * (scale / oldScale);
      translateY = mouseY - (mouseY - translateY) * (scale / oldScale);

      updateTransform();
    }, { passive: false });

    // Drag / Pan across screen
    stage.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return; // Only left click
      isDragging = true;
      startX = e.clientX - translateX;
      startY = e.clientY - translateY;
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      translateX = e.clientX - startX;
      translateY = e.clientY - startY;
      updateTransform();
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // Touch Support for Mobile / Trackpads
    stage.addEventListener('touchstart', (e) => {
      if (e.target.closest('.lil-gui')) return;
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - translateX;
        startY = e.touches[0].clientY - translateY;
      } else if (e.touches.length === 2) {
        isDragging = false;
        prevDiff = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      }
    });

    window.addEventListener('touchmove', (e) => {
      if (isDragging && e.touches.length === 1) {
        translateX = e.touches[0].clientX - startX;
        translateY = e.touches[0].clientY - startY;
        updateTransform();
      } else if (e.touches.length === 2) {
        const curDiff = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        if (prevDiff > 0) {
          const ratio = curDiff / prevDiff;
          const oldScale = scale;
          scale = Math.max(0.1, Math.min(20, scale * ratio));
          
          const rect = stage.getBoundingClientRect();
          const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left - rect.width / 2;
          const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top - rect.height / 2;
          
          translateX = midX - (midX - translateX) * (scale / oldScale);
          translateY = midY - (midY - translateY) * (scale / oldScale);
          updateTransform();
        }
        prevDiff = curDiff;
      }
    });

    window.addEventListener('touchend', () => {
      isDragging = false;
      prevDiff = -1;
    });

    // GUI Setup
    const gui = new GUI({ title: 'Controls' });
    let isUpdatingPreset = false;

    // Number Selection
    gui.add(state, 'number', ['27', '28', '29']).name('Target Number').onChange((val) => {
      updateNumber(val);
    });

    // Theme Preset Selector
    const presetController = gui.add(state, 'theme', ['Original Brand', 'Cyberpunk City', 'Matrix Green', 'Synthwave Sunset', 'Clean Tech', 'Custom']).name('Theme Preset');
    
    presetController.onChange((val) => {
      if (isUpdatingPreset || val === 'Custom') return;

      const p = presets[val];
      state.bgTop = p.bgTop;
      state.bgBottom = p.bgBottom;
      for (let i = 1; i <= 10; i++) {
        state[`c${i}`] = p.colors[i - 1];
      }

      // Sync display controls
      bgTopController.updateDisplay();
      bgBottomController.updateDisplay();
      for (let i = 0; i < 10; i++) {
        colorControllers[i].updateDisplay();
      }

      applyTheme();
    });

    // Green Screen Mode Toggle
    gui.add(state, 'greenscreen').name('Green Screen').onChange(() => {
      applyTheme();
    });

    // Speed Slider
    gui.add(state, 'speed', 1, 30, 0.5).name('Animation Speed (s)').onChange(() => {
      applyTheme();
    });

    const folderColors = gui.addFolder('Custom Color Scheme');

    function markAsCustom() {
      if (isUpdatingPreset) return;
      isUpdatingPreset = true;
      state.theme = 'Custom';
      presetController.updateDisplay();
      isUpdatingPreset = false;
    }

    const bgTopController = folderColors.addColor(state, 'bgTop').name('Top Background').onChange(() => {
      markAsCustom();
      applyTheme();
    });

    const bgBottomController = folderColors.addColor(state, 'bgBottom').name('Bottom Background').onChange(() => {
      markAsCustom();
      applyTheme();
    });

    const colorControllers = [];
    for (let i = 1; i <= 10; i++) {
      const controller = folderColors.addColor(state, `c${i}`).name(`Color ${i}`).onChange(() => {
        markAsCustom();
        applyTheme();
      });
      colorControllers.push(controller);
    }

    gui.add(state, 'resetView').name('Reset Drag/Zoom');

    // Initial setup
    updateNumber(state.number);
    applyTheme();
  </script>
</body>
</html>
