<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Plasma Orb Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        /* GUI Container positioning */
        .lil-gui.root {
            position: absolute;
            bottom: 10px;
            right: 10px;
            top: auto !important;
        }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        // --- CONFIGURATION OBJECT ---
        const params = {
            // Animation
            timeScale: 1.2,
            rotationSpeedX: 0.002, 
            rotationSpeedY: 0.005,
            
            // Plasma
            plasmaScale: 0.2,      // Texture Scale
            plasmaBrightness: 1.31,   // Brightness
            voidThreshold: 0.09,    // Voids
            colorDeep: '#001433',      // Color Deep
            colorMid: '#0084ff',       // Color Mid
            colorBright: '#00ffe1',    // Color Bright
            
            // Shell
            shellColor: '#0066ff',     // Edge Color
            shellOpacity: 0.41,        // Edge Opacity

            // Background / Greenscreen
            backgroundColor: '#000000',
            greenscreen: false,
            colorScheme: 'Neon Cyber'
        };

        // 5 Tech & IT Preset Color Schemes
        const presets = {
            'Neon Cyber': {
                colorDeep: '#001433',
                colorMid: '#0084ff',
                colorBright: '#00ffe1',
                shellColor: '#0066ff',
                backgroundColor: '#000000'
            },
            'Matrix Code': {
                colorDeep: '#001a00',
                colorMid: '#008000',
                colorBright: '#00ff41',
                shellColor: '#00ff00',
                backgroundColor: '#000500'
            },
            'Dracula / Obsidian': {
                colorDeep: '#1a002c',
                colorMid: '#8a2be2',
                colorBright: '#ff007f',
                shellColor: '#9400d3',
                backgroundColor: '#05000a'
            },
            'Terminal Amber': {
                colorDeep: '#1a0f00',
                colorMid: '#d2691e',
                colorBright: '#ff8c00',
                shellColor: '#ffa500',
                backgroundColor: '#0b0600'
            },
            'Quantum Violet': {
                colorDeep: '#0a001a',
                colorMid: '#4b0082',
                colorBright: '#da70d6',
                shellColor: '#8a2be2',
                backgroundColor: '#030008'
            }
        };

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(params.backgroundColor);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 2.4;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        // TONE MAPPING
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.9; 
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enablePan = true; // Enabled panning (opportunity to drag object across screen)
        controls.minDistance = 1.5;
        controls.maxDistance = 20;

        // --- GROUP FOR ROTATION ---
        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        // --- GLSL NOISE FUNCTIONS ---
        const noiseFunctions = `
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

            float snoise(vec3 v) {
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                i = mod289(i);
                vec4 p = permute( permute( permute(
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                        + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            float fbm(vec3 p) {
                float total = 0.0;
                float amplitude = 0.5;
                float frequency = 1.0;
                for (int i = 0; i < 3; i++) { 
                    total += snoise(p * frequency) * amplitude;
                    amplitude *= 0.5;
                    frequency *= 2.0;
                }
                return total;
            }
        `;

        // 2. LIGHTS
        const pointLight = new THREE.PointLight(0x0088ff, 2.0, 10);
        mainGroup.add(pointLight);


        // 3. OUTER SHELL (Glass)
        const shellGeo = new THREE.SphereGeometry(1.0, 64, 64);
        
        const shellShader = {
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vViewPosition;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    vViewPosition = -mvPosition.xyz;
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                varying vec3 vViewPosition;
                uniform vec3 uColor;
                uniform float uOpacity;
                
                void main() {
                    float fresnel = pow(1.0 - dot(normalize(vNormal), normalize(vViewPosition)), 2.5);
                    gl_FragColor = vec4(uColor, fresnel * uOpacity);
                }
            `
        };

        const shellBackMat = new THREE.ShaderMaterial({
            vertexShader: shellShader.vertexShader,
            fragmentShader: shellShader.fragmentShader,
            uniforms: { 
                uColor: { value: new THREE.Color(params.shellColor).multiplyScalar(0.3) }, 
                uOpacity: { value: 0.3 } 
            },
            transparent: true,
            blending: THREE.AdditiveBlending,
            side: THREE.BackSide,
            depthWrite: false
        });

        const shellFrontMat = new THREE.ShaderMaterial({
            vertexShader: shellShader.vertexShader,
            fragmentShader: shellShader.fragmentShader,
            uniforms: { 
                uColor: { value: new THREE.Color(params.shellColor) }, 
                uOpacity: { value: params.shellOpacity } 
            },
            transparent: true,
            blending: THREE.AdditiveBlending,
            side: THREE.FrontSide,
            depthWrite: false
        });

        mainGroup.add(new THREE.Mesh(shellGeo, shellBackMat));
        mainGroup.add(new THREE.Mesh(shellGeo, shellFrontMat));


        // 4. PLASMA (Gas)
        const plasmaGeo = new THREE.SphereGeometry(0.998, 128, 128); 
        const plasmaMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uScale: { value: params.plasmaScale },
                uBrightness: { value: params.plasmaBrightness },
                uThreshold: { value: params.voidThreshold },
                uColorDeep: { value: new THREE.Color(params.colorDeep) },
                uColorMid: { value: new THREE.Color(params.colorMid) },
                uColorBright: { value: new THREE.Color(params.colorBright) }
            },
            vertexShader: `
                varying vec3 vPosition;
                varying vec3 vNormal;
                varying vec3 vViewPosition;

                void main() {
                    vPosition = position;
                    vNormal = normalize(normalMatrix * normal);
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    
                    vViewPosition = -mvPosition.xyz; 
                    
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform float uTime;
                uniform float uScale;
                uniform float uBrightness;
                uniform float uThreshold;
                uniform vec3 uColorDeep;
                uniform vec3 uColorMid;
                uniform vec3 uColorBright;

                varying vec3 vPosition;
                varying vec3 vNormal;
                varying vec3 vViewPosition;
                
                ${noiseFunctions}

                void main() {
                    vec3 p = vPosition * uScale; 
                    
                    vec3 q = vec3(
                        fbm(p + vec3(0.0, uTime * 0.05, 0.0)),
                        fbm(p + vec3(5.2, 1.3, 2.8) + uTime * 0.05),
                        fbm(p + vec3(2.2, 8.4, 0.5) - uTime * 0.02)
                    );
                    
                    float density = fbm(p + 2.0 * q);
                    float t = (density + 0.4) * 0.8;
                    float alpha = smoothstep(uThreshold, 0.7, t);

                    vec3 cWhite = vec3(1.0, 1.0, 1.0);
                    
                    vec3 color = mix(uColorDeep, uColorMid, smoothstep(uThreshold, 0.5, t));
                    color = mix(color, uColorBright, smoothstep(0.5, 0.8, t));
                    color = mix(color, cWhite, smoothstep(0.8, 1.0, t));

                    float facing = dot(normalize(vNormal), normalize(vViewPosition));
                    float depthFactor = (facing + 1.0) * 0.5;
                    float finalAlpha = alpha * (0.02 + 0.98 * depthFactor);
                    
                    gl_FragColor = vec4(color * uBrightness, finalAlpha);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            side: THREE.DoubleSide,
            depthWrite: false
        });

        const plasmaMesh = new THREE.Mesh(plasmaGeo, plasmaMat);
        mainGroup.add(plasmaMesh);


        // 5. PARTICLES
        const pCount = 600; 
        const pPos = new Float32Array(pCount * 3);
        const pSizes = new Float32Array(pCount);
        const sphereRadius = 0.95;

        for(let i = 0; i < pCount; i++) {
            const r = sphereRadius * Math.cbrt(Math.random());
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            pPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            pPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            pPos[i * 3 + 2] = r * Math.cos(phi);
            
            pSizes[i] = Math.random();
        }

        const pGeo = new THREE.BufferGeometry();
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        pGeo.setAttribute('aSize', new THREE.BufferAttribute(pSizes, 1));

        const pMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uColor: { value: new THREE.Color(0xffffff) }
            },
            vertexShader: `
                uniform float uTime;
                attribute float aSize;
                varying float vAlpha;
                
                void main() {
                    vec3 pos = position;
                    // Subtle floating
                    pos.y += sin(uTime * 0.2 + pos.x) * 0.02;
                    pos.x += cos(uTime * 0.15 + pos.z) * 0.02;

                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_Position = projectionMatrix * mvPosition;
                    
                    float baseSize = 8.0 * aSize + 4.0;
                    gl_PointSize = baseSize * (1.0 / -mvPosition.z);
                    
                    vAlpha = 0.8 + 0.2 * sin(uTime + aSize * 10.0);
                }
            `,
            fragmentShader: `
                uniform vec3 uColor;
                varying float vAlpha;
                void main() {
                    vec2 uv = gl_PointCoord - vec2(0.5);
                    float dist = length(uv);
                    if(dist > 0.5) discard;
                    
                    float glow = 1.0 - (dist * 2.0);
                    glow = pow(glow, 1.8);
                    
                    gl_FragColor = vec4(uColor, glow * vAlpha);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(pGeo, pMat);
        mainGroup.add(particles);

        // --- UPDATE COLORS PROPAGATION ---
        function updateColors() {
            const currentBg = params.greenscreen ? '#00ff00' : params.backgroundColor;
            scene.background.set(currentBg);

            // Update materials
            plasmaMat.uniforms.uColorDeep.value.set(params.colorDeep);
            plasmaMat.uniforms.uColorMid.value.set(params.colorMid);
            plasmaMat.uniforms.uColorBright.value.set(params.colorBright);
            
            shellFrontMat.uniforms.uColor.value.set(params.shellColor);
            shellBackMat.uniforms.uColor.value.set(params.shellColor).multiplyScalar(0.3);
            
            // Adapt point light color for better coherence
            pointLight.color.set(params.colorMid);
        }

        // --- GUI SETUP ---
        const gui = new GUI({ title: 'Settings' });
        
        // Environment / Presets Folder
        const folderEnv = gui.addFolder('Environment & Presets');
        
        const schemeController = folderEnv.add(params, 'colorScheme', Object.keys(presets).concat('Custom')).name('Preset Scheme');
        
        const gsController = folderEnv.add(params, 'greenscreen').name('Enable Greenscreen').onChange(updateColors);
        
        const bgController = folderEnv.addColor(params, 'backgroundColor').name('Background').onChange(() => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
            updateColors();
        });

        // Plasma Folder
        const folderPlasma = gui.addFolder('Plasma');
        folderPlasma.add(params, 'timeScale', 0.0, 2.0).name('Anim Speed');
        folderPlasma.add(params, 'plasmaScale', 0.05, 0.5).name('Texture Scale').onChange(v => plasmaMat.uniforms.uScale.value = v);
        folderPlasma.add(params, 'plasmaBrightness', 0.5, 3.0).name('Brightness').onChange(v => plasmaMat.uniforms.uBrightness.value = v);
        folderPlasma.add(params, 'voidThreshold', 0.0, 0.8).name('Voids').onChange(v => plasmaMat.uniforms.uThreshold.value = v);
        
        const colorDeepCtrl = folderPlasma.addColor(params, 'colorDeep').name('Color Deep').onChange(() => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
            updateColors();
        });
        const colorMidCtrl = folderPlasma.addColor(params, 'colorMid').name('Color Mid').onChange(() => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
            updateColors();
        });
        const colorBrightCtrl = folderPlasma.addColor(params, 'colorBright').name('Color Bright').onChange(() => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
            updateColors();
        });

        // Shell Folder
        const folderShell = gui.addFolder('Shell');
        const shellColorCtrl = folderShell.addColor(params, 'shellColor').name('Edge Color').onChange(() => {
            params.colorScheme = 'Custom';
            schemeController.updateDisplay();
            updateColors();
        });
        folderShell.add(params, 'shellOpacity', 0.0, 1.0).name('Edge Opacity').onChange(v => shellFrontMat.uniforms.uOpacity.value = v);

        // Rotation Folder
        const folderRot = gui.addFolder('Rotation');
        folderRot.add(params, 'rotationSpeedX', -0.01, 0.01).name('Speed X');
        folderRot.add(params, 'rotationSpeedY', -0.01, 0.01).name('Speed Y');

        // Interaction / Controls Folder
        const folderInteraction = gui.addFolder('Interaction');
        folderInteraction.add(controls, 'enableZoom').name('Enable Zoom');
        folderInteraction.add(controls, 'enablePan').name('Enable Pan');

        // Presets Change Handler
        schemeController.onChange(v => {
            if (v !== 'Custom') {
                const p = presets[v];
                params.colorDeep = p.colorDeep;
                params.colorMid = p.colorMid;
                params.colorBright = p.colorBright;
                params.shellColor = p.shellColor;
                params.backgroundColor = p.backgroundColor;

                colorDeepCtrl.updateDisplay();
                colorMidCtrl.updateDisplay();
                colorBrightCtrl.updateDisplay();
                shellColorCtrl.updateDisplay();
                bgController.updateDisplay();

                updateColors();
            }
        });

        // Initialize colors with default setup
        updateColors();

        // 6. ANIMATION LOOP
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            // Update uniforms
            plasmaMat.uniforms.uTime.value = t * params.timeScale; 
            pMat.uniforms.uTime.value = t;

            // Rotation
            plasmaMesh.rotation.y = t * 0.08;
            
            mainGroup.rotation.x += params.rotationSpeedX;
            mainGroup.rotation.y += params.rotationSpeedY;

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
