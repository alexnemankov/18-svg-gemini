<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 3D Periodic Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset & Fonts */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --padding: 1rem;
      --w: 3.5rem;
      --h: 4.2rem;
      --bg-color: #0a0512;
      --fg-color: #f0f0f5;
      --ui-bg-color: rgba(26, 15, 46, 0.8);
      --ui-active-color: #ff007f;
    }

    body {
      --header-height: 4rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100lvh;
      overflow: hidden;
      perspective: 1000px;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-color);
      color: var(--fg-color);
      transition: background-color 0.3s ease;
    }

    #scene {
      position: fixed;
      transform-style: preserve-3d;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      inset: 0;
      padding: var(--header-height) var(--padding);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #scene-content {
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    #scene-content[data-layout="table"] {
      display: grid;
      grid-template-columns: repeat(18, var(--w));
      grid-auto-rows: var(--h);
      gap: 0.25rem;
      place-content: center;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: row;
      flex-shrink: 1;
      position: fixed;
      z-index: 100;
      top: 0px;
      width: 100%;
      height: var(--header-height);
      padding: var(--padding);
    }

    .controls-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-direction: row;
      height: var(--header-height);
      gap: calc(var(--padding) * .5);
    }

    .controls button {
      background-color: var(--ui-bg-color);
      color: var(--fg-color);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 0.25rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }

    .controls button:hover {
      background-color: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .controls button.is-active {
      background-color: var(--ui-active-color);
      color: #fff;
      border-color: var(--ui-active-color);
    }

    .credits {
      text-align: center;
      position: fixed;
      z-index: 100;
      bottom: 0px;
      width: 100%;
      height: var(--header-height);
      padding: var(--padding);
      font-size: .75rem;
      color: var(--fg-color);
      opacity: 0.7;
    }

    .credits a {
      color: var(--ui-active-color);
      text-decoration: none;
      font-weight: bold;
    }

    .element {
      overflow: hidden;
      pointer-events: auto;
      --w: 3.5rem;
      --h: 4.2rem;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--color-3);
      background-color: var(--color-5);
      color: var(--color-1);
      width: var(--w);
      height: var(--h);
      border-radius: .25rem;
      padding: .25rem;
      transform-style: preserve-3d;
      z-index: 8;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
    }

    button.element:focus-visible,
    button.element:hover {
      border: 1px solid var(--color-1);
      background-color: var(--color-4);
      color: var(--color-1);
      outline: none;
      box-shadow: 0 0 10px var(--color-3);
    }

    .element.is-expanded {
      --w: 13rem;
      --h: 13rem;
      z-index: 99;
      padding: 1rem;
      align-items: flex-start;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .element-description {
      display: none;
      transform-style: preserve-3d;
      flex-direction: column;
      gap: .25rem;
      width: 100%;
      font-size: .625rem;
      text-transform: none;
      color: var(--color-1);
      justify-self: flex-end;
      margin-top: 1.5rem;
      text-align: left;
    }

    .element.is-expanded .element-description {
      display: block;
    }

    .element-symbol {
      transform-style: preserve-3d;
      margin-top: -.1rem;
      margin-bottom: .2rem;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .element.is-expanded .element-symbol {
      margin-top: 0;
      margin-bottom: 0;
      font-size: 1rem;
      text-align: left;
    }

    .element-title {
      transform-style: preserve-3d;
      font-size: .5rem;
      font-weight: 700;
      text-align: center;
    }

    .element.is-expanded .element-title {
      font-size: 1.5rem;
      text-align: left;
      margin-top: 1rem;
    }

    .element-number {
      transform-style: preserve-3d;
      font-size: .5rem;
      text-align: right;
      align-self: flex-end;
    }

    .element.is-expanded .element-number {
      position: absolute;
      font-size: 1rem;
      top: 1rem;
      right: 1rem;
    }

    #scene-content[data-layout="sphere"] .element,
    #scene-content[data-layout="helix"] .element,
    #scene-content[data-layout="grid"] .element {
      position: absolute;
      left: 50%;
      top: 50%;
      margin-left: calc(var(--w) * -.5);
      margin-top: calc(var(--h) * -.5);
    }

    #scene-content[data-layout="table"] .element.is-expanded {
      left: -1.625rem;
      top: -1.25rem;
      margin-left: calc(var(--w) * -.25);
      margin-top: calc(var(--h) * -.25);
      margin-right: calc(var(--w) * -.5);
      margin-bottom: calc(var(--h) * -.5);
    }

    /* CSS variable mappings for element color index groups (0-9) */
    .element[data-color="0"] {
      --color-1: var(--el-color-0-text);
      --color-3: var(--el-color-0-border);

    }

    /* lil-gui custom premium styling */

      --background-color: rgba(15, 15, 20, 0.85);
      --text-color: #e2e2e9;
      --title-background-color: #24242e;
      --widget-color: #333340;
      --hover-color: #4f4f60;

      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      padding: 6px;
      z-index: 1001;
    }
  </style>
</head>

      'No', 'Nobelium', 8, 16, 9, 259, null, 826.85, null,
      'Lr', 'Lawrencium', 8, 17, 9, 266, null, 1626.85, null,
    ];

    // Generate the table html
    const [ $sceneContent ] = utils.$('#scene-content');
    const [ $template ] = utils.$('#element');

    for (let i = 0, l = elements.length / ELEMENT_STRIDE; i < l; i += 1) {
      const offset = i * ELEMENT_STRIDE;
      const $el = $template.content.cloneNode(true);
      const $element = $el.querySelector('.element');
      const $number = $element.querySelector('.element-number');
      const $symbol = $element.querySelector('.element-symbol');
      const $title = $element.querySelector('.element-title');
      const $description = $element.querySelector('.element-description');
      $number.textContent = i + 1;
      $symbol.textContent = elements[offset + ELEMENT_FIELDS.SYMBOL];
      $title.textContent = elements[offset + ELEMENT_FIELDS.NAME];
      $element.dataset.color = elements[offset + ELEMENT_FIELDS.COLOR];
      $element.style.gridColumn = elements[offset + ELEMENT_FIELDS.COLUMN];
      $element.style.gridRow = elements[offset + ELEMENT_FIELDS.ROW];
      $description.innerHTML = [
        `Atomic mass: ${elements[offset + ELEMENT_FIELDS.ATOMIC_MASS]} u`,
        `Density: ${elements[offset + ELEMENT_FIELDS.DENSITY]} g/cm3`,
        `Melting: ${elements[offset + ELEMENT_FIELDS.MELTING_POINT]} &deg;C`,
        `Boiling: ${elements[offset + ELEMENT_FIELDS.BOILING_POINT]} &deg;C`,
      ].join('<br>');
      $sceneContent.appendChild($el);
    }

    const cards = utils.$('#scene-content .element');

    // Create the cards layout and register the font-size as an extra property for animation
    const elementsLayout = createLayout($sceneContent, {
      properties: ['font-size'],
      duration: 2000,
      ease: 'inOutExpo',
    });

    // Move the scene relative to the click & drag pointer movements
    const sceneAnimatable = createAnimatable('#scene', {
      rotateX: 200,
      rotateY: 200,
      translateX: 1000,
      translateY: 1000,
      translateZ: 2000,
      scale: 5
    });

    const camera = {
      rotX: 15, rotY: 20,
      targetRotX: 15, targetRotY: 20,
      panX: 0, panY: 0,
      targetPanX: 0, targetPanY: 0,
      zoom: 0,
      targetZoom: 0
    };

    // GUI Settings Object
    const settings = {
      greenScreen: false,
      colorScheme: 'Cyberpunk Neon',
      dpr: 1.0,
      animation: 'Slow Orbit',
      animationSpeed: 1.0
    };

    // Five popular and original preset color schemes
    const COLOR_SCHEMES = {

          ['#93a1a1', 'rgba(147, 161, 161, 0.5)', 'rgba(147, 161, 161, 0.15)', 'rgba(147, 161, 161, 0.35)'], // 7
          ['#eee8d5', 'rgba(238, 232, 213, 0.5)', 'rgba(238, 232, 213, 0.15)', 'rgba(238, 232, 213, 0.35)'], // 8
          ['#586e75', 'rgba(88, 110, 117, 0.5)', 'rgba(88, 110, 117, 0.15)', 'rgba(88, 110, 117, 0.35)']  // 9
        ]

    };

    function applyColorScheme() {
      const root = document.documentElement;
      
      // Determine background color
      const background = settings.greenScreen ? '#00ff00' : COLOR_SCHEMES[settings.colorScheme].bg;
      root.style.setProperty('--bg-color', background);
      
      const scheme = COLOR_SCHEMES[settings.colorScheme];
      root.style.setProperty('--fg-color', scheme.fg);
      root.style.setProperty('--ui-bg-color', scheme.uiBg);
      root.style.setProperty('--ui-active-color', scheme.uiActive);
      
      // Apply colors for groups 0-9
      scheme.groups.forEach((colors, idx) => {
        root.style.setProperty(`--el-color-${idx}-text`, colors[0]);
        root.style.setProperty(`--el-color-${idx}-border`, colors[1]);
        root.style.setProperty(`--el-color-${idx}-bg`, colors[2]);
        root.style.setProperty(`--el-color-${idx}-hover`, colors[3]);
      });

      // Update GUI dynamic focus color
      root.style.setProperty('--focus-color', scheme.uiActive);
    }

    // Initialize GUI settings
    const gui = new GUI({ title: 'Scene Settings' });
    
    gui.add(settings, 'greenScreen')
      .name('Green Screen')
      .onChange(applyColorScheme);

    gui.add(settings, 'colorScheme', Object.keys(COLOR_SCHEMES))
      .name('Color Scheme')
      .onChange(applyColorScheme);

    gui.add(settings, 'dpr', 0.5, 2.0, 0.1)
      .name('DPR (Pixel Ratio)');

    gui.add(settings, 'animation', ['Static', 'Slow Orbit', 'Gentle Float', 'Cinematic Depth', 'Spiral Ascent'])
      .name('Animation');

    gui.add(settings, 'animationSpeed', 0.1, 3.0, 0.1)
      .name('Anim Speed');

    applyColorScheme();

    // The different layout transforms
    const transformLayout = {
      table: () => {
        cards.forEach($el => {
          $el.style.opacity = 1;
          $el.style.transform = $el.classList.contains('is-expanded') ? 'translateZ(50px)' : 'translateZ(10px)';
        });
      },
      sphere: () => {
        const radius = 300;
        cards.forEach(($el, i) => {
          const offsetZ = $el.classList.contains('is-expanded') ? 20 : 0;
          const phi = Math.acos(-1 + (2 * i) / cards.length);
          const theta = Math.sqrt(cards.length * Math.PI) * phi;
          const sinPhi = Math.sin(phi);
          const x = radius * sinPhi * Math.cos(theta);
          const y = radius * Math.cos(phi);
          const z = radius * sinPhi * Math.sin(theta);
          const yaw = Math.atan2(x, z);
          const pitch = -Math.atan2(y, Math.hypot(x, z));
          $el.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateY(${yaw}rad) rotateX(${pitch}rad) translateZ(${offsetZ}px)`;
        });
      },
      helix: () => {
        const radius = 400;
        const thetaStep = 0.16;
        const verticalSpacing = 3;
        const yOffset = (cards.length * verticalSpacing) / 2;
        cards.forEach(($el, i) => {
          const offsetZ = $el.classList.contains('is-expanded') ? 20 : 0;
          const theta = i * thetaStep + Math.PI;
          const y = -(i * verticalSpacing) + yOffset;
          const x = radius * Math.sin(theta);
          const z = radius * Math.cos(theta);
          const yaw = Math.atan2(x, z);
          const pitch = -Math.atan2(y, Math.hypot(x, z) * 2);
          $el.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateY(${yaw}rad) rotateX(${pitch}rad) translateZ(${offsetZ}px)`;
        });
      },
      grid: () => {
        const cols = 5;
        const rows = 5;
        const colGap = 150;
        const rowGap = 100;
        const depthGap = 150;
        const perLayer = cols * rows;
        const layers = Math.ceil(cards.length / perLayer);
        cards.forEach(($el, i) => {
          const offsetZ = $el.classList.contains('is-expanded') ? 20 : 0;
          const col = i % cols;
          const row = Math.floor(i / cols) % rows;
          const layer = Math.floor(i / perLayer);
          const x = (col - (cols - 1) / 2) * colGap;
          const y = ((rows - 1) / 2 - row) * rowGap;
          const z = offsetZ + ((layer - (layers - 1) / 2) * depthGap);
          $el.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
        });
      },
      random: () => {
        utils.set(cards, { x: () => utils.random(-500, 500), y: () => utils.random(-500, 500), z: () => utils.random(-500, 500)})
      },
    };

    // Click & Drag to Rotate/Pan Scene
    let isDragging = false;
    let dragMode = 'rotate'; // 'rotate' or 'pan'
    let dragDistance = 0; // Track movement distance to ignore click events on drag release
    let startPointerX = 0;
    let startPointerY = 0;
    let startRotX = 0;
    let startRotY = 0;
    let startPanX = 0;
    let startPanY = 0;

    document.addEventListener('pointerdown', event => {
      // Disable drag if clicking controls, interactive cards, or GUI
      if (event.target.closest('.controls') || event.target.closest('.element') || event.target.closest('.lil-gui')) return;
      
      isDragging = true;
      dragDistance = 0;
      startPointerX = event.clientX;
      startPointerY = event.clientY;
      
      if (event.button === 2 || event.button === 1 || event.shiftKey) {
        dragMode = 'pan';
        startPanX = camera.targetPanX;
        startPanY = camera.targetPanY;
        document.body.style.cursor = 'move';
      } else {
        dragMode = 'rotate';
        startRotX = camera.targetRotX;
        startRotY = camera.targetRotY;
        document.body.style.cursor = 'grabbing';
      }
    });

    document.addEventListener('pointermove', event => {
      if (!isDragging) return;
      
      const deltaX = event.clientX - startPointerX;
      const deltaY = event.clientY - startPointerY;
      
      dragDistance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
      
      if (dragMode === 'rotate') {
        const sensitivity = 0.5; // Drag sensitivity (degrees per pixel)
        camera.targetRotX = startRotX - deltaY * sensitivity;
        camera.targetRotY = startRotY + deltaX * sensitivity;
        camera.targetRotX = Math.max(-85, Math.min(85, camera.targetRotX));
      } else {
        const sensitivity = 1.0;
        camera.targetPanX = startPanX + deltaX * sensitivity;
        camera.targetPanY = startPanY + deltaY * sensitivity;
      }
    });

    document.addEventListener('pointerup', () => {
      if (isDragging) {
        isDragging = false;
        document.body.style.cursor = '';
      }
    });

    // Prevent default context menu so right click drag works perfectly
    document.addEventListener('contextmenu', event => {
      if (!event.target.closest('.element') && !event.target.closest('.lil-gui')) {
        event.preventDefault();
      }
    });

    // Zoom with scroll wheel
    document.addEventListener('wheel', event => {
      if (event.target.closest('.controls') || event.target.closest('.lil-gui')) return;
      const zoomFactor = 1.5;
      camera.targetZoom -= event.deltaY * zoomFactor;
      // Clamp zoom to reasonable values
      camera.targetZoom = Math.max(-2000, Math.min(600, camera.targetZoom));
    }, { passive: true });

    // Handle toggles
    const toggles = utils.$('.controls button.toggle');

    document.addEventListener('click', event => {
      const $toggle = event.target.closest('.controls button.toggle');
      if ($toggle) {
        toggles.forEach(button => button.classList.remove('is-active'));
        $toggle.classList.add('is-active');
        const layoutType = $toggle.id;
        
        // Reset camera offset and set defaults when switching layouts
        camera.targetPanX = 0;
        camera.targetPanY = 0;
        camera.targetZoom = 0;

        if (layoutType === 'table') {
          camera.targetRotX = 15;
          camera.targetRotY = 20;
        } else if (layoutType === 'sphere') {
          camera.targetRotX = 20;
          camera.targetRotY = 45;
        } else if (layoutType === 'helix') {
          camera.targetRotX = 20;
          camera.targetRotY = 45;
        } else if (layoutType === 'grid') {
          camera.targetRotX = 10;
          camera.targetRotY = 30;
        }

        elementsLayout.update(() => {
          cards.forEach($el => $el.classList.remove('is-expanded'));
          $sceneContent.dataset.layout = layoutType;
          transformLayout[layoutType]();
        }, {
          delay: stagger([0, 750], { from: 'random' })
        });
        return;
      }
      
      // Suppress card expand if dragging
      if (dragDistance > 6) {
        dragDistance = 0;
        return;
      }

      const $card = event.target.closest('#scene-content .element');
      const shouldExpand = $card && !$card.classList.contains('is-expanded');
      elementsLayout.update(() => {
        cards.forEach($el => $el.classList.remove('is-expanded'));
        if (shouldExpand) $card.classList.add('is-expanded');
        transformLayout[$sceneContent.dataset.layout]();
      },{
        ease: spring({ bounce: .2, duration: 350 }),
      });
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        const hasExpandedCard = cards.some($el => $el.classList.contains('is-expanded'));
        if (!hasExpandedCard) return;
        elementsLayout.update(() => {
          cards.forEach($el => $el.classList.remove('is-expanded'));
          transformLayout[$sceneContent.dataset.layout]();
        },{
          ease: spring({ bounce: .3, duration: 350 }),
        });
      }
    });

    // Key to toggle UI visibility
    let uiVisible = true;
    document.addEventListener('keydown', event => {
      if (event.key.toLowerCase() === 'h') {
        uiVisible = !uiVisible;
        const ctrls = document.querySelector('.controls');
        const creds = document.querySelector('.credits');
        const guiEl = document.querySelector('.lil-gui');
        
        if (ctrls) ctrls.style.display = uiVisible ? 'flex' : 'none';
        if (creds) creds.style.display = uiVisible ? 'block' : 'none';
        if (guiEl) guiEl.style.display = uiVisible ? 'block' : 'none';
      }
    });

    // Dynamic camera animation & Lerping in loop
    let animTime = 0;

    createTimer({
      onUpdate: (time, delta) => {
        const speed = settings.animationSpeed;
        animTime += (delta / 1000) * speed;

        let autoRotX = 0;
        let autoRotY = 0;
        let autoPanX = 0;
        let autoPanY = 0;
        let autoZoom = 0;

        switch (settings.animation) {
          case 'Slow Orbit':
            autoRotY = animTime * 10;
            break;
          case 'Gentle Float':
            autoRotY = Math.sin(animTime * 0.4) * 15;
            autoRotX = Math.cos(animTime * 0.3) * 8;
            break;
          case 'Cinematic Depth':
            autoRotY = animTime * 5;
            autoZoom = Math.sin(animTime * 0.5) * 150;
            break;
          case 'Spiral Ascent':
            autoRotY = animTime * 8;
            autoPanY = Math.sin(animTime * 0.4) * 80;
            break;
          case 'Static':
          default:
            break;
        }

        // Apply lerp
        camera.rotX = utils.lerp(camera.rotX, camera.targetRotX, .1);
        camera.rotY = utils.lerp(camera.rotY, camera.targetRotY, .1);
        camera.panX = utils.lerp(camera.panX, camera.targetPanX, .1);
        camera.panY = utils.lerp(camera.panY, camera.targetPanY, .1);
        camera.zoom = utils.lerp(camera.zoom, camera.targetZoom, .1);

        // Apply transformations
        sceneAnimatable.rotateX(camera.rotX + autoRotX);
        sceneAnimatable.rotateY(camera.rotY + autoRotY);
        sceneAnimatable.translateX(camera.panX + autoPanX);
        sceneAnimatable.translateY(camera.panY + autoPanY);
        sceneAnimatable.translateZ(camera.zoom + autoZoom);
        sceneAnimatable.scale(settings.dpr);
      }
    });

    // Intro animation
    transformLayout.random();
    utils.set(cards, { opacity: 0 });
    camera.targetRotX = 15;
    camera.targetRotY = 20;
    elementsLayout.update(() => transformLayout.table(), {
      delay: stagger([0, 750], { from: 'random' })
    });
  </script>
