<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>95 - Particle Flow Web</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      user-select: none;
      background-color: #0a0b1e;
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }
    /* Style customisations for lil-gui to look modern and premium */
    .lil-gui {
      --background-color: rgba(20, 20, 25, 0.9);
      --text-color: #e0e0e0;
      --title-background-color: #2c2c35;
      --widget-color: #3c3c45;
      --hover-color: #5c5c65;
      --focus-color: #ff007f;
      --number-color: #00d2ff;
      --string-color: #a3e289;
      font-family: inherit;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<script type="module">
  import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

  // Vector Class implementation with support for dimensions, angle, rotation and length manipulation
  class Vector {
    constructor(x = 0, y = 0) {
      this.x = x;
      this.y = y;
    }
    get width() { return this.x; }
    set width(val) { this.x = val; }
    get height() { return this.y; }
    set height(val) { this.y = val; }
    
    clone() {
      return new Vector(this.x, this.y);
    }
    
    add(v) {
      this.x += v.x;
      this.y += v.y;
      return this;
    }
    
    subtract(v) {
      this.x -= v.x;
      this.y -= v.y;
      return this;
    }
    
    subtractNew(v) {
      return new Vector(this.x - v.x, this.y - v.y);
    }
    
    multiplyScalarNew(s) {
      return new Vector(this.x * s, this.y * s);
    }
    
    scale(s) {
      this.x *= s;
      this.y *= s;
      return this;
    }
    
    get lengthSquared() {
      return this.x * this.x + this.y * this.y;
    }
    
    get length() {
      return Math.sqrt(this.lengthSquared);
    }
    
    set length(val) {
      let len = this.length;
      if (len !== 0) {
        this.scale(val / len);
      } else {
        this.x = val;
        this.y = 0;
      }
    }
    
    get angle() {
      return Math.atan2(this.y, this.x);
    }
    
    rotate(angle) {
      let cos = Math.cos(angle);
      let sin = Math.sin(angle);
      let x = this.x * cos - this.y * sin;
      let y = this.x * sin + this.y * cos;
      this.x = x;
      this.y = y;
      return this;
    }
    
    resetToVector(v) {
      this.x = v.x;
      this.y = v.y;
      return this;
    }
  }

  // Smoothstep utility
  const smoothstep = function(edge0, edge1, x) {
    let t = (x - edge0) / (edge1 - edge0);
    t =  Math.min(Math.max(t, 0), 1);
    return t * t * (3.0 - 2.0 * t);
  }

  // Color with opacity helper supporting both Hex and HSL strings
  function colorWithOpacity(color, alpha) {
    if (color.startsWith('hsl')) {
      if (color.startsWith('hsla')) {
        return color.replace(/[^,]+(?=\s*\)$)/, ` ${alpha}`);
      }
      return color.replace('hsl', 'hsla').replace(')', `, ${alpha})`);
    }
    let hex = color.replace('#', '');
    if (hex.length === 3) {
      hex = hex.split('').map(c => c + c).join('');
    }
    const r = parseInt(hex.substring(0, 2), 16);
    const g = parseInt(hex.substring(2, 4), 16);
    const b = parseInt(hex.substring(4, 6), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }

  // Preset Theme Schemes
  const presets = {
    'Dark Nebula': {
      particleColor: '#00d2ff',
      linkColor: '#ff007f',
      backgroundColor: '#0a0b1e'
    },
    'Matrix Digital': {
      particleColor: '#39ff14',
      linkColor: '#008f11',
      backgroundColor: '#000000'
    },
    'Gold Alchemy': {
      particleColor: '#ffd700',
      linkColor: '#ff8c00',
      backgroundColor: '#1a1a1a'
    },
    'Sunset Flare': {
      particleColor: '#ff4500',
      linkColor: '#ffaa00',
      backgroundColor: '#1c0505'
    },
    'Cyberpunk Dream': {
      particleColor: '#ff0055',
      linkColor: '#00ffcc',
      backgroundColor: '#0f051d'
    },
    'Custom': {
      particleColor: '#00d2ff',
      linkColor: '#ff007f',
      backgroundColor: '#0a0b1e'
    }
  };

  // GUI/System Settings
  const settings = {
    preset: 'Dark Nebula',
    particleColor: '#00d2ff',
    linkColor: '#ff007f',
    backgroundColor: '#0a0b1e',
    greenscreen: false,
    animation: 'Camera Spin',
    particleCount: Math.round(window.innerWidth * window.innerHeight * .00008),
    particleSize: 50,
    connectionRange: 200,
    speedLimit: 5.0,
    friction: 0.995,
    repulsionForce: 5000.0,
    interactionForce: 20000.0
  };

  // Storing manual user configurations to restore them on animation changes
  const userSettings = {
    particleSize: settings.particleSize,
    connectionRange: settings.connectionRange,
    particleColor: settings.particleColor,
    linkColor: settings.linkColor,
    scale: 1.0,
    offsetX: 0.0,
    offsetY: 0.0
  };

  class Particle {
    constructor(position, velocity) {
      this._canvas = document.createElement('canvas');
      this.canvas.width = this.dimensions.width + 2;
      this.canvas.height = this.dimensions.height + 2;
      this.ctx = this.canvas.getContext('2d');
      
      this.position = position;
      this.velocity = velocity;
      
      this.render();
    }
    
    render() {
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.ctx.beginPath();
      this.ctx.lineWidth = 1.;
      this.ctx.strokeStyle = settings.particleColor;
      this.ctx.arc(this.halfDims.width + 1, this.halfDims.height + 1, this.halfDims.width, 0, 2 * Math.PI);
      this.ctx.stroke();
      this.ctx.closePath();
      this.ctx.beginPath();
      this.ctx.arc(this.halfDims.width + 1, this.halfDims.height + 1, this.halfDims.width - this.ringWidth, 0, 2 * Math.PI);
      this.ctx.stroke();
    }
    
    solve() {
      const acceleration = new Vector(0,0);
      let l = mousepos.subtractNew(this.position);
      let sqD = l.lengthSquared;
      let d = Math.sqrt(sqD);
      if (d > 0) {
        let force = settings.repulsionForce / (sqD * d);
        force *= smoothstep(300, 0, d);
        acceleration.subtract(l.scale(force));
      }
      
      this.render();
      
      const checkParticle = (particle) => {
        const l = particle.position.subtractNew(this.position);
        const sqD = l.lengthSquared;
        d = Math.sqrt(sqD);
        if (d === 0) return;
        
        const force = (settings.interactionForce / d) / (sqD * d);
        
        if(d < settings.connectionRange) {
          let a = smoothstep(settings.connectionRange, 50, d) * 0.5;
          const s = this.position.clone();
          const offset = new Vector(this.halfDims.width - 5., 0).rotate(l.angle);
          s.add(offset);
          this.controller.ctx.beginPath();
          this.controller.ctx.moveTo(s.x, s.y);
          this.controller.ctx.strokeStyle = colorWithOpacity(settings.linkColor, a);
          s.resetToVector(particle.position);
          s.subtract(offset);
          this.controller.ctx.lineTo(s.x, s.y);
          this.controller.ctx.stroke();
          
          a = smoothstep(settings.connectionRange, 50, d);
          this.ctx.beginPath();
          this.ctx.strokeStyle = colorWithOpacity(settings.particleColor, a);
          this.ctx.lineWidth = this.ringWidth;
          this.ctx.arc(this.halfDims.width + 1, this.halfDims.height + 1, this.halfDims.width - this.ringWidth * 0.5, l.angle - a, l.angle + a);
          this.ctx.stroke();
        }
        
        acceleration.subtract(l.scale(force));
      }
      
      this.controller.particles.forEach((particle) => {
        if(particle === this) return;
        checkParticle(particle);
      });
      
      this.velocity.add(acceleration);
      if(this.velocity.length > settings.speedLimit) this.velocity.length = settings.speedLimit;
      this.velocity.scale(settings.friction);
      
      this.position.add(this.velocity);
      
      const wrapOffset = this.dimensions.x * 4;
      if(this.position.x > this.controller.dimensions.x + wrapOffset) {
        this.position.x = -this.dimensions.x;
      } else if(this.position.x < -wrapOffset) {
        this.position.x = this.controller.dimensions.x + this.dimensions.x;
      }
      if(this.position.y > this.controller.dimensions.y + wrapOffset) {
        this.position.y = -this.dimensions.y;
      } else if(this.position.y < -wrapOffset) {
        this.position.y = this.controller.dimensions.y + this.dimensions.y;
      }
    }
    
    get canvas() {
      return this._canvas;
    }
    
    set position(value) {
      if(value instanceof Vector) {
        this._position = value;
      }
    }
    get position() {
      if(!(this._position instanceof Vector)) this.position = new Vector(0,0);
      return this._position;
    }
    
    set velocity(value) {
      if(value instanceof Vector) {
        this._velocity = value;
      }
    }
    get velocity() {
      if(!(this._velocity instanceof Vector)) this.velocity = new Vector(0,0);
      return this._velocity;
    }
    
    set dimensions(value) {
      if(value instanceof Vector) {
        this._dimensions = value;
        this._halfDims = value.multiplyScalarNew(0.5);
        this.canvas.width = value.width + 2;
        this.canvas.height = value.height + 2;
      }
    }
    get dimensions() {
      if(!(this._dimensions instanceof Vector)) this.dimensions = new Vector(50,50);
      return this._dimensions;
    }
    get halfDims() {
      return this._halfDims
    }
    
    get ringWidth() {
      return 10;
    }
  }

  class Stage {
    constructor(w, h) {
      this._canvas = document.createElement('canvas');
      this.resize(w, h);
      this.ctx = this.canvas.getContext('2d');
      
      this.scale = 1.0;
      this.offsetX = 0.0;
      this.offsetY = 0.0;
      this.isDragging = false;
      this.dragStart = { x: 0, y: 0 };
      this.draggedParticle = null;
      
      this.run = this.run.bind(this);
    }
    
    run() {
      if(this.running === true) requestAnimationFrame(this.run);
      this.render();
    }
    
    render() {
      time += 0.01;
      
      applyAnimationEffects();
      
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      
      // Draw background colors or greenscreen
      if (settings.greenscreen) {
        this.ctx.fillStyle = '#00ff00';
      } else {
        this.ctx.fillStyle = settings.backgroundColor;
      }
      this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
      
      this.ctx.save();
      this.ctx.translate(this.offsetX, this.offsetY);
      this.ctx.scale(this.scale, this.scale);
      
      this.particles.forEach((particle) => {
        particle.solve();
        const pos = particle.position.subtractNew(particle.halfDims);
        this.ctx.drawImage(particle.canvas, pos.x, pos.y);
      });
      
      this.ctx.restore();
    }
    
    resize(w, h) {
      this.dimensions = new Vector(w, h);
    }
    
    addParticle(particle) {
      if(particle instanceof Particle && particle.controller !== this) {
        if(particle.controller) particle.controller.removeParticle(particle);
        particle.controller = this;
        this.particles.push(particle);
      }
    }
    removeParticle(particle) {
      this.particles.forEach((_particle, i) => {
        if(_particle === particle) this.particles.splice(i, 1);
      });
    }
    
    set dimensions(value) {
      if(value instanceof Vector) {
        this._dimensions = value;
        this._halfDims = value.multiplyScalarNew(0.5);
        this.canvas.width = this.dimensions.width;
        this.canvas.height = this.dimensions.height;
      }
    }
    get dimensions() {
      if(!(this._dimensions instanceof Vector)) this.dimensions = new Vector(50,50);
      return this._dimensions;
    }
    get halfDims() {
      return this._halfDims
    }
    
    get canvas() {
      return this._canvas;
    }
    
    get particles() {
      if(!this._particles) this._particles = [];
      return this._particles;
    }
    
    set running(value) {
      if(this.running === false && value === true) {
        this._running = true;
        requestAnimationFrame(this.run);
      }
    }
    get running() {
      return this._running === true;
    }
  }

  // Animation variables
  let time = 0;

  const app = new Stage(window.innerWidth, window.innerHeight);
  document.body.appendChild(app.canvas);

  const mousepos = new Vector(-1000, 0);

  // Initialize particles
  rebuildParticles();

  function rebuildParticles() {
    app.particles.length = 0;
    for(let i = 0; i < settings.particleCount; i++) {
      const p = new Particle(
        new Vector(Math.random() * window.innerWidth, Math.random() * window.innerHeight),
        new Vector(0,0)
      );
      p.dimensions = new Vector(settings.particleSize, settings.particleSize);
      app.addParticle(p);
    }
  }

  function updateParticleSizes() {
    app.particles.forEach(p => {
      p.dimensions = new Vector(settings.particleSize, settings.particleSize);
    });
  }

  // Input interactions: drag & zoom
  window.addEventListener('pointerdown', e => {
    const worldX = (e.clientX - app.offsetX) / app.scale;
    const worldY = (e.clientY - app.offsetY) / app.scale;
    const clickPos = new Vector(worldX, worldY);
    
    let closestParticle = null;
    let minD = Infinity;
    
    app.particles.forEach(p => {
      const d = clickPos.subtractNew(p.position).length;
      if (d < minD) {
        minD = d;
        closestParticle = p;
      }
    });
    
    // Drag particle if clicked near it
    if (minD < 40) {
      app.draggedParticle = closestParticle;
    } else {
      app.isDragging = true;
      app.dragStart.x = e.clientX;
      app.dragStart.y = e.clientY;
    }
  });

  window.addEventListener('pointermove', e => {
    const worldX = (e.clientX - app.offsetX) / app.scale;
    const worldY = (e.clientY - app.offsetY) / app.scale;
    
    mousepos.x = worldX;
    mousepos.y = worldY;
    
    if (app.draggedParticle) {
      app.draggedParticle.position.x = worldX;
      app.draggedParticle.position.y = worldY;
      app.draggedParticle.velocity.scale(0); // Stop movement during drag
    } else if (app.isDragging) {
      const dx = e.clientX - app.dragStart.x;
      const dy = e.clientY - app.dragStart.y;
      userSettings.offsetX += dx;
      userSettings.offsetY += dy;
      
      // Update real offsets if current animation allows it
      if (['None', 'Liquid Wave', 'Gravity Swarm', 'Pulse & Expand'].includes(settings.animation)) {
        app.offsetX = userSettings.offsetX;
        app.offsetY = userSettings.offsetY;
      }
      
      app.dragStart.x = e.clientX;
      app.dragStart.y = e.clientY;
    }
  });

  window.addEventListener('pointerup', () => {
    app.draggedParticle = null;
    app.isDragging = false;
  });

  window.addEventListener('pointercancel', () => {
    app.draggedParticle = null;
    app.isDragging = false;
  });

  // Wheel zoom centered on pointer location
  window.addEventListener('wheel', e => {
    e.preventDefault();
    const zoomFactor = 1.1;
    let newScale = userSettings.scale;
    
    if (e.deltaY < 0) {
      newScale *= zoomFactor;
    } else {
      newScale /= zoomFactor;
    }
    
    newScale = Math.min(Math.max(newScale, 0.1), 10);
    
    const mouseX = e.clientX;
    const mouseY = e.clientY;
    
    userSettings.offsetX = mouseX - (mouseX - userSettings.offsetX) * (newScale / userSettings.scale);
    userSettings.offsetY = mouseY - (mouseY - userSettings.offsetY) * (newScale / userSettings.scale);
    userSettings.scale = newScale;
    
    if (['None', 'Liquid Wave', 'Gravity Swarm', 'Pulse & Expand'].includes(settings.animation)) {
      app.scale = userSettings.scale;
      app.offsetX = userSettings.offsetX;
      app.offsetY = userSettings.offsetY;
    }
  }, { passive: false });

  // Handle screen resize
  window.addEventListener('resize', () => {
    app.resize(window.innerWidth, window.innerHeight);
  });

  // Animation controller logic
  function applyAnimationEffects() {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    
    if (settings.animation === 'None') return;
    
    if (settings.animation === 'Camera Spin') {
      if (!app.isDragging && !app.draggedParticle) {
        const angle = time * 0.4;
        const zoom = userSettings.scale * (1.0 + Math.sin(time * 0.5) * 0.15);
        app.scale = zoom;
        app.offsetX = userSettings.offsetX + (cx - cx * zoom + Math.cos(angle) * 100);
        app.offsetY = userSettings.offsetY + (cy - cy * zoom + Math.sin(angle) * 100);
      }
    } else if (settings.animation === 'Liquid Wave') {
      const ax = cx + Math.cos(time * 1.5) * (window.innerWidth * 0.25);
      const ay = cy + Math.sin(time * 1.0) * (window.innerHeight * 0.25);
      mousepos.x = ax;
      mousepos.y = ay;
    } else if (settings.animation === 'Pulse & Expand') {
      const sizePulse = userSettings.particleSize + Math.sin(time * 3.0) * 15;
      settings.particleSize = Math.max(10, sizePulse);
      updateParticleSizes();
      
      const rangePulse = userSettings.connectionRange + Math.sin(time * 1.5) * 60;
      settings.connectionRange = Math.max(20, rangePulse);
    } else if (settings.animation === 'Gravity Swarm') {
      const gravityStrength = Math.sin(time * 1.0);
      app.particles.forEach(p => {
        const toCenter = new Vector(cx, cy).subtractNew(p.position);
        const d = toCenter.length;
        if (d > 10) {
          p.velocity.add(toCenter.scale(gravityStrength * 0.002));
        }
      });
    } else if (settings.animation === 'Color Cycle') {
      const hue = (time * 15) % 360;
      settings.particleColor = `hsl(${hue}, 80%, 55%)`;
      settings.linkColor = `hsl(${(hue + 80) % 360}, 75%, 50%)`;
      
      if (!app.isDragging && !app.draggedParticle) {
        app.offsetX = userSettings.offsetX + Math.sin(time * 0.4) * 60;
        app.offsetY = userSettings.offsetY + Math.cos(time * 0.3) * 40;
        app.scale = userSettings.scale;
      }
    }
  }

  // Restore variables when switching animation presets
  function onAnimationChange(val) {
    if (val !== 'Pulse & Expand') {
      settings.particleSize = userSettings.particleSize;
      settings.connectionRange = userSettings.connectionRange;
      updateParticleSizes();
    }
    if (val !== 'Color Cycle') {
      settings.particleColor = userSettings.particleColor;
      settings.linkColor = userSettings.linkColor;
    }
    if (['None', 'Liquid Wave', 'Gravity Swarm', 'Pulse & Expand'].includes(val)) {
      app.scale = userSettings.scale;
      app.offsetX = userSettings.offsetX;
      app.offsetY = userSettings.offsetY;
    }
  }

  // Change preset palette
  function applyPreset(presetName) {
    const p = presets[presetName];
    if (p) {
      settings.particleColor = p.particleColor;
      settings.linkColor = p.linkColor;
      settings.backgroundColor = p.backgroundColor;
      
      particleColorController.setValue(p.particleColor);
      linkColorController.setValue(p.linkColor);
      backgroundColorController.setValue(p.backgroundColor);
      
      userSettings.particleColor = p.particleColor;
      userSettings.linkColor = p.linkColor;
    }
  }

  // GUI configuration
  const gui = new GUI({ title: 'Visual Settings' });

  const themeFolder = gui.addFolder('Theme & Color');
  const presetController = themeFolder.add(settings, 'preset', Object.keys(presets)).name('Color Preset').onChange(applyPreset);
  const particleColorController = themeFolder.addColor(settings, 'particleColor').name('Particle Color').onChange(val => {
    userSettings.particleColor = val;
    settings.preset = 'Custom';
    presetController.updateDisplay();
  });
  const linkColorController = themeFolder.addColor(settings, 'linkColor').name('Link Color').onChange(val => {
    userSettings.linkColor = val;
    settings.preset = 'Custom';
    presetController.updateDisplay();
  });
  const backgroundColorController = themeFolder.addColor(settings, 'backgroundColor').name('Background Color').onChange(() => {
    settings.preset = 'Custom';
    presetController.updateDisplay();
  });
  themeFolder.add(settings, 'greenscreen').name('Enable Greenscreen');

  const animFolder = gui.addFolder('Animation');
  animFolder.add(settings, 'animation', ['None', 'Camera Spin', 'Liquid Wave', 'Pulse & Expand', 'Gravity Swarm', 'Color Cycle']).name('Select Animation').onChange(onAnimationChange);

  const configFolder = gui.addFolder('Simulation Params');
  configFolder.add(settings, 'particleCount', 10, 500, 1).name('Particle Count').onChange(rebuildParticles);
  configFolder.add(settings, 'particleSize', 10, 150, 1).name('Particle Size').onChange(val => {
    userSettings.particleSize = val;
    updateParticleSizes();
  });
  configFolder.add(settings, 'connectionRange', 50, 600, 10).name('Connection Dist').onChange(val => {
    userSettings.connectionRange = val;
  });
  configFolder.add(settings, 'speedLimit', 1.0, 15.0, 0.5).name('Max Speed');
  configFolder.add(settings, 'friction', 0.9, 1.0, 0.001).name('Friction');
  configFolder.add(settings, 'repulsionForce', 1000, 20000, 500).name('Pointer Repulsion');
  configFolder.add(settings, 'interactionForce', 5000, 50000, 1000).name('Inter-particle Rep');

  // Start stage loop
  app.running = true;

  // Toggle UI visibility with 'H' key
  window.addEventListener('keydown', e => {
    if (e.key === 'h' || e.key === 'H') {
      const guiEl = document.querySelector('.lil-gui');
      if (guiEl) {
        guiEl.style.display = guiEl.style.display === 'none' ? '' : 'none';
      }
    }
  });

</script>

</body>
</html>
