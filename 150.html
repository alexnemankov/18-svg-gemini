<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Particulate - Shatter Images into Color</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		@import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap");

		body {
			width: 100vw;
			height: 100vh;
			overflow: hidden;
			background: #08080c;
			font-family: "Inter", system-ui, sans-serif;
			color: #fff;
			user-select: none;
			transition: background-color 0.3s ease;
		}

		canvas#main {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 1;
			cursor: none;
		}

		.cursor {
			position: fixed;
			z-index: 100;
			pointer-events: none;
			width: 40px;
			height: 40px;
			margin: -20px 0 0 -20px;
			border-radius: 50%;
			border: 1.5px solid rgba(255, 255, 255, 0.35);
			transition: width 0.3s, height 0.3s, margin 0.3s, border-color 0.3s,
				background 0.3s;
			mix-blend-mode: difference;
		}

		.cursor.blow {
			width: 120px;
			height: 120px;
			margin: -60px 0 0 -60px;
			border-color: rgba(255, 255, 255, 0.15);
			background: rgba(255, 255, 255, 0.03);
		}

		.cursor.magnet {
			width: 80px;
			height: 80px;
			margin: -40px 0 0 -40px;
			border-color: rgba(255, 200, 100, 0.4);
			background: rgba(255, 200, 100, 0.05);
		}

		/* ===== UI OVERLAY ===== */
		.ui {
			position: fixed;
			z-index: 10;
			width: 100%;
			height: 100%;
			display: flex;
			flex-direction: column;
			justify-content: space-between;
			align-items: center;
			pointer-events: none;
			padding: 28px 24px 24px;
		}

		.top {
			text-align: center;
			pointer-events: auto;
		}

		.brand {
			font-size: clamp(1.8rem, 5vw, 3.4rem);
			font-weight: 900;
			letter-spacing: -1.5px;
			line-height: 1;
			margin-bottom: 4px;
			background: linear-gradient(135deg, #fff 20%, rgba(255, 255, 255, 0.35));
			-webkit-background-clip: text;
			background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.tagline {
			font-size: clamp(0.7rem, 1.6vw, 0.88rem);
			font-weight: 300;
			opacity: 0.4;
			letter-spacing: 0.6px;
			margin-bottom: 18px;
		}

		.tools {
			display: flex;
			gap: 6px;
			justify-content: center;
			flex-wrap: wrap;
			pointer-events: auto;
		}

		.tool {
			padding: 8px 16px;
			border-radius: 22px;
			border: 1px solid rgba(255, 255, 255, 0.1);
			background: rgba(255, 255, 255, 0.03);
			color: rgba(255, 255, 255, 0.55);
			font-size: 0.75rem;
			font-weight: 600;
			font-family: inherit;
			cursor: pointer;
			transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
			letter-spacing: 0.3px;
			backdrop-filter: blur(8px);
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.tool:hover {
			background: rgba(255, 255, 255, 0.1);
			color: #fff;
			transform: translateY(-2px);
			box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
		}

		.tool.active {
			background: rgba(255, 255, 255, 0.88);
			color: #111;
			border-color: transparent;
			font-weight: 800;
		}

		.tool svg {
			width: 14px;
			height: 14px;
		}

		.upload-wrap {
			position: relative;
			overflow: hidden;
		}

		.upload-wrap input {
			position: absolute;
			inset: 0;
			opacity: 0;
			cursor: pointer;
			font-size: 0;
		}

		/* ===== BOTTOM ===== */
		.bottom {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 12px;
			pointer-events: auto;
			width: 100%;
			max-width: 680px;
		}

		.info-bar {
			display: flex;
			gap: 16px;
			align-items: center;
			font-size: 0.6rem;
			opacity: 0.3;
			letter-spacing: 1.5px;
			font-family: "SF Mono", "Fira Code", monospace;
			text-transform: uppercase;
			transition: opacity 0.3s;
		}

		/* PALETTE */
		.palette-dock {
			display: flex;
			align-items: center;
			gap: 4px;
			padding: 10px 14px;
			width: 100%;
			background: rgba(0, 0, 0, 0.55);
			backdrop-filter: blur(28px);
			border: 1px solid rgba(255, 255, 255, 0.05);
			border-radius: 20px;
			box-shadow: 0 16px 56px rgba(0, 0, 0, 0.5);
			justify-content: center;
			min-height: 70px;
			transition: all 0.4s;
		}

		.palette-dock:hover {
			border-color: rgba(255, 255, 255, 0.1);
			box-shadow: 0 16px 56px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
		}

		.pal-color {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 4px;
			flex: 1;
			max-width: 90px;
			min-width: 0;
			cursor: pointer;
			transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
		}

		.pal-color:hover {
			transform: translateY(-6px) scale(1.05);
		}

		.pal-swatch {
			width: 100%;
			aspect-ratio: 1;
			border-radius: 12px;
			border: 2px solid rgba(255, 255, 255, 0.06);
			transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
			position: relative;
			overflow: hidden;
		}

		.pal-swatch::after {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(
				135deg,
				rgba(255, 255, 255, 0.15) 0%,
				transparent 50%
			);
			border-radius: 10px;
			opacity: 0;
			transition: opacity 0.3s;
		}

		.pal-color:hover .pal-swatch::after {
			opacity: 1;
		}

		.pal-color:hover .pal-swatch {
			border-color: rgba(255, 255, 255, 0.2);
			box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
		}

		.pal-hex {
			font-size: 0.52rem;
			font-weight: 700;
			letter-spacing: 0.5px;
			opacity: 0.5;
			font-family: "SF Mono", "Fira Code", monospace;
			transition: opacity 0.3s;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			max-width: 100%;
		}

		.pal-pct {
			font-size: 0.45rem;
			opacity: 0.3;
			font-weight: 400;
		}

		.pal-color:hover .pal-hex {
			opacity: 1;
		}

		.pal-empty .pal-swatch {
			background: rgba(255, 255, 255, 0.02) !important;
			border-style: dashed;
			border-color: rgba(255, 255, 255, 0.07);
		}

		.dock-actions {
			display: flex;
			flex-direction: column;
			gap: 4px;
			margin-left: 6px;
			flex-shrink: 0;
		}

		.dock-btn {
			width: 32px;
			height: 32px;
			border-radius: 9px;
			border: 1px solid rgba(255, 255, 255, 0.06);
			background: rgba(255, 255, 255, 0.02);
			color: rgba(255, 255, 255, 0.4);
			font-size: 0.7rem;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all 0.3s;
			font-family: inherit;
		}

		.dock-btn:hover {
			background: rgba(255, 255, 255, 0.08);
			color: #fff;
			transform: scale(1.1);
		}

		.hint {
			font-size: 0.62rem;
			opacity: 0.2;
			font-weight: 300;
			letter-spacing: 1px;
			text-transform: uppercase;
		}

		/* ===== DROP ZONE ===== */
		.dropzone {
			position: fixed;
			inset: 0;
			z-index: 200;
			background: rgba(0, 0, 0, 0.85);
			backdrop-filter: blur(20px);
			display: none;
			align-items: center;
			justify-content: center;
			flex-direction: column;
			gap: 16px;
		}

		.dropzone.active {
			display: flex;
		}

		.dropzone-ring {
			width: 160px;
			height: 160px;
			border-radius: 50%;
			border: 2px dashed rgba(255, 255, 255, 0.2);
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 2.5rem;
			animation: dzPulse 2s ease-in-out infinite;
		}

		@keyframes dzPulse {
			0%,
			100% {
				transform: scale(1);
				border-color: rgba(255, 255, 255, 0.15);
			}

			50% {
				transform: scale(1.05);
				border-color: rgba(255, 255, 255, 0.3);
			}
		}

		.dropzone p {
			font-size: 0.9rem;
			opacity: 0.5;
			font-weight: 300;
			letter-spacing: 0.5px;
		}

		/* ===== TOAST ===== */
		.toast {
			position: fixed;
			bottom: 130px;
			left: 50%;
			transform: translateX(-50%) translateY(20px) scale(0.95);
			background: rgba(0, 0, 0, 0.6);
			backdrop-filter: blur(16px);
			border: 1px solid rgba(255, 255, 255, 0.07);
			padding: 10px 22px;
			border-radius: 14px;
			font-size: 0.78rem;
			font-weight: 600;
			opacity: 0;
			transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
			z-index: 50;
			pointer-events: none;
			letter-spacing: 0.2px;
		}

		.toast.show {
			opacity: 1;
			transform: translateX(-50%) translateY(0) scale(1);
		}

		/* ===== LOADING ===== */
		.loading {
			position: fixed;
			inset: 0;
			z-index: 300;
			background: rgba(8, 8, 12, 0.95);
			display: none;
			align-items: center;
			justify-content: center;
			flex-direction: column;
			gap: 12px;
		}

		.loading.active {
			display: flex;
		}

		.loading-spinner {
			width: 40px;
			height: 40px;
			border-radius: 50%;
			border: 3px solid rgba(255, 255, 255, 0.1);
			border-top-color: rgba(255, 255, 255, 0.6);
			animation: spin 0.8s linear infinite;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}

		.loading p {
			font-size: 0.8rem;
			opacity: 0.4;
			font-weight: 300;
		}

		@media (max-width: 600px) {
			.pal-swatch {
				border-radius: 9px;
			}

			.palette-dock {
				padding: 8px 10px;
				border-radius: 16px;
				gap: 3px;
			}

			.pal-hex {
				font-size: 0.45rem;
			}

			.pal-pct {
				display: none;
			}

			.ui {
				padding: 16px 12px 16px;
			}

			.tools {
				gap: 4px;
			}

			.tool {
				padding: 7px 12px;
				font-size: 0.68rem;
			}
		}
	</style>
</head>
<body>
	<canvas id="main"></canvas>
	<div class="cursor" id="cursor"></div>

	<div class="ui">
		<div class="top">
			<h1 class="brand">Particulate</h1>
			<p class="tagline">Shatter images into color. Collect the pieces.</p>
			<div class="tools">
				<div class="tool upload-wrap" id="uploadBtn">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
						<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />
					</svg>
					Upload Image
					<input type="file" id="fileInput" accept="image/*">
				</div>
				<button class="tool" data-sample="city">City</button>
				<button class="tool" data-sample="nature">Nature</button>
				<button class="tool" data-sample="sunset">Sunset</button>
				<button class="tool" data-sample="abstract">Abstract</button>
				<div style="width:1px;height:20px;background:rgba(255,255,255,.08);margin:0 4px"></div>
				<button class="tool active" data-mode="blow" id="blowTool">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
						<circle cx="12" cy="12" r="10" />
						<path d="M8 12h8M12 8v8" />
					</svg>
					Blow
				</button>
				<button class="tool" data-mode="magnet" id="magnetTool">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
						<path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z" />
						<path d="M12 8v8M8 12h8" />
					</svg>
					Gather
				</button>
				<button class="tool" data-mode="freeze" id="freezeTool">
					Freeze
				</button>
			</div>
		</div>

		<div class="bottom">
			<div class="info-bar" id="infoBar">
				<span id="particleCount">0 particles</span>
				<span>·</span>
				<span id="fpsDisplay">0 fps</span>
			</div>
			<div class="palette-dock" id="paletteDock">
				<!-- Generated by JS -->
			</div>
			<p class="hint">drag & drop an image or choose a sample · blow particles to explore</p>
		</div>
	</div>

	<!-- Drop Zone -->
	<div class="dropzone" id="dropzone">
		<div class="dropzone-ring">📸</div>
		<p>Drop your image here</p>
	</div>

	<!-- Loading -->
	<div class="loading" id="loading">
		<div class="loading-spinner"></div>
		<p>Shattering into particles...</p>
	</div>

	<!-- Toast -->
	<div class="toast" id="toast"></div>

	<script type="module">
		import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

		// ==================== CANVAS ====================
		const cvs = document.getElementById("main");
		const ctx = cvs.getContext("2d", { willReadFrequently: true });
		let W, H;

		// ==================== STATE ====================
		const config = {
			greenscreen: false,
			bgColor: "#08080c",
			colorMode: "Original",
			colorScheme: "Cosmic Eclipse",
			color1: "#0d0026",
			color2: "#3a007d",
			color3: "#8e00a3",
			color4: "#ff007f",
			color5: "#ffaa00",
			tintColor: "#32d0d9",
			dpr: 1.0,
			animationSpeed: 1.0,
			animationType: "Static",
			zoom: 1.0,
			panX: 0,
			panY: 0
		};

		// 5 Preset Color Schemes
		const colorSchemes = {
			"Cosmic Eclipse": {
				background: "#060212",
				color1: "#0d0026",
				color2: "#3a007d",
				color3: "#8e00a3",
				color4: "#ff007f",
				color5: "#ffaa00"
			},
			"Cyberpunk City": {
				background: "#05050a",
				color1: "#03001e",
				color2: "#7303c0",
				color3: "#ec38bc",
				color4: "#fdeff9",
				color5: "#00f2fe"
			},
			"Forest Lumina": {
				background: "#020806",
				color1: "#011f14",
				color2: "#034f32",
				color3: "#0ba360",
				color4: "#3cba92",
				color5: "#a1c4fd"
			},
			"Sunset Silhouette": {
				background: "#0d0505",
				color1: "#1f0515",
				color2: "#690c22",
				color3: "#d62828",
				color4: "#f77f00",
				color5: "#fcbf49"
			},
			"Monochrome Luxury": {
				background: "#0a0a0a",
				color1: "#111111",
				color2: "#444444",
				color3: "#888888",
				color4: "#cccccc",
				color5: "#ffffff"
			}
		};

		let particles = [];
		let palette = [];
		const PAL_SIZE = 6;
		let mode = "blow"; // blow | magnet | freeze
		let mx = window.innerWidth / 2, my = window.innerHeight / 2;
		let isPointerDown = false;
		let srcImg = null;
		let frameCount = 0;
		let lastFpsTime = performance.now();
		let fps = 0;

		function resize() {
			W = window.innerWidth;
			H = window.innerHeight;
			cvs.width = W * config.dpr;
			cvs.height = H * config.dpr;
		}
		window.addEventListener("resize", () => {
			resize();
			if (srcImg) shatterImage(srcImg);
		});
		resize();

		// ==================== CURSOR ====================
		const cursorEl = document.getElementById("cursor");

		function updateCursor(x, y) {
			cursorEl.style.left = x + "px";
			cursorEl.style.top = y + "px";
		}

		// ==================== COLOR HELPERS ====================
		function hexToRgb(hex) {
			const bigint = parseInt(hex.replace("#", ""), 16);
			return {
				r: (bigint >> 16) & 255,
				g: (bigint >> 8) & 255,
				b: bigint & 255
			};
		}

		function interpolateColor(color1, color2, factor) {
			const c1 = hexToRgb(color1);
			const c2 = hexToRgb(color2);
			return {
				r: Math.round(c1.r + (c2.r - c1.r) * factor),
				g: Math.round(c1.g + (c2.g - c1.g) * factor),
				b: Math.round(c1.b + (c2.b - c1.b) * factor)
			};
		}

		function getMappedColor(lum) {
			const colors = [config.color1, config.color2, config.color3, config.color4, config.color5];
			const scaled = lum * (colors.length - 1);
			const index = Math.min(colors.length - 2, Math.floor(scaled));
			const factor = scaled - index;
			return interpolateColor(colors[index], colors[index + 1], factor);
		}

		function fadeColorWithAlpha(hexColor, alpha) {
			const rgb = hexToRgb(hexColor);
			return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
		}

		function updateAllParticleColors() {
			particles.forEach(p => p.updateDisplayColor());
		}

		// ==================== PARTICLE ====================
		class Particle {
			constructor(x, y, originX, originY, r, g, b, size) {
				this.x = x;
				this.y = y;
				this.originX = originX;
				this.originY = originY;
				this.origR = r;
				this.origG = g;
				this.origB = b;
				this.size = size;
				this.baseSize = size;
				this.vx = 0;
				this.vy = 0;
				this.friction = 0.92 + Math.random() * 0.04;
				this.springStrength = 0.008 + Math.random() * 0.008;
				this.wanderAngle = Math.random() * Math.PI * 2;
				this.wanderSpeed = 0.02 + Math.random() * 0.02;
				this.opacity = 0;
				this.targetOpacity = 1;
				
				this.updateDisplayColor();
			}

			updateDisplayColor() {
				if (config.colorMode === "Original") {
					this.r = this.origR;
					this.g = this.origG;
					this.b = this.origB;
				} else if (config.colorMode === "Monochrome") {
					const lum = Math.round(0.299 * this.origR + 0.587 * this.origG + 0.114 * this.origB);
					this.r = lum;
					this.g = lum;
					this.b = lum;
				} else if (config.colorMode === "Tinted") {
					const tint = hexToRgb(config.tintColor);
					this.r = Math.round((this.origR / 255) * tint.r);
					this.g = Math.round((this.origG / 255) * tint.g);
					this.b = Math.round((this.origB / 255) * tint.b);
				} else if (config.colorMode === "Mapped Palette") {
					const lum = (0.299 * this.origR + 0.587 * this.origG + 0.114 * this.origB) / 255;
					const rgb = getMappedColor(lum);
					this.r = rgb.r;
					this.g = rgb.g;
					this.b = rgb.b;
				}
			}

			update(wmx, wmy, currentZoom) {
				// Opacity fade in
				this.opacity += (this.targetOpacity - this.opacity) * 0.05;

				if (mode === "freeze") {
					this.vx *= 0.95;
					this.vy *= 0.95;
					this.x += this.vx;
					this.y += this.vy;
					return;
				}

				// Spring back to origin
				const dx = this.originX - this.x;
				const dy = this.originY - this.y;
				this.vx += dx * this.springStrength;
				this.vy += dy * this.springStrength;

				// Gentle wander
				this.wanderAngle += this.wanderSpeed;
				this.vx += Math.cos(this.wanderAngle) * 0.05;
				this.vy += Math.sin(this.wanderAngle) * 0.05;

				// Vortex Swirl
				if (config.animationType === "Vortex Swirl") {
					const speed = config.animationSpeed;
					const vdx = this.x - W / 2;
					const vdy = this.y - H / 2;
					const dist = Math.sqrt(vdx * vdx + vdy * vdy);
					if (dist > 0) {
						const force = 0.08 * speed;
						this.vx += (-vdy / dist) * force;
						this.vy += (vdx / dist) * force;
					}
				}

				// Ocean Wave
				if (config.animationType === "Ocean Wave") {
					const speed = config.animationSpeed;
					const wave = Math.sin(this.originX * 0.015 + performance.now() * 0.0015 * speed) * 0.12 * speed;
					this.vy += wave;
				}

				// Mouse interaction
				if (isPointerDown || mode === "magnet") {
					const mdx = this.x - wmx;
					const mdy = this.y - wmy;
					const dist = Math.sqrt(mdx * mdx + mdy * mdy);
					const radius = (mode === "blow" ? 140 : mode === "magnet" ? 200 : 0) / currentZoom;

					if (dist < radius && dist > 0) {
						const force = (radius - dist) / radius;
						const angle = Math.atan2(mdy, mdx);

						if (mode === "blow" && isPointerDown) {
							// Explode outward
							const power = force * force * 8;
							this.vx += Math.cos(angle) * power;
							this.vy += Math.sin(angle) * power;
							this.size = this.baseSize * (1 + force * 0.8);
						} else if (mode === "magnet") {
							// Pull inward (always active)
							const power = force * 2;
							this.vx -= Math.cos(angle) * power;
							this.vy -= Math.sin(angle) * power;
							this.size = this.baseSize * (1 - force * 0.3);
						}
					} else {
						this.size += (this.baseSize - this.size) * 0.1;
					}
				} else {
					this.size += (this.baseSize - this.size) * 0.1;
				}

				this.vx *= this.friction;
				this.vy *= this.friction;
				this.x += this.vx;
				this.y += this.vy;
			}

			draw() {
				ctx.globalAlpha = this.opacity;
				ctx.fillStyle = `rgb(${this.r},${this.g},${this.b})`;

				const s = Math.max(1, this.size);
				const half = s / 2;
				const rad = s > 4 ? 2 : 1;
				ctx.beginPath();
				ctx.moveTo(this.x - half + rad, this.y - half);
				ctx.lineTo(this.x + half - rad, this.y - half);
				ctx.quadraticCurveTo(
					this.x + half,
					this.y - half,
					this.x + half,
					this.y - half + rad
				);
				ctx.lineTo(this.x + half, this.y + half - rad);
				ctx.quadraticCurveTo(
					this.x + half,
					this.y + half,
					this.x + half - rad,
					this.y + half
				);
				ctx.lineTo(this.x - half + rad, this.y + half);
				ctx.quadraticCurveTo(
					this.x - half,
					this.y + half,
					this.x - half,
					this.y + half - rad
				);
				ctx.lineTo(this.x - half, this.y - half + rad);
				ctx.quadraticCurveTo(
					this.x - half,
					this.y - half,
					this.x - half + rad,
					this.y - half
				);
				ctx.fill();
				ctx.globalAlpha = 1;
			}
		}

		// ==================== IMAGE → PARTICLES ====================
		function shatterImage(img) {
			document.getElementById("loading").classList.add("active");

			setTimeout(() => {
				particles = [];

				const scale = Math.min((W * 0.7) / img.width, (H * 0.65) / img.height, 1);
				const iw = Math.floor(img.width * scale);
				const ih = Math.floor(img.height * scale);
				const ox = Math.floor((W - iw) / 2);
				const oy = Math.floor((H - ih) / 2);

				const oc = document.createElement("canvas");
				oc.width = iw;
				oc.height = ih;
				const octx = oc.getContext("2d");
				octx.drawImage(img, 0, 0, iw, ih);
				const imgData = octx.getImageData(0, 0, iw, ih).data;

				const targetParticles = Math.min(8000, Math.max(2000, (iw * ih) / 20));
				const gap = Math.max(2, Math.floor(Math.sqrt((iw * ih) / targetParticles)));
				const pSize = gap * 0.95;

				for (let y = 0; y < ih; y += gap) {
					for (let x = 0; x < iw; x += gap) {
						const i = (y * iw + x) * 4;
						const r = imgData[i];
						const g = imgData[i + 1];
						const b = imgData[i + 2];
						const a = imgData[i + 3];

						if (a < 128) continue;

						const px = ox + x;
						const py = oy + y;

						const edge = Math.random();
						let sx, sy;
						if (edge < 0.25) {
							sx = Math.random() * W;
							sy = -50;
						} else if (edge < 0.5) {
							sx = Math.random() * W;
							sy = H + 50;
						} else if (edge < 0.75) {
							sx = -50;
							sy = Math.random() * H;
						} else {
							sx = W + 50;
							sy = Math.random() * H;
						}

						const p = new Particle(sx, sy, px, py, r, g, b, pSize);
						p.vx = (px - sx) * 0.01 + (Math.random() - 0.5) * 2;
						p.vy = (py - sy) * 0.01 + (Math.random() - 0.5) * 2;
						particles.push(p);
					}
				}

				extractPalette(imgData, iw, ih);

				document.getElementById("loading").classList.remove("active");
				document.getElementById("particleCount").textContent =
					particles.length.toLocaleString() + " particles";
				showToast(`${particles.length.toLocaleString()} particles created`);
			}, 100);
		}

		// ==================== COLOR EXTRACTION (Median Cut) ====================
		function extractPalette(imgData, w, h) {
			const colors = [];
			const step = Math.max(1, Math.floor((w * h) / 10000));

			for (let i = 0; i < w * h; i += step) {
				const idx = i * 4;
				const r = imgData[idx];
				const g = imgData[idx + 1];
				const b = imgData[idx + 2];
				const a = imgData[idx + 3];
				if (a < 128) continue;
				const max = Math.max(r, g, b);
				const min = Math.min(r, g, b);
				if (max - min < 8 && max < 240 && min > 15) continue;
				colors.push([r, g, b]);
			}

			const buckets = medianCut(colors, PAL_SIZE);

			palette = buckets.map((bucket) => {
				let tr = 0, tg = 0, tb = 0;
				bucket.forEach((c) => {
					tr += c[0];
					tg += c[1];
					tb += c[2];
				});
				const len = bucket.length;
				const r = Math.round(tr / len);
				const g = Math.round(tg / len);
				const b = Math.round(tb / len);
				return {
					r,
					g,
					b,
					hex: rgbHex(r, g, b),
					pct: ((bucket.length / colors.length) * 100).toFixed(1)
				};
			});

			palette.sort((a, b) => luminance(b) - luminance(a));
			updatePaletteUI();
		}

		function medianCut(colors, depth) {
			if (depth <= 1 || colors.length === 0) return [colors];

			let rMin = 255, rMax = 0, gMin = 255, gMax = 0, bMin = 255, bMax = 0;
			colors.forEach((c) => {
				if (c[0] < rMin) rMin = c[0];
				if (c[0] > rMax) rMax = c[0];
				if (c[1] < gMin) gMin = c[1];
				if (c[1] > gMax) gMax = c[1];
				if (c[2] < bMin) bMin = c[2];
				if (c[2] > bMax) bMax = c[2];
			});

			const rRange = rMax - rMin;
			const gRange = gMax - gMin;
			const bRange = bMax - bMin;

			let channel = 0;
			if (gRange >= rRange && gRange >= bRange) channel = 1;
			else if (bRange >= rRange && bRange >= gRange) channel = 2;

			colors.sort((a, b) => a[channel] - b[channel]);
			const mid = Math.floor(colors.length / 2);

			const left = medianCut(colors.slice(0, mid), depth / 2);
			const right = medianCut(colors.slice(mid), depth / 2);
			return [...left, ...right];
		}

		function rgbHex(r, g, b) {
			const h = (v) => {
				const s = v.toString(16);
				return s.length === 1 ? "0" + s : s;
			};
			return `#${h(r)}${h(g)}${h(b)}`;
		}

		function luminance(c) {
			return 0.299 * c.r + 0.587 * c.g + 0.114 * c.b;
		}

		// ==================== PALETTE UI ====================
		window.copyColor = function(i) {
			if (!palette[i]) return;
			navigator.clipboard.writeText(palette[i].hex.toUpperCase()).catch(() => {});
			showToast(`Copied ${palette[i].hex.toUpperCase()}`);
		};

		window.copyCSS = function() {
			if (!palette.length) {
				showToast("Load an image first");
				return;
			}
			const css = `:root {\n${palette
				.map(
					(c, i) =>
						`  --color-${i + 1}: ${c.hex}; /* rgb(${c.r}, ${c.g}, ${c.b}) — ${
							c.pct
						}% */`
				)
				.join("\n")}\n}`;
			navigator.clipboard.writeText(css).catch(() => {});
			showToast("CSS variables copied");
		};

		window.copySVG = function() {
			if (!palette.length) {
				showToast("Load an image first");
				return;
			}
			const sw = 100, sh = 120;
			const rects = palette
				.map(
					(c, i) =>
						`  <rect x="${i * sw}" y="0" width="${sw}" height="${sh}" fill="${c.hex}"/>`
				)
				.join("\n");
			const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${
				palette.length * sw
			}" height="${sh}">\n${rects}\n</svg>`;
			navigator.clipboard.writeText(svg).catch(() => {});
			showToast("SVG palette copied");
		};

		window.resetAll = function() {
			particles = [];
			palette = [];
			srcImg = null;
			updatePaletteUI();
			document.getElementById("particleCount").textContent = "0 particles";
		};

		function updatePaletteUI() {
			const dock = document.getElementById("paletteDock");
			let html = "";

			for (let i = 0; i < PAL_SIZE; i++) {
				const c = palette[i];
				if (c) {
					html += `
				<div class="pal-color" data-i="${i}" onclick="copyColor(${i})">
				  <div class="pal-swatch" style="background:${c.hex}"></div>
				  <span class="pal-hex">${c.hex.toUpperCase()}</span>
				  <span class="pal-pct">${c.pct}%</span>
				</div>`;
				} else {
					html += `
				<div class="pal-color pal-empty">
				  <div class="pal-swatch"></div>
				  <span class="pal-hex">—</span>
				</div>`;
				}
			}

			html += `
			<div class="dock-actions">
			  <button class="dock-btn" onclick="copyCSS()" title="Copy CSS Variables">{ }</button>
			  <button class="dock-btn" onclick="copySVG()" title="Copy SVG">◇</button>
			  <button class="dock-btn" onclick="resetAll()" title="Reset">✕</button>
			</div>`;

			dock.innerHTML = html;

			dock.querySelectorAll(".pal-color").forEach((el, i) => {
				el.style.opacity = "0";
				el.style.transform = "translateY(12px) scale(0.8)";
				setTimeout(() => {
					el.style.transition = "all .5s cubic-bezier(.34,1.56,.64,1)";
					el.style.opacity = "1";
					el.style.transform = "translateY(0) scale(1)";
				}, i * 80 + 50);
			});
		}

				"https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&q=80",
			sunset:
				"https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=600&q=80",

				"https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=600&q=80"

		function loadImage(src) {
			document.getElementById("loading").classList.add("active");
			const img = new Image();
			img.crossOrigin = "anonymous";
			img.onload = () => {
				srcImg = img;
				shatterImage(img);
			};
			img.onerror = () => {
				document.getElementById("loading").classList.remove("active");
				showToast("Failed to load image");

		document.getElementById("fileInput").addEventListener("change", (e) => {
			const file = e.target.files[0];
			if (!file) return;
			const reader = new FileReader();
			reader.onload = (ev) => {
				const img = new Image();
				img.onload = () => {
					srcImg = img;
					shatterImage(img);
				};
				img.src = ev.target.result;
			};
			reader.readAsDataURL(file);
		});

		// Drag & drop
		const dropzone = document.getElementById("dropzone");

		document.addEventListener("dragover", (e) => {
			e.preventDefault();
			dropzone.classList.add("active");
		});

		document.addEventListener("dragleave", (e) => {
			if (e.relatedTarget === null) dropzone.classList.remove("active");
		});

		document.addEventListener("drop", (e) => {
			e.preventDefault();
			dropzone.classList.remove("active");
			const file = e.dataTransfer.files[0];
			if (!file || !file.type.startsWith("image/")) return;
			const reader = new FileReader();
			reader.onload = (ev) => {
				const img = new Image();
				img.onload = () => {
					srcImg = img;
					shatterImage(img);

		// ==================== MODE SWITCHING ====================
		document.querySelectorAll("[data-mode]").forEach((btn) => {
			btn.addEventListener("click", () => {
				document
					.querySelectorAll("[data-mode]")
					.forEach((b) => b.classList.remove("active"));
				btn.classList.add("active");
				mode = btn.dataset.mode;
				cursorEl.className = "cursor" + (mode === "blow" ? "" : " " + mode);
			});

		// ==================== INTERACTIVE VIEW NAVIGATION ====================
		let isDragging = false;
		let startDragX = 0, startDragY = 0;
		let startPanX = 0, startPanY = 0;
		let touchStartDist = 0;
		let touchStartZoom = 1;

		function updateNavGUI() {
			if (guiControllers.zoom) guiControllers.zoom.updateDisplay();
			if (guiControllers.panX) guiControllers.panX.updateDisplay();
			if (guiControllers.panY) guiControllers.panY.updateDisplay();
		}

		// Mouse Navigation
		cvs.addEventListener("pointerdown", (e) => {
			if (e.target.closest(".lil-gui") || e.target.closest(".ui")) return;

			// Drag with Right Mouse, Middle Mouse, or Left Mouse + modifier keys (Shift, Ctrl, Alt)
			const shouldDrag = (e.button === 2) || (e.button === 1) || (e.button === 0 && (e.shiftKey || e.ctrlKey || e.altKey));
			if (shouldDrag) {
				isDragging = true;
				startDragX = e.clientX;
				startDragY = e.clientY;
				startPanX = config.panX;
				startPanY = config.panY;
				e.preventDefault();
			} else if (e.button === 0) {
				isPointerDown = true;
				mx = e.clientX;
				my = e.clientY;
				cursorEl.classList.add(mode === "blow" ? "blow" : mode);
			}
		});

		window.addEventListener("pointermove", (e) => {
			mx = e.clientX;
			my = e.clientY;
			updateCursor(mx, my);

			if (isDragging) {
				const dx = e.clientX - startDragX;
				const dy = e.clientY - startDragY;
				config.panX = startPanX + dx;
				config.panY = startPanY + dy;
				updateNavGUI();
			}
		});

		window.addEventListener("pointerup", (e) => {
			if (isDragging) {
				isDragging = false;
			} else {
				isPointerDown = false;
				cursorEl.className = "cursor" + (mode !== "blow" ? " " + mode : "");
			}
		});

		cvs.addEventListener("contextmenu", (e) => e.preventDefault());

		// Mouse Wheel Zoom
		window.addEventListener("wheel", (e) => {
			if (e.target.closest(".ui") || e.target.closest(".lil-gui")) return;
			config.zoom += e.deltaY * -0.001 * config.zoom;
			config.zoom = Math.min(Math.max(0.1, config.zoom), 10);
			updateNavGUI();
		}, { passive: true });

		// Touch Navigation (Pinch to zoom + 2-finger pan)
		cvs.addEventListener("touchstart", (e) => {
			if (e.target.closest(".lil-gui") || e.target.closest(".ui")) return;
			if (e.touches.length === 2) {
				isDragging = true;
				isPointerDown = false;
				const dx = e.touches[0].clientX - e.touches[1].clientX;
				const dy = e.touches[0].clientY - e.touches[1].clientY;
				touchStartDist = Math.sqrt(dx * dx + dy * dy);
				touchStartZoom = config.zoom;

				startDragX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
				startDragY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
				startPanX = config.panX;
				startPanY = config.panY;
			} else if (e.touches.length === 1) {
				isPointerDown = true;
				mx = e.touches[0].clientX;
				my = e.touches[0].clientY;
				updateCursor(mx, my);
			}
		}, { passive: false });

		cvs.addEventListener("touchmove", (e) => {
			if (e.target.closest(".lil-gui") || e.target.closest(".ui")) return;
			if (isDragging && e.touches.length === 2) {
				e.preventDefault();
				const dx = e.touches[0].clientX - e.touches[1].clientX;
				const dy = e.touches[0].clientY - e.touches[1].clientY;
				const dist = Math.sqrt(dx * dx + dy * dy);
				if (touchStartDist > 0) {
					config.zoom = touchStartZoom * (dist / touchStartDist);
					config.zoom = Math.min(Math.max(0.1, config.zoom), 10);
				}

				const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
				const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
				config.panX = startPanX + (centerX - startDragX);
				config.panY = startPanY + (centerY - startDragY);
				updateNavGUI();
			} else if (e.touches.length === 1) {
				mx = e.touches[0].clientX;
				my = e.touches[0].clientY;
				updateCursor(mx, my);
			}
		}, { passive: false });

		cvs.addEventListener("touchend", (e) => {
			if (e.touches.length < 2) {
				isDragging = false;
			}
			if (e.touches.length === 0) {
				isPointerDown = false;
			}
		});

		// ==================== KEYBOARD ====================
		let uiVisible = true;
		document.addEventListener("keydown", (e) => {
			if (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "SELECT" || document.activeElement.tagName === "TEXTAREA") {
				return;
			}

			if (e.code === "Space") {
				e.preventDefault();
				explodeAll();
			}
			if (e.key === "1") document.querySelector('[data-mode="blow"]').click();
			if (e.key === "2") document.querySelector('[data-mode="magnet"]').click();
			if (e.key === "3") document.querySelector('[data-mode="freeze"]').click();
			if (e.key === "c") copyCSS();
			if (e.key === "r") {
				reassemble();
			}

			if (e.key === "h" || e.key === "H") {
				uiVisible = !uiVisible;
				const uiEl = document.querySelector(".ui");
				const guiEl = document.querySelector(".lil-gui");
				if (uiEl) uiEl.style.display = uiVisible ? "" : "none";
				if (guiEl) guiEl.style.display = uiVisible ? "" : "none";
				if (cursorEl) cursorEl.style.display = uiVisible ? "" : "none";
			}
		});

		function explodeAll() {
			particles.forEach((p) => {
				const angle = Math.random() * Math.PI * 2;
				const power = 5 + Math.random() * 15;
				p.vx += Math.cos(angle) * power;
				p.vy += Math.sin(angle) * power;
			});
			showToast("💥 Boom!");
		}

		function reassemble() {
			particles.forEach((p) => {
				p.springStrength = 0.05;
				setTimeout(() => {
					p.springStrength = 0.008 + Math.random() * 0.008;
				}, 2000);
			});
			showToast("Reassembling...");
		}

		// ==================== RENDER LOOP ====================
		function render() {
			ctx.setTransform(config.dpr, 0, 0, config.dpr, 0, 0);

			if (config.greenscreen) {
				ctx.fillStyle = "#00ff00";
				ctx.fillRect(0, 0, W, H);
			} else {
				ctx.fillStyle = fadeColorWithAlpha(config.bgColor, 0.25);
				ctx.fillRect(0, 0, W, H);
			}

			ctx.save();

			const time = performance.now();
			let currentZoom = config.zoom;
			let currentPanX = config.panX;
			let currentPanY = config.panY;

			if (config.animationType === "Floating Orbit") {
				const speed = config.animationSpeed;
				currentPanX += Math.sin(time * 0.001 * speed) * 100;
				currentPanY += Math.cos(time * 0.002 * speed) * 50;
				currentZoom *= (1 + Math.sin(time * 0.0005 * speed) * 0.15);
			} else if (config.animationType === "Cosmic Breath") {
				const speed = config.animationSpeed;
				currentZoom *= (1 + Math.sin(time * 0.001 * speed) * 0.2);
			}

			ctx.translate(W / 2 + currentPanX, H / 2 + currentPanY);
			ctx.scale(currentZoom, currentZoom);
			ctx.translate(-W / 2, -H / 2);

			const wmx = (mx - currentPanX - W / 2) / currentZoom + W / 2;
			const wmy = (my - currentPanY - H / 2) / currentZoom + H / 2;

			particles.forEach((p) => {
				p.update(wmx, wmy, currentZoom);
				p.draw();
			});

			ctx.restore();

			// FPS
			frameCount++;
			const now = performance.now();
			if (now - lastFpsTime >= 500) {
				fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
				document.getElementById("fpsDisplay").textContent = fps + " fps";
				frameCount = 0;
				lastFpsTime = now;
			}

			requestAnimationFrame(render);
		}

		// ==================== LIL-GUI SETTINGS ====================
		const gui = new GUI({ title: 'Particulate Controls' });
		const guiControllers = {};

		guiControllers.greenscreen = gui.add(config, 'greenscreen').name('Green Screen').onChange((val) => {
			document.body.style.backgroundColor = val ? "#00ff00" : config.bgColor;
		});

		const navFolder = gui.addFolder('Navigation & View');
		guiControllers.zoom = navFolder.add(config, 'zoom', 0.1, 10, 0.05).name('Zoom');
		guiControllers.panX = navFolder.add(config, 'panX', -2000, 2000, 1).name('Pan X');
		guiControllers.panY = navFolder.add(config, 'panY', -2000, 2000, 1).name('Pan Y');
		navFolder.add({ reset: () => {
			config.zoom = 1.0;
			config.panX = 0;
			config.panY = 0;
			updateNavGUI();
		}}, 'reset').name('Reset View');

		const colorFolder = gui.addFolder('Colors');
		guiControllers.colorMode = colorFolder.add(config, 'colorMode', ['Original', 'Mapped Palette', 'Monochrome', 'Tinted']).name('Color Mode').onChange(() => {
			updateAllParticleColors();
			updateColorControllersVisibility();
		});

		guiControllers.colorScheme = colorFolder.add(config, 'colorScheme', Object.keys(colorSchemes)).name('Preset Scheme').onChange((val) => {
			applyColorScheme(val);
		});

		guiControllers.tintColor = colorFolder.addColor(config, 'tintColor').name('Tint Color').onChange(() => {
			updateAllParticleColors();
		});

		const paletteFolder = colorFolder.addFolder('Custom Palette');
		guiControllers.bgColor = paletteFolder.addColor(config, 'bgColor').name('Background').onChange((val) => {
			if (!config.greenscreen) {
				document.body.style.backgroundColor = val;
			}
		});
		guiControllers.color1 = paletteFolder.addColor(config, 'color1').name('Color 1').onChange(() => updateAllParticleColors());
		guiControllers.color2 = paletteFolder.addColor(config, 'color2').name('Color 2').onChange(() => updateAllParticleColors());
		guiControllers.color3 = paletteFolder.addColor(config, 'color3').name('Color 3').onChange(() => updateAllParticleColors());
		guiControllers.color4 = paletteFolder.addColor(config, 'color4').name('Color 4').onChange(() => updateAllParticleColors());
		guiControllers.color5 = paletteFolder.addColor(config, 'color5').name('Color 5').onChange(() => updateAllParticleColors());

		const settingsFolder = gui.addFolder('System Settings');
		guiControllers.dpr = settingsFolder.add(config, 'dpr', 0.25, 3.0, 0.05).name('Pixel Ratio (DPR)').onChange(() => {
			resize();
		});
		guiControllers.animationSpeed = settingsFolder.add(config, 'animationSpeed', 0.0, 5.0, 0.1).name('Animation Speed');
		guiControllers.animationType = settingsFolder.add(config, 'animationType', ['Static', 'Floating Orbit', 'Cosmic Breath', 'Vortex Swirl', 'Ocean Wave']).name('Animation Pattern');

		function applyColorScheme(name) {
			const scheme = colorSchemes[name];
			if (scheme) {
				config.bgColor = scheme.background;
				config.color1 = scheme.color1;
				config.color2 = scheme.color2;
				config.color3 = scheme.color3;
				config.color4 = scheme.color4;
				config.color5 = scheme.color5;

				if (guiControllers.bgColor) guiControllers.bgColor.setValue(config.bgColor);
				if (guiControllers.color1) guiControllers.color1.setValue(config.color1);
				if (guiControllers.color2) guiControllers.color2.setValue(config.color2);
				if (guiControllers.color3) guiControllers.color3.setValue(config.color3);
				if (guiControllers.color4) guiControllers.color4.setValue(config.color4);
				if (guiControllers.color5) guiControllers.color5.setValue(config.color5);

				if (!config.greenscreen) {
					document.body.style.backgroundColor = config.bgColor;
				}

				updateAllParticleColors();
			}
		}

		function updateColorControllersVisibility() {
			if (config.colorMode === 'Mapped Palette') {
				paletteFolder.show();
				guiControllers.colorScheme.show();
				guiControllers.tintColor.hide();
			} else if (config.colorMode === 'Tinted') {
				paletteFolder.hide();
				guiControllers.colorScheme.hide();
				guiControllers.tintColor.show();
			} else {
				paletteFolder.hide();
				guiControllers.colorScheme.hide();
				guiControllers.tintColor.hide();
			}
		}

		// ==================== START ====================
		applyColorScheme(config.colorScheme);
		updateColorControllersVisibility();
		updatePaletteUI();
		render();

		setTimeout(() => {
			loadImage(SAMPLES.abstract);
		}, 500);
	</script>
</body>
</html>
