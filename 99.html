<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>99 - Hexagonal Truchet Pattern</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #0c0c0c;
        user-select: none;
      }
      #container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="container" touch-action="none"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/88/three.min.js"></script>

    <!-- Vertex Shader -->
    <script id="vertexShader" type="x-shader/x-vertex">
      void main() {
          gl_Position = vec4( position, 1.0 );
      }
    </script>

    <!-- Fragment Shader -->
    <script id="fragmentShader" type="x-shader/x-fragment">
      uniform vec2 u_resolution;
      uniform vec2 u_mouse;
      uniform float u_time;
      uniform sampler2D u_noise;

      // Custom Uniforms for interactive controls, greenscreen and colors
      uniform float u_zoom;
      uniform vec2 u_offset;
      uniform float u_greenscreen;
      uniform float u_showGrid;
      uniform vec3 u_colorBg;
      uniform vec3 u_colorTruchet;
      uniform vec3 u_colorGrid;

      #define ANIMATING

      const float lineWidth = .3;
      const float shadeWidth = .35;

      #define PI 3.141592653589793
      #define TAU 6.283185307179586

      const vec2 s = vec2(1, 1.7320508);

      vec2 hash2(vec2 p)
      {
        vec2 o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).xy;
        return o;
      }
      vec3 hash32(vec2 p)
      {
        vec3 o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).xyz;
        return o;
      }

      float ease(float t, float b, float c, float d) {
        float s = 1.70158;
        float p = 0.;
        float a = c;
        if (t == 0.) return b;
        if ((t /= d) == 1.) return b + c;
        if (p <= 0.) p = d * .3;
        if (a < abs(c)) {
          a = c;
          s = p / 6.;
        } else {
          s = p / TAU * asin(c / a);
        }
        return a * pow(2., -12. * t) * sin( (t * d - s) * TAU / p ) + c + b;
      }

      float hex(in vec2 p){
          p = abs(p);
          return max(dot(p, s*.5), p.x);
      }

      vec4 getHex(vec2 p){
          vec4 hC = floor(vec4(p, p - vec2(.5, 1))/s.xyxy) + .5;
          vec4 h = vec4(p - hC.xy*s, p - (hC.zw + .5)*s);
          return dot(h.xy, h.xy) < dot(h.zw, h.zw) ? vec4(h.xy, hC.xy) : vec4(h.zw, hC.zw + vec2(.5, 1));
      }

      const float ringsize = .285;
      const float angle_increment = TAU/3.;
      float distance = .57;

      float shade(float df, float width, float aa, float ringsize) {
        return smoothstep(ringsize - width, ringsize + aa - width, df) - smoothstep(ringsize - aa + width, ringsize + width, df);
      }

      float shade(float df, float width, float aa) {
        return shade(df, width, aa, ringsize);
      }

      float shade(float df, float width) {
        return shade(df, width, 0.005);
      }

      vec3 truchet(vec4 tile, vec3 bg, vec3 lineCol) {
        vec3 hash = hash32(tile.zw);
        float id = floor(hash.x * 6.);
        vec4 _tile = mod(tile, 1.);
        float initial_rotation = 0.;

        vec3 colour = bg;

        float t = u_time * .1;

        float animation_offset = hash.y * 2. + u_time;
        float animation_time = t + animation_offset;
        float prev_rotation = floor(animation_time / 6.);
        float next_rotation = floor(animation_time / 6.) - 1.;

        const float sides = 3.;

        if(id >= 3.) {
          initial_rotation = TAU / 6.;
        }
        #ifdef ANIMATING
          float easeVal = clamp(mod(animation_time, 6.) - 4.5, 0., 1.5);
          easeVal = ease(easeVal, prev_rotation, prev_rotation - next_rotation, 1.5);
          initial_rotation += TAU / 6. * easeVal;
        #endif

        for(float i = 1.; i <= sides; i++) {
          float _i = i - .25;
          float increment = initial_rotation + angle_increment * _i;
          float mask = shade(length(tile.xy + vec2(cos(increment), sin(increment)) * distance), .15, 0.01, ringsize);
          colour = mix(colour, lineCol, clamp(mask, 0.0, 1.0));
        }

        return colour;
      }

      void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);

        // Zoom and drag offset
        uv = (uv - u_offset) / u_zoom;

        float y = u_time * .2;
        float x = sin(u_time * .2);
        float c = cos(u_time * .3);
        float s_val = sin(u_time * .3);

        uv *= mat2(c, -s_val, s_val, c);

        uv.y += y;
        uv.x += x;

        uv *= 5.;

        vec3 bg = u_greenscreen > 0.5 ? vec3(0.0, 1.0, 0.0) : u_colorBg;

        vec4 hex_uv = getHex(uv);

        vec3 colour = truchet(hex_uv, bg, u_colorTruchet);

        if (u_showGrid > 0.5) {
          float iso = hex(hex_uv.xy);
          colour = mix(colour, u_colorGrid, smoothstep(.49, .5, iso));
        }

        gl_FragColor = vec4(colour, 1.0);
      }
    </script>

    <!-- Main Application Script -->
    <script type="module">
      import { GUI } from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

      // --- State & Preset Configurations ---
      const params = {
        greenscreen: false,
        zoom: 1.0,
        offsetX: 0.0,
        offsetY: 0.0,
        dpr: window.devicePixelRatio || 1.0,
        colorScheme: "Classic Hex",
        colorTruchet: "#ffffff",
        colorGrid: "#ffdd00",
        colorBg: "#0c0c0c",
        showGrid: true,
        animationMode: "None",
      };

      const colorSchemes = {
        "Classic Hex": {
          colorTruchet: "#ffffff",
          colorGrid: "#ffdd00",
          colorBg: "#0c0c0c",
        },
        "Neon Synth": {
          colorTruchet: "#ff007f",
          colorGrid: "#00f3ff",
          colorBg: "#120524",
        },
        "Solar Flare": {
          colorTruchet: "#ff5500",
          colorGrid: "#ffcc00",
          colorBg: "#1c0600",
        },
        "Toxic Matrix": {
          colorTruchet: "#00ff66",
          colorGrid: "#0088ff",
          colorBg: "#000d02",
        },
        "Frozen Tundra": {
          colorTruchet: "#9ec5fe",
          colorGrid: "#e2eafc",
          colorBg: "#0a1128",
        },
      };

      const animationModes = [
        "None",
        "Cosmic Drift",
        "Pulsing Zoom",
        "Orbit Spin",
        "Hyper Warp",
      ];

      let container;
      let camera, scene, renderer;
      let uniforms;

      let loader = new THREE.TextureLoader();
      let texture;
      loader.setCrossOrigin("anonymous");

      function buildFallbackTexture() {
        const size = 256;
        const data = new Uint8Array(size * size * 4);
        for (let i = 0; i < size * size * 4; i += 4) {
          const val = Math.floor(Math.random() * 255);
          data[i] = val;
          data[i + 1] = val;
          data[i + 2] = val;
          data[i + 3] = 255;
        }
        texture = new THREE.DataTexture(data, size, size, THREE.RGBAFormat);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.minFilter = THREE.LinearFilter;
        texture.needsUpdate = true;
      }

      loader.load(
        "https://s3-us-west-2.amazonaws.com/s.cdpn.io/982762/noise.png",
        function do_something_with_texture(tex) {
          texture = tex;
          texture.wrapS = THREE.RepeatWrapping;
          texture.wrapT = THREE.RepeatWrapping;
          texture.minFilter = THREE.LinearFilter;
          init();
          animate();
        },
        undefined,
        function error(err) {
          console.warn(
            "Could not load noise texture from CDN. Using procedural fallback.",
          );
          buildFallbackTexture();
          init();
          animate();
        },
      );

      function init() {
        container = document.getElementById("container");

        camera = new THREE.Camera();
        camera.position.z = 1;

        scene = new THREE.Scene();

        var geometry = new THREE.PlaneBufferGeometry(2, 2);

        uniforms = {
          u_time: { type: "f", value: 1.0 },
          u_resolution: { type: "v2", value: new THREE.Vector2() },
          u_noise: { type: "t", value: texture },
          u_mouse: { type: "v2", value: new THREE.Vector2() },
          u_zoom: { type: "f", value: params.zoom },
          u_offset: {
            type: "v2",
            value: new THREE.Vector2(params.offsetX, params.offsetY),
          },
          u_greenscreen: { type: "f", value: params.greenscreen ? 1.0 : 0.0 },
          u_showGrid: { type: "f", value: params.showGrid ? 1.0 : 0.0 },
          u_colorBg: { type: "c", value: new THREE.Color(params.colorBg) },
          u_colorTruchet: {
            type: "c",
            value: new THREE.Color(params.colorTruchet),
          },
          u_colorGrid: { type: "c", value: new THREE.Color(params.colorGrid) },
        };

        var material = new THREE.ShaderMaterial({
          uniforms: uniforms,
          vertexShader: document.getElementById("vertexShader").textContent,
          fragmentShader: document.getElementById("fragmentShader").textContent,
        });
        material.extensions.derivatives = true;

        var mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(params.dpr);

        container.appendChild(renderer.domElement);

        onWindowResize();
        window.addEventListener("resize", onWindowResize, false);

        document.addEventListener("pointermove", (e) => {
          if (e.target.closest(".lil-gui")) return;
          let ratio = window.innerHeight / window.innerWidth;
          uniforms.u_mouse.value.x =
            (e.pageX - window.innerWidth / 2) / window.innerWidth / ratio;
          uniforms.u_mouse.value.y =
            ((e.pageY - window.innerHeight / 2) / window.innerHeight) * -1;
        });

        // --- Setup GUI ---
        const gui = new GUI({ title: "Shader Configuration" });

        // Display options
        const fDisplay = gui.addFolder("Display Options");
        fDisplay
          .add(params, "greenscreen")
          .name("Green Screen BG")
          .onChange((v) => {
            uniforms.u_greenscreen.value = v ? 1.0 : 0.0;
          });
        fDisplay
          .add(params, "dpr", 0.5, 3.0, 0.1)
          .name("Pixel Ratio (DPR)")
          .onChange((v) => {
            renderer.setPixelRatio(v);
            onWindowResize();
          });
        fDisplay
          .add(params, "showGrid")
          .name("Show Grid")
          .onChange((v) => {
            uniforms.u_showGrid.value = v ? 1.0 : 0.0;
          });

        // Camera Controls
        const fCamera = gui.addFolder("Camera Controls");
        const zoomController = fCamera
          .add(params, "zoom", 0.1, 20.0, 0.05)
          .name("Zoom");
        const offsetXController = fCamera
          .add(params, "offsetX", -10.0, 10.0, 0.01)
          .name("Offset X");
        const offsetYController = fCamera
          .add(params, "offsetY", -10.0, 10.0, 0.01)
          .name("Offset Y");

        // Color Customization
        const fColors = gui.addFolder("Color Customization");
        fColors
          .add(params, "colorScheme", Object.keys(colorSchemes))
          .name("Preset Theme")
          .onChange(applyColorScheme);
        const colorTruchetController = fColors
          .addColor(params, "colorTruchet")
          .name("Truchet Lines")
          .onChange((v) => {
            uniforms.u_colorTruchet.value.set(v);
          });
        const colorGridController = fColors
          .addColor(params, "colorGrid")
          .name("Grid Lines")
          .onChange((v) => {
            uniforms.u_colorGrid.value.set(v);
          });
        const colorBgController = fColors
          .addColor(params, "colorBg")
          .name("Background")
          .onChange((v) => {
            uniforms.u_colorBg.value.set(v);
          });

        // Preset Animations
        const fAnim = gui.addFolder("Animations");
        fAnim
          .add(params, "animationMode", animationModes)
          .name("Preset Animation");

        gui.close();

        function applyColorScheme(schemeName) {
          const scheme = colorSchemes[schemeName];
          if (scheme) {
            params.colorTruchet = scheme.colorTruchet;
            params.colorGrid = scheme.colorGrid;
            params.colorBg = scheme.colorBg;

            uniforms.u_colorTruchet.value.set(params.colorTruchet);
            uniforms.u_colorGrid.value.set(params.colorGrid);
            uniforms.u_colorBg.value.set(params.colorBg);

            colorTruchetController.setValue(params.colorTruchet);
            colorGridController.setValue(params.colorGrid);
            colorBgController.setValue(params.colorBg);
          }
        }

        // --- Pointer Drag & Wheel Zoom events ---
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        window.addEventListener("pointerdown", (e) => {
          if (e.target.closest(".lil-gui")) return;
          isDragging = true;
          previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener("pointermove", (e) => {
          if (isDragging) {
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            const dragSpeed = 0.005 / params.zoom;
            params.offsetX -= deltaX * dragSpeed;
            params.offsetY += deltaY * dragSpeed;

            offsetXController.updateDisplay();
            offsetYController.updateDisplay();

            previousMousePosition = { x: e.clientX, y: e.clientY };
          }
        });

        window.addEventListener("pointerup", () => {
          isDragging = false;
        });
        window.addEventListener("pointercancel", () => {
          isDragging = false;
        });

        window.addEventListener(
          "wheel",
          (e) => {
            if (e.target.closest(".lil-gui")) return;

            const zoomFactor = 1.1;
            if (e.deltaY < 0) {
              params.zoom *= zoomFactor;
            } else {
              params.zoom /= zoomFactor;
            }

            params.zoom = Math.max(0.1, Math.min(20.0, params.zoom));
            zoomController.updateDisplay();
          },
          { passive: true },
        );

        // --- Toggle GUI with 'H' Key ---
        let guiVisible = true;
        window.addEventListener("keydown", (e) => {
          if (e.key === "h" || e.key === "H") {
            guiVisible = !guiVisible;
            if (guiVisible) {
              gui.show();
            } else {
              gui.hide();
            }
          }
        });
      }

      function onWindowResize(event) {
        renderer.setSize(window.innerWidth, window.innerHeight);
        uniforms.u_resolution.value.x = renderer.domElement.width;
        uniforms.u_resolution.value.y = renderer.domElement.height;
      }

      // --- Capture Config (preserving CCapture structure gracefully) ---
      let capturer = null;
      if (typeof CCapture !== "undefined") {
        capturer = new CCapture({
          verbose: true,
          framerate: 30,
          quality: 90,
          format: "webm",
          workersPath: "js/",
        });
      }
      let capturing = false;

      window.isCapturing = function (val) {
        if (typeof CCapture === "undefined" || !capturer) return;
        if (val === false && capturing === true) {
          capturer.stop();
          capturer.save();
        } else if (val === true && capturing === false) {
          capturer.start();
        }
        capturing = val;
      };

      window.toggleCapture = function () {
        window.isCapturing(!capturing);
      };

      window.addEventListener("keyup", function (e) {
        if (e.keyCode == 68) window.toggleCapture();
      });

      function animate(delta) {
        requestAnimationFrame(animate);
        render(delta);
      }

      function render(delta) {
        const t = delta ? delta * 0.001 : 0;

        uniforms.u_time.value = -9 + (delta || 0) * 0.0005;

        let activeZoom = params.zoom;
        let activeOffsetX = params.offsetX;
        let activeOffsetY = params.offsetY;

        if (params.animationMode === "Cosmic Drift") {
          activeOffsetX += Math.sin(t * 0.4) * 0.8;
          activeOffsetY += Math.cos(t * 0.3) * 0.8;
          activeZoom *= 1.0 + Math.sin(t * 0.2) * 0.15;
        } else if (params.animationMode === "Pulsing Zoom") {
          activeZoom *= 1.0 + Math.sin(t * 0.8) * 0.4;
        } else if (params.animationMode === "Orbit Spin") {
          activeOffsetX += Math.cos(t * 0.6) * 1.5;
          activeOffsetY += Math.sin(t * 0.6) * 1.5;
        } else if (params.animationMode === "Hyper Warp") {
          activeZoom *= 2.0 + Math.sin(t * 2.0) * 1.2;
          activeOffsetX += Math.sin(t * 1.0) * 0.5;
          activeOffsetY += Math.cos(t * 1.2) * 0.5;
        }

        uniforms.u_zoom.value = activeZoom;
        uniforms.u_offset.value.set(activeOffsetX, activeOffsetY);

        renderer.render(scene, camera);

        if (capturing && capturer) {
          capturer.capture(renderer.domElement);
        }
      }
    </script>
  </body>
</html>
