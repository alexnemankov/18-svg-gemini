<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=device-width, initial-scale=1.0">
	<title>Space Warp</title>
	<style>
		body {
			margin: 0;
			background: black;
			overflow: hidden;
		}
	</style>
	<script type="importmap">
		{
			"imports": {
				"three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
				"jsm/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
			}
		}
	</script>
</head>
<body>
	<script type="module">
		import * as THREE from "three";
		import { OrbitControls } from "jsm/controls/OrbitControls.js";
		import GUI from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

		const w = window.innerWidth;
		const h = window.innerHeight;
		const renderer = new THREE.WebGLRenderer({ antialias: true });
		renderer.setSize(w, h);
		renderer.setPixelRatio(window.devicePixelRatio);
		document.body.appendChild(renderer.domElement);

		const camera = new THREE.PerspectiveCamera(75, w / h, 0.1, 1000);
		camera.position.set(0, 0, 0.1); // Small offset so OrbitControls works

		const scene = new THREE.Scene();
		scene.background = new THREE.Color(0x000000);

		// Orbit Controls setup
		const controls = new OrbitControls(camera, renderer.domElement);
		controls.enableDamping = true;
		controls.dampingFactor = 0.05;
		controls.enableZoom = true;
		controls.enablePan = true;

		const particleCount = 20000;
		const radius = 1.0;
		const length = 30.0;

		const warpIntensity = 1.0;
		const warpSpeed = 0.2;
		const timeSlowdownFactor = 0.1;
		const transitionSpeed = 0.01;

		const geometry = new THREE.BufferGeometry();
		const positions = new Float32Array(particleCount * 3);
		const sizes = new Float32Array(particleCount);
		const speeds = new Float32Array(particleCount);

		for (let i = 0; i < particleCount; i++) {
			const i3 = i * 3;
			const angle = Math.random() * Math.PI * 2;
			const r = radius * (0.4 + Math.random() * 0.6);
			const z = -length * 0.5 + Math.random() * length;

			positions[i3] = Math.cos(angle) * r;
			positions[i3 + 1] = Math.sin(angle) * r;
			positions[i3 + 2] = z;

			sizes[i] = 0.2 + Math.random() * 0.4;
			speeds[i] = 1.0 + Math.random() * 2.0;
		}

		geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
		geometry.setAttribute("size", new THREE.BufferAttribute(sizes, 1));
		geometry.setAttribute("speed", new THREE.BufferAttribute(speeds, 1));

		const vertexShader = `
		  attribute float size;
		  attribute float speed;
		  varying vec3 vColor;
		  varying float vOpacity;
		  varying float vLength;
		  varying float vDistFromCamera;
		  uniform float uTime;
		  uniform float uRadius;
		  uniform float uLength;
		  uniform float uWarpIntensity;
		  uniform float uWarpSpeed;
		  uniform float uEffectsActive;
		  uniform float uTimeSlowdown;
		  uniform vec3 uColor1;
		  uniform vec3 uColor2;
		  uniform vec3 uColor3;
		  uniform vec3 uColor4;
		  uniform vec3 uColor5;

		  void main() {
			vec3 pos = position;

			float effectiveSpeed = mix(uWarpSpeed, uWarpSpeed * uTimeSlowdown, uEffectsActive);
			float t = mod(uTime * speed * effectiveSpeed, uLength);
			pos.z = mod(pos.z + t, uLength) - uLength * 0.5;

			float distFromCamera = pos.z;
			vDistFromCamera = distFromCamera;

			float brightness = 1.0 - smoothstep(-uLength * 0.5, uLength * 0.5, distFromCamera);
			brightness = max(brightness, 0.4);

			float depthFactor = 1.0 - smoothstep(-uLength * 0.5, uLength * 0.5, distFromCamera);

			float distFromCenter = length(pos.xy);
			vLength = size * speed * uWarpIntensity * brightness * (1.0 + distFromCenter / uRadius * 0.6) * depthFactor;

			float forwardBrightness = 1.0 - smoothstep(-uLength * 0.3, uLength * 0.3, distFromCamera);

			float colorShift = sin(uTime * 0.8 + pos.x * 0.6 + pos.y * 0.4 + pos.z * 0.3) * 0.5 + 0.5;
			float colorShift2 = cos(uTime * 1.0 + pos.x * 0.5 - pos.y * 0.5 + pos.z * 0.4) * 0.5 + 0.5;
			float colorShift3 = sin(uTime * 0.6 + pos.x * 0.4 + pos.y * 0.5 - pos.z * 0.3) * 0.4 + 0.6;

			float c1Intensity = 0.3 + colorShift * 0.6 + forwardBrightness * 0.3;
			float c2Intensity = 0.4 + colorShift2 * 0.5 + forwardBrightness * 0.3;
			float c3Intensity = 0.5 + colorShift3 * 0.4 + forwardBrightness * 0.2;
			float c4Intensity = 0.7 + (1.0 - colorShift) * 0.25 + forwardBrightness * 0.25;

			vColor = uColor1 * c1Intensity * 0.4 + 
					 uColor2 * c2Intensity * 0.3 + 
					 uColor3 * c3Intensity * 0.3 + 
					 uColor4 * c4Intensity * 0.2 +
					 uColor5 * 0.1;

			float pulseSeed = pos.x * 50.0 + pos.y * 30.0 + pos.z * 20.0;
			float pulse = sin(uTime * 1.5 + pulseSeed) * 0.3 + 0.7;
			pulse = pow(pulse, 1.5);
			pulse = mix(1.0, pulse, uEffectsActive);

			float burstSeed = pos.x * 100.0 + pos.y * 70.0;
			float burst = sin(uTime * 0.8 + burstSeed) * 0.5 + 0.5;
			burst = pow(burst, 8.0);
			float burstIntensity = 1.0 + burst * 2.0 * uEffectsActive;

			vOpacity = brightness * pulse * (1.0 + (burstIntensity - 1.0));

			vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
			gl_PointSize = size * (300.0 / -mvPosition.z) * brightness * depthFactor * (1.0 + vLength * 0.2) * (1.0 + burst * 0.3 * uEffectsActive);
			gl_Position = projectionMatrix * mvPosition;
		  }
		`;

		const fragmentShader = `
		  varying vec3 vColor;
		  varying float vOpacity;
		  varying float vLength;
		  varying float vDistFromCamera;
		  uniform float uEffectsActive;
		  uniform vec3 uColor1;
		  uniform vec3 uColor2;
		  uniform vec3 uColor3;

		  void main() {
			vec2 coord = gl_PointCoord - vec2(0.5);

			float distortionIntensity = 0.0005 * uEffectsActive;
			float warpDistortion = sin(coord.y * 8.0 + vDistFromCamera * 0.3) * distortionIntensity;
			coord.x += warpDistortion;

			float timeDistortion = sin(coord.x * 6.0 + vDistFromCamera * 0.4) * 0.0004 * uEffectsActive;
			coord.y += timeDistortion;

			float lineWidth = 0.0035;
			float lineLength = vLength * 1.5;

			float perpDist = abs(coord.x);
			float alongLine = coord.y;

			float alpha = 0.0;

			if (alongLine >= -lineLength && alongLine <= 0.0 && perpDist < lineWidth) {
			  float alongAlpha = 1.0 - smoothstep(-lineLength, 0.0, alongLine);
			  float centerAlpha = 1.0 - smoothstep(0.0, lineWidth, perpDist);

			  float energyPulse = sin(alongLine * 4.0 + vDistFromCamera * 0.6) * 0.2 + 0.8;
			  energyPulse = mix(1.0, energyPulse, uEffectsActive);

			  alpha = alongAlpha * centerAlpha * energyPulse;

			  float trailColorShift = sin(alongLine * 3.0 + vDistFromCamera * 0.8) * 0.4 + 0.6;
			  alpha *= trailColorShift;
			}

			float dist = length(coord);
			float core = pow(1.0 - smoothstep(0.0, 0.1, dist), 3.0);

			float corePulse = sin(vDistFromCamera * 0.5 + dist * 10.0) * 0.15 + 0.85;
			corePulse = mix(1.0, corePulse, uEffectsActive);
			alpha = max(alpha, core * 1.2 * corePulse);

			float glow = pow(1.0 - smoothstep(0.0, 0.35, dist), 2.0);

			float energyRings = sin(dist * 15.0 - vDistFromCamera * 0.4) * 0.1 + 0.9;
			energyRings = mix(1.0, energyRings, uEffectsActive);
			alpha = max(alpha, glow * 0.5 * energyRings);

			float outerGlow = pow(1.0 - smoothstep(0.0, 0.5, dist), 1.5);
			alpha = max(alpha, outerGlow * 0.2);

			float energyField = pow(1.0 - smoothstep(0.0, 0.4, dist), 1.8);
			float fieldPulse = sin(vDistFromCamera * 0.3 + dist * 8.0) * 0.2 + 0.8;
			fieldPulse = mix(1.0, fieldPulse, uEffectsActive);
			alpha = max(alpha, energyField * 0.15 * fieldPulse * uEffectsActive);

			float colorWave = sin(vDistFromCamera * 0.4 + dist * 6.0) * 0.3 + 0.7;

			vec3 spaceColor = vColor * colorWave;

			vec3 tone1 = uColor1;
			vec3 tone2 = uColor2;
			vec3 tone3 = uColor3;

			float toneMix = sin(vDistFromCamera * 0.3) * 0.5 + 0.5;
			vec3 mixedTone = mix(tone1, mix(tone2, tone3, toneMix), 0.3);
			spaceColor = mix(spaceColor, mixedTone, 0.25);

			vec3 finalColor = spaceColor * (1.0 + alpha * 1.8);
			float finalAlpha = alpha * vOpacity;
			finalAlpha = min(finalAlpha, 1.0);

			gl_FragColor = vec4(finalColor, finalAlpha);
		  }
		`;

		const material = new THREE.ShaderMaterial({
			vertexShader,
			fragmentShader,
			uniforms: {
				uTime: { value: 0 },
				uRadius: { value: radius },
				uLength: { value: length },
				uWarpIntensity: { value: warpIntensity },
				uWarpSpeed: { value: warpSpeed },
				uEffectsActive: { value: 0.0 },
				uTimeSlowdown: { value: timeSlowdownFactor },
				uColor1: { value: new THREE.Color('#0044ff') },
				uColor2: { value: new THREE.Color('#00ffcc') },
				uColor3: { value: new THREE.Color('#ff00aa') },
				uColor4: { value: new THREE.Color('#9b5de5') },
				uColor5: { value: new THREE.Color('#ffffff') },
			},
			transparent: true,
			blending: THREE.AdditiveBlending,
			depthWrite: false,
		});

		// Create a group to handle animations independently from OrbitControls
		const animGroup = new THREE.Group();
		const particles = new THREE.Points(geometry, material);
		animGroup.add(particles);
		scene.add(animGroup);

		let time = 0;
		let currentEffectsActive = 0.0;
		let targetEffectsActive = 0.0;

		document.addEventListener("mousedown", (e) => {
			if (e.target.closest('.lil-gui')) return;
			targetEffectsActive = 1.0;
		});

		document.addEventListener("mouseup", () => {
			targetEffectsActive = 0.0;
		});

		document.addEventListener("mouseleave", () => {
			targetEffectsActive = 0.0;
		});

		// GUI & Settings configuration
		const settings = {
			greenscreen: false,
			controlsMode: 'Rotate',
			colorScheme: 'Nebula Warp',
			dpr: window.devicePixelRatio,
			animationSpeed: 1.0,
			animation: 'Slow Spin'
		};

		const colors = {
			color1: '#0044ff',
			color2: '#00ffcc',
			color3: '#ff00aa',
			color4: '#9b5de5',
			color5: '#ffffff'
		};

		const colorSchemes = {
			'Nebula Warp': {
				color1: '#0044ff',
				color2: '#00ffcc',
				color3: '#ff00aa',
				color4: '#9b5de5',
				color5: '#ffffff'
			},
			'Solar Flare': {
				color1: '#ff003c',
				color2: '#ff7700',
				color3: '#ffdd00',
				color4: '#ff00aa',
				color5: '#ffffff'
			},
			'Cyberpunk Grid': {
				color1: '#00ff55',
				color2: '#00ffff',
				color3: '#ff00ff',
				color4: '#220033',
				color5: '#f15bb5'
			},
			'Aurora Abyss': {
				color1: '#00f5d4',
				color2: '#00bbf9',
				color3: '#00f5d4',
				color4: '#70e000',
				color5: '#e0fbfc'
			},
			'Monochrome Void': {
				color1: '#3a86c8',
				color2: '#8d99ae',
				color3: '#2b2d42',
				color4: '#edf2f4',
				color5: '#ffffff'
			}
		};

		const gui = new GUI({ title: 'Scene Settings' });

		// Background / Display
		gui.add(settings, 'greenscreen').name('Greenscreen Background').onChange((val) => {
			if (val) {
				scene.background = new THREE.Color(0x00ff00);
			} else {
				scene.background = new THREE.Color(0x000000);
			}
		});

		gui.add(settings, 'dpr', 0.5, 3.0, 0.1).name('Pixel Ratio (DPR)').onChange((val) => {
			renderer.setPixelRatio(val);
		});

		// Controls
		gui.add(settings, 'controlsMode', ['Rotate', 'Pan']).name('Drag Left Click').onChange((val) => {
			if (val === 'Rotate') {
				controls.mouseButtons.LEFT = THREE.MOUSE.ROTATE;
				controls.mouseButtons.RIGHT = THREE.MOUSE.PAN;
			} else {
				controls.mouseButtons.LEFT = THREE.MOUSE.PAN;
				controls.mouseButtons.RIGHT = THREE.MOUSE.ROTATE;
			}
		});

		// Animation
		gui.add(settings, 'animationSpeed', 0.1, 3.0, 0.1).name('Animation Speed');
		gui.add(settings, 'animation', ['Static', 'Slow Spin', 'Gentle Wave', 'Spiral Drift', 'Cosmic Fly']).name('Active Preset');

		// Colors folder
		const colorFolder = gui.addFolder('Color Customization');
		colorFolder.add(settings, 'colorScheme', Object.keys(colorSchemes)).name('Preset Scheme').onChange(applyColorScheme);

		const c1Ctrl = colorFolder.addColor(colors, 'color1').name('Primary').onChange(updateShaderColors).listen();
		const c2Ctrl = colorFolder.addColor(colors, 'color2').name('Secondary').onChange(updateShaderColors).listen();
		const c3Ctrl = colorFolder.addColor(colors, 'color3').name('Tertiary').onChange(updateShaderColors).listen();
		const c4Ctrl = colorFolder.addColor(colors, 'color4').name('Accent 1').onChange(updateShaderColors).listen();
		const c5Ctrl = colorFolder.addColor(colors, 'color5').name('Accent 2').onChange(updateShaderColors).listen();

		function applyColorScheme(schemeName) {
			const scheme = colorSchemes[schemeName];
			if (scheme) {
				colors.color1 = scheme.color1;
				colors.color2 = scheme.color2;
				colors.color3 = scheme.color3;
				colors.color4 = scheme.color4;
				colors.color5 = scheme.color5;
				updateShaderColors();
			}
		}

		function updateShaderColors() {
			material.uniforms.uColor1.value.set(colors.color1);
			material.uniforms.uColor2.value.set(colors.color2);
			material.uniforms.uColor3.value.set(colors.color3);
			material.uniforms.uColor4.value.set(colors.color4);
			material.uniforms.uColor5.value.set(colors.color5);
		}

		// Initial color setup
		updateShaderColors();

		// Keyboard shortcut to hide/show GUI
		let guiVisible = true;
		window.addEventListener('keydown', (e) => {
			if (e.key.toLowerCase() === 'h') {
				if (guiVisible) {
					gui.hide();
					guiVisible = false;
				} else {
					gui.show();
					guiVisible = true;
				}
			}
		});

		function animate() {
			requestAnimationFrame(animate);
			
			// Increment time scaled by animationSpeed setting
			time += 0.016 * settings.animationSpeed;

			currentEffectsActive +=
				(targetEffectsActive - currentEffectsActive) * transitionSpeed;
			material.uniforms.uEffectsActive.value = currentEffectsActive;
			material.uniforms.uTime.value = time;

			// Handle preset animations
			animGroup.rotation.set(0, 0, 0);
			animGroup.position.set(0, 0, 0);

			if (settings.animation === 'Slow Spin') {
				animGroup.rotation.y = time * 0.15;
				animGroup.rotation.x = Math.sin(time * 0.1) * 0.1;
			} else if (settings.animation === 'Gentle Wave') {
				animGroup.position.x = Math.sin(time * 0.3) * 0.4;
				animGroup.position.y = Math.cos(time * 0.2) * 0.3;
			} else if (settings.animation === 'Spiral Drift') {
				animGroup.rotation.z = time * 0.2;
				animGroup.position.x = Math.sin(time * 0.2) * 0.3;
				animGroup.position.y = Math.cos(time * 0.2) * 0.3;
			} else if (settings.animation === 'Cosmic Fly') {
				animGroup.position.z = Math.sin(time * 0.15) * 5.0;
				animGroup.rotation.y = Math.sin(time * 0.05) * 0.15;
			}

			controls.update();
			renderer.render(scene, camera);
		}

		animate();

		window.addEventListener("resize", () => {
			renderer.setSize(window.innerWidth, window.innerHeight);
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
		});
	</script>
</body>
</html>
