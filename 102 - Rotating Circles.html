<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>102 - Concentric Rings Shader Customizer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
      user-select: none;
    }
    #container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="container" touch-action="none"></div>

  <!-- ThreeJS library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/88/three.min.js"></script>

  <!-- Vertex Shader -->
  <script id="vertexShader" type="x-shader/x-vertex">
    void main() {
        gl_Position = vec4( position, 1.0 );
    }
  </script>

  <!-- Fragment Shader -->
  <script id="fragmentShader" type="x-shader/x-fragment">
    uniform vec2 u_resolution;
    uniform vec2 u_mouse;
    uniform float u_time;
    uniform sampler2D u_noise;
    
    // Interactive zoom & drag
    uniform float u_zoom;
    uniform vec2 u_offset;
    
    // Colors & Greenscreen
    uniform vec3 u_colorFg;
    uniform vec3 u_colorBg;
    uniform bool u_greenscreen;
    
    #define PI 3.141592653589793
    #define TAU 6.283185307179586

    vec2 hash2(vec2 p)
    {
      vec2 o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).xy;
      return o;
    }
    
    vec3 hsb2rgb( in vec3 c ){
      vec3 rgb = clamp(abs(mod(c.x*6.0+vec3(0.0,4.0,2.0),
                               6.0)-3.0)-1.0,
                       0.0,
                       1.0 );
      rgb = rgb*rgb*(3.0-2.0*rgb);
      return c.z * mix( vec3(1.0), rgb, c.y);
    }
    
    vec3 domain(vec2 z){
      return vec3(hsb2rgb(vec3(atan(z.y,z.x)/TAU,1.,1.)));
    }
    vec3 colour(vec2 z) {
        return domain(z);
    }

    void main() {
      // Normalised coordinates
      vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);
      
      // Apply interactive zoom & drag
      uv = uv * u_zoom + u_offset;
      
      const float k = 10.0;
      const float w = 4.0;
      const float t = 1.;
      
      float i = floor(length(uv)*k);
      
      float c = cos(u_time * (1./i));
      float s = sin(u_time * (1./i));
      uv *= mat2(c, -s, s, c);
      
      vec2 radial = vec2(i, atan(uv.y, uv.x));
      
      radial = vec2(
        (i + .5)*(1.0/k), 
        (floor(radial.y*(1.0/PI)*(i*w+t)) + 0.5 ) * PI/(i*w+t));
    
      vec2 cart = vec2(cos(radial.y), sin(radial.y)) * radial.x;
      
      float shade = length(uv-cart) * k * 1.5;
      
      vec3 fragcolour = vec3(smoothstep(0.5, 0.5 - fwidth(shade), shade - 0.02));
      
      // Compose pattern foreground and background color
      vec3 finalBg = u_greenscreen ? vec3(0.0, 1.0, 0.0) : u_colorBg;
      vec3 finalFg = u_colorFg;
      
      vec3 finalColor = mix(finalBg, finalFg, fragcolour.r);

      gl_FragColor = vec4(finalColor, 1.0);
    }
  </script>

  <!-- Application logic using ES modules to import lil-gui -->
  <script type="module">
    import { GUI } from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // --- State and settings ---
    const params = {
      // Greenscreen
      greenscreen: false,
      
      // Interactive controls
      zoom: 1.0,
      offsetX: 0.0,
      offsetY: 0.0,
      
      // DPR
      dpr: window.devicePixelRatio || 1.0,
      
      // Colors
      colorScheme: 'Cyberpunk City',
      colorBg: '#0a0612',
      colorFg: '#ff007f',
      
      // Animations
      animationMode: 'Hypnotic Spin'
    };

    // 5 Popular and Original Preset Color Schemes
    const colorSchemes = {
      'Cyberpunk City': {
        colorBg: '#0a0612',
        colorFg: '#ff007f'
      },
      'Golden Hour': {
        colorBg: '#1a0500',
        colorFg: '#ffb300'
      },
      'Acid Matrix': {
        colorBg: '#020503',
        colorFg: '#39ff14'
      },
      'Deep Ocean': {
        colorBg: '#000a1a',
        colorFg: '#00e5ff'
      },
      'Monochrome Tech': {
        colorBg: '#000000',
        colorFg: '#ffffff'
      }
    };

    let container;
    let camera, scene, renderer;
    let uniforms;
    let texture;
    
    // Setup texture fallback if load fails
    function createFallbackTexture() {
      const size = 256;
      const data = new Uint8Array(size * size * 4);
      for (let i = 0; i < size * size * 4; i += 4) {
        const val = Math.floor(Math.random() * 255);
        data[i] = val;
        data[i + 1] = val;
        data[i + 2] = val;
        data[i + 3] = 255;
      }
      texture = new THREE.DataTexture(data, size, size, THREE.RGBAFormat);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.minFilter = THREE.LinearFilter;
      texture.needsUpdate = true;
    }

    // Load noise texture
    let loader = new THREE.TextureLoader();
    loader.setCrossOrigin("anonymous");
    loader.load(
      'https://s3-us-west-2.amazonaws.com/s.cdpn.io/982762/noise.png',
      function do_something_with_texture(tex) {
        texture = tex;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.minFilter = THREE.LinearFilter;
        init();
        animate();
      },
      undefined,
      function error() {
        console.warn("Failed to load noise texture from CDN, using fallback.");
        createFallbackTexture();
        init();
        animate();
      }
    );

    function init() {
      container = document.getElementById( 'container' );

      camera = new THREE.Camera();
      camera.position.z = 1;

      scene = new THREE.Scene();

      var geometry = new THREE.PlaneBufferGeometry( 2, 2 );

      uniforms = {
        u_time: { type: "f", value: 1.0 },
        u_resolution: { type: "v2", value: new THREE.Vector2() },
        u_noise: { type: "t", value: texture },
        u_mouse: { type: "v2", value: new THREE.Vector2() },
        u_zoom: { type: "f", value: params.zoom },
        u_offset: { type: "v2", value: new THREE.Vector2(params.offsetX, params.offsetY) },
        u_greenscreen: { type: "b", value: params.greenscreen },
        u_colorBg: { type: "c", value: new THREE.Color(params.colorBg) },
        u_colorFg: { type: "c", value: new THREE.Color(params.colorFg) }
      };

      var material = new THREE.ShaderMaterial( {
        uniforms: uniforms,
        vertexShader: document.getElementById( 'vertexShader' ).textContent,
        fragmentShader: document.getElementById( 'fragmentShader' ).textContent
      } );
      material.extensions.derivatives = true;

      var mesh = new THREE.Mesh( geometry, material );
      scene.add( mesh );

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio( params.dpr );
      container.appendChild( renderer.domElement );

      onWindowResize();
      window.addEventListener( 'resize', onWindowResize, false );

      // Pointer events for dragging
      let isDragging = false;
      let previousMousePosition = { x: 0, y: 0 };

      window.addEventListener('pointerdown', (e) => {
        // Prevent drag triggers when clicking UI controls
        if (e.target.closest('.lil-gui')) return;
        isDragging = true;
        previousMousePosition = { x: e.clientX, y: e.clientY };
      });

      window.addEventListener('pointermove', (e) => {
        let ratio = window.innerHeight / window.innerWidth;
        uniforms.u_mouse.value.x = (e.pageX - window.innerWidth / 2) / window.innerWidth / ratio;
        uniforms.u_mouse.value.y = (e.pageY - window.innerHeight / 2) / window.innerHeight * -1;
        
        if (isDragging) {
          const deltaX = e.clientX - previousMousePosition.x;
          const deltaY = e.clientY - previousMousePosition.y;
          
          // Dragging sensitivity scaled by zoom level
          const dragSensitivity = 0.002 * params.zoom;
          params.offsetX -= deltaX * dragSensitivity;
          params.offsetY += deltaY * dragSensitivity;
          
          offsetXController.updateDisplay();
          offsetYController.updateDisplay();
          
          previousMousePosition = { x: e.clientX, y: e.clientY };
        }
        e.preventDefault();
      });

      window.addEventListener('pointerup', () => {
        isDragging = false;
      });

      // Wheel event for zoom
      window.addEventListener('wheel', (e) => {
        if (e.target.closest('.lil-gui')) return;
        
        const zoomFactor = 1.08;
        if (e.deltaY < 0) {
          params.zoom /= zoomFactor;
        } else {
          params.zoom *= zoomFactor;
        }
        
        // Clamp zoom values
        params.zoom = Math.max(0.1, Math.min(10.0, params.zoom));
        zoomController.updateDisplay();
      }, { passive: true });

      // Setup lil-gui settings
      const gui = new GUI({ title: 'Shader Controls' });

      // Settings Folder
      const folderSettings = gui.addFolder('Settings');
      folderSettings.add(params, 'greenscreen').name('Greenscreen Background').onChange(v => {
        uniforms.u_greenscreen.value = v;
      });
      folderSettings.add(params, 'dpr', 0.5, 3.0, 0.1).name('Pixel Ratio (DPR)').onChange(v => {
        renderer.setPixelRatio(v);
        onWindowResize();
      });

      // Camera Folder
      const folderCamera = gui.addFolder('Camera / Position');
      const zoomController = folderCamera.add(params, 'zoom', 0.1, 10.0, 0.01).name('Zoom Factor');
      const offsetXController = folderCamera.add(params, 'offsetX', -5.0, 5.0, 0.01).name('Offset X');
      const offsetYController = folderCamera.add(params, 'offsetY', -5.0, 5.0, 0.01).name('Offset Y');

      // Colors Folder
      const folderColors = gui.addFolder('Colors');
      folderColors.add(params, 'colorScheme', Object.keys(colorSchemes)).name('Color Preset').onChange(applyPresetScheme);
      
      const controllerBg = folderColors.addColor(params, 'colorBg').name('Background').onChange(v => {
        uniforms.u_colorBg.value.set(v);
      });
      const controllerFg = folderColors.addColor(params, 'colorFg').name('Foreground').onChange(v => {
        uniforms.u_colorFg.value.set(v);
      });

      // Animations Folder
      const folderAnimations = gui.addFolder('Animations');
      folderAnimations.add(params, 'animationMode', [
        'Hypnotic Spin',
        'Radial Pulse',
        'Orbiting Cam',
        'Color Shift',
        'Chaotic Drift'
      ]).name('Preset Animation');

      // Auto update color pickers when theme is changed
      function applyPresetScheme(schemeName) {
        const scheme = colorSchemes[schemeName];
        if (scheme) {
          params.colorBg = scheme.colorBg;
          params.colorFg = scheme.colorFg;

          uniforms.u_colorBg.value.set(params.colorBg);
          uniforms.u_colorFg.value.set(params.colorFg);

          controllerBg.setValue(params.colorBg);
          controllerFg.setValue(params.colorFg);
        }
      }

      // Hide / Show GUI with H key
      let guiVisible = true;
      window.addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') {
          guiVisible = !guiVisible;
          if (guiVisible) {
            gui.show();
          } else {
            gui.hide();
          }
        }
      });
    }

    function onWindowResize( event ) {
      renderer.setSize( window.innerWidth, window.innerHeight );
      uniforms.u_resolution.value.x = renderer.domElement.width;
      uniforms.u_resolution.value.y = renderer.domElement.height;
    }

    function animate(delta) {
      requestAnimationFrame( animate );
      render(delta);
    }

    // Video Capturing Configuration (Safe Fallback)
    let capturer = null;
    if (typeof CCapture !== 'undefined') {
      capturer = new CCapture({ 
        verbose: true, 
        framerate: 60,
        quality: 90,
        format: 'webm',
        workersPath: 'js/'
      });
    }
    let capturing = false;

    window.isCapturing = function(val) {
      if (typeof CCapture === 'undefined' || !capturer) return;
      if (val === false && capturing === true) {
        capturer.stop();
        capturer.save();
      } else if (val === true && capturing === false) {
        capturer.start();
      }
      capturing = val;
    }
    window.toggleCapture = function() {
      window.isCapturing(!capturing);
    }

    window.addEventListener('keyup', function(e) { if(e.keyCode == 68) window.toggleCapture(); });

    function render(delta) {
      const time = delta || 0;
      uniforms.u_time.value = time * 0.0005;
      
      // Calculate animated camera / parameter values based on selected preset
      let activeZoom = params.zoom;
      let activeOffsetX = params.offsetX;
      let activeOffsetY = params.offsetY;

      const t = time * 0.001;

      if (params.animationMode === 'Hypnotic Spin') {
        // Slow circular movement of offsets + mild zooming pulse
        activeOffsetX = params.offsetX + 0.3 * Math.sin(t * 0.6);
        activeOffsetY = params.offsetY + 0.3 * Math.cos(t * 0.6);
        activeZoom = params.zoom * (1.0 + 0.15 * Math.sin(t * 0.8));
      } else if (params.animationMode === 'Radial Pulse') {
        // Zoom pulses in and out deeply
        activeZoom = params.zoom * (1.0 + 0.45 * Math.sin(t * 1.5));
      } else if (params.animationMode === 'Orbiting Cam') {
        // Panning coordinates orbit in a circle
        activeOffsetX = params.offsetX + 0.6 * Math.sin(t * 0.8);
        activeOffsetY = params.offsetY + 0.6 * Math.cos(t * 0.8);
      } else if (params.animationMode === 'Color Shift') {
        // Setting shift animation: shifts the hue of the foreground color over time
        const shiftColor = (baseHex) => {
          const c = new THREE.Color(baseHex);
          const hsl = {};
          c.getHSL(hsl);
          hsl.h = (hsl.h + t * 0.05) % 1.0;
          c.setHSL(hsl.h, hsl.s, hsl.l);
          return c;
        };
        uniforms.u_colorFg.value.copy(shiftColor(params.colorFg));
      } else if (params.animationMode === 'Chaotic Drift') {
        // Complex Lissajous and zoom oscillations
        activeZoom = params.zoom * (1.0 + 0.25 * Math.sin(t * 1.1));
        activeOffsetX = params.offsetX + 0.4 * Math.sin(t * 0.7) * Math.cos(t * 0.3);
        activeOffsetY = params.offsetY + 0.4 * Math.cos(t * 0.5) * Math.sin(t * 0.9);
      }

      // If NOT in Color Shift mode, reset uniform color to match GUI params
      if (params.animationMode !== 'Color Shift') {
        uniforms.u_colorFg.value.set(params.colorFg);
      }

      uniforms.u_zoom.value = activeZoom;
      uniforms.u_offset.value.set(activeOffsetX, activeOffsetY);

      renderer.render( scene, camera );
      
      if (capturing && capturer) {
        capturer.capture( renderer.domElement );
      }
    }
  </script>
</body>
</html>
