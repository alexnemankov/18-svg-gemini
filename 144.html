<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity Fractal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>
  <script type="module">
    import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // State & parameters
    const settings = {
      greenScreen: false,
      colorScheme: 'Neon Cyberpunk',
      colorTint: '#ffffff',
      hueOff: 0.85,
      hueScale: 3.50,
      satMult: -1.0,
      brightness: 1100.0,
      
      animationPreset: 'Cosmic Rotate',
      animSpeed: 1.0,
      dpr: Math.min(window.devicePixelRatio, 2),
      
      depthStep: 0.5,
      rotSpeed: 0.04,
      outerIter: 70,
      innerIter: 26,
      sInit: 2.5,
      minFold: 1.00,
      foldStr: 23.0,
      foldOff: 1.25,
      foldBX: 2.65,
      foldBY: 1.40,
      foldBZ: 2.0,
      modScale: 5.00,
      sLogMul: 0.75,
    };

    const PRESET_SCHEMES = {
      'Neon Cyberpunk': { hueOff: 0.85, hueScale: 3.50, satMult: -1.0, brightness: 1100.0, colorTint: '#ffffff' },
      'Golden Obsidian': { hueOff: 0.12, hueScale: 0.80, satMult: -0.85, brightness: 900.0, colorTint: '#ffaa44' },
      'Emerald Matrix': { hueOff: 0.33, hueScale: 2.00, satMult: -0.95, brightness: 1200.0, colorTint: '#55ff88' },
      'Deep Ocean Blue': { hueOff: 0.58, hueScale: 2.20, satMult: -0.90, brightness: 1300.0, colorTint: '#4488ff' },
      'Sunset Mirage': { hueOff: 0.02, hueScale: 1.80, satMult: -0.95, brightness: 1000.0, colorTint: '#ff5577' }
    };

    // Keep track of manual zoom and pan values
    let manualZoom = 0.17;
    let manualPanX = 0.00;
    let manualPanY = 1.00;

    const U = v => ({ value: v });

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(settings.dpr);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    const mat = new THREE.ShaderMaterial({
      uniforms: {
        time:       U(0.0),
        res:        U(new THREE.Vector2(window.innerWidth, window.innerHeight)),
        uvScale:    U(manualZoom),
        uvOffX:     U(manualPanX),
        uvOffY:     U(manualPanY),
        depthStep:  U(settings.depthStep),
        rotSpeed:   U(settings.rotSpeed),
        outerIter:  U(settings.outerIter),
        innerIter:  U(settings.innerIter),
        sInit:      U(settings.sInit),
        minFold:    U(settings.minFold),
        foldStr:    U(settings.foldStr),
        foldOff:    U(settings.foldOff),
        foldBX:     U(settings.foldBX),
        foldBY:     U(settings.foldBY),
        foldBZ:     U(settings.foldBZ),
        modScale:   U(settings.modScale),
        sLogMul:    U(settings.sLogMul),
        brightness: U(settings.brightness),
        hueOff:     U(settings.hueOff),
        hueScale:   U(settings.hueScale),
        satMult:    U(settings.satMult),
        u_greenscreen: U(settings.greenScreen),
        u_colorTint:   U(new THREE.Color(settings.colorTint))
      },

      vertexShader: `void main(){ gl_Position = vec4(position.xy, 0.0, 1.0); }`,

      fragmentShader: `
        precision highp float;
        uniform float time;
        uniform vec2  res;
        uniform float uvScale;
        uniform float uvOffX;
        uniform float uvOffY;
        uniform float depthStep;
        uniform float rotSpeed;
        uniform int   outerIter;
        uniform int   innerIter;
        uniform float sInit;
        uniform float minFold;
        uniform float foldStr;
        uniform float foldOff;
        uniform float foldBX;
        uniform float foldBY;
        uniform float foldBZ;
        uniform float modScale;
        uniform float sLogMul;
        uniform float brightness;
        uniform float hueOff;
        uniform float hueScale;
        uniform float satMult;
        uniform bool  u_greenscreen;
        uniform vec3  u_colorTint;

        #define MAX_OUTER 600
        #define MAX_INNER  70

        vec3 hsv(float h, float s, float v){
          vec4 K = vec4(1., 2./3., 1./3., 3.);
          vec3 p = abs(fract(vec3(h) + K.xyz) * 3. - K.www);
          return v * mix(K.xxx, clamp(p - K.xxx, 0., 2.), s);
        }
        mat2 rotate2D(float a){ float c=cos(a),s=sin(a); return mat2(c,-s,s,c); }

        void main(){
          vec4  o = vec4(0.0);
          vec2 FC = gl_FragCoord.xy;
          float t = time;
          float g = 0.0;

          for(int oi = 0; oi < MAX_OUTER; oi++){
            if(oi >= outerIter) break;
            float e = 0.0;
            vec3 p = vec3(((FC.xy*2.8 - res)/res.x)*uvScale + vec2(uvOffX,uvOffY), g + depthStep);
            p.zx *= rotate2D(t * rotSpeed);
            float s = sInit;
            for(int ii = 0; ii < MAX_INNER; ii++){
              if(ii >= innerIter) break;
              s *= e = max(minFold, foldStr / dot(p,p));
              p  = vec3(foldBX,foldBY,foldBZ) - abs(abs(p)*e - vec3(foldOff));
            }
            g += mod(length(p.xz), p.y + modScale) / s;
            s = log(s * sLogMul);
            o.rgb += hsv(hueOff + g*hueScale, p.z*satMult, s/brightness);
          }
          o.rgb *= u_colorTint;
          if (u_greenscreen) {
            float luma = dot(o.rgb, vec3(0.299, 0.587, 0.114));
            float mask = smoothstep(0.0, 0.15, luma);
            o.rgb = mix(vec3(0.0, 1.0, 0.0), o.rgb, mask);
          }
          o.a = 1.0;
          gl_FragColor = o;
        }
      `,
    });

    scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat));

    // Animated params definition
    const ANIM_DEFS = [
      { key: 'depthStep', min: 0.01, max: 1, freq: 0.01, phase: 0.00 },
      { key: 'foldBX',   min: .10,  max: 2.20, freq: 0.01, phase: 1.05 },
      { key: 'foldBY',   min: 3.5,  max: 5.4, freq: 0.05, phase: 2.09 },
      { key: 'foldOff',  min: 3.0,  max: 7.6, freq: 0.06, phase: 3.14 },
      { key: 'hueOff',   min: 0.5,  max: 1.00, freq: 0.045, phase: 4.19 },
      { key: 'hueScale', min: 3.20,  max: 7.00, freq: 0.055, phase: 5.24 },
    ];

    const clock = new THREE.Clock();
    let animTime = 0;

    // GUI Setup
    const gui = new GUI({ title: 'Antigravity Controller' });

    // Greenscreen Control
    gui.add(settings, 'greenScreen').name('Green Screen').onChange(v => {
      mat.uniforms.u_greenscreen.value = v;
      document.body.style.backgroundColor = v ? '#00ff00' : '#000000';
    });

    // Color controls folder
    const fColor = gui.addFolder('Colors');
    const schemeCtrl = fColor.add(settings, 'colorScheme', [...Object.keys(PRESET_SCHEMES), 'Custom']).name('Preset Scheme');
    
    const tintCtrl = fColor.addColor(settings, 'colorTint').name('Color Tint').onChange(v => {
      mat.uniforms.u_colorTint.value.set(v);
      settings.colorScheme = 'Custom';
      schemeCtrl.updateDisplay();
    });
    
    const hueOffCtrl = fColor.add(settings, 'hueOff', 0.0, 1.0, 0.01).name('Hue Offset').onChange(v => {
      mat.uniforms.hueOff.value = v;
      settings.colorScheme = 'Custom';
      schemeCtrl.updateDisplay();
    });
    
    const hueScaleCtrl = fColor.add(settings, 'hueScale', 0.0, 10.0, 0.05).name('Hue Scale').onChange(v => {
      mat.uniforms.hueScale.value = v;
      settings.colorScheme = 'Custom';
      schemeCtrl.updateDisplay();
    });
    
    const satMultCtrl = fColor.add(settings, 'satMult', -2.0, 0.0, 0.05).name('Sat Multiplier').onChange(v => {
      mat.uniforms.satMult.value = v;
      settings.colorScheme = 'Custom';
      schemeCtrl.updateDisplay();
    });
    
    const brightnessCtrl = fColor.add(settings, 'brightness', 100.0, 3000.0, 10.0).name('Brightness').onChange(v => {
      mat.uniforms.brightness.value = v;
      settings.colorScheme = 'Custom';
      schemeCtrl.updateDisplay();
    });

    schemeCtrl.onChange(v => {
      if (v !== 'Custom') {
        const scheme = PRESET_SCHEMES[v];
        settings.colorTint = scheme.colorTint;
        settings.hueOff = scheme.hueOff;
        settings.hueScale = scheme.hueScale;
        settings.satMult = scheme.satMult;
        settings.brightness = scheme.brightness;
        
        mat.uniforms.u_colorTint.value.set(scheme.colorTint);
        mat.uniforms.hueOff.value = scheme.hueOff;
        mat.uniforms.hueScale.value = scheme.hueScale;
        mat.uniforms.satMult.value = scheme.satMult;
        mat.uniforms.brightness.value = scheme.brightness;
        
        tintCtrl.updateDisplay();
        hueOffCtrl.updateDisplay();
        hueScaleCtrl.updateDisplay();
        satMultCtrl.updateDisplay();
        brightnessCtrl.updateDisplay();
      }
    });

    // Preset selection initialization
    // Apply Neon Cyberpunk initially
    const initScheme = PRESET_SCHEMES['Neon Cyberpunk'];
    mat.uniforms.hueOff.value = initScheme.hueOff;
    mat.uniforms.hueScale.value = initScheme.hueScale;
    mat.uniforms.satMult.value = initScheme.satMult;
    mat.uniforms.brightness.value = initScheme.brightness;
    mat.uniforms.u_colorTint.value.set(initScheme.colorTint);

    // Animation folder
    const fAnim = gui.addFolder('Camera & Animation');
    fAnim.add(settings, 'animationPreset', ['Static', 'Gentle Drift', 'Cosmic Rotate', 'Vortex Zoom', 'Psychedelic Sway']).name('Preset');
    fAnim.add(settings, 'animSpeed', 0.0, 5.0, 0.1).name('Speed');

    // Settings folder
    const fSettings = gui.addFolder('Render Settings');
    fSettings.add(settings, 'dpr', 0.5, 3.0, 0.1).name('DPR (Pixel Ratio)').onChange(v => {
      renderer.setPixelRatio(v);
    });

    // Fractal parameters folder
    const fParams = gui.addFolder('Fractal Parameters');
    fParams.close();

    const controllers = {};
    const addParam = (key, min, max, step) => {
      controllers[key] = fParams.add(settings, key, min, max, step).name(key).onChange(v => {
        mat.uniforms[key].value = v;
      });
    };

    addParam('depthStep', 0.01, 1.0, 0.01);
    addParam('rotSpeed', -0.5, 0.5, 0.005);
    addParam('outerIter', 5, 200, 1);
    addParam('innerIter', 5, 50, 1);
    addParam('sInit', 0.5, 5.0, 0.05);
    addParam('minFold', 0.1, 3.0, 0.05);
    addParam('foldStr', 1.0, 50.0, 0.5);
    addParam('foldOff', 0.1, 10.0, 0.05);
    addParam('foldBX', 0.1, 5.0, 0.05);
    addParam('foldBY', 0.1, 5.0, 0.05);
    addParam('foldBZ', 0.1, 5.0, 0.05);
    addParam('modScale', 1.0, 20.0, 0.2);
    addParam('sLogMul', 0.1, 2.0, 0.05);

    // Zoom and pan event listeners
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let dragStartOffX = 0;
    let dragStartOffY = 0;

    window.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.lil-gui')) return;
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      dragStartOffX = manualPanX;
      dragStartOffY = manualPanY;
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
    });

    function onPointerMove(e) {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      
      const factor = (2.8 * manualZoom) / window.innerHeight;
      manualPanX = dragStartOffX - dx * factor;
      manualPanY = dragStartOffY + dy * factor;
    }

    function onPointerUp() {
      isDragging = false;
      window.removeEventListener('pointermove', onPointerMove);
      window.removeEventListener('pointerup', onPointerUp);
    }

    window.addEventListener('wheel', (e) => {
      if (e.target.closest('.lil-gui')) return;
      const zoomFactor = 1.08;
      if (e.deltaY < 0) {
        manualZoom /= zoomFactor;
      } else {
        manualZoom *= zoomFactor;
      }
      manualZoom = Math.max(0.002, Math.min(manualZoom, 10.0));
    }, { passive: true });

    // Keyboard shortcut (H key) to toggle UI
    let uiVisible = true;
    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'h') {
        uiVisible = !uiVisible;
        if (uiVisible) {
          gui.show();
        } else {
          gui.hide();
        }
      }
    });

    // Animation Loop
    (function animate(){
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      animTime += delta * 0.01 * settings.animSpeed;
      mat.uniforms.time.value = clock.elapsedTime;

      // Animate fractal parameters from ANIM_DEFS if animSpeed > 0
      for (const def of ANIM_DEFS) {
        if (settings.animSpeed > 0) {
          const t = (Math.sin(animTime * def.freq * Math.PI * 2 + def.phase) + 1) / 2;
          const val = def.min + (def.max - def.min) * t;
          settings[def.key] = val;
          mat.uniforms[def.key].value = val;
          if (controllers[def.key]) {
            controllers[def.key].updateDisplay();
          }
          if (def.key === 'hueOff' && hueOffCtrl) hueOffCtrl.updateDisplay();
          if (def.key === 'hueScale' && hueScaleCtrl) hueScaleCtrl.updateDisplay();
        } else {
          mat.uniforms[def.key].value = settings[def.key];
        }
      }

      // Calculate camera/view parameters based on selected animation preset
      let currentZoom = manualZoom;
      let currentPanX = manualPanX;
      let currentPanY = manualPanY;

      if (settings.animationPreset === 'Static') {
        mat.uniforms.rotSpeed.value = settings.rotSpeed;
        if (controllers['rotSpeed']) controllers['rotSpeed'].updateDisplay();
      } else if (settings.animationPreset === 'Gentle Drift') {
        mat.uniforms.rotSpeed.value = 0.01;
        currentPanX += Math.sin(animTime * 0.5) * 0.05 * manualZoom;
        currentPanY += Math.cos(animTime * 0.3) * 0.05 * manualZoom;
      } else if (settings.animationPreset === 'Cosmic Rotate') {
        mat.uniforms.rotSpeed.value = 0.04;
        currentZoom *= (1.0 + Math.sin(animTime * 0.4) * 0.15);
      } else if (settings.animationPreset === 'Vortex Zoom') {
        mat.uniforms.rotSpeed.value = 0.06;
        currentZoom *= (1.0 + Math.sin(animTime * 0.6) * 0.3);
        currentPanX += Math.sin(animTime * 0.8) * 0.08 * manualZoom;
        currentPanY += Math.cos(animTime * 0.8) * 0.08 * manualZoom;
      } else if (settings.animationPreset === 'Psychedelic Sway') {
        mat.uniforms.rotSpeed.value = 0.04 * Math.sin(animTime * 0.5);
        currentPanX += Math.sin(animTime * 0.4) * 0.08 * manualZoom;
      }

      mat.uniforms.uvScale.value = currentZoom;
      mat.uniforms.uvOffX.value = currentPanX;
      mat.uniforms.uvOffY.value = currentPanY;

      renderer.render(scene, camera);
    })();

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      mat.uniforms.res.value.set(window.innerWidth, window.innerHeight);
    });

  </script>
</body>
</html>
