<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windy Particle Stream Simulator</title>
    <!-- Modern Premium Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background-color: #1e1e24;
            transition: background-color 0.3s ease;
        }

        #scene {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
            transform: translateZ(0);
        }
        #scene:active {
            cursor: grabbing;
        }

        /* Instructions Overlay */
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e2e8f0;
            font-size: 13px;
            font-weight: 400;
            padding: 10px 18px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            pointer-events: none;
            user-select: none;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #reset-cam-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #94a3b8;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s;
            font-family: inherit;
        }
        #reset-cam-btn:hover {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        /* Show Button */
        #show-btn {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: rgba(15, 23, 42, 0.85);
            color: white;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            display: flex; 
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 90;
        }
        #show-btn:hover {
            transform: scale(1.1) rotate(45deg);
            background: rgba(30, 41, 59, 0.95);
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        /* Panel */
        #controls {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 320px;
            background: rgba(15, 23, 42, 0.85);
            color: #f1f5f9;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 100;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #controls.hidden {
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            margin-bottom: 4px;
        }

        .panel-header h3 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #38bdf8;
        }

        #hide-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        #hide-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }

        #controls::-webkit-scrollbar { width: 5px; }
        #controls::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.15); border-radius: 4px; }
        #controls::-webkit-scrollbar-thumb:hover { background-color: rgba(255, 255, 255, 0.3); }

        .control-group { display: flex; flex-direction: column; gap: 6px; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        
        label { font-size: 13px; font-weight: 500; color: #cbd5e1; }
        span.val { font-family: 'Space Mono', monospace; color: #38bdf8; font-size: 12px; }

        input[type="range"] { 
            width: 100%; 
            cursor: pointer; 
            accent-color: #38bdf8; 
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            height: 6px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #38bdf8;
            cursor: pointer;
            margin-top: -4px;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type="file"] { font-size: 12px; color: #94a3b8; }
        input[type="file"]::file-selector-button {
            background: rgba(255, 255, 255, 0.08); 
            color: #e2e8f0; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 6px 12px;
            border-radius: 6px; 
            cursor: pointer; 
            margin-right: 10px;
            transition: all 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background: rgba(56, 189, 248, 0.15);
            border-color: rgba(56, 189, 248, 0.4);
            color: #38bdf8;
        }

        /* Color inputs styling */
        .color-pickers-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .color-picker-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .color-picker-wrapper label {
            font-size: 11px;
            color: #94a3b8;
        }
        input[type="color"] { 
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
        }

        /* Select styling */
        select {
            width: 100%;
            height: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            cursor: pointer;
            background: rgba(15, 23, 42, 0.9);
            color: #e2e8f0;
            padding: 0 8px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus {
            border-color: #38bdf8;
        }

        /* Checkbox styling */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }
        .checkbox-container input {
            cursor: pointer;
            accent-color: #38bdf8;
            width: 16px;
            height: 16px;
        }

        .divider { height: 1px; background: rgba(255, 255, 255, 0.1); margin: 6px 0; }
        
        .highlight label { color: #fef08a; }
    </style>
</head>
<body>
    <div id="instructions">
        <span>🖱️ <strong>Drag</strong> to Pan</span>
        <span style="color: rgba(255,255,255,0.3)">|</span>
        <span>📜 <strong>Wheel</strong> to Zoom</span>
        <span style="color: rgba(255,255,255,0.3)">|</span>
        <button id="reset-cam-btn">Reset View</button>
    </div>

    <canvas id="scene"></canvas>

    <button id="show-btn" style="display:none;">⚙️</button>

    <div id="controls">
        <div class="panel-header">
            <h3>Settings</h3>
            <button id="hide-btn">Hide</button>
        </div>

        <div class="control-group">
            <div class="row">
                <label>Preset Schemes</label>
            </div>
            <select id="schemeSelect">
                <option value="autumn">🍁 Autumn Breeze (Default)</option>
                <option value="cyberpunk">💥 Cyberpunk Neon</option>
                <option value="forest">🌲 Forest Moss</option>
                <option value="royal">👑 Midnight Gold</option>
                <option value="ice">❄️ Ice Spark</option>
            </select>
        </div>

        <div class="control-group">
            <div class="row">
                <label>Color Customization</label>
            </div>
            <div class="color-pickers-row">
                <div class="color-picker-wrapper">
                    <input type="color" id="bgColor" value="#1e1e24">
                    <label>Background</label>
                </div>
                <div class="color-picker-wrapper">
                    <input type="color" id="partColor" value="#e67e22">
                    <label>Particle Fill</label>
                </div>
                <div class="color-picker-wrapper">
                    <input type="color" id="partOutline" value="#d35400">
                    <label>Outline</label>
                </div>
            </div>
        </div>

        <div class="control-group">
            <label class="checkbox-container">
                <input type="checkbox" id="greenscreenToggle">
                <span style="font-size: 13px; font-weight: 500;">Enable Green Screen (#00ff00)</span>
            </label>
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <div class="row"><label>Min Wind Speed</label><span id="val-minWind" class="val">1.5</span></div>
            <input type="range" id="minWind" min="0" max="40" step="0.5" value="1.5">
        </div>

        <div class="control-group">
            <div class="row"><label>Max Wind Speed</label><span id="val-maxWind" class="val">38</span></div>
            <input type="range" id="maxWind" min="0" max="60" step="0.5" value="38">
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <div class="row"><label>Min Scale (Size)</label><span id="val-minSize" class="val">16px</span></div>
            <input type="range" id="minSize" min="2" max="100" value="16">
        </div>

        <div class="control-group">
            <div class="row"><label>Max Scale (Size)</label><span id="val-maxSize" class="val">57px</span></div>
            <input type="range" id="maxSize" min="2" max="200" value="57">
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <div class="row"><label>Stream Height (Y)</label><span id="val-emitY" class="val">50%</span></div>
            <input type="range" id="emitterY" min="0" max="100" value="50">
        </div>
        <div class="control-group">
            <div class="row"><label>Stream Spread</label><span id="val-spread" class="val">54%</span></div>
            <input type="range" id="emitterSpread" min="0" max="100" value="54">
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <div class="row"><label>Gravity</label><span id="val-gravity" class="val">0</span></div>
            <input type="range" id="gravity" min="-2" max="5" step="0.1" value="0">
        </div>

        <div class="control-group">
            <div class="row"><label>Turbulence</label><span id="val-turb" class="val">0.8</span></div>
            <input type="range" id="turbulence" min="0" max="5" step="0.1" value="0.8">
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <div class="row"><label>2D Spin Speed</label><span id="val-rot" class="val">0</span></div>
            <input type="range" id="rotationSpeed" min="0" max="0.5" step="0.01" value="0">
        </div>
        
        <!-- NEW PARAMETER -->
        <div class="control-group highlight">
            <div class="row"><label>Static Tilt (Y-Axis)</label><span id="val-tilt" class="val">0°</span></div>
            <input type="range" id="staticTilt" min="0" max="180" step="1" value="0">
        </div>

        <div class="control-group">
            <div class="row"><label>3D Tumble Animation</label><span id="val-3d" class="val">0.4</span></div>
            <input type="range" id="tumbleStrength" min="0" max="10" step="0.1" value="0.4">
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <div class="row"><label>Count</label><span id="val-count" class="val">100</span></div>
            <input type="range" id="particleCount" min="10" max="800" value="100">
        </div>

        <div class="control-group">
            <label>Upload Images (PNG/SVG)</label>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('scene');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let loadedImages = []; 

        // Camera transform parameters for zoom & pan
        const camera = {
            x: 0,
            y: 0,
            zoom: 1.0
        };

        const settings = {
            bgColor: '#1e1e24',
            partColor: '#e67e22',
            partOutline: '#d35400',
            greenscreen: false,
            minWind: 1.5,
            maxWind: 38,
            minSize: 16,
            maxSize: 57,
            emitterY: 0.5,       
            emitterSpread: 0.54, 
            gravity: 0,
            turbulence: 0.8,
            rotationSpeed: 0,    
            tumbleStrength: 0.4, 
            staticTilt: 0, 
            particleCount: 100
        };

        // Preconfigured color schemes
        const colorSchemes = {
            autumn: {
                bgColor: '#1e1e24',
                partColor: '#e67e22',
                partOutline: '#d35400'
            },
            cyberpunk: {
                bgColor: '#080710',
                partColor: '#ff007f',
                partOutline: '#00ffff'
            },
            forest: {
                bgColor: '#0f1711',
                partColor: '#4ade80',
                partOutline: '#14532d'
            },
            royal: {
                bgColor: '#0b0c10',
                partColor: '#ffd700',
                partOutline: '#b8860b'
            },
            ice: {
                bgColor: '#0f172a',
                partColor: '#38bdf8',
                partOutline: '#1d4ed8'
            }
        };

        // Generates canvas image representing a leaf with chosen fill and outline
        function createDefaultImage(fillColor, strokeColor) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 128; 
            tempCanvas.height = 128;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.scale(2, 2);
            tCtx.beginPath();
            tCtx.moveTo(32, 5);
            tCtx.quadraticCurveTo(5, 32, 32, 59);
            tCtx.quadraticCurveTo(59, 32, 32, 5);
            tCtx.fillStyle = fillColor;
            tCtx.fill();
            tCtx.strokeStyle = strokeColor;
            tCtx.lineWidth = 2;
            tCtx.stroke();
            tCtx.beginPath();
            tCtx.moveTo(32, 5);
            tCtx.lineTo(32, 59);
            tCtx.stroke();
            const img = new Image();
            img.src = tempCanvas.toDataURL();
            return img;
        }

        // Initialize loadedImages with default leaf using settings color
        loadedImages.push(createDefaultImage(settings.partColor, settings.partOutline));

        function updateDefaultImage() {
            const img = createDefaultImage(settings.partColor, settings.partOutline);
            loadedImages[0] = img;
            particles.forEach(p => {
                if (!p.isUploaded) {
                    p.image = img;
                }
            });
        }

        function updateBackgroundMode() {
            const finalBgColor = settings.greenscreen ? '#00ff00' : settings.bgColor;
            document.body.style.backgroundColor = finalBgColor;
        }

        function rotateVector(x, y, z, ax, ay, az) {
            let cos = Math.cos(az);
            let sin = Math.sin(az);
            let x1 = x * cos - y * sin;
            let y1 = x * sin + y * cos;
            let z1 = z;

            cos = Math.cos(ay);
            sin = Math.sin(ay);
            let x2 = x1 * cos + z1 * sin;
            let y2 = y1;
            let z2 = -x1 * sin + z1 * cos;

            cos = Math.cos(ax);
            sin = Math.sin(ax);
            let x3 = x2;
            let y3 = y2 * cos - z2 * sin;
            let z3 = y2 * sin + z2 * cos;

            return { x: x3, y: y3, z: z3 };
        }

        class Particle {
            constructor(initOnScreen = false) {
                this.reset(initOnScreen);
            }

            reset(initOnScreen = false) {
                const customImages = loadedImages.slice(1);
                if (customImages.length > 0) {
                    this.image = customImages[Math.floor(Math.random() * customImages.length)];
                    this.isUploaded = true;
                } else {
                    this.image = loadedImages[0];
                    this.isUploaded = false;
                }
                
                const minS = Math.min(settings.minSize, settings.maxSize);
                const maxS = Math.max(settings.minSize, settings.maxSize);
                this.width = minS + Math.random() * (maxS - minS);
                
                if (this.image && this.image.width && this.image.height) {
                    this.height = this.width * (this.image.height / this.image.width);
                } else {
                    this.height = this.width;
                }

                // Compute screen limits transformed into world space coordinates
                const worldLeft = -camera.x / camera.zoom;
                const worldRight = (width - camera.x) / camera.zoom;
                const worldTop = -camera.y / camera.zoom;
                const worldBottom = (height - camera.y) / camera.zoom;
                const worldWidth = worldRight - worldLeft;
                const worldHeight = worldBottom - worldTop;

                const centerY = worldTop + worldHeight * settings.emitterY;
                const spreadHeight = worldHeight * settings.emitterSpread;
                const minY = centerY - (spreadHeight / 2);
                const maxY = centerY + (spreadHeight / 2);
                
                this.y = minY + Math.random() * (maxY - minY);
                this.x = initOnScreen ? worldLeft + Math.random() * worldWidth : worldLeft - this.width - (Math.random() * 200);

                this.windFactor = Math.random(); 
                const sizeFactor = (this.width - minS) / (maxS - minS || 1);
                this.windFactor = 1.0 - (sizeFactor * 0.5 + Math.random() * 0.5); 
                this.windFactor = Math.max(0.1, Math.min(1, this.windFactor));

                this.vx = 0; 
                this.vy = 0; 
                this.waveOffset = Math.random() * Math.PI * 2;
                
                this.angleZ = Math.random() * 360; 
                this.spinZ = (Math.random() - 0.5) * settings.rotationSpeed;

                this.angleX = 0; 
                this.angleY = 0;
                
                this.spinX = (Math.random() - 0.5) * 0.1;
                this.spinY = (Math.random() - 0.5) * 0.1;
            }

            update() {
                const realMin = Math.min(settings.minWind, settings.maxWind);
                const realMax = Math.max(settings.minWind, settings.maxWind);
                const targetSpeed = realMin + (realMax - realMin) * this.windFactor;

                this.vx += (targetSpeed - this.vx) * 0.1;
                this.x += this.vx;

                const gravityMod = 1.5 - this.windFactor; 
                this.vy += settings.gravity * 0.05 * gravityMod;
                
                const wave = Math.sin(this.x * 0.01 + this.waveOffset);
                this.vy += wave * (settings.turbulence * 0.05);
                this.vy *= 0.98; 
                this.y += this.vy;

                this.angleZ += this.spinZ + (this.vx * 0.002);
                
                if (settings.tumbleStrength > 0) {
                    this.angleX += this.spinX * settings.tumbleStrength;
                    this.angleY += this.spinY * settings.tumbleStrength;
                }

                // Wrap boundaries computed in world space
                const worldLeft = -camera.x / camera.zoom;
                const worldRight = (width - camera.x) / camera.zoom;
                const worldTop = -camera.y / camera.zoom;
                const worldBottom = (height - camera.y) / camera.zoom;

                const buffer = 200 / camera.zoom;
                if (this.x > worldRight + buffer || this.x < worldLeft - buffer - 300 || 
                    this.y > worldBottom + buffer || this.y < worldTop - buffer) {
                    this.reset(false);
                }
            }

            draw() {
                if (!this.image) return;
                
                const tiltRad = (settings.staticTilt * Math.PI) / 180;

                const radZ = this.angleZ; 
                const vecU = rotateVector(1, 0, 0, this.angleX, this.angleY + tiltRad, radZ);
                const vecV = rotateVector(0, 1, 0, this.angleX, this.angleY + tiltRad, radZ);
                
                ctx.save();
                ctx.translate(this.x, this.y);

                ctx.transform(vecU.x, vecU.y, vecV.x, vecV.y, 0, 0);
                
                ctx.drawImage(this.image, -this.width / 2, -this.height / 2, this.width, this.height);

                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
        }

        function initParticles() {
            particles = [];
            for(let i=0; i<settings.particleCount; i++){
                particles.push(new Particle(true));
            }
        }

        function animate() {
            ctx.fillStyle = settings.greenscreen ? '#00ff00' : settings.bgColor;
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.translate(camera.x, camera.y);
            ctx.scale(camera.zoom, camera.zoom);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            ctx.restore();

            requestAnimationFrame(animate);
        }

        function adjustParticleCount() {
            const diff = settings.particleCount - particles.length;
            if (diff > 0) {
                for(let i=0; i<diff; i++) particles.push(new Particle(true));
            } else {
                particles.splice(0, Math.abs(diff));
            }
        }

        // --- Drag & Zoom Interaction Logic ---
        let isDragging = false;
        let startX = 0;
        let startY = 0;

        canvas.addEventListener('mousedown', (e) => {
            if (e.target === canvas) {
                isDragging = true;
                startX = e.clientX - camera.x;
                startY = e.clientY - camera.y;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                camera.x = e.clientX - startX;
                camera.y = e.clientY - startY;
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomIntensity = 0.08;
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            
            const worldX = (mouseX - camera.x) / camera.zoom;
            const worldY = (mouseY - camera.y) / camera.zoom;
            
            const zoomFactor = e.deltaY < 0 ? (1 + zoomIntensity) : (1 - zoomIntensity);
            camera.zoom = Math.max(0.1, Math.min(10, camera.zoom * zoomFactor));
            
            camera.x = mouseX - worldX * camera.zoom;
            camera.y = mouseY - worldY * camera.zoom;
        }, { passive: false });

        // Touch Interaction support for mobile (pan and pinch-to-zoom)
        let touchStartDist = 0;
        let touchStartZoom = 1;
        let touchStartPanX = 0;
        let touchStartPanY = 0;
        let touchStartCenter = { x: 0, y: 0 };
        let isTouchPanning = false;
        let isTouchZooming = false;

        canvas.addEventListener('touchstart', (e) => {
            if (e.target !== canvas) return;
            
            if (e.touches.length === 1) {
                isTouchPanning = true;
                startX = e.touches[0].clientX - camera.x;
                startY = e.touches[0].clientY - camera.y;
            } else if (e.touches.length === 2) {
                isTouchPanning = false;
                isTouchZooming = true;
                
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                
                touchStartDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                touchStartZoom = camera.zoom;
                
                touchStartCenter = {
                    x: (t1.clientX + t2.clientX) / 2,
                    y: (t1.clientY + t2.clientY) / 2
                };
                
                touchStartPanX = (touchStartCenter.x - camera.x) / camera.zoom;
                touchStartPanY = (touchStartCenter.y - camera.y) / camera.zoom;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (isTouchPanning && e.touches.length === 1) {
                camera.x = e.touches[0].clientX - startX;
                camera.y = e.touches[0].clientY - startY;
            } else if (isTouchZooming && e.touches.length === 2) {
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                
                const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                if (touchStartDist > 0) {
                    const factor = dist / touchStartDist;
                    camera.zoom = Math.max(0.1, Math.min(10, touchStartZoom * factor));
                    
                    const currentCenter = {
                        x: (t1.clientX + t2.clientX) / 2,
                        y: (t1.clientY + t2.clientY) / 2
                    };
                    
                    camera.x = currentCenter.x - touchStartPanX * camera.zoom;
                    camera.y = currentCenter.y - touchStartPanY * camera.zoom;
                }
            }
        });

        canvas.addEventListener('touchend', () => {
            isTouchPanning = false;
            isTouchZooming = false;
        });

        // Reset camera button interaction
        const resetCamBtn = document.getElementById('reset-cam-btn');
        resetCamBtn.addEventListener('click', () => {
            camera.x = 0;
            camera.y = 0;
            camera.zoom = 1.0;
        });

        // --- Preset Scheme Interaction ---
        const schemeSelect = document.getElementById('schemeSelect');
        schemeSelect.addEventListener('change', (e) => {
            const schemeName = e.target.value;
            const scheme = colorSchemes[schemeName];
            if (scheme) {
                if (settings.greenscreen) {
                    settings.greenscreen = false;
                    document.getElementById('greenscreenToggle').checked = false;
                }
                
                settings.bgColor = scheme.bgColor;
                settings.partColor = scheme.partColor;
                settings.partOutline = scheme.partOutline;

                // Update UI controllers
                document.getElementById('bgColor').value = scheme.bgColor;
                document.getElementById('partColor').value = scheme.partColor;
                document.getElementById('partOutline').value = scheme.partOutline;

                updateBackgroundMode();
                updateDefaultImage();
            }
        });

        // --- Greenscreen Interaction ---
        const greenscreenToggle = document.getElementById('greenscreenToggle');
        greenscreenToggle.addEventListener('change', (e) => {
            settings.greenscreen = e.target.checked;
            updateBackgroundMode();
        });

        // --- UI Panel Toggle ---
        const controlsPanel = document.getElementById('controls');
        const hideBtn = document.getElementById('hide-btn');
        const showBtn = document.getElementById('show-btn');

        hideBtn.addEventListener('click', () => {
            controlsPanel.classList.add('hidden');
            showBtn.style.display = 'flex';
        });

        showBtn.addEventListener('click', () => {
            controlsPanel.classList.remove('hidden');
            showBtn.style.display = 'none';
        });

        window.addEventListener('resize', resize);
        
        // Settings Mapping mapping UI elements to settings configurations
        const uiMap = [
            { id: 'bgColor', prop: 'bgColor', type: 'color', action: updateBackgroundMode },
            { id: 'partColor', prop: 'partColor', type: 'color', action: updateDefaultImage },
            { id: 'partOutline', prop: 'partOutline', type: 'color', action: updateDefaultImage },
            { id: 'minWind', prop: 'minWind', type: 'float', elId: 'val-minWind' },
            { id: 'maxWind', prop: 'maxWind', type: 'float', elId: 'val-maxWind' },
            { id: 'minSize', prop: 'minSize', type: 'float', elId: 'val-minSize', suffix: 'px' }, 
            { id: 'maxSize', prop: 'maxSize', type: 'float', elId: 'val-maxSize', suffix: 'px' },
            { id: 'emitterY', prop: 'emitterY', type: 'pct', elId: 'val-emitY' },
            { id: 'emitterSpread', prop: 'emitterSpread', type: 'pct', elId: 'val-spread' },
            { id: 'gravity', prop: 'gravity', type: 'float', elId: 'val-gravity' },
            { id: 'turbulence', prop: 'turbulence', type: 'float', elId: 'val-turb' },
            { id: 'particleCount', prop: 'particleCount', type: 'int', elId: 'val-count', action: adjustParticleCount },
            { id: 'rotationSpeed', prop: 'rotationSpeed', type: 'float', elId: 'val-rot', action: () => particles.forEach(p => p.spinZ = (Math.random()-0.5)*settings.rotationSpeed) },
            { id: 'tumbleStrength', prop: 'tumbleStrength', type: 'float', elId: 'val-3d' },
            { id: 'staticTilt', prop: 'staticTilt', type: 'int', elId: 'val-tilt', suffix: '°' }
        ];

        uiMap.forEach(conf => {
            const el = document.getElementById(conf.id);
            if (!el) return;
            el.addEventListener('input', e => {
                let val = e.target.value;
                if(conf.type === 'int') val = parseInt(val);
                else if(conf.type === 'float') val = parseFloat(val);
                else if(conf.type === 'pct') val = parseInt(val) / 100;

                settings[conf.prop] = val;

                if(conf.elId) {
                    const displayVal = conf.type === 'pct' ? Math.round(val*100) + '%' : (conf.suffix ? val + conf.suffix : val);
                    document.getElementById(conf.elId).innerText = displayVal;
                }
                if(conf.action) conf.action();
            });
        });

        // User Custom Image uploads handler
        document.getElementById('fileInput').addEventListener('change', e => {
            const files = e.target.files;
            if (files && files.length > 0) {
                const newImgs = [];
                let loaded = 0;
                for (let i = 0; i < files.length; i++) {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        const img = new Image();
                        img.onload = () => {
                            loaded++;
                            if (loaded === files.length) {
                                loadedImages = [loadedImages[0], ...newImgs];
                                particles.forEach(p => p.reset(true));
                            }
                        };
                        img.src = evt.target.result;
                        newImgs.push(img);
                    };
                    reader.readAsDataURL(files[i]);
                }
            }
        });

        // Initial setup and launch of loop
        resize(); 
        initParticles();
        animate();
    </script>
</body>
</html>
