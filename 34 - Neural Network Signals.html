<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Wave Network</title>
    <!-- Import map for Three.js and lil-gui -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.18.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000; /* Match reference background color */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        /* Custom styles for premium lil-gui look */
        .lil-gui {
            --background-color: rgba(20, 20, 25, 0.9);
            --text-color: #e2e8e0;
            --title-background-color: rgba(10, 10, 15, 0.95);
            --widget-color: rgba(40, 40, 50, 0.7);
            --hover-color: rgba(60, 60, 80, 0.9);
            --focus-color: #00ff88;
            --number-color: #00b3ff;
            --string-color: #ffaa00;
            font-family: inherit;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Floating Instructions Overlay */
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(226, 232, 224, 0.7);
            background: rgba(10, 10, 15, 0.75);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            pointer-events: none;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div id="instructions">Left-click & Drag the lines to move | Wheel to zoom | Right-click & Drag to rotate</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import GUI from 'lil-gui';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        // Set background color matching the reference image
        scene.background = new THREE.Color('#000000'); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 25;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = true;

        // --- Configuration Parameters ---
        const params = {
            count: 150,
            length: 25.0,
            color: '#e2e8e0',         // Line color
            signalColor: '#ffffff',   // Signal color
            bgColor: '#000000',
            greenScreen: false,       // Background override
            waviness: 1.5,
            waveFrequency: 0.3,
            opacity: 0.4,
            signalCount: 100,
            signalSpeed: 0.7,
            rotateWithCursor: false,
            resetPosition: () => {
                linesGroup.position.set(0, 0, 0);
                controls.target.set(0, 0, 0);
                camera.position.set(0, 0, 25);
                controls.update();
            }
        };

        // Group to hold all lines for easy rotation/management and panning
        const linesGroup = new THREE.Group();
        scene.add(linesGroup);

        // Add invisible helper sphere for dragging the group
        const dragHelperGeo = new THREE.SphereGeometry(15.0, 32, 32);
        const dragHelperMat = new THREE.MeshBasicMaterial({
            visible: false,
            depthWrite: false
        });
        const dragHelper = new THREE.Mesh(dragHelperGeo, dragHelperMat);
        linesGroup.add(dragHelper);

        let linePaths = []; // Store paths for animating impulses
        let impulsesPoints; 
        let impulseData = [];
        
        // Helper to create round points (circles) for impulses
        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.arc(8, 8, 8, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            return new THREE.CanvasTexture(canvas);
        }
        const circleTexture = createCircleTexture();

        // --- Generation Function ---
        let lineMaterial;

        function generateLines() {
            // Clear existing lines (except the drag helper mesh)
            const toRemove = [];
            linesGroup.children.forEach(child => {
                if (child !== dragHelper) {
                    toRemove.push(child);
                }
            });
            toRemove.forEach(child => {
                linesGroup.remove(child);
                child.geometry.dispose();
            });

            // Create or update material
            if (!lineMaterial) {
                lineMaterial = new THREE.LineBasicMaterial({
                    color: params.color,
                    transparent: true,
                    opacity: params.opacity,
                    blending: THREE.NormalBlending
                });
            } else {
                lineMaterial.color.set(params.color);
                lineMaterial.opacity = params.opacity;
            }

            const segments = 80; // Increased resolution for smoother lines
            linePaths = [];

            // Update drag helper geometry dynamically based on line length
            dragHelper.geometry.dispose();
            dragHelper.geometry = new THREE.SphereGeometry(params.length * 0.85, 32, 32);

            for (let i = 0; i < params.count; i++) {
                // Generate a random direction on a sphere
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                
                const dirX = Math.sin(phi) * Math.cos(theta);
                const dirY = Math.sin(phi) * Math.sin(theta);
                const dirZ = Math.cos(phi);
                
                const baseDir = new THREE.Vector3(dirX, dirY, dirZ);

                // Create orthogonal vectors for wave offset calculation
                const u = new THREE.Vector3(baseDir.y, -baseDir.x, 0).normalize();
                if (u.lengthSq() < 0.001) {
                    u.set(0, baseDir.z, -baseDir.y).normalize();
                }
                const v = new THREE.Vector3().crossVectors(baseDir, u);

                // Calculate random frequencies scaled by the user parameter
                const baseFreq = params.waveFrequency;
                const freq1 = Math.random() * baseFreq + (baseFreq * 0.25);
                const freq2 = Math.random() * baseFreq + (baseFreq * 0.25);
                const phase1 = Math.random() * Math.PI * 2;
                const phase2 = Math.random() * Math.PI * 2;

                const points = [];

                for (let j = 0; j <= segments; j++) {
                    const t = j / segments; // 0.0 to 1.0
                    const distance = t * params.length;
                    
                    // Base position along the straight line
                    const currentPos = baseDir.clone().multiplyScalar(distance);

                    // Amplitude increases non-linearly towards the ends
                    const amplitude = params.waviness * Math.pow(t, 1.8);

                    // Calculate wavy offsets
                    const offsetU = u.clone().multiplyScalar(Math.sin(distance * freq1 + phase1) * amplitude);
                    const offsetV = v.clone().multiplyScalar(Math.cos(distance * freq2 + phase2) * amplitude);

                    // Apply offsets
                    currentPos.add(offsetU).add(offsetV);
                    points.push(currentPos);
                }

                linePaths.push(points); // Save path for impulses

                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geometry, lineMaterial);
                linesGroup.add(line);
            }
            
            generateImpulses();
        }

        function generateImpulses() {
            if (impulsesPoints) {
                linesGroup.remove(impulsesPoints);
                impulsesPoints.geometry.dispose();
                impulsesPoints.material.dispose();
                impulsesPoints = null;
            }

            impulseData = [];
            const numImpulses = params.signalCount;
            
            if (numImpulses === 0) return;

            const positions = new Float32Array(numImpulses * 3);

            for (let i = 0; i < numImpulses; i++) {
                const lineIndex = Math.floor(Math.random() * params.count);
                impulseData.push({
                    lineIndex: lineIndex,
                    progress: Math.random(),
                    speed: 0.05 + Math.random() * 0.15, // Travel speed along line
                    direction: Math.random() > 0.5 ? 1 : -1
                });
                
                positions[i*3] = 0;
                positions[i*3+1] = 0;
                positions[i*3+2] = 0;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: params.signalColor,
                size: 4, // slightly larger for visibility
                sizeAttenuation: false, // keep size consistent regardless of distance
                map: circleTexture,
                transparent: true,
                alphaTest: 0.5
            });

            impulsesPoints = new THREE.Points(geometry, material);
            linesGroup.add(impulsesPoints);
        }

        // Initialize the first batch of lines
        generateLines();

        // --- Drag Object Across Screen Implementation ---
        const dragPlane = new THREE.Plane();
        const dragStartPoint = new THREE.Vector3();
        const dragCurrentPoint = new THREE.Vector3();
        const dragStartPosition = new THREE.Vector3();
        const pointer = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();
        const planeNormal = new THREE.Vector3();
        let isDraggingGroup = false;

        function updatePointer(event) {
            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function setDragPlane() {
            camera.getWorldDirection(planeNormal);
            dragPlane.setFromNormalAndCoplanarPoint(planeNormal, linesGroup.position);
        }

        renderer.domElement.addEventListener('pointerdown', (event) => {
            // Drag on left click (button 0)
            if (event.button !== 0 || event.target.closest('.lil-gui')) return;

            updatePointer(event);
            raycaster.setFromCamera(pointer, camera);
            
            // Intersect drag helper sphere
            const intersects = raycaster.intersectObject(dragHelper);

            if (!intersects.length) return;

            isDraggingGroup = true;
            controls.enabled = false; // Disable OrbitControls during direct object drag
            setDragPlane();
            raycaster.ray.intersectPlane(dragPlane, dragStartPoint);
            dragStartPosition.copy(linesGroup.position);
            renderer.domElement.setPointerCapture(event.pointerId);
        });

        renderer.domElement.addEventListener('pointermove', (event) => {
            if (!isDraggingGroup) return;

            updatePointer(event);
            raycaster.setFromCamera(pointer, camera);

            if (raycaster.ray.intersectPlane(dragPlane, dragCurrentPoint)) {
                linesGroup.position.copy(dragStartPosition).add(dragCurrentPoint.clone().sub(dragStartPoint));
            }
        });

        function endDrag(event) {
            if (!isDraggingGroup) return;

            isDraggingGroup = false;
            if (!params.rotateWithCursor) {
                controls.enabled = true;
            }
            renderer.domElement.releasePointerCapture(event.pointerId);
        }

        renderer.domElement.addEventListener('pointerup', endDrag);
        renderer.domElement.addEventListener('pointercancel', endDrag);

        // --- Background Color Controller ---
        function updateBackground() {
            const activeColor = params.greenScreen ? '#00ff00' : params.bgColor;
            scene.background.set(activeColor);
            document.body.style.backgroundColor = activeColor;
        }

        // --- GUI Setup (using lil-gui) ---
        const gui = new GUI({ title: 'Scene Settings' });
        
        const bgFolder = gui.addFolder('Background Settings');
        bgFolder.add(params, 'greenScreen').name('Green Screen (#00ff00)').onChange(updateBackground);
        bgFolder.addColor(params, 'bgColor').name('Custom BG Color').onChange(updateBackground);
        bgFolder.open();

        const networkFolder = gui.addFolder('Network Settings');
        networkFolder.add(params, 'count', 50, 1000, 10).name('Number of Lines').onChange(generateLines);
        networkFolder.add(params, 'length', 5, 100, 0.5).name('Line Length').onChange(generateLines);
        networkFolder.add(params, 'signalCount', 0, 1000, 10).name('Signal Count').onChange(generateImpulses);
        networkFolder.add(params, 'signalSpeed', 0, 5, 0.1).name('Signal Speed');
        networkFolder.open();
        
        const colorFolder = gui.addFolder('Color Customization');
        colorFolder.addColor(params, 'color').name('Line Color').onChange(() => {
            if (lineMaterial) lineMaterial.color.set(params.color);
        });
        colorFolder.addColor(params, 'signalColor').name('Signal Color').onChange(() => {
            if (impulsesPoints) impulsesPoints.material.color.set(params.signalColor);
        });
        colorFolder.open();

        const cameraFolder = gui.addFolder('Camera & Interaction');
        cameraFolder.add(params, 'rotateWithCursor').name('Rotate with Hover').onChange((v) => {
            controls.enabled = !v; // Disable OrbitControls rotation when hover rotation is active
        });
        cameraFolder.add(params, 'resetPosition').name('Reset Position/Zoom');
        cameraFolder.open();
        
        // Extra visual settings grouped together
        const visualFolder = gui.addFolder('Advanced Visuals');
        visualFolder.add(params, 'waviness', 0, 5, 0.1).name('Waviness').onChange(generateLines);
        visualFolder.add(params, 'waveFrequency', 0.01, 2.0, 0.01).name('Wave Frequency').onChange(generateLines);
        visualFolder.add(params, 'opacity', 0.1, 1.0, 0.05).name('Opacity').onChange(() => {
            if (lineMaterial) lineMaterial.opacity = params.opacity;
        });
        visualFolder.close();

        // --- Mouse and Resize Handlers ---
        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (event) => {
            // Normalize mouse coordinates from -1 to 1
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            
            // Slowly rotate the entire structure unless dragging is active
            if (!isDraggingGroup) {
                linesGroup.rotation.y += 0.05 * delta;
                linesGroup.rotation.x += 0.025 * delta;
            }

            if (params.rotateWithCursor) {
                // Move camera based on normalized cursor position relative to group position
                const targetX = linesGroup.position.x + mouseX * 15; 
                const targetY = linesGroup.position.y + mouseY * 15; 
                
                camera.position.x += (targetX - camera.position.x) * 0.02;
                camera.position.y += (targetY - camera.position.y) * 0.02;
                camera.lookAt(linesGroup.position);
            } else {
                controls.update();
            }

            // Animate moving impulses along lines
            if (impulsesPoints && linePaths.length > 0) {
                const positions = impulsesPoints.geometry.attributes.position.array;
                const segments = linePaths[0].length - 1;

                for (let i = 0; i < impulseData.length; i++) {
                    const data = impulseData[i];
                    data.progress += data.speed * params.signalSpeed * data.direction * delta;

                    // Bounce logic
                    if (data.progress >= 1.0) {
                        data.progress = 1.0;
                        data.direction = -1;
                    } else if (data.progress <= 0.0) {
                        data.progress = 0.0;
                        data.direction = 1;
                    }

                    // Linear interpolation between path points
                    const path = linePaths[data.lineIndex];
                    const exactIndex = data.progress * segments;
                    const index1 = Math.floor(exactIndex);
                    const index2 = Math.min(Math.ceil(exactIndex), segments);
                    const t = exactIndex - index1;

                    const p1 = path[index1];
                    const p2 = path[index2];

                    positions[i * 3] = p1.x + (p2.x - p1.x) * t;
                    positions[i * 3 + 1] = p1.y + (p2.y - p1.y) * t;
                    positions[i * 3 + 2] = p1.z + (p2.z - p1.z) * t;
                }
                impulsesPoints.geometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
