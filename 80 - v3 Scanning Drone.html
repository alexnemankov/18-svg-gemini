<!doctype html>
<html lang="en" class="notranslate" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holographic Tactical Command Map</title>
    <!-- Prevent translation extensions from breaking technical UI labels -->
    <meta name="google" content="notranslate" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #0b0e14;
        font-family: "Share Tech Mono", monospace;
        user-select: none;
        -webkit-user-select: none;
      }

      #canvas-container {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* Ambient scanline and overlay scan overlay */
      #screen-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background:
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.04),
            rgba(0, 255, 0, 0.01),
            rgba(0, 0, 255, 0.04)
          );
        background-size:
          100% 4px,
          6px 100%;
        z-index: 5;
        opacity: 0.45;
      }

      /* Core HUD elements styling */
      #hud-overlay {
        position: absolute;
        bottom: 24px;
        left: 24px;
        color: #b0e3ff;
        font-size: 12px;
        opacity: 0.55;
        pointer-events: none;
        letter-spacing: 0.12em;
        line-height: 1.8;
        text-transform: uppercase;
        z-index: 10;
        transition: opacity 0.3s ease;
      }

      #shortcuts-label {
        position: absolute;
        top: 24px;
        right: 290px;
        color: #b0e3ff;
        font-size: 11px;
        opacity: 0.7;
        pointer-events: none;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        z-index: 10;
        transition: opacity 0.3s ease;
      }

      #loader {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0b0e14;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        color: #b0e3ff;
        font-size: 18px;
        letter-spacing: 0.25em;
        transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 2px solid rgba(78, 101, 148, 0.2);
        border-top-color: #ffaa64;
        border-radius: 50%;
        animation: spin 1s infinite linear;
        margin-bottom: 20px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Customize lil-gui styles cleanly with rigid positioning to prevent overlapping glitches */
      /* Customize lil-gui theme variables for all components */
      .lil-gui {
        --background-color: rgba(11, 14, 20, 0.85) !important;
        --text-color: #b0e3ff !important;
        --title-background-color: rgba(78, 101, 148, 0.25) !important;
        --widget-color: rgba(78, 101, 148, 0.35) !important;
        --hover-color: rgba(176, 227, 255, 0.2) !important;
        --focus-color: rgba(176, 227, 255, 0.35) !important;
        font-family: "Share Tech Mono", monospace !important;
      }

      /* Apply positioning, borders, and shadows ONLY to the root panel container */
      .lil-gui.root {
        border: 1px solid rgba(78, 101, 148, 0.4) !important;
        border-radius: 4px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.65) !important;
        width: 260px !important;
        transition: opacity 0.3s ease;
        position: absolute;
        top: 60px !important;
        right: 24px !important;
        z-index: 99 !important;
      }

      .lil-gui .title {
        font-weight: bold;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
    </style>

    <!-- Import Map setup for standard Three.js loading -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.148.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body class="notranslate" translate="no">
    <div id="loader">
      <div class="spinner"></div>
      <div>SYS_INIT: TERRAIN MAP ENGAGED</div>
    </div>

    <div id="screen-overlay"></div>
    <div id="canvas-container"></div>

    <!-- HUD Overlay displays -->
    <div id="hud-overlay" class="notranslate" translate="no">
      <div>TERRAIN SURVEILLANCE SYSTEM v2.4</div>
      <div>GRID REF: 52°N 017°E</div>
      <div id="hud-altitude">ALTITUDE: --M</div>
      <div>STATUS: TRACKING ACTIVE</div>
    </div>

    <div id="shortcuts-label" class="notranslate" translate="no">
      [G] GREENSCREEN &nbsp;&nbsp;&nbsp; [H] HIDE UI &nbsp;&nbsp;&nbsp; [R]
      RESET CAM
    </div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
      import GUI from "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm";

      // Palette & GUI Constants (No deviations)
      const PALETTE = {
        bg: "#0b0e14",
        low: "#4e6594",
        high: "#b0e3ff",
        tactical: "#ffaa64",
        secondaryGrid: "#3dabc3",
        greenscreen: "#00ff00",
      };

      const params = {
        pointDensity: 80000,
        heightScale: 1.0,
        waveSpeed: 1.0,
        scanSpeed: 1.0,
        showPath: true,
        bloomStrength: 1.2,
        bloomRadius: 0.65,
        // Colors
        terrainLowColor: PALETTE.low,
        terrainHighColor: PALETTE.high,
        droneColor: PALETTE.tactical,
        connectorColor: "#ffbb80", // slightly brighter orange for more visible lines
        beaconColor: PALETTE.tactical,
      };

      // Shared uniforms to synchronize shaders dynamically
      const uniforms = {
        uTime: { value: 0 },
        uHeightScale: { value: params.heightScale },
        uLowColor: { value: new THREE.Color(params.terrainLowColor) },
        uHighColor: { value: new THREE.Color(params.terrainHighColor) },
      };

      // Setup Scene, Renderer & Fog
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(PALETTE.bg);
      scene.fog = new THREE.FogExp2(PALETTE.bg, 0.018);

      const container = document.getElementById("canvas-container");
      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.toneMapping = THREE.NoToneMapping;
      container.appendChild(renderer.domElement);

      // Ambient Lighting to soften extreme contrasts
      const ambientLight = new THREE.AmbientLight(PALETTE.bg, 0.05);
      scene.add(ambientLight);

      // Camera Setup
      const camera = new THREE.PerspectiveCamera(
        50,
        window.innerWidth / window.innerHeight,
        0.1,
        500,
      );
      camera.position.set(-20, 35, 50);

      // Post-Processing Composer Setup
      const composer = new EffectComposer(renderer);
      const renderPass = new RenderPass(scene, camera);
      composer.addPass(renderPass);

      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        params.bloomStrength,
        params.bloomRadius,
        0.15, // threshold
      );
      composer.addPass(bloomPass);

      // OrbitControls
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(5, 10, 0);
      controls.enableDamping = true;
      controls.dampingFactor = 0.04;
      controls.minDistance = 20;
      controls.maxDistance = 100;
      controls.minPolarAngle = Math.PI / 4;
      controls.maxPolarAngle = Math.PI / 2 - 0.05;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.15;

      // Cinematic automatic rotation override on manual interaction
      let autoRotateTimeout = null;
      let isLerpingAutoRotate = false;
      const autoRotateSpeedDefault = 0.15;

      function suspendAutoRotation() {
        controls.autoRotate = false;
        if (autoRotateTimeout) clearTimeout(autoRotateTimeout);
        autoRotateTimeout = setTimeout(() => {
          controls.autoRotate = true;
          controls.autoRotateSpeed = 0; // initialize at zero to smoothly transition up in loop
          isLerpingAutoRotate = true;
        }, 2000);
      }
      window.addEventListener("pointerdown", suspendAutoRotation);

      // Manual Smooth GSAP-style Reset Transition Variables
      let resetFrameCount = -1;
      const initialCamPos = new THREE.Vector3(-20, 35, 50);
      const initialTarget = new THREE.Vector3(5, 10, 0);
      const startCamPos = new THREE.Vector3();
      const startTarget = new THREE.Vector3();

      function triggerCameraReset() {
        startCamPos.copy(camera.position);
        startTarget.copy(controls.target);
        resetFrameCount = 0;
        // Force immediate rotation restoration
        controls.autoRotate = true;
        controls.autoRotateSpeed = autoRotateSpeedDefault;
        isLerpingAutoRotate = false;
      }

      function easeInOutCubic(x) {
        return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
      }

      // ========================================================
      // LAYER A — HIGH FIDELITY TOPOGRAPHIC CONTOUR LINES SHADER
      // ========================================================
      const terrainMat = new THREE.ShaderMaterial({
        uniforms: {
          uTime: uniforms.uTime,
          uHeightScale: uniforms.uHeightScale,
          uLowColor: uniforms.uLowColor,
          uHighColor: uniforms.uHighColor,
        },
        vertexShader: `
                uniform float uTime;
                uniform float uHeightScale;
                varying float vHeight;
                varying vec3 vWorldPos;

                // 2D Value Noise Function
                float hash(vec2 p) {
                    p = fract(p * vec2(123.34, 456.21));
                    p += dot(p, p + 45.32);
                    return fract(p.x * p.y);
                }

                float noise(vec2 p) {
                    vec2 i = floor(p);
                    vec2 f = fract(p);
                    vec2 u = f * f * (3.0 - 2.0 * f);
                    return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                               mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
                }

                // Fractional Brownian Motion (4 Octaves)
                float fbm(vec2 p) {
                    float v = 0.0;
                    float a = 0.5;
                    vec2 shift = vec2(100.0);
                    mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
                    for (int i = 0; i < 4; ++i) {
                        v += a * noise(p);
                        p = rot * p * 2.0 + shift;
                        a *= 0.5;
                    }
                    return v;
                }

                void main() {
                    vec3 pos = position;
                    // Apply FBM Height scale displacement (Amplitude 12.0, Frequency 0.08)
                    float h = fbm(pos.xy * 0.08) * 12.0 * uHeightScale;
                    // Slow undulating pulse waves to emphasize hologram behavior
                    h += sin(uTime * 0.2 + pos.x * 0.3) * 0.4;
                    pos.z = h;

                    vec4 worldPos = modelMatrix * vec4(pos, 1.0);
                    vWorldPos = worldPos.xyz;
                    // Remap approximate height values dynamically (0.0 to 1.0)
                    vHeight = clamp((h + 1.0) / (12.0 * uHeightScale + 2.0), 0.0, 1.0);

                    gl_Position = projectionMatrix * viewMatrix * worldPos;
                }
            `,
        fragmentShader: `
                uniform vec3 uLowColor;
                uniform vec3 uHighColor;
                varying float vHeight;
                varying vec3 vWorldPos;

                void main() {
                    // Use a frequency based calculation to produce anti-aliased topographic contour isolines
                    float contourDensity = 32.0;
                    float val = vHeight * contourDensity;
                    
                    // Standard anti-aliased line rendering using derivatives
                    float derivative = fwidth(val);
                    float line = abs(fract(val - 0.5) - 0.5) / (derivative + 0.001);
                    float contourIntensity = 1.0 - min(line, 1.0);
                    
                    // Create more prominent "index" contour lines at every 5th interval
                    float indexVal = val / 5.0;
                    float indexDerivative = fwidth(indexVal);
                    float indexLine = abs(fract(indexVal - 0.5) - 0.5) / (indexDerivative + 0.001);
                    float indexIntensity = 1.0 - min(indexLine, 1.0);

                    // Interpolate contour color between uniforms
                    vec3 color = mix(uLowColor, uHighColor, vHeight);

                    // Brighten the main index lines
                    color = mix(color, uHighColor, indexIntensity * 0.4);

                    // Blend standard and index intensities
                    float alpha = max(contourIntensity * 0.75, indexIntensity * 0.95);

                    // Form a procedural pattern of dotted intermediate contour lines (matching Image 2)
                    if (indexIntensity < 0.2) {
                        float pattern = sin(vWorldPos.x * 2.5) * sin(vWorldPos.z * 2.5);
                        if (pattern < -0.15) {
                            alpha *= 0.25; 
                        }
                    }

                    if (alpha < 0.05) discard;

                    gl_FragColor = vec4(color, alpha);
                }
            `,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });

      // 120x120 scale terrain plane with high density segment distribution
      const planeGeo = new THREE.PlaneGeometry(120, 120, 250, 250);
      const terrainMesh = new THREE.Mesh(planeGeo, terrainMat);
      terrainMesh.rotation.x = -Math.PI / 2; // Lie flat in layout
      scene.add(terrainMesh);

      // ==========================================
      // LAYER B — PEAK PARTICLE SURVEILLANCE CLOUD
      // ==========================================
      const pointsMat = new THREE.ShaderMaterial({
        uniforms: {
          uTime: uniforms.uTime,
          uHeightScale: uniforms.uHeightScale,
        },
        vertexShader: `
                uniform float uTime;
                uniform float uHeightScale;
                varying float vAlpha;

                float hash(vec2 p) {
                    p = fract(p * vec2(123.34, 456.21));
                    p += dot(p, p + 45.32);
                    return fract(p.x * p.y);
                }

                float noise(vec2 p) {
                    vec2 i = floor(p);
                    vec2 f = fract(p);
                    vec2 u = f * f * (3.0 - 2.0 * f);
                    return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                               mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
                }

                float fbm(vec2 p) {
                    float v = 0.0;
                    float a = 0.5;
                    vec2 shift = vec2(100.0);
                    mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
                    for (int i = 0; i < 4; ++i) {
                        v += a * noise(p);
                        p = rot * p * 2.0 + shift;
                        a *= 0.5;
                    }
                    return v;
                }

                void main() {
                    vec3 pos = position;
                    float h = fbm(pos.xy * 0.08) * 12.0 * uHeightScale;
                    h += sin(uTime * 0.2 + pos.x * 0.3) * 0.4;
                    h += sin(uTime * 1.5 + pos.x * 2.1) * 0.08;
                    pos.z = h;

                    if (h > 6.0) {
                        gl_PointSize = 3.5;
                        float maxH = 12.0 * uHeightScale + 0.4;
                        float crestFactor = clamp((h - 6.0) / (maxH - 6.0 + 0.001), 0.0, 1.0);
                        vAlpha = smoothstep(0.0, 1.0, crestFactor);
                    } else {
                        gl_PointSize = 0.0;
                        vAlpha = 0.0;
                    }

                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_Position = projectionMatrix * mvPosition;
                    gl_PointSize *= (300.0 / -mvPosition.z);
                }
            `,
        fragmentShader: `
                varying float vAlpha;
                void main() {
                    if (vAlpha <= 0.0) discard;
                    vec2 cxy = 2.0 * gl_PointCoord - 1.0;
                    float r = dot(cxy, cxy);
                    if (r > 1.0) discard;

                    vec3 color = vec3(0.69, 0.89, 1.0); // #b0e3ff
                    float alpha = (1.0 - r) * vAlpha;
                    gl_FragColor = vec4(color, alpha);
                }
            `,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });

      const MAX_POINTS = 300000;
      let pointsObj = null;

      function createPointsGeometry(count) {
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
          positions[i * 3] = (Math.random() - 0.5) * 120;
          positions[i * 3 + 1] = (Math.random() - 0.5) * 120;
          positions[i * 3 + 2] = 0;
        }
        geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        return geo;
      }

      const pointsGeo = createPointsGeometry(MAX_POINTS);
      pointsGeo.setDrawRange(0, params.pointDensity);
      pointsObj = new THREE.Points(pointsGeo, pointsMat);
      pointsObj.rotation.x = -Math.PI / 2;
      scene.add(pointsObj);

      // ==========================================
      // LAYER C — FLAT VALLEY BASE GRID
      // ==========================================
      const baseGrid = new THREE.GridHelper(
        120,
        80,
        PALETTE.secondaryGrid,
        PALETTE.secondaryGrid,
      );
      baseGrid.material.opacity = 0.12;
      baseGrid.material.transparent = true;
      baseGrid.material.depthWrite = false;
      baseGrid.material.blending = THREE.AdditiveBlending;
      baseGrid.position.y = 0;
      scene.add(baseGrid);

      // ========================================================
      // TACTICAL UAV DRONE ASSET (Glider Swept-Wing Model)
      // ========================================================
      // Shared materials for drone to allow dynamic color customization
      const droneWireMat = new THREE.MeshBasicMaterial({
        color: params.droneColor,
        wireframe: true,
        transparent: true,
        opacity: 0.85,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      const droneSolidMat = new THREE.MeshBasicMaterial({
        color: params.droneColor,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      // Bright glowing point material for wingtips and nose
      const glowPointMat = new THREE.MeshBasicMaterial({
        color: "#ffffff",
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending
      });
      
      const droneGlowMat = new THREE.MeshBasicMaterial({
        color: params.droneColor,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending
      });

      function buildSweptWingUAV() {
        const droneGroup = new THREE.Group();

        // Helper to add double-layered parts (Solid + Wireframe)
        function addPart(geometry) {
          const solidMesh = new THREE.Mesh(geometry, droneSolidMat);
          const wireMesh = new THREE.Mesh(geometry, droneWireMat);
          droneGroup.add(solidMesh);
          droneGroup.add(wireMesh);
        }

        // 1. Slender Fuselage Components (Center at 0,0,0, aligned to Z)
        // Main Fuselage Cylinder (Length: 3.0, radius: 0.15)
        const mainFuselageGeom = new THREE.CylinderGeometry(0.15, 0.15, 3.0, 8, 6);
        mainFuselageGeom.rotateX(Math.PI / 2);
        addPart(mainFuselageGeom);

        // Nose Cone (Length: 0.8, base radius: 0.15)
        const noseGeom = new THREE.ConeGeometry(0.15, 0.8, 8, 4);
        noseGeom.rotateX(Math.PI / 2);
        noseGeom.translate(0, 0, 1.5 + 0.4); // Position at front of main body (1.5 + 0.4)
        addPart(noseGeom);

        // Tail Cone (Length: 2.2, base radius: 0.15, tapering to 0.02)
        const tailGeom = new THREE.CylinderGeometry(0.02, 0.15, 2.2, 8, 4);
        tailGeom.rotateX(Math.PI / 2);
        tailGeom.translate(0, 0, -1.5 - 1.1); // Position at rear of main body (-1.5 - 1.1)
        addPart(tailGeom);

        // 2. High-fidelity Swept-Back Main Wing
        // Box geometry: width = 11.0, height = 0.16, depth = 1.2
        const wingGeom = new THREE.BoxGeometry(11.0, 0.16, 1.2, 16, 2, 6);
        const posAttr = wingGeom.attributes.position;
        const tempPos = new THREE.Vector3();
        for (let i = 0; i < posAttr.count; i++) {
          tempPos.fromBufferAttribute(posAttr, i);
          const normalizedX = Math.abs(tempPos.x) / 5.5; // 0 to 1 at tips

          // Taper chord to 35% at the tips
          const taper = 1.0 - 0.65 * normalizedX;
          tempPos.z *= taper;

          // Sweep back
          const sweep = 1.5;
          tempPos.z -= sweep * normalizedX;

          // Taper thickness to 25% at the tips
          const thicknessTaper = 1.0 - 0.75 * normalizedX;
          tempPos.y *= thicknessTaper;

          // Dihedral (wings angle upward)
          tempPos.y += 0.25 * normalizedX;

          posAttr.setXYZ(i, tempPos.x, tempPos.y, tempPos.z);
        }
        wingGeom.computeVertexNormals();
        // Shift wing slightly forward on the fuselage
        wingGeom.translate(0, 0.05, 0.4);
        addPart(wingGeom);

        // 3. Swept V-Tail
        // Box geometry: width = 3.6, height = 0.05, depth = 0.6
        const vTailGeom = new THREE.BoxGeometry(3.6, 0.05, 0.6, 8, 2, 4);
        const tailPosAttr = vTailGeom.attributes.position;
        const tempTailPos = new THREE.Vector3();
        for (let i = 0; i < tailPosAttr.count; i++) {
          tempTailPos.fromBufferAttribute(tailPosAttr, i);
          const normalizedX = Math.abs(tempTailPos.x) / 1.8; // 0 to 1 at tips

          // Taper chord to 45% at the tips
          const taper = 1.0 - 0.55 * normalizedX;
          tempTailPos.z *= taper;

          // Sweep back
          const sweep = 0.45;
          tempTailPos.z -= sweep * normalizedX;

          // Taper thickness
          tempTailPos.y *= (1.0 - 0.6 * normalizedX);

          // Angle upward to create the V-tail shape (lift by 0.75 at the tips)
          tempTailPos.y += 0.75 * normalizedX;

          tailPosAttr.setXYZ(i, tempTailPos.x, tempTailPos.y, tempTailPos.z);
        }
        vTailGeom.computeVertexNormals();
        // Position at the tail boom end
        vTailGeom.translate(0, 0.1, -2.4);
        addPart(vTailGeom);

        // 4. Glowing navigation lights / nodes at key endpoints (Nose, Wingtips, V-tail tips)
        const nodeGeo = new THREE.SphereGeometry(0.07, 8, 8);
        
        // Nose light
        const noseLight = new THREE.Mesh(nodeGeo, glowPointMat);
        noseLight.position.set(0, 0, 1.5 + 0.8);
        droneGroup.add(noseLight);

        // Left wingtip light
        const leftWingTip = new THREE.Mesh(nodeGeo, droneGlowMat);
        leftWingTip.position.set(-5.5, 0.25 + 0.05, -1.1);
        droneGroup.add(leftWingTip);

        // Right wingtip light
        const rightWingTip = new THREE.Mesh(nodeGeo, droneGlowMat);
        rightWingTip.position.set(5.5, 0.25 + 0.05, -1.1);
        droneGroup.add(rightWingTip);

        // Left tailtip light
        const leftTailTip = new THREE.Mesh(nodeGeo, droneGlowMat);
        leftTailTip.position.set(-1.8, 0.85 + 0.1, -2.85);
        droneGroup.add(leftTailTip);

        // Right tailtip light
        const rightTailTip = new THREE.Mesh(nodeGeo, droneGlowMat);
        rightTailTip.position.set(1.8, 0.85 + 0.1, -2.85);
        droneGroup.add(rightTailTip);

        droneGroup.scale.set(1.0, 1.0, 1.0);
        return droneGroup;
      }

      const droneGroup = buildSweptWingUAV();
      scene.add(droneGroup);

      // ==========================================
      // DRONE PATH WAYPOINTS (Dashed Vector Lines)
      // ==========================================
      const waypoints = [
        new THREE.Vector3(-15, 18, -5),
        new THREE.Vector3(-35, 21, -25),
        new THREE.Vector3(15, 17, -40),
        new THREE.Vector3(40, 20, -5),
        new THREE.Vector3(25, 19, 30),
        new THREE.Vector3(-10, 22, 20),
      ];
      const dronePath = new THREE.CatmullRomCurve3(waypoints, true);

      // Evaluate sample line paths
      const pathPoints = dronePath.getPoints(200);
      const linePositions = [];
      const lineUvs = [];

      for (let i = 0; i < pathPoints.length - 1; i++) {
        const p1 = pathPoints[i];
        const p2 = pathPoints[i + 1];
        linePositions.push(p1.x, p1.y, p1.z);
        linePositions.push(p2.x, p2.y, p2.z);

        const t1 = i / (pathPoints.length - 1);
        const t2 = (i + 1) / (pathPoints.length - 1);
        lineUvs.push(t1, 0);
        lineUvs.push(t2, 0);
      }
      const pLast = pathPoints[pathPoints.length - 1];
      const pFirst = pathPoints[0];
      linePositions.push(pLast.x, pLast.y, pLast.z);
      linePositions.push(pFirst.x, pFirst.y, pFirst.z);
      lineUvs.push(1.0, 0);
      lineUvs.push(0.0, 0);

      const pathGeo = new THREE.BufferGeometry();
      pathGeo.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(linePositions, 3),
      );
      pathGeo.setAttribute("uv", new THREE.Float32BufferAttribute(lineUvs, 2));

      const pathMat = new THREE.ShaderMaterial({
        uniforms: {
          uTime: uniforms.uTime,
          color: { value: new THREE.Color(params.connectorColor) },
        },
        vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
        fragmentShader: `
                uniform float uTime;
                uniform vec3 color;
                varying vec2 vUv;
                void main() {
                    if (fract(vUv.x * 20.0 + uTime * 0.6) > 0.5) {
                        discard;
                    }
                    gl_FragColor = vec4(color, 0.85);
                }
            `,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });

      const pathLines = new THREE.LineSegments(pathGeo, pathMat);
      scene.add(pathLines);

      // ==========================================
      // PROJECTION SCAN ARRAY & PROJECTED BEAM
      // ==========================================
      const radarGroup = new THREE.Group();
      scene.add(radarGroup);

      const ringMeshes = [];
      const radii = [3, 6, 9];

      // Shared material for all sweep rings
      const radarRingMat = new THREE.MeshBasicMaterial({
        color: params.connectorColor,
        transparent: true,
        opacity: 0.35,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false,
      });

      radii.forEach((r, idx) => {
        const ringGeo = new THREE.RingGeometry(r - 0.05, r + 0.05, 64);
        ringGeo.rotateX(-Math.PI / 2);
        const ringMesh = new THREE.Mesh(ringGeo, radarRingMat);
        radarGroup.add(ringMesh);
        ringMeshes.push(ringMesh);
      });

      const sweepGeo = new THREE.TorusGeometry(
        4.5,
        0.03,
        4,
        128,
        Math.PI * 0.85,
      );
      sweepGeo.rotateX(Math.PI / 2);
      const sweepMat = new THREE.MeshBasicMaterial({
        color: params.connectorColor,
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false,
      });
      const sweepMesh = new THREE.Mesh(sweepGeo, sweepMat);
      radarGroup.add(sweepMesh);

      // Volumetric Cone Projected Scan Beam down from UAV to target
      const scanBeam = new THREE.Group();

      const scanBeamGeom = new THREE.CylinderGeometry(
        0.05,
        4.0,
        1.0,
        16, // fewer segments for clean wireframe lines
        4,  // height segments so it has horizontal rings
        true,
      );

      const scanBeamWireMat = new THREE.MeshBasicMaterial({
        color: params.connectorColor,
        wireframe: true,
        transparent: true,
        opacity: 0.25,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });

      const scanBeamSolidMat = new THREE.MeshBasicMaterial({
        color: params.connectorColor,
        transparent: true,
        opacity: 0.02, // faint backing to prevent glare
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });

      const scanBeamWire = new THREE.Mesh(scanBeamGeom, scanBeamWireMat);
      const scanBeamSolid = new THREE.Mesh(scanBeamGeom, scanBeamSolidMat);
      scanBeam.add(scanBeamWire);
      scanBeam.add(scanBeamSolid);
      scene.add(scanBeam);

      // ==========================================================
      // MATHEMATICAL MATH EMULATION (SNAPS OBJECTS ON CONTOURS)
      // ==========================================================
      function hashJS(x, y) {
        const h = Math.sin(x * 12.34 + y * 45.62) * 43758.5453123;
        return h - Math.floor(h);
      }

      function noiseJS(x, y) {
        const ix = Math.floor(x);
        const iy = Math.floor(y);
        const fx = x - ix;
        const fy = y - iy;
        const ux = fx * fx * (3.0 - 2.0 * fx);
        const uy = fy * fy * (3.0 - 2.0 * fy);
        return mixJS(
          mixJS(hashJS(ix, iy), hashJS(ix + 1, iy), ux),
          mixJS(hashJS(ix, iy + 1), hashJS(ix + 1, iy + 1), ux),
          uy,
        );
      }

      function mixJS(a, b, t) {
        return a * (1.0 - t) + b * t;
      }

      function fbmJS(x, y) {
        let v = 0.0;
        let a = 0.5;
        let px = x;
        let py = y;
        const cosAngle = Math.cos(0.5);
        const sinAngle = Math.sin(0.5);
        for (let i = 0; i < 4; i++) {
          v += a * noiseJS(px, py);
          const nx = (px * cosAngle - py * sinAngle) * 2.0 + 100.0;
          const ny = (px * sinAngle + py * cosAngle) * 2.0 + 100.0;
          px = nx;
          py = ny;
          a *= 0.5;
        }
        return v;
      }

      function getTerrainHeight(x, z, time, heightScale) {
        const h = fbmJS(x * 0.08, -z * 0.08) * 12.0 * heightScale;
        const wave = Math.sin(time * 0.2 + x * 0.3) * 0.4;
        return h + wave;
      }

      // ==========================================================
      // TACTICAL MOUNTAINTOP SIGNAL BEACONS (MATCHES IMAGE 2 TARGETS)
      // ==========================================================
      // Shared geometries and materials for all beacons
      const beaconMarkerGeo = new THREE.OctahedronGeometry(0.5, 0);
      const beaconLineGeom = new THREE.BufferGeometry();
      beaconLineGeom.setFromPoints([
        new THREE.Vector3(0, -15.0, 0),
        new THREE.Vector3(0, 1.8, 0)
      ]);
      const beaconFloorRingGeo = new THREE.RingGeometry(0.6, 0.7, 16);
      beaconFloorRingGeo.rotateX(-Math.PI / 2);

      const beaconMarkerMat = new THREE.MeshBasicMaterial({
        color: params.beaconColor,
        wireframe: true,
        transparent: true,
        opacity: 0.8,
      });

      const beaconLineMat = new THREE.LineDashedMaterial({
        color: params.beaconColor,
        dashSize: 0.3,
        gapSize: 0.2,
        transparent: true,
        opacity: 0.5,
      });

      const beaconFloorRingMat = new THREE.MeshBasicMaterial({
        color: params.beaconColor,
        transparent: true,
        opacity: 0.5,
        side: THREE.DoubleSide,
      });

      const beacons = [];
      function createBeacon(x, z) {
        const group = new THREE.Group();

        // Spinning wireframe octahedron marker
        const marker = new THREE.Mesh(beaconMarkerGeo, beaconMarkerMat);
        marker.position.y = 1.0;
        group.add(marker);

        // Ground projected tracking lines (Y=0 bottom to custom heights)
        const trackingLine = new THREE.Line(beaconLineGeom, beaconLineMat);
        trackingLine.computeLineDistances();
        group.add(trackingLine);

        // Floor warning target rings
        const ring = new THREE.Mesh(beaconFloorRingGeo, beaconFloorRingMat);
        group.add(ring);

        scene.add(group);
        beacons.push({ group, marker, x, z });
      }

      // Place three major tactical beacon checkpoints on primary high peaks
      createBeacon(-25, -20);
      createBeacon(30, 5);
      createBeacon(5, -35);

      // ==========================================
      // TELEMETRY GRID & DRONE LINK SYSTEMS
      // ==========================================
      // 1. Dashed lines connecting beacons on the ground to form a tactical grid
      const beaconLineGeo = new THREE.BufferGeometry();
      const beaconLinePositions = new Float32Array(3 * 2 * 3); // 3 lines, 2 points each, 3 coordinates
      beaconLineGeo.setAttribute("position", new THREE.BufferAttribute(beaconLinePositions, 3));
      
      const groundGridLineMat = new THREE.LineDashedMaterial({
        color: params.connectorColor,
        dashSize: 0.5,
        gapSize: 0.4,
        transparent: true,
        opacity: 0.85, // significantly more visible
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const beaconLines = new THREE.LineSegments(beaconLineGeo, groundGridLineMat);
      scene.add(beaconLines);

      // 2. Animated dashed connection lines from drone to beacons
      const droneBeaconLineGeo = new THREE.BufferGeometry();
      const droneBeaconPositions = new Float32Array(3 * 2 * 3); // 3 lines, 2 points each, 3 coordinates
      droneBeaconLineGeo.setAttribute("position", new THREE.BufferAttribute(droneBeaconPositions, 3));

      // Custom attributes 'lineIndex' and 'uv' for custom shader dash animation
      const lineIndicesAttr = new Float32Array([0, 0, 1, 1, 2, 2]);
      const lineUvsAttr = new Float32Array([0, 0, 1, 0, 0, 0, 1, 0, 0, 0, 1, 0]);
      droneBeaconLineGeo.setAttribute("lineIndex", new THREE.BufferAttribute(lineIndicesAttr, 1));
      droneBeaconLineGeo.setAttribute("uv", new THREE.BufferAttribute(lineUvsAttr, 2));

      const droneBeaconLineMat = new THREE.ShaderMaterial({
        uniforms: {
          uTime: uniforms.uTime,
          color: { value: new THREE.Color(params.connectorColor) },
          uOpacities: { value: [0.0, 0.0, 0.0] }
        },
        vertexShader: `
          uniform float uTime;
          attribute float lineIndex;
          varying float vDist;
          varying float vLineIdx;
          void main() {
            vLineIdx = lineIndex;
            vDist = uv.x;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float uTime;
          uniform vec3 color;
          uniform float uOpacities[3];
          varying float vDist;
          varying float vLineIdx;
          void main() {
            // Animate dashes streaming downwards (vDist=0 is drone, vDist=1 is beacon)
            float dash = fract(vDist * 10.0 - uTime * 2.0);
            if (dash > 0.5) {
              discard;
            }
            float opacity = 0.0;
            if (vLineIdx < 0.5) opacity = uOpacities[0];
            else if (vLineIdx < 1.5) opacity = uOpacities[1];
            else opacity = uOpacities[2];
            
            gl_FragColor = vec4(color, opacity * 0.95); // significantly brighter / more visible
          }
        `,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const droneBeaconLines = new THREE.LineSegments(droneBeaconLineGeo, droneBeaconLineMat);
      scene.add(droneBeaconLines);


      // ==========================================
      // LIL-GUI PARAMETERS INITIALIZATION
      // ==========================================
      const gui = new GUI({ title: "TACTICAL INTERFACE", width: 260 });

      const terrainFolder = gui.addFolder("TERRAIN MATRIX");
      terrainFolder
        .add(params, "pointDensity", 10000, MAX_POINTS, 5000)
        .name("Point Density")
        .onChange((v) => {
          pointsObj.geometry.setDrawRange(0, v);
        });
      terrainFolder
        .add(params, "heightScale", 0.5, 2.5, 0.1)
        .name("Height Mult")
        .onChange((v) => {
          uniforms.uHeightScale.value = v;
        });
      terrainFolder.add(params, "waveSpeed", 0.1, 3.0, 0.1).name("Wave Speed");

      const tacticalFolder = gui.addFolder("TACTICAL ASSETS");
      tacticalFolder.add(params, "scanSpeed", 0.1, 4.0, 0.1).name("Scan Speed");
      tacticalFolder
        .add(params, "showPath")
        .name("Show Path")
        .onChange((v) => {
          pathLines.visible = v;
        });

      const postFolder = gui.addFolder("POST PROCESSING");
      postFolder
        .add(params, "bloomStrength", 0.0, 3.0, 0.1)
        .name("Bloom Strength")
        .onChange((v) => {
          bloomPass.strength = v;
        });
      postFolder
        .add(params, "bloomRadius", 0.0, 1.5, 0.05)
        .name("Bloom Radius")
        .onChange((v) => {
          bloomPass.radius = v;
        });

      const colorFolder = gui.addFolder("COLOR PALETTE");
      colorFolder
        .addColor(params, "terrainLowColor")
        .name("Valleys")
        .onChange((v) => {
          terrainMat.uniforms.uLowColor.value.set(v);
        });
      colorFolder
        .addColor(params, "terrainHighColor")
        .name("Peaks")
        .onChange((v) => {
          terrainMat.uniforms.uHighColor.value.set(v);
        });
      colorFolder
        .addColor(params, "droneColor")
        .name("Drone")
        .onChange((v) => {
          droneWireMat.color.set(v);
          droneSolidMat.color.set(v);
          droneGlowMat.color.set(v);
        });
      colorFolder
        .addColor(params, "connectorColor")
        .name("Connectors")
        .onChange((v) => {
          const col = new THREE.Color(v);
          pathMat.uniforms.color.value.copy(col);
          groundGridLineMat.color.copy(col);
          droneBeaconLineMat.uniforms.color.value.copy(col);
          scanBeamWireMat.color.copy(col);
          scanBeamSolidMat.color.copy(col);
          radarRingMat.color.copy(col);
          sweepMat.color.copy(col);
        });
      colorFolder
        .addColor(params, "beaconColor")
        .name("Beacons")
        .onChange((v) => {
          beaconMarkerMat.color.set(v);
          beaconLineMat.color.set(v);
          beaconFloorRingMat.color.set(v);
        });

      // ==========================================
      // KEYBOARD EVENT LISTENERS (G, H, R)
      // ==========================================
      let greenscreenMode = false;
      let uiHidden = false;

      window.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();
        if (key === "g") {
          greenscreenMode = !greenscreenMode;
          if (greenscreenMode) {
            scene.background.set(PALETTE.greenscreen);
            scene.fog.color.set(PALETTE.greenscreen);
            bloomPass.threshold = 0.35; // mitigate green bleeding issues
          } else {
            scene.background.set(PALETTE.bg);
            scene.fog.color.set(PALETTE.bg);
            bloomPass.threshold = 0.15;
          }
        } else if (key === "h") {
          uiHidden = !uiHidden;
          const guiContainer = document.querySelector(".lil-gui.root");
          const hudOverlay = document.getElementById("hud-overlay");
          const shortcutsLabel = document.getElementById("shortcuts-label");
          if (guiContainer) {
            guiContainer.style.opacity = uiHidden ? "0" : "1";
            guiContainer.style.pointerEvents = uiHidden ? "none" : "auto";
          }
          if (hudOverlay) {
            hudOverlay.style.opacity = uiHidden ? "0" : "0.55";
          }
          if (shortcutsLabel) {
            shortcutsLabel.style.opacity = uiHidden ? "0" : "1";
          }
        } else if (key === "r") {
          triggerCameraReset();
        }
      });

      // ==========================================
      // ANIMATION LOOP (REAL-TIME UPDATES)
      // ==========================================
      let droneT = 0;
      let lastTime = 0;
      let uTime = 0;
      let currentRoll = 0;

      // Dismiss initializing screen loader
      const loader = document.getElementById("loader");
      if (loader) {
        setTimeout(() => {
          loader.style.opacity = "0";
          setTimeout(() => loader.remove(), 600);
        }, 800);
      }

      function animate(timestamp) {
        requestAnimationFrame(animate);

        const delta = (timestamp - lastTime) * 0.001;
        lastTime = timestamp;

        const cappedDelta = Math.min(delta, 0.15); // safeguard against massive frame delays

        // 1. Increment system time by delta * waveSpeed
        uTime += cappedDelta * params.waveSpeed;
        uniforms.uTime.value = uTime;

        // 2. Animate drone position coordinate along the curve with natural banking
        droneT += 0.0002 * params.scanSpeed;
        if (droneT > 1.0) droneT -= 1.0;

        const dronePos = dronePath.getPointAt(droneT);
        droneGroup.position.copy(dronePos);

        const lookAtTarget = dronePath.getPointAt((droneT + 0.0015) % 1.0);
        droneGroup.lookAt(lookAtTarget);

        // Calculate banking (roll) based on yaw rate of change
        const tangent = dronePath.getTangentAt(droneT).normalize();
        const tangentAhead = dronePath.getTangentAt((droneT + 0.005) % 1.0).normalize();
        const yawCurrent = Math.atan2(tangent.x, tangent.z);
        const yawAhead = Math.atan2(tangentAhead.x, tangentAhead.z);
        let yawDiff = yawAhead - yawCurrent;
        if (yawDiff > Math.PI) yawDiff -= Math.PI * 2;
        if (yawDiff < -Math.PI) yawDiff += Math.PI * 2;

        const targetRoll = yawDiff * 14.0; // scale factor
        currentRoll = THREE.MathUtils.lerp(currentRoll, targetRoll, 0.08); // smooth filter
        droneGroup.rotateZ(currentRoll); // rotate around local Z-axis (forward)

        // 3. Update projected radar array directly underneath tracking drone (sampled on terrain Height)
        const terrainY = getTerrainHeight(
          dronePos.x,
          dronePos.z,
          uTime,
          params.heightScale,
        );
        radarGroup.position.set(dronePos.x, terrainY + 0.15, dronePos.z);

        // 4. Update the projected scanning beam dimensions and positions
        const beamHeight = Math.max(dronePos.y - terrainY, 0.1);
        scanBeam.scale.set(1, beamHeight, 1);
        scanBeam.position.set(
          dronePos.x,
          dronePos.y - beamHeight / 2,
          dronePos.z,
        );

        // 5. Pulse rings scale breathing effect
        ringMeshes.forEach((mesh, idx) => {
          const breathing = Math.sin(uTime * 2.0 + idx * 1.2) * 0.15 + 1.0;
          mesh.scale.set(breathing, 1, breathing);
        });

        // Rotate rotating dashed radar sweep arc
        sweepMesh.rotation.y += cappedDelta * params.scanSpeed * 0.8;

        // 6. Dynamic high peak target markers update
        beacons.forEach((b) => {
          b.marker.rotation.y += cappedDelta * 0.5;
          b.marker.rotation.x += cappedDelta * 0.3;
          const bY = getTerrainHeight(b.x, b.z, uTime, params.heightScale);
          b.group.position.set(b.x, bY, b.z);
        });

        // 7. Update beacon-to-beacon ground connection lines
        const bPosArr = beaconLineGeo.attributes.position.array;
        if (beacons.length >= 3) {
          // Line 0: Beacon 0 -> Beacon 1
          bPosArr[0] = beacons[0].group.position.x;
          bPosArr[1] = beacons[0].group.position.y + 1.0;
          bPosArr[2] = beacons[0].group.position.z;
          bPosArr[3] = beacons[1].group.position.x;
          bPosArr[4] = beacons[1].group.position.y + 1.0;
          bPosArr[5] = beacons[1].group.position.z;

          // Line 1: Beacon 1 -> Beacon 2
          bPosArr[6] = beacons[1].group.position.x;
          bPosArr[7] = beacons[1].group.position.y + 1.0;
          bPosArr[8] = beacons[1].group.position.z;
          bPosArr[9] = beacons[2].group.position.x;
          bPosArr[10] = beacons[2].group.position.y + 1.0;
          bPosArr[11] = beacons[2].group.position.z;

          // Line 2: Beacon 2 -> Beacon 0
          bPosArr[12] = beacons[2].group.position.x;
          bPosArr[13] = beacons[2].group.position.y + 1.0;
          bPosArr[14] = beacons[2].group.position.z;
          bPosArr[15] = beacons[0].group.position.x;
          bPosArr[16] = beacons[0].group.position.y + 1.0;
          bPosArr[17] = beacons[0].group.position.z;

          beaconLineGeo.attributes.position.needsUpdate = true;
          beaconLines.computeLineDistances();
        }

        // 8. Update drone-to-beacon connection lines
        const dbPosArr = droneBeaconLineGeo.attributes.position.array;
        const opacities = [];

        for (let i = 0; i < 3; i++) {
          const beacon = beacons[i];
          if (beacon) {
            const bPos = beacon.group.position;
            
            // Start point: drone position
            dbPosArr[i * 6] = dronePos.x;
            dbPosArr[i * 6 + 1] = dronePos.y;
            dbPosArr[i * 6 + 2] = dronePos.z;
            
            // End point: beacon marker position (elevated by 1.0 unit where octahedron is)
            dbPosArr[i * 6 + 3] = bPos.x;
            dbPosArr[i * 6 + 4] = bPos.y + 1.0;
            dbPosArr[i * 6 + 5] = bPos.z;
            
            // Calculate distance to determine signal line opacity (closer = stronger connection)
            const dist = dronePos.distanceTo(new THREE.Vector3(bPos.x, bPos.y + 1.0, bPos.z));
            // Fade out completely beyond 50 units
            const opacity = Math.max(0.0, 1.0 - dist / 50.0);
            opacities.push(opacity);
          }
        }
        droneBeaconLineGeo.attributes.position.needsUpdate = true;
        droneBeaconLineMat.uniforms.uOpacities.value = opacities;

        // Smooth interpolation lerping on Camera Reset Action
        if (resetFrameCount >= 0 && resetFrameCount < 60) {
          resetFrameCount++;
          const easeT = easeInOutCubic(resetFrameCount / 60);
          camera.position.lerpVectors(startCamPos, initialCamPos, easeT);
          controls.target.lerpVectors(startTarget, initialTarget, easeT);
        }

        // Smoothly lerp auto-rotate parameters back up to defaults
        if (controls.autoRotate && isLerpingAutoRotate) {
          controls.autoRotateSpeed += cappedDelta * 0.1;
          if (controls.autoRotateSpeed >= autoRotateSpeedDefault) {
            controls.autoRotateSpeed = autoRotateSpeedDefault;
            isLerpingAutoRotate = false;
          }
        }

        // Update user OrbitControls
        controls.update();

        // Render post-processing passes
        composer.render();

        // Update real-time HUD altitude readout
        const hudAlt = document.getElementById("hud-altitude");
        if (hudAlt) {
          hudAlt.innerText = `ALTITUDE: ${dronePos.y.toFixed(1)}M`;
        }
      }

      // Initialize animation timing accurately
      requestAnimationFrame((timestamp) => {
        lastTime = timestamp;
        requestAnimationFrame(animate);
      });

      // Window resize listeners
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
