<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Bubbles Effect</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .relative {
      position: relative;
    }

    .w-screen {
      width: 100vw;
    }

    .h-screen {
      height: 100vh;
    }

    .w-full {
      width: 100%;
    }

    .h-full {
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="relative w-screen h-screen">
    <div class="float-bubbles w-full h-full"></div>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.124.0";
    import ky from "https://esm.sh/kyouka@1.2.5";
    import { OrbitControls } from "https://esm.sh/three@0.124.0/examples/jsm/controls/OrbitControls";
    import { GLTFLoader } from "https://esm.sh/three@0.124.0/examples/jsm/loaders/GLTFLoader";
    import { FBXLoader } from "https://esm.sh/three@0.124.0/examples/jsm/loaders/FBXLoader";
    import { EffectComposer } from "https://esm.sh/three@0.124.0/examples/jsm/postprocessing/EffectComposer";
    import { GUI } from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";

    const calcAspect = (el) => el.clientWidth / el.clientHeight;

    const getNormalizedMousePos = (e) => {
      return {
        x: (e.clientX / window.innerWidth) * 2 - 1,
        y: -(e.clientY / window.innerHeight) * 2 + 1
      };
    };

    const floatBubblesNoiseVertexShader = `
    #define GLSLIFY 1
    //
    // Description : Array and textureless GLSL 2D/3D/4D simplex
    //               noise functions.
    //      Author : Ian McEwan, Ashima Arts.
    //  Maintainer : ijm
    //     Lastmod : 20110822 (ijm)
    //     License : Copyright (C) 2011 Ashima Arts. All rights reserved.
    //               Distributed under the MIT License. See LICENSE file.
    //               https://github.com/ashima/webgl-noise
    //

    vec3 mod289(vec3 x) {
      return x - floor(x * (1.0 / 289.0)) * 289.0;
    }

    vec4 mod289(vec4 x) {
      return x - floor(x * (1.0 / 289.0)) * 289.0;
    }

    vec4 permute(vec4 x) {
         return mod289(((x*34.0)+1.0)*x);
    }

    vec4 taylorInvSqrt(vec4 r)
    {
      return 1.79284291400159 - 0.85373472095314 * r;
    }

    float snoise(vec3 v)
      {
      const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
      const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);

    // First corner
      vec3 i  = floor(v + dot(v, C.yyy) );
      vec3 x0 =   v - i + dot(i, C.xxx) ;

    // Other corners
      vec3 g = step(x0.yzx, x0.xyz);
      vec3 l = 1.0 - g;
      vec3 i1 = min( g.xyz, l.zxy );
      vec3 i2 = max( g.xyz, l.zxy );

      //   x0 = x0 - 0.0 + 0.0 * C.xxx;
      //   x1 = x0 - i1  + 1.0 * C.xxx;
      //   x2 = x0 - i2  + 2.0 * C.xxx;
      //   x3 = x0 - 1.0 + 3.0 * C.xxx;
      vec3 x1 = x0 - i1 + C.xxx;
      vec3 x2 = x0 - i2 + C.yyy; // 2.0*C.x = 1/3 = C.y
      vec3 x3 = x0 - D.yyy;      // -1.0+3.0*C.x = -0.5 = -D.y

    // Permutations
      i = mod289(i);
      vec4 p = permute( permute( permute(
                 i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
               + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
               + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));

    // Gradients: 7x7 points over a square, mapped onto an octahedron.
    // The ring size 17*17 = 289 is close to a multiple of 49 (49*6 = 294)
      float n_ = 0.142857142857; // 1.0/7.0
      vec3  ns = n_ * D.wyz - D.xzx;

      vec4 j = p - 49.0 * floor(p * ns.z * ns.z);  //  mod(p,7*7)

      vec4 x_ = floor(j * ns.z);
      vec4 y_ = floor(j - 7.0 * x_ );    // mod(j,N)

      vec4 x = x_ *ns.x + ns.yyyy;
      vec4 y = y_ *ns.x + ns.yyyy;
      vec4 h = 1.0 - abs(x) - abs(y);

      vec4 b0 = vec4( x.xy, y.xy );
      vec4 b1 = vec4( x.zw, y.zw );

      //vec4 s0 = vec4(lessThan(b0,0.0))*2.0 - 1.0;
      //vec4 s1 = vec4(lessThan(b1,0.0))*2.0 - 1.0;
      vec4 s0 = floor(b0)*2.0 + 1.0;
      vec4 s1 = floor(b1)*2.0 + 1.0;
      vec4 sh = -step(h, vec4(0.0));

      vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
      vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;

      vec3 p0 = vec3(a0.xy,h.x);
      vec3 p1 = vec3(a0.zw,h.y);
      vec3 p2 = vec3(a1.xy,h.z);
      vec3 p3 = vec3(a1.zw,h.w);

    //Normalise gradients
      vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
      p0 *= norm.x;
      p1 *= norm.y;
      p2 *= norm.z;
      p3 *= norm.w;

    // Mix final noise value
      vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
      m = m * m;
      return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1),
                                    dot(p2,x2), dot(p3,x3) ) );
      }
    `;

    const floatBubblesUniformsVertexShader = `
    uniform float uTime;
    uniform float uDistortion;
    uniform float uRadius;
    uniform float uVelocity;
    `;

    const floatBubblesVertexShader = `
    float noise=snoise(vec3(position/2.+uTime*uVelocity));
    vec3 transformed=vec3(position*(noise*pow(uDistortion,2.)+uRadius));
    `;

    const cubeMapUrls = [
      "https://i.loli.net/2021/05/03/8j3yQiU6HXgJczM.png",
      "https://i.loli.net/2021/05/03/82iUMVOpb3hNcuR.png",
      "https://i.loli.net/2021/05/03/3dSer5OVfjkz2GQ.png",
      "https://i.loli.net/2021/05/03/itE1wayRQkW6hHs.png",
      "https://i.loli.net/2021/05/03/Eh3GUY1HD6pQbeK.png",
      "https://i.loli.net/2021/05/03/H6UArO1MqXa3Bim.png"
    ];

    const bumpMapUrl = "https://i.loli.net/2021/05/03/nRLUFThDrtyPpm8.jpg";

    const colorPresets = {
      "Soap Bubble": { color: "#ffffff", metalness: 1.0, roughness: 0.0, clearcoat: 1.0, clearcoatRoughness: 1.0 },
      "Liquid Gold": { color: "#ffd700", metalness: 1.0, roughness: 0.08, clearcoat: 1.0, clearcoatRoughness: 0.5 },
      "Liquid Amethyst": { color: "#a855f7", metalness: 1.0, roughness: 0.1, clearcoat: 1.0, clearcoatRoughness: 0.4 },
      "Cyber Emerald": { color: "#10b981", metalness: 0.9, roughness: 0.15, clearcoat: 0.8, clearcoatRoughness: 0.3 },
      "Ocean Pearl": { color: "#06b6d4", metalness: 1.0, roughness: 0.05, clearcoat: 1.0, clearcoatRoughness: 0.2 }
    };

    class Base {
      constructor(sel, debug = false) {
        this.debug = debug;
        this.container = document.querySelector(sel);
        this.perspectiveCameraParams = {
          fov: 75,
          near: 0.1,
          far: 100
        };
        this.orthographicCameraParams = {
          zoom: 2,
          near: -100,
          far: 1000
        };
        this.cameraPosition = new THREE.Vector3(0, 3, 10);
        this.lookAtPosition = new THREE.Vector3(0, 0, 0);
        this.rendererParams = {
          outputEncoding: THREE.LinearEncoding,
          config: {
            alpha: true,
            antialias: true
          }
        };
        this.mousePos = new THREE.Vector2(0, 0);
        this.mouseSpeed = 0;
      }
      // 初始化
      init() {
        this.createScene();
        this.createPerspectiveCamera();
        this.createRenderer();
        this.createMesh({});
        this.createLight();
        this.createOrbitControls();
        this.addListeners();
        this.setLoop();
      }
      // 创建场景
      createScene() {
        const scene = new THREE.Scene();
        if (this.debug) {
          scene.add(new THREE.AxesHelper());
        }
        this.scene = scene;
      }
      // 创建透视相机
      createPerspectiveCamera() {
        const { perspectiveCameraParams, cameraPosition, lookAtPosition } = this;
        const { fov, near, far } = perspectiveCameraParams;
        const aspect = calcAspect(this.container);
        const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
        camera.position.copy(cameraPosition);
        camera.lookAt(lookAtPosition);
        this.camera = camera;
      }
      // 创建正交相机
      createOrthographicCamera() {
        const { orthographicCameraParams, cameraPosition, lookAtPosition } = this;
        const { left, right, top, bottom, near, far } = orthographicCameraParams;
        const camera = new THREE.OrthographicCamera(
          left,
          right,
          top,
          bottom,
          near,
          far
        );
        camera.position.copy(cameraPosition);
        camera.lookAt(lookAtPosition);
        this.camera = camera;
      }
      // 更新正交相机参数
      updateOrthographicCameraParams() {
        const { container } = this;
        const { zoom, near, far } = this.orthographicCameraParams;
        const aspect = calcAspect(container);
        this.orthographicCameraParams = {
          left: -zoom * aspect,
          right: zoom * aspect,
          top: zoom,
          bottom: -zoom,
          near,
          far,
          zoom
        };
      }
      // 创建渲染
      createRenderer(useWebGL1 = false) {
        const { rendererParams } = this;
        const { outputEncoding, config } = rendererParams;
        const renderer = !useWebGL1
          ? new THREE.WebGLRenderer(config)
          : new THREE.WebGL1Renderer(config);
        renderer.setSize(this.container.clientWidth, this.container.clientHeight);
        renderer.outputEncoding = outputEncoding;
        this.resizeRendererToDisplaySize();
        this.container.appendChild(renderer.domElement);
        this.renderer = renderer;
        this.renderer.setClearColor(0x000000, 0);
      }
      // 允许投影
      enableShadow() {
        this.renderer.shadowMap.enabled = true;
      }
      // 调整渲染器尺寸
      resizeRendererToDisplaySize() {
        const { renderer } = this;
        if (!renderer) {
          return;
        }
        const canvas = renderer.domElement;
        const pixelRatio = this.params ? this.params.dpr : window.devicePixelRatio;
        const { clientWidth, clientHeight } = canvas;
        const width = (clientWidth * pixelRatio) | 0;
        const height = (clientHeight * pixelRatio) | 0;
        const isResizeNeeded = canvas.width !== width || canvas.height !== height;
        if (isResizeNeeded) {
          renderer.setSize(width, height, false);
        }
        return isResizeNeeded;
      }
      // 创建网格
      createMesh(
        meshObject = {},
        container = this.scene
      ) {
        const {
          geometry = new THREE.BoxGeometry(1, 1, 1),
          material = new THREE.MeshStandardMaterial({
            color: new THREE.Color("#d9dfc8")
          }),
          position = new THREE.Vector3(0, 0, 0)
        } = meshObject;
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(position);
        container.add(mesh);
        return mesh;
      }
      // 创建光源
      createLight() {
        const dirLight = new THREE.DirectionalLight(
          new THREE.Color("#ffffff"),
          0.5
        );
        dirLight.position.set(0, 50, 0);
        this.scene.add(dirLight);
        const ambiLight = new THREE.AmbientLight(new THREE.Color("#ffffff"), 0.4);
        this.scene.add(ambiLight);
      }
      // 创建轨道控制
      createOrbitControls() {
        const controls = new OrbitControls(this.camera, this.renderer.domElement);
        const { lookAtPosition } = this;
        controls.target.copy(lookAtPosition);
        controls.update();
        this.controls = controls;
      }
      // 监听事件
      addListeners() {
        this.onResize();
      }
      // 监听画面缩放
      onResize() {
        window.addEventListener("resize", (e) => {
          if (this.shaderMaterial) {
            this.shaderMaterial.uniforms.uResolution.value.x = window.innerWidth;
            this.shaderMaterial.uniforms.uResolution.value.y = window.innerHeight;
            this.renderer.setSize(window.innerWidth, window.innerHeight);
          } else {
            if (this.camera instanceof THREE.PerspectiveCamera) {
              const aspect = calcAspect(this.container);
              const camera = this.camera;
              camera.aspect = aspect;
              camera.updateProjectionMatrix();
            } else if (this.camera instanceof THREE.OrthographicCamera) {
              this.updateOrthographicCameraParams();
              const camera = this.camera;
              const {
                left,
                right,
                top,
                bottom,
                near,
                far
              } = this.orthographicCameraParams;
              camera.left = left;
              camera.right = right;
              camera.top = top;
              camera.bottom = bottom;
              camera.near = near;
              camera.far = far;
              camera.updateProjectionMatrix();
            }
            this.renderer.setSize(
              this.container.clientWidth,
              this.container.clientHeight
            );
          }
        });
      }
      // 动画
      update() {
        console.log("animation");
      }
      // 渲染
      setLoop() {
        this.renderer.setAnimationLoop(() => {
          this.resizeRendererToDisplaySize();
          this.update();
          if (this.controls) {
            this.controls.update();
          }
          if (this.composer) {
            this.composer.render();
          } else {
            this.renderer.render(this.scene, this.camera);
          }
        });
      }
      // 创建文本
      createText(
        text = "",
        config,
        material = new THREE.MeshStandardMaterial({
          color: "#ffffff"
        })
      ) {
        const geo = new THREE.TextGeometry(text, config);
        const mesh = new THREE.Mesh(geo, material);
        return mesh;
      }
      // 创建音效源
      createAudioSource() {
        const listener = new THREE.AudioListener();
        this.camera.add(listener);
        const sound = new THREE.Audio(listener);
        this.sound = sound;
      }
      // 加载音效
      loadAudio(url) {
        const loader = new THREE.AudioLoader();
        return new Promise((resolve) => {
          loader.load(url, (buffer) => {
            this.sound.setBuffer(buffer);
            resolve(buffer);
          });
        });
      }
      // 加载模型
      loadModel(url) {
        const loader = new GLTFLoader();
        return new Promise((resolve, reject) => {
          loader.load(
            url,
            (gltf) => {
              const model = gltf.scene;
              console.log(model);
              resolve(model);
            },
            undefined,
            (err) => {
              console.log(err);
              reject();
            }
          );
        });
      }
      // 加载FBX模型
      loadFBXModel(url) {
        const loader = new FBXLoader();
        return new Promise((resolve, reject) => {
          loader.load(
            url,
            (obj) => {
              resolve(obj);
            },
            undefined,
            (err) => {
              console.log(err);
              reject();
            }
          );
        });
      }
      // 加载字体
      loadFont(url) {
        const loader = new THREE.FontLoader();
        return new Promise((resolve) => {
          loader.load(url, (font) => {
            resolve(font);
          });
        });
      }
      // 创建点选模型
      createRaycaster() {
        this.raycaster = new THREE.Raycaster();
        this.trackMousePos();
      }
      // 追踪鼠标位置
      trackMousePos() {
        window.addEventListener("mousemove", (e) => {
          this.setMousePos(e);
        });
        window.addEventListener(
          "touchstart",
          (e) => {
            this.setMousePos(e.touches[0]);
          },
          { passive: false }
        );
        window.addEventListener("touchmove", (e) => {
          this.setMousePos(e.touches[0]);
        });
      }
      // 设置鼠标位置
      setMousePos(e) {
        const { x, y } = getNormalizedMousePos(e);
        this.mousePos.x = x;
        this.mousePos.y = y;
      }
      // 获取点击物
      getInterSects() {
        this.raycaster.setFromCamera(this.mousePos, this.camera);
        const intersects = this.raycaster.intersectObjects(
          this.scene.children,
          true
        );
        return intersects;
      }
      // 选中点击物时
      onChooseIntersect(target) {
        const intersects = this.getInterSects();
        const intersect = intersects[0];
        if (!intersect || !intersect.face) {
          return null;
        }
        const { object } = intersect;
        return target === object ? intersect : null;
      }
      // 获取跟屏幕同像素的fov角度
      getScreenFov() {
        return ky.rad2deg(
          2 * Math.atan(window.innerHeight / 2 / this.cameraPosition.z)
        );
      }
      // 获取重心坐标系
      getBaryCoord(bufferGeometry) {
        // https://gist.github.com/mattdesl/e399418558b2b52b58f5edeafea3c16c
        const length = bufferGeometry.attributes.position.array.length;
        const count = length / 3;
        const bary = [];
        for (let i = 0; i < count; i++) {
          bary.push(0, 0, 1, 0, 1, 0, 1, 0, 0);
        }
        const aCenter = new Float32Array(bary);
        bufferGeometry.setAttribute(
          "aCenter",
          new THREE.BufferAttribute(aCenter, 3)
        );
      }
      // 追踪鼠标速度
      trackMouseSpeed() {
        // https://stackoverflow.com/questions/6417036/track-mouse-speed-with-js
        let lastMouseX = -1;
        let lastMouseY = -1;
        let mouseSpeed = 0;
        window.addEventListener("mousemove", (e) => {
          const mousex = e.pageX;
          const mousey = e.pageY;
          if (lastMouseX > -1) {
            mouseSpeed = Math.max(
              Math.abs(mousex - lastMouseX),
              Math.abs(mousey - lastMouseY)
            );
            this.mouseSpeed = mouseSpeed / 100;
          }
          lastMouseX = mousex;
          lastMouseY = mousey;
        });
        document.addEventListener("mouseleave", () => {
          this.mouseSpeed = 0;
        });
      }
      // 使用PCFSoft阴影
      usePCFSoftShadowMap() {
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      }
      // 使用VSM阴影
      useVSMShadowMap() {
        this.renderer.shadowMap.type = THREE.VSMShadowMap;
      }
      // 将相机的方向设为z轴
      setCameraUpZ() {
        this.camera.up.set(0, 0, 1);
      }
    }

    class FloatBubbles extends Base {
      constructor(sel, debug) {
        super(sel, debug);
        this.clock = new THREE.Clock();
        this.customTime = 0;
        this.cameraPosition = new THREE.Vector3(0, 0, 3);
        this.userRadius = 3.0;

        this.params = {
          greenscreen: false,
          dpr: Math.min(window.devicePixelRatio, 2.0),
          animationSpeed: 1.0,
          animationPreset: 'Slow Orbit',
          colorPreset: 'Soap Bubble',
          bgType: 'Env Map'
        };

        this.colorParams = {
          bubbleColor: '#ffffff',
          bgColor: '#000000'
        };

        this.uniforms = {
          uTime: {
            value: 0
          },
          uDistortion: {
            value: 0.4
          },
          uRadius: {
            value: 1
          },
          uVelocity: {
            value: 0.5
          }
        };
        this.bubbles = [];
      }
      // 初始化
      init() {
        this.createScene();
        this.createPerspectiveCamera();
        this.createRenderer();
        this.createFloatBubblesMaterial();
        this.createBg();
        this.createBubble();
        this.createBubbles();
        this.createLight();
        this.trackMousePos();
        this.createOrbitControls();

        // Enable damping and screen-space panning
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.05;
        this.controls.screenSpacePanning = true;

        this.createDebugPanel();
        this.addListeners();
        this.setupUIKeys();
        this.setLoop();
      }
      // 创建材质
      createFloatBubblesMaterial() {
        const bumpMap = new THREE.TextureLoader().load(bumpMapUrl);
        const envMap = new THREE.CubeTextureLoader().load(cubeMapUrls);
        this.envMap = envMap;
        const floatBubblesMaterial = new THREE.MeshPhysicalMaterial({
          roughness: 0,
          metalness: 1,
          clearcoat: 1,
          clearcoatRoughness: 1,
          envMap,
          bumpMap,
          bumpScale: 0.005
        });
        floatBubblesMaterial.onBeforeCompile = (shader) => {
          this.modifyShader(shader);
        };
        this.floatBubblesMaterial = floatBubblesMaterial;
      }
      // 修改shader
      modifyShader(shader) {
        shader.uniforms = { ...shader.uniforms, ...this.uniforms };
        shader.vertexShader = `
        ${floatBubblesUniformsVertexShader}
        ${floatBubblesNoiseVertexShader}
        ${shader.vertexShader}
        `;
        const BEGIN_VERTEX_SHADER = "#include <begin_vertex>";
        const MODIFIED_BEGIN_VERTEX_SHADER = `
      ${floatBubblesVertexShader}`;
        shader.vertexShader = shader.vertexShader.replace(
          BEGIN_VERTEX_SHADER,
          MODIFIED_BEGIN_VERTEX_SHADER
        );
      }
      // Update background helper
      updateBackground() {
        if (this.params.greenscreen) {
          this.scene.background = new THREE.Color(0x00ff00);
        } else if (this.params.bgType === 'Env Map') {
          this.scene.background = this.envMap;
        } else {
          this.scene.background = new THREE.Color(this.colorParams.bgColor);
        }
      }
      // 创建背景
      createBg() {
        this.updateBackground();
      }
      // 创建泡泡
      createBubble() {
        const geometry = new THREE.IcosahedronBufferGeometry(1, 4);
        const material = this.floatBubblesMaterial;
        const bubble = this.createMesh({
          geometry,
          material
        });
        this.bubble = bubble;
      }
      // 创建一群泡泡
      createBubbles(count = 64) {
        for (let i = 0; i < count; i++) {
          const bubble = this.bubble.clone();
          bubble.position.x = 4 * ky.randomNumberInRange(-6, 6);
          bubble.position.y = 4 * ky.randomNumberInRange(-5, 5);
          bubble.position.z = 4 * ky.randomNumberInRange(-5, -1);
          const bubbleScale = ky.randomNumberInRange(0, 1.5);
          bubble.scale.set(bubbleScale, bubbleScale, bubbleScale);
          this.scene.add(bubble);
          this.bubbles.push(bubble);
        }
      }
      // Apply preset colors
      applyColorPreset(presetName) {
        if (presetName === 'Custom') return;
        const preset = colorPresets[presetName];
        if (preset && this.floatBubblesMaterial) {
          this.colorParams.bubbleColor = preset.color;
          this.floatBubblesMaterial.color.set(preset.color);
          this.floatBubblesMaterial.metalness = preset.metalness;
          this.floatBubblesMaterial.roughness = preset.roughness;
          this.floatBubblesMaterial.clearcoat = preset.clearcoat;
          this.floatBubblesMaterial.clearcoatRoughness = preset.clearcoatRoughness;
          this.floatBubblesMaterial.needsUpdate = true;

          if (this.colorController) this.colorController.updateDisplay();
          if (this.metalnessController) this.metalnessController.updateDisplay();
          if (this.roughnessController) this.roughnessController.updateDisplay();
          if (this.clearcoatController) this.clearcoatController.updateDisplay();
          if (this.clearcoatRoughnessController) this.clearcoatRoughnessController.updateDisplay();
        }
      }
      // Create UI panel
      createDebugPanel() {
        const gui = new GUI({ title: 'Settings', width: 300 });
        this.gui = gui;
        this.guiVisible = true;

        // Green Screen
        gui.add(this.params, 'greenscreen').name('Green Screen').onChange(() => {
          this.updateBackground();
        });

        // Background Settings
        const bgFolder = gui.addFolder('Background Settings');
        bgFolder.add(this.params, 'bgType', ['Env Map', 'Solid Color']).name('BG Type').onChange(() => {
          this.updateBackground();
        });
        bgFolder.addColor(this.colorParams, 'bgColor').name('BG Color').onChange(() => {
          this.updateBackground();
        });

        // Pixel Ratio
        gui.add(this.params, 'dpr', 0.5, 2.5, 0.1).name('Pixel Ratio').onChange((value) => {
          this.renderer.setPixelRatio(value);
          this.resizeRendererToDisplaySize();
        });

        // Animation Speed
        gui.add(this.params, 'animationSpeed', 0.0, 3.0, 0.1).name('Anim Speed');

        // Camera Animation Presets
        const animations = ['Static', 'Slow Orbit', 'Vertical Wave', 'Deep Pulse', 'Infinity Loop'];
        gui.add(this.params, 'animationPreset', animations).name('Camera Anim');

        // Color Presets
        const colorPresetNames = Object.keys(colorPresets).concat(['Custom']);
        const presetController = gui.add(this.params, 'colorPreset', colorPresetNames).name('Color Preset').onChange((value) => {
          this.applyColorPreset(value);
        });

        // Custom Material settings
        const matFolder = gui.addFolder('Custom Material');
        this.colorController = matFolder.addColor(this.colorParams, 'bubbleColor').name('Bubble Color').onChange((value) => {
          if (this.floatBubblesMaterial) {
            this.floatBubblesMaterial.color.set(value);
          }
          this.params.colorPreset = 'Custom';
          presetController.updateDisplay();
        });

        this.metalnessController = matFolder.add(this.floatBubblesMaterial, 'metalness', 0.0, 1.0, 0.01).name('Metalness').onChange(() => {
          this.params.colorPreset = 'Custom';
          presetController.updateDisplay();
        });

        this.roughnessController = matFolder.add(this.floatBubblesMaterial, 'roughness', 0.0, 1.0, 0.01).name('Roughness').onChange(() => {
          this.params.colorPreset = 'Custom';
          presetController.updateDisplay();
        });

        this.clearcoatController = matFolder.add(this.floatBubblesMaterial, 'clearcoat', 0.0, 1.0, 0.01).name('Clearcoat').onChange(() => {
          this.params.colorPreset = 'Custom';
          presetController.updateDisplay();
        });

        this.clearcoatRoughnessController = matFolder.add(this.floatBubblesMaterial, 'clearcoatRoughness', 0.0, 1.0, 0.01).name('Clearcoat Rough').onChange(() => {
          this.params.colorPreset = 'Custom';
          presetController.updateDisplay();
        });
      }
      // Key controls and distance listener
      setupUIKeys() {
        window.addEventListener('keydown', (e) => {
          if (e.key === 'h' || e.key === 'H') {
            if (this.gui) {
              if (this.guiVisible) {
                this.gui.hide();
                this.guiVisible = false;
              } else {
                this.gui.show();
                this.guiVisible = true;
              }
            }
          }
        });

        window.addEventListener('wheel', () => {
          setTimeout(() => {
            if (this.controls) {
              this.userRadius = this.camera.position.distanceTo(this.controls.target);
            }
          }, 50);
        });

        this.controls.addEventListener('change', () => {
          if (this.camera && this.controls) {
            this.userRadius = this.camera.position.distanceTo(this.controls.target);
          }
        });
      }
      // 动画
      update() {
        const delta = this.clock.getDelta();
        const speed = this.params.animationSpeed;
        this.customTime += delta * speed;

        const mousePos = this.mousePos;
        const t = this.customTime;

        if (this.controls) {
          if (this.params.animationPreset === 'Slow Orbit') {
            const angle = t * 0.15;
            this.camera.position.x = this.controls.target.x + Math.sin(angle) * this.userRadius;
            this.camera.position.z = this.controls.target.z + Math.cos(angle) * this.userRadius;
            this.camera.position.y = this.controls.target.y;
          } else if (this.params.animationPreset === 'Vertical Wave') {
            const angle = t * 0.3;
            this.camera.position.y = this.controls.target.y + Math.sin(angle) * (this.userRadius * 0.4);
          } else if (this.params.animationPreset === 'Deep Pulse') {
            const angle = t * 0.25;
            const currentRadius = this.userRadius + Math.sin(angle) * (this.userRadius * 0.3);
            const dir = new THREE.Vector3().subVectors(this.camera.position, this.controls.target).normalize();
            this.camera.position.copy(this.controls.target).addScaledVector(dir, currentRadius);
          } else if (this.params.animationPreset === 'Infinity Loop') {
            const angle = t * 0.2;
            const radiusX = this.userRadius;
            const radiusZ = this.userRadius * 0.6;
            this.camera.position.x = this.controls.target.x + Math.sin(angle) * radiusX;
            this.camera.position.z = this.controls.target.z + Math.sin(angle * 2) * radiusZ;
            this.camera.position.y = this.controls.target.y + Math.cos(angle) * (this.userRadius * 0.3);
          }
        }

        if (this.floatBubblesMaterial) {
          this.uniforms.uTime.value = t;
          this.bubble.rotation.z = t / 5;
          this.bubble.rotation.x = THREE.MathUtils.lerp(
            this.bubble.rotation.x,
            mousePos.y * Math.PI,
            0.1
          );
          this.bubble.rotation.y = THREE.MathUtils.lerp(
            this.bubble.rotation.y,
            mousePos.x * Math.PI,
            0.1
          );
          this.bubbles.forEach((bubble) => {
            bubble.position.y += ky.randomNumberInRange(0.02, 0.06) * speed;
            if (bubble.position.y > 20) {
              bubble.position.y = -20;
            }
            bubble.rotation.x += 0.04 * speed;
            bubble.rotation.y += 0.04 * speed;
            bubble.rotation.z += 0.02 * speed;
          });
        }
      }
    }

    const start = () => {
      const floatBubbles = new FloatBubbles(".float-bubbles", false);
      floatBubbles.init();
    };

    start();
  </script>
</body>
</html>
