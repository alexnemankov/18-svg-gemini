<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Coffee Supply Chain - Interactive Map</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0e6d6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        #chartdiv {
            max-width: 100%;
            height: 95vh;
        }
    </style>
</head>
<body>
    <div id="chartdiv"></div>

    <script src="https://cdn.amcharts.com/lib/5/index.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/map.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>
    <script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>

    <script type="module">
        import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

        // Get globals
        const am5 = window.am5;
        const am5map = window.am5map;
        const am5themes_Animated = window.am5themes_Animated;
        const am5geodata_worldLow = window.am5geodata_worldLow;

        // Color schemes (Default Coffee + 5 Tech & IT themes)
        const themes = {
            'Coffee (Default)': {
                primary: '#3c1e0e',
                secondary: '#5c3a1e',
                medium: '#8b5e3c',
                accent: '#c4956a',
                baseColor: '#e8d5b7',
                landColor: '#f5ece0',
                bgColor: '#f0e6d6',
                oceanColor: '#ede4d4',
                producer: '#8fae7e',
                hub: '#c4a878',
                consumer: '#ddc8a0'
            },
            'Cyberpunk Neon': {
                primary: '#ff007f',
                secondary: '#00f5ff',
                medium: '#9b5de5',
                accent: '#ffea00',
                baseColor: '#1a1c29',
                landColor: '#24273a',
                bgColor: '#0f1016',
                oceanColor: '#15161f',
                producer: '#00ff66',
                hub: '#ffea00',
                consumer: '#ff00ff'
            },
            'Matrix Terminal': {
                primary: '#00ff33',
                secondary: '#00aa22',
                medium: '#005511',
                accent: '#003300',
                baseColor: '#1b1b1b',
                landColor: '#242424',
                bgColor: '#080808',
                oceanColor: '#121212',
                producer: '#00ff66',
                hub: '#adff2f',
                consumer: '#00fa9a'
            },
            'Quantum Ice': {
                primary: '#0077b6',
                secondary: '#00b4d8',
                medium: '#90e0ef',
                accent: '#caf0f8',
                baseColor: '#1c2541',
                landColor: '#2a3457',
                bgColor: '#0b132b',
                oceanColor: '#131c38',
                producer: '#48cae4',
                hub: '#ade8f4',
                consumer: '#b388ff'
            },
            'Synthwave Retro': {
                primary: '#ff7e5f',
                secondary: '#feb47b',
                medium: '#3a1c6a',
                accent: '#ff007f',
                baseColor: '#240d47',
                landColor: '#2b0f54',
                bgColor: '#1a0933',
                oceanColor: '#200b3e',
                producer: '#ff007f',
                hub: '#00ffff',
                consumer: '#ffbb00'
            },
            'Amber Console': {
                primary: '#ffb000',
                secondary: '#d39400',
                medium: '#885f00',
                accent: '#553c00',
                baseColor: '#221800',
                landColor: '#2d2000',
                bgColor: '#110b00',
                oceanColor: '#1a1100',
                producer: '#ffaa00',
                hub: '#ffd000',
                consumer: '#e59f00'
            }
        };

        const params = {
            theme: 'Coffee (Default)',
            greenscreen: false,
            autoRotate: true,
            rotationSpeed: 1.0,
            zoomLevel: 0.9,
            // Custom colors (initially coffee theme values)
            primaryColor: '#3c1e0e',
            secondaryColor: '#5c3a1e',
            mediumColor: '#8b5e3c',
            accentColor: '#c4956a',
            baseColor: '#e8d5b7',
            landColor: '#f5ece0',
            bgColor: '#f0e6d6',
            oceanColor: '#ede4d4',
            producerColor: '#8fae7e',
            hubColor: '#c4a878',
            consumerColor: '#ddc8a0'
        };

        // Create root element
        var root = am5.Root.new("chartdiv");

        // Set themes
        var coffeeTheme = am5.Theme.new(root);
        coffeeTheme.rule("InterfaceColors").setAll({
            primaryButton: am5.color(0x8b5e3c),
            primaryButtonHover: am5.color(0x5c3a1e),
            primaryButtonDown: am5.color(0x3c1e0e),
            primaryButtonActive: am5.color(0xc4956a),
            primaryButtonText: am5.color(0xf5ece0),
            secondaryButton: am5.color(0xe8d5b7),
            secondaryButtonHover: am5.color(0xd4c4a8),
            secondaryButtonDown: am5.color(0xc4956a),
            secondaryButtonText: am5.color(0x3c1e0e),
            background: am5.color(0xe8d5b7),
            text: am5.color(0x3c1e0e)
        });

        root.setThemes([am5themes_Animated.new(root), coffeeTheme]);

        // Grainy paper background
        root.container.set("background", am5.Rectangle.new(root, {
            fill: am5.color(params.bgColor),
            fillPattern: am5.GrainPattern.new(root, {
                density: 0.4,
                maxOpacity: 0.07,
                colors: [am5.color(0x000000)]
            })
        }));

        // Create the map chart
        var chart = root.container.children.push(am5map.MapChart.new(root, {
            panX: "rotateX",
            panY: "rotateY",
            projection: am5map.geoOrthographic(),
            rotationX: -15,
            rotationY: -20,
            minZoomLevel: 0.5,
            zoomLevel: 0.9,
            wheelY: "zoom" // Enable wheel zoom
        }));

        // Create series for background fill
        var bgSeries = chart.series.push(am5map.MapPolygonSeries.new(root, {}));
        bgSeries.mapPolygons.template.setAll({
            fill: am5.color(params.oceanColor),
            fillOpacity: 1,
            strokeOpacity: 0
        });
        bgSeries.data.push({ geometry: am5map.getGeoRectangle(90, 180, -90, -180) });

        // Create graticule series
        var graticuleSeries = chart.series.push(am5map.GraticuleSeries.new(root, {}));
        graticuleSeries.mapLines.template.setAll({
            stroke: am5.color(params.mediumColor),
            strokeOpacity: 0.15,
            strokeWidth: 0.5
        });

        // Create main polygon series for countries
        var polygonSeries = chart.series.push(am5map.MapPolygonSeries.new(root, {
            geoJSON: am5geodata_worldLow
        }));
        polygonSeries.mapPolygons.template.setAll({
            fill: am5.color(params.landColor),
            stroke: am5.color(params.accentColor),
            strokeWidth: 0.5,
            strokeOpacity: 0.5
        });

        // Highlight producer, hub, and consumer countries
        var producerIds = ["BR", "VN", "CO", "ET", "ID", "HN"];
        var hubIds = ["DE", "BE", "IT", "US"];
        var consumerIds = ["FR", "PL", "SE", "RU", "GB", "NL", "GR", "AT", "CA", "JP"];

        polygonSeries.events.on("datavalidated", function () {
            applyCurrentColors();
        });

        // Create Map Sankey series
        var sankeySeries = chart.series.push(am5map.MapSankeySeries.new(root, {
            polygonSeries: polygonSeries,
            maxWidth: 2,
            controlPointDistance: 0.4,
            resolution: 60,
            nodePadding: 0.3
        }));

        sankeySeries.mapPolygons.template.setAll({
            fill: am5.color(params.mediumColor),
            fillOpacity: 0.65,
            strokeOpacity: 0,
            tooltipText: "{sourceNode.name} > {targetNode.name}\n{value}k tonnes"
        });

        sankeySeries.nodes.mapPolygons.template.setAll({
            fill: am5.color(params.primaryColor),
            stroke: am5.color(params.baseColor),
            strokeWidth: 1.5,
            fillOpacity: 0.95,
            strokeOpacity: 1,
            tooltipText: "{name}\n{sum}k tonnes"
        });

        // Add animated coffee bean bullets
        sankeySeries.bullets.push(function () {
            return am5.Bullet.new(root, {
                locationX: 0,
                autoRotate: true,
                sprite: am5.Graphics.new(root, {
                    svgPath: "M-4,-2.5 C-4,-5 -1.5,-6.5 1,-6.5 C3.5,-6.5 5,-4.5 5,-2 C5,1 3,3.5 0.5,5 C-0.5,5.7 -1.5,5.7 -2.5,5 C-5,3.5 -6,1 -4,-2.5 Z M-1,-5 C-1,-1 -1,2 -0.5,4.5",
                    fill: am5.color(params.primaryColor),
                    stroke: am5.color(params.secondaryColor),
                    strokeWidth: 0.5,
                    centerX: am5.p50,
                    centerY: am5.p50,
                    scale: 0.35,
                    visible: false
                })
            });
        });

        // Producers > Processing Hubs > Consumer Markets
        sankeySeries.data.setAll([
            // Producers > Hubs
            { sourceId: "BR", targetId: "DE", value: 350 },
            { sourceId: "BR", targetId: "US", value: 450 },
            { sourceId: "BR", targetId: "IT", value: 200 },
            { sourceId: "VN", targetId: "DE", value: 200 },
            { sourceId: "VN", targetId: "BE", value: 150 },
            { sourceId: "CO", targetId: "US", value: 250 },
            { sourceId: "CO", targetId: "DE", value: 80 },
            { sourceId: "ET", targetId: "DE", value: 60 },
            { sourceId: "ET", targetId: "BE", value: 40 },
            { sourceId: "ID", targetId: "US", value: 80 },
            { sourceId: "HN", targetId: "DE", value: 60 },
            { sourceId: "HN", targetId: "BE", value: 40 },

            // Hubs > Consumer Markets
            { sourceId: "DE", targetId: "FR", value: 150 },
            { sourceId: "DE", targetId: "PL", value: 100 },
            { sourceId: "DE", targetId: "SE", value: 80 },
            { sourceId: "DE", targetId: "RU", value: 120 },
            { sourceId: "BE", targetId: "GB", value: 100 },
            { sourceId: "BE", targetId: "NL", value: 80 },
            { sourceId: "IT", targetId: "GR", value: 50 },
            { sourceId: "IT", targetId: "AT", value: 40 },
            { sourceId: "US", targetId: "CA", value: 120 },
            { sourceId: "US", targetId: "JP", value: 80 }
        ]);

        // Set country names on auto-created nodes and animate bullets
        var countryNames = {
            BR: "Brazil", VN: "Vietnam", CO: "Colombia", ET: "Ethiopia",
            ID: "Indonesia", HN: "Honduras", DE: "Germany", BE: "Belgium",
            IT: "Italy", US: "United States", FR: "France", PL: "Poland",
            SE: "Sweden", RU: "Russia", GB: "United Kingdom", NL: "Netherlands",
            GR: "Greece", AT: "Austria", CA: "Canada", JP: "Japan"
        };

        sankeySeries.events.on("datavalidated", function () {
            am5.array.each(sankeySeries.nodes.dataItems, function (di) {
                var id = di.get("id");
                if (id && countryNames[id]) {
                    di.set("name", countryNames[id]);
                }
            });

            am5.array.each(sankeySeries.dataItems, function (dataItem) {
                var bullets = dataItem.bullets;
                if (bullets) {
                    am5.array.each(bullets, function (bullet) {
                        var randomDur = 3000 + Math.random() * 3000;
                        var delay = Math.random() * randomDur;
                        setTimeout(function () {
                            var sprite = bullet.get("sprite");
                            if (sprite) {
                                sprite.set("visible", true);
                                sprite.setAll({
                                    fill: am5.color(params.primaryColor),
                                    stroke: am5.color(params.secondaryColor)
                                });
                            }
                            bullet.animate({
                                key: "locationX",
                                from: 0,
                                to: 1,
                                duration: randomDur,
                                easing: am5.ease.linear,
                                loops: Infinity
                            });
                        }, delay);
                    });
                }
            });
            applyCurrentColors();
        });

        // Add title and subtitle
        var titleCont = chart.children.push(am5.Container.new(root, {
            layout: root.verticalLayout,
            x: am5.p50,
            centerX: am5.p50,
            y: am5.p100,
            centerY: am5.p100,
            position: "absolute",
            paddingBottom: 16
        }));

        var titleLabel = titleCont.children.push(am5.Label.new(root, {
            text: "Global Coffee Supply Chain",
            fontSize: 18,
            fontWeight: "600",
            fill: am5.color(params.primaryColor),
            x: am5.p50,
            centerX: am5.p50
        }));

        var subtitleLabel = titleCont.children.push(am5.Label.new(root, {
            text: "(Thousands of tonnes)",
            fontSize: 11,
            fill: am5.color(params.mediumColor),
            x: am5.p50,
            centerX: am5.p50
        }));

        // Add Globe / Map projection toggle
        var switchCont = chart.children.push(am5.Container.new(root, {
            layout: root.horizontalLayout,
            x: 20,
            y: 40
        }));

        var switchLabel1 = switchCont.children.push(am5.Label.new(root, {
            centerY: am5.p50,
            text: "Globe",
            fill: am5.color(params.primaryColor),
            fontSize: 13
        }));

        var switchButton = switchCont.children.push(am5.Button.new(root, {
            themeTags: ["switch"],
            centerY: am5.p50,
            icon: am5.Circle.new(root, {
                themeTags: ["icon"]
            })
        }));

        var easing = am5.ease.inOut(am5.ease.cubic);
        var duration = 1500;
        var fadeDuration = 300;

        function zoomToGlobe() {
            chart.set("projection", am5map.geoOrthographic());
            chart.set("panX", "rotateX");
            chart.set("panY", "rotateY");
            chart.animate({ key: "rotationX", to: -15, duration: duration, easing: easing });
            chart.animate({ key: "rotationY", to: -20, duration: duration, easing: easing });
            bgSeries.mapPolygons.template.set("fillOpacity", 1);
            chart.set("minZoomLevel", 0.9);
            chart.animate({ key: "zoomLevel", to: 0.9, duration: duration, easing: easing });

            setTimeout(function() {
                startRotation();
            }, duration);
        }

        function zoomToMap() {
            chart.set("projection", am5map.geoMercator());
            chart.set("panX", "translateX");
            chart.set("panY", "translateY");
            chart.animate({ key: "rotationX", to: 0, duration: duration, easing: easing });
            chart.animate({ key: "rotationY", to: 0, duration: duration, easing: easing });
            bgSeries.mapPolygons.template.set("fillOpacity", 0);
            chart.set("minZoomLevel", 1);
            chart.animate({ key: "zoomLevel", to: 1.7, duration: duration, easing: easing });

            if (rotationAnimation) {
                rotationAnimation.stop();
                rotationAnimation = null;
            }
        }

        switchButton.on("active", function () {
            chart.goHome(duration);
            // Fade out before projection switch
            setTimeout(function () {
                chart.seriesContainer.animate({ key: "opacity", to: 0, duration: fadeDuration });
            }, duration - fadeDuration);
            setTimeout(function () {
                if (switchButton.get("active")) {
                    zoomToMap();
                } else {
                    zoomToGlobe();
                }
                // Fade in after projection switch
                chart.seriesContainer.animate({ key: "opacity", to: 1, duration: fadeDuration });
            }, duration);
        });

        var switchLabel2 = switchCont.children.push(am5.Label.new(root, {
            centerY: am5.p50,
            text: "Map",
            fill: am5.color(params.primaryColor),
            fontSize: 13
        }));

        // Add zoom controls
        var zoomControl = chart.set("zoomControl", am5map.ZoomControl.new(root, {}));
        zoomControl.homeButton.set("visible", true);

        // Rotation Animation logic
        var rotationAnimation;

        function startRotation() {
            if (rotationAnimation) {
                rotationAnimation.stop();
                rotationAnimation = null;
            }

            if (!params.autoRotate || switchButton.get("active")) {
                return;
            }

            var currentX = chart.get("rotationX", -15);
            var targetX = currentX + 360;
            var duration = 120000 / params.rotationSpeed;

            rotationAnimation = chart.animate({
                key: "rotationX",
                from: currentX,
                to: targetX,
                duration: duration,
                loops: Infinity,
                easing: am5.ease.linear
            });
        }

        chart.chartContainer.events.on("pointerdown", function () {
            if (rotationAnimation) {
                rotationAnimation.stop();
                rotationAnimation = null;
            }
        });

        var resumeTimeout;
        window.addEventListener("pointerup", function() {
            if (resumeTimeout) clearTimeout(resumeTimeout);
            resumeTimeout = setTimeout(function() {
                startRotation();
            }, 2000);
        });

        // Initialize rotation
        startRotation();

        // Make stuff animate on load
        chart.appear(1000, 100);

        // Dynamic styling system for color schemes
        function applyCurrentColors() {
            // Determine active colors. If greenscreen is on, the background becomes solid green.
            document.body.style.backgroundColor = params.greenscreen ? '#00ff00' : '';
            
            // Update chart background rectangle
            var bgRect = root.container.get("background");
            if (bgRect) {
                if (params.greenscreen) {
                    bgRect.set("visible", false);
                } else {
                    bgRect.set("fill", am5.color(params.bgColor));
                    bgRect.set("visible", true);
                }
            }

            // Ocean color (bgSeries)
            bgSeries.mapPolygons.template.set("fill", am5.color(params.oceanColor));
            bgSeries.mapPolygons.each(function(polygon) {
                polygon.set("fill", am5.color(params.oceanColor));
            });

            // Graticules
            graticuleSeries.mapLines.template.set("stroke", am5.color(params.mediumColor));
            graticuleSeries.mapLines.each(function(line) {
                line.set("stroke", am5.color(params.mediumColor));
            });

            // Countries template
            polygonSeries.mapPolygons.template.setAll({
                fill: am5.color(params.landColor),
                stroke: am5.color(params.accentColor)
            });

            // Individual countries
            am5.array.each(polygonSeries.dataItems, function (di) {
                var id = di.get("id");
                var polygon = di.get("mapPolygon");
                if (polygon) {
                    if (id && producerIds.includes(id)) {
                        polygon.set("fill", am5.color(params.producerColor));
                    } else if (id && hubIds.includes(id)) {
                        polygon.set("fill", am5.color(params.hubColor));
                    } else if (id && consumerIds.includes(id)) {
                        polygon.set("fill", am5.color(params.consumerColor));
                    } else {
                        polygon.setAll({
                            fill: am5.color(params.landColor),
                            stroke: am5.color(params.accentColor)
                        });
                    }
                }
            });

            // Sankey lines
            sankeySeries.mapPolygons.template.set("fill", am5.color(params.mediumColor));
            sankeySeries.mapPolygons.each(function(polygon) {
                polygon.set("fill", am5.color(params.mediumColor));
            });

            // Sankey nodes
            sankeySeries.nodes.mapPolygons.template.setAll({
                fill: am5.color(params.primaryColor),
                stroke: am5.color(params.baseColor)
            });
            sankeySeries.nodes.mapPolygons.each(function(polygon) {
                polygon.setAll({
                    fill: am5.color(params.primaryColor),
                    stroke: am5.color(params.baseColor)
                });
            });

            // Bullets
            am5.array.each(sankeySeries.dataItems, function (dataItem) {
                var bullets = dataItem.bullets;
                if (bullets) {
                    am5.array.each(bullets, function (bullet) {
                        var sprite = bullet.get("sprite");
                        if (sprite) {
                            sprite.setAll({
                                fill: am5.color(params.primaryColor),
                                stroke: am5.color(params.secondaryColor)
                            });
                        }
                    });
                }
            });

            // Labels
            if (titleLabel) titleLabel.set("fill", am5.color(params.primaryColor));
            if (subtitleLabel) subtitleLabel.set("fill", am5.color(params.mediumColor));
            if (switchLabel1) switchLabel1.set("fill", am5.color(params.primaryColor));
            if (switchLabel2) switchLabel2.set("fill", am5.color(params.primaryColor));

            // Style UI buttons to match the scheme
            styleUIButtons();
        }

        function styleUIButtons() {
            var buttonBgColor = am5.color(params.baseColor);
            var buttonStrokeColor = am5.color(params.accentColor);
            var buttonTextColor = am5.color(params.primaryColor);
            var buttonHoverColor = am5.color(params.mediumColor);
            
            const styleButton = (btn) => {
                if (!btn) return;
                var bg = btn.get("background");
                if (bg) {
                    bg.setAll({
                        fill: buttonBgColor,
                        stroke: buttonStrokeColor,
                        strokeWidth: 1
                    });
                    bg.states.create("hover", {
                        fill: buttonHoverColor
                    });
                    bg.states.create("down", {
                        fill: buttonTextColor
                    });
                }
                var label = btn.get("label");
                if (label) {
                    label.set("fill", buttonTextColor);
                }
                var icon = btn.get("icon");
                if (icon) {
                    icon.set("stroke", buttonTextColor);
                    icon.set("fill", buttonTextColor);
                }
            };
            
            styleButton(zoomControl.plusButton);
            styleButton(zoomControl.minusButton);
            styleButton(zoomControl.homeButton);
            
            if (switchButton) {
                var sbg = switchButton.get("background");
                if (sbg) {
                    sbg.setAll({
                        fill: buttonBgColor,
                        stroke: buttonStrokeColor,
                        strokeWidth: 1
                    });
                }
                var sicon = switchButton.get("icon");
                if (sicon) {
                    sicon.setAll({
                        fill: buttonTextColor,
                        stroke: buttonTextColor
                    });
                }
            }
        }

        // GUI configuration
        const gui = new GUI({ title: 'Supply Chain Visualizer' });

        gui.add(params, 'theme', Object.keys(themes)).name('Color Scheme').onChange(function(themeName) {
            const themeObj = themes[themeName];
            if (themeObj) {
                params.primaryColor = themeObj.primary;
                params.secondaryColor = themeObj.secondary;
                params.mediumColor = themeObj.medium;
                params.accentColor = themeObj.accent;
                params.baseColor = themeObj.baseColor;
                params.landColor = themeObj.landColor;
                params.bgColor = themeObj.bgColor;
                params.oceanColor = themeObj.oceanColor;
                params.producerColor = themeObj.producer;
                params.hubColor = themeObj.hub;
                params.consumerColor = themeObj.consumer;
                
                updateGuiDisplay();
                applyCurrentColors();
            }
        });

        gui.add(params, 'greenscreen').name('Greenscreen').onChange(applyCurrentColors);

        gui.add(params, 'autoRotate').name('Auto Rotate').onChange(function() {
            startRotation();
        });

        gui.add(params, 'rotationSpeed', 0.1, 5.0, 0.1).name('Rotate Speed').onChange(function() {
            startRotation();
        });

        var isUpdatingZoom = false;
        var zoomController = gui.add(params, 'zoomLevel', 0.5, 10.0, 0.1).name('Zoom Level').onChange(function(val) {
            isUpdatingZoom = true;
            chart.set("zoomLevel", val);
            isUpdatingZoom = false;
        });

        chart.on("zoomLevel", function(zoomLevel) {
            if (!isUpdatingZoom) {
                params.zoomLevel = zoomLevel;
                zoomController.updateDisplay();
            }
        });

        const colorsFolder = gui.addFolder('Custom Colors');
        colorsFolder.addColor(params, 'primaryColor').name('Primary (Espresso)').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'secondaryColor').name('Secondary (Dark)').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'mediumColor').name('Medium (Medium)').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'accentColor').name('Accent (Light)').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'baseColor').name('Base (Crema)').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'landColor').name('Land (Cream)').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'bgColor').name('Background').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'oceanColor').name('Ocean').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'producerColor').name('Producer Land').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'hubColor').name('Hub Land').onChange(applyCurrentColors);
        colorsFolder.addColor(params, 'consumerColor').name('Consumer Land').onChange(applyCurrentColors);
        colorsFolder.close();

        function updateGuiDisplay() {
            gui.controllers.forEach(c => c.updateDisplay());
            gui.folders.forEach(f => {
                f.controllers.forEach(c => c.updateDisplay());
            });
        }

        // Keyboard show/hide toggle
        var uiVisible = true;
        function toggleUI() {
            uiVisible = !uiVisible;
            if (uiVisible) {
                gui.show();
                zoomControl.set("visible", true);
                switchCont.set("visible", true);
                titleCont.set("visible", true);
            } else {
                gui.hide();
                zoomControl.set("visible", false);
                switchCont.set("visible", false);
                titleCont.set("visible", false);
            }
        }

        window.addEventListener('keydown', function(e) {
            if (e.key === 'h' || e.key === 'H') {
                toggleUI();
            }
        });

        // Run initial configuration coloring
        applyCurrentColors();

    </script>
</body>
</html>
