<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Character Grid Animation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap');

    :root {
      --bg-color: #0f172a;
      --text-color: #f8fafc;
    }

    * {
      transform-style: preserve-3d;
      box-sizing: border-box;
    }

    body {
      display: grid;
      place-items: center;
      height: 100vh;
      margin: 0;
      background: var(--bg-color);
      color: var(--text-color);
      font-family: "Major Mono Display", monospace;
      font-weight: 400;
      font-style: normal;
      font-size: 8vmin;
      text-align: center;
      line-height: .7;
      perspective: 200vmin;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    #interactive-wrapper {
      display: grid;
      place-items: center;
      transform-style: preserve-3d;
      cursor: grab;
      width: 100%;
      height: 100%;
    }

    #interactive-wrapper:active {
      cursor: grabbing;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: repeat(10, 1fr);
      width: 100vw;
      height: 100vh;
      animation: gridRotation 20s ease-in-out infinite;
      pointer-events: none; /* Let drag events fall through to the wrapper */
    }

    .char {
      display: grid;
      --char-speed: 1.8s;
      --depth-speed: 3.9s;
    }

    .char span {
      grid-column: 1 / 1;
      grid-row: 1 / 1;
      opacity: 0;
      animation: fadeAnimation var(--depth-speed) ease-in-out var(--depth-delay, 0ms) infinite;
    }

    .char span::before {
      content: 'D';
      animation: charAnimation var(--char-speed) var(--char-delay, 0ms) ease-in-out infinite;
    }

    @keyframes gridRotation {
      0% { transform: rotateX(10deg) rotateY(5deg); }
      20% { transform: rotateX(5deg) rotateY(0deg); }
      40% { transform: rotateX(-5deg) rotateY(-10deg); }
      60% { transform: rotateX(0deg) rotateY(-5deg); }
      80% { transform: rotateX(5deg) rotateY(10deg); }
      100% { transform: rotateX(10deg) rotateY(5deg); }
    }

    @keyframes charAnimation {
      0% { content: 'D'; }
      12.5% { content: '0'; }
      25% { content: 'N'; }
      37.5% { content: 'O'; }
      50% { content: 'T'; }
      62.5% { content: 'F'; }
      75% { content: '0'; }
      87.5% { content: 'L'; }
      100% { content: 'D'; }
    }

    @keyframes fadeAnimation {
      40%, 60% { opacity: var(--opacity); }
    }
  </style>
</head>
<body>

<div id="interactive-wrapper">
  <div class="grid"></div>
</div>

<script type="module">
  import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

  // State
  const presets = {
    Slate: { bg: '#0f172a', text: '#f8fafc' },
    Matrix: { bg: '#050805', text: '#00ff66' },
    Cyberpunk: { bg: '#0f0515', text: '#ff007f' },
    Terminal: { bg: '#000000', text: '#ffb300' },
    Synthwave: { bg: '#0a0a23', text: '#00ffff' },
    Custom: { bg: '#0f172a', text: '#f8fafc' }
  };

  const state = {
    preset: 'Slate',
    textColor: '#f8fafc',
    bgColor: '#0f172a',
    greenScreen: false,
    zoom: 1.0,
    panX: 0,
    panY: 0
  };

  // Generate grid items
  const grid = document.querySelector('.grid');
  const numChars = 100;
  const numDepth = 6;

  for (let i = 1; i <= numChars; i++) {
    const charDiv = document.createElement('div');
    charDiv.className = 'char';
    
    // Set custom properties for this character
    const charDelayVal = i * 50;
    const charDelay = 100 - charDelayVal; // in ms
    charDiv.style.setProperty('--char-delay', `${charDelay}ms`);
    
    for (let j = 1; j <= numDepth; j++) {
      const span = document.createElement('span');
      
      // Set custom properties for this span
      const depthDelayVal = i * (i * 50 / 150); // in ms
      span.style.setProperty('--depth-delay', `${depthDelayVal}ms`);
      
      const opacity = 0.1 + j / 6;
      span.style.setProperty('--opacity', opacity);
      
      // transform: translateZ(j * 30px)
      span.style.transform = `translateZ(${j * 30}px)`;
      
      charDiv.appendChild(span);
    }
    grid.appendChild(charDiv);
  }

  // Setup GUI
  const gui = new GUI({ title: 'Controls' });
  const presetController = gui.add(state, 'preset', Object.keys(presets)).name('Preset').onChange(applyPreset);
  const textColorController = gui.addColor(state, 'textColor').name('Text Color').onChange(applyColors);
  const bgColorController = gui.addColor(state, 'bgColor').name('Background Color').onChange(applyColors);
  const greenScreenController = gui.add(state, 'greenScreen').name('Green Screen').onChange(applyColors);

  gui.add({ reset: resetView }, 'reset').name('Reset View');

  function applyPreset(value) {
    if (value !== 'Custom') {
      state.textColor = presets[value].text;
      state.bgColor = presets[value].bg;
      textColorController.setValue(state.textColor);
      bgColorController.setValue(state.bgColor);
    }
    applyColors();
  }

  function applyColors() {
    const currentPreset = presets[state.preset];
    if (state.preset !== 'Custom' && currentPreset && (state.textColor !== currentPreset.text || state.bgColor !== currentPreset.bg)) {
      state.preset = 'Custom';
      presetController.updateDisplay();
    }

    document.documentElement.style.setProperty('--text-color', state.textColor);
    if (state.greenScreen) {
      document.documentElement.style.setProperty('--bg-color', '#00ff00');
    } else {
      document.documentElement.style.setProperty('--bg-color', state.bgColor);
    }
  }

  // Interaction handlers
  const wrapper = document.getElementById('interactive-wrapper');
  let isDragging = false;
  let startX = 0;
  let startY = 0;

  window.addEventListener('wheel', (e) => {
    // Zoom with scroll wheel
    const zoomFactor = 0.05;
    if (e.deltaY < 0) {
      state.zoom += zoomFactor;
    } else {
      state.zoom = Math.max(0.2, state.zoom - zoomFactor);
    }
    updateTransform();
  }, { passive: true });

  window.addEventListener('mousedown', (e) => {
    if (e.target.closest('.lil-gui')) return;
    isDragging = true;
    startX = e.clientX - state.panX;
    startY = e.clientY - state.panY;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    state.panX = e.clientX - startX;
    state.panY = e.clientY - startY;
    updateTransform();
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
  });

  // Touch support for drag and zoom
  let initialTouchDist = 0;
  let initialZoom = 1;

  window.addEventListener('touchstart', (e) => {
    if (e.target.closest('.lil-gui')) return;
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX - state.panX;
      startY = e.touches[0].clientY - state.panY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      initialTouchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      initialZoom = state.zoom;
    }
  });

  window.addEventListener('touchmove', (e) => {
    if (isDragging && e.touches.length === 1) {
      state.panX = e.touches[0].clientX - startX;
      state.panY = e.touches[0].clientY - startY;
      updateTransform();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      state.zoom = Math.max(0.2, initialZoom * (dist / initialTouchDist));
      updateTransform();
    }
  });

  window.addEventListener('touchend', () => {
    isDragging = false;
  });

  function updateTransform() {
    wrapper.style.transform = `translate3d(${state.panX}px, ${state.panY}px, 0px) scale(${state.zoom})`;
  }

  function resetView() {
    state.zoom = 1.0;
    state.panX = 0;
    state.panY = 0;
    updateTransform();
  }

  // Initialize
  applyPreset('Slate');
  updateTransform();
</script>

</body>
</html>
