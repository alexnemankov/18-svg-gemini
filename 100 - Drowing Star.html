<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100 - Gray-Scott Reaction Diffusion Customizer</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      user-select: none;
    }
    #container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>

  <div id="container" touch-action="none"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/88/three.min.js"></script>

  <!-- Vertex Shader -->
  <script id="vertexShader" type="x-shader/x-vertex">
    void main() {
        gl_Position = vec4( position, 1.0 );
    }
  </script>

  <!-- Fragment Shader -->
  <script id="fragmentShader" type="x-shader/x-fragment">
    uniform vec2 u_resolution;
    uniform vec4 u_mouse;
    uniform float u_time;
    uniform sampler2D u_noise;
    uniform sampler2D u_buffer;
    uniform bool u_renderpass;
    uniform int u_frame;
    
    // Custom parameters uniforms
    uniform float u_zoom;
    uniform vec2 u_offset;
    uniform bool u_greenscreen;
    uniform vec3 u_bgColor1;
    uniform vec3 u_bgColor2;
    uniform vec3 u_patternColor;
    uniform float u_seedRotation;
    uniform float u_feedMod;
    uniform float u_killMod;
    
    vec2 Diffusion = vec2(0.0805, 0.02031);
    float k = 0.075;
    float f = 0.080;
    float timeStep = 0.4;
    
    #define PI 3.141592653589793
    #define TAU 6.283185307179586
    
    float starSDF(vec2 st, int V, float s) {
      float a = atan(st.y, st.x)/TAU;
      float seg = a * float(V);
      a = ((floor(seg) + 0.5)/float(V) + 
          mix(s,-s,step(.5,fract(seg)))) 
          * TAU;
      return abs(dot(vec2(cos(a),sin(a)),
                     st));
    }

    vec2 hash2(vec2 p)
    {
      vec2 o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).xy;
      return o;
    }
    
    vec3 hsb2rgb( in vec3 c ){
      vec3 rgb = clamp(abs(mod(c.x*6.0+vec3(0.0,4.0,2.0),
                               6.0)-3.0)-1.0,
                       0.0,
                       1.0 );
      rgb = rgb*rgb*(3.0-2.0*rgb);
      return c.z * mix( vec3(1.0), rgb, c.y);
    }
    
    vec3 domain(vec2 z){
      return vec3(hsb2rgb(vec3(atan(z.y,z.x)/TAU,1.,1.)));
    }
    vec3 colour(vec2 z) {
        return domain(z);
    }
    
    float rand(vec2 co){
      return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453);
    }

    // Five point stencil Laplacian
    vec4 laplacian5(vec2 position, vec3 offset) {
      return 
      +  texture2D( u_buffer, position - offset.zy)
      +  texture2D( u_buffer, position - offset.xz) 
      -  4.0 * texture2D( u_buffer,  position )
      + texture2D( u_buffer,  position + offset.xz )
      + texture2D( u_buffer,  position + offset.zy );
    }
    // nine point stencil
    vec4 laplacian9(vec2 position, vec4 offset) {
      return  
      0.5* texture2D( u_buffer,  position - offset.xy ) // first row
      + texture2D( u_buffer,  position - offset.zy )
      +  0.5* texture2D( u_buffer,  position - offset.wy )
      +  texture2D( u_buffer,  position - offset.xz) // second row
      - 6.0* texture2D( u_buffer,  position )
      +   texture2D( u_buffer,  position + offset.xz )
      +  0.5*texture2D( u_buffer,  position +offset.wy)  // third row
      + texture2D( u_buffer,  position +offset.zy )
      +   0.5*texture2D( u_buffer,  position + offset.xy   );	
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - .5 * u_resolution) / min(u_resolution.y, u_resolution.x);
      vec2 sample = gl_FragCoord.xy / u_resolution;
      
      float rot = u_seedRotation;
      float field = starSDF(uv * 1.5 * mat2(cos(rot), -sin(rot), sin(rot), cos(rot)), 5, .09);
      float star = smoothstep(.225, .04, field);
      star += smoothstep(.43, .45, length(uv)) * .9;
      star = clamp(star, 0., 1.);
      
      Diffusion = mix(Diffusion, vec2(0.085, 0.04531), star);
      k = mix(k, 0.064, star) + u_killMod;
      f = mix(f, 0.086, star) + u_feedMod;
      timeStep = mix(timeStep, 1.7, star);
      
      float outerDiff = clamp(length(uv * 1.1) - .4, 0., 1.);
      Diffusion = mix(Diffusion, vec2(0.105, 0.05531), outerDiff);
      k = mix(k, 0.104, outerDiff) + u_killMod;
      f = mix(f, 0.070, outerDiff) + u_feedMod;
      
      vec3 offset = vec3(1. / u_resolution, 0.0);
      
      vec2 mouse = u_mouse.xy - uv;
      
      float shade = smoothstep(.1, .015, length(mouse));
      
      vec4 fragcolour = vec4(shade);
      
      vec4 v = texture2D(u_buffer, sample);
      
      if(u_renderpass == true) {
        if(u_frame > 3) {
          vec2 lv = laplacian9(sample, vec4(offset, -offset.x)).xy; // laplacian
          float xyy = v.x*v.y*v.y;   // utility term
          k -= lv.x * .09;
          vec2 dV = vec2( Diffusion.x * lv.x - xyy + f*(1.-v.x), Diffusion.y * lv.y + xyy - (f+k)*v.y);
          v.xy += timeStep*dV;
        } else {
          v = vec4(smoothstep(.05, .0, field)*10.);
        }
        gl_FragColor = vec4(v);
        
        if(u_mouse.z == 1.) {
          gl_FragColor.x -= shade * .919;
        }
      } else {
        if(u_frame > 20) {
          // Calculate zoomed and dragged sample texture coordinate
          vec2 zoomed_sample = (sample - 0.5) * u_zoom + 0.5 + u_offset * (min(u_resolution.y, u_resolution.x) / u_resolution);
          vec2 zoomed_uv = uv * u_zoom + u_offset;

          vec4 v_disp = texture2D(u_buffer, zoomed_sample);
          float c = smoothstep(.5, .35, v_disp.x);
          c += (1. - v_disp.x)*1.5;
          c *= .5;
          
          vec3 bg;
          if (u_greenscreen) {
            bg = vec3(0.0, 1.0, 0.0);
          } else {
            bg = mix(u_bgColor1, u_bgColor2, clamp(length(zoomed_uv), 0., 1.));
          }
          
          gl_FragColor = vec4(bg + c * u_patternColor, 1.0);
        } else {
          gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
        }
      }
    }
  </script>

  <!-- Main Application -->
  <script type="module">
    import { GUI } from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // --- State & Custom Parameters ---
    const params = {
      greenscreen: false,
      zoom: 1.0,
      offsetX: 0.0,
      offsetY: 0.0,
      controlMode: 'Draw (Left), Pan (Right/Shift)',
      dpr: window.devicePixelRatio || 1.0,
      colorScheme: 'Cosmic Blue',
      bgColor1: '#0a192f',
      bgColor2: '#020c1b',
      patternColor: '#64ffda',
      animationMode: 'None',
      feedMod: 0.0,
      killMod: 0.0
    };

    const colorSchemes = {
      'Cosmic Blue': { bgColor1: '#0a192f', bgColor2: '#020c1b', patternColor: '#64ffda' },
      'Neon Sunset': { bgColor1: '#2d0b3d', bgColor2: '#0f0015', patternColor: '#ff007f' },
      'Toxic Matrix': { bgColor1: '#001a00', bgColor2: '#000500', patternColor: '#39ff14' },
      'Volcanic Magma': { bgColor1: '#2a0800', bgColor2: '#080100', patternColor: '#ff4500' },
      'Lux Silver': { bgColor1: '#222222', bgColor2: '#0a0a0a', patternColor: '#ffffff' }
    };

    let container;
    let camera, scene, renderer;
    let uniforms;

    let divisor = 1 / 8;
    let textureFraction = 1 / 1;

    let w = 2048;
    let h = 1024;

    let newmouse = {
      x: 0,
      y: 0
    };

    let loader = new THREE.TextureLoader();
    let texture, rtTexture, rtTexture2;
    loader.setCrossOrigin("anonymous");

    function buildFallbackTexture() {
      const size = 256;
      const data = new Uint8Array(size * size * 4);
      for (let i = 0; i < size * size * 4; i += 4) {
        const val = Math.floor(Math.random() * 255);
        data[i] = val;
        data[i + 1] = val;
        data[i + 2] = val;
        data[i + 3] = 255;
      }
      texture = new THREE.DataTexture(data, size, size, THREE.RGBAFormat);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.minFilter = THREE.LinearFilter;
      texture.needsUpdate = true;
    }

    loader.load(
      'https://s3-us-west-2.amazonaws.com/s.cdpn.io/982762/noise.png',
      function do_something_with_texture(tex) {
        texture = tex;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.minFilter = THREE.LinearFilter;
        init();
        animate();
      },
      undefined,
      function error() {
        console.warn("Could not load noise texture from CDN. Using procedural fallback.");
        buildFallbackTexture();
        init();
        animate();
      }
    );

    function init() {
      container = document.getElementById( 'container' );

      camera = new THREE.Camera();
      camera.position.z = 1;

      scene = new THREE.Scene();

      var geometry = new THREE.PlaneBufferGeometry( 2, 2 );
      
      const pixelWidth = window.innerWidth * (window.devicePixelRatio || 1);
      const pixelHeight = window.innerHeight * (window.devicePixelRatio || 1);
      rtTexture = new THREE.WebGLRenderTarget(pixelWidth * textureFraction, pixelHeight * textureFraction);
      rtTexture2 = new THREE.WebGLRenderTarget(pixelWidth * textureFraction, pixelHeight * textureFraction);

      uniforms = {
        u_time: { type: "f", value: 1.0 },
        u_resolution: { type: "v2", value: new THREE.Vector2() },
        u_noise: { type: "t", value: texture },
        u_buffer: { type: "t", value: rtTexture.texture },
        u_mouse: { type: "v3", value: new THREE.Vector3() },
        u_frame: { type: "i", value: -1 },
        u_renderpass: { type: 'b', value: false },
        // Custom interactive uniforms
        u_zoom: { type: "f", value: params.zoom },
        u_offset: { type: "v2", value: new THREE.Vector2(params.offsetX, params.offsetY) },
        u_greenscreen: { type: "b", value: params.greenscreen },
        u_bgColor1: { type: "c", value: new THREE.Color(params.bgColor1) },
        u_bgColor2: { type: "c", value: new THREE.Color(params.bgColor2) },
        u_patternColor: { type: "c", value: new THREE.Color(params.patternColor) },
        u_seedRotation: { type: "f", value: -18 * Math.PI / 180 },
        u_feedMod: { type: "f", value: params.feedMod },
        u_killMod: { type: "f", value: params.killMod }
      };

      var material = new THREE.ShaderMaterial( {
        uniforms: uniforms,
        vertexShader: document.getElementById( 'vertexShader' ).textContent,
        fragmentShader: document.getElementById( 'fragmentShader' ).textContent
      } );
      material.extensions.derivatives = true;

      var mesh = new THREE.Mesh( geometry, material );
      scene.add( mesh );

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio( params.dpr );

      container.appendChild( renderer.domElement );

      onWindowResize();
      window.addEventListener( 'resize', onWindowResize, false );
      
      // --- Pointer Drag & Wheel Zoom Events ---
      let isDragging = false;
      let isPanning = false;
      let previousMousePosition = { x: 0, y: 0 };

      window.addEventListener('pointerdown', (e) => {
        if (e.target.closest('.lil-gui')) return;
        
        let isPan = false;
        if (params.controlMode === 'Pan (Left), Draw (Right/Shift)') {
          if (e.button === 2 || e.shiftKey) {
            isPan = false;
          } else {
            isPan = true;
          }
        } else {
          if (e.button === 2 || e.shiftKey) {
            isPan = true;
          } else {
            isPan = false;
          }
        }

        if (isPan) {
          isPanning = true;
          isDragging = false;
          previousMousePosition = { x: e.clientX, y: e.clientY };
        } else {
          isDragging = true;
          isPanning = false;
          uniforms.u_mouse.value.z = 1.0;
        }
      });

      window.addEventListener('pointermove', (e) => {
        if (e.target.closest('.lil-gui')) return;
        let ratio = window.innerHeight / window.innerWidth;
        let mx, my;
        if(window.innerHeight > window.innerWidth) {
          mx = (e.pageX - window.innerWidth / 2) / window.innerWidth;
          my = (e.pageY - window.innerHeight / 2) / window.innerHeight * -1 * ratio;
        } else {
          mx = (e.pageX - window.innerWidth / 2) / window.innerWidth / ratio;
          my = (e.pageY - window.innerHeight / 2) / window.innerHeight * -1;
        }
        
        // Map pointer coordinate to zoomed/dragged simulation space
        newmouse.x = mx * params.zoom + params.offsetX;
        newmouse.y = my * params.zoom + params.offsetY;

        if (isPanning) {
          const deltaX = e.clientX - previousMousePosition.x;
          const deltaY = e.clientY - previousMousePosition.y;

          // Drag speed proportional to current zoom
          const dragSpeed = 0.002 * params.zoom;
          params.offsetX -= deltaX * dragSpeed;
          params.offsetY += deltaY * dragSpeed;

          offsetXController.updateDisplay();
          offsetYController.updateDisplay();

          previousMousePosition = { x: e.clientX, y: e.clientY };
        }
        e.preventDefault();
      });

      window.addEventListener('pointerup', () => {
        isDragging = false;
        isPanning = false;
        if (params.animationMode !== 'Autopilot Painter') {
          uniforms.u_mouse.value.z = 0.0;
        }
      });

      window.addEventListener('wheel', (e) => {
        if (e.target.closest('.lil-gui')) return;

        const zoomFactor = 1.08;
        if (e.deltaY < 0) {
          params.zoom /= zoomFactor;
        } else {
          params.zoom *= zoomFactor;
        }

        params.zoom = Math.max(0.05, Math.min(10.0, params.zoom));
        zoomController.updateDisplay();
      }, { passive: true });

      window.addEventListener('contextmenu', (e) => {
        if (!e.shiftKey) e.preventDefault();
      });

      // --- lil-gui Configuration ---
      const gui = new GUI({ title: 'Shader Panel' });

      // Settings Folder
      const fSettings = gui.addFolder('Settings');
      fSettings.add(params, 'greenscreen').name('Chroma Greenscreen').onChange(v => {
        uniforms.u_greenscreen.value = v;
      });
      fSettings.add(params, 'dpr', 0.5, 3.0, 0.1).name('DPR (Pixel Ratio)').onChange(v => {
        renderer.setPixelRatio(v);
        onWindowResize();
      });
      fSettings.add(params, 'controlMode', [
        'Draw (Left), Pan (Right/Shift)',
        'Pan (Left), Draw (Right/Shift)'
      ]).name('Control Scheme');

      // Camera Folder
      const fCamera = gui.addFolder('Camera');
      const zoomController = fCamera.add(params, 'zoom', 0.05, 10.0, 0.01).name('Zoom Factor');
      const offsetXController = fCamera.add(params, 'offsetX', -5.0, 5.0, 0.01).name('Pan X');
      const offsetYController = fCamera.add(params, 'offsetY', -5.0, 5.0, 0.01).name('Pan Y');

      // Simulation Modifiers Folder
      const fSimulation = gui.addFolder('Simulation');
      fSimulation.add(params, 'feedMod', -0.02, 0.02, 0.001).name('Feed rate adjustment').onChange(v => {
        uniforms.u_feedMod.value = v;
      });
      fSimulation.add(params, 'killMod', -0.02, 0.02, 0.001).name('Kill rate adjustment').onChange(v => {
        uniforms.u_killMod.value = v;
      });

      // Colors Folder
      const fColors = gui.addFolder('Colors');
      fColors.add(params, 'colorScheme', Object.keys(colorSchemes)).name('Preset Theme').onChange(applyColorScheme);
      const bgColor1Controller = fColors.addColor(params, 'bgColor1').name('Inner Background').onChange(v => {
        uniforms.u_bgColor1.value.set(v);
      });
      const bgColor2Controller = fColors.addColor(params, 'bgColor2').name('Outer Background').onChange(v => {
        uniforms.u_bgColor2.value.set(v);
      });
      const patternColorController = fColors.addColor(params, 'patternColor').name('Pattern Color').onChange(v => {
        uniforms.u_patternColor.value.set(v);
      });

      // Animations Folder
      const fAnim = gui.addFolder('Animations');
      fAnim.add(params, 'animationMode', [
        'None',
        'Cosmic Orbit',
        'Pulsing Seed',
        'Gray-Scott Morph',
        'Autopilot Painter'
      ]).name('Animation Type');

      gui.close();

      function applyColorScheme(schemeName) {
        const scheme = colorSchemes[schemeName];
        if (scheme) {
          params.bgColor1 = scheme.bgColor1;
          params.bgColor2 = scheme.bgColor2;
          params.patternColor = scheme.patternColor;

          uniforms.u_bgColor1.value.set(params.bgColor1);
          uniforms.u_bgColor2.value.set(params.bgColor2);
          uniforms.u_patternColor.value.set(params.patternColor);

          bgColor1Controller.setValue(params.bgColor1);
          bgColor2Controller.setValue(params.bgColor2);
          patternColorController.setValue(params.patternColor);
        }
      }

      // --- Hide/Show UI toggle with H key ---
      let guiVisible = true;
      window.addEventListener('keydown', (e) => {
        if (e.key === 'h' || e.key === 'H') {
          guiVisible = !guiVisible;
          if (guiVisible) {
            gui.show();
          } else {
            gui.hide();
          }
        }
      });
    }

    function onWindowResize( event ) {
      w = window.innerWidth;
      h = window.innerHeight;
      
      renderer.setSize( w, h );
      
      const pixelWidth = renderer.domElement.width;
      const pixelHeight = renderer.domElement.height;
      
      uniforms.u_resolution.value.x = pixelWidth;
      uniforms.u_resolution.value.y = pixelHeight;
      
      uniforms.u_frame.value = 0;
      
      rtTexture = new THREE.WebGLRenderTarget(pixelWidth * textureFraction, pixelHeight * textureFraction);
      rtTexture2 = new THREE.WebGLRenderTarget(pixelWidth * textureFraction, pixelHeight * textureFraction);
    }

    // --- Video Capturing Configuration ---
    let capturer = null;
    if (typeof CCapture !== 'undefined') {
      capturer = new CCapture({ 
        verbose: true, 
        framerate: 60,
        quality: 90,
        format: 'webm',
        workersPath: 'js/'
      });
    }
    let capturing = false;

    window.isCapturing = function(val) {
      if (typeof CCapture === 'undefined' || !capturer) return;
      if(val === false && capturing === true) {
        capturer.stop();
        capturer.save();
      } else if(val === true && capturing === false) {
        capturer.start();
      }
      capturing = val;
    }
    window.toggleCapture = function() {
      window.isCapturing(!capturing);
    }

    window.addEventListener('keyup', function(e) { if(e.keyCode == 68) window.toggleCapture(); });

    function animate(delta) {
      requestAnimationFrame( animate );
      render(delta);
    }

    function renderTexture(delta) {
      let odims = uniforms.u_resolution.value.clone();
      uniforms.u_resolution.value.x = renderer.domElement.width * textureFraction;
      uniforms.u_resolution.value.y = renderer.domElement.height * textureFraction;

      uniforms.u_buffer.value = rtTexture2.texture;
      uniforms.u_renderpass.value = true;
      
      renderer.setRenderTarget(rtTexture);
      renderer.render( scene, camera, rtTexture, true );
      
      let buffer = rtTexture;
      rtTexture = rtTexture2;
      rtTexture2 = buffer;

      uniforms.u_buffer.value = rtTexture.texture;
      uniforms.u_resolution.value = odims;
      uniforms.u_renderpass.value = false;
    }

    function render(delta) {
      uniforms.u_frame.value++;
      
      const t = delta ? delta * 0.001 : 0;
      uniforms.u_time.value = t;

      let activeZoom = params.zoom;
      let activeOffsetX = params.offsetX;
      let activeOffsetY = params.offsetY;
      let activeFeedMod = params.feedMod;
      let activeKillMod = params.killMod;
      let activeSeedRotation = -18 * Math.PI / 180;

      // Handle preset infinite animations
      if (params.animationMode === 'Cosmic Orbit') {
        activeOffsetX += Math.sin(t * 0.4) * 0.3;
        activeOffsetY += Math.cos(t * 0.4) * 0.3;
        activeZoom *= (1.0 + Math.sin(t * 0.25) * 0.25);
      } else if (params.animationMode === 'Pulsing Seed') {
        activeSeedRotation = (-18 + 25 * Math.sin(t * 0.6)) * Math.PI / 180;
      } else if (params.animationMode === 'Gray-Scott Morph') {
        activeFeedMod += 0.006 * Math.sin(t * 0.5);
        activeKillMod += 0.005 * Math.cos(t * 0.4);
      } else if (params.animationMode === 'Autopilot Painter') {
        let brushX = Math.sin(t * 0.8) * 0.35;
        let brushY = Math.sin(t * 1.6) * 0.2;
        newmouse.x = brushX;
        newmouse.y = brushY;
        uniforms.u_mouse.value.z = 1.0;
      } else {
        // Stop painting if autopilot mode is deselected and user isn't clicking
        if (uniforms.u_mouse.value.z === 1.0 && params.animationMode !== 'Autopilot Painter' && !isDragging) {
          uniforms.u_mouse.value.z = 0.0;
        }
      }

      uniforms.u_mouse.value.x += ( newmouse.x - uniforms.u_mouse.value.x ) * divisor;
      uniforms.u_mouse.value.y += ( newmouse.y - uniforms.u_mouse.value.y ) * divisor;
      
      uniforms.u_zoom.value = activeZoom;
      uniforms.u_offset.value.set(activeOffsetX, activeOffsetY);
      uniforms.u_feedMod.value = activeFeedMod;
      uniforms.u_killMod.value = activeKillMod;
      uniforms.u_seedRotation.value = activeSeedRotation;

      renderer.render( scene, camera );
      renderTexture();
      renderTexture();
      renderTexture();
      renderTexture();
      renderTexture();
      renderTexture();
      renderTexture();
      renderTexture();
      renderTexture();
      
      if(capturing && capturer) {
        capturer.capture( renderer.domElement );
      }
    }
  </script>
</body>
</html>
