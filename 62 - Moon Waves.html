<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Liquid Grid Illusion</title>
  <style>
    :root {
      --grid-gap: 2vmin;
      --grid-cols: 10;
      --grid-rows: 10;

      --color-dark: #2b2b2b;
      --color-light: #f0f0f0;

      --anim-speed: 3s;
      --anim-easing: cubic-bezier(.65, -.28, .28, -.85);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 100vw;
      height: 100vh;
      user-select: none;
      touch-action: none;
      background-color: var(--color-light);
      transition: background-color 0.3s ease;
    }

    #stage {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      overflow: hidden;
      background-color: var(--color-light);
      cursor: grab;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.3s ease;
    }

    #stage:active {
      cursor: grabbing;
    }

    #transform-wrapper {
      transform-origin: center center;
      transform: translate(0px, 0px) scale(1);
      will-change: transform;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrapper {
      display: grid;
      grid-template-columns: repeat(var(--grid-cols), 1fr);
      grid-template-rows: repeat(var(--grid-rows), 1fr);
      gap: var(--grid-gap);
      width: 100vw;
      height: calc((100vw - (var(--grid-cols) - 1) * var(--grid-gap)) / var(--grid-cols) * var(--grid-rows) + (var(--grid-rows) - 1) * var(--grid-gap));
      will-change: transform;
    }

    .circle {
      position: relative;
      z-index: 1;
    }

    .circle::before,
    .circle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      display: block;  
      width: 100%;
      height: 100%;
      border-radius: 100%;
      transform: translate(-50%, -50%);
      transform-origin: 100% 100%;
      backface-visibility: hidden;
    }

    .circle::before {
      background-color: var(--color-dark);
      transition: background-color 0.3s ease;
    }

    .circle::after {
      transform: translate(-48%, -48%) scale(1.4);
      background-color: var(--color-light);
      animation: circleAnimation var(--anim-speed) var(--anim-easing) infinite;
      animation-delay: var(--delay);
      transition: background-color 0.3s ease;
    }

    @keyframes circleAnimation {
      35%, 45% {
        transform: translate(-80%, -80%);
      }
    }
  </style>
</head>
<body>

  <div id="stage">
    <div id="transform-wrapper">
      <div class="wrapper"></div>
    </div>
  </div>

  <script type="module">
    import GUI from 'https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js';

    // 5 IT/tech-themed presets + Original + Custom
    const presets = {
      'Original': {
        colorLight: '#f0f0f0',
        colorDark: '#2b2b2b'
      },
      'Matrix Code': {
        colorLight: '#0a0f0d',
        colorDark: '#00ff41'
      },
      'Cyberpunk Neon': {
        colorLight: '#0f051d',
        colorDark: '#00ffff'
      },
      'Dracula Tech': {
        colorLight: '#282a36',
        colorDark: '#ff79c6'
      },
      'Oceanic Dev': {
        colorLight: '#0f172a',
        colorDark: '#38bdf8'
      },
      'Monochrome Console': {
        colorLight: '#1a1a1a',
        colorDark: '#ffb000'
      },
      'Custom': {
        colorLight: '#f0f0f0',
        colorDark: '#2b2b2b'
      }
    };

    // Interaction State
    let scale = 1.0;
    let translateX = 0;
    let translateY = 0;
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let prevDiff = -1;

    const transformWrapper = document.getElementById('transform-wrapper');
    const stage = document.getElementById('stage');
    const wrapper = document.querySelector('.wrapper');

    const state = {
      theme: 'Original',
      greenscreen: false,
      colorLight: presets['Original'].colorLight,
      colorDark: presets['Original'].colorDark,
      gridSize: 15,
      gridGap: 1.5,
      speed: 3.0,
      easing: 'cubic-bezier(.65, -.28, .28, -.85)',
      resetView: () => {
        scale = 1.0;
        translateX = 0;
        translateY = 0;
        updateTransform();
      }
    };

    function generateGrid() {
      wrapper.innerHTML = '';
      
      const cols = state.gridSize;
      const minViewportDimension = Math.min(window.innerWidth, window.innerHeight);
      const gapPx = (state.gridGap * minViewportDimension) / 100;
      const widthPx = window.innerWidth;
      const cellWidthPx = (widthPx - (cols - 1) * gapPx) / cols;
      const rows = Math.ceil(window.innerHeight / (cellWidthPx + gapPx)) + 2;
      
      document.documentElement.style.setProperty('--grid-cols', cols);
      document.documentElement.style.setProperty('--grid-rows', rows);
      document.documentElement.style.setProperty('--grid-gap', `${state.gridGap}vmin`);
      
      const centerCol = (cols + 1) / 2;
      const centerRow = (rows + 1) / 2;
      
      for (let row = 1; row <= rows; row++) {
        for (let col = 1; col <= cols; col++) {
          const delay = Math.abs(row - centerRow) + Math.abs(col - centerCol);
          const delaySec = (delay * 0.08).toFixed(2);
          
          const circle = document.createElement('div');
          circle.className = 'circle';
          circle.style.setProperty('--delay', `${delaySec}s`);
          wrapper.appendChild(circle);
        }
      }
    }

    function updateColors() {
      const root = document.documentElement;
      if (state.greenscreen) {
        root.style.setProperty('--color-light', '#00ff00');
      } else {
        root.style.setProperty('--color-light', state.colorLight);
      }
      root.style.setProperty('--color-dark', state.colorDark);
      root.style.setProperty('--anim-speed', `${state.speed}s`);
      root.style.setProperty('--anim-easing', state.easing);
    }

    function updateTransform() {
      transformWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }


    // Zoom on wheel (centered towards mouse cursor position)
    stage.addEventListener('wheel', (e) => {
      if (e.target.closest('.lil-gui')) return;
      e.preventDefault();
      const zoomFactor = 1.1;
      const oldScale = scale;

      if (e.deltaY < 0) {
        scale *= zoomFactor;
      } else {
        scale /= zoomFactor;
      }

      scale = Math.max(0.1, Math.min(20, scale));

      const rect = stage.getBoundingClientRect();
      const mouseX = e.clientX - rect.left - rect.width / 2;
      const mouseY = e.clientY - rect.top - rect.height / 2;

      translateX = mouseX - (mouseX - translateX) * (scale / oldScale);
      translateY = mouseY - (mouseY - translateY) * (scale / oldScale);

      updateTransform();
    }, { passive: false });

    // Drag / Pan mechanics
    stage.addEventListener('mousedown', (e) => {
      if (e.target.closest('.lil-gui')) return;
      if (e.button !== 0) return; // Left click only
      isDragging = true;
      startX = e.clientX - translateX;
      startY = e.clientY - translateY;
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      translateX = e.clientX - startX;
      translateY = e.clientY - startY;
      updateTransform();
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // Touch Support (for drag and pinch-to-zoom gestures)
    stage.addEventListener('touchstart', (e) => {
      if (e.target.closest('.lil-gui')) return;
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - translateX;
        startY = e.touches[0].clientY - translateY;
      } else if (e.touches.length === 2) {
        isDragging = false;
        prevDiff = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      }
    });

    window.addEventListener('touchmove', (e) => {
      if (e.target.closest('.lil-gui')) return;
      if (isDragging && e.touches.length === 1) {
        translateX = e.touches[0].clientX - startX;
        translateY = e.touches[0].clientY - startY;
        updateTransform();
      } else if (e.touches.length === 2) {
        const curDiff = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        if (prevDiff > 0) {
          const ratio = curDiff / prevDiff;
          const oldScale = scale;
          scale = Math.max(0.1, Math.min(20, scale * ratio));
          
          const rect = stage.getBoundingClientRect();
          const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left - rect.width / 2;
          const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top - rect.height / 2;
          
          translateX = midX - (midX - translateX) * (scale / oldScale);
          translateY = midY - (midY - translateY) * (scale / oldScale);
          updateTransform();
        }
        prevDiff = curDiff;
      }
    });

    window.addEventListener('touchend', () => {
      isDragging = false;
      prevDiff = -1;
    });

    // lil-gui setup
    const gui = new GUI({ title: 'Settings' });
    let isUpdatingPreset = false;

    const presetController = gui.add(state, 'theme', Object.keys(presets)).name('Theme Preset');
    
    presetController.onChange((val) => {
      if (isUpdatingPreset || val === 'Custom') return;

      const p = presets[val];
      state.colorLight = p.colorLight;
      state.colorDark = p.colorDark;

      // Sync custom color control values
      colorLightController.updateDisplay();
      colorDarkController.updateDisplay();

      updateColors();
    });

    // Green Screen Switch
    gui.add(state, 'greenscreen').name('Green Screen').onChange(() => {
      updateColors();
    });

    // Grid size controller
    gui.add(state, 'gridSize', 4, 25, 1).name('Grid Size').onChange(() => {
      generateGrid();
    });

    // Grid Gap size controller
    gui.add(state, 'gridGap', 0, 5, 0.1).name('Gap (vmin)').onChange((val) => {
      document.documentElement.style.setProperty('--grid-gap', `${val}vmin`);
      generateGrid();
    });

    // Animation Speed
    gui.add(state, 'speed', 0.5, 10, 0.1).name('Speed (s)').onChange((val) => {
      document.documentElement.style.setProperty('--anim-speed', `${val}s`);
    });

    // Easing
    gui.add(state, 'easing', {
      'Custom Bezier': 'cubic-bezier(.65, -.28, .28, -.85)',
      'Ease In Out': 'ease-in-out',
      'Linear': 'linear',
      'Ease In': 'ease-in',
      'Ease Out': 'ease-out'
    }).name('Easing').onChange((val) => {
      document.documentElement.style.setProperty('--anim-easing', val);
    });

    // Custom colors configuration folder
    const folderColors = gui.addFolder('Custom Colors');
    
    function markAsCustom() {
      if (isUpdatingPreset) return;
      isUpdatingPreset = true;
      state.theme = 'Custom';
      presetController.updateDisplay();
      isUpdatingPreset = false;
    }

    const colorLightController = folderColors.addColor(state, 'colorLight').name('Bg & Mask').onChange(() => {
      markAsCustom();
      updateColors();
    });

    const colorDarkController = folderColors.addColor(state, 'colorDark').name('Circle Base').onChange(() => {
      markAsCustom();
      updateColors();
    });

    // Reset view option
    gui.add(state, 'resetView').name('Reset View');

    // Window Resize Event
    window.addEventListener('resize', generateGrid);

    // Run Initial Settings
    generateGrid();
    updateColors();
  </script>
</body>
</html>
