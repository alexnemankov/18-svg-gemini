<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bouncy Balloons - Custom Interactive Scene</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    :root {
      --white-grad-1: linear-gradient(to top, #e6e9f0 0%, #eef1f5 100%);
    }

    .bg-white-grad-1 {
      background: var(--white-grad-1);
    }

    .relative {
      position: relative;
    }

    .w-screen {
      width: 100vw;
    }

    .h-screen {
      height: 100vh;
    }

    .w-full {
      width: 100%;
    }

    .h-full {
      height: 100%;
    }

    .overflow-hidden {
      overflow: hidden;
    }

    /* Style for lil-gui customization to fit premium look */
    .lil-gui {
      --background-color: rgba(20, 20, 25, 0.9);
      --text-color: #e0e0e0;
      --title-background-color: #2c2c35;
      --widget-color: #3c3c45;
      --hover-color: #5c5c65;
      --focus-color: #007acc;
      --number-color: #00e676;
      --string-color: #ffeb3b;
      font-family: 'Outfit', 'Inter', sans-serif;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="relative w-screen h-screen">
    <div class="bouncy-balloon w-full h-full bg-black bg-white-grad-1 overflow-hidden"></div>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.124.0";
    import ky from "https://esm.sh/kyouka@1.2.5";
    import { OrbitControls } from "https://esm.sh/three@0.124.0/examples/jsm/controls/OrbitControls";
    import { GLTFLoader } from "https://esm.sh/three@0.124.0/examples/jsm/loaders/GLTFLoader";
    import { FBXLoader } from "https://esm.sh/three@0.124.0/examples/jsm/loaders/FBXLoader";
    import GUI from "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js";
    import * as CANNON from "https://esm.sh/cannon-es@0.18.0";
    import {
      EffectComposer,
      RenderPass,
      NormalPass,
      SSAOEffect,
      EffectPass
    } from "https://esm.sh/postprocessing@6.22.2";

    // Safe fallbacks in case ky module fails to resolve or doesn't export some helpers
    const randomNumberInRange = (min, max) => {
      return (ky && typeof ky.randomNumberInRange === "function") 
        ? ky.randomNumberInRange(min, max) 
        : Math.random() * (max - min) + min;
    };
    
    const deg2rad = (deg) => {
      return (ky && typeof ky.deg2rad === "function")
        ? ky.deg2rad(deg)
        : deg * Math.PI / 180;
    };

    const calcAspect = (el) => el.clientWidth / el.clientHeight;

    const getNormalizedMousePos = (e) => {
      return {
        x: (e.clientX / window.innerWidth) * 2 - 1,
        y: -(e.clientY / window.innerHeight) * 2 + 1
      };
    };

    class MouseTracker {
      constructor() {
        this.mousePos = new THREE.Vector2(0, 0);
        this.mouseSpeed = 0;
      }
      trackMousePos() {
        window.addEventListener("mousemove", (e) => {
          this.setMousePos(e);
        });
        window.addEventListener(
          "touchstart",
          (e) => {
            this.setMousePos(e.touches[0]);
          },
          { passive: false }
        );
        window.addEventListener("touchmove", (e) => {
          this.setMousePos(e.touches[0]);
        });
      }
      setMousePos(e) {
        const { x, y } = getNormalizedMousePos(e);
        this.mousePos.x = x;
        this.mousePos.y = y;
      }
      trackMouseSpeed() {
        let lastMouseX = -1;
        let lastMouseY = -1;
        let mouseSpeed = 0;
        window.addEventListener("mousemove", (e) => {
          const mousex = e.pageX;
          const mousey = e.pageY;
          if (lastMouseX > -1) {
            mouseSpeed = Math.max(
              Math.abs(mousex - lastMouseX),
              Math.abs(mousey - lastMouseY)
            );
            this.mouseSpeed = mouseSpeed / 100;
          }
          lastMouseX = mousex;
          lastMouseY = mousey;
        });
        document.addEventListener("mouseleave", () => {
          this.mouseSpeed = 0;
        });
      }
    }

    class Point {
      constructor(p) {
        this.x = p.x;
        this.y = p.y;
        this.z = p.z;
      }
    }

    const array2Point = (arr) => new Point({ x: arr[0], y: arr[1], z: arr[2] });
    const point2Array = (point) => [point.x, point.y, point.z];
    const arrays2Point = (arrs) => arrs.map((item) => array2Point(item));
    const point2ThreeVector = (point) => new THREE.Vector3(point.x, point.y, point.z);
    const point2CannonVec = (point) => new CANNON.Vec3(point.x, point.y, point.z);
    const point2ThreeEuler = (point) => new THREE.Euler(point.x, point.y, point.z);

    const getViewport = (camera) => {
      const position = new THREE.Vector3();
      const target = new THREE.Vector3();
      const distance = camera.getWorldPosition(position).distanceTo(target);
      const fov = (camera.fov * Math.PI) / 180;
      const h = 2 * Math.tan(fov / 2) * distance;
      const w = h * (window.innerWidth / window.innerHeight);
      const viewport = { width: w, height: h };
      return viewport;
    };

    class MeshPhysicsObject {
      constructor(mesh, body, copyPosition = true, copyQuaternion = true) {
        this.mesh = mesh;
        this.body = body;
        this.copyPosition = copyPosition;
        this.copyQuaternion = copyQuaternion;
      }
    }

    class Base {
      constructor(sel, debug = false) {
        this.debug = debug;
        this.container = document.querySelector(sel);
        this.perspectiveCameraParams = {
          fov: 75,
          near: 0.1,
          far: 100
        };
        this.orthographicCameraParams = {
          zoom: 2,
          near: -100,
          far: 1000
        };
        this.cameraPosition = new THREE.Vector3(0, 3, 10);
        this.lookAtPosition = new THREE.Vector3(0, 0, 0);
        this.rendererParams = {
          alpha: true,
          antialias: true
        };
        this.mouseTracker = new MouseTracker();
      }
      init() {
        this.createScene();
        this.createPerspectiveCamera();
        this.createRenderer();
        this.createMesh({});
        this.createLight();
        this.createOrbitControls();
        this.createDebugUI();
        this.addListeners();
        this.setLoop();
      }
      createScene() {
        const scene = new THREE.Scene();
        this.scene = scene;
      }
      createPerspectiveCamera() {
        const { perspectiveCameraParams, cameraPosition, lookAtPosition } = this;
        const { fov, near, far } = perspectiveCameraParams;
        const aspect = calcAspect(this.container);
        const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
        camera.position.copy(cameraPosition);
        camera.lookAt(lookAtPosition);
        this.camera = camera;
      }
      createOrthographicCamera() {
        const { orthographicCameraParams, cameraPosition, lookAtPosition } = this;
        const { left, right, top, bottom, near, far } = orthographicCameraParams;
        const camera = new THREE.OrthographicCamera(left, right, top, bottom, near, far);
        camera.position.copy(cameraPosition);
        camera.lookAt(lookAtPosition);
        this.camera = camera;
      }
      updateOrthographicCameraParams() {
        const { container } = this;
        const { zoom, near, far } = this.orthographicCameraParams;
        const aspect = calcAspect(container);
        this.orthographicCameraParams = {
          left: -zoom * aspect,
          right: zoom * aspect,
          top: zoom,
          bottom: -zoom,
          near,
          far,
          zoom
        };
      }
      createRenderer() {
        const { rendererParams } = this;
        const renderer = new THREE.WebGLRenderer(rendererParams);
        renderer.setClearColor(0x000000, 0);
        this.container.appendChild(renderer.domElement);
        this.renderer = renderer;
        this.resizeRendererToDisplaySize();
      }
      resizeRendererToDisplaySize() {
        const { renderer } = this;
        renderer.setSize(this.container.clientWidth, this.container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      }
      createMesh(meshObject, container = this.scene) {
        const {
          geometry = new THREE.BoxGeometry(1, 1, 1),
          material = new THREE.MeshStandardMaterial({
            color: new THREE.Color("#d9dfc8")
          }),
          position = new THREE.Vector3(0, 0, 0)
        } = meshObject;
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(position);
        container.add(mesh);
        return mesh;
      }
      createLight() {
        const dirLight = new THREE.DirectionalLight(
          new THREE.Color("#ffffff"),
          0.5
        );
        dirLight.position.set(0, 50, 0);
        this.scene.add(dirLight);
        const ambiLight = new THREE.AmbientLight(new THREE.Color("#ffffff"), 0.4);
        this.scene.add(ambiLight);
      }
      createOrbitControls() {
        const controls = new OrbitControls(this.camera, this.renderer.domElement);
        const { lookAtPosition } = this;
        controls.target.copy(lookAtPosition);
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.update();
        this.controls = controls;
      }
      createDebugUI() {
        const axisHelper = new THREE.AxesHelper();
        axisHelper.visible = false;
        this.scene.add(axisHelper);
        this.axisHelper = axisHelper;
      }
      addListeners() {
        this.onResize();
      }
      onResize() {
        window.addEventListener("resize", (e) => {
          const aspect = calcAspect(this.container);
          const camera = this.camera;
          camera.aspect = aspect;
          camera.updateProjectionMatrix();
          this.resizeRendererToDisplaySize();
          if (this.shaderMaterial) {
            this.shaderMaterial.uniforms.uResolution.value.x = window.innerWidth;
            this.shaderMaterial.uniforms.uResolution.value.y = window.innerHeight;
          }
        });
      }
      update() {
        console.log("animation");
      }
      setLoop() {
        this.renderer.setAnimationLoop(() => {
          this.update();
          if (this.controls) {
            this.controls.update();
          }
          if (this.composer) {
            this.composer.render();
          } else {
            this.renderer.render(this.scene, this.camera);
          }
        });
      }
    }

    class PhysicsBase extends Base {
      constructor(sel, debug = false) {
        super(sel, debug);
        this.gravity = new CANNON.Vec3(0, 0, 0);
        this.meshPhysicsObjs = [];
      }
      createWorld() {
        const { gravity } = this;
        const world = new CANNON.World();
        world.gravity.copy(gravity);
        this.world = world;
      }
      createBody(
        shape,
        body,
        bodyOffset = new CANNON.Vec3(0, 0, 0),
        orientation = new CANNON.Quaternion(0, 0, 0)
      ) {
        body.addShape(shape, bodyOffset, orientation);
        this.world.addBody(body);
        return body;
      }
      update() {
        this.sync();
        this.world.step(1 / 60);
      }
      sync() {
        this.meshPhysicsObjs.forEach((obj) => {
          const { mesh, body, copyPosition, copyQuaternion } = obj;
          if (copyPosition) {
            mesh.position.copy(body.position);
          }
          if (copyQuaternion) {
            mesh.quaternion.copy(body.quaternion);
          }
        });
      }
    }

    class BouncyBalloon extends PhysicsBase {
      constructor(sel, debug) {
        super(sel, debug);
        this.perspectiveCameraParams = {
          fov: 35,
          near: 10,
          far: 40
        };
        this.cameraPosition = new THREE.Vector3(0, 0, 20);
        this.gravity = new CANNON.Vec3(0, 0, 0);
        this.ballMat = null;
        this.balls = [];
        this.planes = [];
        this.mouseFollowBall = null;
        
        // Dynamic presets for colors
        this.colorPresets = {
          "Midnight Ocean": { ballColor: "#002f93", accentColor: "#c0c0c0", background: "linear-gradient(to top, #e6e9f0 0%, #eef1f5 100%)" },
          "Neon Sunset": { ballColor: "#ff2a7f", accentColor: "#ffe600", background: "linear-gradient(to top, #30cfd0 0%, #330867 100%)" },
          "Cyber Emerald": { ballColor: "#00ffaa", accentColor: "#22332b", background: "linear-gradient(to top, #111111 0%, #1a2f26 100%)" },
          "Obsidian Gold": { ballColor: "#e5a93b", accentColor: "#111111", background: "linear-gradient(to top, #243b55 0%, #141e30 100%)" },
          "Cosmic Nebula": { ballColor: "#a18cd1", accentColor: "#fbc2eb", background: "linear-gradient(to top, #f3e7e9 0%, #e3eeff 100%)" }
        };

        this.params = {
          greenscreen: false,
          colorPreset: "Midnight Ocean",
          ballColor: "#002f93",
          accentColor: "#c0c0c0",
          animationPreset: "Orbit (Slow Circular)",
          animationSpeed: 1.0,
          autoAnimateBalls: false,
          dpr: Math.min(window.devicePixelRatio, 2),
          showAxes: false
        };
      }
      init() {
        this.createWorld();
        this.createScene();
        this.createPerspectiveCamera();
        this.viewport = getViewport(this.camera);
        this.createRenderer();
        this.changeRendererParams();
        this.createBallMaterial();
        this.createBalls();
        this.createFourPlanes();
        this.addBallsDamping();
        this.createMouseFollowBall();
        this.hideSomeObjs();
        this.createLight();
        this.createPostprocessingEffect();
        this.mouseTracker.trackMousePos();
        this.addListeners();
        
        // Setup custom items
        this.createDebugUI();
        this.createSettingsUI();
        this.createOrbitControls();
        this.addKeyboardShortcut();
        
        this.setLoop();
      }
      createBallMaterial() {
        const { ballColor, accentColor } = this.params;
        const ballMat = new THREE.MeshLambertMaterial({
          color: new THREE.Color(accentColor),
          emissive: new THREE.Color(ballColor)
        });
        this.ballMat = ballMat;
      }
      createBall({ position = new Point({ x: 0, y: 0, z: 0 }), scale = 1 }) {
        const geo = new THREE.SphereBufferGeometry(1, 64, 64);
        const mat = this.ballMat;
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(point2ThreeVector(position));
        mesh.scale.copy(new THREE.Vector3(scale, scale, scale));
        this.scene.add(mesh);

        const body = new CANNON.Body({
          mass: 1,
          shape: new CANNON.Box(new CANNON.Vec3(scale, scale, scale)),
          position: point2CannonVec(position)
        });
        this.world.addBody(body);

        const obj = new MeshPhysicsObject(mesh, body);
        this.meshPhysicsObjs.push(obj);
        return obj;
      }
      createBalls(count = 64) {
        const balls = [...Array(count).keys()].map(() => {
          const scale = randomNumberInRange(0.5, 1);
          const ball = this.createBall({
            scale
          });
          return ball;
        });
        this.balls = balls;
      }
      createPlane({
        position = new Point({ x: 0, y: 0, z: 0 }),
        rotation = new Point({ x: 0, y: 0, z: 0 })
      }) {
        const geo = new THREE.PlaneGeometry(1, 1);
        const mat = new THREE.MeshBasicMaterial({
          color: new THREE.Color("red"),
          side: THREE.DoubleSide
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(point2ThreeVector(position));
        mesh.rotation.copy(point2ThreeEuler(rotation));
        this.scene.add(mesh);

        const body = new CANNON.Body({
          shape: new CANNON.Plane(),
          position: point2CannonVec(position),
          quaternion: new CANNON.Quaternion().setFromEuler(
            rotation.x,
            rotation.y,
            rotation.z
          )
        });
        this.world.addBody(body);

        const obj = new MeshPhysicsObject(mesh, body);
        this.meshPhysicsObjs.push(obj);
        return obj;
      }
      createFourPlanes() {
        const planePositions = arrays2Point([
          [0, 0, 0],
          [0, 0, 8],
          [0, -4, 0],
          [0, 4, 0]
        ]);
        const planeRotations = arrays2Point([
          [0, 0, 0],
          [0, deg2rad(-180), 0],
          [deg2rad(-90), 0, 0],
          [deg2rad(90), 0, 0]
        ]);
        const planes = [];
        for (let i = 0; i < 4; i++) {
          const position = planePositions[i];
          const rotation = planeRotations[i];
          const plane = this.createPlane({ position, rotation });
          planes.push(plane);
        }
        this.planes = planes;
      }
      addBallsDamping() {
        this.balls.forEach((ball) => {
          ball.body.angularDamping = 0.2;
          ball.body.linearDamping = 0.95;
        });
      }
      update() {
        this.sync();
        
        // Run physics stepping based on animationSpeed
        const dt = (1 / 60) * this.params.animationSpeed;
        this.world.step(dt);
        
        this.applyForce2Balls();
        this.mouseBallFollow();
        
        // Track time for auto-camera animations
        if (!this.animationTime) this.animationTime = 0;
        this.animationTime += dt;
        
        this.animateCamera();
      }
      applyForce2Balls() {
        this.balls.forEach((obj) => {
          const force = new THREE.Vector3()
            .copy(obj.body.position)
            .normalize()
            .multiplyScalar(-36);
          obj.body.applyForce(force);
        });
      }
      createMouseFollowBall(scale = 2) {
        const geo = new THREE.SphereBufferGeometry(1, 64, 64);
        const mat = this.ballMat;
        const mesh = new THREE.Mesh(geo, mat);
        mesh.scale.copy(new THREE.Vector3(scale, scale, scale));
        this.scene.add(mesh);

        const body = new CANNON.Body({
          mass: 1,
          shape: new CANNON.Sphere(2),
          type: CANNON.Body.KINEMATIC
        });
        this.world.addBody(body);

        const mouseFollowBall = new MeshPhysicsObject(mesh, body);
        this.meshPhysicsObjs.push(mouseFollowBall);
        this.mouseFollowBall = mouseFollowBall;
      }
      mouseBallFollow() {
        let x, y;
        if (this.params.autoAnimateBalls) {
          // Automatic floating figure-8 movement for the interaction ball
          const t = this.animationTime * 2.0;
          x = Math.sin(t) * (this.viewport.width / 3.5);
          y = Math.sin(2 * t) * (this.viewport.height / 3.5);
        } else {
          // Follow the mouse position
          const mousePos = this.mouseTracker.mousePos;
          x = (mousePos.x * this.viewport.width) / 2;
          y = (mousePos.y * this.viewport.height) / 2;
        }
        const pos = new CANNON.Vec3(x, y, 2.5);
        this.mouseFollowBall.body.position.copy(pos);
      }
      hideSomeObjs() {
        this.planes.forEach((plane) => (plane.mesh.visible = false));
        this.mouseFollowBall.mesh.visible = false;
      }
      changeRendererParams() {
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        this.renderer.toneMapping = THREE.CineonToneMapping;
        this.renderer.toneMappingExposure = 1.5;
      }
      createLight() {
        const { ballColor } = this.params;

        const ambiLight = new THREE.AmbientLight(new THREE.Color("white"), 0.75);
        this.scene.add(ambiLight);

        const dirLight1 = new THREE.DirectionalLight(new THREE.Color("white"), 4);
        dirLight1.position.set(0, 5, -5);
        this.scene.add(dirLight1);

        const spotLight = new THREE.SpotLight(new THREE.Color(ballColor));
        spotLight.position.set(20, 20, 25);
        this.scene.add(spotLight);
        this.spotLight = spotLight;
      }
      createPostprocessingEffect() {
        const { ballColor } = this.params;
        const composer = new EffectComposer(this.renderer);

        const renderPass = new RenderPass(this.scene, this.camera);
        composer.addPass(renderPass);

        const normalPass = new NormalPass(this.scene, this.camera);
        composer.addPass(normalPass);

        const ssaoConfig = {
          rangeThreshold: 0.5,
          rangeFalloff: 0.1,
          bias: 0.5
        };
        const ssaoEffect1 = new SSAOEffect(
          this.camera,
          normalPass.renderTarget.texture,
          {
            ...ssaoConfig,
            color: new THREE.Color(ballColor),
            samples: 9,
            radius: 30,
            intensity: 30
          }
        );
        const ssaoEffect2 = new SSAOEffect(
          this.camera,
          normalPass.renderTarget.texture,
          {
            ...ssaoConfig,
            color: new THREE.Color(ballColor),
            samples: 18,
            radius: 5,
            intensity: 30
          }
        );

        const effectPass = new EffectPass(this.camera, ssaoEffect1, ssaoEffect2);
        effectPass.renderToScreen = true;
        composer.addPass(effectPass);

        this.composer = composer;
        this.ssaoEffect1 = ssaoEffect1;
        this.ssaoEffect2 = ssaoEffect2;
      }
      createOrbitControls() {
        const controls = new OrbitControls(this.camera, this.renderer.domElement);
        const { lookAtPosition } = this;
        controls.target.copy(lookAtPosition);
        controls.enableZoom = true;
        controls.enablePan = true;
        
        // Auto-disable active camera animation when manual dragging starts
        controls.addEventListener("start", () => {
          if (this.params.animationPreset !== "None (Static)") {
            if (this.animationPresetController) {
              this.animationPresetController.setValue("None (Static)");
            }
          }
        });

        controls.update();
        this.controls = controls;
      }
      animateCamera() {
        const preset = this.params.animationPreset;
        const t = this.animationTime;
        
        if (preset === "None (Static)") {
          return;
        }

        const radius = 22;
        if (preset === "Orbit (Slow Circular)") {
          const angle = t * 0.15;
          this.camera.position.x = Math.sin(angle) * radius;
          this.camera.position.z = Math.cos(angle) * radius;
          this.camera.position.y = 3;
          this.camera.lookAt(0, 0, 0);
        } else if (preset === "Wave (Floating)") {
          const angleX = t * 0.2;
          const angleY = t * 0.1;
          this.camera.position.x = Math.sin(angleX) * 4;
          this.camera.position.y = Math.cos(angleY) * 3 + 3;
          this.camera.position.z = Math.sqrt(Math.max(radius * radius - this.camera.position.x * this.camera.position.x, 25));
          this.camera.lookAt(0, 0, 0);
        } else if (preset === "Zoom Pulse") {
          const zoomFactor = Math.sin(t * 0.3) * 6;
          const dist = radius + zoomFactor;
          const baseDir = new THREE.Vector3(0, 3, 20).normalize();
          this.camera.position.copy(baseDir.multiplyScalar(dist));
          this.camera.lookAt(0, 0, 0);
        } else if (preset === "Infinity Path") {
          const speed = 0.15;
          this.camera.position.x = Math.sin(t * speed) * radius;
          this.camera.position.y = Math.sin(2 * t * speed) * 5 + 3;
          this.camera.position.z = Math.cos(t * speed) * radius;
          this.camera.lookAt(0, 0, 0);
        }

        if (this.controls) {
          this.controls.target.set(0, 0, 0);
        }
      }
      createSettingsUI() {
        const gui = new GUI({ title: "Bouncy Balloon Settings" });
        this.gui = gui;
        
        gui.domElement.style.position = "absolute";
        gui.domElement.style.top = "10px";
        gui.domElement.style.right = "10px";

        // Greenscreen
        gui.add(this.params, "greenscreen")
          .name("Greenscreen Mode")
          .onChange(() => {
            this.updateVisuals();
          });

        // Presets Dropdown
        const presetController = gui.add(this.params, "colorPreset", Object.keys(this.colorPresets).concat(["Custom"]))
          .name("Color Preset")
          .onChange((val) => {
            if (val !== "Custom") {
              const preset = this.colorPresets[val];
              this.params.ballColor = preset.ballColor;
              this.params.accentColor = preset.accentColor;
              
              ballColorController.setValue(this.params.ballColor);
              accentColorController.setValue(this.params.accentColor);
            }
            this.updateVisuals();
          });

        // Ball Emissive Color
        const ballColorController = gui.addColor(this.params, "ballColor")
          .name("Ball Emissive")
          .onChange(() => {
            this.params.colorPreset = "Custom";
            presetController.setValue("Custom");
            this.updateVisuals();
          });

        // Ball Accent Color
        const accentColorController = gui.addColor(this.params, "accentColor")
          .name("Ball Accent")
          .onChange(() => {
            this.params.colorPreset = "Custom";
            presetController.setValue("Custom");
            this.updateVisuals();
          });

        // Camera Animation
        this.animationPresetController = gui.add(this.params, "animationPreset", [
          "None (Static)",
          "Orbit (Slow Circular)",
          "Wave (Floating)",
          "Zoom Pulse",
          "Infinity Path"
        ]).name("Camera Animation");

        // Animation Speed
        gui.add(this.params, "animationSpeed", 0.0, 3.0, 0.05).name("Animation Speed");

        // Auto Animate Balls
        gui.add(this.params, "autoAnimateBalls").name("Auto Animate Balls");

        // DPR
        gui.add(this.params, "dpr", 0.5, 3.0, 0.1)
          .name("Pixel Ratio (DPR)")
          .onChange((val) => {
            this.renderer.setPixelRatio(val);
            if (this.composer) {
              this.composer.setSize(this.container.clientWidth, this.container.clientHeight);
            }
          });

        // Helpers
        gui.add(this.params, "showAxes")
          .name("Show Axes Helper")
          .onChange((val) => {
            if (this.axisHelper) {
              this.axisHelper.visible = val;
            }
          });
      }
      updateVisuals() {
        // Update mesh material colors
        if (this.ballMat) {
          this.ballMat.emissive.set(this.params.ballColor);
          this.ballMat.color.set(this.params.accentColor);
        }

        // Update spotlights
        if (this.spotLight) {
          this.spotLight.color.set(this.params.ballColor);
        }

        // Update SSAO effects
        if (this.ssaoEffect1) {
          this.ssaoEffect1.color.copy(new THREE.Color(this.params.ballColor));
        }
        if (this.ssaoEffect2) {
          this.ssaoEffect2.color.copy(new THREE.Color(this.params.ballColor));
        }

        // Update HTML container background
        const container = document.querySelector(".bouncy-balloon");
        if (this.params.greenscreen) {
          container.style.background = "#00ff00";
          this.renderer.setClearColor(0x00ff00, 1.0);
        } else {
          const currentPreset = this.colorPresets[this.params.colorPreset];
          if (currentPreset) {
            container.style.background = currentPreset.background;
          } else {
            container.style.background = `linear-gradient(to top, ${this.params.accentColor} 0%, ${this.params.ballColor} 100%)`;
          }
          this.renderer.setClearColor(0x000000, 0.0);
        }
      }
      addKeyboardShortcut() {
        window.addEventListener("keydown", (e) => {
          if (e.key === "h" || e.key === "H") {
            const display = this.gui.domElement.style.display;
            const newDisplay = display === "none" ? "" : "none";
            this.gui.domElement.style.display = newDisplay;

          }
        });
      }
    }

    const start = () => {
      const bouncyBalloon = new BouncyBalloon(".bouncy-balloon", false);
      bouncyBalloon.init();
    };

    start();
  </script>
</body>
</html>
