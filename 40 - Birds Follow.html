<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aves Sim • Autonomous 3D Flock Simulator</title>
    
    <!-- Import Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
            }
        }
    </script>

    <style>
        :root {
            --bg-glass: rgba(15, 23, 42, 0.65);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-color: #00ffaa;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #dbe9f4; 
            font-family: 'Outfit', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            cursor: grab;
            transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body:active {
            cursor: grabbing;
        }

        canvas {
            display: block;
        }

        /* Glassmorphism HUD Panel */
        .glass-panel {
            position: absolute;
            top: 24px;
            left: 24px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
            color: var(--text-primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 300px;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: top left;
        }

        .glass-panel.minimized {
            width: 180px;
            padding: 12px 16px;
        }

        .glass-panel.minimized .hud-content {
            display: none;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hud-header h3 {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #fff 30%, rgba(255, 255, 255, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .hud-desc {
            font-size: 11px;
            color: var(--text-secondary);
            margin: 10px 0 16px 0;
            line-height: 1.5;
            font-weight: 300;
        }

        .preset-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .preset-chips {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .preset-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #fff;
            padding: 8px;
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .preset-chip:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .preset-chip.active {
            background: var(--accent-color);
            color: #050505;
            border-color: var(--accent-color);
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(0, 255, 170, 0.25);
        }

        .preset-chip:last-child:nth-child(odd) {
            grid-column: span 2;
        }

        .hud-stats {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            margin-bottom: 6px;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.4);
        }

        .stat-value {
            font-family: monospace;
            color: var(--accent-color);
            font-weight: 600;
        }

        .hud-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .hud-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #fff;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hud-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .toggle-btn .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: rgba(0, 255, 0, 0.15);
            border-color: rgba(0, 255, 0, 0.4);
            color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.15);
        }

        .toggle-btn.active .dot {
            background: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }

        #sound-hint {
            position: absolute;
            bottom: 24px;
            right: 24px;
            color: var(--text-secondary); 
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            padding: 10px 18px;
            border-radius: 20px;
            font-family: inherit;
            font-size: 12px;
            pointer-events: none; 
            transition: opacity 0.5s ease; 
            user-select: none; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            z-index: 99;
        }

        .lil-gui.root {
            position: absolute !important;
            top: 24px !important;
            right: 24px !important;
        }

        .lil-gui { 
            --background-color: rgba(15, 23, 42, 0.85) !important;
            --text-color: #f1f5f9 !important;
            --title-background-color: rgba(20, 28, 47, 0.95) !important;
            --widget-color: rgba(30, 41, 59, 0.5) !important;
            --hover-color: var(--accent-color) !important;
            --focus-color: var(--accent-color) !important;
            font-family: 'Outfit', sans-serif !important;
            border-radius: 12px !important;
            overflow: hidden !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4) !important;
            border: 1px solid var(--border-glass) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
        }
    </style>
</head>
<body>

    <div id="sound-hint">Please click to enable sound.</div>

    <!-- HUD Overlay Panel -->
    <div id="hud-panel" class="glass-panel">
        <div class="hud-header">
            <h3>Aves Sim • Flock Simulator</h3>
            <button id="hud-toggle-btn" class="icon-btn">—</button>
        </div>
        <div class="hud-content">
            <p class="hud-desc">Drag with Left Click to move the flock across the screen. Scroll wheel to zoom. Right-click to rotate.</p>
            
            <div class="preset-section">
                <div class="section-title">Color Schemes</div>
                <div class="preset-chips">
                    <button class="preset-chip active" data-preset="Sky Sanctuary">Sanctuary</button>
                    <button class="preset-chip" data-preset="Sunset Flight">Sunset</button>
                    <button class="preset-chip" data-preset="Midnight Silhouette">Midnight</button>
                    <button class="preset-chip" data-preset="Forest Canopy">Forest Canopy</button>
                    <button class="preset-chip" data-preset="Vibrant Synthwave">Synthwave</button>
                </div>
            </div>

            <div class="hud-stats">
                <div class="stat-row">
                    <span class="stat-label">Zoom Level</span>
                    <span class="stat-value" id="stat-zoom">1.00x</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Greenscreen</span>
                    <span class="stat-value" id="stat-greenscreen">Disabled</span>
                </div>
            </div>

            <div class="hud-actions">
                <button id="btn-reset" class="hud-btn">Reset Camera</button>
                <button id="btn-greenscreen" class="hud-btn toggle-btn">
                    <span class="dot"></span>
                    Green Screen
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import GUI from 'lil-gui';

        // --- SETTINGS & CONFIGURATION ---
        const BIRD_COUNT = 200;          
        
        // Premium color schemes
        const presets = {
            'Sky Sanctuary': {
                birdColor: '#1e293b',
                bgColor: '#dbe9f4',
                fogColor: '#e0f2ff'
            },
            'Sunset Flight': {
                birdColor: '#4c0519',
                bgColor: '#fad0c4',
                fogColor: '#ffd2a9'
            },
            'Midnight Silhouette': {
                birdColor: '#f8fafc',
                bgColor: '#0f172a',
                fogColor: '#0f172a'
            },
            'Forest Canopy': {
                birdColor: '#1b4332',
                bgColor: '#d8f3dc',
                fogColor: '#d8f3dc'
            },
            'Vibrant Synthwave': {
                birdColor: '#00ffff',
                bgColor: '#250036',
                fogColor: '#250036'
            }
        };

        const params = {
            preset: 'Sky Sanctuary',
            birdColor: presets['Sky Sanctuary'].birdColor,
            bgColor: presets['Sky Sanctuary'].bgColor,
            fogColor: presets['Sky Sanctuary'].fogColor,
            greenScreen: false,
            
            // Flocking Parameters
            visualRange: 250,        
            separationDist: 180,     
            speedLimit: 6.5,         
            minSpeed: 3.5,
            
            // Autonomous Path parameters
            wanderSpeed: 0.3,
            wanderRadiusX: 700,
            wanderRadiusY: 400,
            wanderRadiusZ: 300,
            
            // Sound Settings
            soundVolume: 1.5
        };

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(params.bgColor);
        scene.fog = new THREE.Fog(params.fogColor, 600, 4000);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 6000);
        camera.position.set(0, 0, 1400); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- ORBIT CONTROLS (ZOOM & DRAG) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.screenSpacePanning = true; // Drag moves object across screen
        controls.maxDistance = 4000;
        controls.minDistance = 200;

        // Map Left Click to Panning (Dragging object across screen), Right Click to Rotation, Scroll Wheel to Zoom
        controls.mouseButtons = {
            LEFT: THREE.MOUSE.PAN,
            MIDDLE: THREE.MOUSE.DOLLY,
            RIGHT: THREE.MOUSE.ROTATE
        };

        // --- 3D AUDIO SETUP ---
        const listener = new THREE.AudioListener();
        camera.add(listener);

        const birdSound = new THREE.PositionalAudio(listener);
        const audioLoader = new THREE.AudioLoader();

        audioLoader.load('https://ik.imagekit.io/sqiqig7tz/birds-2.mp3', (buffer) => {
            birdSound.setBuffer(buffer);
            birdSound.setLoop(true);
            birdSound.setVolume(params.soundVolume); 
            birdSound.setRefDistance(400); 
            birdSound.setMaxDistance(3000); 
        });

        // Invisible object acting as sound source at flock center
        const soundEmitter = new THREE.Object3D();
        soundEmitter.add(birdSound);
        scene.add(soundEmitter);

        let audioStarted = false;

        async function initAudio() {
            if (audioStarted || !birdSound.buffer) return;
            audioStarted = true; 
            
            if (listener.context.state === 'suspended') {
                await listener.context.resume();
            }
            
            birdSound.play();
            const hint = document.getElementById('sound-hint');
            if (hint) {
                hint.style.opacity = '0'; 
                setTimeout(() => hint.remove(), 500); 
            }
        }
       
        window.addEventListener('pointerdown', initAudio);

        // --- BIRD GEOMETRY ---
        const baseGeometry = new THREE.BufferGeometry();
        const vertices = new Float32Array([
            0.0, 0.0, 5.0,     // Nose
            -12.5, 0.0, -2.5,  // Left wing
            0.0, 0.0, -2.5,    // Tail
            
            0.0, 0.0, 5.0,     // Nose
            0.0, 0.0, -2.5,    // Tail
            12.5, 0.0, -2.5    // Right wing
        ]);
        baseGeometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));

        const instancedGeometry = new THREE.InstancedBufferGeometry();
        instancedGeometry.copy(baseGeometry);

        const randomAttribute = new Float32Array(BIRD_COUNT);
        for (let i = 0; i < BIRD_COUNT; i++) randomAttribute[i] = Math.random() * 5.0;
        instancedGeometry.setAttribute('aRandom', new THREE.InstancedBufferAttribute(randomAttribute, 1));

        // --- MATERIAL & CUSTOM SHADER ---
        const material = new THREE.MeshBasicMaterial({ 
            color: new THREE.Color(params.birdColor), 
            side: THREE.DoubleSide 
        });
        const userData = { time: { value: 0 } };
        
        material.onBeforeCompile = (shader) => {
            shader.uniforms.time = userData.time;
            shader.vertexShader = `
                uniform float time;
                attribute float aRandom;
            ` + '\n' + shader.vertexShader;

            const token = '#include <begin_vertex>';
            const customTransform = `
                vec3 transformed = vec3( position );
                float flapSpeed = 8.0 + aRandom; 
                float angle = time * flapSpeed + aRandom;
                float yOffset = sin(angle) * abs(transformed.x) * 0.45; 
                transformed.y += yOffset;
            `;
            shader.vertexShader = shader.vertexShader.replace(token, customTransform);
        };

        const mesh = new THREE.InstancedMesh(instancedGeometry, material, BIRD_COUNT);
        scene.add(mesh);

        // --- PHYSICS INITIALIZATION ---
        const position = [];
        const velocity = [];
        const dummy = new THREE.Object3D();

        for (let i = 0; i < BIRD_COUNT; i++) {
            let p = new THREE.Vector3(
                (Math.random() - 0.5) * 800,
                (Math.random() - 0.5) * 500,
                (Math.random() - 0.5) * 200
            );
            position.push(p);
            let v = new THREE.Vector3(
                (Math.random() - 0.5) * params.speedLimit,
                (Math.random() - 0.5) * params.speedLimit,
                (Math.random() - 0.5) * params.speedLimit
            );
            velocity.push(v);
            
            dummy.position.copy(p);
            dummy.lookAt(p.clone().add(v));
            dummy.updateMatrix();
            mesh.setMatrixAt(i, dummy.matrix);
        }

        // Target point towards which the flock wanders
        const targetPoint = new THREE.Vector3(); 

        // --- AUTONOMOUS FLIGHT LOGIC (NO CURSOR ATTRACTION) ---
        function updateTarget(time) {
            // Elegant multi-frequency parametric curve sweeping across a wide 3D space
            const t = time * params.wanderSpeed;
            const wanderX = Math.sin(t) * params.wanderRadiusX + Math.sin(t * 0.3) * 200; 
            const wanderY = Math.cos(t * 1.3) * params.wanderRadiusY + Math.cos(t * 0.4) * 100; 
            const wanderZ = Math.sin(t * 0.8) * params.wanderRadiusZ;
            
            const wanderTarget = new THREE.Vector3(wanderX, wanderY, wanderZ);
            targetPoint.lerp(wanderTarget, 0.05); // Smoothly pull target along curve
        }

        function updatePhysics() {
            let centerOfMass = new THREE.Vector3(); 

            for (let i = 0; i < BIRD_COUNT; i++) {
                let pos = position[i];
                let vel = velocity[i];

                centerOfMass.add(pos); 

                let separation = new THREE.Vector3();
                let alignment = new THREE.Vector3();
                let cohesion = new THREE.Vector3();
                let count = 0;

                let checkStart = (i + Math.floor(Math.random() * 10)) % BIRD_COUNT;
                for (let k = 0; k < 45; k++) {
                    let j = (checkStart + k) % BIRD_COUNT;
                    if (i === j) continue;

                    let dSq = pos.distanceToSquared(position[j]);

                    if (dSq < params.visualRange * params.visualRange) {
                        let dist = Math.sqrt(dSq);
                        
                        if (dist < params.separationDist) {
                            let push = new THREE.Vector3().subVectors(pos, position[j]);
                            push.normalize();
                            push.divideScalar(Math.max(dist * 0.4, 0.1)); 
                            separation.add(push);
                        }

                        alignment.add(velocity[j]);
                        cohesion.add(position[j]);
                        count++;
                    }
                }

                if (count > 0) {
                    separation.multiplyScalar(7.0); 
                    alignment.divideScalar(count).normalize().multiplyScalar(1.0);
                    cohesion.divideScalar(count).sub(pos).normalize().multiplyScalar(0.7);

                    vel.add(separation);
                    vel.add(alignment);
                    vel.add(cohesion);
                }

                // --- STEER TOWARDS AUTONOMOUS WANDERING TARGET ---
                let targetForce = new THREE.Vector3().subVectors(targetPoint, pos);
                let distToTarget = targetForce.length();
                let pullStrength = 0.035; // Steady autonomous pull (independent of cursor)
                
                if (distToTarget < 200) {
                    pullStrength *= (distToTarget / 200);
                    vel.multiplyScalar(0.95);
                }

                targetForce.normalize().multiplyScalar(pullStrength);
                vel.add(targetForce);

                let speed = vel.length();
                if (speed > params.speedLimit) vel.multiplyScalar(params.speedLimit / speed);
                if (speed < params.minSpeed) vel.normalize().multiplyScalar(params.minSpeed);

                pos.add(vel);

                dummy.position.copy(pos);
                dummy.lookAt(pos.clone().add(vel));
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
            }
            mesh.instanceMatrix.needsUpdate = true;

            // Smoothly move the 3D positional audio source to the flock's center of mass
            centerOfMass.divideScalar(BIRD_COUNT);
            soundEmitter.position.lerp(centerOfMass, 0.1); 
        }

        // --- PRESET MANAGEMENT ---
        function applyPreset(name) {
            const p = presets[name];
            if (!p) return;

            params.preset = name;
            params.birdColor = p.birdColor;
            params.bgColor = p.bgColor;
            params.fogColor = p.fogColor;

            material.color.set(params.birdColor);

            if (!params.greenScreen) {
                scene.background.set(params.bgColor);
                scene.fog.color.set(params.fogColor);
                scene.fog.near = 600;
                scene.fog.far = 4000;
                renderer.setClearColor(params.bgColor);
                document.body.style.backgroundColor = params.bgColor;
            }

            gui.controllersRecursive().forEach(c => c.updateDisplay());

            // Sync visual HUD Preset Chips
            document.querySelectorAll('.preset-chip').forEach(chip => {
                if (chip.getAttribute('data-preset') === name) {
                    chip.classList.add('active');
                } else {
                    chip.classList.remove('active');
                }
            });
        }

        function onColorManualChange() {
            params.preset = 'Custom';
            
            material.color.set(params.birdColor);
            
            if (!params.greenScreen) {
                scene.background.set(params.bgColor);
                scene.fog.color.set(params.fogColor);
                renderer.setClearColor(params.bgColor);
                document.body.style.backgroundColor = params.bgColor;
            }

            gui.controllersRecursive().forEach(c => c.updateDisplay());

            // Deactivate all preset chips
            document.querySelectorAll('.preset-chip').forEach(chip => {
                chip.classList.remove('active');
            });
        }

        function setGreenScreen(enabled) {
            params.greenScreen = enabled;
            
            const btn = document.getElementById('btn-greenscreen');
            const label = document.getElementById('stat-greenscreen');
            
            if (enabled) {
                scene.background.set(0x00ff00);
                scene.fog.color.set(0x00ff00);
                
                // Virtually disable fog mapping to keep the greenscreen flat #00ff00
                scene.fog.near = 999999;
                scene.fog.far = 999999;
                
                renderer.setClearColor(0x00ff00);
                document.body.style.backgroundColor = '#00ff00';
                
                if (btn) btn.classList.add('active');
                if (label) {
                    label.textContent = 'Enabled';
                    label.style.color = '#00ff00';
                }
            } else {
                scene.background.set(params.bgColor);
                scene.fog.color.set(params.fogColor);
                scene.fog.near = 600;
                scene.fog.far = 4000;
                renderer.setClearColor(params.bgColor);
                document.body.style.backgroundColor = params.bgColor;
                
                if (btn) btn.classList.remove('active');
                if (label) {
                    label.textContent = 'Disabled';
                    label.style.color = 'var(--text-secondary)';
                }
            }
            
            gui.controllersRecursive().forEach(c => c.updateDisplay());
        }

        // --- GUI SETUP (LIL-GUI) ---
        const gui = new GUI({ title: 'Simulation Settings' });
        gui.close(); // Collapse to keep HUD visible

        const presetNames = [...Object.keys(presets), 'Custom'];
        const presetController = gui.add(params, 'preset', presetNames).name('Preset').onChange(v => {
            if (v !== 'Custom') applyPreset(v);
        });

        const colorFolder = gui.addFolder('Colors & Environment');
        colorFolder.addColor(params, 'birdColor').name('Bird Color').onChange(onColorManualChange);
        colorFolder.addColor(params, 'bgColor').name('Background Color').onChange(onColorManualChange);
        colorFolder.addColor(params, 'fogColor').name('Fog Color').onChange(onColorManualChange);
        colorFolder.add(params, 'greenScreen').name('Green Screen').onChange(setGreenScreen);

        const boidFolder = gui.addFolder('Flock Physics');
        boidFolder.add(params, 'visualRange', 50, 600, 10).name('Visual Range');
        boidFolder.add(params, 'separationDist', 20, 400, 10).name('Separation Distance');
        boidFolder.add(params, 'speedLimit', 2.0, 15.0, 0.5).name('Speed Limit');
        boidFolder.add(params, 'minSpeed', 1.0, 8.0, 0.5).name('Min Speed');

        const wanderFolder = gui.addFolder('Autonomous Wander Path');
        wanderFolder.add(params, 'wanderSpeed', 0.05, 1.5, 0.05).name('Wander Speed');
        wanderFolder.add(params, 'wanderRadiusX', 200, 2000, 50).name('Horizontal Wander');
        wanderFolder.add(params, 'wanderRadiusY', 100, 1200, 50).name('Vertical Wander');
        wanderFolder.add(params, 'wanderRadiusZ', 50, 1000, 50).name('Depth Wander');

        const audioFolder = gui.addFolder('Sound Systems');
        audioFolder.add(params, 'soundVolume', 0.0, 3.0, 0.1).name('Volume').onChange(v => {
            if (birdSound) birdSound.setVolume(v);
        });

        // --- HUD USER INTERACTIONS ---
        const hudPanel = document.getElementById('hud-panel');
        const hudToggleBtn = document.getElementById('hud-toggle-btn');
        if (hudToggleBtn && hudPanel) {
            hudToggleBtn.addEventListener('click', () => {
                hudPanel.classList.toggle('minimized');
                hudToggleBtn.textContent = hudPanel.classList.contains('minimized') ? '+' : '—';
            });
        }

        const btnReset = document.getElementById('btn-reset');
        if (btnReset) {
            btnReset.addEventListener('click', () => {
                controls.reset();
            });
        }

        const btnGreenscreen = document.getElementById('btn-greenscreen');
        if (btnGreenscreen) {
            btnGreenscreen.addEventListener('click', () => {
                setGreenScreen(!params.greenScreen);
            });
        }

        // Setup preset chips click events
        document.querySelectorAll('.preset-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const presetName = chip.getAttribute('data-preset');
                applyPreset(presetName);
            });
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = Date.now() * 0.001;
            
            userData.time.value += delta;

            updateTarget(time);
            updatePhysics();
            
            controls.update();

            // Calculate & Display zoom factor dynamically in HUD based on camera distance
            const distance = camera.position.distanceTo(controls.target);
            const zoomFactor = 1400 / distance;
            const statZoom = document.getElementById('stat-zoom');
            if (statZoom) statZoom.textContent = zoomFactor.toFixed(2) + 'x';
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize state
        applyPreset(params.preset);
        setGreenScreen(params.greenScreen);

        animate();
    </script>
</body>
</html>
