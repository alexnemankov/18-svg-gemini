<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevator Visual</title>
  <!-- Load UMD version of lil-gui to prevent CORS issues on file:// protocol -->
  <script src="https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.umd.js"></script>
  <style>
    ::-webkit-scrollbar {
      width: 0.625rem;
      height: 0.625rem;
    }

    ::-webkit-scrollbar-thumb {
      background: #111;
      border-radius: 0.3125rem;
      box-shadow: inset 0.125rem 0.125rem 0.125rem rgba(255, 255, 255, 0.25),
        inset -0.125rem -0.125rem 0.125rem rgba(0, 0, 0, 0.25);
      cursor: default;
    }

    ::-webkit-scrollbar-track {
      background: #333;
    }

    ::selection {
      background: #fff;
      color: #333;
    }

    html,
    body {
      height: 100vh;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
    }

    body {
      display: grid;
      grid-template-rows: calc(100dvh - 4rem) 4rem;
      font-family: system-ui, sans-serif;
      background: black;
    }

    canvas,
    .editor,
    #controls {
      grid-row: 1;
      grid-column: 1;
    }

    canvas {
      --canvas-z-index: -1;
      width: 100%;
      height: auto;
      object-fit: contain;
      background: black;
      touch-action: none;
      z-index: var(--canvas-z-index);
    }

    .editor,
    .overlay,
    #error {
      font-family: 'Courier New', Courier, monospace;
      background: repeating-linear-gradient(0deg, #000a, #1119, #000a .25rem);
      padding: 1em;
    }

    .editor {
      color: #fefefe;
      tab-size: 2;
      border: none;
      resize: none;
    }

    .editor:focus {
      outline: none;
    }

    #error {
      grid-row: 2;
      grid-column: 1;
      margin: 0;
      padding-block: 0;
      padding-top: .5em;
      color: firebrick;
      overflow: auto;
      text-wrap: pretty;
    }

    #indicator {
      visibility: hidden;
      position: absolute;
      top: calc(var(--top, 0px) - var(--scroll-top, 0px));
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 10px solid firebrick;
      transform: translateY(-25%);
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      margin: 0;
    }

    .editor,
    .overlay {
      font-size: 1rem;
      line-height: 1.2;
      white-space: pre;
    }

    #controls {
      position: fixed;
      top: 1em;
      right: 2em;
    }

    .controls {
      position: relative;
      display: flex;
      gap: 1.5em;
      padding: .5em 1.25em;
      background: #1111;
      border-radius: 4px;
    }

    .controls::before,
    .controls::after {
      content: '';
      position: absolute;
      z-index: -1;
      inset: 0;
      transform: scale(.95);
      border-radius: inherit;
      opacity: 0;
    }

    .controls::before {
      background: #aef;
      animation: pulse 2s infinite;
    }

    .controls::after {
      background: #fefefe66;
      transition: transform 200ms ease-in-out;
    }

    .controls:hover::before,
    .controls:hover::after {
      opacity: 1;
    }

    .controls:hover::before {
      transform: scale(.98);
      filter: blur(2px);
    }

    .controls:hover::after {
      transform: scale(1.025, 1.1);
    }

    .controls:hover {
      background: #111f;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.0125);
      }

      100% {
        transform: scale(1);
      }
    }

    .hidden {
      display: none !important;
    }

    .opaque {
      opacity: 1 !important;
      background: #111 !important;
    }

    input {
      all: unset;
      opacity: .2;
      filter: saturate(0) invert(1);
      cursor: pointer;
      transition: opacity 200ms ease-in-out;
      padding: .25em .5em;
    }

    input:hover {
      opacity: 1;
    }

    .icon {
      text-align: center;
      line-height: 1;
    }

    #btnToggleView {
      width: 1.25em;
    }

    #btnToggleView::after {
      content: '👁';
    }

    #btnToggleView:checked::after {
      content: '✏️';
    }

    #btnToggleResolution::after {
      content: '1️⃣';
    }

    #btnToggleResolution:checked::after {
      content: '2️⃣';
    }

    #btnReset::after {
      content: '⏮️';
    }

    #btnPlayStop::after {
      content: '▶️';
    }

    #btnPlayStop:checked::after {
      content: '⏸️';
    }

    /* Custom styles for lil-gui settings panel */
    .lil-gui.lil-gui {
      position: fixed;
      top: 1em;
      left: 1em;
      right: auto;
      --background-color: rgba(17, 17, 17, 0.7) !important;
      --text-color: #eee !important;
      --title-background-color: rgba(10, 10, 10, 0.85) !important;
      --widget-color: rgba(255, 255, 255, 0.1) !important;
      --hover-color: rgba(255, 255, 255, 0.2) !important;
      --focus-color: rgba(255, 255, 255, 0.25) !important;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-family: system-ui, sans-serif !important;
    }

    /* Global UI Toggle Visibility Styles */
    body.hidden-ui #controls,
    body.hidden-ui .lil-gui {
      display: none !important;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <textarea id="codeEditor" class="editor" spellcheck="false" autocorrect="off" autocapitalize="off" translate="no" oninput="render()"></textarea>
  <pre id="error"></pre>
  <div id="indicator"></div>
  <div id="controls">
    <div class="controls">
      <input id="btnToggleView" class="icon" type="checkbox" name="toggleView" onclick="toggleView()">
      <input id="btnToggleResolution" class="icon" type="checkbox" name="toggleResolution" onchange="toggleResolution()">
      <input id="btnReset" class="icon" type="checkbox" name="reset" onclick="reset()">
      <input id="btnPlayStop" class="icon" type="checkbox" name="playStop" onclick="togglePlayStop()">
    </div>
  </div>

  <script type="x-shader/x-fragment">#version 300 es
  /*********
  * made by Matthias Hurrle (@atzedent)
  */
  precision highp float;
  out vec4 O;
  uniform float time;
  uniform vec2 resolution;
  uniform vec2 move;
  uniform vec2 wheel;

  // Custom Settings Panel Uniforms
  uniform float u_zoom;
  uniform vec2 u_offset;
  uniform int u_animPreset;
  uniform vec3 u_color1;
  uniform vec3 u_color2;
  uniform int u_colorMode;
  uniform float u_greenscreen;

  #define FC gl_FragCoord.xy
  #define R resolution
  #define T (time+wheel.y/1e3)
  #define S smoothstep
  #define N normalize 
  #define MN min(R.x,R.y)
  #define PI radians(180.)
  #define rot(a) mat2(cos((a)-vec4(0,11,33,0)))
  #define hue(a) (.5+.5*sin(6.3*(a)+vec3(1,2,3)))
  float box(vec3 p, vec3 s, float r) {
  	p=abs(p)-s+r;
  	return length(max(p,.0))+min(.0,max(max(p.x,p.y),p.z))-r;
  }
  float smin(float a, float b, float k) {
  	float h=clamp(.5+.5*(b-a)/k,.0,1.);
  	return mix(b,a,h)-k*h*(1.-h);
  }
  float cuts(vec3 p, float k, float f) {
  	return min(
  		box(p,vec3(k,k,f),.05),
  		box(p.zyx,vec3(k,k,f),.05)
  	);
  }
  float map(vec3 p) {
  	float r=2.8, a=atan(p.x,p.z);
  	vec2 q=vec2(length(p.xz)-r,p.y);
  	q*=rot(.5*a+T);
  	q.y=abs(q.y)-.2;
  	q.y=abs(q.y)-.2;
  	float d=box(q.xyy,vec3(.7,.05,1.+sin(a)*.5+.5),.05);
  	return smin(-cuts(p,5.,.2),d,-.05);
  }
  vec3 norm(vec3 p) {
  	float h=1e-3; vec2 k=vec2(-1,1);
  	return N(
  		k.xyy*map(p+k.xyy*h)+
  		k.yxy*map(p+k.yxy*h)+
  		k.yyx*map(p+k.yyx*h)+
  		k.xxx*map(p+k.xxx*h)
  	);
  }
  bool march(inout vec3 p, vec3 rd, out float dd) {
  	for (float i; i++<400.;) {
  		float d=map(p);
  		if (abs(d)<1e-3) return true;
  		if (d>100.) return false;
  		p+=rd*d*.5;
  		dd+=d*.5;
  	}
  }
  float calcAO(vec3 p, vec3 n) {
  	float occ=.0, sca=1.;
  	for (float i=.0; i<5.; i++) {
  		float
  		h=.01+i*.05,
  		d=map(p+h*n);
  		occ+=(h-d)*sca;
  		sca*=.95;
  		if (occ>.35) break;
  	}
  	return clamp(1.-3.*occ,.0,1.)*(.5+.5*n.y);
  }
  float shadow(vec3 p, vec3 lp) {
  	float shd=1., maxd=distance(lp,p);
  	vec3 l=N(lp-p);
  	for (float i=1e-3; i<maxd;) {
  		float d=map(p+l*i);
  		if (d<1e-3) {
  			shd=.0;
  			break;
  		}
  		shd=min(shd,16.*d/i);
  		i+=d;
  	}
  	return shd;
  }
  vec3 org(inout vec3 t) {
    // Apply panning translation offset
    t.xy += u_offset;

    // Apply distance zoom (default is 12)
  	vec3 p=t-vec3(0,-.5,12.0 * u_zoom);

  	p.yz*=rot(.78-.5*sin(move.y*6.3/MN));
  	p.xz*=rot(.78-move.x*6.3/MN);

    // Apply animation presets
    float at = time;
    if (u_animPreset == 1) { // Slow Orbit
      p.xz *= rot(at * 0.15);
    } else if (u_animPreset == 2) { // Gentle Sway
      p.yz *= rot(0.1 * sin(at * 0.3));
      p.xz *= rot(0.15 * cos(at * 0.2));
    } else if (u_animPreset == 3) { // Cinematic Zoom
      p *= (1.0 + 0.25 * sin(at * 0.3));
    } else if (u_animPreset == 4) { // Spiral Descent
      p.xz *= rot(at * 0.12);
      p.yz *= rot(0.08 * sin(at * 0.2));
    }

  	return p;
  }
  vec3 dir(vec2 uv, vec3 p, vec3 t, float z) {
  	vec3 up=vec3(0,1,0),
  	f=N(t-p),
  	r=N(cross(up,f)),
  	u=N(cross(f,r));
  	return mat3(r,u,f)*N(vec3(uv,z));
  }
  vec3 render(vec2 uv) {
  	vec3 col=vec3(0),
  	t=vec3(0,-.5,0), p=org(t), ro=p,
  	rd=dir(uv,p,t,2.);
  	float dd;
  	if (march(p,rd,dd)) {
  		vec3 n=norm(p), lp=vec3(0,3,0), l=N(lp-p),
  		e=N(ro-p), r=reflect(-l,n);
  		float ao=calcAO(p,n), amb=1.+10.*n.y, ld=distance(ro,p),
  		dif=clamp(dot(l,n),.0,1.), atten=1./(1.+ld*.25+ld*ld*.125),
  		shd=shadow(p+n*5e-2,lp), ref=pow(clamp(dot(r,e),.0,1.),8.);
  		col+=dif*shd;
  		col+=clamp(dot(-rd,l),.0,1.)*atten;
  		col+=ref;
  		
      // Color schemes
      vec3 colorTerm;
      if (u_colorMode == 0) {
        colorTerm = hue(T*.2-.4*length(p));
      } else {
        colorTerm = mix(u_color1, u_color2, sin(T*.2-.4*length(p))*.5+.5);
      }

      col*=colorTerm+amb*ao*atten;
  		col=col*2./(2.+col);
  	} else {
      if (u_greenscreen > 0.5) {
        col = vec3(0.0, 1.0, 0.0);
      }
    }
  	return col;
  }
  void main() {
  	vec2 uv=(FC-.5*R)/MN;
  	vec3 col=render(uv);
    O=vec4(col,1);
  }</script>

  <script>
    // Grab the GUI namespace from the loaded UMD library
    const { GUI } = lil;

    /*********
     * made by Matthias Hurrle (@atzedent)
     */
    let editMode = false // set to false to hide the code editor on load
    let playOnLoad = true // set to true to start the shader automatically on load, otherwise click the play button
    let resolution = .5 // set 1 for full resolution or to .5 to start with half resolution on load
    let renderDelay = 1000 // delay in ms before rendering the shader after a change
    
    let customTime = 0
    let lastTime = 0
    let interactionFrameRequested = false
    let dpr = Math.max(1, resolution * window.devicePixelRatio)
    let frm, source, editor, renderer, pointers

    // Get element references
    const canvas = document.getElementById('canvas');
    const codeEditor = document.getElementById('codeEditor');
    const error = document.getElementById('error');
    const indicator = document.getElementById('indicator');
    const btnToggleView = document.getElementById('btnToggleView');
    const btnToggleResolution = document.getElementById('btnToggleResolution');
    const btnReset = document.getElementById('btnReset');
    const btnPlayStop = document.getElementById('btnPlayStop');

    // Color Preset Schemes
    const colorPresets = {
      'Original (Rainbow)': { mode: 0, color1: '#ff0000', color2: '#0000ff' },
      'Amber Industrial':   { mode: 1, color1: '#ff8800', color2: '#220800' },
      'Neon Cyberpunk':     { mode: 1, color1: '#ff00aa', color2: '#00f0ff' },
      'Monochrome Chrome':  { mode: 1, color1: '#ffffff', color2: '#111111' },
      'Toxic Waste':        { mode: 1, color1: '#39ff14', color2: '#021400' },
      'Cosmic Nebula':      { mode: 1, color1: '#9400d3', color2: '#00bfff' }
    };

    // Animation Presets
    const animPresets = {
      'Static': 0,
      'Slow Orbit': 1,
      'Gentle Sway': 2,
      'Cinematic Zoom': 3,
      'Spiral Descent': 4
    };

    // Initial settings for GUI controls
    const settings = {
      greenscreen: false,
      dpr: Math.max(0.25, resolution * window.devicePixelRatio),
      animationSpeed: 1.0,
      colorScheme: 'Original (Rainbow)',
      color1: '#ff0000',
      color2: '#0000ff',
      colorMode: 0,
      animationPreset: 'Static',
      zoom: 1.0,
      resetView: () => {
        settings.zoom = 1.0;
        pointers.offset = [0, 0];
        pointers.moves = [0, 0];
        if (zoomController) zoomController.setValue(settings.zoom);
        renderInteractionFrame();
      }
    };

    let gui;
    let zoomController, dprController, schemeController, color1Controller, color2Controller;

    function initGUI() {
      gui = new GUI({ title: 'Settings' });

      gui.add(settings, 'greenscreen').name('Green Screen').onChange(renderInteractionFrame);

      dprController = gui.add(settings, 'dpr', 0.25, 2.0, 0.05).name('Pixel Ratio (DPR)').onChange(value => {
        dpr = value;
        pointers.updateScale(dpr);
        resize();
      });

      gui.add(settings, 'animationSpeed', 0.0, 3.0, 0.1).name('Anim Speed');

      gui.add(settings, 'animationPreset', Object.keys(animPresets)).name('Animation').onChange(renderInteractionFrame);

      const colorFolder = gui.addFolder('Color Customization');

      schemeController = colorFolder.add(settings, 'colorScheme', Object.keys(colorPresets)).name('Color Scheme').onChange(value => {
        const preset = colorPresets[value];
        if (preset) {
          settings.colorMode = preset.mode;
          settings.color1 = preset.color1;
          settings.color2 = preset.color2;
          color1Controller.setValue(settings.color1);
          color2Controller.setValue(settings.color2);
        } else {
          settings.colorMode = 1;
        }
        renderInteractionFrame();
      });

      color1Controller = colorFolder.addColor(settings, 'color1').name('Color 1').onChange(() => {
        settings.colorMode = 1;
        settings.colorScheme = 'Custom';
        schemeController.updateDisplay();
        renderInteractionFrame();
      });

      color2Controller = colorFolder.addColor(settings, 'color2').name('Color 2').onChange(() => {
        settings.colorMode = 1;
        settings.colorScheme = 'Custom';
        schemeController.updateDisplay();
        renderInteractionFrame();
      });

      zoomController = gui.add(settings, 'zoom', 0.1, 5.0, 0.05).name('Zoom').onChange(renderInteractionFrame);

      gui.add(settings, 'resetView').name('Reset View');
    }

    function resize() {
      const { innerWidth: width, innerHeight: height } = window

      canvas.width = width * dpr
      canvas.height = height * dpr

      if (renderer) {
        renderer.updateScale(dpr)
        renderInteractionFrame()
      }
    }
    function toggleView() {
      editor.hidden = btnToggleView.checked
      canvas.style.setProperty('--canvas-z-index', btnToggleView.checked ? 0 : -1)
    }
    function reset() {
      let shader = source
      editor.text = shader ? shader.textContent : renderer.defaultSource
      customTime = 0
      renderThis()
    }
    function toggleResolution() {
      resolution = btnToggleResolution.checked ? .5 : 1
      settings.dpr = Math.max(0.25, resolution * window.devicePixelRatio)
      dpr = settings.dpr
      if (dprController) dprController.setValue(dpr)
      pointers.updateScale(dpr)
      resize()
    }
    function update() {
      renderer.updateMouse(pointers.first)
      renderer.updatePointerCount(pointers.count)
      renderer.updatePointerCoords(pointers.coords)
      renderer.updateMove(pointers.move)
      renderer.updateZoom(pointers.zoomed)
      renderer.updateWheel(pointers.wheel)
    }
    function loop(now) {
      let dt = now - lastTime
      lastTime = now

      // Accumulate time scaled by animation speed settings
      customTime += dt * settings.animationSpeed

      update()
      renderer.render(customTime)
      frm = requestAnimationFrame(loop)
    }
    async function renderThis() {
      editor.clearError()
      const result = renderer.test(editor.text)

      if (result) {
        editor.setError(result)
      } else {
        renderer.updateShader(editor.text)
      }
      const wasPlaying = !!frm
      cancelAnimationFrame(frm) // Always cancel the previous frame!
      frm = null

      if (wasPlaying || playOnLoad) {
        play()
      } else {
        renderer.render(customTime)
      }
    }
    const play = () => {
      if (frm) return
      lastTime = performance.now()
      loop(performance.now())
      btnPlayStop.checked = true
    }
    const stop = () => {
      cancelAnimationFrame(frm)
      frm = null
      btnPlayStop.checked = false
    }
    function togglePlayStop() {
      if (btnPlayStop.checked) {
        playOnLoad = true
        play()
      } else {
        playOnLoad = false
        stop()
      }
    }
    const debounce = (fn, delay) => {
      let timerId
      return (...args) => {
        clearTimeout(timerId)
        timerId = setTimeout(() => fn.apply(this, args), delay)
      }
    }

    // Declare debounce wrapper
    const render = debounce(renderThis, renderDelay)

    function renderInteractionFrame() {
      if (frm || interactionFrameRequested || !renderer || !pointers) return
      interactionFrameRequested = true
      requestAnimationFrame(() => {
        interactionFrameRequested = false
        if (frm) return
        update()
        renderer.render(customTime)
      })
    }
    function init() {
      source = document.querySelector("script[type='x-shader/x-fragment']")

      document.title = "Elevator Visual"

      renderer = new Renderer(canvas, dpr)
      pointers = new PointerHandler(canvas, dpr)
      editor   = new Editor(codeEditor, error, indicator)
      editor.text = source.textContent
      renderer.setup()
      renderer.init()

      // Set up lil-gui settings panel
      initGUI()

      if (!editMode) {
        btnToggleView.checked = true
        toggleView()
      }
      if (resolution === .5) {
        btnToggleResolution.checked = true
        toggleResolution()
      }
      canvas.addEventListener('shader-error', e => editor.setError(e.detail))
      pointers.onchange = renderInteractionFrame
      resize()

      if (renderer.test(source.textContent) === null) {
        renderer.updateShader(source.textContent)
      }
      customTime = 0
      lastTime = performance.now()
      renderThis()
      window.onresize = resize

      // Prevent standard browser context menu on canvas for panning drag interactions
      canvas.addEventListener('contextmenu', e => e.preventDefault());

      window.addEventListener("keydown", e => {
        if (e.key === "L" && e.ctrlKey) {
          e.preventDefault()
          btnToggleView.checked = !btnToggleView.checked
          toggleView()
        } else if (e.key === " " && editor.hidden) {
          e.preventDefault()
          btnPlayStop.checked = !btnPlayStop.checked
          togglePlayStop()
        } else if (e.key.toLowerCase() === "h") {
          // Toggle UI visibility only if not currently typing in code inputs/textareas
          if (document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') {
            document.body.classList.toggle("hidden-ui")
          }
        }
      })
    }
    class Renderer {
      #vertexSrc = "#version 300 es\nprecision highp float;\nin vec4 position;\nvoid main(){gl_Position=position;}"
      #fragmtSrc = "#version 300 es\nprecision highp float;\nout vec4 O;\nuniform float time;\nuniform vec2 resolution;\nvoid main() {\n\tvec2 uv=gl_FragCoord.xy/resolution;\n\tO=vec4(uv,sin(time)*.5+.5,1);\n}"
      #vertices = [-1, 1, -1, -1, 1, 1, 1, -1]
      constructor(canvas, scale) {
        this.canvas = canvas
        this.scale = scale
        this.gl = canvas.getContext("webgl2")
        this.gl.viewport(0, 0, canvas.width * scale, canvas.height * scale)
        this.shaderSource = this.#fragmtSrc
        this.mouseMove = [0, 0]
        this.mouseCoords = [0, 0]
        this.pointerCoords = [0, 0]
        this.nbrOfPointers = 0
        this.zoom = 0
        this.wheel = [0, 0]
        this.startRandom = Math.random()
      }
      get defaultSource() { return this.#fragmtSrc }
      updateShader(source) {
        this.reset()
        this.shaderSource = source
        this.setup()
        this.init()
      }
      updateMove(deltas) {
        this.mouseMove = deltas
      }
      updateZoom(zoom) {
        this.zoom = zoom
      }
      updateWheel(wheel) {
        this.wheel = wheel
      }
      updateMouse(coords) {
        this.mouseCoords = coords
      }
      updatePointerCoords(coords) {
        this.pointerCoords = coords
      }
      updatePointerCount(nbr) {
        this.nbrOfPointers = nbr
      }
      updateScale(scale) {
        this.scale = scale
        this.gl.viewport(0, 0, this.canvas.width * scale, this.canvas.height * scale)
      }
      compile(shader, source) {
        const gl = this.gl
        gl.shaderSource(shader, source)
        gl.compileShader(shader)

        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          console.error(gl.getShaderInfoLog(shader))
          this.canvas.dispatchEvent(new CustomEvent('shader-error', { detail: gl.getShaderInfoLog(shader) }))
        }
      }
      test(source) {
        let result = null
        const gl = this.gl
        const shader = gl.createShader(gl.FRAGMENT_SHADER)
        gl.shaderSource(shader, source)
        gl.compileShader(shader)

        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          result = gl.getShaderInfoLog(shader)
        }
        if (!gl.getShaderParameter(shader, gl.DELETE_STATUS)) {
          gl.deleteShader(shader)
        }
        return result
      }
      reset() {
        const { gl, program, vs, fs } = this
        if (!program || gl.getProgramParameter(program, gl.DELETE_STATUS)) return
        if (!gl.getShaderParameter(vs, gl.DELETE_STATUS)) {
          gl.detachShader(program, vs)
          gl.deleteShader(vs)
        }
        if (!gl.getShaderParameter(fs, gl.DELETE_STATUS)) {
          gl.detachShader(program, fs)
          gl.deleteShader(fs)
        }
        gl.deleteProgram(program)
      }
      setup() {
        const gl = this.gl
        this.vs = gl.createShader(gl.VERTEX_SHADER)
        this.fs = gl.createShader(gl.FRAGMENT_SHADER)
        this.compile(this.vs, this.#vertexSrc)
        this.compile(this.fs, this.shaderSource)
        this.program = gl.createProgram()
        gl.attachShader(this.program, this.vs)
        gl.attachShader(this.program, this.fs)
        gl.linkProgram(this.program)

        if (!gl.getProgramParameter(this.program, gl.LINK_STATUS)) {
          console.error(gl.getProgramInfoLog(this.program))
        }
      }
      init() {
        const { gl, program } = this
        this.buffer = gl.createBuffer()
        gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer)
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(this.#vertices), gl.STATIC_DRAW)

        const position = gl.getAttribLocation(program, "position")

        gl.enableVertexAttribArray(position)
        gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0)

        program.resolution = gl.getUniformLocation(program, "resolution")
        program.time = gl.getUniformLocation(program, "time")
        program.daytime = gl.getUniformLocation(program, "daytime")
        program.move = gl.getUniformLocation(program, "move")
        program.touch = gl.getUniformLocation(program, "touch")
        program.pointerCount = gl.getUniformLocation(program, "pointerCount")
        program.pointers = gl.getUniformLocation(program, "pointers")
        program.zoom = gl.getUniformLocation(program, "zoom")
        program.wheel = gl.getUniformLocation(program, "wheel") 
        program.startRandom = gl.getUniformLocation(program, "startRandom")

        // Custom uniform locations
        program.u_zoom = gl.getUniformLocation(program, "u_zoom")
        program.u_offset = gl.getUniformLocation(program, "u_offset")
        program.u_animPreset = gl.getUniformLocation(program, "u_animPreset")
        program.u_color1 = gl.getUniformLocation(program, "u_color1")
        program.u_color2 = gl.getUniformLocation(program, "u_color2")
        program.u_colorMode = gl.getUniformLocation(program, "u_colorMode")
        program.u_greenscreen = gl.getUniformLocation(program, "u_greenscreen")
      }
      render(now = 0) {
        const { gl, program, buffer, canvas, mouseMove, mouseCoords, pointerCoords, nbrOfPointers, zoom, wheel, startRandom } = this
        const daytime = new Date()
        if (!program || gl.getProgramParameter(program, gl.DELETE_STATUS)) return

        gl.clearColor(0, 0, 0, 1)
        gl.clear(gl.COLOR_BUFFER_BIT)
        gl.useProgram(program)
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer)
        gl.uniform2f(program.resolution, canvas.width, canvas.height)
        gl.uniform1f(program.time, now * 1e-3)
        gl.uniform4f(program.daytime, daytime.getHours(), daytime.getMinutes(), daytime.getSeconds(), daytime.getMilliseconds())
        gl.uniform2f(program.move, ...mouseMove)
        gl.uniform2f(program.touch, ...mouseCoords)
        gl.uniform1i(program.pointerCount, nbrOfPointers)
        gl.uniform2fv(program.pointers, pointerCoords)
        gl.uniform1f(program.zoom, zoom)
        gl.uniform2f(program.wheel, ...wheel)
        gl.uniform1f(program.startRandom, startRandom)

        // Set custom uniform values
        if (program.u_zoom) gl.uniform1f(program.u_zoom, settings.zoom)
        if (program.u_offset) gl.uniform2f(program.u_offset, pointers.offset[0], pointers.offset[1])
        if (program.u_animPreset) gl.uniform1i(program.u_animPreset, animPresets[settings.animationPreset])
        if (program.u_color1) gl.uniform3fv(program.u_color1, hexToRgb(settings.color1))
        if (program.u_color2) gl.uniform3fv(program.u_color2, hexToRgb(settings.color2))
        if (program.u_colorMode) gl.uniform1i(program.u_colorMode, settings.colorMode)
        if (program.u_greenscreen) gl.uniform1f(program.u_greenscreen, settings.greenscreen ? 1.0 : 0.0)

        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4)
      }
      clear() {
        const { gl } = this
        gl.clear(gl.COLOR_BUFFER_BIT)
      }
    }
    class PointerHandler {
      constructor(element, scale) {
        this.scale = scale
        this.active = false
        this.onchange = null
        this.pointers = new Map()
        this.lastCoords = [0, 0]
        this.moves = [0, 0]
        this.offset = [0, 0] // translation offset
        this.zoom = 0
        this.wheelDelta = 0
        this.wheelOffset = 0
        this.ex = 0
        this.ey = 0
        const emit = () => {
          if (typeof this.onchange === 'function') {
            this.onchange()
          }
        }
        const map = (element, scale, x, y) => [x * scale, element.height - y * scale]
        element.addEventListener("pointerdown", (e) => {
          this.active = true
          this.pointers.set(e.pointerId, map(element, this.getScale(), e.clientX, e.clientY))
          this.ex = e.clientX
          this.ey = e.clientY
          emit()
        })
        element.addEventListener("pointerup", (e) => {
          if (this.count === 1) {
            this.lastCoords = this.first
          }
          this.pointers.delete(e.pointerId)
          this.active = this.pointers.size > 0
          emit()
        })
        element.addEventListener("pointerleave", (e) => {
          if (this.count === 1) {
            this.lastCoords = this.first
          }
          this.pointers.delete(e.pointerId)
          this.active = this.pointers.size > 0
          emit()
        })
        element.addEventListener("pointermove", (e) => {
          if (!this.active) return
          const mapped = map(element, this.getScale(), e.clientX, e.clientY)
          this.lastCoords = mapped
          this.pointers.set(e.pointerId, mapped)

          const dx = e.clientX - this.ex
          const dy = this.ey - e.clientY

          // Shift + drag or Right-click drag translates/pans the object
          if (e.shiftKey || e.buttons === 2) {
            this.offset[0] += dx * 0.015 / this.getScale()
            this.offset[1] += dy * 0.015 / this.getScale()
          } else {
            // Left click drag rotates/moves
            this.moves = [this.moves[0] + dx, this.moves[1] + dy]
          }

          this.ex = e.clientX
          this.ey = e.clientY
          emit()
        })
        element.addEventListener("wheel", (e) => {
          // Adjust zoom value based on wheel scroll
          const zoomFactor = e.deltaY < 0 ? 0.9 : 1.1
          settings.zoom = Math.max(0.1, Math.min(10.0, settings.zoom * zoomFactor))
          
          if (typeof zoomController !== 'undefined' && zoomController) {
            zoomController.setValue(settings.zoom)
          } else {
            emit()
          }
        }, { passive: true })
      }
      getScale() {
        return this.scale
      }
      updateScale(scale) { this.scale = scale }
      reset() {
        this.pointers.clear()
        this.active = false
        this.lastCoords = [0, 0]
        this.moves = [0, 0]
        this.offset = [0, 0]
        this.zoom = 0
        this.wheelDelta = 0
        this.wheelOffset = 0
      }
      get count() {
        return this.pointers.size
      }
      get move() {
        return this.moves
      }
      get zoomed() {
        return this.zoom
      }
      get wheel() {
        return [this.wheelDelta, this.wheelOffset] || [0, 0]
      }
      get coords() {
        return this.pointers.size > 0 ? Array.from(this.pointers.values()).map((p) => [...p]).flat() : [0, 0]
      }
      get first() {
        return this.pointers.values().next().value || this.lastCoords
      }
    }
    function lerp(a, b, t) {
      return a + (b - a) * t
    }
    class Editor {
      constructor(textarea, errorfield, errorindicator) {
        this.textarea = textarea
        this.errorfield = errorfield
        this.errorindicator = errorindicator
        textarea.addEventListener('keydown', this.handleKeydown.bind(this))
        textarea.addEventListener('scroll', this.handleScroll.bind(this))
      }
      get hidden() { return this.textarea.classList.contains('hidden') }
      set hidden(value) { value ? this.#hide() : this.#show() }
      get text() { return this.textarea.value }
      set text(value) { this.textarea.value = value }
      get scrollTop() { return this.textarea.scrollTop }
      set scrollTop(value) { this.textarea.scrollTop = value }
      setError(message) {
        this.errorfield.innerHTML = message
        this.errorfield.classList.add('opaque')
        const match = message.match(/ERROR: \d+:(\d+):/)
        const lineNumber = match ? parseInt(match[1]) : 0
        const overlay = document.createElement('pre')

        overlay.classList.add('overlay')
        overlay.textContent = '\n'.repeat(lineNumber)

        document.body.appendChild(overlay)

        const offsetTop = parseInt(getComputedStyle(overlay).height)

        this.errorindicator.style.setProperty('--top', offsetTop + 'px')
        this.errorindicator.style.visibility = 'visible'

        document.body.removeChild(overlay)
      }
      clearError() {
        this.errorfield.textContent = ''
        this.errorfield.classList.remove('opaque')
        this.errorfield.blur()
        this.errorindicator.style.visibility = 'hidden'
      }
      focus() {
        this.textarea.focus()
      }
      #hide() {
        for (const el of [this.errorindicator, this.errorfield, this.textarea]) {
          el.classList.add('hidden')
        }
      }
      #show() {
        for (const el of [this.errorindicator, this.errorfield, this.textarea]) {
          el.classList.remove('hidden')
        }
        this.focus()
      }
      handleScroll() {
        this.errorindicator.style.setProperty('--scroll-top', `${this.textarea.scrollTop}px`)
      }
      handleKeydown(event) {
        if (event.key === "Tab") {
          event.preventDefault()
          this.handleTabKey(event.shiftKey)
        } else if (event.key === "Enter") {
          event.preventDefault()
          this.handleEnterKey()
        }
      }
      handleTabKey(shiftPressed) {
        if (this.#getSelectedText() !== "") {
          if (shiftPressed) {
            this.#unindentSelectedText()
            return
          }
          this.#indentSelectedText()
        } else {
          this.#indentAtCursor()
        }
      }
      #getSelectedText() {
        const editor = this.textarea
        const start = editor.selectionStart
        const end = editor.selectionEnd
        return editor.value.substring(start, end)
      }
      #indentAtCursor() {
        const editor = this.textarea
        const cursorPos = editor.selectionStart

        document.execCommand('insertText', false, '\t')
        editor.selectionStart = editor.selectionEnd = cursorPos + 1
      }
      #indentSelectedText() {
        const editor = this.textarea
        const cursorPos = editor.selectionStart
        const selectedText = this.#getSelectedText()
        const lines = selectedText.split('\n')
        const indentedText = lines.map(line => '\t' + line).join('\n')

        document.execCommand('insertText', false, indentedText)
        editor.selectionStart = cursorPos
      }
      #unindentSelectedText() {
        const editor = this.textarea
        const cursorPos = editor.selectionStart
        const selectedText = this.#getSelectedText()
        const lines = selectedText.split('\n')
        const indentedText = lines.map(line => line.replace(/^\t/, '').replace(/^ /, '')).join('\n')

        document.execCommand('insertText', false, indentedText)
        editor.selectionStart = cursorPos
      }
      handleEnterKey() {
        const editor = this.textarea
        const visibleTop = editor.scrollTop
        const cursorPosition = editor.selectionStart

        let start = cursorPosition - 1
        while (start >= 0 && editor.value[start] !== '\n') {
          start--
        }

        let newLine = ''
        while (start < cursorPosition - 1 && (editor.value[start + 1] === ' ' || editor.value[start + 1] === '\t')) {
          newLine += editor.value[start + 1]
          start++
        }

        document.execCommand('insertText', false, '\n' + newLine)
        editor.selectionStart = editor.selectionEnd = cursorPosition + 1 + newLine.length
        editor.scrollTop = visibleTop // Prevent the editor from scrolling
        const lineHeight = editor.scrollHeight / editor.value.split('\n').length
        const line = editor.value.substring(0, cursorPosition).split('\n').length

        // Do the actual layout calculation in order to get the correct scroll position
        const visibleBottom = editor.scrollTop + editor.clientHeight
        const lineTop = lineHeight * (line - 1)
        const lineBottom = lineHeight * (line + 2)

        // If the cursor is outside the visible range, scroll the editor
        if (lineTop < visibleTop) editor.scrollTop = lineTop
        if (lineBottom > visibleBottom) editor.scrollTop = lineBottom - editor.clientHeight
      }
    }

    // Hex to RGB parser helper
    function hexToRgb(hex) {
      hex = hex.replace(/^#/, '');
      if (hex.length === 3) {
        hex = hex.split('').map(c => c + c).join('');
      }
      const num = parseInt(hex, 16);
      return [
        ((num >> 16) & 255) / 255,
        ((num >> 8) & 255) / 255,
        (num & 255) / 255
      ];
    }

    // Expose control functions and render debounce wrapper to global window scope safely
    // AFTER they are fully initialized to avoid TDZ (temporal dead zone) ReferenceErrors
    window.toggleView = toggleView;
    window.reset = reset;
    window.toggleResolution = toggleResolution;
    window.togglePlayStop = togglePlayStop;
    window.render = render;

    window.onload = init;
  </script>
