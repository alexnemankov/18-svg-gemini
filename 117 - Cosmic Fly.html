<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Particle Warp</title>
  <!-- Import maps polyfill -->
  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  <!-- Define import maps for Three.js, kokomi.js (via esm.sh), and lil-gui -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "kokomi": "https://esm.sh/kokomi.js@1.11.0?external=three",
        "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
      }
    }
  </script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000000;
      transition: background-color 0.3s ease;
      user-select: none;
    }
    #sketch {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-color: #000000;
      transition: background-color 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="sketch"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import * as kokomi from 'kokomi';
    import GUI from 'lil-gui';

    // Establish namespace mappings to match user's custom dat.GUI syntax
    const dat = { GUI };

    const vertexShader = `
#define GLSLIFY 1
highp float random(vec2 co)
{
    highp float a=12.9898;
    highp float b=78.233;
    highp float c=43758.5453;
    highp float dt=dot(co.xy,vec2(a,b));
    highp float sn=mod(dt,3.14);
    return fract(sin(sn)*c);
}

uniform float iTime;
uniform float iVelocity;

attribute vec2 aSeed;
attribute float aSize;

varying float vRandColor;

void main(){
    vec3 p=position;
    
    float t=iTime*1000.;
    float v=iVelocity;
    float s=v*t;
    p.z=mod(p.z+s,2000.);
    
    vec4 mvPosition=modelViewMatrix*vec4(p,1.);
    gl_Position=projectionMatrix*mvPosition;
    
    float pSize=aSize*(200./-mvPosition.z);
    gl_PointSize=pSize;
    
    float randColor=random(aSeed);
    vRandColor=randColor;
}
`;

    const fragmentShader = `
#define GLSLIFY 1
float circle(vec2 st,float r){
    vec2 dist=st-vec2(.5);
    return 1.-smoothstep(r-(r*1.15),r,dot(dist,dist)*4.);
}

uniform vec3 iColor1;
uniform vec3 iColor2;

varying float vRandColor;

void main(){
    vec2 p=gl_PointCoord-.5+.5;
    
    vec3 color=iColor1;
    if(vRandColor>0.&&vRandColor<.5){
        color=iColor2;
    }
    
    float shape=circle(p,1.);
    
    vec3 col=color*shape;
    
    gl_FragColor=vec4(col, shape);
}
`;

    // 5 Curated premium color schemes
    const colorSchemes = {
      'Cosmic Neon': {
        color1: '#ff007f', // Hot Pink
        color2: '#00f3ff', // Neon Cyan
        bg: '#050510',     // Midnight Blue
        fade: '#050510'
      },
      'Solar Flare': {
        color1: '#ff5500', // Orange-Red
        color2: '#ffcc00', // Amber Gold
        bg: '#0a0300',     // Dark Ember
        fade: '#0a0300'
      },
      'Aurora Borealis': {
        color1: '#00ff88', // Green Aurora
        color2: '#7000ff', // Electric Violet
        bg: '#020a06',     // Deep Spruce
        fade: '#020a06'
      },
      'Deep Space Void': {
        color1: '#ffffff', // Cosmic Silver
        color2: '#2d5c8f', // Nebula Blue
        bg: '#030508',     // Deep Void
        fade: '#030508'
      },
      'Cyber Forest': {
        color1: '#00ffcc', // Mint Teal
        color2: '#39ff14', // Acid Lime
        bg: '#000605',     // Cyber Moss
        fade: '#000605'
      }
    };

    const params = {
      count: 10000,
      pointColor1: colorSchemes['Cosmic Neon'].color1,
      pointColor2: colorSchemes['Cosmic Neon'].color2,
      angularVelocity: 0,
      fadeFactor: 0.2,
      velocity: 0.01,
      
      // Additional Customizable Options
      greenscreen: false,
      colorScheme: 'Cosmic Neon',
      cameraAnimation: 'Fly-Through Sway',
      dpr: Math.min(window.devicePixelRatio, 2),
      animationSpeed: 1.0
    };

    class Particles extends kokomi.Component {
      constructor(base, config = {}) {
        super(base);

        const {
          count = 10000,
          pointColor1 = params.pointColor1,
          pointColor2 = params.pointColor2,
          pointSize = 3,
          angularVelocity = 0,
          velocity = 0.01
        } = config;

        this.count = count;
        this.pointColor1 = pointColor1;
        this.pointColor2 = pointColor2;
        this.pointSize = pointSize;
        this.angularVelocity = angularVelocity;
        this.velocity = velocity;

        this.geometry = null;
        this.material = null;
        this.points = null;

        this.create();
      }
      create() {
        const { base, count } = this;
        const { scene } = base;

        this.dispose();

        const geometry = new THREE.BufferGeometry();
        this.geometry = geometry;

        const positions = kokomi.makeBuffer(
          count,
          () => THREE.MathUtils.randFloat(-0.5, 0.5) * 50
        );
        geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

        const seeds = kokomi.makeBuffer(
          count,
          () => THREE.MathUtils.randFloat(0, 1),
          2
        );
        geometry.setAttribute("aSeed", new THREE.BufferAttribute(seeds, 2));

        const sizes = kokomi.makeBuffer(
          count,
          () => this.pointSize + THREE.MathUtils.randFloat(0, 1),
          1
        );
        geometry.setAttribute("aSize", new THREE.BufferAttribute(sizes, 1));

        const material = new THREE.ShaderMaterial({
          vertexShader,
          fragmentShader,
          transparent: true,
          depthWrite: false,
          blending: params.greenscreen ? THREE.NormalBlending : THREE.AdditiveBlending,
          uniforms: {
            iTime: {
              value: 0
            },
            iColor1: {
              value: new THREE.Color(this.pointColor1)
            },
            iColor2: {
              value: new THREE.Color(this.pointColor2)
            },
            iVelocity: {
              value: this.velocity
            }
          }
        });
        this.material = material;

        const points = new THREE.Points(geometry, material);
        this.points = points;

        this.changePos();
      }
      addExisting() {
        const { base, points } = this;
        const { scene } = base;

        if (points) {
          // Add to parent animation group if it exists on Sketch
          if (base.particlesGroup) {
            base.particlesGroup.add(points);
          } else {
            scene.add(points);
          }
        }
      }
      update(time) {
        // Read accumulated time from base sketch to allow speed scaling
        const elapsedTime = this.base.customTime !== undefined ? this.base.customTime : time / 1000;

        if (this.material) {
          const uniforms = this.material.uniforms;
          uniforms.iTime.value = elapsedTime;
        }

        if (this.points) {
          // Adjust rotation based on speed parameter
          const speed = params.animationSpeed !== undefined ? params.animationSpeed : 1.0;
          this.points.rotation.z += this.angularVelocity * 0.01 * speed;
        }
      }
      changePos() {
        const { geometry, count } = this;
        if (geometry) {
          const positionAttrib = geometry.attributes.position;

          kokomi.iterateBuffer(
            positionAttrib.array,
            count,
            (arr, axis) => {
              const theta = THREE.MathUtils.randFloat(0, 360);
              const r = THREE.MathUtils.randFloat(10, 50);
              const x = r * Math.cos(theta);
              const y = r * Math.sin(theta);
              const z = THREE.MathUtils.randFloat(0, 2000);
              arr[axis.x] = x;
              arr[axis.y] = y;
              arr[axis.z] = z;
            }
          );
        }
      }
      dispose() {
        const { base } = this;
        const { scene } = base;

        if (this.geometry) {
          this.geometry.dispose();
        }

        if (this.material) {
          this.material.dispose();
        }

        if (this.points) {
          if (base.particlesGroup) {
            base.particlesGroup.remove(this.points);
          } else {
            scene.remove(this.points);
          }
        }
      }
    }

    class Sketch extends kokomi.Base {
      constructor(sel = "#sketch") {
        super(sel);

        this.particles = null;
        this.persistenceEffect = null;
        this.particlesGroup = null;
        this.controls = null;
        this.lastTime = 0;
        this.customTime = 0;
      }
      create() {
        this.renderer.setPixelRatio(params.dpr);

        // Group to contain particles and animate relative movements, preventing controls fights
        this.particlesGroup = new THREE.Group();
        this.scene.add(this.particlesGroup);

        this.createCamera();

        // Standard OrbitControls for dragging and zooming
        this.controls = new OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.controls.dampingFactor = 0.05;
        this.controls.enableZoom = true;
        this.controls.enablePan = true;
        this.controls.minDistance = 100;
        this.controls.maxDistance = 5000;

        this.createParticles();

        window.addEventListener("resize", () => {
          this.createParticles();
        });

        // Initialize background & blending configurations
        this.updateBackground();

        this.createDebug();

        // Main animation/render loop
        this.update((time) => {
          // Accumulate custom time scaled by speed settings
          let deltaTime = (time - this.lastTime) / 1000;
          if (deltaTime < 0 || deltaTime > 1.0) deltaTime = 0;
          this.lastTime = time;

          this.customTime += deltaTime * params.animationSpeed;

          // Update OrbitControls
          if (this.controls) {
            this.controls.update();
          }

          // Handle camera/scene preset animations
          this.animateCamera();
        });
      }
      createCamera() {
        const camera = new THREE.PerspectiveCamera(
          60,
          window.innerWidth / window.innerHeight,
          0.1,
          10000
        );
        this.camera = camera;
        this.interactionManager.camera = camera;
        camera.position.z = 1000;
      }
      createParticles() {
        if (this.particles) {
          this.particles.dispose();
        }

        if (this.persistenceEffect) {
          this.persistenceEffect.disable();
        }

        const particles = new Particles(this, {
          count: params.count,
          pointColor1: params.pointColor1,
          pointColor2: params.pointColor2,
          angularVelocity: params.angularVelocity,
          velocity: params.velocity
        });
        particles.addExisting();
        this.particles = particles;

        // Set trail fade color depending on active background settings
        const baseFadeColor = params.greenscreen 
          ? new THREE.Color("#00ff00") 
          : new THREE.Color(colorSchemes[params.colorScheme].fade);

        const persistenceEffect = new kokomi.PersistenceEffect(this, {
          fadeColor: baseFadeColor,
          fadeFactor: params.fadeFactor
        });
        persistenceEffect.addExisting();
        this.persistenceEffect = persistenceEffect;
      }
      animateCamera() {
        const time = this.customTime;
        const targetPos = new THREE.Vector3();
        const targetRot = new THREE.Euler();

        if (params.cameraAnimation === 'Fly-Through Sway') {
          // Lissajous curve movement
          targetPos.set(Math.sin(time * 0.8) * 80, Math.cos(time * 0.5) * 80, 0);
          targetRot.set(0, 0, 0);
        } else if (params.cameraAnimation === 'Slow Orbit') {
          // Slow orbital rotation
          targetPos.set(0, 0, 0);
          targetRot.set(0, time * 0.1, 0);
        } else if (params.cameraAnimation === 'Breathing Zoom') {
          // Pulsing scale/zoom effect
          targetPos.set(0, 0, Math.sin(time * 0.6) * 350);
          targetRot.set(0, 0, 0);
        } else if (params.cameraAnimation === 'Cinematic Drift') {
          // Continuous multiaxial drift
          targetPos.set(
            Math.sin(time * 0.4) * 100,
            Math.cos(time * 0.6) * 100,
            Math.sin(time * 0.5) * 200
          );
          targetRot.set(
            Math.sin(time * 0.2) * 0.1,
            Math.cos(time * 0.3) * 0.1,
            Math.sin(time * 0.1) * 0.05
          );
        } else {
          // Static
          targetPos.set(0, 0, 0);
          targetRot.set(0, 0, 0);
        }

        // Smoothly lerp towards target positions to avoid sudden snaps
        if (this.particlesGroup) {
          this.particlesGroup.position.lerp(targetPos, 0.05);
          this.particlesGroup.rotation.x = THREE.MathUtils.lerp(this.particlesGroup.rotation.x, targetRot.x, 0.05);
          this.particlesGroup.rotation.y = THREE.MathUtils.lerp(this.particlesGroup.rotation.y, targetRot.y, 0.05);
          this.particlesGroup.rotation.z = THREE.MathUtils.lerp(this.particlesGroup.rotation.z, targetRot.z, 0.05);
        }
      }
      updateBackground() {
        const sketchEl = document.getElementById("sketch");
        if (params.greenscreen) {
          if (sketchEl) sketchEl.style.backgroundColor = "#00ff00";
          document.body.style.backgroundColor = "#00ff00";
          this.renderer.setClearColor(0x00ff00, 1);
          if (this.persistenceEffect && this.persistenceEffect.fadeColor) {
            this.persistenceEffect.fadeColor.set("#00ff00");
          }
        } else {
          const scheme = colorSchemes[params.colorScheme];
          if (sketchEl) sketchEl.style.backgroundColor = scheme.bg;
          document.body.style.backgroundColor = scheme.bg;
          this.renderer.setClearColor(new THREE.Color(scheme.bg), 1);
          if (this.persistenceEffect && this.persistenceEffect.fadeColor) {
            this.persistenceEffect.fadeColor.set(scheme.fade);
          }
        }
      }
      updateBlending() {
        if (this.particles && this.particles.material) {
          // Normal blending prevents washed out additive blending on opaque green screens
          this.particles.material.blending = params.greenscreen ? THREE.NormalBlending : THREE.AdditiveBlending;
          this.particles.material.needsUpdate = true;
        }
      }
      applyColorScheme(schemeName) {
        const scheme = colorSchemes[schemeName];
        if (scheme) {
          params.pointColor1 = scheme.color1;
          params.pointColor2 = scheme.color2;

          // Update gui controllers if color schemes are dynamically loaded
          if (this.color1Controller) this.color1Controller.setValue(params.pointColor1);
          if (this.color2Controller) this.color2Controller.setValue(params.pointColor2);

          if (this.particles && this.particles.material) {
            const uniforms = this.particles.material.uniforms;
            uniforms.iColor1.value = new THREE.Color(params.pointColor1);
            uniforms.iColor2.value = new THREE.Color(params.pointColor2);
          }

          this.updateBackground();
        }
      }
      createDebug() {
        const gui = new dat.GUI();
        this.gui = gui;

        // Folder 1: Particle Properties
        const fParticles = gui.addFolder("Particles");

        fParticles
          .add(params, "count")
          .min(0)
          .max(50000)
          .step(1)
          .onChange(() => {
            this.createParticles();
            this.updateBlending();
          });

        this.color1Controller = fParticles.addColor(params, "pointColor1").onChange(() => {
          if (this.particles && this.particles.material) {
            this.particles.material.uniforms.iColor1.value = new THREE.Color(params.pointColor1);
          }
        });

        this.color2Controller = fParticles.addColor(params, "pointColor2").onChange(() => {
          if (this.particles && this.particles.material) {
            this.particles.material.uniforms.iColor2.value = new THREE.Color(params.pointColor2);
          }
        });

        fParticles
          .add(params, "angularVelocity")
          .min(0)
          .max(1)
          .step(0.001)
          .onChange(() => {
            if (this.particles) {
              this.particles.angularVelocity = params.angularVelocity;
            }
          });

        fParticles
          .add(params, "fadeFactor")
          .min(0)
          .max(1)
          .step(0.001)
          .onChange(() => {
            if (this.persistenceEffect) {
              this.persistenceEffect.fadeFactor = params.fadeFactor;
            }
          });

        fParticles
          .add(params, "velocity")
          .min(0)
          .max(0.1)
          .step(0.001)
          .onChange(() => {
            if (this.particles && this.particles.material) {
              this.particles.material.uniforms.iVelocity.value = params.velocity;
            }
          });

        // Folder 2: Global Scene Settings
        const fSettings = gui.addFolder("Custom Settings");

        fSettings.add(params, "greenscreen").name("Greenscreen").onChange(() => {
          this.updateBackground();
          this.updateBlending();
        });

        fSettings.add(params, "colorScheme", Object.keys(colorSchemes)).name("Color Scheme").onChange((val) => {
          this.applyColorScheme(val);
        });

        fSettings.add(params, "cameraAnimation", [
          'Fly-Through Sway',
          'Slow Orbit',
          'Breathing Zoom',
          'Cinematic Drift',
          'Static (No Movement)'
        ]).name("Animation");

        fSettings.add(params, "dpr", 0.5, 3.0, 0.1).name("DPR").onChange((val) => {
          this.renderer.setPixelRatio(val);
        });

        fSettings.add(params, "animationSpeed", 0.0, 3.0, 0.1).name("Speed");

        fParticles.open();
        fSettings.open();
      }
    }

    const sketch = new Sketch();
    sketch.create();

    // Setup key listener to toggle UI visibility with "H"
    let guiVisible = true;
    window.addEventListener("keydown", (e) => {
      if (e.key === "h" || e.key === "H") {
        guiVisible = !guiVisible;
        const guiEl = document.querySelector(".lil-gui");
        if (guiEl) {
          guiEl.style.display = guiVisible ? "block" : "none";
        }
      }
    });
  </script>
</body>
</html>
